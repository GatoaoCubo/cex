updated: '2026-04-12'
density_score: 0.9
boundary: This artifact defines the process for verifying CEX artifacts, including structural, content, and integration checks.
  It is not a tool or agent itself but provides the framework for validation. It does not execute verification actions or
  generate scores directly.
related_kinds: '| Related Kind         | Relationship Description                                                                 |

  |----------------------|------------------------------------------------------------------------------------------|

  | skill: validation_agent | Executes the verification steps defined in this protocol.                               |

  | tool: cex_compile     | Used during integration validation to compile artifacts into standardized formats.      |

  | kind: quality_assurance | Ensures artifacts meet domain-specific quality standards referenced in this protocol.  |

  | tool: artifact_registry | Validates cross-references by checking artifact existence in the registry.              |

  | skill: compliance_check | Ensures artifacts adhere to governance and regulatory requirements.                     |'
pre_verification_checklist: "Before scoring, verify these structural requirements:\n\n1. File existence: Confirm the file\
  \ exists at the expected path following the pattern `{pillar_code}{kind_prefix}{slug}` (e.g., `p04_skill_verify.md`).  \n\
  2. YAML parsing: Ensure the frontmatter is valid with required fields: `id`, `kind`, `pillar`, `title`, `version`, `tags`,\
  \ `tldr`, `domain`, `author`, `created`, `updated`, `density_score`.  \n3. Content density: Content must exceed 85% substantive\
  \ bytes (excluding frontmatter) and avoid placeholders like `[TODO]` or `lorem ipsum`.  \n4. Kind validation: The `kind`\
  \ field must match one of 123 registered kinds in `kinds_meta.json`.  \n5. Pillar alignment: The `pillar` field must align\
  \ with the artifact's functional domain (e.g., `P04` for tools)."
verification_steps: ''
step_1_structural_validation: "- Parse frontmatter: Extract metadata and validate required fields.  \n- Quality field check:\
  \ Ensure `quality` is `null` (artifacts are never self-scored).  \n- File size check: Verify file size is below `max_bytes`\
  \ (e.g., 5MB for markdown).  \n- Naming pattern: Confirm filename matches `{pillar_code}{kind_prefix}{slug}` (e.g., `p04_skill_verify.md`).\
  \  \n\nExample:  \n- Valid: `p04_skill_verify.md`  \n- Invalid: `skill_verify.md` (missing pillar code)"
step_2_content_validation: "- Section completeness: Ensure all required sections (e.g., `## Boundary`, `## Related Kinds`,\
  \ `## Verification Steps`) exist.  \n- Density calculation: Measure substantive bytes (text, code, tables) vs. total bytes\
  \ (excluding frontmatter).  \n- Placeholder scan: Detect and flag `[TODO]`, `[PLACEHOLDER]`, or lorem ipsum text.  \n- Cross-reference\
  \ check: Validate all links point to existing artifacts in the registry.  \n\nExample:  \n- Low density: 40% substantive\
  \ content (fails threshold)  \n- High density: 90% substantive content (passes threshold)"
step_3_integration_validation: "- Compile artifact: Run `python _tools/cex_compile.py {path}` to generate YAML/JSON output.\
  \  \n- Output validation: Ensure compiled artifact is valid YAML/JSON with no syntax errors.  \n- Loading test: Confirm\
  \ artifact loads via `prompt_layers` or `retriever` interfaces.  \n- Duplicate check: Scan for duplicate `id` fields in\
  \ the compiled directory.  \n\nExample:  \n- Success: `compiled/p04_skill_verify.yaml` is valid JSON  \n- Failure: Duplicate\
  \ `id: p04_skill_verify` in directory"
step_4_report: "- Score dimensions: Generate scores across 5 dimensions (D1-D5):  \n  - D1: Structural validity (0-100)  \n\
  \  - D2: Content quality (0-100)  \n  - D3: Integration success (0-100)  \n  - D4: Cross-reference integrity (0-100)  \n\
  \  - D5: Compliance with standards (0-100)  \n- Gate results: List pass/fail status for each verification phase.  \n- Recommendations:\
  \ Provide actionable fixes (e.g., \"Add missing `## Related Kinds` section\").  \n- Structured output: Format report as\
  \ JSON for automated processing.  \n\nExample Report:  \n{\n  \"D1\": 95,\n  \"D2\": 88,\n  \"D3\": 100,\n  \"D4\": 92,\n\
  \  \"D5\": 98,\n  \"gates\": {\n    \"structural\": \"pass\",\n    \"content\": \"fail\",\n    \"integration\": \"pass\"\
  \n  },\n  \"recommendations\": [\"Replace placeholder text in section 2.3\", \"Add missing `## Related Kinds` section\"\
  ]\n}"
comparison_of_verification_tools_and_methods: '| Verification Phase | Purpose                          | Tools Used                  |
  Success Criteria                                | Common Issues                              |

  |--------------------|----------------------------------|-----------------------------|-------------------------------------------------|--------------------------------------------|

  | Structural         | Ensure metadata and format compliance | YAML parser, file system  | All required fields present,
  valid filename     | Missing `id` field, invalid naming pattern |

  | Content            | Validate substantive content quality | Text analyzer, regex engine | Density ≥ 85%, no placeholders,
  sections complete | Low density, placeholder text, missing sections |

  | Integration        | Confirm artifact compatibility   | `cex_compile.py`, loader    | Valid YAML/JSON, no duplicates,
  loads correctly | Compilation errors, duplicate IDs, load failures |

  | Reporting          | Generate structured feedback     | JSON formatter, score engine | Valid JSON output, all gates resolved         |
  Invalid JSON, incomplete gate results    |

  | Compliance         | Ensure adherence to standards    | Registry, policy checker    | All cross-references valid, meets
  domain rules  | Invalid links, non-compliant metadata    |'
expanded_use_cases_and_data: ''
