id: p04_browser_design_extractor
name: organization-design-extractor
description: Extrair design tokens e Tailwind configs de qualquer website URL
version: 1.0.0
pillar: P04
kind: browser_tool
created: 2026-03-22
updated: 2026-03-22
author: builder_agent
domain: building
quality: 9.1
tags:
- design-tokens
- tailwind
- css
- extraction
- visual-design
tldr: Pipeline URL-to-tokens - Discover(Chrome)>Extract(parser)>Transform(Style Dictionary)>Build(components)>Validate(ODiff)
user_invocable: true
trigger: /design-extractor
when_to_use: Extrair tokens de site para replicar visual, migrar design system, audit de consistencia
when_not_to_use: Criar design do zero (usar web-design-agent), apenas screenshots (usar bowser)
phases:
- Discover (Chrome MCP)
- Extract (HTML parser)
- Transform (Style Dictionary)
- Build (builder_agent components)
- Validate (ODiff)
examples:
- /design-extractor https://linear.app
- /design-extractor https://stripe.com --tokens-only
- /design-extractor --compare https://site-a.com https://site-b.com
density_score: 0.86
linked_artifacts:
  agent: records/agents/design-extractor/README.md
title: 'Example: Browser Tool Design Extractor'
purpose: Pipeline completo de URL ate design tokens production-ready. Captura screenshots, extrai cores/tipografia/espacamento/shadows/borders
  via HTML parsing, transforma em W3C DTCG tokens, gera Tailwind config / CSS vars / SCSS, opcionalmente gera React components,
  e valida pixel-perfect com ODiff.
workflow_phases: ''
phase_1_discover: 'Input: `url`, optional `pages` array Action: Chrome MCP navega, captura screenshots, mapeia URLs Output:
  Screenshots + URL map'
phase_2_extract: 'Input: Screenshots + HTML pages Action: HTML parser extrai design primitives (cores, fonts, spacing) Output:
  W3C DTCG tokens raw'
phase_3_transform: 'Input: DTCG tokens raw Action: Style Dictionary transforma para formato target Output: `tailwind.config.js`,
  CSS custom properties, SCSS vars'
phase_4_build_opcional: 'Input: Tokens + component patterns Action: builder_agent gera React/Vue components usando tokens
  Output: Component library'
phase_5_validate: 'Input: Original screenshots + generated output Action: ODiff compara pixel-perfect Output: Diff report
  com delta scores'
usage: '# Full extraction from URL

  /design-extractor https://linear.app


  # Extract tokens only (sem component generation)

  /design-extractor https://stripe.com --tokens-only


  # Compare two sites

  /design-extractor --compare https://site-a.com https://site-b.com


  # Export as Tailwind config

  /design-extractor https://vercel.com --format tailwind'
input_output: "input:\n  url: string\n  pages: array              # Optional specific pages\n  format: enum              #\
  \ tailwind | css-vars | scss | dtcg\n  compare_url: string       # Optional second URL\n  components: boolean       # Generate\
  \ React components (default: false)\n\noutput:\n  design_tokens:\n    colors: [{name, value, usage}]\n    typography: [{family,\
  \ sizes, weights, line_heights}]\n    spacing: [scale_values]\n    borders: [{radius, width, style}]\n    shadows: [{name,\
  \ value}]\n    breakpoints: [{name, min_width}]\n  tailwind_config: path\n  css_variables: path\n  screenshots: [paths]\n\
  \  audit_report: path"
quality_gates: '| Gate | Threshold | Acao se Falhar |

  |------|-----------|----------------|

  | Token extraction completeness | >= 90% | Manual review |

  | Color accuracy | Delta E < 2.0 | Re-extract com higher precision |

  | Typography matching | 100% font families | Fallback computed styles |

  | Tailwind config validity | Passes build | Fix syntax errors |'
anti_patterns:
- 'Extrair sem screenshots de referencia: nao tem como validar resultado — always capture first'
- 'Ignorar Delta E em cores: "close enough" em design = visualmente errado — threshold < 2.0'
- 'Gerar components sem tokens: hardcoded values = design system fragil — tokens first, components second'
- 'Nao validar Tailwind build: config com syntax error = build quebrado — always `npx tailwindcss build`'
cross_references:
- '`styling` agent: CSS/Tailwind styling systems'
- '`web-design` agent: Architecture e layout decisions'
- '`vision-to-code` agent: Screenshot to code conversion'
- '`react-component` agent: Component generation from tokens'
