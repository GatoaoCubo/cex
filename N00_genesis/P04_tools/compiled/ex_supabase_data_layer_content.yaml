tldr: 'Content platform config: posts, comments, media, feeds, moderation, busca semantica de conteudo, real-time comments
  e likes'
density_score: 0.89
vertical_profile: '| Aspect | Value |

  |--------|-------|

  | Vertical | content |

  | Tier | pro |

  | Key tables | posts, comments, media, feeds, moderation_queue |

  | Extensions | pgvector (content search), pg_cron (feed refresh), pg_trgm (fuzzy search) |

  | Storage | content-media (public CDN), user-uploads (private) |

  | Realtime | live comments, like counts, feed updates |

  | Vectors | Content semantic search + recommendations |'
config: "identidade:\n  vertical: content\n  regiao: us-east-1\n  tier: pro\n\ndatabase:\n  schemas: [public, moderation]\n\
  \  extensions:\n    obrigatorias: [pgcrypto, pg_graphql]\n    opcionais: [pgvector, pg_cron, pg_trgm]\n  tables:\n    -\
  \ name: posts\n      columns: [id UUID PK, author_id UUID FK, org_id UUID FK, title TEXT, body TEXT, status TEXT DEFAULT\
  \ 'draft', published_at TIMESTAMPTZ, embedding VECTOR(1536), like_count INT DEFAULT 0, comment_count INT DEFAULT 0]\n  \
  \    rls: public_read_author_write\n      indexes: [author_id, org_id, status, published_at, \"embedding HNSW vector_cosine_ops\"\
  ]\n    - name: comments\n      columns: [id UUID PK, post_id UUID FK, author_id UUID FK, body TEXT, parent_id UUID FK SELF,\
  \ created_at TIMESTAMPTZ]\n      rls: public_read_author_write\n      indexes: [post_id, author_id, parent_id]\n    - name:\
  \ media\n      columns: [id UUID PK, post_id UUID FK, author_id UUID FK, storage_path TEXT, mime_type TEXT, size_bytes BIGINT]\n\
  \      rls: author_owner\n    - name: feeds\n      columns: [id UUID PK, user_id UUID FK, post_id UUID FK, score FLOAT,\
  \ created_at TIMESTAMPTZ]\n      rls: owner\n      indexes: [user_id, score, created_at]\n    - name: moderation_queue\n\
  \      schema: moderation\n      columns: [id UUID PK, content_type TEXT, content_id UUID, reason TEXT, status TEXT DEFAULT\
  \ 'pending', moderator_id UUID]\n      rls: moderator_only\n\nauth:\n  providers: [email, google, apple, github]\n  mfa:\
  \ false\n  custom_claims: [org_id, role]\n\nrls:\n  multi_tenant_column: org_id\n  patterns:\n    - nome: public_read_author_write\n\
  \      policy: \"true FOR SELECT WHERE status='published'; author_id = auth.uid() FOR INSERT/UPDATE/DELETE\"\n      tabelas:\
  \ [posts, comments]\n    - nome: author_owner\n      policy: \"author_id = auth.uid()\"\n      tabelas: [media]\n    - nome:\
  \ moderator_only\n      policy: \"(auth.jwt()->'app_metadata'->>'role') IN ('admin','moderator')\"\n      tabelas: [moderation_queue]\n\
  \nstorage:\n  buckets:\n    - nome: content-media\n      publico: true\n      max_file_size: 52428800\n      allowed_mime_types:\
  \ [image/jpeg, image/png, image/webp, image/gif, video/mp4]\n      transform: true\n    - nome: user-uploads\n      publico:\
  \ false\n      max_file_size: 10485760\n      allowed_mime_types: [image/jpeg, image/png]\n\nrealtime:\n  habilitado: true\n\
  \  postgres_changes:\n    - tabela: comments\n      eventos: [INSERT]\n    - tabela: posts\n      eventos: [UPDATE]\n  \
  \    filter: \"status=eq.published\"\n\nvectors:\n  habilitado: true\n  embedding_model: text-embedding-3-small\n  dimensions:\
  \ 1536\n  distance_function: cosine\n  search_function: match_posts\n\nedge_functions:\n  functions:\n    - nome: refresh-feeds\n\
  \      trigger: cron\n      schedule: \"/15    *\"\n    - nome: moderate-content\n      trigger: webhook\n      secrets:\
  \ [OPENAI_KEY]\n    - nome: process-media\n      trigger: http\n      secrets: [CDN_KEY]\n  deploy_method: cli\n\nbudget:\n\
  \  alertas:\n    - metrica: storage\n      threshold: 75\n      acao: email\n    - metrica: bandwidth\n      threshold:\
  \ 90\n      acao: slack"
