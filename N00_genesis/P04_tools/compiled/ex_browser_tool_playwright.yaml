density_score: 0.91
overview: Automates a headless Chromium browser via Playwright for web scraping, UI testing, and page interaction. Used by
  agents that need to navigate websites, fill forms, or extract structured data from rendered pages.
navigate: 'Navigates to a URL and waits for page load. Params: url (string, required): Target URL Wait: networkidle or domcontentloaded
  Returns: `{"status": int, "url": "string", "title": "string"}`'
click: 'Clicks an element matched by selector. Params: selector (string, required): CSS or XPath selector Selector: `button.submit`
  (css) Fallback: `//button[contains(text(),''Submit'')]` (xpath) Returns: `{"clicked": true, "selector": "string"}`'
screenshot: 'Captures full page or element screenshot. Params: full_page (bool, optional): Capture entire scrollable area
  Returns: `{"image": "base64_png", "width": int, "height": int}`'
