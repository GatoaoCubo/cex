name: Playwright Browser Automation
engine: 'Engine: Playwright (Chromium). Headless: true. Viewport: 1280x720. Timeout: 30000ms per action. JavaScript: enabled.'
actions: ''
selectors: 'Priority order: css > aria > text > xpath

  1. css (`div.product-card`): Fast, stable for well-structured pages

  2. aria (`role=button[name="Add to cart"]`): Accessibility-first, resilient

  3. text (`text=Add to cart`): Human-readable fallback

  Fallback rule: try next strategy if primary returns null within 5s'
output_format: "Primary: json\nSchema:\n{\n  \"action\": \"string\",\n  \"success\": \"boolean\",\n  \"data\": \"object |\
  \ null\",\n  \"duration_ms\": \"number\"\n}"
headless: true
viewport: 1280x720
timeout: 30000
javascript: true
cookies: true
stealth: false
