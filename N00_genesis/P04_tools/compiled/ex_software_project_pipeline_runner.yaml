tldr: 'Complete pipeline runner: Research pipeline with STORM+CRAG stages. Stage-based executor pattern (like CEX 8F), async
  stages, retry per stage, structured output, pytest with stage mocks.'
density_score: 0.9
config: "project: { name: research-pipeline, version: 1.0.0, type: pipeline_runner, python: \"3.12\" }\npackage: { name: research_pipeline,\
  \ cli_name: research }\ndependencies:\n  core: [pydantic>=2.0, httpx>=0.24, typer>=0.9, rich>=13.0, beautifulsoup4>=4.12]\n\
  \  dev: [pytest>=7.0, pytest-asyncio>=0.21, ruff>=0.1.0, respx>=0.20]\ndeploy: { target: docker, port: 8000, workers: 1\
  \ }\nconfig: { env_prefix: RESEARCH, settings: [llm_api_key, search_api_key, max_sources] }"
key_files: 'src/research_pipeline/cli.py: Typer CLI with `run`, `status`, `export` commands. src/research_pipeline/pipeline.py:
  Pipeline class with ordered stage list. src/research_pipeline/stages/: IntentStage, PlanStage, RetrieveStage, ScoreStage,
  SynthesizeStage. src/research_pipeline/models.py: Query, Source, Finding, Report Pydantic models. tests/conftest.py: Mock
  HTTP responses, sample queries. tests/test_stages.py: Per-stage tests with mocked external calls.'
architecture: 'src/research_pipeline/

  ├── domain/

  │   ├── models.py        # Query, Source, Finding, Report

  │   ├── scoring.py       # Source scoring (7-dimension Gartner)

  │   └── errors.py        # RetrievalError, ScoringError

  ├── stages/              # Pipeline stages (each is a class)

  │   ├── base.py          # Stage ABC with execute(), retry(), rollback()

  │   ├── intent.py        # Parse query → structured intent

  │   ├── plan.py          # STORM: generate multi-perspective plan

  │   ├── retrieve.py      # CRAG: fetch + assess + correct sources

  │   ├── score.py         # Score sources on 7 dimensions

  │   └── synthesize.py    # Graph-of-Thought synthesis

  ├── infra/

  │   ├── http_client.py   # httpx with retry + circuit breaker

  │   ├── llm_client.py    # LLM API wrapper

  │   └── config.py        # BaseSettings

  ├── pipeline.py          # Pipeline orchestrator

  └── cli.py               # Typer interface'
stage_pattern: "class Stage(ABC):\n    name: str\n    max_retries: int = 2\n\n    @abstractmethod\n    async def execute(self,\
  \ state: dict) -> StageResult: ...\n\n    async def run(self, state: dict) -> StageResult:\n        for attempt in range(self.max_retries\
  \ + 1):\n            try:\n                return await self.execute(state)\n            except RetryableError as e:\n \
  \               if attempt == self.max_retries: raise\n                await asyncio.sleep(2 ** attempt)"
what_makes_it_good:
- Stage pattern mirrors CEX 8F (familiar to N03)
- Each stage independently testable (mock execute())
- Retry with backoff per stage (not all-or-nothing)
- Structured output (Pydantic models, not raw dicts)
- CLI + API dual interface (Typer for CLI, FastAPI optional)
- Circuit breaker on HTTP client (prevents cascade failure)
