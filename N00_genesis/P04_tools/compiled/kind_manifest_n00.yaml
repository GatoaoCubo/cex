id: n00_webhook_manifest
kind: knowledge_card
pillar: P04 -- tools
nucleus: n00
title: Webhook -- Canonical Manifest
version: 1.0
quality: null
tags:
- manifest
- webhook
- p04
- n00
- archetype
- template
purpose: A webhook is an HTTP event-driven endpoint that receives inbound events from external systems (Stripe payment, GitHub
  push, Slack action) and triggers agent workflows in response, or sends outbound HTTP POST notifications to external systems
  when CEX events occur. It defines the endpoint URL, payload schema, signature verification, and the action triggered on
  receipt. The output is a complete webhook handler specification with security validation and idempotency handling.
schema_key_fields: '| Field | Type | Required | Description |

  |-------|------|----------|-------------|

  | id | string | yes | Unique artifact identifier |

  | kind | string | yes | Always `webhook` |

  | pillar | string | yes | Always `P04` |

  | title | string | yes | Human-readable name |

  | version | semver | yes | Artifact version |

  | quality | float\|null | yes | Peer-review score (null until reviewed) |

  | direction | string | yes | inbound, outbound, or bidirectional |

  | endpoint_path | string | yes | URL path for the webhook endpoint |

  | payload_schema | object | yes | JSON Schema defining expected payload structure |

  | signature_header | string | no | Header name for HMAC signature verification |'
when_to_use:
- When integrating external services (Stripe, GitHub, Slack) that push events to CEX
- When N05 Operations needs to trigger agent workflows from external system events
- When a social_publisher or notifier needs outbound webhooks to deliver to third-party platforms
builder: '`archetypes/builders/webhook-builder/` Run: `python _tools/cex_8f_runner.py "your intent" --kind webhook --execute`'
template_variables_open_for_instantiation:
- '`{{NUCLEUS_ROLE}}` -- which nucleus domain owns this'
- '`{{SIN_LENS}}` -- cultural DNA driving the artifact'
- '`{{TARGET_AUDIENCE}}` -- who this serves'
- '`{{DOMAIN_CONTEXT}}` -- business/technical context'
example_minimal: "---\nid: wh_stripe_payment_received\nkind: webhook\npillar: P04\nnucleus: n06\ntitle: \"Stripe Payment Received\
  \ Webhook\"\nversion: 1.0\nquality: null\n---\ndirection: inbound\nendpoint_path: \"/webhooks/stripe/payment\"\nsignature_header:\
  \ \"Stripe-Signature\"\npayload_schema:\n  type: object\n  properties:\n    type: {type: string}\n    data:\n      type:\
  \ object\n      properties:\n        object: {type: object}\n  required: [type, data]"
related_kinds:
- '`api_client` (P04) -- outbound API client that complements inbound webhook events'
- '`notifier` (P04) -- delivery mechanism for outbound webhook-style notifications'
- '`hook` (P04) -- internal lifecycle hook that differs from external webhook integrations'
- '`daemon` (P04) -- background processor that handles high-volume inbound webhook queues'
