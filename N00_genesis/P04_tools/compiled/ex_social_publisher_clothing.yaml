config: "identity:\n  empresa: \"Atelier Noa\"\n  handle: \"@ateliernoa\"\n  nicho: fashion\n  tom: \"elegant, contemporary,\
  \ empowering\"\n  persona: \"Noa\"\n  bio: \"Moda contemporânea para mulheres que lideram ✨\"\n\nplatforms: [instagram,\
  \ tiktok, pinterest]\n\nschedule:\n  timezone: \"America/Sao_Paulo\"\n  calendar:\n    monday:    { type: product, time:\
  \ \"19:00\" }\n    tuesday:   { type: educational, time: \"12:00\" }\n    wednesday: { type: product, time: \"19:00\" }\n\
  \    thursday:  { type: trend, time: \"20:00\" }\n    friday:    { type: product, time: \"18:00\" }\n    saturday:  { type:\
