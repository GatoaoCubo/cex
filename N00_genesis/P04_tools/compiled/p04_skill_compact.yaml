tldr: Context compaction skill for reducing context window usage when approaching token limits. Preserves critical information
  while discarding low-value content.
domain: tools
author: n03_builder
created: '2026-04-12'
updated: '2026-04-12'
density_score: 0.91
trigger_conditions: 'Compaction activates when context usage exceeds 80% of the token budget. The check runs after every tool
  result is received. For example:

  - After a 10,000-token context reaches 8,000 tokens used

  - When a new tool result pushes usage beyond the threshold

  - During batch processing of multiple tool outputs'
compaction_strategy_priority_order: ''
level_1_trim_redundancy_saves_10_20:
- Remove duplicate information across tool results
- Collapse repeated file reads into single reference
- Strip verbose tool output formatting
- Deduplicate error messages
level_2_summarize_history_saves_20_40:
- Replace old conversation turns with summaries
- Compress completed task details to one-line outcomes
- Archive resolved decision points
- Condense long code blocks to signatures + key logic
level_3_drop_low_value_content_saves_30_50:
- Remove exploratory searches that found nothing useful
- Drop tool results from abandoned approaches
- Remove verbose system messages
- Strip formatting from non-critical content
level_4_critical_only_mode_saves_50_70: '- Retain only: current task, active files, recent decisions

  - Replace all history with structured summary

  - Keep only error messages that are unresolved

  - Maintain task list and completion status


  | Compaction Level | Description | Actions Taken | Token Savings | Example Use Case |

  |------------------|-------------|----------------|----------------|------------------|

  | Level 1          | Redundancy removal | Duplicate elimination, formatting stripping | 10-20% | Removing 3 identical error
  messages from 3 tools |

  | Level 2          | Historical compression | Summary replacement, task condensation | 20-40% | Replacing 10 conversation
  turns with 2 summaries |

  | Level 3          | Low-value content removal | Abandoned approach deletion, system message trimming | 30-50% | Removing
  5 unused file reads from a 20-file project |

  | Level 4          | Critical-only retention | Full history replacement, non-essential removal | 50-70% | Retaining only
  active task and 3 unresolved errors |

  | Hybrid Mode      | Adaptive strategy | Combines Level 1-3 based on context | 25-60% | Mixed scenario with both redundancy
  and low-value content |'
preservation_rules: 'NEVER compact:

  - Current task description and requirements

  - Uncommitted code changes

  - Active error messages being debugged

  - User decisions and preferences from this session

  - File paths and line numbers of active work


  Concrete Examples:

  - Preserved: "Implement user authentication with JWT" (current task)

  - Preserved: Uncommitted code in `app/auth.js` line 42

  - Preserved: Active error "401 Unauthorized" being debugged

  - Preserved: User preference "dark mode enabled"

  - Preserved: File path `/src/main.py` referenced in current task'
boundary: This artifact is a token-optimization strategy for managing context windows in constrained environments. It is NOT
  a replacement for proper context management, nor does it compromise task integrity. It does not remove user preferences,
  active errors, or critical task definitions. It focuses solely on reducing token overhead without affecting core functionality.
