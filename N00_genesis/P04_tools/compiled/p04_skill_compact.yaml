edge_cases:
- Ambiguous Content - When information is unclear, preservation rules take precedence
- Critical Thresholds - Near-100% token usage triggers Level 4 automatically
- Multi-User Contexts - User-specific preferences are preserved across sessions
- Nested Tool Chains - Compaction applies recursively to nested tool outputs
- Real-time Systems - Compaction delays are capped at 50ms to maintain responsiveness
optimization_techniques:
- Heuristic Scoring - Assigns weights to content based on relevance (0-100)
- Temporal Decay - Older content receives lower scores over time
- Dependency Analysis - Preserves content referenced by active tasks
- Error Propagation - Retains errors that impact downstream processes
- Adaptive Thresholds - Adjusts 80% trigger based on historical usage patterns
validation_procedures:
- Token Count Verification - Post-compaction token count must be ≤ 80% of budget
- Critical Content Check - All preserved content must meet "never compact" rules
- Consistency Testing - Compacted context must produce identical task outcomes
- Error Tracking - All unresolved errors must remain in context
- Performance Baseline - Latency must not exceed 50ms for Level 4 compaction
