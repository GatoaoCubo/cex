tldr: E2B-sandboxed Python executor for untrusted code with 30s timeout and no network access
description: Runs arbitrary Python in an E2B cloud sandbox with resource limits
domain: tool integration
title: Code Executor Python Sandbox
density_score: 0.9
overview: Executes untrusted Python code inside an E2B cloud sandbox. Used by agents that need to run user-generated or LLM-generated
  code safely without risking host compromise.
sandbox: 'Isolation: E2B cloud microVM — each invocation gets a fresh VM with no host access. Escape prevention: gVisor kernel
  + network firewall blocks all egress. Session: ephemeral — state discarded after each invocation.'
python: 'Version: >=3.10 Libraries: numpy, pandas, requests (pre-installed); pip install blocked at runtime.'
limits:
- 'Timeout: 30s per invocation'
- 'CPU: 1 vCPU'
- 'Memory: 512MB'
- 'Disk: 100MB'
- 'Network: blocked — all egress denied by firewall'
- 'File I/O: read-write — scoped to /tmp sandbox directory only'
examples: ''
example_1_simple_computation: 'Input:

  {"code": "print(sum(range(100)))"}

  Output:

  {"stdout": "4950\n", "stderr": "", "exit_code": 0, "duration_ms": 120}'
