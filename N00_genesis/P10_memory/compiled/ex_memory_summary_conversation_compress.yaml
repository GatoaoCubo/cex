id: p10_ms_conversation_compress
kind: memory_summary
pillar: P10
title: Conversation Compression — Incremental Summarization for Long Sessions
version: 1.0.0
created: 2026-03-29
updated: 2026-03-29
author: builder_agent
domain: memory
quality: 9.1
tags:
- memory
- compression
- summarization
- context-window
- session
tldr: Comprime historico de chat quando context window atinge 75%, preservando fatos-chave via summarization incremental
when_to_use: Sessoes longas (>20 turnos) onde context window esta enchendo e decisoes anteriores precisam ser preservadas
keywords:
- memory-summary
- conversation-compress
- incremental-summarization
- context-management
name: conversation_compress
source_type: chat_history
compression_method: incremental_summarization
max_tokens: 500
trigger: context_window_75pct
density_score: 1.0
tl_dr: 'Quando uma sessao Claude Code atinge 75% do context window (~150K de 200K tokens), este memory_summary comprime o
  historico de conversa em um resumo incremental de ate 500 tokens, preservando: decisoes tomadas, arquivos modificados, erros
  encontrados, e estado atual da tarefa.'
conceito_central: 'Incremental summarization funciona em camadas: cada vez que o trigger dispara, o resumo anterior e combinado
  com as mensagens novas desde a ultima compressao. O resultado e um resumo que cresce logaritmicamente (nao linearmente)
  com o tamanho da conversa. O source_type `chat_history` indica que a fonte e o historico de mensagens user/assistant da
  sessao atual. Diferente de `tool_output` (comprime resultados de ferramentas) ou `file_content` (comprime conteudo de arquivos
  lidos).'
ciclo_de_compressao: "trigger_check:\n  metric: context_window_usage\n  threshold: 0.75\n  check_interval: every_turn\n\n\
  compression:\n  method: incremental_summarization\n  input: messages_since_last_compression\n  prior_summary: previous_memory_summary\
  \  # null on first run\n  max_output_tokens: 500\n  preserve_always:\n    - file_paths_modified\n    - git_commits_made\n\
  \    - errors_encountered\n    - current_task_state\n    - user_decisions\n\noutput:\n  format: structured_yaml\n  inject_as:\
  \ system_message_prefix\n  ttl: session_end"
exemplo_pratico: "Sessao builder_agent com 47 turnos, 162K tokens usados (81%):\n\nInput (mensagens desde ultima compressao,\
  \ turnos 31-47):\n- User pediu refactor de `api/v1/routes.py`\n- Leitura de 3 arquivos (routes.py, models.py, schemas.py)\n\
  - Criacao de `api/v1/routes_v2.py`\n- Erro: import circular com `core/deps.py`\n- Fix: mover dependency injection para `core/container.py`\n\
  - Commit: `refactor: extract DI container from deps.py`\n- User pediu testes\n\nOutput (memory_summary, 487 tokens):\nsession_summary:\n\
  \  task: \"Refactor api/v1/routes.py com DI container\"\n  phase: \"testing (pos-refactor)\"\n  files_modified:\n    - api/v1/routes_v2.py\
  \ (criado)\n    - core/container.py (criado)\n    - core/deps.py (simplificado)\n  commits:\n    - \"refactor: extract DI\
  \ container from deps.py\"\n  errors_resolved:\n    - \"circular import api.v1.routes <> core.deps\"\n  decisions:\n   \
  \ - \"User aprovou DI container pattern\"\n    - \"User quer pytest, nao unittest\"\n  pending:\n    - \"Escrever testes\
  \ para container.py\"\n    - \"Remover routes.py original apos testes passarem\""
fronteira_com_outros_kinds: '| Kind | Diferenca |

  |------|-----------|

  | session_state (P10) | Snapshot efemero do estado atual — nao comprime, captura |

  | runtime_state (P10) | Estado mental do agente — persiste entre sessoes |

  | learning_record (P10) | O que deu certo/errado — acumula patterns, nao comprime conversa |'
anti_patterns:
- Comprimir antes de 50% do context window (desperdicio — informacao ainda cabe)
- Descartar file paths modificados na compressao (perde rastreabilidade)
- Usar max_tokens > 1000 (summary vira quase tao grande quanto o original)
- Comprimir tool outputs brutos ao inves de extrair apenas o relevante
- Nao preservar decisoes do user (leva a re-perguntas)
referencias:
- 'schema: P10/_schema.yaml (memory_summary)'
- 'related: p10_ss_session_state, p10_rs_runtime_state'
