id: ex-notifier-webhook
kind: notifier
pillar: P04
title: Outbound Webhook Notifier
version: 0.1.0
quality: null
status: template
brand_placeholders:
- BRAND_NAME
- BRAND_NOTIFIER_DEFAULT_URL
- BRAND_NOTIFIER_HMAC_SECRET
- BRAND_SUPPORT_EMAIL
tags:
- commerce
- template
- distillation
- notifier
- webhook
density_score: 1.0
purpose: Generic dispatcher that emits signed JSON notifications to downstream consumers (ops Slack, analytics warehouse,
  customer-facing webhook subscribers) whenever an event of interest fires inside the brand's edge functions. It centralizes
  retry, dedup, and signing so each edge function doesn't reinvent the loop.
when_to_use:
- You need to notify >1 downstream consumer from a single event.
- Downstream consumer wants HMAC-signed, retriable delivery.
- You want a single place to add a new delivery target (migrate Slack -> Teams, swap ops email).
when_not_to_use:
- One-off, fire-and-forget log -> use structured logging, not the notifier.
- In-process callback -> use function composition, not a webhook round-trip.
interface: "notifier.send({\n  event: \"sync_run_completed\" | \"stock_low\" | \"order_paid\" | \"oauth_expired\" | ...,\n\
  \  payload: unknown,\n  targets?: string[],   // URLs; defaults to brand config\n  trace_id?: string,\n}): Promise<{ delivered:\
  \ DeliveryResult[] }>"
brand_variables_used:
- '`{{BRAND_NAME}}` -- included in payload metadata.'
- '`{{BRAND_NOTIFIER_DEFAULT_URL}}` -- default ops target (e.g. Slack Incoming Webhook).'
- '`{{BRAND_NOTIFIER_HMAC_SECRET}}` -- env var name of signing key.'
- '`{{BRAND_SUPPORT_EMAIL}}` -- fallback human contact in the payload metadata.'
payload_shape_contract: "{\n  \"event\": \"sync_run_completed\",\n  \"timestamp\": \"2026-04-16T03:15:22Z\",\n  \"brand\"\
  : \"{{BRAND_NAME}}\",\n  \"trace_id\": \"uuid-v4\",\n  \"payload\": { / event-specific / },\n  \"support\": \"{{BRAND_SUPPORT_EMAIL}}\"\
  \n}\nAlways flat `payload` key; never nest events. Consumers dispatch on `event`."
signing: 'Header: `X-{{BRAND_NAME}}-Signature: sha256=<hex>` Body: raw JSON, signed with HMAC-SHA256 using `{{BRAND_NOTIFIER_HMAC_SECRET}}`.
  Consumers must compute and compare with timing-safe equality.'
retry_policy:
- 'Attempts: 5. Schedule: 0, 10s, 60s, 5min, 30min.'
- Any 2xx = success. 4xx (non-429) = permanent fail, no retry, alert ops. 429/5xx = retry.
- On final fail, persist to `notifier_dead_letter` with full payload; operator can replay.
dedup: Event + `trace_id` tuple deduped for 10 minutes to prevent retries from producing double-delivered duplicates when
  the worker crashes mid-attempt.
rate_limiting: 'Per-target token bucket: default 10 req/sec. Targets with lower limits (Slack Incoming Webhook = 1/sec per
  channel) configured via `notifier_targets` table.'
observability: Emit metrics `notifier.event.{event}.count`, `notifier.target.{host}.latency_ms`, `notifier.dead_letter.count`.
  Alert when dead-letter count >0 over 5-min window.
related_artifacts:
- '`ex_webhook_manager.md` -- inbound counterpart.'
- '`ex_workflow_multi_marketplace_sync.md` -- a notifier consumer.'
