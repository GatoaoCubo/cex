- 'Minimum sample size: {{N}} per variant'
segmentation:
- 'Include: {{USER_SEGMENTS_OR_NUCLEI}}'
- 'Exclude: {{EXCLUSION_RULES}}'
- 'Randomization unit: {{user_id / request_id / session_id}}'
