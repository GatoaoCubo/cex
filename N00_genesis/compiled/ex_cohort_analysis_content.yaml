id: ex_cohort_analysis_content
kind: cohort_analysis
pillar: P11
version: 1.0.0
title: Cohort Analysis -- Content-Driven Customer Acquisition
description: Cohort analysis framework for D2C ecommerce brands using content as primary acquisition channel. Segments customers
  by acquisition source, measures LTV, retention, and content-to-purchase attribution by cohort.
domain: analytics
nucleus: N06
quality: null
tags:
- cohort-analysis
- content
- d2c
- ltv
- retention
- acquisition
- ecommerce
brand_placeholders:
- BRAND_NAME
- BRAND_DOMAIN
- BRAND_VERTICAL
- BRAND_AOV
- BRAND_UTM_SOURCE
- BRAND_GA4_ID
density_score: 1.0
1_cohort_definitions: ''
1_1_acquisition_source_cohorts: '| Cohort ID | Definition | UTM tag |

  |-----------|-----------|---------|

  | C_ORGANIC | Direct / typed URL | utm_source=direct |

  | C_INSTAGRAM | Instagram referral | utm_source=instagram |

  | C_BLOG | Blog post referral | utm_source=blog |

  | C_EMAIL | Email campaign | utm_source=email |

  | C_PAID | Paid ads | utm_source=paid |

  | C_AFFILIATE | Affiliate / partner link | utm_source=affiliate |

  | C_B2B | B2B channel | utm_source=b2b |'
1_2_temporal_cohorts: 'Group customers by first-purchase month:


  Cohort: [YYYY-MM]

  Members: all customers whose first order was in that month

  Observation window: 12 months from first purchase


  ---'
2_key_metrics_per_cohort: '| Metric | Formula | Why it matters |

  |--------|---------|---------------|

  | Cohort size | count(customers) | Volume signal |

  | Avg order value at acquisition | sum(first_order_value) / cohort_size | Quality signal |

  | M1 retention rate | customers who ordered in M+1 / cohort_size | Stickiness |

  | M3 retention rate | customers who ordered in M+3 / cohort_size | Long-term signal |

  | M6 LTV | sum(all_orders_within_6mo) / cohort_size | Revenue signal |

  | M12 LTV | sum(all_orders_within_12mo) / cohort_size | Full LTV signal |

  | AOV trend | avg order value over 12 months | Upsell signal |

  | Churn month | month where retention drops below 10% | Lifecycle stage |


  ---'
3_content_attribution_model: ''
3_1_attribution_rules: "Last-click: UTM source on checkout page\nFirst-click: first session UTM source (stored in user profile)\n\
  Multi-touch: weighted across sessions\n  - First touch: 30%\n  - Middle touches: 40% (shared equally)\n  - Last touch: 30%\n\
  \nRecommended model for content brands: First-touch dominant (40/30/30),\nbecause content creates the initial relationship;\
  \ last-click often gives credit\nto retargeting ads that merely closed content-originated leads."
3_2_utm_convention: 'utm_source={{BRAND_UTM_SOURCE}}        # channel: instagram, blog, email

  utm_medium=social|organic|email|paid

  utm_campaign={pillar}_{YYYY-MM}        # e.g. educational_2026-04

  utm_content={post_id}                  # optional, post-level tracking'
3_3_ga4_event_tracking: '| Event | Trigger | Parameters |

  |-------|---------|-----------|

  | `content_view` | Blog post view | post_id, pillar, utm_source |

  | `product_click` | Product link in content | product_id, source_content |

  | `add_to_cart` | Cart action | product_id, source, value |

  | `purchase` | Checkout complete | order_id, value, source, content_id |


  ---'
4_cohort_analysis_sql_template: "-- Replace {{BRAND_CRM_TABLE_PREFIX}} with your prefix\n-- Monthly cohort retention\n\nWITH\
  \ cohorts AS (\n  SELECT\n    customer_id,\n    DATE_TRUNC('month', MIN(created_at)) AS cohort_month,\n    utm_source AS\
  \ acquisition_source\n  FROM {{BRAND_CRM_TABLE_PREFIX}}_orders\n  GROUP BY customer_id, utm_source\n),\norders_with_cohort\
  \ AS (\n  SELECT\n    o.customer_id,\n    c.cohort_month,\n    c.acquisition_source,\n    DATE_TRUNC('month', o.created_at)\
  \ AS order_month,\n    o.total_amount\n  FROM {{BRAND_CRM_TABLE_PREFIX}}_orders o\n  JOIN cohorts c ON o.customer_id = c.customer_id\n\
  )\nSELECT\n  cohort_month,\n  acquisition_source,\n  order_month,\n  COUNT(DISTINCT customer_id) AS active_customers,\n\
  \  ROUND(AVG(total_amount), 2) AS avg_order_value,\n  SUM(total_amount) AS cohort_revenue\nFROM orders_with_cohort\nGROUP\
  \ BY 1, 2, 3\nORDER BY 1, 2, 3;\n\n---"
5_benchmark_targets_example_ranges: '> Adjust for your vertical `{{BRAND_VERTICAL}}` and market.


  | Metric | Example range | Target |

  |--------|--------------|--------|

  | M1 retention (blog cohort) | 20-35% | (your data) |

  | M1 retention (paid ads cohort) | 12-20% | (your data) |

  | Blog cohort AOV vs average | +10-25% premium | (your data) |

  | M12 LTV / CAC ratio | >3x | (your data) |

  | Content cohort payback period | 2-4 months | (your data) |


  ---'
6_dashboard_views: '| View | Chart type | Axis |

  |------|-----------|------|

  | Retention heatmap | Grid heatmap | Rows=cohort_month, Cols=months_since_first_order |

  | LTV by acquisition source | Bar chart | X=source, Y=M12 LTV |

  | Cohort AOV trend | Line chart | X=months, Y=avg_order_value, Lines=acquisition_source |

  | Content vs paid LTV delta | Side-by-side bar | Compares organic/content vs paid cohorts |


  ---'
new_brand_variables:
- '`BRAND_UTM_SOURCE` -- primary UTM source used in content links'
- '`BRAND_GA4_ID` -- Google Analytics 4 measurement ID (G-XXXXXXXX)'
- '`BRAND_AOV` -- current average order value (used as baseline)'
