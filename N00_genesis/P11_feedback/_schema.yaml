pillar: P11
name: Feedback
description: HOW to improve
kinds:
  quality_gate:
    description: Quality barrier (pass/fail with score)
    boundary: Quality barrier with numeric score. NOT validator (P06, technical pass/fail) nor scoring_rubric (P07,
      defines criteria).
    layer: governance
    core: true
    machine_format: yaml
    naming: p11_qg_{{gate}}.yaml
    constraints:
      max_bytes: 4096
    llm_function: GOVERN
  bugloop:
    description: Automatic correction loop (detect > fix > verify)
    boundary: Automatic detect>fix>verify loop. NOT unit_eval (P07, manual test) nor optimizer (continuous improvement, not
      correction).
    layer: governance
    core: false
    machine_format: yaml
    naming: p11_bl_{{scope}}.md + .yaml
    constraints:
      max_bytes: 4096
    llm_function: GOVERN
  lifecycle_rule:
    description: Lifecycle rule (freshness, archive, promote)
    boundary: Declarative lifecycle rule. NOT hook (P04, executable code) nor runtime_rule (P09, technical).
    layer: governance
    core: true
    machine_format: yaml
    naming: p11_lc_{{rule}}.yaml
    constraints:
      max_bytes: 4096
    llm_function: GOVERN
  guardrail:
    description: Safety restriction (safety boundary)
    boundary: Safety restriction and safety boundary. NOT permission (P09, access) nor law (P08, operational).
    layer: governance
    core: true
    machine_format: yaml
    naming: p11_gr_{{scope}}.yaml
    constraints:
      max_bytes: 4096
    llm_function: CONSTRAIN
  optimizer:
    description: Process optimizer (metric > action)
    boundary: Process optimizer metric>action. NOT bugloop (correction pointwise) nor benchmark (P07, passive measurement).
    layer: governance
    core: false
    machine_format: yaml
    naming: p11_opt_{{target}}.md + .yaml
    constraints:
      max_bytes: 4096
    llm_function: GOVERN
  reward_signal:
    description: Continuous quality signal
    boundary: Score. NOT quality_gate.
    layer: runtime
    core: true
    machine_format: yaml
    naming: p11_reward.md
    constraints:
      max_bytes: 2048
    frontmatter_required:
    - id
    - name
    - signal_type
    - scale
    - model
    llm_function: GOVERN
