author: knowledge_agent
quality: 9.0
tags:
- optimizer
- pool
- density
- quality
- feedback
tldr: 'Pool density optimizer: detect low-density artifacts (< 0.8), identify anti-patterns, trigger targeted rewrites to
  reach >= 0.85'
max_bytes: 1024
density_score: 0.88
source: organization-core/records/framework/docs/LAWS_v3_PRACTICAL.md + CEX 5D rubric
linked_artifacts:
  rubric: p07_sr_5d_scoring
  gate: p11_qg_cex_quality
metric: "density_score:\n  target: >= 0.85\n  minimum: >= 0.80 (pool eligible)\n  golden: >= 0.90\n  definition: \"information_per_token\
  \ = unique_facts / total_tokens\""
detection_low_density_signals: '| Signal | Pattern | Penalty |

  |--------|---------|---------|

  | Restatement opening | First paragraph = title rephrased | -0.10 D1 |

  | Empty sections | H2 with single `TBD` or `See above` | -0.15 D1 |

  | Filler phrases | "As we can see", "It''s important to note" | -0.05 per instance |

  | Duplicate bullets | Same fact stated 2+ times in different words | -0.10 D1 |

  | Over-explaining obvious | "Note: YAML uses indentation" in expert doc | -0.05 D1 |'
optimization_cycle: "1. MEASURE:  Grep for anti-patterns → calculate density_score\n2. IDENTIFY: Find top 3 density killers\
  \ in artifact\n3. REWRITE:  Apply targeted edits (not full rewrite):\n             - Remove restatement opening\n      \
  \       - Compress duplicate bullets into 1\n             - Delete filler phrases\n             - Replace vague sections\
  \ with concrete examples\n4. VALIDATE: Recalculate density_score → must improve >= 0.05\n5. GATE:     If >= 0.85 → pool\
  \ write. If < 0.80 → repeat cycle."
anti_pattern_fixes: '# BEFORE (density: 0.71)

  Scout Before Create is a very important principle in organization.

  It means that before you create anything new, you should first

  look to see if something similar already exists in the pool.

  This is because creating duplicates wastes time.


  # AFTER (density: 0.90)

  Before any Write: Glob/Grep pool first.

  >= 60% similarity → adapt existing. < 60% → build new.

  Duplicates cause brain search conflicts and wasted 20-40min builds.'
automation_hook: "# Pre-pool-write hook (records/core/python/density_checker.py)\nscore = calculate_density(artifact_text)\n\
  if score < 0.80:\n    raise QualityGateError(f\"density {score:.2f} < 0.80 — optimize before pooling\")"
