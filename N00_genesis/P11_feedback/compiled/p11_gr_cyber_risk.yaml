id: p11_gr_cyber_risk
kind: guardrail
pillar: P11
title: 'Guardrail: Cybersecurity Risk Assessment'
version: 1.0.0
quality: 9.1
severity: high
enforcement: block
tags:
- guardrail
- security
- cyber
- risk
- owasp
tldr: Safety guardrail for detecting and preventing cybersecurity risks in generated code and configurations. Covers OWASP
  Top 10, injection, and secret exposure.
domain: feedback
author: n03_builder
created: '2026-04-12'
updated: '2026-04-12'
density_score: 0.93
scope: Applies to all generated code (.py, .ps1, .sh, .js, .ts) and configuration files (.yaml, .json, .env, .toml) produced
  by any nucleus.
owasp_top_10_checks: '| Risk | Check | Action on Detect |

  |------|-------|-----------------|

  | A01 Broken Access Control | Hardcoded roles, missing auth checks | BLOCK |

  | A02 Cryptographic Failures | Weak hashing, plaintext secrets | BLOCK |

  | A03 Injection | SQL concat, shell interpolation, eval() | BLOCK |

  | A04 Insecure Design | Missing input validation at boundaries | WARN |

  | A05 Security Misconfiguration | Debug mode in prod, default creds | BLOCK |

  | A06 Vulnerable Components | Known CVE in dependencies | WARN |

  | A07 Auth Failures | Weak password rules, missing MFA hooks | WARN |

  | A08 Data Integrity | Unsigned updates, untrusted deserialization | BLOCK |

  | A09 Logging Failures | Secrets in logs, missing audit trail | WARN |

  | A10 SSRF | Unvalidated URL construction | BLOCK |'
secret_exposure_rules: 'NEVER include in generated code or committed files:

  - API keys, tokens, passwords (use env vars or secret_config)

  - Private keys or certificates

  - Database connection strings with credentials

  - OAuth client secrets'
code_generation_rules:
- Parameterize all SQL queries (no string concatenation)
- Sanitize all user input before rendering (HTML escape, etc.)
- Use subprocess with list args, never shell=True with user input
- Validate file paths to prevent directory traversal
- Set appropriate CORS, CSP, and security headers
- Use HTTPS for all external API calls
