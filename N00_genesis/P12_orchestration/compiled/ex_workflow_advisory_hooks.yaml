id: p12_wf_advisory_hooks
kind: workflow
pillar: P12
title: 'Workflow: 5 Advisory Hooks (Context Injection)'
version: 1.0.0
created: 2026-03-24
updated: 2026-03-24
author: builder_agent
quality: 9.0
tags:
- hooks
- advisory
- orchestration
- workflow
- context-injection
tldr: '5 advisory hook types that inject context without blocking: statusline, context-monitor, workflow-guard, prompt-guard,
  check-update. All exit 0 always.'
density_score: 0.93
overview: '| Property | Value |

  |----------|-------|

  | Trigger | Hook events (PreToolUse, PostToolUse, UserPromptSubmit, Stop) |

  | Input | stdin JSON from hook system |

  | Output | additionalContext string injected into conversation |

  | Timeout | Per-hook (3-10s); universal timeout-guard wraps all |'
universal_pattern: 'timeout-guard (Ns) → read stdin JSON → compute advisory → inject context → exit 0


  Advisory hooks NEVER block execution. Always exit 0.'
steps: ''
hook_1_statusline_posttooluse_3s: 'Update terminal status bar: agent_group state, progress, token usage. Output: display string,
  no additionalContext. Value: LOW (cosmetic).'
hook_2_context_monitor_posttooluse_5s_debounced_every_5_calls: 'Track context window usage, warn when running low.

  - `>35%` remaining: silent

  - `<=35%`: `[WARN] Context at 32% — consider committing`

  - `<=25%`: `[CRITICAL] Context at 18% — commit NOW and signal`

  Value: HIGH — prevents lost work from context overflow.'
hook_3_workflow_guard_pretooluse_3s: 'Validate tool calls against scope fence (paths in handoff). Output: warning if tool
  targets path outside scope. Value: MEDIUM.'
hook_4_prompt_guard_userpromptsubmit_5s: 'Scan handoff content for injection patterns, validate plan structure. Output: warning
  if suspicious patterns detected. Value: MEDIUM.'
hook_5_check_update_notification_10s: 'Check for queued handoffs, config changes, system updates. Output: advisory about available
  work. Value: LOW.'
error_handling:
- ALL hooks exit 0 regardless of internal errors
- Errors logged to `.claude/logs/hooks/`
- Timeout-guard kills hung hooks silently
- No hook adds > 200ms to tool call latency (p95)
success_criteria:
- All 5 hooks exit 0 consistently in production
- Context monitor triggers at <=35% threshold
- Workflow guard catches 100% out-of-scope Write/Edit calls
- Total hook overhead < 200ms per tool call (p95)
