id: p12_spawn_grid_continuous
kind: spawn_config
pillar: P12
title: 'Spawn Config: Grid Continuous Mode'
version: 1.0.0
created: 2026-03-22
updated: 2026-03-22
author: knowledge_agent
quality: 9.1
tags:
- spawn
- config
- grid
- continuous
- orchestration
tldr: 'Continuous grid spawn: auto-fill slots on completion, 3 max concurrent, 5s delay, handoffs named batch_{N}_{sat}.md'
max_bytes: 1024
density_score: 0.89
source: organization-core/records/agent_groups/stella/mental_model.yaml + records/skills/continuous_batching/SKILL.md
linked_artifacts:
  pattern: p08_pat_continuous_batching
  workflow: p12_wf_stella_dispatch
domain: orchestration
configuration: "spawn_config:\n  mode: continuous\n  script: spawn_grid.ps1\n  trigger: \"handoffs_count > available_slots\
  \ (auto-detected)\"\n\n  slots:\n    max_concurrent: 3    # hard limit — BSOD at 4\n    spawn_delay: 5s      # between terminal\
  \ opens (RAM stability)\n\n  flags:\n    interactive: true    # keeps terminal open (-k flag in TSP)\n    skip_permissions:\
  \ true  # --dangerously-skip-permissions\n    no_chrome: true         # --no-chrome\n\n  handoff_pattern: \"{MISSION}batch{N}_{SAT}.md\"\
  \n  signal_pattern: \".claude/signals/{sat}complete{timestamp}.json\""
invocation: "# Standard continuous grid:\npowershell -NoProfile -ExecutionPolicy Bypass `\n  -File records/framework/powershell/spawn_grid.ps1\
  \ `\n  -mission CEX7 `\n  -mode continuous `\n  -interactive\n\n# Auto-detect (preferred — grid decides static vs continuous):\n\
  powershell -NoProfile -ExecutionPolicy Bypass `\n  -File records/framework/powershell/spawn_grid.ps1 `\n  -mission CEX7\
  \ `\n  -interactive"
slot_lifecycle: "[IDLE] → spawn handoff → [RUNNING] → signal complete → [IDLE] → spawn next handoff\n                    \
  \                                          ↑\n                                            monitor detects signal file →\
  \ assigns next"
monitor_commands: '# Check how many signals received:

  find .claude/signals -name "complete.json" | wc -l


  # Watch live (spawn_monitor.ps1):

  powershell -File records/framework/powershell/spawn_monitor.ps1


  # Stop all:

  powershell -File records/framework/powershell/spawn_stop.ps1'
handoff_queue_example_cex7_10_knowledge_agent_tasks: ".claude/handoffs/\n  CEX7_batch_1_pytha.md   # spawned immediately (slot\
  \ 1)\n  CEX7_batch_2_pytha.md   # spawned when slot 1 completes\n  CEX7_batch_3_pytha.md   # spawned when slot 1 completes\
  \ again\n  ...\n  CEX7_batch_10_pytha.md  # final batch"
measured_results:
- 'ISOFIX mission: 7 batches, 1 slot → 1.6x speedup vs static waves'
- 'CBTEST: 3 mixed agent_groups (research_agent+builder_agent+knowledge_agent) → zero git lock contention'
