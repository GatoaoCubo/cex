density_score: 1.0
tl_dr: Checkpoint captura o estado exato do pipeline `rag_ingest` apos completar step 3 (embedding generation). Com 847 documentos
  processados com sucesso e 3 falhas, o checkpoint permite retomar do step 4 (index_update) sem reprocessar os 847 embeddings
  ja gerados.
conceito_central: 'Um checkpoint e um snapshot imutavel do estado de um workflow em um ponto especifico. Diferente de signal
  (evento simples "completei"), checkpoint captura TUDO necessario para retomar: contadores, filas parciais, arquivos intermediarios,
  e estado de erro. O campo `resumable: true` indica que o pipeline pode continuar do checkpoint. Pipelines com `resumable:
  false` exigem re-execucao completa (ex: operacoes transacionais).'
pipeline_rag_ingest_5_steps: 'Step 1: CRAWL      -> Coletar documentos de sources

  Step 2: PARSE      -> Extrair texto + metadata

  Step 3: EMBED      -> Gerar embeddings (Ollama nomic-embed-text)  <-- CHECKPOINT AQUI

  Step 4: INDEX      -> Atualizar FAISS index

  Step 5: VALIDATE   -> Verificar retrieval accuracy'
checkpoint_state: "checkpoint:\n  id: p12_ckpt_rag_pipeline_step3\n  workflow_ref: rag_ingest_pipeline\n  step: \"3_embed\"\
  \n  created_at: \"2026-03-29T03:47:22Z\"\n  resumable: true\n\n  state:\n    docs_processed: 847\n    docs_failed: 3\n \
  \   docs_total: 850\n\n    failed_docs:\n      - id: \"KC_research_agent_042\"\n        error: \"OllamaConnectionError:\
  \ timeout after 30s\"\n        retries: 3\n      - id: \"KC_knowledge_agent_089\"\n        error: \"TokenLimitExceeded:\
  \ 32768 > 8192 max_tokens\"\n        retries: 1\n      - id: \"KC_marketing_agent_BROKEN\"\n        error: \"UTF8DecodeError:\
