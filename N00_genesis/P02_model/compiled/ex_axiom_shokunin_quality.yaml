density_score: 0.92
title: Axiom Shokunin Quality
rule_statement: No artifact enters the pool with quality score below 7.0 — the Shokunin quality floor is non-negotiable.
examples:
- Agent artifact scores 8.5 on SOFT gates, all HARD gates pass -> admitted to pool
- Knowledge card scores 9.6 -> admitted as Golden reference, used for few-shot examples
violations:
- Manual pool insertion bypassing quality gate
- 'Impact: unreliable artifacts pollute search results, agents consume bad context'
- 'Resolution: remove artifact, run gate retroactively, re-admit only if >= 7.0'
