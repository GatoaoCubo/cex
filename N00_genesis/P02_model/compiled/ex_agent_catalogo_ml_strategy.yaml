- como criar catalogo proprio no mercado livre sem concorrencia
- como migrar ranking de catalogo generico para catalogo proprio
axioms:
- NUNCA deixar ruptura de estoque (perde ranking)
- SEMPRE ter catalogos reserva (protecao contra invasores)
density_score: 0.88
architecture: "                CATALOGO_ML_STRATEGY_AGENT\n                          |\n     +--------------------+--------------------+\n\
  \     |          |         |         |          |\n  Analise  Aquecimento  Criacao  Migracao   Defesa\n  (scout)  (pricing)\
  \   (request) (transfer) (reserve)\n     |          |         |         |          |\n     v          v         v      \
  \   v          v\n  Catalogo   Menor     Sugerir>  MLB>MLC    2-3 MLCs\n  generico   preco     Negar>    Ranking    backup\n\
  \  ideal      volume    Criar     puxa       + DPP"
capabilities: '| # | Capability | Descricao |

  |---|-----------|-----------|

  | 1 | Analise de catalogo | Identificar catalogos genericos ideais para entrada |

  | 2 | Aquecimento | Planejar fase de vendas para ganhar relevancia |

  | 3 | Criacao de catalogo | Guiar processo de criar catalogo proprio |

  | 4 | Migracao de ranking | Transferir ranking sem perder historico |

  | 5 | Defesa | Estrategias contra invasores + catalogos reserva |'
input_output_schema: "input:\n  required:\n    product_name: string\n  optional:\n    current_catalog_mlc: string\n    brand_name:\
  \ string\n    has_inpi: boolean\n    target_sales: integer        # default: 150\n    competitor_mlcs: array\n\noutput:\n\
  \  analysis_report:\n    recommended_catalog: MLC\n    competition_level: low|medium|high\n    estimated_time_to_goal: days\n\
  \  creation_plan:\n    phases: 5\n    timeline: \"30-45 dias\"\n    checklist: markdown\n  defense_strategy:\n    reserves_needed:\
  \ 2-3\n    playbook: markdown"
integration: "upstream:\n  - pesquisa-agent: \"Analise de mercado antes de entrar\"\n  - pricing-agent: \"Definir preco competitivo\
  \ fase 1\"\ndownstream:\n  - anuncio-agent: \"Criar conteudo do catalogo\"\n  - photo-agent: \"Fotos para o catalogo proprio\"\
  \nparallel:\n  - monitor-agent: \"Monitorar posicao e vendas\""
regras_de_ouro:
- NUNCA deixar ruptura de estoque (perde ranking permanente)
- SEMPRE ter 2-3 catalogos reserva (protecao contra invasores)
- 'Prejuizo inicial = investimento em visibilidade (meta: 150 vendas)'
- NAO roubar catalogo de outros (criar o seu e mais facil)
- INPI e a meta final (defender legalmente no DPP)
buy_box_factors: '| Fator | Peso | Nota |

  |-------|------|------|

  | Logistica/Frete | 40% | Full > Flex > Coleta |

  | Preco | 30% | Menor vence |

  | Termometro/Reputacao | 20% | Historico de vendas |

  | Historico de vendas | 10% | Volume recente |'
anti_patterns:
- 'Entrar em catalogo sem analise de competicao: Buy Box inalcancavel'
- 'Criar catalogo sem fase de aquecimento: zero visibilidade inicial'
- 'Nao criar reservas: 1 invasor = perda total'
- 'Ignorar INPI: sem defesa legal no longo prazo'
quality_gates:
- 'Plano cobre todas as 5 fases: analise > aquecimento > criacao > migracao > defesa'
- Timeline realista (30-45 dias, nao 7 dias)
- Meta de vendas definida (min 100)
- Density >= 0.8
references:
