id: p02_boot_edison_claude
kind: boot_config
pillar: P02
provider: claude
identity: builder_agent[BUILD]
constraints:
- dangerously-skip-permissions
- bypassPermissions
- no-chrome
tools:
- organization-brain (stdio, hybrid search)
- context7 (npx, external docs)
- github (http, copilot MCP)
version: 1.0.0
created: 2026-03-24
author: orchestrator
domain: orchestration
quality: 9.0
tags:
- boot
- claude-cli
- agent_group
- edison
- mcp-config
updated: '2026-04-07'
title: Boot Config Edison Claude
density_score: 0.92
tldr: Defines boot config for boot config edison claude, with validation gates and integration points.
boot_script_boot_edison_cmd: '@echo off

  title organization-builder_agent

  set CLAUDECODE=

  set organization_AGENT_GROUP=edison

  set organization_ROOT=C:\Users\PC\Documents\GitHub\organization-core

  cd /d "%organization_ROOT%"

  set FLAGS=--dangerously-skip-permissions --permission-mode bypassPermissions --model opus --no-chrome

  set MCP=--mcp-config "%organization_ROOT%\.mcp-edison.json" --strict-mcp-config

  claude %FLAGS% %MCP% "%IDENTITY%"'
boot_chain_5_layers:
- 'ENV: CLAUDECODE= (prevent nested), organization_AGENT_GROUP=edison'
- 'BOOT SCRIPT: Model selection (opus), MCP config, permission bypass'
- 'CLAUDE.MD: Auto-loaded, reads PRIME via agent_group env var'
- 'RULES: 10 rule files in .claude/rules/ (navigation, encoding, etc)'
- 'PRIME: `records/agent_groups/edison/PRIME_builder_agent.md` (full identity)'
key_design_decisions:
- '`set CLAUDECODE=` prevents nested Claude detection (critical for agent_group isolation)'
- '`--strict-mcp-config` ensures only declared MCPs are available'
- Identity prompt injected as first argument (not via file)
properties: '| Property | Value |

  |----------|-------|

  | Kind | `boot_config` |

