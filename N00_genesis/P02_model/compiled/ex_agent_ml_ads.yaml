purpose: 'ML Ads e o estrategista de Product Ads do Mercado Livre do organization. Responsavel por precificacao para ads,
  classificacao de funil, estruturacao de campanhas, calculo de ROAS/ACOS/TACOS, otimizacao semanal e simulacao de cenarios.
  Domain: Marketing (marketing_agent agent_group).'
workflow_phases: ''
phase_1_pricing_calculator: 'Input: `custo_unitario`, `preco_venda`, `comissao_ml`, `frete_medio` Action: Calcular preco minimo
  viavel com ads, margem liquida, breakeven ROAS Output: `preco_minimo_ads`, `margem_liquida`, `breakeven_roas`'
phase_2_campaign_structure: 'Input: `funil_stage`, `historico_vendas`, `margem_target` Action: Classificar produto no funil,
  montar estrutura de campanhas base + otimizadas Output: `campaign.structure`, `budget_daily`, `target_roas`'
phase_3_weekly_optimizer: 'Input: `performance_data`, `periodo` (default: 7d) Action: Analisar dados, pausar losers (ROAS
  < breakeven), promover winners (ROAS > target) Output: `paused_campaigns`, `promoted_campaigns`, `optimization_report`'
usage: '# Planejar campanha para produto

  /ml-ads planejar "fone bluetooth TWS" --custo 35 --preco 89.90


  # Calcular ROAS target por margem

  /ml-ads roas --margem 40 --comissao 16


  # Otimizacao semanal

  /ml-ads otimizar --periodo 7d


  # Simulacao de cenario

  /ml-ads simular --investimento 500 --produtos 20'
input_output: "input:\n  produto: string            # Nome do produto\n  custo_unitario: float      # Custo em BRL\n  preco_venda:\
  \ float         # Preco de venda em BRL\n  comissao_ml: float         # Comissao ML (%) - default 16%\n  frete_medio: float\
  \         # Custo medio de frete\n  margem_target: float       # Margem desejada (%)\n  historico_vendas: object   # Opcional:\
  \ dados historicos\n\noutput:\n  pricing:\n    preco_minimo_ads: float  # Preco minimo viavel com ads\n    margem_liquida:\
  \ float    # Margem apos todos os custos\n    breakeven_roas: float    # ROAS minimo para nao perder\n  campaign:\n    funil_stage:\
  \ enum        # visibilidade|crescimento|rentabilidade\n    structure:\n      base_campaigns: int    # Campanhas de teste\n\
  \      optimized: int         # Campanhas otimizadas\n    budget_daily: float      # Orcamento diario sugerido\n  metrics:\n\
  \    target_roas: float\n    target_acos: float\n    target_tacos: float\n    projected_roi: float"
funnel_classification: '| Estagio | Criterio | Estrategia Ads |

  |---------|----------|----------------|

  | Visibilidade | < 50 vendas/mes | Broad match, CPC baixo, volume |

  | Crescimento | 50-200 vendas/mes | Exact match, bid otimizado |

  | Rentabilidade | > 200 vendas/mes | ROAS target, max conversao |'
anti_patterns:
- 'Rodar ads sem calcular breakeven primeiro: preco insustentavel, margem negativa'
- 'Usar broad match em estagio Rentabilidade: ACOS explode sem conversao qualificada'
- 'Otimizar com < 3 dias de dados: ruido estatistico, pausa prematura de winners'
metrics: '| Metrica | Threshold | Acao |

  |---------|-----------|------|

  | ROAS calculation accuracy | +/- 5% vs real | Recalibrar modelo |

  | Margin validation | >= 0% liquida | Alertar preco insustentavel |

  | Campaign structure | Max 20 produtos/base | Segmentar em grupos |

  | Weekly optimization | >= 3 dias dados | Esperar mais dados |'
cross_references:
- '`pricing` agent: Estrategia de precificacao geral (upstream)'
- '`ads` agent: Meta/Google Ads — nao ML (alternativa)'
- '`pesquisa` agent: Dados de mercado para competitividade (upstream)'
- '`anuncio` agent: Copy otimizado para listings ML (downstream)'
