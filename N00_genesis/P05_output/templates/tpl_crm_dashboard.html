<!DOCTYPE html>
<html lang="{{BRAND_LANGUAGE | default: 'en'}}" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{BRAND_NAME}} — CRM Dashboard | {{REGION}}</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
    /* Brand Colors — fill from brand_config.yaml */
    --brand-primary: {{BRAND_COLORS.primary | default: '#000'}};
    --brand-secondary: {{BRAND_COLORS.secondary | default: '#1F1F1F'}};
    --brand-accent: {{BRAND_COLORS.accent | default: '#7A7A7A'}};
    --brand-bg: {{BRAND_COLORS.background | default: '#FFF'}};
    --brand-text: {{BRAND_COLORS.text | default: '#000'}};

    /* System tokens derived from brand */
    --bg: var(--brand-bg);
    --bg-side: var(--brand-secondary);
    --bg-card: var(--brand-bg);
    --bg-hover: #F5F5F5;
    --text-1: var(--brand-text);
    --text-2: var(--brand-accent);
    --border: #E5E5E5;
    --shadow: 0 1px 3px rgba(0,0,0,.06);
    --r: 12px;
    --font: 'Inter', -apple-system, sans-serif;

    /* Status colors (universal) */
    --green: #16A34A; --green-bg: #F0FDF4;
    --orange: #EA580C; --orange-bg: #FFF7ED;
    --blue: #2563EB; --blue-bg: #EFF6FF;
    --red: #DC2626; --red-bg: #FEF2F2;
    --purple: #7C3AED; --purple-bg: #F5F3FF;
}

[data-theme="dark"] {
    --bg: #0A0A0A;
    --bg-side: #111;
    --bg-card: #1F1F1F;
    --bg-hover: #2A2A2A;
    --text-1: #FFF;
    --text-2: #999;
    --border: #333;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text-1); }

.app { display: flex; min-height: 100vh; }

/* Sidebar */
.sidebar {
    width: 260px; background: var(--bg-side);
    border-right: 1px solid var(--border);
    position: fixed; top: 0; bottom: 0; z-index: 100;
    display: flex; flex-direction: column;
}
.sb-brand { padding: 20px; border-bottom: 1px solid rgba(255,255,255,.08); }
.sb-brand h1 { font-size: 1.4rem; font-weight: 800; color: #fff; }
.sb-brand .tag { display: block; font-size: .65rem; color: #999; text-transform: uppercase; margin-top: 4px; }

/* Main content */
.main { margin-left: 260px; flex: 1; }
.content { padding: 24px 28px; }

/* KPI row */
.kpi-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 20px; }
.kpi { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r); padding: 16px; }
.kpi .label { font-size: .72rem; color: var(--text-2); margin-bottom: 4px; }
.kpi .val { font-size: 1.4rem; font-weight: 700; }

/* Table */
.table-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
table { width: 100%; border-collapse: collapse; font-size: .82rem; }
thead th { padding: 10px 14px; text-align: left; font-size: .7rem; font-weight: 600; color: var(--text-2); text-transform: uppercase; border-bottom: 1px solid var(--border); }
tbody td { padding: 10px 14px; border-bottom: 1px solid var(--border); }
tbody tr:hover { background: var(--bg-hover); cursor: pointer; }

/* Badge */
.badge { display: inline-flex; padding: 2px 8px; border-radius: 16px; font-size: .68rem; font-weight: 600; }
.b-green { color: var(--green); background: var(--green-bg); }
.b-orange { color: var(--orange); background: var(--orange-bg); }
.b-blue { color: var(--blue); background: var(--blue-bg); }

/* Map placeholder */
#map { width: 100%; height: 400px; border-radius: var(--r); margin-bottom: 20px; background: #eee; }
</style>

<!-- Leaflet CSS (for map) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

<div class="app">
  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sb-brand">
      <h1>{{BRAND_NAME}}</h1>
      <span class="tag">CRM Pipeline — {{REGION}}</span>
    </div>
    <div style="padding:16px 20px; flex:1;">
      <!-- Filter buttons rendered by JS -->
      <div id="filters"></div>
    </div>
  </nav>

  <!-- Main -->
  <div class="main">
    <div class="content">
      <!-- KPIs -->
      <div class="kpi-row">
        <div class="kpi"><div class="label">Total</div><div class="val" id="kpi-total">—</div></div>
        <div class="kpi"><div class="label">With Phone</div><div class="val" id="kpi-phone">—</div></div>
        <div class="kpi"><div class="label">With Address</div><div class="val" id="kpi-addr">—</div></div>
        <div class="kpi"><div class="label">With Web</div><div class="val" id="kpi-web">—</div></div>
        <div class="kpi"><div class="label">With Tax ID</div><div class="val" id="kpi-taxid">—</div></div>
        <div class="kpi"><div class="label">Cities</div><div class="val" id="kpi-cities">—</div></div>
      </div>

      <!-- Map -->
      <div id="map"></div>

      <!-- Contacts Table -->
      <div class="table-card">
        <div style="padding:14px 20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between;">
          <h2 style="font-size:.9rem; font-weight:600;">Contacts</h2>
          <input type="text" id="search" placeholder="Search..." style="padding:6px 12px; border:1px solid var(--border); border-radius:8px; font-size:.82rem; width:280px;">
        </div>
        <div style="overflow-x:auto; max-height:60vh; overflow-y:auto;">
          <table>
            <thead><tr>
              <th>Name</th><th>Segment</th><th>City</th>
              <th>Phone</th><th>Rating</th><th>Source</th>
            </tr></thead>
            <tbody id="table-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// === DATA INJECTION POINT ===
// Replace this with inline data or external fetch.
// brand_inject.py or _build_crm_dashboard.py fills this.
// const CRM_DATA = {{CRM_DATA_SOURCE}};

// For template preview, use empty array:
const CRM_DATA = [];

// === MAP ===
const map = L.map('map').setView([
  {{MAP_CENTER_LAT | default: '0'}},
  {{MAP_CENTER_LNG | default: '0'}}
], {{MAP_ZOOM | default: '12'}});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

CRM_DATA.forEach(d => {
  if (d.lat && d.lng) {
    L.marker([d.lat, d.lng])
      .bindPopup(`<b>${d.nome}</b><br>${d.seg}<br>${d.cid}`)
      .addTo(map);
  }
});

// === KPIs ===
document.getElementById('kpi-total').textContent = CRM_DATA.length;
document.getElementById('kpi-phone').textContent = CRM_DATA.filter(d => d.tel).length;
document.getElementById('kpi-addr').textContent = CRM_DATA.filter(d => d.end).length;
document.getElementById('kpi-web').textContent = CRM_DATA.filter(d => d.web || d.ig).length;
document.getElementById('kpi-taxid').textContent = CRM_DATA.filter(d => d.cnpj).length;
document.getElementById('kpi-cities').textContent = new Set(CRM_DATA.map(d => d.cid)).size;

// === TABLE ===
function renderTable(data) {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = data.map(d => `
    <tr>
      <td><b>${d.nome || '—'}</b></td>
      <td><span class="badge b-blue">${d.seg || '—'}</span></td>
      <td>${d.cid || '—'}</td>
      <td>${d.tel || '—'}</td>
      <td>${d.rat ? '⭐ ' + d.rat : '—'}</td>
      <td><span class="badge b-green">${d.fonte || '—'}</span></td>
    </tr>
  `).join('');
}
renderTable(CRM_DATA);

// === SEARCH ===
document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  renderTable(CRM_DATA.filter(d =>
    (d.nome || '').toLowerCase().includes(q) ||
    (d.seg || '').toLowerCase().includes(q) ||
    (d.cid || '').toLowerCase().includes(q)
  ));
});
</script>
</body>
</html>
