id: p09_path_organization_repos
kind: path_config
pillar: P09
title: 'Path Config: organization Multi-Repo System'
version: 1.0.0
created: 2026-03-22
updated: 2026-03-22
author: knowledge_agent
quality: 9.0
tags:
- path
- config
- multi-repo
- organization
tldr: Canonical paths for all 3 organization repos — organization-core (BRAIN), fresh-start (FACE), gato-cubo (BODY) — never
  commit to wrong repo
max_bytes: 512
density_score: 0.9
source: organization-core/.claude/rules/multi_repo.md + CLAUDE.md KEY PATHS
linked_artifacts:
  rule: p09_perm_multi_repo
repos: "repos:\n  organization_core:\n    alias: BRAIN\n    path: C:/Users/PC/Documents/GitHub/organization-core\n    purpose:\
  \ agents, workflows, knowledge, prompts\n    identity_file: REPO_IDENTITY.md\n\n  fresh_start:\n    alias: FACE\n    path:\
  \ C:/Users/PC/Documents/GitHub/fresh-start\n    purpose: React site, UI components, frontend\n    identity_file: REPO_IDENTITY.md\n\
  \n  gato_cubo:\n    alias: BODY\n    path: C:/Users/PC/Documents/GitHub/gato-cubo-commerce\n    purpose: e-commerce, Supabase,\
  \ Shopify, product data\n    identity_file: REPO_IDENTITY.md"
key_paths_organization_core: "key_paths:\n  agent_group_primes: records/agent_groups/{name}/PRIME_{NAME}.md\n  agents: records/agents/{name}/\n\
  \  skills: records/skills/{name}/SKILL.md\n  pool_index: records/pool/POOL_INDEX.md\n  handoffs: .claude/handoffs/\n  signals:\
  \ .claude/signals/\n  spawn_scripts: records/framework/powershell/spawn_*.ps1\n  knowledge_index: records/core/brain/mcp-organization-brain/\n\
  \  learning: records/core/learning/memory/\n  mental_models: .claude/mental_models/"
safe_git_protocol: '# BEFORE any git operation:

  pwd                     # confirm correct repo

  git remote -v           # confirm correct remote

  cat REPO_IDENTITY.md    # confirm identity


  # Wrong repo recovery (before push):

  git reset --soft HEAD~1 && git stash

  cd ../correct-repo && git stash pop'
content_routing: '| Content | ONLY in | Never in |

  |---------|---------|----------|

  | `records/agents/*.md` | organization-core | fresh-start, gato-cubo |

  | `*.tsx`, React components | fresh-start | organization-core, gato-cubo |

  | Supabase migrations | gato-cubo | organization-core, fresh-start |'
