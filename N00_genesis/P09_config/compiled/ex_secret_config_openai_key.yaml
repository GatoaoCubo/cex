id: p09_secret_openai_key
kind: secret_config
pillar: P09
name: OpenAI API Key Configuration
description: Secret management config for OpenAI API key with Vault storage, 90-day rotation, and access audit
provider: vault
rotation_policy: "rotation:\n  interval: 90d\n  method: automatic\n  steps:\n    1_generate: \"Create new key in OpenAI dashboard\
  \ API > API Keys\"\n    2_store: \"vault kv put secret/organization/prod/openai_api_key value=sk-proj-NEW\"\n    3_verify:\
  \ \"curl https://api.openai.com/v1/models -H 'Authorization: Bearer NEW'\"\n    4_deploy: \"Railway redeploy to pick up\
  \ new Vault value\"\n    5_revoke: \"Delete old key in OpenAI dashboard after 24h grace period\"\n  next_rotation: \"2026-06-27\"\
  \n  last_rotation: \"2026-03-29\"\n  alert_before: 14d  # Slack alert 14 days before expiry"
encryption: aes256
access_audit: enabled
version: 1.0.0
created: 2026-03-29
author: builder_agent
quality: 9.0
tags:
- secret
- openai
- api-key
- vault
- rotation
- encryption
overview: Configuration for managing the OpenAI API key used by organization's model router (fallback path when Anthropic
  is unavailable). Stored in HashiCorp Vault with AES-256 encryption, 90-day automatic rotation, and full access audit trail.
secret_identity: '| Field | Value |

  |-------|-------|

  | Secret name | `organization/prod/openai_api_key` |

  | Vault path | `secret/data/organization/prod/openai_api_key` |

  | Environment variable | `OPENAI_API_KEY` |

  | Provider | HashiCorp Vault (self-hosted on Railway) |

  | Encryption | AES-256-GCM at rest, TLS 1.3 in transit |

  | Format | `sk-proj-...` (56 chars) |'
access_control: '| Role | Permission | Justification |

  |------|-----------|---------------|

  | orchestrator (orchestrator) | read | Routes model requests, needs key for fallback |

  | operations_agent (deploy) | read | Injects into Railway env during deployment |

  | builder_agent (build) | none | Build agent never calls external LLMs directly |

  | research_agent (research) | read | Research may use GPT for cross-model comparison |

  | Admin (human) | read/write/rotate | Full lifecycle management |'
vault_policy: "path \"secret/data/organization/prod/openai_api_key\" {\n  capabilities = [\"read\"]\n  allowed_parameters\
  \ = {\n    \"version\" = []\n  }\n}\n\npath \"secret/metadata/organization/prod/openai_api_key\" {\n  capabilities = [\"\
  read\", \"list\"]\n}"
audit_configuration: "audit:\n  enabled: true\n  log_destination: \"vault/audit/openai_key_access.log\"\n  events_tracked:\n\
  \    - read       # Every time the secret is fetched\n    - update     # Key rotation events\n    - delete     # Revocation\
  \ events\n    - denied     # Unauthorized access attempts\n  retention: 365d\n  alert_on:\n    - denied                \
  \              # Any unauthorized access attempt\n    - read_count_exceeds: 100/hour        # Anomalous read pattern\n \
  \   - read_from_unknown_ip: true          # Access from non-Railway IPs"
environment_integration: ''
railway_production: '# Secret injected via Vault agent sidecar

  # Railway service variable references Vault path

  OPENAI_API_KEY=vault:secret/data/organization/prod/openai_api_key#value'
local_development: '# .env.local (gitignored, never committed)

  OPENAI_API_KEY=sk-proj-dev-PLACEHOLDER


  # Or fetch from Vault directly:

  export OPENAI_API_KEY=$(vault kv get -field=value secret/organization/dev/openai_api_key)'
ci_cd_github_actions: "# Stored as GitHub secret, NOT in Vault (GitHub manages its own encryption)\nenv:\n  OPENAI_API_KEY:\
  \ ${{ secrets.OPENAI_API_KEY_CI }}\n  # CI key has lower rate limits ($5/day budget cap)"
emergency_procedures: '| Scenario | Action | Time Target |

  |----------|--------|-------------|

  | Key leaked in logs | Revoke immediately in OpenAI dashboard, rotate in Vault, redeploy | < 15 min |

  | Key leaked in git commit | `git filter-branch` to remove, revoke + rotate, notify team | < 30 min |

  | Vault unavailable | Fallback to Railway env variable (manually set, temporary) | < 5 min |

  | OpenAI disables key | Generate new key, store in Vault, redeploy | < 10 min |

  | Anomalous usage spike | Freeze key via OpenAI dashboard spending limit, investigate | < 5 min |'
validation: "import os\nimport httpx\n\ndef validate_openai_key() -> dict:\n    key = os.environ.get(\"OPENAI_API_KEY\", \"\
  \")\n\n    # Format check\n    assert key.startswith(\"sk-proj-\"), \"Key must be project-scoped (sk-proj-*)\"\n    assert\
  \ len(key) >= 40, \"Key too short — possible truncation\"\n\n    # Liveness check (cheapest possible API call)\n    r =\
  \ httpx.get(\n        \"https://api.openai.com/v1/models\",\n        headers={\"Authorization\": f\"Bearer {key}\"},\n \
  \       timeout=5.0\n    )\n    assert r.status_code == 200, f\"Key validation failed: {r.status_code}\"\n\n    return {\"\
  status\": \"valid\", \"models_available\": len(r.json()[\"data\"])}"
anti_patterns:
- Storing API key in `.env` committed to git (use .env.local, gitignored)
- Sharing one key across prod/staging/dev (use separate keys per environment)
- No rotation policy (compromised keys persist indefinitely)
- 'Logging the full key value in audit (log last 4 chars only: `...xxxx`)'
- Hardcoding key in application code instead of environment variable
