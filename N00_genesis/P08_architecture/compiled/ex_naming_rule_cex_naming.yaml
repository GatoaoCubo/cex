pillar: P05
title: 'Naming Rule: CEX File System'
version: 1.0.0
created: 2026-03-22
updated: 2026-03-22
author: knowledge_agent
quality: 9.1
tags:
- naming
- cex
- convention
- lp
tldr: 'CEX file naming: p{LP}_{type}_{descriptor}.{ext} — LP number + 2-letter type code + snake_case descriptor'
max_bytes: 2048
density_score: 0.9
source: organization-core/C:/Users/PC/Documents/GitHub/cex/archetypes/MIGRATION_MAP.md + all _schema.yaml files
linked_artifacts: null
pattern: 'p{LP_NUMBER}{TYPE_CODE}{descriptor}.{ext}


  | Part | Rule | Example |

  |------|------|---------|

  | LP number | 2-digit zero-padded | `05`, `12` |

  | TYPE_CODE | 2-3 letter abbreviation from schema | `os`, `fmt`, `nr`, `gt`, `sat`, `wf` |

  | descriptor | snake_case, max 30 chars | `security_audit`, `stella_dispatch` |

  | ext | `.md` (docs) or `.yaml` (configs/schemas) | `.md`, `.yaml` |'
type_codes_by_lp: '| LP | Type | Code | Example |

  |----|------|------|---------|

  | P05 | output_schema | `os` | `p05_os_agent_report.yaml` |

  | P05 | parser | `parser` | `p05_parser_json_response.md` |

  | P05 | formatter | `fmt` | `p05_fmt_agent_markdown.md` |

  | P05 | naming_rule | `nr` | `p05_nr_cex_naming.md` |

  | P06 | input_schema | `is` | `p06_is_quality_audit.yaml` |

  | P06 | validator | `val` | `p06_val_quality_score.yaml` |

  | P06 | interface | `iface` | `p06_iface_agent_group_handoff.yaml` |

  | P07 | unit_eval | `ue` | `p07_ue_brain_query.yaml` |

  | P07 | smoke_eval | `se` | `p07_se_brain_query.md` |

  | P07 | golden_test | `gt` | `p07_gt_stripe_pipeline.md` |

  | P07 | scoring_rubric | `sr` | `p07_sr_5d_scoring.md` |

  | P08 | agent_card | `sat` | `p08_sat_edison.md` |

  | P08 | pattern | `pat` | `p08_pat_continuous_batching.md` |

  | P08 | law | `law` | `p08_law_shokunin.md` |

  | P09 | env_config | `env` | `p09_env_firecrawl.yaml` |

  | P09 | feature_flag | `ff` | `p09_ff_firecrawl_enabled.yaml` |

  | P09 | path_config | `path` | `p09_path_organization_repos.yaml` |

  | P09 | runtime_rule | `rr` | `p09_rr_agent_group_spawn.yaml` |

  | P10 | mental_model | `mm` | `p10_mm_edison.yaml` |

  | P10 | learning_record | `lr` | `p10_lr_continuous_batching.md` |

  | P10 | axiom | `ax` | `p10_ax_scout_before_create.md` |

  | P11 | quality_gate | `qg` | `p11_qg_cex_quality.yaml` |

  | P11 | guardrail | `gr` | `p11_gr_stella_dispatch.yaml` |

  | P12 | workflow | `wf` | `p12_wf_stella_dispatch.md` |

  | P12 | handoff | `ho` | `p12_ho_isofix_batch.md` |

  | P12 | dag | `dag` | `p12_dag_cex_wave_pipeline.yaml` |

  | P12 | spawn_config | `spawn` | `p12_spawn_grid_continuous.yaml` |'
constraints:
- 'Max filename length: 60 chars (excluding path)'
- No spaces — use `_` only
- No uppercase in filename
- No version suffix in filename (version goes in frontmatter)
- Extension `.yaml` for machine-readable contracts; `.md` for human-readable docs
invalid_examples: 'p5_OutputSchema_SecurityAudit.yaml   # FAILS: LP not zero-padded, CamelCase

  p05_output_schema_security_audit_v2.yaml  # FAILS: verbose type + version in name

  security_audit.md                    # FAILS: missing LP prefix'
