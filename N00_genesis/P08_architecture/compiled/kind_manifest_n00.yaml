id: n00_supervisor_manifest
kind: knowledge_card
pillar: P08 -- architecture
nucleus: n00
title: Supervisor -- Canonical Manifest
version: 1.0
quality: null
tags:
- manifest
- supervisor
- p08
- n00
- archetype
- template
purpose: 'A supervisor is a crew orchestrator that composes and coordinates multiple builders within a single crew. Unlike
  N07 which orchestrates across nuclei at the mission level, a supervisor operates within a single crew instance: it sequences
  roles, passes handoff artifacts between them, enforces the charter quality gate, and escalates failures. It is the inner-crew
  coordination layer.'
schema_key_fields: '| Field | Type | Required | Description |

  |-------|------|----------|-------------|

  | id | string | yes | Unique artifact identifier |

  | kind | string | yes | Always `supervisor` |

  | pillar | string | yes | Always `P08` |

  | title | string | yes | Human-readable supervisor name |

  | version | semver | yes | Artifact version |

  | quality | float\|null | yes | Peer-review score (null until reviewed) |

  | crew_template_ref | string | yes | Path to the crew_template this supervises |

  | process | enum | yes | sequential \| hierarchical \| consensus |

  | roles | list | yes | Ordered list of role_assignment references |

  | gate | object | yes | Charter-level quality gate |

  | gate.min_score | float | yes | Minimum output quality (default 8.0) |

  | gate.on_fail | enum | yes | retry \| escalate \| abort |

  | handoff_protocol | enum | no | a2a_task \| file \| signal |

  | max_delegation_depth | integer | no | Max sub-delegation levels in hierarchical mode |'
when_to_use:
- Instantiating a crew that requires coordinated role sequencing with handoffs
- Enforcing a quality gate on the crew output before signaling N07
- Implementing hierarchical crews where a manager role delegates to worker roles
builder: '`archetypes/builders/supervisor-builder/` Run: `python _tools/cex_8f_runner.py "your intent" --kind supervisor --execute`'
template_variables_open_for_instantiation:
- '`{{NUCLEUS_ROLE}}` -- which nucleus domain owns this'
- '`{{SIN_LENS}}` -- cultural DNA driving the artifact'
- '`{{TARGET_AUDIENCE}}` -- who this serves'
- '`{{DOMAIN_CONTEXT}}` -- business/technical context'
example_minimal: "---\nid: supervisor_product_launch\nkind: supervisor\npillar: P08\nnucleus: n02\ntitle: \"Product Launch\
  \ Crew Supervisor\"\nversion: 1.0\nquality: null\n---\ncrew_template_ref: N02_marketing/crews/p12_ct_product_launch.md\n\
  process: sequential\nroles: [research_role, copy_role, design_role, qa_role]\ngate:\n  min_score: 8.5\n  on_fail: retry\n\
  handoff_protocol: a2a_task"
related_kinds:
- '`crew_template` (P12) -- the recipe this supervisor executes'
- '`role_assignment` (P02) -- role bindings the supervisor coordinates'
- '`dual_loop_architecture` (P08) -- the supervisor is the inner loop for crew execution'
