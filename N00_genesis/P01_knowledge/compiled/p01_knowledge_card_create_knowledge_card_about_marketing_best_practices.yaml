- When to use email vs social vs search for conversion
- How to measure marketing ROI across channels
axioms:
- ALWAYS define the audience segment before writing a single word of copy
- NEVER launch a campaign without a defined conversion goal and tracking in place
- IF CAC > LTV/3, THEN pause paid spend and fix retention first
- ALWAYS test one variable at a time in A/B experiments
- NEVER use vanity metrics (impressions, likes) as primary KPIs for revenue campaigns
