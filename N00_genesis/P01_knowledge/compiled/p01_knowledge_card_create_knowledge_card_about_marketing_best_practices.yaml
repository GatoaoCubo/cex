tldr: Marketing best practices center on audience-first messaging, funnel-stage alignment, channel mix for reach/conversion,
  and continuous A/B testing to optimize CAC and LTV.
when_to_use: When building campaigns, optimizing funnels, writing copy, or selecting channels for audience acquisition and
  retention.
