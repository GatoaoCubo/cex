quick_reference: 'topic: marketing_best_practices

  scope: B2B and B2C digital marketing — funnel, copy, channels, analytics

  owner: builder_agent

  criticality: high

  frameworks: [AIDA, Jobs-to-be-Done, PAS, Pirate Metrics (AARRR)]'
key_concepts:
- 'AIDA: Attention → Interest → Desire → Action — applies to every piece of copy'
- 'JTBD (Jobs-to-be-Done): Customers hire products to solve a functional/emotional job; messaging targets the job, not the
  feature'
- 'PAS (Problem-Agitate-Solve): 3-beat copy formula; highest response rate for cold audiences'
- 'CAC (Customer Acquisition Cost): total spend / new customers; target CAC < LTV/3'
- 'LTV (Lifetime Value): avg order × purchase frequency × customer lifespan'
- 'Pirate Metrics (AARRR): Acquisition, Activation, Retention, Referral, Revenue — each stage needs its own KPI'
strategy_phases:
- 'Define: ICP (Ideal Customer Profile) → segment by pain, not demographics'
- 'Position: craft USP (Unique Selling Proposition) in one sentence; test against 3 competitor alternatives'
- 'Channel Mix: match channel to funnel stage (see Comparativo below)'
- 'Create: write copy per AIDA or PAS; include social proof + CTA on every touchpoint'
- 'Launch: allocate 70% budget to proven channels, 30% to test channels; set daily spend caps at $50–200 for testing; configure
  UTM parameters (utm_source, utm_medium, utm_campaign, utm_content); install Facebook Pixel + Google Analytics goals; set
  up conversion tracking for each funnel stage; schedule first review at day 3, then weekly; establish kill criteria (CTR
  < 0.5% paid, CVR < 1% organic after 14 days)'
- 'Measure: weekly review of CAC, CTR, conversion rate, churn; cut underperformers at day 14'
- 'Iterate: A/B test headline first, then CTA, then image; one variable per cycle'
golden_rules:
- 'SEGMENT before messaging: one message to all audiences = zero resonance'
- 'SOCIAL PROOF: include numbers (e.g., "12,000 customers", "4.8★ / 2,400 reviews")'
- 'CTA CLARITY: one CTA per page/email — two CTAs halve conversion (HubSpot, 2022)'
- 'FREQUENCY CAP: email max 2×/week for cold; SMS max 4×/month (opt-out rate spikes beyond this)'
- 'RETARGETING WINDOW: 7-day for e-commerce, 30-day for B2B SaaS consideration cycles'
flow: "Day 1-3: [ICP Research] → [Survey 50+ customers] → [Jobs-to-be-Done interview]\n  ↓ Decision: Define 1-2 primary segments\
  \ (max 3)\nDay 4-7: [Competitive Analysis] → [USP Workshop] → [Value Prop Testing]\n  ↓ Decision: Single USP that beats\
  \ 3 alternatives\nWeek 2: [Channel Matrix] → [Budget Allocation] → [Creative Brief]\n  ↓ Decision: 2-3 channels max for\
  \ launch (focus beats spread)\nWeek 3: [Copy Creation] → [Landing Page Build] → [Tracking Setup]\n  ↓ Gate: All UTM codes,\
  \ pixels, goals configured\nWeek 4: [Soft Launch] → [$50/day cap] → [Monitor CTR/CVR hourly]\n  ↓ Day 3 Review: CTR > 1%?\
  \ CVR > 0.5%? Continue or kill\nWeek 5-6: [Scale Winners] → [Kill Losers] → [A/B Test Variables]\n  ↓ Decision: Increase\
  \ budget 50% for CTR > 2%, CVR > 1%\nWeek 7-8: [Optimization] → [Retargeting Launch] → [Email Sequence]\n  ↓ Weekly Review:\
  \ CAC < LTV/3? Churn < 5%/month?\nMonth 2: [Channel Expansion] → [Lookalike Audiences] → [Referral Program]\n  ↓ Gate: Only\
  \ if Month 1 CAC payback < 90 days\nQuarterly: [LTV Analysis] → [Retention Audit] → [Channel Mix Review]"
comparativo_channel_by_funnel_stage: '| Channel | Funnel Stage | Avg CTR | Best For | CAC Range |

  |---------|-------------|---------|----------|-----------|

  | SEO / Blog | Awareness | 3–5% organic | B2B, SaaS, education | Low (months) |

  | Paid Search (Google) | Decision | 2–4% | High-intent buyers | $15–$200 |

  | Social Ads (Meta/TikTok) | Awareness/Interest | 0.9–1.5% | B2C, DTC, impulse | $5–$80 |

  | Email (own list) | Retention/Upsell | 18–25% open | Existing customers | Near zero |

  | Referral / Affiliate | Acquisition | N/A | Trust-driven niches | Rev-share |

  | LinkedIn Ads | B2B Decision | 0.4–0.6% | Enterprise, recruiting | $50–$500 |

  | Retargeting | Decision/Action | 3–7% | Cart abandonment | 40–60% lower |'
copy_patterns_by_format: '| Format | Best Formula | Max Length | Key Element |

  |--------|-------------|-----------|-------------|

  | Ad headline | PAS or benefit-first | 30–40 chars | Specific number or outcome |

  | Email subject | Curiosity gap or urgency | ≤ 50 chars | Personalization token |

  | Landing page hero | USP + benefit + CTA | 10–15 words | Single clear CTA |

  | Social post | Hook + value + CTA | ≤ 280 chars | Visual or emoji anchor |

  | SMS | Offer + urgency + link | ≤ 160 chars | Exclusive code |'
