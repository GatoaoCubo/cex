galaxia_1_aprendizado_supervisionado: 'Aprender com dados rotulados para prever um resultado. O "professor" fornece as respostas.


  Dois tipos de previsao:


  | Tipo | Objetivo | Pergunta-chave | Exemplo |

  |------|----------|---------------|---------|

  | Regressao | Prever valor numerico continuo | "Qual sera o preco?" | Preco de casa vs area (m2) |

  | Classificacao | Atribuir rotulo/classe discreta | "Spam ou nao spam?" | Email filtering |


  Algoritmos de Regressao:


  | Algoritmo | Como funciona | Superpoder |

  |-----------|--------------|------------|

  | Regressao Linear | Melhor reta entre entrada e saida. "Mae de todos os algoritmos" | Simplicidade, interpretabilidade
  |


  Algoritmos de Classificacao:


  | Algoritmo | Abordagem | Como funciona |

  |-----------|-----------|--------------|

  | Regressao Logistica | Probabilidade | Curva S para prever probabilidade de pertencer a uma classe. Ex: 80% chance de ser
  homem com 1.80m |

  | KNN | Vizinhos | Novo ponto classificado pela maioria dos K vizinhos mais proximos. Simples mas poderoso |

  | SVM | Fronteira otima | Maximiza margem entre classes. "Truque do Kernel" cria fronteiras nao-lineares complexas |

  | Decision Tree | Perguntas sim/nao | Serie de perguntas para particionar dados. Objetivo: folhas o mais puras possivel
  |


  Metodos Ensemble (coletivos):


  | Metodo | Estrategia | Como funciona |

  |--------|-----------|--------------|

  | Random Forest (Bagging) | Diversidade | Muitas arvores treinam em subconjuntos diferentes e "votam". Aleatoriedade evita
  overfitting |

  | Gradient Boosting / XGBoost (Boosting) | Correcao | Modelos treinados em sequencia. Cada novo modelo corrige erros do
  anterior |


  Redes Neurais / Deep Learning:


  Evolucao da Regressao Logistica com "camadas ocultas" entre entrada e saida. Essas camadas aprendem features complexas automaticamente
  (linhas, curvas, padroes). Muitas camadas = Deep Learning.


  Exemplo: pixels de imagem (entrada) → features ocultas abstratas → previsao digito 0-9 (saida)'
galaxia_2_aprendizado_nao_supervisionado: 'Encontrar estruturas ocultas em dados NAO rotulados. O "aluno" descobre os padroes
  sozinho.


  Dois tipos:


  | Tipo | Objetivo | Diferenca-chave |

  |------|----------|----------------|

  | Clusterizacao | Agrupar por similaridade | Voce NAO sabe as classes. Quer descobri-las |

  | Reducao de Dimensionalidade | Simplificar sem perder essencia | Menos features, mesma informacao |


  K-Means Clustering:

  - K eh hiperparametro (voce define quantos clusters quer)

  - Confusao comum: Classificacao = voce SABE as classes. Clusterizacao = voce NAO sabe


  PCA (Principal Component Analysis):

  - Encontra "direcoes" no dataset que explicam a maior variacao

  - PC1 = captura maior parte da variancia (informacao)

  - PC2 = pouca variancia (pode ser descartado)

  - Objetivo: reduzir features removendo dimensoes redundantes'
mapa_de_navegacao_scikit_learn_cheatsheet: "Fluxo de decisao para escolher algoritmo:\nDados rotulados? \n  SIM → Supervisionado\n\
  \    Prever numero? → Regressao (Linear, Ridge, Lasso)\n    Prever categoria? → Classificacao (SVM, KNN, Decision Tree,\
  \ Random Forest)\n  NAO → Nao Supervisionado\n    Agrupar? → Clustering (K-Means, DBSCAN, Hierarchical)\n    Simplificar?\
  \ → Reducao (PCA, t-SNE)"
conceitos_transversais: '| Conceito | Definicao |

  |----------|-----------|

  | Overfitting | Modelo memoriza dados de treino, falha em dados novos |

  | Underfitting | Modelo simples demais, nao captura padroes |

  | Cross-Validation | Dividir dados em folds para validacao robusta |

  | Hyperparameter Tuning | Ajustar configuracoes do modelo (K, profundidade, etc.) |

  | Model Selection | Escolher melhor algoritmo para o problema |

  | Ensemble Methods | Combinar multiplos modelos para melhor resultado |'
aplicabilidade_organization: '| Conceito ML | Uso em organization |

  |-------------|---------------|

  | Classificacao | Triage automatica de insumos (inbox → dominio) |

  | Clustering | Agrupar agents por similaridade de capabilities |

  | Regressao | Prever quality score de artefatos |

  | Decision Trees | Routing de tarefas para agent_groups |

  | PCA | Reduzir dimensionalidade de embeddings do brain |

  | Ensemble | Combinar outputs de multiplos agents (grid) |'
