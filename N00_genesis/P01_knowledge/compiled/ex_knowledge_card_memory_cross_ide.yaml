tl_dr: One HTTP worker (port 37777) handles all memory operations. Each IDE (Claude Code, Cursor, OpenClaw) connects via a
  thin adapter script that translates IDE-specific hook events into standard HTTP calls. Core logic is never duplicated —
  gaps in IDE capabilities are solved by workarounds, not forks.
conceito_central: The cross-IDE parity pattern separates memory logic (worker) from IDE integration (adapters). The worker
  exposes HTTP endpoints for context injection, session init, observation capture, and summarization. Each IDE has a thin
  adapter (bash or JS) that maps native events to these endpoints. Where an IDE lacks a capability, the adapter implements
  a workaround without touching the worker.
arquitetura_patterns: 'Hook mapping across 3 IDEs:


  | Claude Code Hook | Cursor Hook | OpenClaw Event |

  |-----------------|-------------|----------------|

  | SessionStart | (none) | sessionStart |

  | UserPromptSubmit | beforeSubmitPrompt | beforePromptBuild |

  | PostToolUse | afterMCPExecution | toolResultPersist |

  | Stop | stop | agentEnd |

  | SessionEnd | (via stop) | sessionEnd |


  Context injection per IDE:


  | IDE | Method |

  |-----|--------|

  | Claude Code | `hookSpecificOutput` JSON via stdout |

  | Cursor | `.cursor/rules/` file with alwaysApply |

  | OpenClaw | `prependContext` in plugin return value |


  Parity: Claude Code = full, Cursor = 95% (no transcript), OpenClaw = full (TypeScript SDK).


  Cursor workarounds for missing capabilities:


  | Gap | Solution |

  |-----|----------|

  | No SessionStart event | Context inject on every prompt submit |

  | No transcript access | Summarize from observations only |

  | No direct prompt injection | Write to rules file with alwaysApply |


  Cursor adds capabilities Claude Code lacks: explicit shell command capture (`afterShellExecution`) and file edit capture
  (`afterFileEdit`) as separate hook types.


  Health check is universal across all IDEs: 75 retries x 200ms = 15s timeout. Worker port 37777 shared by all adapters.'
exemplos_praticos: "// OpenClaw plugin — thin adapter to universal worker\nonBeforePromptBuild(event): BeforePromptBuildResult\
  \ {\n  const ctx = await fetch(\"http://localhost:37777/context\");\n  return { prependContext: ctx.text };\n}\n\nonToolResultPersist(event):\
  \ void {\n  fetch(\"http://localhost:37777/observe\", {\n    method: \"POST\",\n    body: JSON.stringify({\n      tool:\
  \ event.name,\n      output: event.result\n    })\n  });\n}"
anti_patterns:
- Fork worker logic per IDE (maintenance nightmare)
- Put business logic in adapter scripts (breaks parity)
- Block agent on hook failure (exit 0 is mandatory)
- Skip health check before calling worker API
- Assume all IDEs have SessionStart (Cursor does not)
