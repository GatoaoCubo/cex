tl_dr: 'Five lifecycle hooks form a complete memory pipeline: Setup checks dependencies, SessionStart injects past context,
  UserPromptSubmit initializes session records, PostToolUse captures observations, and Stop/SessionEnd triggers AI compression
  and finalization. Each hook has a single responsibility and communicates via HTTP to a background worker on port 37777.'
conceito_central: The pattern separates memory concerns across hook boundaries. Each hook fires at a specific lifecycle moment,
  does one thing, and delegates to the worker via HTTP. This prevents coupling between capture (PostToolUse) and compression
  (Stop) — expensive AI summarization runs once per session, not per tool call. Hooks are thin scripts with no business logic;
  the worker holds all state and intelligence.
arquitetura_patterns: "| Hook | Trigger | Responsibility | Matcher |\n|------|---------|---------------|---------|\n| Setup\
  \ | Pre-lifecycle | Dep check (Bun, uv, SQLite) | -- |\n| SessionStart | Session opens | Inject past memory into context\
  \ | startup/clear/compact |\n| UserPromptSubmit | Every prompt | Create session record, privacy check | * |\n| PostToolUse\
  \ | Every tool call | Capture tool name + input + output | * |\n| Stop | Agent stops | AI compression of observations |\
  \ * |\n| SessionEnd | Session closes | Finalize session record | * |\n\nHook execution flow:\n\nHook fires (IDE event)\n\
  \  -> node bun-runner.js worker-service.cjs hook {ide} {type}\n  -> Worker receives stdin JSON payload\n  -> Worker processes\
  \ (DB write / AI call / context fetch)\n  -> Worker returns JSON response to stdout\n  -> Hook exits 0 (success) / 1 (non-blocking)\
  \ / 2 (blocking)\n\nKey metrics:\n\n| Parameter | Value |\n|-----------|-------|\n| Total hooks | 5 + 1 pre-hook (Setup)\
  \ |\n| Worker port | 37777 |\n| Health check | 75 retries x 200ms = 15s |\n| Setup timeout | 300s |\n| SessionStart timeout\
  \ | 60s |\n| PostToolUse timeout | 120s |\n| Stop timeout | 120s |\n| SessionEnd timeout | 30s |\n\nExit code semantics:\
  \ 0 = success/graceful, 1 = non-blocking warning (stderr to user), 2 = blocking error (stderr to Claude). All hooks default\
  \ to exit 0 on failure to prevent terminal tab accumulation.\n\nSessionStart uses matcher `startup|clear|compact` to inject\
  \ context only on real session starts. PostToolUse and Stop use wildcard matcher to capture every event without filtering."
exemplos_praticos: '#!/bin/bash

  # Hook script — thin, no business logic

  node bun-runner.js worker-service.cjs hook claude-code PostToolUse

  exit $?


  # Worker handles the actual logic:

  # 1. Parse stdin JSON (tool_name, input, output)

  # 2. Store observation in SQLite

  # 3. Return acknowledgment JSON to stdout'
anti_patterns:
- Mix capture + compression in one hook (adds latency)
- Put business logic in hook scripts (breaks portability)
- Use filesystem for hook-worker communication (fragile)
- Run AI summarization per tool call instead of per session
- Ignore exit code semantics (1 vs 2 matters)
- Skip health check before worker calls (75x200ms pattern)
