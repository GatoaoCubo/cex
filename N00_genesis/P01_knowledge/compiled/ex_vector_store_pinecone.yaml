configuration: '| Parameter | Value | Rationale |

  |-----------|-------|-----------|

  | backend | pinecone | Fully managed, serverless, auto-scaling |

  | cloud | aws | us-east-1 region for low latency |

  | index_name | cex-knowledge | One index per environment |

  | dimensions | 1536 | Matches text-embedding-3-small |

  | metric | cosine | Standard for normalized embeddings |

  | spec | serverless | No capacity planning needed |'
namespace_strategy: '| Namespace | Content | Est. Vectors |

  |-----------|---------|-------------|

  | kc | Knowledge cards (114 kinds) | ~2,200 |

  | memory | Builder memories, observations | ~500 |

  | artifact | Built artifacts from all pillars | ~5,000 |'
performance: '| Metric | Value |

  |--------|-------|

  | Query latency (p50) | ~20ms |

  | Query latency (p99) | ~80ms |

  | Upsert throughput | 100 vectors/request |

  | Max metadata per vector | 40 KB |

  | Max vectors per namespace | 1B (serverless) |'
query_example: "from pinecone import Pinecone\npc = Pinecone(api_key=os.environ[\"PINECONE_API_KEY\"])\nindex = pc.Index(\"\
  cex-knowledge\")\n\nresults = index.query(\n    namespace=\"kc\",\n    vector=query_embedding,\n    top_k=5,\n    include_metadata=True,\n\
  \    filter={\"pillar\": {\"$eq\": \"P01\"}, \"kind\": {\"$eq\": \"knowledge_card\"}}\n)"
comparison_to_alternatives: '| Backend | Managed | Cost (1M vectors) | Latency | Local Dev |

  |---------|---------|-------------------|---------|-----------|

  | Pinecone | yes | $0.33/mo | ~20ms | no |

  | pgvector | self | $0 (infra cost) | ~5ms | yes |

  | Chroma | self | $0 | ~10ms | yes |

  | Qdrant | both | $0-25/mo | ~15ms | yes |

  | FAISS | local | $0 | ~1ms | yes |'
migration_path: "Development: FAISS (local, zero deps)\n    ↓\nStaging: Chroma (local server, persistent)\n    ↓\nProduction:\
  \ Pinecone (managed, auto-scale)"
boundary: 'vector_store IS: storage and query config for embedding vectors with indexing and similarity search. vector_store
  IS NOT: an embedder provider (vector generation), a retriever (query pipeline), or a chunk strategy.'
