id: p03_pt_creation_task
kind: prompt_template
pillar: P03
title: Creation Task Prompt Template
version: 1.0.0
created: '2026-04-02'
updated: '2026-04-02'
author: prompt-template-builder
variables:
- name: task_type
  type: string
  required: true
  default: null
  description: The specific type of artifact to create (e.g., document, software module, design spec, strategy plan)
- name: domain
  type: string
  required: true
  default: null
  description: The field or area of expertise the creation belongs to (e.g., marketing, engineering, knowledge management)
- name: deliverable_name
  type: string
  required: true
  default: null
  description: The exact name or title of the artifact being created
- name: audience
  type: string
  required: false
  default: intermediate practitioner
  description: The intended reader or consumer of the created artifact
- name: constraints
  type: list
  required: false
  default: []
  description: Hard limitations the created artifact must respect (length, format, banned terms, scope)
- name: success_criteria
  type: list
  required: false
  default: []
  description: Measurable conditions that define when the creation task is complete
- name: context
  type: string
  required: false
  default: ''
  description: Background information, prior art, or situational context the creator should incorporate
- name: output_format
  type: string
  required: false
  default: markdown
  description: The required format for the deliverable (e.g., markdown, JSON, YAML, plain text)
variable_syntax: mustache
composable: true
domain: creation
quality: 9.2
tags:
- prompt-template
- creation
- P03
- reusable
- parameterized
- artifact-production
tldr: Reusable creation prompt mold — fill task_type, domain, and deliverable_name to generate a structured creation directive
  for any artifact.
keywords:
- create
- build
- generate
- scaffold
- produce
- artifact
- deliverable
- task
- creation
density_score: 0.88
purpose: 'Produces a structured creation directive for any artifact type within any domain. Reuse scope: any situation where
  an LLM must be instructed to create a new deliverable from scratch. The template enforces a consistent creation posture
  — role adoption, constraint awareness, success orientation, and format compliance — regardless of what is being created.
  Vary `task_type`, `domain`, and `deliverable_name` to produce distinct creation prompts from the same mold. Composable:
  embed as a sub-block inside mission-level or multi-step templates.'
variables_table: '| Name | Type | Required | Default | Description |

  |---|---|---|---|---|

  | task_type | string | true | null | The specific type of artifact to create |

  | domain | string | true | null | The field or area of expertise |

  | deliverable_name | string | true | null | The exact name or title of the artifact |

  | audience | string | false | "intermediate practitioner" | Intended reader or consumer |

  | constraints | list | false | [] | Hard limitations the artifact must respect |

  | output_format | string | false | "markdown" | Required format for the deliverable |

  | success_criteria | list | false | [] | Measurable conditions defining completion |

  | context | string | false | "" | Background, prior art, or situational context |'
template_body: 'You are a specialist creator in the {{domain}} domain.


  Your task: create a {{task_type}} named "{{deliverable_name}}".


  Audience: {{audience}}

  Output format: {{output_format}}


  {{#context}}

  ## Context

  {{context}}

  {{/context}}


  {{#constraints}}

  ## Constraints (must all be respected)

  {{#constraints}}

  - {{.}}

  {{/constraints}}

  {{/constraints}}


  {{#success_criteria}}

  ## Success Criteria (creation is complete when all are met)

  {{#success_criteria}}

  - {{.}}

  {{/success_criteria}}

  {{/success_criteria}}


  ## Creation Instructions


  1. Adopt the mindset of the foremost expert in {{domain}} creating this {{task_type}}.

  2. Structure the {{deliverable_name}} so that a {{audience}} can immediately use it.

  3. Apply all constraints without exception; flag any constraint that cannot be satisfied.

  4. Produce the complete {{deliverable_name}} in {{output_format}} format.

  5. After delivery, state which success criteria are met and which are partially met.


  Begin the {{deliverable_name}} now. Do not explain your approach — produce the artifact directly.'
quality_gates: '| Gate | Status | Notes |

  |---|---|---|

  | H01 frontmatter valid YAML | PASS | All fields parse without error |

  | H02 id matches `p03_pt_*` | PASS | `p03_pt_creation_task` |

  | H03 id equals filename stem | PASS | File: `p03_pt_creation_task.md` |

  | H04 kind equals `prompt_template` | PASS | Literal string set |

  | H05 quality is null | PASS | `quality: null` — draft state |

  | H06 all required frontmatter fields present | PASS | id, kind, pillar, title, version, created, updated, author, domain,
  tags, tldr all present |

  | H07 body contains at least one `{{variable}}` | PASS | `{{domain}}`, `{{task_type}}`, `{{deliverable_name}}` and others
  present |

  | H08 every body `{{var}}` declared in variables | PASS | All 8 variables declared; all appear in body |

  | H09 injection_point declared | PASS | Composable; injection at `user` turn by default |'
examples: ''
example_1_knowledge_card: "Variables:\ntask_type: \"knowledge card\"\ndomain: \"machine learning\"\ndeliverable_name: \"Transformer\
  \ Attention Mechanisms\"\naudience: \"intermediate ML engineer\"\nconstraints:\n  - \"Maximum 600 words\"\n  - \"Include\
  \ a worked numerical example\"\n  - \"No references to specific papers by citation key\"\nsuccess_criteria:\n  - \"Covers\
  \ self-attention, multi-head attention, and cross-attention\"\n  - \"Contains a concrete numerical example with matrices\"\
  \n  - \"Readable in under 4 minutes\"\noutput_format: \"markdown\"\ncontext: \"Part of an internal ML onboarding knowledge\
  \ base for engineers new to NLP.\"\n\nRendered Output:\nYou are a specialist creator in the machine learning domain.\n\n\
  Your task: create a knowledge card named \"Transformer Attention Mechanisms\".\n\nAudience: intermediate ML engineer\nOutput\
  \ format: markdown\n\n## Context\nPart of an internal ML onboarding knowledge base for engineers new to NLP.\n\n## Constraints\
  \ (must all be respected)\n- Maximum 600 words\n- Include a worked numerical example\n- No references to specific papers\
  \ by citation key\n\n## Success Criteria (creation is complete when all are met)\n- Covers self-attention, multi-head attention,\
  \ and cross-attention\n- Contains a concrete numerical example with matrices\n- Readable in under 4 minutes\n\n## Creation\
  \ Instructions\n\n1. Adopt the mindset of the foremost expert in machine learning creating this knowledge card.\n2. Structure\
  \ the Transformer Attention Mechanisms so that a intermediate ML engineer can immediately use it.\n3. Apply all constraints\
  \ without exception; flag any constraint that cannot be satisfied.\n4. Produce the complete Transformer Attention Mechanisms\
  \ in markdown format.\n5. After delivery, state which success criteria are met and which are partially met.\n\nBegin the\
  \ Transformer Attention Mechanisms now. Do not explain your approach — produce the artifact directly."
