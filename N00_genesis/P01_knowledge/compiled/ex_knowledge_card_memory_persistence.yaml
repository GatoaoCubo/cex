tldr: SQLite (FTS5) + Chroma (vectors) juntos dao hybrid search com 10x economia de tokens via progressive disclosure em 3
  camadas
when_to_use: Projetar memoria persistente para agentes LLM com busca keyword + semantica local
keywords:
- sqlite
- chroma
- fts5
- vector-embedding
- dual-persistence
long_tails:
- Como combinar SQLite e Chroma para memoria de agente LLM
- Qual a diferenca entre contentSessionId e memorySessionId
axioms:
- SEMPRE usar contentSessionId para observations (estavel)
- NUNCA usar memorySessionId para FK — ele comeca NULL
linked_artifacts:
  primary: p01_kc_memory_session_compression
  related:
  - p01_kc_memory_worker_service
  - p01_kc_memory_privacy_controls
density_score: null
data_source: https://github.com/thedotmack/claude-mem
tl_dr: 'SQLite armazena dados estruturados (sessions, observations, summaries) com FTS5 para keyword search. Chroma adiciona
  embeddings vetoriais para busca semantica. Combinados: hybrid search com progressive disclosure em 3 camadas que reduz consumo
  de tokens em 10x.'
conceito_central: 'Memoria de agente LLM exige dois tipos de busca: keyword exato (FTS5/SQLite) e similaridade semantica (Chroma/vetores).
  Nenhum resolve sozinho. O padrao dual persistence separa storage estruturado (SQLite) de indice semantico (Chroma), conectados
  por um workflow MCP de 3 camadas: search (IDs, ~50 tokens) → timeline (contexto, ~200 tokens) → get_observations (detalhes,
  ~1000 tokens).'
arquitetura: "SQLite (~/.claude-mem/claude-mem.db)\n  sessions | sdk_sessions | observations (FTS5) | summaries\n        \
  \            |\n                    +--- hybrid search ---+\n                    |                     |\n             \
  \ keyword match        semantic similarity\n              (FTS5/BM25)          (Chroma embeddings)\n                   \
  \ |                     |\n                    +--- 3-layer MCP -----+\n              search → timeline → get_observations\n\
  \n| Tabela | Campos Chave | Funcao |\n|--------|-------------|--------|\n| sdk_sessions | content_session_id, memory_session_id\
  \ | Tracking de sessao |\n| observations | memory_session_id, tool_name, title | Dados brutos com FTS5 |\n| summaries |\
  \ content_session_id, summary | Narrativa comprimida |"
patterns: '| Trigger | Action |

  |---------|--------|

  | Busca exata por nome de tool | FTS5 no campo tool_name |

  | Busca por conceito similar | Chroma semantic search |

  | Context window limitado | Progressive disclosure 3 camadas |

  | Nova sessao precisa de historico | Injetar summaries + observations |

  | Dois session IDs disponiveis | contentSessionId para FK, memorySessionId para resume |'
anti_patterns:
- Usar so SQLite sem Chroma (perde busca semantica)
- Usar so Chroma sem SQLite (perde queries estruturadas)
- Carregar todas observations de uma vez (estoura tokens)
- Usar memorySessionId como FK (comeca NULL, instavel)
- Ignorar FTS5 e fazer LIKE queries (10-100x mais lento)
