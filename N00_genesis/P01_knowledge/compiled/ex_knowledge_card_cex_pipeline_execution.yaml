tldr: Pipeline de 8 funcoes (BECOME-INJECT-REASON-CALL-PRODUCE-CONSTRAIN-GOVERN-COLLABORATE) eh o processamento real de todo
  sistema LLM
when_to_use: Entender a sequencia completa de execucao de um agente ou agent_group LLM do input ao output
