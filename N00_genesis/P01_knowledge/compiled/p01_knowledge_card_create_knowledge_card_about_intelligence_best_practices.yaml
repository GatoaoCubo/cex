tldr: Intelligence gathering requires 5-source minimum, 72-hour collection cycles, structured analysis with ACH methodology,
  and confidence scoring 0.0-1.0
when_to_use: When conducting research requiring verified facts, competitive analysis, or evidence-based decision making
