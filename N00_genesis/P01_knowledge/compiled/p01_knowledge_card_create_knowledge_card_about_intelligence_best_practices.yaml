quick_reference: 'topic: intelligence_best_practices

  scope: OSINT collection, structured analysis, bias mitigation

  owner: intelligence_analyst

  criticality: high'
key_concepts: '| Concept | Description | Application |

  |---------|-------------|-------------|

  | Source Grading | A1 (reliable source, confirmed info) to F6 (unreliable source, unconfirmed) | Grade every source before
  analysis |

  | Collection Cycle | Plan → Direct → Collect → Process → Analyze → Disseminate (72h max) | Complete cycle within 3 days
  |

  | ACH Method | Analysis of Competing Hypotheses with evidence matrix scoring | Use for complex multi-variable analysis |

  | Confidence Levels | High (0.8-1.0), Medium (0.5-0.79), Low (0.1-0.49), Speculative (<0.1) | Score every assessment |'
strategy_phases:
- 'Requirements: Define PIRs (Priority Intelligence Requirements) with success criteria'
- 'Collection: Multi-source OSINT using 5+ independent channels per claim'
- 'Processing: Raw data → structured format with source attribution'
- 'Analysis: Apply ACH methodology with bias checks and red-team review'
- 'Production: Confidence-scored assessments with alternative scenarios'
- 'Dissemination: Time-bounded delivery with update triggers'
golden_rules:
- 'TRIANGULATE: Minimum 3 independent sources per fact claim'
- 'TIMESTAMP: All intelligence expires; mark collection and validity dates'
- 'GRADE: Source reliability (A-F) + information credibility (1-6)'
- 'CAVEAT: State assumptions, gaps, and confidence levels explicitly'
- 'UPDATE: Intelligence degrades; refresh every 30-90 days based on volatility'
anti_patterns:
- 'Single Source Syndrome: Acting on unverified single-source intelligence'
- 'Confirmation Bias: Cherry-picking sources that support preconceptions'
- 'Recency Bias: Over-weighting recent information vs. historical patterns'
- 'Analysis Paralysis: Endless collection without assessment deadlines'
- 'False Precision: Claiming high confidence without adequate evidence'
- 'Stale Intelligence: Using outdated information without validity checks'
flow: "[PIRs] → [Multi-Source Collection] → [Source Grading] → [ACH Analysis]\n                                          \
  \                    |\n[Confidence Scoring] ← [Bias Check] ← [Evidence Matrix] ←────┘\n        |\n[Report + Caveats] →\
  \ [Disseminate] → [Feedback Loop]"
comparativo: '| Source Type | Reliability | Speed | Coverage | Verification |

  |-------------|------------|-------|----------|--------------|

  | HUMINT | Medium-High | Slow | Narrow | Hard |

  | OSINT | Variable | Fast | Broad | Easy |

  | SIGINT | High | Fast | Targeted | Medium |

  | Documents | High | Medium | Deep | Easy |'
