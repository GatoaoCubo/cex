tldr: 'Quality evaluation combines binary HARD gates (block failures) + weighted SOFT scoring (D1-D5) + peer review; thresholds:
  7.0 use / 8.0 pool / 9.5 golden'
when_to_use: When assessing artifact fitness for publication, identifying quality gaps, or designing validation pipelines
  for any CEX artifact kind
