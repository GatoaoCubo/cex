density_score: 0.92
contract_definition: Engineering data model creation and validation operations receive structured input defining the project
  context, domain requirements, architectural constraints, and quality expectations. Callers provide project identification,
  specify the engineering discipline and data model architecture type, list functional requirements, and optionally supply
  technical constraints, quality metrics, source system references, and scale parameters. The receiver produces a complete
  data model artifact in the requested output format.
coercion_rules: '| From | To | Rule |

  |------|----|------|

  | string | list | Single requirement string wrapped as `[value]` |

  | string | object | JSON-encoded string parsed via `json.loads()` — reject if invalid JSON |

  | string | integer | Numeric strings in `scale_parameters` parsed via `int()` — reject if non-numeric |'
