summary: 'Session compression solves unbounded context growth in LLM memory systems. Raw observations accumulate during a
  session via PostToolUse hooks, stored in SQLite with tool name, input, output, and title. When the Stop hook fires, the
  worker loads all observations for the session, builds a compression prompt, and calls the Claude Agent SDK to produce a
  narrative summary. The compressed summary (~100 tokens) replaces verbose observations at session start. Next session loads
  the summary plus recent relevant observations as context, achieving progressive disclosure: minimal tokens for continuity,
  full observations available on demand via citation links. Two session IDs prevent a critical confusion. The contentSessionId
  is stable across the session lifetime and used as the foreign key for observation storage. The memorySessionId is an SDK-internal
  identifier captured lazily from the first system init message and used exclusively for SDK resume calls. Mixing them causes
  either lost observations or broken resumes. The Agent SDK v2 uses `await using` (Explicit Resource Management) for automatic
  session cleanup. First call creates a fresh session; subsequent calls resume with the captured memorySessionId. NULL check
  on memorySessionId is mandatory: NULL means the SDK session has not been initialized yet.'
spec: '| Component | Value | Detail |

  |-----------|-------|--------|

  | Compression trigger | Stop hook | Once per session, not per tool |

  | SDK API | unstable_v2 | createSession / resumeSession |

  | contentSessionId | Stable | DB foreign key, never for resume |

  | memorySessionId | Lazy-captured | From system init msg, SDK only |

  | Storage | SQLite | summaries + observations tables |

  | Summary size | ~100 tokens | Injected at next SessionStart |

  | Raw observations | Kept | Citation links remain valid |

  | Resource mgmt | `await using` | Auto-closes SDK session |'
patterns: '| Trigger | Action |

  |---------|--------|

  | Stop hook fires | Load observations, compress via SDK |

  | memorySessionId is NULL | Create fresh SDK session (no resume) |

  | memorySessionId is set | Resume existing SDK session |

  | New session starts | Inject summary + recent observations |

  | Need full observation | Fetch via citation link on demand |'
anti_patterns:
- Compressing at PostToolUse (fires per tool, cost explosion)
- Resuming with contentSessionId (resumes wrong session)
- Skipping NULL check on memorySessionId (crash on resume)
- Deleting raw observations post-compression (breaks citations)
- Growing context unboundedly without compression (token cost)
code: "<!-- lang: typescript | purpose: Agent SDK session compression -->\nimport {\n  unstable_v2_createSession,\n  unstable_v2_resumeSession\n\
  } from '@anthropic-ai/claude-agent-sdk';\n\n// First call: fresh session\nawait using session = unstable_v2_createSession({\n\
  \  model: 'sonnet'\n});\n\n// Resume: use memorySessionId (NEVER contentSessionId)\nawait using session = unstable_v2_resumeSession(\n\
  \  memorySessionId, { model: 'sonnet' }\n);\n\n// NULL-based resume detection\nconst hasReal = session.memorySessionId !==\
  \ null;\nconst options = {\n  ...(hasReal && { resume: session.memorySessionId })\n};\n// hasReal=false -> fresh SDK session\n\
  // hasReal=true  -> resume existing session"
