density_score: 0.89
data_source: https://docs.docker.com/config/containers/resource_constraints/
quick_reference: 'topic: docker_ai_containerization

  scope: AI model deployment with Docker (inference + training)

  owner: infrastructure

  criticality: high'
key_concepts:
- 'NVIDIA Runtime: `--runtime=nvidia` or `--gpus=all` for GPU access in containers'
- 'Multi-stage Builds: separate stages for dependencies (8GB) + models (50-100GB)'
- 'Volume Strategy: model weights in named volumes, not image layers (faster startup)'
- 'Memory Allocation: container limit = model_params  4 bytes  2-4x safety margin'
- 'Base Images: `nvidia/cuda:11.8-runtime-ubuntu20.04` for inference, `-devel` for training'
strategy_phases:
- 'Base Setup: install NVIDIA Container Toolkit on host (`nvidia-container-runtime`)'
- 'Image Design: multi-stage Dockerfile with dependency layer + runtime layer'
- 'Storage Config: persistent volumes for models, temp volumes for inference cache'
- 'Resource Limits: memory=model_size*4, CPU cores=inference_workers, GPU count'
- 'Orchestration: health checks, rolling updates, horizontal pod autoscaling'
golden_rules:
- MONTE modelos em volumes read-only (`/models:/models:ro`)
- LIMITE memoria container = tamanho_modelo  4  margem_seguranca (2-4x)
- EXPONHA metricas Prometheus na porta 8080 (padrão observabilidade)
- EXECUTE como non-root user (security + compliance)
flow: "[Model Files] -> [Named Volume] -> [Container Mount] -> [Inference API]\n                       |                 \
  \   |               |\n                  [Persistent]     [Read-Only Access]   [HTTP/gRPC]"
comparativo: '| Pattern | Image Size | Startup Time | Storage | Use Case |

  |---------|-----------|--------------|---------|----------|

  | Embedded Model | 50-100GB | 5-10min | Immutable | Single model, slow deploys |

  | Volume Mount | 2-5GB | 30-60s | Shared | Multi-model, fast updates |

  | Init Container | 5-10GB | 1-2min | Hybrid | K8s, versioned models |

  | S3 Download | 2-5GB | 2-5min | Remote | Cloud-native, auto-scaling |'
docker_compose_example: "services:\n  ai-inference:\n    image: myorg/llama-api:v1.2\n    runtime: nvidia\n    environment:\n\
  \      NVIDIA_VISIBLE_DEVICES: all\n    deploy:\n      resources:\n        limits:\n          memory: 32G\n        reservations:\n\
  \          devices:\n            - driver: nvidia\n              count: 1\n    volumes:\n      - models:/app/models:ro\n\
  \      - cache:/tmp/inference_cache\n    ports:\n      - \"8000:8000\"\n    healthcheck:\n      test: [\"CMD\", \"curl\"\
  , \"-f\", \"http://localhost:8000/health\"]\n      interval: 30s\n      timeout: 10s\n      retries: 3"
multi_stage_dockerfile: '# Stage 1: Dependencies (cached layer)

  FROM nvidia/cuda:11.8-runtime-ubuntu20.04 AS deps

  RUN apt-get update && apt-get install -y python3-pip

  COPY requirements.txt .

  RUN pip install -r requirements.txt


  # Stage 2: Runtime (model weights external)

  FROM deps AS runtime

  COPY app/ /app/

  WORKDIR /app

  EXPOSE 8000

  USER 1000:1000

  CMD ["python3", "serve.py", "--model-path", "/models"]'
