tl_dr: 'GSD implementa 5 hooks JavaScript para Claude Code que enforcam processo via `additionalContext`. Mensagens injetadas
  que o agente ve mas nunca bloqueiam execucao. Pattern core: stdin JSON, timeout guard (3-10s), process, stdout JSON ou exit(0).'
conceito_central: 'Hooks advisory resolvem o dilema enforcement vs autonomia: guiam o agente sem interromper fluxo. Cada hook
  recebe dados via stdin JSON, processa com timeout guard (3-10s), e retorna `additionalContext` ou faz `process.exit(0)`
  silencioso. Os 5 hooks cobrem: status visual (statusline), alertas de contexto (context-monitor), guarda de workflow (workflow-guard),
  deteccao de injection (prompt-guard) e version check (check-update). Comunicacao entre hooks usa bridge pattern via filesystem
  — statusline escreve metricas em tmpdir JSON, context-monitor le esse arquivo para calcular thresholds. Esse desacoplamento
  permite que hooks operem independentes: statusline roda em PreProcess, context-monitor em PostToolUse, cada um no seu lifecycle
  event sem dependencia direta. Cada hook e configuravel via config file (opt-in/opt-out por hook). Workflow-guard e desabilitado
  por default — so ativa quem usa GSD workflow. Prompt-guard e statusline estao sempre ativos pois protegem integridade do
  contexto.'
arquitetura_patterns: '| Hook | Evento | Funcao | Config |

  |------|--------|--------|--------|

  | statusline | PreProcess | Barra: modelo, task, contexto% | Sempre |

  | context-monitor | PostToolUse | Warning <=35%, critical <=25% | opt-out |

  | workflow-guard | PreToolUse | Avisa edits fora do workflow | opt-in |

  | prompt-guard | PreToolUse | Detecta injection em planning | Sempre |

  | check-update | SessionStart | Verifica versao em background | Sempre |


  Context-monitor normaliza para contexto utilizavel: Claude reserva 16.5% para autocompact.

  Formula: `usable = (remaining - 16.5) / (100 - 16.5) * 100`.

  Debounce: 5 tool uses entre warnings; severity escalation (WARNING para CRITICAL) bypassa debounce.

  Prompt-guard detecta regex de injection (ignore previous, pretend you are, invisible unicode) e avisa sem bloquear — falso
  positivo em blocking hook causa deadlock.'
exemplos: "// Pattern universal dos hooks GSD — timeout + advisory\nconst timeout = setTimeout(() => process.exit(0), 3000);\n\
  let input = '';\nprocess.stdin.on('data', c => input += c);\nprocess.stdin.on('end', () => {\n  clearTimeout(timeout);\n\
  \  try {\n    const data = JSON.parse(input);\n    const msg = processHook(data);\n    if (msg) {\n      process.stdout.write(JSON.stringify({\n\
  \        hookSpecificOutput: { additionalContext: msg }\n      }));\n    }\n  } catch (e) { process.exit(0); }\n});\n\n\
  Fluxo de comunicacao inter-hook via bridge file:\n- SessionStart: check-update escreve cache/update-check.json (detached,\
  \ unref)\n- PreProcess: statusline escreve /tmp/claude-ctx-{id}.json com used_pct\n- PostToolUse: context-monitor le /tmp/claude-ctx-{id}.json\
  \ e injeta warning"
anti_patterns:
- Hook que bloqueia com exit(1) — causa deadlock no agente
- Logar erros de hook ao usuario — ruido sem acao possivel
- Omitir timeout guard — trava terminal no Windows indefinidamente
- Thresholds hardcoded sem config — impede customizacao por projeto
- Prompt guard blocking em vez de advisory — falso positivo trava tudo
- Bridge file sem session_id — colisao entre sessoes paralelas
