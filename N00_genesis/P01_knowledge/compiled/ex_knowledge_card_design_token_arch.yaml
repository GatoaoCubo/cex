tl_dr: Design tokens organized in 3 layers — Primitive (raw values), Semantic (purpose aliases), Component (per-component
  overrides) — enable theme switching by modifying only the semantic layer. Dark mode, white-label, and brand changes become
  a single-layer operation.
conceito_central: 'Token architecture separates WHAT a value is from WHY it exists and WHERE it applies. Primitives define
  raw values (`--color-blue-600: #2563EB`), semantics assign purpose (`--color-primary: var(--color-blue-600)`), and component
  tokens scope usage (`--button-bg: var(--color-primary)`). Each layer changes at different cadence: primitives rarely, semantics
  per theme, components per feature.'
arquitetura_patterns: "| Layer | Example | Changes When | References |\n|-------|---------|-------------|------------|\n|\
  \ Primitive | `--color-blue-600: #2563EB` | Brand redesign | Nothing |\n| Semantic | `--color-primary: var(--color-blue-600)`\
  \ | Theme switch | Primitives |\n| Component | `--button-bg: var(--color-primary)` | Feature scope | Semantics |\n\nNaming\
  \ convention: `--{category}-{item}-{variant}-{state}`.\n\nDark mode overrides only the semantic layer:\n\n.dark {\n  --color-background:\
  \ var(--color-gray-900);\n  --color-foreground: var(--color-gray-50);\n}\n/ Component tokens inherit automatically — zero\
  \ changes needed /\n\nMigration from flat tokens: extract hex into primitives, create semantic aliases, update component\
  \ references. W3C DTCG JSON format (`$value`, `$type`) standardizes cross-tool interchange.\n\nFile organization options:\
  \ separate files (`primitives.css`, `semantic.css`, `components.css`, `index.css`) or single file with section comments."
exemplos_praticos: "/ Primitive — raw values, rarely change /\n:root {\n  --color-blue-600: #2563EB;\n  --color-gray-50: #F9FAFB;\n\
  \  --space-4: 1rem;\n}\n\n/ Semantic — purpose aliases, change per theme /\n:root {\n  --color-primary: var(--color-blue-600);\n\
  \  --color-background: var(--color-gray-50);\n  --spacing-section: var(--space-4);\n}\n\n/ Component — scoped overrides,\
  \ change per feature /\n:root {\n  --button-bg: var(--color-primary);\n  --card-padding: var(--spacing-section);\n}\n\n\
  HSL for opacity control: `hsl(var(--primary) / 0.5)`."
anti_patterns:
- Hardcode hex in component CSS (breaks theming)
- Skip semantic layer, reference primitives directly
- Create tokens without real reuse (token bloat)
- Overly descriptive names (`--color-cta-button-hover`)
- Change component tokens for theme switching
referencias:
- W3C Design Tokens Community Group (DTCG format)
