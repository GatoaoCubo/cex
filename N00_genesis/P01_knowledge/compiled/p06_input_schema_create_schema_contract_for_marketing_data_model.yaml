tldr: 'Input contract for marketing campaign creation: requires name, brand, objective, audience, channels; optional budget,
  tone, dates, KPIs, formats, geo.'
keywords:
- marketing
- campaign
- input_schema
- brand
- objective
- audience
- channels
- budget
- tone
- kpis
- content_formats
- geo_targets
- coercion
density_score: 0.91
contract_definition: 'Marketing campaign creation and content generation operations receive structured input defining brand
  context, campaign strategy, and execution parameters. Callers supply five required fields (campaign identity, brand reference,
  strategic objective, target audience, and distribution channels) plus up to seven optional fields governing budget, voice,
  timing, measurement, output formats, and geography. The receiver — N02 marketing nucleus or any campaign builder — produces
  campaign briefs, copy variants, and content artifacts aligned strictly with caller-provided parameters. This schema is unilateral:
  it defines only what goes in; output shape is defined by the corresponding formatter or interface artifact.'
validation_constraints: '| Field | Constraint |

  |-------|-----------|

  | campaign_name | 3-80 chars; pattern `^[a-z0-9_-]+$` |

  | marketing_objective | Enum: awareness \| conversion \| retention \| engagement \| lead_gen |

  | target_audience | 20-500 chars |

  | channels | min 1 item; each in: social_media, email, paid_ads, seo, content, influencer |

  | budget | float >= 0.0 if not null |

  | tone | Enum: professional \| casual \| technical \| friendly \| bold |

  | start_date / end_date | ISO 8601 `\d{4}-\d{2}-\d{2}`; end_date >= start_date when both set |

  | content_formats | Each in: text, image, video, carousel, email, landing_page |

  | geo_targets | ISO 3166-1 alpha-2 or recognized region name |'
coercion_rules: '| From | To | Field(s) | Rule |

  |------|----|----------|------|

  | string | float | budget | Parse numeric string ("5000" → 5000.0); reject with type error if non-numeric |

  | string | list | channels, kpis, content_formats, geo_targets | Wrap single-item string in list ("email" → ["email"]) |

  | YYYYMMDD / DD-MM-YYYY / DD/MM/YYYY | YYYY-MM-DD | start_date, end_date | Normalize to ISO 8601; reject if unparseable
  |'
references:
- OpenAPI requestBody specification (spec.openapis.org)
- IAB Content Taxonomy 3.0 — channel and format classification
- ISO 3166-1 alpha-2 country code registry (iso.org)
- Pydantic BaseModel field validation patterns (docs.pydantic.dev)
