summary: 'Skills para agentes LLM seguem formato universal: frontmatter YAML com `name` (kebab-case) e `description` (trigger
  condition) + body Markdown estruturado. Funciona cross-platform: Claude Code, Codex, OpenCode, Cursor, Gemini. O campo `description`
  eh o mecanismo de routing — o agente le este campo para decidir QUANDO invocar a skill automaticamente.'
spec: "| Campo | Obrigatorio | Formato | Regra |\n|-------|-------------|---------|-------|\n| `name` | SIM | kebab-case |\
  \ Unico no namespace do plugin |\n| `description` | SIM | Trigger condition | Condicao de quando invocar |\n| `model` |\
  \ NAO | string | `inherit` (padrao) ou modelo especifico |\n| Arquivo | SIM | `SKILL.md` | Dentro de `skills/{nome}/` |\n\
  | Namespace | NAO | `plugin:skill-name` | Qualificado para registries |\n\nEstrutura de diretorio padrao:\n\nskills/{nome}/\n\
  \  SKILL.md                    # Entry point com frontmatter\n  {sub-arquivo}-prompt.md     # Prompts para sub-agentes\n\
  \  {tecnica}.md                # Documentos de suporte\n\nComparacao entre frameworks:\n\n| Aspecto | superpowers | agentskills.io\
  \ |\n|---------|-------------|----------------|\n| Trigger | Campo `description` como condition | Campo `trigger` explicito\
  \ |\n| Namespace | `plugin:skill-name` | `namespace/skill` |\n| Distribuicao | Plugin marketplace + git clone | Registry\
  \ central |\n| Cross-platform | Claude/Codex/Cursor/Gemini | Dependente da plataforma |"
patterns: '| Trigger | Action |

  |---------|--------|

  | Skill precisa invocacao automatica | Description como trigger condition especifica |

  | Workflow critico nao pode pular etapas | Hard gate com `<HARD-GATE>` tag |

  | Decisao complexa com branches | Flowchart `dot` como algoritmo |

  | Skill usa ou eh usada por outras | Integration section com requires/called-by |

  | Tecnica complexa com muitos detalhes | Sub-arquivos em pasta de suporte |'
anti_patterns:
- Description vaga ("Skill for debugging") — agente nunca invoca
- Skill monolitica (>200 linhas) sem sub-arquivos de suporte
- Hard gates ausentes em workflows criticos (code antes de design)
- Sem Integration section — skill isolada no grafo de capacidades
- Exemplos ausentes — padrao fica abstrato e ambiguo
code: '<!-- lang: markdown | purpose: skill com trigger e hard gate -->

  ---

  name: systematic-debugging

  description: "Use when encountering any bug, test failure, or unexpected behavior, before proposing fixes"

  ---


  # Systematic Debugging


  ## The Process

  1. Read error and stacktrace

  2. Form hypothesis about root cause

  3. Verify with minimal reproduction test

  4. Fix only after confirmation


  <HARD-GATE>

  Do NOT write fixes until root cause is confirmed.

  </HARD-GATE>


  ## Integration

  - requires: code-review

  - called-by: feature-development'
