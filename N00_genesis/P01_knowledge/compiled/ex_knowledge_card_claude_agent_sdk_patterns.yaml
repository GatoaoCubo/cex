tldr: 'Agent SDK: agent(instructions+tools+model) + handoffs(triage/pipeline/parallel) + guardrails(input/output) + tracing
  + structured output'
when_to_use: Construir multi-agent systems, implementar handoffs entre agentes, ou adicionar guardrails em producao
keywords:
- agent_sdk
- handoff
- guardrail
- tracing
