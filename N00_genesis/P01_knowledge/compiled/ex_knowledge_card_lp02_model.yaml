density_score: 0.87
executive_summary: P02 eh o dominio de identidade do CEX, com 8 tipos de artefato que definem quem o agente eh, como se comporta
  e como roteia tasks. O tipo principal (agent) tem 11 secoes padrao e um iso_vectorstore com 10 files obrigatorios. 31 golden
  agents validados com ISO count como proxy de maturidade.
spec_table: '| Campo | Valor | Nota |

  |-------|-------|------|

  | Tipos | 8 | agent, lens, boot_config, mental_model, model_card, router, fallback_chain, agent_package |

  | Agent max_bytes | 5120 | Body com 11 secoes padrao |

  | ISO min_files | 10 | MANIFEST, QUICK_START, PRIME, INSTRUCTIONS, ARCHITECTURE, OUTPUT_TEMPLATE, EXAMPLES, ERROR_HANDLING,
  UPLOAD_KIT, SYSTEM_INSTRUCTION |

  | ISO tiers | 4 | minimal(3), standard(7), complete(10), whitelabel(12) |

  | Boot providers | 6 | claude, cursor, windsurf, codex, copilot, pi |

  | Golden agents | 31 | Evidence base do schema |'
patterns:
- 'Agent body segue 11 secoes fixas: overview > architecture > file_structure > when_to_use > I/O > integration > quality_gates
  > common_issues > invocation > related_agents > footer'
- 'ISO package mapeia files para LPs: manifest=P02, system_instruction=P03, architecture=P08, output_template=P05'
- Router type permite keyword > agent_group routing em YAML puro
- 'Fallback chain garante resiliencia: model A > B > C com timeout por step'
anti_patterns:
- 'Agente sem ISO vectorstore: impossivel de portar entre providers'
- 'Boot config hardcoded para 1 provider: perde portabilidade'
- 'Mental model sem decision_tree: routing fica ambiguo'
- 'ISO com < 10 files: classificado como sub-baseline'
application: organization opera 118 agentes com ISO completo, todos geraveis via forge P02. O sistema agent_package permite
  que qualquer agente rode em claude, cursor, windsurf ou codex sem alteracao de prompt.
