examples: ''
example_1_deep_code_review: "Variables:\ntask_type: code_review\ntarget: \"src/auth/token_validator.py\"\ncontext: >\n  FastAPI\
  \ service handling JWT validation for a B2B SaaS platform.\n  token_validator.py is called on every authenticated request\
  \ — it imports PyJWT,\n  verifies the signature against a rotating JWKS endpoint, checks expiry, and returns\n  the decoded\
  \ payload or raises HTTPException(401).\nconstraints:\n  - \"Python 3.11\"\n  - \"PyJWT >= 2.8\"\n  - \"No external HTTP\
  \ calls inside the validator (JWKS fetched separately)\"\ndepth: deep\noutput_format: structured\n\nRendered Output:\nYou\
  \ are a senior software engineer performing a code_review.\n\nTarget: src/auth/token_validator.py\nDepth: deep\nOutput format:\
  \ structured\n\n## Codebase Context\nFastAPI service handling JWT validation for a B2B SaaS platform.\ntoken_validator.py\
  \ is called on every authenticated request — it imports PyJWT,\nverifies the signature against a rotating JWKS endpoint,\
  \ checks expiry, and returns\nthe decoded payload or raises HTTPException(401).\n\n## Constraints\n- Python 3.11\n- PyJWT\
  \ >= 2.8\n- No external HTTP calls inside the validator (JWKS fetched separately)\n\n## Depth Contract\nApply the specified\
  \ depth level as follows:\n- surface  → identify the top 3 issues or decisions only; no exhaustive walkthrough\n- standard\
  \ → full analysis with prioritized findings and actionable recommendations\n- deep     → exhaustive audit covering correctness,\
  \ performance, security, maintainability, and testability\n\n## Output Format Contract\nProduce your response in structured\
  \ format:\n- structured → markdown headings (##) + bullet points; group findings by severity (Critical / High / Medium /\
  \ Low)\n- inline     → annotate the code directly; prefix critical issues with [CRITICAL], warnings with [WARN]\n- diff\
  \       → unified diff format (--- a/ +++ b/); add explanatory comments above each hunk\n\n## Task\nPerform code_review\
  \ on src/auth/token_validator.py at deep depth.\n\nYour response MUST include these four sections:\n\n### 1. Summary\nOne\
  \ paragraph: overall state of src/auth/token_validator.py relative to code_review objectives.\n\n### 2. Findings\nPrioritized\
  \ list of issues, gaps, or decisions — Critical → High → Medium → Low.\nEach finding: one-line label + one-sentence description.\n\
  \n### 3. Recommendations\nConcrete, actionable steps mapped 1-to-1 to findings.\nEach recommendation: imperative verb +\
  \ specific change + expected outcome.\n\n### 4. Risks\nWhat breaks or degrades if the recommendations above are not applied.\n\
  \n---"
