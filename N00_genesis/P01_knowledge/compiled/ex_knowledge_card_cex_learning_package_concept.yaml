summary: 'Learning Packages (LPs) sao as 12 dimensoes que definem qualquer entidade LLM. Nao sao categorias de artefatos --
  sao PERGUNTAS. P01 pergunta "o que sabe?", P02 "quem e?", P03 "como fala?". Um prompt preenche 1 LP (P03). Um agente preenche
  3-4. Um agent_group preenche todos os 12. A diferenca entre entidades eh dimensionalidade, nao natureza. LPs sao ortogonais
  as funcoes: LP = o que a entidade TEM, funcao = o que o LLM FAZ.'
spec: '| LP | Nome | Pergunta | Funcao Dominante |

  |----|------|----------|-----------------|

  | P01 | Knowledge | O que sabe? | INJECT |

  | P02 | Model | Quem e? | BECOME |

  | P03 | Prompt | Como fala? | REASON + CONSTRAIN |

  | P04 | Tools | O que usa? | CALL |

  | P05 | Output | O que entrega? | CONSTRAIN |

  | P06 | Schema | Que contratos? | CONSTRAIN + GOVERN |

  | P07 | Evals | Como medir? | GOVERN |

  | P08 | Architecture | Como escala? | BECOME + GOVERN |

  | P09 | Config | Como configura? | GOVERN |

  | P10 | Memory | O que lembra? | INJECT |

  | P11 | Feedback | Como melhora? | GOVERN |

  | P12 | Orchestration | Como coordena? | COLLABORATE |


  Ortogonalidade: cada tipo CEX tem 1 LP primario e 1 funcao primaria. LP classifica por dimensao da entidade. Funcao classifica
  por estagio do pipeline. As duas classificacoes sao independentes e complementares.'
patterns: '| Trigger | Action |

  |---------|--------|

  | Entidade sem memoria entre sessoes | Adicionar LP P10 (Memory) |

  | Agente com output inconsistente | Verificar LP P05 (Output) e P06 (Schema) |

  | Sistema sem quality gates | Implementar LP P07 (Evals) |

  | Novo agente criado | Preencher P02 (Model) + P03 (Prompt) minimo |

  | Agent_group completo necessario | Garantir todos 12 LPs preenchidos |'
code: "<!-- lang: python | purpose: LP dimensionality of an entity -->\nENTITY_LPS = {\n    \"prompt\":    {\"P03\": True},\
  \                    # 1 LP\n    \"agent\":     {\"P02\": True, \"P03\": True,\n                  \"P04\": True, \"P10\"\
  : True},       # 4 LPs\n    \"agent_group\": {f\"P{i:02d}\": True\n                  for i in range(1, 13)},          #\
  \ 12 LPs\n}\n# completude = len(filled_lps) / 12\n# prompt = 8%, agente = 33%, agent_group = 100%"
anti_patterns:
- Tratar LPs como pastas de filesystem (sao dimensoes)
- Confundir LP com funcao (TEM vs FAZ)
- Criar entidade sem P02+P03 minimo (sem identidade)
- Preencher LPs em ordem numerica (ordem eh semantica)
- Ignorar ortogonalidade LP x funcao na classificacao
