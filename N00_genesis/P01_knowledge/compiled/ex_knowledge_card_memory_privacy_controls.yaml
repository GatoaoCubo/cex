summary: 'Privacy in LLM memory systems requires enforcement at the edge (hook layer) before data reaches storage. Users wrap
  sensitive content in `<private>` tags; hooks strip them before any HTTP call to the worker service. The worker independently
  strips auto-injected `<claude-mem-context>` tags to prevent re-storage loops where injected context gets stored as a new
  observation. This two-layer approach separates concerns: user-controlled exclusion at edge, system-controlled dedup at worker.
  Tag stripping uses a shared utility (`tag-stripping.ts`) ensuring identical logic across Claude Code and Cursor integrations.
  Hooks are fire-and-forget (exit 0 on error) so privacy failures never block the user workflow. The worker signals rejection
  via `skipped: true` with a `reason` field, and the hook checks both before proceeding with observation storage. No server-side
  filtering exists after storage. The architecture enforces prevention-only: if data passes the edge, it persists. This design
  eliminates the need for deletion workflows and guarantees sensitive content never touches the database.'
spec: '| Component | Layer | Tag | Purpose |

  |-----------|-------|-----|---------|

  | `<private>content</private>` | Hook (edge) | User-applied | Excludes sensitive content from storage |

  | `<claude-mem-context>...</claude-mem-context>` | Worker | Auto-injected | Prevents re-storage of injected context |

  | Exit 0 | Hook | N/A | Non-blocking: graceful error or success |

  | Exit 2 | Hook | N/A | Blocking: stderr fed to LLM for decision |

  | `skipped` + `reason` | Worker response | N/A | Signals hook to abort observation storage |

  | `tag-stripping.ts` | Shared utility | Both | Single implementation for all hooks |'
patterns: '| Trigger | Action |

  |---------|--------|

  | User wraps text in `<private>` | Hook strips before forwarding to worker |

  | Worker returns `skipped: true` | Hook aborts observation storage (exit 0) |

  | Worker receives auto-context tags | Strip `<claude-mem-context>` before processing |

  | Multiple IDE integrations | Centralize stripping logic in shared utility |

  | Hook encounters error | Fire-and-forget: curl -s, errors to /dev/null, exit 0 |'
anti_patterns:
- Filtering after storage (data already persisted, deletion unreliable)
- Privacy at worker instead of edge (data travels over network)
- Skipping `skipped` flag check (stores observations worker already rejected)
- Duplicating tag-stripping logic per hook (drift between implementations)
- Using exit 1 for privacy errors (blocks user workflow unnecessarily)
code: "<!-- lang: typescript | purpose: hook-layer privacy check -->\n// Hook layer: check worker response before storing\
  \ observation\nconst response = await fetch('/api/sessions/init', { body: payload });\nconst result = await response.json();\n\
  \nif (result.skipped && result.reason) {\n  // Privacy check failed — abort without storing\n  process.exit(0);\n}\n\n//\
  \ Worker layer: strip auto-context before processing\nfunction stripContextTags(text: string): string {\n  return text.replace(/<claude-mem-context>[\\\
  s\\S]*?<\\/claude-mem-context>/g, '');\n}"
