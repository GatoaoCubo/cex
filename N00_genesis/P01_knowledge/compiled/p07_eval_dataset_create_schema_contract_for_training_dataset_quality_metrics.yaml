author: eval-dataset-builder
name: Training Dataset Quality Metrics Evaluation
size: 150
splits: '| Split | Percentage | Cases | Rationale |

  |-------|-----------|-------|-----------|

  | test | 100% | 150 | Pure evaluation — validator is deterministic rule-based logic; no training split needed |


  Total: 100% (150 cases)

  Split rationale: Quality metric computation for training datasets is rule-based and threshold-driven. Training a model on
  these cases would introduce leakage between the validator''s own calibration data and its test distribution. Eval-only is
  the correct contract.


  Case distribution: 30 cases per dimension (completeness ×30, deduplication ×30, balance ×30, diversity ×30, noise/accuracy
  ×30). Within each group: 15 clean pass cases, 10 single-violation cases, 5 multi-violation cases.'
schema_fields:
- input
- expected_output
- metadata
