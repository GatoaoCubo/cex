tldr: '150 test cases for evaluating training dataset quality across 7 dimensions: completeness, consistency, diversity, accuracy,
  balance, deduplication, and noise.'
description: Eval dataset for systems that assess training data quality — covers schema contract validation, metric computation,
  and quality gate classification.
source: synthetic
framework: braintrust
task_type: classification
language: en
license: MIT
refresh_cadence: on-demand
density_score: 0.88
overview: 'Tests quality-assessment systems that ingest training dataset samples and produce structured quality metric reports.
  Covers all 7 measurable quality dimensions: completeness, consistency, diversity, accuracy, class balance, deduplication,
  and noise level. Primary users are data pipeline validators, pre-training ingestion gates, and fine-tuning dataset auditors.
  Each case presents a training dataset sample or metadata payload; the expected output is a structured quality verdict —
  a per-dimension score, an aggregate pass/fail, and a list of violations found. This collection is evaluation-only: no training
  use because the underlying validator is rule-based.'
schema: ''
input: 'Type: dict A training dataset batch descriptor with two required keys: `sample` (list of dicts, each a training example
  with `input` and `output` keys) and `metadata` (dict with `task_type`, `expected_size`, and `schema_fields`). Example: `{"sample":
  [{"input": "What is 2+2?", "output": "4"}, {"input": "What is 2+2?", "output": "four"}], "metadata": {"task_type": "qa",
  "expected_size": 500, "schema_fields": ["input", "output"]}}`'
expected_output: 'Type: dict Structured quality assessment with keys: `passed` (bool), `aggregate_score` (float 0.0–1.0),
  `dimension_scores` (dict mapping dimension name to float), `violations` (list of strings describing each failure). Example:
  `{"passed": false, "aggregate_score": 0.61, "dimension_scores": {"completeness": 1.0, "deduplication": 0.4, "balance": 0.8,
  "consistency": 1.0, "diversity": 0.5, "accuracy": 0.7, "noise": 0.8}, "violations": ["deduplication: 3 duplicate pairs found",
  "diversity: only 2 of 7 categories covered"]}`'
metadata: 'Type: dict

  Case-level annotations for filtering, coverage analysis, and failure attribution.

  Values: `{dimension: "deduplication", severity: "hard|soft", case_group: "duplicate_exact|duplicate_semantic|balance_skew|missing_field|label_noise|schema_drift|coverage_gap",
  difficulty: "easy|medium|hard"}`'
integration: "Framework: braintrust\nLoading:\nimport braintrust\n\nproject = braintrust.init(project=\"training-data-quality\"\
  )\ndataset = project.datasets.create(\n    name=\"p07_ds_training_dataset_quality_metrics\"\n)\n\nfor case in dataset.fetch():\n\
  \    result = validate_training_batch(\n        sample=case[\"input\"][\"sample\"],\n        metadata=case[\"input\"][\"\
  metadata\"]\n    )\n    dataset.log_feedback(\n        id=case[\"id\"],\n        scores={\n            \"passed\": int(result[\"\
  passed\"] == case[\"expected\"][\"passed\"]),\n            \"score_error\": abs(result[\"aggregate_score\"] - case[\"expected\"\
  ][\"aggregate_score\"]),\n        }\n    )\nVersion migration: v1.x → v2.0 if `dimension_scores` keys change (new dimension\
  \ added or renamed). Bump minor for new `case_group` values in metadata; patch for data corrections. Never reuse dataset\
  \ ID across incompatible schemas — create `p07_ds_training_dataset_quality_metrics_v2` instead."
