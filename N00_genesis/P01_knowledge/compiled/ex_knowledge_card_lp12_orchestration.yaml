- Todo handoff deve ter commit instruction — trabalho sem commit eh trabalho perdido
linked_artifacts:
  agent: null
  skill: null
density_score: 0.88
executive_summary: P12 governa coordenacao multi-agente no CEX com 6 tipos de artefato. Workflows definem steps sequenciais/paralelos,
  DAGs modelam dependencias, spawn configs parametrizam lancamento de agent_groups (solo/grid/continuous), signals comunicam
  estado entre agentes, handoffs transferem contexto, e dispatch rules roteiam tasks por keyword.
spec_table: '| Campo | Valor | Nota |

  |-------|-------|------|

  | Tipos | 6 | workflow, dag, spawn_config, signal, handoff, dispatch_rule |

  | workflow max_bytes | 3072 | Steps sequenciais/paralelos |

  | signal format | JSON | complete, error, progress |

  | handoff max_bytes | 4096 | Task + context + commit |

  | spawn modes | 3 | solo, grid static, grid continuous |

  | dispatch_rule format | YAML | keyword > agent_group routing |'
patterns:
- 'Workflow com steps tipados: sequential (A>B>C) ou parallel (A+B+C)'
- 'DAG para dependencias complexas: task C depende de A e B concluirem'
- 'Spawn config: solo (1 sat), grid static (<=6 tasks), grid continuous (>6 tasks, auto-refill)'
- 'Signal protocol: {sat}complete{ts}.json com score para orchestrator monitorar'
- 'Handoff com 5 secoes: contexto, seeds, tarefas, scope fence, commit instruction'
- 'Dispatch rule: keyword match > agent_group routing em YAML'
anti_patterns:
- 'Handoff sem commit instruction: trabalho pode se perder'
- 'Signal sem timestamp: impossivel ordenar eventos'
- 'Spawn > 3 agent_groups simultaneos: BSOD risk no Windows'
- 'DAG com ciclo: deadlock garantido'
- 'Workflow sem error handling: falha em 1 step mata todo o pipeline'
application: No organization, P12 manifesta como spawn_solo.ps1/spawn_grid.ps1, signal_writer.py, e .claude/handoffs/. Este
  proprio handoff (META3_edison.md) eh uma instancia de P12 handoff. Grid continuous testado com 1.6x speedup em 7 batches.
