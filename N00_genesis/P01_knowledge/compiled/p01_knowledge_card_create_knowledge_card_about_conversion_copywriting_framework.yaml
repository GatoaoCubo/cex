tldr: AIDA (+35%), PAS (+42%), BAB (+28%), STAR (+31%) conversion lifts vs control — framework selection driven by audience
  awareness level and product complexity
when_to_use: When writing landing pages, email sequences, ads, or sales copy and need to select the highest-converting structural
  framework for the audience's awareness level
