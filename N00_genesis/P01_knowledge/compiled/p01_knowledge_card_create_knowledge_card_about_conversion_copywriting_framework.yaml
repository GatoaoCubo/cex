framework_comparison_table: '| Framework | Stands For | Conversion Lift | Best For | Awareness Level |

  |-----------|-----------|----------------|----------|----------------|

  | AIDA | Attention-Interest-Desire-Action | +35% vs control | Cold traffic, display ads | Unaware → aware |

  | PAS | Problem-Agitation-Solution | +42% vs control | Problem-aware audiences | Problem-aware |

  | BAB | Before-After-Bridge | +28% vs control | Aspirational/transformation | Solution-aware |

  | STAR | Situation-Task-Action-Result | +31% engagement | Long-form, case studies | Most aware |

  | 4Ps | Promise-Picture-Proof-Push | +38% vs control | B2C, direct response | Solution-aware |

  | FAB | Features-Advantages-Benefits | +19% vs control | Technical/B2B | Product-aware |

  | 5W1H | Who-What-When-Where-Why-How | +18% B2B | Information-dense copy | Most aware |'
key_concepts:
- 'Awareness Ladder (Eugene Schwartz): Unaware → Pain-aware → Solution-aware → Product-aware → Most aware; framework must
  match rung'
- 'AIDA mechanics: Hook attention (headline), build interest (subhead + bullets), amplify desire (social proof + transformation),
  trigger action (CTA with urgency)'
- 'PAS mechanics: Name the problem precisely, agitate with consequences (emotional amplification), present solution as relief;
  most effective with 3:1 agitation:solution ratio'
- 'BAB mechanics: Before = current painful state; After = vivid desired state; Bridge = product as the mechanism connecting
  both'
- '4Ps mechanics: Make a bold Promise, paint a Picture with sensory language, back with Proof (numbers/testimonials), Push
  with single clear CTA'
strategy_phases:
- 'Audience Audit: Identify awareness level via survey data, ad comments, or sales call recordings — this decision alone accounts
  for ~60% of framework effectiveness'
- 'Framework Selection: Match framework to awareness (see table above); for mixed traffic, use AIDA as default'
- 'Headline First: Write 10 headlines using chosen framework opening; A/B test top 3 before writing body'
- 'Body Expansion: Apply framework structure section by section; maintain a 3:1 emotional-to-logical ratio for B2C, invert
  for B2B'
- 'CTA Optimization: One CTA per page/email; specificity beats genericity ("Start my free trial" +23% vs "Sign Up")'
- 'Proof Integration: Embed social proof at the point of maximum desire/anxiety — after agitation in PAS, after "after" in
  BAB'
- 'Conversion Audit: Run 5-second test (headline clarity), scroll-map analysis (drop-off points), heatmap (CTA visibility)'
golden_rules:
- MATCH framework to awareness level — wrong match kills lift regardless of copy quality
- LEAD with the reader's existing thought, not your product's features
- SPECIFICITY converts — "saves 3 hours/week" outperforms "saves time" by 40–60%
- ONE CTA per piece; multiple CTAs reduce conversion by 15–30% (Unbounce, 2023)
- PROOF at maximum anxiety point, not at the end
- SUBJECT LINE = 50% of email open rate; headline = 80% of copy reading decision
framework_selection_flow: "[Audience Awareness?]\n    |\n    ├─ Unaware / Cold     → AIDA (educate → desire → action)\n  \
  \  |\n    ├─ Pain-aware         → PAS (validate pain → agitate → relieve)\n    |\n    ├─ Solution-aware     → BAB or 4Ps\
  \ (transformation or promise)\n    |\n    ├─ Product-aware      → FAB or direct offer + proof stack\n    |\n    └─ Most\
  \ aware (loyal) → STAR or direct CTA (minimal friction)"
awareness_to_framework_matrix: '| Audience Segment | Primary Framework | Supporting Element | Avg CTA Click Rate |

  |-----------------|------------------|-------------------|--------------------|

  | Cold (ads, display) | AIDA | Curiosity headline | 1.2–2.4% |

  | Organic search | PAS or BAB | SEO-matched headline | 3.1–5.7% |

  | Email list (cold) | PAS | Subject = problem statement | 18–24% open / 2–4% CTR |

  | Email list (warm) | BAB or 4Ps | Subject = transformation | 28–38% open / 5–9% CTR |

  | Retargeting | Direct offer + proof | Objection-handling subhead | 4.2–8.6% |

  | Sales page | Long-form AIDA + PAS hybrid | Video sales letter above fold | 1.5–4.0% |'
