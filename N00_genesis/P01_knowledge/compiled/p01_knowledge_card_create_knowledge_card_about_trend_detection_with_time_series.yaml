tldr: Trend detection applies Mann-Kendall (p<0.05), SMA/EMA windows, and PELT/BOCPD changepoint algorithms to identify directional
  shifts in temporal data
when_to_use: When analyzing temporal data for monotonic trends, structural breaks, or seasonally-adjusted slope estimation
