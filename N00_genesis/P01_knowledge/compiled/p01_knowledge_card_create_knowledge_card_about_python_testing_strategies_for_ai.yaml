tldr: Test AI agents with pytest-asyncio for async flows, respx/responses for LLM API mocking, hypothesis for property-based
  state validation, and pact-python for contract testing
when_to_use: When building or validating test suites for Python-based LLM agents, tool-calling agents, or multi-step autonomous
  pipelines
