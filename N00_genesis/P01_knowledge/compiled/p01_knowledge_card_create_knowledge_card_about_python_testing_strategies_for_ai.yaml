  criticality: high

  stack: pytest >= 7.4 | pytest-asyncio >= 0.23 | respx >= 0.21 | hypothesis >= 6.x'
key_concepts: '| Concept | Purpose | Library | Decorator / API |

  |---------|---------|---------|-----------------|

  | Async agent testing | Test coroutine-based agent loops | `pytest-asyncio` | `@pytest.mark.asyncio` |

  | LLM API mocking | Deterministic fake responses | `respx`, `responses` | `respx.mock`, `@responses.activate` |

  | Property-based testing | Fuzz agent state with random inputs | `hypothesis` | `@given(st.text())` |

  | Contract testing | Validate AI service API schema | `pact-python` | `Pact().given().will_respond_with()` |

  | Chaos testing | Inject failures, timeouts, partial responses | `pytest-httpx` | `httpx_mock.add_exception()` |

  | Snapshot testing | Pin agent response structure over time | `syrupy` | `assert result == snapshot` |'
strategy_phases:
- Unit — Mock LLM calls; test prompt construction, tool routing, output parsing in isolation
- Integration — Stub external services; test multi-turn conversation state, memory persistence, tool orchestration
- Contract — Validate OpenAI/Anthropic API schema compliance with pact; catch breaking API changes before deploy
- Behavioral — Property-based tests over agent inputs; confirm invariants (never empty response, always valid JSON)
- 'Chaos — Inject: rate-limit 429, timeout, partial stream, malformed JSON; verify fallback + retry behavior'
golden_rules:
- MOCK at the HTTP transport layer (`respx`, `pytest-httpx`) — not at the SDK client level — catches serialization bugs
- FIXTURE LLM responses as `.json` files; load in conftest.py for reuse across test modules
- SEPARATE tool-selection tests (does agent pick the right tool?) from tool-execution tests (does the tool work?)
- 'PARAMETRIZE model variants: `@pytest.mark.parametrize("model", ["gpt-4o", "claude-3-5-sonnet"])` on integration tests'
- USE `anyio` backend fixture when mixing asyncio and trio in the same test suite
flow: "[Test Input] -> [respx.mock intercepts HTTP] -> [Agent receives fake LLM response]\n                              \
  \                            |\n                                              [Tool call? -> stub tool return]\n       \
  \                                                   |\n                                              [Assert: output schema,\
  \ state delta, signal]\n                                                          |\n                                  \
  \            [hypothesis: repeat 100x with fuzzed inputs]"
comparativo: '| Test Type | Library | Speed | LLM Cost | Deterministic | When to Use |

  |-----------|---------|-------|----------|---------------|-------------|

  | Unit (mocked) | respx + pytest | <1s | $0 | Yes | Always; every commit |

  | Integration (stubbed) | pytest-asyncio + httpx_mock | 1–10s | $0 | Yes | Pre-merge |

  | Contract | pact-python | 5–30s | $0 | Yes | API version changes |

  | Property-based | hypothesis | 10–60s | $0 | Seeds | Core logic refactors |

  | Live E2E | pytest + real API | 30–120s | $$$ | No | Release gating only |

  | Chaos | pytest-httpx exceptions | 1–10s | $0 | Yes | Resilience validation |'
code_patterns: "# Async agent test with respx mock\nimport pytest, respx, httpx, json\n\n@pytest.mark.asyncio\nasync def test_agent_calls_tool_on_ambiguous_query(mock_llm):\n\
  \    with respx.mock:\n        respx.post(\"https://api.anthropic.com/v1/messages\").mock(\n            return_value=httpx.Response(200,\
  \ json=TOOL_CALL_FIXTURE)\n        )\n        result = await my_agent.run(\"What is the weather in Lisbon?\")\n    assert\
  \ result.tool_used == \"get_weather\"\n    assert result.tool_input[\"city\"] == \"Lisbon\"\n\n# Property-based test for\
  \ agent state invariant\nfrom hypothesis import given, settings\nimport hypothesis.strategies as st\n\n@given(st.text(min_size=1,\
  \ max_size=500))\n@settings(max_examples=200)\ndef test_agent_always_returns_valid_schema(user_input):\n    with respx.mock:\n\
  \        respx.post(...).mock(return_value=httpx.Response(200, json=VALID_RESPONSE))\n        result = agent.run_sync(user_input)\n\
  \    assert isinstance(result.content, str)\n    assert len(result.content) > 0"
