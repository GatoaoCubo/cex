content:
  summary: "Claude expoe 4 primitivas para escalar tool ecosystems: MCP connector (roteamento direto a MCP servers remotos via API), agent skills (bundles reutilizaveis de tools+prompts+behavior), tool search (descoberta dinamica para 100+ tools por indexacao de descricoes), e programmatic calling (execucao deterministica sem decisao do LLM)."

  facts:
    - claim: "MCP connector traduz protocol MCP para Claude API — inputSchema vira input_schema (snake_case)"
      source: "platform.claude.com/docs/mcp-connector"
      confidence: 1.0
    - claim: "Tool search indexa descricoes e retorna apenas tools relevantes por query — previne context window bloat"
      source: "platform.claude.com/docs/tool-search"
      confidence: 1.0
    - claim: "Agent skills sao capability bundles nomeados — tools + prompts + behavior compartilhaveis entre agentes"
      source: "platform.claude.com/docs/agent-skills"
      confidence: 1.0
    - claim: "Programmatic calling executa tool especifica sem LLM decidir — util quando routing eh deterministic"
      source: "platform.claude.com/docs/programmatic-calling"
      confidence: 1.0
    - claim: "MCP connector elimina necessidade de construir MCP client customizado"
      source: "platform.claude.com/docs/mcp-connector"
      confidence: 1.0

  patterns:
    - trigger: "< 20 tools"
      action: "Definir tools inline no request"
    - trigger: "20-150 tools"
      action: "Usar tool search para descoberta dinamica"
    - trigger: "100+ tools"
      action: "MCP connector para servers remotos + tool search"
    - trigger: "Routing deterministic (sabe qual tool usar)"
      action: "Programmatic calling — bypassa selecao do LLM"
    - trigger: "Mesma capability em N agentes"
      action: "Encapsular em agent skill reutilizavel"

  anti_patterns:
    - "Enviar 100+ tool definitions em cada request (usar tool search)"
    - "Construir MCP client custom quando connector ja resolve"
    - "Hardcodar tool routing quando programmatic calling faz melhor"
    - "Duplicar tool definitions entre agentes (usar skills para reuso)"

