tldr: 'LLMs call external tools via structured definitions. Universal: define schema → LLM decides → runtime executes → LLM
  synthesizes.'
when_to_use: When building agentic systems that interact with external APIs, databases, or tools
keywords:
- tool-use
- function-calling
- mcp
- api-integration
- agentic
density_score: 0.93
universal_pattern: DEFINE → PRESENT → DECIDE → CALL → RETURN → SYNTHESIZE
provider_implementations: '| Provider | Mechanism | Schema Format |

  |----------|-----------|---------------|

  | Claude | tool_use blocks | JSON Schema in tools array |

  | GPT | function_calling | JSON Schema in functions array |

  | Gemini | function_declarations | OpenAPI-style schema |

  | Llama | tool_call tokens | JSON Schema (varies by host) |

  | MCP | Model Context Protocol | Standardized tool/resource/prompt |'
mcp_the_universal_standard: 'Abstracts tool provision across providers:

  - Tools: callable functions (search, calculate, deploy)

  - Resources: readable data (files, databases, APIs)

  - Prompts: reusable prompt templates'
best_practices:
- Tool descriptions matter as much as code — LLM reads them to decide
- Keep params <7 — reduces hallucinated parameters
- Return structured JSON, not prose
- Error messages should be actionable, not stack traces
- Rate-limit tools with side effects
cex_integration:
- '`.mcp-n0X.json` configs per nucleus'
- '`_tools/*.py` callable via subprocess'
- '`cex_run.py` orchestrates tool chains'
