tags:
- tdd
- testing
- llm
- skill
- red-green-refactor
tldr: 'LLMs can follow TDD: write test first (red), generate code to pass (green), refactor. Tests as specification. Especially
  effective for tool development.'
when_to_use: Teaching LLM agents to write reliable code via test-first approach
keywords:
- tdd
- test-first
- red-green-refactor
- specification-by-test
density_score: 0.92
the_pattern: 'RED:    Write test that defines expected behavior → test fails

  GREEN:  Write minimum code to pass test → test passes

  REFACTOR: Improve code quality → test still passes'
why_tdd_works_for_llms:
- 'Specification: Test IS the spec — no ambiguity'
- 'Validation: Immediate feedback on correctness'
- 'Scope: Test constrains what to build (prevents over-engineering)'
- 'Confidence: Refactoring is safe when tests pass'
- 'Self-healing: Failed test + error message = auto-fix prompt'
llm_tdd_workflow: '1. Human describes desired behavior

  2. LLM writes pytest test

  3. LLM runs test (fails — expected)

  4. LLM writes implementation

  5. LLM runs test (passes)

  6. LLM refactors if needed

  7. LLM runs test (still passes)'
cex_tdd_examples:
- '`test_brand_tools.py` (33 tests) → `brand_*.py` tools'
- '`test_brand_pipeline_e2e.py` (13 tests) → pipeline integration'
- '`test_bootstrap.py` (8 tests) → `cex_bootstrap.py`'
- Tests written BEFORE or ALONGSIDE tools, never after
anti_pattern_test_after: Writing code first, tests later. LLM writes code that "feels right" but has subtle bugs. Tests would
  have caught them. Always test first.
