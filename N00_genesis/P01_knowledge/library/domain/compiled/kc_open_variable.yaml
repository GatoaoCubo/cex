id: p01_kc_open_variable
kind: knowledge_card
type: domain
pillar: P01
title: Open Variable Pattern — Mustache Templating for LLM Systems
version: 1.0.0
created: 2026-03-31
author: n07_orchestrator
domain: llm_patterns
quality: null
tags:
- open-variable
- mustache
- templating
- brand
- injection
tldr: Use {{VARIABLE}} placeholders in prompts and configs. Fill at runtime from context (brand, user, environment). Separates
  structure from content.
when_to_use: Building multi-tenant or brand-aware LLM systems
keywords:
- open-variable
- mustache
- template
- brand-injection
- multi-tenant
density_score: 0.92
core_concept: Separate structure from content. The template defines WHAT goes where. Variables define WHO/WHAT fills it. Runtime
  hydrates the template.
the_pattern: 'TEMPLATE: "Welcome to {{BRAND_NAME}}. Our {{BRAND_ARCHETYPE}} voice says..."

  CONFIG:   { BRAND_NAME: "Codexa", BRAND_ARCHETYPE: "sage" }

  OUTPUT:   "Welcome to Codexa. Our sage voice says..."'
hydration_sources: '| Source | Variables | When |

  |--------|-----------|------|

  | Brand config | `{{BRAND_*}}` (41 vars) | Every prompt |

  | Decision manifest | `{{DP_*}}` | Per-mission |

  | Environment | `{{ENV_*}}` | Deploy-time |

  | User input | `{{USER_*}}` | Per-request |'
cex_implementation:
- '`.cex/brand/brand_config_template.yaml` (41 mustache variables)'
- '`brand_inject.py` hydrates prompts with brand values'
- '`cex_schema_hydrate.py` hydrates schema templates'
- '"X" in CEX is the ultimate open variable'
