tldr: 'Sessions that don''t share state. Each starts from zero. No learning carries over. Fix: shared filesystem, signals,
  handoffs.'
when_to_use: Designing multi-session or multi-agent workflows
keywords:
- anti-pattern
- isolation
- continuity
- shared-state
- handoff
density_score: 0.91
the_problem: Each session/agent starts from scratch. No memory of previous sessions. No shared state between agents. Work
  is repeated.
symptoms:
- Agent re-discovers what was already known
- Parallel agents produce contradictory output
- No improvement over time
- User repeats context every session
fix:
- Shared filesystem as state (`.cex/runtime/`, `P01_knowledge/`)
- Signals between agents (`signal_writer.py`)
- Handoff documents (`.cex/runtime/handoffs/`)
- Decision manifests (`.cex/runtime/decisions/`)
- Learning records (`.cex/learning_records/`)
- Brand config as shared identity (`.cex/brand/brand_config.yaml`)
