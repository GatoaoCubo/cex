tldr: 'Combine retrieval (search knowledge base) with generation (LLM). Hybrid RAG: TF-IDF for structure + embeddings for
  semantics. Chunking strategies matter.'
when_to_use: Building knowledge-aware LLM systems with external data sources
keywords:
- rag
- retrieval
- embedding
- vector-db
- hybrid-search
- chunking
density_score: 0.92
core_rag_loop: QUERY → RETRIEVE (search KB) → AUGMENT (inject context) → GENERATE (LLM)
search_strategies: '| Strategy | How | Strength |

  |----------|-----|----------|

  | TF-IDF / BM25 | Keyword frequency matching | Exact terms, structured data |

  | Vector/Semantic | Embedding similarity | Meaning, synonyms, concepts |

  | Hybrid | BM25 + Vector, combine scores | Best of both worlds |

  | Knowledge Graph | Entity + relationship traversal | Structured relationships |'
chunking_strategies: '| Strategy | Chunk Size | Overlap | Use Case |

  |----------|-----------|---------|----------|

  | Fixed | 500-1000 tokens | 50-100 | General purpose |

  | Semantic | By paragraph/section | Headers | Structured docs |

  | Sentence window | 1 sentence + N context | Full window | QA systems |

  | Parent-child | Section → sub-sections | Hierarchy | Long documents |'
cex_rag_implementation:
- TF-IDF via `cex_query.py` (covers ~90% of cases)
- 'File-based knowledge: `P01_knowledge/library/` (194+ KCs)'
- '`cex_memory_select.py` = memory retrieval'
- '`compose_prompt()` = the augmentation step'
- No vector DB needed yet — file-based TF-IDF is sufficient at current scale
