1_agent_identity_concepts: '| Concept | Anthropic | OpenAI | Google | MCP | CEX Kind | CEX Aligned? |

  |---------|-----------|--------|--------|-----|----------|-------------|

  | Agent definition | No native abstraction (built from primitives) | `Agent` (Agents SDK), `Assistant` (Assistants API)
  | `Agent` (Vertex AI Agent Builder) | N/A (protocol, not agent) | `agent` | ✅ |

  | Agent identity card | N/A | N/A | `AgentCard` (A2A protocol) | N/A | `agent_card` | ✅ Google A2A standard |

  | System instructions | `system` parameter (Messages API) | `instructions` (Assistants), `system` (Chat) | `system_instruction`
  (Gemini) | N/A | `system_prompt` | ✅ Universal concept |

  | Persona / role | Via system prompt | `instructions` field | Via system_instruction | N/A | `lens` | ⚠️ "Lens" is CEX-only.
  Industry uses "persona" or "role" |

  | Model selection | `model` parameter | `model` parameter | `model` parameter | N/A | `model_card` | ✅ Hugging Face/Google
  standard |

  | Model provider config | N/A | N/A | N/A | N/A | `model_provider` | ✅ Clear enough |'
2_tool_function_concepts: '| Concept | Anthropic | OpenAI | Google | MCP | CEX Kind | CEX Aligned? |

  |---------|-----------|--------|--------|-----|----------|-------------|

  | Tool definition | `tool` object: `{name, description, input_schema}` | `tool` wrapping `function`: `{name, description,
  parameters}` | `FunctionDeclaration`: `{name, description, parameters}` | `Tool`: `{name, title, description, inputSchema}`
  | `function_def` | ✅ |

  | Tool invocation (model→dev) | `tool_use` content block | `tool_calls` array | `FunctionCall` | `tools/call` method | —
  (runtime) | — |

  | Tool result (dev→model) | `tool_result` content block | `tool` role message | `FunctionResponse` | `tools/call` response
  | — (runtime) | — |

  | Tool selection mode | `tool_choice`: auto/any/tool/none | `tool_choice`: auto/none/required/{name} | `function_calling_config.mode`:
  AUTO/ANY/NONE/VALIDATED | N/A (host decides) | — (config) | — |

  | Strict schema enforcement | `strict: true` (tool-level) | `strict: true` (function-level) | `VALIDATED` mode | Via `inputSchema`
  | — (config) | — |

  | Code execution sandbox | `code_execution` server tool | `code_interpreter` (Assistants) | `code_execution` tool | N/A
  | `code_executor` | ⚠️ OpenAI: "interpreter", Anthropic/Google: "execution" |

  | Web search | `web_search` server tool | `web_search` (Agents SDK) | `google_search` grounding | N/A | `search_tool` |
  ✅ |

  | Computer control | `computer` tool (screenshots + actions) | N/A | N/A | N/A | `computer_use` | ✅ Anthropic coined this
  |

  | File/doc search | `file_search` via MCP | `file_search` (Assistants) | N/A | `resources/read` | `document_loader` | ✅
  LangChain term |

  | MCP server | MCP originated at Anthropic | Supports MCP (Agents SDK) | Supports MCP (Gemini) | `MCP Server` | `mcp_server`
  | ✅ |'
