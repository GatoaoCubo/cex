conflict_resolution_rules:
- 2+ providers agree → Use that term (e.g., "tool" not "function", since 3/4 say "tool")
- All providers differ → Use most descriptive (e.g., "function_def" over Google's "FunctionDeclaration")
- Only 1 provider has concept → Use their term (e.g., "computer_use" = Anthropic's term)
- CEX-unique concept → Keep CEX term if clear (e.g., "bugloop", "lens" → but "lens" should become "persona")
- Framework vs provider → Provider > framework (e.g., Anthropic's "tool_use" > LangChain's "AgentExecutor")
usage_in_cex: 'This card is the first stop for any terminology question:

  - Before naming a new kind → check this table

  - Before renaming an existing kind → verify 2+ providers agree

  - Before writing documentation → use canonical terms from this card

  - Quarterly review → update when providers release new APIs'
