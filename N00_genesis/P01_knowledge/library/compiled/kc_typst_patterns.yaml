quick_reference: 'install: winget install Typst.Typst   # or cargo install typst-cli

  binary: typst

  version_check: typst --version

  compile: typst compile input.typ output.pdf

  watch: typst watch input.typ output.pdf  # auto-recompile on save

  file_extension: .typ

  output: PDF (native), PNG, SVG'
document_structure: "// document metadata\n#set document(title: \"Guia Completo de IA\", author: \"Brand Name\", date: auto)\n\
  \n// page setup\n#set page(\n  paper: \"a4\",\n  margin: (top: 2.5cm, bottom: 2.5cm, left: 3cm, right: 2.5cm),\n  header:\
  \ align(right)[Content Factory — v1.0],\n  footer: context [\n    #align(center)[#counter(page).display(\"1 / 1\", both:\
  \ true)]\n  ],\n  numbering: \"1\",\n)\n\n// typography\n#set text(font: \"Inter\", size: 11pt, lang: \"pt\")\n#set par(justify:\
  \ true, leading: 0.65em)\n#set heading(numbering: \"1.1\")\n\n// title page\n#align(center + horizon)[\n  #text(size: 28pt,\
  \ weight: \"bold\", fill: rgb(\"#2563eb\"))[Guia Completo de IA]\n  #v(1em)\n  #text(size: 14pt, fill: gray)[Para Criadores\
  \ de Conteúdo]\n  #v(2em)\n  #text(size: 12pt)[Brand Name — 2026]\n]\n\n#pagebreak()\n\n// table of contents\n#outline(indent:\
  \ auto, depth: 3)\n\n#pagebreak()\n\n= Introdução\n\nEste guia apresenta as melhores práticas...\n\n== Conceitos Fundamentais\n\
  \nTexto do capítulo aqui.\n\n=== Subseção\n\nMais detalhes..."
headings_and_formatting: "= Heading 1 (chapter)\n== Heading 2 (section)\n=== Heading 3 (subsection)\n\nbold text\nitalic text\n\
  `inline code`\n#link(\"https://example.com\")[link text]\n#highlight[highlighted text]\n#strike[strikethrough]\n#underline[underlined]\n\
  \n- Bullet list item\n- Another item\n  - Nested item\n\n+ Numbered list\n+ Second item\n\n/ Term: Definition list item"
functions_and_variables: "// Define reusable function\n#let tip(body) = block(\n  fill: rgb(\"#f0f9ff\"),\n  stroke: rgb(\"\
  #2563eb\"),\n  inset: 12pt,\n  radius: 4pt,\n  width: 100%,\n)[\n  #text(weight: \"bold\", fill: rgb(\"#2563eb\"))[\U0001F4A1\
  \ Dica: ]\n  #body\n]\n\n// Use it\n#tip[Sempre valide seus dados antes de publicar.]\n\n// Variables\n#let brand_color\
  \ = rgb(\"#2563eb\")\n#let version = \"1.0.0\"\n\nO sistema está na versão #version."
data_loading_from_external_files: "// Load YAML data\n#let config = yaml(\"brand_config.yaml\")\nMarca: #config.brand_name\n\
  \n// Load CSV data → table\n#let data = csv(\"metrics.csv\")\n#table(\n  columns: 4,\n  ..data.flatten()\n)\n\n// Load JSON\n\
  #let tools = json(\"tools.json\")\n#for tool in tools.items [\n  - #tool.name: #tool.description\n]\n\n// Load and embed\
  \ image\n#figure(\n  image(\"chart.png\", width: 80%),\n  caption: [Crescimento mensal de receita]\n)"
template_pattern_reusable_across_documents: "// template.typ — shared template\n#let ebook(title: \"\", author: \"\", date:\
  \ \"\", body) = {\n  set document(title: title, author: author)\n  set page(paper: \"a4\", margin: 2.5cm)\n  set text(font:\
  \ \"Inter\", size: 11pt, lang: \"pt\")\n  set heading(numbering: \"1.1\")\n  set par(justify: true)\n\n  // Title page\n\
  \  align(center + horizon)[\n    #text(size: 28pt, weight: \"bold\")[#title]\n    #v(1em)\n    #text(size: 14pt)[#author\
  \ — #date]\n  ]\n  pagebreak()\n  outline(indent: auto)\n  pagebreak()\n\n  body\n}\n\n// chapter.typ — use the template\n\
  #import \"template.typ\": ebook\n\n#show: ebook.with(\n  title: \"Guia de Produtividade\",\n  author: \"Brand Name\",\n\
  \  date: \"Abril 2026\",\n)\n\n= Primeiro Capítulo\nConteúdo aqui..."
