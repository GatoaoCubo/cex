id: kc_github_issue_template
kind: knowledge_card
title: GitHub Issue Template
version: 1.0.0
quality: null
pillar: P01
density_score: 1.0
purpose: Standardized template for reporting bugs, requesting features, or asking questions. Includes required fields and
  labels for efficient issue categorization.
template_structure: ''
bug_report: 'Required Fields:

  - Summary of the issue

  - Steps to reproduce

  - Expected vs actual behavior

  - Screenshots/Logs

  - Environment details (OS, browser, etc.)


  Labels: bug, priority, reproducible'
feature_request: 'Required Fields:

  - Proposed feature name

  - Description of the feature

  - Use case scenarios

  - Alternative solutions considered


  Labels: feature, enhancement, discussion'
question: 'Required Fields:

  - Clear question statement

  - Context/Background

  - Relevant code snippets (if applicable)


  Labels: question, support, clarification'
best_practices:
- Use clear, concise language
- Follow the issue type-specific format
- Add relevant labels for quick triage
- Keep descriptions focused on the problem, not solutions
