quick_reference: "base_url: https://api.dev.runwayml.com/v1\nauth: \"Authorization: Bearer RUNWAY_API_SECRET\" header\nmodels:\n\
  \  - gen4_turbo         # Fastest. ~30s for 5s clip. Lower quality.\n  - gen4               # Best quality. ~90s for 5s\
  \ clip.\nrate_limit: 5 concurrent jobs (Standard), 20 concurrent (Enterprise)\noutput_format: mp4 (H.264)\nresolutions:\
  \ [1280x768, 768x1280, 1024x1024]   # landscape, portrait, square\ndurations: [5, 10]  # seconds"
core_endpoints: '| Endpoint | Method | Purpose |

  |----------|--------|---------|

  | `/image_to_video` | POST | Generate video from reference image + prompt |

  | `/text_to_video` | POST | Generate video from text prompt only |

  | `/tasks/{id}` | GET | Poll task status + get output URL |

  | `/tasks/{id}` | DELETE | Cancel in-progress task |'
image_to_video_example_most_common: "import httpx, time, base64\n\nheaders = {\n    \"Authorization\": f\"Bearer {RUNWAY_API_SECRET}\"\
  ,\n    \"Content-Type\": \"application/json\",\n    \"X-Runway-Version\": \"2024-11-06\"\n}\n\n# Encode reference image\n\
  with open(\"product_hero.png\", \"rb\") as f:\n    img_b64 = base64.b64encode(f.read()).decode()\n\n# 1. Submit generation\
  \ job\nresp = httpx.post(f\"{base_url}/image_to_video\", headers=headers, json={\n    \"model\": \"gen4\",\n    \"promptImage\"\
  : f\"data:image/png;base64,{img_b64}\",\n    \"promptText\": \"Camera slowly zooms in, product rotates 45 degrees, soft\
  \ studio lighting, professional commercial\",\n    \"duration\": 10,\n    \"ratio\": \"1280:768\",\n    \"seed\": 42,  \
  \       # Reproducibility. Omit for random.\n    \"watermark\": False   # Paid plans only\n}, timeout=30)\n\ntask_id = resp.json()[\"\
  id\"]\n\n# 2. Poll until complete\nwhile True:\n    status = httpx.get(f\"{base_url}/tasks/{task_id}\", headers=headers).json()\n\
  \    if status[\"status\"] == \"SUCCEEDED\":\n        video_url = status[\"output\"][0]  # Temporary URL, download immediately\n\
  \        break\n    elif status[\"status\"] == \"FAILED\":\n        raise Exception(f\"Generation failed: {status.get('failure',\
  \ 'unknown')}\")\n    time.sleep(10)  # Gen4 takes 60-120s typically\n\n# 3. Download\nvideo = httpx.get(video_url).content\n\
  with open(\"product_clip.mp4\", \"wb\") as f:\n    f.write(video)"
text_to_video_example: "resp = httpx.post(f\"{base_url}/text_to_video\", headers=headers, json={\n    \"model\": \"gen4_turbo\"\
  ,\n    \"promptText\": \"Aerial drone shot of São Paulo skyline at golden hour, cinematic 4K quality\",\n    \"duration\"\
  : 5,\n    \"ratio\": \"1280:768\",\n    \"watermark\": False\n})\ntask_id = resp.json()[\"id\"]\n# Poll same as above"
pricing: '| Duration | Credits | Cost (Standard Plan) |

  |----------|---------|---------------------|

  | 5s gen4_turbo | 25 credits | ~$0.25 |

  | 5s gen4 | 50 credits | ~$0.50 |

  | 10s gen4_turbo | 50 credits | ~$0.50 |

  | 10s gen4 | 100 credits | ~$1.00 |


  Standard plan: $12/mo for 625 credits. Unlimited plan: $28/mo. Enterprise: custom.


  Estimate for content factory: 10 clips/week × 10s gen4 = 1000 credits/week = ~$16/week or Unlimited plan.'
prompt_engineering_tips:
- 'Be cinematic: use camera language — "dolly in", "tracking shot", "crane up", "slow zoom"'
- 'Specify lighting: "golden hour", "studio softbox", "neon rim light"'
- 'Keep motion simple: Gen-4 handles slow camera moves well; fast action causes artifacts'
- 'Image reference dominates: when using image-to-video, the prompt modifies motion/camera, not content'
- 'Negative concepts: describe what you want, not what to avoid. "Static camera" not "no movement"'
gotchas:
- Output URLs expire in 24h. Download immediately after status=SUCCEEDED.
- No audio in output. All generated videos are silent. Combine with ElevenLabs via FFmpeg.
- 10s is the max duration. For longer videos, generate multiple clips and concatenate with FFmpeg.
- 'Image input requirements: JPEG or PNG, max 16MB, minimum 256px on shortest side. Aspect ratio should match requested `ratio`
  or it gets cropped.'
- FAILED tasks still consume credits if they ran partially. Check balance after failures.
- Seed + identical prompt ≠ identical output. Seed improves consistency but generation is not perfectly deterministic.
- 'Rate limit 429: standard plan allows only 5 concurrent jobs. Queue and batch.'
- 'Content moderation: API rejects prompts with violence, NSFW, real people by name. Fails silently — check task status.'
