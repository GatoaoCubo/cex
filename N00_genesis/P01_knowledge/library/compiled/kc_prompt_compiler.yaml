what_it_is: 'A prompt compiler is an artifact that sits at the boundary between human intent and LLM execution. It resolves
  natural language input into structured {kind, pillar, nucleus, verb} tuples before any builder, router, or dispatcher runs.
  It is the first function in every 8F pipeline (F1 CONSTRAIN). The term comes from DSPy (Stanford NLP), which uses "prompt
  compilation" to mean optimizing signatures into efficient LLM prompts. In CEX, the concept is broader: compiling user intent
  into the correct CEX taxonomy action.'
how_it_differs_from_similar_kinds: '| Kind | What it does | When to use instead |

  |------|-------------|-------------------|

  | prompt_compiler (P03) | Resolves WHAT the user wants: {kind, pillar, nucleus, verb} | Always first; before routing or
  dispatching |

  | router (P02) | Routes WHERE: task-to-provider with confidence thresholds | After kind is resolved; for provider selection
  |

  | dispatch_rule (P12) | Dispatches WHO: keyword-to-agent mapping | After nucleus is resolved; for task assignment |

  | prompt_template (P03) | Fills HOW: template with {{variables}} for generation | After intent is resolved; for content
  production |'
the_3_layer_resolution_stack: '| Layer | Industry Term | Domain | CEX 8F Stage | What It Does |

  |-------|-------------|--------|-------------|-------------|

  | L1 Intent Resolution | NLU (Rasa, Dialogflow, Lex) | User input -> structured action | F1 CONSTRAIN | Determines {kind,
  pillar, nucleus} |

  | L2 Query Rewriting | Search/RAG (LlamaIndex, ES) | Fuzzy input -> precise query | F3 INJECT | Optimizes retrieval for
  context |

  | L3 Prompt Optimization | LLM (DSPy compilation) | Intent -> optimized LLM prompt | F6 PRODUCE | Generates best prompt
  for task |


  A prompt_compiler artifact primarily handles L1 but informs L2 and L3.'
key_design_decisions: '| Decision | Rule | Rationale |

  |----------|------|-----------|

  | Bilingual minimum | PT-BR + EN patterns required | CEX user base is bilingual; PT users phrase differently than EN |

  | Coverage floor | >= 120 of 124 kinds mapped | Partial coverage means lost user intents |

  | Table-first density | Tables over prose | LLMs parse tables 3x faster than prose for pattern matching |

  | Boundary notes | Required per kind | "NOT this kind" prevents misrouting between similar kinds |

  | Verb canonicalization | 30+ verbs mapped | Reduces ambiguity: "build", "create", "make" -> single action |

  | Confidence reporting | Required on fallback | User must know when resolution is uncertain |'
industry_references: '| System | Concept | Relationship |

  |--------|---------|-------------|

  | DSPy (Stanford) | Prompt compilation, Signature | Direct inspiration: compile declarations into optimized prompts |

  | Rasa Open Source | Intent classification, NLU pipeline | Same function: text -> structured intent with confidence |

  | Google Dialogflow | Intent matching, Entity extraction | Same function: natural language -> action parameters |

  | Amazon Lex | Intent resolution, Slot filling | Same function: utterance -> intent + slots |

  | LlamaIndex | Query engine, Query rewriting | Related: optimizes retrieval queries (L2 in stack) |

  | Elasticsearch | Query DSL, Analyzers | Related: transforms fuzzy input into precise search (L2) |

  | CEX 8F Pipeline | F1 CONSTRAIN | This IS F1: first function determining what to build |'
architecture_position: "User Input (natural language)\n       |\n       v\n  [prompt_compiler]  <-- F1 CONSTRAIN (this kind)\n\
  \       |\n       v\n  {kind, pillar, nucleus, verb}\n       |\n       +-- F2 BECOME (load builder ISOs)\n       +-- F3\
  \ INJECT (load KCs, examples)\n       +-- F4 REASON (plan approach)\n       +-- F5 CALL (use tools)\n       +-- F6 PRODUCE\
  \ (generate artifact)\n       +-- F7 GOVERN (quality gate)\n       +-- F8 COLLABORATE (save, compile, signal)"
anti_patterns: '| Anti-Pattern | Why It Fails |

  |-------------|-------------|

  | Execute user input literally | Bypasses intent resolution; wrong kind selected |

  | Partial kind coverage | Unmapped kinds fall to fallback; user gets "I don''t understand" |

  | Machine-translated PT patterns | "construir agente" (literal) vs "criar agente" (natural) |

  | No boundary notes | Similar kinds confused: router vs dispatch_rule |

  | Silent fallback | User doesn''t know resolution was uncertain |

  | Hardcoded kind list | kinds_meta.json is the source of truth; list goes stale |'
application_checklist:
- Read kinds_meta.json for current kind inventory (source of truth)
- 'For each kind: author EN patterns, PT patterns, nucleus, verb, boundary'
- Build verb resolution table (>= 30 entries, both languages)
- Define ambiguity protocol (context -> specificity -> boundary -> GDP)
- Define fallback heuristics (TF-IDF -> semantic -> confidence -> ask)
- Set coverage field = actual count; verify coverage == kinds in table
- 'Validate body <= 16384 bytes; quality: null'
