spec: 'topic: Input Intent Resolution

  scope: Converting ambiguous user input to structured system actions

  source: cross-framework (Anthropic, OpenAI, Google, LangChain, DSPy, MCP, NLU literature)

  criticality: high'
definition_industry_standard: 'Intent resolution is the process of interpreting user input to determine what the user wants
  to accomplish, then mapping that desire to a concrete system action with all required parameters filled. It is a superset
  of traditional NLU intent classification -- it includes not just what the user wants, but how to fulfill it within a specific
  system''s capabilities.


  In the LLM agent era, intent resolution replaces rule-based NLU (Dialogflow, LUIS, Rasa) with semantic understanding. The
  LLM itself becomes the intent resolver, but it still needs structured pipelines to ensure consistent, correct resolution.


  | Traditional NLU | LLM-Era Intent Resolution |

  |-----------------|--------------------------|

  | Fixed intent taxonomy (50-200 intents) | Open-ended semantic understanding |

  | Slot extraction via entity recognition | Parameter inference via reasoning |

  | Confidence threshold routing | Tool selection via tool_choice |

  | Fallback to human | Disambiguation via extended thinking |

  | Training data required | Few-shot or zero-shot capable |'
sub_patterns: 'Intent resolution decomposes into 6 sub-patterns. A production system typically chains 3-5 of these:'
1_intent_classification: 'What: Determine which category of action the user wants. How: Tool selection (Anthropic `tool_choice`,
  OpenAI `tool_calls`), agent routing (OpenAI `handoff()`), or explicit classifier. CEX: `router` (P02) maps task-to-nucleus.
  `dispatch_rule` (P12) maps keyword-to-agent.'
2_query_rewriting: 'What: Transform the user''s raw query into a better query for downstream processing. How: LLM-based rewriting,
  HyDE (hypothetical document embeddings), multi-query expansion. Frameworks: LangChain `MultiQueryRetriever`, DSPy `ChainOfThought`,
  Google `retrieval_queries`. CEX: 8F F1 CONSTRAIN + F4 REASON perform implicit query rewriting.'
3_slot_filling: 'What: Extract or infer all required parameters for the resolved action. How: Schema-guided extraction, conversational
  slot filling, default inference. Frameworks: MCP `arguments` in `prompts/get`, LangChain `PromptTemplate.format()`, DSPy
  signature fields. CEX: `prompt_template` {{vars}} + `brand_inject.py` for brand-specific slots.'
4_disambiguation: 'What: Resolve cases where user input matches multiple possible actions. How: Clarifying questions (GDP),
  confidence-based routing, triage agents. Frameworks: OpenAI Agents SDK triage agent pattern, A2A `input-required` state.
  CEX: N07 transmutation protocol + GDP (Guided Decision Protocol) for subjective choices.'
5_input_normalization: 'What: Standardize user input format before processing (language, casing, terminology). How: Preprocessing
  pipelines, term standardization, metaphor resolution. CEX: `spec_metaphor_dictionary.md` maps metaphors to industry terms.
  `cex_8f_motor.py` normalizes intent strings.'
6_context_assembly: 'What: Gather all relevant context needed to fulfill the resolved intent. How: RAG retrieval, memory injection,
  brand context loading, example selection. Frameworks: LangChain `RunnablePassthrough` chains, MCP resource fetching, DSPy
  `Module.forward()`. CEX: 8F F3 INJECT (`cex_crew_runner.py` + `cex_prompt_layers.py` + `cex_memory_select.py`).'
implementation_in_cex_8f_pipeline: "CEX implements intent resolution as a distributed pipeline across 8F steps:\n\n| 8F Step\
  \ | Intent Resolution Role | Tool |\n|---------|----------------------|------|\n| F1 CONSTRAIN | Intent classification +\
  \ kind resolution | `cex_8f_motor.py` (intent parser) |\n| F2 BECOME | Load domain-specific resolver (builder) | `cex_skill_loader.py`\
  \ (13 ISOs) |\n| F3 INJECT | Context assembly (KCs, memory, brand, examples) | `cex_crew_runner.py` + `cex_memory_select.py`\
  \ |\n| F4 REASON | Query rewriting + disambiguation + slot filling | GDP gate for subjective decisions |\n| F5 CALL | Tool\
  \ discovery + pre-execution enrichment | `cex_retriever.py` + `cex_query.py` |\n| F6 PRODUCE | Execute resolved intent with\
  \ full context | Builder produces artifact |\n| F7 GOVERN | Validate resolution was correct (quality gate) | `cex_score.py`\
  \ |\n| F8 COLLABORATE | Persist results + signal completion | `signal_writer.py` |\n\nThe N07 orchestrator adds a meta-layer:\
  \ transmutation (`n07-input-transmutation.md`). Before any 8F pipeline starts, N07 maps user language to CEX taxonomy:\n\
  \nUser: \"quero melhorar os artefatos ruins\"\n  |\n  N07 transmutes:\n  |-- Intent: improve low-quality artifacts\n  |--\
  \ Kind resolution: tool=cex_evolve.py, threshold=quality<9.0\n  |-- Slot filling: mode=heuristic_first, scope=all_pillars\n\
  \  |-- Disambiguation: N/A (clear intent)\n  |\n  Dispatches: cex_evolve.py --sweep --threshold 9.0"
implementation_in_other_frameworks: '| Framework | Intent Resolution Approach | Key Components |

  |-----------|--------------------------|----------------|

  | LangChain | Chain-based: router -> retriever -> rewriter -> executor | `RouterChain`, `MultiQueryRetriever`, `create_tool_calling_agent`
  |

  | LlamaIndex | Query engine pipeline: query -> rewrite -> retrieve -> synthesize | `QueryEngine`, `SubQuestionQueryEngine`,
  `RouterQueryEngine` |

  | DSPy | Declarative: signature defines I/O, optimizer tunes resolution | `Signature`, `Module`, `ChainOfThought`, `Retry`
  |

  | OpenAI Agents SDK | Agent routing: triage agent classifies, hands off to specialist | `Agent(handoffs=[...])`, `Runner.run()`
  |

  | Anthropic (native) | Tool-based: extended thinking reasons, tool_use routes action | `tool_choice`, `extended thinking`,
  `system` prompt engineering |

  | Google Gemini | Grounding-first: search grounds response, function_calling routes | `google_search`, `FunctionDeclaration`,
  `function_calling_config` |

  | MCP | Protocol-level: server exposes tools/resources, host resolves | `tools/list` -> `tools/call`, `prompts/get` with
  arguments |

  | Rasa / Dialogflow | Traditional NLU: intent + entity extraction -> story/flow routing | `IntentClassifier`, `EntityExtractor`,
  `FormPolicy` |'
anti_patterns: '| Anti-Pattern | Description | Consequence | Fix |

  |-------------|-------------|-------------|-----|

  | Literal execution | Executing user input as-is without interpretation | Wrong action, wrong scope, wrong format | Always
  run through classification + slot filling |

  | Over-interpretation | Adding intent the user didn''t express | Unwanted features, scope creep, wasted compute | Disambiguate
  via clarifying questions (GDP) |

  | No normalization | Processing raw input without standardizing terminology | Same intent triggers different actions depending
  on wording | Maintain metaphor dictionary + term mapping |

  | Single-pass resolution | Resolving intent in one step without verification | Misclassifications propagate silently | Add
  quality gate (F7) to verify resolution accuracy |

  | Hard-coded routing | Mapping inputs to actions via if/else instead of semantic understanding | Brittle, fails on novel
  input, high maintenance | Use LLM-based routing or learned classifiers |

  | Ignoring ambiguity | Picking first match when multiple intents are equally likely | 50% wrong actions, user frustration
  | Implement disambiguation step (clarifying questions) |

  | Context starvation | Resolving intent without loading relevant context | Correct intent but wrong execution (missing brand
  voice, wrong style) | Always run context assembly (F3) before execution (F6) |'
measurement: 'How to know if intent resolution is working:


  | Metric | What It Measures | Target | How to Compute |

  |--------|-----------------|--------|----------------|

  | Resolution accuracy | % of user inputs correctly mapped to intended action | > 95% | Compare resolved action vs user''s
  actual intent (manual eval or LLM judge) |

  | Slot fill rate | % of required parameters correctly filled | > 90% | Count filled vs required slots across resolved intents
  |

  | Disambiguation rate | % of ambiguous inputs that trigger clarification | 100% of truly ambiguous | Monitor GDP trigger
  rate vs ambiguity detection |

  | First-try success | % of resolved intents that produce acceptable output on first attempt | > 80% | Track quality gate
  pass rate at F7 |

  | Fallback rate | % of inputs that fall through to default/error handling | < 5% | Count inputs that reach "unknown intent"
  state |

  | Resolution latency | Time from input to resolved intent (before execution) | < 2s for interactive, < 30s for batch | Measure
  F1-F4 pipeline duration |

  | User correction rate | % of outputs where user says "no, I meant..." | < 10% | Track explicit user corrections post-output
  |'
cross_reference_cex_tools_for_intent_resolution: '| Tool | Role in Intent Resolution |

  |------|--------------------------|

  | `cex_8f_motor.py` | Intent parser + kind classifier (F1) |

  | `cex_query.py` | TF-IDF builder discovery -- finds which builder matches intent |

  | `cex_retriever.py` | Semantic similarity search for context assembly |

  | `cex_memory_select.py` | Memory injection based on intent keywords |

  | `cex_crew_runner.py` | Prompt composer -- assembles resolved intent into LLM prompt |

  | `cex_gdp.py` | GDP enforcement -- triggers disambiguation for subjective intents |

  | `cex_router.py` | Multi-provider routing based on resolved intent domain |

  | `spec_metaphor_dictionary.md` | Term normalization -- maps user metaphors to system terms |

  | `kinds_meta.json` | Kind registry -- maps intent to artifact type (123 kinds) |'
related_concepts: '| Concept | Relationship to Intent Resolution |

  |---------|----------------------------------|

  | RAG (Retrieval-Augmented Generation) | Context assembly is the R in RAG -- intent resolution determines WHAT to retrieve
  |

  | Prompt engineering | Intent resolution determines which prompt to use and how to fill it |

  | Agent routing | Intent classification determines which agent handles the request |

  | Tool use | Intent resolution maps desire to specific tool invocations |

  | GDP (Guided Decision Protocol) | Disambiguation protocol for subjective intents |

  | 8F pipeline | CEX''s implementation of the full intent resolution -> execution -> validation loop |'
