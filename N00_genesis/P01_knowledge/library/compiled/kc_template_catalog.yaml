4_variable_dependency_graph: ''
resolution_chain: "Template file (tpl_*.md)\n  └─ {{VARIABLE}} in body text\n       └─ brand_inject.py reads config\n    \
  \        ├─ .cex/brand/brand_config.yaml    → BRAND_* (44 vars)\n            ├─ .cex/instance/instance_config.yaml → CRM/pipeline/infra\
  \ (23 vars)  [proposed]\n            └─ fallback → {{VARIABLE}} stays as placeholder (unfilled)"
layer_1_brand_variables_brand_config_yaml_44_existing: 'These are identity variables. Already fully documented in `kc_brand_variable_audit.md`.


  | Group | Examples | Config Path |

  |-------|----------|-------------|

  | Identity | BRAND_NAME, BRAND_TAGLINE, BRAND_MISSION | `brand_config.yaml → identity.*` |

  | Audience | BRAND_ICP, BRAND_ICP_LOCATION, BRAND_ICP_VALUES | `brand_config.yaml → audience.*` |

  | Voice | BRAND_PERSONALITY, BRAND_TONE | `brand_config.yaml → voice.*` |

  | Visual | BRAND_COLORS., BRAND_LOGO_URL | `brand_config.yaml → visual.` |

  | Operations | BRAND_REGION, BRAND_CHANNELS, BRAND_COMPETITORS | `brand_config.yaml → operations.*` |'
layer_2_instance_variables_instance_config_yaml_23_new_2_discovered: 'These are operational variables, specific to CRM/research
  workflows.


  | Section | Variables | Config Path | Depends On |

  |---------|-----------|-------------|------------|

  | crm_pipeline | INDUSTRY, TARGET_COUNT, BATCH_SOURCES, DIRECTORY_SOURCES, SEARCH_QUERIES, CATEGORIES, CITIES, RADIUS_KM,
  HASHTAGS, MARKETPLACES, CNAE_CODES, LEGAL_SOURCES | `instance_config.yaml → crm_pipeline.*` | BRAND_REGION (derives CITIES),
  BRAND_CHANNELS (derives PLATFORMS) |

  | dashboard | MAP_CENTER_LAT, MAP_CENTER_LNG, MAP_ZOOM, CRM_DATA_SOURCE | `instance_config.yaml → dashboard.*` | BRAND_HQ
  (derives lat/lng via geocoding) |

  | infrastructure | DB_PROVIDER, TABLES, MAP_PROVIDER, AUTH_METHOD | `instance_config.yaml → infrastructure.*` | Independent
  |

  | research | SEARCH_PROVIDERS, MERGE_STRATEGY, DEDUP_FIELDS | `instance_config.yaml → research.*` | Independent |

  | discovered | BRAND_EMAIL, BRAND_DOMAIN | `brand_config.yaml` (proposed extension) | Derivable from existing LOGO_URL |'
layer_3_structural_variables_no_injection_pattern_only: '| Variable Pattern | Used In | Resolution |

  |------------------|---------|------------|

  | PIPELINE_NAME | CRM templates | User chooses at mission time |

  | OUTPUT_FILE | Batch templates | Auto-generated: `crm_batch_{letter}_{type}.json` |

  | SIGNAL_TAG | Batch templates | Auto-generated: `batch_{letter}_complete` |

  | MISSION, NUCLEUS, PHASE | Learning records | Runtime context (filled by `cex_mission_runner.py`) |

  | STAGES, BATCHES, FINAL_STATS | Workflow templates | Composite — built from pipeline results |'
variable_cross_dependency_map: 'BRAND_REGION ──→ REGION ──→ CITIES (expansion rings)

  BRAND_CHANNELS ──→ PLATFORMS (social subset)

  BRAND_HQ ──→ MAP_CENTER_LAT, MAP_CENTER_LNG (geocoding)

  INDUSTRY ──→ CATEGORIES, SEARCH_QUERIES, HASHTAGS (domain-specific)

  TARGET_COUNT ──→ BATCH_SOURCES (determines which batches to run)


  ---'
5_usage_flow_how_init_triggers_template_resolution: "User runs /init\n│\n├── Step 1: Answer ~6 questions\n│   ├── Brand name,\
  \ domain, audience, tone, language, tagline\n│   └── (Optional) CRM pipeline params: industry, target count, region\n│\n\
  ├── Step 2: Config files created\n│   ├── .cex/brand/brand_config.yaml  ← BRAND_* filled\n│   └── .cex/instance/instance_config.yaml\
  \  ← CRM/pipeline vars filled (if applicable)\n│\n├── Step 3: brand_inject.py resolves templates\n│   ├── Scans all tpl_*.md\
  \ files in P*/templates/\n│   ├── Replaces {{VARIABLE}} with config values\n│   └── Writes resolved artifacts to output\
  \ paths\n│\n├── Step 4: git checkout -b <brand-slug>\n│   ├── Branch created from main\n│   └── Templates remain in main\
  \ (never touched)\n│\n├── Step 5: Resolved artifacts created in branch\n│   ├── tpl_crm_mission_plan.md → crm_mission/MISSION_PLAN.md\n\
  │   ├── tpl_crm_dashboard.html  → N06_commercial/P05_output/dashboard.html\n│   └── (each template → concrete artifact with\
  \ brand data)\n│\n└── Step 6: N07 dispatches first mission\n    ├── Research pipeline runs with brand context\n    ├── CRM\
  \ populates with real contacts\n    └── Dashboard shows real data"
template_lifecycle: 'ARCHETYPE (main)          INSTANCE (brand branch)         PRIVATE (never in main)

  ────────────────          ─────────────────────           ──────────────────────

  tpl_crm_mission_plan.md → MISSION_PLAN.md                crm_batch_*.json

  tpl_crm_dashboard.html  → dashboard.html                 .env, API keys

  tpl_research_batch_*.md → batch_a.md, batch_b.md...      crm_enrich_*.json

  brand_config_template   → brand_config.yaml (filled)     canva_token.json


  ---'
