id: kc_system_prompt
kind: knowledge_card
title: System Prompt Engineering
version: 1.0.0
quality: 8.8
pillar: P01
language: English
density_score: 0.99
identity: 'A system prompt defines the AI''s role, constraints, and behavior during task execution. It establishes:

  - Core identity (e.g., "You are a technical writer")

  - Operational boundaries

  - Decision-making framework'
constraints: 'Common system prompt constraints include:

  - Role definition: "You are a cybersecurity analyst"

  - Task scope: "Analyze this network traffic for threats"

  - Format requirements: "Output in JSON with severity levels"'
output_format: "Use structured formats for clarity:\n{\n  \"analysis\": \"Threat detected in port 22\",\n  \"severity\": \"\
  high\",\n  \"recommendation\": \"Enable firewall rule 4567\"\n}"
tone: 'Adapt tone based on context:

  - Professional: "The system detected an anomaly requiring immediate attention"

  - Conversational: "Hey, I noticed something unusual on port 22"

  - Technical: "SSH brute force attempt detected on 19.2.168.1.10"'
comparison_of_prompt_types: '| Prompt Type        | Purpose                  | Structure Complexity | Use Case                     |
  Example                                                                 |

  |--------------------|--------------------------|----------------------|------------------------------|-------------------------------------------------------------------------|

  | Technical Writing  | Documentation creation   | High                 | API specs, user manuals      | "Write a REST API
  endpoint specification with OpenAPI 3.0 format"       |

  | Code Generation    | Software development     | Medium               | Algorithm implementation     | "Generate Python
  code for a Fibonacci sequence calculator with tests"   |

  | Analysis Report    | Data interpretation      | High                 | Security audits, performance | "Analyze server
  logs for SQL injection attempts and output JSON report" |

  | Customer Support   | User assistance          | Low                  | Helpdesk, FAQs               | "Explain how to
  reset a forgotten password in 3 steps"                  |

  | Data Analysis      | Pattern recognition      | Medium               | Business intelligence        | "Identify trends
  in sales data from Q1 2023 and output a markdown chart"|'
examples: "1. Technical Documentation:  \n   \"Write a technical specification for a REST API endpoint\"\n\n2. Code Generation:\
  \  \n   \"Generate Python code for a Fibonacci sequence calculator with unit tests\"\n\n3. Analysis Report:  \n   \"Analyze\
  \ this server log for performance bottlenecks\"\n\n4. Customer Support:  \n   \"Explain how to troubleshoot a failed login\
  \ attempt on Windows 10\"\n\n5. Data Analysis:  \n   \"Identify correlations between user engagement and feature usage in\
  \ this dataset\""
anti_patterns: 'Avoid these common mistakes:

  - Vagueness: "Help me with something" ❌

  - Overly broad instructions: "Do whatever you need to fix this" ❌

  - Lack of format: "Just tell me what''s wrong" ❌

  - Ambiguous constraints: "Be helpful" ❌

  - Missing context: "Analyze this" ❌'
template_structure: '# [Task Title]


  ## Role

  [Define AI''s role]


  ## Constraints

  - [Specific limitation 1]

  - [Specific limitation 2]


  ## Output Format

  [Specify structure and requirements]


  ## Example

  [Show expected output format]'
boundary: This artifact defines system prompt engineering as the practice of crafting structured instructions to guide AI
  behavior. It is not a general guide for AI training, user-facing prompts, or natural language processing fundamentals.
related_kinds:
- 'Prompt Templates: Provide reusable structures for system prompts'
