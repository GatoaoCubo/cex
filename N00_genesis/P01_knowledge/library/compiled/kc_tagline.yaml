definition: 'A tagline is a short, memorable phrase (3-15 words) that captures a brand''s essence, value proposition, or emotional
  promise. Used across: hero sections, social bios, ad headlines, email subjects, pitch decks.'
builder: '`tagline-builder` (13 ISOs) — Pillar P03'
frameworks: '| Framework | Pattern | Example |

  |-----------|---------|---------|

  | AIDA | Attention→Interest→Desire→Action | "Stop guessing. Start knowing." |

  | PAS | Problem→Agitate→Solution | "Tired of X? Y changes everything." |

  | Before/After | Old state → New state | "From chaos to clarity." |

  | Question | Provocative question | "What if your code tested itself?" |

  | Command | Direct imperative | "Just Do It." |

  | Metaphor | Analogy-based | "The Swiss Army knife of AI." |'
quality_tests:
- 'Billboard test: Understood in 3 seconds at 60mph'
- 'Competitor swap test: Could NOT be used by a rival'
- 'Memory test: Recalled 24h later without notes'
