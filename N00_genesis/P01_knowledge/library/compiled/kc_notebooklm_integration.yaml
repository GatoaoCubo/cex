quick_reference: "service: Google NotebookLM\nurl: https://notebooklm.google.com\nauth: Google Account (free with Google One\
  \ AI Premium for advanced features)\nmcp_server: notebooklm-mcp\nmcp_tools:\n  - add_notebook        # Create new notebook\
  \ from sources\n  - select_notebook     # Switch active notebook\n  - ask_question        # Query notebook content\n  -\
  \ get_notebook        # Get notebook details\n  - list_notebooks      # List all notebooks\n  - search_notebooks    # Search\
  \ across notebooks\n  - remove_notebook     # Delete notebook\n  - list_sessions       # Active browser sessions\n  - get_library_stats\
  \   # Usage statistics\nmax_sources_per_notebook: 50\nmax_source_size: 500,000 words per source (or 200MB file)\nsupported_inputs:\
  \ [Google Docs, Google Slides, PDF, Web URL, plain text, YouTube URL, audio file]"
capabilities_content_outputs: '| Output | What It Generates | Duration/Size | Best For |

  |--------|-------------------|---------------|----------|

  | Audio Overview | 2-speaker conversational podcast discussing your docs | 5-30 min | Repurposing long content into podcast
  format |

  | Video Overview | Visual companion to Audio Overview with key points | 5-30 min | YouTube/social video from existing docs
  |

  | Study Guide | Structured summary with key concepts, definitions | 2-5 pages | Course companions, onboarding docs |

  | Quiz | Multiple choice + short answer questions | 10-20 questions | Testing comprehension, course validation |

  | Flashcards | Front/back pairs for key terms and concepts | 20-50 cards | Spaced repetition, learning aids |

  | FAQ | Common questions + answers from source material | 10-30 Q&A pairs | Help centers, product pages |

  | Timeline | Chronological events extracted from sources | Variable | Historical content, project histories |

  | Briefing Doc | Executive summary of all sources | 1-3 pages | Quick decision-making briefs |

  | Table of Contents | Structural outline of source material | 1 page | Navigation aid for large docs |'
workflow_feed_documents_generate_content: ''
step_1_create_notebook_with_sources: "Via MCP (programmatic):\nTool: add_notebook\nInput: {\n  \"name\": \"AI Guide for Creators\"\
  ,\n  \"sources\": [\n    {\"type\": \"url\", \"value\": \"https://docs.google.com/document/d/abc123\"},\n    {\"type\":\
  \ \"url\", \"value\": \"https://example.com/ai-workflow-guide\"},\n    {\"type\": \"text\", \"value\": \"Additional context:\
  \ this is for Brazilian creators...\"}\n  ]\n}\n\nVia UI (manual):\n1. Go to notebooklm.google.com → New Notebook\n2. Upload:\
  \ PDFs, paste URLs, or link Google Docs\n3. Wait for processing (30s-5min depending on volume)"
step_2_generate_audio_overview: 'Via UI: Click "Audio Overview" → "Generate" → wait 2-5 min → download MP3


  The Audio Overview creates a natural 2-speaker podcast where AI hosts discuss your documents. They explain concepts, ask
  each other questions, and make the content engaging.


  Customization options:

  - Focus on specific sources (select which sources to include)

  - Custom instructions: "Focus on practical applications, not theory"

  - Target audience: "Explain for beginners" or "Keep it technical"

  - Language: auto-detects from source material (PT-BR works natively)'
step_3_generate_study_materials: 'Via UI: Notebook Guide panel → select output type → Generate Each output can be regenerated
  with different focus areas. Combine multiple outputs for a complete content package.'
content_factory_integration_pattern: "Source Documents (ebooks, blog posts, guides)\n    │\n    ▼\nNotebookLM Notebook\n \
  \   │\n    ├── Audio Overview ──→ YouTube podcast episode\n    │                       (combine with Canva thumbnail)\n\
  \    │\n    ├── Video Overview ──→ YouTube/social video\n    │\n    ├── Study Guide ───→ PDF via Typst (course companion)\n\
  \    │\n    ├── Quiz ──────────→ Course module assessment\n    │\n    ├── Flashcards ────→ Anki deck / app integration\n\
  \    │\n    ├── FAQ ───────────→ Website help section\n    │\n    └── Briefing Doc ──→ Email newsletter / social carousel"
