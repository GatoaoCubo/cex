  \    notebook_id: \"940fd258-847f-47c1-b7e6-caca7b730681\"\n    name: \"CEX Meta Knowledge\"\n    sources: [{path: \"kc_8f_pipeline.md\"\
  , uploaded: 2026-04-06}]\n    source_count: 2\n    last_sync: 2026-04-06\n    status: active\n  brand:\n    notebook_id:\
  \ null   # created on first upload\n    status: pending\n  integration:\n    notebook_id: null\n    status: pending\n  kind:\n\
  \    notebook_id: null   # may need split (115 KCs > 50 source limit)\n    status: pending"
