troubleshooting: 'Problems encountered during PoC (2026-04-06) and their solutions:


  | Problem | Cause | Solution |

  |---------|-------|---------|

  | NotebookLM has no REST API | Google hasn''t launched one | Browser automation: Playwright for deterministic actions, Chrome
  MCP for AI-driven navigation |

  | Auth expires between sessions | Google session cookies (~14d TTL) | Pre-flight auth check + `--reauth` subcommand + MCP
  `re_auth` tool |

  | Playwright can''t use system Chrome profile | Profile lock when Chrome is running | Extract cookies from MCP `state.json`,
  inject into Playwright''s own Chromium |

  | `mcpclaude-in-chrome*` tools missing | Session started without `--chrome` flag | Spawn clone: `claude --chrome --dangerously-skip-permissions
  -p "task"` |

  | Clone hangs asking permission | `-p` is non-interactive | Add `--allow-dangerously-skip-permissions --dangerously-skip-permissions`
  |

  | Material overlay blocks Playwright click | Angular CDK overlay pane intercepts events | Use `force=True` on Playwright
  clicks or target `.cdk-overlay-pane` selectors |

  | UI in Portuguese | Google account locale is PT-BR | Selectors use PT-BR labels: "Criar novo", "Texto copiado", "Inserir",
  "Estúdio" |

  | Source limit 50 per notebook | NotebookLM hard limit | Monitor count, warn at 45, create spillover notebook for `kind`
  domain |

  | Audio generation slow (2-10 min) | Gemini processing time | Async polling every 30s, 15-minute timeout |

  | Generated content non-deterministic | LLM nature | Save good outputs immediately; regenerate with custom instructions
  if quality is low |'
cookie_path: '%LOCALAPPDATA%\notebooklm-mcp\Data\browser_state\state.json


  Essential Google cookies: `SID`, `HSID`, `SSID`, `APISID`, `SAPISID`. If any are expired or missing, re-auth is required.'
