quick_reference: "binary: ffmpeg\ninstall: winget install Gyan.FFmpeg  # Windows\nversion_check: ffmpeg -version\nglobal_flags:\n\
  \  -y           # Overwrite output without asking\n  -hide_banner # Suppress version/config info\n  -loglevel warning  #\
  \ Only show warnings+errors\nhw_accel: -hwaccel cuda  # NVIDIA GPU acceleration (optional)"
recipe_1_concatenate_video_clips: "Combine multiple Runway-generated clips into one continuous video.\n\n# 1. Create file\
  \ list\ncat > concat_list.txt << 'EOF'\nfile 'clip_01.mp4'\nfile 'clip_02.mp4'\nfile 'clip_03.mp4'\nEOF\n\n# 2. Concatenate\
  \ (same codec/resolution — use demuxer, fastest)\nffmpeg -y -f concat -safe 0 -i concat_list.txt -c copy output.mp4\n\n\
  # 3. If clips have different resolutions/codecs — re-encode:\nffmpeg -y -f concat -safe 0 -i concat_list.txt \\\n  -vf \"\
  scale=1920:1080:force_original_aspect_ratio=decrease,pad=1920:1080:(ow-iw)/2:(oh-ih)/2\" \\\n  -c:v libx264 -preset medium\
  \ -crf 18 -c:a aac -b:a 192k output.mp4"
recipe_2_add_audio_track_to_silent_video: "Combine Runway video (silent) + ElevenLabs narration.\n\n# Replace audio entirely\n\
  ffmpeg -y -i video.mp4 -i narration.mp3 \\\n  -c:v copy -c:a aac -b:a 192k \\\n  -map 0:v:0 -map 1:a:0 \\\n  -shortest output.mp4\n\
  \n# Mix background music + narration (music at 20% volume)\nffmpeg -y -i video.mp4 -i narration.mp3 -i bgm.mp3 \\\n  -filter_complex\
  \ \"[1:a]volume=1.0[narr];[2:a]volume=0.2[bgm];[narr][bgm]amix=inputs=2:duration=first[aout]\" \\\n  -map 0:v:0 -map \"\
  [aout]\" \\\n  -c:v copy -c:a aac -b:a 192k \\\n  -shortest output.mp4"
recipe_3_burn_srt_subtitles: "# Hardcode subtitles (burned into video pixels — no player support needed)\nffmpeg -y -i video.mp4\
  \ \\\n  -vf \"subtitles=captions.srt:force_style='FontName=Arial,FontSize=24,PrimaryColour=&HFFFFFF,OutlineColour=&H000000,Outline=2,MarginV=30'\"\
  \ \\\n  -c:v libx264 -preset medium -crf 18 -c:a copy output.mp4\n\n# Soft subtitles (separate track — player can toggle)\n\
  ffmpeg -y -i video.mp4 -i captions.srt \\\n  -c:v copy -c:a copy -c:s mov_text \\\n  -map 0:v -map 0:a -map 1:s output.mp4"
recipe_4_generate_thumbnail_from_video: "# Single frame at timestamp\nffmpeg -y -i video.mp4 -ss 00:00:03 -frames:v 1 -q:v\
  \ 2 thumbnail.jpg\n\n# Best frame from first 10 seconds (highest scene change score)\nffmpeg -y -i video.mp4 -vf \"select='gt(scene,0.3)',scale=1280:720\"\
  \ \\\n  -frames:v 1 -vsync vfr thumbnail.jpg\n\n# Grid of thumbnails (4x4)\nffmpeg -y -i video.mp4 \\\n  -vf \"fps=1/15,scale=320:180,tile=4x4\"\
  \ \\\n  -frames:v 1 contact_sheet.jpg"
recipe_5_format_conversion: "# MP4 → WebM (for web embedding)\nffmpeg -y -i input.mp4 -c:v libvpx-vp9 -crf 30 -b:v 0 -c:a\
  \ libopus output.webm\n\n# MP4 → GIF (for social/preview — max 15s, 480px wide)\nffmpeg -y -i input.mp4 -t 15 \\\n  -vf\
  \ \"fps=12,scale=480:-1:flags=lanczos,split[s0][s1];[s0]palettegen=max_colors=128[p];[s1][p]paletteuse=dither=bayer\" \\\
  \n  output.gif\n\n# WAV/FLAC → MP3 (narration post-processing)\nffmpeg -y -i narration.wav -c:a libmp3lame -b:a 192k -ar\
  \ 44100 narration.mp3\n\n# Extract audio from video\nffmpeg -y -i video.mp4 -vn -c:a libmp3lame -b:a 192k audio_only.mp3"
recipe_6_trim_cut: "# Cut segment (no re-encode — instant, but may have keyframe imprecision)\nffmpeg -y -ss 00:01:30 -to\
  \ 00:02:45 -i input.mp4 -c copy segment.mp4\n\n# Precise cut (re-encode for frame-accurate start)\nffmpeg -y -i input.mp4\
  \ -ss 00:01:30 -to 00:02:45 \\\n  -c:v libx264 -preset fast -crf 18 -c:a aac segment.mp4"
recipe_7_overlay_image_on_video_watermark_logo: "ffmpeg -y -i video.mp4 -i logo.png \\\n  -filter_complex \"overlay=W-w-20:H-h-20:enable='between(t,0,999)'\"\
  \ \\\n  -c:v libx264 -preset medium -crf 18 -c:a copy output.mp4\n# Position: W-w-20 = 20px from right edge, H-h-20 = 20px\
  \ from bottom"
recipe_8_speed_up_slow_down: "# 2x speed (with audio pitch correction)\nffmpeg -y -i input.mp4 \\\n  -filter_complex \"[0:v]setpts=0.5*PTS[v];[0:a]atempo=2.0[a]\"\
  \ \\\n  -map \"[v]\" -map \"[a]\" output.mp4\n\n# 0.5x slow motion (no audio — Runway clips are silent anyway)\nffmpeg -y\
  \ -i input.mp4 -filter:v \"setpts=2.0*PTS\" -an output.mp4"
gotchas:
- '`-ss` BEFORE `-i` = fast seek (stream copy OK). AFTER `-i` = slow but frame-accurate. For precise cuts, put `-ss` after
  `-i` and re-encode.'
- Concat demuxer requires identical codecs/resolutions. Mismatched clips need re-encode (recipe 1 option 3).
- 'Windows paths need escaping in filter strings. Use forward slashes or double backslashes: `subtitles=C\\:/path/to/srt`.'
- '`-shortest` is essential when mixing audio+video of different lengths. Without it, FFmpeg continues until the longest stream
  ends.'
- CRF 18 ≈ visually lossless. CRF 23 = default (good quality, smaller). CRF 28+ = noticeable artifacts. Never go below 15
  for distribution.
- GPU acceleration (`-hwaccel cuda`) only helps decode. Encoding with NVENC (`-c:v h264_nvenc`) is faster but larger files
  than libx264.
- GIF recipe uses palettegen for high quality. Without it, GIFs look terrible (256 color dithering).
