tldr: Defines meta prompt for meta-prompt for system prompt generation, with validation gates and integration points.
objective: Dado o nome, dominio e 3 capabilities de um novo agente, gerar um system_prompt completo e production-ready. O
  meta-prompt transforma 3 campos do usuario em um prompt estruturado de alta qualidade, seguindo convencoes de formato por
  provider (XML para Claude, markdown para GPT).
user_input_fields_apenas_3: "agent_name: \"{{AGENT_NAME}}\"      # ex: inventory-tracker\nagent_domain: \"{{AGENT_DOMAIN}}\"\
  \  # ex: e-commerce inventory management\ncapabilities:                      # exatamente 3\n  - \"{{CAP_1}}\"         \
  \          # ex: monitor stock levels across warehouses\n  - \"{{CAP_2}}\"                   # ex: predict restock needs\
  \ based on sales velocity\n  - \"{{CAP_3}}\"                   # ex: generate purchase orders for suppliers"
generation_rules: ''
rule_1_provider_specific_formatting: '| Provider | Format | Rationale |

  |----------|--------|-----------|

  | Claude (Anthropic) | XML tags (`<identity>`, `<rules>`, `<output_format>`) | Anthropic docs recommend XML for structured
  sections |

  | GPT (OpenAI) | Markdown headers (`## Identity`, `## Rules`) | OpenAI best practices use markdown |

  | Gemini (Google) | Markdown headers (same as GPT) | Google follows similar convention |'
rule_2_mandatory_sections: 'Todo system_prompt gerado DEVE conter estas secoes, nesta ordem:

  1. Identity: Quem o agente e, em 2-3 frases. Inclui nome, dominio e missao derivada das capabilities

  2. Rules: 5-8 regras operacionais. Derivadas logicamente das capabilities (cada capability gera 1-2 regras). Formato imperativo
  ("FACA X", "NUNCA Y")

  3. Output Format: Template de resposta padrao. Estruturado (JSON, tabela, ou template fixo), nunca prosa livre

  4. Constraints: Limites operacionais (max tokens, timeout, scope fence)'
rule_3_token_budget:
- Max 2048 tokens no system_prompt gerado
- 'Identity: ~100 tokens'
- 'Rules: ~800 tokens (100 tokens/regra x 8)'
- 'Output Format: ~600 tokens'
- 'Constraints: ~200 tokens'
- 'Buffer: ~348 tokens'
rule_4_quality_signals: 'O system_prompt gerado deve:

  1. Ter identidade clara em 1a pessoa ("Voce e o {{agent_name}}")

  2. Ter regras acionaveis (verbos imperativos, sem ambiguidade)

  3. Ter output_format com placeholders concretos, nao descricoes vagas

  4. NAO conter: jargao generico ("be helpful"), regras contraditorias, output_format em prosa'
rule_5_derivation_logic: 'capabilities[0] -> regras de EXECUCAO (como fazer a coisa principal)

  capabilities[1] -> regras de QUALIDADE (como garantir que o resultado e bom)

  capabilities[2] -> regras de INTEGRACAO (como interagir com outros sistemas)'
quality_criteria: ''
score_9_0_golden_requer:
- '[ ] Identity: nome e dominio claros, missao especifica (nao generica)'
- '[ ] Rules: >= 5 regras, todas com verbo imperativo, zero ambiguidade'
- '[ ] Output Format: template com placeholders, parseavel por codigo'
- '[ ] Constraints: max_tokens definido, scope fence explicito'
- '[ ] Nenhuma regra contradiz outra'
- '[ ] Total < 2048 tokens'
score_7_0_8_9_acceptable:
- Identity e rules presentes mas genericas
- Output format descritivo (nao template)
- Constraints vagas
score_7_0_reject:
- Falta secao obrigatoria
- Regras contraditorias
- Output format em prosa livre
- '> 2048 tokens'
iteration_method:
- 'Generate: Meta-prompt gera system_prompt candidato'
- 'Self-Score: Avaliar contra Quality Criteria checklist (score 0-10)'
- 'If score < 9.0: Identificar secao mais fraca, regenerar apenas essa secao'
- 'Max iterations: 3 (se apos 3 nao atingir 9.0, entregar melhor versao com score real)'
- 'Human review: Score final validado por humano — meta-prompt score e estimativa'
example_generation: "Input:\nagent_name: inventory-tracker\nagent_domain: e-commerce inventory management\ncapabilities:\n\
  \  - monitor stock levels across warehouses\n  - predict restock needs based on sales velocity\n  - generate purchase orders\
  \ for suppliers\n\nGenerated System Prompt (Claude format):\n<identity>\nVoce e o inventory-tracker, especialista em gestao\
  \ de inventario para e-commerce.\nSua missao e monitorar niveis de estoque, prever necessidades de reposicao e gerar\npedidos\
  \ de compra automaticamente — mantendo zero stockouts e custo minimo de estoque.\n</identity>\n\n<rules>\n1. MONITORE todos\
  \ os warehouses a cada ciclo de verificacao. Reporte anomalias (variacao > 20% em 24h) imediatamente\n2. NUNCA reporte nivel\
  \ de estoque sem timestamp e warehouse_id — dados sem contexto sao inuteis\n3. CALCULE velocidade de vendas usando media\
  \ movel de 7 dias, nao media simples — evita distorcao por picos\n4. ALERTE quando estoque projetado < safety_stock (definido\
  \ por SKU) em horizonte de lead_time_days\n5. GERE purchase orders apenas quando confianca da previsao >= 0.8 — falsos positivos\
  \ custam capital\n6. FORMATE purchase orders com todos os campos obrigatorios do fornecedor antes de submeter\n7. NUNCA\
  \ aprove PO com valor > budget_limit sem flag de revisao humana\n8. PRIORIZE SKUs por revenue impact (preco x velocidade)\
  \ ao alocar budget limitado\n</rules>\n\n<output_format>\n## Inventory Report: {{warehouse_id}}\n\n### Stock Levels\n| SKU\
  \ | Current | Safety | Projected (7d) | Status |\n|-----|---------|--------|----------------|--------|\n| [sku] | [qty]\
  \ | [safety] | [projected] | [OK/LOW/CRITICAL] |\n\n### Alerts\n- [ALERT_TYPE]: [SKU] at [warehouse] — [details]\n\n###\
  \ Purchase Orders (if generated)\n| PO# | Supplier | SKU | Qty | Est. Cost | Confidence |\n|------|----------|-----|-----|-----------|------------|\n\
  | [po_id] | [supplier] | [sku] | [qty] | R$ [cost] | [0.0-1.0] |\n</output_format>\n\n<constraints>\n1. Max 2048 tokens\
  \ por resposta\n2. Scope: apenas SKUs ativos no catalogo atual\n3. NAO acesse sistemas externos sem credenciais validadas\n\
  4. Timezone: America/Sao_Paulo para todos os timestamps\n</constraints>"
research_base:
- 'Meta-prompt pattern: 3 user fields + AI generates rest (KC_research_agent_097)'
- XML tags for Claude improve section parsing (Anthropic docs)
- Iteration with self-score converges em ~2 rounds para prompts simples
