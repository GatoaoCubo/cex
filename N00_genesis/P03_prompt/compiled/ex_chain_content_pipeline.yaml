id: p03_ch_content_pipeline
kind: chain
pillar: P03
title: Content Pipeline Chain (Research to Publish)
steps: ''
flow: research -> draft -> review -> publish
quality: 9.0
purpose: 'Pipeline de 4 etapas para producao de conteudo de marketing: pesquisa de mercado, rascunho do conteudo, revisao
  de qualidade e formatacao para publicacao. Cada step recebe o output do anterior via data contract explicito. Se um step
  falhar, retry com fallback model antes de abortar.'
step_1_research: "Modelo recomendado: sonnet (rapido, bom para sintese)\nFallback: haiku (se sonnet indisponivel ou timeout\
  \ > 30s)\n\nInput Schema:\n{\n  \"type\": \"object\",\n  \"properties\": {\n    \"topic\": {\"type\": \"string\", \"description\"\
  : \"Assunto principal do conteudo\"},\n    \"target_audience\": {\"type\": \"string\", \"description\": \"Publico-alvo (ex:\
  \ empreendedores BR 25-45)\"},\n    \"content_type\": {\"type\": \"string\", \"enum\": [\"blog_post\", \"social_media\"\
  , \"email\", \"ad_copy\"]},\n    \"keywords\": {\"type\": \"array\", \"items\": {\"type\": \"string\"}, \"minItems\": 3,\
  \ \"maxItems\": 10}\n  },\n  \"required\": [\"topic\", \"target_audience\", \"content_type\"]\n}\n\nOutput Schema:\n{\n\
  \  \"type\": \"object\",\n  \"properties\": {\n    \"market_context\": {\"type\": \"string\", \"maxLength\": 500},\n   \
  \ \"competitor_angles\": {\"type\": \"array\", \"items\": {\"type\": \"string\"}, \"maxItems\": 5},\n    \"key_insights\"\
  : {\"type\": \"array\", \"items\": {\"type\": \"string\"}, \"minItems\": 3},\n    \"tone_recommendation\": {\"type\": \"\
  string\", \"enum\": [\"formal\", \"casual\", \"provocative\", \"educational\"]},\n    \"hooks\": {\"type\": \"array\", \"\
  items\": {\"type\": \"string\"}, \"minItems\": 2, \"maxItems\": 5}\n  },\n  \"required\": [\"market_context\", \"key_insights\"\
  , \"tone_recommendation\", \"hooks\"]\n}"
step_2_draft: "Modelo recomendado: opus (criatividade + qualidade)\nFallback: sonnet\n\nInput: Output completo do Step 1 +\
  \ input original (topic, target_audience, content_type, keywords)\n\nOutput Schema:\n{\n  \"type\": \"object\",\n  \"properties\"\
  : {\n    \"title\": {\"type\": \"string\", \"maxLength\": 100},\n    \"body\": {\"type\": \"string\", \"minLength\": 200},\n\
  \    \"cta\": {\"type\": \"string\", \"description\": \"Call to action principal\"},\n    \"hashtags\": {\"type\": \"array\"\
  , \"items\": {\"type\": \"string\"}, \"maxItems\": 10},\n    \"estimated_read_time_min\": {\"type\": \"number\"}\n  },\n\
  \  \"required\": [\"title\", \"body\", \"cta\"]\n}"
step_3_review: "Modelo recomendado: sonnet (analise critica objetiva)\nFallback: haiku\n\nInput: Output do Step 2 + tone_recommendation\
  \ do Step 1\n\nOutput Schema:\n{\n  \"type\": \"object\",\n  \"properties\": {\n    \"score\": {\"type\": \"number\", \"\
  minimum\": 0, \"maximum\": 10},\n    \"issues\": {\n      \"type\": \"array\",\n      \"items\": {\n        \"type\": \"\
  object\",\n        \"properties\": {\n          \"severity\": {\"type\": \"string\", \"enum\": [\"critical\", \"high\",\
  \ \"medium\", \"low\"]},\n          \"location\": {\"type\": \"string\"},\n          \"issue\": {\"type\": \"string\"},\n\
  \          \"fix\": {\"type\": \"string\"}\n        }\n      }\n    },\n    \"approved\": {\"type\": \"boolean\"},\n   \
  \ \"revised_body\": {\"type\": \"string\", \"description\": \"Versao corrigida se approved=false\"}\n  },\n  \"required\"\
  : [\"score\", \"issues\", \"approved\"]\n}"
step_4_publish: "Modelo recomendado: haiku (formatacao simples, rapido)\nFallback: nenhum (step determinista, nao deve falhar)\n\
  \nInput: Output do Step 3 (revised_body se existir, senao body original do Step 2) + content_type do Step 1\n\nOutput Schema:\n\
  {\n  \"type\": \"object\",\n  \"properties\": {\n    \"formatted_content\": {\"type\": \"string\"},\n    \"platform_metadata\"\
  : {\n      \"type\": \"object\",\n      \"properties\": {\n        \"platform\": {\"type\": \"string\"},\n        \"char_count\"\
  : {\"type\": \"integer\"},\n        \"within_limits\": {\"type\": \"boolean\"},\n        \"scheduled_for\": {\"type\": \"\
  string\", \"format\": \"date-time\"}\n      }\n    },\n    \"status\": {\"type\": \"string\", \"enum\": [\"ready\", \"needs_revision\"\
  , \"published\"]}\n  },\n  \"required\": [\"formatted_content\", \"platform_metadata\", \"status\"]\n}"
data_flow: "[User Input] --> Step 1: Research (sonnet)\n                    |\n                    v\n              {market_context,\
  \ key_insights, tone, hooks}\n                    |\n                    v\n              Step 2: Draft (opus)\n       \
  \             |\n                    v\n              {title, body, cta, hashtags}\n                    |\n            \
  \        v\n              Step 3: Review (sonnet)\n                    |\n                   / \\\n                  / \
  \  \\\n           approved?   not approved?\n              |             |\n              v             v\n         body\
  \ original  revised_body\n              \\           /\n               \\         /\n                v       v\n       \
  \       Step 4: Publish (haiku)\n                    |\n                    v\n              {formatted_content, platform_metadata,\
  \ status}"
error_handling: '| Step | Error | Action |

  |------|-------|--------|

  | Any | Model timeout (>30s) | Retry 1x with fallback model |

  | Any | Fallback also fails | Return partial result with `status: "needs_revision"` and error log |

  | Step 3 | score < 6.0 | Re-run Step 2 with issues as additional context (max 1 retry) |

  | Step 4 | char_count > platform limit | Truncate with "..." and set `within_limits: false` |'
research_base:
- 'Chain pattern: output A -> input B com data contracts (MIPRO/DSPy)'
- 'Knowledge-first ordering: research antes de draft (+0.91 task adherence)'
- 'Fallback model strategy: degrade gracefully, nao abort'
