boundary: This artifact defines the execution framework for CEX agents to decompose, execute, and validate tasks within the
  system. It is not responsible for task design, user interface interactions, or system-level orchestration. It focuses strictly
  on the technical execution pipeline from artifact parsing to quality-gated completion.
related_kinds:
- 'Planning: Defines task objectives but delegates execution to this artifact'
- 'Validation: Ensures artifacts meet quality gates but does not handle execution'
- 'Monitoring: Tracks task progress but does not dictate execution methods'
- 'Reporting: Documents outcomes but does not manage the execution workflow'
- 'Optimization: Suggests improvements but does not execute tasks directly'
task_decomposition: "1. Parse intent: Extract verb, object, domain from the request  \n   - Example: \"Refactor authentication\
  \ module\" → verb=\"refactor\", object=\"authentication module\", domain=\"security\"  \n   - Use NLP models to identify\
  \ implicit requirements (e.g., \"Make it faster\" → performance optimization)  \n\n2. Map to CEX taxonomy: Identify kind,\
  \ pillar, and target nucleus  \n   - Example: \"Implement API endpoint\" → kind=\"instruction\", pillar=\"P03\", nucleus=\"\
  execution\"  \n\n3. Check dependencies: Are prerequisite artifacts available?  \n   - Verify existence of required templates,\
  \ tools, and configuration files  \n   - Example: If task requires \"F7 GOVERN\" compliance, check for existing quality\
  \ gates  \n\n4. Plan approach: Template-First (match >= 60%), hybrid, or fresh build  \n   - Template-First: Reuse 80% of\
  \ existing structure, modify 20%  \n   - Hybrid: Combine 50% template with 50% new logic  \n   - Fresh Build: Start from\
  \ scratch (used <10% of tasks)  \n\n| Approach        | Criteria                          | Success Rate | Time (hrs) |\
  \ Resources Used | Example Use Case               |\n|-----------------|-----------------------------------|--------------|------------|----------------|--------------------------------|\n\
  | Template-First  | Match >=60% to existing templates | 85%          | 2-4        | 3-5 tools      | Refactoring legacy\
  \ code        |\n| Hybrid          | 50% template + 50% new logic      | 70%          | 6-8        | 8-10 tools     | Integrating\
  \ new features       |\n| Fresh Build     | No template match                 | 50%          | 12-16      | 15+ tools  \
  \    | Implementing novel algorithms  |\n| Manual          | Human-led execution               | 30%          | 20+    \
  \    | 20+ tools      | Complex system overhauls       |\n| Automated       | Full CI/CD pipeline               | 90%  \
  \        | 1-2        | 5-7 tools      | Routine bug fixes              |"
tool_usage:
- 'Dedicated tools over shell commands:'
- '`Read > cat`: Use `Read` for large files (avoids memory issues)'
- '`Grep > grep`: Use `Grep` with regex patterns for precise matching'
- '`Edit > sed`: Use `Edit` for multi-line modifications (avoids syntax errors)'
- 'Parallel execution:'
- Run independent tool calls in parallel (e.g., `ToolA` and `ToolB` simultaneously)
- Use orchestration tools to manage dependencies between parallel tasks
- 'Step breakdown:'
- 'Example: "Deploy microservice" →'
- '`Build` → 2. `Test` → 3. `Package` → 4. `Push` → 5. `Deploy`'
- 'Validation before proceeding:'
- Check output hashes for integrity
- Use `Validate` tool to ensure tool results meet expected schema
execution_standards:
- 'Read before modify:'
- Use `Inspect` tool to analyze existing code structure
- 'Example: Before modifying `auth.js`, run `Inspect auth.js` to understand dependencies'
- 'Edit vs create:'
- 'Edit: Modify existing files (preferred for 75% of tasks)'
- 'Create: Generate new files only when required (e.g., new module)'
- 'No speculative features:'
- 'Example: If task says "Implement login", do not add password recovery unless explicitly requested'
- 'Security checks:'
- 'Check for OWASP Top 10 vulnerabilities:'
- Injection (e.g., SQLi)
- Broken Authentication
- XSS
- IDOR
- Security Misconfigurations
- 'Testing requirements:'
- 'Golden path: Test primary use case (e.g., successful login)'
- 'Edge cases: Test invalid inputs, timeouts, and error recovery'
completion_criteria: "A task is complete when:  \n1. All requested artifacts are created/modified:  \n   - Example: For \"\
  Implement API endpoint\", ensure `routes/api.js` and `models/user.js` are updated  \n\n2. Artifacts pass F7 GOVERN quality\
  \ gates:  \n   - Check for:  \n     - Code coverage (>80%)  \n     - Security vulnerabilities (0 found)  \n     - Performance\
  \ benchmarks (response time <200ms)  \n\n3. Compilation succeeds:  \n   - Validate YAML syntax with `YAML Validator` tool\
  \  \n   - Example: `Validate p03_ins_doing_tasks.yaml` must return \"Valid\"  \n\n4. Descriptive commit message:  \n   -\
  \ Use format: `feat: <module> - <action> (reason)`  \n   - Example: `feat: auth - refactor login flow (OWASP compliance)`\
  \  \n\n5. Completion signal:  \n   - Send `{\"status\": \"completed\", \"artifacts\": [\"p03_ins_doing_tasks.yaml\"]}` to\
  \ orchestrator"
advanced_considerations:
- 'Tool failure handling:'
- Retry failed tools up to 3 times with exponential backoff
- Log failures to `tool_errors.log` for post-mortem analysis
- 'Resource constraints:'
- Monitor CPU/Memory usage during execution
- 'Example: If `Build` tool exceeds 80% CPU, pause and notify orchestrator'
- 'Artifact versioning:'
- Use semantic versioning for modified artifacts
- 'Example: `p03_ins_doing_tasks.yaml` → `v1.1.0` after changes'
- 'Post-execution cleanup:'
- Remove temporary files created during execution
- 'Example: Delete `build/temp/` directory after successful deployment'
- 'Performance optimization:'
- Cache frequently used tools (e.g., `Read` and `Grep`)
- 'Example: Cache `Read config.yaml` results for 1 hour'
example_workflow:
- 'Task received: "Implement user registration"'
- 'Decompose: Verb="implement", object="user registration", domain="authentication"'
- 'Map: kind="instruction", pillar="P03", nucleus="execution"'
- 'Check dependencies: `config.yaml` and `auth.js` exist'
- 'Plan: Hybrid approach (50% template + 50% new logic)'
- 'Execute:'
- '`Edit auth.js` → add registration logic'
- '`Test` → run unit tests'
- '`Validate` → check for OWASP vulnerabilities'
- 'Complete: Commit changes with message `feat: auth - implement registration (user onboarding)`'
- 'Signal: Send completion to orchestrator'
