tldr: Defines few shot for few-shot product data extraction from marketplace listings, with validation gates and integration
  points.
task_description: 'Dado o texto bruto de um anuncio de marketplace, extrair dados estruturados do produto: nome, preco, categoria
  e bullet points principais. O modelo deve lidar com formatacao inconsistente, abreviacoes comuns (un., pct., cx.) e precos
  em BRL com virgula decimal.'
examples: ''
example_1_mercado_livre_eletronicos: "Input:\nKit 3 Lampada LED Bulbo 9W Bivolt E27 Branco Frio 6500K - Economia de 80% energia\n\
  Marca: GALAXY LED | Modelo: GL-9W-BF\nDe R$ 45,90 por R$ 29,99\nFrete gratis para SP capital\n1. Equivale a lampada incandescente\
  \ de 60W\n2. Durabilidade de 25.000 horas\n3. Certificacao INMETRO\n4. Base padrao E27, encaixa em qualquer lustre\n\nOutput:\n\
  {\n  \"nome\": \"Kit 3 Lampada LED Bulbo 9W Bivolt E27 Branco Frio 6500K\",\n  \"preco\": 29.99,\n  \"moeda\": \"BRL\",\n\
  \  \"preco_original\": 45.90,\n  \"categoria\": \"Eletronicos > Iluminacao > Lampadas LED\",\n  \"marca\": \"GALAXY LED\"\
  ,\n  \"modelo\": \"GL-9W-BF\",\n  \"bullets\": [\n    \"Equivale a lampada incandescente de 60W\",\n    \"Durabilidade de\
  \ 25.000 horas\",\n    \"Certificacao INMETRO\",\n    \"Base padrao E27, encaixa em qualquer lustre\"\n  ]\n}"
example_2_shopee_casa_e_decoracao: "Input:\nOrganizador de Maquiagem Acrilico Transparente 360 Graus Rotativo Grande\n⭐ 4.8\
  \ (2.3mil vendidos)\nR$67,50   12x R$5,63 s/ juros\nCor: Transparente | Material: Acrilico PS cristal\n✅ Gira 360 graus\
  \ para facil acesso\n✅ 8 compartimentos + 1 bandeja removivel\n✅ Dimensoes: 23x23x30cm\n✅ Suporta batom, base, pinceis,\
  \ paletas\nEnvio: 2 dias uteis (SP)\n\nOutput:\n{\n  \"nome\": \"Organizador de Maquiagem Acrilico Transparente 360 Graus\
  \ Rotativo Grande\",\n  \"preco\": 67.50,\n  \"moeda\": \"BRL\",\n  \"preco_original\": null,\n  \"categoria\": \"Casa e\
  \ Decoracao > Organizacao > Organizadores de Maquiagem\",\n  \"marca\": null,\n  \"modelo\": null,\n  \"bullets\": [\n \
  \   \"Gira 360 graus para facil acesso\",\n    \"8 compartimentos + 1 bandeja removivel\",\n    \"Dimensoes: 23x23x30cm\"\
  ,\n    \"Suporta batom, base, pinceis, paletas\"\n  ]\n}"
example_3_amazon_br_esporte_e_fitness: "Input:\nCorda de Pular Profissional com Rolamento Speed Rope Crossfit WOD\n\nFORMIGA\
  \ FITNESS - Corda ajustavel ate 3m\nAvaliacao: 4.6/5 (847 avaliacoes)\nPreco: R$ 42,90\nMaterial cabo: Aco revestido PVC\
  \ 2,5mm\nMaterial manopla: Aluminio anodizado\n\nSobre este item:\n1. Rolamento de esferas duplo para giro livre sem embaracar\n\
  2. Cabo de aco com revestimento PVC — duravel e leve (apenas 180g)\n3. Manoplas ergonomicas em aluminio — antiderrapante\n\
  4. Ajustavel de 1,5m a 3,0m — corte no tamanho ideal\n5. Ideal para: CrossFit, Double Unders, HIIT, boxe\nInclui: 1 corda\
  \ + 1 bag de transporte + manual de ajuste\n\nOutput:\n{\n  \"nome\": \"Corda de Pular Profissional com Rolamento Speed\
  \ Rope Crossfit WOD\",\n  \"preco\": 42.90,\n  \"moeda\": \"BRL\",\n  \"preco_original\": null,\n  \"categoria\": \"Esporte\
  \ e Fitness > Acessorios de Treino > Cordas de Pular\",\n  \"marca\": \"FORMIGA FITNESS\",\n  \"modelo\": null,\n  \"bullets\"\
  : [\n    \"Rolamento de esferas duplo para giro livre sem embaracar\",\n    \"Cabo de aco com revestimento PVC — duravel\
  \ e leve (apenas 180g)\",\n    \"Manoplas ergonomicas em aluminio — antiderrapante\",\n    \"Ajustavel de 1,5m a 3,0m —\
  \ corte no tamanho ideal\",\n    \"Ideal para: CrossFit, Double Unders, HIIT, boxe\"\n  ]\n}"
selection_criteria:
- 'Diversity: 3 marketplaces brasileiros distintos (Mercado Livre, Shopee, Amazon BR) com formatacoes diferentes'
- 'Complexity gradient: Example 1 tem preco promocional (de/por), Example 2 tem emojis e parcelamento, Example 3 tem especificacoes
  tecnicas densas'
- 'Edge cases cobertos: preco_original null quando nao ha promocao, marca null quando nao informada, bullets com caracteres
  especiais (✅, *, -)'
- 'Research base: 2-3 few-shot examples ideal para task adherence (+0.91), conforme arxiv 2504.02052'
