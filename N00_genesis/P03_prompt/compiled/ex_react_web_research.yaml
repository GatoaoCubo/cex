id: p03_react_web_research
kind: react
pillar: P03
title: ReAct Web Research Agent with Tool Loop
tools_available:
- search_web
- extract_data
- calculate
quality: 9.0
objective: Pesquisar precos e disponibilidade de um produto em multiplas fontes online, consolidando dados de pelo menos 3
  fontes concordantes antes de emitir relatorio final. O agente deve usar tools em loop Thought-Action-Observation ate atingir
  criterio de parada.
tools: ''
search_web: "Busca na web por query textual. Retorna lista de resultados com titulo, URL e snippet.\n{\n  \"name\": \"search_web\"\
  ,\n  \"description\": \"Search the web for information matching a text query\",\n  \"parameters\": {\n    \"type\": \"object\"\
  ,\n    \"properties\": {\n      \"query\": {\n        \"type\": \"string\",\n        \"description\": \"Search query in\
  \ natural language\"\n      },\n      \"num_results\": {\n        \"type\": \"integer\",\n        \"default\": 5,\n    \
  \    \"minimum\": 1,\n        \"maximum\": 10,\n        \"description\": \"Number of results to return\"\n      },\n   \
  \   \"region\": {\n        \"type\": \"string\",\n        \"default\": \"br\",\n        \"description\": \"Region code for\
  \ localized results\"\n      }\n    },\n    \"required\": [\"query\"]\n  },\n  \"returns\": {\n    \"type\": \"array\",\n\
  \    \"items\": {\n      \"type\": \"object\",\n      \"properties\": {\n        \"title\": {\"type\": \"string\"},\n  \
  \      \"url\": {\"type\": \"string\"},\n        \"snippet\": {\"type\": \"string\"}\n      }\n    }\n  }\n}"
extract_data: "Extrai dados estruturados de uma URL usando seletores ou schema.\n{\n  \"name\": \"extract_data\",\n  \"description\"\
  : \"Extract structured data from a URL using a provided schema\",\n  \"parameters\": {\n    \"type\": \"object\",\n    \"\
  properties\": {\n      \"url\": {\n        \"type\": \"string\",\n        \"description\": \"URL to extract data from\"\n\
  \      },\n      \"schema\": {\n        \"type\": \"object\",\n        \"description\": \"JSON Schema defining the expected\
  \ output structure\"\n      },\n      \"timeout_ms\": {\n        \"type\": \"integer\",\n        \"default\": 10000,\n \
  \       \"description\": \"Request timeout in milliseconds\"\n      }\n    },\n    \"required\": [\"url\", \"schema\"]\n\
  \  },\n  \"returns\": {\n    \"type\": \"object\",\n    \"description\": \"Extracted data matching the provided schema\"\
  \n  }\n}"
calculate: "Executa calculos matematicos sobre dados coletados.\n{\n  \"name\": \"calculate\",\n  \"description\": \"Perform\
  \ mathematical calculations on collected data\",\n  \"parameters\": {\n    \"type\": \"object\",\n    \"properties\": {\n\
  \      \"expression\": {\n        \"type\": \"string\",\n        \"description\": \"Mathematical expression to evaluate\
  \ (e.g., 'avg(29.99, 32.50, 27.90)')\"\n      },\n      \"precision\": {\n        \"type\": \"integer\",\n        \"default\"\
  : 2,\n        \"description\": \"Decimal places in result\"\n      }\n    },\n    \"required\": [\"expression\"]\n  },\n\
  \  \"returns\": {\n    \"type\": \"object\",\n    \"properties\": {\n      \"result\": {\"type\": \"number\"},\n      \"\
  expression\": {\"type\": \"string\"}\n    }\n  }\n}"
loop_format: 'Thought: [O que sei ate agora e o que preciso descobrir a seguir]

  Action: tool_name

  Observation: [resultado retornado pela tool]


  Thought: [Analisar resultado — suficiente? Preciso de mais dados?]

  Action: next_tool_name

  Observation: [resultado]


  ... (repetir ate stop_condition)


  Thought: [Tenho dados de 3+ fontes concordantes. Posso consolidar.]

  Final Answer:

  ## Market Research: {{product_name}}


  ### Sources

  | # | Source | Price | Availability | URL |

  |---|--------|-------|-------------|-----|

  | 1 | [name] | R$ XX | [status]    | [url] |


  ### Analysis

  - Price range: R$ [min] - R$ [max]

  - Average price: R$ [avg]

  - Best deal: [source] at R$ [price]

  - Concordance: [N]/[total] sources agree within 10%


  ### Recommendation

  [1-2 frases com acao recomendada]'
stop_condition: Parar quando tiver dados de 3 ou mais fontes concordantes (precos dentro de 10% de variacao entre si) OU quando
  atingir max_iterations.
max_iterations: '5'
error_handling:
- 'Se search_web retorna 0 resultados: reformular query (adicionar/remover termos)'
- 'Se extract_data falha (timeout/blocked): pular URL, tentar proxima da lista'
- 'Se apos 5 iteracoes nao ha 3 fontes: emitir relatorio parcial com disclaimer'
research_base:
- 'ReAct pattern: Thought-Action-Observation loop (Yao et al. 2023)'
- Stop condition baseada em concordancia, nao em quantidade fixa
- JSON Schema completo por tool permite validacao automatica de chamadas
