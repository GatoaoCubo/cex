id: n00_instruction_manifest
kind: knowledge_card
pillar: P03 -- prompt
nucleus: n00
title: Instruction -- Canonical Manifest
version: 1.0
quality: null
tags:
- manifest
- instruction
- p03
- n00
- archetype
- template
purpose: 'An instruction is a step-by-step execution directive for agents or pipelines, specifying the exact sequence of operations,
  conditions, and outputs expected at each step. Unlike a system_prompt that defines identity, an instruction defines procedure:
  what to do, in what order, and how to handle edge cases. The output is a deterministic execution protocol that reduces agent
  hallucination and drift.'
schema_key_fields: '| Field | Type | Required | Description |

  |-------|------|----------|-------------|

  | id | string | yes | Unique artifact identifier |

  | kind | string | yes | Always `instruction` |

  | pillar | string | yes | Always `P03` |

  | title | string | yes | Human-readable name |

  | version | semver | yes | Artifact version |

  | quality | float\|null | yes | Peer-review score (null until reviewed) |

  | steps | list | yes | Ordered list of discrete steps with expected outputs |

  | preconditions | list | no | Conditions that must be true before execution begins |

  | error_handling | map | no | Error type -> recovery action mapping |

  | idempotent | boolean | no | Whether re-running produces same result safely |'
when_to_use:
- When an agent needs a deterministic, repeatable procedure with no ambiguity
- When onboarding new nuclei that must follow a specific execution protocol
- When building builder ISOs (instruction is one of the 13 ISO types in every builder)
builder: '`archetypes/builders/instruction-builder/` Run: `python _tools/cex_8f_runner.py "your intent" --kind instruction
  --execute`'
template_variables_open_for_instantiation:
- '`{{NUCLEUS_ROLE}}` -- which nucleus domain owns this'
- '`{{SIN_LENS}}` -- cultural DNA driving the artifact'
- '`{{TARGET_AUDIENCE}}` -- who this serves'
- '`{{DOMAIN_CONTEXT}}` -- business/technical context'
example_minimal: "---\nid: instr_build_knowledge_card\nkind: instruction\npillar: P03\nnucleus: n04\ntitle: \"Build Knowledge\
  \ Card Instruction\"\nversion: 1.0\nquality: null\n---\npreconditions:\n  - kind resolved via kinds_meta.json\n  - KC template\
  \ loaded from P01\nsteps:\n  - step: 1\n    action: \"Read builder ISOs from archetypes/builders/knowledge_card-builder/\"\
  \n    output: builder_loaded\n  - step: 2\n    action: \"Inject kc_{kind}.md from P01_knowledge/library/kind/\"\n    output:\
  \ context_assembled"
related_kinds:
- '`action_prompt` (P03) -- the trigger that activates an instruction sequence'
- '`system_prompt` (P03) -- identity definition that precedes instruction execution'
- '`planning_strategy` (P03) -- determines which instruction branch to follow'
- '`workflow` (P12) -- orchestrates multiple instructions across nuclei'
