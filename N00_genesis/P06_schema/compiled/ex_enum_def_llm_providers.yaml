name: llm_providers
values:
- openai
- anthropic
- google
- aws_bedrock
- azure
- cohere
- mistral
description: Supported LLM providers for multi-provider routing
density_score: 1.0
tl_dr: Enum canonica que lista os 7 provedores LLM suportados pelo organization para routing multi-modelo. Qualquer configuracao
  que referencia um provedor deve usar exatamente um destes valores. Novas adicoes passam por review (impacto em routing,
  billing, e fallback chains).
conceito_central: Uma enum_def e uma lista finita e fechada de valores validos. Diferente de type_def (define estrutura),
  enum define OPCOES. Toda referencia a provedor LLM no sistema — em configs, routing tables, model cards, billing — DEVE
  usar um valor desta enum. Isso previne inconsistencias como `"open_ai"` vs `"openai"` vs `"OpenAI"` em arquivos diferentes.
definicao_completa: "enum:\n  id: p06_enum_llm_providers\n  name: llm_providers\n  description: \"Supported LLM providers\
  \ for multi-provider routing\"\n\n  values:\n    openai:\n      display: \"OpenAI\"\n      api_base: \"https://api.openai.com/v1\"\
  \n      auth_type: api_key\n      env_var: OPENAI_API_KEY\n      models: [gpt-4o, gpt-4o-mini, o1, o3, o4-mini]\n      billing:\
  \ per_token\n      status: active\n\n    anthropic:\n      display: \"Anthropic\"\n      api_base: \"https://api.anthropic.com/v1\"\
  \n      auth_type: api_key\n      env_var: ANTHROPIC_API_KEY\n      models: [claude-opus-4-6, claude-sonnet-4-6, claude-haiku-4-5-20251001]\n\
  \      billing: per_token\n      status: active  # PRIMARY provider for organization\n\n    google:\n      display: \"Google\
  \ AI\"\n      api_base: \"https://generativelanguage.googleapis.com/v1\"\n      auth_type: api_key\n      env_var: GOOGLE_AI_API_KEY\n\
  \      models: [gemini-2.5-pro, gemini-2.5-flash]\n      billing: per_token\n      status: active\n\n    aws_bedrock:\n\
  \      display: \"AWS Bedrock\"\n      api_base: \"regional\"\n      auth_type: iam_role\n      env_var: AWS_REGION  # uses\
  \ IAM, not API key\n      models: [claude-via-bedrock, titan-embed]\n      billing: per_token\n      status: available \
  \ # configured but not primary\n\n    azure:\n      display: \"Azure OpenAI\"\n      api_base: \"https://{deployment}.openai.azure.com\"\
  \n      auth_type: api_key\n      env_var: AZURE_OPENAI_API_KEY\n      models: [gpt-4o-via-azure]\n      billing: per_token\n\
  \      status: available\n\n    cohere:\n      display: \"Cohere\"\n      api_base: \"https://api.cohere.ai/v2\"\n     \
  \ auth_type: api_key\n      env_var: COHERE_API_KEY\n      models: [command-r-plus, embed-v4]\n      billing: per_token\n\
  \      status: experimental\n\n    mistral:\n      display: \"Mistral AI\"\n      api_base: \"https://api.mistral.ai/v1\"\
  \n      auth_type: api_key\n      env_var: MISTRAL_API_KEY\n      models: [mistral-large, codestral]\n      billing: per_token\n\
  \      status: experimental\n\n  constraints:\n    case: snake_case          # always lowercase with underscores\n    extensible:\
  \ false         # new providers require PR review\n    default: anthropic        # used when provider not specified\n  \
  \  validation: exact_match   # no fuzzy matching allowed"
exemplo_pratico: "Uso em router config (P02):\n# p02_router_complexity.yaml\nrouting_table:\n  simple_tasks:\n    provider:\
  \ anthropic        # VALID enum value\n    model: claude-haiku-4-5-20251001\n  complex_tasks:\n    provider: anthropic \
  \       # VALID enum value\n    model: claude-opus-4-6\n  fallback:\n    provider: openai           # VALID enum value\n\
  \    model: gpt-4o\n\nUso em fallback chain (P02):\n# p02_fc_model_cascade.yaml\nchain:\n  - provider: anthropic       #\
  \ try first\n    model: claude-sonnet-4-6\n  - provider: openai          # fallback\n    model: gpt-4o\n  - provider: google\
  \          # last resort\n    model: gemini-2.5-flash\n\nValidacao (rejeita valores invalidos):\nVALID_PROVIDERS = [\"openai\"\
  , \"anthropic\", \"google\",\n                   \"aws_bedrock\", \"azure\", \"cohere\", \"mistral\"]\n\ndef validate_provider(value:\
  \ str) -> bool:\n    if value not in VALID_PROVIDERS:\n        raise ValueError(\n            f\"Invalid provider '{value}'.\
  \ \"\n            f\"Must be one of: {VALID_PROVIDERS}\"\n        )\n    return True\n\n# validate_provider(\"open_ai\"\
  )   -> ValueError!\n# validate_provider(\"anthropic\") -> True"
fronteira_com_outros_kinds: '| Kind | Diferenca |

  |------|-----------|

  | type_def (P06) | Define ESTRUTURA de dados — enum define VALORES possiveis |

  | model_card (P02) | Descreve UM modelo em detalhe — enum lista provedores |

  | router (P02) | USA o enum para rotear — enum nao roteia, apenas valida |

  | input_schema (P06) | Contrato de entrada — pode CONTER enums, mas nao e um |'
anti_patterns:
- 'Strings livres ao inves de enum (`"provider": "whatever"` sem validacao)'
- Case misto (`"OpenAI"` vs `"openai"` em configs diferentes)
- Adicionar provider sem atualizar enum (routing table quebra silenciosamente)
- Enum mutavel em runtime (provider list deve ser estatica, configurada em deploy)
- Colocar modelos dentro da enum (modelos mudam frequentemente — provedores nao)
