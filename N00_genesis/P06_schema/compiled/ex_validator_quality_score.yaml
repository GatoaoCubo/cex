id: p06_val_quality_score
kind: validator
pillar: P06
title: 'Validator: Quality Score Field'
version: 1.0.0
created: 2026-03-22
updated: 2026-03-22
author: knowledge_agent
quality: 9.0
tags:
- validator
- quality
- score
- schema
tldr: 'Validation rules for quality_score field: range 0.0-10.0, tier classification, pool eligibility gates'
max_bytes: 1024
density_score: 0.89
source: organization-core/records/framework/docs/LAWS_v3_PRACTICAL.md + CLAUDE.md quality tiers
linked_artifacts:
  schema: p06_is_quality_audit
  gate: p11_qg_cex_quality
field_definition: "quality_score:\n  type: float\n  required: true\n  range: [0.0, 10.0]\n  precision: 1  # max 1 decimal\
  \ place (7.0, 8.5, 9.2 — not 7.23)\n  default: null  # must be set explicitly, no default"
tier_classification: '| Score | Tier | Label | Action |

  |-------|------|-------|--------|

  | >= 9.5 | T1 | Master / Golden | Promote to Pool as Golden |

  | 8.0 - 9.4 | T2 | Skilled | Add to Pool + remember() |

  | 7.0 - 7.9 | T3 | Learning | Experimental — do not pool |

  | < 7.0 | T4 | Rejected | Redo or discard |'
validation_rules: "rules:\n  - id: QS-001\n    name: range_check\n    condition: \"0.0 <= quality_score <= 10.0\"\n    on_fail:\
  \ reject\n    message: \"quality_score must be between 0.0 and 10.0\"\n\n  - id: QS-002\n    name: precision_check\n   \
  \ condition: \"round(quality_score, 1) == quality_score\"\n    on_fail: warn\n    message: \"quality_score should have at\
  \ most 1 decimal place\"\n\n  - id: QS-003\n    name: pool_gate\n    condition: \"quality_score >= 8.0 OR skip_pool=true\"\
  \n    on_fail: block_pool_write\n    message: \"Score < 8.0 cannot be written to shared pool\"\n\n  - id: QS-004\n    name:\
  \ golden_gate\n    condition: \"quality_score >= 9.5 OR skip_golden=true\"\n    on_fail: block_golden_promote\n    message:\
  \ \"Score < 9.5 cannot be promoted as Golden artifact\""
valid_examples: 'quality: 9.5   # valid — T1 Master

  quality: 8.0   # valid — T2 minimum pool threshold

  quality: 7.3   # valid — T3 experimental'
invalid_examples: 'quality: 10.5  # FAILS QS-001 — out of range

  quality: 8.25  # FAILS QS-002 (warn) — too precise, should be 8.3

  quality: null  # FAILS — required field

  quality: "high" # FAILS — must be float, not string'
