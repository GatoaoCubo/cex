id: p05_parser_brain_query
kind: parser
pillar: P05
description: Extracts ranked knowledge chunks from brain_query raw output
input_format: json
output_format: structured_markdown
version: 1.0.0
created: 2026-03-24
author: builder_agent
quality: 9.0
tags:
- parser
- brain
- search-results
- extraction
purpose: Extracts ranked knowledge chunks from raw brain_query MCP tool output. Converts JSON response with scores and metadata
  into structured markdown sections for agent_node consumption.
input: "{\n  \"results\": [\n    {\"text\": \"chunk content...\", \"score\": 0.87, \"source\": \"KC_knowledge_agent_069.md\", \"section\"\
  : \"Strategy\"},\n    {\"text\": \"another chunk...\", \"score\": 0.72, \"source\": \"KC_builder_agent_029.md\", \"section\": \"\
  Patterns\"}\n  ],\n  \"query\": \"agent orchestration patterns\",\n  \"method\": \"hybrid\"\n}"
extraction_rules:
- Filter results with score >= 0.5 (below = noise)
- Group by source file (deduplicate same-file chunks)
- Sort by score descending within groups
- 'Extract: source path, section header, content snippet (max 200 chars)'
output: '## brain_query: "agent orchestration patterns" (2 results)


  ### KC_knowledge_agent_069.md (score: 0.87)

  Section: Strategy

  > chunk content...


  ### KC_builder_agent_029.md (score: 0.72)

  Section: Patterns

  > another chunk...'
edge_cases:
- 'Empty results: return "No matches found for: {query}"'
- 'All scores < 0.5: return warning + top 1 result anyway'
- 'Single source multiple chunks: merge under one header'
