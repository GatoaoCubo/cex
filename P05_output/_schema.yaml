# P05 Output Schema v3.0
# v3.0: output_schema renamed to response_format (disambiguate from P06.validation_schema)
lp: P05
name: Output
description: O que o agente ENTREGA

types:
  response_format:
    description: Formato de resposta do LLM (como o agente responde)
    boundary: "Formato de resposta injetado no prompt do LLM. NAO eh validation_schema P06 (contrato pos-geracao aplicado pelo sistema)."
    layer: spec
    core: true
    machine_format: json
    naming: p05_rf_{{format}}.yaml
    constraints: {max_bytes: 4096}

  parser:
    description: Extrator de dados de saida
    boundary: "Extrator de dados de saida bruta. NAO eh formatter (nao transforma formato) nem validator (P06, nao valida)."
    layer: runtime
    core: false
    machine_format: yaml
    naming: p05_parser_{{target}}.md + .yaml
    constraints: {max_bytes: 4096}

  formatter:
    description: Formatador de saida (json, md, yaml)
    boundary: "Transformador de formato de saida. NAO eh parser (nao extrai dados) nem response_format (nao define o que o LLM ve)."
    layer: runtime
    core: false
    machine_format: yaml
    naming: p05_fmt_{{format}}.md
    constraints: {max_bytes: 4096}

  naming_rule:
    description: Regra de nomenclatura
    boundary: "Regra de nomenclatura de artefatos. NAO eh validator (P06, valida conteudo) nem type_def (P06, define tipo)."
    layer: governance
    core: false
    machine_format: yaml
    naming: p05_nr_{{scope}}.md
    constraints: {max_bytes: 4096}
