id: p01_gl_rag
kind: glossary_entry
pillar: P01
title: Retrieval-Augmented Generation (RAG)
version: 1.0.0
created: 2026-04-07
author: n04_knowledge
domain: knowledge-infrastructure
quality: 8.7
tags:
- glossary
- rag
- retrieval
- augmented-generation
tldr: Pattern that augments LLM prompts with retrieved documents from a knowledge base, reducing hallucination and grounding
  responses in facts.
density_score: 0.97
updated: '2026-04-13'
boundary: This artifact is a glossary entry defining RAG. It is not a knowledge_card (which lacks minimum density) or context_doc
  (which lacks scope).
8f_pipeline_function: 'Primary function: INJECT'
key_components:
- 'Query Encoder: Transforms user input into vector space for similarity search.'
- 'Document Store: Indexed knowledge base (e.g., TF-IDF, FAISS, pgvector).'
- 'Retriever: Selects top-K documents based on query similarity.'
- 'Context Injector: Merges retrieved documents into LLM prompt.'
- 'Generator: Produces final response using augmented context.'
implementation_details:
- 'CEX RAG Stack:'
- '`cex_retriever.py`: TF-IDF-based sparse retrieval (current)'
- 'Planned: Dense retrieval via Supabase pgvector (2026 Q3)'
- 'Chunking: `chunk_strategy` determines document splitting (e.g., 512 tokens)'
- 'Config: `retriever_config` defines parameters (k=5, similarity threshold=0.7)'
use_cases:
- 'Customer Support: Answers grounded in product manuals'
- 'Legal Research: Case law references in legal Q&A'
- 'Medical Q&A: Evidence-based responses from clinical guidelines'
comparison_with_alternatives: '| Method               | Knowledge Source       | Hallucination Risk | Scalability | Example
  Use Case         |

  |----------------------|------------------------|--------------------|-------------|--------------------------|

  | Traditional LLM      | Internal knowledge     | High               | Low         | General conversation     |

  | Knowledge Card       | Static knowledge       | Medium             | Medium      | Dense fact lookup        |

  | Prompt Engineering   | Hardcoded instructions | High               | Low         | Task-specific templates  |

  | RAG (Sparse)         | External KB (TF-IDF)   | Low                | High        | Dynamic Q&A with docs    |

  | RAG (Dense)          | External KB (pgvector) | Very Low           | Very High   | Real-time document search|'
related_kinds:
- 'knowledge_card: Provides dense knowledge snippets but lacks RAG''s dynamic retrieval.'
- 'retriever_config: Defines parameters for document retrieval in RAG pipelines.'
- 'chunk_strategy: Determines how documents are split for efficient retrieval.'
- 'rag_pipeline_architecture: Describes the overall system design for RAG implementations.'
- 'prompt_template: Structures the input to LLMs in RAG workflows.'
challenges_and_solutions: '| Challenge                  | Solution                                  | Impact on Accuracy |
  Complexity |

  |---------------------------|-------------------------------------------|--------------------|------------|

  | Document Relevance        | BM25 + cosine similarity hybrid scoring   | +15%               | Medium     |

  | Query Ambiguity           | Multi-turn dialogue tracking              | +10%               | High       |

  | Out-of-Scope Queries      | Fallback to general LLM                   | -5%                | Low        |

  | Retrieval Latency         | Asynchronous retrieval + caching          | -2%                | Medium     |

  | Knowledge Freshness       | Daily reindexing + versioning             | +20%               | High       |'
performance_metrics_cex_rag: '| Metric               | TF-IDF (Sparse) | pgvector (Dense) | Target |

  |----------------------|------------------|------------------|--------|

  | Recall@5             | 78%              | 89%              | 90%    |

  | Precision@5          | 65%              | 76%              | 80%    |

  | Latency (ms)         | 120              | 85               | 75     |

  | Hallucination Rate   | 3.2%             | 1.1%             | 1%     |

  | Context Utilization  | 62%              | 78%              | 85%    |'
best_practices:
- 'Chunking Strategy: Use 512-token chunks with overlap for better context coverage.'
- 'Retrieval Threshold: Set similarity threshold to 0.7 for balance between recall and precision.'
- 'Fallback Mechanism: Implement general LLM fallback for out-of-scope queries.'
- 'Monitoring: Track hallucination rates via post-hoc validation against ground truth.'
- 'Scalability: Use pgvector for dense retrieval in production environments.'
example_workflow:
- 'User Query: "What are the side effects of drug X?"'
- 'Embed Query: Convert to vector using BERT.'
- 'Retrieve: Find top-5 documents from clinical guidelines.'
- 'Inject: Append retrieved documents to prompt.'
- 'Generate: LLM synthesizes answer with cited sources.'
future_directions:
- 'Multimodal RAG: Extend to image/video retrieval (2026 Q4)'
- 'Real-Time Updates: Streaming ingestion of new documents'
- 'Personalization: User-specific knowledge filtering'
- 'Zero-Shot Retrieval: No need for pretraining on specific domains'
- 'Ethical Guardrails: Detect and filter biased or outdated sources'
references:
- '`rag_pipeline_architecture.md` (CEX internal)'
- '`retriever_config` (parameters for TF-IDF/pgvector)'
- '`chunk_strategy` (document splitting rules)'
- '`rag_source` (knowledge base metadata)'
- Supabase pgvector documentation (dense retrieval)
summary: RAG is a critical pattern for grounding LLM responses in verified knowledge. By combining retrieval and generation,
  it reduces hallucination while enabling dynamic, context-aware responses. CEX's implementation balances sparse and dense
  retrieval methods, with ongoing improvements to scalability and accuracy.
