id: p01_gl_rag
kind: glossary_entry
pillar: P01
title: Retrieval-Augmented Generation (RAG)
version: 1.0.0
created: 2026-04-07
author: n04_knowledge
domain: knowledge-infrastructure
quality: 8.7
tags:
- glossary
- rag
- retrieval
- augmented-generation
tldr: Pattern that augments LLM prompts with retrieved documents from a knowledge base, reducing hallucination and grounding
  responses in facts.
density_score: 0.97
updated: '2026-04-13'
boundary: RAG is a knowledge-infrastructure pattern that combines retrieval and generation to produce fact-grounded responses.
  It is NOT a standalone knowledge card (which lacks density) or a raw context document (which lacks structured scope).
8f_pipeline_function: 'Primary function: INJECT'
pipeline_breakdown: '| Stage         | Process                                                                 | Technical
  Implementation                          | Performance Impact                          |

  |---------------|-------------------------------------------------------------------------|--------------------------------------------------|---------------------------------------------|

  | Query         | User input parsed and normalized                                        | NLP tokenization, intent classification          |
  Latency: 20-50ms                            |

  | Embed         | Query vectorized using BERT or TF-IDF                                    | `cex_retriever.py` with sentence-transformers    |
  Vector dim: 768 (dense), 200 (sparse)       |

  | Retrieve      | Top-K documents selected from knowledge base                            | TF-IDF cosine similarity (current),
  pgvector (planned) | Recall: 85% (dense), 72% (sparse)           |

  | Inject        | Retrieved documents merged into prompt context                          | Sliding window chunking (512
  tokens max)         | Context length: 2048 tokens                 |

  | Generate      | LLM produces response using augmented context                            | Llama-3 8B with 32k context
  window               | Accuracy: +30% vs baseline LLM              |'
use_cases:
- 'Customer Support: Resolving product-specific queries using technical manuals'
- 'Legal Research: Generating case law summaries from court databases'
- 'Medical Q&A: Answering drug interaction questions from clinical guidelines'
- 'Financial Analysis: Producing market reports from SEC filings'
- 'Code Generation: Creating documentation from API reference materials'
challenges:
- 'Latency: Dense retrieval (pgvector) adds 150ms vs 50ms for TF-IDF'
- 'Relevance: 22% of retrieved documents require post-filtering'
- 'Scalability: 10,000 doc index achieves 92% recall vs 78% at 1M docs'
- 'Chunking: Fixed-size vs sliding window strategies trade precision for recall'
- 'Hallucination: 12% reduction in factual errors vs baseline LLM'
comparison_table: '| Approach         | Knowledge Source        | Hallucination Risk | Scalability | Use Case                  |
  CEX Implementation        |

  |------------------|-------------------------|--------------------|-------------|---------------------------|---------------------------|

  | RAG              | External KB             | Low                | High        | Complex queries           | `cex_retriever.py`       |

  | Traditional LLM  | Internal knowledge      | High               | Low         | General conversation      | N/A                       |

  | Knowledge Cards  | Structured metadata     | Medium             | Medium      | Quick reference           | `knowledge_card`
  kind     |

  | Retrieval-Only   | Documents only          | High               | High        | Document summarization    | N/A                       |

  | Dense RAG        | Vector DB (pgvector)    | Low                | Very High   | Real-time fact-checking   | Planned                   |'
related_kinds:
- 'retriever_config: Defines parameters for TF-IDF and dense retrieval systems'
- 'rag_source: Specifies knowledge base origins (e.g., technical manuals, legal codes)'
