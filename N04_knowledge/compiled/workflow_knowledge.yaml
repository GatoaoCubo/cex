1_workflow_document_ingestion_indexing: "This is the primary workflow for adding new, unstructured information to the knowledge\
  \ base.\n\nDiagram:\ngraph TD\n    A[Start: New Document Source] --> B{1. Load Document};\n    B --> C{2. Apply Chunking\
  \ Strategy};\n    C --> D{3. Generate Embeddings};\n    D --> E{4. Store in Vector DB};\n    E --> F[End: Document Indexed];\n\
  \nSteps:\n1.  Load Document:\n    -   Action: Use the appropriate `document_loader` MCP to load the raw text from a source\
  \ (e.g., Markdown file, website, PDF).\n    -   Input: Document URI.\n    -   Output: Raw text content.\n    -   Depends\
  \ on: `n04_rag_source_knowledge` for loader configuration.\n2.  Apply Chunking Strategy:\n    -   Action: Segment the raw\
  \ text into semantically meaningful chunks based on the rules defined in the chunking strategy artifact.\n    -   Input:\
  \ Raw text content.\n    -   Output: A list of text chunks.\n    -   Depends on: `n04_chunk_strategy_knowledge`.\n3.  Generate\
  \ Embeddings:\n    -   Action: For each text chunk, call the `embedding_apis` MCP to generate a vector embedding.\n    -\
  \   Input: A list of text chunks.\n    -   Output: A list of vector embeddings corresponding to each chunk.\n    -   Depends\
  \ on: `n04_embedding_config_knowledge`.\n4.  Store in Vector DB:\n    -   Action: Store the chunks and their corresponding\
  \ embeddings in the `vector_db` MCP. Include metadata (e.g., source URI, taxonomy tags).\n    -   Input: Chunks, embeddings,\
  \ and metadata.\n    -   Output: Confirmation of successful storage.\n    -   Signal: `indexing_complete`.\n\n---"
2_workflow_knowledge_card_kc_authoring_integration: "This workflow describes how a canonical piece of knowledge (a KC) is\
  \ created and integrated into the knowledge graph.\n\nDiagram:\ngraph TD\n    A[Start: Author New KC] --> B{1. Validate\
  \ KC Schema};\n    B --> C{2. Index KC Content};\n    C --> D{3. Update Knowledge Graph};\n    D --> E[End: KC Integrated];\n\
  \nSteps:\n1.  Validate KC Schema:\n    -   Action: When a new KC markdown file is created, run `cex_compile.py` to validate\
  \ its frontmatter against the `knowledge_card` schema.\n    -   Input: KC markdown file path.\n    -   Output: Success or\
  \ validation error.\n2.  Index KC Content:\n    -   Action: Execute the Document Ingestion & Indexing workflow on the new\
  \ KC itself. KCs are first-class citizens of the knowledge base and must be searchable.\n    -   Input: KC markdown file\
  \ path.\n    -   Output: KC content is now searchable via semantic search.\n3.  Update Knowledge Graph:\n    -   Action:\
  \ Parse the KC's `id` and `linked_artifacts`. Update the graph database by adding the new KC as a node and creating edges\
  \ based on its links.\n    -   Input: Compiled KC YAML data.\n    -   Output: Updated knowledge graph.\n    -   Signal:\
  \ `authoring_complete`.\n\n---"
3_workflow_taxonomy_graph_maintenance: "This workflow is triggered when the CEX taxonomy is updated, ensuring the knowledge\
  \ graph remains consistent.\n\nSteps:\n1.  Detect Taxonomy Change:\n    -   Trigger: A change is committed to the `TAXONOMY_LAYERS.yaml`\
  \ file.\n2.  Re-evaluate KC Tags:\n    -   Action: For each KC in the knowledge base, re-evaluate its `tags` against the\
  \ new taxonomy. Suggest or apply updates where classifications have changed.\n3.  Rebuild Graph Edges:\n    -   Action:\
  \ If taxonomy changes affect structural relationships, trigger a partial or full rebuild of the knowledge graph edges to\
  \ reflect the new hierarchy.\n    -   Signal: `taxonomy_updated`."
