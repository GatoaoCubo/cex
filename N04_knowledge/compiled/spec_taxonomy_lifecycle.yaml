  core\": false,\n    \"description\": \"How agents execute actions in environments\",\n    \"boundary\": \"Action execution\
  \ paradigm...\",\n\n    \"status\": \"stable\",\n    \"upstream_source\": null,\n    \"spec_version\": null,\n    \"last_reviewed\"\
  : \"2026-04-14\",\n    \"deprecated_by\": null\n  }\n}\n\n| Field | Type | Values | Default |\n|-------|------|--------|---------|\n\
  | status | enum | draft, stable, deprecated, archived | stable |\n| upstream_source | string (URL) or null | canonical spec\
  \ URL | null |\n| spec_version | string (semver) or null | \"1.0.0\" | null |\n| last_reviewed | string (ISO date) | \"\
  2026-04-14\" | today |\n| deprecated_by | string (kind name) or null | \"new_kind_name\" | null |\n\n---"
h_integration_with_cex_runtime: ''
h_1_file_locations: ".cex/\n  config/\n    taxonomy_sources.yaml         # source watcher config\n  runtime/\n    taxonomy_candidates/\n\
  \      YYYY-MM-DD_*.md             # candidate files (pending review)\n      rejected/                   # rejected candidates\n\
  \      applied/                    # assimilated candidates\n      scout_log.tsv               # run history\n  kinds_archive.json\
  \              # archived kinds (removed from active)"
h_2_cron_integration: "Add to `.cex/config/schedules.yaml`:\n\n- id: taxonomy_scout_weekly\n  command: \"python _tools/cex_taxonomy_scout.py\
  \ --source all --since 7\"\n  schedule: \"0 2   1\"  # Monday 02:00 UTC\n  notify: n07\n\n- id: taxonomy_scout_daily_github\n\
  \  command: \"python _tools/cex_taxonomy_scout.py --source github --since 1 --dry-run\"\n  schedule: \"0 6   *\"  # Daily\
  \ 06:00 UTC\n  notify: n07"
h_3_signal_integration: "On scout completion (score >= threshold):\n\nfrom _tools.signal_writer import write_signal\nwrite_signal('n04',\
  \ 'taxonomy_candidate_ready', score, metadata={\n    'candidates': 3,\n    'top_score': 8.4,\n    'top_candidate': 'tool_invocation_protocol'\n\
  })\n\nN07 polls `.cex/runtime/signals/` and sees the notification.\n\n---"
i_operational_runbook: ''
i_1_add_a_new_source_manually: '# 1. Add entry to .cex/config/taxonomy_sources.yaml

  # 2. Run scout for that source only

  python _tools/cex_taxonomy_scout.py --source github --repo new-org/new-repo --since 30


  # 3. Review candidates

  ls .cex/runtime/taxonomy_candidates/


  # 4. N07 makes decisions'
i_2_force_re_review_of_all_kinds: 'python _tools/cex_taxonomy_scout.py --recheck-all --since 180


  Marks kinds with last_reviewed > 180 days as needing review.

  Writes stale-review candidates for N07.'
i_3_emergency_deprecation: '# Immediately deprecate a kind and point to successor

  python _tools/cex_taxonomy_scout.py --deprecate kind_name --successor new_kind


  Writes deprecation record, updates kinds_meta.json, creates migration file.'
i_4_scout_dry_run_no_writes: 'python _tools/cex_taxonomy_scout.py --source all --since 7 --dry-run


  Prints candidates to stdout without writing files. Safe for testing.


  ---'
