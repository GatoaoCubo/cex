id: spec_taxonomy_lifecycle
kind: context_doc
title: CEX Taxonomy Non-Aging Lifecycle System
version: 1.0.0
pillar: P01
nucleus: n04
mission: AI2AI_DEEP
quality: 9.1
tags:
- taxonomy
- lifecycle
- RAG
- discovery
- scout
- deprecation
- versioning
created: 2026-04-14
problem_statement: 'CEX has 238 kinds across 12 pillars. The AI2AI protocol landscape evolves at 20-30 new specs/year. Without
  a lifecycle system, CEX taxonomy stales in 12-18 months: kinds reference dead specs, builders miss emerging protocols, and
  the knowledge graph diverges from industry reality. This spec defines the auto-assimilation loop that keeps CEX taxonomy
  current without manual intervention beyond a weekly N07 review gate. ---'
architecture_overview: '[Sources]          [Scout]              [Review Gate]       [Assimilation]

  GitHub  ----+      cex_taxonomy_        N07 weekly          N03 build

  arXiv   ----+----> scout.py    ------>  review of       --> handoff

  IETF    ----+      (weekly cron)        candidates          (auto-generated)

  W3C     ----+          |

  IEEE    ----+      .cex/runtime/

  HN/PH   ----+      taxonomy_candidates/

  Conf    ----+


  Signal flow:

  1. Scout runs weekly (cron or manual)

  2. Candidates written to `.cex/runtime/taxonomy_candidates/`

  3. N07 reviews: build / wait / merge / reject

  4. N03 builds approved kinds via standard 8F pipeline

  5. kinds_meta.json updated with new lifecycle fields

  6. Deprecated kinds flagged via `deprecated_by` + migration hints


  ---'
