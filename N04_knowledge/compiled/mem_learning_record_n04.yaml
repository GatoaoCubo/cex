pattern:
- Load the pillar schema first so kind boundaries and naming expectations are explicit before any prose appears.
- Read the kind builder manifest and instruction before drafting so section shape follows an existing contract.
- Pull the kind KC and local N04 examples next to anchor vocabulary in repository-native terms.
- Tie each artifact back to N04 identity, memory posture, and retrieval goals so the Knowledge Gluttony lens stays domain-focused.
- 'Reuse one semantic stack across artifacts: embedder, vector store, graph, runtime memory, and learning memory should point
  at the same retrieval story.'
- Keep 8F trace lines concrete enough that a reviewer can see which local files informed the output.
anti_pattern:
- Drafting from the handoff alone causes kind drift, because the requested filenames do not carry the builder field expectations
  by themselves.
- Treating Knowledge Gluttony as decorative language instead of retrieval strategy leads to bloated prose with weak operational
  value.
- Mixing memory-state content into knowledge artifacts blurs what should be searched as policy versus what should be recalled
  as state.
- Writing all five artifacts independently without a shared semantic stack causes contradictions in dimensions, graph usage,
  and retrieval assumptions.
