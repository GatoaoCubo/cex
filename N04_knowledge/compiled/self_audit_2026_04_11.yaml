6_3_honest_verdict: 'I am the knowledge nucleus on paper. In practice, 4 of 6 consumer nuclei bypass my retriever entirely
  and read files directly. That means: my TF-IDF index is used by N03 (build-time context) and me (audits). Everyone else
  treats N04 as a library, not a service.


  Two ways to fix the under-utilization:

  1. Service model: publish a `retriever_config_{nucleus}.md` for each consumer with nucleus-tuned filters. Wire `cex_crew_runner.py`
  to call the right config per consumer. Measurable: retriever hit counts per nucleus.

  2. Library model: accept that nuclei read their own `N0x_*/knowledge/` folders. My job becomes enforcing naming + dedup
  + quality across all 7 `knowledge/` dirs, not serving queries.


  Recommend service model (option 1). It''s the only way vector retrieval eventually replaces TF-IDF without a rewrite.'
