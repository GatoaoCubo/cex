tldr: A set of automated checks to ensure all N04 artifacts meet structural, semantic, and connectivity requirements before
  integration.
density_score: 0.94
1_definition: 'This quality gate is applied to all artifacts within the `N04_knowledge` fractal before they can be considered
  "complete". It ensures every piece of knowledge architecture is sound, discoverable, and integrated.


  | Property | Value |

  | :--- | :--- |

  | Metric | `artifact_integrity_score` |

  | Threshold | `0.90` |

  | Operator | `>=` |

  | Scope | All artifacts in `N04_knowledge/` on commit. |'
2_hard_gates_automated_blocking: 'These gates are non-negotiable. A failure in any hard gate will block the artifact''s integration
  and fail the process. They are executed by the `cex_compile.py` script.


  | Gate ID | Description | Failure Condition |

  | :--- | :--- | :--- |

  | H01 | Valid Schema | Artifact frontmatter does not parse correctly against its `kind`. |

  | H02 | ID Integrity | `id` does not match the file''s pillar and name. |

  | H03 | Author Ownership | `author` is not `N04 Knowledge Nucleus`. |

  | H04 | Null Quality | `quality` field is not `null` (N04 does not self-score). |

  | H05 | TLDR Exists | `tldr` field is empty or missing. |

  | H06 | Tags Exist | `tags` array is empty or missing. |

  | H07 | KC Axioms | If `kind: knowledge_card`, the `axioms` list is empty. |

  | H08 | KC Links | If `kind: knowledge_card`, the `linked_artifacts` section is missing. |'
3_soft_gates_scored_weighted: 'These gates measure the quality and "good citizenship" of an artifact. The final score is a
  weighted average of these metrics.


  | Gate ID | Description | Max Penalty | Weight | Rationale |

  | :--- | :--- | :--- | :--- | :--- |

  | S01 | Atomicity | `0.3` | 40% | Is the artifact focused on a single, well-defined concept? (Crucial for retrieval). |

  | S02 | Connectivity | `0.2` | 30% | Does the artifact link to related concepts, creating a connected graph? |

  | S03 | Discoverability| `0.2` | 20% | Are `keywords` and `long_tails` specific and comprehensive? |

  | S04 | Clarity | `0.1` | 10% | Is the content unambiguous and easy for another agent to parse? |'
4_scoring_formula: '`artifact_integrity_score = 1.0 - (S01_penalty  0.40) - (S02_penalty  0.30) - (S03_penalty  0.20) - (S04_penalty  0.10)`


  - Evaluation: The scoring logic is implemented in a future `n04_quality_scorer` tool, which uses an LLM to assess the artifact
  against the soft gate criteria.'
5_bypass_audit_policy:
- 'Bypass: No bypass is permitted for Hard Gates. Soft Gate scores below the threshold can be overridden by the N01 or N05
  Nuclei with a logged justification.'
- 'Audit: Every gate evaluation (pass or fail) for every artifact is logged. The log includes the timestamp, artifact ID,
  gate ID, status, and any penalty applied. Logs are retained for 365 days.'
