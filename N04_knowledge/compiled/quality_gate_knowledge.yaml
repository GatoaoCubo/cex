tldr: Defines the 9 quality gates (5 Hard, 4 Soft) for all N04-domain knowledge artifacts, ensuring structural integrity,
  atomicity, and discoverability.
1_overview: 'This document defines the official set of quality gates that all knowledge artifacts within the N04 domain must
  pass before they can be published and integrated into the CEX knowledge base. The system is divided into two distinct types
  of checks: Hard Gates and Soft Gates.


  -   Hard Gates (H1-H5): These are absolute, binary (pass/fail) checks that are fully automated. An artifact failing any
  hard gate is immediately rejected and cannot proceed.

  -   Soft Gates (S1-S4): These are nuanced, qualitative checks that are evaluated using the associated `n04_sr_knowledge`
  scoring rubric. The resulting score determines if an artifact is published, requires review, or is rejected.'
2_hard_gates_structural_schema_integrity: 'These gates are executed automatically on commit or via `cex_doctor.py`. Failure
  is not permitted.


  | Gate ID | Name | Description | Automation |

  | :--- | :--- | :--- |:--- |

  | H1 | Valid Frontmatter | The artifact''s frontmatter must be valid YAML and parse without errors. All required fields
  for its `kind` must be present. | Fully Automated |

  | H2 | Valid Kind & Pillar | The `kind` must be a registered CEX kind, and the `pillar` must be a valid P-level pillar from
  the taxonomy. | Fully Automated |

  | H3 | Unique ID | The `id` field must be unique across all artifacts in the CEX ecosystem. | Fully Automated |

  | H4 | Valid Taxonomy Tags | All entries in the `tags` list must be valid, registered tags within the CEX master taxonomy.
  | Fully Automated |

  | H5 | No Placeholder Content| Key fields like `tldr` and `title` must not contain generic placeholder text (e.g., "...",
  "TBD", "Lorem Ipsum"). | Fully Automated |'
3_soft_gates_semantic_relational_quality: 'These gates are evaluated by an LLM-assisted scorer using the `n04_sr_knowledge`
  rubric. The combined weighted score determines the final quality level.


  | Gate ID | Name | Description | Scored By |

  | :--- | :--- | :--- | :--- |

  | S1 | Atomicity | Does the artifact represent a single, cohesive, and self-contained concept? (Weight: 40%) | `n04_sr_knowledge`
  |

  | S2 | Connectivity | Is the artifact well-integrated into the Knowledge Graph via the `linked_artifacts` field? (Weight:
  30%) | `n04_sr_knowledge` |

  | S3 | Discoverability| Is the metadata (`keywords`, `long_tails`, `tldr`) high-quality and representative of the content?
  (Weight: 20%) | `n04_sr_knowledge` |

  | S4 | Clarity | Is the content''s language and structure precise, unambiguous, and easy to parse for another agent? (Weight:
  10%) | `n04_sr_knowledge` |'
4_implementation_guidelines: '| Phase | Action | Command/Tool | Expected Result |

  | :--- | :--- | :--- | :--- |

  | Pre-commit | Check gates locally | `python _tools/cex_doctor.py --gate n04_qg_knowledge path/to/artifact.md` | All gates
  pass or specific failures listed |

  | Development | Validate frontmatter | `python _tools/cex_compile.py path/to/artifact.md` | YAML parses, required fields
  present |

  | Review | Score soft gates | `python _tools/cex_score.py --rubric n04_sr_knowledge path/to/artifact.md` | Score ≥ 7.5 for
  commit approval |

  | Integration | Update knowledge graph | Edit `linked_artifacts` field to reference related knowledge cards | Improved S2
  (Connectivity) score |

  | Maintenance | Monitor quality drift | `python _tools/cex_quality_monitor.py N04_knowledge/` | Track score trends over
  time |'
5_execution_enforcement:
- 'Trigger: This quality gate is automatically triggered by a `git pre-commit` hook for any changes within the `N04_knowledge/`
  directory.'
- 'Process:'
- The `cex_hooks.py` script executes the 5 Hard Gates. If any fail, the commit is rejected with an error message indicating
  the failed gate.
- If Hard Gates pass, the script calls the `n04_quality_scorer` tool (LLM-assisted) to evaluate the 4 Soft Gates using the
  rubric.
- The final weighted score is calculated.
- '`score >= 9.0`: Artifact is published.'
- '`7.5 <= score < 9.0`: Artifact is marked for review.'
- '`score < 7.5`: Commit is rejected.'
- 'Manual Execution: The gate can be run manually on any file or directory using `python _tools/cex_doctor.py --gate n04_qg_knowledge`.'
