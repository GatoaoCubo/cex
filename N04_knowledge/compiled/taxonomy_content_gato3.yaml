3_3_hashtag_rules: '1. Total per post: 20-25 hashtags (Instagram sweet spot 2026)

  2. Mix: 5 brand + 10 category + 5-10 trending/niche

  3. Placement: first comment (not caption) to keep caption clean

  4. Rotation: change 5 trending tags weekly to avoid shadowban patterns

  5. Research cadence: weekly review of hashtag performance via Instagram Insights


  ---'
4_content_product_integration_rules: 'Every content piece has a product integration score (0-3):


  | Score | Meaning | When |

  |-------|---------|------|

  | 0 | No product mention | Pure meme, pure education |

  | 1 | Subtle mention | "...uma boa cama como a Donut resolve isso" |

  | 2 | Contextual showcase | Product appears naturally in educational content |

  | 3 | Product-first | Review, unboxing, comparison |


  Weekly target: average integration score of 1.2-1.5 across all posts.

  Below 1.0 = not monetizing content. Above 2.0 = too salesy for brand voice.


  ---'
5_audience_segmentation_for_content: '| Segment | % of ICP | Content preference | Best format |

  |---------|----------|-------------------|-------------|

  | Tutor iniciante | 35% | "Como fazer X", basics | How-to blog, carrossel |

  | Tutor experiente | 40% | Deep science, product reviews | Deep dive blog, comparativo |

  | Tutor emocional | 15% | Humor, community, lifestyle | Memes, stories, engagement |

  | Profissional pet | 10% | B2B, trends, data | Blog deep dive, newsletter |


  ---'
