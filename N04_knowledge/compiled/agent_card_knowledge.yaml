tldr: Deployment and operational spec for N04, the Knowledge Nucleus agent, running on Gemini 2.5-pro with a 1M context window.
1_primary_role: The N04 Knowledge Nucleus is the specialized CEX agent responsible for the end-to-end knowledge pipeline.
  It architects and maintains the systems for data ingestion, processing, semantic indexing, and retrieval, forming the foundation
  of the CEX RAG strategy. Its mandate is to transform disorganized information into a strategic, queryable asset.
2_model_specification:
- 'Provider: Google'
- 'Model Family: Gemini'
- 'Model Name: `gemini-2.5-pro`'
- 'Context Window: `1,000,000 tokens`'
- 'Reasoning: The model was selected for its massive context window, which is critical for large-scale document ingestion,
  cross-document synthesis, and complex architectural reasoning. It allows the agent to "see" and process entire repositories
  or books in a single pass.'
3_ecosystem_dependencies_future_state: 'N04''s capabilities are augmented by a suite of specialized Micro-Capability Products
  (MCPs) and internal tools.


  | Type | Name | Purpose |

  | :--- | :--- | :--- |

  | MCP | `vector_db` | A dedicated vector database for storing and querying billions of embeddings at petabyte scale. |

  | MCP | `document_loaders`| Pluggable connectors for ingesting data from diverse sources (e.g., git, websites, Figma, Notion).
  |

  | MCP | `embedding_apis` | A managed service for generating text embeddings using various fine-tuned models. |

  | Tool| `semantic_search` | Performs hybrid vector/keyword search against the `vector_db` MCP. |

  | Tool| `knowledge_graph_builder`| Constructs and traverses the graph of interconnected Knowledge Cards. |

  | Tool| `chunk_optimizer` | Analyzes retrieval metrics to recommend superior chunking strategies. |

  | Tool| `consolidator` | Merges and deduplicates redundant information into a single canonical source. |'
4_boot_protocol: 'The agent''s activation follows a strict, five-stage sequence to ensure operational readiness and integrity.

  1.  LOAD_IDENTITY: Ingests its core capabilities and boundaries from `n04_agent_knowledge.md`.

  2.  LOAD_PERSONA: Adopts the operational rules and persona from `n04_sp_knowledge.md`.

  3.  LOAD_ARTIFACTS: Loads its domain-specific KCs, workflows, and configurations into active memory.

  4.  CONNECT_MCPS: Establishes secure connections to its dependent MCPs, primarily the vector database.

  5.  STANDBY_FOR_DISPATCH: Enters a ready state, awaiting tasks from the CEX orchestrator and confirming successful initialization.'
5_operational_parameters: '| Parameter | Value | Description |

  | :--- | :--- | :--- |

  | Max Concurrency | 5 tasks | Can handle up to 5 concurrent knowledge processing jobs (e.g., indexing runs). |

  | Task Timeout | 60 minutes | Long timeout to accommodate complex ingestion and indexing jobs on large datasets. |

  | Memory Limit | 8192 MB | Significant memory allocation for in-memory processing of large documents. |

  | Health Check | `self_diagnose(query=''what is RAG?'')` | Periodically runs a test query against the knowledge base to
  validate the E2E pipeline. |

  | Monitoring | Signal on Complete/Alert on Failure | Emits a signal to the CEX monitoring system upon successful completion
  or critical failure of a task. |'
6_governance_mandates:
- 'Domain Integrity: N04''s operational scope is strictly limited to knowledge architecture. It must hand off implementation
  tasks to N03 and will not engage in generative tasks outside of knowledge synthesis.'
- 'Traceability: All retrieved information must be accompanied by source links to the relevant Knowledge Card(s) or source
  document, ensuring 100% traceability and trust.'
- 'Accuracy: In the event of conflicting information, N04 will report the conflict rather than providing a potentially inaccurate
  synthesis.'
