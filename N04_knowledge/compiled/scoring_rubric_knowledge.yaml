tldr: '5-dimension scoring for KCs: density, taxonomy, actionability, structure, freshness.'
density_score: 0.92
quick_reference: '30-second scoring checklist:

  - [ ] Density: More tables than paragraphs? No filler words? → 7+

  - [ ] Taxonomy: Correct `kind:` field? Domain-specific? → 7+

  - [ ] Actionability: Has "when to use" + "when NOT to use"? → 7+

  - [ ] Structure: Complete frontmatter + `##` sections + tables? → 7+

  - [ ] Freshness: <90 days old? Version number? → 7+


  Decision tree: 5×Yes = 9+, 4×Yes = 8+, 3×Yes = 7+, <3×Yes = revise'
usage_guidelines: 'When to apply: Score every knowledge card before publication. Use during peer review cycles.


  How to score:

  - Read entire KC first (no skimming)

  - Score each dimension independently

  - Weight final score: `(Density×0.25) + (Taxonomy×0.20) + (Actionability×0.25) + (Structure×0.15) + (Freshness×0.15)`

  - Threshold: Publish ≥8.0, Revise 6.0-7.9, Reject <6.0


  Common scoring errors:

  - Inflating scores for "effort" (score output, not input)

  - Averaging all dimensions equally (use weights)

  - Scoring outdated content as "fresh" if recently edited'
scoring_examples: 'Density 10: "Use Redis for session storage. TTL=3600s. Keys: `user:{id}:session`" vs Density 4: "Redis
  is a popular in-memory database that many developers use for various caching scenarios including session management which
  can improve application performance." Taxonomy 10: `kind: rag_source, pillar: P04, domain: vector-search` with cross-refs
  vs Taxonomy 4: `kind: document, pillar: P01, domain: general` Actionability 10: "Use when: >10K docs, complex queries. Don''t
  use when: <100 docs, simple search. Anti-pattern: Vector search for exact matches" vs Actionability 4: "Vector search is
  useful for finding similar documents" Structure 10: Complete frontmatter + `## When`, `## How`, `## Examples` + tables vs
  Structure 4: Paragraph text with minimal headers'
