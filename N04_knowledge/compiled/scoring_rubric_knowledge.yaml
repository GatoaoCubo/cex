1_framework_overview: This rubric provides a structured evaluation framework for the four "soft gates" defined in the N04
  Knowledge Artifact Quality Gate. It is designed to be used by an LLM-based evaluator (`n04_quality_scorer` tool) or a human
  expert to generate a consistent `artifact_integrity_score`. Each dimension is scored from 0 to 10, which is then used to
  calculate the penalty for the quality gate.
2_scoring_dimensions: ''
dimension_1_atomicity: '- Weight: 40%

  - Description: Evaluates if the artifact represents a single, cohesive, and self-contained concept. This is the most critical
  factor for high-quality retrieval.


  | Score | Criteria | Example |

  | :--- | :--- | :--- |

  | 10 (Excellent) | The artifact is perfectly atomic. It covers one concept thoroughly without including irrelevant or tangential
  information. | A Knowledge Card about "Cosine Similarity" that only explains that concept and its formula. |

  | 5 (Fair) | The artifact primarily focuses on one concept but includes 1-2 related but distinct ideas, slightly reducing
  its clarity. | The "Cosine Similarity" KC also attempts to briefly explain Euclidean distance. |

  | 1 (Poor) | The artifact is a "grab bag" of multiple, unrelated concepts, making it impossible to retrieve for a specific
  query. | A single artifact explaining similarity, chunking, and RAG pipelines all at once. |'
dimension_2_connectivity: '- Weight: 30%

  - Description: Evaluates how well the artifact is integrated into the CEX knowledge graph through explicit links.


  | Score | Criteria | Example |

  | :--- | :--- | :--- |

  | 10 (Excellent) | All relevant upstream and downstream concepts are linked in the `linked_artifacts` section. The graph
  linkage is logical and complete. | A "RAG" KC links to "Embeddings", "Chunking", "Retrievers", and the parent "AI Architectures"
  KC. |

  | 5 (Fair) | The artifact links to some, but not all, obvious concepts. The graph is partially connected. | The "RAG" KC
  only links to "Embeddings", missing the other critical components. |

  | 1 (Poor) | The artifact is an island. The `linked_artifacts` section is empty or contains irrelevant links. | The "RAG"
  KC has no links. |'
dimension_3_discoverability: '- Weight: 20%

  - Description: Evaluates the quality and comprehensiveness of the metadata used for search (`keywords`, `long_tails`, `tldr`).


  | Score | Criteria | Example |

  | :--- | :--- | :--- |

  | 10 (Excellent) | Keywords are specific and exhaustive. Long-tail queries capture common user questions. TLDR is a perfect,
  dense summary. | Keywords: `[rag, retrieval, augmented, generation]`. Long-tails: `["how does retrieval augmented generation
  work"]`. |

  | 5 (Fair) | Metadata is present but generic. Keywords are too broad, and long-tails are not representative of likely queries.
  | Keywords: `[ai, llm]`. Long-tails: `["rag info"]`. |

  | 1 (Poor) | Metadata is missing, irrelevant, or just a copy-paste of the title. The artifact is practically invisible to
  search. | Keywords are empty. |'
dimension_4_clarity: '- Weight: 10%

  - Description: Evaluates the linguistic and structural quality of the content. Is it easy for another agent (or human) to
  understand?


  | Score | Criteria | Example |

  | :--- | :--- | :--- |

  | 10 (Excellent) | The language is precise and unambiguous. The structure is logical and easy to parse. Markdown is used
  effectively. | Content is written in clear, declarative sentences with well-defined sections. |

  | 5 (Fair) | The content is generally understandable but contains some jargon, awkward phrasing, or inconsistent structure.
  | Sentences are long and convoluted; sections are poorly defined. |

  | 1 (Poor) | The content is confusing, contradictory, or contains significant grammatical errors, making it unreliable.
  | The artifact is a "wall of text" with no clear structure or formatting. |'
