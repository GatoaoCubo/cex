tldr: 'Supabase table schemas: kcs (metadata), embeddings (vectors), search_index (FTS), audit_log (changes).'
density_score: 0.93
tables: ''
kcs: "CREATE TABLE kcs (\n  id TEXT PRIMARY KEY,\n  kind TEXT NOT NULL,\n  pillar TEXT NOT NULL,\n  domain TEXT,\n  title\
  \ TEXT NOT NULL,\n  tldr TEXT,\n  body TEXT NOT NULL,\n  tags TEXT[],\n  keywords TEXT[],\n  density_score FLOAT,\n  quality\
  \ FLOAT,\n  version TEXT DEFAULT '1.0.0',\n  author TEXT,\n  created_at TIMESTAMPTZ DEFAULT now(),\n  updated_at TIMESTAMPTZ\
  \ DEFAULT now()\n);"
embeddings: "CREATE TABLE embeddings (\n  id SERIAL PRIMARY KEY,\n  kc_id TEXT REFERENCES kcs(id),\n  chunk_index INT,\n \
  \ chunk_text TEXT,\n  embedding vector(1536),\n  model TEXT DEFAULT 'text-embedding-3-small',\n  created_at TIMESTAMPTZ\
  \ DEFAULT now()\n);\nCREATE INDEX idx_embeddings_vec ON embeddings USING ivfflat (embedding vector_cosine_ops);"
search_index_full_text_search: CREATE INDEX idx_kcs_fts ON kcs USING gin(to_tsvector('english', title || ' ' || body));
audit_log: "CREATE TABLE kc_audit_log (\n  id SERIAL PRIMARY KEY,\n  kc_id TEXT,\n  action TEXT, -- create, update, archive,\
  \ delete\n  diff JSONB,\n  actor TEXT,\n  created_at TIMESTAMPTZ DEFAULT now()\n);"
constraints_validation: '| Table | Field | Constraint | Reason |

  |-------|-------|-----------|--------|

  | `kcs` | `id` | `LIKE ''kc_%''` | Enforce KC naming convention |

  | `kcs` | `pillar` | `CHECK (pillar ~ ''^P[0-9]{2}$'')` | Validate P01-P12 format |

  | `kcs` | `density_score` | `CHECK (density_score >= 0 AND density_score <= 1)` | Score must be 0-1 range |

  | `kcs` | `quality` | `CHECK (quality >= 0 AND quality <= 10)` | Quality must be 0-10 range |

  | `kcs` | `body` | `CHECK (length(body) >= 100)` | Minimum content requirement |

  | `embeddings` | `chunk_index` | `CHECK (chunk_index >= 0)` | No negative chunk indices |

  | `embeddings` | `chunk_text` | `CHECK (length(chunk_text) <= 8000)` | Max token limit for embedding |

  | `audit_log` | `action` | `CHECK (action IN (''create'', ''update'', ''archive'', ''delete''))` | Valid action types only
  |'
table_relationships: '| Query Pattern | Tables | SQL Example |

  |---------------|--------|-------------|

  | Semantic search | `kcs` + `embeddings` | `SELECT k.* FROM kcs k JOIN embeddings e ON k.id = e.kc_id ORDER BY e.embedding
  <=> $vector LIMIT 10` |

  | Full-text search | `kcs` | `SELECT * FROM kcs WHERE to_tsvector(''english'', title || '' '' || body) @@ plainto_tsquery(''search
  term'')` |

  | Change tracking | `kcs` + `audit_log` | `SELECT a.* FROM kc_audit_log a WHERE a.kc_id = $kc_id ORDER BY created_at DESC`
  |

  | Chunk retrieval | `embeddings` | `SELECT chunk_text, chunk_index FROM embeddings WHERE kc_id = $kc_id ORDER BY chunk_index`
  |'
