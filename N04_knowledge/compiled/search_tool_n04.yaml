tldr: 'N04 corpus search tool: semantic + lexical hybrid search with cross-encoder reranking. Consumes input_schema_knowledge_query.md
  as its input contract. Returns ranked passages with source citations.'
density_score: null
overview: 'The N04 search tool is the query interface to the semantic corpus. It implements the READ PIPELINE from `memory_architecture_n04.md`
  layers 3-4 (semantic + procedural). Input contract: `input_schema_knowledge_query.md` (P06) Output: ranked passages or document
  references ---'
search_modes: '| Mode | Algorithm | When to Use | Latency |

  |------|-----------|------------|---------|

  | `dense` | cosine similarity on text-embedding-3-small | Semantic/conceptual queries | 180ms |

  | `sparse` | BM25 TF-IDF (cex_retriever.py, 12K vocab) | Exact keyword, technical terms | 45ms |

  | `hybrid` | RRF merge of dense + sparse (default) | Most queries | 220ms |

  | `graph` | Knowledge graph traversal (Neo4j if available) | Multi-hop reasoning | 500ms+ |

  | `procedural` | Exact string match on SOP index | "how to do X" queries | < 1ms |


  ---'
search_pipeline: "Query Input (conforms to input_schema_knowledge_query.md)\n       |\n       v\nQUERY PREPROCESSING\n  |--\
  \ Validate schema\n  |-- Optional: query expansion (HyDE if query_expansion=true)\n  |-- Optional: query rewriting (ambiguous\
  \ queries)\n       |\n       v\nPARALLEL RETRIEVAL\n  |-- Dense: embed query -> cosine search -> top-20 candidates\n  |--\
  \ Sparse: BM25 index search -> top-20 candidates\n       |\n       v\nMERGE (Reciprocal Rank Fusion, k=60)\n  RRF_score(d)\
  \ = sum(1 / (k + rank_i(d)) for all retrieval systems i)\n       |\n       v\nAPPLY FILTERS (if provided in input)\n  |--\
  \ kind, pillar, nucleus scope filters applied post-merge\n       |\n       v\nRERANKING (if rerank=true, default)\n  |--\
  \ Load top-20 merged results\n  |-- Cross-encoder: score each (query, passage) pair\n  |-- Re-sort by cross-encoder score\n\
  \  |-- Return top_k results\n       |\n       v\nFORMAT OUTPUT\n  |-- passages: text excerpts with source + score\n  |--\
  \ summaries: 1-2 sentence summaries\n  |-- full_docs: complete document content\n  |-- citations_only: source path + score\n\
  \n---"
query_expansion_hyde: "When `query_expansion=true`:\n\ndef hyde_expand(query: str, llm) -> str:\n    \"\"\"\n    Hypothetical\
  \ Document Embeddings:\n    Generate a hypothetical answer, embed it, use that embedding for retrieval.\n    Much better\
  \ zero-shot recall for obscure topics.\n    \"\"\"\n    hypothetical = llm.generate(\n        f\"Write a short expert answer\
  \ to: {query}\\n\\nAnswer:\"\n    )\n    return hypothetical\n\nUse only for multi-hop reasoning or obscure domain queries.\
  \ Adds ~3x latency.\n\n---"
python_interface: "from cex_sdk.search import KnowledgeSearch\n\nsearch = KnowledgeSearch(\n    corpus=\"cex_artifacts\",\n\
  \    mode=\"hybrid\",\n    top_k=10,\n    score_threshold=0.65,\n    rerank=True\n)\n\nresults = search.query(\n    query_text=\"\
  how does 8F pipeline work in N04\",\n    filters={\"kind\": \"knowledge_card\"},\n    output_format=\"passages\"\n)\n\n\
  for result in results:\n    print(f\"[{result.score:.2f}] {result.source}\")\n    print(result.content[:200])\n    print()\n\
  \n---"
cli_interface: "python _tools/cex_retriever.py \\\n  --query \"RAG architecture for knowledge management\" \\\n  --mode hybrid\
  \ \\\n  --top-k 10 \\\n  --threshold 0.65 \\\n  --format passages \\\n  --filter-kind knowledge_card\n\n---"
result_schema: "@dataclass\nclass SearchResult:\n    content: str         # retrieved text\n    score: float         # 0.0-1.0\
  \ similarity score\n    source: str          # relative file path\n    metadata: dict       # kind, pillar, nucleus, quality\n\
  \    rank: int            # position in result list (1-indexed)\n\n---"
cross_corpus_search: 'When `corpus="all"`, search runs against all three namespaces:

  1. `cex_artifacts` (internal CEX knowledge)

  2. `external_docs` (ingested external sources)

  3. `session_memory` (recent episodic summaries)


  Results are merged via RRF. Scores are normalized per corpus before merging.

  `session_memory` results get a recency boost: `boosted_score = score  (1 + 0.2  recency_factor)`

  where `recency_factor = max(0, 1 - days_old / 7)`.


  ---'
fallback_chain: '1. pgvector (primary) -- if Supabase available

  2. ChromaDB (local fallback) -- if Supabase unavailable

  3. cex_retriever.py TF-IDF (zero-dependency fallback) -- always available

  4. Grep-based keyword search -- emergency fallback (no embedding needed)


  ---'
integration: '| Artifact | Role |

  |---------|------|

  | `input_schema_knowledge_query.md` | Input contract (query validation) |

  | `retriever_n04.md` | Retriever config consumed by this tool |

  | `api_reference_rag_apis.md` | pgvector and Pinecone API calls |

  | `memory_benchmark_n04.md` | Baseline metrics -- regression check |

  | `eval_dataset_n04.md` | Test queries for benchmark runs |'
