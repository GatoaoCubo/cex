tldr: A fixed-length float vector representing text semantics, enabling similarity search via cosine distance in vector stores.
density_score: 0.96
updated: '2026-04-13'
boundary: An embedding is a numeric representation of text semantics, not a knowledge card (which contains structured metadata)
  or a context document (which contains full-text content). It is a component of RAG pipelines, not a complete system.
8f_pipeline_function: "Primary function: INJECT  \nEmbeddings are injected into vector stores during preprocessing, enabling\
  \ downstream systems to perform similarity search. Key stages:  \n1. Text input (e.g., user query, document)  \n2. Model\
  \ inference (e.g., OpenAI, SBERT)  \n3. Vector output (e.g., 1536-dimensional float array)  \n4. Storage in vector databases\
  \ (e.g., FAISS, pgvector)  \n5. Retrieval via similarity metrics (e.g., cosine similarity)  \n\nExample Use Case:  \nA customer\
  \ support chatbot uses embeddings to map user queries to relevant knowledge base documents."
comparison_of_embedding_models: "| Model Name              | Dimensions | Use Case               | Provider       | Performance\
  \ Metric (Cosine Similarity) |\n|------------------------|------------|------------------------|----------------|----------------------------------------|\n\
  | OpenAI `text-embedding-3-large` | 3072       | Semantic search        | OpenAI         | 0.89 (vs. BERT)             \
  \         |\n| Voyage `voyage-3`       | 1536       | Cross-lingual search   | Voyage AI      | 0.92 (vs. SBERT)       \
  \              |\n| SBERT (Sentence-BERT)   | 768        | Paraphrase detection   | Hugging Face   | 0.87 (vs. FastText)\
  \                  |\n| BERT (Base)             | 768        | Token-level analysis   | Google         | 0.78 (vs. RoBERTa)\
  \                   |\n| Sentence-T5             | 512        | Multilingual tasks     | Google         | 0.85 (vs. mBART)\
  \                     |\n\nNotes:  \n- Higher dimensions capture more nuance but increase storage costs.  \n- Cosine similarity\
  \ ranges from -1 (opposite) to +1 (identical)."
related_kinds:
- 'embedding_config: Defines parameters (e.g., model version, dimensionality) for embedding generation.'
- 'embedder_provider: Manages access to embedding models (e.g., OpenAI, Hugging Face).'
- 'vector_store: Stores and indexes embeddings for efficient similarity search.'
- 'knowledge_card: Contains structured metadata (e.g., entity relationships), distinct from raw embeddings.'
- 'rag_pipeline: Uses embeddings for retrieval, but includes additional stages (e.g., ranking, summarization).'
