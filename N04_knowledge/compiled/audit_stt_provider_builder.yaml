critical_errors_fixed: ''
error_1_architecture_domain_confusion_critical: 'File: bld_architecture_stt_provider.md Issue: "stt_provider sits at the interface
  between user voice inputs and CEX trading systems, translating audio into structured text for order execution. It ensures
  real-time compliance, integrates with order management..." Problem: Confused CEX (the knowledge system) with a crypto exchange.
  STT has nothing to do with trading/order execution. Fix: Rewrote to correctly position STT within voice pipeline: "translates
  raw audio into structured transcription output consumed by voice assistants, call analytics, and accessibility tools."'
error_2_missing_key_vendors_high: 'File: bld_knowledge_card_stt_provider.md Issue: Only mentioned AWS, Google, Azure, NVIDIA
  Riva, CMU Sphinx. Missing market leaders. Fix: Added Deepgram (Nova-2, WER 3-4%), OpenAI Whisper (large-v3, 2.7% WER), AssemblyAI
  (Conformer-2), Rev.ai, Speechmatics, faster-whisper, Vosk with real specs.'
