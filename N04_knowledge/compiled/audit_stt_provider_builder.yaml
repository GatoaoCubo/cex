remaining_gaps:
- bld_tools.md references val_tester.py, val_analyzer.py, val_comparator.py, val_profiler.py -- these are hypothetical tools,
  not real CEX tools. Should reference cex_doctor.py, cex_score.py only.
- 'bld_schema.md uses `quality: "draft"` as default -- conflicts with CEX convention (quality: null).'
- bld_examples.md shows only Google STT endpoint -- could add Deepgram/AssemblyAI examples.
- No streaming-specific configuration examples.
recommendation: Link stt_provider builder to `P01_knowledge/library/kind/kc_stt_provider.md` (exists per git log) and to citation
