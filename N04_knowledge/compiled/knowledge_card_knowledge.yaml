  ## 1. The Core Paradigm: Retrieval-Augmented Generation (RAG)

  RAG is the fundamental architecture for providing LLMs with external, dynamic, and verifiable knowledge. It transforms the
  LLM from a closed-book reasoner into an open-book expert.


  Flow:

  `[User Query] -> [1. Encode Query] -> [2. Semantic Search] -> [3. Retrieve Chunks] -> [4. Augment Prompt] -> [5. Synthesize
  Answer] -> [LLM Response]`


  | Stage | Action | Critical Function |

  | :--- | :--- | :--- |

  | 1. Encode | Convert query text into a vector embedding. | Captures semantic intent, not just keywords. |

  | 2. Search | Find semantically similar chunks in a vector database. | The core of "relevance" finding. |

  | 3. Retrieve | Pull the top-k most relevant data chunks. | The context window for the LLM. |

  | 4. Augment | Inject retrieved chunks into the LLM''s prompt. | Provides the "grounding" data. |

  | 5. Synthesize | LLM answers the query using the provided context. | Generates a context-aware, factual response. |


  ## 2. The Foundation: Semantic Indexing

  To enable RAG, knowledge must be transformed into a machine-readable format that captures meaning.


  ### A. Semantic Chunking

  Breaking down large documents into small, self-contained, but contextually rich fragments. This is the most critical step
  for retrieval quality.

  - Bad Chunk: An arbitrary 500-word block.

  - Good Chunk: A paragraph or section that fully explains a single, cohesive idea.


  ### B. Vector Embeddings

  A high-dimensional numerical representation of a chunk''s semantic meaning. Generated by an embedding model (e.g., `text-embedding-ada-002`,
  `jina-embeddings-v2`). Chunks with similar meanings will have vectors that are "close" in cosine similarity.


  ## 3. The Structure: Knowledge Graph & Taxonomy

  While vector search finds relevance, a knowledge graph provides structure and discoverability.

  - Nodes: Canonical pieces of knowledge (Knowledge Cards).

  - Edges: The relationships between them (e.g., `is_a`, `depends_on`, `related_to`).

  - Taxonomy: A hierarchical classification system (e.g., `CEX > Nuclei > N04 > Artifacts > KCs`) used to tag and filter nodes,
  narrowing the search space for the retriever.


  Synergy: Use the taxonomy to filter the search space before performing the vector search. This drastically improves speed
  and relevance.

  `Query -> Filter by Taxonomy Tag -> Vector Search on smaller set -> Retrieve Chunks`


  ## Golden Rules

  1.  CHUNK for CONTEXT: Optimize chunk size to maximize the signal-to-noise ratio for the LLM. The chunk must contain the
  answer.

  2.  EMBED for MEANING: Choose an embedding model that aligns with your domain and query types.

  3.  STRUCTURE for DISCOVERY: Build a taxonomy and knowledge graph to enable both broad exploration and fine-grained retrieval.

  4.  ITERATE on RETRIEVAL: The quality of the RAG system is a direct function of retrieval performance. Continuously evaluate
  and refine chunking, embedding, and retrieval strategies.'
