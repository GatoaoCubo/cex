1_source_description: '| Aspect | Details |

  |--------|---------|

  | Scope | Entire local CEX project directory |

  | File Types | Markdown (`.md`) files exclusively |

  | Content | CEX architecture, processes, artifacts, documentation |

  | Authority | Primary source of truth for CEX internals |

  | Nature | Living memory of the system |

  | Update Model | Real-time reflection of current codebase state |'
2_extraction_method_file_glob:
- 'Description: The `document_loaders` MCP will use a file globbing mechanism to find all relevant files within the project
  directory specified by the `url`.'
- 'Configuration:'
- 'Glob Pattern: `*/.md`'
- 'Exclude Patterns:'
- '`/node_modules/`'
- '`/_archive/`'
- '`/.git/`'
3_freshness_update_policy: '| Aspect | Details |

  |--------|---------|

  | Re-check Interval | Real-time |

  | Trigger Method | Git pre-commit hook on `.md` file modifications |

  | Update Process | Document Ingestion & Indexing workflow for specific modified file |

  | Sync Guarantee | Perfect alignment between committed codebase state and searchable knowledge base |

  | Staleness Risk | Eliminated for internal documentation |'
4_reliability_authority:
- 'Reliability: `High`. As the direct output of the CEX nuclei, these documents are considered canonical, authoritative sources
  of information.'
- 'Verification: The content is implicitly verified by the peer review process of pull requests and the operational success
  of the described systems.'
5_integration: This is the default source for most queries related to CEX's internal workings. The `retriever_config` will
  prioritize results from this source when the user's query contains keywords like "CEX", "N0#", or refers to specific artifacts.
