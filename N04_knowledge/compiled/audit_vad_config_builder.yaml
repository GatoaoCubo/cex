critical_errors_fixed: ''
error_1_architecture_domain_confusion_critical: 'File: bld_architecture_vad_config.md Issue: "vad_config resides in the infrastructure
  layer of the CEX ecosystem, ensuring configuration consistency across trading, risk, and compliance systems." Problem: Same
  trading-system confusion as STT builder. VAD is an audio preprocessing component, not a financial risk management tool.
  Fix: Repositioned as "first filter in voice pipelines -- separating speech from silence/noise -- interfacing with stt_provider_builder
  (downstream) and voice_pipeline_builder (orchestrator)."'
error_2_schema_quality_gate_threshold_inconsistency_critical: "Files: bld_schema_vad_config.md + bld_quality_gate_vad_config.md\
  \  \nIssue: Schema defined `threshold range: 0.5-1.0` but quality gate HARD gate H05 checked `threshold < 0.1 or > 0.5`.\
  \ These contradict each other. A valid config (threshold=0.7) would FAIL the quality gate.  \nRoot cause: qwen3:8b treated\
  \ `threshold` as a generic probability without understanding the dual-concept: WebRTC uses integer aggressiveness (0-3)\
  \ while Silero uses float probability (0.0-1.0). The schema conflated both.  \nFix: \n- Schema: Defined `threshold` as energy\
  \ threshold in dBFS (-70 to -10), added `aggressiveness` as separate WebRTC-specific field (int 0-3)\n- Quality gate: Updated\
  \ H05 to check `aggressiveness not in {0,1,2,3}`, H06 for `frame_size_ms`, H07 for `noise_floor_db`"
error_3_missing_key_vad_engines_high: 'File: bld_knowledge_card_vad_config.md Issue: Referenced WebRTC VAD and Kaldi but missing
  Silero VAD (2024 recommended default for ML-based VAD) and py-webrtcvad (most-used Python binding). Fix: Added engine comparison
  matrix with Silero, WebRTC, Kaldi, py-webrtcvad, Auditok, NVIDIA Riva VAD.'
vad_engine_coverage_after_fix: '| Engine | Type | Latency | License | Mentioned |

  |---|---|---|---|---|

  | WebRTC VAD | Energy | <5ms | BSD | YES |

  | Silero VAD v4 | Neural (LSTM) | ~10ms | MIT | YES (added) |

  | Kaldi VAD | GMM/Energy | ~20ms | Apache 2.0 | YES |

  | py-webrtcvad | Python binding | <5ms | MIT | YES (added) |

  | Auditok | Energy | <5ms | MIT | YES (added) |

  | NVIDIA Riva VAD | Neural (GPU) | <5ms | Commercial | YES (added) |'
technical_accuracy_notes: 'VAD knowledge card (bld_knowledge_card_vad_config.md) was the highest-quality ISO across all 3
  builders. It correctly cited:

  - Dual-threshold VAD (ICASSP 2020)

  - Frame sizes (10-30ms)

  - Kaldi VAD implementation

  - ITU-T P.501

  - ISO/IEC 23608


  The qwen3:8b model understood VAD domain better than STT/TTS providers domain.'
remaining_gaps:
- bld_tools.md references vad_validator.py, vad_analyzer.py, vad_tester.py -- hypothetical. Should reference py-webrtcvad
  for testing, silero-vad library for ML inference.
- 'bld_examples.md shows aggressiveness: 3 in golden example but bld_schema.md did not include aggressiveness as a field (fixed
  in schema but examples pre-date fix).'
- No language-specific threshold tuning examples (Portuguese, Mandarin VAD behaves differently than English due to phoneme
  distribution).
recommendation: 'VAD builder is technically the most accurate of the 3. Recommend:

  1. Add citation artifacts linking to py-webrtcvad docs and Silero VAD model card

  2. Add language-specific tuning example to bld_examples.md

  3. Link to voice_pipeline builder KC for end-to-end context'
