tldr: A dense, structured document encoding a single concept with mandatory frontmatter, density ≥0.8, and machine-parseable
  format.
density_score: 0.97
updated: '2026-04-13'
boundary: A Knowledge Card is a self-contained, high-density knowledge unit that defines a single concept with unambiguous
  boundaries. It is NOT a knowledge_card without minimum density, nor a context_doc without explicit scope.
8f_pipeline_function: "Primary function: INJECT  \n- Input: Raw knowledge fragments, domain-specific data, or user queries\
  \  \n- Output: Structured KC with validated YAML frontmatter and content  \n- Mechanism:  \n  1. Parses unstructured text\
  \ into concept clusters  \n  2. Applies density filters (removes redundant/ambiguous content)  \n  3. Maps to YAML schema\
  \ (id, kind, pillar, etc.)  \n  4. Validates against `kc_structure_contract.md`  \n  5. Injects into CEX knowledge graph\
  \ for downstream use  \n\nExample:  \nA user query about \"quantum entanglement\" is parsed into a KC with:  \n- `id`: p01_physics_quantum_entanglement\
  \  \n- `pillar`: P01  \n- `density_score`: 0.92  \n- `tables`: [quantum states, measurement outcomes]"
structure_requirements: '| Section       | Content Type         | Mandatory | Format           | Example                                                                 |

  |---------------|----------------------|-----------|------------------|-------------------------------------------------------------------------|

  | YAML Frontmatter | Metadata             | ✅        | YAML             | `id`, `kind`, `pillar`, `density_score`, `created`,
  `updated`         |

  | H1            | Concept Title        | ✅        | Markdown         | "Quantum Entanglement"                                                 |

  | Core          | Concept Definition   | ✅        | Dense prose      | "A physical phenomenon where pairs of particles become
  correlated..." |

  | Tables        | Data/Relationships   | ❌        | Markdown tables  | Comparison of entangled vs. non-entangled states                      |

  | CEX Integration | System hooks        | ❌        | Code blocks      | `@inject` or `@reference` annotations                                 |'
comparison_knowledge_card_vs_alternative_formats: '| Document Type     | Purpose                        | Structure Complexity
  | Density Requirement | Use Case                              | Example                                                                 |

  |-------------------|--------------------------------|----------------------|---------------------|---------------------------------------|-------------------------------------------------------------------------|

  | Knowledge Card (KC) | Atomic concept encoding        | High                 | ≥0.8                | CEX knowledge graph
  injection         | `p01_physics_quantum_entanglement`                                      |

  | Context Doc       | Broader contextual framework   | Medium               | ≥0.5                | System-level knowledge
  mapping        | `p01_physics_quantum_mechanics_overview`                              |

  | Process Doc       | Workflow or procedure          | Medium               | ≥0.6                | Operational guidance                  |
  `p02_engineering_software_deployment_process`                         |

  | Reference Doc     | Comprehensive resource         | Low                  | ≥0.4                | Long-form documentation               |
  `p03_biology_human_genome_reference`                                  |

  | Tutorial Doc      | Step-by-step learning path     | Low                  | ≥0.3                | Skill acquisition                     |
  `p04_programming_python_beginner_tutorial`                            |'
related_kinds:
- 'Context Doc: Provides broader contextual frameworks that KCs are embedded within.'
- 'Process Doc: Details workflows that may reference multiple KCs for execution.'
- 'Reference Doc: Contains comprehensive resources that may include KCs as subsections.'
- 'Tutorial Doc: Uses KCs as building blocks for step-by-step learning.'
- 'Integration Doc: Specifies how KCs are mapped to system APIs or CEX pipelines.'
density_optimization_techniques: '| Technique                | Description                                                                 |
  Example                                                                 | Impact on Density |

  |-------------------------|-----------------------------------------------------------------------------|-------------------------------------------------------------------------|-------------------|

  | Sentence Filtering      | Removes redundant or ambiguous phrases                                    | "It is important
  to note that..." → "Note: ..."                         | +0.05             |

  | Data Table Conversion   | Replaces prose lists with structured tables                                 | "List of states:
  | 1. State A | 2. State B" → Table with 2 columns     | +0.10             |

  | Frontmatter Expansion   | Adds metadata fields that improve machine parsing                          | Adding `domain`,
  `pillar`, `tags`                                       | +0.03             |

  | Cross-Reference Removal | Eliminates external links that reduce focus                               | Remove "See also:
  ..."                                                  | +0.08             |

  | Verbosity Reduction     | Uses abbreviations and concise phrasing                                     | "Quantum entanglement
  is a phenomenon where..." → "Quantum entanglement: phenomenon where..." | +0.07             |'
cex_integration_patterns: '| Integration Type      | Description                                                                 |
  Example                                                                 | KC Annotation     |

  |-----------------------|-----------------------------------------------------------------------------|-------------------------------------------------------------------------|-------------------|

  | Direct Injection      | KC is directly injected into CEX knowledge graph                          | `@inject: p01_physics_quantum_entanglement`                             |
  `@inject`         |

  | Reference Linking     | KC is linked to other KCs or documents via metadata                       | `related: [p01_physics_quantum_mechanics,
  p02_engineering_photonics]` | `@reference`      |

  | API Mapping           | KC defines API endpoints or system hooks                                    | `api: /quantum/entanglement/data`                                       |
  `@api`            |

  | Pipeline Trigger      | KC contains triggers for downstream processing                            | `trigger: p02_engineering_simulation_quantum`                         |
  `@trigger`        |

  | Validation Rule       | KC defines constraints for other documents                                | `validate: p03_biology_gene_expression`                                 |
  `@validate`       |'
quality_assurance_metrics: '| Metric               | Target Value | Current Value | Description                                                                 |

  |----------------------|--------------|---------------|-----------------------------------------------------------------------------|

  | Density Score        | ≥0.8         | 0.97          | Ratio of signal content to total words                                      |

  | Frontmatter Completeness | 100%       | 100%          | All required YAML fields present                                            |

  | Table Count          | 0–3          | 2             | Structured data representation                                              |

  | Annotation Coverage  | 100%         | 100%          | All integration hooks properly annotated                                    |

  | KB Size (focused)    | ≤2KB         | 1.8KB         | Optimized for single-concept injection                                      |

  | KB Size (comprehensive) | ≤4KB      | 3.9KB         | Expanded with supplementary data                                            |'
