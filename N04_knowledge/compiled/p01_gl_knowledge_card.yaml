id: p01_gl_knowledge_card
kind: glossary_entry
pillar: P01
title: Knowledge Card (KC)
version: 1.0.0
created: 2026-04-07
author: n04_knowledge
domain: knowledge-management
quality: 8.7
tags:
- glossary
- knowledge-card
- kc
- p01
tldr: A dense, structured document encoding a single concept with mandatory frontmatter, density ≥0.8, and machine-parseable
  format.
density_score: 0.97
updated: '2026-04-13'
boundary: Short definition of domain term. NOT a knowledge_card (without minimum density) or context_doc (without scope).
core_content: ''
key_properties:
- 'Single Concept Focus: Encodes one idea, entity, or process (e.g., "quantum entanglement" vs. "quantum mechanics").'
- 'Machine-Readable: YAML frontmatter enables automated indexing, search, and integration.'
- 'Density Constraint: ≥0.8 information density (no fluff, no redundancy).'
- 'Versioning: Tracks updates via `version` field (e.g., 1.0.0 → 1.1.0).'
- 'Scoping: Explicitly defines boundaries (e.g., "applies to P01 only").'
technical_constraints:
- 'Size Limits: Focused (2KB) vs. Comprehensive (4KB).'
- 'Format: Strict Markdown with YAML frontmatter (no HTML, no images).'
- 'Encoding: UTF-8, ASCII-compatible.'
- 'Validation: Must pass `kc_validator` tool (see `kc_structure_contract.md`).'
- 'Licensing: CC-BY-4.0 unless otherwise specified.'
use_cases:
- 'Knowledge Injection: Populates CEX knowledge graphs.'
- 'Training Data: Feeds AI models with precise, structured data.'
- 'API Documentation: Serves as schema for REST/GraphQL endpoints.'
- 'Onboarding: Accelerates new team member learning curves.'
- 'Cross-System Sync: Ensures consistency across CEX tools.'
8f_pipeline_function: "Primary function: INJECT  \n\nInputs:  \n- Raw domain knowledge (e.g., technical specs, business rules).\
  \  \n- Existing KCs for alignment.  \n\nProcess:  \n1. Extract: Identify core concept from source material.  \n2. Transform:\
  \ Apply density constraints, structure, and validation.  \n3. Load: Inject into CEX knowledge graph via API or CLI.  \n\n\
  Outputs:  \n- Validated KC file (`.md`).  \n- Graph database updates.  \n- Audit trail for versioning.  \n\nExample:  \n\
  A KC on \"blockchain consensus\" would inject nodes into the \"distributed systems\" graph, linking to \"Proof of Work,\"\
  \ \"Proof of Stake,\" and \"Smart Contracts.\"  \n\nConstraints:  \n- No circular references in graph.  \n- All links must\
  \ exist in CEX.  \n- No duplicate concepts (enforced by `kc_validator`)."
comparison_kc_vs_document_types: '| Document Type      | Purpose                        | Density Score | Format           |
  Use Case                          |

  |--------------------|--------------------------------|---------------|------------------|-----------------------------------|

  | Knowledge Card (KC) | Atomic concept encoding        | ≥0.8          | Markdown + YAML  | CEX integration, AI training      |

  | Context Doc        | Broad contextual explanation   | 0.5–0.7       | Markdown         | Background reading, documentation
  |

  | Knowledge Article  | Detailed tutorial or guide     | 0.6–0.8       | Markdown         | User onboarding, process guides   |

  | Concept Map        | Visual relationship overview   | 0.4–0.6       | Diagram + text   | Learning, brainstorming           |

  | Taxonomy Entry     | Hierarchical classification    | 0.7–0.9       | Structured JSON  | Metadata tagging, search indexing
  |'
related_kinds:
- 'Context Document: Provides broader context for KCs (e.g., "blockchain in finance" vs. "blockchain consensus").'
- 'Knowledge Article: Expands on KC concepts with tutorials or workflows (e.g., "Implementing Proof of Work").'
- 'Concept Map: Visualizes relationships between KCs (e.g., linking "quantum entanglement" to "quantum computing").'
- 'Taxonomy Entry: Defines classification hierarchies (e.g., "P01 > Physics > Quantum Mechanics").'
- 'Integration Specification: Describes how KCs connect to external systems (e.g., API endpoints, databases).'
examples: ''
example_1_focused_kc_2kb: "---\nid: p01_gl_kc_quantum_entanglement\nkind: glossary_entry\npillar: P01\ntitle: \"Quantum Entanglement\"\
  \nversion: 1.0.0\nauthor: n04_physics\ndomain: quantum-mechanics\ndensity_score: 0.92\ntags: [quantum, entanglement, p01]\n\
  ---\n\n# Quantum Entanglement\n\nTerm: Quantum Entanglement  \nSynonyms: EPR paradox, spooky action  \n\nDefinition: A phenomenon\
  \ where particles become correlated such that the state of one instantly influences the state of another, regardless of\
  \ distance.  \n\nSee: `p01_gl_kc_quantum_superposition`  \n\n## Core Content\n\n- Key Properties: Non-local correlations,\
  \ no faster-than-light signaling.  \n- Mathematical Basis: Bell's theorem, entangled state equations.  \n- Applications:\
  \ Quantum cryptography, quantum teleportation.  "
example_2_comprehensive_kc_4kb: "---\nid: p01_gl_kc_blockchain_consenus\nkind: glossary_entry\npillar: P01\ntitle: \"Blockchain\
  \ Consensus\"\nversion: 1.2.1\nauthor: n04_blockchain\ndomain: distributed-systems\ndensity_score: 0.85\ntags: [blockchain,\
  \ consensus, p01]\n---\n\n# Blockchain Consensus\n\nTerm: Blockchain Consensus  \nSynonyms: Consensus algorithm, distributed\
  \ agreement  \n\nDefinition: Mechanisms ensuring all nodes in a blockchain network agree on the validity of transactions\
  \ and the state of the ledger.  \n\nSee: `p01_gl_kc_proof_of_work`, `p01_gl_kc_proof_of_stake`  \n\n## Core Content\n\n\
  ### Key Properties\n- Types: Proof of Work (PoW), Proof of Stake (PoS), Delegated Proof of Stake (DPoS).  \n- Security:\
  \ Prevents double-spending, Sybil attacks.  \n- Scalability: Varies by algorithm (e.g., PoW: low; PoS: high).  \n\n### Technical\
  \ Constraints\n- Latency: PoW (10+ mins), PoS (seconds).  \n- Energy Use: PoW (high), PoS (low).  \n- Validator Requirements:\
  \ PoW (computing power), PoS (staked tokens).  \n\n### Use Cases\n- Bitcoin: PoW.  \n- Ethereum 2.0: PoS.  \n- EOS: DPoS.\
  \  \n\n## CEX Integration\n- Graph Nodes: \"Consensus Algorithm\" → \"Proof of Work,\" \"Proof of Stake.\"  \n- API Endpoints:\
  \ `/v1/consensus/validate`, `/v1/consensus/ledger`.  "
best_practices:
- 'Frontmatter First: Always include `id`, `kind`, `pillar`, `version`, `author`, `domain`, `density_score`, `tags`.'
- 'Density Checks: Use `kc_validator` to ensure ≥0.8 density.'
- 'Linking: Reference related KCs via `See` field.'
- 'Versioning: Update `version` for changes (e.g., 1.0.0 → 1.1.0).'
- 'Validation: Run through `kc_structure_contract.md` before publishing.'
common_pitfalls:
- 'Too Broad: "Blockchain" instead of "Blockchain Consensus."'
- 'Low Density: Fluffy explanations without actionable data.'
- 'Invalid Format: Missing YAML frontmatter or incorrect Markdown.'
- 'Circular Links: KCs referencing each other without clear hierarchy.'
- 'Outdated Info: Failing to update `version` or `density_score`.'
tools:
- 'kc_validator: Validates structure, density, and format.'
- 'kc_builder: GUI tool for creating KCs.'
- 'kc_grapher: Visualizes KC relationships in CEX.'
- 'kc_search: Full-text search across all KCs.'
- 'kc_exporter: Exports KCs to JSON, XML, or CSV.'
future_work:
- 'AI-Generated KCs: Automate creation from unstructured text.'
- 'Multilingual Support: Translate KCs into 10+ languages.'
- 'Real-Time Sync: Auto-update KCs from live data streams.'
- 'Interactive KCs: Embed videos, code snippets, or simulations.'
- 'Density Optimization: Use NLP to refine prose for higher density.'
