id: p01_gl_knowledge_card
kind: glossary_entry
pillar: P01
title: Knowledge Card (KC)
version: 1.0.0
created: 2026-04-07
author: n04_knowledge
domain: knowledge-management
quality: 8.8
tags:
- glossary
- knowledge-card
- kc
- p01
tldr: A dense, structured document encoding a single concept with mandatory frontmatter, density ≥0.8, and machine-parseable
  format.
density_score: 0.97
updated: '2026-04-13'
boundary: A Knowledge Card is a domain-specific, machine-parseable artifact with strict density requirements. It is not a
  knowledge_card (without minimum density), context_doc (without scope), or general documentation. It must encode exactly
  one concept with no ambiguity.
8f_pipeline_function: "Primary function: INJECT  \n- Input: Unstructured domain knowledge  \n- Output: Structured KC with\
  \ frontmatter, tables, and CEX integration  \n- Constraints:  \n  - Density score ≥0.8  \n  - Max 4KB (comprehensive)  \n\
  \  - YAML frontmatter required  \n  - No markdown beyond H1 and tables  \n- Tools: `kc_builder`, `density_analyzer`, `schema_validator`"
core: ''
concept_encoding_principles: '| Principle | Description | Example | Constraint |

  |---------|-------------|---------|----------|

  | Single Concept | Encodes exactly one domain concept | "Quantum Entanglement" | No multiple concepts |

  | Density Optimization | Every sentence adds value | "Entanglement violates classical locality" | "If deleted, KC loses
  value" |

  | Machine Parseability | YAML frontmatter required | `id: p01_gl_knowledge_card` | Schema validation mandatory |

  | Contextual Scope | Defined by domain and pillar | "P01: Knowledge Management" | No cross-domain concepts |

  | CEX Integration | Must include integration spec | `integration: cex-001` | Valid CEX version required |'
density_optimization_techniques:
- 'Eliminate redundancy: "Entanglement is a quantum phenomenon" → "Quantum entanglement"'
- 'Use tables for data: Replace prose with structured data (see below)'
- 'Frontmatter prioritization: Place metadata first'
- 'Concise definitions: "Non-local correlation between particles"'
- 'Avoid explanation: Focus on facts, not interpretation'
comparison_kc_vs_other_document_types: '| Document Type | Purpose | Density Score | Max Size | Primary Use Case |

  |--------------|---------|----------------|----------|-------------------|

  | Knowledge Card (KC) | Atomic concept encoding | ≥0.8 | 2KB (focused) | CEX integration, AI training |

  | Context Document (CD) | Broad contextual explanation | 0.5-0.7 | 10KB+ | Human-readable documentation |

  | Knowledge Graph Node (KGN) | Graph-based concept representation | 0.6-0.8 | 5KB | Semantic linking, visualization |

  | CEX Integration Spec | CEX compatibility definition | 0.9 | 1KB | System interoperability |

  | Fact Sheet | General information summary | 0.4-0.6 | 15KB+ | Public communication |'
cex_integration: ''
required_fields:
- '`integration`: CEX version (e.g., `cex-001`)'
- '`schema`: JSON schema reference (e.g., `kc_schema_v1.0.0`)'
- '`tooling`: Required tools for processing (e.g., `kc_builder`, `schema_validator`)'
- '`pipeline`: 8F pipeline stage (e.g., `INJECT`)'
- '`density_score`: Calculated value (≥0.8)'
example_integration: 'integration: cex-001

  schema: kc_schema_v1.0.0

  tooling: ["kc_builder", "density_analyzer"]

  pipeline: INJECT

  density_score: 0.97'
related_kinds:
- 'Glossary Entry: Provides definitions but lacks density requirements and CEX integration'
- 'Context Document: Broader in scope but lower density (0.5-0.7)'
- 'Knowledge Graph Node: Structured for graph linking but less focused on single concepts'
- 'CEX Integration Specification: Defines compatibility rules but not content encoding'
- 'Fact Sheet: General-purpose documentation with no strict density or structure'
use_cases: ''
domain_specific_applications: '| Domain | Use Case | KC Example | Density | Size |

  |-------|----------|------------|---------|------|

  | Physics | Quantum Entanglement | "Quantum entanglement" | 0.97 | 2KB |

  | Medicine | COVID-19 Vaccination | "mRNA vaccine mechanism" | 0.89 | 3KB |

  | Finance | Black-Scholes Model | "Option pricing formula" | 0.85 | 4KB |

  | Law | GDPR Compliance | "Data subject rights" | 0.82 | 3.5KB |

  | Engineering | Finite Element Analysis | "Mesh discretization" | 0.88 | 3KB |'
cex_pipeline_integration:
- 'Stage: INJECT'
- 'Input: Unstructured domain knowledge (e.g., research papers, technical manuals)'
- 'Output: Structured KC with frontmatter, tables, and CEX integration'
- 'Tools: `kc_builder`, `density_analyzer`, `schema_validator`'
- 'Validation: Must pass schema checks and density scoring'
density_scoring_matrix: '| Score Range | Description | Example | Use Case |

  |------------|-------------|---------|----------|

  | ≥0.9 | Highly dense, minimal redundancy | "Quantum entanglement" | AI training, CEX integration |

  | 0.8-0.89 | Dense, minor redundancy | "mRNA vaccine mechanism" | Human-readable documentation |

  | 0.7-0.79 | Moderate density | "Data subject rights" | Public communication |

  | 0.6-0.69 | Low density | "Finite element analysis" | General reference |

  | <0.6 | Not a KC | General documentation | Not applicable |'
best_practices:
- 'Start with the core concept: "Quantum entanglement"'
- 'Add structured data: Replace prose with tables (see above)'
- 'Validate density: Use `density_analyzer` tool'
- 'Include CEX integration: Ensure `integration` field is present'
- 'Use YAML frontmatter: Mandatory for all KCs'
tools_and_validation:
- 'kc_builder: Converts unstructured knowledge to KC format'
- 'density_analyzer: Calculates density score (≥0.8 required)'
- 'schema_validator: Ensures YAML frontmatter compliance'
- '8F Pipeline: Processes KCs through INJECT stage'
- 'CEX Compatibility: Must use valid CEX version (e.g., `cex-001`)'
conclusion: A Knowledge Card is the atomic unit of knowledge in CEX, designed for high-density encoding, machine parsing,
  and seamless integration. It must adhere to strict formatting, density, and CEX compatibility rules. By following best practices
  and using validation tools, KCs ensure consistency, interoperability, and value across the CEX ecosystem.
