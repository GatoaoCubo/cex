3_3_reranker_quality: 'Files read: `_tools/cex_reranker.py`, `_tools/cex_retriever.py`


  | Check | Result | Notes |

  |---|---|---|

  | Tool added | PASS | `_tools/cex_reranker.py` exists. |

  | BM25 math | PASS | Uses standard BM25-style IDF and length normalization with `k1=1.5`, `b=0.75`. |

  | Candidate scope | LIMITED | Reranker only ranks a supplied candidate set or defaults to `P01_knowledge/library/*/.md`.
  |

  | Integration with retriever | FAIL | `cex_retriever.py` never calls `cex_reranker.py`; there is no wired two-stage retrieval
  path. |

  | Metadata awareness | LIMITED | Filename stem gets a title boost, but frontmatter title/tags are ignored. |

  | Operational impact | LOW | Until connected to retriever output, it is a sidecar utility rather than live N04 infrastructure.
  |'
4_findings: '| Severity | Finding | Why it matters |

  |---|---|---|

  | High | Retrieval stack is still TF-IDF-first and stale | The main retriever index has not been rebuilt since 2026-04-08.
  |

  | High | New reranker is not integrated | The active leverage-map deliverable exists, but it does not change production
  retrieval behavior. |

  | High | N04 still lacks a `vector_store` artifact | Vector retrieval remains conceptual, not governed by an N04 artifact
  contract. |

  | Medium | Pillar metadata pollution remains in the retriever index | Mis-labeled pillars reduce filtering reliability and
  contaminate search stats. |

  | Medium | `cex_doctor --scope N04_knowledge` is misleading as an N04 check | It can create false confidence during N04
  audits. |

  | Medium | Retrieval config coverage is thin | One `retriever_config` and one `chunk_strategy` are not enough for multiple
  source types and nuclei. |

  | Low | One N04 file still has no `quality` field | Small hygiene issue, but it should be closed. |'
5_still_missing: '| Area | Status | Gap |

  |---|---|---|

  | Vector DB governance | Missing | No N04 `vector_store` artifact for pgvector, FAISS, or equivalent. |

  | Hybrid search | Missing | No wired lexical + vector fusion path in `cex_retriever.py`. |

  | Knowledge graph | Missing | No graph extraction or graph-backed retrieval tool in active use. |

  | Reranker tuning | Missing | No eval set, no score calibration, no frontmatter-aware boosts. |

  | Retrieval eval harness | Missing | No golden query benchmark to measure reranker or retriever quality. |

  | Source-specific chunking matrix | Thin | Only one chunk strategy under N04. |'
6_next_iteration: '| Priority | Build | Reason |

  |---:|---|---|

  | 1 | Wire `cex_reranker.py` into `cex_retriever.py` as an optional second stage | This converts the new reranker from a
  sidecar script into real leverage. |

  | 2 | Author an N04 `vector_store` artifact plus a concrete vector-backed retriever path | This closes the biggest architectural
  gap in the RAG stack. |

  | 3 | Add a small RAG eval harness with golden queries and freshness checks | Without measurement, reranking and vector
  search remain speculative. |'
verdict: 'N04 is structurally healthier than the April 11 baseline: more artifacts, far fewer `quality: null` files, and a
  new reranker tool now exists. The leverage gap is still the same one that matters most: retrieval maturity. N04 owns the
  contracts and the vocabulary, but the live stack is still a stale TF-IDF index with an unwired reranker and no N04-governed
  vector store.'
