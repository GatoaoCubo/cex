tldr: 'Formal metric definitions for N04 retrieval quality evaluation: MRR@K, NDCG@K, Precision@K, Recall@K, Hit Rate, and
  composite Knowledge Quality Score (KQS). Includes formulas, interpretation, and alert thresholds.'
density_score: null
metric_taxonomy: '| Metric | Type | Measures | Higher is Better |

  |--------|------|---------|-----------------|

  | MRR@K | Ranking | First relevant document rank | YES |

  | NDCG@K | Ranking | Graded relevance, position-discounted | YES |

  | Precision@K | Relevance | Fraction of top-K that are relevant | YES |

  | Recall@K | Relevance | Fraction of relevant docs in top-K | YES |

  | Hit Rate@K | Binary | At least one relevant in top-K | YES |

  | MAP@K | Ranking | Average precision across queries | YES |

  | KQS | Composite | Overall knowledge retrieval quality | YES |


  ---'
metric_definitions: ''
mrr_k_mean_reciprocal_rank: "Formula:\nMRR@K = (1/|Q|) * sum_{q=1}^{|Q|} (1 / rank_q)\n\nwhere rank_q = rank of first relevant\
  \ document for query q\n      if no relevant document in top-K: 1/rank_q = 0\n\nInterpretation:\n- 1.0 = perfect (relevant\
  \ document always ranked #1)\n- 0.5 = relevant document typically at rank 2\n- 0.33 = relevant document typically at rank\
  \ 3\n- < 0.25 = poor (relevant result not in top-4 on average)\n\nN04 Target: >= 0.83 | Alert: < 0.75 | Revert: < 0.70\n\
  \n---"
ndcg_k_normalized_discounted_cumulative_gain: "Formula:\nDCG@K = sum_{i=1}^{K} (rel_i / log2(i + 1))\nNDCG@K = DCG@K / IDCG@K\n\
  \nwhere rel_i = relevance score at rank i (binary: 0 or 1; or graded: 0-3)\n      IDCG = ideal DCG (perfect ranking)\n\n\
  Graded relevance for CEX:\n- 3 = exact answer source\n- 2 = closely related document\n- 1 = tangentially relevant\n- 0 =\
  \ not relevant\n\nN04 Target: >= 0.80 | Alert: < 0.72\n\n---"
precision_k: 'Formula:

  Precision@K = (# relevant documents in top-K) / K


  Interpretation:

  - 1.0 = all top-K results are relevant

  - 0.5 = half of top-K results are relevant


  N04 Target: >= 0.76 | Alert: < 0.68


  ---'
recall_k: 'Formula:

  Recall@K = (# relevant documents in top-K) / (# total relevant documents)


  Note: For N04, "total relevant documents" is typically 1-3 per query (ground truth has 1-3 sources).

  When total relevant = 1, Recall@K = Hit Rate@K.


  N04 Target: >= 0.76 | Alert: < 0.68


  ---'
knowledge_quality_score_kqs_composite: "N04-specific composite metric:\n\nKQS = 0.40 * MRR@10\n    + 0.30 * NDCG@10\n    +\
  \ 0.15 * Precision@5\n    + 0.10 * Recall@10\n    + 0.05 * (1 - latency_penalty)\n\nlatency_penalty = min(1.0, max(0.0,\
  \ (p95_ms - 500) / 1000))\n\nInterpretation:\n- >= 0.90 = excellent knowledge retrieval\n- 0.80-0.89 = good, production-ready\n\
  - 0.70-0.79 = acceptable, improvement queued\n- < 0.70 = poor, self-improvement loop triggered\n\nCurrent baseline KQS:\
  \ ~0.83 (estimated from memory_benchmark_n04.md values)\n\n---"
per_query_type_targets: '| Query Type | MRR@10 Target | NDCG@10 Target |

  |-----------|--------------|----------------|

  | Factual (Type A) | >= 0.88 | >= 0.85 |

  | Conceptual (Type B) | >= 0.82 | >= 0.79 |

  | Multi-hop (Type C) | >= 0.71 | >= 0.68 |

  | Cross-pillar (Type D) | >= 0.74 | >= 0.71 |

  | Overall | >= 0.83 | >= 0.80 |


  ---'
metric_calculation: "def calculate_mrr(queries: list[dict], retriever) -> float:\n    reciprocal_ranks = []\n    for q in\
  \ queries:\n        results = retriever.query(q[\"query\"], top_k=10)\n        rank = next(\n            (i+1 for i, r in\
  \ enumerate(results)\n             if r[\"source\"] in q[\"ground_truth_sources\"]),\n            None\n        )\n    \
  \    reciprocal_ranks.append(1/rank if rank else 0.0)\n    return sum(reciprocal_ranks) / len(reciprocal_ranks)\n\ndef calculate_ndcg_at_k(queries:\
  \ list[dict], retriever, k: int = 10) -> float:\n    ndcg_scores = []\n    for q in queries:\n        results = retriever.query(q[\"\
  query\"], top_k=k)\n        dcg = sum(\n            relevance(r[\"source\"], q) / log2(i+2)\n            for i, r in enumerate(results[:k])\n\
  \        )\n        idcg = sum(1 / log2(i+2) for i in range(min(len(q[\"ground_truth_sources\"]), k)))\n        ndcg_scores.append(dcg\
  \ / idcg if idcg > 0 else 0.0)\n    return sum(ndcg_scores) / len(ndcg_scores)\n\n---"
usage: "# Full metric report\npython _tools/cex_retriever.py --eval \\\n  --dataset N04_knowledge/P07_evals/eval_dataset_n04.md\
  \ \\\n  --metrics mrr,ndcg,precision,recall \\\n  --k 10\n\n# KQS composite score\npython _tools/cex_retriever.py --kqs\
  \ \\\n  --dataset N04_knowledge/P07_evals/eval_dataset_n04.md"
