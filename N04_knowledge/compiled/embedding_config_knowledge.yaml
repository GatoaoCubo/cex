tldr: Defines the embedding model configurations for N04, led by text-embedding-3-large and nomic-embed-text-v1.5 as a secondary.
density_score: 0.95
1_overview: This document specifies the configurations for the embedding models used by the N04 Knowledge Nucleus. The choice
  of embedding model is critical for the performance of semantic search and the overall RAG pipeline. This configuration defines
  a primary, high-performance model and a secondary, balanced model. ---
2_primary_model_text_embedding_3_large: '- Provider: OpenAI

  - Dimensions: `3072`

  - Distance Metric: `Cosine Similarity`

  - Normalize: `True`

  - Cost per 1M Tokens: `$0.13` (as of Q1 2024)

  - Use Case: Default for all new ingestions. This is the state-of-the-art model for semantic representation. Its high dimensionality
  allows it to capture nuanced meaning, making it ideal for the CEX knowledge base where accuracy is paramount.


  | Parameter | Value | Rationale |

  | :--- | :--- | :--- |

  | `model_name` | `text-embedding-3-large` | State-of-the-art performance for semantic retrieval tasks. |

  | `provider` | `OpenAI` | The official provider of the model via API. |

  | `dimensions` | `3072` | High dimensionality captures more semantic detail. |

  | `distance_metric`| `cosine` | Industry standard for comparing normalized vectors. |

  | `normalize` | `true` | Required for accurate cosine similarity and efficient search with dot product. |


  ---'
3_secondary_model_nomic_embed_text_v1_5: '- Provider: Nomic (via Hugging Face or API)

  - Dimensions: `768`

  - Distance Metric: `Cosine Similarity`

  - Normalize: `True`

  - Cost per 1M Tokens: `~ $0.02` (API) or `Free` (self-hosted)

  - Use Case: Batch processing, cost-sensitive tasks, or offline environments. While not as powerful as the primary model,
  Nomic''s model offers an excellent balance of performance and cost-efficiency. It can be self-hosted, making it ideal for
  private data.


  | Parameter | Value | Rationale |

  | :--- | :--- | :--- |

  | `model_name` | `nomic-embed-text-v1.5`| Best-in-class open-weights model with a large context length. |

  | `provider` | `Nomic / HuggingFace` | Can be accessed via API or hosted locally. |

  | `dimensions` | `768` | Standard dimension size, offering a good trade-off. |

  | `distance_metric`| `cosine` | Standard for comparing normalized vectors. |

  | `normalize` | `true` | Ensures vectors are on the unit sphere for comparison. |'
4_selection_routing_logic: 'The `embedding_apis` MCP will route requests based on the following logic:

  1.  Default: All standard ingestion workflows will use the Primary Model (`text-embedding-3-large`).

  2.  Explicit Request: An agent can explicitly request the Secondary Model for a specific task by providing a `use_secondary_model:
  true` flag.

  3.  Cost-Saving Mode: If the CEX system is configured for a low-cost operational mode, all embedding tasks will automatically
  fall back to the Secondary Model.'
5_integration: This configuration is a direct dependency of the Generate Embeddings step in the `Document Ingestion & Indexing`
  workflow. The chosen model's output vector size (`dimensions`) also dictates the schema of the target `vector_db` MCP.
