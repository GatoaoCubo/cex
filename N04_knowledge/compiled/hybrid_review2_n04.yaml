fixes_applied: "1. bld_knowledge_card (REBUILT): Added complete Aider edit format coverage: WHOLE mode (full\n   file replacement),\
  \ DIFF mode (<<<<<<< ORIGINAL / >>>>>>> UPDATED markers), UDIFF mode (standard\n   unified diff), UDIFF-SIMPLE mode (no\
  \ context lines), SEARCH/REPLACE blocks (Aider + Cursor).\n   Added JSON Patch (RFC 6902 -- correct RFC), LSP TextEdit.\
  \ Fixed citations: removed non-existent\n   RFC 6943 and pharmaceutical ASTM E2500-21. Added pitfalls section (line number\
  \ instability,\n   placeholder content in WHOLE mode, diff_strategy confusion).\n\n2. bld_schema (REBUILT): format_type\
  \ enum corrected: whole_file|unified_diff|udiff_simple|\n   search_replace|json_patch|lsp_textedit. edit_scope enum corrected:\
  \ whole_file|partial_hunk|\n   targeted_replace|multi_hunk. Added compatible_tools recommended field. quality: null enforced.\n\
  \   ID pattern corrected to ^p06_ef_[a-z0-9_]+$.\n\n3. bld_output_template (REBUILT): 3 concrete variant templates: Variant\
  \ A (WHOLE file with\n   file path declaration + fenced code block), Variant B (SEARCH/REPLACE blocks with delimiter\n \
  \  syntax, application rules, validation), Variant C (unified diff with `---`/`+++`/`@@` headers).\n   Each variant shows\
  \ valid and invalid examples.\n\n4. bld_examples (REBUILT): 2 golden examples (search-replace spec with SEARCH/REPLACE syntax\n\
  \   and application rules; unified diff spec with git-apply compatibility). 3 anti-examples: line\n   numbers as anchors\
  \ (unstable -- drift risk), placeholder content in WHOLE mode (unappliable),\n   mixing diff_strategy into edit_format (wrong\
  \ boundary).\n\n5. bld_system_prompt (REBUILT): Added explicit format family coverage (WHOLE/UDIFF/search-\n   replace/JSON\
  \ Patch/LSP). Added key distinction between edit_format (wire format) and\n   diff_strategy (matching algorithm). Quality\
  \ standards include correct RFC citation (6902),\n   compatible_tools requirement, concrete examples requirement.\n\n6.\
  \ bld_architecture (REBUILT): Removed financial domain hallucination. Added correct component\n   inventory (Format Spec\
  \ Registry, SEARCH Matcher, Whole-File Applier, Unified Diff Applier, JSON\n   Patch Engine, LSP TextEdit Engine, Format\
  \ Router). Added pipeline diagram showing edit_format\n   layer between LLM output and host applier, with diff_strategy\
  \ as peer.\n\n7. bld_collaboration (REBUILT): Receives from: diff_strategy_builder (matching constraints),\n   code_executor_builder\
  \ (tool compatibility), prompt_template_builder, agent_card_builder.\n   Produces for: system_prompt_builder, diff_strategy_builder,\
  \ code_executor_builder,\n   output_validator_builder. Explicit boundary: does NOT own diff algorithms, code style,\n  \
  \ conflict resolution, semantic correctness.\n\n8. bld_config (FIXED): Filled max_turns: 3, effort_level: 2. Both were empty."
