id: p04_tool_kc_validator
kind: cli_tool
pillar: P04
title: KC Validator — Knowledge Card Quality Gate
version: 1.0.0
created: 2026-04-07
author: n04_knowledge
domain: knowledge-quality
quality: null
tags:
- tool
- n04
- kc-validator
- quality
- frontmatter
- density
tldr: 'CLI tool to validate knowledge cards: frontmatter completeness, density scoring, size limits, cross-ref verification,
  structural compliance.'
density_score: 0.91
purpose: Validates knowledge cards against the KC Structure Contract before they enter the knowledge graph. Catches defects
  at creation time, not during audits.
usage: '# Validate single KC

  python _tools/kc_validator.py validate path/to/kc.md


  # Validate all KCs in a directory

  python _tools/kc_validator.py validate P01_knowledge/library/kind/ --recursive


  # Density-only check (fast)

  python _tools/kc_validator.py density path/to/kc.md


  # Generate validation report

  python _tools/kc_validator.py report --output N04_knowledge/P05_output/kc_validation_report.md'
checks_performed: '| Check | Rule | Severity |

  |-------|------|----------|

  | Frontmatter completeness | All 14 required fields present | Critical |

  | Kind validity | `kind` exists in `.cex/kinds_meta.json` | Critical |

  | Pillar validity | `pillar` matches `P{01-12}` pattern | Critical |

  | Tag format | `lowercase-kebab-case`, 3-10 tags | Major |

  | Size limit | ≤2KB focused, ≤4KB comprehensive | Major |

  | Section order | H1 → Core → Tables → CEX Integration | Minor |

  | Density score | ≥0.8 (filler ratio < 20%) | Major |

  | Cross-ref validity | All `see:` and `related:` links resolve | Major |

  | Code syntax | Code blocks parse without errors | Minor |

  | quality: null | New KCs must have `quality: null` | Critical |'
filler_detection_patterns: '| Pattern | Category |

  |---------|----------|

  | `In this KC we will discuss...` | Meta-commentary |

  | `As mentioned above...` | Self-reference |

  | `It is important to note that...` | Hedging |

  | `This powerful/amazing/great...` | Self-promotion |

  | `Let''s take a look at...` | Conversational filler |

  | Repeated adjectives | Redundancy |'
output_format: "[PASS] path/to/good_kc.md (density: 0.93, size: 1.8KB)\n[FAIL] path/to/bad_kc.md\n  ✗ CRITICAL: missing frontmatter\
  \ field 'tldr'\n  ✗ MAJOR: density 0.71 (below 0.80 threshold)\n  ✗ MINOR: section order violation (Tables before Core)\n\
  \nSummary: 45/50 PASS, 5 FAIL (3 critical, 4 major, 2 minor)"
integration: '| Hook | Trigger | Action |

  |------|---------|--------|

  | Pre-commit | `git add *.md` | Auto-validate staged KCs |

  | 8F F7 gate | `cex_score.py --pre-check` | Block publish below threshold |

  | CI pipeline | PR merge to main | Validate all changed KCs |

  | Batch audit | `cex_evolve.py` loop | Feed defects to AutoResearch |'
