tldr: 'Canonical API reference for RAG/vector store APIs used by N04: pgvector (Supabase), Pinecone, ChromaDB, and the CEX
  internal retrieval API. Covers embedding, upsert, query, and delete operations.'
density_score: null
overview: N04 interacts with three external vector store APIs and one internal CEX retrieval API. This document is the authoritative
  reference for all N04 retrieval integrations. ---
1_pgvector_via_supabase: Primary vector store for CEX production deployments.
base_url: http://localhost:8000
authentication: 'Api-Key: {PINECONE_API_KEY}'
endpoint_match_documents: "Semantic similarity search using cosine distance.\n\nRequest\nPOST /rpc/match_documents\nContent-Type:\
  \ application/json\n\n{\n  \"query_embedding\": [float, ...],  // 1536-dim for text-embedding-3-small\n  \"match_threshold\"\
  : 0.65,          // minimum similarity score\n  \"match_count\": 10,                // top-k results\n  \"filter_kind\"\
  : \"knowledge_card\",  // optional metadata filter\n  \"filter_pillar\": \"P01\"            // optional metadata filter\n\
  }\n\nResponse\n[\n  {\n    \"id\": \"uuid\",\n    \"content\": \"string\",\n    \"metadata\": { \"kind\": \"knowledge_card\"\
  , \"pillar\": \"P01\", \"path\": \"...\" },\n    \"similarity\": 0.87\n  }\n]\n\nErrors\n| Code | Meaning |\n|------|---------|\n\
  | 400 | Invalid embedding dimension |\n| 401 | Invalid or missing API key |\n| 429 | Rate limit exceeded (500 req/min free\
  \ tier) |"
endpoint_upsert_document: "Insert or update a document with its embedding.\n\nRequest\nPOST /rpc/upsert_document\n{\n  \"\
  doc_id\": \"string\",\n  \"content\": \"string\",\n  \"embedding\": [float, ...],\n  \"metadata\": { \"kind\": \"...\",\
  \ \"pillar\": \"...\", \"path\": \"...\" }\n}\n\n---"
2_pinecone: Fallback vector store for high-throughput scenarios.
endpoint_query: "Request\nPOST /api/v1/collections/{collection_name}/query\n{\n  \"query_embeddings\": [[float, ...]],\n \
  \ \"n_results\": 10,\n  \"where\": { \"kind\": \"knowledge_card\" },\n  \"include\": [\"documents\", \"metadatas\", \"distances\"\
  ]\n}\n\nResponse\n{\n  \"documents\": [[\"text ...\"]],\n  \"metadatas\": [[{\"kind\": \"...\", \"path\": \"...\"}]],\n\
  \  \"distances\": [[0.18]]\n}\n\nNote: ChromaDB distances are L2 (lower = more similar). Convert to similarity: `1 - (dist\
  \ / 2)`\n\n---"
endpoint_upsert: "Request\nPOST /vectors/upsert\n{\n  \"vectors\": [\n    { \"id\": \"string\", \"values\": [float, ...],\
  \ \"metadata\": { ... } }\n  ],\n  \"namespace\": \"cex_artifacts\"\n}\n\nRate Limits\n| Operation | Free tier | Starter\
  \ |\n|-----------|-----------|---------|\n| Query | 100 req/s | 1000 req/s |\n| Upsert | 100 vec/s | 1000 vec/s |\n| Max\
  \ dimensions | 1536 | 20000 |\n\n---"
3_chromadb_local: Development and local-only deployments.
4_cex_internal_retrieval_api_cex_retriever_py: ''
python_interface: "from cex_sdk.retriever import CexRetriever\n\nretriever = CexRetriever(\n    corpus=\"cex_artifacts\",\
  \        # corpus selection\n    mode=\"hybrid\",                 # dense | sparse | hybrid | graph\n    top_k=10,\n   \
  \ score_threshold=0.65,\n    rerank=True\n)\n\nresults = retriever.query(\n    query_text=\"8F pipeline reasoning\",\n \
  \   filters={\"kind\": \"knowledge_card\", \"pillar\": \"P01\"},\n    output_format=\"passages\"       # passages | summaries\
  \ | full_docs | citations_only\n)"
cli_interface: "python _tools/cex_retriever.py \\\n  --query \"RAG architecture\" \\\n  --corpus cex_artifacts \\\n  --mode\
  \ hybrid \\\n  --top-k 10 \\\n  --format passages"
response_format: "[\n    {\n        \"content\": \"string\",       # retrieved passage text\n        \"score\": 0.84,    \
  \         # similarity score\n        \"source\": \"path/to/file.md\",\n        \"metadata\": {\n            \"kind\": \"\
  knowledge_card\",\n            \"pillar\": \"P01\",\n            \"nucleus\": \"n04\"\n        }\n    }\n]\n\n---"
embedding_api_reference: N04 uses OpenAI-compatible embedding endpoints.
text_embedding_3_small_default:
- 'Dimensions: 1536'
- 'Max tokens: 8191'
- 'Best for: semantic search, hybrid retrieval'
text_embedding_3_large_high_precision:
- 'Dimensions: 3072'
- 'Max tokens: 8191'
- 'Best for: complex domain reasoning, long documents'
request_openai_compatible: "POST https://api.openai.com/v1/embeddings\n{\n  \"input\": \"text to embed\",\n  \"model\": \"\
  text-embedding-3-small\",\n  \"encoding_format\": \"float\"\n}\n\n---"
error_handling_reference: '| Error | Cause | N04 Response |

  |-------|-------|-------------|

  | `EmbeddingDimensionMismatch` | Wrong embedding model | Use model specified in index config |

  | `RateLimitExceeded` | Too many requests | Exponential backoff: 1s, 2s, 4s, max 3 retries |

  | `CorpusNotFound` | Unknown corpus name | Fall back to `cex_artifacts` |

  | `VectorStoreUnavailable` | DB offline | Fall back to BM25 sparse retrieval |

  | `NoResultsAboveThreshold` | Score threshold too high | Reduce threshold by 0.10, retry once |


  ---'
integration_map: '| Consumer | API Used | Operation |

  |---------|---------|-----------|

  | `search_tool_n04.md` | CEX Internal + pgvector | query |

  | `retriever_n04.md` | pgvector primary, Pinecone fallback | query + rerank |

  | `document_loader_n04.md` | pgvector + ChromaDB | upsert |

  | `embedding_config_knowledge.md` | OpenAI Embeddings | embed |'
