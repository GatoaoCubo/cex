template: '---

  id: p01_kc_{{slug}}

  kind: knowledge_card

  type: {{kind|domain|platform|infrastructure}}

  pillar: P01

  title: "{{Title}}"

  version: 1.0.0

  created: {{DATE}}

  author: {{AUTHOR}}

  domain: {{DOMAIN}}

  quality: 8.7

  tags: [{{tag1}}, {{tag2}}, {{tag3}}]

  tldr: "{{20-200 chars}}"

  when_to_use: "{{context}}"

  keywords: [{{kw1}}, {{kw2}}, {{kw3}}]

  density_score: {{0.85-1.0}}

  ---


  # {{Title}}


  ## Core Concept

  {{1-3 paragraphs, no filler}}


  ## Key Data

  | {{Column}} | {{Column}} | {{Column}} |

  |---|---|---|

  | {{data}} | {{data}} | {{data}} |


  ## When to Use / When NOT

  - Use: {{conditions}}

  - Don''t use: {{conditions}}


  ## Anti-Patterns

  - {{common mistake and why}}


  ## CEX Integration

  - {{how this KC connects to the system}}'
template_population_guide: '| Field | Rules | CEX Examples |

  |-------|-------|--------------|

  | `type` | kind\|domain\|platform\|infrastructure | `agent`, `workflow`, `claude`, `docker` |

  | `domain` | Business area, lowercase | `ai-engineering`, `prompt-design`, `nucleus-routing` |

  | `tldr` | 20-200 chars, actionable | `8F pipeline for artifact construction` |

  | `when_to_use` | Specific context triggers | `Building any CEX artifact via N03` |

  | `keywords` | 3-5 searchable terms | `[8f, pipeline, builder, artifact]` |

  | `tags` | CEX categories | `[n03, builder, 8f, construction]` |

  | `id` | Pillar + underscore format | `p01_kc_react_hooks` |

  | `author` | Nucleus or system | `n04_knowledge`, `cex_system` |

  | Core Concept | What + why, not how | Focus on the mental model |

  | Key Data | Always tables for density | CLI commands, API endpoints, configs |

  | Anti-Patterns | CEX-specific mistakes | `Don''t skip 8F validation steps` |

  | CEX Integration | Link to builders/nuclei | `Used by agent-builder.md in N03` |'
