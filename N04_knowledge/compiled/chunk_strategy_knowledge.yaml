tldr: Defines the content-aware, hierarchical chunking strategies for N04. Prioritizes semantic boundaries (headers, code
  blocks, paragraphs) to maximize context cohesion for RAG.
1_overview: 'This document specifies the set of hierarchical, content-aware chunking strategies used by the N04 Knowledge
  Nucleus. The primary goal is to maximize Contextual Cohesion: ensuring that each chunk is as semantically complete and self-contained
  as possible. This is the most critical step for achieving high-quality RAG performance.'
2_primary_strategy_hierarchical_recursive: This method is a top-down, recursive splitting algorithm. It attempts to split
  a document along the most significant semantic boundaries first. If a resulting chunk is still larger than the target `chunk_size`,
  the algorithm is recursively applied to that chunk using the next separator in the prioritized hierarchy.
3_separator_hierarchies_by_content_type: The effectiveness of the `hierarchical_recursive` strategy depends entirely on a
  separator list that is tailored to the document's content type.
3_1_content_type_markdown: 'Designed for `.md` files, prioritizing document structure.

  1.  `'
h1_header:
- '`'
h2_header:
- '`'
h3_header: '4.  `


  ---


  ` (Horizontal Rule)

  5.  `


  ` (Paragraph break)

  6.  `

  ` (Line break)

  7.  ` ` (Space)

  8.  `` (Character)'
3_2_content_type_python: 'Designed for `.py` files, prioritizing code structure.

  1.  `

  def ` (Function definition)

  2.  `

  class ` (Class definition)

  3.  `


  ` (Double newline, separates logical blocks)

  4.  `

  ` (Single newline)

  5.  `` (Character)'
3_3_content_type_generic_text_fallback: 'A general-purpose hierarchy for unstructured text.

  1.  `


  ` (Paragraph break)

  2.  `

  ` (Line break)

  3.  `. ` (Sentence end)

  4.  ` ` (Space)

  5.  `` (Character)'
4_global_parameters: '| Parameter | Value | Rationale |

  | :--- | :--- | :--- |

  | `chunk_size` | `1024` | A target size (in characters) that offers a robust balance between context density and noise for
  modern embedding models. This is a target, not a hard limit. |

  | `chunk_overlap`| `200` | A significant overlap (in characters) to ensure context continuity between related chunks, especially
  when a semantic split (like a paragraph break) occurs. |

  | `min_chunk_size` | `100` | Minimum chunk size before abandoning further splits. Prevents creation of meaningless micro-chunks
  that lack context. |

  | `max_chunk_size` | `4096` | Hard upper limit to prevent embedding model token overflow. Chunks exceeding this are force-split
  regardless of semantic boundaries. |

  | `respect_code_blocks` | `true` | Never split within markdown code blocks (``` fenced) to preserve code integrity and syntax
  highlighting. |

  | `respect_tables` | `true` | Never split within markdown tables to maintain data relationships and table structure. |

  | `balance_chunks` | `false` | When false, prioritizes semantic boundaries over uniform chunk sizes. When true, attempts
  more even chunk distribution. |'
5_advanced_strategies_future_state: ''
5_1_propositional_chunking:
- 'Description: A sophisticated technique where an LLM is used to extract every atomic statement (a "proposition") from a
  document. Each proposition is embedded individually. This allows for highly granular and factual retrieval.'
- 'Pros: Extremely high precision for fact-based queries.'
- 'Cons: High cost and complexity. Best for high-value, fact-heavy documents.'
5_2_agentic_chunking:
- 'Description: An LLM analyzes a document and determines optimal chunk boundaries based on its holistic understanding of
  the content flow and semantic shifts.'
- 'Pros: Potentially the highest quality for complex, narrative documents.'
- 'Cons: High cost (token usage) and latency. Reserved for "golden" or highly critical source documents.'
