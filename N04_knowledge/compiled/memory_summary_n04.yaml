tldr: Protocol for compressing N04 session transcripts and episodic memory into dense summaries. Defines summary schema, extraction
  heuristics, compression ratio targets, and injection format for future context windows.
density_score: null
purpose: '200K context window is large but not infinite. Long sessions, complex missions, and multi-wave orchestrations accumulate
  thousands of tokens of context that become stale. This protocol converts that raw context into dense, retrievable summaries.
  Reference: LangMem (Google) for compression primitives; MemGPT/Letta for hierarchical paging. ---'
summary_schema: "id: \"ms_{nucleus}{YYYYMMDD}{session_hash}\"\nkind: memory_summary\nsource_session_id: \"uuid\"\nnucleus:\
  \ \"n04\"\ndate: \"ISO 8601\"\ncompression_ratio: 0.12          # compressed_tokens / original_tokens\noriginal_tokens:\
  \ 45000\ncompressed_tokens: 5400\nextraction_method: \"llm\"         # \"llm\" | \"heuristic\" | \"hybrid\"\nquality_signal:\
  \ 0.82             # 0.0-1.0, confidence in summary completeness\n\ntask_summary: \"one-sentence description of what was\
  \ accomplished\"\n\nkey_decisions:\n  - \"decision 1 with rationale\"\n  - \"decision 2 with rationale\"\n\nfacts_extracted:\n\
  \  - id: \"fact_uuid\"\n    claim: \"statement\"\n    confidence: 0.9\n    source: \"path or session turn\"\n\nentities_encountered:\n\
  \  - name: \"entity name\"\n    type: \"nucleus | kind | tool | concept | person\"\n    status: \"new | updated | confirmed\"\
  \n\nartifacts_produced:\n  - path: \"N04_knowledge/P10_memory/memory_architecture_n04.md\"\n    kind: \"memory_architecture\"\
  \n    quality: null\n\nprocedures_learned:\n  - \"description of new procedure or updated SOP\"\n\ngaps_identified:\n  -\
  \ \"what was missing, unresolved, or needs follow-up\"\n\nsignal_sent: true\ncommit_hash: \"short hash if applicable\"\n\
  \n---"
extraction_heuristics_fast_mode: 'When LLM compression is too expensive, apply these rules:


  | Signal | Extract? | Why |

  |--------|----------|-----|

  | Tool call with Write result | YES | Artifact created -- preserve path + kind |

  | User decision statement | YES | GDP decision -- permanent value |

  | Error message + resolution | YES | Debugging pattern -- procedural value |

  | File read operation | NO | Content is in the corpus, not the summary |

  | Repeated identical content | NO | Deduplicate |

  | Casual clarification | NO | Low signal |

  | Test output success | MAYBE | Only if new capability proven |

  | N07 dispatch command | YES | Mission state change |

  | Signal written | YES | Completion event |


  ---'
compression_targets: '| Session Type | Target Ratio | Max Compressed Tokens |

  |-------------|-------------|----------------------|

  | Quick task (< 10 min) | 0.20 | 1000 |

  | Standard mission (30 min) | 0.12 | 3000 |

  | Full grid (90+ min) | 0.06 | 8000 |

  | Multi-wave overnight | 0.04 | 12000 |


  ---'
injection_format_for_future_context_windows: 'When a session summary is loaded into a new context window as prior context:


  === PRIOR SESSION SUMMARY (N04, {date}) ===

  Task: {task_summary}

  Artifacts: {artifact list}

  Key decisions: {decision list}

  Facts to remember: {top 5 facts by confidence}

  Gaps: {gap list}

  === END PRIOR SESSION ===


  This format is:

  - Consistent (always same structure for easy parsing)

  - Dense (target < 500 tokens per summary injection)

  - Actionable (gaps tell the nucleus what to do next)


  ---'
multi_session_compression: 'When >= 3 session summaries exist on the same topic, compress them further:


  1. Load all N session summaries for the topic

  2. Extract: unique facts (deduplicate across sessions)

  3. Merge: decisions from multiple sessions into chronological timeline

  4. Synthesize: write a "domain summary" KC in P01_knowledge/

  5. Retire: mark individual session summaries as `archived: true`


  This is the knowledge distillation step: raw episodic memory -> permanent semantic knowledge.


  ---'
trigger_matrix: '| When | Action |

  |------|--------|

  | Context > 80% full | Compress oldest 30% of context |

  | Session ends normally | Full session compression to summary |

  | `/consolidate` called | Compress all unarchived session summaries |

  | Weekly cron | Compress sessions older than 30 days |

  | Mission complete | Compress mission-scope context |'
