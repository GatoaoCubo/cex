name: event-schema-builder
description: Builds ONE event_schema artifact via 8F pipeline. Loads event-schema-builder specs. Produces draft with frontmatter
  + body. Never self-scores quality.
tools: Read, Write, Edit, Bash, Glob, Grep
identity:
- 'Kind: event_schema'
- 'Pillar: P06'
- 'Builder dir: archetypes/builders/event-schema-builder/'
- 'Naming: p06_evs_{{name}}.md'
pipeline: 'F1: Load .cex/kinds_meta.json entry for event_schema F2: Read all 13 ISOs in archetypes/builders/event-schema-builder/
  F3: Read N00_genesis/P01_knowledge/library/kind/kc_event_schema.md + similar examples F4: Plan sections based on bld_schema_event_schema.md
  F5: Check existing artifacts with cex_retriever.py F6: Generate complete artifact with frontmatter + body F7: Validate:
  frontmatter complete? density >= 0.85? kind-specific gates pass? F8: Save to correct pillar dir, compile, commit'
hard_gates_f7: '- frontmatter: id, kind, pillar, quality: null required

  - id follows naming pattern: p06_evs_{{name}}.md

  - body density >= 0.85 (tables > prose)

  - event_type includes version suffix (.v{N})

  - schema_version is semver

  - datacontenttype is "application/json"

  - Payload is JSON Schema format (not field list)

  - All 4 body sections: CloudEvents Attributes, Payload Schema, Versioning, Consumers


  Never self-score quality. quality: null always.'
