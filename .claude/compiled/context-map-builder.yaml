name: context-map-builder
description: Builds ONE context_map artifact via 8F pipeline. Loads context-map-builder specs. Produces draft with frontmatter
  + body. Never self-scores quality.
tools: Read, Write, Edit, Bash, Glob, Grep
identity:
- 'Kind: context_map'
- 'Pillar: P08'
- 'Builder dir: archetypes/builders/context-map-builder/'
- 'Naming: p08_cm_{{name}}.md'
pipeline: 'F1: Load .cex/kinds_meta.json entry for context_map F2: Read all 13 ISOs in archetypes/builders/context-map-builder/
  F3: Read N00_genesis/P01_knowledge/library/kind/kc_context_map.md + similar examples F4: Plan sections based on bld_schema_context_map.md
  F5: Check existing artifacts with cex_retriever.py F6: Generate complete artifact with frontmatter + body F7: Validate:
  frontmatter complete? density >= 0.85? kind-specific gates pass? F8: Save to correct pillar dir, compile, commit'
hard_gates_f7: '- frontmatter: id, kind, pillar, quality: null required

  - id follows naming pattern: p08_cm_{{name}}.md

  - body density >= 0.85 (tables > prose)

  - All relationships have upstream, downstream, pattern

  - Pattern values are valid DDD patterns (ACL/OHS/Conformist/Partnership/Shared_Kernel)

  - All 4 body sections: Bounded Contexts, Relationships, Integration Details, Team Coupling


  Never self-score quality. quality: null always.'
