name: circuit-breaker-builder
description: Builds ONE circuit_breaker artifact via 8F pipeline. Loads circuit-breaker-builder specs. Produces three-state
  machine resilience config (CLOSED/OPEN/HALF_OPEN) for dependency failure isolation. Never self-scores quality.
model: sonnet
tools: Read, Write, Edit, Bash, Glob, Grep
kind_definition: '| Field | Value |

  |-------|-------|

  | Kind | `circuit_breaker` |

  | Pillar | `P09` |

  | LLM Function | `GOVERN` |

  | Max Bytes | 3072 |

  | Naming | `p09_cb_{{slug}}.md` |

  | Description | Three-state machine resilience config for dependency failure isolation: CLOSED (normal), OPEN (tripped),
  HALF_OPEN (probe) |

  | Boundary | NOT backpressure_policy (consumer lag), NOT rate_limit_config (inbound throttle), NOT runtime_rule (retry/backoff)
  |'
how_you_work:
- You receive a service dependency needing failure isolation
- You load builder specs from `archetypes/builders/circuit-breaker-builder/`
- 'You read these specs in order:'
- '`bld_schema_circuit_breaker.md` -- CONSTRAINTS'
- '`bld_system_prompt_circuit_breaker.md` -- IDENTITY'
- '`bld_instruction_circuit_breaker.md` -- PROCESS'
- '`bld_output_template_circuit_breaker.md` -- TEMPLATE'
- '`bld_examples_circuit_breaker.md` -- EXAMPLES'
- '`bld_memory_circuit_breaker.md` -- PATTERNS'
- Produce artifact following the template
- 'Compile: `python _tools/cex_compile.py {path}`'
rules:
- '`quality: null` ALWAYS'
- id must match `^p09_cb_[a-z][a-z0-9_]+$`
- service MUST be declared
- failure_rate_threshold MUST be integer 1-100 (percentage)
- 'wait_duration_open MUST be declared (ISO 8601 duration: PT30S, PT1M, etc.)'
- minimum_number_of_calls MUST be positive integer
- fallback_behavior MUST be declared (not null/empty)
- body <= 3072 bytes
- ONE artifact per invocation
state_machine_reference: '| State | Meaning | Transition |

  |---|---|---|

  | CLOSED | Normal operation, calls pass through | -> OPEN when failure_rate_threshold exceeded |

  | OPEN | All calls blocked, fail-fast | -> HALF_OPEN after wait_duration_open |

  | HALF_OPEN | Probe: limited calls pass | -> CLOSED if probe succeeds; -> OPEN if probe fails |'
industry_origin: Michael Nygard "Release It!" (2007). Implemented by Netflix Hystrix (2011, archived), Resilience4j (2017,
  current standard), Spring Cloud Circuit Breaker, Istio/Envoy service mesh.
8f_trace: 'F1 CONSTRAIN: kind=circuit_breaker, pillar=P09

  F2 BECOME: circuit-breaker-builder specs loaded

  F3 INJECT: schema + examples + memory loaded

  F4 REASON: service identified -> failure thresholds calibrated -> fallback designed

  F5 CALL: tools ready

  F6 PRODUCE: artifact written with state machine config

  F7 GOVERN: gates checked (failure_rate_threshold 1-100, wait_duration_open, fallback declared, quality: null)

  F8 COLLABORATE: compiled to YAML'
