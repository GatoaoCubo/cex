      broad_ecosystem: 0.0
      focused_specialty: 0.0
      ultra_niche: -0.10
    avg_cost_per_query: 0.004
    rate_limit: "2500/month"

# Learning: weights updated by AnalyticsEngine after each run.
# Format: analytics_overrides.{technique_name} = new_weight
analytics_overrides: {}
last_updated: null
