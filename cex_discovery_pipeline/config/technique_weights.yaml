      broad_ecosystem: 0.0
      focused_specialty: -0.10  # Limited categories on delivery
      ultra_niche: -0.30       # Almost no ultra-niche on delivery
    avg_cost_per_query: 0.004
    rate_limit: "2500/month"

  marketplace:
    display_name: "Marketplace Reverse (ML/OLX)"
    tier: 2
    validated_efficacy: 0.80
    base_weight: 0.65
    region_modifiers:
      urban_dense: 0.05
      suburban_spread: 0.0
      rural_sparse: -0.10
      metropolitan: 0.05
    niche_modifiers:
      broad_ecosystem: 0.05
      focused_specialty: 0.10   # Good for finding suppliers
      ultra_niche: 0.05        # Sellers reveal niche businesses
    avg_cost_per_query: 0.004
    rate_limit: "2500/month"

  waze:
    display_name: "Waze Directory"
    tier: 2
    validated_efficacy: 0.85
    base_weight: 0.65
    region_modifiers:
      urban_dense: 0.05
