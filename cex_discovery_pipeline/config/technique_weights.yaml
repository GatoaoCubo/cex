      broad_ecosystem: 0.0
      focused_specialty: 0.05
      ultra_niche: 0.10        # Finds hidden ultra-niche!
    avg_cost_per_query: 0.004
    rate_limit: "2500/month"

  delivery_apps:
    display_name: "Delivery Apps (iFood/Rappi)"
