pillar: P09
name: Config
description: COMO configura
kinds:
  env_config:
    description: Variaveis de ambiente
    boundary: Variaveis de ambiente do sistema. NAO eh boot_config (P02, per-provider) nem feature_flag (on/off logico).
    layer: runtime
    core: true
    machine_format: yaml
    naming: p09_env_{{scope}}.yaml
    constraints:
      max_bytes: 4096
    llm_function: GOVERN
  path_config:
    description: Caminhos do sistema
    boundary: Caminhos do sistema de arquivos. NAO eh env_config (variaveis genericas) nem permission (controle de acesso).
    layer: runtime
    core: true
    machine_format: yaml
    naming: p09_path_{{scope}}.yaml
    constraints:
      max_bytes: 3072
    llm_function: GOVERN
  permission:
    description: Regra de permissao (read/write/execute)
    boundary: Regra de permissao de acesso. NAO eh guardrail (P11, safety boundary) nem feature_flag (on/off de feature).
    layer: governance
    core: true
    machine_format: yaml
    naming: p09_perm_{{scope}}.yaml
    constraints:
      max_bytes: 3072
    llm_function: GOVERN
  feature_flag:
    description: Flag de feature (on/off, gradual rollout)
    boundary: Flag de feature on/off com rollout gradual. NAO eh permission (acesso) nem env_config (variavel generica).
    layer: runtime
    core: false
    machine_format: json
    naming: p09_ff_{{feature}}.yaml
    constraints:
      max_bytes: 1536
    llm_function: GOVERN
  runtime_rule:
    description: Regra de runtime (timeouts, retries, limits)
    boundary: Regra de runtime tecnica (timeouts, retries). NAO eh lifecycle_rule (P11, ciclo de vida) nem law (P08, inviolavel).
    layer: runtime
    core: false
    machine_format: yaml
    naming: p09_rr_{{rule}}.yaml
    constraints:
      max_bytes: 3072
    llm_function: GOVERN
  secret_config:
    description: Gestao de secrets
    boundary: Credenciais. NAO eh env_config.
    layer: runtime
    core: true
    machine_format: yaml
    naming: p09_secret.md
    constraints:
      max_bytes: 1024
    frontmatter_required:
    - id
    - name
    - provider
    - rotation_policy
    llm_function: GOVERN
  rate_limit_config:
    description: 'Rate limiting: RPM, TPM, budget'
    boundary: Limites. NAO eh runtime_rule.
    layer: runtime
    core: true
    machine_format: yaml
    naming: p09_ratelimit.md
    constraints:
      max_bytes: 1024
    frontmatter_required:
    - id
    - name
    - provider
    - rpm
    - tpm
    llm_function: CONSTRAIN

  effort_profile:
    description: Effort and thinking level configuration for builder execution
    boundary: effort_profile = QUAL modelo/thinking usar; runtime_rule = QUANDO/COMO executar
    layer: content
    core: false
    machine_format: yaml
    naming: p09_effort_profile_{{topic}}.md + .yaml
    constraints:
      max_bytes: 4096
      density_min: 0.8
      quality_min: 7.0
    frontmatter_required:
    - id
    - kind
    - pillar
    - title
    - version
    - created
    - updated
    - author
    - domain
    - quality
    - tags
    - tldr