id: p09_ratelimit_anthropic_tier2
kind: rate_limit_config
pillar: P09
name: Anthropic Tier 2 Rate Limits
description: Rate limiting configuration for Anthropic API Tier 2 with RPM, TPM, daily budget, and queue escalation
provider: anthropic
rpm: 1000
tpm: 80000
daily_budget: $50
escalation: queue
version: 1.0.0
created: 2026-03-29
author: builder_agent
quality: 9.0
tags:
- rate-limit
- anthropic
- tier-2
- budget
- queue
- cost-control
overview: Enforces Anthropic API Tier 2 rate limits across all organization agent_groups. When limits approach, requests queue
  instead of failing. Daily budget cap of $50 prevents runaway costs from autonomous agent_group loops.
tier_2_limits_anthropic: '| Limit | Value | Scope | Reset |

  |-------|-------|-------|-------|

  | Requests per minute (RPM) | 1,000 | Per API key | Rolling 60s window |

  | Tokens per minute (TPM) | 80,000 | Per API key (input + output) | Rolling 60s window |

  | Tokens per day (TPD) | 2,500,000 | Per organization | Midnight UTC |

  | Daily budget | $50 | Self-imposed (not Anthropic-enforced) | Midnight BRT (UTC-3) |'
model_specific_token_costs: '| Model | Input (per 1M) | Output (per 1M) | Typical Request Cost |

  |-------|----------------|-----------------|---------------------|

  | claude-opus-4-6 | $15.00 | $75.00 | $0.12 (3K in, 1K out) |

  | claude-sonnet-4-6 | $3.00 | $15.00 | $0.024 (3K in, 1K out) |

  | claude-haiku-4-5 | $0.80 | $4.00 | $0.0064 (3K in, 1K out) |'
budget_allocation_by_agent_group: '| Agent_group | Model | Daily Budget | Typical RPM | Rationale |

  |-----------|-------|-------------|-------------|-----------|

  | orchestrator | opus-4-6 | $15 | 20 | Orchestration, low volume high complexity |

  | builder_agent | opus-4-6 | $12 | 50 | Build tasks, code generation |

  | operations_agent | opus-4-6 | $8 | 30 | Deploy, test, validate |

  | research_agent | sonnet-4-6 | $5 | 100 | Research, high volume lower cost |

  | marketing_agent | sonnet-4-6 | $4 | 80 | Marketing copy, batch generation |

  | knowledge_agent | sonnet-4-6 | $3 | 60 | Knowledge processing |

  | commercial_agent | sonnet-4-6 | $3 | 40 | Monetization, course content |

  | Total | — | $50 | 380 | — |'
escalation_strategy: "escalation:\n  strategy: queue\n  levels:\n    - trigger: rpm >= 80%      # 800+ RPM\n      action:\
  \ log_warning\n      message: \"RPM approaching limit: {{current}}/1000\"\n\n    - trigger: rpm >= 95%      # 950+ RPM\n\
  \      action: queue_requests\n      queue_max: 500\n      queue_timeout: 30s\n      message: \"Queueing requests — RPM\
  \ at {{current}}/1000\"\n\n    - trigger: tpm >= 90%      # 72K+ TPM\n      action: downgrade_model\n      from: opus-4-6\n\
  \      to: sonnet-4-6\n      message: \"TPM pressure — downgrading non-critical to sonnet\"\n\n    - trigger: daily_budget\
  \ >= 80%  # $40+\n      action: restrict_to_essential\n      allowed: [orchestrator, operations_agent]\n      message: \"\
  Budget 80% — only orchestration and deploy allowed\"\n\n    - trigger: daily_budget >= 95%  # $47.50+\n      action: hard_stop\n\
  \      message: \"Budget exhausted — all API calls blocked until reset\"\n      alert: slack"
rate_limiter_implementation: "import time\nfrom collections import deque\nfrom threading import Lock\n\nclass AnthropicRateLimiter:\n\
  \    def init(self, rpm: int = 1000, tpm: int = 80000, daily_budget: float = 50.0):\n        self.rpm = rpm\n        self.tpm\
  \ = tpm\n        self.daily_budget = daily_budget\n\n        self._request_times = deque()\n        self._token_counts =\
  \ deque()  # (timestamp, token_count)\n        self._daily_spend = 0.0\n        self._lock = Lock()\n\n    def acquire(self,\
  \ estimated_tokens: int, model: str) -> dict:\n        with self._lock:\n            now = time.time()\n            window_start\
  \ = now - 60\n\n            # Clean expired entries\n            while self._request_times and self._request_times[0] <\
  \ window_start:\n                self._request_times.popleft()\n            while self._token_counts and self._token_counts[0][0]\
  \ < window_start:\n                self._token_counts.popleft()\n\n            current_rpm = len(self._request_times)\n\
  \            current_tpm = sum(tc[1] for tc in self._token_counts)\n\n            # Check limits\n            if current_rpm\
  \ >= self.rpm:\n                wait = self._request_times[0] - window_start\n                return {\"allowed\": False,\
  \ \"reason\": \"rpm\", \"retry_after\": wait}\n\n            if current_tpm + estimated_tokens > self.tpm:\n           \
  \     return {\"allowed\": False, \"reason\": \"tpm\", \"retry_after\": 5.0}\n\n            estimated_cost = self._estimate_cost(estimated_tokens,\
  \ model)\n            if self._daily_spend + estimated_cost > self.daily_budget:\n                return {\"allowed\": False,\
  \ \"reason\": \"budget\", \"retry_after\": None}\n\n            # Record and allow\n            self._request_times.append(now)\n\
  \            self._token_counts.append((now, estimated_tokens))\n            self._daily_spend += estimated_cost\n\n   \
  \         return {\n                \"allowed\": True,\n                \"rpm_used\": current_rpm + 1,\n               \
  \ \"tpm_used\": current_tpm + estimated_tokens,\n                \"budget_remaining\": self.daily_budget - self._daily_spend\n\
  \            }\n\n    def _estimate_cost(self, tokens: int, model: str) -> float:\n        rates = {\n            \"claude-opus-4-6\"\
  : 0.045,    # ~$45 per 1M tokens blended\n            \"claude-sonnet-4-6\": 0.009,   # ~$9 per 1M tokens blended\n    \
  \        \"claude-haiku-4-5\": 0.0024,   # ~$2.4 per 1M tokens blended\n        }\n        return (tokens / 1_000_000) *\
  \ rates.get(model, 0.009)"
monitoring_dashboard: '| Metric | Source | Alert Threshold |

  |--------|--------|-----------------|

  | RPM current | Rate limiter counter | >= 800 (warn), >= 950 (queue) |

  | TPM current | Token counter sum | >= 72,000 (warn) |

  | Daily spend | Cost accumulator | >= $40 (restrict), >= $47.50 (stop) |

  | Queue depth | Queue length | >= 200 (warn), >= 400 (critical) |

  | 429 responses from Anthropic | API response code | >= 1 (our limiter should prevent these) |

  | Avg queue wait time | Queue timestamps | >= 10s (warn), >= 25s (degrade) |'
headers_anthropic_response: 'x-ratelimit-limit-requests: 1000

  x-ratelimit-limit-tokens: 80000

  x-ratelimit-remaining-requests: 742

  x-ratelimit-remaining-tokens: 53200

  x-ratelimit-reset-requests: 2026-03-29T14:00:32Z

  x-ratelimit-reset-tokens: 2026-03-29T14:00:18Z

  retry-after: 3


  Always parse these headers and sync local counters — Anthropic''s count is authoritative.'
anti_patterns:
- Retrying 429s immediately without exponential backoff (triggers stricter throttling)
- Ignoring TPM limit and only tracking RPM (long prompts hit TPM first)
- No daily budget cap (autonomous loops can spend hundreds overnight)
- Single global rate limiter instead of per-agent_group budgets (one agent_group starves others)
- Hardcoding limits instead of reading from Anthropic response headers (limits change with tier upgrades)
