# P10 Memory Schema v2.0
# v2.0: machine_format per type
lp: P10
name: Memory
description: O que LEMBRA

types:
  mental_model:
    description: Modelo mental persistente (routing, decisoes)
    boundary: "Estado mental variavel por sessao. NAO eh mental_model P02 (identidade fixa do agente, imutavel)."
    layer: runtime
    core: true
    machine_format: yaml
    naming: p10_mm_{{agent}}.yaml
    constraints: {max_bytes: 3072}

  brain_index:
    description: Indice de busca (BM25, FAISS config)
    boundary: "Indice de busca semantica (BM25, FAISS). NAO eh embedding_config (P01, modelo) nem rag_source (P01, fonte)."
    layer: runtime
    core: true
    machine_format: yaml
    naming: p10_bi_{{index}}.yaml
    constraints: {max_bytes: 3072}

  learning_record:
    description: Registro de aprendizado (o que deu certo/errado)
    boundary: "Registro de aprendizado persistente. NAO eh session_state (efemero) nem axiom (imutavel, nao aprende)."
    layer: content
    core: true
    machine_format: yaml
    naming: p10_lr_{{topic}}.md + .yaml
    constraints: {max_bytes: 3072}

  session_state:
    description: Estado de sessao (efemero, snapshot)
    boundary: "Estado efemero de sessao (snapshot). NAO eh mental_model (persistente) nem learning_record (nao acumula)."
    layer: runtime
    core: false
    machine_format: yaml
    naming: p10_ss_{{session}}.yaml
    constraints: {max_bytes: 3072}

  axiom:
    description: Regra fundamental (imutavel, nao negociavel)
    boundary: "Regra fundamental imutavel. NAO eh law (P08, operacional ajustavel) nem instruction (P03, flexivel)."
    layer: governance
    core: true
    machine_format: yaml
    naming: p10_ax_{{rule}}.md
    constraints: {max_bytes: 3072}
