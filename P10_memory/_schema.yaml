pillar: P10
name: Memory
description: O que LEMBRA
kinds:
  runtime_state:
    description: Estado mental variavel por sessao (routing, decisoes em runtime)
    boundary: Estado mental variavel acumulado em runtime. NAO eh mental_model P02 (identidade fixa do agente, imutavel) nem
      session_state (efemero, snapshot).
    layer: runtime
    core: true
    machine_format: yaml
    naming: p10_rs_{{agent}}.yaml
    constraints:
      max_bytes: 3072
    llm_function: INJECT
  brain_index:
    description: Indice de busca (BM25, FAISS config)
    boundary: Indice de busca semantica (BM25, FAISS). NAO eh embedding_config (P01, modelo) nem rag_source (P01, fonte).
    layer: runtime
    core: true
    machine_format: yaml
    naming: p10_bi_{{index}}.yaml
    constraints:
      max_bytes: 3072
    llm_function: INJECT
  learning_record:
    description: Registro de aprendizado (o que deu certo/errado)
    boundary: Registro de aprendizado persistente. NAO eh session_state (efemero) nem axiom (imutavel, nao aprende).
    layer: content
    core: true
    machine_format: yaml
    naming: p10_lr_{{topic}}.md + .yaml
    constraints:
      max_bytes: 3072
    llm_function: INJECT
  session_state:
    description: Estado de sessao (efemero, snapshot)
    boundary: Estado efemero de sessao (snapshot). NAO eh runtime_state (persistente entre sessoes) nem learning_record (nao
      acumula).
    layer: runtime
    core: false
    machine_format: yaml
    naming: p10_ss_{{session}}.yaml
    constraints:
      max_bytes: 3072
    llm_function: INJECT
  memory_summary:
    description: Resumo comprimido de memorias
    boundary: Compressao. NAO eh session_state.
    layer: runtime
    core: true
    machine_format: yaml
    naming: p10_summary.md
    constraints:
      max_bytes: 2048
    frontmatter_required:
    - id
    - name
    - source_type
    - compression_method
    llm_function: INJECT
  entity_memory:
    description: Memoria sobre entidades
    boundary: Fatos sobre X. NAO eh learning_record.
    layer: runtime
    core: true
    machine_format: yaml
    naming: p10_entity.md
    constraints:
      max_bytes: 2048
    frontmatter_required:
    - id
    - name
    - entity_type
    - attributes
    llm_function: INJECT
