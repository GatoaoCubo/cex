  primary: mental-model-builder
  related:
  - session-state-builder
  - context-doc-builder
agent_context: Conversation context manager tracks per-session state for multi-turn interactions. Maintains turn history,
  active topic, accumulated facts, and context window budget. State is session-scoped — destroyed on session end, with key
  facts promoted to persistent memory before teardown.
routing_rules: '| Rule | Condition | Action | Confidence |

  |------|-----------|--------|------------|

  | topic_switch | user intent diverges from active_topic | update active_topic, archive previous context | 0.85 |

  | memory_promote | fact repeated 3+ times or user says "remember" | write to persistent memory file | 0.95 |

  | budget_exceeded | token_count > 80% of context_window | trigger compaction: summarize oldest turns | 0.99 |

  | fallback_route | confidence < 0.5 on all routing rules | escalate to gateway-agent for re-routing | 1.00 |'
decision_tree: "new_user_message\n  ├── same_topic (intent matches active_topic) -> append to turn history\n  ├── new_topic\
  \ (intent diverges) -> archive context, switch active_topic\n  ├── memory_request (\"remember X\") -> promote to persistent\
  \ memory\n  └── ambiguous (confidence < 0.5) -> ask clarifying question"
priorities:
- Context budget — never exceed context window; compact proactively at 80%
- Turn coherence — maintain topic thread; don't lose context on topic switch
- Memory promotion — persist valuable facts before session teardown
- Latency — state updates must complete in < 100ms to avoid blocking response
heuristics: '| Heuristic | When | Confidence |

  |-----------|------|------------|

  | 3-turn topic stability | Same topic for 3+ turns = committed topic | 0.90 |

  | Recency bias | Last 5 turns weighted 3x vs older turns in relevance | 0.85 |

  | Explicit > implicit | User-stated facts override inferred facts | 0.95 |'
constraints:
- Session state must not exceed 50KB serialized — enforce via compaction
- Never persist PII to memory without explicit user consent
- Context compaction must preserve all user-stated facts (explicit memory requests)
state_transitions: '| Trigger | From | To | Condition |

  |---------|------|----|-----------|

  | session_start | idle | active | user sends first message |

  | topic_switch | active | active | intent divergence detected |

  | budget_exceeded | active | compacting | token_count > 80% window |

  | compaction_done | compacting | active | summary replaces old turns |

  | session_end | active | teardown | user closes or timeout |

  | teardown_done | teardown | idle | promoted facts saved |'
