what_happened: Continuous batching mode (`spawn_grid.ps1 -mode continuous`) was tested with ISOFIX (7 batches, single sat)
  and CBTEST (mixed SHAKA+EDISON+PYTHA). ISOFIX achieved 1.6x speedup over static grid. CBTEST confirmed zero git lock contention
  at 3 concurrent satellites.
pattern_success: '| Step | Action | Why It Worked |

  |------|--------|---------------|

  | 1 | Handoff naming `{MISSION}batch{N}_{SAT}.md` | Auto-refill detected batch files by naming convention |

  | 2 | Signal-based slot detection `{sat}complete{ts}.json` | No polling needed, filesystem signals are atomic |

  | 3 | Max 3 concurrent satellites | Stayed under 4-terminal BSOD threshold |'
anti_pattern_observed: '| Symptom | Root Cause | Fix |

  |---------|-----------|-----|

  | Expected opus slower than sonnet | Assumed model size = latency | Speed = task complexity, not model. Opus was faster
  on simpler ISO tasks |'
evidence:
- 'Input: 7 ISOFIX batches (9 agents each), 6 CBTEST batches (3 sats)'
- 'Output: All batches completed, zero git contention, all signals received'
- 'Metric: 1.6x speedup (ISOFIX), 3 sats confirmed (CBTEST)'
propagation: '- Applies to: Any multi-batch dispatch with > 6 tasks

  - Does NOT apply to: Single-task solo spawns, tasks requiring serial dependency


