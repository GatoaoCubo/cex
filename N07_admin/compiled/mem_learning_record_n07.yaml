summary: '9 dispatch-cycle lessons captured 2026-04-07 to 2026-04-17. Three systemic failures: wrapper PID != worker PID (orphaned
  processes); Ollama/Codex emit valid-format signals without completing work (false wave completion); Codex exits without
  committing (silent data loss). PARTIAL: routing architecture evolving.'
pattern:
- '`taskkill /F /PID <pid> /T`: tree-kill removes wrapper + claude.exe + node.exe + uvx. `Stop-Process` leaves workers orphaned.'
- 'Resolve worker PID: `Get-DescendantPids` via `Win32_Process` CIM BFS; record wrapper+worker in spawn_pids.txt.'
- Verify file-exists + git-commit before trusting signal; Ollama fabricates content, Codex exits 0 without committing.
- 'Codex post-signal: `git log --oneline -5 N0x_*/`; if no commit, run `git add + commit` before wave advance.'
- 'Solo-sequential for <= 3 tasks: 30k boot tokens per spawn; grid-of-6 = 180k before first artifact line.'
- 'Cap Sonnet concurrent at 20: 32 concurrent = 87.5% success; 20 = near-100%.'
- Opus for N03 + N07 only; Sonnet covers N01, N02, N04, N05, N06.
- Poll at 60-90s intervals via background bash loop; tight polling consumes N07 context window.
- '`$pid` is reserved in PowerShell (current process PID); use `$procId` or similar as loop variable.'
anti_pattern:
- '`Start-Process -PassThru` PID for kill: wrapper PID; orphans claude.exe.'
- 'Ollama signal trusted: fabricated KC content passes format checks, silently corrupts downstream.'
- 'Codex exit assumed = commit: never commits; N07 must git-commit every Codex nucleus.'
- 'Grid for <= 3 tasks: 150k+ boot tokens, zero parallelism benefit.'
- '`$pid` as loop var: silent zero-worker dispatch, no error raised.'
- 'Gemini free-tier in grid: 25+ min on "Thinking..." with zero output.'
