  |'
index_configuration: 'FAISS IVFFlat uses an inverted file structure: nlist centroids partition the space,

  nprobe centroids are searched at query time. No HNSW parameters apply.


  | Parameter | Value | Effect |

  |-----------|-------|--------|

  | nlist | 64 | Voronoi cells. sqrt(5000) rule. More cells = faster search, less recall |

  | nprobe | 8 | Cells searched per query. 8/64 = 12.5%. Recall ~95% at this ratio |

  | quantizer | IndexFlatL2 | Exact centroid search. Required for IVFFlat (no PQ compression) |

  | train_size | >= 64  39 = 2496 | IVFFlat requires >= 39  nlist vectors to train. Must pre-train |


  Scale guidance:

  - < 1K vectors per index: use IndexFlatIP (brute-force, exact, no training required)

  - 1K-10K vectors: IVFFlat with nlist=64, nprobe=8 (this config)

  - > 10K vectors: IVFPQx8 for compressed storage, or migrate to Qdrant


  Dimensions fallback: If embedder is local (768d, e.g. all-MiniLM-L6-v2), rebuild

  indexes with dimensions=768. Never mix dimension configs within one index file.'
lifecycle_operations: "1. Train + Create: Load >= 2496 vectors, call `index.train(vectors)`, then `index.add(vectors)`.\n\
  \   Use `faiss.IndexFlatL2` as quantizer, wrap with `faiss.IndexIVFFlat(quantizer, 1536, 64)`.\n\n2. Incremental update:\
  \ IVFFlat does not support delete. Append-only: call `index.add(new_vectors)`\n   after each new document batch. Sidecar\
  \ SQLite is append-compatible.\n\n3. Reindex (full rebuild): Triggered by (a) embedder model change, (b) nlist tuning,\n\
  \   (c) corpus growth past 10K. Re-embed all docs, re-train, re-add, save, replace files.\n\n4. Backup: Copy `.cex/vectorstore/n07/*.index`\
  \ + `meta.db` to `.cex/vectorstore/n07/backup/YYYYMMDD/`.\n\n5. Restore: Replace `.cex/vectorstore/n07/` contents from backup\
  \ directory, reload index\n   via `faiss.read_index(path)` at next process start.\n\n6. Persistence at write time: Call\
  \ `faiss.write_index(index, path)` after every add batch.\n   FAISS is in-memory -- any omitted write loses all appended\
  \ vectors on process exit."
anti_patterns: "1. Omitting `faiss.write_index()` after upsert -- FAISS is purely in-memory; all new vectors\n   lost on process\
  \ restart. Must persist explicitly after every batch add.\n\n2. Querying before training -- IndexIVFFlat raises `AssertionError:\
  \ Index not trained`.\n   Train with >= nlist * 39 representative vectors before the first add().\n\n3. Setting nprobe =\
  \ nlist (nprobe=64) -- degrades to brute-force, eliminates IVF speed benefit.\n   Target nprobe = 10-15% of nlist for the\
  \ recall/speed tradeoff.\n\n4. Mixing 1536-dim and 768-dim vectors in the same index file -- FAISS silently accepts mismatched\n\
  \   dimensions if quantizer was created with wrong d; similarity scores become garbage.\n\n5. Storing all N07 doc types\
  \ in one index -- cross-type noise contaminates results. Use one index\n   per document type with metadata sidecar for cross-type\
  \ joins."
