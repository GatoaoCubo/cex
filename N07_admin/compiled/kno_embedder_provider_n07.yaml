boundary: 'embedder_provider IS: connection config for text-embedding-3-small used by N07 to embed and retrieve operational
  documents (handoffs, signal JSONs, mission plans, decision manifests, wave schedules) via cex_retriever.py. embedder_provider
  IS NOT: vector_store, model_provider, retriever pipeline, chunker, or LLM inference config. It does not govern how documents
  are split or ranked -- only the embedding connection contract.'
