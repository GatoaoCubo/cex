dimension_tradeoffs: 'N07 corpus: handoff files (~800 tokens), signal JSONs (~200 tokens), mission plans (~1200 tokens),

  decision manifests (~600 tokens). Short operational documents -- 512d MRL is optimal.


  | Dimensions | MTEB Avg | Storage/vec | Latency | Use Case |

  |------------|----------|-------------|---------|----------|

  | 1536 (native) | 62.3% | 6.1 KB | baseline | Full-fidelity retrieval, rarely needed for short ops docs |

  | 512 (MRL) | 61.6% | 2.0 KB | -30% | N07 primary: operational doc retrieval, 65% cost reduction |

  | 256 (MRL) | 59.8% | 1.0 KB | -50% | Classification only -- not recommended for N07 retrieval |

  | 768 (nomic) | 54.9% | 3.1 KB | local | Fallback: zero cost, acceptable recall for signal corpus |


  Sloth lens decision: 512d MRL loses 0.7% MTEB vs native but cuts storage and cost by 65%.

  For N07 operational corpus (never >5K documents), this is the correct tradeoff.'
batch_embedding_strategy: 'N07 embeds four corpus types on different schedules:


  | Corpus | Avg Tokens | Batch Trigger | Batch Size | Provider |

  |--------|-----------|---------------|------------|----------|

  | Handoff files (.cex/runtime/handoffs/) | ~800 | on write (F8) | 32 | openai primary |

  | Signal JSONs (.cex/runtime/signals/) | ~200 | on write (F8) | 128 | openai primary |

  | Mission plans (.cex/runtime/plans/) | ~1200 | on write (F8) | 16 | openai primary |

  | Decision manifests (.cex/runtime/decisions/) | ~600 | on write (F8) | 64 | openai primary |


  Fallback routing: if OPENAI_API_KEY absent or API returns 429/503, route to Ollama

  nomic-embed-text. Fallback index is separate (768d vs 512d -- incompatible vector spaces).

  Never mix openai and nomic vectors in the same index.'
integration_pattern: "# cex_retriever.py integration -- N07 orchestration corpus\nfrom openai import OpenAI\nimport os\n\n\
  # Primary: OpenAI text-embedding-3-small at 512d MRL\nclient = OpenAI()  # reads OPENAI_API_KEY from env\n\ndef embed_n07(texts:\
  \ list[str], use_fallback: bool = False) -> list[list[float]]:\n    if use_fallback:\n        # Ollama nomic-embed-text\
  \ -- separate 768d index\n        import requests\n        resp = requests.post(\n            \"http://localhost:11434/api/embeddings\"\
  ,\n            json={\"model\": \"nomic-embed-text\", \"prompt\": texts[0]}\n        )\n        return [resp.json()[\"embedding\"\
  ]]\n    # Primary path: 512d MRL via dimensions param\n    response = client.embeddings.create(\n        model=\"text-embedding-3-small\"\
  ,\n        input=texts,           # up to 2048 texts per call\n        dimensions=512         # MRL reduction from native\
  \ 1536\n    )\n    return [item.embedding for item in response.data]\n\n# Batch embed the N07 handoff corpus\ndef index_handoffs(paths:\
  \ list[str]) -> None:\n    texts = [open(p).read() for p in paths]\n    for i in range(0, len(texts), 2048):\n        batch\
  \ = texts[i:i+2048]\n        vectors = embed_n07(batch)\n        # store in vector_store with path metadata"
anti_patterns:
- Using 1536d native when 512d MRL is available -- N07 corpus is short docs; 512d saves 65% storage with <1% recall loss.
- Mixing openai (512d) and nomic-embed-text (768d) vectors in the same index -- incompatible vector spaces, similarity scores
  become meaningless.
- Triggering re-embed on every N07 session start -- embed on write (F8 signal), not on read; avoids redundant API spend.
- Setting batch_size > 2048 for openai -- provider enforces server-side limit; silent truncation or 429 errors stall the pipeline.
- Hardcoding OPENAI_API_KEY in cex_retriever.py config -- always read from env var; key exposure breaks CI/CD and security
  posture.
- Falling back to nomic without routing to a separate index -- nomic is 768d, openai is 512d; same-index mixed vectors corrupt
  all similarity scores.
