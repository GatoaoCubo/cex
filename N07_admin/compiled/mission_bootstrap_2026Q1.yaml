bugs_encontrados_na_v1_0_corrigidos_nesta_v2_0: ''
bug_1_grid_n_o_serve_para_fase_3: 'Problema: `spawn_grid.ps1` extrai o nucleus do ÚLTIMO segmento do filename do handoff:

  # Get-NucleusFromHandoff

  $parts = $base -split ''_''

  return $parts[-1]  # ultimo segmento


  Se o handoff é `bootstrap_n01.md`, o grid lança `boot/n01.cmd` — que é o agente de Inteligência, NÃO o Builder.


  Além disso, `$active[$nucleus]` usa nucleus como chave do dicionário. Se todos os handoffs terminam em `_n03`, apenas UMA
  instância N03 seria rastreada no loop de monitoramento.


  Impacto: O grid lançaria os nuclei ERRADOS (N01, N02, N04, N05, N06) em vez de N03 para construir.


  Fix: Fase 3 usa spawn_solo sequencial para N03, NÃO spawn_grid. Cada batch é um spawn_solo com handoff detalhado. Grid fica
  reservado para quando cada nucleus roda seu PRÓPRIO trabalho (não para cross-nucleus building).'
