tldr: 7-node DAG for N07 orchestration — receive, classify, handoff, dispatch, monitor, validate, accept.
execution_order:
- - receive_intent
- - classify_domain
- - write_handoff
- - dispatch_builder
- - monitor_signals
- - validate_quality
- - accept_or_reject
critical_path: 'All 7 nodes are on the critical path (sequential pipeline): `receive_intent` --> `classify_domain` --> `write_handoff`
  --> `dispatch_builder` --> `monitor_signals` --> `validate_quality` --> `accept_or_reject`'
node_count: 7
edge_count: 6
max_parallelism: 1
density_score: 0.89
topological_order:
- '`receive_intent` — parse human intent or read mission plan'
- '`classify_domain` — match keywords to routing rules, select target nucleus'
- '`write_handoff` — produce handoff.md with task, context, scope, commit, signal'
- '`dispatch_builder` — execute `bash _spawn/dispatch.sh solo {nucleus} "task"`'
- '`monitor_signals` — poll `.cex/runtime/signals/` for completion or error signal'
- '`validate_quality` — check builder output quality score against 8.0 threshold'
- '`accept_or_reject` — if quality >= 8.0: accept. Else: write feedback, re-dispatch'
parallel_groups: 'Wave 0: [receive_intent] Wave 1: [classify_domain] Wave 2: [write_handoff] Wave 3: [dispatch_builder] Wave
  4: [monitor_signals] Wave 5: [validate_quality] Wave 6: [accept_or_reject] This DAG is strictly sequential — N07 orchestration
  is a pipeline, not a parallel graph. Parallelism occurs at the builder level (grid dispatch), not at the orchestrator level.'
retry_loop: 'On quality rejection at `accept_or_reject`:

  - Edge back to `write_handoff` with feedback context

  - Max 2 retries before escalating to human

  - Each retry preserves prior feedback for context'
