what_was_checked: For each `bld_instruction_*.md`, I checked whether the instruction itself walks through universal F1-F8,
  not whether it merely mentions the string `8F` somewhere in metadata.
spot_check_result: '| Builder | Explicit F1-F8 flow? | Notes |

  |---|---|---|

  | agent | no | 3 custom phases; only `F3_compose` and a properties line mention 8F |

  | knowledge_card | no | 3 custom phases; no real F1-F8 walkthrough |

  | landing_page | no | brief design recipe; no F1-F8 walk |

  | workflow | no | 5 custom phases; no universal 8F sequence |

  | system_prompt | no | 5 custom phases; no universal 8F sequence |'
repo_level_8f_instruction_scan: 'Observed across all builder instruction files:

  - instruction files scanned: `259`

  - mention any `F1/F2/.../F8` token or `8F`: `80`

  - contain all `F1` through `F8`: `1`


  The only full-token hit was:

  - `archetypes/builders/software-project-builder/bld_instruction_software_project.md`


  That file still does not implement the universal 8F protocol faithfully.

  It remaps `F1-F8` onto a custom 9-step software project pipeline:

  - PARSE -> F1

  - SCAFFOLD -> F2

  - IMPLEMENT -> F3

  - TEST -> F4

  - LINT -> F5

  - DOCKER -> F6

  - CI -> F7

  - DEPLOY -> F8

  - REVIEW -> F8b'
8f_enforcement_finding: 'The builder layer does not have strong 8F instruction enforcement.


  More precise statement:

  - many builders expose a useful production recipe

  - some builders mention 8F in metadata

  - very few instruction files encode the universal F1-F8 contract explicitly

  - the current state is closer to "8F-themed builder instructions" than "8F-enforced builder instructions"


  So the answer to the handoff question is:

  - mostly cargo-cult skeletons, with occasional partial grounding'
