count_findings:
- The "257 kinds" claim is correct.
- The "3381 ISOs" claim is correct only if "ISO" means `bld_*.md` files and excludes shared `skill_*.md`.
- The handoff command text overcounts because it includes `skill_*.md`, so the literal command result is 3384, not 3381.
- The "260 builders" claim is false in this worktree.
- 'Live builder dir count is 259, explained as:'
- 257 registry-backed kinds
- '1 registry-free internal builder: `_builder-builder`'
- '1 registry-free public-looking builder: `kind-builder`'
- '`cex_doctor.py` reports 258 because it ignores `_builder-builder`.'
