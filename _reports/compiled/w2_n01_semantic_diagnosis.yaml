  delta: "-7.9pp improvement in territory scanned in W2"
  interpretation: >
    W2 territory (N07, P02-P08) is significantly cleaner than W1 territory (N01-N06 nuclei).
    Two competing hypotheses:
    H1 (favorable): Newer artifacts (Wave 3/4) follow stricter discipline from enforcement.
    H2 (selection bias): W2 focused on admin/schema/tool dirs which are maintained differently.
    Verdict: H1+H2 both partially true. N07_admin is genuinely best-maintained (9.0+ floors).
    P01/library/kind quality_missing (12 files) counteracts H1 -- those are Wave 3/4 bootstrapped files.

  defect_type_comparison:
    w1_primary: "stale_fact (44/49) + no_frontmatter (5/49)"
    w2_primary: "quality_null (71/88 from P01 KCs) + quality_missing (12/12 in P01) + stale_fact (3 genuine)"
    shift: "W2 reveals STRUCTURAL issues (malformed frontmatter) rather than CONTENT issues (stale facts)"

