b1_1_no_secret_scanner_in_ci_or_pre_commit: '`grep -i "trufflehog\|gitleaks\|detect-secret" .github/workflows/*.yml` returns
  nothing.

  `cex_hooks.py` has zero pattern-match for API keys.


  If B0.1 had been caught by automation, the prior consolidation would not have happened.


  Fix: add `gitleaks-action` or `trufflehog` to `ci.yml` as a blocking job + mirror in pre-commit.'
b1_2_requirements_txt_missing_pytest: 'README claims: > `pip install -r requirements.txt` then run pytest core tier. Reality:
  `requirements.txt` has only `pyyaml`, `tiktoken`, `numpy`, `scikit-learn`. `pytest` is NOT included. The first thing a fresh-clone
  user runs (the test suite from `tests/MANIFEST.yaml`) will fail with `No module named pytest`. Fix: add `pytest>=7.0` (and
  `pytest-cov` if CI uses it) to `requirements.txt` — OR rename to `requirements-runtime.txt` and create separate `requirements-dev.txt`.'
