  | KCs in P01_knowledge | 131 | 424 | +293 |

  | Total LOC | 1,353,114 (prior consolidation) | ~1,064,017 | -289K |


  The "1.35M lines" number from CONSOLIDATION.md was wrong — likely included binaries or compiled artifacts.

  Real text-line count for `.py + .md + .yaml + .yml + .sh + .ps1 + .json` (excluding .git/.venv/node_modules) is ~1.06M.


  Fix: replace hand-maintained badges with a `make stats` target driven by a Python script.'
