b0_1_live_api_keys_committed_in_audit_report_catastrophic: 'File: `_reports/audit/security_brand.md` (tracked at HEAD `ac3be936d`)

  Contains the literal contents of `.env`:


  | Key | Status | Where |

  |-----|--------|-------|

  | `ANTHROPIC_API_KEY=sk-ant-REDACTED` | LIVE  ROTATE | line 51 of report |

  | `CEREBRAS_API_KEY=csk-REDACTED` | LIVE  ROTATE | line 57 |

  | `YOUTUBE_API_KEY=AIzaSyREDACTED` | LIVE  ROTATE | line 44 |

  | `GOOGLE_IMAGEN_API_KEY=AIzaSyREDACTED` | LIVE  ROTATE | line 45 |


  Root cause chain (3 failures):

  1. `.env` is correctly in `.gitignore` (good)

  2. But `_tools/audit_security_brand.py` SCANS `.env` and dumps full lines into report

  3. And `_reports/audit/` is NOT gitignored, so the report (with real keys) gets committed

  4. The pre-commit hook (`cex_hooks.py`) has ZERO secret detection — it allowed the commit


  Required actions (in order):

  # 1. ROTATE all 4 keys NOW (treat as fully compromised)

  # 2. Add audit reports + .env mirrors to .gitignore

  echo "_reports/audit/*.md" >> .gitignore

  echo "_reports/audit/inventory_full.jsonl" >> .gitignore

  # 3. Patch _tools/audit_security_brand.py: skip .env (or redact line snippets containing API keys)

  # 4. git rm --cached _reports/audit/security_brand.md _reports/audit/inventory_full.jsonl

  # 5. Use git filter-repo to PURGE keys from history before push:

  #    git filter-repo --path _reports/audit/security_brand.md --invert-paths

  # 6. Add gitleaks/trufflehog to .github/workflows/ci.yml as a new job

  # 7. Add a pre-commit hook step that runs the same secret scanner'
b0_2_inventory_full_jsonl_is_also_tracked: '`git ls-files _reports/audit/inventory_full.jsonl` returns the file. Contains
  an `.env` record (size, last_touched, refs). Less catastrophic than B0.1 (no key contents) but still leaks repo internals.
  Same fix: gitignore + filter-repo purge. ---'
