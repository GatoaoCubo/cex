honest_reflection_on_prior_consolidation: 'The previous `CONSOLIDATION.md` declared READY based on:

  - Brand decoupling complete (true)

  - Bash boots added (true)

  - Tests tiered (true)

  - Examples runnable (true, but stale)

  - SECURITY.md present (true, but stub)


  It missed:

  - The audit script itself was leaking the very secrets the audit was trying to detect

  - No automation to prevent regression

  - Doc-vs-code drift on counts


  Lesson: "the audit passed" is meaningless if the audit output itself is the leak.

  Future audits must scan their own outputs.'
