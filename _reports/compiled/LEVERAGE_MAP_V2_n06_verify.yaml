gap_1_pricing_simulator: "What it would do: Model revenue/margin impact of price changes\n- Input: current price, demand curve\
  \ (elasticity), costs, competitor prices\n- Output: revenue forecast, margin %, breakeven point\n- Use case: \"What if we\
  \ raise Pro tier from $29 → $39?\"\n\nCurrent state: Designed (pattern_pricing_framework.md stage 3: QUANTIFY). No tool.\
  \  \nImpact: N06 must manually compute or use spreadsheet; slows pricing decisions.  \nPriority: \U0001F534 HIGH — ROI:\
  \ 1 pricing change → 11% profit swing (McKinsey). This tool pays for itself.\n\n---"
gap_2_ltv_calculator: "What it would do: Compute customer lifetime value from cohort retention + ARPU\n- Input: cohort retention\
  \ matrix (from cohort_analyzer), ARPU curve, churn rate\n- Output: LTV by cohort/segment, payback period, CAC budget recommendation\n\
  - Use case: \"Is $500 CAC defensible at LTV=$2000?\"\n\nCurrent state: No tool or pattern. Mentioned in handoff as missing.\
  \  \nImpact: N06 can't validate unit economics; cannot optimize CAC spend.  \nPriority: \U0001F534 HIGH — ROI: LTV/CAC ratio\
  \ is the single most important business metric. Without it, all pricing/sales decisions are blind.\n\n---"
gap_3_funnel_analyzer: "What it would do: Compute conversion rates per funnel stage, identify bottlenecks\n- Input: funnel\
  \ events (visit → signup → trial → paid)\n- Output: stage conversion %, drop-off %, recommendations for highest-impact optimization\n\
  - Use case: \"Trial conversion is 8%; industry is 15%. Fix that first.\"\n\nCurrent state: Pattern exists (pattern_funnel_architecture.md).\
  \ No tool.  \nImpact: N06 must manually calculate from logs; cannot rapidly test funnel variants.  \nPriority: \U0001F7E1\
  \ MEDIUM — ROI: funnel optimization is lower-leverage than pricing/LTV, but still 2-3% conversion lift per optimization.\n\
  \n---"
gap_4_churn_predictor: "What it would do: Predict which users will churn in next 30 days\n- Input: user engagement metrics,\
  \ feature usage, support tickets, NPS\n- Output: churn risk score per user, cohort-level churn forecast, early warning signals\n\
  - Use case: \"50 high-value users predicted to churn next month. Outreach budget?\"\n\nCurrent state: Builder exists (churn-prevention-playbook).\
  \ No tool.  \nImpact: N06 reactive (churn happens); cannot be proactive.  \nPriority: \U0001F7E1 MEDIUM-LOW — ROI: good\
  \ for retention, but requires ML training data; first 3 gaps are more important.\n\n---"
gap_5_revenue_margin_dashboard: "What it would do: Unified view of recurring revenue, margin by tier/cohort, ARR/MRR trends\n\
  - Input: subscription events, pricing tier, cost structure\n- Output: automated reporting dashboard\n- Use case: Monthly\
  \ financials to executives\n\nCurrent state: No tool or pattern.  \nImpact: N06 assembles reports manually; error-prone.\
