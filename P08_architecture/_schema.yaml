pillar: P08
name: Architecture
description: COMO escala
kinds:
  pattern:
    description: 'Pattern reutilizavel (ex: continuous batching)'
    boundary: Pattern reutilizavel de arquitetura. NAO eh law (inviolavel) nem workflow
      (P12, sequencia executavel).
    layer: content
    core: true
    machine_format: yaml
    naming: p08_pat_{{name}}.md + .yaml
    constraints:
      max_bytes: 4096
    llm_function: INJECT
  law:
    description: Lei operacional (inviolavel)
    boundary: Lei operacional inviolavel do sistema. NAO eh instruction (P03, flexivel)
      nem guardrail (P11, safety-focused).
    layer: governance
    core: true
    machine_format: yaml
    naming: p08_law_{{number}}.md
    constraints:
      max_bytes: 3072
    llm_function: CONSTRAIN
  diagram:
    description: Diagrama de arquitetura (ASCII ou Mermaid)
    boundary: Diagrama visual de arquitetura. NAO eh component_map (dados estruturados)
      nem pattern (sem prescricao).
    layer: content
    core: false
    machine_format: yaml
    naming: p08_diag_{{scope}}.md
    constraints:
      max_bytes: 4096
    llm_function: INJECT
  component_map:
    description: Mapa de componentes (what connects to what)
    boundary: Mapa estruturado de componentes e conexoes. NAO eh diagram (visual)
      nem satellite_spec (escopo de 1 satelite).
    layer: spec
    core: false
    machine_format: yaml
    naming: p08_cmap_{{scope}}.yaml
    constraints:
      max_bytes: 3072
    llm_function: INJECT
  director:
    description: Crew orchestrator that composes and coordinates multiple builders
    naming: ex_director_{topic}.md
