pillar: P08
name: Architecture
description: COMO escala
kinds:
  pattern:
    description: 'Pattern reutilizavel (ex: continuous batching)'
    boundary: Pattern reutilizavel de arquitetura. NAO eh law (inviolavel) nem workflow (P12, sequencia executavel).
    layer: content
    core: true
    machine_format: yaml
    naming: p08_pat_{{name}}.md + .yaml
    constraints:
      max_bytes: 4096
    llm_function: INJECT
  law:
    description: Lei operacional (inviolavel)
    boundary: Lei operacional inviolavel do sistema. NAO eh instruction (P03, flexivel) nem guardrail (P11, safety-focused).
    layer: governance
    core: true
    machine_format: yaml
    naming: p08_law_{{number}}.md
    constraints:
      max_bytes: 3072
    llm_function: CONSTRAIN
  diagram:
    description: Diagrama de arquitetura (ASCII ou Mermaid)
    boundary: Diagrama visual de arquitetura. NAO eh component_map (dados estruturados) nem pattern (sem prescricao).
    layer: content
    core: false
    machine_format: yaml
    naming: p08_diag_{{scope}}.md
    constraints:
      max_bytes: 4096
    llm_function: INJECT
  component_map:
    description: Mapa de componentes (what connects to what)
    boundary: Mapa estruturado de componentes e conexoes. NAO eh diagram (visual) nem agent_card (escopo de 1 agent_group).
    layer: spec
    core: false
    machine_format: yaml
    naming: p08_cmap_{{scope}}.yaml
    constraints:
      max_bytes: 3072
    llm_function: INJECT
  agent_card:
    description: Deployment spec for autonomous agent — identity, model, tools, boot, dispatch, constraints
    boundary: Agent deployment spec. NAO eh agent (P02, persona only) nem boot_config (P02, provider startup) nem spawn_config (P12, runtime launch).
    layer: spec
    core: false
    machine_format: yaml
    naming: p08_ac_{{agent_name}}.yaml
    constraints:
      max_bytes: 4096
    required_files:
    - identity section (name, domain, role)
    - model config (model, context_window, temperature)
    - tools list (mcp_servers or function_defs)
    - dispatch keywords
    recommended_files:
    - boot sequence
    - constraints (hard + soft)
    - scaling config
    - monitoring spec
    llm_function: BECOME
    references:
    - A2A AgentCard (Google, 2024)
    - OpenAI Assistant config
    - CrewAI Agent(role+goal+tools+llm)
    - MCP Server manifest
    - K8s PodSpec
    - Docker Compose service
  director:
    description: Crew orchestrator that composes and coordinates multiple builders
    llm_function: REASON
    naming: ex_director_{topic}.md
  decision_record:
    description: 'ADR: contexto, decisao, consequencias'
    boundary: Registro. NAO eh law nem pattern.
    layer: runtime
    core: true
    machine_format: yaml
    naming: p08_adr.md
    constraints:
      max_bytes: 4096
    frontmatter_required:
    - id
    - title
    - status
    - context
    - decision
    llm_function: REASON
  naming_rule:
    description: Regra de nomenclatura
    boundary: Regra de nomenclatura de artefatos. NAO eh validator (P06, valida conteudo) nem type_def (P06, define tipo).
    layer: governance
    core: false
    machine_format: yaml
    naming: p05_nr_{{scope}}.md
    constraints:
      max_bytes: 4096
    llm_function: GOVERN
