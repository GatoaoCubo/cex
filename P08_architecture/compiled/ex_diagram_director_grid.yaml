overview: orchestrator orchestrates up to 6 parallel agent_nodes via PowerShell spawn scripts.
architecture: "                    USER INPUT\n                        |\n                    [orchestrator]\n           \
  \        (pi runtime)\n                   /    |    \\\n          [HANDOFF] [HANDOFF] [HANDOFF]\n              |       \
  \  |         |\n    +---------+---------+---------+---------+\n    |  spawn_grid.ps1 (up to 6 slots)      |\n    |  MoveWindow\
  \ positioning (640x520 ea)  |\n    +---------+---------+---------+---------+\n         |         |         |\n    [builder_agent]\
  \  [research_agent]   [marketing_agent]\n    (opus)    (sonnet)   (sonnet)\n    boot/     boot/      boot/\n    edison \
  \   shaka      lily\n    .cmd      .cmd       .cmd\n         |         |         |\n    [COMMIT]  [COMMIT]  [COMMIT]\n \
  \        |         |         |\n    [SIGNAL]  [SIGNAL]  [SIGNAL]\n         \\         |         /\n          spawn_monitor.ps1\n\
  \                |\n           [orchestrator]\n          (collect + push)"
key_properties:
- Max 6 slots for short tasks (<15min), 3 for long (>30min)
- 'Each agent_node: own CMD window, own Claude session, own MCP config'
- 'Continuous mode: slot completes -> next batch auto-dispatched'
- 'Isolation: agent_nodes share git repo but never edit same files'
