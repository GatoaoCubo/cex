tldr: 'When queue > slots: fill slots immediately as they complete instead of waiting for entire wave — 1.6x speedup on 7+
  task missions'
max_bytes: 2048
density_score: 0.92
source: organization-core/records/skills/continuous_batching/SKILL.md
linked_artifacts:
  workflow: p12_wf_stella_dispatch
  spawn: p12_spawn_grid_continuous
problem: Static batching (launch N tasks → wait ALL done → launch next wave) causes idle slots when tasks finish at different
  speeds. In a 3-slot grid with tasks taking 5/10/20 min, slots 1+2 idle for 10+ min waiting for slot 3.
solution: 'Continuous batching: when any slot completes, immediately assign next task from queue. No idle time between tasks
  per slot.'
diagram: "STATIC (wave):          CONTINUOUS:\n[A][B][C] → wait all   [A][B][C]\n[D][E][F] → wait all    [D]  when A done\n\
  \                        [E]      when B done\n                        [F]          when C done\nTotal: 2x slowest     \
  \  Total: ~1.6x speedup (measured)"
auto_detection_logic: "IF handoffs_count > available_slots:\n    mode = continuous\nELSE:\n    mode = static (wave)\n\nTrigger:\
  \ `spawn_grid.ps1` auto-detects — orchestrator does not choose manually."
measured_performance: '| Mission | Tasks | Slots | Mode | Result |

  |---------|-------|-------|------|--------|

  | ISOFIX | 7 batches | 3 | continuous | 1.6x speedup vs static |

  | CBTEST | 8 mixed | 3 | continuous | research_agent+builder_agent+knowledge_agent confirmed |'
when_to_use: '| Condition | Use Continuous |

  |-----------|---------------|

  | Tasks > slots | YES (auto) |

  | Tasks independent | YES |

  | Tasks have dependencies (B needs A output) | NO — use wave order |

  | < 4 tasks total | NO — overhead > gain |

  | Sequential pipeline | NO — use ordered static |'
handoff_naming_convention: '{MISSION}batch{N}_{SAT}.md

  Example: CEX7_batch_1_pytha.md, CEX7_batch_2_pytha.md'
signal_protocol: 'Each batch signals independently:

  write_signal(''pytha'', ''complete'', 9.0, task=''cex7_batch_2'')

  # Spawn monitor detects → assigns next batch automatically'
constraints:
- Max 3 concurrent agent_groups (BSOD at 4 on current hardware)
- 5s delay between terminal spawns (RAM stability)
- 'Git lock: zero contention confirmed at 3 concurrent agent_groups'
