# Context Compaction Pattern

## Problem
Long sessions exceed context limits. Naive truncation loses critical details.

## Solution: 3-phase compaction
1. Analysis scratchpad (<analysis> tags, stripped from output)
   - Forces structured thinking, improves summary quality
2. 9-section summary (<summary> tags)
   - Request/Intent, Concepts, Files/Code, Errors, Problem-solving,
     User Messages, Pending Tasks, Current Work, Next Step
3. Continuation protocol
   - Summary replaces prefix, recent messages preserved verbatim

## Variants
- Full: summarize entire conversation
- Partial (from): summarize only recent messages after retained context
- Partial (up_to): summarize everything before a boundary

## Key Decisions
- Section 6 (User Messages): prevents drift in task interpretation
- Section 9 (Next Step with quotes): prevents drift across compaction boundaries
- No tool calls during compaction: all context in-message, text-only response
- Analysis block stripped: improves quality without consuming permanent context

## Anti-Patterns
- Naive truncation: loses early critical decisions
- Full verbatim: wastes context on low-value messages
- Unstructured summary: loses specificity
- Summarizing recent: most recent work should stay verbatim
