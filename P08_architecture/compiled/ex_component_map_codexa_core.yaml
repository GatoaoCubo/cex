components: '| Component | Path | Depends On | Used By |

  |-----------|------|-----------|---------|

  | STELLA orchestrator | boot/stella.cmd | pi runtime, rules | USER |

  | Satellite boots | boot/*.cmd | claude CLI, MCP configs | STELLA |

  | Brain MCP | records/core/brain/ | Ollama, FAISS | All satellites |

  | Quality Gate | records/core/python/quality_gate.py | git hooks | Pre-commit |

  | Spawn Scripts | records/core/powershell/ | PowerShell | STELLA |

  | Signal Writer | records/core/python/signal_writer.py | filesystem | Satellites |

  | Agent Store | records/agents/ | Brain index | Satellites |

  | Skill Store | records/skills/ | Brain index | Satellites |

  | Pool | records/pool/ | Brain index | Knowledge queries |

  | WhatsApp Bridge | records/framework/whatsapp/ | Node.js, Groq | STELLA |

  | Handoffs | .claude/handoffs/ | filesystem | STELLA -> Satellites |

  | Signals | .claude/signals/ | filesystem | Satellites -> STELLA |'
data_flow: "USER -> STELLA -> handoffs/ -> spawn -> SATELLITE -> signals/ -> STELLA\n                                    \
  \       |\n                                    brain_query (MCP)\n                                           |\n       \
  \                             Pool + Agents + Skills"
