# P11 Feedback Schema v4.0
# v2.0: machine_format per kind
pillar: P11
name: Feedback
description: COMO melhora
kinds:
  quality_gate:
    description: Barreira de qualidade (pass/fail com score)
    boundary: Barreira de qualidade com score numerico. NAO eh validator (P06, tecnico
      pass/fail) nem scoring_rubric (P07, define criterios).
    layer: governance
    core: true
    machine_format: yaml
    naming: p11_qg_{{gate}}.yaml
    constraints:
      max_bytes: 4096
    llm_function: GOVERN
  bugloop:
    description: Ciclo de correcao automatica (detect > fix > verify)
    boundary: Ciclo automatico detect>fix>verify. NAO eh unit_eval (P07, teste manual)
      nem optimizer (melhoria continua, nao correcao).
    layer: governance
    core: false
    machine_format: yaml
    naming: p11_bl_{{scope}}.md + .yaml
    constraints:
      max_bytes: 4096
    llm_function: GOVERN
  lifecycle_rule:
    description: Regra de ciclo de vida (freshness, archive, promote)
    boundary: Regra declarativa de ciclo de vida. NAO eh hook (P04, codigo executavel)
      nem runtime_rule (P09, tecnico).
    layer: governance
    core: true
    machine_format: yaml
    naming: p11_lc_{{rule}}.yaml
    constraints:
      max_bytes: 4096
    llm_function: GOVERN
  guardrail:
    description: Restricao de seguranca (safety boundary)
    boundary: Restricao de seguranca e safety boundary. NAO eh permission (P09, acesso)
      nem law (P08, operacional).
    layer: governance
    core: true
    machine_format: yaml
    naming: p11_gr_{{scope}}.yaml
    constraints:
      max_bytes: 4096
    llm_function: CONSTRAIN
  optimizer:
    description: Otimizador de processo (metric > action)
    boundary: Otimizador de processo metric>action. NAO eh bugloop (correcao pontual)
      nem benchmark (P07, medicao passiva).
    layer: governance
    core: false
    machine_format: yaml
    naming: p11_opt_{{target}}.md + .yaml
    constraints:
      max_bytes: 4096
    llm_function: GOVERN
