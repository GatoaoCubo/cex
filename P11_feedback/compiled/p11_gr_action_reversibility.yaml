# Action Reversibility Guardrail

## Rules
1. BLOCK destructive ops (rm -rf, DROP TABLE, git reset --hard, force-push) without authorization
2. BLOCK externally visible actions (push, PR, Slack, email) without confirmation
3. ALLOW local reversible actions (edits with git, tests, reads) without confirmation
4. Single approval does NOT authorize future instances
5. Do not use destruction as shortcut. Investigate root causes.
6. Unexpected state? Investigate before modifying.

## Enforcement: BLOCK -- prevent execution, route to GDP USER-scope decision
## Blast Radius: reversible? local? visible? destructive? authorized? Any "no" = ask user
## Scope: ALL nuclei with write access
## Bypass: autonomous_level: high in brand_config, or explicit session authorization
