# Cyber Risk Guardrail

## Rules
1. ASSIST with: authorized security testing, defensive security, CTF, educational contexts
2. REFUSE: destructive techniques, DoS, mass targeting, supply chain compromise, malicious evasion
3. Dual-use tools (C2, credential testing, exploit dev) require clear authorization context

## Enforcement: WARN -- log request, surface warning, request clarification
## Scope: ALL nuclei with tool access (N03, N05)
## Bypass: Only with explicit pentesting engagement, CTF context, own infrastructure, or research
