purpose: '[WHAT this guardrail does]'
configuration: 'severity: [block | warn | modify]

  applies_to: [all | kind_list | pillar_list]

  enabled: true'
rules: '| Rule | Check | On Violation |

  |------|-------|-------------|

  | no_pii | Scan for email/phone | Block + redact |

  | no_hallucination | Verify sources | Warn + flag |

  | no_injection | Detect prompt inject | Block + log |

  | max_length | Output <= limit | Truncate + warn |

  | format_valid | Schema match | Block + retry |'
implementation: "def guardrail(output, rules):\n    for rule in rules:\n        result = rule.check(output)\n        if not\
  \ result.passed and rule.severity == \"block\":\n\n            return GuardrailResult(blocked=True)\n    return GuardrailResult(blocked=False)"
