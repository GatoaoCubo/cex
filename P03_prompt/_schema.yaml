pillar: P03
name: Prompt
description: COMO o agente FALA - 9 tipos de prompt engineering
variable_syntax:
  tier1_template: '{{MUSTACHE}}'
  tier2_authoring: '[BRACKET]'
  deprecated: '{single_curly}'
kinds:
  system_prompt:
    description: Prompt de sistema que define identidade e regras do agente
    boundary: Identidade + regras + formato. Lido PRIMEIRO pelo LLM.
    layer: prompt
    core: true
    machine_format: yaml
    naming: p03_sp_{{agent}}.md
    industry_terms:
    - system message
    - system instruction
    - persona prompt
    used_by:
    - OpenAI
    - Anthropic
    - Google
    - LangChain SystemMessagePromptTemplate
    source_map:
      already_is:
      - PRIME_*.md (7)
      - ISO_*_SYSTEM_INSTRUCTION (101)
      - Rules/*.md (10)
      receives_input_from:
      - P01 knowledge_card
      - P10 mental_model
      - P11 guardrail
    constraints:
      max_bytes: 4096
      quality_min: 7.0
    frontmatter_required:
    - id
    - kind
    - pillar
    - title
    - target_agent
    - quality
    body_structure:
    - identity
    - rules
    - output_format
    - constraints
    llm_function: BECOME
  prompt_template:
    description: Molde reusavel com {{vars}} para gerar prompts
    boundary: Template com variaveis. NAO eh user_prompt (fixo) nem system_prompt
      (identidade).
    layer: prompt
    core: true
    machine_format: yaml
    naming: p03_pt_{{topic}}.md
    industry_terms:
    - prompt template
    - chat prompt template
    - jinja template
    used_by:
    - LangChain PromptTemplate
    - DSPy Signature
    - Mustache
    - Jinja2
    source_map:
      already_is:
      - TPL_EDISON_009-020 (10)
      - ISO_*_OUTPUT_TEMPLATE (118)
      receives_input_from:
      - P06 type_def
    constraints:
      max_bytes: 8192
    frontmatter_required:
    - id
    - kind
    - title
    - variables
    - quality
    body_structure:
    - purpose
    - variables_table
    - template_body
    - quality_gates
    - examples
    llm_function: CONSTRAIN
  chain:
    description: Sequencia de prompts encadeados (output A -> input B)
    boundary: Sequencia de PROMPTS. NAO eh workflow (P12, agentes+tools).
    layer: prompt
    core: false
    machine_format: yaml
    naming: p03_ch_{{pipeline}}.md
    industry_terms:
    - prompt chain
    - sequential chain
    - pipeline
    - LLMChain
    used_by:
    - LangChain SequentialChain
    - DSPy Module composition
    source_map:
      already_is:
      - ADW_*.md (~240 workflows)
      receives_input_from:
      - P05 output_schema
      - P06 interface
    constraints:
      max_bytes: 6144
    frontmatter_required:
    - id
    - kind
    - steps
    - flow
    body_structure:
    - purpose
    - steps
    - data_flow
    - error_handling
    llm_function: PRODUCE
  action_prompt:
    description: Prompt de tarefa que o humano/orquestrador envia ao agente
    boundary: Tarefa especifica. O LLM EXECUTA isso.
    layer: prompt
    core: true
    machine_format: yaml
    naming: p03_up_{{task}}.md
    industry_terms:
    - user message
    - human message
    - task prompt
    - instruction prompt
    used_by:
    - OpenAI
    - Anthropic
    - Google
    - LangChain HumanMessagePromptTemplate
    source_map:
      already_is:
      - HOP_*.md (287)
      - Handoff_*.md (255)
      - ISO_*_INSTRUCTIONS (213)
      receives_input_from:
      - P01 knowledge_card
      - P05 output_schema
    constraints:
      max_bytes: 2048
    frontmatter_required:
    - id
    - kind
    - action
    - input_required
    - output_expected
    body_structure:
    - context
    - purpose
    - input
    - execution
    - output
    - validation
    llm_function: INJECT
  instruction:
    description: Step-by-step execution instructions for agents or pipelines
    naming: ex_instruction_{topic}.md
