# P03 Prompt Schema v4.0
# v4.0: +planner type, llm_function on all types
pillar: P03
name: Prompt
description: COMO o agente FALA - 9 tipos de prompt engineering
variable_syntax:
  tier1_template: '{{MUSTACHE}}'
  tier2_authoring: '[BRACKET]'
  deprecated: '{single_curly}'
kinds:
  system_prompt:
    description: Prompt de sistema que define identidade e regras do agente
    boundary: Identidade + regras + formato. Lido PRIMEIRO pelo LLM.
    layer: prompt
    core: true
    machine_format: yaml
    naming: p03_sp_{{agent}}.md
    industry_terms:
    - system message
    - system instruction
    - persona prompt
    used_by:
    - OpenAI
    - Anthropic
    - Google
    - LangChain SystemMessagePromptTemplate
    source_map:
      already_is:
      - PRIME_*.md (7)
      - ISO_*_SYSTEM_INSTRUCTION (101)
      - Rules/*.md (10)
      receives_input_from:
      - P01 knowledge_card
      - P10 mental_model
      - P11 guardrail
    constraints:
      max_bytes: 4096
      quality_min: 7.0
    frontmatter_required:
    - id
    - kind
    - pillar
    - title
    - target_agent
    - quality
    body_structure:
    - identity
    - rules
    - output_format
    - constraints
    llm_function: BECOME
  user_prompt:
    description: Prompt de tarefa que o humano/orquestrador envia ao agente
    boundary: Tarefa especifica. O LLM EXECUTA isso.
    layer: prompt
    core: true
    machine_format: yaml
    naming: p03_up_{{task}}.md
    industry_terms:
    - user message
    - human message
    - task prompt
    - instruction prompt
    used_by:
    - OpenAI
    - Anthropic
    - Google
    - LangChain HumanMessagePromptTemplate
    source_map:
      already_is:
      - HOP_*.md (287)
      - Handoff_*.md (255)
      - ISO_*_INSTRUCTIONS (213)
      receives_input_from:
      - P01 knowledge_card
      - P05 output_schema
    constraints:
      max_bytes: 2048
    frontmatter_required:
    - id
    - kind
    - action
    - input_required
    - output_expected
    body_structure:
    - context
    - purpose
    - input
    - execution
    - output
    - validation
    llm_function: INJECT
  prompt_template:
    description: Molde reusavel com {{vars}} para gerar prompts
    boundary: Template com variaveis. NAO eh user_prompt (fixo) nem system_prompt
      (identidade).
    layer: prompt
    core: true
    machine_format: yaml
    naming: p03_pt_{{topic}}.md
    industry_terms:
    - prompt template
    - chat prompt template
    - jinja template
    used_by:
    - LangChain PromptTemplate
    - DSPy Signature
    - Mustache
    - Jinja2
    source_map:
      already_is:
      - TPL_EDISON_009-020 (10)
      - ISO_*_OUTPUT_TEMPLATE (118)
      receives_input_from:
      - P06 type_def
    constraints:
      max_bytes: 8192
    frontmatter_required:
    - id
    - kind
    - title
    - variables
    - quality
    body_structure:
    - purpose
    - variables_table
    - template_body
    - quality_gates
    - examples
    llm_function: CONSTRAIN
  few_shot:
    description: Exemplos de input/output para in-context learning
    boundary: Pares concretos input->output. NAO eh prompt_template (sem vars).
    layer: prompt
    core: true
    machine_format: yaml
    naming: p03_fs_{{task}}.md
    industry_terms:
    - few-shot examples
    - in-context learning
    - demonstrations
    - exemplars
    used_by:
    - OpenAI
    - Anthropic
    - LangChain FewShotPromptTemplate
    - DSPy BootstrapFewShot
    source_map:
      already_is:
      - few_shot_bank.yaml
      - ISO_*_EXAMPLES (115)
      receives_input_from:
      - P07 golden_test
    constraints:
      max_bytes: 4096
      min_examples: 2
      max_examples: 5
    frontmatter_required:
    - id
    - kind
    - task
    - examples_count
    body_structure:
    - task_description
    - examples
    - selection_criteria
    llm_function: INJECT
  chain_of_thought:
    description: Prompt que instrui raciocinio passo-a-passo antes de responder
    boundary: Tecnica de raciocinio explicito. NAO eh chain (sequencia) nem user_prompt
      (tarefa direta).
    layer: prompt
    core: false
    machine_format: yaml
    naming: p03_cot_{{task}}.md
    industry_terms:
    - chain-of-thought
    - CoT
    - step-by-step reasoning
    - extended thinking
    used_by:
    - Wei et al. 2022
    - Google
    - Anthropic extended thinking
    - DSPy ChainOfThought
    source_map:
      already_is:
      - KC_EDISON_024 (CoT patterns)
      is_input_for:
      - any user_prompt (technique applied on top)
    constraints:
      max_bytes: 3072
    frontmatter_required:
    - id
    - kind
    - reasoning_type
    body_structure:
    - task
    - reasoning_cue
    - format
    - answer_extract
    llm_function: REASON
  react:
    description: Prompt que interleava Thought/Action/Observation em loop
    boundary: Padrao agentico Thought->Action->Observation. NAO eh chain_of_thought
      (sem tools).
    layer: prompt
    core: false
    machine_format: yaml
    tool_schemas_format: json
    naming: p03_react_{{agent}}.md
    industry_terms:
    - ReAct
    - reasoning and acting
    - tool-use loop
    - agentic loop
    used_by:
    - Yao et al. 2023
    - LangChain AgentExecutor
    - DSPy dspy.ReAct
    - Anthropic tool_use
    source_map:
      already_is:
      - ISO_*_TOOLS_AND_APIS (91)
      - .mcp-*.json (10)
      receives_input_from:
      - P04 skill
      - P04 mcp_server
    constraints:
      max_bytes: 5120
    frontmatter_required:
    - id
    - kind
    - tools_available
    body_structure:
    - objective
    - tools
    - loop_format
    - stop_condition
    - max_iterations
    llm_function: REASON
  chain:
    description: Sequencia de prompts encadeados (output A -> input B)
    boundary: Sequencia de PROMPTS. NAO eh workflow (P12, agentes+tools).
    layer: prompt
    core: false
    machine_format: yaml
    naming: p03_ch_{{pipeline}}.md
    industry_terms:
    - prompt chain
    - sequential chain
    - pipeline
    - LLMChain
    used_by:
    - LangChain SequentialChain
    - DSPy Module composition
    source_map:
      already_is:
      - ADW_*.md (~240 workflows)
      receives_input_from:
      - P05 output_schema
      - P06 interface
    constraints:
      max_bytes: 6144
    frontmatter_required:
    - id
    - kind
    - steps
    - flow
    body_structure:
    - purpose
    - steps
    - data_flow
    - error_handling
    llm_function: PRODUCE
  meta_prompt:
    description: Prompt que gera, melhora ou evolui outros prompts
    boundary: Prompt sobre prompts. NAO eh prompt_template (apenas formata).
    layer: prompt
    core: false
    machine_format: yaml
    naming: p03_mp_{{purpose}}.md
    industry_terms:
    - meta-prompt
    - prompt generator
    - prompt optimizer
    - auto-prompt
    used_by:
    - DSPy MIPRO
    - PromptBreeder
    - OPRO
    - TextGrad
    source_map:
      already_is:
      - HOP_GENESIS/PITER
      - _generator.md files (12)
      is_input_for:
      - all other P03 types
      receives_input_from:
      - P07 scoring_rubric
      - P01 knowledge_card
    constraints:
      max_bytes: 7168
    frontmatter_required:
    - id
    - kind
    - target_type
    - optimization_method
    body_structure:
    - objective
    - generation_rules
    - quality_criteria
    - iteration_method
    llm_function: PRODUCE
  router_prompt:
    description: Prompt que classifica input e roteia para handler apropriado
    boundary: Classificador + roteador. NAO eh chain (sequencia fixa).
    layer: prompt
    core: false
    machine_format: yaml
    naming: p03_rp_{{scope}}.md
    industry_terms:
    - router prompt
    - classifier prompt
    - intent router
    - semantic router
    used_by:
    - LangChain RouterChain
    - semantic-router lib
    - OpenAI function routing
    source_map:
      already_is:
      - STELLA_RULES.md
      - AGENT_ROUTING_INDEX.md
      receives_input_from:
      - P12 dispatch_rule
      - P10 learning_record
    constraints:
      max_bytes: 6144
    frontmatter_required:
    - id
    - kind
    - routes
    - fallback
    body_structure:
    - objective
    - routes
    - classification
    - fallback
    - threshold
    llm_function: REASON
  planner:
    description: Prompt que decompoe tarefa em plano executavel (task decomposition)
    boundary: Raciocinio que gera sequencia de steps. NAO eh chain (executa steps)
      nem router_prompt (classifica input). Planner GERA o plano, chain EXECUTA.
    layer: prompt
    core: false
    machine_format: yaml
    naming: p03_plan_{{strategy}}.md
    constraints:
      max_bytes: 4096
    llm_function: REASON
