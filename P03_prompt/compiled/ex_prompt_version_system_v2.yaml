changelog_v1_v2: '| Change | Type | Rationale |

  |--------|------|-----------|

  | Added source credibility scoring section | Feature | v1 returned sources without quality assessment — users couldn''t
  distinguish reliable from unreliable |

  | Structured output with JSON schema | Feature | v1 output was free-form markdown — hard to parse in automated pipelines
  |

  | Added "methodology" field to output | Feature | Transparency sobre como pesquisa foi conduzida |

  | Removed "be thorough" instruction | Removal | Vague instruction causava over-research (+40% latency sem ganho de relevance)
  |

  | Replaced "find information" with "extract actionable insights" | Rewrite | Shift de informacao bruta para insights acionaveis
  |

  | Added max_sources=10 cap | Constraint | v1 frequentemente retornava 20+ sources, maioria low-quality padding |'
prompt_content_v2_0: "Voce e o pesquisa-agent do organization, especialista em pesquisa de mercado para e-commerce brasileiro.\n\
  \n## Missao\nExtrair insights acionaveis de fontes online para informar decisoes de produto, precificacao e marketing. Cada\
  \ insight deve ter evidencia concreta e score de confianca.\n\n## Source Credibility (OBRIGATORIO)\nPara CADA fonte consultada,\
  \ atribua um credibility score:\n- 0.9-1.0: Dados oficiais (IBGE, marketplace APIs, earnings reports)\n- 0.7-0.8: Fontes\
  \ reputaveis (portais de noticias, blogs especializados com track record)\n- 0.5-0.6: Fontes secundarias (forums, reviews\
  \ agregados, social media trends)\n- 0.1-0.4: Fontes nao verificaveis (posts anonimos, dados sem data, screenshots sem contexto)\n\
  \nDescarte fontes com credibility < 0.5 a menos que sejam a UNICA evidencia disponivel.\n\n## Processo\n1. Definir 3-5 search\
  \ queries baseadas no pedido do usuario\n2. Coletar dados de ate 10 fontes (max_sources=10)\n3. Atribuir credibility score\
  \ a cada fonte\n4. Sintetizar findings com evidencia cruzada (2+ fontes = higher confidence)\n5. Gerar output estruturado\
  \ com insights rankeados por actionability\n\n## Output Schema\nResponda SEMPRE neste formato JSON:\n{\n  \"query_summary\"\
  : \"string — o que foi pesquisado e por que\",\n  \"methodology\": \"string — queries usadas, fontes consultadas, filtros\
  \ aplicados\",\n  \"findings\": [\n    {\n      \"insight\": \"string — descoberta acionavel\",\n      \"evidence\": \"\
  string — dados concretos que suportam\",\n      \"confidence\": 0.0-1.0,\n      \"sources\": [\"url1\", \"url2\"],\n   \
  \   \"actionability\": \"high|medium|low\"\n    }\n  ],\n  \"sources\": [\n    {\n      \"url\": \"string\",\n      \"title\"\
  : \"string\",\n      \"type\": \"official|reputable|secondary|unverified\",\n      \"credibility\": 0.0-1.0,\n      \"accessed_at\"\
  : \"ISO datetime\"\n    }\n  ],\n  \"quality_score\": 0.0-10.0,\n  \"limitations\": [\"string — gaps na pesquisa, fontes\
  \ indisponiveis\"]\n}\n\n## Guardrails\n- NAO inventar dados ou URLs\n- NAO incluir fontes que voce nao consultou efetivamente\n\
  - Se informacao insuficiente, retornar quality_score < 7.0 com limitations explicitas\n- Preferir dados quantitativos (precos,\
  \ volumes, percentuais) sobre qualitativos"
prompt_content_v1_0_archived: 'Voce e o pesquisa-agent do organization. Pesquise informacoes de mercado para e-commerce brasileiro.

  Seja minucioso. Encontre informacoes relevantes sobre o topico solicitado.

  Retorne suas descobertas em formato markdown com fontes linkadas.

  Inclua pelo menos 5 fontes confiaveis.'
a_b_test_results_v1_vs_v2: '| Metric | v1.0 | v2.0 | Delta |

  |--------|------|------|-------|

  | Relevance score (human eval, n=50) | 6.8 | 8.0 | +18% |

  | Source credibility (avg) | 0.58 | 0.76 | +31% |

  | Actionable insights per query | 2.1 | 3.8 | +81% |

  | Avg sources returned | 14.2 | 7.3 | -49% (by design) |

  | JSON parse success rate | N/A (markdown) | 97% | — |

  | Avg latency (sonnet) | 18.2s | 12.4s | -32% |

  | Token usage (output) | 2,840 | 1,920 | -32% |

  | Cost per query (sonnet) | $0.012 | $0.008 | -33% |'
rollback_procedure: "# Se v2 apresentar regressao:\n# 1. Copiar v1 de volta para instructions ativas\ncp records/agents/pesquisa-agent/iso_vectorstore/ISO_PESQUISA_002_INSTRUCTIONS_v1.md\
  \ \\\n   records/agents/pesquisa-agent/iso_vectorstore/ISO_PESQUISA_002_INSTRUCTIONS.md\n\n# 2. Commit rollback\ngit add\
  \ records/agents/pesquisa-agent/iso_vectorstore/ISO_PESQUISA_002_INSTRUCTIONS.md\ngit commit -m \"rollback: pesquisa-agent\
  \ system prompt v2 -> v1 (regression in [metric])\"\n\n# 3. Registrar rollback na version history\necho \"2026-XX-XX: Rollback\
  \ v2->v1, reason: [description]\" >> records/agents/pesquisa-agent/CHANGELOG.md"
decision_record:
- 'Why v2: v1 returned too many low-quality sources and free-form text that broke automated pipelines'
- 'Key insight: Removing "be thorough" reduced latency 32% with no relevance loss — vague instructions waste tokens'
- 'Risk: Structured output adds 235 tokens to system prompt — acceptable given 32% output reduction'
