context: 'Agua Marinha Home sells home decor and lifestyle products on Brazilian marketplaces (ML, Shopee, Amazon BR). This
  brief generates AI product images for Instagram feed posts and marketplace hero images. Brand identity: coastal minimalism,
  natural materials, warm Scandinavian aesthetic.'
filled_brief: "BRAND: Agua Marinha Home\nCATEGORY: digital\nSTYLE: minimalist scandinavian with warm wood accents\nLIGHTING:\
  \ soft natural window light, golden hour warmth\n\nBRIEF:\nGenerate 3 image(s) for Agua Marinha Home in digital format.\n\
  Visual style: minimalist scandinavian with warm wood accents.\nLighting: soft natural window light, golden hour warmth.\n\
  Aspect ratio: 1:1.\n\nREQUIREMENTS:\n1. No text/typography in the image (brand name provided for context only)\n2. Consistent\
  \ lighting across all 3 variations\n3. Category-appropriate composition:\n   - digital: RGB, screen-optimized contrast\n\
  4. Product centered on natural wood surface or linen textile\n5. Background: soft-focus coastal or neutral interior setting\n\
  6. Color palette: sand (#C2B280), ocean blue (#4F97A3), warm white (#FAF0E6)\n7. Props: dried eucalyptus, ceramic vases,\
  \ woven baskets (brand-adjacent only)\n\nEXCLUDE: text, watermark, logo, human faces, cluttered background\n\nOUTPUT: 3\
  \ variations with consistent style\n  - Variation 1: Product on oak shelf, window light from left, eucalyptus accent\n \
  \ - Variation 2: Product on linen tablecloth, overhead diffused light, ceramic vase nearby\n  - Variation 3: Product in\
  \ styled vignette, golden hour side light, woven basket background"
verification_checklist:
- '[x] brand_name is non-empty: "Agua Marinha Home"'
- '[x] category is valid enum: "digital"'
- '[x] lighting_modifier specified: "soft natural window light, golden hour warmth"'
- '[x] negative_prompts defined: 5 exclusions listed'
- '[x] aspect_ratio specified: 1:1 (Instagram feed optimized)'
- '[x] Each variation has distinct composition while maintaining style unity'
- '[x] Color palette hex codes provided for reproduction consistency'
quality_gates_applied:
- 'brand_name present: prevents AI text hallucination in generated images'
- 'lighting_modifier explicit: ensures consistent look across 3 variations'
- 'No vague language: every requirement has specific, measurable criteria'
- 'Category locked to "digital": RGB color space, screen contrast optimization'
- Props restricted to brand-adjacent items only (no random objects)
platform_mapping: '| Platform | Aspect | Adaptation |

  |----------|--------|------------|

  | Instagram Feed | 1:1 | Use as-is |

  | Instagram Story | 9:16 | Extend background vertically, keep product centered |

  | Shopee Hero | 1:1 | Add 10% padding for mobile crop safety |

  | ML Listing | 4:3 | Slight horizontal crop, maintain product focus |


