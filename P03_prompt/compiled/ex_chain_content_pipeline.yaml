id: p03_ch_content_pipeline
type: chain
lp: P03
title: Content Pipeline Chain (Research to Publish)
steps: 4
flow: research -> draft -> review -> publish
quality: 9.0
purpose: >
  Pipeline de 4 etapas para producao de conteudo de marketing: pesquisa de mercado,
  rascunho, revisao de qualidade e formatacao para publicacao. Cada step recebe output
  do anterior via data contract explicito.
chain_steps:
  - id: 1
    name: Research
    model: sonnet
    fallback_model: haiku
    input:
      type: object
      required: [topic, target_audience, content_type]
      properties:
        topic: {type: string}
        target_audience: {type: string}
        content_type: {type: string, enum: [blog_post, social_media, email, ad_copy]}
        keywords: {type: array, items: {type: string}, minItems: 3, maxItems: 10}
    output:
      type: object
      required: [market_context, key_insights, tone_recommendation, hooks]
      properties:
        market_context: {type: string, maxLength: 500}
        competitor_angles: {type: array, items: {type: string}, maxItems: 5}
        key_insights: {type: array, items: {type: string}, minItems: 3}
        tone_recommendation: {type: string, enum: [formal, casual, provocative, educational]}
        hooks: {type: array, items: {type: string}, minItems: 2, maxItems: 5}
  - id: 2
    name: Draft
    model: opus
    fallback_model: sonnet
    input: output of step 1 + original user input
    output:
      type: object
      required: [title, body, cta]
      properties:
        title: {type: string, maxLength: 100}
        body: {type: string, minLength: 200}
        cta: {type: string}
        hashtags: {type: array, items: {type: string}, maxItems: 10}
        estimated_read_time_min: {type: number}
  - id: 3
    name: Review
    model: sonnet
    fallback_model: haiku
    input: output of step 2 + tone_recommendation from step 1
    output:
      type: object
      required: [score, issues, approved]
      properties:
        score: {type: number, minimum: 0, maximum: 10}
        issues:
          type: array
          items:
            type: object
            properties:
              severity: {type: string, enum: [critical, high, medium, low]}
              location: {type: string}
              issue: {type: string}
              fix: {type: string}
        approved: {type: boolean}
        revised_body: {type: string}
    retry_condition: "score < 6.0 -> re-run step 2 with issues as context (max 1 retry)"
  - id: 4
    name: Publish
    model: haiku
    fallback_model: null
    input: revised_body (if exists) or body from step 2 + content_type
    output:
      type: object
      required: [formatted_content, platform_metadata, status]
      properties:
        formatted_content: {type: string}
        platform_metadata:
          type: object
          properties:
            platform: {type: string}
            char_count: {type: integer}
            within_limits: {type: boolean}
            scheduled_for: {type: string, format: date-time}
        status: {type: string, enum: [ready, needs_revision, published]}
data_flow: "User Input -> Research -> {context,insights,tone,hooks} -> Draft -> {title,body,cta} -> Review -> {score,approved,revised_body} -> Publish -> {formatted,metadata,status}"
error_handling:
  model_timeout: retry 1x with fallback model (30s threshold)
  fallback_fails: return partial result with status needs_revision
  low_review_score: re-run Draft with issues as context (max 1 retry)
  over_char_limit: truncate with ellipsis, set within_limits false
research_base:
  - source: MIPRO/DSPy
    finding: Chain pattern with explicit data contracts
  - source: arxiv 2504.02052
    finding: Knowledge-first ordering +0.91 task adherence
