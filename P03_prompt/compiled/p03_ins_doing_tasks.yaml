  | Build time           | 2.5m     | 1.8m   | time         | 1.9m          |

  | Error rate           | 5%       | 2%     | CI logs      | 1.7%          |

  | Documentation score  | 65/100   | 90/100 | sphinx       | 88/100        |

  | Security scan score  | 7.2/10   | 9.5/10 | bandit       | 8.9/10        |'
edge_case_handling: "1. Missing dependencies:  \n   Example: If `auth.py` is missing, create a minimal skeleton with placeholder\
  \ functions  \n2. Conflicting changes:  \n   Example: Use `git merge` with conflict resolution strategy defined in `MERGE.md`\
  \  \n3. Inconsistent quality:  \n   Example: If `test_auth.py` fails, run `pytest --pdb` to debug failures  \n4. Tool failures:\
  \  \n   Example: If `flake8` crashes, use `pycodestyle` as fallback  \n5. Ambiguous requests:  \n   Example: Send clarification\
  \ request to orchestrator via `curl -X POST http://orchestrator/api/clarify`"
quality_gate_examples: '| Gate Name       | Tool         | Threshold | Description                                  |

  |-----------------|--------------|-----------|----------------------------------------------|

  | Code Coverage   | pytest-cov   | 85%       | All tests must pass with >=85% coverage      |

  | Security Score  | bandit       | 9.0/10    | No high-severity vulnerabilities allowed     |

  | Linting Score   | flake8       | 0 errors  | No style or syntax errors allowed            |

  | Documentation   | sphinx       | 90/100    | API docs must score >=90/100                 |

  | Test Stability  | pytest       | 100%      | No flaky tests in the repository             |'
