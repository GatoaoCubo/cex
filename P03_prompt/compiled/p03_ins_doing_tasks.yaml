updated: '2026-04-12'
density_score: 0.92
task_decomposition: "1. Parse intent: Extract verb, object, domain from the request  \n   Example: \"Refactor the user authentication\
  \ module in Python\" → verb: \"refactor\", object: \"user authentication module\", domain: \"Python\"  \n2. Map to CEX taxonomy:\
  \ Identify kind, pillar, and target nucleus  \n   Example: \"Refactor\" maps to kind: instruction, pillar: P03, nucleus:\
  \ code quality  \n3. Check dependencies: Are prerequisite artifacts available?  \n   Example: Verify existence of `auth.py`\
  \ and `requirements.txt`  \n4. Plan approach: Template-First (match >= 60%), hybrid, or fresh build  \n   Example: If 75%\
  \ of code matches existing templates, use Template-First"
tool_usage: "- Use dedicated tools over shell commands (Read > cat, Grep > grep, Edit > sed)  \n  Example: Use `git diff`\
  \ instead of `cat` for code comparison  \n- Run independent tool calls in parallel for efficiency  \n  Example: Execute\
  \ `lint` and `test` in parallel during CI  \n- Break complex work into discrete steps with clear inputs/outputs  \n  Example:\
  \ Split \"deploy application\" into \"build\", \"package\", \"push\"  \n- Validate tool results before proceeding to next\
  \ step  \n  Example: Confirm `pytest` passes before committing changes"
execution_standards: "- Read existing code before modifying it  \n  Example: Review `auth.py` for legacy comments or custom\
  \ logic  \n- Prefer editing existing files over creating new ones  \n  Example: Update `models.py` instead of creating new\
  \ `user_models.py`  \n- Do not add features beyond what was requested  \n  Example: Avoid adding rate-limiting if not specified\
  \  \n- Do not add speculative abstractions or future-proofing  \n  Example: Skip implementing OAuth2 if only basic auth\
  \ is required  \n- Write safe, secure code -- check for OWASP Top 10 vulnerabilities  \n  Example: Validate user inputs\
  \ to prevent SQL injection (A1)  \n- Test the golden path and edge cases before reporting completion  \n  Example: Test\
  \ both valid and invalid login scenarios"
completion_criteria: "A task is complete when:  \n1. All requested artifacts are created/modified  \n   Example: `auth.py`,\
  \ `tests/test_auth.py`, and `README.md` updated  \n2. Artifacts pass F7 GOVERN quality gates  \n   Example: Code meets 85%+\
  \ coverage in `test_auth.py`  \n3. Compilation succeeds (compiled YAML is valid)  \n   Example: `git status` shows no uncommitted\
  \ changes  \n4. Changes are committed with descriptive message  \n   Example: Commit message: \"Refactor auth module to\
  \ use JWT\"  \n5. Completion signal is sent to the orchestrator  \n   Example: `curl -X POST http://orchestrator/api/complete`"
comparison_of_task_execution_approaches: '| Method          | Pros                                      | Cons                                      |
  Use Cases                              | Efficiency Score |

  |-----------------|-------------------------------------------|-------------------------------------------|----------------------------------------|------------------|

  | Template-First  | Fast, consistent, low risk                | Limited flexibility                      | Routine code
  generation                | 9.2              |

  | Hybrid          | Balances speed and customization          | Requires judgment                        | Refactoring with
  minor changes       | 8.5              |

  | Fresh Build     | Full control, no legacy debt              | Time-consuming, high risk                | New system implementation              |
  6.8              |

  | Manual          | No tooling dependencies                   | Error-prone, inconsistent                | Simple one-off
  tasks                   | 4.3              |

  | Automated       | Scalable, repeatable                      | High initial setup cost                  | CI/CD pipelines                        |
  9.0              |'
boundary: This artifact defines the protocol for executing tasks through CEX agents. It is a technical specification for task
  execution, including tool usage and quality gates. It is not a strategic document, UI design guide, or high-level architecture
  plan.
