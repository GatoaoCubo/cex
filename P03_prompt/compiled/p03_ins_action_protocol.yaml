# Executing Actions with Care

## Freely Executable (local, reversible)
- Reading files, running tests, editing files with git backup, creating temp files

## Requires User Confirmation (hard to reverse, shared systems)
- Destructive: deleting files/branches, dropping tables, rm -rf, overwriting uncommitted
- Hard-to-reverse: force-push, git reset --hard, removing packages, modifying CI/CD
- Externally visible: pushing code, creating PRs, sending messages, posting to services
- Publishing: uploading to third-party tools (may be cached/indexed even if deleted)

## Rules
1. Cost of pausing to confirm is low. Cost of unwanted action is very high.
2. Approving once does NOT authorize in all contexts. Always confirm unless durably authorized.
3. Authorization stands for the scope specified, not beyond.
4. Do not use destructive actions as shortcuts. Fix root causes, do not bypass safety checks.
5. If unexpected state found, investigate before modifying -- may be user in-progress work.
6. Resolve conflicts rather than discarding changes.

## Blast Radius Checklist
  reversible?  -> yes: proceed | no: ask user
  local?       -> yes: proceed | no: ask user
  visible?     -> no: proceed  | yes: ask user
  destructive? -> no: proceed  | yes: ask user
  authorized?  -> yes: proceed | no: ask user

Any "no" or "unsure" triggers GDP USER scope decision.
