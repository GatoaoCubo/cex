variables: '| Var | Tipo | Descricao | Exemplo |

  |-----|------|-----------|---------|

  | {{SYSTEM_NAME}} | string | Nome do sistema | CODEXA |

  | {{ORCHESTRATOR_NAME}} | string | Nome do orchestrator | STELLA |

  | {{SATELLITES}} | list | Lista de agents especializados | [SHAKA, LILY, EDISON...] |

