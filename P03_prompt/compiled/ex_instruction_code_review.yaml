author: builder_agent
title: 'Instruction: Code Review Checklist'
target: code-reviewer agent or human reviewer
steps_count: 6
prerequisites:
- Code diff or pull request is available and accessible
- Reviewer has context on the project's conventions and quality standards
validation_method: checklist
idempotent: true
atomic: false
rollback: Not applicable — code review is read-only and idempotent.
dependencies:
- Source code repository access
logging: true
domain: code_review
quality: 9.0
tags:
- instruction
- code-review
- checklist
- quality
tldr: '6-step code review instruction: read diff, check correctness, security, style, tests, then produce structured verdict.'
density_score: 0.9
steps:
- Read the full diff — understand the change scope before reviewing individual lines
- Check correctness — verify logic handles edge cases, null values, off-by-one errors, and race conditions
- Check security — scan for injection (SQL/XSS/command), hardcoded secrets, unvalidated input at system boundaries
- Check style — confirm naming conventions, import ordering, and formatting match project standards
- Check tests — verify new/changed behavior has corresponding test coverage; flag untested paths
- 'Produce verdict — output structured review: APPROVE, REQUEST_CHANGES, or COMMENT with specific line references'
validation:
- '[ ] Every changed function has at least one test covering the change'
- '[ ] No hardcoded secrets or credentials in diff'
- '[ ] All review comments reference specific line numbers'
- '[ ] Verdict includes severity per finding (critical/major/minor/nit)'
- '[ ] Final outcome: structured review document with actionable findings'
references:
- OWASP Top 10 for security checks
- Project CLAUDE.md for style and convention rules
