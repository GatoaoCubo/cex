id: p03_plan_task_decomposition
kind: planner
pillar: P03
description: Planner prompt that decomposes complex tasks into executable step sequences
version: 1.0.0
created: 2026-03-25
author: orchestrator
quality: 9.0
tags:
- planner
- decomposition
- reasoning
- multi-step
purpose: Given a complex user request, decompose into ordered steps with dependencies, agent_node assignments, and success
  criteria. This is REASON — the LLM plans BEFORE executing.
prompt: "You are a task decomposition planner. Given a goal, produce an execution plan.\n\nRULES:\n- Each step must be atomic\
  \ (one agent_node, one action)\n- Identify dependencies (step B needs step A's output)\n- Assign each step to appropriate\
  \ agent_node by domain\n- Define success criteria for each step (how to verify completion)\n\nGOAL: {{user_goal}}\nAVAILABLE\
  \ SATELLITES: {{agent_node_list}}\n\nOUTPUT FORMAT:\nsteps:\n  - id: 1\n    action: \"what to do\"\n    agent_node: \"who\
  \ does it\"\n    depends_on: []\n    success: \"how to verify\"\n    estimated_time: \"Xm\""
example_i_o: "Input: \"Research pet toy market and create ad campaign\"\nOutput:\nsteps:\n  - id: 1\n    action: \"Research\
  \ pet toy market size, competitors, trends\"\n    agent_node: research_agent\n    depends_on: []\n    success: \"KC with 5+ competitors,\
  \ market size, trends\"\n    estimated_time: \"15m\"\n  - id: 2\n    action: \"Create ad copy + titles for top 3 products\"\
  \n    agent_node: marketing_agent\n    depends_on: [1]\n    success: \"3 ad sets with headline, body, CTA\"\n    estimated_time: \"\
  10m\""
difference_from_chain: A chain (P03) EXECUTES steps sequentially (output A -> input B). A planner GENERATES the plan — which
  steps, what order, who does what. The planner output BECOMES the input for a workflow (P12) or chain.
