# .cex/brand/brand_config.yaml
# Generated by N06 Brand Architect after Brand Discovery
# This file makes your CEX instance YOURS
# Run: python _tools/brand_validate.py to check validity
# Run: python _tools/brand_propagate.py to push to all nuclei

identity:
  BRAND_NAME: "{{BRAND_NAME}}"
  BRAND_TAGLINE: "{{BRAND_TAGLINE}}"
  BRAND_SLOGAN: "{{BRAND_SLOGAN}}"
  BRAND_MISSION: "{{BRAND_MISSION}}"
  BRAND_VISION: "{{BRAND_VISION}}"
  BRAND_VALUES:
    - "{{VALUE_1}}"
    - "{{VALUE_2}}"
    - "{{VALUE_3}}"
  BRAND_STORY: "{{BRAND_STORY}}"
  BRAND_BIO: "{{BRAND_BIO}}"                   # Short 1-2 sentence bio for social profiles
  BRAND_ESSENCE: "{{BRAND_ESSENCE}}"            # One-word or short phrase capturing the soul
  BRAND_MANIFESTO: "{{BRAND_MANIFESTO}}"        # Extended brand manifesto / belief statement

archetype:
  BRAND_ARCHETYPE: "{{BRAND_ARCHETYPE}}"       # creator|hero|sage|explorer|rebel|magician|lover|caregiver|jester|ruler|innocent|everyman
  BRAND_ARCHETYPE_SHADOW: "{{SHADOW}}"
  BRAND_PERSONALITY:
    - "{{TRAIT_1}}"
    - "{{TRAIT_2}}"
    - "{{TRAIT_3}}"
    - "{{TRAIT_4}}"
    - "{{TRAIT_5}}"

voice:
  BRAND_VOICE_TONE: "{{TONE}}"                 # e.g. "tecnico-confiante, direto"
  BRAND_VOICE_FORMALITY: 3                      # 1=casual 5=formal
  BRAND_VOICE_ENTHUSIASM: 3
  BRAND_VOICE_HUMOR: 2
  BRAND_VOICE_WARMTH: 3
  BRAND_VOICE_AUTHORITY: 4
  BRAND_VOICE_DO:
    - "{{DO_1}}"
    - "{{DO_2}}"
    - "{{DO_3}}"
  BRAND_VOICE_DONT:
    - "{{DONT_1}}"
    - "{{DONT_2}}"
    - "{{DONT_3}}"
  BRAND_LANGUAGE: "pt-BR"
  BRAND_PERSON: "2nd"                           # 1st (we) | 2nd (you) | 3rd (they)
  BRAND_ENERGY: "moderate"                      # calm | moderate | energetic | bold

audience:
  BRAND_ICP: "{{ICP_DESCRIPTION}}"
  BRAND_ICP_AGE: "{{AGE_RANGE}}"
  BRAND_ICP_LOCATION: "{{LOCATION}}"
  BRAND_ICP_INCOME: "{{INCOME_CLASS}}"
  BRAND_ICP_VALUES:
    - "{{ICP_VALUE_1}}"
    - "{{ICP_VALUE_2}}"
  BRAND_ICP_FEARS:
    - "{{ICP_FEAR_1}}"
    - "{{ICP_FEAR_2}}"
  BRAND_ICP_ASPIRATIONS:
    - "{{ICP_ASPIRATION_1}}"
    - "{{ICP_ASPIRATION_2}}"
  BRAND_TRANSFORMATION: "From {{BEFORE}} to {{AFTER}} through {{BRIDGE}}"
  BRAND_COUNTRY: "{{BRAND_COUNTRY}}"            # Primary market country (e.g. "BR", "US")

visual:
  BRAND_COLORS:
    primary: "#000000"
    secondary: "#1A1A2E"
    accent: "#50C878"
    background: "#0A0A0A"
    foreground: "#E0E0E0"
    surface: "#1E1E2E"
  BRAND_FONTS:
    heading: "Geist"
    body: "Inter"
    mono: "JetBrains Mono"
  BRAND_LOGO_URL: "{{LOGO_URL}}"
  BRAND_FAVICON_URL: "{{FAVICON_URL}}"
  BRAND_STYLE: "minimal-dark"

positioning:
  BRAND_CATEGORY: "{{CATEGORY}}"
  BRAND_UVP: "Para {{TARGET}} que {{NEED}}, {{BRAND}} e {{CATEGORY}} que {{BENEFIT}} porque {{REASON}}"
  BRAND_DIFFERENTIATOR: "We are the only {{CATEGORY}} that {{UNIQUE}}"
  BRAND_COMPETITORS:
    - "{{COMPETITOR_1}}"
    - "{{COMPETITOR_2}}"
  BRAND_CONTENT_PILLARS:
    - "{{PILLAR_1}}"
    - "{{PILLAR_2}}"
    - "{{PILLAR_3}}"
  BRAND_HASHTAG: "{{BRAND_HASHTAG}}"            # Primary brand hashtag (e.g. "#YourBrand")
  BRAND_TAGS:                                    # SEO/discovery tags
    - "{{TAG_1}}"
    - "{{TAG_2}}"
    - "{{TAG_3}}"

monetization:
  BRAND_PRICING_MODEL: "subscription"           # subscription|one-time|credits|freemium|marketplace|hybrid
  BRAND_CURRENCY: "BRL"
  BRAND_PRICE_ANCHOR: "{{ANCHOR}}"
  BRAND_TIERS:
    - "free"
    - "starter"
    - "pro"
    - "enterprise"
  BRAND_PAYMENT_PROVIDERS:
    - "stripe"
    - "mercadopago"
