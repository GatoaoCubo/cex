runtime: gemini
tier: mid
provider: google
cli: gemini
models:
  default: gemini-2.5-pro
  n01: gemini-2.5-pro
  n02: gemini-2.5-flash
  n03: gemini-2.5-pro
  n04: gemini-2.5-flash
