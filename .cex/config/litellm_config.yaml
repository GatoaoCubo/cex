# LiteLLM Proxy Configuration for CEX
# Generated from nucleus_models.yaml
# Start: litellm --config .cex/config/litellm_config.yaml --port 4000
#
# Every nucleus calls: POST http://localhost:4000/v1/chat/completions
# with model: "cex-n0X" -- LiteLLM routes to the right provider.
#
# Fallback chains: if primary fails, next model is tried automatically.
# Virtual keys: per-nucleus budget tracking and rate limiting.

model_list:
  # --- N07 Orchestrator (Opus -- best reasoning) ---
  - model_name: cex-n07
    litellm_params:
      model: anthropic/claude-opus-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
      max_tokens: 8192
  - model_name: cex-n07
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY
  - model_name: cex-n07
    litellm_params:
      model: ollama/gemma4:26b
      api_base: http://localhost:11434
  - model_name: cex-n07
    litellm_params:
      model: ollama/qwen3:14b
      api_base: http://localhost:11434

