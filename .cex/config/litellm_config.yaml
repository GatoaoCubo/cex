# Virtual keys for per-nucleus budget tracking
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  # database_url removed -- DB is optional; without it, no prisma init / no migrations.
  # To enable persistent tracking, uncomment and set LITELLM_DB_URL env var:
  # database_url: os.environ/LITELLM_DB_URL

# Router settings
router_settings:
  routing_strategy: simple-shuffle  # fallback on failure
  num_retries: 2
  timeout: 120
  retry_after: 5
  allowed_fails: 2  # switch to fallback after 2 failures

# Budget limits (USD per day per virtual key)
# Set via API: POST /key/generate with max_budget
# Example: cex-n03 key with $5/day limit
