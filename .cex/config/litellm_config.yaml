# LiteLLM Proxy Configuration for CEX (FREE MODE, tuned per-nucleus)
# 2026-04-15: picked via bench_nucleus_models.py on 7 domain prompts.
# Summary: llama3.1:8b wins 5/7 by speed+adherence; qwen3:14b wins N03 (frontmatter
# fidelity) and N04 (citation recall). qwen3:8b FAILS on N05 (thinking-budget
# consumes all tokens -> 0 bytes output).
#
# Benchmark data: .cex/runtime/benchmarks/summary.json
# Decision rationale: _docs/specs/spec_claude_vs_free_routing.md
#
# To enable paid fallback (ordered chain, NOT pool duplication):
#   router_settings:
#     fallbacks:
#       - {cex-n01: [cex-n01-free]}
#   with a paired model_list entry e.g. cex-n01-free -> ollama/qwen3:14b.

model_list:
  # --- N07 Orchestrator (fast planning, llama wins on 3-wave dispatch) ---
  - model_name: cex-n07
    litellm_params:
      model: ollama/llama3.1:8b
      api_base: http://localhost:11434

  # --- N01 Intelligence (speed-sensitive research) ---
  - model_name: cex-n01
    litellm_params:
      model: ollama/llama3.1:8b
      api_base: http://localhost:11434

  # --- N02 Marketing (copy output, no factual fidelity required) ---
  - model_name: cex-n02
    litellm_params:
      model: ollama/llama3.1:8b
      api_base: http://localhost:11434

  # --- N03 Builder (REQUIRES qwen3:14b for CEX frontmatter fidelity) ---
  # llama3.1:8b wraps frontmatter in ```yml fences; qwen3:14b produces raw `---` blocks.
  - model_name: cex-n03
    litellm_params:
      model: ollama/qwen3:14b
      api_base: http://localhost:11434

  # --- N04 Knowledge (REQUIRES qwen3:14b for citation recall) ---
  # llama3.1:8b skips citations entirely; qwen3:14b names real authors/papers
  # (e.g. Sparck-Jones 1972 for TF-IDF). Still requires human review for KCs.
  - model_name: cex-n04
    litellm_params:
      model: ollama/qwen3:14b
      api_base: http://localhost:11434

  # --- N05 Operations (qwen3:8b FAILS here, thinking-budget consumes output) ---
  - model_name: cex-n05
    litellm_params:
      model: ollama/llama3.1:8b
      api_base: http://localhost:11434

  # --- N06 Commercial (llama produces proper markdown tables) ---
  - model_name: cex-n06
    litellm_params:
      model: ollama/llama3.1:8b
      api_base: http://localhost:11434

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 120
  retry_after: 5
  allowed_fails: 2
