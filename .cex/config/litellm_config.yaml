# LiteLLM Proxy Configuration for CEX (OLLAMA-ONLY free mode)
# Simple pool: all models point to Ollama. No paid/no-key providers in pool.
#
# Free-first hybrid lesson (2026-04-15):
#   - simple-shuffle routes randomly across pool entries, NOT as fallback chain
#   - Mixing paid + no-key + local = random picks broken providers
#   - Pure Ollama pool = deterministic free mode
#
# To enable paid fallback:
#   - Set GEMINI_API_KEY (free tier) in .env
#   - Add back anthropic entries ONLY when credit > 0
#   - Use router_settings.fallbacks (ordered chain) not pool duplication
#
# Virtual keys: per-nucleus budget tracking via master_key.

model_list:
  # --- N07 Orchestrator (best local reasoning) ---
  - model_name: cex-n07
    litellm_params:
      model: ollama/qwen3:14b
      api_base: http://localhost:11434

  # --- N01 Intelligence ---
  - model_name: cex-n01
    litellm_params:
      model: ollama/qwen3:14b
      api_base: http://localhost:11434

  # --- N02 Marketing (faster model, creative) ---
  - model_name: cex-n02
    litellm_params:
      model: ollama/qwen3:8b
      api_base: http://localhost:11434

  # --- N03 Builder (deep reasoning) ---
  - model_name: cex-n03
    litellm_params:
      model: ollama/qwen3:14b
      api_base: http://localhost:11434

  # --- N04 Knowledge ---
  - model_name: cex-n04
    litellm_params:
      model: ollama/qwen3:14b
      api_base: http://localhost:11434

  # --- N05 Operations (faster for code/test) ---
  - model_name: cex-n05
    litellm_params:
      model: ollama/qwen3:8b
      api_base: http://localhost:11434

  # --- N06 Commercial ---
  - model_name: cex-n06
    litellm_params:
      model: ollama/qwen3:8b
      api_base: http://localhost:11434

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 120
  retry_after: 5
  allowed_fails: 2
