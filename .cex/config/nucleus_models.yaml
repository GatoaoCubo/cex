# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# CEX Nucleus Model Configuration
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# Each nucleus reads its CLI + model from here.
# Boot scripts and spawn_grid consume this file.
#
# CHANGE THESE to match your subscriptions/budget.
# Low-budget? Use ollama + local models everywhere.
# Premium? Use the best cloud model per domain.
#
# CLI options:  claude | gemini | codex | pi | ollama
# Model: any model string your CLI supports
#
# Decision: 2026-04-02 — /guide session, user-confirmed
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# --- N07: Orchestrator (this session — pi) ---
n07:
  cli: pi
  model: anthropic/claude-opus-4-6
  thinking: xhigh
  flags: ""
  context: 200000
  domain: orchestration
  fallback:
    cli: ollama
    model: qwen3:32b
  notes: "Maestro. Best reasoning for dispatch decisions."

# --- N01: Research & Intelligence ---
n01:
  cli: gemini
  model: gemini-2.5-pro
  flags: "--yolo"
  context: 1000000
  domain: research
  fallback:
    cli: claude
    model: claude-opus-4-0
    flags: "--dangerously-skip-permissions --permission-mode bypassPermissions --no-chrome"
  fallback_local:
    cli: ollama
    model: qwen3:32b
  notes: "1M context for large doc analysis. Gemini is king for research ingestion."

# --- N02: Marketing & Copy ---
n02:
  cli: claude
  model: claude-sonnet-4-20250514
  flags: "--dangerously-skip-permissions --no-chrome"
  context: 200000
  domain: marketing
  fallback:
    cli: gemini
    model: gemini-2.5-pro
    flags: "--yolo"
  fallback_local:
    cli: ollama
    model: qwen3:14b
  notes: "Claude leads creative writing + tone control. Sonnet = speed × quality sweet-spot."

# --- N03: Engineering & Builder ---
n03:
  cli: claude
  model: claude-opus-4-0
  flags: "--dangerously-skip-permissions --permission-mode bypassPermissions --no-chrome"
  context: 200000
  domain: engineering
  mcps: ".mcp-n03.json"
  settings: ".claude/nucleus-settings/n03.json"
  fallback:
    cli: codex
    model: o3
    flags: "--full-auto"
  fallback_local:
    cli: ollama
    model: qwen3:32b
  notes: "Most complex task. 13 ISOs + 8F pipeline. Needs deepest reasoning."

# --- N04: Knowledge & RAG ---
n04:
  cli: gemini
  model: gemini-2.5-pro
  flags: "--yolo"
  context: 1000000
  domain: knowledge
  fallback:
    cli: codex
    model: o3
    flags: "--full-auto"
  fallback_local:
    cli: ollama
    model: qwen3:14b
  notes: "CHANGED from codex/o3. 1M context lets N04 see entire knowledge library at once for taxonomy."

# --- N05: Operations & DevOps ---
# NOTE: Codex CLI + ChatGPT subscription only supports o4-mini (NOT o3).
#       o3 requires API key. With sub-only, use o4-mini or fallback to claude.
n05:
  cli: claude
  model: claude-sonnet-4-20250514
  flags: "--dangerously-skip-permissions --permission-mode bypassPermissions --no-chrome"
  context: 200000
  domain: operations
  fallback:
    cli: codex
    model: o4-mini
    flags: "--full-auto"
  fallback_local:
    cli: ollama
    model: qwen3:14b
  notes: "Codex/o3 unavailable on ChatGPT sub. Sonnet primary (excellent at code). Codex/o4-mini as fallback."

# --- N06: Commercial & Brand ---
n06:
  cli: claude
  model: claude-sonnet-4-20250514
  flags: "--dangerously-skip-permissions --permission-mode bypassPermissions --no-chrome"
  context: 200000
  domain: commercial
  mcps: ".mcp-n06.json"
  settings: ".claude/nucleus-settings/n06.json"
  fallback:
    cli: gemini
    model: gemini-2.5-pro
    flags: "--yolo"
  fallback_local:
    cli: ollama
    model: qwen3:14b
  notes: "Pricing, funnels, monetization. Sonnet handles well. Speed > depth for commercial."

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# GRID LOAD DISTRIBUTION (6 simultaneous during /grid):
#
#   Claude:  N02(sonnet) + N03(opus) + N05(sonnet) + N06(sonnet) = 4
#   Gemini:  N01 + N04                                            = 2
#   Codex:   (fallback only — o4-mini, ChatGPT sub doesn't support o3)
#   N07 runs in pi (separate session, doesn't compete)
#
# Fallback principle: always cross-provider (never fallback to same)
# Fallback local: qwen3:32b (heavy nuclei) / qwen3:14b (light nuclei)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
