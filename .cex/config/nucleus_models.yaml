# GRID LOAD DISTRIBUTION (6 simultaneous during /grid):
#
#   Claude/Opus: N01 + N02 + N03 + N04 + N05 + N06  = 6 (all opus-4-6, 1M ctx)
#   N07 runs in claude (separate session, doesn't compete)
#
# UPGRADED 2026-04-06: All nuclei -> opus-4-6 for maximum reasoning + 1M context
# Fallback principle: always cross-provider (claude -> gemini-flash -> codex -> ollama)
# Fallback local: qwen3:32b (heavy: N01,N03) / qwen3:14b (light: N02,N04,N05,N06)
#
# 2026-04-11: Added fallback_chain (ordered list). Consumed by cex_cli_resolver.py
# during `-cli auto` mode in spawn_grid.ps1. Gemini-2.5-pro replaced with
# gemini-2.5-flash after pro quota exhaustion in SELF_AUDIT_GEMINI multi-CLI test
# (pro free tier: ~few hundred RPM, 24h reset; flash: separate pool, higher ceiling).
#
# 2026-04-12: Added ollama_api config for tools that call Ollama via OpenAI SDK.
# Verified: qwen3:8b and qwen3:14b both respond at localhost:11434/v1.
# Tools: cex_auto_research.py, cex_vector_store.py, cex_evolve.py (agent mode).
# -----------------------------------------------------------------------------------

# --- Ollama API (OpenAI-compatible endpoint for tool-level access) ---
ollama_api:
  base_url: "http://localhost:11434/v1"
  embed_url: "http://localhost:11434/api/embed"
  models:
    light: "qwen3:8b"
    heavy: "qwen3:14b"
  gpu: "RTX 5070 Ti"
  notes: "Local inference, $0 cost. Use light for scoring, heavy for generation."

