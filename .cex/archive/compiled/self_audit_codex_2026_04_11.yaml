3_gaps_5_15_items: '| # | Gap | Impact | Evidence |

  |---:|---|---|---|

  | 1 | 25/71 artifacts carry `quality: null` | Blocks confidence transfer to other nuclei; no scoring telemetry. | Quality
  table §1.3. |

  | 2 | 452 knowledge_cards live outside `P01_knowledge/library/kind/` | TF-IDF index polluted with builder/example docs;
  increases pillar typos. | KC coverage §1.2 + retriever stats (20 pillar-less docs). |

  | 3 | Only one retriever config in N04; TF-IDF is still the only operational search stack | All nuclei call the same TF-IDF
  index; no vector retriever pipeline despite configs. | RAG stack §1.5 + `cex_retriever --stats`. |

  | 4 | `rag_source_knowledge` last_checked=2024-03-30; `rag_source_supabase` lacks monitoring hooks | RAG freshness claims
  invalid; ingestion not measurable. | Source frontmatter. |

  | 5 | Chunk strategy coverage limited to markdown/python/generic text | PDF, HTML tables, transcripts, and images have zero
  chunk policy, so ingestion for those docs halts. | `chunk_strategy_knowledge.md`. |

  | 6 | No `kind: fallback_chain` under N04 | Embedding provider fallbacks depend on prose; no actionable routing artifact
  to orchestrate Google↔Jina↔OpenAI. | Repo scan (fallback_chains only under N07/P02). |

  | 7 | Prompt cache artifacts missing (`prompt_cache: 0`) | Memory pillar incomplete; session caches can’t be audited or
  tuned. | P10 counts §1.6. |

  | 8 | Retriever does not map rag_sources to chunk strategies | Hard to guarantee ingestion parity; e.g., N01 rag source
  uses unknown chunker. | `rag_source_*` vs chunk strategy list. |

  | 9 | Placeholder `text` links already tripping dead-link scan | Signals documentation debt and missing lint hook. | Link
  check §1.6. |

  |10 | No golden query set or RAG eval harness | Cannot quantify retriever recall/precision; undermines Section 5b tools
  request. | Repo scan: no `kind: eval_dataset` tied to RAG. |


  No deprecated-kind references (>6 months) were found, so that specific risk is currently zero.'
