1_4_embedding_configurations_2_artifacts: '| Artifact | Providers referenced | Coverage notes |

  |---|---|---|

  | `embedding_config_knowledge.md` | Google Vertex `text-embedding-004` (primary), self-hosted `jina-embeddings-v2-base-en`
  (secondary) | Establishes default+fallback but lacks scripted fallback chain artifact tying them together. |

  | `embedding_config_supabase.md` | OpenAI `text-embedding-3-{small,large}`, `nomic-embed-text`, Cohere `embed-v3` | Pgvector
  schema describes dimension switches, but no automation to reindex or enforce model metadata. |


