deploy_instructions:
- Salve o bloco de codigo acima como `index.html`
- Substitua as imagens `picsum.photos` por fotos reais do seu pet shop
- Atualize os depoimentos com clientes reais (nome, foto, cidade)
- Configure o formulario do `#cta` para seu provedor de e-mail (Mailchimp, RD Station, etc)
- Adicione o Google Tag Manager ou GA4 antes de `</head>` para tracking
- 'Deploy:'
- 'Vercel: `vercel deploy` (instante)'
- 'Netlify: arraste o arquivo para app.netlify.com'
- 'GitHub Pages: commit em `/docs/index.html`'
