# CEX Provider Routing Configuration
# Pattern: OpenClaude SmartRouter (smart_router.py)
#
# strategy: latency | cost | balanced
# fallback: auto-retry on failure with next-best provider
#
# Override per-provider: set env vars (ANTHROPIC_API_KEY, etc.)
# Override per-nucleus: edit nucleus_routing below

strategy: balanced
fallback: true

providers:
  anthropic:
    ping_url: https://api.anthropic.com/v1/messages
    api_key_env: ANTHROPIC_API_KEY
    cost_per_1k: 0.015
    models:
      opus: claude-opus-4-6
      sonnet: claude-sonnet-4-6
      haiku: claude-haiku-4-5-20251001

  google:
    ping_url: https://generativelanguage.googleapis.com/v1/models
    api_key_env: GEMINI_API_KEY
    cost_per_1k: 0.0005
    models:
      large: gemini-2.5-pro
      small: gemini-2.0-flash

  openai:
    ping_url: https://api.openai.com/v1/models
    api_key_env: OPENAI_API_KEY
    cost_per_1k: 0.002
    models:
      large: gpt-4.1
      small: gpt-4.1-mini

  ollama:
    ping_url: http://localhost:11434/api/tags
    api_key_env: ""
    cost_per_1k: 0.0
    models:
      large: qwen3:14b
      small: qwen3:8b
      reasoning: qwen3:14b
      structured: qwen3:8b

# Nucleus → Provider mapping
# UPGRADED 2026-04-06: All nuclei → anthropic/opus (1M context, deepest reasoning)
# Each nucleus has a primary provider + fallback chain
nucleus_routing:
  N01_intelligence:
    primary: anthropic
    model_tier: opus
    fallback: [google, openai, ollama]

  N02_content:
    primary: anthropic
    model_tier: opus
    fallback: [google, ollama]

  N03_builder:
    primary: anthropic
    model_tier: opus
    fallback: [google, ollama]

  N04_knowledge:
    primary: anthropic
    model_tier: opus
    fallback: [google, ollama]

  N05_operations:
    primary: anthropic
    model_tier: opus
    fallback: [google, openai, ollama]

  N06_commercial:
    primary: anthropic
    model_tier: opus
    fallback: [google, ollama]

  N07_orchestrator:
    primary: anthropic
    model_tier: opus
    fallback: [google, openai, ollama]
