1_landing_page_copy: ''
headline: Seu pet shop no piloto automatico.
subheadline: Agendamentos, fichas de clientes e lembretes de vacina — tudo em um so lugar. Menos planilha. Mais banho-e-tosa.
benefit_1_agenda_inteligente: Chega de WhatsApp perdido. Seus clientes agendam online, recebem confirmacao automatica, e voce
  ve tudo num calendario visual. Cancelamento de ultima hora? O sistema ja oferece o horario pra lista de espera.
benefit_2_ficha_pet_completa: Raca, porte, alergias, vacinas, historico de servicos — tudo na ficha do pet. Quando o cliente
  liga perguntando "quando foi a ultima vermifugacao do Thor?", voce responde em 2 segundos. Profissionalismo que fideliza.
benefit_3_lembretes_que_vendem: Vacina vencendo? Banho mensal? O CRM manda lembrete automatico por WhatsApp. Cada lembrete
  e uma venda que volta sozinha. Sem voce levantar o dedo.
cta_primary: Teste gratis por 14 dias — sem cartao, sem contrato.
cta_secondary: Ja atende mais de 50 pets por mes? Fale com nosso time e ganhe setup gratis. ---
2_pricing_table: '| | Starter | Pro | Premium |

  |---|---------|-----|---------|

  | Preco/mes | R$ 49 | R$ 129 | R$ 299 |

  | Pets cadastrados | ate 100 | ate 500 | ilimitado |

  | Agendamento online | sim | sim | sim |

  | Lembretes WhatsApp | 50/mes | 300/mes | ilimitado |

  | Ficha pet completa | sim | sim | sim |

  | Multi-unidade | -- | ate 3 lojas | ilimitado |

  | Relatorios | basico | avancado | avancado + BI |

  | Integracoes | -- | iFood Pet, PagSeguro | todas + API |

  | Suporte | email | chat prioritario | gerente dedicado |

  | Ideal para | pet shop solo | rede pequena | franquias |'
ancora_de_preco: '> "Por menos de R$ 2 por dia, voce para de perder cliente por esquecimento."'
gatilho_de_urgencia: '> "Primeiros 100 assinantes: 3 meses pelo preco de 2." ---'
3_tagline_variations: '| # | Tagline | Angulo |

  |---|---------|--------|

  | 1 | "Seu pet shop no piloto automatico." | Automacao / tempo livre |

  | 2 | "Quem cuida dos pets merece um CRM que cuida de voce." | Empatia / reciprocidade |

  | 3 | "Menos planilha. Mais banho-e-tosa." | Dor → solucao concreta |

  | 4 | "O CRM que fala a lingua do pet shop." | Especializacao / nicho |

  | 5 | "Cada lembrete e uma venda que volta sozinha." | Revenue / resultado |'
recomendacao: 'Tagline #1 para hero da landing page (clareza + beneficio imediato). Tagline #3 para ads (contraste dor/solucao
  em poucas palavras). Tagline #5 para email marketing (resultado financeiro direto). ---'
validation_criteria: 'These elements MUST be present for the gold standard to pass:


  - LP-01: Headline exists and is under 60 characters

  - LP-02: Subheadline expands on headline (not repeats it)

  - LP-03: Exactly 3 benefit blocks, each with title + body

  - LP-04: Primary CTA uses action verb + removes friction ("gratis", "sem cartao")

  - LP-05: Pricing has exactly 3 tiers with clear differentiation

  - TG-01: Exactly 5 tagline variations

  - TG-02: Each tagline targets a different psychological angle

  - BR-01: All copy in pt-BR (matching input language)

  - BR-02: Tone is professional but warm (pet shop audience = small business owners)

  - BR-03: No English jargon without explanation'
