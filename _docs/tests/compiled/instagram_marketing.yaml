1_post_concepts_5_posts_mixed_format: ''
post_1_carousel_5_erros_que_estao_matando_seu_engajamento: 'Format: Carousel (8 slides)

  Hook slide: "Voce posta todo dia e ninguem interage? Slide 2 vai doer."

  Slides:

  1. Capa com hook (fundo escuro, texto grande)

  2. Erro 1: Postar sem CTA — "Curtiu? Comenta? Salva? Se voce nao pede, ninguem faz."

  3. Erro 2: Ignorar horarios — "Seu publico ta online as 21h e voce posta as 14h."

  4. Erro 3: Feed bonito, Stories morto — "Stories = intimidade. Sem Stories = sem conexao."

  5. Erro 4: Copiar trends sem adaptar — "A trend e o veiculo, nao o destino."

  6. Erro 5: Nunca responder DMs — "DM ignorada = venda perdida."

  7. Resumo visual com os 5 erros

  8. CTA: "Salva esse carrossel e manda pra quem precisa ouvir isso."


  Caption: "Eu ja cometi todos esses erros. O #3 me custou 6 meses de crescimento. [linha] Qual desses voce ainda comete?
  Fala nos comentarios que eu te ajudo. [linha] #marketingdigital #instagram #engajamento #dicasinstagram #socialmedia"


  Hashtags: 15 (mix de volume alto + nicho)


  ---'
post_2_reels_script_o_algoritmo_nao_te_odeia: 'Format: Reels (30-45s)

  Hook (0-3s): "O algoritmo nao te odeia. Voce que ta fazendo errado."

  Script:

  [0-3s] Hook direto na camera. Expressao seria.

  [3-8s] "Todo mundo reclama do alcance, mas ninguem olha pras metricas."

  [8-15s] "Salvar > curtir. Compartilhar > comentar. O algoritmo recompensa VALOR."

  [15-22s] "Quer mais alcance? Para de postar bonito e comeca a postar util."

  [22-28s] "Uma dica pratica: no proximo post, termina com uma pergunta ESPECIFICA."

  [28-35s] "Nao ''o que acham?'' — mas ''voce prefere A ou B? Comenta a letra.''"

  [35-40s] CTA: "Segue pra mais dicas que funcionam de verdade."

  Audio: Trending audio (instrumental) + voiceover

  Text overlay: Keywords em cada corte ("SALVAR > CURTIR", "VALOR", "PERGUNTA ESPECIFICA")

  Caption: "Nao e o algoritmo. E a estrategia. [linha] Salva esse reel e aplica no proximo post. Depois me conta o resultado.
  [linha] #reels #algoritmo #dicasinstagram #marketingdigital #crescernoinstagram"


  ---'
post_3_static_single_image_frase_de_impacto: 'Format: Static post (1080x1080) Visual: Fundo gradiente escuro (preto → azul
  marinho). Texto centralizado, sans-serif bold. Text: "Quem entrega valor nao precisa implorar atencao." Caption: "Leia de
  novo. [linha] O melhor marketing do mundo e ser tao bom que as pessoas compartilham sem voce pedir. [linha] Concorda? Comenta
  um emoji de fogo. [linha] #frases #marketing #valor #branding #motivacao" ---'
post_4_carousel_minha_rotina_de_conteudo_por_tras_das_cameras: 'Format: Carousel (6 slides) — behind the scenes / authority
  builder

  Slides:

  1. Capa: "Como eu crio 30 posts em 1 dia (sem surtar)"

  2. Passo 1: "Banco de ideias — anoto TUDO no Notes (capturas, conversas, trends)"

  3. Passo 2: "Batch day — 1 dia por semana = roteiro + gravacao + edicao"

  4. Passo 3: "Agendamento — uso ferramenta pra programar a semana toda"

  5. Passo 4: "Engajamento pos-post — 30 min respondendo TUDO"

  6. CTA: "Qual parte voce quer que eu detalhe? Comenta o numero."


  Caption: "Parece muito? Parece. Mas depois que vira rotina, leva 4 horas. [linha] O segredo nao e postar todo dia. E PREPARAR
  todo dia de uma vez. [linha] Qual passo voce ja faz? E qual voce precisa comecar? [linha] #produtividade #criacaodeconteudo
  #bastidores #rotina #contentcreator"


  ---'
post_5_reels_script_3_ctas_que_funcionam_sempre: 'Format: Reels (20-30s) — fast-paced, text-heavy

  Hook (0-2s): "3 CTAs que nunca falham. Guarda isso."

  Script:

  [0-2s] "3 CTAs que nunca falham. Guarda isso."

  [2-8s] CTA 1: "Salva pra usar depois" — (texto: funciona porque o salvar e a metrica mais valiosa)

  [8-14s] CTA 2: "Manda pra alguem que precisa" — (texto: compartilhamento = alcance organico)

  [14-20s] CTA 3: "Comenta [X] que eu te mando" — (texto: gera comentarios + abre DM)

  [20-25s] "Usa um desses no proximo post e me marca pra eu ver."

  Caption: "CTA nao e pedir. E GUIAR. [linha] Seu publico quer interagir. So precisa de um empurrao. [linha] Qual desses voce
  vai testar primeiro? [linha] #cta #calltoaction #dicasinstagram #engajamento #socialmediatips"


  ---'
2_content_calendar_1_week: '| Dia | Formato | Tema | Horario | Objetivo |

  |-----|---------|------|---------|----------|

  | Segunda | Carousel | "5 erros de engajamento" (Post 1) | 19:00 | Salvar + educar |

  | Terca | Stories (5 frames) | Bastidores: "o que eu to criando hoje" | 12:00 | Proximidade |

  | Quarta | Reels | "O algoritmo nao te odeia" (Post 2) | 20:00 | Alcance + seguir |

  | Quinta | Static | Frase de impacto (Post 3) | 18:00 | Compartilhar |

  | Sexta | Carousel | "Rotina de conteudo" (Post 4) | 19:00 | Autoridade + salvar |

  | Sabado | Reels | "3 CTAs que funcionam" (Post 5) | 11:00 | Engajamento |

  | Domingo | Stories (3 frames) | Enquete: "qual tema voce quer na semana que vem?" | 10:00 | Feedback + proximidade |'
regras_do_calendario: '- Nunca 2 Reels seguidos — alterna formatos para evitar fadiga

  - Stories diarios mesmo sem post no feed (manter presenca)

  - Horarios baseados em: publico brasileiro, segmento educacao/negocios

  - Sab/Dom = leve — menos producao, mais interacao


  ---'
3_brand_voice_guide: ''
tom_de_voz: '| Dimensao | Nivel | Descricao |

  |----------|-------|-----------|

  | Formalidade | 3/10 | Casual, como conversa com amigo esperto |

  | Autoridade | 8/10 | Sabe do que fala, mostra resultados |

  | Humor | 4/10 | Pitadas de ironia, nunca palhaco |

  | Energia | 7/10 | Motivador mas nao coach generico |

  | Empatia | 8/10 | "Eu ja passei por isso" > "voce deveria fazer X" |'
vocabulario: 'Usar:

  - "voce" (nunca "voces" — fala 1 a 1)

  - Verbos de acao: "aplica", "testa", "faz", "comeca"

  - Numeros concretos: "30 posts", "4 horas", "6 meses"

  - Perguntas diretas: "Qual desses voce ja faz?"


  Evitar:

  - Jargao em ingles sem contexto ("awareness", "branding", "leads" sozinhos)

  - Superlativos vazios ("o melhor", "incrivel", "fantastico")

  - Passiva ("foi feito", "sera lancado") — preferir ativa

  - Emojis excessivos (max 3 por caption)'
hashtag_strategy: '| Tipo | Qtd | Exemplo |

  |------|-----|---------|

  | Volume alto (100K+) | 5 | #marketingdigital #instagram #reels |

  | Volume medio (10K-100K) | 5 | #dicasinstagram #crescernoinstagram |

  | Nicho (1K-10K) | 3-5 | #criacaodeconteudo #socialmediatips |

  | Branded | 1-2 | #[BRAND_TAG] |

  | Total por post | 15-17 | Nunca mais que 20 |'
regras_de_ouro: '1. Hook em 3 segundos — se nao prendeu, perdeu

  2. CTA em todo post — sem excecao

  3. Valor antes de venda — proporcao 80/20 (valor/promo)

  4. Consistencia > perfeicao — post "bom" publicado > post "perfeito" no rascunho

  5. Responder TUDO — comentario, DM, mention = oportunidade


  ---'
validation_criteria:
- 'IG-01: Exactly 5 post concepts present'
- 'IG-02: Format mix includes at least 1 carousel, 1 reels, 1 static'
- 'IG-03: Every post has a CTA (explicit call-to-action)'
- 'IG-04: Content calendar covers 7 days with no gaps'
- 'IG-05: Brand voice guide defines tone dimensions numerically'
- 'IG-06: Hashtag strategy defined with volume tiers'
- 'IG-07: Reels scripts include timestamps and hook within 0-3s'
- 'IG-08: Captions respect Instagram 2200-char limit'
- 'IG-09: All copy in pt-BR'
- 'IG-10: No more than 20 hashtags per post'
