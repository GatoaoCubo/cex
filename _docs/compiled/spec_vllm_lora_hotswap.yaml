id: spec_vllm_lora_hotswap
kind: spec
title: vLLM LoRA Hot-Swap Architecture
version: 1.0.0
quality: null
tags:
- vllm
- lora
- inference
- wsl2
- cuda
- architecture
pillar: P08
created: 2026-04-13
density_score: 1.0
overview: 'This spec defines how CEX runs local inference with one base model and seven LoRA adapters (one per nucleus) using
  vLLM inside WSL2 with CUDA passthrough. The key insight: LoRA adapters share the base model weights, so 7 specialized nuclei
  cost only ~1% more VRAM than a single model.'
architecture: " Windows 11 (Host)\n +-------------------------------------------------------------+\n |                  \
  \                                             |\n |  CEX Nuclei (N01-N07)                                        |\n | \
  \   |                                                          |\n |    v                                              \
  \            |\n |  LiteLLM Proxy (:4000)                                       |\n |    | model=\"cex-n03\" -> route to\
  \ vLLM with LoRA              |\n |    | model=\"anthropic/opus\" -> route to Anthropic API         |\n |    |         \
  \                                                 |\n |    v                                                          |\n\
  \ |  WSL2 (Ubuntu 24.04)                                          |\n |  +-----------------------------------------------------------+|\n\
  \ |  |                                                           ||\n |  |  vLLM Server (:8000, OpenAI-compatible API) \
  \              ||\n |  |  +-------------------------------------------------------+||\n |  |  |                        \
  \                               |||\n |  |  |  Base Model (gemma-3-27b-it or qwen3-14b)             |||\n |  |  |  ~14GB\
  \ VRAM (AWQ 4-bit) or ~10GB (qwen3-14b 4-bit)   |||\n |  |  |                                                       |||\n\
  \ |  |  |  LoRA Adapter Pool:                                   |||\n |  |  |  +--------------------------------------------------+\
  \ |||\n |  |  |  | cex-n01 (research)    ~50MB  rank-64  |          | |||\n |  |  |  | cex-n02 (marketing)   ~50MB  rank-64\
  \  |          | |||\n |  |  |  | cex-n03 (builder)     ~50MB  rank-64  | HOT      | |||\n |  |  |  | cex-n04 (knowledge)\
  \   ~50MB  rank-64  | SWAP     | |||\n |  |  |  | cex-n05 (operations)  ~50MB  rank-64  | PER      | |||\n |  |  |  | cex-n06\
  \ (commercial)  ~50MB  rank-64  | REQUEST  | |||\n |  |  |  | cex-n07 (orchestrator)~50MB  rank-64  |          | |||\n |\
  \  |  |  +--------------------------------------------------+ |||\n |  |  |                                            \
  \           |||\n |  |  |  Total VRAM: base(14GB) + lora_pool(~350MB) = ~14.3GB|||\n |  |  +-------------------------------------------------------+||\n\
  \ |  |                                                           ||\n |  |  NVIDIA CUDA (passthrough from Windows driver)\
  \            ||\n |  +-----------------------------------------------------------+|\n |                                \
  \                               |\n |  RTX 5070 Ti (16GB VRAM, Blackwell SM_120)                   |\n +-------------------------------------------------------------+"
how_lora_hot_swap_works: ''
the_problem: Without LoRA, running 7 specialized models requires 7x VRAM (7 * 14GB = 98GB). Ollama can swap models but must
  unload/reload the entire model per switch (~10-30 seconds cold swap, serial only).
the_solution: "LoRA (Low-Rank Adaptation) adds small adapter matrices on top of frozen base\nweights. vLLM loads ALL adapters\
  \ into VRAM simultaneously alongside the base\nmodel. Per-request, the adapter is selected by the `model` parameter:\n\n\
  POST /v1/chat/completions\n{\n  \"model\": \"cex-n03\",     <-- selects LoRA adapter for N03\n  \"messages\": [...]\n}"
request_flow: "  Nucleus N03 sends request\n        |\n        v\n  LiteLLM (:4000)\n  - Matches model=\"cex-n03\" in litellm_config.yaml\n\
  \  - Routes to: openai/cex-n03 at http://localhost:8000\n        |\n        v\n  vLLM (:8000)\n  - Receives model=\"cex-n03\"\
  \n  - Looks up LoRA module: cex-n03 -> /mnt/c/.../cex-n03-qlora/\n  - Runs inference: base_model_weights + cex-n03_lora_weights\n\
  \  - Returns completion\n        |\n        v\n  Nucleus N03 receives response"
concurrency_the_key_advantage: "vLLM uses continuous batching (industry: iteration-level scheduling).\nMultiple requests from\
  \ different nuclei are batched in a single forward pass:\n\n  Time -->\n  \n  Ollama (serial):\n  |==N01==|==N03==|==N05==|==N02==|\
  \  (4 requests = 4x latency)\n  \n  vLLM (batched):\n  |==N01+N03+N05+N02==|             (4 requests = ~1.2x latency)\n\n\
  With `--max-num-seqs 6`, vLLM processes up to 6 nucleus requests simultaneously.\nEach request can use a different LoRA\
  \ adapter. The base model weights are shared."
vram_budget: ''
rtx_5070_ti_16gb: '| Component | VRAM | Notes |

  |-----------|------|-------|

  | Base model (gemma-3-27b AWQ 4-bit) | ~14.0 GB | Quantized weights |

  | 7 LoRA adapters (rank-64 each) | ~0.35 GB | 7 * ~50MB |

  | KV cache (6 concurrent seqs) | ~1.0 GB | Depends on max_model_len |

  | CUDA overhead | ~0.3 GB | Driver, context |

  | Total | ~15.65 GB | Fits in 16GB |'
fallback_qwen3_14b_more_headroom: '| Component | VRAM | Notes |

  |-----------|------|-------|

  | Base model (qwen3-14b AWQ 4-bit) | ~8.0 GB | Smaller model |

  | 7 LoRA adapters (rank-64 each) | ~0.25 GB | Smaller layers |

  | KV cache (6 concurrent seqs) | ~1.5 GB | More room for longer context |

  | CUDA overhead | ~0.3 GB | Driver, context |

  | Total | ~10.05 GB | 6GB headroom |'
tuning_gpu_memory_utilization: '| Setting | Behavior |

  |---------|----------|

  | 0.90 (default) | Uses 14.4GB of 16GB. Safe for gemma-3-27b. |

  | 0.85 | Uses 13.6GB. Safer, less KV cache. |

  | 0.95 | Uses 15.2GB. Maximum throughput, risk of OOM on long seqs. |'
lora_adapter_training: ''
training_stack: "Dataset:       _data/ft/ft_n0X.jsonl (per-nucleus training data)\nFramework:     Unsloth (4-bit QLoRA, 2x\
  \ faster than HF PEFT)\nBase model:    google/gemma-3-27b-it (or Qwen/Qwen3-14B)\nOutput:        _data/ft/adapters/cex-n0X-qlora/\n\
  \  |-- adapter_config.json\n  |-- adapter_model.safetensors"
training_parameters_recommended: '| Parameter | Value | Why |

  |-----------|-------|-----|

  | LoRA rank | 64 | Enough capacity for domain specialization |

  | LoRA alpha | 128 | 2x rank (standard ratio) |

  | Target modules | q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj | Full attention + FFN |

  | Learning rate | 2e-4 | Standard for QLoRA |

  | Epochs | 3-5 | Per-nucleus dataset is small (~500 examples) |

  | Max seq len | 4096 | Covers most CEX artifacts |

  | Quantization | 4-bit NF4 | Fits training on 16GB |'
adapter_directory_structure: "_data/ft/adapters/\n  cex-n01-qlora/\n    adapter_config.json        # LoRA config (rank, alpha,\
  \ target_modules)\n    adapter_model.safetensors  # Trained weights (~50MB)\n  cex-n02-qlora/\n    ...\n  cex-n03-qlora/\n\
  \    ...\n  (one directory per nucleus)"
performance_comparison: ''
ollama_current_vs_vllm_target: '| Dimension | Ollama | vLLM |

  |-----------|--------|------|

  | Concurrency | 1 (serial) | 6 (batched) |

  | Model switching | 10-30s cold swap | 0ms (LoRA hot-swap) |

  | Throughput (tok/s) | ~30-40 | ~120-200 (batched) |

  | API compatibility | OpenAI-like | Full OpenAI |

  | LoRA support | Modelfile ADAPTER | Native --enable-lora |

  | Memory efficiency | 1 model at a time | 1 base + N adapters |

  | Platform | Native Windows | WSL2 (CUDA passthrough) |

  | Continuous batching | No | Yes |

  | PagedAttention | No | Yes (memory-efficient KV cache) |

  | Speculative decoding | No | Yes (future) |'
latency_estimates_rtx_5070_ti: '| Scenario | Ollama | vLLM |

  |----------|--------|------|

  | 1 request, 500 tokens | ~12s | ~8s |

  | 6 concurrent, 500 tokens each | ~72s (serial) | ~15s (batched) |

  | Model switch (N01 -> N03) | ~15s | 0ms |

  | Full grid (6 nuclei) | ~5min | ~30s |'
litellm_integration: ''
litellm_config_yaml_additions: "# vLLM local backend (add after existing entries)\nmodel_list:\n  # --- vLLM base model (no\
  \ LoRA) ---\n  - model_name: cex-local-base\n    litellm_params:\n      model: openai/base\n      api_base: http://localhost:8000/v1\n\
  \      api_key: dummy  # vLLM does not require auth\n\n  # --- vLLM with per-nucleus LoRA ---\n  - model_name: cex-n01-local\n\
  \    litellm_params:\n      model: openai/cex-n01\n      api_base: http://localhost:8000/v1\n      api_key: dummy\n\n  -\
  \ model_name: cex-n03-local\n    litellm_params:\n      model: openai/cex-n03\n      api_base: http://localhost:8000/v1\n\
  \      api_key: dummy\n\n  # ... (one entry per nucleus with trained LoRA)"
fallback_chain_updated: "cex-n03:\n  1. anthropic/claude-opus-4-6      (cloud, best quality)\n  2. gemini/gemini-2.5-flash\
  \         (cloud, fast fallback)\n  3. openai/cex-n03 @ localhost:8000  (local, vLLM + LoRA)\n  4. ollama/qwen3:14b    \
  \             (local, no LoRA)\n\nThe vLLM entry slots in as a local fallback: better than raw Ollama (batched\n+ LoRA),\
  \ cheaper than cloud (zero cost), but lower quality than Opus/Sonnet."
deployment_topology: ''
development_single_machine: "  Windows 11 (RTX 5070 Ti 16GB)\n  +-- LiteLLM (:4000)  -- routes all traffic\n  +-- vLLM/WSL2\
  \ (:8000) -- local inference\n  +-- Ollama (:11434)   -- fallback / other models\n  +-- Claude Code       -- N07 orchestrator"
future_multi_gpu_remote: "Windows 11 (orchestrator)            Linux Server (inference)\n  +-- LiteLLM (:4000) ---- SSH ----->\
  \ +-- vLLM (:8000)\n  +-- Claude Code                      +-- 2x RTX 4090 (48GB total)\n                              \
  \         +-- tensor parallel across GPUs\n\nvLLM supports `--tensor-parallel-size N` for multi-GPU inference.\nThe API\
  \ remains identical; only the base URL in litellm_config changes."
operational_procedures: ''
start_server: '# Default (gemma-3-27b, port 8000, LoRA enabled)

  powershell -File boot/vllm_server.ps1


  # Qwen3 fallback (smaller, no HF token needed)

  powershell -File boot/vllm_server.ps1 -Model "Qwen/Qwen3-14B" -MaxModelLen 32768


  # No LoRA (base model only)

  powershell -File boot/vllm_server.ps1 -NoLoRA'
health_check: "# List served models\ncurl http://localhost:8000/v1/models\n\n# Test base model\ncurl http://localhost:8000/v1/chat/completions\
  \ \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"model\":\"base\",\"messages\":[{\"role\":\"user\",\"content\"\
  :\"hello\"}],\"max_tokens\":50}'\n\n# Test LoRA adapter\ncurl http://localhost:8000/v1/chat/completions \\\n  -H \"Content-Type:\
  \ application/json\" \\\n  -d '{\"model\":\"cex-n03\",\"messages\":[{\"role\":\"user\",\"content\":\"hello\"}],\"max_tokens\"\
  :50}'"
monitor_gpu: '# From Windows (works for both host and WSL processes)

  nvidia-smi


  # Continuous monitoring

  nvidia-smi -l 5'
stop_server: Ctrl+C in the vllm_server.ps1 terminal (sends SIGTERM to vLLM inside WSL)
known_limitations: '| Limitation | Impact | Workaround |

  |------------|--------|------------|

  | WSL2 overhead | ~5-10% latency vs native Linux | Negligible for LLM inference |

  | 16GB VRAM ceiling | gemma-3-27b barely fits | Use Qwen3-14B or quantize aggressively |

  | LoRA rank limit | rank-64 max at 16GB | Sufficient for domain specialization |

  | No multi-GPU | Single GPU only | Future: remote vLLM on multi-GPU server |

  | First load slow | Model download + load ~5min | Cached after first run |

  | Blackwell SM_120 | vLLM/PyTorch CUDA support may lag | Use CUDA 12.8+, latest vLLM nightly |'
dependencies: '| Component | Version | Source |

  |-----------|---------|--------|

  | WSL2 | Latest | `wsl --install` |

  | Ubuntu | 24.04 LTS | WSL distribution |

  | CUDA Toolkit | 12.8 | NVIDIA apt repo (inside WSL) |

  | NVIDIA Driver | 560+ | nvidia.com (Windows only) |

  | Python | 3.12 | deadsnakes PPA |

  | vLLM | latest | pip install vllm |

  | PyTorch | 2.5+ | vLLM dependency |

  | LiteLLM | latest | pip install litellm (Windows) |'
