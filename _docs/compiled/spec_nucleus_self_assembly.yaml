tldr: Each nucleus (N01-N06) auto-constructs its typed artifact portfolio using sin-lens-driven portfolio archetypes, kind
  synergy patterns, and a self-assembly loop -- turning 5-word tasks into outperforming execution.
density_score: 0.96
the_problem: "CEX has 258 builders, 257 kinds, and 8 nuclei -- but each nucleus is a partial portfolio.\n\nCurrent gap matrix\
  \ (artifacts per pillar per nucleus, empirically measured):\n\n       P01  P02  P03  P04  P05  P06  P07  P08  P09  P10 \
  \ P11  P12\nN01:    60    4    4    5   31    0   21    3    6    9    2    5   total=150\nN02:    23    2    8    4   26\
  \    0   13    3    7    6    2   13   total=107\nN03:    16    4    5    3   15    0   18    8    7    6    4   12   total=98\n\
  N04:    17    5    4    5   26    0   13    7    6    8    3    6   total=100\nN05:    18    5    5    4   30    0    9\
  \    5    7    8    5    4   total=100\nN06:    20    4    7    4   33    0   13    7    6    7    2    5   total=108\n\n\
  Three structural gaps visible immediately:\n\n1. P06 = 0 for all 6 nuclei -- No schema/validation/contract artifacts anywhere.\n\
  \   P06 has 8 kinds: `input_schema`, `validation_schema`, `type_def`, `interface`,\n   `api_reference`, `enum_def`, `edit_format`,\
  \ `validator`. Zero coverage.\n\n2. P11 = 2-5 across all nuclei -- Feedback/quality loop is anemic.\n   P11 has 26 kinds.\
  \ Average coverage: 3.0/26. The feedback layer that makes CEX\n   self-improving is barely wired.\n\n3. P01-heavy imbalance\
  \ -- knowledge_card dominates. N01 alone has 60 KCs.\n   But most nuclei lack the TOOLING (P04), SCHEMA (P06), and MEMORY\
  \ (P10)\n   to ACT on that knowledge. Knowledge artifacts without tooling, schema, or memory is inert data.\n\nThe deeper\
  \ problem: artifacts were built AD HOC, not strategically.\nA nucleus is a brain, not a library. The difference is COMPOSITION\
  \ -- kinds that\nreinforce each other via synergy patterns, not isolated documents.\n\n---"
the_vision_nucleus_as_typed_artifact_portfolio: 'Each nucleus is a typed artifact portfolio -- a curated set of kinds selected
  for their synergistic value within that nucleus''s sin lens and domain. The vocabulary this spec uses is ubiquitous language
  (Eric Evans, DDD 2003): a canonical controlled vocabulary shared across all nucleus boundaries, preventing semantic drift
  and taxonomic invention. Every term maps to an industry standard. This is the LLM-to-LLM interoperability layer that allows
  CEX to grow without accumulating technical debt from invented metaphors.'
canonical_vocabulary: '| Term | Definition |

  |------|-----------|

  | nucleus composition | the complete set of typed artifacts defining a nucleus''s capability surface |

  | typed artifact (kind) | atomic unit of knowledge/capability, typed by the 257-kind taxonomy |

  | kind synergy pattern | 2-4 kinds that together produce emergent capability not achievable by any alone |

  | portfolio assembly | selecting the right kinds per pillar per nucleus (or per task -- see Dynamic mode) |

  | self-assembly loop | gap scan -> rank by combo completeness -> dispatch -> score -> loop |

  | archetype mold | N00_genesis canonical pillar structure; each nucleus instantiates it |

  | controlled vocabulary | domain-specific terms planted in P01 KCs so nucleus auto-uses canonical language |'
two_modes_of_portfolio_assembly: "MODE A: Per-Nucleus (static)\n  Portfolio = sin-lens-driven deck archetype\n  Selected once,\
  \ stable across sessions\n  Example: N06 always has revenue combo + brand combo\n\nMODE B: Per-Task (dynamic)\n  Portfolio\
  \ = context-aware artifact selection\n  Changes based on what the nucleus is doing RIGHT NOW\n  Example: N06 building a\
  \ SaaS launch -> loads revenue + brand + campaign combos\n           N06 auditing competitor pricing -> loads intel + schema\
  \ + monetization combos\n\nThe self-assembly loop builds MODE A (the base deck).\nThe Dynamic Portfolio (MODE B) is an emergent\
  \ capability once MODE A is complete.\n\n---"
the_archetype_mold_n00_genesis: 'N00_genesis/P{01-12}_* is the canonical structure every nucleus mirrors.

  When a nucleus self-assembles, it reads N00 as the SOURCE OF TRUTH for:

  - What kinds belong to each pillar

  - What the schema/frontmatter contract looks like

  - What quality targets apply

  - What combos are architecturally valid


  Each nucleus then INSTANTIATES the mold with their sin-lens flavor:

  N00 (archetype):   knowledge_card [generic]

  N01 (instance):    knowledge_card [competitive intelligence flavor]

  N06 (instance):    knowledge_card [commercial/revenue flavor]


  This is convention-over-configuration hierarchy in practice.


  ---'
deck_archetypes_per_nucleus: ''
n01_intelligence_analytical_envy: "Sin Lens: insatiable drive to know MORE than any competitor. Envy of incomplete data.\n\
  Domain: research, competitive intelligence, market analysis, benchmarking\n\nPillar Priority:\n| Pillar | Role | Target\
  \ | Current | Delta |\n|--------|------|--------|---------|-------|\n| P01 Knowledge | PRIMARY | 65+ | 60 | +5 |\n| P07\
  \ Evaluation | PRIMARY | 25+ | 21 | +4 |\n| P04 Tools | SUPPORT | 12+ | 5 | +7 |\n| P10 Memory | SUPPORT | 12+ | 9 | +3\
  \ |\n| P03 Prompt | SUPPORT | 10+ | 4 | +6 |\n| P06 Schema | GROW | 5+ | 0 | +5 |\n| P11 Feedback | GROW | 8+ | 2 | +6 |\n\
  | P05/P08/P09/P12 | MINIMAL | 3+ each | OK | - |\n\nKind Synergy Combos (N01):\n\nCOMBO A -- Intelligence Pipeline:\n  research_pipeline\
  \ + knowledge_card + competitive_matrix + benchmark\n  Why: end-to-end research: discover -> synthesize -> compare -> measure\n\
  \  Trigger: any /research or market analysis task\n\nCOMBO B -- RAG Stack:\n  rag_source + embedding_config + retriever_config\
  \ + chunk_strategy + vector_store\n  Why: knowledge retrieval infrastructure -- N01 needs to FIND, not just KNOW\n  Trigger:\
  \ any \"search my knowledge base\" or corpus query task\n\nCOMBO C -- Eval Intelligence:\n  eval_framework + scoring_rubric\
  \ + llm_judge + bias_audit + benchmark_suite\n  Why: N01 with Analytical Envy MUST score everything, including itself\n\
  \  Trigger: any quality assessment, model comparison, or self-audit task\n\nCOMBO D -- Schema of Knowledge (P06 gap fill):\n\
  \  input_schema [for research queries] + api_reference [for data APIs] + type_def [for intel types]\n  Why: structured intelligence\
  \ contracts -- raw data becomes typed knowledge\n  Trigger: any task that produces structured intel outputs\n\nCOMBO E --\
  \ Persistent Memory:\n  entity_memory + knowledge_index + memory_architecture + learning_record\n  Why: Envy demands retention\
  \ -- every discovery must persist and compound\n  Trigger: after any research session that produces novel insights\n\nSeed\
  \ Words to Plant (P01 KCs):\nintent_resolution, query_rewriting, retrieval_augmented_generation,\neval_harness, ground_truth,\
  \ precision_recall, NDCG, knowledge_graph,\ncitation_network, competitive_moat, market_sizing, TAM_SAM_SOM,\nbenchmark_suite,\
  \ bias_detection, hallucination_rate\n\n---"
