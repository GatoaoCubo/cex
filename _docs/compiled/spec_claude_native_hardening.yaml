n05_fix_grid_ux_boot_script_hardening: "1. MoveWindow timing fix: `_spawn/spawn_grid.ps1` line 110 — 3s sleep\n   may not\
  \ be enough for PS1 boot to render window. Increase to 5s or add\n   retry loop that polls `MainWindowHandle -ne 0`.\n2.\
  \ Integrate `--name` flag: All boot scripts (boot/n0X.ps1 + .cmd) should\n   pass `--name \"CEX-N0X-MISSION\"` so sessions\
  \ are trackable in `/resume`.\n3. Integrate `--fork-session`: overnight.ps1 and overnight_infinite.cmd\n   should use `--continue\
  \ --fork-session` for safe context resumption.\n4. PID file format: spawn_grid.ps1 line 114 writes `{pid} {nucleus}` but\n\
  \   dispatch.sh stop expects `{pid} {nucleus} {cli} {session_id} {timestamp}`.\n   Fix format to match expected schema.\n\
  5. Validate: Run `bash _spawn/dispatch.sh stop --dry-run` after fixes.\n6. Self-audit: What native Claude Code tools/features\
  \ should N05 have\n   in its MCP config or settings that it currently lacks? Check:\n   - GitHub MCP server (for CI/CD integration)\n\
  \   - Any missing --flags that improve operations"
n03_clean_pi_from_builders_shared_isos: "1. Spawn configs: Fix `N03_builder/P12_orchestration/spawn_config_builder.md`\n   and\
  \ `N04_knowledge/P12_orchestration/spawn_config_knowledge.md` — replace\n   `pi --model` with `claude --model`.\n2. Shared ISOs:\
  \ Scan `archetypes/builders/_shared/` for PI references.\n3. Agent definitions: Scan `.claude/agents/` for any PI-specific\
  \ patterns.\n4. Self-audit: What native Claude Code capabilities should builders use\n   that they currently don't? Check\
  \ if `.claude/agents/*.md` reference the\n   right sub-agent tools and capabilities.\n5. Compile all changed files."
