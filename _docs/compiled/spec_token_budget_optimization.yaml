9_quality_gates: ''
minimum_context_for_quality_floors: '| Quality floor | Minimum context (KB) | Required components | Tier |

  |---------------|---------------------|---------------------|------|

  | 7.5 (draft) | 30 KB | ISOs (partial) | T4 |

  | 8.0 (publishable) | 55 KB | ISOs + shared skills | T1 |

  | 8.5 (good) | 100 KB | ISOs + shared + 10 KCs + brand | T2 (low) |

  | 9.0 (excellent) | 150 KB | ISOs + shared + 20-30 KCs + memory + brand | T2 (full) |

  | 9.0+ (peak) | 250 KB+ | Full T3 load | T3 |'
gate_enforcement: "At F7 GOVERN:\n  IF quality < 8.0 AND tier < T2:\n    RECOMMEND: re-run at T2 before retry\n  IF quality\
  \ < 8.5 AND tier < T3 AND retry_count >= 1:\n    ESCALATE: bump to T3 for second retry\n  IF quality >= 9.0:\n    LOG: tier\
  \ was sufficient, no escalation needed"
tier_escalation_protocol: "F7 fail (quality < floor)\n  -> retry 1: same tier, different approach (F4 re-plan)\n  -> retry\
  \ 2: bump tier +1, expand KC set\n  -> retry 3: T3 + full KC load (last resort)\n  -> fail: flag for human review"
