router_decision_matrix: "`cex_router.py` exists with health checks + fallback chains.\nExtend it with task-complexity routing:\n\
  \n| Task complexity | Signal | Route to |\n|----------------|--------|----------|\n| Complex (new kind, architecture, research)\
  \ | unknown kind, no template match, >3 sections | T1 Opus |\n| Standard (ISO from template, KC from schema) | template\
  \ match >60%, known kind | T2 Sonnet |\n| Mechanical (rename, format, compile, validate) | no generation needed, find-replace\
  \ | T3 Haiku |\n\n# In cex_router.py\ndef route_task(self, task: dict) -> str:\n    if task.get(\"template_match\", 0) <\
  \ 0.6:\n        return \"T1\"  # needs reasoning\n    if task.get(\"is_mechanical\", False):\n        return \"T3\"  # cheap\
  \ model\n    return \"T2\"  # standard execution"
