architecture: "overnight_infinite.cmd (loop forever)\n  |\n  +-- N07 (claude --continue, resumes session state)\n  |     |\n\
  \  |     +-- WORK + DISPATCH (non-blocking interleaved)\n  |     |     |\n  |     |     +-- N01 + Agent tool sub-agents\
  \ (research)\n  |     |     +-- N02 + Agent tool sub-agents (marketing)\n  |     |     +-- N03 + Agent tool sub-agents (build)\n\
  \  |     |     +-- N04 + Agent tool sub-agents (knowledge)\n  |     |     +-- N05 + Agent tool sub-agents (code)\n  |  \
  \   |     +-- N06 + Agent tool sub-agents (commercial)\n  |     |     |\n  |     |     +-- = 6 nuclei x (1 + 4 sub-agents)\
  \ = 30 LLM streams\n  |     |\n  |     +-- When context approaching limit:\n  |           write state to disk, exit cleanly\n\
  \  |\n  +-- SLEEP 10s\n  +-- RESTART N07 (claude --continue, fresh context via auto-compaction)"
5_blockers_and_solutions: ''
blocker_1_n07_context_exhaustion_dies_at_1m_tokens: "Problem: N07 fills its 1M context and can't continue orchestrating.\n\
  \nSolutions found:\n\n| Solution | How | Status |\n|----------|-----|--------|\n| claude --continue | Claude Code natively\
  \ supports `--continue` flag to resume previous session | Native in Claude Code |\n| claude --fork-session | Creates a new\
  \ session forked from previous state (prevents corruption) | Native in Claude Code |\n| Auto-compaction | Claude Code automatically\
  \ compresses conversation when approaching context limit | Native in Claude Code |\n| mission_state.yaml | CEX-specific\
  \ checkpoint file on disk with task queue + progress | NEEDS BUILD |\n\nRecommended approach: Combine `mission_state.yaml`\
  \ (CEX state) with Claude Code's `--continue` or `--fork-session` (context transfer).\n\n# .cex/runtime/mission_state.yaml\n\
  mission: full_bootstrap\nstarted: 2026-04-07T20:00:00\nwave: 3\ntasks_total: 2742\ntasks_completed: 847\ntasks_in_progress:\n\
  \  n01: {task: \"research_kc_batch_12\", started: \"2026-04-07T22:14:00\"}\n  n03: {task: \"build_isos_wave3\", started:\
  \ \"2026-04-07T22:14:30\"}\nnext_tasks:\n  - {nucleus: n03, kind: prompt_template, count: 9}\n  - {nucleus: n04, kind: knowledge_card,\
  \ count: 15}\nquality_gate:\n  passed: 830\n  failed: 17\n  retried: 12\ntokens_used: 12400000\n\nImplementation: N05 builds\
  \ `cex_mission_state.py` (read/write/update checkpoint).\nN07 reads on boot, writes before context exhaustion.\n\nComparison:\
  \ Claude Code vs alternatives for session continuity:\n\n| Feature | Claude Code | Gemini CLI | Codex CLI |\n|---------|------------|------------|-----------|\n\
  | Session resume | `--continue` | Not supported | Not supported |\n| Safe fork | `--fork-session` | N/A | N/A |\n| Auto-compaction\
  \ | Built-in | N/A | N/A |\n| Context window | 1M tokens | 1M tokens | 192K tokens |"
blocker_2_sub_agents_inside_each_nucleus_6x_30x: "Problem: Each nucleus runs 1 LLM instance. Could run 1 + 4 sub-agents.\n\
  \nSolutions found:\n\n| Solution | How | Status |\n|----------|-----|--------|\n| Claude Code Agent tool | Native sub-agent\
  \ spawning built into Claude Code. Supports parallel execution, typed agent specialization, automatic context isolation\
  \ | Native in Claude Code |\n| Agent .md files | YAML frontmatter defines agent: name, tools, model. Auto-discovered from\
  \ `.claude/agents/` | Native convention |\n| --agents JSON | Inline agent definitions via CLI flag for runtime agent creation\
  \ | Native in Claude Code |\n| subagent_type parameter | Agent tool accepts `subagent_type` to route to specialized agent\
  \ definitions | Native in Claude Code |\n\nRecommended approach: Use Claude Code Agent tool directly -- no extensions needed.\n\
  \n.claude/agents/                      # Project-level agents for CEX\n  knowledge-card-builder.md          # Sub-agent:\
  \ builds 1 KC\n  agent-builder.md                   # Sub-agent: builds 1 agent artifact\n  prompt-template-builder.md \
  \        # Sub-agent: builds 1 prompt template\n  ...                                # 125 builder sub-agents total\n\n\
  Each nucleus uses the Agent tool natively. When N03 gets \"build 13 ISOs for citation-builder\", it spawns:\n- 4+ parallel\
  \ sub-agents via Agent tool, each building a subset\n- Total time: fraction of solo execution\n\nConstraint: Agent tool\
  \ supports concurrent parallel sub-agents.\nWith 6 nuclei x 4+ concurrent = 24+ parallel LLM streams.\n\nComparison: Sub-agent\
  \ approaches:\n\n| Approach | Isolation | Setup | Concurrency | Status |\n|----------|-----------|-------|-------------|--------|\n\
  | Claude Code Agent tool | Full (separate context) | Zero config | Unlimited parallel calls | Native |\n| LangGraph sub-graphs\
  \ | Shared process | Python setup | Async coroutines | External lib |\n| CrewAI agents | Shared process | YAML config |\
  \ Thread pool | External lib |"
blocker_3_git_conflicts_6_nuclei_writing_same_repo: 'Problem: Multiple nuclei committing simultaneously causes merge conflicts

  on shared files (kinds_meta.json, _schema.yaml).


  Solutions found:


  | Solution | How | Pros | Cons |

  |----------|-----|------|------|

  | Branch-per-nucleus | Each nucleus works in `n0X/task` branch, N07 merges | Clean isolation | Merge overhead, N07 must
  resolve |

  | Lock files | `.cex/runtime/locks/{file}.lock` with PID | Simple | Deadlocks if nucleus crashes |

  | Append-only directories | Each nucleus writes only to its own `N0X_*/` dir | Zero conflicts | Shared files (kinds_meta)
  still conflict |

  | N07 consolidation queue | Nuclei write to staging dir, N07 applies to main | Zero conflicts | Delay between produce and
  commit |

  | Proposal pattern | Nuclei write `.proposal.md` files, N07 merges post-wave | Zero conflicts | Deferred application |


  Recommended approach: Hybrid -- append-only for artifacts + proposal pattern for shared resources.


  Current reality: nuclei ALREADY mostly write to their own directories.

  The only shared files that conflict:

  - `.cex/kinds_meta.json` -- N07 should be sole writer (nuclei propose, N07 applies)

  - `P{xx}/_schema.yaml` -- same, N07 applies

  - `archetypes/builders/` -- conflict-free if each nucleus builds different kinds


  Implementation:

  1. `_tools/cex_lock.py` -- atomic file locking (PID-based, auto-expire 5min) -- EXISTS

  2. Rule: nuclei NEVER edit kinds_meta.json or _schema.yaml directly

  3. Rule: nuclei write proposals to `.cex/runtime/proposals/{nucleus}_{file}.yaml`

  4. N07 reads proposals, applies to shared files, commits

  5. See `.claude/rules/shared-file-proposal.md` for full protocol'
blocker_4_continuous_batching_no_wave_gaps: "Problem: Current model is wave-based -- dispatch all, wait all, consolidate,\
  \ next wave.\nIdle time between waves wastes throughput.\n\nSolutions found:\n\n| Solution | How | Status |\n|----------|-----|--------|\n\
  | Event-driven dispatcher | N07 checks git log every ~30s, dispatches next task immediately when a nucleus finishes | PATTERN\
  \ EXISTS (non-blocking lifecycle rule) |\n| Task queue file | `.cex/runtime/task_queue.yaml` with prioritized tasks, N07\
  \ pops and dispatches | NEEDS BUILD |\n| cex_mission_runner.py | Already supports multi-wave with signal polling | EXISTS\
  \ but wave-based |\n\nRecommended approach: Enhance `cex_mission_runner.py` with continuous mode.\n\n# Current (wave-based):\n\
  dispatch_wave(nuclei) -> wait_all() -> consolidate() -> next_wave()\n\n# Target (continuous):\nwhile tasks_remain():\n \
  \   for nucleus in idle_nuclei():\n        task = pop_next_task(nucleus.domain)\n        dispatch(nucleus, task)\n    sleep(30)\n\
  \    check_completions()  # git log + signals\n    consolidate_completed()\n\nImplementation: N05 adds `--continuous` flag\
  \ to `cex_mission_runner.py`."
blocker_5_infinite_runtime_overnight_infinite_cmd: "Problem: N07 eventually exhausts context or crashes. Need auto-restart.\n\
  \nSolutions found:\n\n| Solution | How | Status |\n|----------|-----|--------|\n| CMD loop | `@echo off` + `:loop` + `goto\
  \ loop` with claude inside | PATTERN EXISTS (overnight_h1.cmd) |\n| claude --continue | Resume previous session with context\
  \ | Native in Claude Code |\n| claude --fork-session | Fork session to prevent state corruption on resume | Native in Claude\
  \ Code |\n| Auto-compaction | Claude Code compresses conversation automatically | Native in Claude Code |\n| mission_state.yaml\
  \ | State file survives restart | NEEDS BUILD |\n\nRecommended approach: CMD loop + mission_state.yaml + claude --continue.\n\
  \n@echo off\ntitle CEX INFINITE BOOTSTRAP\n:loop\necho [%time%] Starting N07 session...\n\nclaude --model opus-4-6 ^\n \
  \  --append-system-prompt \"N07_admin/agent_card_n07.md\" ^\n   --append-system-prompt \".cex/config/context_self_select.md\"\
  \ ^\n   -p \"Read .cex/runtime/mission_state.yaml. Continue the mission from where it left off. When context is 80%%%% full,\
  \ write state and exit with message EXIT_CHECKPOINT.\"\n\necho [%time%] N07 exited. Restarting in 10s...\ntimeout /t 10\
  \ /nobreak\ngoto loop\n\nKey: N07 must write `mission_state.yaml` BEFORE exiting. The next instance reads it and continues\
  \ seamlessly.\n\nComparison: Restart strategies:\n\n| Strategy | Context preserved | State preserved | Risk |\n|----------|------------------|-----------------|------|\n\
  | `--continue` (same session) | Yes (compacted) | Yes | Compaction loss |\n| `--fork-session` (new from old) | Partial (forked)\
  \ | Yes (if state file written) | Fork divergence |\n| Fresh start + state file | No | Yes (from disk) | Cold start overhead\
  \ |\n| Recommended: state file + --continue | Yes | Yes | Minimal |"
