id: spec_infinite_bootstrap_loop
kind: context_doc
title: 'CEX Peak Architecture: Infinite Bootstrap Loop'
version: 1.0.0
quality: null
created: 2026-04-07
purpose: Full spec for autonomous infinite self-building loop with max throughput
density_score: 1.0
vision: CEX builds itself from zero. N07 orchestrates continuously, 6 nuclei work in parallel (each with sub-agents), artifacts
  flow through 8F, quality gates filter, and the flywheel never stops. N07 never idles.
