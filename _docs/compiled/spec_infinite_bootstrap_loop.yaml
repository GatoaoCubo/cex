the_3_tier_architecture_applied_to_cex: "N07 (Opus — needs deepest reasoning for orchestration)\n  |\n  +-- N03 Engineering\
  \ (Opus — complex 8F pipeline, 13 ISOs)\n  |     +-- sub: builder-iso (Sonnet — standard ISO generation)\n  |     +-- sub:\
  \ builder-iso (Sonnet)\n  |     +-- sub: formatter (Haiku — frontmatter fixes)\n  |     +-- sub: compiler (Gemini Flash\
  \ — cex_compile.py runner)\n  |\n  +-- N01 Research (Opus — deep analysis, 1M context for papers)\n  |     +-- sub: scout\
  \ (Haiku — fast web search recon)\n  |     +-- sub: scout (Haiku)\n  |     +-- sub: kc-writer (Sonnet — structured KC from\
  \ research)\n  |     +-- sub: kc-writer (Sonnet)\n  |\n  +-- N04 Knowledge (Sonnet — standard indexing, no deep reasoning)\n\
  \  |     +-- sub: kc-writer (Haiku — batch KC generation)\n  |     +-- sub: kc-writer (Haiku)\n  |     +-- sub: formatter\
  \ (Gemini Flash — compile + validate)\n  |     +-- sub: indexer (Haiku — cex_index.py runner)\n  |\n  +-- N05 Operations\
  \ (Opus — code requires precision)\n  |     +-- sub: test-runner (Haiku — run tests, report results)\n  |     +-- sub: linter\
  \ (Gemini Flash — mechanical checks)\n  |\n  +-- N02 Marketing (Sonnet — creative but structured)\n  |     +-- sub: copy-writer\
  \ (Sonnet — ad variants)\n  |     +-- sub: formatter (Haiku)\n  |\n  +-- N06 Commercial (Sonnet — pricing models, structured)\n\
  \        +-- sub: analyst (Haiku — data gathering)\n        +-- sub: formatter (Haiku)"
