free_tier_strategy_zero_cost: 'For users without paid API keys, CEX can run entirely on free providers:


  | Nucleus | Provider | Model | Limitation |

  |---------|----------|-------|-----------|

  | N07 | Gemini CLI (free) | gemini-2.5-pro | Rate limited |

  | N01-N06 | Gemini CLI (free) | gemini-2.5-pro | Rate limited |

  | Sub-agents | Ollama (local) | qwen3:32b or llama3:70b | Your GPU |

  | Sub-agents | Groq (free) | llama-3.3-70b | 6K tokens/min |

  | Sub-agents | Cerebras (free) | llama-3.3-70b | Rate limited |


  Throughput on free tier: ~50-100 artifacts/hour (rate limits are the bottleneck).

  Full CEX from zero on free: ~30-50 hours (but zero cost).'
fine_tuned_models: "A CEX-specific fine-tuned model would be the endgame:\n\n| What to fine-tune on | Output | Use for |\n\
  |---------------------|--------|---------|\n| 1,630 builder ISOs | FT that generates ISOs from kind name | T3 sub-agent\
  \ for batch ISO generation |\n| 123 kind KCs | FT that generates KCs from kind schema | T3 sub-agent for batch KC generation\
  \ |\n| 377 templates + examples | FT that fills templates from intent | T3 sub-agent for template filling |\n\nHow: Export\
  \ training pairs (input=kind+schema, output=artifact) → fine-tune on OpenAI or HF → register as custom provider in pi.\n\
  \n// .pi/extensions/cex-ft-provider.ts\npi.registerProvider(\"cex-ft\", {\n  baseUrl: \"https://api.openai.com/v1\",  //\
  \ or local vLLM\n  apiKey: \"FT_API_KEY\",\n  api: \"openai-completions\",\n  models: [{\n    id: \"ft:gpt-4.1-mini:cex:iso-gen:abc123\"\
  ,\n    name: \"CEX ISO Generator\",\n    contextWindow: 128000,\n    maxTokens: 4096,\n    cost: { input: 0.001, output:\
  \ 0.002 }\n  }]\n});\n\nThen in agent definition:\n---\nname: builder-iso-ft\ndescription: Fine-tuned ISO generator — 10x\
  \ faster, 90% cheaper\ntools: read, write, bash\nmodel: cex-ft/ft:gpt-4.1-mini:cex:iso-gen:abc123\n---"
model_selection_in_nucleus_models_yaml: "The existing config already supports this — just needs sub-agent tiers added:\n\n\
  n03:\n  cli: pi\n  model: claude-opus-4-6          # Main process: T1\n  context: 1000000\n  sub_agents:               \
  \       # NEW: per-nucleus sub-agent config\n    builder_iso:\n      model: claude-sonnet-4-6    # T2: standard generation\n\
  \      tools: read,write,bash,edit\n    formatter:\n      model: google/gemini-2.0-flash  # T3: mechanical\n      tools:\
  \ read,bash\n    compiler:\n      model: ollama/qwen3:14b     # T3: local, free\n      tools: bash\n  fallback:\n    cli:\
  \ gemini\n    model: gemini-2.5-pro"
router_decision_matrix: "`cex_router.py` already exists with health checks + fallback chains.\nExtend it with task-complexity\
  \ routing:\n\n| Task complexity | Signal | Route to |\n|----------------|--------|----------|\n| Complex (new kind, architecture,\
  \ research) | unknown kind, no template match, >3 sections | T1 Opus |\n| Standard (ISO from template, KC from schema) |\
  \ template match >60%, known kind | T2 Sonnet |\n| Mechanical (rename, format, compile, validate) | no generation needed,\
  \ find-replace | T3 Haiku/Flash/Ollama |\n\n# In cex_router.py — new method\ndef route_task(self, task: dict) -> str:\n\
  \    if task.get(\"template_match\", 0) < 0.6:\n        return \"T1\"  # needs reasoning\n    if task.get(\"is_mechanical\"\
  , False):\n        return \"T3\"  # cheap model\n    return \"T2\"  # standard execution"
