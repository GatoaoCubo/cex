throughput_estimates: '| Configuration | Artifacts/hour | Time to build all |

  |--------------|---------------|-------------------|

  | 6 nuclei solo | 180 | 15.2h |

  | 6 nuclei x4 sub-agents | 720 | 3.8h |

  | + continuous batching | 864 | 3.2h |'
architecture: "overnight_infinite.cmd (loop forever)\n  |\n  +-- N07 (pi --continue, resumes state)\n  |     |\n  |     +--\
  \ WORK + DISPATCH (non-blocking interleaved)\n  |     |     |\n  |     |     +-- N01 + sub-agents (research)\n  |     |\
  \     +-- N02 + sub-agents (marketing)\n  |     |     +-- N03 + sub-agents (build)\n  |     |     +-- N04 + sub-agents (knowledge)\n\
  \  |     |     +-- N05 + sub-agents (code)\n  |     |     +-- N06 + sub-agents (commercial)\n  |     |     |\n  |     |\
  \     +-- = 6 nuclei x (1 + 4 sub-agents) = 30 LLM streams\n  |     |\n  |     +-- When context approaching limit:\n  |\
  \           write state to disk, exit cleanly\n  |\n  +-- SLEEP 10s\n  +-- RESTART N07 (pi --continue, fresh context)"
5_blockers_and_solutions: ''
blocker_1_n07_context_exhaustion_dies_at_1m_tokens: "Problem: N07 fills its 1M context and can't continue orchestrating.\n\
  \nSolutions found:\n\n| Solution | How | Status |\n|----------|-----|--------|\n| pi --continue | pi natively supports `--continue`\
  \ flag to resume previous session | EXISTS in pi |\n| pi /handoff | Extension that extracts context and creates new focused\
  \ session | EXISTS as pi extension (handoff.ts) |\n| pi compact() | Built-in compaction that summarizes conversation to\
  \ free tokens | EXISTS in pi SDK |\n| mission_state.yaml | CEX-specific checkpoint file on disk with task queue + progress\
  \ | NEEDS BUILD |\n\nRecommended approach: Combine `mission_state.yaml` (CEX state) with pi's `/handoff` (context transfer).\n\
  \n# .cex/runtime/mission_state.yaml\nmission: full_bootstrap\nstarted: 2026-04-07T20:00:00\nwave: 3\ntasks_total: 2742\n\
  tasks_completed: 847\ntasks_in_progress:\n  n01: {task: \"research_kc_batch_12\", started: \"2026-04-07T22:14:00\"}\n  n03:\
  \ {task: \"build_isos_wave3\", started: \"2026-04-07T22:14:30\"}\nnext_tasks:\n  - {nucleus: n03, kind: prompt_template,\
  \ count: 9}\n  - {nucleus: n04, kind: knowledge_card, count: 15}\nquality_gate:\n  passed: 830\n  failed: 17\n  retried:\
  \ 12\ntokens_used: 12400000\n\nImplementation: N05 builds `cex_mission_state.py` (read/write/update checkpoint).\nN07 reads\
  \ on boot, writes before context exhaustion."
blocker_2_sub_agents_inside_each_nucleus_6x_30x: "Problem: Each nucleus runs 1 LLM instance. Could run 1 + 4 sub-agents.\n\
  \nSolutions found:\n\n| Solution | How | Status |\n|----------|-----|--------|\n| pi subagent extension | Official pi extension:\
  \ spawns isolated pi subprocesses, supports parallel (max 8, 4 concurrent), chain mode, streaming | EXISTS as pi example\
  \ extension |\n| Agent .md files | YAML frontmatter defines agent: name, tools, model | EXISTS (pi convention) |\n| Parallel\
  \ mode | `{ tasks: [{agent, task}, ...] }` — runs up to 4 concurrent | EXISTS in subagent extension |\n| Chain mode | `{\
  \ chain: [{agent, task with {previous}}, ...] }` — sequential with context passing | EXISTS in subagent extension |\n\n\
  Recommended approach: Install subagent extension in each nucleus boot.\n\n.pi/agents/                          # Project-level\
  \ agents for CEX\n  builder-iso.md                     # Sub-agent: builds 1 ISO file\n  kc-writer.md                  \
  \     # Sub-agent: writes 1 KC\n  example-generator.md               # Sub-agent: generates 1 example\n  template-filler.md\
  \                 # Sub-agent: fills 1 template\n\nEach nucleus boot loads the subagent extension. When N03 gets \"build\
  \ 13 ISOs for citation-builder\", it spawns:\n- 4 parallel sub-agents, each building 3-4 ISOs\n- Total time: 1/4 of solo\n\
  \nConstraint: pi subagent max = 8 tasks, 4 concurrent per invocation.\nWith 6 nuclei x 4 concurrent = 24 parallel LLM streams.\n\
  \nImplementation:\n1. Install subagent extension: symlink from pi examples to `.pi/extensions/subagent/`\n2. Create 4-6\
  \ CEX-specific agent .md files in `.pi/agents/`\n3. Update boot scripts to include subagent extension\n4. Update handoff\
  \ format to support parallel sub-tasks"
blocker_3_git_conflicts_6_nuclei_writing_same_repo: 'Problem: Multiple nuclei committing simultaneously causes merge conflicts

  on shared files (kinds_meta.json, _schema.yaml).


  Solutions found:


  | Solution | How | Pros | Cons |

  |----------|-----|------|------|

  | Branch-per-nucleus | Each nucleus works in `n0X/task` branch, N07 merges | Clean isolation | Merge overhead, N07 must
  resolve |

  | Lock files | `.cex/runtime/locks/{file}.lock` with PID | Simple | Deadlocks if nucleus crashes |

  | Append-only directories | Each nucleus writes only to its own `N0X_*/` dir | Zero conflicts | Shared files (kinds_meta)
  still conflict |

  | N07 consolidation queue | Nuclei write to staging dir, N07 applies to main | Zero conflicts | Delay between produce and
  commit |

  | git worktrees | Each nucleus gets its own worktree of same repo | Full isolation | Complex setup, disk space |


  Recommended approach: Hybrid — append-only for artifacts + lock files for shared resources.


  Current reality: nuclei ALREADY mostly write to their own directories.

  The only shared files that conflict:

  - `.cex/kinds_meta.json` — N07 should be sole writer (nuclei propose, N07 applies)

  - `P{xx}/_schema.yaml` — same, N07 applies

  - `archetypes/builders/` — conflict-free if each nucleus builds different kinds


  Implementation:

  1. Create `_tools/cex_lock.py` — atomic file locking (PID-based, auto-expire 5min)

  2. Rule: nuclei NEVER edit kinds_meta.json or _schema.yaml directly

  3. Rule: nuclei write proposals to `.cex/runtime/proposals/{nucleus}_{file}.yaml`

  4. N07 reads proposals, applies to shared files, commits'
blocker_4_continuous_batching_no_wave_gaps: "Problem: Current model is wave-based — dispatch all, wait all, consolidate, next\
  \ wave.\nIdle time between waves wastes throughput.\n\nSolutions found:\n\n| Solution | How | Status |\n|----------|-----|--------|\n\
  | Event-driven dispatcher | N07 checks git log every ~30s, dispatches next task immediately when a nucleus finishes | PATTERN\
  \ EXISTS (non-blocking lifecycle rule) |\n| Task queue file | `.cex/runtime/task_queue.yaml` with prioritized tasks, N07\
  \ pops and dispatches | NEEDS BUILD |\n| cex_mission_runner.py | Already supports multi-wave with signal polling | EXISTS\
  \ but wave-based |\n\nRecommended approach: Enhance `cex_mission_runner.py` with continuous mode.\n\n# Current (wave-based):\n\
  dispatch_wave(nuclei) → wait_all() → consolidate() → next_wave()\n\n# Target (continuous):\nwhile tasks_remain():\n    for\
  \ nucleus in idle_nuclei():\n        task = pop_next_task(nucleus.domain)\n        dispatch(nucleus, task)\n    sleep(30)\n\
  \    check_completions()  # git log + signals\n    consolidate_completed()\n\nImplementation: N05 adds `--continuous` flag\
  \ to `cex_mission_runner.py`."
blocker_5_infinite_runtime_overnight_infinite_cmd: "Problem: N07 eventually exhausts context or crashes. Need auto-restart.\n\
  \nSolutions found:\n\n| Solution | How | Status |\n|----------|-----|--------|\n| CMD loop | `@echo off` + `:loop` + `goto\
  \ loop` with pi inside | PATTERN EXISTS (overnight_h1.cmd) |\n| pi --continue | Resume previous session with context | EXISTS\
  \ in pi |\n| pi /handoff | Create focused new session from current context | EXISTS as extension |\n| pi compact() | SDK\
  \ method to compress conversation | EXISTS in pi |\n| mission_state.yaml | State file survives restart | NEEDS BUILD |\n\
  \nRecommended approach: CMD loop + mission_state.yaml + pi --continue.\n\n@echo off\ntitle CEX INFINITE BOOTSTRAP\n:loop\n\
  echo [%time%] Starting N07 session...\n\npi --model anthropic/claude-opus-4-6 ^\n   --append-system-prompt \"N07_admin/agent_card_n07.md\"\
  \ ^\n   --append-system-prompt \".cex/config/context_self_select.md\" ^\n   \"Read .cex/runtime/mission_state.yaml. Continue\
  \ the mission from where it left off. When context is 80%% full, write state and exit with message EXIT_CHECKPOINT.\"\n\n\
  echo [%time%] N07 exited. Restarting in 10s...\ntimeout /t 10 /nobreak\ngoto loop\n\nKey: N07 must write `mission_state.yaml`\
  \ BEFORE exiting. The next instance reads it and continues seamlessly."
implementation_roadmap: '| Step | What | Nucleus | Depends on | Effort |

  |------|------|---------|-----------|--------|

  | 1 | `cex_mission_state.py` (checkpoint R/W) | N05 | — | 1 dispatch |

  | 2 | `overnight_infinite.cmd` (auto-restart loop) | N05 | Step 1 | 1 dispatch |

  | 3 | `cex_lock.py` (shared file locking) | N05 | — | 1 dispatch |

  | 4 | Proposal pattern for shared files | N07 (rule) | Step 3 | N07 direct |

  | 5 | Install subagent extension + create CEX agents | N05 | — | 1 dispatch |

  | 6 | Update boot scripts for subagent support | N05 | Step 5 | 1 dispatch |

  | 7 | `--continuous` mode in mission_runner | N05 | Steps 1,3 | 1 dispatch |

  | 8 | Task queue file + auto-prioritization | N05 | Step 7 | 1 dispatch |

  | 9 | Full integration test (mini bootstrap) | N07 | Steps 1-8 | 1 mission |


  Estimated total: 8 dispatches + 1 integration test.

  With continuous batching: ~2 hours to build the infrastructure.

  Then the infrastructure builds CEX: ~3-4 hours for full from-zero bootstrap.'
multi_provider_model_strategy: ''
the_insight_not_every_task_needs_opus: 'Opus 4.6 (1M context, $15/M tokens) is overkill for mechanical tasks.

  A 3-tier model strategy cuts cost 70%+ without quality loss:


  | Tier | Model | Context | Cost/M | Use for |

  |------|-------|---------|--------|---------|

  | T1 Reasoning | claude-opus-4-6 | 1M | $15 | Complex builds, architecture, research |

  | T2 Execution | claude-sonnet-4-6, gemini-2.5-pro | 200K-1M | $3-5 | Standard ISOs, KCs, templates |

  | T3 Mechanical | claude-haiku-4-5, gemini-flash, ollama/qwen3 | 128K-200K | $0-0.25 | Renames, format fixes, compilation
  |'
how_pi_already_supports_this: 'pi has native multi-provider support. Every process can use a different model:


  # Nucleus main process: Opus (complex orchestration)

  pi --model anthropic/claude-opus-4-6


  # Sub-agent scout: Haiku (fast recon, read-only)

  # Defined in .pi/agents/scout.md with: model: claude-haiku-4-5


  # Sub-agent builder: Sonnet (standard artifact generation)

  # Defined in .pi/agents/builder-iso.md with: model: claude-sonnet-4-6


  # Sub-agent formatter: Gemini Flash (mechanical formatting)

  # Defined in .pi/agents/formatter.md with: model: google/gemini-2.0-flash'
