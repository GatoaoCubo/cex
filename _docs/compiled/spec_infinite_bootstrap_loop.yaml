  |-----------|-------|------------|

  | Builder ISOs (13 per kind) | 1,630 | 24.5M |

  | Kind KCs | 123 | 1.8M |

  | Domain KCs | 88 | 1.3M |

  | Templates + examples | 377 | 5.7M |

  | Pillar schemas | 12 | 0.2M |

  | Tools (.py) | 59 | 0.9M |

  | Rules + configs | 15 | 0.2M |

  | Nucleus artifacts | 313 | 4.7M |

