decision_final_2026_04_15: ''
single_agentic_base_for_all_7_nuclei_llama3_1_8b: 'Rationale: Tools are the leverage mechanism. An agent without tool calling
  is a text generator. gemma2:9b CANNOT emit native `tool_calls` (E1 fail, 0%). Even though gemma2:9b won the previous 7-nucleus
  structural bench 7/7, that bench was single-shot. Once tools enter the equation, llama3.1:8b > gemma2:9b because ReAct text
  parsing is fragile while native tool calls are robust. Additionally, grid proof (`LEVERAGE_MAP` mission, 2026-04-15) demonstrated
  llama3.1:8b running all 6 nuclei interactively with 4 tools (list_dir, read_file, grep, done) on a single RTX 5070 Ti 16GB
  via Ollama queue.'
why_not_gemma2_9b_anymore:
- 'No native `tool_calls` emission (E1: 0/1.0)'
- ReAct text-only is fragile at scale (regex parsing breaks, no OpenAI standard)
- Marginal structural quality advantage does NOT compensate for missing tool loop
why_not_qwen3_14b:
- '`<think>` blocks consume 40-60% of `num_predict` before real output starts'
- Multi-turn state gets overwritten by thinking; E4, E11, E9, E8 all fail
- 2.7x slower than llama3.1:8b AND less capable for agentic work
ft_strategy: 'v1 (first build): ONE shared LoRA over `llama3.1:8b` → `cex-llama3.1:8b-ft:latest`

  - Training data: combined FT logs from all 7 nuclei

  - Simpler to train, larger dataset, cheaper to serve


  v2 (conditional): 7 per-nucleus LoRAs IF measured quality gap > 10% per sin/domain

  - N02 Luxúria (marketing voice)

  - N05 Operations (code/test precision)

  - etc.

  - Only train these if v1 LoRA underperforms on domain-specific benchmarks


  gemma2:9b is archived from roadmap — not retrained, not routed.'
architecture: "User intent\n    |\n    v\nN07 Orchestrator (Claude opus-4-6)\n    |\n    +--> cex_agentic_nucleus.py (llama3.1:8b\
  \ + LoRA)\n    |         |\n    |         +--> Tools: list_dir, read_file, grep, done\n    |         +--> (to add) cex_retriever,\
  \ cex_validator, cex_web_fetch, etc.\n    |         +--> ReAct loop, max 15 iters\n    |         +--> Auto git commit on\
  \ complete\n    |\n    +--> Grid dispatcher (_spawn/spawn_grid_ollama.ps1)\n              |\n              +--> 6 interactive\
  \ windows, 3x2 positioned\n              +--> User can observe + correct in real-time\n              +--> Each window runs\
  \ full 8F via cex_agentic_nucleus.py"
hardware_baseline:
- RTX 5070 Ti, 16 GB VRAM, `OLLAMA_NUM_PARALLEL=3`
- llama3.1:8b = 4.9 GB; gemma2:9b = 5.4 GB; qwen3:14b = 9.3 GB
- 'Wall time (12 experiments): gemma2 = 41s, llama3.1 = 39s, qwen3 = 109s'
- qwen3 is ~2.7x slower AND less capable for agentic work
