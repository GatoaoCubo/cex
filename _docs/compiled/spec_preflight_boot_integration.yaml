id: spec_preflight_boot_integration
kind: decision_record
title: Preflight Boot Integration Spec
version: 1.0.0
quality: null
tags:
- preflight
- boot
- optimization
- token-budget
created: 2026-04-13
density_score: 1.0
decision: Integrate `cex_preflight.py` into the nucleus boot pipeline so that every dispatch automatically pre-compiles context
  before the main model starts.
current_boot_flow: "spawn_grid.ps1 / dispatch.sh\n  -> boot/n0X.ps1\n     -> set env vars\n     -> & claude --model X --append-system-prompt\
  \ agent_card.md ..."
new_boot_flow_with_preflight: "spawn_grid.ps1 / dispatch.sh\n  -> boot/n0X.ps1\n     -> set env vars\n     -> python _tools/cex_preflight.py\
  \ --handoff {handoff_path} --output {cache_file}\n        (runs on Ollama/Haiku, ~5-10 seconds, $0 or negligible cost)\n\
  \     -> & claude --model X --append-system-prompt agent_card.md\n                           --append-system-prompt {cache_file}"
changes_required: ''
1_boot_n0x_ps1_all_6_nucleus_boot_scripts: "Add before `& claude @cliArgs`:\n\n# --- Preflight: pre-compile context (local/cheap\
  \ model) ---\n$preflightCache = \"$cexRoot\\.cex\\cache\\preflight\\${nucleus}_latest.md\"\n$handoffPath = \"$cexRoot\\\
  .cex\\runtime\\handoffs\\${nucleus}_task.md\"\nif (Test-Path $handoffPath) {\n    Set-CexTitle \"PREFLIGHT\"\n    $preflightResult\
  \ = & python \"$cexRoot\\_tools\\cex_preflight.py\" --handoff $handoffPath --output $preflightCache 2>&1\n    if ($LASTEXITCODE\
  \ -eq 0 -and (Test-Path $preflightCache)) {\n        $cliArgs += \"--append-system-prompt\", $preflightCache\n        Write-Host\
  \ \"  [OK] Preflight: context pre-compiled\" -ForegroundColor Green\n    } else {\n        Write-Host \"  [WARN] Preflight\
  \ skipped (fallback: full context)\" -ForegroundColor Yellow\n    }\n}"
2_boot_gen_py_regenerate_boot_scripts: Update `_tools/cex_boot_gen.py` template to include the preflight block. This ensures
  new nuclei or regenerated boots always have preflight.
3_cex_preflight_py_output_flag: 'The `--output` flag writes a markdown file (not JSON) suitable for direct injection

  via `--append-system-prompt`. Format:


  # Preflight Context for {nucleus} — {kind}


  ## Selected ISOs (top {N} of 13)

  {iso_content}


  ## Selected Knowledge Cards (top {N})

  {kc_content}


  ## Task Context

  {compressed_handoff}'
4_spawn_grid_ps1: No changes needed — grid dispatches via boot scripts, which now include preflight.
graceful_degradation: '| Scenario | Behavior |

  |----------|----------|

  | Ollama offline + Haiku offline | Skip preflight, boot with full context (current behavior) |

  | Ollama slow (>30s) | Timeout, skip preflight |

  | Preflight cache exists and fresh | Use cache, skip recomputation |

  | No handoff file | Skip preflight (nucleus boots interactive) |'
metrics: 'Track in `.cex/cache/preflight/stats.json`:

  - `total_preflights`: count

  - `avg_reduction_pct`: rolling average

  - `cache_hits`: count (reused existing cache)

  - `local_calls`: Ollama usage count

  - `cloud_calls`: Haiku usage count

  - `tokens_saved_total`: cumulative'
timeline:
- N05 delivers `cex_preflight.py` (current dispatch)
- N07 integrates into boot scripts (next task)
- Regenerate boot scripts via `cex_boot_gen.py`
- 'Test: dispatch N03 with preflight, verify token reduction'
