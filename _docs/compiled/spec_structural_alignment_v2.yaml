  \ + executes |\n\nInterface:\npython _tools/cex_merge_pillars.py --dry-run      # list all operations\npython _tools/cex_merge_pillars.py\
  \ --execute      # run git mv + git rm\npython _tools/cex_merge_pillars.py --verify       # check N00 has all content\n\n\
  Logic:\n1. For each pillar P01-P12:\n   - List all items in root `P{xx}_*/` (except `compiled/` -- skip)\n   - For each\
  \ item: `git mv P{xx}{name}/{item} N00_genesis/P{xx}{name}/{item}`\n   - If item already exists in N00 target: print `[CONFLICT]\
  \ {item}` and skip\n2. After all moves: `git rm -r P{xx}_*/` for each root pillar\n3. Verify: `ls N00_genesis/P01_knowledge/library/`\
  \ should exist"
