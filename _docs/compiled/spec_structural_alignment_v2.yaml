problem: "After STRUCT_ALIGN V1, there is a structural duality:\n\ncex/\n  P01_knowledge/       root level -- _schema, library,\
  \ examples, templates\n  N00_genesis/\n    P01_knowledge/     N00 level -- kind manifests, kind indexes (W4)\n  N01_intelligence/\n\
  \    P01_knowledge/     nucleus level -- N01 artifacts\n\nThree layers where two would suffice. N00 IS the pillar registry\
  \ (archetype).\nThe root P01-P12 dirs are a historical artifact, not intentional design.\n\nConsequence: LLM navigating\
  \ the repo finds pillar data in two places.\n`P01_knowledge/library/kind/kc_*.md` should live at `N00_genesis/P01_knowledge/library/kind/kc_*.md`."
vision: "cex/\n  N00_genesis/\n    P01_knowledge/        MERGED: _schema + library + examples + templates + kind manifests\n\
  \    P02_model/            MERGED: _schema + examples + templates + kind manifests\n    ...\n    P12_orchestration/    MERGED:\
  \ _schema + examples + templates + dags + workflows + manifests\n  N01-N07/\n    P01_knowledge/        nucleus artifacts\
  \ (unchanged -- already P-numbered)\n    ...\n  archetypes/             unchanged\n  _tools/                 unchanged\n\
  \nRoot P01-P12 dirs are DELETED after merge. N00 is the single pillar registry."
