id: spec_zero_install
kind: context_doc
title: 'CEX Zero-Install: Dependencies and Bootstrap on Fresh Machine'
version: 2.0.0
quality: null
created: 2026-04-07
updated: 2026-04-08
purpose: Everything needed to run CEX on a PC with nothing installed
density_score: 1.0
dependency_stack_3_layers: "Layer 0: OS (Windows 10+, macOS, Linux)\n  |\n  +-- Layer 1: Runtimes (USER installs manually)\n\
  \  |     +-- Python 3.12+\n  |     +-- Node.js 18+ (LTS)\n  |     +-- Git 2.40+\n  |\n  +-- Layer 2: Core Packages (setup.cmd\
  \ installs)\n  |     +-- npm: @anthropic-ai/claude-code (Claude Code CLI)\n  |     +-- pip: pyyaml, tiktoken\n  |     +--\
  \ pip: numpy, scikit-learn (optional -- accelerates retriever)\n  |     +-- pip: uv (for MCP server auto-install)\n  |\n\
  \  +-- Layer 2.5: Post-setup validation\n  |     +-- python _tools/cex_setup_validator.py (canonical health check)\n  |\n\
  \  +-- Layer 3: Auto-managed (Claude Code handles)\n        +-- MCP servers (npx/uvx auto-install on first use)\n      \
  \  +-- Any pip/npm deps Claude needs during work"
runtime_claude_code_the_nucleus_runtime: 'Claude Code is the CLI that runs EVERY nucleus. CEX without Claude Code is a library
  without an interpreter.


  | What Claude Code provides | How CEX uses it |

  |---------------------------|-----------------|

  | LLM conversation loop | Each nucleus = 1 Claude Code instance with Opus |

  | `--model` flag | Routes each nucleus to its configured model |

  | `--append-system-prompt` | Injects agent card + context + boot prompt |

  | Tools (read, bash, edit, write) | How nuclei read/write artifacts, run Python tools |

  | CLAUDE.md auto-load | Project rules, routing, pipeline loaded automatically |

  | `.claude/agents/` | 125 builder sub-agents available to all nuclei |

  | `.claude/commands/` | /build, /mission, /status, /validate, etc. |

  | `.claude/rules/` | Behavioral rules auto-loaded per session |

  | MCP server support | Each nucleus loads its `.mcp-n0X.json` config |

  | Sub-agents | Parallel task execution within each nucleus |

  | Context compression | Automatic compaction when window fills |

  | `--dangerously-skip-permissions` | Autonomous mode for dispatched nuclei |


  Auth: Claude Code uses Anthropic OAuth directly. No API key needed for Max/Pro plans.

  On first run, it opens a browser for login. API keys are optional (set ANTHROPIC_API_KEY).'
minimum_install_4_commands: 'For a fresh Windows PC after runtimes are installed:


  :: 1. Install Claude Code

  npm install -g @anthropic-ai/claude-code


  :: 2. Install Python deps

  pip install pyyaml tiktoken uv


  :: 3. Clone and run

  git clone https://github.com/<user>/cex.git

  cd cex

  boot\cex.ps1


  Or just run `setup.cmd` which does all of the above with validation.'
dependency_matrix: ''
layer_1_runtimes_user_installs_3_executables: '| Runtime | Version | Purpose | Install |

  |---------|---------|---------|---------|

  | Python | 3.12+ | All _tools/*.py (59 tools) | python.org or `winget install Python.3` |

  | Node.js | 18+ LTS | Claude Code runtime | nodejs.org or `winget install OpenJS.NodeJS.LTS` |

  | Git | 2.40+ | Version control, nucleus commits | git-scm.com or `winget install Git.Git` |'
layer_2_core_packages_setup_cmd_installs: '| Package | Manager | Purpose | Size |

  |---------|---------|---------|------|

  | @anthropic-ai/claude-code | npm (global) | Agent CLI -- runs all nuclei | ~15MB |

  | pyyaml | pip | YAML parsing (schemas, configs, kinds_meta) | 150KB |

  | tiktoken | pip | Token counting (budget allocation) | 2MB |

  | uv | pip | Python package runner for MCP servers (uvx) | 5MB |

  | numpy | pip | (optional) Array ops for retriever acceleration | 7MB |

  | scikit-learn | pip | (optional) TF-IDF vectorizer for retriever | 30MB |'
layer_3_mcp_servers_auto_install_on_first_use: 'MCP servers install automatically via `npx -y` or `uvx`. No pre-install needed.


  | Server | Auto-installs via | Used by |

  |--------|-------------------|---------|

  | firecrawl-mcp | `npx -y firecrawl-mcp` | N01, N04 |

  | mcp-server-fetch | `uvx mcp-server-fetch` | N01, N04, N06 |

  | markitdown-mcp | `npx -y markitdown-mcp` | N01, N02, N06 |

  | brave-search | `npx -y @modelcontextprotocol/server-brave-search` | N01 |

  | notebooklm | `npx -y notebooklm-mcp@latest` | N01, N02, N04, N06 |

  | puppeteer | `npx -y @modelcontextprotocol/server-puppeteer` | N02 |

  | github | `npx -y @modelcontextprotocol/server-github` | N03, N05 |'
what_claude_code_installs_on_its_own: Once Claude Code boots, it can `pip install` or `npm install` anything it needs. The
  user never needs to pre-install anything beyond Layer 1 + Layer 2.
claude_code_config_files_in_cex_repo: '| Path | Purpose | Count |

  |------|---------|-------|

  | `CLAUDE.md` | Master project config (auto-loaded) | 1 |

  | `.claude/rules/*.md` | Behavioral rules (auto-loaded) | 16 |

  | `.claude/commands/*.md` | Custom /commands (/build, /mission, etc.) | 13+ |

  | `.claude/agents/*.md` | Builder sub-agents (1 per kind) | 125 |

  | `.claude/nucleus-settings/n0X.json` | Per-nucleus settings | 6 |

  | `.mcp-n0X.json` | MCP server configs per nucleus | 6 |

  | `boot/n0X.ps1` | Boot scripts that launch Claude Code with flags | 7+ |

  | `.cex/config/context_self_select.md` | Self-select context injected on boot | 1 |'
environment_variables: ''
required_for_operation: '| Variable | Purpose | How to get |

  |----------|---------|-----------|

  | None | Claude Code uses OAuth login (browser popup) | Free with Max/Pro subscription |'
optional_per_provider_service: '| Variable | Purpose | When needed |

  |----------|---------|-------------|

  | ANTHROPIC_API_KEY | Anthropic API access | Only for SDK/programmatic mode |

  | FIRECRAWL_API_KEY | Firecrawl web scraping | Research features (N01) |

  | BRAVE_API_KEY | Brave Search API | Research features (N01) |

  | SUPABASE_URL | Supabase database | CRM features |

  | SUPABASE_KEY | Supabase auth | CRM features |'
tiers_what_works_at_each_level: '| Tier | Install | What works | What doesn''t |

  |------|---------|-----------|-------------|

  | Minimal (Python + Node + Git) | 3 runtimes | All _tools/, doctor, compile, score | No LLM, no nuclei |

  | Core (+ Claude Code + pip deps) | + 2 packages | Everything above + nucleus boot + grid | No MCP servers |

  | Full (+ OAuth login) | + browser login | Everything: 6 nuclei, MCP, autoresearch | Needs subscription |'
cross_platform: '| OS | Runtimes | Spawn method | Notes |

  |----|----------|-------------|-------|

  | Windows | python.org + nodejs.org + git | CMD + PowerShell | Current default, setup.cmd |

  | macOS | `brew install python node git` | bash + tmux | Boot scripts need .sh equivalents |

  | Linux | `apt install python3 nodejs git` | bash + tmux | Boot scripts need .sh equivalents |'
post_setup_validation: 'After running `setup.cmd`, run the setup validator before first boot:


  python _tools/cex_setup_validator.py


  This checks: runtimes present, pip deps installed, Claude Code CLI available,

  MCP configs valid, runtime directories exist. Fix any FAIL items before booting.'
runtime_directory_creation: 'CEX needs these directories at runtime. `setup.cmd` creates them, but if

  cloning fresh or after a clean, ensure they exist:


  .cex/runtime/handoffs/

  .cex/runtime/signals/

  .cex/runtime/pids/

  .cex/runtime/decisions/

  .cex/runtime/proposals/

  .cex/runtime/archive/'
windows_power_settings_for_grid_mission_work: 'Long-running grid dispatches can take 30-60 minutes with 6 nuclei working in
  parallel.

  Windows default power settings will sleep the machine mid-run, killing all nuclei.


  Before running `/grid` or `/mission`:

  - Settings > System > Power > Screen and sleep: set both to Never

  - Or run: `powercfg -change -standby-timeout-ac 0`

  - Re-enable after the mission completes'
bootstrap_scripts: 'Two scripts serve different starting points:


  | Script | Starting point | What it does |

  |--------|---------------|--------------|

  | `install.cmd` | Bare Windows PC (nothing installed) | Uses `winget` to install Git, Python, Node.js, then Claude Code
  + pip deps |

  | `setup.cmd` | Runtimes already installed | Validates runtimes, installs Claude Code + pip deps, runs doctor |


  install.cmd                            -- fully automated: installs runtimes + everything else

  setup.cmd                              -- run from CEX directory (runtimes required)

  setup.cmd https://github.com/x/cex    -- clone + setup


  Use `install.cmd` on a fresh PC. Use `setup.cmd` if you already have Python, Node, and Git.'
