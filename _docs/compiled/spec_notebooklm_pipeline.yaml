validation_rules: '| Field | Type | Required | Constraint |

  |-------|------|----------|------------|

  | `version` | int | yes | Must be 1 |

  | `google_account` | string | yes | Valid email |

  | `publish_mode` | enum | yes | `auto` or `manual` |

  | `browser_engine` | enum | yes | `chrome_local` or `firecrawl_cloud` |

  | `default_outputs` | list[str] | yes | Subset of: flashcards, audio_summary, quiz, mind_map, briefing, timeline, faq, infographic,
  presentation, video, data_table |

  | `domains.*.notebook_id` | string/null | yes | UUID or null |

  | `domains.*.sources` | list | yes | Each: {path, uploaded} |

  | `domains.*.source_count` | int | yes | <= 50 (NotebookLM limit) |


  ---'
4_integration_points: ''
4_1_f8_collaborate_hook: "After any KC is committed in F8, optionally publish to NotebookLM:\n\n# In cex_hooks.py post_save\
  \ hook (or as standalone post-commit hook)\n\ndef post_save_notebooklm(artifact_path: Path):\n    \"\"\"Called after F8\
  \ saves a KC. Publishes to NotebookLM if configured.\"\"\"\n    import yaml\n\n    # Only trigger for knowledge_cards\n\
  \    with open(artifact_path) as f:\n        content = f.read()\n    if \"kind: knowledge_card\" not in content[:500]:\n\
  \        return\n\n    # Check if auto-publish is enabled\n    config = yaml.safe_load(open(\".cex/config/notebooklm_notebooks.yaml\"\
  ))\n    if config.get(\"publish_mode\") != \"auto\":\n        return\n\n    # Upload\n    import subprocess\n    result\
  \ = subprocess.run(\n        [\"python\", \"_tools/cex_notebooklm.py\", \"--upload\", str(artifact_path)],\n        capture_output=True,\
  \ text=True, timeout=120\n    )\n    if result.returncode == 0:\n        print(f\"[NotebookLM] Uploaded: {artifact_path.name}\"\
  )\n    else:\n        print(f\"[NotebookLM] Upload failed: {result.stderr[:200]}\")\n\nWhen it fires: Every time a KC passes\
  \ F7 governance and is saved in F8.\nGuard: Only fires if `publish_mode: auto` in config. Only for `kind: knowledge_card`."
4_2_n04_workflow_kc_save_auto_upload: "When N04 produces or updates a KC during a mission:\n\nN04 builds KC via 8F\n    →\
  \ F8 COLLABORATE: save .md, compile .yaml, git commit\n    → F8 Hook: cex_notebooklm.py --upload <path>\n        → KC is\
  \ pasted into domain notebook\n        → Config updated with new source\n    → Signal: n04 complete\n\nThis means every\
  \ KC N04 produces is automatically available in NotebookLM within seconds of being committed."
4_3_n02_downstream_generated_content_social_publishing: "After Estúdio generates outputs:\n\nN04: --studio activates flashcards\
  \ + audio + quiz\n    │\n    ▼\nN02 Marketing can consume:\n    ├─ Audio Overview → edit with FFmpeg → publish as podcast\
  \ (Spotify, YouTube)\n    ├─ Flashcards → extract text → social carousel (Canva API)\n    ├─ Quiz → embed in course module\
  \ (Hotmart via N06)\n    └─ Briefing Doc → email newsletter content\n\nHandoff format: N04 signals completion with notebook_id\
  \ + outputs list. N02/N06 read the config to find what was generated."
4_4_mission_integration: "In a Content Factory mission (`dag_cf_master`):\n\nWave 3 PRODUCE:\n    N03 (parallel): Canva, Marp,\
  \ Typst, ElevenLabs, FFmpeg\n    N04 (parallel): NotebookLM upload + Estúdio activation\n        ├─ Upload all KCs from\
  \ Wave 1 research\n        ├─ Activate: flashcards + audio_summary + quiz (D2 defaults)\n        └─ Signal with output manifest\n\
  \nN04's NotebookLM work runs in parallel with N03's tool-based production. No dependency between them — both read from the\
  \ same KC sources.\n\n---"
5_auth_management: ''
5_1_cookie_architecture: "Google Account ({{BRAND_EMAIL}})\n    │\n    ▼\nNotebookLM MCP Server (Puppeteer-based)\n\
  \    │ Logs in via browser, saves cookies\n    ▼\n%LOCALAPPDATA%\\notebooklm-mcp\\Data\\browser_state\\state.json\n    │\
  \ Contains: cookies[], localStorage, sessionStorage\n    ▼\ncex_notebooklm.py reads cookies from state.json\n    │ Injects\
  \ into Playwright browser context\n    ▼\nPlaywright operates NotebookLM UI as authenticated user"
5_2_session_expiry_detection: "Google session cookies expire after ~14 days of inactivity. Detection:\n\ndef check_auth_valid(cookies:\
  \ list) -> bool:\n    \"\"\"Check if cookies are likely still valid.\"\"\"\n    # 1. Check for essential cookies\n    essential\
  \ = {\"SID\", \"HSID\", \"SSID\", \"APISID\", \"SAPISID\"}\n    present = {c[\"name\"] for c in cookies}\n    if not essential.issubset(present):\n\
  \        return False\n\n    # 2. Check expiry timestamps\n    import time\n    now = time.time()\n    for c in cookies:\n\
  \        if c[\"name\"] in essential:\n            if c.get(\"expires\", 0) > 0 and c[\"expires\"] < now:\n            \
  \    return False\n\n    return True"
5_3_re_authentication_flow: "When auth expires:\n\n[AUTH_EXPIRED] detected\n    │\n    ├─ Option 1 (preferred): NotebookLM\
  \ MCP re_auth\n    │   Tool: mcpnotebooklmre_auth or mcpnotebooklmsetup_auth\n    │   Spawns Puppeteer browser → user logs\
  \ in → cookies saved\n    │\n    ├─ Option 2: Playwright re-auth\n    │   python _tools/cex_notebooklm.py --reauth\n   \
  \ │   Launches visible Chromium → navigates to accounts.google.com\n    │   Waits for user to complete login (120s timeout)\n\
  \    │   Saves cookies to state.json\n    │\n    └─ Option 3 (fallback): Manual paste\n        User manually opens NotebookLM\
  \ → pastes KC content\n        Only for emergency — bypasses automation entirely"
5_4_chrome_profile_isolation: 'Problem: Playwright and system Chrome cannot share the same profile simultaneously (lock file
  conflict). Solution: Playwright uses its own Chromium instance with injected cookies (not a shared Chrome profile). Cookies
  are extracted from the MCP server''s `state.json`, which is updated independently. Consequence: If the user logs out of
  their system Chrome, MCP cookies may still be valid (and vice versa). The two sessions are independent.'
5_5_security_notes: '- Cookies are stored locally in `%LOCALAPPDATA%` (user-scoped, not world-readable).

  - Google account `{{BRAND_EMAIL}}` is a dedicated automation account (not personal).

  - The `--dangerously-skip-permissions` flag is only needed when spawning Chrome MCP clones, not for Playwright uploads.

  - No credentials are stored in the CEX repository. Cookie state is machine-local.


  ---'
6_domain_notebook_mapping_initial_draft: 'Based on existing KC library structure (`P01_knowledge/library/`):


  | Domain | Notebook Name | KC Source Directories | Est. Sources |

  |--------|--------------|----------------------|-------------|

  | `meta` | CEX Meta Knowledge | `library/domain/meta/` | ~10 KCs |

  | `brand` | Brand Knowledge | `library/domain/brand/` | ~5 KCs |

  | `integration` | Integration Knowledge | `library/integration/` | ~10 KCs (Canva, ElevenLabs, YouTube, etc.) |

  | `kind` | Kind Reference | `library/kind/` | ~115 KCs (one per kind) |

  | `operations` | Operations Knowledge | `library/domain/operations/` | ~5 KCs |

  | `commercial` | Commercial Knowledge | `library/domain/commercial/` | ~5 KCs |


  Note on `kind` domain: 115 KCs exceeds the 50-source limit per notebook. Strategy:

  - Split into sub-notebooks: `kind-p01` (P01 kinds), `kind-p02` (P02 kinds), etc.

  - Or: upload only the most-used kinds first, expand as needed.

  - Decision deferred to N03 implementation — the config schema supports dynamic notebook creation.


  ---'
7_risks_and_mitigations: '| Risk | Impact | Mitigation |

  |------|--------|------------|

  | Google changes NotebookLM UI selectors | Upload/Studio breaks | Selector strategy with multiple fallbacks + screenshot-on-failure
  for debug |

  | Auth expires mid-mission | Pipeline halts | Pre-flight auth check in every subcommand + `--reauth` subcommand |

  | Source limit (50) reached | Cannot add more KCs | Warn at 45 sources, auto-create spillover notebook |

  | Estúdio generation slow (audio: 2-10 min) | Mission wave timeout | Async polling with 15-min timeout, configurable |

  | Playwright not installed on target machine | Tool fails on first run | Clear error message + install instructions |

  | NotebookLM launches public API | This spec becomes partially obsolete | Abstract browser actions behind interface — swap
  to REST when available |


  ---'
