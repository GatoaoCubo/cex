tldr: 'Formal spec for Fase 1 of the NotebookLM pipeline. Tool: cex_notebooklm.py (upload/studio/status/list). Config: notebooklm_notebooks.yaml
  (domain→notebook mapping). Auth: Chrome profile reuse + session expiry detection. Integration: F8 hook + N04 auto-upload
  + N02 downstream.'
density_score: null
1_architecture: ''
data_flow: "                         CEX SYSTEM                          │  EXTERNAL (Google)\n                          \
  \                                   │\n  KC .md file                                                │\n    │           \
  \                                             │\n    ▼                                                        │\n  cex_notebooklm.py\
  \ --upload <kc_path>                       │\n    │                                                        │\n    ├─ Reads\
  \ KC content from disk                            │\n    ├─ Resolves domain from KC frontmatter (kind/domain)     │\n  \
  \  ├─ Looks up notebook_id in notebooklm_notebooks.yaml     │\n    │   ├─ Found → reuse existing notebook              \
  \     │\n    │   └─ Not found → create new notebook (Playwright)      │\n    ├─ Loads Google cookies from MCP browser state\
  \            │\n    ├─ Launches Playwright (headless=false, Chrome)           │\n    │                                 \
  \                       │\n    ▼                                                        │\n  Playwright Browser Session\
  \ ──────────────────────────────► │ NotebookLM UI\n    │  1. Navigate to notebook URL                           │   (notebooklm.google.com)\n\
  \    │  2. Click \"Adicionar fontes\"                           │\n    │  3. Click \"Texto copiado\"                   \
  \           │\n    │  4. Fill title + paste KC content                      │\n    │  5. Click \"Inserir\"             \
  \                       │\n    │  6. Wait for indexing (30s-5min)                       │\n    │                       \
  \                                 │\n    ▼                                                        │\n  cex_notebooklm.py\
  \ --studio <notebook_id>                   │\n    │                                                        │\n    ├─ Option\
  \ A: Playwright clicks Estúdio outputs           │\n    │   └─ \"Cartões didáticos\", \"Resumo em áudio\", etc.     │\n\
  \    ├─ Option B: claude --chrome spawns Chrome MCP           │\n    │   └─ Uses mcpclaude-in-chrome* (18 tools)       \
  \  │\n    │                                                        │\n    ▼                                            \
  \            │\n  NotebookLM Estúdio generates:                              │ Gemini processes\n    ├─ Flashcards (20-75\
  \ cards)                              │   sources and\n    ├─ Audio Summary (5-30min podcast, 2 hosts)              │  \
  \ generates outputs\n    └─ Quiz (10-20 questions)                                │\n         │                        \
  \                           │\n         ▼                                                   │\n  Outputs available in NotebookLM\
  \ UI                         │\n    │                                                        │\n    ▼                  \
  \                                      │\n  cex_notebooklm.py --status <notebook_id>                   │\n    └─ Reports:\
  \ sources indexed, outputs generated           │"
component_map: '| Component | Type | Path | Status |

  |-----------|------|------|--------|

  | `cex_notebooklm.py` | Unified CLI tool | `_tools/cex_notebooklm.py` | TO BUILD (N03) |

  | `notebooklm_notebooks.yaml` | Config registry | `.cex/config/notebooklm_notebooks.yaml` | TO BUILD (N04 draft) |

  | `notebooklm_create.py` | Prototype (create notebook) | `_tools/notebooklm_create.py` | EXISTS (PoC) |

  | `notebooklm_paste.py` | Prototype (paste into notebook) | `_tools/notebooklm_paste.py` | EXISTS (PoC) |

  | NotebookLM MCP | 17 tools (query, list, search) | `.mcp-n04.json` | EXISTS (auth expires) |

  | Chrome MCP | 18 tools (browser control) | via `claude --chrome` flag | EXISTS (requires spawn) |'
key_constraint_no_public_api: 'NotebookLM has NO REST API. All automation is browser-based:

  - Playwright for deterministic UI automation (create, paste, click)

  - Chrome MCP (via `claude --chrome`) for AI-driven UI navigation

  - NotebookLM MCP for read operations (list, search, ask_question)


  This means: all write operations (upload sources, activate Estúdio) require a visible browser window.


  ---'
2_tool_spec_cex_notebooklm_py: ''
overview: Unified CLI that consolidates the two prototypes (`notebooklm_create.py`, `notebooklm_paste.py`) into a single tool
  with 4 subcommands.
cli_interface: '# Upload a KC as source to a domain notebook

  python _tools/cex_notebooklm.py --upload <kc_path> [--domain <domain>] [--notebook <id>]


  # Activate Estúdio outputs for a notebook

  python _tools/cex_notebooklm.py --studio <notebook_id> --outputs flashcards,audio_summary,quiz


  # Check status of a notebook (sources, outputs, last sync)

  python _tools/cex_notebooklm.py --status <notebook_id>


  # List all tracked notebooks with domain mapping

  python _tools/cex_notebooklm.py --list'
subcommand_upload: "Input: Path to a KC `.md` file.\nBehavior:\n\n1. Read KC file, extract frontmatter (`domain`, `kind`,\
  \ `title`).\n2. Resolve domain:\n   - If `--domain` provided → use it.\n   - Else → infer from KC's `domain` field or parent\
  \ directory (e.g., `library/integration/` → `integration`).\n3. Look up `notebooklm_notebooks.yaml` for domain → notebook_id\
  \ mapping.\n   - If mapping exists and notebook is reachable → paste KC as new source.\n   - If no mapping → create new\
  \ notebook, save notebook_id to config.\n4. Load Google cookies from MCP browser state:\n   Path: %LOCALAPPDATA%\\notebooklm-mcp\\\
  Data\\browser_state\\state.json\n5. Launch Playwright (headless=false):\n   - Navigate to notebook URL\n   - Click \"Adicionar\
  \ fontes\" → \"Texto copiado\"\n   - Fill title from KC frontmatter `title`\n   - Paste KC content (up to 200K chars — NotebookLM\
  \ limit is 500K words per source)\n   - Click \"Inserir\"\n   - Wait for indexing confirmation (poll for \"pronto\" / source\
  \ count change)\n6. Update `notebooklm_notebooks.yaml`:\n   - `last_sync` timestamp\n   - Increment `source_count`\n   -\
  \ Add KC path to `sources` list\n7. Return: `{ notebook_id, domain, source_title, status: \"indexed\" }`\n\nError handling:\n\
  - Auth expired → print `[AUTH_EXPIRED] Run: python _tools/cex_notebooklm.py --reauth`\n- Playwright timeout → screenshot\
  \ + retry once\n- Source limit reached (50) → warn, suggest new notebook"
subcommand_studio: "Input: `notebook_id` + comma-separated output list.\nDefault outputs (from GDP D2): `flashcards,audio_summary,quiz`\n\
  Behavior:\n\n1. Navigate to notebook.\n2. Locate \"Estúdio\" panel (right sidebar in NotebookLM UI).\n3. For each requested\
  \ output:\n   - Click the output button (PT-BR labels):\n     - `flashcards` → \"Cartões didáticos\"\n     - `audio_summary`\
  \ → \"Resumo em áudio\"\n     - `quiz` → \"Teste\"\n     - `mind_map` → \"Mapa mental\"\n     - `briefing` → \"Documento\
  \ de resumo\"\n     - `timeline` → \"Linha do tempo\"\n     - `faq` → \"Perguntas frequentes\"\n   - Wait for generation\
  \ (varies: flashcards ~30s, audio ~5min)\n4. Publish mode (from GDP D3): auto-publish — no manual approval step.\n5. Update\
  \ config: `outputs_generated` list + timestamp.\n6. Return: `{ notebook_id, outputs: [{type, status, count_or_duration}]\
  \ }`\n\nImplementation note: For audio_summary, generation can take 2-10 minutes. The tool should poll every 30s with a\
  \ 15-minute timeout."
subcommand_status: "Input: `notebook_id`\nBehavior:\n\n1. Query via NotebookLM MCP: `get_notebook` → source count, name.\n\
  2. Read local config for: last_sync, sources uploaded, outputs generated.\n3. Return combined status:\n   notebook_id: 940fd258-...\n\
  \   domain: meta\n   name: \"CEX Meta Knowledge\"\n   sources: 5\n   last_sync: 2026-04-06T18:00:00\n   outputs:\n     flashcards:\
  \ generated (75 cards)\n     audio_summary: generated (12min)\n     quiz: pending"
subcommand_list: 'Behavior: Read `notebooklm_notebooks.yaml`, format as table.


  DOMAIN          NOTEBOOK_ID                              SOURCES  LAST_SYNC

  meta            940fd258-847f-47c1-b7e6-caca7b730681     2        2026-04-06

  brand           (not created)                            0        —

  integration     (not created)                            0        —

  kind            (not created)                            0        —'
subcommand_reauth: 'Behavior: Re-authenticate Google session.


  1. Launch Playwright with visible Chrome.

  2. Navigate to `accounts.google.com`.

  3. Wait for user to complete login (poll for cookie presence, 120s timeout).

  4. Save cookies to MCP state file.

  5. Alternatively: call NotebookLM MCP `setup_auth` or `re_auth` tool.'
dependencies: 'playwright          # Browser automation (pip install playwright && playwright install chromium)

  pyyaml              # Config read/write

  pathlib, json       # Standard lib'
code_structure_for_n03: "# _tools/cex_notebooklm.py\n\nimport argparse, json, time, yaml\nfrom pathlib import Path\nfrom datetime\
  \ import datetime, timezone\n\nCONFIG_PATH = Path(\".cex/config/notebooklm_notebooks.yaml\")\nSTATE_FILE = Path(os.environ.get(\"\
  LOCALAPPDATA\", \"\")) / \"notebooklm-mcp/Data/browser_state/state.json\"\nNOTEBOOKLM_BASE = \"https://notebooklm.google.com\"\
  \n\n# --- Cookie Management ---\ndef load_cookies() -> list[dict]: ...\ndef check_auth(cookies: list) -> bool: ...\n\n#\
  \ --- Config Management ---\ndef load_config() -> dict: ...\ndef save_config(config: dict): ...\ndef resolve_domain(kc_path:\
  \ Path, explicit: str | None) -> str: ...\ndef get_notebook_id(domain: str) -> str | None: ...\n\n# --- Playwright Actions\
  \ ---\ndef create_notebook(name: str, cookies: list) -> str: ...  # returns notebook_id\ndef paste_source(notebook_id: str,\
  \ title: str, content: str, cookies: list) -> bool: ...\ndef activate_studio(notebook_id: str, outputs: list[str], cookies:\
  \ list) -> list[dict]: ...\n\n# --- Subcommands ---\ndef cmd_upload(args): ...\ndef cmd_studio(args): ...\ndef cmd_status(args):\
  \ ...\ndef cmd_list(args): ...\ndef cmd_reauth(args): ...\n\n# --- UI Selectors (PT-BR) ---\nSELECTORS = {\n    \"add_source\"\
  : ['button:has-text(\"Adicionar fontes\")', '[aria-label*=\"Adicionar\"]'],\n    \"copied_text\": [':text(\"Texto copiado\"\
  )', 'button:has-text(\"Texto copiado\")'],\n    \"title_input\": ['input[placeholder*=\"título\"]', 'input[type=\"text\"\
  ]'],\n    \"content_area\": ['textarea[aria-label=\"Texto colado\"]', '.cdk-overlay-pane textarea'],\n    \"insert_btn\"\
  : ['.cdk-overlay-pane button:has-text(\"Inserir\")', 'button:has-text(\"Inserir\")'],\n    \"studio_flashcards\": [':text(\"\
  Cartões didáticos\")'],\n    \"studio_audio\": [':text(\"Resumo em áudio\")'],\n    \"studio_quiz\": [':text(\"Teste\")'],\n\
  }\n\nif name == \"main\":\n    parser = argparse.ArgumentParser(description=\"CEX NotebookLM Pipeline Tool\")\n    # ...\
  \ argparse setup ...\n    main()"
selector_strategy: 'NotebookLM UI is Angular Material (PT-BR locale). Selectors must:

  1. Try PT-BR labels first, EN fallback.

  2. Use `force=True` on clicks to bypass Material overlay (`cdk-overlay-pane`).

  3. Target `aria-label` when text selectors fail.

  4. Fall back to JavaScript injection for Angular `formcontrolname` elements.


  Known selectors (validated in PoC):


  | Element | Primary Selector | Fallback |

  |---------|-----------------|----------|

  | Add sources button | `button:has-text("Adicionar fontes")` | `[aria-label*="Adicionar"]` |

  | Copied text option | `:text("Texto copiado")` | `:text("Copied text")` |

  | Title input | `input[placeholder*="título"]` | `mat-dialog-container input` |

  | Content textarea | `textarea[aria-label="Texto colado"]` | `.cdk-overlay-pane textarea` |

  | Insert button | `.cdk-overlay-pane button:has-text("Inserir")` | `button:has-text("Insert")` |

  | Estúdio panel | `:text("Estúdio")` | `[aria-label*="Studio"]` |


  ---'
