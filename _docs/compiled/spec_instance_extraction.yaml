  {{REGION}}, {{TARGET_COUNT}}, {{BATCH_SOURCES}} |

  | `crm_mission/batch_a_diretorios_pet.md` | `P12_orchestration/templates/tpl_research_batch_directories.md` | {{INDUSTRY}},
  {{REGION}}, {{DIRECTORY_SOURCES}}, {{SEARCH_QUERIES}} |

