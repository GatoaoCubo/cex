what_never_goes_to_main: '| Category | Files | Reason |

  |----------|-------|--------|

  | Contact data | `crm_batch_*.json`, `crm_enrich_*.json` | Private customer data |

  | Brand config values | `brand_config.yaml` (filled) | Brand-specific identity |

  | GDP decisions (filled) | `decision_manifest_brand_{{BRAND_NAME}}.yaml` | Brand-specific choices |

  | API keys / secrets | Any `.env`, auth tokens | Security |'
the_init_flow_how_a_new_brand_uses_templates: "User runs /init\n  │\n  ├── 1. Answers ~6 questions (name, domain, audience,\
  \ tone, language, tagline)\n  │\n  ├── 2. brand_inject.py fills {{BRAND_*}} in all templates\n  │     brand_config.yaml\
  \ created with real values\n  │\n  ├── 3. git checkout -b <brand-slug>\n  │     Branch created from main\n  │\n  ├── 4.\
  \ Templates resolved → artifacts created\n  │     tpl_crm_mission_plan.md → crm_mission/MISSION_PLAN.md\n  │     tpl_crm_dashboard.html\
  \ → dashboard.html\n  │\n  └── 5. N07 dispatches first mission\n        Research pipeline runs with brand context\n    \
  \    CRM populates with real contacts\n        Dashboard shows real data"
implementation: '| Step | Nucleus | What |

  |------|---------|------|

  | 1 | N01 | Read gato-ao-cubo artifacts, extract patterns, identify {{variables}} |

  | 2 | N03 | Create templates in main with mustache variables |

  | 3 | N05 | Update brand_inject.py to resolve new template variables |

  | 4 | N04 | Document all new variables in template registry |

  | 5 | N07 | Test: create mock brand, verify templates fill correctly |'
