wave_2_quality_sweep_karpathy_loop_all_nuclei_parallel_60_min: "Each nucleus runs the Karpathy loop on its own W1 artifacts.\n\
  \nPer nucleus execution:\n# Step 1: heuristic pass (free, mechanical fixes)\nfind N0X_{domain} -name \".md\" -not -path\
  \ \"/compiled/*\" \\\n  | xargs -I{} python _tools/cex_evolve.py heuristic {}\n\n# Step 2: score all (assigns numeric quality\
  \ score)\nfind N0X_{domain} -name \".md\" -not -path \"/compiled/*\" \\\n  | python _tools/cex_score.py --apply\n\n# Step\
  \ 3: agent loop on artifacts still below 8.5\nfind N0X_{domain} -name \".md\" -not -path \"/compiled/*\" \\\n  | xargs grep\
  \ -l \"quality: null\\|quality: 0\\.\" 2>/dev/null \\\n  | head -20 \\\n  | xargs -I{} python _tools/cex_evolve.py auto\
  \ {} --budget 20000 --target 8.5\n\n# Step 4: compile + signal\npython _tools/cex_compile.py --all\npython -c \"from _tools.signal_writer\
  \ import write_signal; write_signal('n0X', 'complete', 9.0)\"\n\nDensification rules (apply during agent loop):\n1. Replace\
  \ prose paragraphs with structured tables where content is tabular\n2. Add cross-references: every artifact must reference\
  \ >= 1 related artifact in its nucleus\n3. Remove filler: \"This {kind} defines...\", \"The purpose of this artifact is...\"\
  \ → delete\n4. Add examples: if `kind=knowledge_card` and no example block → add `## Example` section\n5. Add anti-patterns:\
  \ if `kind=knowledge_card` → add `## Anti-Patterns` with 2-3 entries"
