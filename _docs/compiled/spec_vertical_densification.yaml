tldr: 'Four-wave self-improvement: (1) fix 18 stale .py path refs, (2) Karpathy sweep on 308 unscored artifacts, (3) cross-nucleus
  KC synthesis into reusable shared artifacts, (4) CoC convergence via pattern/few_shot/reasoning_trace artifacts.'
density_score: 0.96
the_problem_architecture_against_itself: 'Running the new architecture (post-SELF_ASSEMBLY) against the old one reveals three
  classes of debt:'
class_1_code_debt_18_stale_python_files: 'STRUCT_ALIGN V2 moved root `P0x_*` → `N00_genesis/P0x_*`.

  18 Python tools still point at the old paths:


  | File | Stale refs | Impact |

  |------|-----------|--------|

  | `cex_pipeline.py` | 9 | pillar routing broken |

  | `cex_forge.py` | 9 | artifact creation broken |

  | `cex_init.py` | 9 | init flow broken |

  | `cex_feedback.py` | 9 | quality tracking broken |

  | `cex_prompt_layers.py` | 3 | layer loading fails |

  | `cex_run.py` | 3 | unified entry broken |

  | `cex_system_test.py` | 3 | 3 test assertions wrong |

  | `cex_8f_motor.py` | 1 | KC library path wrong |

  | + 10 more | 1-2 each | silent failures |


  Pattern in stale code: `PILLAR_MAP = {"P01": "P01_knowledge", ...}` without `N00_genesis/` prefix.

  Fix: `PILLAR_MAP = {"P01": "N00_genesis/P01_knowledge", ...}` — mechanical, no logic change.'
class_2_quality_debt_308_unscored_artifacts: "Every artifact built in SELF_ASSEMBLY W1 has `quality: null`.\nCEX rule: quality\
  \ is assigned by peer review, never self-scored.\nBut `cex_evolve.py` provides the Karpathy loop for autonomous improvement\
  \ before peer review.\n\nDistribution of 308 unscored artifacts:\nP01: 42  P06: 39  P09: 38  P07: 36  P10: 33  P11: 32\n\
  P04: 22  P05: 18  P03: 15  P08: 7   P12: 5   P02: 3\n\nThe Karpathy formula (already in CEX):\nprogram.md (strategy hints,\
  \ read-only)\n    +\ntarget artifact (the one being improved)\n    +\ncex_score.py (immutable metric)\n    =\nagent loop:\
  \ hypothesis → apply → score → keep if better\n\nModes: `heuristic` (free, mechanical fixes) → `auto` (heuristic + agent\
  \ if needed) → `agent` (full LLM loop, budget-tracked)"
class_3_cross_synthesis_gap_isolated_nuclei: 'Each nucleus built its own KCs in isolation. No artifact yet exists that:

  - Synthesizes patterns ACROSS N01-N06 (cross-domain knowledge graph)

  - Encodes the 8F pipeline as a reusable `few_shot_example` any LLM can follow

  - Defines the CoC conventions as a `pattern` artifact (not a rule document, but a BUILD PATTERN)

  - Creates shared `mental_model` artifacts readable by Claude/Codex/Gemini/Ollama equally


  This is the LLM-reusability gap: artifacts are CEX-specific, not cross-runtime portable.


  ---'
the_formulas_already_in_cex_apply_them: ''
formula_1_karpathy_loop: "# cex_evolve.py agent <file> --budget 30000 --target 9.0\n# For each artifact below quality threshold:\n\
  score_before = cex_score(artifact)\nfor round in range(max_rounds=3):\n    hypothesis = llm_generate(program_hints + artifact\
  \ + \"improve to 9.0\")\n    apply(hypothesis, artifact)\n    score_after = cex_score(artifact)\n    if score_after > score_before:\n\
  \        keep(); break\n    else:\n        discard(); try_next_hypothesis()\n\nApply to: all 308 quality:null artifacts\
  \ in W1 batches per nucleus."
formula_2_construction_triad_f4_reason: "Template-First (60%+ match):\n  Find similar artifact in N00_genesis/P{xx}/examples/\
  \ or N0x/P{xx}/\n  Adapt it: replace domain-specific content, keep structure\n  Density gain: +0.08-0.12 vs fresh generation\n\
  \nHybrid (30-60% match):\n  Merge template sections with fresh domain content\n  Use N00 archetype as structural skeleton\n\
  \nFresh (<30% match):\n  Generate from scratch using builder ISOs\n  Reference 3+ existing artifacts for grounding\n\nApply\
  \ to: new cross-synthesis artifacts in Wave 3."
formula_3_density_optimization: "density_score = (unique_content_units / total_content_units) × coverage_factor\nTarget: >=\
  \ 0.85\n\nLow density causes:\n  - Filler sentences (\"This artifact defines...\")\n  - Repeated headers without content\n\
  \  - Prose where tables would work\n  - Missing cross-references\n\nFix: replace prose with tables, add cross-refs, remove\
  \ filler, add examples\n\nApply to: any artifact with density_score < 0.85 in W1 batch."
formula_4_convention_over_configuration_coc: "Convention: every artifact follows N00_genesis structure WITHOUT explicit config\n\
  Configuration: when a nucleus OVERRIDES a convention, it must be explicit\n\nCoC compliance check:\n  - Frontmatter fields\
  \ match N00_genesis/_schema.yaml\n  - File naming: {kind}_{domain_suffix}.md\n  - Pillar placement: N0X_{domain}/P{xx}{name}/{kind}{domain}.md\n\
  \  - Cross-reference format: relative path, not absolute\n  - Kind names: from kinds_meta.json only (no invented kinds)\n\
  \nApply to: every new artifact via F7 GOVERN + new `pattern` artifacts that encode the convention.\n\n---"
the_vision: 'After this spec executes:


  1. All 18 stale .py files updated → pillar routing works correctly for all tools

  2. 308 artifacts scored and improved → quality baseline established

  3. Cross-nucleus synthesis artifacts → shared knowledge graph + universal patterns that any LLM runtime can consume

  4. Purposeful lines in every artifact → no filler, tables > prose, cross-references present

  5. CoC pattern artifacts → the conventions are encoded as BUILD ARTIFACTS, not just documentation


  The distinction at (3): artifacts written in ubiquitous language (F2b SPEAK protocol) are portable across runtimes. An artifact
  that says "use the 8F pipeline" is CEX-specific. An artifact that says "use this intent_resolution → retrieval → generation
  → validation sequence with these interfaces" is universally readable.


  ---'
wave_structure: ''
