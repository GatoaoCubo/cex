  \ path |\n| `_tools/cex_handoff_composer.py` | 2 | pillar refs |\n| `_tools/cex_preflight.py` | 2 | pillar scan |\n| `_tools/cex_reranker.py`\
  \ | 1 | pillar path |\n| `_tools/cex_research.py` | 1 | pillar ref |\n| `_tools/cex_source_harvester.py` | 2 | pillar scan\
