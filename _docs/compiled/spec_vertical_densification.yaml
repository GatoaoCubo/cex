  Method:  find overlapping concepts across >= 3 nuclei\n         → synthesize into a shared artifact\n         → place in\
  \ N04_knowledge (the knowledge nucleus owns cross-domain synthesis)\n\nArtifacts to create:\n\n| Action | Path | Kind |\
  \ Source | Notes |\n|--------|------|------|--------|-------|\n| CREATE | N04_knowledge/P01_knowledge/knowledge_graph_cex_domains.md\
  \ | knowledge_graph | N01-N06 vocab KCs | Cross-domain concept map |\n| CREATE | N04_knowledge/P01_knowledge/ontology_cex_taxonomy.md\
  \ | ontology | kinds_meta.json + pillar schemas | Formal CEX taxonomy for any LLM |\n| CREATE | N00_genesis/P03_prompt/few_shot_example_8f_research.md\
  \ | few_shot_example | N01 artifacts | 8F applied to research task |\n| CREATE | N00_genesis/P03_prompt/few_shot_example_8f_build.md\
  \ | few_shot_example | N03 artifacts | 8F applied to build task |\n| CREATE | N00_genesis/P03_prompt/few_shot_example_8f_deploy.md\
  \ | few_shot_example | N05 artifacts | 8F applied to ops task |\n| CREATE | N00_genesis/P08_architecture/pattern_coc_nucleus.md\
  \ | pattern | N00 structure | CoC convention for nucleus structure |\n| CREATE | N00_genesis/P08_architecture/pattern_portfolio_assembly.md\
  \ | pattern | spec_nucleus_self_assembly | Portfolio assembly build pattern |\n| CREATE | N04_knowledge/P10_memory/knowledge_graph_cross_nucleus.md\
  \ | knowledge_graph | all nuclei P01 | Shared entity graph N01-N06 |\n| CREATE | N00_genesis/P02_model/mental_model_8f_pipeline.md\
  \ | mental_model | 8f-reasoning.md | 8F as a mental model for any LLM |\n| CREATE | N00_genesis/P02_model/mental_model_cex_architecture.md\
