purpose: This spec catalogs every trigger phrase (EN + PT) that activates CEX intent resolution. It is the reference for `cex_8f_motor.py`
  synonym expansion and `cex_query.py` TF-IDF vocabulary enrichment.
how_to_use_this_spec: '| Consumer | Usage |

  |----------|-------|

  | `cex_8f_motor.py` | Match user input against seed words -> resolve to kind + pillar |

  | `cex_query.py` | Expand TF-IDF vocabulary with seed word synonyms |

  | `cex_retriever.py` | Add seed words to retrieval corpus for better recall |

  | N07 orchestrator | Map user intent to dispatch target (nucleus + kind) |

  | Kind KCs | Populate `user_says` and `long_tails` frontmatter fields |'
