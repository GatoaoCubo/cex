# 8F_BUILDER_MAP.yaml
# CEX — Mapeamento completo de 71 builders para as 8 funcoes do LLM Pipeline
# Author: PYTHA | Wave: 6A | Created: 2026-03-28 | Quality: 9.2
# Source: LLM_PIPELINE.md + TAXONOMY_LAYERS.yaml + 71 builder manifests
#
# Estrutura:
#   primary_builders:   SEMPRE acionados quando funcao eh executada
#   secondary_builders: Acionados SE intent menciona keywords especificas
#   optional_builders:  Nice-to-have — elevam qualidade
#
# Validacao: sum(unique builders across all tiers) == 71
# builders_unassigned: []

functions:

  BECOME:
    description: "Quem eu sou? — configura identidade, persona, regras antes de tudo"
    position: 2
    pillars: [P02, P03]
    pipeline_rule: "executa depois de CONSTRAIN, antes de INJECT"
    primary_builders:
      - agent-builder          # P02 — entidade executora completa (persona + iso_vectorstore)
      - system-prompt-builder  # P03 — identidade + regras ALWAYS/NEVER
      - model-card-builder     # P02 — spec do modelo LLM (pricing, context, capabilities)
      - boot-config-builder    # P02 — configuracao de inicializacao por provider
      - iso-package-builder    # P02 — pacote portavel e self-contained do agente
    secondary_builders:
      - mental-model-builder   # P02 (design-time blueprint) — ativado se "routing" ou "decisoes"
      - router-builder         # P02 — ativado se "roteamento" ou "task->satellite"
      - fallback-chain-builder # P02 — ativado se "fallback" ou "resiliente"
      - lens-builder           # P02 — ativado se "perspectiva" ou "especializado em"
      - director-builder       # P08/satellite_spec — ativado se "satelite" ou "sistema completo"
    optional_builders:
      - _builder-builder       # meta — apenas em intents meta ("reconstroi o builder")
    keywords_that_activate_secondary:
      mental-model-builder: [routing, decisoes, blueprint, design-time]
      router-builder: [roteamento, task-satellite, dispatch, keyword-routing]
      fallback-chain-builder: [fallback, resiliente, model-a-b-c]
      lens-builder: [perspectiva, especializado, visao de]
      director-builder: [satelite, sistema completo, satellite-spec, P08]

  INJECT:
    description: "O que eu sei? — fornece contexto e conhecimento ao LLM"
    position: 3
    pillars: [P01, P10]
    pipeline_rule: "executa depois de BECOME, antes de REASON"
    primary_builders:
      - knowledge-card-builder  # P01 — fato atomico pesquisavel
      - rag-source-builder      # P01 — fonte externa indexavel para RAG
      - context-doc-builder     # P01 — contexto de dominio rico
      - few-shot-example-builder # P01 — exemplos input/output para prompt
    secondary_builders:
      - glossary-entry-builder  # P01 — ativado se "termos", "glossario", "multilingue"
      - embedding-config-builder # P01 — ativado se "RAG", "busca semantica", "embeddings"
      - brain-index-builder     # P10 — ativado se "indice", "BM25", "FAISS", "memoria"
      - learning-record-builder # P10 — ativado se "aprendizado", "historico", "registro"
      - axiom-builder           # P10 — ativado se "axioma", "regra fundamental", "inviolavel"
    optional_builders:
      - runtime-state-builder   # P10 — ativado se "estado persistente", "runtime memory"
      - session-state-builder   # P10 — ativado se "session", "estado efemero"
      - mental-model-builder    # P10 (aspecto runtime) — quando BECOME ja ativou P02 aspect
    keywords_that_activate_secondary:
      glossary-entry-builder: [glossario, termos, definicao, multilingue]
      embedding-config-builder: [RAG, embeddings, busca semantica, vector]
      brain-index-builder: [indice, BM25, FAISS, brain, memoria persistente]
      learning-record-builder: [aprendizado, historico, registro, learning]
      axiom-builder: [axioma, inviolavel, regra fundamental, nunca]

  REASON:
    description: "Como penso? — raciocina, planeja, decompoe antes de agir"
    position: 4
    pillars: [P03]
    pipeline_rule: "executa depois de INJECT, antes de CALL"
    primary_builders:
      - instruction-builder     # P03 — receita operacional passo-a-passo
      - chain-builder           # P03 — sequencia de prompts (A->B->C)
      - prompt-template-builder # P03 — template com vars para reuso
    secondary_builders:
      - action-prompt-builder   # P03 — ativado se "prompt de acao", "task-focused"
      - router-builder          # P02 — ativado se "logica de routing", "decide qual agente"
      - dag-builder             # P12 — ativado se "dependencias", "grafo", "sequenciamento"
    optional_builders:
      - director-builder        # P08 — ativado se "orquestracao complexa", "multi-satelite"
    keywords_that_activate_secondary:
      action-prompt-builder: [prompt de acao, task-focused, conversacional]
      router-builder: [decide qual, routing logic, escolhe agente, keyword->satellite]
      dag-builder: [dependencias, grafo aciclico, sequenciamento, ordem de execucao]
      director-builder: [orquestracao complexa, multi-satelite, sistema hierarquico]

  CALL:
    description: "Que tools uso? — invoca ferramentas externas, APIs, MCPs, CLIs"
    position: 5
    pillars: [P04]
    pipeline_rule: "executa depois de REASON, antes de PRODUCE"
    primary_builders:
      - skill-builder           # P04 — habilidade reutilizavel com phases + trigger
      - mcp-server-builder      # P04 — servidor MCP com tools + resources
      - cli-tool-builder        # P04 — ferramenta CLI
      - connector-builder       # P04 — conector de servico externo
      - scraper-builder         # P04 — extrator de dados web
      - client-builder          # P04 — cliente de API REST/GraphQL
    secondary_builders:
      - hook-builder            # P04 — ativado se "pre/pos processing", "evento"
      - plugin-builder          # P04 — ativado se "plugin", "extensao"
      - daemon-builder          # P04 — ativado se "background", "daemon", "processo continuo"
    optional_builders: []
    keywords_that_activate_secondary:
      hook-builder: [hook, pre-processing, pos-processing, evento, trigger]
      plugin-builder: [plugin, extensao, plugavel]
      daemon-builder: [daemon, background, processo continuo, watcher]

  PRODUCE:
    description: "O que gero? — produz output final: texto, codigo, dados"
    position: 6
    pillars: [P05]
    pipeline_rule: "executa depois de CALL, antes de CONSTRAIN"
    primary_builders:
      - response-format-builder # P05 — formato de resposta do LLM
      - formatter-builder       # P05 — formatador de saida estruturado
      - parser-builder          # P05 — extrator de dados do output
    secondary_builders:
      - naming-rule-builder     # P05 — ativado se "convencao de nomes", "naming"
      - action-prompt-builder   # P03 — ativado se o prompt EH o output final
    optional_builders:
      - chain-builder           # P03 — quando chain de prompts eh o artefato entregue
    keywords_that_activate_secondary:
      naming-rule-builder: [naming, convencao de nomes, nomenclatura, prefixo]
      action-prompt-builder: [o output eh um prompt, gera prompt, prompt como entregavel]
      chain-builder: [chain como entregavel, sequencia de prompts como output]

  CONSTRAIN:
    description: "Esta no formato certo? — valida contra schemas, regras, contratos"
    position: 1
    pillars: [P06, P08, P09]
    pipeline_rule: "executa PRIMEIRO — schemas definem o contrato antes de tudo"
    primary_builders:
      - validator-builder       # P06 — regra de validacao de artefato
      - input-schema-builder    # P06 — contrato de entrada
      - interface-builder       # P06 — contrato de integracao entre agentes
      - validation-schema-builder # P06 — schema completo de validacao
      - type-def-builder        # P06 — definicao de tipo customizado
      - validator-builder-codex # P06 — variante Codex para validacao de codigo
    secondary_builders:
      - law-builder             # P08 — ativado se "lei", "inviolavel", "never/always"
      - pattern-builder         # P08 — ativado se "pattern reutilizavel", "template de arquitetura"
      - guardrail-builder       # P11 — ativado se "safety", "restricao de seguranca"
      - component-map-builder   # P08 — ativado se "mapa de componentes", "arquitetura"
      - diagram-builder         # P08 — ativado se "diagrama", "visualizacao de arquitetura"
    optional_builders:
      - env-config-builder      # P09 — ativado se "variaveis de ambiente", ".env"
      - path-config-builder     # P09 — ativado se "caminhos do sistema", "paths"
      - feature-flag-builder    # P09 — ativado se "feature flag", "on/off", "toggle"
      - runtime-rule-builder    # P09 — ativado se "timeout", "retries", "rate limit"
      - permission-builder      # P09 — ativado se "permissoes", "rbac", "acesso"
    keywords_that_activate_secondary:
      law-builder: [lei, inviolavel, always, never, obrigatorio]
      pattern-builder: [pattern, reutilizavel, template de arquitetura]
      guardrail-builder: [safety, seguranca, restricao, boundary]
      component-map-builder: [componentes, mapa de sistema, arquitetura]
      diagram-builder: [diagrama, visual, mermaid, arquitetura visual]

  GOVERN:
    description: "Passou no quality gate? — evals, benchmarks, quality gates, feedback"
    position: 7
    pillars: [P07, P11]
    pipeline_rule: "executa depois de PRODUCE, antes de COLLABORATE"
    primary_builders:
      - quality-gate-builder    # P11 — barreira de qualidade (pass/fail com score)
      - scoring-rubric-builder  # P07 — criterio de avaliacao 5D/12LP/custom
      - golden-test-builder     # P07 — caso de teste referencia (quality 9.5+)
      - unit-eval-builder       # P07 — teste unitario de agente/prompt
      - e2e-eval-builder        # P07 — teste end-to-end (pipeline completo)
    secondary_builders:
      - benchmark-builder       # P07 — ativado se "performance", "latencia", "custo"
      - smoke-eval-builder      # P07 — ativado se "sanidade rapida", "smoke test"
      - lifecycle-rule-builder  # P11 — ativado se "ciclo de vida", "archive", "promote"
      - optimizer-builder       # P11 — ativado se "otimiza", "melhora continua", "metric->action"
      - bugloop-builder         # P11 — ativado se "bug", "correcao automatica", "fix loop"
    optional_builders:
      - guardrail-builder       # P11 — safety gate (ja pode estar em CONSTRAIN)
      - permission-builder      # P09/P11 — access control gate
    keywords_that_activate_secondary:
      benchmark-builder: [performance, latencia, custo, throughput, benchmark]
      smoke-eval-builder: [sanidade, smoke, rapido, pre-deploy]
      lifecycle-rule-builder: [ciclo de vida, archive, promote, deprecate]
      optimizer-builder: [otimiza, melhora continua, metric, reduce cost]
      bugloop-builder: [bug, correcao automatica, auto-fix, loop de correcao]

  COLLABORATE:
    description: "Quem recebe? — sinaliza, delega, propaga para proximo agente"
    position: 8
    pillars: [P12]
    pipeline_rule: "executa por ULTIMO — depois de GOVERN"
    primary_builders:
      - signal-builder          # P12 — sinal atomico entre agentes (complete/error/progress)
      - handoff-builder         # P12 — instrucao de handoff (task + context + commit)
      - workflow-builder        # P12 — fluxo de trabalho multi-step com agentes
      - spawn-config-builder    # P12 — configuracao de spawn (solo, grid, continuous)
      - dispatch-rule-builder   # P12 — regra de despacho (keyword->satellite)
    secondary_builders:
      - dag-builder             # P12 — ativado se "grafo de dependencias de runtime"
      - hook-builder            # P12 — ativado se "lifecycle hook", "pre/pos agent"
    optional_builders:
      - director-builder        # P08 — orquestracao de alto nivel entre satelites
    keywords_that_activate_secondary:
      dag-builder: [grafo de runtime, dependencias entre agentes, orchestration dag]
      hook-builder: [lifecycle hook, pre-agent, pos-agent, event chain]
      director-builder: [multi-satelite, sistema hierarquico, orquestracao de nivel superior]

