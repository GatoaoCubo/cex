<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GATO³ — CRM Orgânico | Pipeline B2B ABC Paulista</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
    --g3-black:#000;--g3-charcoal:#1F1F1F;--g3-steel:#7A7A7A;--g3-silver:#D1D1D1;--g3-white:#FFF;
    --bg:var(--g3-white);--bg-side:var(--g3-charcoal);--bg-card:var(--g3-white);--bg-hover:#F5F5F5;
    --text-1:var(--g3-black);--text-2:var(--g3-steel);--text-3:var(--g3-silver);
    --border:#E5E5E5;--border-s:var(--g3-silver);
    --shadow:0 1px 3px rgba(0,0,0,.06);--shadow-h:0 4px 12px rgba(0,0,0,.08);
    --r:12px;--rs:8px;--t:200ms ease;--font:'Inter',-apple-system,sans-serif;
    --green:#16A34A;--green-bg:#F0FDF4;--orange:#EA580C;--orange-bg:#FFF7ED;
    --blue:#2563EB;--blue-bg:#EFF6FF;--red:#DC2626;--red-bg:#FEF2F2;
    --purple:#7C3AED;--purple-bg:#F5F3FF;
}
[data-theme="dark"]{
    --bg:#0A0A0A;--bg-side:#111;--bg-card:var(--g3-charcoal);--bg-hover:#2A2A2A;
    --text-1:var(--g3-white);--text-2:var(--g3-silver);--text-3:var(--g3-steel);
    --border:#333;--border-s:#555;--shadow:0 1px 3px rgba(0,0,0,.3);
    --green-bg:#052E16;--orange-bg:#431407;--blue-bg:#172554;--red-bg:#450A0A;--purple-bg:#2E1065;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-font-smoothing:antialiased}
body{font-family:var(--font);background:var(--bg);color:var(--text-1);line-height:1.5;min-height:100vh}

.app{display:flex;min-height:100vh}
.sidebar{width:260px;background:var(--bg-side);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;bottom:0;z-index:100}
.main{margin-left:260px;flex:1;min-height:100vh}

.sb-brand{padding:20px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-brand h1{font-size:1.4rem;font-weight:800;color:#fff;letter-spacing:-.02em}
.sb-brand sup{font-size:.7rem;color:var(--g3-steel)}
.sb-brand .tag{display:block;font-size:.65rem;color:var(--g3-steel);text-transform:uppercase;letter-spacing:.06em;margin-top:4px}
.sb-stats{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-stat{display:flex;justify-content:space-between;padding:6px 0;font-size:.78rem}
.sb-stat .l{color:rgba(255,255,255,.5)}
.sb-stat .v{color:#fff;font-weight:600}
.sb-filters{padding:16px 20px;flex:1;overflow-y:auto}
.sb-section{margin-bottom:16px}
.sb-section-label{font-size:.65rem;font-weight:600;color:var(--g3-steel);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.filter-btn{display:block;width:100%;text-align:left;padding:7px 10px;border-radius:var(--rs);border:none;background:transparent;color:rgba(255,255,255,.55);font-size:.8rem;font-family:var(--font);cursor:pointer;transition:all var(--t)}
.filter-btn:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85)}
.filter-btn.active{background:rgba(255,255,255,.1);color:#fff}
.filter-btn .count{float:right;font-size:.7rem;opacity:.6}
.sb-footer{padding:12px 20px;border-top:1px solid rgba(255,255,255,.08)}
.sb-footer .dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;margin-right:6px;animation:pulse 2s infinite}
.sb-footer span{font-size:.72rem;color:var(--g3-steel)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

.topbar{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--border);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(8px)}
.topbar-left{display:flex;align-items:center;gap:14px}
.topbar-title{font-size:.95rem;font-weight:600}
.topbar-sub{font-size:.78rem;color:var(--text-2)}
.search-box{display:flex;align-items:center;gap:8px;background:var(--bg-hover);border:1px solid var(--border);border-radius:var(--rs);padding:7px 12px;min-width:280px;transition:border var(--t)}
.search-box:focus-within{border-color:var(--text-1)}
.search-box svg{width:16px;height:16px;color:var(--text-2);flex-shrink:0}
.search-box input{border:none;background:transparent;outline:none;font-size:.82rem;font-family:var(--font);color:var(--text-1);width:100%}
.btn-icon{width:34px;height:34px;border-radius:var(--rs);border:1px solid var(--border);background:var(--bg-card);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-2);transition:all var(--t)}
.btn-icon:hover{border-color:var(--text-1);color:var(--text-1)}
.btn-icon svg{width:16px;height:16px}
.topbar-right{display:flex;align-items:center;gap:8px}

.content{padding:24px 28px}

.kpi-row{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:20px}
.kpi{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:16px;transition:all var(--t)}
.kpi:hover{box-shadow:var(--shadow-h)}
.kpi .label{font-size:.72rem;font-weight:500;color:var(--text-2);margin-bottom:4px}
.kpi .val{font-size:1.4rem;font-weight:700;letter-spacing:-.02em}
.kpi .sub{font-size:.7rem;color:var(--text-2);margin-top:2px}

.pipeline{display:flex;gap:8px;margin-bottom:20px;padding:4px;background:var(--bg-hover);border-radius:var(--rs);overflow-x:auto}
.pipe-seg{flex:1;text-align:center;padding:8px 12px;border-radius:6px;font-size:.78rem;font-weight:500;cursor:pointer;transition:all var(--t);min-width:80px;white-space:nowrap}
.pipe-seg:hover{background:var(--bg-card)}
.pipe-seg.active{background:var(--bg-card);box-shadow:var(--shadow);font-weight:600}
.pipe-seg .n{font-size:1.1rem;font-weight:700;display:block;line-height:1}

.table-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.table-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.table-header h2{font-size:.9rem;font-weight:600}
.table-header .count-label{font-size:.78rem;color:var(--text-2)}
.tbl-wrap{overflow-x:auto;max-height:calc(100vh - 340px);overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:.82rem}
thead th{padding:10px 14px;text-align:left;font-size:.7rem;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0;background:var(--bg-card);z-index:1}
tbody td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr{transition:background var(--t);cursor:pointer}
tbody tr:hover{background:var(--bg-hover)}
tbody tr:last-child td{border-bottom:none}

.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:16px;font-size:.68rem;font-weight:600;white-space:nowrap}
.b-green{color:var(--green);background:var(--green-bg)}
.b-orange{color:var(--orange);background:var(--orange-bg)}
.b-blue{color:var(--blue);background:var(--blue-bg)}
.b-red{color:var(--red);background:var(--red-bg)}
.b-purple{color:var(--purple);background:var(--purple-bg)}
.b-gray{color:var(--text-2);background:var(--bg-hover)}
.b-dark{color:#fff;background:var(--g3-charcoal)}

.contacts{display:flex;gap:4px;align-items:center}
.c-icon{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;text-decoration:none;transition:all var(--t);border:1px solid var(--border)}
.c-icon:hover{transform:scale(1.1);box-shadow:var(--shadow-h)}
.c-wpp{color:#25D366;border-color:#25D366}
.c-wpp:hover{background:#25D366;color:#fff}
.c-tel{color:var(--blue);border-color:var(--blue)}
.c-tel:hover{background:var(--blue);color:#fff}
.c-ig{color:#E4405F;border-color:#E4405F}
.c-ig:hover{background:#E4405F;color:#fff}
.c-web{color:var(--g3-charcoal);border-color:var(--g3-charcoal)}
.c-web:hover{background:var(--g3-charcoal);color:#fff}
.c-map{color:var(--orange);border-color:var(--orange)}
.c-map:hover{background:var(--orange);color:#fff}
.c-email{color:var(--purple);border-color:var(--purple)}
.c-email:hover{background:var(--purple);color:#fff}

.status-sel{font-size:.72rem;padding:3px 6px;border-radius:var(--rs);border:1px solid var(--border);background:var(--bg-card);font-family:var(--font);cursor:pointer;color:var(--text-1)}

.biz-name{font-weight:600;font-size:.84rem}
.biz-sub{font-size:.7rem;color:var(--text-2)}
.felino-star{color:var(--purple);font-size:.8rem;margin-left:4px}

.detail-panel{position:fixed;top:0;right:0;bottom:0;width:420px;background:var(--bg-card);border-left:1px solid var(--border);z-index:200;transform:translateX(100%);transition:transform .25s ease;overflow-y:auto;box-shadow:-4px 0 20px rgba(0,0,0,.1)}
.detail-panel.open{transform:translateX(0)}
.detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:190;display:none}
.detail-overlay.open{display:block}
.dp-header{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between}
.dp-header h2{font-size:1.1rem;font-weight:700}
.dp-close{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-2);font-size:1rem;transition:all var(--t)}
.dp-close:hover{background:var(--bg-hover);color:var(--text-1)}
.dp-body{padding:20px}
.dp-field{margin-bottom:14px}
.dp-field .lbl{font-size:.7rem;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.dp-field .val{font-size:.85rem}
.dp-contacts{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0}
.dp-contact-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--rs);border:1px solid var(--border);background:var(--bg-card);font-size:.78rem;font-family:var(--font);cursor:pointer;text-decoration:none;color:var(--text-1);transition:all var(--t)}
.dp-contact-btn:hover{background:var(--bg-hover);border-color:var(--text-1)}

@media(max-width:1024px){
    .sidebar{display:none}
    .main{margin-left:0}
    .kpi-row{grid-template-columns:repeat(3,1fr)}
    .detail-panel{width:100%}
}
@media(max-width:640px){
    .kpi-row{grid-template-columns:repeat(2,1fr)}
    .content{padding:16px}
    .search-box{min-width:auto;flex:1}
}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease forwards}
</style>
</head>
<body>
<div class="app">

<!-- SIDEBAR -->
<aside class="sidebar">
    <div class="sb-brand">
        <h1>GATO<sup>3</sup></h1>
        <span class="tag">CRM Organico — Pipeline B2B</span>
    </div>
    <div class="sb-stats" id="sb-stats"></div>
    <div class="sb-filters">
        <div class="sb-section">
            <div class="sb-section-label">Potencial B2B</div>
            <div id="filter-pot"></div>
        </div>
        <div class="sb-section">
            <div class="sb-section-label">Segmento</div>
            <div id="filter-seg"></div>
        </div>
        <div class="sb-section">
            <div class="sb-section-label">Cidade</div>
            <div id="filter-city"></div>
        </div>
    </div>
    <div class="sb-footer">
        <span class="dot"></span>
        <span>Dados reais — ABC Paulista</span>
    </div>
</aside>

<!-- MAIN -->
<div class="main">
    <header class="topbar">
        <div class="topbar-left">
            <div>
                <div class="topbar-title">Pipeline de Prospecção B2B</div>
                <div class="topbar-sub">141 negócios reais do CRM — ABC Paulista + Grande SP</div>
            </div>
        </div>
        <div class="search-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="search" placeholder="Buscar nome, CNPJ, cidade, segmento..." oninput="applyFilters()">
        </div>
        <div class="topbar-right">
            <button class="btn-icon" onclick="toggleTheme()" title="Alternar tema">
                <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            </button>
            <button class="btn-icon" onclick="exportCSV()" title="Exportar CSV filtrado">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </button>
        </div>
    </header>

    <div class="content">
        <div class="kpi-row" id="kpis"></div>
        <div class="pipeline" id="pipeline"></div>
        <div class="table-card fade-in">
            <div class="table-header">
                <h2>Negocios</h2>
                <span class="count-label" id="count-label"></span>
            </div>
            <div class="tbl-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Negocio</th>
                            <th>Cidade</th>
                            <th>Potencial</th>
                            <th>Segmento</th>
                            <th>Porte</th>
                            <th>Rating</th>
                            <th>Contatos</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</div>

<!-- Detail Panel -->
<div class="detail-overlay" id="detail-overlay" onclick="closeDetail()"></div>
<div class="detail-panel" id="detail-panel">
    <div class="dp-header">
        <h2 id="dp-name"></h2>
        <button class="dp-close" onclick="closeDetail()">&#x2715;</button>
    </div>
    <div class="dp-body" id="dp-body"></div>
</div>

<script>
/* __CRM_DATA_PLACEHOLDER__ */

// State
let activeFilters = {pot:'all', seg:'all', city:'all', status:null};
let outreachStatus = JSON.parse(localStorage.getItem('gato3_crm_status')||'{}');

const SEG_LABELS = {
    pet_shop:'Pet Shop', clinica_vet:'Clinica Vet', banho_tosa:'Banho & Tosa',
    hotel_pet:'Hotel Pet', creche_pet:'Creche Pet', distribuidor:'Distribuidor', ong:'ONG'
};
const POT_LABELS = {'MAXIMO':'S+', muito_alto:'S', alto:'Tier 1', medio:'Tier 2', baixo:'Tier 3'};
const POT_ORDER = ['MAXIMO','muito_alto','alto','medio','baixo'];
const POT_BADGE = {'MAXIMO':'b-red', muito_alto:'b-purple', alto:'b-green', medio:'b-blue', baixo:'b-gray'};
const STATUS_OPTIONS = ['Novo','Contatar','Contatado','Negociando','Fechado','Descartado'];

function init() {
    renderKPIs();
    renderSidebarStats();
    renderSidebarFilters();
    renderPipeline();
    renderTable();
}

function renderKPIs() {
    const total = CRM_DATA.length;
    const felino = CRM_DATA.filter(d => d.felino==='true'||d.felino===true).length;
    const wpp = CRM_DATA.filter(d => d.wpp).length;
    const ig = CRM_DATA.filter(d => d.ig).length;
    const alto = CRM_DATA.filter(d => ['alto','muito_alto','MAXIMO'].includes(d.pot)).length;
    const cities = new Set(CRM_DATA.map(d => d.cid)).size;
    document.getElementById('kpis').innerHTML =
        '<div class="kpi"><div class="label">Total Negocios</div><div class="val">'+total+'</div><div class="sub">ABC Paulista + Grande SP</div></div>'+
        '<div class="kpi"><div class="label">Alta Prioridade</div><div class="val" style="color:var(--green)">'+alto+'</div><div class="sub">Tier 1 + S + S+</div></div>'+
        '<div class="kpi"><div class="label">Foco Felino</div><div class="val" style="color:var(--purple)">'+felino+'</div><div class="sub">'+(felino/total*100).toFixed(1)+'% do mercado</div></div>'+
        '<div class="kpi"><div class="label">Com WhatsApp</div><div class="val">'+wpp+'</div><div class="sub">Canal direto</div></div>'+
        '<div class="kpi"><div class="label">Com Instagram</div><div class="val">'+ig+'</div><div class="sub">Presenca digital</div></div>'+
        '<div class="kpi"><div class="label">Cidades</div><div class="val">'+cities+'</div><div class="sub">Ring 1 + Ring 2</div></div>';
}

function renderSidebarStats() {
    var contacted = 0, closed = 0;
    for (var k in outreachStatus) {
        if (outreachStatus[k] !== 'Novo') contacted++;
        if (outreachStatus[k] === 'Fechado') closed++;
    }
    document.getElementById('sb-stats').innerHTML =
        '<div class="sb-stat"><span class="l">Total leads</span><span class="v">'+CRM_DATA.length+'</span></div>'+
        '<div class="sb-stat"><span class="l">Contatados</span><span class="v">'+contacted+'</span></div>'+
        '<div class="sb-stat"><span class="l">Fechados</span><span class="v">'+closed+'</span></div>'+
        '<div class="sb-stat"><span class="l">Conversao</span><span class="v">'+(contacted ? ((closed/contacted*100).toFixed(1)+'%') : '—')+'</span></div>';
}

function renderSidebarFilters() {
    var pots = {}, segs = {}, cities = {};
    CRM_DATA.forEach(function(d) {
        pots[d.pot] = (pots[d.pot]||0) + 1;
        segs[d.seg] = (segs[d.seg]||0) + 1;
        if (d.cid) cities[d.cid] = (cities[d.cid]||0) + 1;
    });

    var html = '<button class="filter-btn active" onclick="setFilter(\'pot\',\'all\',this)">Todos<span class="count">'+CRM_DATA.length+'</span></button>';
    POT_ORDER.forEach(function(p) {
        if (pots[p]) html += '<button class="filter-btn" onclick="setFilter(\'pot\',\''+p+'\',this)">'+(POT_LABELS[p]||p)+'<span class="count">'+pots[p]+'</span></button>';
    });
    document.getElementById('filter-pot').innerHTML = html;

    html = '<button class="filter-btn active" onclick="setFilter(\'seg\',\'all\',this)">Todos<span class="count">'+CRM_DATA.length+'</span></button>';
    Object.keys(segs).sort(function(a,b){return segs[b]-segs[a]}).forEach(function(s) {
        html += '<button class="filter-btn" onclick="setFilter(\'seg\',\''+s+'\',this)">'+(SEG_LABELS[s]||s)+'<span class="count">'+segs[s]+'</span></button>';
    });
    document.getElementById('filter-seg').innerHTML = html;

    html = '<button class="filter-btn active" onclick="setFilter(\'city\',\'all\',this)">Todas<span class="count">'+CRM_DATA.length+'</span></button>';
    Object.keys(cities).sort(function(a,b){return cities[b]-cities[a]}).forEach(function(c) {
        html += '<button class="filter-btn" onclick="setFilter(\'city\',\''+c+'\',this)">'+c+'<span class="count">'+cities[c]+'</span></button>';
    });
    document.getElementById('filter-city').innerHTML = html;
}

function renderPipeline() {
    var pipe = {};
    STATUS_OPTIONS.forEach(function(s){pipe[s]=0});
    CRM_DATA.forEach(function(d) {
        var s = outreachStatus[d.nome] || 'Novo';
        pipe[s] = (pipe[s]||0) + 1;
    });
    var html = '';
    STATUS_OPTIONS.forEach(function(s) {
        html += '<div class="pipe-seg'+(activeFilters.status===s?' active':'')+'" onclick="togglePipeFilter(\''+s+'\')"><span class="n">'+(pipe[s]||0)+'</span>'+s+'</div>';
    });
    document.getElementById('pipeline').innerHTML = html;
}

function setFilter(type, val, btn) {
    activeFilters[type] = val;
    var parent = btn.parentElement;
    var btns = parent.querySelectorAll('.filter-btn');
    for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
    btn.classList.add('active');
    applyFilters();
}

function togglePipeFilter(status) {
    activeFilters.status = activeFilters.status === status ? null : status;
    renderPipeline();
    applyFilters();
}

function getFiltered() {
    var q = (document.getElementById('search').value || '').toLowerCase();
    return CRM_DATA.filter(function(d) {
        if (activeFilters.pot !== 'all' && d.pot !== activeFilters.pot) return false;
        if (activeFilters.seg !== 'all' && d.seg !== activeFilters.seg) return false;
        if (activeFilters.city !== 'all' && d.cid !== activeFilters.city) return false;
        if (activeFilters.status) {
            var s = outreachStatus[d.nome] || 'Novo';
            if (s !== activeFilters.status) return false;
        }
        if (q) {
            var hay = (d.nome+' '+d.cnpj+' '+d.cid+' '+d.seg+' '+d.notas+' '+d.ig).toLowerCase();
            if (hay.indexOf(q) === -1) return false;
        }
        return true;
    });
}

function applyFilters() {
    renderTable();
    renderPipeline();
}

function renderTable() {
    var filtered = getFiltered();
    filtered.sort(function(a,b) {
        var ia = POT_ORDER.indexOf(a.pot), ib = POT_ORDER.indexOf(b.pot);
        return (ia===-1?99:ia) - (ib===-1?99:ib);
    });
    document.getElementById('count-label').textContent = filtered.length + ' de ' + CRM_DATA.length + ' negocios';
    var tbody = document.getElementById('tbody');
    var rows = [];
    for (var i = 0; i < filtered.length; i++) {
        var d = filtered[i];
        var potLabel = POT_LABELS[d.pot] || d.pot;
        var potBadge = POT_BADGE[d.pot] || 'b-gray';
        var segLabel = SEG_LABELS[d.seg] || d.seg;
        var isFelino = d.felino === 'true' || d.felino === true;
        var status = outreachStatus[d.nome] || 'Novo';
        var contacts = '';
        if (d.wpp) contacts += '<a class="c-icon c-wpp" href="https://wa.me/55'+d.wpp.replace(/\D/g,'')+'" target="_blank" title="WhatsApp" onclick="event.stopPropagation()">W</a>';
        if (d.tel) contacts += '<a class="c-icon c-tel" href="tel:'+d.tel+'" title="Telefone" onclick="event.stopPropagation()">T</a>';
        if (d.ig) contacts += '<a class="c-icon c-ig" href="https://instagram.com/'+d.ig.replace('@','')+'" target="_blank" title="Instagram" onclick="event.stopPropagation()">I</a>';
        if (d.web) contacts += '<a class="c-icon c-web" href="'+d.web+'" target="_blank" title="Site" onclick="event.stopPropagation()">S</a>';
        if (d.maps) contacts += '<a class="c-icon c-map" href="'+d.maps+'" target="_blank" title="Maps" onclick="event.stopPropagation()">M</a>';
        if (d.email) contacts += '<a class="c-icon c-email" href="mailto:'+d.email+'" title="Email" onclick="event.stopPropagation()">@</a>';
        var rating = d.rat ? d.rat + (d.rev ? ' ('+d.rev+')' : '') : '—';
        var opts = '';
        for (var j = 0; j < STATUS_OPTIONS.length; j++) {
            opts += '<option'+(STATUS_OPTIONS[j]===status?' selected':'')+'>'+STATUS_OPTIONS[j]+'</option>';
        }
        rows.push('<tr onclick="openDetail('+i+')">'+
            '<td><div class="biz-name">'+esc(d.nome)+(isFelino?'<span class="felino-star" title="Foco Felino">&#9733;</span>':'')+'</div><div class="biz-sub">'+esc(d.sub||'')+'</div></td>'+
            '<td>'+esc(d.cid)+'</td>'+
            '<td><span class="badge '+potBadge+'">'+potLabel+'</span></td>'+
            '<td>'+segLabel+'</td>'+
            '<td>'+(d.porte||'—')+'</td>'+
            '<td>'+rating+'</td>'+
            '<td><div class="contacts">'+(contacts||'—')+'</div></td>'+
            '<td><select class="status-sel" onclick="event.stopPropagation()" onchange="setStatus(\''+esc(d.nome).replace(/'/g,"\\'")+'\',this.value)">'+opts+'</select></td>'+
            '</tr>');
    }
    tbody.innerHTML = rows.join('');
    // Store filtered for detail panel
    window._filtered = filtered;
}

function esc(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }

function setStatus(name, status) {
    outreachStatus[name] = status;
    localStorage.setItem('gato3_crm_status', JSON.stringify(outreachStatus));
    renderSidebarStats();
    renderPipeline();
}

function openDetail(idx) {
    var d = window._filtered[idx];
    if (!d) return;
    document.getElementById('dp-name').textContent = d.nome;
    var isFelino = d.felino==='true' || d.felino===true;
    var body = '';
    if (d.cnpj) body += '<div class="dp-field"><div class="lbl">CNPJ</div><div class="val">'+d.cnpj+'</div></div>';
    body += '<div class="dp-field"><div class="lbl">Segmento</div><div class="val">'+(SEG_LABELS[d.seg]||d.seg)+' — '+(d.sub||'—')+'</div></div>';
    body += '<div class="dp-field"><div class="lbl">Potencial B2B</div><div class="val"><span class="badge '+(POT_BADGE[d.pot]||'b-gray')+'">'+(POT_LABELS[d.pot]||d.pot)+'</span>'+(isFelino?' <span class="badge b-purple">Foco Felino</span>':'')+'</div></div>';
    if (d.end) body += '<div class="dp-field"><div class="lbl">Endereco</div><div class="val">'+d.end+', '+d.cid+'</div></div>';
    else body += '<div class="dp-field"><div class="lbl">Cidade</div><div class="val">'+d.cid+'</div></div>';
    body += '<div class="dp-field"><div class="lbl">Ring</div><div class="val">'+(d.ring==='1_abc'?'Ring 1 — ABC Paulista':'Ring 2 — Grande SP')+'</div></div>';
    body += '<div class="dp-field"><div class="lbl">Porte</div><div class="val">'+(d.porte||'—')+'</div></div>';
    if (d.rat) body += '<div class="dp-field"><div class="lbl">Google Rating</div><div class="val">'+d.rat+(d.rev?' ('+d.rev+' avaliacoes)':'')+'</div></div>';
    if (d.notas) body += '<div class="dp-field"><div class="lbl">Notas</div><div class="val">'+d.notas+'</div></div>';
    body += '<div class="dp-contacts">';
    if (d.wpp) body += '<a class="dp-contact-btn" href="https://wa.me/55'+d.wpp.replace(/\D/g,'')+'" target="_blank">WhatsApp: '+d.wpp+'</a>';
    if (d.tel) body += '<a class="dp-contact-btn" href="tel:'+d.tel+'">Tel: '+d.tel+'</a>';
    if (d.ig) body += '<a class="dp-contact-btn" href="https://instagram.com/'+d.ig.replace('@','')+'" target="_blank">IG: '+d.ig+'</a>';
    if (d.web) body += '<a class="dp-contact-btn" href="'+d.web+'" target="_blank">Site</a>';
    if (d.email) body += '<a class="dp-contact-btn" href="mailto:'+d.email+'">Email: '+d.email+'</a>';
    if (d.maps) body += '<a class="dp-contact-btn" href="'+d.maps+'" target="_blank">Ver no Maps</a>';
    body += '</div>';
    document.getElementById('dp-body').innerHTML = body;
    document.getElementById('detail-panel').classList.add('open');
    document.getElementById('detail-overlay').classList.add('open');
}

function closeDetail() {
    document.getElementById('detail-panel').classList.remove('open');
    document.getElementById('detail-overlay').classList.remove('open');
}

function toggleTheme() {
    var h = document.documentElement;
    h.setAttribute('data-theme', h.getAttribute('data-theme')==='dark'?'light':'dark');
}

function exportCSV() {
    var filtered = getFiltered();
    var csv = 'Nome,CNPJ,Segmento,Cidade,Potencial,Telefone,WhatsApp,Instagram,Website,Status\n';
    filtered.forEach(function(d) {
        var status = outreachStatus[d.nome] || 'Novo';
        csv += [d.nome,d.cnpj,d.seg,d.cid,d.pot,d.tel,d.wpp,d.ig,d.web,status].map(function(v){return '"'+(v||'').replace(/"/g,'""')+'"'}).join(',') + '\n';
    });
    var blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'gato3_crm_export_'+new Date().toISOString().slice(0,10)+'.csv';
    a.click();
}

document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeDetail();
    if (e.key === '/' && !e.ctrlKey && document.activeElement.tagName !== 'INPUT') {
        e.preventDefault();
        document.getElementById('search').focus();
    }
});

init();
</script>
</body>
</html>
