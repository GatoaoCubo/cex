1_n01_research_n02_marketing: ''
handoff_research_insights_to_marketing_angles: "When: N01 completes market research, competitive analysis, or audience insights\
  \  \nPurpose: Transform research findings into actionable marketing copy briefs  \nFormat: `research_to_copy_brief.md`\n\
  \n#### Input from N01\nresearch_brief:\n  research_type: \"market_analysis | competitive_intel | audience_research | trend_analysis\"\
  \n  target_audience:\n    primary_segment: \"\"\n    demographics: {}\n    psychographics: {}\n    pain_points: []\n   \
  \ desires: []\n    \n  key_findings:\n    insights: []\n    opportunities: []\n    threats: []\n    gaps_in_market: []\n\
  \    \n  competitive_landscape:\n    direct_competitors: []\n    messaging_analysis: {}\n    positioning_gaps: []\n    \n\
  \  recommendations:\n    positioning_strategy: \"\"\n    messaging_priorities: []\n    channel_recommendations: []\n\n####\
  \ N02 Processing\nmarketing_translation:\n  copy_angles:\n    primary_angle: \"\"  # Main value proposition\n    supporting_angles:\
  \ []  # Secondary benefits\n    emotional_triggers: []  # Fear, desire, aspiration\n    \n  messaging_framework:\n    headline_directions:\
  \ []\n    hook_concepts: []\n    benefit_stack: []\n    objection_handles: []\n    \n  channel_adaptations:\n    email:\
  \ \"messaging_adaptation\"\n    social: \"messaging_adaptation\"  \n    ads: \"messaging_adaptation\"\n    landing_pages:\
  \ \"messaging_adaptation\"\n    \n  copy_formula_selection:\n    primary_formula: \"AIDA | PAS | BAB | FAB\"\n    rationale:\
  \ \"\"\n\n#### Output to Campaign\ncampaign_brief:\n  campaign_goal: \"\"\n  target_audience: \"\"  # From research\n  key_message:\
  \ \"\"  # Core value prop\n  copy_strategy: \"\"  # Formula + approach\n  channel_mix: []  # Priority channels\n  success_metrics:\
  \ []\n\n---"
2_n02_marketing_n05_operations_deployment: ''
handoff_copy_deployment_package: "When: N02 completes copy creation and needs technical deployment  \nPurpose: Provide N05\
  \ with everything needed for copy deployment  \nFormat: `copy_deployment_package.md`\n\n#### Input from N02\ncopy_deliverables:\n\
  \  final_copy:\n    headlines: []\n    body_copy: \"\"\n    cta_text: \"\"\n    meta_descriptions: []  # For web deployment\n\
  \    \n  a_b_variants:\n    variant_a: {}\n    variant_b: {}\n    test_hypothesis: \"\"\n    success_metric: \"\"\n    \n\
  \  technical_requirements:\n    deployment_channels: []  # email, web, social, ads\n    timing_requirements: \"\"\n    personalization_variables:\
  \ []\n    tracking_parameters: []\n    \n  brand_assets_needed:\n    images: []\n    videos: []  \n    fonts: []\n    color_codes:\
  \ []\n\n#### N05 Requirements\ndeployment_checklist:\n  technical_setup:\n    - \"Copy uploaded to platform\"\n    - \"\
  A/B testing configured\"  \n    - \"Tracking pixels implemented\"\n    - \"Personalization tokens mapped\"\n    \n  quality_assurance:\n\
  \    - \"Responsive display testing\"\n    - \"Cross-browser compatibility\"\n    - \"Mobile optimization verified\"\n \
  \   - \"Link functionality confirmed\"\n    \n  go_live:\n    - \"Launch date confirmed\"\n    - \"Backup/rollback plan\
  \ ready\"\n    - \"Performance monitoring activated\"\n\n#### Success Handoff Criteria\ndeployment_complete:\n  deliverables:\n\
  \    - \"Live copy with tracking\"\n    - \"A/B test running\"  \n    - \"Performance dashboard active\"\n    - \"Issue\
  \ escalation path defined\"\n    \n  performance_expectations:\n    baseline_metrics: {}\n    target_improvements: {}\n\
  \    review_schedule: \"\"\n\n---"
3_n02_marketing_n06_commercial: ''
handoff_copy_commercial_alignment: "When: Copy involves pricing, offers, or sales messaging  \nPurpose: Ensure copy aligns\
  \ with commercial strategy and pricing  \nFormat: `copy_commercial_alignment.md`\n\n#### N02 → N06: Copy with Commercial\
  \ Implications\ncommercial_copy_brief:\n  copy_type: \"pricing_page | sales_email | offer_landing_page | upsell_sequence\"\
  \n  \n  pricing_elements:\n    price_points_mentioned: []\n    value_propositions: []\n    comparison_frameworks: []  #\
  \ vs competitors\n    \n  offer_structure:\n    primary_offer: \"\"\n    bonuses_mentioned: []\n    guarantees: []\n   \
  \ scarcity_elements: []\n    \n  objection_handling:\n    price_objections: []\n    value_objections: []  \n    trust_objections:\
  \ []\n\n#### N06 → N02: Commercial Strategy Input\ncommercial_guidance:\n  pricing_strategy:\n    price_positioning: \"\
  premium | mid_market | value | penetration\"\n    messaging_priorities: []\n    avoid_comparisons: []\n    \n  offer_optimization:\n\
  \    strongest_benefits: []  # Lead with these\n    proof_points: []  # Use for credibility\n    urgency_elements: []  #\
  \ When appropriate\n    \n  sales_process_alignment:\n    funnel_stage: \"awareness | consideration | decision\"\n    next_step_goal:\
  \ \"\"\n    handoff_to_sales: \"yes | no\"\n\n#### Coordinated Output\naligned_copy:\n  messaging: \"Commercial strategy\
  \ + copy expertise\"\n  pricing_communication: \"Clear, confident, value-focused\"\n  sales_enablement: \"Copy supports\
  \ sales process\"\n  performance_tracking: \"Commercial + marketing metrics\"\n\n---"
4_performance_feedback_loops: ''
n05_n02_performance_data_handoff: "When: Copy has been live for sufficient time to gather data  \nPurpose: Provide performance\
  \ insights to improve future copy  \nFormat: `copy_performance_feedback.md`\n\n#### Performance Data from N05\nperformance_results:\n\
  \  channel_performance:\n    email:\n      open_rate: 0.0\n      click_rate: 0.0\n      conversion_rate: 0.0\n      \n \
  \   landing_pages:\n      traffic: 0\n      bounce_rate: 0.0\n      conversion_rate: 0.0\n      time_on_page: 0\n      \n\
  \    ads:\n      impressions: 0  \n      ctr: 0.0\n      cpc: 0.0\n      conversion_rate: 0.0\n      \n  a_b_test_results:\n\
  \    winning_variant: \"\"\n    performance_difference: \"\"\n    statistical_significance: true/false\n    \n  user_behavior:\n\
  \    heat_maps: \"link_to_data\"\n    scroll_depth: {}\n    click_patterns: {}\n\n#### N02 Learning Integration\ncopy_insights:\n\
  \  what_worked:\n    headlines: []\n    hooks: []\n    ctas: []\n    \n  what_failed:\n    low_performing_elements: []\n\
  \    hypotheses_disproven: []\n    \n  optimization_opportunities:\n    immediate_fixes: []\n    test_ideas: []\n    strategic_pivots:\
  \ []\n    \n  memory_updates:\n    pattern_additions: []\n    audience_insights: []\n    formula_effectiveness: {}\n\n---"
5_handoff_workflow_process: ''
standard_operating_procedure: "#### Step 1: Handoff Request\n# N02 requests handoff to another nucleus\n# Create handoff file\
  \ in .cex/runtime/handoffs/\necho \"Creating handoff: N02 → N0X\"\ncp templates/handoff_template.md .cex/runtime/handoffs/N02_to_N0X_$(date\
  \ +%Y%m%d).md\n\n#### Step 2: Receiving Nucleus Processing\n# Receiving nucleus processes handoff\n# Updates handoff file\
  \ with acceptance + timeline\necho \"N0X accepting handoff from N02\"\n# Begin processing with full context\n\n#### Step\
  \ 3: Completion & Feedback\n# Receiving nucleus completes work\n# Signals completion + provides feedback\npython _tools/signal_writer.py\
  \ n0x complete 8.5 \"HANDOFF_N02_COMPLETE\"\n\n#### Step 4: Loop Closure  \n# N02 integrates feedback into memory\n# Updates\
  \ performance tracking\n# Improves future handoff quality"
emergency_handoff_protocol: "#### When Standard Handoff Fails\nescalation_path:\n  level_1: \"Retry with clarified requirements\"\
  \n  level_2: \"N07 orchestrator mediation\"  \n  level_3: \"Manual coordination call\"\n  level_4: \"Task restructuring\"\
  \n\n#### Quality Gates for Handoffs\nhandoff_quality_checks:\n  completeness: \"All required fields filled\"\n  clarity:\
  \ \"Requirements unambiguous\"  \n  actionability: \"Receiving nucleus can execute immediately\"\n  trackability: \"Success\
  \ metrics defined\""
6_templates_checklists: ''
research_marketing_brief_template: "# Research to Marketing Brief\n\n## Research Summary\n- Research Type: [type]\n- Key Finding:\
  \ [most important insight]\n- Target Audience: [primary segment]\n\n## Marketing Translation\n- Core Message: [value proposition]\
  \  \n- Emotional Hook: [primary trigger]\n- Copy Formula: [AIDA/PAS/BAB/FAB + rationale]\n- Channel Priority: [ranked list]\n\
  \n## Success Metrics\n- Primary KPI: [main goal]\n- Supporting Metrics: [secondary measurements]\n- Review Timeline: [when\
  \ to assess]"
copy_deployment_checklist: "# Copy Deployment Checklist\n\n## Copy Assets Ready\n- [ ] Final headlines (3 variants)\n- [ ]\
  \ Body copy (A/B versions)  \n- [ ] CTAs (2-3 options)\n- [ ] Meta data (titles, descriptions)\n\n## Technical Requirements\n\
  - [ ] Deployment channels confirmed\n- [ ] Tracking parameters defined\n- [ ] Personalization variables mapped\n- [ ] A/B\
  \ testing configured\n\n## Launch Coordination  \n- [ ] Go-live date confirmed\n- [ ] Performance monitoring ready\n- [\
  \ ] Issue escalation path defined\n- [ ] Success criteria agreed upon"
7_signal_writer_integration: ''
standard_signal_protocol_for_n02_handoffs: 'Every N02 handoff completion MUST emit a signal. This enables N07 orchestrator
  polling and prevents lost handoffs.


  # On handoff completion — N02 emits signal

  from _tools.signal_writer import write_signal


  # After completing copy for N05 deployment

  write_signal(''n02'', ''handoff_n05_complete'', 9.0, ''COPY_DEPLOYMENT_READY'')


  # After receiving research from N01

  write_signal(''n02'', ''handoff_n01_received'', None, ''RESEARCH_BRIEF_INGESTED'')


  # After aligning with N06 commercial

  write_signal(''n02'', ''handoff_n06_aligned'', None, ''COMMERCIAL_COPY_READY'')'
signal_based_handoff_flow: "handoff_signals:\n  n01_to_n02:\n    trigger_signal: \"n01.research_complete\"\n    n02_acknowledges:\
  \ \"n02.research_received\"\n    n02_completes: \"n02.copy_from_research_done\"\n    timeout_ms: 1800000\n    on_timeout:\
  \ \"n07_escalation\"\n\n  n02_to_n05:\n    trigger_signal: \"n02.copy_ready\"\n    n05_acknowledges: \"n05.copy_received\"\
  \n    n05_completes: \"n05.deployment_live\"\n    timeout_ms: 3600000\n    on_timeout: \"n07_escalation\"\n\n  n02_to_n06:\n\
  \    trigger_signal: \"n02.commercial_copy_draft\"\n    n06_acknowledges: \"n06.copy_review_started\"\n    n06_completes:\
  \ \"n06.copy_approved\"\n    timeout_ms: 1200000\n    on_timeout: \"n02_proceeds_with_draft\"\n\n  n02_to_n03:\n    trigger_signal:\
  \ \"n02.visual_brief_ready\"\n    n03_acknowledges: \"n03.design_started\"\n    n03_completes: \"n03.visual_assets_delivered\"\
  \n    timeout_ms: 2400000\n    on_timeout: \"n02_uses_template_fallback\"\n\n  n02_to_n04:\n    trigger_signal: \"n02.kc_update_request\"\
  \n    n04_acknowledges: \"n04.kc_review_started\"\n    n04_completes: \"n04.kc_published\"\n    timeout_ms: 1800000\n  \
  \  on_timeout: \"n02_proceeds_without_kc\""
8_retry_failure_strategies: ''
handoff_failure_taxonomy: "failure_types:\n  timeout:\n    definition: \"Receiving nucleus doesn't acknowledge within timeout_ms\"\
  \n    strategy: \"Retry once → escalate to N07 → continue with degraded mode\"\n    degraded_mode: \"N02 self-serves (e.g.,\
  \ uses template instead of N03 custom design)\"\n\n  quality_rejection:\n    definition: \"Receiving nucleus rejects deliverable\
  \ (quality < 8.0)\"\n    strategy: \"N02 re-runs artifact through 8F pipeline → resubmit\"\n    max_retries: 2\n    escalation:\
  \ \"After 2 rejections → N07 mediates requirements alignment\"\n\n  context_loss:\n    definition: \"Handoff file missing\
  \ critical context (brand, audience, etc.)\"\n    strategy: \"Auto-inject brand_config.yaml → retry with enriched context\"\
  \n    prevention: \"All handoff files MUST include brand_context reference\"\n\n  signal_failure:\n    definition: \"signal_writer\
  \ fails (file permissions, path error)\"\n    strategy: \"Fallback to .cex/runtime/handoffs/n02_status.md manual update\"\
  \n    prevention: \"Pre-flight check signal_writer path on nucleus boot\""
retry_decision_matrix: "retry_matrix:\n  should_retry:\n    - \"Timeout (network/scheduling issue, not content issue)\"\n\
  \    - \"Quality 7.5-7.9 (close to threshold, small fix likely)\"\n    - \"Signal failure (transient error)\"\n  should_NOT_retry:\n\
  \    - \"Quality < 7.0 (fundamental misunderstanding, needs human)\"\n    - \"3rd consecutive failure (systemic issue)\"\
  \n    - \"Brand violation detected (Ro anti-patterns present)\"\n  should_escalate:\n    - \"Cross-nucleus disagreement\
  \ on requirements\"\n    - \"GDP decision needed (subjective, user must decide)\"\n    - \"Budget exhaustion (no tokens\
  \ left for retry)\""
9_gato_brand_injection_at_handoff_boundaries: ''
mandatory_brand_context_in_every_handoff: "gato3_handoff_rules:\n  outgoing_handoffs:\n    always_include:\n      - \"brand_config_path:\
  \ .cex/brand/brand_config.yaml\"\n      - \"persona: Ro\"\n      - \"voice: sofisticado-acolhedor\"\n      - \"language:\
  \ pt-BR\"\n      - \"forbidden_words: [gatinho, garantido, compre agora, dono]\"\n    validation: \"brand_validate.py must\
  \ pass before handoff emitted\"\n\n  incoming_handoffs:\n    always_verify:\n      - \"Does incoming content respect GATO³\
  \ brand voice?\"\n      - \"Are BRAND_* variables populated (not placeholder)?\"\n      - \"Is language pt-BR (not EN defaults)?\"\
  \n    on_violation: \"N02 sanitizes before processing, logs violation\"\n\nThis handoff protocol ensures seamless coordination\
  \ between N02 and other nuclei, preventing information loss and enabling compound effectiveness across the CEX system."
