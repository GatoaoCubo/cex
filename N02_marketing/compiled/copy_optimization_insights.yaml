1_high_performance_copy_patterns: ''
headlines_that_convert: "proven_headline_patterns:\n  benefit_specific:\n    pattern: \"[SPECIFIC_OUTCOME] in [TIMEFRAME]\
  \ (without [COMMON_OBJECTION])\"\n    example: \"Generate 40% more leads in 30 days (without spending more on ads)\"\n \
  \   performance: \"CVR: 0.067, tested across 15 campaigns\"\n    best_for: \"B2B audiences, decision stage\"\n    \n  curiosity_gap:\n\
  \    pattern: \"The [ADJECTIVE] [METHOD] [TARGET_AUDIENCE] use to [DESIRED_OUTCOME]\"\n    example: \"The simple framework\
  \ top-performers use to close 3x more deals\"\n    performance: \"CTR: 0.045, high engagement\"\n    best_for: \"Professional\
  \ audiences, awareness stage\"\n    \n  social_proof_numbers:\n    pattern: \"How [IMPRESSIVE_NUMBER] [TARGET_GROUP] achieved\
  \ [SPECIFIC_RESULT]\"\n    example: \"How 1,247 agencies doubled their revenue using this strategy\"\n    performance: \"\
  CVR: 0.059, strong credibility signal\"\n    best_for: \"Scale-conscious businesses, consideration stage\"\n    \n  problem_agitation:\n\
  \    pattern: \"Stop [FRUSTRATING_BEHAVIOR] and start [DESIRED_BEHAVIOR]\"\n    example: \"Stop chasing leads and start\
  \ attracting qualified prospects\"\n    performance: \"CVR: 0.052, emotional resonance\"\n    best_for: \"Problem-aware\
  \ audiences, all stages\""
