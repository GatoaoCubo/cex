  \    \n  urgency_driven:\n    examples: [\"Secure limited access\", \"Lock in early pricing\", \"Join before we're full\"\
  ]\n    avg_cvr: 0.071\n    psychology: \"Scarcity + loss aversion\"\n    \n  action_specific:\n    examples: [\"Download\
