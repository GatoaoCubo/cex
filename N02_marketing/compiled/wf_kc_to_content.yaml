overview: 'A knowledge card is a compressed unit of expertise. It sits in a markdown file, dense with insight, and does absolutely
  nothing for your audience. They''ll never read it. They''ll never find it. It exists for machines. This workflow turns that
  machine-readable knowledge into human-consumable content across every channel your audience inhabits. One KC in, seven content
  formats out, distributed across five channels, with branded packaging that makes every piece unmistakably yours. The magic
  is in the sequencing: NotebookLM does the heavy transformation (KC to audio, flashcards, quiz), N02 does the branding and
  distribution strategy, and the publishing workflows handle the last mile. No human intervention required between start and
  publish.'
workflow_diagram: "KC .md files (1 or more)\n    |\n    v\n[STEP 1] UPLOAD ─── cex_notebooklm.py --upload\n    |  KC pasted\
  \ as source into domain notebook\n    |  Domain resolved from KC frontmatter\n    |\n    v\n[STEP 2] GENERATE ─── cex_notebooklm.py\
  \ --studio\n    |  NotebookLM Estudio activated\n    |  Outputs: audio_overview + flashcards + quiz (configurable)\n   \
  \ |  Wait: audio 2-10min, flashcards ~30s, quiz ~30s\n    |\n    v\n[STEP 3] FORMAT ─── N02 templates (parallel)\n    |\
  \  tpl_notebooklm_audio_wrapper   → branded intro/outro scripts\n    |  tpl_notebooklm_flashcard_format → Anki/Quizlet/PDF\
  \ exports\n    |  tpl_content_distribution_plan   → channel mapping + schedule\n    |\n    v\n[STEP 4] ASSEMBLE ─── N03\
  \ tools (parallel)\n    |  ElevenLabs TTS  → narrate intro/outro scripts\n    |  FFmpeg           → stitch jingle + intro\
  \ + audio + outro\n    |  Typst/WeasyPrint → render flashcard PDF\n    |  Canva API        → create visual assets (thumbnails,\
  \ carousels)\n    |\n    v\n[STEP 5] VALIDATE ─── N07 quality gate\n    |  Brand consistency check (voice, colors, CTA)\n\
  \    |  Audio quality check (levels, silence, glitches)\n    |  Flashcard accuracy check (facts match KC source)\n    |\
  \  Distribution plan completeness check\n    |\n    v\n[STEP 6] PUBLISH ─── wf_cf_publish_* (parallel)\n    |  wf_cf_publish_youtube\
  \   → upload episode + metadata\n    |  wf_cf_publish_social    → Ayrshare scheduling\n    |  wf_cf_email_launch      →\
  \ newsletter sequence\n    |  wf_cf_publish_hotmart   → course module (if applicable)\n    |\n    v\n[STEP 7] TRACK ───\
  \ analytics + feedback loop\n    |  Monitor first 48h metrics\n    |  Flag top-performing assets for boost\n    |  Log results\
  \ to campaign_performance_memory\n    |  Feed learnings back to N02 for next batch\n    |\n    v\nDONE — KC knowledge is\
  \ now live across all channels"
step_details: ''
step_1_upload_sequential: 'Tool: `python _tools/cex_notebooklm.py --upload <kc_path>`

  Nucleus: N04 (or automated via F8 hook)

  Duration: 30-60s per KC


  | Input | Output | Error Handling |

  |-------|--------|----------------|

  | KC .md file path | `{notebook_id, domain, source_title, status}` | AUTH_EXPIRED: run `--reauth` |

  | Domain (auto-resolved from KC frontmatter) | Config updated with new source | Source limit (50): warn, create spillover
  notebook |

  | Cookies from MCP state | Playwright session | Timeout: screenshot + retry once |


  Pre-flight checks:

  1. KC exists and has valid frontmatter (`kind`, `domain`, `title`)

  2. NotebookLM config exists (`.cex/P09_config/notebooklm_notebooks.yaml`)

  3. Auth cookies valid (`check_auth_valid()`)

  4. Source count < 45 for target notebook (warn at 45, block at 50)


  Batch mode: For multiple KCs, upload sequentially with 10s delay between uploads to avoid rate limiting. NotebookLM processes
  ~5 sources/hour reliably.'
step_2_generate_sequential_per_output_type: 'Tool: `python _tools/cex_notebooklm.py --studio <notebook_id> --outputs flashcards,audio_summary,quiz`

  Nucleus: N04

  Duration: 2-15min depending on outputs


  | Output Type | PT-BR Label | Generation Time | Result |

  |-------------|-------------|-----------------|--------|

  | flashcards | Cartoes didaticos | ~30s | 20-75 cards |

  | audio_summary | Resumo em audio | 2-10min | 5-30min podcast |

  | quiz | Teste | ~30s | 10-20 questions |

  | mind_map | Mapa mental | ~15s | Concept diagram |

  | briefing | Documento de resumo | ~30s | Summary doc |

  | timeline | Linha do tempo | ~15s | Chronological view |

  | faq | Perguntas frequentes | ~15s | Q&A pairs |


  Polling: Audio generation requires polling every 30s with 15min timeout. Other outputs are near-instant.


  Status check: `python _tools/cex_notebooklm.py --status <notebook_id>` confirms all outputs generated.'
step_3_format_parallel_n02: 'Three templates execute simultaneously on the raw NotebookLM outputs:


  | Template | Input | Output | Path |

  |----------|-------|--------|------|

  | `tpl_notebooklm_audio_wrapper` | Audio topic + brand config | Intro/outro scripts (2 variants: formal + casual) | N02
  LLM call |

  | `tpl_notebooklm_flashcard_format` | Raw flashcards + brand config | Formatted decks (Anki + PDF) | N02 LLM call |

  | `tpl_content_distribution_plan` | All assets + channels + brand | Day-by-day publishing schedule | N02 LLM call |


  Dependencies: Step 2 must complete. All three templates run in parallel since they operate on different outputs.


  Brand injection: All templates read `{{BRAND_*}}` variables from `.cex/brand/brand_config.yaml`. If not bootstrapped, templates
  produce generic output (functional but unbranded).'
step_4_assemble_parallel_n03_tools: "Physical production of publishable files:\n\n| Task | Tool | Input | Output |\n|------|------|-------|--------|\n\
  | Narrate intro/outro | ElevenLabs API | Script text from Step 3 | intro.mp3, outro.mp3 |\n| Stitch audio | FFmpeg | jingle\
  \ + intro + NLM audio + outro | episode.mp3 |\n| Render flashcard PDF | Typst or WeasyPrint | Formatted markdown from Step\
  \ 3 | flashcards.pdf |\n| Create thumbnail | Canva API | Episode title + brand colors | thumbnail.png (1280x720) |\n| Create\
  \ carousel | Canva API | Top 5 flashcards + brand template | carousel.png (1080x1080 x5) |\n\nFFmpeg assembly command:\n\
  ffmpeg -i jingle.mp3 -i intro.mp3 -i notebooklm_audio.mp3 -i outro.mp3 \\\n  -filter_complex \"[0][1][2][3]concat=n=4:v=0:a=1\"\
  \ \\\n  -metadata title=\"{{TOPIC}}\" -metadata artist=\"{{BRAND_NAME}}\" \\\n  episode_final.mp3\n\nCanva API calls:\n\
  POST /v1/designs (type: custom, 1280x720) → thumbnail\nPOST /v1/designs (type: custom, 1080x1080) → carousel slides\nPOST\
  \ /v1/exports (format: png) → download URLs"
step_5_validate_sequential_n07: 'Quality gate before anything goes live:


  | Check | Pass Criteria | Action if Fail |

  |-------|---------------|----------------|

  | Brand voice match | Intro/outro match brand_config tone | Regenerate with corrected VARIANT |

  | Audio quality | No silence >2s, levels normalized | Re-stitch with FFmpeg normalization |

  | Flashcard accuracy | All facts traceable to source KC | Flag cards for manual review |

  | Visual consistency | Brand colors + logo on all assets | Regenerate via Canva with correct template |

  | Distribution plan completeness | All channels covered, all days scheduled | Fill gaps in schedule |

  | CTA presence | Every asset includes CTA | Append CTA to missing assets |'
step_6_publish_parallel_n05_n06_n02: 'Each publishing workflow is independent and runs in parallel:


  | Workflow | Nucleus | Channel | Key Actions |

  |----------|---------|---------|-------------|

  | `wf_cf_publish_youtube` | N05 | YouTube | Upload MP3 as video + thumbnail + description + tags |

  | `wf_cf_publish_social` | N02 | Instagram, LinkedIn, Twitter/X | Ayrshare API scheduling per distribution plan |

  | `wf_cf_email_launch` | N02 | Newsletter | Email sequence: announce + recap + flashcards |

  | `wf_cf_publish_hotmart` | N06 | Hotmart | Upload as course module (if course context) |


  Ayrshare integration: Single API call schedules posts across all social platforms simultaneously. Each post has platform-specific
  copy from the distribution plan.'
step_7_track_ongoing_48h_window: '| Metric | Source | Check Interval | Action Threshold |

  |--------|--------|-----------------|------------------|

  | YouTube views | YouTube API | 6h, 24h, 48h | <100 at 24h: boost thumbnail/title |

  | Spotify listens | Spotify for Podcasters | 24h, 48h | <50 at 48h: cross-promote more |

  | Instagram engagement | Ayrshare analytics | 6h, 24h | <3% rate: boost top post |

  | LinkedIn impressions | Ayrshare analytics | 24h | <500: reshare with different hook |

  | Newsletter opens | Email provider | 6h, 24h | <20% open: test new subject line |

  | Flashcard imports | Supabase tracking | 48h | <10: promote in next newsletter |


  Feedback loop: Top-performing content formats and hooks are logged to `N02_marketing/P10_memory/campaign_performance_memory.md`
  for future optimization.'
integration_points: '| System | Role | Interface |

  |--------|------|-----------|

  | N03 Engineering | Tool execution (FFmpeg, Typst, Canva) | Handoff with asset specs |

  | N04 Knowledge | NotebookLM upload + studio activation | cex_notebooklm.py CLI |

  | N05 Operations | YouTube upload, deployment | wf_cf_publish_youtube |

  | N06 Commercial | Hotmart course upload, pricing | wf_cf_publish_hotmart |

  | N07 Orchestrator | Quality gate, wave coordination | Signal on complete |

  | Ayrshare | Social scheduling | API via social_publisher_marketing |

  | ElevenLabs | TTS narration | API via fn_cf_elevenlabs_tts |

  | Canva | Visual assets | API via fn_cf_canva_create |'
error_recovery: '| Failure Point | Detection | Recovery |

  |---------------|-----------|----------|

  | NotebookLM auth expired | `[AUTH_EXPIRED]` in upload output | `cex_notebooklm.py --reauth` then retry |

  | Audio generation timeout | No output after 15min polling | Retry once, then skip audio and proceed |

  | ElevenLabs rate limit | 429 response | Wait 60s, retry with exponential backoff |

  | Canva API error | Non-200 response | Retry once, fallback to Marp for slides |

  | Ayrshare scheduling fail | API error response | Queue for manual publishing, alert user |

  | Quality gate fail | Score < 8.0 on any check | Return to Step 3 with correction notes |'
execution_modes: '| Mode | Trigger | Human Involvement |

  |------|---------|-------------------|

  | Manual | User runs workflow directly | User monitors each step |

  | F8 Hook | KC saved in F8 COLLABORATE | Zero — auto-uploads, waits for batch |

  | Mission Wave | Part of Content Factory mission | Zero — N07 dispatches and monitors |

  | Batch | Multiple KCs queued | Zero — sequential upload, parallel format |'
quality_gates: '| Gate | Status | Notes |

  |------|--------|-------|

  | H01 | PASS | id matches ^wf_[a-z][a-z0-9_]+$ |

  | H02 | PASS | All frontmatter fields present |

  | H03 | PASS | steps_count matches actual steps (7) |

  | H04 | PASS | All integration points documented |

  | H05 | PASS | Error recovery for each failure mode |

  | H06 | PASS | Execution modes cover all triggers |'
