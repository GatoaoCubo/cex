tldr: 'Config-driven social media auto-posting tool for N02 Marketing. 10-step pipeline: catalog → caption → publish → log.
  Any company fills 1 YAML config.'
density_score: 0.9
purpose: 'Automated social media publishing for any business served by N02 Marketing. Reads a company-specific YAML config
  and executes a 10-step pipeline: fetch products/content, generate captions via LLM, optimize posting time, publish to social
  platforms, log results, and rotate content to prevent repetition.'
pipeline: "CONFIG ─► FETCH catalog ─► SELECT (rotation-aware)\n              │\n              ▼\n         GENERATE caption\
  \ (LLM)\n              │\n      ┌───────┼───────┐\n      ▼       ▼       ▼\n  OPTIMIZE  HASHTAGS  FORMAT\n   time      tags\
  \     post\n      │       │       │\n      └───────┼───────┘\n              ▼\n          PUBLISH (API)\n              │\n\
  \      ┌───────┼───────┐\n      ▼       ▼       ▼\n    LOG    NOTIFY   ROTATE"
usage: '# Run for specific company config

  python social_publisher.py --config _instances/codexa/N02_marketing/social_publisher_config.yaml


  # Dry run (generate captions, don''t publish)

  python social_publisher.py --config config.yaml --dry-run


  # Single platform

  python social_publisher.py --config config.yaml --platform instagram


  # Force specific content type

  python social_publisher.py --config config.yaml --type product'
supported_platforms: '| Platform | API Options | Caption Limit | Hashtag Rec |

  |----------|------------|--------------|-------------|

  | Instagram | Ayrshare, Meta Graph | 2200 chars | 5-10 |

  | Facebook | Ayrshare, Meta Graph | 63206 chars | 3-5 |

  | TikTok | Ayrshare, Postiz | 2200 chars | 5-8 |

  | LinkedIn | Ayrshare, Postiz | 3000 chars | 3-5 |

  | Twitter/X | Ayrshare, Postiz | 280 chars | 2-3 |'
config_reference: 'Company-specific config lives in `_instances/{company}/N02_marketing/social_publisher_config.yaml`. See
  `P04_tools/templates/tpl_social_publisher.md` for full schema. Required sections: `identity`, `platforms`, `schedule`, `content_mix`,
  `catalog`, `publisher`, `hashtags`.'
quality_gates:
- 'Config completeness: all 7 required sections ✓'
- 'Zero plaintext secrets: all API keys via ENV_VAR ✓'
- Content mix sums to 100 ✓
- Timezone is valid IANA ✓
- Retry policy defined ✓
- Cooldown >= 1 day ✓
