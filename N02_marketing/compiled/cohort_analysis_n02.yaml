id: cohort_analysis_n02
kind: cohort_analysis
pillar: P11
nucleus: n02
title: Campaign Audience Cohort Analysis
version: 1.0.0
quality: null
tags:
- cohort_analysis
- audience_segmentation
- campaign_performance
- P11
- n02_marketing
domain: audience-intelligence
status: active
density_score: 1.0
purpose: 'Not all audiences respond to the same copy. Cohort analysis answers: WHO is converting, WHEN they convert, and WHY
  certain segments disengage. Without this, N02 produces copy that averages across segments -- and average copy converts no
  one.'
cohort_definition: A cohort is a group of audience members who share a defining characteristic observed at the same point
  in time.
cohort_types: '| Type | Defining Characteristic | Use |

  |------|------------------------|-----|

  | `acquisition_cohort` | First exposure to brand content | Funnel stage tracking |

  | `campaign_cohort` | First exposed in specific campaign | Campaign attribution |

  | `channel_cohort` | Acquired via specific platform | Channel ROI |

  | `segment_cohort` | ICP-segment membership | Message-market fit |

  | `behavioral_cohort` | Triggered by action (click, save, comment) | Retargeting precision |

  | `temporal_cohort` | Active in specific time window | Seasonality effects |'
cohort_schema: "cohort:\n  id: \"cohort_{type}{date}{label}\"\n  type: acquisition|campaign|channel|segment|behavioral|temporal\n\
  \  label: string                         # human-readable: \"LinkedIn leads Q1 2026\"\n  definition_criteria: string   \
  \        # machine-readable filter\n  cohort_date: ISO 8601 date            # when cohort was defined\n  size: integer \
  \                        # member count at definition\n  platform_source: instagram|linkedin|x|meta|email|organic\n  campaign_id:\
  \ string (nullable)\n  icp_segment: string (nullable)        # maps to customer_segment_n02.md"
retention_curve_schema: "retention_data:\n  cohort_id: string\n  measurement_unit: day|week|month\n  periods:\n    - period:\
  \ 0\n      retained_count: integer           # = cohort size (period 0 = 100%)\n      retention_rate: 1.0\n    - period:\
  \ 1\n      retained_count: integer\n      retention_rate: float\n    # ... continues per period\n  churn_events:\n    -\
  \ period: integer\n      churn_trigger: string             # inferred or tagged reason\n      recovery_action: string  \
  \         # retargeting sequence to trigger"
engagement_funnel_per_cohort: 'AWARENESS    -> content reach, impressions

  CONSIDERATION -> profile visits, link clicks, saves

  CONVERSION   -> form fills, purchases, sign-ups

  RETENTION    -> repeat engagement, subscription renewal

  ADVOCACY     -> shares, tags, referrals


  Track each cohort''s distribution across funnel stages per campaign week.

  Expected shape: narrow funnel (high attrition AWARENESS->CONSIDERATION is normal).

  Alert when attrition is STEEPER than benchmark at CONSIDERATION->CONVERSION.'
benchmarks: '| Cohort Stage | Expected Drop | Alert Threshold |

  |-------------|--------------|----------------|

  | Awareness -> Consideration | 90-95% drop | < 2% CTR |

  | Consideration -> Conversion | 80-90% drop | < 1% CVR |

  | Conversion -> Retention | 40-60% drop | < 40% 30-day retention |

  | Retention -> Advocacy | 70-80% drop | NPS < 40 |'
analysis_queries: "standard_analyses:\n  - name: \"Best performing cohort by CVR\"\n    group_by: [cohort_type, platform_source]\n\
  \    metric: conversion_rate\n    filter: impressions >= 500\n\n  - name: \"Cohort decay rate comparison\"\n    group_by:\
  \ [icp_segment]\n    metric: retention_rate\n    period: week_4\n    comparison: vs_campaign_average\n\n  - name: \"Channel-specific\
  \ BOFU cohort quality\"\n    group_by: [platform_source]\n    filter: funnel_stage == BOFU\n    metric: [conversion_rate,\
  \ cost_per_acquisition]\n\n  - name: \"Lookalike audience lift\"\n    group_by: [is_lookalike]\n    metric: [ctr, cvr]\n\
  \    hypothesis_test: true"
copy_implication_rules: '| Cohort Insight | Copy Action |

  |---------------|------------|

  | High engagement, low conversion | MOFU copy: add social proof, reduce friction |

  | Low initial engagement | TOFU hook test: switch hook_type in ab_test_config |

  | High early churn | Retention sequence: urgency + value reminder |

  | Advocacy-stage cohort | Referral ask copy: social proof + reward |

  | Segment A >> Segment B | Invest more creative budget in Segment A ICP |'
integration:
- 'Consumes: `customer_segment_n02.md` (ICP definitions)'
- 'Consumes: `nps_survey_n02.md` (retention signal)'
- 'Feeds into: `self_improvement_loop_n02.md` (segment performance signals)'
- 'Feeds into: `ab_test_config_n02.md` (audience split design)'
- 'Referenced by: `workflow_campaign_pipeline.md` (post-campaign analysis step)'
