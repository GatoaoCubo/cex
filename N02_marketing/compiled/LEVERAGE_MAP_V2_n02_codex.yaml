verification: ''
tool_presence: 'Confirmed present:


  - `_tools/cex_social_publisher.py`


  Observed surface:


  - Inputs: `--input`, `--stdin`, `--platforms`, `--json`

  - Platforms: `x`, `twitter`, `linkedin`, `instagram`, `threads`, `bluesky`, `mastodon`

  - Output fields: `platform`, `char_count`, `limit`, `fits`, `hashtags`, `content`

  - Dependencies: stdlib only'
api_fit_for_n02: 'Fits well for:


  - converting one draft into platform-sized variants

  - enforcing character ceilings

  - extracting existing hashtags

  - producing JSON that another tool could consume later


  Does not fit for:


  - publishing to platform APIs

  - scheduling posts

  - adapting tone by platform strategy

  - ranking copy by performance

  - generating images or carousels

  - collecting performance metrics'
live_behavior_check: 'Sample execution confirmed JSON output and per-platform sizing worked. One caution surfaced on Windows
  PowerShell stdin: piped content may retain a leading BOM, which showed up as `\ufeff` at the start of generated content.
  That is not a blocker for file-based usage, but it is a real integration edge case for `--stdin`.'
new_wired_tools_since_v1: 'Net new tool confirmed in this cycle:


  - `cex_social_publisher.py` - formatter only, no network dispatch


  Related wiring already present around it:


  - `_tools/cex_8f_motor.py` maps `social_publisher` and social intents

  - `_tools/cex_schema_hydrate.py` includes `social-publisher-builder`

  - `N02_marketing/P04_tools/social_publisher_marketing.md` documents the broader publishing shape


  This means the codebase now has:


  - intent routing

  - builder/schema awareness

  - format-time execution


  It still does not have:


  - a scheduler tool

  - an analytics collector

  - an A/B execution harness

  - an image generation wrapper'
