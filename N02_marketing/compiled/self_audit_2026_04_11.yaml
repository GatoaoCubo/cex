2_rules_compliance: 'Source: `.claude/rules/n02-marketing.md`.


  | # | Rule | Line | Score | Evidence |

  |---:|---|---|---:|---|

  | 1 | "Artifacts live in N02_marketing/" | L22 | 10/10 | All 64 artifacts under this prefix |

  | 2 | "Persuasive writing that converts" | L23 | 4/10 | 40% of artifacts are KCs/context_docs, not persuasive copy |

  | 3 | "clarity -> desire -> action" | L24 | 3/10 | Narrative rule, unmeasurable. No structural enforcement |

  | 4 | "A/B copy variants standard practice" | L25 | 2/10 | 1 framework file (`config/ab_testing_framework.md`). Zero A/B
  artifact pairs produced |

  | 5 | 8F reasoning protocol | L29 | 5/10 | Rules reference it; no 8F traces embedded in artifacts; no F1-F8 markers |

  | 6 | "Domain-specific marketing/copy content" | L32 | 5/10 | Half-compliant: frontend content dominates. `kc_tailwind_patterns`
  is CSS, not copy |

  | 7 | "quality: null (NEVER self-score)" | L33 | 0/10 | 52/64 violation (81%). Example: `agents/agent_marketing.md:quality:
  9.2` |

  | 8 | "Compile after save" | L34 | 9/10 | 59 `compiled/*.yaml` vs 64 source = 92% compile rate. 5 uncompiled |

  | 9 | Routing TO N02: copy/ads/CTAs/landing/email | L37 | 6/10 | Partial — many artifacts are visual design, not copy |

  | 10 | Routing AWAY: research/build/deploy | L38 | 7/10 | Some leakage: KCs on CSS belong closer to N03 |


  Overall compliance: 51/100. The rules are mostly aspirational — they describe what N02 should be (copy nucleus) vs what
  it is (frontend + copy hybrid).'
aspirational_only_rules_flagged_for_revision_by_n07:
- L24 "clarity -> desire -> action" — Untestable. Needs a concrete quality_gate pointing to `feedback/quality_gate_marketing.md`
  dimensions.
- L25 "A/B variants standard" — Zero A/B artifact pairs exist. Either enforce or remove.
- 'L33 "quality: null" — Either change the rule to `min_quality: 8.0` to reflect reality, or run a sweep to null all 52 offenders.'
