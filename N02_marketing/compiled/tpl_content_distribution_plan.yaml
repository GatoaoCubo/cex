purpose: 'You produced the content. Audio overview, flashcards, quiz, mind map, slides. All sitting in a notebook, branded
  and formatted. Now what? Without a distribution plan, that content dies in a folder. One brilliant podcast episode that
  nobody hears. Seventy-five flashcards that nobody studies. A quiz that nobody takes. This template turns a pile of assets
  into a coordinated multi-channel campaign. It decides WHERE each asset goes, WHEN it publishes, WHAT copy accompanies it,
  and HOW the pieces cross-promote each other. The goal is simple: one production run, maximum surface area. Used after all
  NotebookLM outputs are generated and formatted, and before the publishing workflows (`wf_cf_publish_*`) execute.'
variables_table: '| Name | Type | Required | Default | Description |

  |------|------|----------|---------|-------------|

  | BRAND_NAME | string | yes | -- | Brand identity |

  | BRAND_VOICE | string | yes | -- | Tone control |

  | TOPIC | string | yes | -- | Content subject |

  | CONTENT_ASSETS | list | yes | -- | Available assets |

  | TARGET_AUDIENCE | string | yes | -- | Audience persona |

  | DISTRIBUTION_CHANNELS | list | yes | -- | Target channels |

  | LAUNCH_DATE | string | no | -- | Publish date |

  | CAMPAIGN_DURATION | string | no | 7d | Campaign window |

  | CONTENT_GOAL | string | yes | -- | Primary goal |

  | CTA | string | yes | -- | Unified CTA |

  | BUDGET | string | no | $0 | Promo budget |'
template_body: "You are a content distribution strategist for {{BRAND_NAME}}. Voice: {{BRAND_VOICE}}.\n\nCONTEXT:\nTopic:\
  \ \"{{TOPIC}}\"\nAudience: {{TARGET_AUDIENCE}}\nGoal: {{CONTENT_GOAL}}\nBudget: {{BUDGET}}\nCampaign window: {{CAMPAIGN_DURATION}}\
  \ starting {{LAUNCH_DATE}}\n\nAvailable content assets:\n{{CONTENT_ASSETS}}\n\nTarget channels:\n{{DISTRIBUTION_CHANNELS}}\n\
  \nUnified CTA: {{CTA}}\n\n---\n\n## OUTPUT: DISTRIBUTION MATRIX\n\n### Asset-to-Channel Mapping\n\nFor EACH asset in {{CONTENT_ASSETS}},\
  \ specify:\n\n| Asset | Channel | Format Adaptation | Post Type | Day |\n|-------|---------|-------------------|-----------|-----|\n\
  | audio_overview | YouTube | Full episode + chapters + thumbnail | Long-form | D1 |\n| audio_overview | Spotify | Podcast\
  \ episode + show notes | Audio | D1 |\n| audio_overview | Instagram | 60s highlight clip + carousel | Reel + Post | D2 |\n\
  | audio_overview | LinkedIn | Key insight quote + episode link | Text post | D2 |\n| audio_overview | Newsletter | Episode\
  \ summary + embedded player | Email | D3 |\n| flashcards | Instagram | 5-card carousel (best-of selection) | Carousel |\
  \ D3 |\n| flashcards | LinkedIn | \"Test yourself\" interactive post | Poll/Post | D4 |\n| flashcards | Website | Embedded\
  \ Anki/Quizlet widget | Page | D1 |\n| quiz | Instagram | Story quiz (3 questions) | Story | D5 |\n| quiz | Newsletter |\
  \ \"How much did you learn?\" CTA | Email | D5 |\n| mind_map | LinkedIn | Visual + breakdown in caption | Image post | D4\
  \ |\n| mind_map | Instagram | Full-size image + zoom Story | Post + Story | D6 |\n| slides | LinkedIn | SlideShare/PDF carousel\
  \ upload | Document | D3 |\n| slides | YouTube | Narrated slideshow (TTS + slides) | Short video | D7 |\n\n### Publishing\
  \ Schedule\n\nGenerate a day-by-day schedule for {{CAMPAIGN_DURATION}}:\n\n| Day | Time (BRT) | Channel | Content | Copy\
  \ Hook | CTA |\n|-----|------------|---------|---------|-----------|-----|\n| D1 (Launch) | 09:00 | YouTube | Full audio\
  \ episode | [HOOK: curiosity about {{TOPIC}}] | {{CTA}} |\n| D1 | 09:00 | Spotify | Same audio, podcast format | [Same hook,\
  \ audio-native] | {{CTA}} |\n| D1 | 12:00 | LinkedIn | Launch announcement | [Authority angle] | Link to episode |\n| D2\
  \ | 10:00 | Instagram | 60s audio clip (best moment) | [Scroll-stopper from episode] | Link in bio |\n| D2 | 14:00 | Twitter/X\
  \ | Thread: 5 key insights | [Numbered insights] | {{CTA}} |\n| D3 | 08:00 | Newsletter | Episode recap + flashcards | [Value-first\
  \ subject line] | {{CTA}} |\n| D3 | 11:00 | Instagram | Flashcard carousel (5 cards) | [Learn this in 30 seconds] | Save\
  \ + share |\n| D4 | 10:00 | LinkedIn | Mind map visual | [Big picture view] | {{CTA}} |\n| D4 | 15:00 | LinkedIn | Quiz\
  \ question poll | [Test yourself] | Comment answer |\n| D5 | 09:00 | Instagram | Story quiz (3 questions) | [Swipe to play]\
  \ | Visit link |\n| D5 | 12:00 | Newsletter | \"Results are in\" follow-up | [Engagement callback] | {{CTA}} |\n| D6 | 10:00\
  \ | Instagram | Mind map zoomed + breakdown | [Deep dive visual] | Save this |\n| D7 | 09:00 | YouTube | Narrated slide\
  \ summary | [2-min recap for busy people] | {{CTA}} |\n| D7 | 14:00 | All channels | Campaign recap + evergreen pin | [Best-performing\
  \ repost] | {{CTA}} |\n\n### Copy Guidelines Per Channel\n\nFor EACH channel in {{DISTRIBUTION_CHANNELS}}, write:\n\nYouTube:\n\
  - Title: \"[NUMBER] Things About {{TOPIC}} That [OUTCOME]\" (max 60 chars)\n- Description: 3 paragraphs — hook, chapter\
  \ list, {{CTA}}\n- Tags: 10-15 relevant tags\n- Thumbnail text: max 4 words, high contrast on {{BRAND_COLORS}}\n\nSpotify:\n\
  - Episode title: \"{{TOPIC}} — [ANGLE]\"\n- Show notes: timestamps + key takeaways + {{CTA}}\n- Episode description: 2 paragraphs\
  \ max\n\nInstagram:\n- Reels: hook in first 3 seconds, text overlay, trending audio optional\n- Carousels: 5-10 slides,\
  \ first slide = hook, last slide = CTA\n- Stories: interactive elements (poll, quiz, slider)\n- Caption: hook line + value\
  \ + {{CTA}} + 10-15 hashtags\n\nLinkedIn:\n- Posts: hook line (contrarian or insight) + 3-5 short paragraphs + {{CTA}}\n\
  - Documents: PDF carousel with brand header on each slide\n- Polls: frame as knowledge test from flashcards\n\nNewsletter:\n\
  - Subject line: curiosity-driven, under 50 chars, no spam triggers\n- Preview text: complete the subject line's thought\n\
  - Body: personal greeting + value + {{CTA}} + P.S. with bonus\n- Frequency: max 2 emails per campaign\n\nTwitter/X:\n- Thread:\
  \ numbered insights, 1 idea per tweet, max 280 chars each\n- Solo tweet: best single insight + link\n- Quote retweet strategy:\
  \ engage with audience replies\n\n### Cross-Promotion Map\n\nShow how each piece drives traffic to the others:\n\nYouTube\
  \ episode\n  mentions --> \"Flashcards in the description\"\n  mentions --> \"Quiz on our Instagram Stories\"\n  end screen\
  \ --> Next episode + Subscribe\n\nSpotify episode\n  show notes --> Website (flashcards + quiz)\n  CTA --> \"Share on LinkedIn\"\
  \n\nInstagram carousel\n  last slide --> \"Full episode on YouTube/Spotify\"\n  Story --> Swipe-up to quiz\n\nLinkedIn post\n\
  \  body --> \"Full breakdown in our latest episode [LINK]\"\n  comments --> Pin flashcard image\n\nNewsletter\n  body -->\
  \ Links to YouTube + Spotify + Instagram\n  P.S. --> \"Share the flashcards with your team\"\n\n### Performance Tracking\n\
  \n| Metric | Channel | Target | Tool |\n|--------|---------|--------|------|\n| Views/Listens | YouTube, Spotify | 500+\
  \ in 7d | Platform analytics |\n| Engagement rate | Instagram, LinkedIn | 5%+ | Ayrshare analytics |\n| Click-through |\
  \ Newsletter | 15%+ | Email provider |\n| Saves/Shares | Instagram | 50+ | Platform analytics |\n| Quiz completions | Instagram\
  \ Stories | 100+ | Story insights |\n| Flashcard imports | Website | 25+ | Supabase tracking |\n\n## CONSTRAINTS\n- NEVER\
  \ publish the same copy on two channels — adapt for each platform\n- Every post MUST include {{CTA}} in some form\n- Organic-first\
  \ strategy: only use {{BUDGET}} for boosting top-performing D1-D3 posts\n- Respect platform rate limits: max 1 post/channel/day\
  \ (except Stories)\n- All visual assets must use {{BRAND_COLORS}} and {{BRAND_NAME}} watermark\n- Schedule times optimized\
  \ for {{TARGET_AUDIENCE}} timezone (default BRT)\n- Cross-promotion is mandatory — every post references at least one other\
  \ asset\n- Campaign must have a clear beginning (launch), middle (engagement), end (recap)"
