executive_summary: '`_tools/cex_social_publisher.py` is real, small, and immediately useful for N02. It closes the narrow
  gap of platform-sized copy formatting for X, LinkedIn, Instagram, Threads, Bluesky, and Mastodon. It does not close autonomous
  publishing, measurement, or optimization.


  The broader N02 stack is more wired than the raw tool suggests:


  - routing and social-publishing docs already exist

  - the N02 social publishing knowledge card exists

  - workflow docs reference scheduled publishing and analytics checkpoints


  Even with that surrounding wiring, the live executable gap remains: N02 can format posts, but still cannot run a closed-loop
  marketing system.'
