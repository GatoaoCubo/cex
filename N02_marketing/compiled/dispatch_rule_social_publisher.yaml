tldr: Routes social publishing tasks to N02 Marketing. Triggers on posting/publishing/social media keywords.
density_score: 0.88
routing: '| Field | Value |

  |-------|-------|

  | Target Nucleus | N02_marketing |

  | Target Tool | N02_marketing/tools/social_publisher_marketing.md |

  | Builder | archetypes/builders/social-publisher-builder/ |

  | Priority | standard |'
trigger_keywords: "primary:\n  - social publisher\n  - auto-posting\n  - publicar redes sociais\n  - postar instagram\n  -\
  \ postar facebook\n  - social media automation\n  - content calendar\n  - agendamento de posts\n  - ayrshare\n  - postiz\n\
  \nsecondary:\n  - hashtags\n  - caption generation\n  - posting schedule\n  - content mix\n  - product rotation"
routing_rules: '| Intent Pattern | Route To | Conf | Decision Logic |

  |---------------|----------|------|----------------|

  | "criar/build social publisher" | N03→N02 | 0.95 | N03 builds tool, N02 configures instance |

  | "configurar auto-posting para {empresa}" | N02 | 0.90 | Direct config task, company context required |

  | "publicar/postar no {platform}" | N02 | 0.90 | Execute pipeline, platform API integration |

  | "melhorar engagement/horarios" | N01→N02 | 0.85 | N01 analyzes data, N02 applies insights |

  | "deploy cron de publicacao" | N02→N05 | 0.85 | N02 validates config, N05 deploys infrastructure |

  | "implementar publisher em Python" | N03 | 0.80 | Code implementation, not configuration |

  | "monitorar posts automáticos" | N05 | 0.75 | Operations monitoring, not content creation |

  | "analytics de redes sociais" | N01 | 0.70 | Research task, data analysis focused |'
cross_nucleus_handoffs: '| From | To | Trigger | Payload |

  |------|-----|---------|---------|

  | N07 | N02 | "new company social publisher" | Company requirements |

  | N02 | N03 | "implement runtime" | Pipeline spec + config schema |

  | N02 | N05 | "deploy scheduling" | Cron config + monitoring rules |

  | N02 | N01 | "analyze audience" | Platform + niche + current metrics |

  | N02 | N06 | "sync catalog" | Catalog source config |'
validation: 'Before dispatching, verify:

  1. Company config exists or will be created

  2. At least 1 platform is specified

  3. Publisher API type is supported (ayrshare/postiz/meta_graph)

  4. No plaintext secrets in the request'
