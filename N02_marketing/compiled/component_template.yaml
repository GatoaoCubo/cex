anti_patterns: ''
what_not_to_do: '| ❌ Anti-Pattern | ✅ Correct Approach | Why |

  |----------------|-------------------|-----|

  | `<div onclick="">` buttons | `<button type="button">` | Screen readers need semantic button elements |

  | Custom CSS animations | `transition-colors` utility | Hardware acceleration + consistency |

  | Fixed pixel heights `h-[32px]` | Relative heights `h-10` | Better scaling across screen sizes |

  | Hardcoded colors `bg-blue-500` | Design tokens `bg-primary` | Brand consistency + dark mode support |

  | Missing focus styles | `focus:ring-2` classes | Keyboard accessibility requirement |

  | Single size components | Multiple size variants | Different contexts need different scales |

  | Inline styles `style=""` | Utility classes | Better performance + maintainability |

  | Generic onClick handlers | Specific semantic actions | Better UX + screen reader context |'
implementation_mistakes:
- Missing aria-labels on icon-only buttons → Always provide accessible text
- Using divs for interactive elements → Use semantic HTML (button, input, select)
- Skipping disabled states → Every interactive component needs disabled styling
- Ignoring touch targets → Minimum 44px height for mobile accessibility
- Breaking keyboard navigation → Test Tab, Enter, Space, Arrow keys
- Hardcoding brand colors → Use design tokens for theme consistency
accessibility_standards: ''
universal_a11y_requirements: "Every component must include:\n\n<!-- 1. Proper semantic markup -->\n<button type=\"button\"\
  \ role=\"button\">Click me</button>\n\n<!-- 2. Focus management -->\n<button class=\"focus:ring-2 focus:ring-ring focus:ring-offset-2\"\
  >Focusable</button>\n\n<!-- 3. ARIA labels when needed -->\n<button aria-label=\"Close dialog\">×</button>\n\n<!-- 4. Form\
  \ associations -->\n<label for=\"username\">Username</label>\n<input id=\"username\" aria-describedby=\"username-help\"\
  >\n<div id=\"username-help\">Enter your username</div>\n\n<!-- 5. Error announcements -->\n<div role=\"alert\" aria-live=\"\
  polite\">\n  Error message here\n</div>\n\n<!-- 6. Touch targets (44px minimum) -->\n<button class=\"h-11 px-4\">Touch-friendly</button>\n\
  \n<!-- 7. Color contrast compliance -->\n<!-- All text must have 4.5:1 contrast ratio minimum -->"
performance_optimization: ''
optimized_component_loading: "<!-- Minimal DOM for fast rendering -->\n<button class=\"btn-primary\">\n  <!-- Simple structure\
  \ -->\n</button>\n\n<!-- CSS-only animations -->\n<button class=\"transition-colors hover:bg-primary/90\">\n  <!-- Hardware-accelerated\
  \ transitions -->\n</button>\n\n<!-- Efficient class composition -->\n<div class=\"flex items-center space-x-2\">\n  <!--\
  \ Utility classes for minimal CSS -->\n</div>"
component_validation_workflow: '| Stage | Tool | Command | Pass Criteria | Output |

  |-------|------|---------|---------------|---------|

  | Performance | Lighthouse | `lighthouse component.html --only=performance` | Score ≥ 90 | Performance audit |

  | Accessibility | Lighthouse | `lighthouse component.html --only=accessibility` | Score ≥ 95 | A11y audit |

  | HTML Validation | W3C | `w3c-validator component.html` | 0 errors | Markup validation |

  | Component Tests | Jest/Vitest | `npm run test:component` | All tests pass | Unit test results |

  | CEX Compilation | CEX | `python _tools/cex_compile.py component.md` | Successful compile | YAML output |

  | CEX Health Check | CEX | `python _tools/cex_doctor.py --component` | All checks pass | Health report |

  | Integration Test | Playwright | `npx playwright test component.spec.js` | Visual + functional pass | E2E test results
  |

  | Bundle Analysis | Bundler | `npm run analyze` | Bundle size ≤ 10kb | Size optimization |


  This template ensures every component generated by N02 is production-ready, accessible, and follows modern design system
  patterns.'
