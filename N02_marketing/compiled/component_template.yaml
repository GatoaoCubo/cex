universal_component_structure: "---\ncomponent: {component_name}\nresponsive: true\na11y_compliant: true\ndark_mode: true\n\
  lighthouse_target: 90\ncomponent_type: {button|card|form|input|dialog|dropdown|navigation|table}\nvariants: {variant_count}\n\
  ---\n\n<!DOCTYPE html>\n<html lang=\"en\" class=\"h-full\">\n  <head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\"\
  \ content=\"width=device-width, initial-scale=1.0\">\n    <title>{Component Name} - Component Library</title>\n    \n  \
  \  <!-- Tailwind CSS -->\n    <script src=\"https://cdn.tailwindcss.com\"></script>\n    <script>\n      tailwind.config\
  \ = {\n        theme: {\n          extend: {\n            colors: {\n              border: '#e5e7eb',\n              input:\
  \ '#e5e7eb',\n              ring: '#50C878',\n              background: '#ffffff',\n              foreground: '#111827',\n\
  \              primary: {\n                DEFAULT: '#50C878',\n                foreground: '#ffffff',\n              },\n\
  \              secondary: {\n                DEFAULT: '#f3f4f6',\n                foreground: '#111827',\n             \
  \ },\n              destructive: {\n                DEFAULT: '#ef4444',\n                foreground: '#ffffff',\n      \
  \        },\n              muted: {\n                DEFAULT: '#f3f4f6',\n                foreground: '#6b7280',\n     \
  \         },\n              accent: {\n                DEFAULT: '#f3f4f6',\n                foreground: '#111827',\n   \
  \           },\n              popover: {\n                DEFAULT: '#ffffff',\n                foreground: '#111827',\n\
  \              },\n              card: {\n                DEFAULT: '#ffffff',\n                foreground: '#111827',\n\
  \              },\n            },\n            borderRadius: {\n              lg: '0.5rem',\n              md: '0.375rem',\n\
  \              sm: '0.125rem',\n            },\n          }\n        },\n        darkMode: 'class',\n      }\n    </script>\n\
  \  </head>\n  \n  <body class=\"min-h-screen bg-background p-8\">\n    \n    <!-- Component Showcase -->\n    <div class=\"\
  max-w-4xl mx-auto space-y-8\">\n      \n      <!-- Header -->\n      <div class=\"space-y-2\">\n        <h1 class=\"text-3xl\
  \ font-bold text-foreground\">{Component Name}</h1>\n        <p class=\"text-muted-foreground\">{component_description}</p>\n\
  \      </div>\n      \n      <!-- Variants Showcase -->\n      <div class=\"grid gap-8\">\n        {component_variants}\n\
  \      </div>\n      \n      <!-- Usage Examples -->\n      <div class=\"space-y-4\">\n        <h2 class=\"text-xl font-semibold\
  \ text-foreground\">Usage Examples</h2>\n        <div class=\"grid gap-4 md:grid-cols-2\">\n          {usage_examples}\n\
  \        </div>\n      </div>\n      \n      <!-- Accessibility Features -->\n      <div class=\"space-y-4\">\n        <h2\
  \ class=\"text-xl font-semibold text-foreground\">Accessibility Features</h2>\n        <div class=\"bg-muted rounded-lg\
  \ p-4\">\n          <ul class=\"space-y-2 text-sm text-muted-foreground\">\n            {accessibility_features}\n     \
  \     </ul>\n        </div>\n      </div>\n      \n    </div>\n    \n  </body>\n</html>"
