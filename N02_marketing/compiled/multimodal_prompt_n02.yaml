domain: creative-production
status: active
density_score: 1.0
purpose: 'Copy without visual context produces orphaned text. Visual without copy direction produces generic imagery. This
  prompt bridges both: a unified creative brief that makes the image and the caption inseparable. Two inputs. One impact.'
creative_direction_schema: "creative_brief:\n  campaign_id: string\n  asset_id: string\n  platform: instagram|linkedin|x|meta|tiktok|youtube\n\
  \  format: post|story|reel|carousel|email_hero|ad_creative\n\n  visual_direction:\n    primary_subject: string         \
  \ # \"founder at desk, working late, honest environment\"\n    mood: string                     # \"focused intensity, not\
  \ corporate polish\"\n    color_palette: array[hex]        # from brand_config.yaml or brief\n    avoid: array[string] \
  \            # \"stock photo smiles, white backgrounds, posed groups\"\n    text_overlay: string (nullable)  # text embedded\
  \ in image (if applicable)\n    dimensions:\n      width: integer\n      height: integer\n      aspect_ratio: string   \
  \        # \"4:5\" \"9:16\" \"1:1\" \"16:9\"\n\n  copy_direction:\n    hook: string                     # from action_prompt_n02_copy.md\
  \ (headline)\n    body: string                     # from action_prompt_n02_copy.md (body)\n    cta: string            \
  \          # from action_prompt_n02_copy.md (CTA)\n    hashtags: array[string]          # max per platform (validation_schema)\n\
  \n  visual_copy_relationship:\n    type: contrast|complement|reinforce|subvert\n    rationale: string"
visual_copy_relationship_types: '| Type | Definition | When to Use | Example |

  |------|-----------|------------|--------|

  | `contrast` | Visual says the opposite of copy | Pattern interrupt, curiosity hook | Image: chaotic desk. Copy: "The most
  organized campaign of your year." |

  | `complement` | Visual illustrates what copy states | Data or authority hooks | Image: graph rising. Copy: "40% more conversions.
  Here''s how." |

  | `reinforce` | Visual amplifies the emotion of copy | Pain or empathy hooks | Image: exhausted person. Copy: "We''ve been
  there too." |

  | `subvert` | Visual undermines the expected | Playful, bold brand voices | Image: polished product. Copy: "It''s not magic.
  It just looks like it." |'
system_prompt_template_creative_direction: 'You are the Creative Director for N02 Marketing. Your job is to brief

  a visual artist OR an image generation system on EXACTLY what to create

  to make this copy land with maximum impact.


  COPY (LOCKED -- do not change):

  Headline: {{headline}}

  Body: {{body}}

  CTA: {{cta}}


  PLATFORM: {{platform}} | FORMAT: {{format}} | DIMENSIONS: {{dimensions}}

  BRAND VOICE: {{brand_voice}} | ICP: {{icp_label}}


  Create a VISUAL BRIEF with these exact sections:


  PRIMARY SUBJECT: [what is in the image, described in 15 words or fewer]

  MOOD: [emotional atmosphere -- not abstract adjectives, but sensory descriptors]

  COMPOSITION: [where the subject sits, negative space, text safe zones]

  LIGHTING: [quality and direction of light -- natural/studio/dramatic/soft]

  COLOR STRATEGY: [palette, dominant color, accent, what to avoid]

  TEXT OVERLAY: [exact text to embed in image, or "none"]

  AVOID: [3-5 specific visual clichés to exclude]

  RELATIONSHIP TO COPY: [contrast|complement|reinforce|subvert -- one sentence explanation]'
platform_specific_visual_specs: '| Platform | Format | Dimensions | Safe Zone | Notes |

  |----------|--------|-----------|---------|-------|

  | Instagram | Post (portrait) | 1080x1350 | 1080x1215 center | Bottom 135px often cropped |

  | Instagram | Story | 1080x1920 | 1080x1420 center | Top/bottom 250px for UI |

  | Instagram | Reel | 1080x1920 | 1080x1420 center | Same as Story |

  | Instagram | Carousel | 1080x1080 | Full | Square; left edge continues |

  | LinkedIn | Post | 1200x628 | 1200x542 center | Wide landscape format |

  | LinkedIn | Vertical | 1080x1350 | 1080x1215 | Same as IG portrait |

  | Meta Ads | Feed | 1080x1080 | Full | Text max 20% of image |

  | Meta Ads | Story | 1080x1920 | 1080x1420 | UI zones at top/bottom |

  | X | Post | 1200x675 | Full | 16:9 wide format |

  | Email Hero | Desktop | 600x338 | Full | 2:1 ratio standard |'
carousel_sequence_schema: "For carousel format, coordinate visual narrative across cards:\n\ncarousel_sequence:\n  card_count:\
  \ integer (2-10)\n  narrative_arc: teaser|serial|list|comparison|tutorial\n  cards:\n    - position: 1\n      role: hook\
  \ (stop the scroll)\n      visual: string\n      copy: string (short -- this gets read)\n    - position: 2\n      role:\
  \ body (build desire)\n      visual: string\n      copy: string\n    # ...\n    - position: last\n      role: cta (convert)\n\
  \      visual: string\n      copy: string (CTA prominent)\n  visual_continuity: true   # bleeding image across card edges"
quality_self_check: 'Before delivering creative brief:

  - [ ] Visual brief is platform-correct dimensions

  - [ ] Text overlay is within character limits for embedded text

  - [ ] Visual-copy relationship type is declared and justified

  - [ ] No generic/stock-photo visual direction (specific, ownable)

  - [ ] Carousel has narrative arc (not random sequence)

  - [ ] Brand color palette referenced (from brand_config.yaml)'
integration:
- 'Called by: `workflow_campaign_pipeline.md` (F5 CREATE, if visual assets required)'
- 'Extends: `action_prompt_n02_copy.md` (adds visual layer to copy outputs)'
- 'Feeds: `social_publisher_n02.md` (image brief -> image -> publish)'
- 'Validated by: `validation_schema_content_spec.md` (text overlay limits)'
