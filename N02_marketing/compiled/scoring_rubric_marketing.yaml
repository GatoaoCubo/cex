purpose: Evaluate N02 copy output across 5 dimensions. Applies to any copy deliverable. Score each dimension 0–10. Apply weight.
  Final score = weighted sum.
dimensions: '| Dimension | Weight | Scale | Score 10 | Score 5 | Score 0 |

  |-----------|--------|-------|----------|---------|---------|

  | Hook Strength | 30% | 0–10 | First 10 words create irresistible curiosity, tension, or desire; reader cannot stop | Hook
  is present but predictable; mild interest only | No hook; copy starts with "We are..." or product name |

  | Conversion Clarity | 25% | 0–10 | Single CTA is specific, benefit-first, zero friction; reader knows exactly what happens
  next | CTA present but generic ("Learn more"); benefit implied not stated | No CTA, or multiple conflicting CTAs that dilute
  focus |

  | Readability | 20% | 0–10 | Flesch >= 65, avg sentence <= 15 words, zero passive voice, zero jargon without explanation
  | Flesch 50–64, occasional long sentences, 1–2 jargon terms | Flesch < 50, dense paragraphs, heavy jargon, no skimmability
  |

  | Brand Voice Fit | 15% | 0–10 | Copy is indistinguishable from brand''s own voice; correct tone, vocabulary, persona |
  Copy is neutral/generic; not wrong but not distinctly brand | Copy clashes with brand tone; too formal, too casual, or off-persona
  |

  | A/B Coverage | 10% | 0–10 | >= 3 headline variants + >= 2 CTA variants; variants are meaningfully different (not just
  synonyms) | 2 variants present but barely differentiated | No variants; one version of everything |'
scoring_example: "Hook Strength:      8.5 × 0.30 = 2.55\nConversion Clarity: 9.0 × 0.25 = 2.25\nReadability:        8.0 ×\
  \ 0.20 = 1.60\nBrand Voice Fit:    7.5 × 0.15 = 1.13\nA/B Coverage:       9.0 × 0.10 = 0.90\n                          \
  \    ------\n                    TOTAL =   8.43 → PUBLISH tier"
tier_thresholds: '| Tier | Score | Action |

  |------|-------|--------|

  | GOLDEN | >= 9.5 | Save as canonical example in `N02_marketing/P05_output/examples/` |

  | PUBLISH | >= 8.0 | Deliver to client or deploy to campaign |

  | REVIEW | >= 7.0 | Return to N02 with specific dimension feedback and retry instructions |

  | REJECT | < 7.0 | Full redo — restart from audience research, change formula approach |'
calibration:
- 'GOLDEN: Hook creates genuine tension; CTA so specific it answers "what exactly do I get?"; reads at 7th-grade level; sounds
  exactly like the brand; 3+ meaningfully different A/B variants'
- 'PUBLISH: Strong hook; clear CTA with benefit; readable; brand voice mostly correct; 3 variants present'
- 'REVIEW: Hook is generic; CTA is adequate; readable but some jargon; neutral voice; variants are near-duplicates'
- 'REJECT: No hook; CTA is "click here"; hard to read; off-brand; single version with no variants'
revision_instructions_by_dimension: '| Dimension scores < 7 | Revision Action |

  |---------------------|----------------|

  | Hook Strength | Rewrite opening with question, bold stat, or "If you..." opener. Apply 4U formula. |

  | Conversion Clarity | Replace generic CTA. Template: "[Verb] my [specific benefit] [optional: in X minutes]" |

  | Readability | Break sentences at 15 words. Replace jargon. Use active voice. |

  | Brand Voice Fit | Re-read brand voice card. Replace 3 words that feel off-brand. |

  | A/B Coverage | Generate 2 more headline variants using different formulas (AIDA vs PAS). |'
dimension_weight_rationale:
- 'Hook (30%): If the hook fails, no one reads the rest — highest weight.'
- 'Conversion Clarity (25%): The CTA is the conversion moment; vague CTAs lose 20–30% clicks.'
- 'Readability (20%): Dense copy loses mobile readers; Flesch < 50 correlates with 40% drop in scroll depth.'
- 'Brand Voice (15%): Voice mismatches erode trust; weight lower than conversion because neutral voice still converts.'
- 'A/B Coverage (10%): Variants enable testing; weight lowest because quality of variants matters more than count.'
peer_review_protocol:
- Scorer reads deliverable cold (no context from requester)
- Scores each dimension independently before reading other dimensions
- Writes 1-sentence rationale per dimension
- Flags any [PROOF NEEDED] or [STAT NEEDED] placeholders found
- Notes top 1 revision action if score < 8.0
- 'Applies score to frontmatter: `quality: {score}` (NEVER self-applied by N02)'
