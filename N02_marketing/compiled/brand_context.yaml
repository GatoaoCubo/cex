brand_voice_system: '- BRAND_VOICE_TONE: sofisticado-acolhedor, informativo sem ser técnico demais, minimalista e direto


  | Dimension | Score (1-5) | Implication |

  |-----------|-------------|-------------|

  | Formality | 3 | Balanced — neither stiff nor casual |

  | Enthusiasm | 3 | Measured — confident without being salesy |

  | Humor | 2 | Minimal — warmth comes from empathy, not jokes |

  | Warmth | 4 | High — core caregiver trait, always present |

  | Authority | 3 | Moderate — expertise through evidence, not declaration |'
voice_dos_and_don_ts: '| Do | Don''t |

  |----|-------|

  | Usar frases curtas e parágrafos enxutos | Prometer milagres ou resultados garantidos |

  | Explicar o porquê — ciência acessível, nunca jargão | Usar gíria, infantilizar ou falar como pet shop genérico |

  | Dar passos práticos e acionáveis (protocolos da Ro) | Medicalizar sem respaldo veterinário |

  | Tratar o tutor como parceiro, nunca como ignorante | Usar CAPS LOCK, excesso de emojis ou tom de vendedor |

  | Contextualizar produto como meio, não como fim | Comparar diretamente com concorrentes pelo nome |'
brand_values_messaging_pillars:
- Amor aos felinos
- Educação acolhedora
- Qualidade impecável
- Inovação com propósito
- Comunidade
strategic_voice_application_guidelines: ''
when_to_emphasize_warmth_4_5:
- 'New customer onboarding: Lead with empathy and understanding'
- 'Problem-solving content: Address tutor concerns with care'
- 'Community building: Foster connection and belonging'
- 'Educational content: Create safe learning environment'
when_to_emphasize_authority_3_5:
- 'Product benefits: Demonstrate expertise without being cold'
- 'Scientific backing: Present research-based solutions'
- 'Protocol instructions: Clear, confident guidance (Ro''s protocols)'
- 'Trust building: Establish credibility with balanced confidence'
customer_segment_voice_mix: '| Segment | Warmth Focus | Authority Focus | Scenario |

  |---------|--------------|-----------------|----------|

  | New cat owners | High (4-5) | Moderate (3) | Overwhelmed, need reassurance |

  | Experienced tutors | Moderate (3-4) | Higher (3-4) | Want expertise, less hand-holding |

  | Problem solving | High (4) | High (3-4) | Stressed, need both comfort + solutions |

  | Purchase decisions | Moderate (3) | High (3-4) | Need confidence in quality |'
voice_balance_anti_patterns:
- 'Too warm + low authority: Sounds unprofessional, undermines trust'
- 'Too formal + low warmth: Cold pet store vibe, contradicts caregiver archetype'
- 'High enthusiasm: Overpowers sophistication, sounds like generic pet marketing'
content_pillar_distribution_for_campaigns: '| Pillar | Weight | Campaign Application |

  |--------|--------|---------------------|

  | Produtos em destaque (40%) | Dominant | Product launches, seasonal promotions, curated collections |

  | Educacional (30%) | Strong | Blog posts, social "Você sabia?", email series |

  | Dicas da Ro (20%) | Supporting | Instagram stories, quick-tip reels, protocol PDFs |

  | Tendências (10%) | Minimal | Trend roundups, seasonal design features |'
transformation_arc_for_storytelling: 'From: Tutor inseguro com gato estressado em casa bagunçada To: Tutor confiante com felino
  feliz em lar elegante Through: Educação acolhedora da Ro + curadoria de produtos premium validados por veterinários'
