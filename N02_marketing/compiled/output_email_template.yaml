id: p05_output_email_template
kind: output_validator
pillar: P05
title: Responsive Email HTML Template with Outlook Compatibility
tldr: Production-ready responsive email templates with Outlook compatibility, dark mode support, and mobile optimization
version: 1.0.0
created: 2026-04-01
author: n02_visual_frontend
domain: frontend
quality: 8.8
density_score: 1.0
purpose: Provides production-ready responsive email templates with comprehensive Outlook compatibility, dark mode support,
  and web-safe typography. Ensures consistent rendering across all major email clients including Outlook 2007-2019, Gmail,
  Apple Mail, and mobile clients.
template_structure: ''
core_architecture:
- 'Table-based layout: Ensures Outlook 2007+ compatibility'
- 'Max-width 600px: Standard email client viewport'
- 'Inline CSS: Required for email client parsing'
- 'MSO conditionals: Outlook-specific styling'
- 'Dark mode media queries: Modern email client support'
- 'Web-safe font stack: Fallback typography system'
required_components:
- DOCTYPE and MSO compatibility headers
- Container table with max-width constraint
- Header section with logo and navigation
- Content sections with responsive spacing
- Footer with unsubscribe and social links
- Dark mode color schemes
- Mobile breakpoint optimizations
