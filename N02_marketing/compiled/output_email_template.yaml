variants: '| Type | Purpose | Key Elements |

  |------|---------|-------------|

  | Welcome | New user onboarding | Email verification CTA, feature highlights |

  | Transactional | Confirmations, receipts | Transaction details, support contact |

  | Marketing | Promotions, announcements | Headlines, product showcases, strong CTAs |

  | Cart Abandonment | Recover purchases | Product reminders, urgency, checkout links |'
common_issues_solutions: '| Problem | Cause | Solution |

  |---------|-------|----------|

  | Buttons broken in Outlook | Missing VML markup | Add `<!--[if mso]>` VML button code |

  | Images not loading | Blocked by default | Use alt text, test without images |

  | Dark mode not working | Missing meta tags | Add `color-scheme` and `supported-color-schemes` |

  | Mobile layout broken | No viewport meta | Add viewport meta tag and responsive CSS |

  | Gmail clipping | Email over 102KB | Reduce HTML size, optimize images |

  | Fonts not rendering | Web fonts unsupported | Use web-safe font stack with fallbacks |

  | Spacing inconsistent | Margin/padding differences | Use table cell padding instead of margins |

  | Links not tracking | Missing UTM parameters | Add campaign tracking to all links |'
implementation_guidelines: ''
setup_requirements:
- 'Variable Replacement: Use `{{variable_name}}` for dynamic content'
- 'Image Hosting: Host on reliable CDN with HTTPS'
- 'Testing Tools: Litmus or Email on Acid for client compatibility'
outlook_compatibility:
- 'MSO Conditionals: Required for Outlook 2007-2019'
- 'Table Structure: Mandatory for consistent layout'
- 'VML Buttons: Essential for proper CTA rendering'
performance_optimization:
- 'Inline CSS: Required for maximum compatibility'
- 'HTML Size: Keep under 102KB for Gmail'
- 'Image Compression: Use optimized formats'
- 'Font Sizes: Minimum 14px for mobile readability'
