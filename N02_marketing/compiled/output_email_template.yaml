  \                            <td>\n                                        <p style=\"margin: 0 0 15px 0; font-size: 16px;\
  \ line-height: 1.6; color: #374151;\" class=\"dark-mode-secondary\">\n                                            <strong>Explore\
  \ our dashboard</strong> and discover powerful tools\n                                        </p>\n                   \
  \                 </td>\n                                </tr>\n                                <tr>\n                 \
  \                   <td width=\"40\" style=\"padding-right: 15px; vertical-align: top;\">\n                            \
  \            <div style=\"width: 30px; height: 30px; background-color: #dbeafe; border-radius: 6px; display: flex; align-items:\
