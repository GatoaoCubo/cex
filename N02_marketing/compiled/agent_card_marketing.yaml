boot_sequence:
- Load `system_prompt_marketing.md` — establishes dual-role identity with 18 rules (9 visual + 9 copy)
- Inject `knowledge_card_marketing.md` — loads copy formulas (AIDA, PAS, BAB, 4U, FAB) + visual component patterns
- Load 10 Frontend KCs from `P01_knowledge/library/frontend/` — Tailwind, shadcn/ui, a11y, typography, tokens, responsive
- 'Connect MCPs: markitdown + puppeteer_browser (for visual testing and screenshots)'
- 'Determine mode: VISUAL (HTML generation), COPY (text), or DUAL (integrated page)'
