  ╚══════════════════════════════════════════════╝'
json_report_format_json: "{\n  \"file\": \"email_sequence_template.md\",\n  \"timestamp\": \"2026-04-07T19:55:00-03:00\",\n\
  \  \"scores\": {\n    \"readability\": 8.2,\n    \"persuasion\": 7.5,\n    \"cta_grade\": \"A\",\n    \"brand_voice\": 9.0,\n\
  \    \"funnel_alignment\": \"correct\",\n    \"overall\": 8.2\n  },\n  \"issues\": [...],\n  \"suggestions\": [...],\n \
  \ \"formula_detected\": \"PAS\",\n  \"word_count\": 342,\n  \"reading_time_seconds\": 82\n}"
integration: '| Direction | Target | Data |

  |-----------|--------|------|

  | Input ← | Any N02 copy artifact | .md files with copy content |

  | Input ← | `brand_config.yaml` | Brand voice settings |

  | Output → | `copy_optimization_insights.md` | Analysis patterns feed memory |

  | Output → | `cex_score.py` | Scores compatible with peer review |

  | Output → | `cex_feedback.py` | Quality tracking integration |

  | Trigger | `cex_hooks.py` | Auto-run on pre-commit for copy files |'
quality_gates: "pass_criteria:\n  - readability_score >= 7.0\n  - persuasion_score >= 6.0\n  - cta_grade in [A, B]  # C and\
  \ F = fail\n  - brand_voice_score >= 7.0\n  - funnel_alignment = correct or ambiguous  # mismatch = fail\n  - no_critical_issues\
  \  # (0 F-grade CTAs, 0 brand violations)\n\nauto_fix_capable:\n  - passive_voice → active_voice suggestion\n  - long_sentences\
  \ → split recommendation\n  - generic_CTA → specific_CTA variants\n  - missing_urgency → urgency element suggestions"
nucleus_dependencies: '| Dependency | What | Why |

  |------------|------|-----|

  | `brand_config.yaml` | Brand voice settings | Voice compliance requires brand context |

  | `scoring_rubric_marketing.md` | Evaluation criteria | Aligns scores with N02 quality standards |

  | `kc_email_sequence.md` | Email patterns | Validates sequence copy against KC rules |

  | `kc_campaign.md` | Campaign patterns | Validates campaign copy against KC rules |'
