tldr: Scores headlines on 4 dimensions (Useful, Urgent, Unique, Ultra-specific), generates A/B variants, predicts relative
  CTR lift, and recommends the winner. Every headline enters a tournament — only the strongest survives.
density_score: 0.92
purpose: 'Rapid headline evaluation and variant generation. Takes 1+ headlines, scores each on the 4U framework, generates
  optimized alternatives, and recommends the highest-potential winner. Designed for speed: score 10 headlines in 3 seconds,
  ship the best one.'
pipeline: "INPUT (1+ headlines)\n    │\n    ▼\n┌──────────────────┐\n│  4U SCORING      │\n│  Useful: 1-3     │\n│  Urgent:\
  \ 1-3     │\n│  Unique: 1-3     │\n│  Ultra-spec: 1-3 │\n│  Total: 4-12     │\n└────────┬─────────┘\n         │\n    ┌────┼────┐\n\
  \    ▼    ▼    ▼\n PATTERN  WORD  EMOTION\n DETECT   POWER  SCORE\n    │    │    │\n    └────┼────┘\n         ▼\n┌──────────────────┐\n\
  │  VARIANT GEN     │\n│  3 alternatives  │\n│  per input       │\n└────────┬─────────┘\n         │\n    ┌────┼────┐\n  \
  \  ▼    ▼    ▼\n RANK   BEST  REPORT\n ALL    PICK  OUTPUT"
usage: "# Score a single headline\npython headline_scorer.py \"7 Ways to Double Your Email Open Rate\"\n\n# Score multiple\
  \ headlines (comparison mode)\npython headline_scorer.py --compare \\\n  \"7 Ways to Double Your Email Open Rate\" \\\n\
  \  \"How to Get More Email Opens\" \\\n  \"Email Marketing Tips That Work\"\n\n# Score + generate variants\npython headline_scorer.py\
  \ --variants \"Stop Losing Leads to Bad Copy\"\n\n# Score from file (one headline per line)\npython headline_scorer.py --file\
  \ headlines.txt\n\n# Score with context (audience + funnel stage)\npython headline_scorer.py --audience b2c --funnel tofu\
  \ \\\n  \"The CTA Mistake Costing You 40% of Conversions\"\n\n# Output JSON\npython headline_scorer.py --format json \"\
  Your Headline Here\"\n\n# Tournament mode (score all, rank, pick winner)\npython headline_scorer.py --tournament --file\
  \ all_headlines.txt"
scoring_framework_the_4u_method: ''
dimension_definitions: '| Dimension | Score 1 | Score 2 | Score 3 |

  |-----------|---------|---------|---------|

  | Useful | No clear benefit | Implied benefit | Explicit, specific benefit |

  | Urgent | No time pressure | Soft urgency hint | Strong deadline/consequence |

  | Unique | Generic, anyone could say it | Some differentiation | Only YOUR offer fits this headline |

  | Ultra-specific | Vague ("improve results") | Somewhat specific ("better ROI") | Exact ("37% more clicks in 14 days") |'
scoring_examples: '"Marketing Tips" → U:1 Ur:1 Un:1 Us:1 = 4/12 ❌ WEAK

  Diagnosis: No benefit, no urgency, completely generic, zero specificity.


  "How to Get More Leads" → U:2 Ur:1 Un:1 Us:1 = 5/12 ⚠️ BELOW AVERAGE

  Diagnosis: Implied benefit (leads), but no urgency, generic, vague.


  "7 Email Hacks That Doubled Our Reply Rate" → U:3 Ur:1 Un:2 Us:3 = 9/12 ✅ STRONG

  Diagnosis: Specific benefit (reply rate), unique claim (our = story), ultra-specific (7, doubled).


  "Last Day: Get 3x More Leads Before Price Doubles" → U:3 Ur:3 Un:2 Us:3 = 11/12 🔥 EXCELLENT

  Diagnosis: All 4 dimensions firing. Specific, urgent, benefit-rich, numbered.'
score_thresholds: '| Total Score | Rating | Action |

  |-------------|--------|--------|

  | 4-5 | ❌ Weak | Rewrite completely |

  | 6-7 | ⚠️ Below Average | Improve 2+ dimensions |

  | 8-9 | ✅ Strong | Minor tweaks, test as-is |

  | 10-11 | 🔥 Excellent | Ship immediately |

  | 12 | 💎 Perfect | Rare. Celebrate then ship. |


  ---'
power_word_detection: ''
emotional_power_words_boost_engagement: 'desire_words: [free, exclusive, secret, proven, guaranteed, instant, effortless]

  fear_words: [mistake, warning, avoid, never, losing, failing, risk]

  curiosity_words: [hidden, unexpected, strange, weird, shocking, little-known]

  authority_words: [research, study, data, science, expert, Harvard, Stanford]

  urgency_words: [now, today, limited, deadline, last, before, hurry, closing]'
power_word_score: '0 power words: -1 from total (flat, lifeless)

  1-2 power words: +0 (baseline)

  3+ power words: +1 bonus (careful — too many = spam feel)


  ---'
pattern_detection: ''
high_performance_headline_patterns: '| Pattern | Detection Rule | Avg CTR Lift |

  |---------|---------------|-------------|

  | Number-first | Starts with digit (1-99) | +15-25% |

  | How-to | Starts with "How to" | +10-20% |

  | Question | Ends with "?" | +8-15% |

  | Negative frame | Contains "stop/avoid/never/mistake" | +12-20% |

  | Parenthetical | Contains (...) or [...] | +5-10% |

  | Colon split | Contains ":" | +5-8% |'
pattern_compatibility_matrix: '| Pattern | TOFU | MOFU | BOFU |

  |---------|------|------|------|

  | Number-first | ★★★ | ★★ | ★ |

  | How-to | ★★ | ★★★ | ★ |

  | Question | ★★★ | ★★ | ★★ |

  | Negative | ★★★ | ★★ | ★ |

  | Parenthetical | ★★ | ★★ | ★★★ |

  | Colon split | ★★ | ★★★ | ★★ |


  ---'
variant_generation: 'For each input headline, generate 3 alternative variants using different angles:'
variant_strategies: "variant_1_pain_reframe:\n  strategy: \"Rewrite from problem angle\"\n  input: \"7 Ways to Get More Leads\"\
  \n  output: \"Stop Losing 73% of Your Website Visitors\"\n  \nvariant_2_specificity_boost:\n  strategy: \"Add numbers, names,\
  \ or timeframes\"\n  input: \"How to Write Better Headlines\"\n  output: \"How to Write Headlines That Get 3x More Clicks\
  \ (in 10 Minutes)\"\n  \nvariant_3_curiosity_gap:\n  strategy: \"Open a loop the reader must close\"\n  input: \"Email Marketing\
  \ Best Practices\"\n  output: \"The One Email Trick That 91% of Marketers Miss\""
variant_quality_rules: '1. Every variant must score HIGHER than the original on 4U

  2. Each variant uses a DIFFERENT pattern (avoid repetition)

  3. At least 1 variant must include a number

  4. At least 1 variant must be under 8 words (snappy)

  5. Mark the ★ recommended variant


  ---'
character_limit_validation: "platform_limits:\n  email_subject: 50 chars (41 ideal — mobile preview cutoff)\n  facebook_ad:\
  \ 40 chars\n  google_search: 30 chars per headline\n  linkedin_ad: 70 chars\n  blog_post: 60 chars (SEO title tag)\n  twitter:\
  \ 280 chars (full tweet as headline)\n  push_notification: 65 chars\n\nvalidation:\n  under_limit: \"✅ PASS\"\n  over_limit:\
  \ \"⚠️ OVER by [N] chars — truncated version suggested\"\n  multi_platform: \"check all intended platforms simultaneously\"\
  \n\n---"
