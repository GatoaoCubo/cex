  (280 chars total including link)


  ---'
6_youtube_pre_roll_script_15_30s: ''
template_skip_proof_structure: "SECOND 0-5 (survive the skip button):\n\"If you [RELEVANT_ACTIVITY], you need to see this.\"\
  \n[VISUAL: Immediate relevant context]\n\nSECOND 5-15 (problem + solution):\n\"Most [AUDIENCE] waste [RESOURCE] on [WEAK_APPROACH].\n\
  [PRODUCT_NAME] [KEY_DIFFERENTIATOR] — \ngiving you [SPECIFIC_RESULT] in [TIMEFRAME].\"\n[VISUAL: Product demo or results]\n\
  \nSECOND 15-25 (proof + CTA):\n\"[SOCIAL_PROOF_METRIC] already switched.\nClick the link below to [SPECIFIC_ACTION] — [GUARANTEE].\"\
  \n[VISUAL: CTA overlay + URL]\n\n---"
creative_variant_matrix_apply_to_any_platform: 'For every ad, produce 3 variants minimum:


  | Variant | Hook Angle | CTA Style | When It Wins |

  |---------|-----------|-----------|-------------|

  | V1: Pain | Opens with the problem | "Stop [pain]" | Cold audiences, problem-aware |

  | V2: Gain | Opens with the result | "Get [result]" | Warm audiences, solution-aware |

  | V3: Proof | Opens with testimonial/data | "Join [number]+" | Retarget, brand-aware |'
hook_formula_bank: "pain_hooks:\n  - \"Still [struggling with X]?\"\n  - \"Tired of [negative experience]?\"\n  - \"If [pain\
  \ scenario], this is for you\"\n  - \"[X] is costing you more than you think\"\n\ngain_hooks:\n  - \"[Result] in [timeframe]\
  \ — here's how\"\n  - \"What if you could [desire] without [objection]?\"\n  - \"The fastest way to [outcome]\"\n  - \"\
  Imagine [desired future state]\"\n\nproof_hooks:\n  - \"[Number]+ [audience] already use this\"\n  - \"[Name] went from\
  \ [before] to [after]\"\n  - \"Rated [rating]★ by [number] [audience]\"\n  - \"Featured in [publication/platform]\"\n\n\
  curiosity_hooks:\n  - \"Nobody talks about this [category] trick...\"\n  - \"I tested [number] [things] — only [few] worked\"\
  \n  - \"The [thing] that changed everything for me\"\n  - \"Wait until you see what happens at [timestamp]\"\n\n---"
