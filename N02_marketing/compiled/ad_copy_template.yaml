1_facebook_instagram_ad_templates: ''
template_a_problem_agitate_pain_hook: 'PRIMARY TEXT:

  Still [STRUGGLING_WITH_PROBLEM]?


  You''ve tried [COMMON_SOLUTION]. But [REASON_IT_FAILS].


  [PRODUCT_NAME] [KEY_DIFFERENTIATOR] — so you can [DESIRED_OUTCOME] without [BIGGEST_OBJECTION].


  [SOCIAL_PROOF_METRIC] already made the switch.


  HEADLINE: [OUTCOME] Without [PAIN] → Get Started

  DESCRIPTION: [GUARANTEE] · [URGENCY]

  CTA BUTTON: Learn More / Sign Up / Get Offer'
template_b_result_hook_proof_first: 'PRIMARY TEXT:

  [SPECIFIC_RESULT] in [TIMEFRAME].


  That''s what [CUSTOMER_NAME] achieved with [PRODUCT_NAME].


  Before: [BEFORE_STATE]

  After: [AFTER_STATE]


  The difference? [ONE_SENTENCE_EXPLANATION].


  Want the same results?


  HEADLINE: From [BEFORE] to [AFTER] → See How

  DESCRIPTION: Join [NUMBER]+ [AUDIENCE]

  CTA BUTTON: Learn More'
template_c_curiosity_gap: 'PRIMARY TEXT:

  I spent [TIMEFRAME] testing [NUMBER] [STRATEGIES/TOOLS] for [GOAL].


  Only [SMALL_NUMBER] actually worked.


  The #1 [STRATEGY/TOOL]? Not what you''d expect.


  [HINT_WITHOUT_REVEALING] — and it''s available now.


  HEADLINE: The [CATEGORY] Secret Nobody Talks About

  DESCRIPTION: [TIMEFRAME] research. [NUMBER] tests. 1 winner.

  CTA BUTTON: Learn More'
template_d_social_proof_cascade: "PRIMARY TEXT:\n\"[SHORT_TESTIMONIAL]\" — [NAME]\n\n\"[SHORT_TESTIMONIAL]\" — [NAME]  \n\n\
  \"[SHORT_TESTIMONIAL]\" — [NAME]\n\n[NUMBER]+ [AUDIENCE_TYPE] can't be wrong.\n\n[PRODUCT_NAME]: [ONE_LINE_DESCRIPTION]\n\
  \nHEADLINE: Rated [RATING]★ by [NUMBER]+ [AUDIENCE]\nDESCRIPTION: Try it risk-free · [GUARANTEE]\nCTA BUTTON: Get Started"
template_e_direct_offer: 'PRIMARY TEXT:

  🔥 [OFFER_HEADLINE]


  Get [PRODUCT/SERVICE]:

  ✅ [BENEFIT_1]

  ✅ [BENEFIT_2]

  ✅ [BENEFIT_3]


  [PRICE_ANCHOR]: Was $[OLD_PRICE] → Now $[NEW_PRICE]

  [URGENCY]: Offer ends [DATE/TIME]


  HEADLINE: [DISCOUNT]% Off [PRODUCT] — [TIMEFRAME] Only

  DESCRIPTION: [GUARANTEE] · Free [BONUS]

  CTA BUTTON: Get Offer / Shop Now


  ---'
2_google_search_ad_templates: ''
template_a_benefit_keyword_match: "HEADLINE 1: [KEYWORD] That [SPECIFIC_BENEFIT]\nHEADLINE 2: [SOCIAL_PROOF_NUMBER]+ [AUDIENCE]\
  \ Trust Us\nHEADLINE 3: [URGENCY] — [OFFER_DETAIL]\n\nDESCRIPTION 1: Tired of [PAIN_POINT]? [PRODUCT_NAME] [SOLVES_HOW].\
  \ \nGet [SPECIFIC_RESULT] in [TIMEFRAME]. [GUARANTEE].\nDESCRIPTION 2: ✅ [BENEFIT_1] ✅ [BENEFIT_2] ✅ [BENEFIT_3]. \nStart\
  \ your free [TRIAL/DEMO] today. No [COMMON_OBJECTION]."
template_b_question_answer: "HEADLINE 1: Looking for [SOLUTION_CATEGORY]?\nHEADLINE 2: [PRODUCT_NAME] — [ONE_WORD_DIFFERENTIATOR]\n\
  HEADLINE 3: Try Free for [TIMEFRAME]\n\nDESCRIPTION 1: Stop wasting [RESOURCE] on [WEAK_ALTERNATIVES]. \n[PRODUCT_NAME]\
  \ gives you [BENEFIT] + [BENEFIT]. Rated [RATING]★.\nDESCRIPTION 2: [FEATURE_1]. [FEATURE_2]. [FEATURE_3]. \nJoin [NUMBER]+\
  \ [AUDIENCE]. [CTA] today."
template_c_competitor_comparison: "HEADLINE 1: [PRODUCT] vs [COMPETITOR]? Read This\nHEADLINE 2: [KEY_ADVANTAGE] Other [CATEGORY]\
  \ Can't Match\nHEADLINE 3: Switch & Save [AMOUNT/PERCENTAGE]\n\nDESCRIPTION 1: [COMPETITOR] charges $[PRICE] for [LIMITED_FEATURE].\
  \ \n[PRODUCT] includes [BETTER_FEATURE] at [LOWER_PRICE]. See the comparison.\nDESCRIPTION 2: [SWITCHING_BENEFIT_1]. [SWITCHING_BENEFIT_2].\
  \ \n[GUARANTEE] — zero risk to try. [CTA].\n\n---"
3_linkedin_ad_templates: ''
template_a_thought_leadership_hook: "PRIMARY TEXT:\nI've helped [NUMBER] [PROFESSIONAL_AUDIENCE] [ACHIEVE_RESULT].\n\nHere's\
  \ the pattern I see in top performers:\n\nThey don't [COMMON_APPROACH].\nThey [COUNTERINTUITIVE_APPROACH].\n\nThe difference\
  \ in results? [SPECIFIC_METRIC].\n\nIf you're a [JOB_TITLE] who wants to [DESIRED_OUTCOME], \n[PRODUCT/RESOURCE_NAME] was\
  \ built for you.\n\n[CTA_LINK]\n\nHEADLINE: [COUNTERINTUITIVE_INSIGHT] — For [AUDIENCE]\nCTA BUTTON: Learn More / Download"
template_b_data_driven_authority: "PRIMARY TEXT:\nNew data from [NUMBER] [COMPANIES/PROFESSIONALS]:\n\n\U0001F4CA [STAT_1]\n\
  \U0001F4CA [STAT_2]  \n\U0001F4CA [STAT_3]\n\nThe takeaway? [ONE_SENTENCE_INSIGHT].\n\nWe compiled everything into a [RESOURCE_TYPE]\
  \ \n— download it free.\n\nHEADLINE: [YEAR] [INDUSTRY] Report — Free Download\nCTA BUTTON: Download\n\n---"
4_tiktok_ad_templates: ''
template_a_hook_first_video_script: 'HOOK (first 2 seconds — survive or die):

  "[PROVOCATIVE_STATEMENT or QUESTION]"


  OPTIONS:

  - "POV: You just discovered [PRODUCT] and..."

  - "Stop scrolling if you [PAIN_POINT]"

  - "Nobody talks about this [INDUSTRY] secret..."

  - "[NUMBER] things I wish I knew about [TOPIC]"


  BODY (10-20 seconds):

  [FAST-PACED_DEMONSTRATION or STORY]

  - Show the problem (2-3 sec)

  - Show the solution (5-8 sec)

  - Show the result (3-5 sec)


  CTA (last 3 seconds):

  "Link in bio" / "Comment [WORD] for the link" / "[SWIPE_CTA]"


  TEXT OVERLAY: [100 chars max]

  [BENEFIT] + [URGENCY] + [CTA]'
template_b_ugc_style_testimonial: "HOOK: \"Okay I need to talk about [PRODUCT_NAME]...\"\n\nBODY:\n\"I was SO skeptical. [BRIEF_BEFORE_STATE].\n\
  But after [TIMEFRAME] of using it...\n[SHOW_RESULT/TRANSFORMATION]\nLike... WHAT?!\"\n\nCTA: \"I put the link in my bio\
  \ — go try it\"\n\nPRODUCTION NOTE: \n- Film vertical (9:16)\n- Natural lighting, no studio feel\n- Captions always on (85%\
  \ watch muted)\n- Max 30 seconds (15-20 ideal)\n\n---"
