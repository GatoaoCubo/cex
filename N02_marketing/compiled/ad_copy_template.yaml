quality_gates_for_ad_copy: "must_pass:\n  - [ ] Hook stops scroll in first line (no preamble)\n  - [ ] Within platform character\
  \ limits (hard fail if over)\n  - [ ] CTA names specific action AND benefit\n  - [ ] Social proof present (number, name,\
  \ or metric)\n  - [ ] No banned words per platform (check policies)\n  - [ ] 3 variants produced (V1:pain, V2:gain, V3:proof)\n\
  \  - [ ] UTM parameters defined for tracking\n  - [ ] Target audience segment specified\n  - [ ] Funnel stage labeled (TOFU/MOFU/BOFU)\n\
  \  - [ ] Landing page URL confirmed and tested"
