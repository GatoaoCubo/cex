gato_campaign_types_performance_templates: ''
b2c_education_campaigns_primary_revenue_driver: "gato3_b2c_campaigns:\n  protocolo_launch:\n    type: \"Educational content\
  \ series → product soft-sell\"\n    channel_mix: \"Instagram (60%) + Email (30%) + Blog (10%)\"\n    copy_formula: \"Protocol\
  \ Framework (Problema → Ciência → 3 Passos → Resultado)\"\n    funnel_mapping:\n      awareness: \"Reel/Carrossel with protocol\
  \ teaser\"\n      consideration: \"Full protocol email + related product context\"\n      conversion: \"Protocol completion\
  \ + product as 'next step'\"\n    kpi_targets:\n      instagram_save_rate: 0.08  # protocols get saved\n      email_open_rate:\
  \ 0.35\n      product_page_visit: 0.12\n      conversion_to_purchase: 0.04\n    example_campaign:\n      name: \"Protocolo\
  \ Noite Tranquila\"\n      hook: \"Seu gato te acorda às 4h? Protocolo da Ro em 3 passos.\"\n      product_tie: \"Kit Enriquecimento\
  \ Noturno GATO³\"\n\n  community_challenge:\n    type: \"7-day challenge → community engagement → product discovery\"\n\
  \    channel_mix: \"Instagram Stories (50%) + WhatsApp group (30%) + Email (20%)\"\n    copy_formula: \"BAB (Before daily\
  \ challenge → After daily win → Bridge to next day)\"\n    kpi_targets:\n      challenge_completion: 0.40\n      ugc_generation:\
  \ 0.25\n      product_discovery: 0.15\n    example_campaign:\n      name: \"Desafio 7 Dias de Enriquecimento\"\n      hook:\
  \ \"7 dias, 7 brincadeiras, 1 gato mais feliz. Topa?\""
b2b_partnership_campaigns_growth_driver: "gato3_b2b_campaigns:\n  vet_partnership_outreach:\n    type: \"Professional outreach\
  \ → educational partnership proposal\"\n    channel_mix: \"Email (50%) + LinkedIn (30%) + Instagram DM (20%)\"\n    copy_formula:\
  \ \"FAB (Feature: educational content → Advantage: client retention → Benefit: revenue growth)\"\n    funnel_mapping:\n\
  \      cold_outreach: \"Ro introduces GATO³ mission + data point\"\n      warm_follow: \"Case study of existing partner\
  \ + ROI\"\n      proposal: \"Partnership deck with co-branded materials\"\n    kpi_targets:\n      email_open_rate: 0.30\n\
  \      response_rate: 0.12\n      meeting_booked: 0.05\n      partnership_signed: 0.25  # of meetings\n    voice_calibration:\
