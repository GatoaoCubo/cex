tldr: Complete landing page templates for 4 funnel stages — hero sections, benefit stacks, social proof patterns, CTA blocks,
  and objection handlers. Every section earns the next scroll.
density_score: 0.93
universal_page_structure: '┌─────────────────────────────────────┐

  │  HERO — Stop. Read. Want.           │  Above the fold

  │  (Headline + Subhead + CTA + Image) │

  ├─────────────────────────────────────┤

  │  PROBLEM — "You know this pain"     │  Emotional hook

  ├─────────────────────────────────────┤

  │  SOLUTION — "Here''s the relief"     │  Product introduction

  ├─────────────────────────────────────┤

  │  BENEFITS — "What changes for you"  │  3-5 benefit blocks

  ├─────────────────────────────────────┤

  │  PROOF — "Others already did it"    │  Testimonials + logos

  ├─────────────────────────────────────┤

  │  HOW — "Here''s the path"            │  3-step process

  ├─────────────────────────────────────┤

  │  OFFER — "Here''s what you get"      │  Value stack

  ├─────────────────────────────────────┤

  │  OBJECTIONS — "But what about..."   │  FAQ / guarantees

  ├─────────────────────────────────────┤

  │  FINAL CTA — "Your move"            │  Urgency + action

  └─────────────────────────────────────┘


  ---'
1_lead_capture_landing_page_tofu: 'Goal: Capture email in exchange for lead magnet Target conversion rate: 25-45%'
hero_section: '<!-- HEADLINE: Transformation statement -->

  <h1>From [CURRENT_STATE] to [DESIRED_STATE] — in [TIMEFRAME]</h1>


  <!-- SUBHEADLINE: How + social proof -->

  <p>Join [NUMBER]+ [AUDIENCE] who used [PRODUCT_NAME] to [SPECIFIC_RESULT].</p>


  <!-- DUAL CTA -->

  <button class="primary">Get [PRODUCT_NAME] Now — $[PRICE]</button>

  <a class="secondary">Watch the 2-minute demo ▶</a>'
what_s_inside_section: 'Inside this [RESOURCE_TYPE], you''ll discover:


  ✓ [SPECIFIC_BENEFIT_1] — [one-line expansion]

  ✓ [SPECIFIC_BENEFIT_2] — [one-line expansion]

  ✓ [SPECIFIC_BENEFIT_3] — [one-line expansion]

  ✓ [SPECIFIC_BENEFIT_4] — [one-line expansion]

  ✓ BONUS: [UNEXPECTED_VALUE] — [why it matters]'
social_proof_strip: '"[SHORT_TESTIMONIAL_QUOTE]" — [NAME], [ROLE/COMPANY]


  [METRIC_1]: [NUMBER]+ downloads

  [METRIC_2]: [RATING]★ average rating

  [METRIC_3]: Featured in [PUBLICATION]'
final_cta_repeat: 'Don''t let another [TIME_UNIT] go by struggling with [PROBLEM].


  [SAME_CTA_BUTTON_AS_HERO]


  You''re protected by our [GUARANTEE]. No risk. All upside.


  ---'
2_sales_page_bofu: 'Goal: Convert warm leads to buyers Target conversion rate: 2-8%'
problem_section_pas_framework: "## Still [STRUGGLING_WITH_PROBLEM]?\n\nYou've tried [COMMON_SOLUTION_1]. And [COMMON_SOLUTION_2].\
  \ Maybe even [COMMON_SOLUTION_3].\n\nBut here's what nobody tells you: [HIDDEN_REASON_THEY_FAIL].\n\nThe result? [PAINFUL_CONSEQUENCE_1].\
  \ [PAINFUL_CONSEQUENCE_2]. \nAnd the nagging feeling that [EMOTIONAL_PAIN].\n\nWhat if there was a better way?"
solution_section: "## Introducing [PRODUCT_NAME]\n\n[ONE_SENTENCE_DESCRIPTION — what it IS]\n\nUnlike [ALTERNATIVES], [PRODUCT_NAME]\
  \ [KEY_DIFFERENTIATOR] so you can \n[PRIMARY_BENEFIT] without [PRIMARY_OBJECTION].\n\n[PRODUCT_SCREENSHOT_OR_VIDEO]"
benefit_stack_fab_framework: '### What [PRODUCT_NAME] Does For You


  ┌──────────────────────────────────────┐

  │ [FEATURE_1]                          │

  │ → [ADVANTAGE]: [what it does]        │

  │ → [BENEFIT]: [what it means for you] │

  ├──────────────────────────────────────┤

  │ [FEATURE_2]                          │

  │ → [ADVANTAGE]: [what it does]        │

  │ → [BENEFIT]: [what it means for you] │

  ├──────────────────────────────────────┤

  │ [FEATURE_3]                          │

  │ → [ADVANTAGE]: [what it does]        │

  │ → [BENEFIT]: [what it means for you] │

  └──────────────────────────────────────┘'
social_proof_section: "## Don't Take My Word For It\n\n[TESTIMONIAL_1 — specific result + before/after]\n\"Before [PRODUCT],\
  \ I was [BEFORE_STATE]. Now [AFTER_STATE]. \nThe best part? [SPECIFIC_METRIC_IMPROVEMENT].\"\n— [NAME], [TITLE] at [COMPANY]\n\
  \n[TESTIMONIAL_2 — emotional transformation]\n[TESTIMONIAL_3 — skeptic-turned-believer]\n\nLOGOS: [COMPANY_1] · [COMPANY_2]\
  \ · [COMPANY_3] · [COMPANY_4]"
how_it_works_3_step: '## Get Started in 3 Simple Steps


  1️⃣ [ACTION_VERB] — [what they do] (takes [TIME])

  2️⃣ [ACTION_VERB] — [what happens next] (takes [TIME])

  3️⃣ [ACTION_VERB] — [the outcome they experience]


  That''s it. No [COMMON_COMPLEXITY]. No [COMMON_HASSLE].'
offer_stack: '## Here''s Everything You Get


  ✅ [CORE_PRODUCT] ........................ Value: $[AMOUNT]

  ✅ [BONUS_1] ............................. Value: $[AMOUNT]

  ✅ [BONUS_2] ............................. Value: $[AMOUNT]

  ✅ [BONUS_3] ............................. Value: $[AMOUNT]


  Total Value: $[SUM]

  ━━━━━━━━━━━━━━━━━━━━━━━

  Your Price Today: $[ACTUAL_PRICE]


  [CTA_BUTTON: Get Everything Now — $[PRICE]]'
objection_handler_faq: '## Common Questions


  Q: [BIGGEST_OBJECTION — usually price or time]

  A: [REFRAME_AS_INVESTMENT + comparison to cost of NOT buying]


  Q: [SECOND_OBJECTION — usually "will it work for me?"]

  A: [SEGMENT_SPECIFIC_PROOF + guarantee mention]


  Q: [THIRD_OBJECTION — usually technical/logistical]

  A: [SIMPLE_ANSWER + support mention]


  Q: What if it doesn''t work for me?

  A: [GUARANTEE_DETAILS — risk reversal is THE conversion lever]'
final_cta_section: '## [TRANSFORMATION_HEADLINE]


  You have two choices right now:


  Option A: Close this page and go back to [CURRENT_PAINFUL_STATE].


  Option B: [TAKE_ACTION] and start [EXPERIENCING_DESIRED_STATE] today.


  [LARGE_CTA_BUTTON]


  🔒 [GUARANTEE_BADGE] · [PAYMENT_SECURITY] · [SUPPORT_PROMISE]


  P.S. [URGENCY_OR_FINAL_BENEFIT — restate the strongest argument in 2 sentences]


  ---'
3_webinar_event_registration_page_mofu: 'Goal: Register for live event Target conversion rate: 20-40%'
structure: "HERO:\n  headline: \"Something [ADJECTIVE] is coming to [INDUSTRY/NICHE]\"\n  subhead: \"[ONE_SENTENCE_TEASER\
  \ — enough to intrigue, not enough to satisfy]\"\n  cta: \"Join the Waitlist — Be First to Know\"\n  counter: \"[NUMBER]\
  \ people already waiting\"\n\nTEASER_DETAILS:\n  reveal_1: \"[PARTIAL_DETAIL — what it does]\"\n  reveal_2: \"[PARTIAL_DETAIL\
  \ — who it's for]\"\n  mystery: \"Full details drop [DATE]. Waitlist members get [EARLY_ACCESS/DISCOUNT].\"\n\nSOCIAL_PROOF:\n\
  \  endorsement: \"[INDUSTRY_AUTHORITY] says: '[QUOTE]'\"\n  \nCOUNTDOWN:\n  target_date: \"[LAUNCH_DATE]\"\n  display: \"\
  Days : Hours : Minutes : Seconds\"\n\n---"
4_coming_soon_waitlist_page_pre_launch: 'Goal: Build anticipation + capture early interest Target conversion rate: 30-60%'
conversion_optimization_checklist: "above_the_fold:\n  - [ ] Headline visible without scrolling\n  - [ ] CTA button visible\
  \ without scrolling\n  - [ ] Value proposition clear in 5 seconds\n  - [ ] No navigation menu (single-purpose page)\n\n\
  copy_quality:\n  - [ ] Headline passes 4U test (Useful, Urgent, Unique, Ultra-specific)\n  - [ ] All CTAs use first-person\
  \ (\"Get MY guide\" not \"Get YOUR guide\")\n  - [ ] Benefits > Features (3:1 ratio minimum)\n  - [ ] Social proof within\
  \ first 2 scrolls\n  - [ ] Guarantee/risk reversal present\n\ntechnical:\n  - [ ] Page loads under 3 seconds\n  - [ ] Mobile-responsive\
  \ (test on 3 devices)\n  - [ ] Form has maximum 3 fields (email minimum)\n  - [ ] Thank-you page configured (not just \"\
  thanks\")\n  - [ ] Tracking pixels installed (Meta, Google, UTMs)\n  - [ ] HTTPS (no mixed content warnings)\n\ndesign:\n\
  \  - [ ] Single visual hierarchy path (F or Z pattern)\n  - [ ] Contrast ratio >= 4.5:1 on all text\n  - [ ] CTA button\
  \ color contrasts with page (no blending)\n  - [ ] White space between sections (breathing room)\n  - [ ] Consistent typography\
  \ (max 2 font families)\n\npsychology:\n  - [ ] Specific numbers > vague claims\n  - [ ] \"You/Your\" > \"We/Our\" (2:1\
  \ ratio minimum)\n  - [ ] Urgency element present (deadline, scarcity, or FOMO)\n  - [ ] Risk reversal present (guarantee,\
  \ free trial, refund)\n  - [ ] Social proof present (testimonials, logos, metrics)\n\n---"
a_b_testing_priority_for_landing_pages: '| Priority | Element | Expected Impact |

  |----------|---------|-----------------|

  | 1 | Headline (pain vs benefit vs curiosity) | 20-40% conversion lift |

  | 2 | CTA text (action vs benefit) | 10-25% conversion lift |

  | 3 | Hero image (product vs people vs abstract) | 5-15% conversion lift |

  | 4 | Form length (1 field vs 3 fields) | 10-30% conversion lift |

  | 5 | Social proof placement (above vs below fold) | 5-10% conversion lift |

  | 6 | Page length (short vs long) | Depends on awareness level |'
