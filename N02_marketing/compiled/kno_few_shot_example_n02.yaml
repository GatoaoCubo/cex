why_this_example_exists: 'N02 prompts often fail when the model receives a vague brief.

  This example teaches the model to convert a structured marketing request into output that is seductive, specific, and operational.

  It demonstrates:


  1. audience naming

  2. pain articulation

  3. proof grounding

  4. funnel-stage alignment

  5. CTA discipline'
canonical_input: "input:\n  task: create_3_linkedin_ad_variants\n  audience: b2b_saas_founders\n  funnel_stage: mofu\n  offer:\
  \ conversion_audit\n  promise: reduce wasted paid traffic\n  proof:\n    stat: \"23 percent lift in qualified demos\"\n\
  \    basis: \"last 6 campaign audits\"\n  constraints:\n    max_chars: 240\n    tone: sharp_confident\n    cta: book_audit\n\
  \    banned: [empty_hype, vague_superlatives]"
canonical_output: "output:\n  variant_1:\n    angle: pain_to_proof\n    copy: \"Paid traffic is not expensive. Waste is. We\
  \ found 23 percent more qualified demos hiding inside underperforming funnels. Book the audit and see where your pipeline\
  \ leaks first.\"\n    cta: \"Book the audit\"\n  variant_2:\n    angle: aspiration_with_evidence\n    copy: \"The best SaaS\
  \ teams do not buy more clicks. They turn intent into demos. Our last 6 audits surfaced a 23 percent lift in qualified demand.\
  \ Book the audit before next spend goes live.\"\n    cta: \"Book the audit\"\n  variant_3:\n    angle: objection_breaker\n\
  \    copy: \"If your traffic volume is fine but demos stay soft, the problem is probably not reach. It is conversion friction.\
  \ Our recent audits uncovered a 23 percent lift opportunity. Book the audit now.\"\n    cta: \"Book the audit\""
format_lessons: '| Lesson | What the model should learn |

  |--------|-----------------------------|

  | structured input | a good brief names audience, stage, offer, proof, and constraints |

  | structured output | each variant needs an angle, a copy block, and a CTA |

  | proof discipline | numeric evidence sits inside the argument, not as an afterthought |

  | tone discipline | sharp and confident does not mean manipulative |

  | CTA discipline | one clear action per variant |'
explanation: 'This example is not about dazzling style alone.

  It teaches controlled seduction.

  Each output variant preserves one persuasion logic:


  | Variant | Logic |

  |---------|-------|

  | 1 | pain -> proof -> action |

  | 2 | aspiration -> credibility -> urgency |

  | 3 | objection -> diagnosis -> invitation |'
why_it_fits_n02_memory: 'The example also reinforces patterns visible in current N02 memory:


  | Memory signal | Reflected here |

  |---------------|----------------|

  | benefit-specific language wins | every variant names an outcome |

  | generic CTA loses | each CTA is action specific |

  | proof near headline improves trust | proof sits in the body before the CTA |

  | vague hype is blocked | no "best ever" filler |'
edge_cases_covered: '| Edge case | Handling |

  |-----------|----------|

  | short character limit | copy stays compressed but still specific |

  | B2B audience skepticism | evidence appears early |

  | MOFU stage | copy assumes awareness but not final commitment |

  | same CTA across variants | angles vary while action remains stable |'
variation_ideas: '| Variation | What changes |

  |-----------|--------------|

  | tofu version | replace audit CTA with softer learn-more CTA |

  | bofu version | add guarantee and deadline pressure |

  | ecommerce version | shift proof from demos to revenue or AOV lift |

  | email version | allow longer narrative arc |'
prompting_rules_derived_from_this_example:
- Always request at least one proof source or proof placeholder.
- Name the funnel stage explicitly.
- Force one CTA family for the batch unless testing CTA itself.
- Keep banned-language controls in the input.
- Return angles, not just lines of copy.
anti_patterns: '| Anti-pattern | Failure |

  |--------------|---------|

  | input says "write good ads" | no strategy anchor |

  | output has only raw copy lines | hard to compare or test |

  | proof omitted | copy sounds inflated |

  | multiple CTAs in one line | action diffuses |

  | stage omitted | voice drifts between awareness and close |'
reusable_skeleton: "few_shot_skeleton:\n  input:\n    task: artifact_request\n    audience: segment\n    funnel_stage: tofu_or_mofu_or_bofu\n\
  \    offer: named_offer\n    proof: stat_or_testimonial\n    constraints: explicit_limits\n  output:\n    variant_n:\n \
  \     angle: persuasion_logic\n      copy: final_line\n      cta: action"
