# CEX CI Pipeline — The Shokunin's Quality Gate
# ================================================
# Validates the 23 Python tools that power the 8F pipeline.
# Runs on every push/PR. If N03's own tools don't pass, nothing should.
#
# Jobs: lint → test → compile → doctor

name: CEX CI

on:
  push:
    branches: [main, develop]
    paths:
      - '_tools/**'
      - 'pyproject.toml'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - '_tools/**'
      - 'pyproject.toml'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff
      - run: ruff check _tools/cex_shared.py _tools/cex_errors.py _tools/tests/

  test:
    name: Tests (pytest)
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: pip install pyyaml pytest pytest-cov
      - name: Run tests
        run: |
          cd _tools
          python -m pytest tests/ -v --tb=short -m "not slow" \
            --cov=. --cov-report=term-missing --cov-report=xml
        env:
          PYTHONPATH: ${{ github.workspace }}/_tools
      - name: Test summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See test output above for details." >> $GITHUB_STEP_SUMMARY

  compile:
    name: Compile Artifacts
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install pyyaml
      - name: Compile all artifacts
        run: python _tools/cex_compile.py --all
      - name: Compile summary
        run: |
          echo "## Compile Results" >> $GITHUB_STEP_SUMMARY
          python _tools/cex_compile.py --all 2>&1 | tail -3 >> $GITHUB_STEP_SUMMARY

  doctor:
    name: Doctor (Health Check)
    needs: [test, compile]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install pyyaml
      - name: Run doctor
        run: python _tools/cex_doctor.py
      - name: Doctor summary
        if: always()
        run: |
          echo "## Doctor Results" >> $GITHUB_STEP_SUMMARY
          python _tools/cex_doctor.py 2>&1 | tail -10 >> $GITHUB_STEP_SUMMARY
