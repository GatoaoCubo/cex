id: p07_regcheck_latency_baseline
kind: regression_check
pillar: P07
name: Latency Regression Check
description: Regression check comparing API response latency against v2.1 baseline with p50/p95/p99 thresholds
baseline_ref: v2.1
threshold: +10%
metrics:
- p50
- p95
- p99
alert_on: slack
version: 1.0.0
created: 2026-03-29
author: builder_agent
quality: 9.0
tags:
- regression
- latency
- performance
- baseline
- monitoring
purpose: Detects latency regressions in the organization Railway API by comparing current percentile response times against
  the v2.1 production baseline. Any metric exceeding +10% triggers a Slack alert before deployment proceeds.
baseline_reference_v2_1: 'Captured 2026-03-15 from 24h production traffic (47,283 requests):


  | Endpoint | p50 | p95 | p99 | Sample Size |

  |----------|-----|-----|-----|-------------|

  | `GET /api/v2/health` | 12ms | 28ms | 45ms | 18,450 |

  | `POST /api/v2/chat` | 340ms | 890ms | 1,450ms | 12,100 |

  | `POST /api/v2/search` | 85ms | 210ms | 380ms | 8,920 |

  | `GET /api/v2/knowledge/:id` | 18ms | 42ms | 78ms | 5,200 |

  | `POST /api/v2/evaluate` | 520ms | 1,200ms | 2,100ms | 2,613 |'
regression_thresholds: '| Severity | Threshold | Action |

  |----------|-----------|--------|

  | Pass | <= baseline | No action, deploy proceeds |

  | Warn | +1% to +10% | Log warning, deploy proceeds with note |

  | Fail | > +10% | Block deployment, Slack alert, investigate |

  | Critical | > +25% | Block + page on-call, likely infrastructure issue |


  The +10% threshold was calibrated against natural traffic variance. Historical data shows v2.0 -> v2.1 had max 6% variance
  from day-to-day traffic patterns. Anything above 10% is a real regression, not noise.'
test_protocol: ''
step_1_collect_current_metrics: "# Run against staging, 1000 requests per endpoint\npython scripts/load_test.py \\\n  --target\
  \ https://organization-api-staging.railway.app \\\n  --endpoints health,chat,search,knowledge,evaluate \\\n  --requests-per-endpoint\
  \ 1000 \\\n  --concurrency 10 \\\n  --output results/latency_current.json"
step_2_compare_against_baseline: "import json\nfrom pathlib import Path\n\nbaseline = json.loads(Path(\"baselines/v2.1_latency.json\"\
  ).read_text())\ncurrent = json.loads(Path(\"results/latency_current.json\").read_text())\n\nregressions = []\nfor endpoint\
  \ in baseline:\n    for metric in [\"p50\", \"p95\", \"p99\"]:\n        base_val = baseline[endpoint][metric]\n        curr_val\
  \ = current[endpoint][metric]\n        delta_pct = ((curr_val - base_val) / base_val) * 100\n\n        if delta_pct > 10:\n\
  \            regressions.append({\n                \"endpoint\": endpoint,\n                \"metric\": metric,\n      \
  \          \"baseline\": base_val,\n                \"current\": curr_val,\n                \"delta\": f\"+{delta_pct:.1f}%\"\
  ,\n                \"severity\": \"critical\" if delta_pct > 25 else \"fail\"\n            })\n\nif regressions:\n    send_slack_alert(regressions)\n\
  \    sys.exit(1)"
step_3_alert_format: "{\n  \"channel\": \"#organization-alerts\",\n  \"text\": \":warning: Latency regression detected\",\n\
  \  \"blocks\": [\n    {\n      \"type\": \"section\",\n      \"text\": \"POST /api/v2/chat p95: 890ms -> 1,120ms (+25.8%)\
  \ :red_circle:\"\n    },\n    {\n      \"type\": \"section\",\n      \"text\": \"Baseline: v2.1 (2026-03-15) | Current:\
  \ v2.2-rc1 | Threshold: +10%\"\n    }\n  ]\n}"
regression_investigation_playbook: '| Symptom | Likely Cause | First Check |

  |---------|-------------|-------------|

  | All endpoints +15-25% | Infrastructure (Railway cold start, DB) | `railway logs --recent` |

  | Only `/chat` regressed | LLM call or prompt size increased | Check prompt token count delta |

  | Only `/search` regressed | BM25/FAISS index issue | Verify index freshness, Ollama status |

  | p99 spiked but p50 stable | Tail latency from GC or connection pool | Check connection pool exhaustion |

  | All metrics 2x+ | Wrong environment or region | Verify Railway service and region |'
historical_trend: '| Version | Date | p50 /chat | p95 /chat | Status |

  |---------|------|-----------|-----------|--------|

  | v1.8 | 2026-02-01 | 410ms | 980ms | — |

  | v1.9 | 2026-02-15 | 380ms | 940ms | Improved (prompt optimization) |

  | v2.0 | 2026-03-01 | 355ms | 910ms | Improved (connection pooling) |

  | v2.1 | 2026-03-15 | 340ms | 890ms | Current baseline |'
ci_integration: "# .github/workflows/regression.yml\n- name: Latency regression check\n  run: |\n    python scripts/load_test.py\
  \ --target $STAGING_URL --output results/current.json\n    python scripts/regression_check.py --baseline baselines/v2.1.json\
  \ --current results/current.json --threshold 10\n  env:\n    SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}"
anti_patterns:
- Comparing against outdated baseline (refresh after each major release)
- Running load test with 10 requests (not statistically significant, need >= 1000)
- Testing against production instead of staging (affects real users)
- Single percentile only (p50 hides tail latency regressions at p99)
- 'Ignoring cold-start: first 50 requests after deploy are always slower'
