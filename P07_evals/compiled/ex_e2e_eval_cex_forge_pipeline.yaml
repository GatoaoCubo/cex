test_steps:
- 'Generate: Run forge with known seeds, capture output prompt'
- 'Create: Feed prompt to LLM, save response as example .md'
- 'Validate: Run validate_examples.py on generated file'
- 'Compile: Run cex_compile.py, verify YAML output parseable'
- 'Quality: Check density >= 0.8, size <= max_bytes, all required fields'
pass_criteria: '| Step | Criterion |

  |------|-----------|

  | Generate | Prompt < 20KB, no {{PLACEHOLDER}} remaining |

  | Validate | 0 FAIL checks |

  | Compile | Valid YAML output, no parse errors |

  | Quality | density >= 0.8, score >= 7.0 |'
known_failure_modes:
- 'Forge with empty seeds: generic prompt, low-density output'
- 'LLM ignores max_bytes hint: output oversized, trim required'
- 'Missing template for type: forge outputs schema-only prompt'
