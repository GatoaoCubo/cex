pillar: P07
name: Evals
description: COMO medir qualidade
kinds:
  unit_eval:
    description: Teste unitario de agente/prompt
    boundary: Teste unitario de agente ou prompt individual. NAO eh smoke_eval (rapido, sem profundidade) nem e2e_eval (pipeline
      completo).
    layer: governance
    core: true
    machine_format: yaml
    naming: p07_ue_{{target}}.md + .yaml
    constraints:
      max_bytes: 4096
    llm_function: GOVERN
  smoke_eval:
    description: Teste rapido de sanidade (< 30s)
    boundary: Teste rapido de sanidade em <30s. NAO eh unit_eval (profundo) nem benchmark (metricas continuas).
    layer: governance
    core: false
    machine_format: yaml
    naming: p07_se_{{scope}}.md
    constraints:
      max_bytes: 3072
    llm_function: GOVERN
  e2e_eval:
    description: Teste end-to-end (pipeline completo)
    boundary: Teste end-to-end de pipeline completo. NAO eh unit_eval (escopo isolado) nem benchmark (nao mede performance).
    layer: governance
    core: false
    machine_format: yaml
    naming: p07_e2e_{{pipeline}}.md + .yaml
    constraints:
      max_bytes: 4096
    llm_function: GOVERN
  benchmark:
    description: Medicao de performance (latencia, custo, qualidade)
    boundary: Medicao de performance quantitativa. NAO eh eval (nao testa corretude) nem scoring_rubric (nao define criterios).
    layer: governance
    core: false
    machine_format: yaml
    naming: p07_bm_{{metric}}.md + .yaml
    constraints:
      max_bytes: 4096
    llm_function: GOVERN
  golden_test:
    description: Caso de teste referencia (quality 9.5+)
    boundary: Caso de teste referencia quality 9.5+. NAO eh few_shot_example (P01, exemplifica) nem unit_eval (qualquer quality).
    layer: governance
    core: true
    machine_format: yaml
    naming: p07_gt_{{case}}.md + .yaml
    constraints:
      max_bytes: 4096
    llm_function: GOVERN
  scoring_rubric:
    description: Criterio de avaliacao (5D, 12LP, custom)
    boundary: Criterio de avaliacao com framework. NAO eh benchmark (nao mede) nem quality_gate (P11, nao bloqueia).
    layer: governance
    core: true
    machine_format: yaml
    naming: p07_sr_{{framework}}.md + .yaml
    constraints:
      max_bytes: 5120
    llm_function: GOVERN
  llm_judge:
    description: Config LLM-as-Judge
    boundary: Avaliador LLM. NAO eh scoring_rubric.
    layer: runtime
    core: true
    machine_format: yaml
    naming: p07_judge.md
    constraints:
      max_bytes: 2048
    frontmatter_required:
    - id
    - name
    - judge_model
    - criteria
    - scale
    llm_function: GOVERN
  eval_dataset:
    description: Colecao de test cases
    boundary: Conjunto. NAO eh golden_test.
    layer: runtime
    core: true
    machine_format: yaml
    naming: p07_dataset.md
    constraints:
      max_bytes: 4096
    frontmatter_required:
    - id
    - name
    - size
    - splits
    - version
    llm_function: GOVERN
  red_team_eval:
    description: Teste adversarial
    boundary: Eval seguranca. NAO eh e2e_eval.
    layer: runtime
    core: false
    machine_format: yaml
    naming: p07_redteam.md
    constraints:
      max_bytes: 2048
    frontmatter_required:
    - id
    - name
    - attack_types
    - target
    llm_function: GOVERN
  regression_check:
    description: Comparacao contra baseline
    boundary: Atual vs anterior. NAO eh benchmark.
    layer: runtime
    core: false
    machine_format: yaml
    naming: p07_regcheck.md
    constraints:
      max_bytes: 2048
    frontmatter_required:
    - id
    - name
    - baseline_ref
    - threshold
    llm_function: GOVERN
