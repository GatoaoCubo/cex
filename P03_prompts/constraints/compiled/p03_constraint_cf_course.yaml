id: p03_constraint_cf_course
kind: constraint_spec
pillar: P03
version: 1.0.0
created: '2026-04-06'
updated: '2026-04-06'
author: n01_intelligence
name: Content Factory Course Format Constraints
constraint_type: format_rules
pattern: multi_rule_set
quality: null
tags:
- constraint_spec
- content-factory
- course
- education
- lms
tldr: 'Course constraints: 5-12 modules, 3-8 lessons/module, quiz rules, certification, SCORM compliance'
description: Governs all course outputs from dag_cf_course for LMS platform compliance and pedagogical quality
provider_compat: scorm, xapi, lms_generic
fallback: Manual pedagogical review if automated validation unavailable
temperature_override: '0.4'
max_tokens: '2048'
density_score: 1.0
overview: Constrains all course artifacts produced by the Content Factory course pipeline (dag_cf_course). Ensures every packaged
  course meets LMS platform requirements, pedagogical standards, and brand consistency. Applied at quality_check node before
  lms_upload.
constraint_definition: ''
structure_rules: '| Element | Min | Target | Max |

  |---------|-----|--------|-----|

  | modules | 5 | 8 | 12 |

  | lessons_per_module | 3 | 5 | 8 |

  | lesson_duration_min | 5 | 10 | 20 |

  | total_course_hours | 2 | 6 | 15 |'
must_rules:
- Each module MUST have a learning objective statement (1-2 sentences)
- Each module MUST end with a quiz (minimum 5 questions)
- Quiz pass threshold MUST be configurable (default 70%)
- 'Each lesson MUST have: title, script, audio (TTS), visual aid (slide/video)'
- 'Course MUST include: welcome module, completion certificate template'
- All text MUST follow brand voice from brand_config.yaml
- SCORM 1.2 or xAPI compliance MUST be maintained in package metadata
must_not_rules:
- MUST NOT have modules with fewer than 3 lessons
- MUST NOT exceed 20 minutes per individual lesson
- MUST NOT use quiz questions that are trivially obvious from lesson title
- MUST NOT ship without at least 1 downloadable resource per module
quiz_rules: '| Type | Min per Module | Format |

  |------|---------------|--------|

  | multiple_choice | 3 | 4 options, 1 correct |

  | true_false | 1 | Binary with explanation |

  | open_ended | 1 | Short answer, rubric provided |'
certification:
- 'Certificate MUST include: student name, course title, completion date, brand logo'
- Certificate MUST be auto-generated on passing all module quizzes
- 'Certificate format: PDF, branded template'
quality_metrics: '| Metric | Min | Target | Max |

  |--------|-----|--------|-----|

  | words_per_lesson | 800 | 1500 | 3000 |

  | quiz_questions_per_module | 5 | 8 | 15 |

  | resource_downloads_per_module | 1 | 2 | 5 |'
provider_compatibility: '| Provider | Support | Method |

  |----------|---------|--------|

  | SCORM 1.2 | native | Package manifest + SCO structure |

  | xAPI | native | Statement generation per lesson completion |

  | Teachable | partial | API upload with module/lesson mapping |

  | Thinkific | partial | Bulk import via CSV + asset upload |'
integration:
- 'Consumed by: dag_cf_course (quality_check node)'
- 'Validates outputs from: package_modules node'
- 'Cross-references: brand_config.yaml (logo, palette, cert template)'
- 'Feeds: quality_gate node in dag_cf_master for final approval'
