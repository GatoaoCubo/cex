id: p03_constraint_cf_video
kind: constraint_spec
pillar: P03
version: 1.0.0
created: '2026-04-06'
updated: '2026-04-06'
author: n01_intelligence
name: Content Factory Video Format Constraints
constraint_type: format_rules
pattern: multi_rule_set
quality: null
tags:
- constraint_spec
- content-factory
- video
- format-rules
tldr: 'Video output constraints: duration tiers (15/30/60/300s), aspect ratios, hook timing, CTA placement, audio specs'
description: Governs all video outputs from dag_cf_video to ensure platform compliance and engagement
provider_compat: ffmpeg, runway, sora, elevenlabs
fallback: Manual review checklist if automated validation unavailable
temperature_override: '0.3'
max_tokens: '2048'
density_score: 1.0
overview: Constrains all video artifacts produced by the Content Factory video pipeline (dag_cf_video). Ensures every rendered
  video meets platform-specific requirements for YouTube, Instagram Reels, TikTok, and LinkedIn Video. Applied at the render_variants
  and quality_check nodes.
constraint_definition: ''
duration_tiers: '| Tier | Duration | Platform | Use Case |

  |------|----------|----------|----------|

  | micro | 15s | TikTok, Reels | Hook teaser, single-point clip |

  | short | 30s | Reels, Shorts | Key insight with CTA |

  | standard | 60s | All platforms | Full concept with hook-body-CTA |

  | long | 300s (5min) | YouTube | Deep-dive explainer |'
must_rules:
- Hook MUST appear in first 3 seconds (text overlay or spoken)
- CTA MUST appear in last 5 seconds of every tier
- Brand logo watermark MUST be visible throughout (opacity 15-30%)
- 'Audio levels: voice -14 LUFS, music -20 LUFS, peaks never exceed -1 dBTP'
- 'Resolution: minimum 1080p for all tiers'
- 'Frame rate: 30fps minimum, 60fps for motion-heavy content'
must_not_rules:
- MUST NOT exceed tier duration by more than 2 seconds
- MUST NOT use unlicensed music or stock footage
- MUST NOT render without brand intro/outro on standard and long tiers
- MUST NOT have silence gaps > 1.5s in any tier
aspect_ratios: '| Format | Ratio | Pixels | Platforms |

  |--------|-------|--------|-----------|

  | landscape | 16:9 | 1920x1080 | YouTube, LinkedIn |

  | portrait | 9:16 | 1080x1920 | Reels, TikTok, Shorts |

  | square | 1:1 | 1080x1080 | Feed posts, LinkedIn |'
quality_metrics: '| Metric | Min | Target | Max |

  |--------|-----|--------|-----|

  | hook_timing_s | 0 | 1.5 | 3.0 |

  | cta_visible_s | 3.0 | 5.0 | 8.0 |

  | audio_lufs_voice | -16 | -14 | -12 |

  | bitrate_mbps | 8 | 12 | 25 |'
provider_compatibility: '| Provider | Support | Method |

  |----------|---------|--------|

  | FFmpeg | native | Filter chains for aspect, duration, audio normalization |

  | Runway/Sora | partial | Generation prompts constrained by duration + aspect params |

  | ElevenLabs | native | Voice settings: stability, clarity, LUFS target |

  | Canva | partial | Template-based overlays for text and branding |'
integration:
- 'Consumed by: dag_cf_video (quality_check node)'
- 'Validates outputs from: render_variants node'
- 'Cross-references: brand_config.yaml (logo, palette, fonts)'
- 'Feeds: quality_gate node in dag_cf_master for final approval'
