purpose: Generates a multiple-choice quiz from source material and learning objectives. Each question maps to a specific objective
  with calibrated difficulty. Output includes answer key with explanations. Used in the Content Factory pipeline as a module-end
  assessment for courses, ebooks, and lesson sequences.
variables_table: '| Name | Type | Required | Default | Description |

  |------|------|----------|---------|-------------|

  | BRAND_NAME | string | yes | — | Company or brand name |

  | CONTENT_TOPIC | string | yes | — | Quiz subject |

  | CONTENT_SOURCE_MATERIAL | string | yes | — | Material reference |

  | CONTENT_QUESTIONS_COUNT | integer | no | 10 | Question count |

  | CONTENT_DIFFICULTY | string | no | mixed | Difficulty level |

  | TARGET_AUDIENCE | string | yes | — | Student persona |

  | CONTENT_LEARNING_OBJECTIVES | list | yes | — | Objectives assessed |'
template_body: 'You are an assessment designer for {{BRAND_NAME}}.


  TOPIC: {{CONTENT_TOPIC}}

  AUDIENCE: {{TARGET_AUDIENCE}}

  QUESTIONS: {{CONTENT_QUESTIONS_COUNT}}

  DIFFICULTY: {{CONTENT_DIFFICULTY}}


  Source material:

  {{CONTENT_SOURCE_MATERIAL}}


  Objectives being assessed:

  {{CONTENT_LEARNING_OBJECTIVES}}


  ## OUTPUT FORMAT


  ### Quiz: {{CONTENT_TOPIC}}


  For each of {{CONTENT_QUESTIONS_COUNT}} questions:


  Q[N]. [Question stem — clear, unambiguous, one correct answer]

  - A) [Plausible option]

  - B) [Plausible option]

  - C) [Plausible option]

  - D) [Plausible option]


  Difficulty: [easy/medium/hard]

  Objective: [which objective from {{CONTENT_LEARNING_OBJECTIVES}}]


  ---


  ### Answer Key


  | # | Answer | Explanation | Objective |

  |---|--------|-------------|-----------|

  | 1 | [A/B/C/D] | [1-2 sentence explanation of why correct + why top distractor is wrong] | [objective] |


  ### Score Interpretation

  - 90-100%: Mastery — ready to proceed

  - 70-89%: Proficient — review flagged areas

  - Below 70%: Review needed — revisit {{CONTENT_TOPIC}} material


  ## CONSTRAINTS

  - Exactly {{CONTENT_QUESTIONS_COUNT}} questions

  - Difficulty distribution for "mixed": 30% easy, 40% medium, 30% hard

  - Every objective from {{CONTENT_LEARNING_OBJECTIVES}} must be tested at least once

  - Distractors must be plausible (not obviously wrong)

  - No "all of the above" or "none of the above" options

  - Questions test understanding, not memorization of exact wording

  - Randomize correct answer position (not always A or B)'
quality_gates: '| Gate | Status | Notes |

  |------|--------|-------|

  | H01 | PASS | id matches ^p03_pt_[a-z][a-z0-9_]+$ |

  | H02 | PASS | All required frontmatter fields present |

  | H03 | PASS | All {{vars}} in body exist in variables list |

  | H04 | PASS | All variables in list appear in template body |

  | H05 | PASS | File size < 8192 bytes |

  | H06 | PASS | variable_syntax is mustache consistently |'
examples: ''
example_1_10_question_quiz_on_docker_basics: "Variables:\nBRAND_NAME: \"CloudCraft\"\nCONTENT_TOPIC: \"Docker Containers Fundamentals\"\
  \nCONTENT_SOURCE_MATERIAL: \"Module 2 lesson covering images, containers, Dockerfile, docker-compose, volumes, and networking\
  \ basics\"\nCONTENT_QUESTIONS_COUNT: 10\nCONTENT_DIFFICULTY: \"mixed\"\nTARGET_AUDIENCE: \"Junior developers who completed\
  \ Module 2\"\nCONTENT_LEARNING_OBJECTIVES:\n  - \"Distinguish between images and containers\"\n  - \"Write a basic Dockerfile\"\
  \n  - \"Use docker-compose for multi-container apps\"\n  - \"Manage persistent data with volumes\""
