id: p03_pt_cf_quiz
kind: prompt_template
pillar: P03
title: Content Factory — Quiz/Assessment Template
version: 1.0.0
created: 2026-04-06
updated: 2026-04-06
author: builder_agent
variables:
- name: BRAND_NAME
  type: string
  required: true
  default: null
  description: Company or brand name
- name: CONTENT_TOPIC
  type: string
  required: true
  default: null
  description: Subject the quiz tests
- name: CONTENT_SOURCE_MATERIAL
  type: string
  required: true
  default: null
  description: Summary or reference of the material being assessed
- name: CONTENT_QUESTIONS_COUNT
  type: integer
  required: false
  default: 10
  description: Number of questions to generate
- name: CONTENT_DIFFICULTY
  type: string
  required: false
  default: mixed
  description: Difficulty level — easy, medium, hard, mixed
- name: TARGET_AUDIENCE
  type: string
  required: true
  default: null
  description: Student persona and knowledge level
- name: CONTENT_LEARNING_OBJECTIVES
  type: list
  required: true
  default: null
  description: Objectives being assessed (maps to questions)
variable_syntax: mustache
composable: true
domain: content_factory
quality: null
