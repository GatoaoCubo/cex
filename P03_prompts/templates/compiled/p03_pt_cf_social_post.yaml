examples: ''
example_1_linkedin_post_promoting_a_new_course: 'Variables:

  BRAND_NAME: "SkillForge"

  BRAND_VOICE: "authoritative-helpful"

  CONTENT_TOPIC: "New AI Agents course launch"

  CONTENT_HOOK: "Most AI courses teach you to chat. This one teaches you to build."

  CONTENT_VALUE_PROP: "8-hour hands-on course going from zero to deployed AI agent with tools, memory, and guardrails"

  CONTENT_CTA: "Comment AGENT and I''ll send you the early-bird link"

  PLATFORM: "linkedin"

  TARGET_AUDIENCE: "Software engineers exploring AI agent development"

  CONTENT_HASHTAGS_COUNT: 5'
