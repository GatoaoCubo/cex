examples: ''
example_1_60s_instagram_reel_about_productivity: "Variables:\nBRAND_NAME: \"FocusFlow\"\nBRAND_VOICE: \"casual-energetic\"\
  \nCONTENT_TOPIC: \"3 morning habits that 10x your focus\"\nCONTENT_GOAL: \"Viewer tries at least one habit tomorrow morning\"\
  \nTARGET_AUDIENCE: \"Remote workers aged 25-35 struggling with focus\"\nVIDEO_DURATION: \"60s\"\nCONTENT_KEY_POINTS:\n \
  \ - \"Cold water on face resets cortisol\"\n  - \"5-minute journal primes intention\"\n  - \"Phone stays off for first 30\
  \ minutes\"\nCONTENT_CTA: \"Save this and try habit #2 tomorrow — comment which one you picked\"\nPLATFORM: \"instagram_reels\"\
  \n\nRendered Output:\nHOOK (0:00-0:09)\n\"You're losing 2 hours of focus every morning — and you don't even know it.\"\n\
  [VISUAL: alarm clock → groggy face → split screen of scrolling vs. focused work]\n\nBUILD (0:09-0:24)\n\"Most people grab\
  \ their phone the second they wake up. That one move floods your brain with cortisol and reactive thinking. Your best focus\
  \ window — gone before coffee.\"\n[VISUAL: phone notification cascade → brain scan graphic]\n\nBENEFIT (0:24-0:42)\n\"Three\
  \ habits flip that. One: cold water on your face — 10 seconds resets your cortisol. Two: 5-minute journal — write one intention,\
  \ not a novel. Three: phone stays off for 30 minutes. That's it.\"\n[VISUAL: each habit demonstrated with timer overlay]\n\
  \nPROOF (0:42-0:51)\n\"I did this for 30 days. Deep work sessions went from 45 minutes to 2.5 hours. And I'm not special\
  \ — 400 FocusFlow users reported the same.\"\n[VISUAL: before/after productivity chart → testimonial scroll]\n\nCTA (0:51-1:00)\n\
  \"Save this and try habit #2 tomorrow — comment which one you picked. Follow FocusFlow for more.\"\n[VISUAL: save icon animation\
  \ → comment prompt → logo]"
