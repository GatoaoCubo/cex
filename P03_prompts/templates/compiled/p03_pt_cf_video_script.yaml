- name: BRAND_VOICE
  type: string
  required: true
  default: null
  description: Brand tone descriptor (e.g. casual-technical, warm-professional)
- name: CONTENT_TOPIC
  type: string
  required: true
  default: null
  description: Main subject of the video
- name: CONTENT_GOAL
  type: string
  required: true
  default: null
