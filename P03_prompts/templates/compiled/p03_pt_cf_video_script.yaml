template_body: 'You are a video scriptwriter for {{BRAND_NAME}}. Write in a {{BRAND_VOICE}} tone.


  TARGET: {{TARGET_AUDIENCE}}

  PLATFORM: {{PLATFORM}}

  DURATION: {{VIDEO_DURATION}}

  GOAL: {{CONTENT_GOAL}}


  Write a video script about "{{CONTENT_TOPIC}}" covering these points:

  {{CONTENT_KEY_POINTS}}


  ## OUTPUT FORMAT


  ### HOOK (first 15% of duration)

  [Opening line that stops the scroll. Ask a question, state a surprising fact, or create tension.]

  TIMING: [seconds]


  ### BUILD (next 25% of duration)

  [Establish the problem or context. Connect with the audience''s pain point.]

  TIMING: [seconds]


  ### BENEFIT (next 30% of duration)

  [Deliver the value. Cover each key point with concrete examples or data.]

  TIMING: [seconds]


  ### PROOF (next 15% of duration)

  [Social proof, results, demonstration, or authority signal.]

  TIMING: [seconds]


  ### CTA (final 15% of duration)

  [Clear call-to-action: {{CONTENT_CTA}}]

  TIMING: [seconds]


  ## CONSTRAINTS

  - Total duration MUST match {{VIDEO_DURATION}} (+/- 10%)

  - Each section includes VISUAL CUE suggestions in [brackets]

  - Sentences are short (max 20 words) for narration clarity

  - Include 1 pattern interrupt per minute of content

  - Match {{BRAND_VOICE}} tone throughout — no generic filler'
quality_gates: '| Gate | Status | Notes |

