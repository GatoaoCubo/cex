insights_estrat_gicos: '🔥 SÃO CAETANO = EPICENTRO

  - 4,43 empresas/100k — densidade 18x maior que SBC

  - 7 empresas mapeadas incluindo 3 já validadas

  - Cidade mais rica do ABC — renda per capita 2x maior

  - Menor área geográfica — concentração natural de serviços


  ⚠️ GAPS DE OPORTUNIDADE

  - São Bernardo do Campo: 833k habitantes, só 2 empresas mapeadas

  - Mauá: 477k habitantes, só 1 empresa mapeada

  - Densidade baixa = menos concorrência + mercado underserved


  📍 ESTRATÉGIA DE EXPANSÃO

  1. Consolidar SCS primeiro — 7 prospects, densidade alta

  2. Expandir para Santo André — proximidade + volume médio

  3. Explorar SBC/Mauá — gaps de mercado, menos concorrência'
