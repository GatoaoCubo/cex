a_tier_1_abordagem_consultiva_cl_nicas_24h_hospitais: 'WhatsApp Script:

  Olá Dr(a). [NOME], da [CLÍNICA]!


  Sou [NOME] da GATO³. Atendo tutores com gatos que chegam ao veterinário por stress, agressividade, xixi fora da caixa.


  Tenho protocolos de ambiência felina que aplicados em casa reduzem 70% dessas consultas de retorno comportamental.


  Vários colegas veterinários já indicam nosso trabalho. Posso passar para uma apresentação rápida de 15min?


  [NOME] | Especialista Bem-Estar Felino GATO³'
b_tier_2_parceria_b2b_pet_shops_premium: "Email Template:\nSubject: Parceria B2B — Curadoria felina para clientes [PET SHOP]\n\
  \nOlá [NOME],\n\nRepresento a GATO³, curadoria especializada em bem-estar felino no ABC.\n\nSeus clientes com gatos enfrentam\
  \ 2 desafios:\n1. Gatos mais calmos e equilibrados  \n2. Casa que continua bonita e organizada\n\nNossa linha resolve ambos\
  \ com 87% eficácia (dados 6 meses).\n\nCondições especiais para parceiros:\n→ Margem 40% vs 25% produtos convencionais\n\
  → Treinamento equipe sem custo\n→ Material POP personalizado\n\nQue tal conversarmos 15min? Estou na região terça e quinta.\n\
  \n[NOME] | GATO³ Comercial"
