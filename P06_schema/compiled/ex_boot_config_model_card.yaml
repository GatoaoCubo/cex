id: p06_bp_model_card
kind: artifact_blueprint
pillar: P06
llm_function: CONSTRAIN
title: 'Blueprint: model_card — Meta-Template para Producao de Model Cards'
version: 1.0.0
created: 2026-03-26
updated: 2026-03-26
author: builder_agent
quality: 9.1
tags:
- blueprint
- model-card
- meta-template
- production-mold
- llm-spec
tldr: Meta-template que define COMO gerar model_cards validos — frontmatter layered, capabilities como booleans, pricing normalizado,
  freshness 90d
when_to_use: Antes de gerar qualquer model_card — este blueprint eh o molde
synthesis: research_agent (standards survey, 12 standards) + knowledge_agent-GEMINI (10-provider comparative) + operations_agent-CODEX
  (code patterns, 7 frameworks) + builder_agent (CEX analysis + boundary + quality gates)
boundary: 'model_card eh especificacao tecnica de um LLM: capacidades, custos, limites, status. model_card NAO eh: boot_config
  (inicializacao), agent (identidade), persona (estilo), router (roteamento), benchmark (avaliacao). Se responde "o que este
  LLM PODE fazer e quanto CUSTA?" → model_card. Se responde "como INICIALIZAR este LLM?" → boot_config (P02). Se responde
  "como este LLM se COMPORTA?" → persona (P02). Source: Mitchell 2019 define model card como "documento que acompanha modelos
  treinados, provendo benchmarks, intended use e limitacoes". CEX restringe ao escopo operacional (capacidade + custo) e delega
  safety/alignment para secao opcional.'
format: 'Arquivo `.md` com frontmatter YAML + body Markdown. Motivo: brain search so indexa .md; LLMs geram MD melhor que
  YAML; frontmatter validavel por schema. Mesmo formato de KC (P01) mas namespace P02 — model_card eh artefato de identidade,
  nao conhecimento generico.'
naming: '`p02_mc_{{provider}}_{{model_slug}}.md` — id == filename stem.

  provider: lowercase (anthropic, openai, google, meta, mistral, cohere, deepseek).

  model_slug: snake_case do nome canonico sem provider prefix (ex: `opus_4`, `gpt_4o`, `gemini_2_5_pro`).


  Exemplos:

  - `p02_mc_anthropic_opus_4.md`

  - `p02_mc_openai_gpt_4o.md`

  - `p02_mc_google_gemini_2_5_pro.md`

  - `p02_mc_meta_llama_3_1_405b.md`'
frontmatter: "Schema layered: Identity > Model Spec > Capabilities > Economics > Search.\nSource: operations_agent-CODEX recomenda\
  \ 4 blocos separados; este frontmatter achata em YAML mas preserva a separacao logica via comentarios.\n\n---\n# CEX IDENTITY\
  \ (7) — REQUIRED — padrao CEX, mesmo de KC\nid: p02_mc_{{provider}}_{{model_slug}}  # == filename stem\nkind: model_card\n\
  pillar: P02\nversion: \"{{semver}}\"\ncreated: \"{{YYYY-MM-DD}}\"\nupdated: \"{{YYYY-MM-DD}}\"\nauthor: \"{{quem PRODUZIU}}\"\
  \             # quem escreveu, NAO quem roteou\n\n# MODEL IDENTITY (6) — REQUIRED\n# Sources: Mitchell 2019 (model name,\
  \ developers), HF (model_name, pipeline_tag),\n#          LiteLLM (litellm_provider, mode), Anthropic SDK (id, display_name,\
  \ created_at)\nmodel_name: \"{{id oficial do provider}}\"         # ex: claude-opus-4-6520, gpt-4o-2024-08-06\nprovider:\
  \ \"{{anthropic|openai|google|meta|mistral|cohere|deepseek|other}}\"\nmodel_type: \"{{text-generation|embedding|image-generation|audio|multimodal}}\"\
  \  # HF pipeline_tag\nstatus: \"{{active|deprecated|sunset}}\"           # CEX-extension: lifecycle tracking (justified\
  \ by 90d freshness)\nrelease_date: \"{{YYYY-MM-DD or null}}\"           # HF, Meta, Google DeepMind (8/10 providers)\nknowledge_cutoff:\
  \ \"{{YYYY-MM or null}}\"          # Mitchell (training_data), 6/10 providers\n\n# CAPABILITIES (5) — REQUIRED\n# Sources:\
  \ LiteLLM (supports_* booleans), Anthropic SDK (ModelCapabilities),\n#          LangChain (ModelProfile), knowledge_agent-GEMINI\
  \ comparative (10 providers)\ncontext_window: {{int}}                          # max input tokens — universal (10/10 providers)\n\
  max_output: {{int}}                              # max output tokens — 7/10 providers\nmodalities:\n  text_input: {{bool}}\n\
  \  text_output: {{bool}}\n  image_input: {{bool}}                          # vision — 5/10 providers\n  audio_input: {{bool}}\
  \                          # 3/10 providers\n  pdf_input: {{bool}}                            # Anthropic SDK: pdf_input\n\
  features:\n  tool_calling: {{bool}}                         # LiteLLM: supports_function_calling\n  structured_output: {{bool}}\
  \                    # LiteLLM: supports_response_schema\n  reasoning: {{bool}}                            # LiteLLM: supports_reasoning\
  \ (extended thinking)\n  prompt_caching: {{bool}}                       # LiteLLM: supports_prompt_caching\n  code_execution:\
  \ {{bool}}                       # Anthropic SDK: code_execution\n  web_search: {{bool}}                           # LiteLLM:\
  \ supports_web_search\n  fine_tunable: {{bool}}                         # Meta, OpenAI (CEX-extension for routing)\n  batch_api:\
  \ {{bool}}                            # Anthropic SDK: batch\n\n# ECONOMICS (1 object) — REQUIRED for commercial, null for\
  \ open-weight\n# Sources: LiteLLM (input_cost_per_token, output_cost_per_token),\n#          OpenAI/Anthropic/Google pricing\
  \ pages\npricing:\n  input: {{float or null}}                       # USD per 1M tokens\n  output: {{float or null}}   \
  \                   # USD per 1M tokens\n  cache_read: {{float or null}}                  # Anthropic: 0.1x base\n  cache_write:\
  \ {{float or null}}                 # Anthropic: 1.25x base\n  unit: per_1M_tokens                            # ALWAYS this\
  \ unit — normaliza comparacao\n\n# SEARCH/DISCOVERY (7) — melhora recall ~30%\n# Sources: CEX KC blueprint (padrao), brain\
  \ search BM25\ndomain: model_selection\nquality: null                                    # NUNCA auto-atribuir — validacao\
  \ externa\ntags: [model-card, {{provider}}, {{model_family}}, {{key_capability}}]\ntldr: \"{{1 frase com dados: modelo,\
  \ provider, contexto, preco, destaque}}\"\nwhen_to_use: \"{{condicao de decisao: roteamento, selecao, comparacao}}\"\nkeywords:\
  \ [{{provider}}, {{model_name}}, {{key terms}}]\nlinked_artifacts:\n  primary: \"{{boot_config que usa este card, ou null}}\"\
  \n  related: [\"{{outros model_cards do mesmo provider}}\"]\ndata_source: \"{{URL da pricing page ou docs do provider}}\"\
  \n---"
body_variante_a_spec_card_modelo_individual: 'Para documentar UM modelo especifico com specs completos.


  ## Boundary

  model_card EH: spec tecnica de LLM (capacidades, custos, limites).

  model_card NAO EH: boot_config (inicializacao), agent (identidade), benchmark (avaliacao).


  ## Specifications

  | Spec | Value | Source |

  |------|-------|--------|

  Tabela com: model, provider, context, max_output, release, cutoff, architecture.

  Coluna Source: URL ou doc do provider para cada dado.


  ## Capabilities

  | Capability | Supported | Notes |

  |------------|-----------|-------|

  Tabela com cada feature como boolean explicito.

  Nao usar prosa — booleans sao machine-readable (LiteLLM pattern).


  ## When to Use

  | Scenario | Use This Model? | Why / Alternative |

  |----------|-----------------|-------------------|

  >= 3 scenarios com alternativas e razao de custo.


  ## Rate Limits

  | Tier | RPM | TPM | RPD |

  |------|-----|-----|-----|

  Limites por tier (se disponivel publicamente). Omitir se provider nao publica.


  ## References

  - source: {{provider docs URL}}

  - pricing: {{pricing page URL}}

  - related: {{outros model_cards}}'
body_variante_b_comparison_card_comparativo_entre_modelos: 'Para comparar 2+ modelos do mesmo provider ou across providers.


  ## Boundary

  comparison_card EH: tabela comparativa de specs entre modelos.

  comparison_card NAO EH: benchmark (avaliacao de performance), router (logica de decisao).


  ## Quick Reference

  scope: {{provider ou categoria}} | models: {{N}} | focus: {{preco|capacidade|modalidade}}


  ## Comparison Matrix

  | Spec | Model A | Model B | Model C |

  |------|---------|---------|---------|

  Tabela comparativa: context, max_output, pricing, features.

  >= 5 specs, >= 2 modelos.


  ## Capability Diff

  | Feature | Model A | Model B | Model C |

  |---------|---------|---------|---------|

  Booleans por modelo. Delta visual entre modelos.


  ## Decision Guide

  | Use Case | Best Choice | Why |

  |----------|-------------|-----|

  >= 3 use cases com recomendacao e justificativa de custo.


  ## References

  - source: {{URLs por modelo}}'
quality_gates_automatizaveis: "structural:\n  - id starts with \"p02_mc_\"\n  - id == filename_stem\n  - type == \"model_card\"\
  \n  - lp == \"P02\"\n  - model_name is not empty\n  - provider in [anthropic, openai, google, meta, mistral, cohere, deepseek,\
  \ other]\n  - context_window > 0 (integer)\n  - max_output > 0 (integer)\n  - status in [active, deprecated, sunset]\n \
  \ - modalities has >= 2 boolean fields\n  - features has >= 3 boolean fields\n  - tags is list, not string\n  - quality\
  \ == null (never self-score)\n  - body_bytes >= 300 and <= 3072\n\ndensity:\n  - sem filler: \"This document\", \"In summary\"\
  , \"As mentioned\"\n  - sem frases duplicadas (jaccard > 0.8)\n  - pricing tem numeros concretos (nao \"varies\" ou \"contact\
  \ sales\")\n  - context_window eh numero exato (nao \"up to\" ou \"approximately\")\n  - density_score >= 0.85 (mais alto\
  \ que KC por ser spec pura)\n\ncompleteness:\n  - 7 CEX identity fields preenchidos\n  - 6 model identity fields preenchidos\
  \ (null OK para release_date, knowledge_cutoff)\n  - modalities + features objects presentes\n  - pricing object presente\
  \ (null values OK para open-weight)\n  - body >= 4 secoes da variante escolhida\n  - Boundary section presente e nao-vazio\n\
  \  - References >= 1 source link\n\naccuracy:\n  - pricing matches provider published pricing page\n  - context_window matches\
  \ provider docs\n  - features verified against API docs or SDK\n  - knowledge_cutoff verified against provider announcement\n\
  \  - status reflects current provider lifecycle\n\nfreshness:\n  # CEX-extension: model_cards degradam mais rapido que KCs\n\
  \  # Source: builder_agent analysis — pricing/features mudam trimestralmente\n  - updated date within 90 days\n  - if status\
  \ == \"deprecated\": linked_artifacts must point to replacement\n  - if provider announces new version: card should update\
  \ within 7 days\n  - stale cards (> 90 days) flagged for review\n\nscoring:\n  quality = mean(structural_sub, density_sub,\
  \ completeness_sub, accuracy_sub)\n  # structural_sub = pass/fail (0 or 10)\n  # density_sub = 10 * density_score\n  # completeness_sub\
  \ = 10 * (filled_fields / total_fields)\n  # accuracy_sub = LLM-verified or manual (0-10)\n  # threshold: >= 8.0 for pool,\
  \ >= 9.5 for golden"
cross_references_grafo_de_conhecimento: "linked_artifacts:\n  primary: \"{{boot_config que consome este card}}\"\n  related:\
  \ [\"{{model_cards do mesmo provider}}\", \"{{fallback_chain que lista este modelo}}\"]\n# Relacoes validas: extends, depends_on,\
  \ replaces, compares_to\n\nPosicao no boot flow (camada 0 — infraestrutura):\n[boot_config + model_card]   <- infra pre-requisito\
  \ (camada 0)\n          |\n    [system_prompt]           <- papel persistente (camada 1)\n          |\n    [mental_model]\
  \            <- mapa cognitivo (camada 2)\n          |\n      [persona]               <- estilo comunicacao (camada 3)\n\
  \          |\n       [agent]                <- identidade completa (camada 4)\n\nmodel_card eh dependencia de: boot_config\
  \ (selecao), router (custo/capacidade), fallback_chain (priorizacao), agent_package (deploy bundle). Eh o unico tipo P02\
  \ puramente descritivo."
exemplo_minimo_valido: "---\nid: p02_mc_anthropic_sonnet_4\nkind: model_card\npillar: P02\nversion: 1.0.0\ncreated: 2026-03-26\n\
  updated: 2026-03-26\nauthor: builder_agent\nmodel_name: claude-sonnet-4-6\nprovider: anthropic\nmodel_type: text-generation\n\
  status: active\nrelease_date: 2025-05-14\nknowledge_cutoff: 2025-04\ncontext_window: 200000\nmax_output: 16000\nmodalities:\n\
  \  text_input: true\n  text_output: true\n  image_input: true\n  audio_input: false\n  pdf_input: true\nfeatures:\n  tool_calling:\
  \ true\n  structured_output: true\n  reasoning: true\n  prompt_caching: true\n  code_execution: true\n  web_search: false\n\
  \  fine_tunable: false\n  batch_api: true\npricing:\n  input: 3.00\n  output: 15.00\n  cache_read: 0.30\n  cache_write:\
  \ 3.75\n  unit: per_1M_tokens\ndomain: model_selection\nquality: 8.9\ntags: [model-card, anthropic, claude-4, sonnet, balanced]\n\
  tldr: \"Claude Sonnet 4 — Anthropic, 200K context, $3/$15 per 1M tokens, melhor custo-beneficio para analise e pesquisa\"\
  \nwhen_to_use: \"Tarefas de analise, pesquisa, marketing onde opus eh overkill e haiku insuficiente\"\nkeywords: [anthropic,\
  \ claude-sonnet-4, sonnet, balanced]\nlinked_artifacts:\n  primary: null\n  related: [p02_mc_anthropic_opus_4, p02_mc_anthropic_haiku_4]\n\
  data_source: \"https://docs.anthropic.com/en/docs/about-claude/models\"\n---\n\n## Boundary\nmodel_card EH: spec tecnica\
  \ do Claude Sonnet 4 (capacidades, custos, limites).\nmodel_card NAO EH: boot_config, agent, benchmark.\n\n## Specifications\n\
  | Spec | Value | Source |\n|------|-------|--------|\n| Model | claude-sonnet-4-6 | Anthropic docs |\n| Provider | Anthropic\
  \ | — |\n| Context Window | 200K tokens | Anthropic docs |\n| Max Output | 16K tokens | Anthropic docs |\n| Architecture\
  \ | Transformer (dense) | Anthropic system card |\n| Knowledge Cutoff | Apr 2025 | Anthropic docs |\n\n## Capabilities\n\
  | Capability | Supported | Notes |\n|------------|-----------|-------|\n| Tool Calling | yes | Parallel tool use supported\
  \ |\n| Structured Output | yes | JSON mode, schema enforcement |\n| Extended Thinking | yes | Budget-controlled reasoning\
  \ |\n| Prompt Caching | yes | 0.1x read cost, 1.25x write |\n| Vision | yes | Image + PDF input |\n| Code Execution | yes\
  \ | Sandbox execution |\n| Web Search | no | — |\n| Fine-tuning | no | Not available via API |\n| Batch API | yes | 50%\
  \ discount, 24h SLA |\n\n## When to Use\n| Scenario | Use Sonnet? | Why / Alternative |\n|----------|-------------|-------------------|\n\
  | Research and analysis | YES | Best cost/quality for analytical tasks |\n| Marketing copy generation | YES | Strong creative\
  \ at 20% of opus cost |\n| Complex multi-file refactoring | NO | Use opus — reasoning depth required |\n| Simple formatting\
  \ or classification | NO | Use haiku — 6x cheaper ($0.25/$1.25) |\n\n## References\n- source: https://docs.anthropic.com/en/docs/about-claude/models\n\
  - pricing: https://docs.anthropic.com/en/docs/about-claude/pricing\n- related: p02_mc_anthropic_opus_4"
anti_exemplo_o_que_nao_produzir: '---

  id: mc_gpt4                    # FAIL: sem prefixo p02_mc_, sem provider

  kind: model_card

  model_name: GPT-4              # FAIL: nome informal, nao eh id oficial

  provider: OpenAI               # FAIL: deve ser lowercase

  context_window: "128K"         # FAIL: string, nao integer

  max_output: "a lot"            # FAIL: vago, sem numero

  quality: 9.5                   # FAIL: auto-atribuido

  tags: "gpt, openai, chat"     # FAIL: string, nao lista

  features: "supports tools"     # FAIL: prosa, nao booleans

  pricing: "see website"         # FAIL: sem dados concretos

  ---

  ## Overview

  This document describes GPT-4.    # FAIL: filler

  It is a powerful model.            # FAIL: sem dados, sem fonte

  ## Pricing

  Pricing varies by usage.          # FAIL: sem numeros


  Falhas: id sem padrao, quality auto-atribuido, features como prosa (nao booleans), pricing sem dados, filler text, sem Boundary,
  sem References, sem Source column, sem data_source.'
tl_dr: 'model_card = spec tecnica de LLM para decisoes de roteamento e custo. Schema layered: Identity (7 CEX + 6 model) >
  Capabilities (modalities + features como booleans) > Economics (pricing normalizado per 1M tokens) > Search (7 discovery
  fields). Freshness gate 90 dias — model_cards degradam mais rapido que KCs. CEX normaliza Mitchell 2019 + HuggingFace +
  LiteLLM. Nao inventa campos.'
deep_dive: '| Source | Tipo | Contribuicao para este BP | URL |

  |--------|------|--------------------------|-----|

  | Mitchell et al. 2019 | Paper fundacional | Origem do conceito: model name, developers, intended use, limitations, ethical
  considerations | https://arxiv.org/abs/1810.03993 |

  | Gebru et al. 2021 | Paper adjacent | Datasheets for Datasets — mesma filosofia de documentacao | https://arxiv.org/abs/1803.09010
  |

  | HuggingFace Model Cards | Spec pratica | Standard mais adotado: YAML frontmatter + Markdown body, pipeline_tag, model-index,
  eval_results | https://huggingface.co/docs/hub/en/model-cards |

  | HF Model Card Guidebook | Best practices | Ozoani, Gerchick, Mitchell — guia pratico mais completo | https://huggingface.co/docs/hub/en/model-card-guidebook
  |

  | LiteLLM Registry | Operational registry | 2593 modelos, capability booleans (supports_*), pricing per token, routing metadata
  | https://github.com/BerriAI/litellm |

  | Google Model Card Toolkit | JSON schema | Proto-based schema, HTML rendering, Vertex AI pipeline integration | https://www.tensorflow.org/responsible_ai/model_card_toolkit/guide
  |

  | Anthropic SDK ModelInfo | API schema | ModelCapabilities com booleans tipados, context limits, display_name | https://github.com/anthropics/anthropic-sdk-python
  |

  | LangChain ModelProfile | Capability abstraction | Modality booleans (text/image/audio/video), tool_calling, structured_output
  | https://github.com/langchain-ai/langchain |

  | AI Transparency Atlas 2024 | Fragmentacao survey | 947 nomes de secao unicos — justifica necessidade de normalizacao |
  https://arxiv.org/html/2512.12443 |

  | Blueprints of Trust 2025 | Schema consenso | Propoe 20-30 campos consensuais para system cards | https://arxiv.org/pdf/2509.20394
  |

  | EU AI Act GPAI Code 2025 | Regulatorio | Compliance requirements para modelos > 10^25 FLOPs | https://euperspectives.eu/2025/07
  |'
cex_extensions_campos_sem_precedente_industrial_direto: '| Campo | Justificativa | Alternativa industrial mais proxima |

  |-------|--------------|-------------------------------------|

  | `status` (active/deprecated/sunset) | Freshness gate 90d — models deprecam, cards ficam stale | HF `new_version` pointer,
  LiteLLM `deprecation_date` |

  | `fine_tunable` | Decisao de roteamento: fine-tune vs prompt engineering | Meta finetuning_recipe (narrativo, nao boolean)
  |

  | `pricing.cache_read/write` | Prompt caching muda economia 10x — essencial para roteamento | LiteLLM nao separa cache pricing
  |

  | `freshness gate (90d)` | model_cards degradam 4x mais rapido que KCs | Nenhum standard define freshness policy |'
