definition: "quality_score:\n  type: object\n  properties:\n    overall:\n      type: number\n      minimum: 0.0\n      maximum:\
  \ 10.0\n    dimensions:\n      type: object\n      properties:\n        syntax: {type: number, min: 0, max: 10}\n      \
  \  structure: {type: number, min: 0, max: 10}\n        size: {type: number, min: 0, max: 10}\n        lint: {type: number,\
  \ min: 0, max: 10}\n        completeness: {type: number, min: 0, max: 10}\n    weights:\n      syntax: 3.0\n      structure:\
  \ 2.0\n      size: 1.5\n      lint: 2.0\n      completeness: 1.5\n  required: [overall, dimensions]"
thresholds: '| Score | Tier | Action |

  |-------|------|--------|

  | >= 9.0 | PASS | Commit allowed |

  | 7.0-8.9 | WARN | Commit with warning |

  | < 7.0 | FAIL | Commit blocked, rollback recommended |'
usage: 'Used by: quality_gate.py (pre-commit hook), signal_writer (completion), pool promotion. Source: `records/core/python/quality_gate.py`'
