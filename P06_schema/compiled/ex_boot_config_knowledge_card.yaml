id: p06_bp_knowledge_card
kind: artifact_blueprint
pillar: P06
llm_function: CONSTRAIN
title: 'Blueprint: knowledge_card — Meta-Template para Producao de KCs'
version: 2.0.0
created: 2026-03-25
updated: 2026-03-25
author: orchestrator
quality: 9.1
tags:
- blueprint
- knowledge-card
- meta-template
- production-mold
tldr: Meta-template que define COMO gerar KCs validos — frontmatter, body, quality gates, naming
when_to_use: Antes de gerar qualquer KC — este blueprint eh o molde
synthesis: Edison (builder) + Gemini (knowledge arch) + orchestrator (boundary/pragmatic)
boundary: 'KC eh conhecimento destilado, estatico, versionado. KC NAO eh: instrucao (P03), configuracao (P09), template (P06),
  teste (P07). Se tem `def/class` executavel → skill (P04). Se tem `faça X` → instruction (P03).'
format: 'Arquivo `.md` com frontmatter YAML + body Markdown. Motivo: brain search so indexa .md; LLMs geram MD melhor que
  YAML; frontmatter validavel por schema.'
naming: '`p01_kc_{{topic_slug}}.md` — id == filename stem. topic_slug: snake_case, sem agent_group prefix, descritivo.'
frontmatter: "---\n# REQUIRED (13) — vazio = KC INVALIDO\nid: p01_kc_{{topic_slug}}       # == filename stem\nkind: knowledge_card\n\
  pillar: P01\ntitle: \"{{5-100 chars}}\"        # BM25 primary signal\nversion: \"{{semver}}\"\ncreated: \"{{YYYY-MM-DD}}\"\
  \nupdated: \"{{YYYY-MM-DD}}\"\nauthor: \"{{quem PRODUZIU}}\"     # quem escreveu, NAO quem roteou\ndomain: \"{{domain}}\"\
  \nquality: null                    # null ate validacao externa\ntags: [t1, t2, t3]              # lista, NUNCA string;\
  \ cada tag = pesquisavel\ntldr: \"{{1 frase, <160 chars}}\" # search snippet — funciona sozinho\nwhen_to_use: \"{{condicao}}\"\
  \     # outra LLM le isto pra decidir se carrega\n\n# EXTENDED (6) — melhora recall ~30%\nkeywords: [kw1, kw2]\nlong_tails:\
  \ [\"{{pergunta natural}}\"]\naxioms: [\"{{SEMPRE/NUNCA regra}}\"]\nlinked_artifacts:\n  primary: \"{{id ou null}}\"   \
  \   # min 1 link ou explicitar null\n  related: [\"{{id}}\"]\ndensity_score: null              # preenchido pelo validador\n\
  data_source: \"{{url ou null}}\"   # facts precisam fonte\n---"
body_variante_a_meta_kc_tecnico_api_spec: '## Summary

  1-2 frases com dados especificos. Nunca "This document describes...".


  ## Spec

  | Campo | Valor | Nota |

  Tabela de specs exatos: precos, limites, configs.


  ## Patterns

  | Trigger | Action |

  O que funciona, com evidencia.


  ## Anti-Patterns

  - Bullet imperativo: o que falha e por que.


  ## Code

  <!-- source: path/file.py | lang: python | purpose: X -->

  def real_code(): ...


  ## References

  - related: {{kc_id}}

  - source: {{url}}'
body_variante_b_domain_kc_negocio_estrategia: '## Quick Reference

  topic: X | scope: Y | criticality: high


  ## Conceitos Chave

  - Min 3 bullets, max 80 chars cada.


  ## Fases

  1. Fase com outcome esperado.


  ## Regras de Ouro

  - SEMPRE/NUNCA imperativo.


  ## Comparativo

  | Opcao A | Opcao B |

  Tabela comparando alternativas (>= 2 linhas).


  ## Flow

  Diagrama ASCII do fluxo.'
quality_gates_automatizaveis: "structural:\n  - id == filename_stem\n  - tags is list, not string\n  - 200 <= body_bytes <=\
  \ 5120\n  - bullets <= 80 chars\n  - sections com < 3 linhas: FAIL\n\ndensity:\n  - sem filler: \"This document\", \"In\
  \ summary\", \"As mentioned\"\n  - sem frases duplicadas (jaccard > 0.8)\n  - density_score >= 0.80\n\ncompleteness:\n \
  \ - 13 required fields preenchidos (quality=null OK)\n  - body >= 4 secoes da variante escolhida\n  - maior secao >= 30%\
  \ do body\n\nscoring:\n  quality = mean(density_sub, completeness_sub, accuracy_sub)\n  # density_sub = 10 * density_score\n\
  \  # completeness_sub = 10 * (filled_sections / total_sections)\n  # accuracy_sub = LLM-verified ou manual (0-10)"
cross_references_grafo_de_conhecimento: "linked_artifacts:\n  primary: \"{{kc que este ESTENDE ou DEPENDE}}\"\n  related:\
  \ [\"{{kcs no mesmo dominio}}\"]\n# Relacoes validas: extends, depends_on, contradicts, replaces\n\nKC → embedding → vector\
  \ index → retrieval → LLM context.\nCada KC eh um no no grafo. linked_artifacts sao as arestas.\ntitle + tldr sao os campos\
  \ primarios de BM25 ranking."
headers_definem_os_chunks_de_embedding: ''
exemplo_minimo_valido: "---\nid: p01_kc_prompt_caching_basics\nkind: knowledge_card\npillar: P01\ntitle: \"Prompt Caching\
  \ Reduces LLM Cost by 90%\"\nversion: 1.0.0\ncreated: 2026-03-25\nupdated: 2026-03-25\nauthor: builder_agent\ndomain: llm_engineering\n\
  quality: 8.9\ntags: [prompt-caching, cost-optimization, anthropic]\ntldr: \"Cache reutiliza prefixos, cortando custo 90%\
  \ e latencia 85% para contextos > 1024 tokens\"\nwhen_to_use: \"Sistema LLM repete contexto longo entre chamadas\"\nkeywords:\
  \ [prompt-caching, cache-control]\nlong_tails: [\"Como configurar prompt caching na Anthropic\"]\naxioms: [\"SEMPRE coloque\
  \ conteudo estatico ANTES do dinamico\"]\nlinked_artifacts:\n  primary: p02_agent_llm_specialist\n  related: [p01_kc_rag_fundamentals]\n\
  density_score: null\ndata_source: \"https://docs.anthropic.com/en/docs/prompt-caching\"\n---\n\n## Summary\nPrompt caching\
  \ reutiliza prefixos pre-processados entre chamadas LLM. Reduz custo em 90% (Anthropic: read 0.1x) e latencia em 85% para\
  \ prefixos >= 1024 tokens.\n\n## Spec\n| Provider | Min Tokens | Write Cost | Read Cost | TTL |\n|----------|-----------|------------|-----------|-----|\n\
  | Anthropic | 1024 | 1.25x | 0.1x | 5 min |\n| OpenAI | 1024 | 1.0x | 0.5x | 5-60 min |\n\n## Patterns\n| Trigger | Action\
  \ |\n|---------|--------|\n| >50% contexto estatico | Ativar cache no prefixo |\n| Hit rate < 80% | Aumentar bloco cacheavel\
  \ |\n\n## Anti-Patterns\n- Cachear contexto que muda a cada request (invalida e AUMENTA custo)\n- Blocos pequenos demais\
  \ (overhead por bloco > economia)\n\n## References\n- source: https://docs.anthropic.com/en/docs/prompt-caching\n- related:\
  \ p01_kc_rag_fundamentals"
