pillar: P06
name: Schema
description: CONTRATOS de validacao
kinds:
  input_schema:
    description: Contrato de entrada
    boundary: Contrato de entrada que define dados requeridos. NAO eh validation_schema
      (saida) nem type_def (definicao abstrata).
    layer: spec
    core: true
    machine_format: json
    naming: p06_is_{{scope}}.yaml
    constraints:
      max_bytes: 3072
    llm_function: CONSTRAIN
  type_def:
    description: Definicao de tipo customizado
    boundary: Definicao de tipo customizado no sistema. NAO eh input_schema (contrato
      de entrada) nem interface (contrato bilateral).
    layer: spec
    core: true
    machine_format: yaml
    naming: p06_td_{{type}}.yaml
    constraints:
      max_bytes: 3072
    llm_function: GOVERN
  validator:
    description: Regra de validacao (pre-commit, quality gate)
    boundary: Regra de validacao tecnica pass/fail. NAO eh quality_gate (P11, score
      numerico) nem scoring_rubric (P07, criterios).
    layer: governance
    core: true
    machine_format: yaml
    naming: p06_val_{{rule}}.yaml
    constraints:
      max_bytes: 3072
    llm_function: GOVERN
  interface:
    description: Contrato de integracao entre agentes
    boundary: Contrato bilateral de integracao entre agentes. NAO eh input_schema
      (unilateral) nem signal (P12, evento simples).
    layer: spec
    core: false
    machine_format: json
    naming: p06_iface_{{contract}}.yaml
    constraints:
      max_bytes: 3072
    llm_function: CONSTRAIN
  validation_schema:
    description: Contrato de validacao pos-geracao (o sistema aplica, LLM nao ve)
    boundary: Contrato formal aplicado pelo SISTEMA apos geracao. NAO eh response_format
      P05 (injetado no prompt, LLM ve).
    layer: spec
    core: false
    machine_format: json
    naming: p06_vs_{{scope}}.yaml
    constraints:
      max_bytes: 3072
    llm_function: GOVERN
