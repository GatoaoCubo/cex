# P06 Schema v4.0
# v4.0: +grammar type, llm_function on all types
lp: P06
name: Schema
description: CONTRATOS de validacao
types:
  input_schema:
    description: Contrato de entrada
    boundary: Contrato de entrada que define dados requeridos. NAO eh validation_schema
      (saida) nem type_def (definicao abstrata).
    layer: spec
    core: true
    machine_format: json
    naming: p06_is_{{scope}}.yaml
    constraints:
      max_bytes: 3072
    llm_function: CONSTRAIN
  type_def:
    description: Definicao de tipo customizado
    boundary: Definicao de tipo customizado no sistema. NAO eh input_schema (contrato
      de entrada) nem interface (contrato bilateral).
    layer: spec
    core: true
    machine_format: yaml
    naming: p06_td_{{type}}.yaml
    constraints:
      max_bytes: 3072
    llm_function: GOVERN
  validator:
    description: Regra de validacao (pre-commit, quality gate)
    boundary: Regra de validacao tecnica pass/fail. NAO eh quality_gate (P11, score
      numerico) nem scoring_rubric (P07, criterios).
    layer: governance
    core: true
    machine_format: yaml
    naming: p06_val_{{rule}}.yaml
    constraints:
      max_bytes: 3072
    llm_function: GOVERN
  interface:
    description: Contrato de integracao entre agentes
    boundary: Contrato bilateral de integracao entre agentes. NAO eh input_schema
      (unilateral) nem signal (P12, evento simples).
    layer: spec
    core: false
    machine_format: json
    naming: p06_iface_{{contract}}.yaml
    constraints:
      max_bytes: 3072
    llm_function: CONSTRAIN
  validation_schema:
    description: Contrato de validacao pos-geracao (o sistema aplica, LLM nao ve)
    boundary: Contrato formal aplicado pelo SISTEMA apos geracao. NAO eh response_format
      P05 (injetado no prompt, LLM ve).
    layer: spec
    core: false
    machine_format: json
    naming: p06_vs_{{scope}}.yaml
    constraints:
      max_bytes: 3072
    llm_function: GOVERN
  artifact_blueprint:
    description: Blueprint para geracao de artefatos (shape com sections, limites,
      campos)
    boundary: Meta-template que define COMO gerar um artefato. NAO eh prompt_template
      P03 (instrucao ao LLM) nem type_def (definicao abstrata de tipo).
    layer: spec
    core: true
    machine_format: yaml
    naming: p06_bp_{{artifact}}.md
    constraints:
      max_bytes: 4096
    llm_function: CONSTRAIN
  grammar:
    description: Constraint formal de geracao (BNF, EBNF, regex, FSM)
    boundary: Constraint formal que restringe tokens durante geracao. NAO eh validator
      (pos-geracao) nem response_format P05 (instrucao textual). Grammar opera no
      DECODER do LLM.
    layer: spec
    core: false
    machine_format: yaml
    naming: p06_gram_{{format}}.yaml
    constraints:
      max_bytes: 3072
    llm_function: CONSTRAIN
