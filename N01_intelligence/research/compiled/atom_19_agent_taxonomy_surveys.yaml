3_2_key_definitions_xi_2023: '| Term | Definition |

  |------|-----------|

  | Agent | An artificial entity that perceives its surroundings via sensors, makes decisions, and takes actions via actuators
  |

  | Brain | The LLM-based core that stores knowledge/memory and performs information processing, decision-making, reasoning,
  and planning |

  | Perception | Module converting multimodal environmental information into representations the brain can process |

  | Action | Module executing decisions through textual output, tool usage, or embodied interactions |

  | Agency | Capacity to act with autonomy, intentionality, and goal-orientation |

  | Linguistic Knowledge | Grammar, morphology, syntax, semantics, and pragmatics encoded in the LLM |

  | Commonsense Knowledge | General world facts acquired from broad training (e.g., physical intuition, social norms) |

  | Professional Domain Knowledge | Specialized expertise in fields like programming, medicine, or mathematics |

  | In-Context Learning (ICL) | Learning from few examples placed in the prompt without any parameter updates |

  | Chain-of-Thought (CoT) | Generating intermediate reasoning steps before arriving at a final answer |

  | Continual Learning | Acquiring new capabilities progressively without catastrophic forgetting of previous skills |

  | Embodied Action | Agent perception, comprehension, and interaction with physical environments based on internal knowledge
  |

  | Tool Using | Leveraging external resources (APIs, databases, models) to enhance agent capabilities beyond the LLM''s intrinsic
  limits |

  | Tool Making | Agent self-sufficiency in generating executable programs and new tools (LATM, CREATOR) |

  | Plan Formulation | First stage of planning: decomposing a task into executable sub-steps |

  | Plan Reflection | Second stage of planning: evaluating and revising the plan using internal, human, or environmental feedback
  |

  | Instructor-Executor Paradigm | Human-agent cooperation where the human directs and the agent executes |

  | Equal Partnership Paradigm | Human-agent cooperation where both operate as peers |

  | Empathetic Communicator | Agent role in equal partnership providing emotional support and rapport |

  | Human-Level Participant | Agent role in equal partnership performing as a peer collaborator |'
3_3_four_agent_properties_xi_2023: '| Property | Mechanism |

  |----------|-----------|

  | Autonomy | Independent task formulation and execution (Auto-GPT) |

  | Reactivity | Rapid multimodal perception and response to changes |

  | Pro-activeness | Goal-oriented planning and reasoning |

  | Social Ability | Natural language interaction with humans and other agents |


  ---'
4_paper_3_arunkumar_et_al_2026_agentic_ai_architectures_taxonomies_and_evaluation: ''
4_1_complete_taxonomy_tree: "Agentic AI System\n|\n+-- FORMAL MODEL: A = <S, O, M, T, pi>  (POMDP-based)\n|   +-- S: State\
  \ space\n|   +-- O: Observation space (partial via multimodal encoders)\n|   +-- M: Memory (updated by observation, reasoning,\
  \ feedback)\n|   +-- T: Thought/plan (probabilistic inference)\n|   +-- pi: Policy (conditioned on reasoning trace)\n|\n\
  +-- CORE COMPONENTS\n|   |\n|   +-- 1. Perception (Phi)\n|   |   +-- Text-only processing (legacy)\n|   |   +-- Multimodal\
  \ Grounding\n|   |       +-- Screenshots / Vision encoders (WebVoyager, AppAgent)\n|   |       +-- DOM + Vision hybrids\
  \ (SeeAct)\n|   |       +-- Video + Proprioception (Magma)\n|   |       +-- Audio / Speech (AudioGPT)\n|   |       +-- 3D\
  \ Point Clouds (3D LLM)\n|   |\n|   +-- 2. Memory (M)\n|   |   +-- Structure Types\n|   |   |   +-- Natural language streams\n\
  |   |   |   +-- Hierarchical clusters\n|   |   |   +-- SQL tables\n|   |   |   +-- Paged stores\n|   |   +-- Retrieval Strategies\n\
  |   |   |   +-- Recency/relevance scoring\n|   |   |   +-- Hierarchical traversal\n|   |   |   +-- SQL queries\n|   |  \
  \ |   +-- Controller-driven\n|   |   +-- Retention Policies\n|   |   |   +-- Reflection / Summarization\n|   |   |   +--\
  \ Exponential decay\n|   |   |   +-- Paging\n|   |   |   +-- Semantic compression\n|   |   |   +-- Learned pruning\n|  \
  \ |   +-- Representative Systems\n|   |       +-- Generative Agents (reflection)\n|   |       +-- MemoryBank (decay)\n|\
  \   |       +-- ChatDB (SQL)\n|   |       +-- MemGPT (paging)\n|   |       +-- MemInsight (semantic)\n|   |       +-- MemAgent\
  \ (learned pruning)\n|   |\n|   +-- 3. Profiling (P)\n|   |   +-- System prompts and personas\n|   |   +-- Dynamic role-switching\n\
  |   |   +-- Behavioral constraints and implicit guidelines\n|   |\n|   +-- 4. Action & Tools (T)\n|       +-- Action Paradigms\n\
  |       |   +-- API-based (structured calls: Toolformer, Gorilla)\n|       |   +-- Code-as-Action (executable scripts: CodeAct,\
  \ Voyager)\n|       |   +-- Agent Computer Interfaces / ACI (shell/IDE: SWE-agent)\n|       |   +-- Computer Use Actions\
  \ (mouse/keyboard/screenshots: Claude, Operator)\n|       |   +-- Embodied VLA (continuous motor primitives: Gemini Robotics)\n\
  |       +-- Standardized Layer\n|           +-- Model Context Protocol (MCP): common tool exposure\n|           +-- Allowlists,\
  \ authentication, audit\n|\n+-- COGNITIVE ARCHITECTURE\n|   |\n|   +-- 1. Planning Approaches\n|   |   +-- Chain-of-Thought\
  \ (latent reasoning, linear, low latency)\n|   |   +-- ReAct (thought-action interleaving, linear loop, grounded)\n|   |\
  \   +-- Reflexion (verbal reinforcement, cyclical, self-correction)\n|   |   +-- Tree of Thoughts (external branching, tree,\
  \ backtracking)\n|   |   +-- LATS (MCTS with value feedback, graph/tree)\n|   |   +-- Reasoning Models (o1, o3: internalized\
  \ inference-time search, implicit tree)\n|   |   +-- ReAcTree (recursive sub-agent spawning, hierarchical)\n|   |\n|   +--\
  \ 2. Reflection Mechanisms\n|   |   +-- Verbal Reinforcement (Reflexion: NL critiques stored for future)\n|   |   +-- Self-Correction\
  \ (Self-Refine, CRITIC: generate-critique-revise loops)\n|   |   +-- Failure Recovery (PALADIN, Expel: reusable rules from\
  \ mistake trajectories)\n|   |\n|   +-- 3. Learning Paradigms (3 temporal horizons)\n|       +-- In-Context Learning (ephemeral:\
  \ few-shot, CoT examples, lives in prompt)\n|       +-- Weight Updates (permanent: instruction tuning, Agent-FLAN, FireAct,\
  \ RLHF, RLAIF)\n|       +-- Skill Accumulation (non-parametric: Voyager skill library, AgentRM, AgentPRM)\n|\n+-- MULTI-AGENT\
  \ SYSTEMS\n|   |\n|   +-- 1. Interaction Topologies\n|   |   +-- Chain / Waterfall (sequential: MetaGPT, ChatDev)\n|   |\
  \   +-- Star / Hub-and-Spoke (central controller: AutoGen, Swarm)\n|   |   +-- Mesh / Decentralized (dynamic: CAMEL, Generative\
  \ Agents, TradingAgents)\n|   |   +-- Workflow Graph / Explicit State Machine (LangGraph: checkpoints, typed state, guards)\n\
  |   |\n|   +-- 2. Collaboration Mechanisms\n|       +-- Role-Playing (CAMEL: inception prompting assigns personas)\n|  \
  \     +-- Standard Operating Procedures (MetaGPT: encode SOPs, standardized deliverables)\n|       +-- Hierarchical Verification\
  \ (MAKER: separate Verifier agents challenge Workers)\n|       +-- Adversarial Debate (multiple agents propose, critique,\
  \ converge)\n|       +-- Economic Simulation (TradingAgents: market-like emergent decisions)\n|\n+-- ENVIRONMENTS & DOMAINS\n\
  |   |\n|   +-- 1. Digital Agents\n|   |   +-- Web (Mind2Web, WebArena: screenshot-driven, dynamic DOM)\n|   |   +-- Operating\
  \ Systems (OSWorld, Windows Agent Arena: multi-app workflows)\n|   |   +-- Enterprise Software (SWE-Bench Pro, SQL-agents:\
  \ repo-scale tasks)\n|   |\n|   +-- 2. Embodied Agents\n|   |   +-- Games (Voyager/Minecraft: lifelong learning, skill libraries)\n\
  |   |   +-- Robotics (VLA models, physical grounding, cross-embodiment transfer)\n|   |   +-- Autonomous Driving (Agent-Driver:\
  \ cognitive memory; DiMA: distillation)\n|   |\n|   +-- 3. Specialized Domains\n|       +-- Healthcare / Science (hypothesis\
  \ generation, EHR, clinical compliance)\n|       +-- Finance (market simulation, portfolio optimization)\n|       +-- Conversational\
  \ (empathetic voice systems, long-term support)\n|\n+-- EVALUATION FRAMEWORK (CLASSic)\n|   +-- Cost (token consumption,\
  \ hierarchical overhead)\n|   +-- Latency (real-world constraints, asynchronous benchmarks)\n|   +-- Accuracy (multi-step\
  \ tool use, state tracking, long-horizon recovery)\n|   +-- Security (prompt injection, allowlists, authentication, audit,\
  \ compartmentalization)\n|   +-- Stability (variance across runs, failure distributions, compliance)\n|\n+-- KEY BENCHMARKS\n\
  \    +-- GAIA (general assistants, multi-step decomposition)\n    +-- SWE-Bench / Verified / Pro (software engineering)\n\
  \    +-- OSWorld / Verified (desktop control)\n    +-- tau-bench (multi-turn tool interaction with policies)\n    +-- FrontierMath\
  \ (hard mathematical reasoning)\n    +-- AgentBench, MARBLE (diverse environments, emergent behaviors)"
4_2_key_definitions_arunkumar_2026: '| Term | Definition |

  |------|-----------|

  | Agentic AI | AI systems that behave as autonomous entities capable of perceiving, reasoning, planning, and acting |

  | Agentic Control Loop | Formal POMDP: A = <S, O, M, T, pi> where perception, memory, planning, and action execute in a
  loop |

  | Perception (Phi) | Partial observation function mapping environment state to agent observations via multimodal encoders
  |

  | Memory (M) | Stateful store updated each step by observations, reasoning traces, and environmental feedback |

  | Planning (Z) | Probabilistic inference of thought/plan conditioned on memory and current observations |

  | Policy (pi) | Action selection conditioned on the current reasoning trace and memory state |

  | API-based Action | Structured tool calls via defined interfaces (Toolformer, Gorilla) |

  | Code-as-Action | Generating executable code (Python, JavaScript) as the action primitive (CodeAct, Voyager) |

  | Agent Computer Interface (ACI) | Shell/IDE-level actions where the agent operates developer tools directly (SWE-agent)
  |

  | Computer Use Actions | GUI-level mouse/keyboard/screenshot interactions (Claude Computer Use, Operator) |

  | Model Context Protocol (MCP) | Standardized protocol for common tool exposure with allowlists, authentication, and audit
  |

  | Chain topology | Sequential task passing through a fixed agent sequence (waterfall) |

  | Star topology | Central controller coordinating specialized worker agents (hub-and-spoke) |

  | Mesh topology | Dynamic, unstructured peer-to-peer agent interaction (decentralized) |

  | Workflow Graph | Explicit state machine with typed state, guard nodes, and approval steps (LangGraph) |

  | Verbal Reinforcement | Storing natural-language critiques and conditioning future attempts on them (Reflexion) |

  | Skill Accumulation | Non-parametric learning via external skill libraries of reusable, verified code (Voyager) |

  | CLASSic | Evaluation framework: Cost, Latency, Accuracy, Security, Stability |'
4_3_open_challenges_arunkumar_2026: '1. Hallucination in Action -- retrieval failures, cascading error propagation in multi-step
  loops

  2. Infinite Loops -- agents trapped in repetitive retries, lacking meta-cognitive assessment

  3. Latency/Cost Trade-off -- multi-agent overhead, need for System 2 -> System 1 distillation

  4. Human-Agent Alignment -- task completion vs. social norms and safety boundaries

  5. Open-Ended Learning -- static agents post-deployment, need for lifelong curriculum self-generation

  6. Theoretical Limits -- understudied optimization boundaries and autonomy prerequisites


  ---'
5_convergence_divergence_comparison: ''
5_1_component_mapping_across_taxonomies: '| Concept | Wang 2023 | Xi 2023 | Arunkumar 2026 |

  |---------|-----------|---------|----------------|

  | Agent identity/role | Profiling Module (handcraft / LLM-gen / dataset) | Brain > NL Interaction + Knowledge | Profiling
  (system prompts, personas, role-switching) |

  | Short-term memory | Unified Memory (in-context) | Memory > Length Limits + Summarization | Memory > Natural language streams
  |

  | Long-term memory | Hybrid Memory (consolidated stores) | Memory > Vectors/Data Structures | Memory > SQL tables, paged
  stores, hierarchical clusters |

  | Memory retrieval | Read (recency, relevance, importance) | Automated (same 3 metrics) + Interactive | Recency/relevance
  + Hierarchical + SQL + Controller-driven |

  | Memory management | Write + Reflection | Summarization + Compression | Reflection + Decay + Paging + Semantic compression
  + Learned pruning |

  | Reasoning | Single-path (CoT) + Multi-path (ToT) | CoT + Self-Consistency + Self-Refine + Selection-Inference | CoT +
  ReAct + Reflexion + ToT + LATS + Reasoning Models + ReAcTree |

  | Planning | Without feedback (3 types) + With feedback (3 types) | Formulation (5 types) + Reflection (3 types) | 7 named
  methods with topology annotations |

  | Perception / Input | (implicit in Action module) | Textual + Visual + Auditory + Other modalities | Perception dimension:
  text, vision, DOM, video, audio, 3D |

  | Tool use | External Tools (subset of Action Space) | Tool Using (understand, learn, adapt, make) | 5 action paradigms:
  API, Code, ACI, Computer Use, Embodied VLA |

  | Embodied action | (within Action Space) | Embodied Action (observe, manipulate, navigate) | Embodied VLA (continuous motor
  primitives) |

  | Multi-agent | (not primary focus) | Cooperative + Adversarial interaction | 4 topologies (chain, star, mesh, workflow
  graph) + 5 mechanisms |

  | Human-agent | Human feedback in planning | Instructor-Executor + Equal Partnership paradigms | (within collaboration mechanisms)
  |

  | Agent society | (not covered) | Behavior, Personality (cognition/emotion/character), Environments | (not covered as separate
  section) |

  | Evaluation | Subjective + Objective | Benchmarks section | CLASSic framework (Cost, Latency, Accuracy, Security, Stability)
  |

  | Formal model | None | None | POMDP-based: A = <S, O, M, T, pi> |

  | Capability acquisition | Fine-tuning + Prompt/Mechanism engineering | Transferability (zero-shot, ICL, continual learning)
  | 3 temporal horizons: In-context, Weight updates, Skill accumulation |'
5_2_where_they_converge:
- All three decompose agents into perception, reasoning/planning, memory, and action. The boundaries differ but the conceptual
  modules are consistent.
- Memory is universally split into short-term (in-context) and long-term (external store). All three cite recency and relevance
  as core retrieval signals.
- Planning decomposes into formulate-then-reflect. Wang calls it "without/with feedback"; Xi calls it "formulation/reflection";
  Arunkumar names specific algorithms but the pattern is the same.
- Tool use is a first-class action type. All three treat external tool invocation as a primary action modality alongside text
  generation.
- Chain-of-Thought is the foundational reasoning primitive. Every taxonomy builds on CoT as the base, then extends to trees,
  graphs, and self-correction loops.
- Hallucination and alignment are universal open problems. All three surveys flag these as critical unsolved challenges.
5_3_where_they_diverge: '| Dimension | Divergence |

  |-----------|-----------|

  | Scope of "Perception" | Wang 2023 has no explicit perception module -- input handling is implicit. Xi 2023 creates a full
  Perception branch with 4 modalities. Arunkumar 2026 makes Perception a formal dimension with multimodal grounding taxonomy.
  |

  | Agent identity | Wang 2023 devotes a full module (Profiling) with 3 methods. Xi 2023 folds identity into the Brain''s
  knowledge and NL interaction. Arunkumar 2026 treats it as Profiling with dynamic role-switching. |

  | Tool use granularity | Wang 2023: "External Tools" as a flat category. Xi 2023: 4-stage pipeline (understand, learn, adapt,
  make). Arunkumar 2026: 5 distinct paradigms (API, Code, ACI, Computer Use, Embodied VLA) plus MCP standardization. |

  | Multi-agent systems | Wang 2023: not a focus. Xi 2023: cooperative vs. adversarial binary. Arunkumar 2026: 4 topologies
  + 5 collaboration mechanisms with named systems. |

  | Agent society | Only Xi 2023 covers social behavior, personality dimensions (cognition/emotion/character), and environment
  types for agent societies. The other two do not address this. |

  | Formal rigor | Only Arunkumar 2026 provides a POMDP-based formal model. Wang and Xi are descriptive taxonomies without
  mathematical formalization. |

  | Evaluation | Wang 2023: subjective/objective binary. Xi 2023: benchmark listing. Arunkumar 2026: structured CLASSic framework
  with 5 named dimensions. |

  | Temporal coverage | Arunkumar 2026 covers 2024-2025 advances (reasoning models like o1/o3, MCP protocol, computer use,
  VLA) absent from the 2023 surveys. |

  | Capability acquisition | Wang 2023 separates fine-tuning from mechanism engineering. Xi 2023 frames it as transferability/generalization.
  Arunkumar 2026 introduces temporal horizons (ephemeral, permanent, non-parametric). |'
5_4_evolution_of_the_field_2023_2026: '| Aspect | 2023 State (Wang + Xi) | 2026 State (Arunkumar) |

  |--------|----------------------|----------------------|

  | Reasoning | CoT, ToT as prompting techniques | Reasoning models (o1, o3) with internalized inference-time search |

  | Tool use | API calls, external models | MCP standard, native computer use, code-as-action, ACI |

  | Planning topology | Linear and tree | Full graph (LATS with MCTS), hierarchical sub-agent spawning (ReAcTree) |

  | Multi-agent | Cooperative/adversarial binary | 4 topologies + 5 mechanisms + workflow graphs with typed state |

  | Memory | Summarization + embeddings | + Exponential decay, paging (MemGPT), semantic compression, learned pruning |

  | Evaluation | Qualitative or benchmark-list | Structured CLASSic framework with security as first-class dimension |

  | Safety | Mentioned as future work | Prompt injection in action, compartmentalization, allowlists, audit logging |

  | Embodiment | Robotics as application domain | VLA models as a core action paradigm alongside digital actions |


  ---'
6_unified_glossary_all_three_papers: '| Term | Source(s) | Definition |

  |------|-----------|-----------|

  | Agent | All three | Autonomous entity that perceives, reasons, plans, and acts in an environment |

  | Brain | Xi | The LLM core that stores knowledge and performs reasoning/planning |

  | Profiling | Wang, Arunkumar | Module defining agent identity, role, and behavioral constraints |

  | Memory (short-term) | All three | Recent observations held in the LLM''s context window |

  | Memory (long-term) | All three | Persistent store (embeddings, databases, paged memory) surviving beyond context |

  | Memory Reflection | Wang, Xi | Abstracting raw experiences into higher-level insights |

  | Memory Decay | Arunkumar | Exponential reduction of memory salience over time |

  | Chain-of-Thought (CoT) | All three | Step-by-step reasoning trace before final answer |

  | Tree of Thoughts (ToT) | Wang, Arunkumar | Branching search over multiple reasoning paths with backtracking |

  | ReAct | Xi, Arunkumar | Interleaving thought and action in a linear loop |

  | Reflexion | Arunkumar | Verbal reinforcement: storing NL critiques for future conditioning |

  | LATS | Arunkumar | Language Agent Tree Search: MCTS with value feedback on reasoning trees |

  | Planning Formulation | Xi | First planning stage: decomposing task into sub-steps |

  | Planning Reflection | Xi | Second planning stage: evaluating/revising plan via feedback |

  | External Planner | Wang | Using formal languages (PDDL) with external solvers |

  | Tool Use | All three | Invoking external APIs, databases, models to extend agent capabilities |

  | Tool Making | Xi | Agent creates new executable programs/tools autonomously |

  | Code-as-Action | Arunkumar | Using generated executable code as the primary action primitive |

  | Agent Computer Interface (ACI) | Arunkumar | Shell/IDE-level actions (SWE-agent pattern) |

  | Computer Use | Arunkumar | GUI-level mouse/keyboard/screenshot actions |

  | Model Context Protocol (MCP) | Arunkumar | Standardized protocol for tool exposure with auth and audit |

  | Embodied Action | Xi, Arunkumar | Physical/virtual environment interaction (manipulation, navigation) |

  | Embodied VLA | Arunkumar | Vision-Language-Action models producing continuous motor primitives |

  | Cooperative Interaction | Xi | Multi-agent collaboration toward shared goals |

  | Adversarial Interaction | Xi | Multi-agent competitive/debate exchanges for improvement |

  | Chain Topology | Arunkumar | Sequential waterfall of agents (MetaGPT, ChatDev) |

  | Star Topology | Arunkumar | Central controller with specialized workers (AutoGen, Swarm) |

  | Mesh Topology | Arunkumar | Decentralized dynamic peer-to-peer interaction (CAMEL) |

  | Workflow Graph | Arunkumar | Explicit state machine with typed state and guard nodes (LangGraph) |

  | Instructor-Executor | Xi | Human directs, agent executes |

  | Equal Partnership | Xi | Human and agent operate as peers |

  | Agent Society | Xi | Emergent social phenomena from groups of interacting agents |

  | Capability Acquisition | Wang | Obtaining new abilities via fine-tuning or mechanism engineering |

  | In-Context Learning (ICL) | Xi, Arunkumar | Few-shot learning from prompt examples without parameter updates |

  | Continual Learning | Xi | Progressive skill acquisition without catastrophic forgetting |

  | Skill Accumulation | Arunkumar | Non-parametric learning via external verified skill libraries |

  | CLASSic | Arunkumar | Evaluation framework: Cost, Latency, Accuracy, Security, Stability |

  | Hallucination | All three | Generating plausible but factually incorrect outputs or actions |

  | Prompt Injection | Arunkumar | Malicious instructions embedded in inputs that hijack agent behavior |


  ---'
