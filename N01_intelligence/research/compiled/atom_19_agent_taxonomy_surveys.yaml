12_2_taxonomy_gaps_identified: 'Based on Jan-Apr 2026 research, three areas are inadequately covered by the three foundational
  surveys:


  1. Agent-to-Agent communication protocols: Wang/Xi/Arunkumar treat multi-agent interaction as high-level topologies. A2A
  and MCP 2.0 show the need for a sub-taxonomy of inter-agent message formats, trust models, and capability negotiation. Gap:
  no taxonomy of agent-to-agent trust surface analogous to the CLASSic Security dimension.


  2. Process Reward Models (PRMs) for agents: All three surveys treat evaluation as outcome-based. AgentRM (2026) shows process-level
  reward modeling changes both training and inference-time search in ways the POMDP model does not capture. The POMDP reward
  r_t is assumed scalar; PRMs introduce dense, step-level reward shaping.


  3. Hybrid digital-physical agents: Embodied VLA and Computer Use are categorized separately in Arunkumar 2026, but Gemini
  Robotics and Devin show that agents increasingly cross both boundaries within a single task (web research -> robot assembly).
  No current taxonomy covers this hybrid action space.'
12_3_convergence_since_2023: '| Taxonomy dimension | 2023 state | 2026 state (new convergence) |

  |-------------------|-----------|------------------------------|

  | Tool protocol | Proprietary per-system APIs | MCP as emerging standard (all major vendors) |

  | Multi-agent communication | Ad hoc (AutoGen, CAMEL each invent own) | A2A protocol proposed as standard |

  | Edit format | 6+ competing formats (Aider, Codex, etc.) | Tool-based edits (Claude Code model) gaining adoption |

  | Evaluation | Benchmark zoo | CLASSic + SWE-bench Verified as near-universal references |

  | Memory | Flat or simple reflection | 6-architecture taxonomy (stream, reflection, decay, paging, compression, learned)
  |


