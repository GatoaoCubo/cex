  |---------------|-------------|

  | All three define Memory as short-term + long-term with retrieval scoring | CEX P10 Memory pillar: entity_memory, memory_summary,
  knowledge_index |

  | Wang''s Profiling Module = identity configuration | CEX brand_config.yaml + agent_card + system_prompt per nucleus |

  | Xi''s Brain = LLM core with 5 capabilities | CEX nucleus = LLM instance with 8F pipeline (reasoning through F1-F8) |

  | Arunkumar''s 5 action paradigms (API, Code, ACI, Computer Use, VLA) | CEX P04 Tools pillar: cli_tool, browser_tool, mcp_server,
  api_client |

  | Multi-agent topologies (chain, star, mesh, workflow graph) | CEX dispatch: solo (star), grid (mesh), mission_runner (workflow
  graph) |

  | CLASSic evaluation (Cost, Latency, Accuracy, Security, Stability) | CEX P07 Evaluation: quality_gate, scoring_rubric,
  benchmark |

  | MCP as standardized tool protocol | CEX P04: mcp_server kind, tool exposure via _tools/ |

