1_overview: 'Three landmark surveys define the vocabulary and structural decomposition of LLM-based agents. Each proposes
  a component-based architecture but carves the boundaries differently. This atom extracts every taxonomy tree, defines every
  term, and maps convergences and divergences across the three.


  | Property | Wang 2023 | Xi 2023 | Arunkumar 2026 |

  |----------|-----------|---------|----------------|

  | arXiv | 2308.11432 | 2309.07864 | 2601.12560 |

  | Published | Aug 2023 (rev. Mar 2025) | Sep 2023 | Jan 2026 |

  | Pages | ~30 | 86 | 28 |

  | Core framework | Profile-Memory-Planning-Action | Brain-Perception-Action | Perception-Brain-Planning-Action-Tools-Collaboration
  |

  | Component count | 4 modules | 3 modules (5 brain sub-modules) | 6 dimensions |

  | Scope | Construction + Applications + Evaluation | Construction + Applications + Agent Society | Architecture + Environments
  + Evaluation + Open Problems |

  | Formal model | No | No | Yes (POMDP-based control loop) |


  ---'
