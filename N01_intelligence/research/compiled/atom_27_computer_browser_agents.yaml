4_infrastructure_environment_terms: '| Term                  | Definition                                                                 |

  |----------------------|----------------------------------------------------------------------------|

  | Desktop sandbox  | Isolated VM/container for safe agent execution (Docker, Firecracker)       |

  | Headless browser | Browser without visible UI; runs in background for automation              |

  | Browser session  | Isolated browser context with own cookies, storage, history                |

  | Session replay   | Recording of browser session for debugging/review (CDP screencast)         |

  | CDP (Chrome DevTools Protocol) | Low-level protocol for browser instrumentation (screenshot, DOM, network) |

  | Virtual display  | Xvfb or similar; renders desktop without physical monitor                  |

  | Ephemeral sandbox| Short-lived VM/container destroyed after task completion                   |

  | Agent Identity   | Realistic browser fingerprint to avoid bot detection                       |

  | Captcha solving  | Automated bypass of CAPTCHA challenges                                     |

  | Proxy rotation   | Cycle IP addresses to avoid rate limiting                                  |

  | Human-in-the-loop (HITL) | Require human confirmation for high-stakes actions                       |

  | Cursor tracking  | Vision-based tracking of mouse cursor for GUI interaction                  |


  ---'
5_key_distinctions: '| Distinction                | Description                                                                 |

  |---------------------------|-----------------------------------------------------------------------------|

  | CUA vs. browser_tool  | CUA controls full desktop; browser_tool focuses on web page interaction     |

  | SoM vs. a11y tree     | SoM is visual annotations; a11y tree is structured accessibility data       |

  | Coordinate-based vs. ref-based | Coordinate-based uses screen positions; ref-based uses DOM element IDs |

  | Session replay vs. trajectory synthesis | Replay captures history; synthesis generates new actions |

  | Sandbox_config vs. env_config | Sandbox_config defines isolation; env_config defines runtime variables |


  ---'
6_benchmark_definitions: ''
6_1_osworld:
- 'Purpose: Evaluate full-desktop automation capabilities.'
- 'Tasks: File management, application launching, multi-step workflows.'
- 'Metrics: Task completion rate, time-to-complete, error rate.'
6_2_webarena:
- 'Purpose: Benchmark web-based task completion.'
- 'Tasks: Form filling, navigation, e-commerce checkout.'
- 'Metrics: Task success rate, latency, browser compatibility.'
6_3_agentbench: '- Purpose: General-purpose agent evaluation across domains.

  - Tasks: Reasoning, planning, multi-agent collaboration.

  - Metrics: Accuracy, robustness, generalization.


  ---'
7_challenges_and_open_problems: '1. Cross-platform compatibility: Ensuring CUA works on Windows, macOS, Linux.

  2. Vision-language alignment: Improving SoM and UGround accuracy for diverse UIs.

  3. Privacy and security: Safeguarding data in sandboxed environments.

  4. Scalability: Handling large-scale DOM distillation and session replay.

  5. Human-in-the-loop integration: Balancing automation with user oversight.


  ---'
