title: 'Computer Use Agents, Browser Tools, and Infrastructure: A Comprehensive Artifact'
author: AI Assistant
date: '2024-05-20'
version: '1.2'
license: CC BY 4.0
1_introduction: 'This artifact serves as a technical reference for developers, researchers, and engineers working on computer
  use agents (CUA), browser automation tools, and desktop sandboxing infrastructure. It covers:


  - Key concepts (e.g., SoM, a11y trees, vision grounding)

  - Technical distinctions (e.g., CUA vs. browser_tool)

  - Infrastructure terms (e.g., sandbox_config, session_recording)

  - Benchmark definitions (e.g., OSWorld, WebArena)

  - Proposed CEX Kind extensions for better categorization


  ---'
2_key_concepts: ''
2_1_computer_use_agents_cua:
- 'Definition: LLM-powered agents that control desktop environments via GUI automation (mouse, keyboard, vision).'
- 'Examples: Anthropic CU, OpenAI CUA, OSWorld agents.'
- 'Core Capabilities:'
- Vision-based object recognition (SoM, GUI-Actor)
- Coordinate-based or ref-based actions (e.g., `click @e15`)
- Session replay and trajectory synthesis (AgentTrek)
2_2_browser_tools:
- 'Definition: Tools for web page interaction via DOM manipulation or vision-based screenshot analysis.'
- 'Examples: Stagehand, browser-use, Playwright MCP.'
- 'Key Features:'
- DOM distillation (structured text vs. raw HTML)
- A11y tree extraction for accessibility
- Integration with CDP (Chrome DevTools Protocol)
2_3_vision_grounding: '- SoM (Set-of-Mark): Overlay visual annotations on screenshots for LLMs to understand GUI elements.

  - UGround: Universal GUI grounding using vision-language models.

  - GUI-Actor: Coordinate-free visual grounding for cross-platform compatibility.


  ---'
3_cex_kind_mapping: ''
3_1_existing_kinds: '| CEX Kind         | Pillar | Boundary                                                                 |
  Coverage                                      |

  |------------------|--------|--------------------------------------------------------------------------|-----------------------------------------------|

  | `computer_use`   | P04    | GUI automation (screen, keyboard, mouse) — NOT browser_tool, NOT cli_tool | Anthropic CU,
  OpenAI CUA, OSWorld agents      |

  | `browser_tool`   | P04    | Web page interaction via DOM — NOT computer_use, NOT search_tool         | Stagehand, browser-use,
  WebArena agents       |

  | `vision_tool`    | P04    | Visual analysis, OCR, screenshot interpretation — NOT browser_tool       | SoM overlay, GUI
  grounding, screenshot analysis |'
3_2_proposed_new_kinds: '| Proposed Kind             | Pillar | Description                                                                 |
  Boundary                                                                 | Rationale                                                                 |

  |--------------------------|--------|-----------------------------------------------------------------------------|--------------------------------------------------------------------------|---------------------------------------------------------------------------|

  | `gui_grounding_config`   | P04    | Configuration for visual grounding strategy (SoM, coordinate, ref-based)    | Grounding
  strategy config. NOT vision_tool (runtime analysis)            | SoM, GUI-Actor, UGround each need different overlay/ref
  configs. No existing kind covers grounding strategy selection. |

  | `agent_benchmark`        | P07    | Benchmark definition for evaluating agent performance (tasks, metrics)      | Benchmark
  definition. NOT scoring_rubric (per-artifact quality)          | OSWorld, WebArena, BrowserGym need structured definitions
  for agent evaluation suites. |

  | `session_recording`      | P10    | Session replay configuration: what to capture, storage, playback format     | Recording
  config. NOT trace_config (LLM call traces)                     | Browserbase, AgentTrek, and debug workflows need session
  capture specs. |

  | `sandbox_config`         | P09    | Desktop/browser sandbox environment specification (VM type, isolation)    | Environment
  isolation config. NOT env_config (runtime variables)         | Docker containers, Firecracker microVMs need environment
  specs.         |

  | `dom_distillation_config`| P04    | DOM processing pipeline config: what to strip, what to enrich             | DOM processing
  config. NOT browser_tool (page interaction)               | Agent-E, Playwright MCP, BrowserGym use different DOM distillation
  strategies. |'
