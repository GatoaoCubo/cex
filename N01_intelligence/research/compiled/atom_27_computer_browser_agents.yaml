title: Computer Use Agent (CUA) Technical Reference
author: AI Assistant
date: '2025-04-05'
description: Comprehensive technical reference for computer use agents, browser tools, and related infrastructure, including
  definitions, distinctions, and implementation frameworks.
1_core_concepts: ''
1_1_computer_use_agent_cua: 'A CUA is an AI system capable of performing tasks on a computer interface (GUI, CLI, or web)
  by interacting with the operating system, applications, and user environment. Key capabilities include:

  - GUI Automation: Mouse, keyboard, and screen interaction.

  - Web Navigation: Browser-based task execution.

  - Vision-Based Grounding: Object and action recognition via screenshots.

  - Session Management: Recording, replaying, and isolating tasks.'
1_2_browser_tool: 'A specialized CUA focused on web page interaction via the DOM (Document Object Model). Browser tools typically:

  - Use headless browsers (e.g., Playwright, Puppeteer).

  - Leverage Chrome DevTools Protocol (CDP) for low-level control.

  - Support DOM distillation (stripping irrelevant elements for efficiency).'
1_3_vision_tool: 'A CUA component that analyzes screenshots for object detection, OCR, and action localization. Common techniques
  include:

  - Set-of-Mark (SoM): Overlaying semantic annotations on screenshots.

  - GUI-Actor/UGround: Coordinate-free visual grounding strategies.


  ---'
2_key_implementation_frameworks: ''
2_1_stagehand:
- 'Language: TypeScript/Python.'
- 'Features:'
- '`act`, `extract`, `observe`, and `agent` primitives.'
- DOM + vision integration.
- Supports OSWorld and WebArena benchmarks.
- 'GitHub: Stagehand.'
2_2_browser_use:
- 'Language: Python.'
- 'Features:'
- LLM + Playwright feedback loop.
- HTML + screenshot observation.
- High flexibility for custom workflows.
- 'GitHub: browser-use.'
2_3_playwright_mcp:
- 'Language: Python.'
- 'Features:'
- A11y tree with element references.
- Focus on accessibility and semantic grounding.
- 'GitHub: Playwright MCP.'
2_4_webvoyager: '- Approach: SoM + 3-phase (plan/act/validate) workflow.

  - Use Case: Research agent for complex GUI tasks.


  ---'
