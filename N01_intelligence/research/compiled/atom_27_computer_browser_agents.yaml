8_glossary: '- SoM: Set-of-Mark — Semantic annotations on screenshots for visual grounding.

  - CDP: Chrome DevTools Protocol — API for browser automation.

  - DOM Distillation: Process of simplifying web pages by removing irrelevant elements.

  - Headless Browser: Browser without a GUI, used for automation.


  ---'
9_appendices: ''
9_1_example_use_cases:
- 'CUA: Automating data entry in a desktop application.'
- 'Browser Tool: Scraping product data from an e-commerce site.'
