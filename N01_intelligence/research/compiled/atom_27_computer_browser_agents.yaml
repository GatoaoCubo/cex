6_key_distinctions: '| Pair                         | Difference                                                                 |

  |------------------------------|----------------------------------------------------------------------------|

  | computer_use vs. browser_tool | `computer_use` handles general GUI tasks; `browser_tool` focuses on web-based DOM interaction.
  |

  | SoM vs. GUI-Actor/UGround   | SoM uses annotations; GUI-Actor/UGround uses coordinate-free visual grounding. |

  | OSWorld vs. WebArena        | OSWorld targets desktop OS tasks; WebArena focuses on web-based workflows.  |


  ---'
