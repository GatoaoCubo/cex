10_new_techniques_2025_2026_post_schulhoff: ''
10_1_gepa_reflective_prompt_evolution: 'Paper: Agrawal et al. (2025). *GEPA: Reflective Prompt Evolution Can Outperform

  Reinforcement Learning*. arXiv:2507.19457. ICLR 2026 (Oral).

  Source: https://arxiv.org/abs/2507.19457


  GEPA maintains a Pareto frontier of prompt candidates and evolves them via LM

  reflection. Each iteration: sample candidate proportional to frontier coverage, reflect

  on failures, propose mutation, update frontier if it dominates any existing candidate.


  | Metric | GEPA | MIPROv2 | GRPO (RL) | Unoptimized CoT |

  |--------|------|---------|-----------|----------------|

  | MATH accuracy | 93% | ~81% | ~87% | 67% |

  | Training examples | 10 | 200+ | 10,000+ | 0 |

  | Rollouts | ~150 | 200+ | 5,000+ | N/A |'
10_2_prompt_scaffolding_2025: 'Source: https://www.lakera.ai/blog/prompt-engineering-guide


  Defensive prompting wraps user inputs in structured, guarded templates. Combines role

  anchoring + constraint injection + output format locking. Essential for production with

  untrusted input.


  [ROLE]: {fixed system role}

  [CONSTRAINTS]: {hard rules, cannot be overridden by user input}

  [USER INPUT]: {sanitized user query}

  [OUTPUT FORMAT]: {required structure}'
10_3_reasoning_native_model_adaptation_2025_2026: 'Source: https://sureprompts.com/blog/advanced-prompt-engineering-techniques


  CoT triggers ("let''s think step by step") add negligible benefit on o1, o3, DeepSeek-R1.


  | Model class | CoT needed? | Better approach |

  |-------------|-------------|----------------|

  | Standard LLM (GPT-4o, Claude Sonnet) | YES | Zero-Shot CoT trigger |

  | Reasoning-native (o1, o3, R1) | NO | Constraint spec + output schema |

  | Fine-tuned task model | SOMETIMES | Few-shot preferred |'
10_4_spatial_grounding_for_multimodal_2025: 'Source: https://www.codeworm.dev/2026/02/multimodal-prompt-engineering_0858937060.html
  Explicit spatial references reduce image grounding errors by 40-60% vs. vague descriptors. Use: "top-left quadrant", "at
  approximately x=120, y=340", "rightmost figure". Applies to GPT-4V, Claude 3.5 Sonnet, Gemini 1.5/2.0 Pro.'
10_5_model_specific_structural_anchors_2026: 'Source: https://www.promptitude.io/post/ultimate-2025-ai-language-models-comparison-gpt5-gpt-4-claude-gemini-sonar-more


  | Model | Best structural anchor |

  |-------|----------------------|

  | GPT-4o / GPT-5 | Markdown headers, triple-backtick fences |

  | Claude (Anthropic) | XML semantic tags: task, constraints, format |

  | Gemini 1.5/2.0 | Output schema definition at prompt TOP, then query |

  | Llama 3 / Mistral | Instruction tokens: [INST], <<SYS>> |


  ---'
11_dspy_optimizer_to_technique_mapping: 'Source: https://dspy.ai/learn/optimization/optimizers/'
11_1_optimizer_registry: '| DSPy Optimizer | Technique Class | Best For | Min Examples | Relative Cost |

  |----------------|----------------|----------|-------------|--------------|

  | BootstrapFewShot | T01 Few-Shot ICL | Classification, extraction | 5-20 | Low |

  | BootstrapFewShotWithRandomSearch | T01 + T37 SC | Moderate complexity | 20-50 | Medium |

  | MIPROv2 | T52 APE + Bayesian | Complex multi-step pipelines | 200+ | High |

  | COPRO | T54 ProTeGi | Instruction-only refinement | 50+ | Medium |

  | GEPA | T52 APE + Pareto | Best accuracy, low data | 10-20 | Medium |

  | LabeledFewShot | T01 labeled-only | Ground-truth demos exist | 5+ | Very Low |

  | KNNFewShot | T02 KNN | Dynamic per-query retrieval | 20+ | Low |'
11_2_miprov2_implementation: "Source: https://dspy.ai/api/optimizers/MIPROv2/\n\nTwo-phase: (1) bootstrap few-shot candidates\
  \ from labeled trainset; (2) search\ninstruction variants via Bayesian Optimization.\n\nimport dspy\n\noptimizer = dspy.MIPROv2(\n\
  \    metric=your_metric,\n    auto=\"medium\",           # \"light\" | \"medium\" | \"heavy\"\n    num_candidates=10,\n\
  \    max_bootstrapped_demos=3,\n    max_labeled_demos=5,\n)\noptimized = optimizer.compile(program, trainset=train, valset=val)"
11_3_gepa_implementation: "Source: https://dspy.ai/api/optimizers/GEPA/overview/\n\nimport dspy\n\noptimizer = dspy.GEPA(\n\
  \    metric=your_metric,\n    max_metric_calls=150,\n    reflection_lm=\"openai/gpt-4o\",\n)\noptimized = optimizer.compile(student=MyProgram(),\
  \ trainset=trainset, valset=valset)"
11_4_optimizer_selection_guide: '| Scenario | Best Optimizer | Reason |

  |----------|---------------|--------|

  | < 50 examples, max accuracy | GEPA | Pareto evolution, sample-efficient |

  | 200+ examples, complex pipeline | MIPROv2 | Bayesian search, wider coverage |

  | Instruction-only refinement | COPRO | Contrastive, no few-shot needed |

  | Labeled examples only | BootstrapFewShot | Fast, zero instruction editing |

  | Dynamic example retrieval at inference | KNNFewShot | Retrieves per query |


  ---'
12_multimodal_framework_mapping: 'Source: https://www.mdpi.com/2076-3417/15/7/3992'
12_1_task_x_technique_x_framework: '| Task | Modality | Technique | Framework | Key Note |

  |------|----------|-----------|-----------|----------|

  | Object detection | Image | MM-SSR + spatial grounding | GPT-4V, Claude | Spatial refs cut errors 40-60% |

  | Medical image analysis | Image | MM-CoT + XML constraints | Claude 3.5 | Add "do not diagnose" guardrail |

  | Document OCR | Image | MM-ICL (2-3 examples) | GPT-4o, Gemini | Show format in examples |

  | Chart interpretation | Image | MM-SSR + schema-first | Gemini 2.0 | Define axis labels explicitly |

  | Speech analysis | Audio | MM-RAG pipeline | Gemini 1.5 Pro | Chunk audio per segment |

  | Video scene understanding | Video | MM-ToT | Gemini 1.5/2.0 | Sample keyframes first |

  | Cross-modal reasoning | Image+Text | MM-CoT | All frontier models | Interleave modalities |'
12_2_framework_specific_code_patterns: "GPT-4V / GPT-4o (spatial grounding):\nmessages = [{\"role\": \"user\", \"content\"\
  : [\n    {\"type\": \"image_url\", \"image_url\": {\"url\": img_url}},\n    {\"type\": \"text\", \"text\":\n        \"Analyze\
  \ the TOP-LEFT quadrant. \"\n        \"Step 1: Describe. Step 2: Function. \"\n        \"Step 3: Condition. Output as JSON.\"\
  }\n]}]\n\nClaude 3.5 Sonnet (XML anchors):\ntext = (\n    \"<task>Analyze this image</task>\"\n    \"<constraints>No diagnosis.\
  \ Visible features only.</constraints>\"\n    \"<format>JSON: {region, finding, confidence}</format>\"\n)\n\nGemini 2.0\
  \ (schema-first):\nprompt = (\n    'OUTPUT SCHEMA:\\n'\n    '{\"objects\": [{\"label\": str, \"confidence\": float}], \"\
  scene\": str}\\n\\n'\n    'Analyze the image. Return ONLY valid JSON matching the schema.'\n)\n\n---"
13_implementation_code_top_techniques: ''
t14_chain_of_thought: "Source: https://github.com/NirDiamant/Prompt_Engineering\n\nfrom anthropic import Anthropic\n\nclient\
  \ = Anthropic()\nCOT_TEMPLATE = \"Solve step by step.\\n\\nProblem: {problem}\\n\\nStep 1:\"\n\ndef cot_solve(problem: str)\
  \ -> str:\n    return client.messages.create(\n        model=\"claude-sonnet-4-6\", max_tokens=1024,\n        messages=[{\"\
  role\": \"user\", \"content\": COT_TEMPLATE.format(problem=problem)}]\n    ).content[0].text"
t15_zero_shot_cot: '# Standard LLM: add trigger

  ZERO_SHOT_COT = "{problem}\n\nLet''s think step by step."

  # Reasoning-native (o1, R1): skip trigger -- built in

  REASONING_NATIVE = "{problem}\n\nAnswer:"'
t37_self_consistency: "Source: https://www.datacamp.com/tutorial/chain-of-thought-prompting\n\nimport re\nfrom collections\
  \ import Counter\nfrom anthropic import Anthropic\n\nclient = Anthropic()\n\ndef self_consistency(problem: str, n: int =\
  \ 5) -> str:\n    answers = []\n    for _ in range(n):\n        text = client.messages.create(\n            model=\"claude-sonnet-4-6\"\
  , max_tokens=512, temperature=0.8,\n            messages=[{\"role\": \"user\",\n                       \"content\": f\"\
  {problem}\\n\\nLet's think step by step.\"}]\n        ).content[0].text\n        found = re.findall(r\"(?:Answer:|Therefore,)\\\
  s*(.+?)(?:\\n|$)\", text)\n        if found:\n            answers.append(found[-1].strip())\n    return Counter(answers).most_common(1)[0][0]\
  \ if answers else \"\""
t45_self_refine: "REFINE = \"Original:\\n{out}\\n\\nIdentify errors. Provide refined version:\"\n\ndef self_refine(prompt:\
  \ str, iterations: int = 2) -> str:\n    from anthropic import Anthropic\n    c = Anthropic()\n    out = c.messages.create(\n\
  \        model=\"claude-sonnet-4-6\", max_tokens=1024,\n        messages=[{\"role\": \"user\", \"content\": prompt}]\n \
  \   ).content[0].text\n    for _ in range(iterations):\n        out = c.messages.create(\n            model=\"claude-sonnet-4-6\"\
  , max_tokens=1024,\n            messages=[{\"role\": \"user\", \"content\": REFINE.format(out=out)}]\n        ).content[0].text\n\
  \    return out"
t29_tree_of_thought_langchain: "Source: https://python.langchain.com/api_reference/experimental/tot.html\n\nfrom langchain_experimental.tot.base\
  \ import ToTChain\nfrom langchain_openai import ChatOpenAI\n\ntot = ToTChain(\n    llm=ChatOpenAI(model=\"gpt-4o\", temperature=0.7),\n\
  \    checker=your_checker,\n    k=3,   # branches per node\n    c=4,   # max depth\n    verbose=True\n)\nresult = tot.invoke({\"\
  input\": problem})\n# WARNING: 10-50x token cost vs CoT. Reserve for backtracking-required problems."
t01_t02_knn_few_shot: "import numpy as np\nfrom anthropic import Anthropic\n\nclient = Anthropic()\n\ndef knn_few_shot(query:\
  \ str, examples: list,\n                 emb_matrix: np.ndarray, query_emb: np.ndarray,\n                 k: int = 3) ->\
  \ str:\n    norms = (np.linalg.norm(emb_matrix, axis=1)\n             * np.linalg.norm(query_emb) + 1e-9)\n    sims = emb_matrix\
  \ @ query_emb / norms\n    top_k = np.argsort(sims)[-k:][::-1]\n    prompt = \"\".join(\n        f\"Input: {examples[i]['input']}\\\
  nOutput: {examples[i]['output']}\\n\\n\"\n        for i in top_k\n    )\n    return client.messages.create(\n        model=\"\
  claude-sonnet-4-6\", max_tokens=256,\n        messages=[{\"role\": \"user\", \"content\": prompt + f\"Input: {query}\\nOutput:\"\
  }]\n    ).content[0].text"
a16_rag_with_cot: "RAG_COT = (\n    \"Context (retrieved):\\n{context}\\n\\n\"\n    \"Question: {question}\\n\\n\"\n    \"\
  Using ONLY the context:\\n\"\n    \"Step 1: Identify relevant facts.\\n\"\n    \"Step 2: Reason to the answer.\\n\"\n  \
  \  \"Step 3: State answer + confidence (high/medium/low).\"\n)"
gepa_prompt_optimization: "import dspy\n\noptimizer = dspy.GEPA(\n    metric=your_metric,\n    max_metric_calls=150,\n   \
  \ reflection_lm=\"openai/gpt-4o\",\n)\noptimized = optimizer.compile(\n    student=MyProgram(), trainset=trainset, valset=valset\n\
  )\n\n---"
14_technique_selection_decision_tree: "PRIMARY GOAL?\n|\n+-- Simple extraction / Q&A\n|   +-- Examples available   -> T01\
  \ Few-Shot (T02 KNN if >20 examples)\n|   +-- No examples          -> T06 Role + T07 Style\n|\n+-- Multi-step reasoning\n\
  |   +-- Reasoning-native model (o1, R1)  -> Constraint spec only (CoT built-in)\n|   +-- Standard LLM, accuracy priority\
  \ -> T37 Self-Consistency (5 samples, 5x cost)\n|   +-- Standard LLM, speed priority    -> T14/T15 CoT\n|   +-- Complex,\
  \ backtracking needed    -> T29 ToT (10-50x cost)\n|\n+-- Iterative quality improvement\n|   +-- Single artifact       \
  \          -> T45 Self-Refine (2-3 iters, 3x cost)\n|   +-- Reasoning chain                 -> T46 RCoT\n|   +-- Automated\
  \ scale                 -> GEPA (<50 ex) | MIPROv2 (200+ ex)\n|\n+-- Task decomposition\n|   +-- Sequential subtasks   \
  \          -> T26 Least-to-Most\n|   +-- Parallel subtasks               -> T28 Plan-and-Solve\n|   +-- Code execution \
  \                 -> T31 Program-of-Thoughts\n|\n+-- Robustness\n|   +-- Consensus answer                -> T37 Self-Consistency\n\
  |   +-- Diverse outputs                 -> T40 DiVeRSe\n|   +-- Calibrated confidence           -> T44 Self-Calibration\n\
  |\n+-- Multimodal\n|   +-- Image analysis / VQA            -> MM-SSR + spatial grounding\n|   +-- Cross-modal reasoning\
  \           -> MM-CoT\n|   +-- Document understanding          -> MM-ICL (2-3 shot)\n|   +-- Audio                     \
  \      -> MM-RAG (Gemini 1.5 Pro)\n|   +-- Constrained output              -> Claude + XML constraints\n|\n+-- Agentic /\
  \ tool-use\n    +-- Tool execution                  -> A01-A05 + ReAct\n    +-- Code + execution                -> A06-A10\
