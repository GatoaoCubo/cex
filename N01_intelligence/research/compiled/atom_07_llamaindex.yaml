2_seven_stage_pipeline_architecture: "INGEST --> TRANSFORM --> EMBED --> STORE --> INDEX --> RETRIEVE --> SYNTHESIZE\n  |\
  \           |           |         |         |          |            |\nReader    NodeParser  Embedding  Storage   Index\
  \    Retriever   Response\n                                 Context            + Query     Synthesizer\n               \
  \                                      Engine\n\n---"
3_schema_data_primitives: 'Module: `llama_index.core.schema`'
document: '| Class | Description |

  |-------|-------------|

  | `Document` | Generic container around any data source (PDF, API, DB). Stores text + metadata + relationships. |


  Key attributes:

  - `text` -- raw content

  - `metadata` -- annotations dict

  - `relationships` -- connections to other Documents/Nodes

  - `doc_id` -- unique identifier

  - `embedding` -- optional pre-computed vector'
