14_agents: 'Module: `llama_index.core.agent`'
agent_types: '| Class | Mechanism | When to Use |

  |-------|-----------|-------------|

  | `FunctionAgent` | Native LLM function/tool calling API | LLMs with tool calling (OpenAI, Anthropic, Gemini) |

  | `ReActAgent` | Reason + Act prompting loop | Any LLM, no function-calling needed |

  | `CodeActAgent` | Code-based action execution | Code generation agents |

  | `StructuredPlannerAgent` | Decomposes input into sub-tasks, wraps any AgentWorker | Complex multi-step planning |'
agent_architecture: "AgentRunner (orchestrator, state, memory, high-level interface)\n    |\n    +-- AgentWorker (step execution,\
  \ tool calling)\n            |\n            +-- Tools (FunctionTool, QueryEngineTool, etc.)\n\n| Class | Role |\n|-------|------|\n\
  | `AgentRunner` | Orchestrator: manages state, memory, creates tasks, runs steps |\n| `AgentWorker` | Executor: performs\
  \ individual steps, calls tools |"
