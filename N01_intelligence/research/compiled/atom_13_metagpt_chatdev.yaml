5_2_what_cex_could_adopt: '| Pattern | From | Value for CEX | Effort |

  |---------|------|---------------|--------|

  | Pub-sub message pool | MetaGPT | Replace file-based signals with in-memory message broker for faster inter-nucleus coordination
  | High (architecture change) |

  | Communicative dehallucination | ChatDev | Nuclei could request clarification from N07 mid-task instead of guessing when
  handoff is ambiguous | Medium (signal protocol extension) |

  | Experience pools with shortcut mining | ChatDev Co-Learning | Mine learning_records for reusable instruction-solution
  pairs, inject as few-shot context | Medium (new tool) |

  | Executable feedback loop | MetaGPT | Extend F7 GOVERN to run generated code and feed errors back to F6 PRODUCE (already
  partial via cex_doctor) | Low (extend existing) |

  | Structured document schemas per role | MetaGPT | Enforce output schemas per nucleus (not just per kind) -- e.g., N01 always
  outputs intelligence_brief format | Low (schema extension) |'
5_3_key_architectural_differences: '| Aspect | MetaGPT/ChatDev | CEX |

  |--------|-----------------|-----|

  | Agent count | 5-7 fixed roles | 7 nuclei, each with 125 sub-agent builders |

  | Communication | Shared pool / chat pairs | File-based (handoffs, signals, proposals) |

  | Task decomposition | Per-project (dynamic) | Per-kind (typed, 130 kinds) |

  | Quality control | Executable tests | 3-layer scoring (structural + rubric + semantic) |

  | Learning | Experience pools (ChatDev) / long-term memory (MetaGPT) | learning_records + knowledge_cards + memory_age decay
  |

  | Process model | Waterfall (both) | Wave-based parallel dispatch |


  ---'
6_key_takeaways: "1. SOPs beat chat. MetaGPT's structured communication outperforms ChatDev's\n   conversational approach\
  \ by 67% on executability (3.75 vs 2.25). CEX already\n   follows this philosophy with typed artifacts and builder ISOs.\n\
  \n2. Dehallucination is under-explored in CEX. ChatDev's communicative\n   dehallucination (assistant requests clarification)\
  \ maps to GDP but only at\n   the N07 level. Extending this to nucleus-to-nucleus mid-task queries would\n   reduce wasted\
  \ dispatch cycles.\n\n3. Experience mining is the next frontier. ChatDev's co-learning framework\n   (+71% comprehensive\
  \ metric) suggests CEX's learning_records could be mined\n   for shortcut-oriented experiences and injected as few-shot\
  \ examples during\n   F3 INJECT.\n\n4. Pub-sub > file signals. Both frameworks use in-memory communication.\n   CEX's file-based\
  \ signals work but introduce I/O latency. A lightweight\n   pub-sub layer (even file-watching with inotify/ReadDirectoryChanges)\
  \ would\n   reduce coordination overhead.\n\n5. Executable feedback is table stakes. Both frameworks run generated code.\n\
  \   CEX's F7 GOVERN should evolve to include code execution for code-producing\n   kinds (landing_page, mcp_server, cli_tool,\
  \ api_client).\n\n---"
