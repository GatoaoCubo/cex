4_architecture_decision_map: "User says: \"I want a voice agent\"\n                |\n    +-----------+-----------+\n    |\
  \                       |\n Realtime (S2S)        Cascading (STT->LLM->TTS)\n    |                       |\n OpenAI gpt-realtime\
  \   Any LLM + Deepgram/Cartesia\n Gemini Live            Pipecat / LiveKit framework\n Hume EVI               Full tool\
  \ calling support\n    |                       |\n Lower latency          More control\n Limited LLM choice     Higher latency\n\
  \ Native emotion         Modular components\n    |                       |\n    +-----------+-----------+\n            \
  \    |\n         Transport choice\n                |\n    +-----------+-----------+-----------+\n    |           |     \
  \      |           |\n WebRTC     WebSocket     SIP       Hybrid\n (browser)  (server)    (phone)   (WebRTC+SIP)\n\n---"
5_glossary_alphabetical: '| Term                | Category       | Definition                                                                 |

  |---------------------|----------------|----------------------------------------------------------------------------|

  | A/B Testing     | Evaluation     | Comparing agent variants with live traffic to optimize performance.        |

  | Barge-in        | Turn-taking    | User interrupts the model mid-speech (e.g., in a call center scenario).     |

  | Codec-based S2S | Architecture   | LLM generates audio tokens (e.g., EnCodec) for direct speech-to-speech.   |

  | DTLS            | Security       | Encryption protocol for WebRTC media streams.                              |

  | E2E Latency     | Metrics        | Total time from user input to agent response (measured in milliseconds).   |

  | Emotion Detection| Prosody       | Classifying user emotion from voice signals (e.g., Hume''s Expression Measures). |

  | G.711           | Codec          | 8kHz telephony audio format used in PSTN networks.                         |

  | IVR             | Telephony      | Interactive Voice Response system for automated call handling.             |

  | MOS             | Evaluation     | Mean Opinion Score (1-5) for audio quality assessment.                     |

  | Opus            | Codec          | Royalty-free adaptive audio codec for real-time communication.             |

  | PESQ            | Evaluation     | Algorithmic metric for speech quality (e.g., in VoIP systems).             |

  | Prosody         | Voice          | Pitch, rhythm, stress, and intonation in speech.                           |

  | SSML            | Prosody        | Speech Synthesis Markup Language for TTS customization.                    |

  | VAD             | Signal Processing | Voice Activity Detection to identify speech vs. silence.                  |

  | WebRTC          | Communication  | Open-source framework for real-time audio/video communication over the web.|


  ---'
