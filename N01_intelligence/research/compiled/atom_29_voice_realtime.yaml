1_core_concepts_and_terminology: ''
1_1_voice_agent_architectures: 'Voice agents operate using two primary architectures:

  - Codec-based Speech-to-Speech (S2S): LLMs generate audio tokens (e.g., EnCodec, Mimi) that are converted to waveforms via
  vocoders (e.g., HIFIGAN).

  - Cascading Pipelines: STT → LLM → TTS sequential processing (e.g., Pipecat, LiveKit frameworks).'
1_2_key_components: '- Neural Audio Codecs: EnCodec, Mimi, and Opus compress audio into discrete tokens for LLM processing.

  - VAD (Voice Activity Detection): Detects speech presence (semantic vs. silence-based).

  - Prosody Control: Manages pitch, rate, and emotional tone via SSML or prosody profiles.


  ---'
2_configuration_patterns: ''
2_1_voice_agent_configuration_voice_agent_config:
- 'Parameters:'
- '`turn_detection`: Barge-in, full-duplex, or half-duplex settings.'
- '`vad_mode`: Semantic or server-based VAD.'
- '`session_params`: Timeout thresholds, language, and voice selection.'
2_2_vad_configuration_vad_config:
- 'Tuning Options:'
- '`silence_duration_ms`: Silence threshold for endpointing.'
- '`eagerness`: Sensitivity to overlapping speech.'
- '`padding`: Buffer time for speech detection.'
2_3_stt_tts_configuration:
- 'STT Config (`stt_config`):'
- Provider (Deepgram, Cartesia), language, and streaming mode.
- '`confidence_threshold`: Minimum recognition confidence.'
- 'TTS Config (`tts_config`):'
- Voice ID, SSML support, and emotional style (e.g., "happy," "calm").
2_4_audio_codec_settings_audio_codec_config: "- Parameters:\n  - Codec type (Opus, PCM, G.711).\n  - Bitrate, sample rate,\
  \ and RVQ levels for tokenization.\n\n---"
3_industry_terms_vs_cex_metaphors: '| Industry Term         | User-Facing Description                | CEX Mapping                         |

  |----------------------|----------------------------------------|-------------------------------------|

  | Barge-in         | "Interrupt the bot mid-speech"         | `voice_agent_config.interruption_handling` |

  | Prosody Control  | "How the voice sounds"                 | `prosody_profile`                  |

  | SSML             | "Markup for voice"                     | `prosody_profile.ssml_template`    |

  | SIP Trunk        | "Phone line for the bot"               | `telephony_config`                 |

  | Cascading Pipeline| "STT → LLM → TTS chain"                | `voice_pipeline`                   |


