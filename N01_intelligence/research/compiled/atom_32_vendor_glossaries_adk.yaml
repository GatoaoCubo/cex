title: Vendor Glossary Analysis & CEX Pillar Mapping
author: AI Research Team
date: '2023-11-15'
description: Comprehensive comparison of ML vendor glossaries with CEX architecture, including term mapping, pillar alignment,
  and architectural insights.
executive_summary: 'This document provides a detailed analysis of terminology from six major ML vendors (Google ML, Google
  ADK, AWS Bedrock, Azure ML, Anthropic, HuggingFace) mapped to the CEX architecture framework. The analysis identifies 727
  glossary terms across 6 vendors, with 218 agent-specific terms and 13 universal terms shared by 4+ vendors. Key findings
  include:


  - Google ADK exhibits strong in-process orchestration capabilities with memory sharing and native loop/parallel primitives

  - AWS Bedrock defines robust guardrail policies (7 types including image content filtering)

  - HuggingFace introduces unique agent types (CodeAgent, ToolCallingAgent) and 6 code executor variants

  - CEX demonstrates superior process isolation and persistence through file-based inter-process communication


  ---'
