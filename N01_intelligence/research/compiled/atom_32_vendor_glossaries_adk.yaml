4_architectural_insights: ''
4_1_adk_strengths:
- 'In-process orchestration: Agents share memory and context via in-memory state objects'
- 'Native primitives: Loop/parallel execution patterns are built-in'
- 'Low-latency transfer: Context sharing occurs within process memory'
4_2_cex_strengths:
- 'Process isolation: Nuclei operate as independent OS processes'
- 'Multi-model support: Each nucleus can use different LLM providers'
- 'Persistence: All state is git-backed and version-controlled'
- 'Auditability: Every handoff and signal is a file in version control'
4_3_key_tradeoffs: '| Feature                | ADK Advantage                  | CEX Advantage                  |

  |------------------------|--------------------------------|--------------------------------|

  | Latency            | In-memory state sharing        | File-based persistence         |

  | Isolation          | Shared process context         | Independent process execution  |

  | Flexibility        | Native execution patterns      | Customizable file workflows    |

  | Auditability       | Limited version control        | Full git-based history         |


  ---'
