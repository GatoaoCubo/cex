4_vendor_sdk_comparison_matrix: ''
4_1_agent_definition: '| Dimension | Google ADK v1.x | AWS Bedrock Agents | HuggingFace smolagents | Anthropic API | LangChain
  |

  |-----------|----------------|-------------------|----------------------|---------------|-----------|

  | Language | Python / TypeScript | Python (boto3) | Python | Python / TypeScript | Python / JS |

  | Agent base class | `BaseAgent` | N/A (managed) | `MultiStepAgent` | N/A (stateless) | `BaseSingleActionAgent` |

  | Primary agent | `LlmAgent` | BedrockAgent (hosted) | `CodeAgent` / `ToolCallingAgent` | `messages.create()` | `AgentExecutor`
  |

  | Orchestration | `SequentialAgent`, `ParallelAgent`, `LoopAgent` | Supervisor / SUPERVISOR_ROUTER | `ManagedAgent` nesting
  | Manual via code | `AgentExecutor` chains |

  | Tool system | `FunctionTool`, `AgentTool`, built-ins | `ActionGroup` (Lambda) | `@tool` decorator, `Tool` class | `tool_use`
  schema | `@tool`, `BaseTool` |

  | State management | `session.state` (dict, in-memory or DB) | DynamoDB (managed) | Agent attributes | Stateless (messages)
  | `memory` modules |

  | Streaming | `RunConfig.streaming_mode` | `invoke_agent` EventStream | `stream=True` | SSE (`stream=True`) | `.stream()`
  |

  | Multi-agent | Built-in (agent transfer + AgentTool) | Associate collaborators (API) | `managed_agents` list | Manual orchestration
  | Multi-agent chains |

  | Observability | Cloud Trace + Callbacks | CloudWatch + Bedrock console | OpenTelemetry (optional) | None built-in | LangSmith
  |

  | Deployment | Vertex AI Agent Engine / local | Fully managed (AWS) | Any Python env | Client library only | LangServe |

