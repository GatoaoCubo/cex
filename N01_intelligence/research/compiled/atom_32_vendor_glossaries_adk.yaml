1_executive_summary: 'This document provides a comprehensive analysis of AI framework terminology and architecture patterns
  across six major vendors (Google ML, Google ADK, AWS Bedrock, Azure ML, Anthropic, HuggingFace). The analysis maps vendor-specific
  concepts to the CEX architecture pillars, identifies new kind candidates, and evaluates architectural alignment between
  ADK and CEX systems. v2.0 enrichment adds: Google ADK v1.x full class reference with constructor params, AWS Bedrock AgentCore
  A2A integration, HuggingFace smolagents tool system internals, Anthropic tool_use schema evolution (2023-2025), and a 5-vendor
  SDK comparison matrix. ---'
2_vendor_glossary_analysis: ''
2_1_google_ml_glossary: 'Key Concepts:

  - AI Slop: Unstructured knowledge in agent memory

  - Agentic Loop: Core execution pattern for autonomous agents

  - Model Cascading: Hierarchical model execution

  - Autorater: Feedback mechanism for agent performance

  - Flash Model: Lightweight model for rapid inference


  Unique Patterns:

  - Model Router: Dynamic model selection mechanism

  - Vibe Coding: Intuitive instruction encoding

  - NORA/ORA: Specialized agent roles


  ---'
2_2_google_adk_v1_x_full_class_reference: "Source: https://google.github.io/adk-docs/ | PyPI: `google-adk>=1.0.0` | npm: `@google/adk`\n\
  \nADK v1.0 released April 2025 alongside the A2A open protocol. All 5 agent types share\n`BaseAgent` as root; `LlmAgent`\
  \ is the primary LLM-powered variant.\n\n#### 2.2.1 LlmAgent (Primary agent class)\n\nfrom google.adk.agents import LlmAgent\n\
  \nagent = LlmAgent(\n    name: str,                            # unique agent identifier (required)\n    model: str | BaseLlm,\
  \                 # e.g. \"gemini-2.0-flash\" or BaseLlm instance\n    description: str = \"\",               # shown to\
  \ parent agent for routing decisions\n    instruction: str | InstructionProvider = \"\",  # system instruction / persona\n\
  \    tools: list[BaseTool | Callable] = [],        # FunctionTool, AgentTool, built-ins\n    agents: list[BaseAgent] = [],\
  \                 # sub-agents (enables agent transfer)\n    output_key: str | None = None,               # writes output\
  \ to session.state[key]\n    input_schema: type[BaseModel] | None = None, # Pydantic model for structured input\n    output_schema:\
  \ type[BaseModel] | None = None,# Pydantic model for structured output\n    generate_content_config: GenerateContentConfig\
  \ | None = None,  # temperature, top_p...\n    disallow_transfer_to_parent: bool = False,   # block upward transfers\n \
  \   disallow_transfer_to_peers: bool = False,    # block lateral transfers\n    include_contents: Literal[\"default\",\"\
  none\"] = \"default\",  # history injection\n    planner: BasePlanner | None = None,          # BuiltInPlanner or custom\n\
  \    code_executor: BaseCodeExecutor | None = None, # CodeExecutionTool config\n    callbacks: AgentCallbacks | None = None,\
  \     # before_agent, after_agent, etc.\n)\n\nKey behaviors:\n- Produces `Event` stream via `_run_async_impl`\n- AutoFlow\
  \ enabled when `agents` list is non-empty — LLM picks target via `transfer_to_agent` tool\n- `output_key` is the primary\
  \ way to pass state between sequential agents\n\n#### 2.2.2 SequentialAgent\n\nfrom google.adk.agents import SequentialAgent\n\
  \nagent = SequentialAgent(\n    name: str,                         # required\n    sub_agents: list[BaseAgent],       #\
  \ executed in list order\n    description: str = \"\",\n)\n\nKey behaviors:\n- Each sub-agent runs to completion before\
  \ the next starts\n- Session state (`session.state`) is the shared blackboard between sub-agents\n- Parent agent can interrupt\
  \ on error (default: propagate exception)\n\n#### 2.2.3 ParallelAgent\n\nfrom google.adk.agents import ParallelAgent\n\n\
  agent = ParallelAgent(\n    name: str,                         # required\n    sub_agents: list[BaseAgent],       # all\
  \ execute concurrently (asyncio.gather)\n    description: str = \"\",\n)\n\nKey behaviors:\n- All sub-agents receive the\
  \ SAME invocation context (read-only copy)\n- Results merged back into parent session after all complete\n- Race conditions:\
  \ avoid writing the same `output_key` from multiple sub-agents\n- Best for fan-out research (N01 parallel atom hydration\
  \ uses this pattern)\n\n#### 2.2.4 LoopAgent\n\nfrom google.adk.agents import LoopAgent\n\nagent = LoopAgent(\n    name:\
  \ str,                         # required\n    sub_agents: list[BaseAgent],       # run in sequence each iteration\n   \
  \ max_iterations: int | None = None, # None = infinite (agent must escalate to exit)\n    description: str = \"\",\n)\n\n\
  Key behaviors:\n- Iteration exits when a sub-agent emits `escalate` action or `max_iterations` reached\n- Exit condition\
  \ pattern: inner `LlmAgent` checks a `session.state` flag and calls `escalate`\n- Used for: retry loops, quality improvement\
  \ loops (analogous to CEX `cex_evolve.py`)\n\n#### 2.2.5 CustomAgent (BaseAgent subclass)\n\nfrom google.adk.agents import\
  \ BaseAgent\nfrom google.adk.agents.invocation_context import InvocationContext\nfrom google.adk.events import Event\nfrom\
  \ typing import AsyncGenerator\n\nclass MyCustomAgent(BaseAgent):\n    # Pydantic fields for configuration\n    config:\
  \ MyConfig\n\n    model_config = {\"arbitrary_types_allowed\": True}\n\n    async def _run_async_impl(\n        self,\n\
  \        ctx: InvocationContext,\n    ) -> AsyncGenerator[Event, None]:\n        # Full control: read ctx.session.state,\
  \ emit events, call sub-agents\n        async for event in self.sub_agents[0].run_async(ctx):\n            yield event\n\
  \nKey behaviors:\n- Must override `_run_async_impl` (async generator)\n- `InvocationContext` carries: session, user_content,\
  \ agent, invocation_id\n- `model_config = {\"arbitrary_types_allowed\": True}` required for non-Pydantic fields\n- Can wrap\
  \ any framework (LangChain, CrewAI) as a CEX-compatible ADK agent\n\n#### 2.2.6 ADK Supporting Classes\n\n| Class | Purpose\
  \ | Key params |\n|-------|---------|-----------|\n| `Runner` | Execute agent against a session | `agent`, `app_name`, `session_service`\
  \ |\n| `InMemorySessionService` | Dev/test session storage | `sessions: dict` |\n| `VertexAiSessionService` | Production\
  \ session storage | `project`, `location` |\n| `DatabaseSessionService` | Persistent SQL sessions | `db_url` |\n| `InMemoryMemoryService`\
  \ | Cross-session memory (dev) | — |\n| `VertexAiRagMemoryService` | Production RAG memory | `rag_corpus`, `similarity_top_k`\
  \ |\n| `AgentTool` | Wrap agent as a tool | `agent: BaseAgent` |\n| `FunctionTool` | Wrap Python callable | `func: Callable`\
  \ |\n| `BuiltInPlanner` | ReAct planner (default) | `thinking_config` |\n| `RunConfig` | Per-invocation settings | `max_llm_calls`,\
  \ `response_modalities`, `streaming_mode` |\n\n---"
2_3_aws_bedrock_agentcore_and_a2a_integration: "Source: https://docs.aws.amazon.com/bedrock/latest/userguide/agents.html\n\
  \n#### 2.3.1 Bedrock Agents Core Architecture\n\nUser Request\n    |\n    v\nBedrock Agent (Orchestrator)\n    |-- Foundation\
  \ Model (Claude 3.x / Titan / Llama)\n    |-- Action Groups (Lambda functions as tools)\n    |-- Knowledge Bases (RAG via\
  \ OpenSearch Serverless)\n    |-- Guardrail Policies (7 policy types)\n    |-- Memory (cross-session state, opt-in)\n\n\
  #### 2.3.2 Agent Creation API (boto3)\n\nimport boto3\n\nclient = boto3.client(\"bedrock-agent\", region_name=\"us-east-1\"\
  )\n\nagent = client.create_agent(\n    agentName=\"my-agent\",\n    agentResourceRoleArn=\"arn:aws:iam::123456789:role/AmazonBedrockExecutionRole\"\
  ,\n    foundationModel=\"anthropic.claude-3-5-sonnet-20241022-v2:0\",\n    description=\"Research assistant\",\n    instruction=\"\
  You are a research assistant...\",\n    idleSessionTTLInSeconds=3600,\n    customerEncryptionKeyArn=None,  # optional KMS\
  \ key\n    agentCollaboration=\"SUPERVISOR\",  # SUPERVISOR | SUPERVISOR_ROUTER | DISABLED\n)\n\n#### 2.3.3 Multi-Agent\
  \ Collaboration (A2A-aligned)\n\nAWS Bedrock's collaboration model maps directly to the A2A protocol:\n\n| Bedrock Concept\
  \ | A2A Equivalent | Description |\n|----------------|----------------|-------------|\n| Supervisor Agent | Orchestrator\
  \ (A2A client) | Routes tasks to collaborators |\n| Collaborator Agent | Remote Agent (A2A server) | Specialist subagent\
  \ |\n| `agentCollaboration: SUPERVISOR` | A2A orchestrator mode | Central coordination |\n| `agentCollaboration: SUPERVISOR_ROUTER`\
  \ | A2A router mode | Dynamic routing to best agent |\n| Agent Alias ARN | Agent Card `url` | Endpoint for agent invocation\
  \ |\n\nAssociating collaborators:\nclient.associate_agent_collaborator(\n    agentId=\"supervisor-agent-id\",\n    agentVersion=\"\
  DRAFT\",\n    agentDescriptor={\"aliasArn\": \"arn:aws:bedrock:...:agent-alias/...\"},\n    collaboratorName=\"research-specialist\"\
  ,\n    collaborationInstruction=\"Use this agent for literature search tasks\",\n    relayConversationHistory=\"TO_COLLABORATOR\"\
  ,  # or \"DISABLED\"\n)\n\n#### 2.3.4 Guardrail Policies — All 7 Types\n\nguardrail = client.create_guardrail(\n    name=\"\
  production-guardrail\",\n    contentPolicyConfig={\n        \"filtersConfig\": [\n            {\"type\": \"SEXUAL\",   \
  \   \"inputStrength\": \"HIGH\",   \"outputStrength\": \"HIGH\"},\n            {\"type\": \"VIOLENCE\",    \"inputStrength\"\
  : \"MEDIUM\", \"outputStrength\": \"HIGH\"},\n            {\"type\": \"HATE\",        \"inputStrength\": \"HIGH\",   \"\
  outputStrength\": \"HIGH\"},\n            {\"type\": \"INSULTS\",     \"inputStrength\": \"MEDIUM\", \"outputStrength\"\
  : \"MEDIUM\"},\n            {\"type\": \"MISCONDUCT\",  \"inputStrength\": \"HIGH\",   \"outputStrength\": \"HIGH\"},\n\
  \            {\"type\": \"PROMPT_ATTACK\",\"inputStrength\":\"HIGH\",   \"outputStrength\": \"NONE\"},\n        ]\n    },\n\
  \    sensitiveInformationPolicyConfig={\n        \"piiEntitiesConfig\": [\n            {\"type\": \"EMAIL\", \"action\"\
  : \"ANONYMIZE\"},\n            {\"type\": \"PHONE\", \"action\": \"BLOCK\"},\n            {\"type\": \"SSN\",   \"action\"\
  : \"BLOCK\"},\n        ],\n        \"regexesConfig\": [{\"name\": \"CustomID\", \"pattern\": \"ID-\\\\d{6}\", \"action\"\
  : \"ANONYMIZE\"}]\n    },\n    topicPolicyConfig={\n        \"topicsConfig\": [\n            {\"name\": \"FinancialAdvice\"\
  , \"definition\": \"Specific investment advice\", \"type\": \"DENY\"}\n        ]\n    },\n    wordPolicyConfig={\n     \
  \   \"wordsConfig\": [{\"text\": \"competitor_name\"}],\n        \"managedWordListsConfig\": [{\"type\": \"PROFANITY\"}]\n\
  \    },\n    contextualGroundingPolicyConfig={\n        \"filtersConfig\": [\n            {\"type\": \"GROUNDING\", \"threshold\"\
  : 0.7},\n            {\"type\": \"RELEVANCE\", \"threshold\": 0.7},\n        ]\n    },\n)\n\nPolicy types summary:\n| #\
  \ | Policy | Scope | CEX Equivalent |\n|---|--------|-------|---------------|\n| 1 | Content Safety | Sexual, violence,\
  \ hate | P11 guardrail (content filter) |\n| 2 | Sensitive Info (PII) | Email, phone, SSN, regex | P11 guardrail (data privacy)\
  \ |\n| 3 | Topic Denial | Custom topic list | P11 guardrail (domain boundary) |\n| 4 | Word Filter | Blocked words, profanity\
  \ | P11 guardrail (lexical filter) |\n| 5 | Contextual Grounding | Hallucination detection | P07 output_validator |\n| 6\
  \ | Image Content Safety | Vision model outputs | P11 guardrail (vision) |\n| 7 | Prompt Attack | Jailbreak / injection\
  \ | P11 guardrail (adversarial) |\n\n---"
2_4_huggingface_smolagents_tool_system_internals: "Source: https://huggingface.co/docs/smolagents | PyPI: `smolagents>=1.0`\n\
  \n#### 2.4.1 @tool Decorator (FunctionTool pattern)\n\nfrom smolagents import tool\n\n@tool\ndef search_arxiv(query: str,\
  \ max_results: int = 5) -> str:\n    \"\"\"\n    Search ArXiv for papers.\n\n    Args:\n        query: Search query string\n\
  \        max_results: Maximum number of results to return\n\n    Returns:\n        Formatted string with paper titles and\
  \ abstracts\n    \"\"\"\n    # implementation\n    return results\n\nRequirements for @tool:\n- Must have a Google-style\
  \ docstring (parsed to generate tool schema)\n- All args must have type annotations\n- Return type must be `str` (CodeAgent)\
  \ or JSON-serializable (ToolCallingAgent)\n- No `args` or `*kwargs` — every param must be explicit\n\n#### 2.4.2 Tool Class\
  \ (for stateful/complex tools)\n\nfrom smolagents import Tool\n\nclass MyDatabaseTool(Tool):\n    name = \"query_database\"\
  \n    description = \"Query an internal database for records\"\n    inputs = {\n        \"query\": {\"type\": \"string\"\
  , \"description\": \"SQL query\"},\n        \"limit\": {\"type\": \"integer\", \"description\": \"Max rows\", \"nullable\"\
  : True},\n    }\n    output_type = \"string\"\n\n    def init(self, connection_string: str):\n        super().init()\n \
  \       self.conn = connect(connection_string)\n\n    def forward(self, query: str, limit: int = 100) -> str:\n        results\
  \ = self.conn.execute(query, limit=limit)\n        return format_table(results)\n\n#### 2.4.3 Agent Types and Tool Consumption\n\
  \n| Agent Class | Tool Call Method | Code Execution | Best For |\n|-------------|-----------------|----------------|----------|\n\
  | `CodeAgent` | Writes Python code that calls tools | Yes (via executor) | Multi-step data processing |\n| `ToolCallingAgent`\
  \ | JSON tool call (OpenAI-compatible) | No | API integration, retrieval |\n| `MultiStepAgent` | Base class (abstract) |\
  \ — | Custom orchestration |\n\nfrom smolagents import CodeAgent, ToolCallingAgent, HfApiModel\n\nmodel = HfApiModel(\"\
  Qwen/Qwen2.5-72B-Instruct\")\n\n# CodeAgent: generates Python, executes tools as functions\nagent = CodeAgent(\n    tools=[search_arxiv,\
  \ MyDatabaseTool(\"postgresql://...\")],\n    model=model,\n    max_steps=10,\n    additional_authorized_imports=[\"pandas\"\
  , \"numpy\"],\n    executor_type=\"local\",   # local | e2b | docker | modal | blaxel | wasm\n)\n\n# ToolCallingAgent: JSON\
  \ tool calls, no code execution\nagent = ToolCallingAgent(\n    tools=[search_arxiv],\n    model=model,\n    max_steps=5,\n\
  \    planning_interval=3,     # run planning step every N tool calls\n)\n\n#### 2.4.4 Executor Types (6 variants)\n\n| Executor\
  \ | Security | Latency | State | Use Case |\n|----------|---------|---------|-------|----------|\n| `local` | Low | ~0ms\
  \ | Shared process | Dev/trusted agents |\n| `e2b` | High (VM) | ~500ms | Isolated | Production SaaS |\n| `docker` | High\
  \ (container) | ~200ms | Isolated | Self-hosted prod |\n| `modal` | High (serverless) | ~300ms cold | Isolated | Burst workloads\
  \ |\n| `blaxel` | Medium | ~100ms | Isolated | Edge deployment |\n| `wasm` | High (sandbox) | ~50ms | Isolated | Browser/edge\
  \ |\n\n#### 2.4.5 ManagedAgent (multi-agent nesting)\n\nfrom smolagents import ManagedAgent, CodeAgent\n\nspecialist = CodeAgent(tools=[search_arxiv],\
  \ model=model)\nmanaged = ManagedAgent(\n    agent=specialist,\n    name=\"arxiv_researcher\",\n    description=\"Expert\
  \ at finding academic papers on AI topics\",\n    managed_agent_prompt=\"You are a literature search specialist...\",\n\
  )\n\norchestrator = CodeAgent(\n    tools=[],\n    model=model,\n    managed_agents=[managed],  # specialist available as\
  \ a tool\n)\n\n---"
2_5_anthropic_claude_tool_use_schema_evolution_2023_2025: "Source: https://docs.anthropic.com/en/docs/tool-use\n\n#### 2.5.1\
  \ Schema v1 (Claude 2.1, Nov 2023)\n\nFirst public tool_use. Tools defined in `tools` array; model emits `tool_use` content\
  \ block.\n\n{\n  \"model\": \"claude-2.1\",\n  \"tools\": [\n    {\n      \"name\": \"get_weather\",\n      \"description\"\
  : \"Get current weather for a location\",\n      \"input_schema\": {\n        \"type\": \"object\",\n        \"properties\"\
  : {\n          \"location\": {\"type\": \"string\", \"description\": \"City, State\"},\n          \"unit\": {\"type\": \"\
  string\", \"enum\": [\"celsius\", \"fahrenheit\"]}\n        },\n        \"required\": [\"location\"]\n      }\n    }\n \
  \ ],\n  \"messages\": [{\"role\": \"user\", \"content\": \"Weather in Paris?\"}]\n}\n\nResponse (model emits tool_use block):\n\
  {\n  \"content\": [\n    {\n      \"type\": \"tool_use\",\n      \"id\": \"toolu_01A09q90qw90lq917835lq9\",\n      \"name\"\
  : \"get_weather\",\n      \"input\": {\"location\": \"Paris, France\", \"unit\": \"celsius\"}\n    }\n  ],\n  \"stop_reason\"\
  : \"tool_use\"\n}\n\n#### 2.5.2 Schema v2 (Claude 3, Mar 2024)\n\nAdded `tool_choice` control, `auto`/`any`/`tool` modes,\
  \ parallel tool calls.\n\n{\n  \"model\": \"claude-3-5-sonnet-20241022\",\n  \"tool_choice\": {\"type\": \"auto\"},  //\
  \ auto | any | tool (forces specific tool)\n  \"tools\": [...],\n  \"messages\": [...]\n}\n\nParallel tool calls (multiple\
  \ tool_use blocks in one response):\n{\n  \"content\": [\n    {\"type\": \"tool_use\", \"id\": \"toolu_01\", \"name\": \"\
  get_weather\", \"input\": {...}},\n    {\"type\": \"tool_use\", \"id\": \"toolu_02\", \"name\": \"get_time\",    \"input\"\
  : {...}}\n  ],\n  \"stop_reason\": \"tool_use\"\n}\n\nReturning results (tool_result blocks):\n{\n  \"role\": \"user\",\n\
  \  \"content\": [\n    {\n      \"type\": \"tool_result\",\n      \"tool_use_id\": \"toolu_01\",\n      \"content\": \"\
  15 degrees Celsius, partly cloudy\"\n    }\n  ]\n}\n\n#### 2.5.3 Schema v3 — Computer Use + Vision (Claude 3.5, Oct 2024)\n\
  \nAdded `computer`, `text_editor`, `bash` built-in tool types with beta header.\n\nclient.messages.create(\n    model=\"\
  claude-3-5-sonnet-20241022\",\n    betas=[\"computer-use-2024-10-22\"],\n    tools=[\n        {\"type\": \"computer\", \
  \    \"name\": \"computer\", \"display_width_px\": 1920, \"display_height_px\": 1080},\n        {\"type\": \"text_editor\"\
  ,  \"name\": \"str_replace_editor\"},\n        {\"type\": \"bash\",         \"name\": \"bash\"},\n    ],\n    messages=[...]\n\
  )\n\ntool_result with image content:\n{\n  \"type\": \"tool_result\",\n  \"tool_use_id\": \"toolu_01\",\n  \"content\":\
  \ [\n    {\n      \"type\": \"image\",\n      \"source\": {\"type\": \"base64\", \"media_type\": \"image/png\", \"data\"\
  : \"...\"}\n    }\n  ]\n}\n\n#### 2.5.4 Schema v4 — MCP Integration (Claude 3.7+, 2025)\n\nMCP tools surfaced as first-class\
  \ via `mcp` tool type. Anthropic API can proxy MCP servers.\n\nclient.messages.create(\n    model=\"claude-3-7-sonnet-20250219\"\
  ,\n    tools=[\n        {\n            \"type\": \"mcp\",\n            \"server_label\": \"filesystem\",\n            \"\
  server_url\": \"http://localhost:3000/mcp\",\n            \"allowed_tools\": [\"read_file\", \"write_file\"],\n        }\n\
  \    ],\n    messages=[...]\n)\n\nSchema evolution summary:\n\n| Version | Date | Model | Key Addition |\n|---------|------|-------|-------------|\n\
  | v1 | Nov 2023 | Claude 2.1 | First tool_use, single tool per turn |\n| v2 | Mar 2024 | Claude 3 | Parallel tools, tool_choice\
  \ control |\n| v2.1 | Jun 2024 | Claude 3.5 | token_efficient_tools beta, cache_control |\n| v3 | Oct 2024 | Claude 3.5\
  \ | Computer use (computer/text_editor/bash) |\n| v4 | 2025 | Claude 3.7+ | MCP server proxy, multi-content tool_result\
  \ |\n\n#### 2.5.5 Anthropic Specialized Concepts\n\n- HHH Alignment: Harmlessness, Honesty, Helpfulness\n- TTFT: Time to\
  \ First Token\n- MCP Connector: Model Context Protocol interface (see spec: https://modelcontextprotocol.io)\n- Extended\
  \ Thinking: `thinking` content blocks for chain-of-thought (Claude 3.7+)\n- Prompt Caching: `cache_control: {\"type\": \"\
  ephemeral\"}` on system/tools blocks (5-min TTL)\n\n---"
2_6_azure_ml: 'Key Concepts:

  - Component: Reusable ML pipeline element

  - Datastore: Centralized data repository

  - Workspace: Project management environment

  - mltable: Structured data format

  - triton_model: Inference model format


  ---'
3_cex_pillar_mapping: ''
3_1_pillar_alignment_matrix: '| CEX Pillar | Google ADK | AWS Bedrock | HuggingFace | Anthropic |

  |------------|------------|-------------|-------------|-----------|

  | P01 Knowledge | MemoryService (VertexAiRagMemoryService) | KnowledgeBase (OpenSearch Serverless) | AgentMemory / vector
  stores | RAG via MCP |

  | P02 Model | LlmAgent (BaseLlm) | Foundation Model (Claude/Titan/Llama) | InferenceClient (HfApiModel) | claude-3-x-* |

  | P03 Prompt | `instruction` param (InstructionProvider) | `instruction` (Bedrock Agent) | Agent `description` + docstrings
  | `system` + messages |

  | P04 Tools | FunctionTool / AgentTool / built-ins | ActionGroup (Lambda) + KnowledgeBase | @tool / Tool class | tool_use
  schema |

  | P05 Output | `output_key` → session.state | Response (InvokeAgent stream) | `final_answer` variable | assistant content
  blocks |

  | P06 Schema | `input_schema` / `output_schema` (Pydantic) | OpenAPI spec (ActionGroup) | `inputs` dict in Tool class |
  `input_schema` (JSON Schema) |

  | P07 Evaluation | Evaluation Framework (Vertex AI) | Guardrails (contextual grounding) | `final_answer_checks` | — |

  | P08 Architecture | Agent hierarchy (BaseAgent tree) | Supervisor pattern | ManagedAgent | — |

  | P09 Config | RunConfig (max_llm_calls, streaming_mode) | Hyperparameters (temp, top_p) | model kwargs | GenerationConfig
  |

  | P10 Memory | Session (InMemory/VertexAI/DB) | Agent Memory (opt-in) | AgentMemory | — |

  | P11 Feedback | Callbacks (before_agent/after_agent) | Guardrail policies (7 types) | step_callbacks | HHH + Constitutional
  AI |

  | P12 Orchestration | AutoFlow / agent transfer | Task routing (Supervisor/Router) | managed_agents | Extended Thinking
  |'
