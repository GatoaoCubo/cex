15_3_reranker_selection_matrix: '| Constraint | Recommended | Why |

  |-----------|-------------|-----|

  | Real-time (<30ms) | FlashRank or ColBERT-v2 | Fastest open-source options |

  | Maximum accuracy | MonoT5-3B or Cohere Rerank | Top BEIR scores |

  | Zero infrastructure | Cohere Rerank API or Voyage | One API call, no hosting |

  | On-premise high accuracy | mxbai-rerank-large | Best open-source BEIR score |

  | Multilingual | Cohere Rerank v3 | Native multilingual support |

  | Code retrieval | BGE-Reranker + fine-tune | Domain-specific training |'
15_4_reranker_cex_integration: "retriever_config:\n  initial_retrieval:\n    method: hybrid        # dense + sparse fusion\n\
  \    top_k: 50             # retrieve more, rerank down\n  reranker:\n    type: cross_encoder   # or: llm_based, lightweight,\
  \ api\n    model: mxbai-rerank-large\n    top_k_after_rerank: 5\n    score_threshold: 0.4  # discard low-confidence results\n\
  \    budget_ms: 200        # latency cap per request\n\n---"
16_rag_architecture_decision_tree: "START: What is your primary use case?\n|\n+-- [A] Factoid QA (single-doc, specific facts)\n\
  |       --> Naive RAG (dense retrieval + 512-token chunks)\n|       --> Reranker: FlashRank (low latency)\n|       --> Embedding:\
  \ BGE or E5\n|\n+-- [B] Multi-document synthesis (themes, summaries)\n|       --> GraphRAG or LazyGraphRAG\n|       -->\
  \ Reranker: MonoT5 or Cohere (accuracy priority)\n|\n+-- [C] Complex multi-step research (reason + retrieve)\n|       -->\
  \ Agentic RAG (reflexion or multi-agent)\n|       --> Reranker: LLM-based (RankLLM)\n|       --> Memory: entity_memory +\
  \ memory_summary kinds\n|\n+-- [D] Real-time chat (< 500ms SLA)\n|       --> Naive RAG + FlashRank reranker\n|       -->\
  \ Chunking: 256-512 fixed tokens\n|       --> Pre-warmed vector index (HNSW)\n|\n+-- [E] High-accuracy (compliance, medical,\
  \ legal)\n        --> Agentic RAG with reflexion pattern\n        --> Reranker: MonoT5-3B or Cohere Rerank\n        -->\
  \ Chunking: late chunking (Jina, +24% recall)\n        --> Guardrail: citation enforcement (every claim sourced)\n\nSECONDARY:\
  \ What is your chunk size constraint?\n|\n+-- Document fits in 8192 tokens AND Jina model available\n|       --> Use late\
  \ chunking (best recall, context-preserving)\n+-- Mixed document types (PDFs, tables, HTML)\n|       --> Agentic re-chunking\
  \ (LLM identifies boundaries)\n+-- Cost-first, any document type\n        --> Recursive splitting 512 tokens (69% accuracy,\
  \ zero model calls)\n\nSECONDARY: What is your latency budget?\n|\n+-- <30ms reranking budget    --> FlashRank or ColBERT-v2\n\
  +-- <200ms reranking budget   --> mxbai-rerank-large or Cohere Nimble\n+-- No latency constraint     --> MonoT5-3B-10k (highest\
  \ NDCG)"
16_1_cex_kind_mapping_for_full_rag_stack: '| Component | CEX Kind | Config Key |

  |-----------|---------|------------|

  | Chunking strategy | `chunk_strategy` | method, size, overlap |

  | Embedding model | `embedding_config` | model, dimensions, normalize |

  | Vector index | `knowledge_index` | store_type, index_algo |

  | Sparse retrieval | `knowledge_index` | sparse_backend, bm25_k1 |

  | Hybrid fusion | `retriever_config` | hybrid: true, fusion_method |

  | Reranker | `retriever_config` | reranker.type, reranker.model |

  | Data sources | `rag_source` | type, endpoint, auth |

  | Evaluation | `scoring_rubric` | metrics, thresholds |

  | Agentic loop | `workflow` | steps, reflection_gate |

  | Graph index | `knowledge_index` | store_type: graph, graph_endpoint |

  | Memory | `entity_memory` + `memory_summary` | ttl, scope, decay |'
