  encoding) |

  | GLMs | Custom agent creation platform with deep tool integration | GPT Builder / Gems (but deeper tool integration) |

  | Speculative Decoding / MTP | Multi-token prediction head for parallel token generation | N/A (architectural) |

  | Staircase optimization | Sequential structural redesign across 600+ iterations | N/A |


  ---'
5_minimax_m2_7_self_evolution_decentralized_agent_teams: 'Released April 12, 2026. Open-sourced. MoE 230B total, 10B active,
  200K context.


  Source: https://www.minimax.io/news/minimax-m27-en |

  https://www.marktechpost.com/2026/04/12/minimax-just-open-sourced-minimax-m2-7-a-self-evolving-agent-model-that-scores-56.22-on-swe-pro-and-57.0-on-terminal-bench-2/'
5_1_self_evolution_architecture: "M2.7 can autonomously improve its own agent scaffolds via a self-directed loop:\n\nanalyze\
  \ failure trajectories\n  -> plan changes\n  -> modify scaffold code\n  -> run evaluations\n  -> compare results\n  -> decide:\
  \ keep or revert\n  -> repeat (100+ rounds)\n\nOutcome of self-evolution run on agent evaluation harness:\n- 30% performance\
  \ improvement on internal evaluation sets\n- Discoveries: optimal sampling parameter combinations, specific workflow guidelines,\n\
  \  loop detection optimizations\n- Process was fully autonomous (no human intervention during the loop)\n\nProduction deployment:\
  \ Within MiniMax's own RL engineering team, M2.7 handles\n30%-50% of the end-to-end research workflow autonomously (data\
  \ pipelines, training\nenvironments, infrastructure, cross-team collaboration, persistent memory).\n\nSource: https://developer.nvidia.com/blog/minimax-m2-7-advances-scalable-agentic-workflows-on-nvidia-platforms-for-complex-ai-applications/"
5_2_decentralized_agent_teams: 'M2.7 core capability: reliable management of decentralized Agent Teams.


  | Metric | Value |

  |--------|-------|

  | Instructional compliance reliability | 97% |

  | Skills executed simultaneously | 40+ (each >2,000 tokens) |

  | GDPval-AA ELO | 1495 (highest among open-source models) |

  | Dynamic tool search | Autonomous discovery of relevant tools at runtime |


  Agent Teams vs Western orchestration:


  | Dimension | M2.7 Agent Teams | CrewAI/AutoGen/LangGraph |

  |-----------|-----------------|--------------------------|

  | Coordination | Decentralized (agents self-coordinate) | Centralized orchestrator |

  | Skill length | 2,000+ token skills simultaneously | Short tool descriptions |

  | Reliability at scale | 97% at 40 concurrent skills | Degrades with scale |

  | Tool discovery | Dynamic at runtime | Pre-registered at init |

  | Learning from runs | Persistent memory across sessions | Per-session only |'
5_3_benchmark_performance_m2_7: '| Benchmark | M2.7 | Context |

  |-----------|------|---------|

  | SWE-Pro | 56.22% | Near Opus 4.6 level |

  | Terminal Bench 2 | 57.0% | Complex engineering systems |

  | VIBE-Pro | 55.6% | End-to-end full project delivery |

  | GDPval-AA ELO | 1495 | Highest open-source (NVIDIA eval) |'
5_4_unique_m2_7_vocabulary: '| Term | Definition | Western equivalent |

  |------|-----------|-------------------|

  | Self-evolution | Model autonomously modifies and improves its own agent scaffolds | N/A (closest: AutoML, but for agent
  code not hyperparams) |

  | Decentralized Agent Teams | Agents self-coordinate without central orchestrator | Centralized orchestration only in Western
  frameworks |

