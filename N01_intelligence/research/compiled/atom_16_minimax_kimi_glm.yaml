2_minimax_m2_interleaved_thinking: ''
2_1_core_concept_interleaved_thinking: 'Standard chain-of-thought (CoT) front-loads all reasoning before action. MiniMax

  M2 interleaves reasoning tokens between tool calls: plan -> act -> reflect,

  carrying accumulated state across turns.


  | Pattern | Standard CoT | Interleaved Thinking |

  |---------|-------------|---------------------|

  | Sequence | think...think...think -> act | think -> act -> think -> act -> think |

  | State | Discarded between turns | Preserved across all turns |

  | Failure mode | Must re-derive context each turn | Accumulated understanding compounds |

  | Wrapping | N/A | `<think>...</think>` tags in output |


  Critical requirement: The entire `response_message` including `reasoning_details`

  MUST be preserved in conversation history. Dropping thinking state causes:

  - State drift (cumulative understanding breaks down)

  - Self-correction weakens

  - Planning degrades


  NOTE: M2.7''s reasoning is significantly impaired if the `<think>` tag is removed

  from the assistant''s historical conversation turns -- even one missing tag causes

  quality regression in subsequent turns.


  Source: https://www.minimax.io/news/why-is-interleaved-thinking-important-for-m2


  Benchmark impact of preserving thinking state:


  | Benchmark | With state | Without state | Delta |

  |-----------|-----------|---------------|-------|

  | SWE-Bench Verified | 69.4% | 67.2% | +3.3% |

  | Tau-2 | 87 | 64 | +35.9% |

  | BrowseComp | 44.0% | 31.4% | +40.1% |

  | GAIA | 75.7% | 67.9% | +11.5% |

  | xBench | 72.0% | 66.0% | +9.1% |


  The BrowseComp +40% delta demonstrates interleaved thinking is disproportionately

  valuable for multi-step agentic tasks over single-turn reasoning.'
2_2_api_integration: 'Three SDK formats for thinking content:


  | SDK | Format | How thinking appears |

  |-----|--------|---------------------|

  | Anthropic SDK | Content block `type: "thinking"` | Separate block in `response.content` list |

  | OpenAI SDK | `<think>` tags in content string | Inline, parse manually |

  | OpenAI SDK + split | `extra_body={"reasoning_split": True}` | Separate `reasoning_details` field |


  Mini-Agent reference implementation: MiniMax open-sourced a minimal demo

  (https://github.com/MiniMax-AI/Mini-Agent) using Anthropic-compatible API with

  full interleaved thinking support. Treats the agent loop as: parse response ->

  extract thinking blocks -> execute tool calls -> append full message (with thinking)

  -> repeat. This is the reference for production-grade interleaved thinking clients.'
2_3_cispo_training_method: "CISPO = Clipped IS-weight Policy Optimization\n\nProposed in MiniMax-M1 paper (arXiv:2506.13585).\
  \ Full RL training run: 512 H800\nGPUs, 3 weeks, total compute cost $534,700. Replacing PPO/GRPO for training\nagentic models\
  \ on long-horizon tool call chains.\n\n| Dimension | PPO/GRPO | CISPO |\n|-----------|----------|-------|\n| What gets clipped\
  \ | Individual token probabilities | Importance sampling weights (whole-sequence) |\n| Gradient coverage | Low-probability\
  \ tokens get zero gradient | ALL tokens contribute to gradients |\n| Stability | Unstable on long structured output | Stable\
  \ on code generation + tool chains |\n| Speed | Baseline | 2x faster than DAPO |\n| Quality | Baseline | Matches DAPO at\
  \ 50% training steps |\n| Trust region | Hard PPO trust region constraint | Abandoned; IS-weight clipping provides stability\
  \ |\n\nLoss function (formal):\n\nL_CISPO(theta) = -E[ detach(min(r_t(theta), epsilon_high))  A_t  log pi_theta(a_t|s_t)\
  \ ]\n\nwhere:\n  r_t(theta) = pi_theta(a_t|s_t) / pi_theta_old(a_t|s_t)   # IS ratio\n  epsilon_high = upper clip bound\
  \ (hyperparameter, typically 2.0-3.0)\n  A_t = advantage estimate (GRPO-style group relative)\n\nPyTorch pseudo-code (from\
  \ Swift docs):\nlog_ratio = per_token_logps - old_per_token_logps\nimportance_weights = torch.exp(log_ratio)\n# .detach()\
  \ critical: clamped weights are CONSTANTS, NOT gradient nodes\nclamped_ratios = torch.clamp(importance_weights, max=epsilon_high).detach()\n\
  per_token_loss = -clamped_ratios  advantages.unsqueeze(1)  per_token_logps\n\nThe `.detach()` call is the mechanistic key:\
  \ clamped IS weights serve as\nconstant coefficients only. Gradients flow exclusively through the `log pi_theta`\nterm,\
  \ so ALL tokens contribute gradients -- including rare tokens critical for\nmulti-step agentic reasoning chains. This prevents\
  \ the gradient masking that\ncauses GRPO to underperform on long structured outputs (tool-call chains, code\ngeneration).\n\
  \nSources: https://swift.readthedocs.io/en/latest/Instruction/GRPO/AdvancedResearch/CISPO.html |\nhttps://arxiv.org/pdf/2506.13585\n\
  \nCISPO is critical for MoE training stability. MiniMax continued using CISPO through\nM2.1 and M2.5 releases.\n\nM2.1 enhancements:\
  \ Added multiple importance sampling (MIS) and PPO-based\ntrajectory filtering to handle external environment noise from\
  \ tool call results.\nThis filters anomalous long-tail statistics caused by unpredictable tool outputs.\n\nFP32 precision\
  \ fix: A non-obvious discovery -- the prediction layer (LLM head)\nmust run at FP32 precision. Lower precision causes training-inference\
  \ inconsistency,\npreventing sustained reward gains during RL."
2_4_webexplorer_framework: 'A two-phase synthetic data pipeline for training web agents:


  | Phase | What happens | Output |

  |-------|-------------|--------|

  | Exploration | Agents freely browse the web, constructing information-rich seed questions | Seed question bank |

  | Evolution | Iterative complexity increases via removal, obfuscation, substitution | Complex queries (7.9 -> 9.9 avg reasoning
  turns) |


  WebExplorer is combined with a Playwright-based browser tool suite for evaluation.

  Used for BrowseComp and GAIA benchmarks. The same framework is used in M2.5 with

  context management improvements achieving 76.3% BrowseComp.'
