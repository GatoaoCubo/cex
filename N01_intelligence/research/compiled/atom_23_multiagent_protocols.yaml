title: Agent Communication Protocol Landscape and CEX Integration Strategy
author: CEX Protocol Working Group
date: '2025-03-15'
version: '1.2'
keywords: A2A, ANP, MCP, FIPA-ACL, ProtocolRouter, CEX, Agent Cards
license: Apache 2.0
1_introduction: This document provides a comprehensive analysis of the current agent communication protocol landscape, with
  a focus on integration with the CEX ecosystem. It covers protocol specifications, implementation details, and strategic
  recommendations for CEX adoption.
2_core_concepts: ''
2_1_protocol_taxonomy: '| Category | Protocols | Key Features |

  |--------|---------|-------------|

  | Enterprise Task Delegation | A2A, ACP (deprecated) | Task lifecycle, Agent Cards, SSE |

  | Decentralized Discovery | ANP | DID-based, JSON-LD, verifiable events |

  | Tool Invocation | MCP | JSON-RPC, stdio/HTTP, tool contracts |

  | Negotiated Protocols | Agora | LLM-mediated, natural language |

  | Framework-specific | AutoGen, LangGraph | In-process orchestration, role-based crews |'
2_2_cex_protocol_mapping: '| CEX Kind | Mapped Protocol | Notes |

  |--------|---------|-------------|

  | `proposal` | A2A `input-required` | Structured input state alignment |

  | `agent_card` | A2A Agent Card | Missing streaming capability fields |

  | `handoff` | A2A Task Lifecycle | Logical model alignment |

  | `fallback_chain` | ProtocolRouter APBDA | Static vs adaptive routing |'
3_protocol_specifications: ''
3_1_a2a_protocol_v0_3: "#### 3.1.1 Task Lifecycle\n\nsubmitted\n    |\n    v\nworking <--------+\n    |            |\n   \
  \ v            |\ninput-required --+--> [structured input received]\n    |\n    v\ncompleted | failed | canceled\n\n- State\
  \ Transitions: Each transition emits an SSE event\n- Client Support: Subscription at any point with replay capability\n\n\
  #### 3.1.2 Agent Card Structure\n\n{\n  \"name\": \"DataFetcherAgent\",\n  \"version\": \"1.0.0\",\n  \"capabilities\":\
  \ {\n    \"streaming\": true,\n    \"stateTransitionHistory\": true\n  },\n  \"skills\": [\n    { \n      \"id\": \"fetch_json\"\
  , \n      \"inputModes\": [\"text\"], \n      \"outputModes\": [\"application/json\"] \n    }\n  ],\n  \"authentication\"\
  : { \n    \"schemes\": [\"Bearer\"] \n  }\n}\n\nCEX Gap: Missing `capabilities.streaming` and `skills[].inputModes` fields"
3_2_anp_protocol:
- 'Transport: DID/HTTP'
- 'Semantic Interop: JSON-LD'
- 'Decentralized: Yes'
- 'Identity: W3C DID'
- 'Standard Body: Open Community'
3_3_mcp_protocol:
- 'Transport: JSON-RPC/HTTP'
- 'Identity: None'
- 'Streaming: No'
- 'Standard Body: Anthropic'
- 'Production-ready: Yes'
4_protocol_comparison: '| Feature | MCP | A2A | ANP | Agora | FIPA-ACL |

  |---------|-----|-----|-----|-------|----------|

  | Transport | JSON-RPC/HTTP | HTTP+SSE+gRPC | DID/HTTP | LLM | TCP/IIOP |

  | Identity | None | Agent Card | W3C DID | None | PKI opt. |

  | Task Lifecycle | No | Yes (5 states) | No | Negotiated | Yes (FIPA-SL) |

  | Semantic Interop | No | Partial | JSON-LD | Natural lang | Ontology/OWL |

  | Streaming | No | SSE | No | No | No |

  | Decentralized | No | No | Yes | No | No |

  | Standard Body | Anthropic | Linux Foundation | Open | Oxford | FIPA (defunct) |

  | Production-ready | Yes | Yes | Experimental | Research | Legacy |

  | ProtocolBench Rank | -- | #1 (resilience) | #4 | #1 (coding) | N/A |

  | CEX Adoption | Now (toolkit) | Now (handoff model) | Future | Future | N/A |'
5_cex_integration_strategy: ''
5_1_dispatch_path_alignment: '| CEX Dispatch Path | Recommended Protocol | Reasoning |

  |-------------------|---------------------|-----------|

  | N07 -> N0x (intra-system) | A2A Task Lifecycle | Stateful, SSE-like signals match task state machine |

  | N0x -> external tool | MCP | Standard tool invocation contract |

  | N0x -> external agent (future) | A2A Agent Card discovery | Cross-org capability advertisement |

  | `git commit` as signal | ANP-inspired DID event | Immutable, verifiable event record |

  | `.proposal.md` | A2A `input-required` state | Agent suspends pending structured input |

  | `cex_router.py` | ProtocolRouter APBDA | Adaptive weight selection over fallback chains |'
5_2_protocolrouter_implementation: "Architecture:\nInput Signals                ProtocolRouter               Output\n-------------\
  \                --------------               ------\nTask type (QA/code/stream)        |\nAgent count + topology  --> \
  \ Feature Extractor       -->  A2A / ACP / ANP / Agora\nCurrent latency metrics           |\nFailure rate (recent)     \
  \  Policy Network (RL)\nBandwidth available               |\n                            Confidence >= 0.85?\n         \
  \                   YES: commit   NO: fallback to default\n\nAlgorithm: APBDA (Adaptive Priority-Based Dijkstra's Algorithm)\n\
  \n| Parameter | Initial Weight | RL Update Method | CEX Observable |\n|-----------|---------------|------------------|----------------|\n\
  | Task complexity | 0.30 | Q-learning on completion time | Handoff byte count |\n| Agent capability match | 0.25 | Policy\
  \ gradient on success rate | Nucleus signal score |\n| Current latency | 0.20 | TD-error on observed vs predicted | git\
  \ log timestamp delta |\n| Reliability (failure rate) | 0.15 | Q-learning on error rate | `.cex/runtime/signals/` |\n| Bandwidth\
  \ | 0.10 | Direct measurement | N/A (not tracked in CEX) |"
6_implementation_roadmap: ''
6_1_immediate_actions:
- Implement `cex_router_adaptive.py` with exponential moving average of latency/success rate
- Update `agent_card` schema to include missing streaming capability fields
- Integrate A2A v0.3+ features into CEX nucleus
6_2_future_work:
- Develop ANP integration for decentralized agent discovery
- Implement Agora LLM-mediated protocol negotiation
- Enhance ProtocolRouter with real-time RL training
7_references:
