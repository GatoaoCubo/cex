5_boundary: This artifact is a knowledge card documenting multi-agent communication protocols and their alignment with CEX
  architecture. It is not a protocol specification, implementation framework, or deployment tool. It does not provide executable
  code, nor does it define new protocols. Its scope is limited to mapping existing standards to CEX components and identifying
  integration gaps. ---
