1_introduction: This document provides a comprehensive survey of multi-agent communication protocols (MCP, ACP, A2A, ANP)
  and their alignment with CEX's inter-nucleus communication architecture. It maps technical terminology, identifies gaps,
  and outlines future directions for protocol adoption and enhancement. ---
2_survey_of_key_protocols: ''
2_1_protocol_taxonomy: '| Protocol Type         | Description                                                                 |
  CEX Parallel                      |

  |-----------------------|-------------|--------------------------|------------|

  | Context-Oriented  | Standardizes agent access to external tools/data/services                   | `function_def` + `toolkit`       |

  | Inter-Agent       | Facilitates agent-to-agent communication and coordination                   | `handoff_protocol` +
  `dispatch_rule` |

  | Meta-Protocol     | Enables protocol negotiation and dynamic capability discovery               | Future `protocol_negotiation`
  kind |

  | Session-Based     | Maintains stateful conversation context across interactions                 | `session_state`                  |'
2_2_protocol_comparison: '| Feature               | MCP                          | ACP                          | A2A                          |
  ANP                          |

  |----------------------|------------------------------|------------------------------|------------------------------|------------------------------|

  | Communication Model | Server-controlled sampling   | Structured message passing   | Task submission + signals    | Decentralized
  DID-based      |

  | Identity          | N/A                          | DID-based                    | N/A                          | DID-based                    |

  | Session State     | Supported                    | Supported                    | Supported                    | N/A                          |

  | Semantic Interoperability | N/A                        | JSON-LD                      | N/A                          |
  JSON-LD                      |


  ---'
