10_protocolbench_evaluation_results: 'Sources: ProtocolBench paper (Hongyi Du et al.) | OpenReview | MultiAgentBench (arxiv:2503.01935)'
10_1_benchmark_architecture: 'ProtocolBench uses a three-layer architecture:

  1. Scenario Layer: 4 task families -- GAIA Document QA, Streaming Queue, Collaborative Coding, Fail-Storm Recovery

  2. Protocol Adapter Layer: Pluggable adapters for A2A, ACP, ANP, Agora -- identical task logic, isolated protocol behavior

  3. Telemetry Layer: Per-turn latency, byte overhead, task success rate, resilience metrics'
10_2_quantitative_results: '| Metric | Range Across Protocols | Best Protocol | Notes |

  |--------|------------------------|---------------|-------|

  | Task completion time | Up to 36% variance | ACP (async streaming) | Agora highest (LLM negotiation overhead) |

  | Communication overhead | Up to 3.5s difference | MCP (stateless) | ANP highest (DID resolution per turn) |

  | Fail-Storm recovery | Statistically significant | A2A (SSE + lifecycle) | ANP weakest (no built-in state recovery) |

  | Collaborative coding success | -- | Agora | Natural language PDs reduce structural errors |'
10_3_scenario_protocol_fit_matrix: '| Scenario | Best Protocol | Reason |

  |----------|--------------|--------|

  | Document QA (hierarchical aggregation) | A2A | Task lifecycle + Agent Cards for capability routing |

  | Streaming Queue (high-throughput API) | ACP | RESTful async + MIME multipart = low-overhead streaming |

  | Collaborative Coding | Agora | LLM-mediated Protocol Documents = flexible negotiation |

  | Fail-Storm Recovery (cyclic node failures) | A2A | Stateful task lifecycle + SSE reconnect semantics |'
10_4_key_finding: '> Protocol choice is not neutral. A 36% task completion time delta and 3.5s overhead spread mean wrong
  protocol selection is a first-order performance problem, not configuration noise. > > Comparison baseline: MCP (stateless
  tool calls, no overhead management) vs A2A (full lifecycle, ~2.1s overhead) vs ANP (~3.5s overhead per turn due to DID resolution)
  vs Agora (variable, LLM negotiation cost amortizes over long sessions). ---'
11_protocolrouter_adaptive_protocol_selection_algorithm: 'Sources: ProtocolBench paper | arxiv:2503.07686'
11_1_architecture: "ProtocolRouter is a learnable routing system proposed alongside ProtocolBench. It dynamically selects\
  \ the optimal protocol at runtime based on observed conditions.\n\nInput Signals                ProtocolRouter         \
  \      Output\n-------------                --------------               ------\nTask type (QA/code/stream)        |\nAgent\
  \ count + topology  -->  Feature Extractor       -->  A2A / ACP / ANP / Agora\nCurrent latency metrics           |\nFailure\
  \ rate (recent)       Policy Network (RL)\nBandwidth available               |\n                            Confidence >=\
  \ 0.85?\n                            YES: commit   NO: fallback to default"
11_2_algorithm_apbda_adaptive_priority_based_dijkstra_s_algorithm: 'Source: arxiv:2503.07686


  The routing algorithm integrates multi-dimensional cost functions with RL-adaptive weights:


  | Parameter | Initial Weight | RL Update Method | CEX Observable |

  |-----------|---------------|------------------|----------------|

  | Task complexity | 0.30 | Q-learning on completion time | Handoff byte count |

  | Agent capability match | 0.25 | Policy gradient on success rate | Nucleus signal score |

  | Current latency | 0.20 | TD-error on observed vs predicted | git log timestamp delta |

  | Reliability (failure rate) | 0.15 | Q-learning on error rate | `.cex/runtime/signals/` |

  | Bandwidth | 0.10 | Direct measurement | N/A (not tracked in CEX) |


  Cost: `C(path) = sum_i(w_i * factor_i)` -- weights update via RL after each routing decision.'
11_3_cex_gap_analysis: '`cex_router.py` implements a static version of this pattern (4 providers x 7 nuclei + YAML fallback
  chains). ProtocolRouter''s adaptive weight update is the industry evolution:


  | CEX Current | ProtocolRouter Target | Gap |

  |-------------|----------------------|-----|

  | YAML `fallback_chain` | RL-weighted cost function | No adaptive learning |

  | Static model assignment | Dynamic per-task selection | No runtime adaptation |

  | Binary fail/succeed signal | Continuous score feedback | Coarse signal resolution |


  Recommended next artifact: `cex_router_adaptive.py` -- exponential moving average of per-nucleus latency + success rate
  updates routing weights every N cycles.


  ---'
12_a2a_protocol_task_lifecycle_and_implementation_detail: 'Sources: A2A Specification v0.3 | Google Blog | Google Cloud Blog'
12_1_task_state_machine: "submitted\n    |\n    v\nworking <--------+\n    |            |\n    v            |\ninput-required\
  \ --+--> [structured input received]\n    |\n    v\ncompleted | failed | canceled\n\nEach state transition emits an SSE\
  \ event. Clients subscribe at any point and replay from last known state."
12_2_agent_card_structure_json: "Agent Cards served at `/.well-known/agent.json`:\n\n{\n  \"name\": \"DataFetcherAgent\",\n\
  \  \"version\": \"1.0.0\",\n  \"capabilities\": {\n    \"streaming\": true,\n    \"stateTransitionHistory\": true\n  },\n\
  \  \"skills\": [\n    { \"id\": \"fetch_json\", \"inputModes\": [\"text\"], \"outputModes\": [\"application/json\"] }\n\
  \  ],\n  \"authentication\": { \"schemes\": [\"Bearer\"] }\n}\n\nCEX `agent_card` (P08) maps directly. Identified gaps:\
  \ missing `capabilities.streaming` and `skills[].inputModes` fields."
12_3_v0_3_feature_summary: '| Feature | Detail | Impact |

  |---------|--------|--------|

  | gRPC support | Binary protocol option | 2-5x throughput for high-frequency task dispatch |

  | Signed security cards | Cryptographic signature on Agent Cards | Trust verification without DID overhead |

  | Python SDK expansion | Async task polling, streaming helpers | Reduces boilerplate for CEX nucleus integration |

  | Linux Foundation governance | Apache 2.0, 50+ partner contributors | Long-term standard, safe to build on |'
12_4_acp_merger_into_a2a_september_2025: 'Source: IBM Research | ACP course retirement notice


  > "Starting September 1, 2025, the ACP team joined forces with Google''s A2A team under the Linux Foundation. ACP is winding
  down active development and contributing its multipart MIME and async streaming semantics to A2A."


  CEX Impact:

  - The `proposal` kind (maps to ACP structured messages) now aligns to A2A `input-required` state

  - ACP async streaming is absorbed into A2A v0.3+

  - ACP-based integrations should target A2A endpoints going forward

  - IBM BeeAI framework continues development but uses A2A wire protocol


  ---'
13_protocol_selection_decision_tree: "What is the primary interaction pattern?\n|\n+-- Tool/data access (agent needs external\
  \ resource)\n|       --> MCP (JSON-RPC, stdio/HTTP, tool invocation)\n|\n+-- Task delegation (one agent assigns work to\
  \ another)\n|       |\n|       +-- Enterprise context, same org\n|       |       --> A2A (task lifecycle, Agent Cards, SSE)\n\
  |       |\n|       +-- Cross-org, internet-scale discovery\n|               --> ANP (DID-based, JSON-LD, decentralized)\n\
  |\n+-- Structured message (multipart, multimodal payload)\n|       --> A2A v0.3+ (absorbed ACP multipart semantics)\n|\n\
  +-- Unknown schema, agents must negotiate protocol\n|       --> Agora (LLM-mediated Protocol Documents)\n|\n+-- In-process\
  \ orchestration, single framework\n        |\n        +-- Sequential pipeline with state checkpoints\n        |       -->\
  \ LangGraph State Protocol\n        |\n        +-- Role-based crew, specialized agents\n        |       --> CrewAI Task\
  \ Protocol\n        |\n        +-- Event-driven group conversation\n                --> AutoGen Protocol / Semantic Kernel"
13_1_cex_dispatch_path_alignment: '| CEX Dispatch Path | Recommended Protocol | Reasoning |

  |-------------------|---------------------|-----------|

  | N07 -> N0x (intra-system) | A2A Task Lifecycle (logical model) | Stateful, SSE-like signals match task state machine |

  | N0x -> external tool | MCP | Standard tool invocation contract |

  | N0x -> external agent (future) | A2A Agent Card discovery | Cross-org capability advertisement |

  | `git commit` as signal | ANP-inspired DID event | Immutable, verifiable event record |

  | `.proposal.md` | A2A `input-required` state | Agent suspends pending structured input |

  | `cex_router.py` | ProtocolRouter APBDA | Adaptive weight selection over fallback chains |


  ---'
