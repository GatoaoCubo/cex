9_protocol_landscape_16_protocols_mapped: 'Sources: arxiv:2505.02279 | arxiv:2504.16736 | DigitalOcean survey'
9_1_modern_protocols_2024_2026: '| # | Protocol | Origin | Transport | Auth | State | Status | CEX Parallel |

  |---|----------|--------|-----------|------|-------|--------|--------------|

  | 1 | MCP (Model Context Protocol) | Anthropic, Nov 2024 | JSON-RPC over HTTP/stdio | OAuth2 | Stateless | Active | `function_def`
  + `toolkit` |

  | 2 | A2A (Agent2Agent) | Google, Apr 2025 | HTTP + SSE + JSON-RPC (v0.3: gRPC) | Agent Cards + signed certs | Stateful
  (task lifecycle) | Active (Linux Foundation) | `handoff_protocol` + `dispatch_rule` |

  | 3 | ACP (Agent Communication Protocol) | IBM, May 2025 | RESTful HTTP, multipart MIME | DID-based | Stateful, async streams
  | Merged into A2A Sep 2025 | `proposal` + `session_state` |

  | 4 | ANP (Agent Network Protocol) | Open community, 2025 | DID-over-HTTP, JSON-LD | W3C DID | Stateless | Active | N/A
  (gap: `identity_config`) |

  | 5 | Agora | Univ. of Oxford, 2024 | LLM-mediated, Protocol Docs | None | Negotiated | Research | N/A (gap: `protocol_negotiation`)
  |

  | 6 | LMOS | Eclipse Foundation, 2024 | HTTP, event bus | IAM | Stateful | Active | `workflow` |

  | 7 | Coral Protocol | Community, 2025 | WebSocket + REST | JWT | Stateful | Experimental | `handoff` + `signal` |

  | 8 | OpenAI Swarm | OpenAI, 2024 | In-process function calls | API key | Stateless | Experimental | `dispatch_rule` |'
