2_9_tool_system: '| Class/Function | Purpose |

  |----------------|---------|

  | Toolkit | Central tool manager: registration, schema generation, execution |

  | ToolFunction | Wrapper around callable with metadata |

  | register_tool_function() | Register a Python function as agent tool |

  | execute_tool_function() | Unified async generator for heterogeneous tool outputs |

  | register_mcp_client() | Register an MCP protocol client |

  | create_tool_group() | Group-wise tool management (mitigates paradox-of-choice) |

  | update_tool_groups() | Update active tool groups |

  | reset_equipped_tools() | Dynamic tool provisioning at runtime |

  | execute_python_code | Built-in: sandboxed Python execution |

  | execute_shell_command | Built-in: shell command execution |

  | HttpStatelessClient | MCP stateless client for transactional services |

  | StatefulClientBase | MCP stateful client for persistent connections |

  | get_callable_function() | Extract MCP tools as local callable functions |


  Tool vs Service Function: Service functions return `ServiceResponse`. Tools are

  "processed service functions" with JSON schema descriptions for LLM understanding.

  The ServiceFactory auto-converts services to OpenAI-compatible JSON schema format.


  parallel_tool_calls: Parameter enabling parallel tool execution via `asyncio.gather()`.'
2_10_state_management: '| Class/Method | Purpose |

  |--------------|---------|

  | StateModule | Base class for all stateful components (agents, memory, toolkit) |

  | register_state(attr_name, custom_to_json, custom_from_json) | Mark attribute for serialization |

  | state_dict() | Export state as dictionary |

  | load_state_dict(state_dict, strict) | Restore from saved state |

  | SessionBase | Abstract session persistence |

  | JSONSession | JSON file-based session storage |

  | RedisSession | Redis-backed session for distributed deployments |


  Automatic nesting: StateModule children are auto-included in parent''s `state_dict()`.

  All of `AgentBase`, `MemoryBase`, `LongTermMemoryBase`, `Toolkit` inherit StateModule.'
2_11_hook_system: "10 hooks across 5 core functions (5 pre/post pairs):\n\n| # | Hook Name | Available On | What It Intercepts\
  \ |\n|---|-----------|-------------|-------------------|\n| 1 | pre_reply | AgentBase+ | Before agent generates response\
  \ |\n| 2 | post_reply | AgentBase+ | After agent response is generated |\n| 3 | pre_observe | AgentBase+ | Before agent\
  \ receives broadcast message |\n| 4 | post_observe | AgentBase+ | After message stored in agent memory |\n| 5 | pre_print\
  \ | AgentBase+ | Before console/queue output |\n| 6 | post_print | AgentBase+ | After output delivery |\n| 7 | pre_reasoning\
  \ | ReActAgentBase+ | Before `_reasoning()` (thinking + tool selection) |\n| 8 | post_reasoning | ReActAgentBase+ | After\
  \ reasoning step completes |\n| 9 | pre_acting | ReActAgentBase+ | Before `_acting()` (tool execution) |\n| 10 | post_acting\
  \ | ReActAgentBase+ | After tool calls return results |\n\nCanonical type signatures:\n# Pre-hook (hooks 1, 3, 5, 7, 9)\n\
  def pre_hook(self: AgentBase, kwargs: dict[str, Any]) -> dict[str, Any] | None:\n    ...  # return modified kwargs to replace,\
  \ or None for pass-through\n\n# Post-hook (hooks 2, 4, 6, 8, 10)\ndef post_hook(self: AgentBase, kwargs: dict[str, Any],\
  \ output: Any) -> Any:\n    ...  # return replacement output, or None for pass-through\n\nRegistration levels:\n- Class-level\
  \ (all instances): `AgentBase.register_class_hook(hook_type, hook_name, hook)`\n- Instance-level (single agent): `agent.register_instance_hook(hook_type,\
  \ hook_name, hook)`\n- Removal: `remove_class_hook()`, `remove_instance_hook()`, `clear_class_hooks()`, `clear_instance_hooks()`\n\
  \nExecution order: Class hooks (insertion order) -> Instance hooks (insertion order) -> Core method -> Class post-hooks\
  \ -> Instance post-hooks.\n\nChaining behavior: Non-`None` return propagates to next hook; all-`None` chain passes original\
  \ args unchanged.\n\nStorage implementation: Six `OrderedDict` class attributes + six `OrderedDict` instance attributes\
  \ per agent. Deterministic ordering for predictable distributed behavior.\n\nCritical constraint: Never call the wrapped\
  \ method inside its own hook (infinite loop).\n\nReMe integration (5-step pre_reasoning sequence):\n`ReMeLight.pre_reasoning_hook()`\
  \ is registered as a `pre_reasoning` hook on ReActAgent.\nFull execution order before each reasoning step:\n1. `compact_tool_result()`\
  \ -- truncate long tool outputs, cache to `tool_result/<uuid>.txt`\n2. `check_context()` -- token-count current context\
  \ via ContextChecker\n3. `compact_memory()` -- if threshold exceeded, generate structured summary (Goal/Progress/Decisions/NextSteps)\n\
  4. `summary_memory()` (async) -- persist summary to `memory/YYYY-MM-DD.md`\n5. `mark_messages_compressed()` -- save raw\
  \ dialog to `dialog/YYYY-MM-DD.jsonl`; mark with `_MemoryMark.COMPRESSED`\n\nRegistration code pattern:\n# Class-level --\
  \ applies to ALL instances of this class\ndef audit_hook(agent, kwargs):\n    return kwargs  # or None for pass-through\n\
  \nAgentBase.register_class_hook(\n    hook_type=\"pre_reply\",\n    hook_name=\"audit\",\n    hook=audit_hook,\n)\n\n# Instance-level\
  \ -- applies to ONE specific agent\nagent.register_instance_hook(\n    hook_type=\"post_reply\",\n    hook_name=\"log_msg\"\
  ,\n    hook=lambda agent, kwargs, msg: msg,\n)"
