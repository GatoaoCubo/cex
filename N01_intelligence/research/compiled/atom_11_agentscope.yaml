11_key_architectural_insights: "1. Formatter as first-class concern: AgentScope is the only framework that\n   treats provider-specific\
  \ message formatting as an explicit, pluggable layer.\n   This is architecturally significant -- it means the same agent\
  \ code works\n   across providers without modification.\n\n2. Mark-based message filtering: The `mark` system on messages\
  \ enables\n   fine-grained memory queries without separate index structures. No other\n   major framework has this.\n\n\
  3. Service vs Tool separation: Explicitly distinguishing raw service functions\n   from LLM-consumable tools (with JSON\
  \ schema) is a clean architectural boundary\n   that most frameworks blur.\n\n4. ReMe's 4-type memory: Personal + Procedural\
  \ + Tool + Working memory is\n   the most granular memory taxonomy in any agent framework. Most have at most\n   \"short-term\"\
  \ and \"long-term\".\n\n5. Non-blocking Placeholder: The v0.x distributed architecture's Placeholder\n   mechanism for automatic\
  \ parallelism is a genuine novelty -- it allows\n   centralized sequential code to execute with distributed parallelism.\n\
  \n6. Group-wise tool management: Explicitly addressing \"paradox of choice\"\n   (too many tools degrade LLM performance)\
  \ via tool groups is a practical\n   insight not found in other frameworks.\n\n7. Dual-mode LTM control: Agent-controlled\
  \ vs developer-controlled memory\n   access acknowledges that different use cases need different control points.\n\n8. Hook-based\
  \ extensibility via metaclass: The 10-hook system with class/instance\n   separation and OrderedDict ordering is the most\
  \ sophisticated hook system\n   in any agent framework.\n\n---"
