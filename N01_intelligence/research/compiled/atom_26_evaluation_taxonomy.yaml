7_judge_training_optimization: ''
7_1_training_objectives_by_paradigm: '| Paradigm | Loss Functions |

  |----------|---------------|

  | Pointwise | Binary Cross-Entropy, MSE, Ordinal Cross-Entropy |

  | Pairwise | Logistic Loss, RankNet, -log sigma(s_i - s_j) |

  | Listwise | ListMLE, LambdaRank, Softmax Cross-Entropy, Position-Weighted |'
7_2_judge_selection_decision_tree: "Need absolute quality score?\n  YES -> Pointwise\n    Need higher reliability?\n     \
  \ YES -> Pointwise + multi-judge panel\n      NO  -> Single pointwise judge\n  NO  -> Need relative preference?\n    YES\
  \ -> Pairwise (higher agreement than pointwise)\n    NO  -> Need global ranking?\n      YES -> Listwise (NDCG optimization)\n\
  \      NO  -> Start with pointwise, escalate as needed"
7_3_escalation_strategy_cost_accuracy_ascending:
- Pointwise evaluation alone
- Pointwise + judge panels (majority vote)
- Pairwise evaluation
- Multimodal judges (pointwise or pairwise)
- Listwise evaluation
- Reinforcement-learned judges (GRPO-based)
- Human validation layer
7_4_mitigation_strategies_summary: '| Strategy | Addresses |

  |----------|----------|

  | Automatic Prompt Optimization (APO) | Prompt sensitivity, rubric drift |

  | Panel/Jury (multi-judge) | Individual bias, variance |

  | Position randomization | Position bias |

  | Anonymization | Self-preference bias |

  | Evidence-anchored scoring | Over-confidence, hallucination blindness |

  | Schema-constrained output | Format inconsistency |

  | Causal Judge Evaluation (CJE) | Calibration drift |

  | Sample-based human audit | Coverage gaps, factuality gaps |


  ---'
8_cex_kind_mapping: ''
8_1_direct_kind_mappings: '| Industry Concept | CEX Kind | Pillar | Boundary |

  |------------------|----------|--------|----------|

  | Performance benchmark (latency, cost, quality) | `benchmark` | P07 | Quantitative measurement. NOT eval (no correctness)
  nor scoring_rubric (no criteria) |

  | Evaluation criteria framework (5D, 12LP, custom) | `scoring_rubric` | P07 | Criteria with framework. NOT benchmark (no
  measurement) nor quality_gate (no blocking) |

  | LLM-as-a-Judge configuration | `llm_judge` | P07 | LLM evaluator config. NOT scoring_rubric (different scope) |

  | Pass/fail quality barrier with numeric score | `quality_gate` | P11 | Numeric threshold barrier. NOT validator (technical)
  nor scoring_rubric (criteria only) |

  | Reference test case (quality 9.5+) | `golden_test` | P07 | Reference case. NOT few_shot_example (illustrates) nor unit_eval
  (any quality) |'
