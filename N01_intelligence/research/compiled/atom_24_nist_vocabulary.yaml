1_document_landscape: 'NIST maintains three primary vocabulary sources for AI/ML:


  | Document | ID | Terms | Focus |

  |----------|----|-------|-------|

  | AI Risk Management Framework | NIST AI 100-1 | ~50 core | 4 functions (Govern, Map, Measure, Manage), 7 trustworthiness
  characteristics |

  | Language of Trustworthy AI | NIST AI 100-3 | 511 | Cross-disciplinary glossary spanning AI, ML, data, governance, fairness,
  security |

  | GenAI Profile | NIST AI 600-1 | ~30 + 12 risks | Generative AI-specific risks and mitigations |


  Authors: Daniel Atherton, Reva Schwartz, Peter Fontana, Patrick Hall (AI 100-3);

  Chloe Autio, Reva Schwartz, Jesse Dunietz, Shomik Jain, Martin Stanley, Elham Tabassi (AI 600-1).


  The glossary is "non-sector specific and use-case agnostic" -- designed for all

  organizations seeking to operationalize trustworthy AI through the AI RMF.


  ---'
2_ai_rmf_core_framework_terms: ''
2_1_four_functions: '| Function | Definition | CEX Pillar |

  |----------|-----------|------------|

  | GOVERN | Cultivate and implement culture of risk management across the organization | P11 Feedback |

  | MAP | Contextualize risks relative to AI system and its domain | P01 Knowledge |

  | MEASURE | Employ quantitative/qualitative tools to analyze and monitor AI risks | P07 Evaluation |

  | MANAGE | Allocate resources to mapped and measured risks on regular basis | P12 Orchestration |'
2_2_seven_trustworthiness_characteristics: '| Characteristic | Definition | CEX Pillar |

  |----------------|-----------|------------|

  | Valid and Reliable | Deployment of models meeting requirements, with consistent results across conditions | P07 Evaluation
  |

  | Safe | AI systems not causing conditions leading to physical or psychological harm | P11 Feedback |

  | Secure and Resilient | Protection against unauthorized access and ability to recover from disruptions | P09 Config |

  | Accountable and Transparent | Clear disclosure of AI system capabilities, limitations, and decision processes | P08 Architecture
  |

  | Explainable and Interpretable | Representation of mechanisms underlying AI operation and meaning of outputs | P07 Evaluation
  |

  | Privacy-Enhanced | Protection of personal information throughout AI lifecycle | P09 Config |

  | Fair with Harmful Bias Managed | Equity and equality in AI treatment across demographic groups | P11 Feedback |'
2_3_ai_rmf_structural_terms: '| Term | Definition | CEX Pillar |

  |------|-----------|------------|

  | AI System | Engineered system generating outputs (predictions, recommendations, decisions) influencing real/virtual environments
  | P02 Model |

  | AI Actor | Participant across the AI lifecycle responsible for identifying and managing risks | P02 Model |

  | AI Lifecycle | Complete sequence of phases from conception through retirement of AI system | P12 Orchestration |

  | AI RMF Profile | Use-case implementation of framework functions tailored to specific settings | P08 Architecture |

  | Risk | Composite measure of event probability and magnitude of consequences | P11 Feedback |

  | Trustworthiness | Quality of being worthy of reliance through demonstrated reliability and integrity | P07 Evaluation
  |

  | Impact Assessment | Risk management tool ensuring organization has considered benefits/costs before implementation | P07
  Evaluation |


  ---'
3_nist_ai_600_1_genai_specific_terms: ''
3_1_twelve_genai_risk_categories: '| # | Risk Category | Definition | CEX Pillar |

  |---|--------------|-----------|------------|

  | 1 | CBRN Information/Capabilities | GenAI may lower barriers to accessing chemical, biological, radiological, nuclear
  threat information | P11 Feedback |

  | 2 | Confabulation | Production of confidently stated but false or internally inconsistent outputs ("hallucinations") |
  P07 Evaluation |

  | 3 | Data Privacy | Models may leak, generate, or correctly infer sensitive information about individuals (data memorization)
  | P09 Config |

  | 4 | Environmental Impacts | Energy consumption and carbon footprint of training and running large models | P11 Feedback
  |

  | 5 | Harmful Bias and Homogenization | Systematic unfairness in outputs, amplification of stereotypes, reduction of diversity
  | P11 Feedback |

  | 6 | Human-AI Configuration | Risks from improper calibration of human oversight, automation bias, over-reliance | P02
  Model |

  | 7 | Information Integrity | Generation of synthetic media undermining trust in authentic information ecosystems | P11
  Feedback |

  | 8 | Information Security | Expanded attack surface including prompt injection, model extraction, training data poisoning
  | P09 Config |

  | 9 | Intellectual Property | Training on copyrighted material, generation of outputs infringing existing IP | P11 Feedback
  |

  | 10 | Obscene/Degrading Content | Generation of content that is violent, hateful, sexually explicit, or degrading | P11
  Feedback |

  | 11 | Dangerous/Violent/Hateful Content | Generation of content promoting violence, extremism, or discrimination | P11
  Feedback |

  | 12 | Value Chain/Component Integration | Risks from third-party models, APIs, and data dependencies in supply chain |
  P12 Orchestration |'
3_2_genai_specific_vocabulary: '| Term | Definition | CEX Pillar |

  |------|-----------|------------|

  | Generative AI (GAI) | AI capable of generating text, images, audio, video, code, or other content | P02 Model |

  | Foundation Model | Large model trained on broad data that can be adapted to downstream tasks | P02 Model |

  | Prompt Injection | Attack manipulating model behavior by inserting adversarial instructions into input | P09 Config |

  | Data Memorization | Model retaining and potentially reproducing specific training examples | P10 Memory |

  | Confabulation | Model generating plausible but factually incorrect output with high confidence | P07 Evaluation |

  | Deepfake | AI-generated or manipulated media falsely appearing authentic or truthful | P05 Output |

  | Alignment | Ensuring AI system behavior properly aligns with human values and intentions | P11 Feedback |

  | Red-Teaming | Structured adversarial testing to discover system vulnerabilities and failure modes | P07 Evaluation |

  | Guardrail | Constraint or filter preventing AI system from producing harmful outputs | P11 Feedback |

  | Synthetic Data | Artificially generated data mimicking characteristics of real data | P01 Knowledge |


  ---'
