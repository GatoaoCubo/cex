  | P04 Tools | ~18 | Computing, Hardware, APIs, Algorithms |

  | P05 Output | ~10 | Applications, UX, Usability, Version Control |

  | P06 Schema | ~15 | Data Structures, Schemas, Protocols, Business Rules |

  | P07 Evaluation | ~110 | Evaluation, Statistics, Quality, Interpretability, Validity |

  | P08 Architecture | ~15 | Systems Engineering, Architecture, Interoperability, Model Cards |

  | P09 Config | ~65 | Security, Privacy, Cybersecurity, Access Control |

  | P10 Memory | ~5 | Memory, Indexing, Contextual Learning, Decay |

