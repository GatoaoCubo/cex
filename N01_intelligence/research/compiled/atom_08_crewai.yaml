  approved\", \"needs_revision\", \"rejected\"],\n        llm=\"gpt-4o-mini\",\n        default_outcome=\"needs_revision\"\
  \n    )\n    @listen(\"generate_report\")\n    def review(self):\n        pass\n\n    @listen(\"approved\")\n    def finalize(self):\n\
  \        feedback = self.last_human_feedback.feedback\n        history  = self.human_feedback_history"
conditional_logic_or_and_and: "from crewai.flow.flow import or_, and_\n\n    @listen(or_(method_a, method_b))    # Fires when\
  \ EITHER completes\n    def on_either(self, result): pass\n\n    @listen(and_(method_a, method_b))   # Fires only when BOTH\
  \ complete\n    def on_both(self): pass"
