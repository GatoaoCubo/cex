unified_memory_system_v0_100: ''
architecture: v0.100+ consolidates short-term, long-term, entity, and external memory types into a single `Memory` class with
  LLM-powered scope inference. Breaking change from prior multi-type API.
storage_backends: '| Backend | Purpose | Default Path |

  |---------|---------|-------------|

  | LanceDB | Vector + metadata | `./.crewai/memory` (env: `CREWAI_STORAGE_DIR`) |

  | SQLite | Flow state (`@persist`) | Alongside LanceDB |

  | Custom | Implement `StorageBackend` protocol | Any |


  Concurrent writes: shared locking with automatic retry.'
