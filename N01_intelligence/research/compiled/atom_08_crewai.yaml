composite_scoring_weights: '| Parameter | Default | Effect |

  |-----------|---------|--------|

  | `semantic_weight` | 0.5 | Vector similarity |

  | `recency_weight` | 0.3 | Temporal decay |

  | `importance_weight` | 0.2 | Saved importance |

  | `recency_half_life_days` | 30 | Decay period |

  | `consolidation_threshold` | 0.85 | Duplicate detection |

  | `batch_dedup_threshold` | 0.98 | Near-duplicate drop (cosine) |

  | `query_analysis_threshold` | 200 | LLM-skip threshold (chars) |


  Formula: `score = semantic_weight  similarity + recency_weight  decay + importance_weight * importance`'
hierarchical_scopes: 'Filesystem-like tree: `/`, `/project/alpha`, `/agent/researcher`. LLM auto-suggests placement. `MemorySlice`
  enables views across multiple disjoint scopes; optional `read_only=True`.'
recallflow_modes: '| Mode | Latency | Method |

  |------|---------|--------|

  | Shallow | ~200ms | Direct vector search, no LLM calls |

  | Deep (default) | Varies | Query analysis + scope selection + parallel vector search |


  LLM skipped automatically for queries under 200 characters.'
memory_api: 'from crewai.memory import Memory


  mem = Memory(semantic_weight=0.5, recency_weight=0.3, importance_weight=0.2)


  # Store

  mem.remember("Project deadline 2026-05-01", scope="/project/alpha")

  mem.remember_many(["fact1", "fact2"])   # Non-blocking background thread


  # Retrieve

  results = mem.recall("project deadline", depth="deep", limit=5)

  facts   = mem.extract_memories("Long meeting notes text ...")


  # Delete / admin

  mem.forget(scope="/project/alpha")

  mem.tree()

  mem.info("/project")

  mem.list_records(scope="/project/alpha")

  mem.reset()

  mem.drain_writes()

  mem.close()


  CLI: `crewai memory` (TUI), `crewai memory --storage-path ./dir`'
non_blocking_guarantee: '`remember_many()` returns immediately. Every `recall()` auto-calls `drain_writes()` before searching.
  Crew shutdown flushes pending saves in `finally`.'
privacy: 'mem.remember("Sensitive data", source="user:alice", private=True)

  # Visible only when source matches; admin override: recall(include_private=True)'
memory_in_crews_agents_flows: '| Context | Usage |

  |---------|-------|

  | `Crew(memory=True)` | Shared across all agents |

  | `Agent(memory=True)` | Per-agent scoped view |

  | Flow instance | `self.remember()`, `self.recall()`, `self.extract_memories()` |'
failure_resilience_no_exceptions_raised_for_analysis_failures: '- Save analysis failure: stores at `/`, importance 0.5

  - Extract failure: full content as single record

  - Query analysis failure: falls back to vector search

  - Storage/embedder failures DO propagate


  ---'
flow_system_complete_decorator_reference: ''
start_entry_points: "from crewai.flow.flow import Flow, start, listen, router, persist\n\nclass MyFlow(Flow):\n    @start()\n\
  \    def begin(self):\n        return \"initial data\"\n\n    @start(\"begin\")                              # Fires after\
  \ 'begin' method\n    def begin_after(self): pass\n\n    @start(lambda self: self.state.get(\"ready\")) # Callable condition\n\
  \    def begin_if_ready(self): pass"
listen_reactive_triggers: "    @listen(\"begin\")              # By name string; receives output as arg\n    def process(self,\
  \ output):\n        return f\"processed: {output}\"\n\n    @listen(begin)                # Direct reference\n    def process_ref(self,\
  \ output): pass"
router_conditional_branching: "    @router(begin)\n    def route(self):\n        return \"success\" if self.state.get(\"quality\"\
  , 0) > 8 else \"failed\"\n\n    @listen(\"success\")\n    def on_success(self): pass\n\n    @listen(\"failed\")\n    def\
  \ on_failed(self): pass"
persist_state_persistence: "@persist\nclass MyFlow(Flow): pass          # Class-level: all methods persisted\n\nclass MyFlow(Flow):\n\
  \    @persist\n    @start()\n    def start_method(self): pass  # Method-level\nDefault backend: SQLiteFlowPersistence. Custom\
  \ backends supported."
