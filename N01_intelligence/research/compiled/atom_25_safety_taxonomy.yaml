10_7_google_vertex_ai_safety_filters: "Source: https://cloud.google.com/vertex-ai/generative-ai/docs/multimodal/configure-safety-filters\n\
  \nfrom vertexai.generative_models import (\n    GenerativeModel, SafetySetting, HarmCategory, HarmBlockThreshold\n)\nsafety_config\
  \ = [\n    SafetySetting(category=HarmCategory.HARM_CATEGORY_HATE_SPEECH,\n                  threshold=HarmBlockThreshold.BLOCK_LOW_AND_ABOVE),\n\
  \    SafetySetting(category=HarmCategory.HARM_CATEGORY_DANGEROUS_CONTENT,\n                  threshold=HarmBlockThreshold.BLOCK_MEDIUM_AND_ABOVE),\n\
  ]\nmodel = GenerativeModel('gemini-2.0-flash', safety_settings=safety_config)"
10_8_anthropic_constitutional_ai_system_prompt_pattern: "Source: https://www.anthropic.com/research/constitutional-ai-harmlessness-from-ai-feedback\n\
  \nimport anthropic\nCONSTITUTION = (\n    'Safety principles (non-overridable by user):\\n'\n    '1. Never provide CBRN\
  \ weapon instructions (H07)\\n'\n    '2. Never generate content sexualizing minors (H02)\\n'\n    '3. Acknowledge uncertainty;\
  \ do not confabulate (Hallucination)\\n'\n    '4. Refuse privacy-violating requests (H10)'\n)\nclient = anthropic.Anthropic()\n\
  response = client.messages.create(\n    model='claude-opus-4-6', max_tokens=1024,\n    system=CONSTITUTION,\n    messages=[{'role':\
  \ 'user', 'content': 'user message'}]\n)"
11_constitutional_ai_principles_mapped_to_nist_ai_rmf: ''
11_1_nist_ai_rmf_core_functions: '| Function | Description |

  |----------|-------------|

  | GOVERN | Risk governance structures, roles, policies, accountability |

  | MAP | Context-setting -- categorize AI use cases and risks |

  | MEASURE | Quantify risks via benchmarks, metrics, testing |

  | MANAGE | Mitigate, monitor, respond to identified risks |'
11_2_cai_principles_to_nist_mapping: '| CAI Principle | NIST Function | Subcategory | Implementation |

  |---------------|---------------|-------------|----------------|

  | Harmlessness | GOVERN + MANAGE | GV-1.1, MG-2.2 | Safety policies defined; AI feedback enforces them |

  | Honesty / No Confabulation | MEASURE | MS-2.5 | Hallucination metrics, grounding checks |

  | Corrigibility | GOVERN | GV-4.1 | HITL approval flows, human override channels |

  | Non-deception | MAP | MP-2.3 | Transparent capability disclosure, model cards |

  | Avoiding Dual Use | MAP + MANAGE | MP-4.1, MG-3.1 | CBRN filters, weapon instruction refusals |

  | Privacy Protection | MANAGE | MG-2.4 | PII redaction, data minimization |

  | Avoiding Bias / Fairness | MEASURE + MANAGE | MS-2.6, MG-4.2 | Parity testing, output audits |

  | Principle Abstraction | MAP | MP-3.2 | Domain-specific constitutions (medical, legal) |'
11_3_aegis_hazard_cai_nist_gai_cross_reference: '| NIST GAI Category | Aegis Code | CAI Principle | OWASP |

  |-------------------|------------|---------------|-------|

  | CBRN Information | H07 | Harmlessness (physical) | LLM05 |

  | Data Privacy | H04, H10 | Privacy Protection | LLM02 |

  | Information Integrity | H02, H11 | Honesty | LLM09 |

  | Toxicity / Bias | H01, H12 | Fairness | -- |

  | Human-AI Configuration | H09 | Corrigibility | LLM09 |

  | Obscene Content | H02 | Harmlessness (content) | -- |

  | Psychosocial Harms | H04 | Harmlessness (wellbeing) | -- |


  Source: https://www.nist.gov/itl/ai-risk-management-framework


  ---'
