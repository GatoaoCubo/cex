8_summary: This knowledge card provides a comprehensive overview of AI safety, including hazard sources, defense mechanisms,
  evaluation methods, and alignment with industry frameworks. By integrating insights from Aegis, OWASP, NIST, and ControlArena,
  it offers a structured approach to ensuring safe, ethical, and compliant AI systems. Key areas of focus include robust guardrail
  design, rigorous red team testing, and alignment with legal and ethical standards. The artifact serves as a reference for
  developers, auditors, and policymakers navigating the complex landscape of AI safety. ---
9_controlarena_implementation_uk_aisi: 'Source: https://github.com/UKGovernmentBEIS/control-arena Docs: https://control-arena.aisi.org.uk/
  Blog: https://www.aisi.gov.uk/blog/introducing-controlarena-a-library-for-running-ai-control-experiments'
9_1_what_it_is: ControlArena is an open-source Python library by the UK AI Security Institute (AISI) for running AI control
  experiments. Built on top of the Inspect AI evaluation library. Used by Anthropic, Google DeepMind, and Redwood Research.
  Supports AI Control Hackathon 2026 (co-organized with Redwood Research).
9_2_installation: 'pip install control-arena


  git clone https://github.com/UKGovernmentBEIS/control-arena.git

  cd control-arena

  pip install -e .


  pip install inspect-ai'
9_3_running_evaluations: "from inspect_ai import eval, eval_set\n\nresult = eval(task, model=\"anthropic/claude-sonnet-4-20250514\"\
  )\n\nresults = eval_set(tasks, model=\"openai/gpt-4.1-mini-2025-04-14\",\n                   max_retries=3, cache=True)"
9_4_control_protocols: '| Protocol | Description | Use Case |

  |----------|-------------|----------|

  | Defer to Trusted | Route high-stakes decisions to trusted model | Production safety |

  | Defer to Resample | Regenerate on suspicion signal | Quality assurance |

  | Adaptive Deployment | Adjust oversight level by risk score | Dynamic safety |

  | Audit Budget | Limit expensive checks to X% of calls | Cost-aware safety |

  | Blue Team | Honest agent trying to complete task | Control baseline |

  | Red Team (U_A) | Adversarial attack policy simulation | Threat modeling |'
9_5_metrics: '| Metric | Type | Interpretation |

  |--------|------|----------------|

  | Safety Score | P(safe) 0-1 | Probability of no unsafe action in episode |

  | Usefulness Score | P(useful) 0-1 | Task completion rate |

  | Suspicion Score | 0-1 | Likelihood of adversarial intent |

  | Sneakiness Score | 0-1 | Stealth level of adversarial attacks |


  ---'
