3_2_technical_architecture_quantization_and_compression: 'The original tsuzumi (v1) was released in two sizes, establishing
  the "lightweight sovereignty" pattern:


  | Version | Parameters | Use Case |

  |---------|-----------|---------|

  | tsuzumi ultra-lightweight | 600M (0.6B) | Embedded, mobile, IoT |

  | tsuzumi lightweight | 7B | Single GPU enterprise |

  | tsuzumi 2 | Undisclosed (single GPU) | Successor -- GPT-5 parity target |


  tsuzumi 2 key architectural improvements over v1:


  1. Quantization: Lower-bit parameter quantization for speed + reduced memory footprint

  2. Long-document context: Significantly improved handling of long documents and complex context (explicit limitation of
  v1)

  3. Transformer backbone: Standard transformer architecture with proprietary optimizations (not a custom architecture --
  deliberate choice for auditability and safety compliance)

  4. Efficient tokenization: Japanese-optimized tokenizer reduces token count vs generic multilingual tokenizers -- 20-30%
  fewer tokens for equivalent Japanese text

  5. Adapter layer: Cross-attention adapter stack with learnable tokens for multi-modal input (visual document reading --
  announced separately in April 2024, integrated in v2)'
3_3_government_adoption:
- Selected for Japan Digital Agency's "Government AI" (Gennai) initiative
- Trial deployment across ministries from FY2026
- 'Sovereign positioning: fully domestic, auditable training pipeline'
3_4_strategic_significance: 'tsuzumi 2 represents Japan''s "lightweight sovereignty" thesis: you don''t need a 1T-parameter
  model for enterprise Japanese tasks. A well-trained, domain-specialized model on a single GPU can match or exceed frontier
  models in specific verticals, at a fraction of the cost and with full data control.


  Competitive comparison vs. alternatives:


  | Model | Size | Single GPU? | Japanese? | Data sovereignty? |

  |-------|------|-------------|-----------|------------------|

  | tsuzumi 2 | 7B (est.) | YES | World-top (comparable) | Full (Japan-only) |

  | Llama 3.1 8B | 8B | YES | Moderate | None (Meta-controlled) |

  | GPT-4o mini | Unknown | NO (API only) | Good | None |

  | Gemma 2 9B | 9B | YES | Moderate | None (Google) |


  ---'
