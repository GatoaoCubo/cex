11_2_ai_alliance_opendxa_industrial_ai_agent_framework: 'Released: Early 2026 | License: Open source | Founding members: IBM,
  NEC, Panasonic


  OpenDXA is an open-source agent framework specifically designed for industrial AI applications with explainability requirements:


