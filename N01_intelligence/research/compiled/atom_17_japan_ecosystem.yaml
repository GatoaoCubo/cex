executive_summary: 'Japan''s AI ecosystem operates on a hybrid coexistence strategy: domestic LLMs for sovereignty-sensitive
  workloads (government, medical, finance) coexisting with frontier US models for general capability. The ecosystem produces
  three globally unique contributions:


  1. Self-evolving agents (Sakana AI) -- agents that rewrite their own code via evolutionary pressure

  2. Diffusion-based text generation (ELYZA) -- non-autoregressive LLM architecture applied to Japanese

  3. Tacit knowledge extraction (NEC cotomi Act) -- converting implicit human expertise into agent behavior, achieving superhuman
  web task performance


  Japan''s $6.34B sovereign AI initiative (2025-2026) funds this ecosystem through GENIAC accelerator grants, ABCI 3.0 supercomputer
  access, and Rapidus 2nm chip fabrication.


  ---'
1_sakana_ai_evolutionary_intelligence: 'Founded: 2023 (Tokyo) | Founders: ex-Google Brain (Llion Jones, David Ha)'
1_1_darwin_godel_machine_dgm: 'Self-improving coding agent that rewrites its own Python codebase through evolutionary selection.


  | Property | Value |

  |----------|-------|

  | Mechanism | Agent reads own code, proposes modifications, validates empirically |

  | Selection | Darwinian: maintain archive of diverse agent variants |

  | SWE-bench | 20.0% -> 50.0% (2.5x improvement through self-evolution) |

  | Polyglot | 14.2% -> 30.7% (surpasses hand-designed Aider agent) |

  | Transfer | Improvements found with Claude 3.5 Sonnet transfer to o3-mini, Claude 3.7 |

  | Cross-lang | Python-discovered improvements transfer to Rust, C++, Go |

  | Paper | arXiv:2505.22954 (May 2025) |


  Self-discovered improvements include: patch validation steps, enhanced file viewing, improved editing tools, multi-solution
  generation with ranking, maintaining histories of failed attempts.


  CEX relevance: DGM''s evolutionary loop (modify -> evaluate -> select -> archive) maps directly to CEX''s `/evolve` pipeline.
  The archive-of-variants concept parallels CEX''s quality-gated artifact improvement cycle. Key difference: DGM evolves the
  agent itself; CEX evolves artifacts produced by fixed agents.'
1_2_ab_mcts_treequest_collective_intelligence_at_inference_time: 'Inference-time scaling algorithm enabling multiple frontier
  LLMs to collaborate on problem-solving.


  | Property | Value |

  |----------|-------|

  | Algorithm | Adaptive Branching Monte Carlo Tree Search |

  | Balancing | Thompson Sampling across depth (refine) vs width (restart) |

  | Multi-LLM | Treats model selection as multi-armed bandit problem |

  | ARC-AGI-2 (single) | o4-mini: 27.5% Pass@250 (vs 23% repeated sampling) |

  | ARC-AGI-2 (multi) | Gemini-2.5-Pro + o4-mini + DeepSeek-R1-0528: 30%+ Pass@250 |

  | Open source | Apache 2.0 (TreeQuest framework) |


  Unique insight: One LLM''s incorrect output serves as a useful hint for another LLM to reach the correct solution. The combination
  outperforms any individual model -- emergence through collaboration, not scale.


  CEX relevance: AB-MCTS''s multi-model collaboration mirrors CEX''s multi-nucleus grid dispatch. N01-N06 each bring different
  "model personalities" (research vs build vs marketing). TreeQuest''s depth-vs-width balancing maps to CEX''s wave planning
  (sequential depth vs parallel width).'
1_4_dgm_implementation_architecture_arxiv_v3_march_2026: "Paper: arXiv:2505.22954 v3 (latest: 2026-03-12) | Code: github.com/lemoz/darwin-godel-machine\
  \ (Apache 2.0)\n\nThe DGM paper reached v3 in March 2026 with expanded safety analysis and cross-language transfer experiments.\n\
  \n#### Core Loop Implementation\n\nINITIALIZE: seed agent + empty archive\nLOOP:\n  1. SELECT parent from archive (quality-diversity\
  \ selection)\n  2. PROPOSE: parent agent reads its own code -> generates modification\n  3. SANDBOX: execute modified agent\
  \ in isolated container\n     - No internet access during evaluation\n     - Resource limits: CPU time, memory, disk I/O\n\
  \     - Human supervision checkpoint available\n  4. EVALUATE: run on benchmark subset (SWE-bench / Polyglot)\n  5. ARCHIVE:\
  \ add if improves score OR adds diversity (MAP-Elites style)\n  6. REPEAT from SELECT\n\n#### Self-Discovered Improvements\
  \ (verified across runs)\n\n| Improvement Type | What Agent Changed | Benchmark Gain |\n|-----------------|-------------------|----------------|\n\
  | Patch validation | Added pre-flight check before applying patches | Reduces invalid patches |\n| Enhanced file viewing\
  \ | Broader context window for code viewing | Better understanding |\n| Multi-solution ranking | Generate N solutions, pick\
  \ best via secondary eval | +12% SWE-bench |\n| Failure history | Maintain log of failed attempts per task | Avoids repeat\
  \ failures |\n| Editing tool refinement | Finer-grained edit operations | Fewer syntax errors |\n\n#### Transfer Generalization\
  \ (CEX-relevant finding)\n\nImprovements discovered using Claude 3.5 Sonnet as the base model transferred to:\n- o3-mini:\
  \ +18% SWE-bench\n- Claude 3.7: +15% SWE-bench\n- Cross-language: Python improvements applied to Rust, C++, Go agents with\
  \ no re-training\n\nThis confirms the improvements are structural (better reasoning/tooling patterns), not model-specific\
  \ overfitting."
1_3_evolutionary_model_merging: 'Automated discovery of effective model combinations using evolutionary optimization.


  | Property | Value |

  |----------|-------|

  | Method | Evolutionary search over merge recipes (no gradient training) |

  | Compute | Minimal -- merging existing models, not training new ones |

  | Published | Nature Machine Intelligence (accepted Jan 2025) |

  | Follow-up | CycleQD (ICLR 2025) -- evolving swarms of niche LLM agents |

  | Tools | Integrated into mergekit, Optuna Hub |


  CycleQD evolves a population of specialized LLM agents, each occupying a distinct niche, to solve complex agentic workflows.
  This is quality-diversity optimization applied to agent populations.


  ---'
