5_integration_notes_for_cex: ''
5_1_qwen_agent_as_local_builder_backend: 'Qwen-Agent can serve as a CEX nucleus backend when running Qwen3 locally via Ollama:

  - Use `TextChatAtOAI` with `model_server: http://localhost:11434/v1`

  - Enable `use_raw_api=True` for Ollama native tool parsing

  - FnCallAgent loop (8 max) maps well to CEX 8F pipeline iterations

  - MCP integration allows CEX tools to be exposed as MCP servers'
5_2_deepseek_as_api_provider: 'DeepSeek fits CEX `model_provider` config:

  - OpenAI-compatible API -- works with existing `cex_router.py`

  - `deepseek-chat` for non-thinking tool calls (fast, cheap)

  - `deepseek-reasoner` for thinking-with-tools (quality, expensive)

  - 128 tool limit is sufficient for CEX (79 tools total)

  - Strict mode useful for `validation_schema` enforcement'
5_3_reasoning_content_handling: 'Both Qwen and DeepSeek require careful `reasoning_content` management:

  - CEX message format should preserve `reasoning_content` in conversation history

  - Strip on new user turn (DeepSeek) or risk 400 errors

  - Qwen''s `thought_in_content` toggle maps to CEX `generate_cfg` in provider config'
5_4_thinking_with_tools_for_cex_missions: 'DeepSeek''s interleaved reasoning+tools pattern maps to CEX mission execution:

  - F4 REASON can invoke F5 CALL tools mid-reasoning

  - Multi-turn within single question = single 8F pass with tool calls

  - The `while tool_calls` loop in client code mirrors FnCallAgent''s iteration loop


  ---'
6_key_takeaways:
- Qwen-Agent is a framework; DeepSeek is an API. Different integration patterns for CEX.
- Thinking-with-tools (DeepSeek) is architecturally distinct from think-then-act (everyone else). It allows reasoning to incorporate
  tool results before reaching conclusions.
- Hermes template (Qwen3) solves the ReAct stopword problem -- use `--tool-call-parser hermes` for any Qwen3 deployment.
- reasoning_content is a cross-ecosystem pattern (Qwen, DeepSeek, OpenAI o-series) that CEX must handle uniformly in its message
  format.
- MCP is Qwen-native, absent in DeepSeek. For CEX, Qwen-Agent is the better local MCP bridge.
- 128 tool limit (DeepSeek) and 8 iteration limit (Qwen FnCallAgent) are hard constraints that CEX dispatch must respect.
- V3.2-Speciale claims GPT-5 level reasoning -- monitor for CEX nucleus routing as a high-compute option.
