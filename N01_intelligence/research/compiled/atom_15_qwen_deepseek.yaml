1_qwen_agent_framework: ''
1_1_architecture_overview: 'Qwen-Agent is a Python framework built on three atomic components:


  | Component | Base Class | Role |

  |-----------|-----------|------|

  | LLMs | `BaseChatModel` | Model backends (DashScope, OpenAI-compat, local) |

  | Tools | `BaseTool` | Callable capabilities with schema |

  | Agents | `Agent` | Orchestration loops combining LLMs + Tools |'
1_2_agent_class_hierarchy: "Agent (abstract: run(), _run(), _call_llm(), _call_tool(), _detect_tool())\n  |-- BasicAgent \
  \         # Direct LLM pass-through, no tools\n  |-- FnCallAgent         # Iterative tool-calling loop (max 8 iterations)\n\
  \  |     |-- Assistant     # FnCallAgent + RAG via Memory component\n  |-- ReActChat           # Text-based ReAct pattern\
  \ (Thought-Action-Observation)\n  |-- MultiAgentHub       # Orchestrates multiple agents with selection logic\n  |-- Router\
  \              # Routes tasks to specialized agents\n  |-- GroupChat           # Multi-agent conversation\n\nFnCallAgent\
  \ loop: call LLM -> parse `function_call` -> execute tool -> append `FUNCTION` message -> repeat until no tool calls or\
  \ `MAX_LLM_CALL_PER_RUN=8`.\n\nReActChat: NOT recommended for Qwen3 reasoning models because the model may output ReAct\
  \ stopwords inside `<think>` blocks, causing premature truncation."
1_3_tool_system: "Registration via decorator:\nfrom qwen_agent.tools import BaseTool, register_tool\n\n@register_tool('my_tool')\n\
  class MyTool(BaseTool):\n    description = 'Tool description for the agent'\n    parameters = [\n        {'name': 'query',\
  \ 'type': 'string', 'description': 'Search query', 'required': True}\n    ]\n\n    def call(self, params: str, **kwargs)\
  \ -> str:\n        args = json.loads(params)\n        return do_something(args['query'])\n\n- `TOOL_REGISTRY`: global dict\
  \ for runtime lookup by string name\n- `BaseToolWithFileAccess`: subclass for file-aware operations\n- Three init formats:\
  \ string name, dict config, direct instance\n\nBuilt-in tools: `code_interpreter` (Docker sandbox + Jupyter kernel), `mcp_manager`,\
  \ `doc_parser` (PDF/DOCX/PPTX/HTML), `retrieval` (vector/keyword/hybrid RAG), `storage` (file KV)."
1_4_function_calling_templates: '| Template | Parser flag | Use case | Parallel calls |

  |----------|-----------|----------|----------------|

  | NousFnCallPrompt | `--tool-call-parser hermes` | Default for Qwen3 | Yes |

  | ReActPrompt | N/A (text-based) | Legacy, avoid for Qwen3 | No |


  Qwen3 uses ChatML format with XML-structured tool definitions:


  <tools>

  {"type": "function", "function": {"name": "fn", "parameters": {...}}}

  </tools>


  Tool calls emitted as:

  <tool_call>

  {"name": "fn", "arguments": {...}}

  </tool_call>


  Tool responses:

  <tool_response>

  {result_data}

  </tool_response>


  #### 1.4.1 Hermes NousFnCallPrompt: Full System Prompt Format


  The NousFnCallPrompt injects a structured preamble into the system message:


  You are a function-calling AI. Tools are provided inside <tools>...</tools>.

  When appropriate, call a tool by emitting a <tool_call>{...}</tool_call> JSON object.

  After a tool responds (as <tool_response>), continue reasoning inside <think>

  and produce the final answer.


  Parallel calls are emitted as consecutive `<tool_call>` blocks in a single assistant turn:

  <tool_call>

  {"name": "fn_a", "arguments": {"x": 1}}

  </tool_call>

  <tool_call>

  {"name": "fn_b", "arguments": {"y": 2}}

  </tool_call>


  vLLM serving command with Hermes parser enabled:

  vllm serve Qwen/Qwen3-8B --enable-auto-tool-choice --tool-call-parser hermes


  Known tokenizer bug (vLLM issue #19056): Qwen3''s tokenizer has a special token `}` with

  token ID 9207. The Hermes streaming parser (`extract_tool_calls_streaming`) truncates on this

  token, producing broken JSON output in tool calls. Workaround: use non-streaming mode or

  patch the parser to handle ID 9207 as literal `}`.


  ChatML message roles for tool flow:

  - `<|im_start|>system` -- tool schema injection

  - `<|im_start|>assistant` -- tool call emission (`<tool_call>`)

  - `<|im_start|>tool` -- tool response injection (`<tool_response>`)

  - Token ID 151668 -- closing `</think>` tag; parser uses this to split reasoning from output


  #### 1.4.2 Qwen3 Context Management: Rolling Checkpoint and No Default System Prompt


  No default system prompt: Qwen3 ships WITHOUT a built-in system prompt (unlike Qwen2.5

  which included "You are a helpful assistant" by default). Operators MUST inject the system

  message explicitly or tool schemas will not be present in context.

  Source: lawwu.github.io/til/posts/2025-05-02-qwen3-chat-prompt-template/


  Rolling checkpoint algorithm (chat template, Hugging Face blog on Qwen3 template):

  1. Traverse messages in REVERSE order

  2. Find the latest non-tool-call user turn (the "checkpoint")

  3. All messages BEFORE the checkpoint: `<think>` blocks compressed or removed to save tokens

  4. All messages AT/AFTER the checkpoint: full `<think>` blocks preserved

  5. Effect: prevents unbounded reasoning-token growth in long conversations


  Implication: In a 10-turn conversation, only the current active reasoning block is fully

  preserved. Prior `reasoning_content` from earlier turns is pruned from context. CEX sessions

  relying on Qwen3 should not depend on recovering full CoT from previous turns -- only

  `content` fields are reliable across turn boundaries.'
1_5_reasoning_content_field: "For reasoning models (QwQ, QvQ, Qwen3), messages carry an optional `reasoning_content` field\
  \ separate from `content`.\n\nthought_in_content parameter:\n- `True`: content = `<think>reasoning</think>answer` (single\
  \ field)\n- `False`: separate `reasoning_content` and `content` fields\n\nCritical: When using function calling, the client\
  \ MUST pass back `reasoning_content` in conversation history. Ignoring it (standard OpenAI format) causes severe output\
  \ anomalies.\n\nToken ID `151668` marks the closing `</think>` tag for parser detection.\n\n#### 1.5.1 reasoning_content\
  \ Lifecycle: Full Multi-Turn Message Structure\n\nQwen3 -- multi-turn tool-calling with reasoning:\n\nTurn 1 assistant response\
  \ (from API):\n{\n  \"role\": \"assistant\",\n  \"reasoning_content\": \"I need to call fn_a to get X...\",\n  \"content\"\
  : null,\n  \"tool_calls\": [{\"id\": \"call_1\", \"function\": {\"name\": \"fn_a\", \"arguments\": \"{}\"}}]\n}\n\nTurn\
  \ 2 request (include reasoning_content during active tool loop, strip for new question):\n[\n  {\"role\": \"user\", \"content\"\
  : \"Original question\"},\n  {\"role\": \"assistant\", \"reasoning_content\": \"I need to call fn_a...\", \"content\": null,\
  \ \"tool_calls\": [...]},\n  {\"role\": \"tool\", \"tool_call_id\": \"call_1\", \"content\": \"tool result\"}\n]\n\nRules:\n\
  - INCLUDE `reasoning_content` in history while tool loop is in progress\n- STRIP `reasoning_content` when starting a new\
  \ user question (HTTP 400 otherwise)\n- `enable_thinking=False` in `chat_template_kwargs` disables reasoning for simple\
  \ tasks\n- Context preservation: Qwen generates fresh CoT each turn; does NOT accumulate prior reasoning\n\nOpenAI o-series\
  \ comparison: OpenAI does NOT expose raw `reasoning_content` to API users.\nThey expose `reasoning_summary` (model-generated\
  \ summary). Attempting to extract raw CoT\nmay violate their AUP. DeepSeek and Qwen both expose full raw `reasoning_content`."
1_6_mcp_integration: "Qwen-Agent has first-class MCP support via `mcp_manager` singleton:\n\n- Three transport protocols:\
  \ stdio, SSE, streamable-http\n- Dynamic tool discovery: tools discovered at runtime from connected servers\n- Naming convention:\
  \ `server_name-tool_name` avoids collisions\n- Async architecture: MCP runs in daemon thread with own event loop, uses `asyncio.run_coroutine_threadsafe()`\
  \ for cross-thread execution\n- Install: `pip install -U \"qwen-agent[gui,rag,code_interpreter,mcp]\"`\n\nConfig structure:\n\
  {\n  \"mcpServers\": {\n    \"filesystem\": {\n      \"command\": \"npx\",\n      \"args\": [\"-y\", \"@anthropic/mcp-filesystem\"\
  ],\n      \"env\": {\"ALLOWED_DIRS\": \"/data\"}\n    }\n  }\n}\n\n#### 1.6.1 MCP Manager Singleton: Implementation Architecture\n\
  \nSingleton pattern (`MCPManager._instance` class variable, `new` method):\nclass MCPManager:\n    _instance = None\n\n\
  \    def new(cls, args, *kwargs):\n        if cls._instance is None:\n            cls._instance = super().new(cls)\n   \
  \     return cls._instance\n\n    def init(self):\n        if hasattr(self, \"_initialized\"):\n            return  # guard\
  \ against re-init on repeated MCPManager() calls\n        self._initialized = True\n        self.loop = asyncio.new_event_loop()\n\
  \        self.loop_thread = threading.Thread(target=self.loop.run_forever, daemon=True)\n        self.loop_thread.start()\n\
  \        self.clients = {}   # client_id -> MCPClient\n        self.processes = [] # subprocess handles for cleanup\n  \
  \      atexit.register(self._cleanup)\n\nSubprocess monkey-patching (lines 57-71): For stdio-based MCP servers, the manager\
  \ monkey-patches `subprocess.Popen` during server startup to intercept and record all spawned process handles. This ensures\
  \ every child process is tracked in `self.processes` for coordinated cleanup on exit -- without this, orphaned server processes\
  \ survive the Python process.\n\nAtexit cleanup sequence (registered in `init`):\ndef _cleanup(self):\n    # 1. Gracefully\
  \ close all MCPClient sessions (async, 1-second window)\n    future = asyncio.run_coroutine_threadsafe(self._close_all_clients(),\
  \ self.loop)\n    try:\n        future.result(timeout=1.0)\n    except Exception:\n        pass  # proceed to force-kill\
  \ regardless\n    # 2. Force-terminate remaining stdio subprocesses\n    for proc in self.processes:\n        try:\n   \
  \         proc.terminate()\n        except Exception:\n            pass\n    # 3. Stop background event loop\n    self.loop.call_soon_threadsafe(self.loop.stop)\n\
  \    # 4. Wait for loop thread to fully exit\n    self.loop_thread.join(timeout=5.0)\n\nCross-thread execution via run_coroutine_threadsafe:\n\
  future = asyncio.run_coroutine_threadsafe(\n    mcp_client.call_tool(tool_name, args),\n    self.loop\n)\nresult = future.result()\
  \  # blocks caller thread until coroutine completes\n\nConnection lifecycle:\n1. `connect()` -- initialize MCPClient based\
  \ on transport type\n   - `stdio` transport: triggered by `command` field in config (spawns subprocess)\n   - `SSE` transport:\
  \ triggered by `url` field (HTTP streaming)\n   - `streamable-http`: triggered by `url` + `type == \"streamable-http\"`\n\
  2. `discover_tools()` -- query server for available tools, build registry\n3. `call_tool()` -- submit via `run_coroutine_threadsafe`,\
  \ block for result\n4. `disconnect()` -- clean up connection and subprocess\n\nAutomatic reconnection protocol:\n1. Ping\
  \ session before each tool call\n2. On ping failure: create new MCPClient with same ID\n3. Reconnect using stored config\
  \ parameters\n4. Replace stale entry in `self.clients` dict\n5. Retry original tool call on fresh connection\n- SSE timeout:\
  \ `sse_read_timeout` (default 300 seconds)\n\nThread safety: Singleton prevents race conditions on manager access. All async\
  \ operations\nisolated in daemon thread. `future.result()` synchronizes caller. No shared state mutation\noutside the event\
  \ loop thread."
1_7_llm_backends: '| Backend | Class | Use case |

  |---------|-------|----------|

  | DashScope (Alibaba Cloud) | `QwenChatAtDS` | Primary cloud API |

  | OpenAI-compatible | `TextChatAtOAI` | vLLM, Ollama, any OpenAI-compat server |

  | OpenVINO | `OpenVINO` | Intel local inference |

  | Transformers | `Transformers` | HuggingFace local inference |


  Config: `{"model": "qwen3-32b", "api_key": "...", "model_server": "http://localhost:11434/v1", "generate_cfg": {...}}`


  `use_raw_api=True` enables vLLM native tool parsing instead of prompt-engineering-based function calling.'
1_8_rag_capabilities: 'Built into `Assistant` class:

  1. Documents parsed/chunked by `DocParser`

  2. Indexed via vector embeddings

  3. Retrieved chunks prepended to system message

  4. Handles documents up to 1M tokens


  Memory agent for QwQ/QvQ/Qwen3 uses `qwen-turbo` with explicit `max_input_tokens: 30000`.


  ---'
2_deepseek_tool_calling: ''
2_1_api_surface: 'OpenAI-compatible API at `https://api.deepseek.com`.


  | Model ID | Mode | Context | Tool calls |

  |----------|------|---------|------------|

  | `deepseek-chat` | Non-thinking (V3.2) | 128K | Yes |

  | `deepseek-reasoner` | Thinking (V3.2) | 128K | Yes |


  Both model IDs point to DeepSeek-V3.2 (685B parameters, MoE, MIT license).'
2_2_standard_tool_call_flow_non_thinking: 'Standard OpenAI-compatible flow:

  1. Define tools in `tools` array (max 128 functions, name max 64 chars)

  2. Send request with `tool_choice`: `auto` | `required` | `none` | `{"type":"function","function":{"name":"..."}}`

  3. Response contains `message.tool_calls` array

  4. Execute function, return `{"role":"tool","tool_call_id":"call_xxx","content":"result"}`

  5. Send updated history for final answer


  Supports parallel tool calls (multiple `tool_calls` in single response).'
2_3_thinking_with_tools_unique_to_deepseek_v3_2: "The key innovation: Previous reasoning models reason first, THEN execute\
  \ tools. DeepSeek V3.2 reasons WHILE executing tools, maintaining chain-of-thought across multiple tool calls.\n\nEnable\
  \ via:\n- Set model to `deepseek-reasoner`, OR\n- Pass `extra_body={\"thinking\": {\"type\": \"enabled\"}}`\n\nMulti-turn\
  \ flow within a single question:\nTurn 1.1: Model reasons -> emits reasoning_content + tool_calls\nTurn 1.2: App executes\
  \ tools -> returns results\nTurn 1.3: Model continues reasoning with tool results -> may call more tools\nTurn 1.N: Model\
  \ outputs final content (no more tool_calls)\n\nResponse message structure:\n{\n  \"role\": \"assistant\",\n  \"reasoning_content\"\
  : \"Let me check the exchange rate...\",\n  \"content\": null,\n  \"tool_calls\": [{\"id\": \"call_abc\", \"type\": \"function\"\
  , \"function\": {\"name\": \"lookup_fx_rate\", \"arguments\": \"{\\\"pair\\\":\\\"EUR/USD\\\"}\"}}]\n}\n\nCritical implementation\
  \ rules:\n1. During active thinking+tool loop: INCLUDE `reasoning_content` when appending assistant message (append `response.choices[0].message`\
  \ directly)\n2. For new user questions: REMOVE old `reasoning_content` from prior turns (API returns 400 error if `reasoning_content`\
  \ appears in input)\n3. Max tokens: 64K including reasoning content\n\n#### 2.3.1 DeepSeek reasoning_content Lifecycle:\
  \ Complete Message Sequence\n\nWithin a single question (tool loop in progress):\n# Turn 1: model returns tool call with\
  \ reasoning\nresp = client.chat.completions.create(\n    model=\"deepseek-reasoner\",\n    messages=[{\"role\": \"user\"\
  , \"content\": \"What is EUR/USD rate?\"}],\n    tools=[...]\n)\n# resp.choices[0].message has: reasoning_content + tool_calls\
  \ + content=None\n\n# Turn 2: pass back the FULL assistant message including reasoning_content\nmessages = [\n    {\"role\"\
  : \"user\", \"content\": \"What is EUR/USD rate?\"},\n    resp.choices[0].message,  # includes reasoning_content -- REQUIRED\
  \ during loop\n    {\"role\": \"tool\", \"tool_call_id\": \"call_abc\", \"content\": \"1.0842\"}\n]\nresp2 = client.chat.completions.create(model=\"\
  deepseek-reasoner\", messages=messages, tools=[...])\n# resp2.choices[0].message.content = final answer (no more tool_calls)\n\
  \nStarting a new question (strip old reasoning):\n# WRONG -- 400 error: reasoning_content in input for new question\nmessages\
  \ = [\n    {\"role\": \"user\", \"content\": \"Previous question\"},\n    {\"role\": \"assistant\", \"reasoning_content\"\
  : \"...\", \"content\": \"Previous answer\"},\n    {\"role\": \"user\", \"content\": \"New question\"}  # 400 if prior msg\
  \ has reasoning_content\n]\n\n# CORRECT -- strip reasoning_content from prior assistant turns\nmessages = [\n    {\"role\"\
  : \"user\", \"content\": \"Previous question\"},\n    {\"role\": \"assistant\", \"content\": \"Previous answer\"},  # reasoning_content\
  \ stripped\n    {\"role\": \"user\", \"content\": \"New question\"}\n]\n\nError when mishandled: HTTP 400: \"Missing `reasoning_content`\
  \ field in the assistant\nmessage at message index [X]\" OR HTTP 400 for unexpected `reasoning_content` in input.\n\n####\
  \ 2.3.2 reasoning_content: Streaming, budget_tokens, and Token Limits\n\nToken limits:\n- Default max `reasoning_content`\
  \ length: ~32K tokens\n- Extended max: up to 64K tokens combined (reasoning + content)\n- If `max_tokens` is too low, reasoning\
  \ may be truncated and final answer omitted\n- Recommended allocation: set `max_tokens` >= 8000 for tool-calling scenarios\n\
  \nbudget_tokens parameter (source: api-docs.deepseek.com/api-reference):\n- Controls how many tokens the model may allocate\
  \ to the reasoning phase\n- Acts as a soft ceiling within the overall `max_tokens` budget\n- If set too low, reasoning is\
  \ abbreviated -- acceptable for simple questions, risky for complex chains\n- If unset, the model manages allocation automatically\
  \ (proportional to inferred task complexity)\n- Practical guidance: `budget_tokens` ~70% of `max_tokens` for balanced reasoning+answer\n\
  \nStreaming `reasoning_content` (source: api-docs.deepseek.com/guides/reasoning_model):\nwith client.chat.completions.create(\n\
  \    model=\"deepseek-reasoner\",\n    messages=messages,\n    stream=True,\n    stream_options={\"include_usage\": True}\
  \  # required to get usage stats in final chunk\n) as stream:\n    for chunk in stream:\n        delta = chunk.choices[0].delta\
  \ if chunk.choices else None\n        if delta and delta.reasoning_content:\n            print(f\"[thinking] {delta.reasoning_content}\"\
  , end=\"\", flush=True)\n        if delta and delta.content:\n            print(f\"[answer] {delta.content}\", end=\"\"\
  , flush=True)\n        if chunk.usage:  # final streaming chunk only\n            print(f\"\\nTotal tokens: {chunk.usage.total_tokens}\"\
  )\n\nNote: Without `stream_options={\"include_usage\": True}`, the final usage summary chunk\nis suppressed. Usage data\
  \ (prompt_tokens, completion_tokens, total_tokens) is unavailable\nin mid-stream deltas -- it only arrives in the terminal\
  \ chunk."
2_4_strict_mode_beta: "Base URL: `https://api.deepseek.com/beta`\n\nSet `\"strict\": true` on function definitions. Enforces\
  \ JSON Schema compliance:\n- Supported types: object, string, number, integer, boolean, array, enum, anyOf, $ref, $def\n\
  - ALL object properties must be in `required`\n- `additionalProperties` must be `false`\n- `pattern` and `format` supported\
  \ for strings\n- `minLength`/`maxLength` NOT supported\n\n#### 2.4.1 Strict Mode: Full JSON Schema Support Matrix\n\nEnabling\
  \ strict mode (beta endpoint required):\nclient = OpenAI(base_url=\"https://api.deepseek.com/beta\", api_key=\"...\")\n\
  tools = [{\n    \"type\": \"function\",\n    \"function\": {\n        \"strict\": True,        # enable strict validation\n\
  \        \"name\": \"get_weather\",\n        \"parameters\": {\n            \"type\": \"object\",\n            \"properties\"\
  : {\n                \"city\": {\"type\": \"string\", \"pattern\": \"^[A-Z][a-z]+$\"},\n                \"format\": {\"\
  type\": \"string\", \"enum\": [\"celsius\", \"fahrenheit\"]}\n            },\n            \"required\": [\"city\", \"format\"\
  ],    # ALL properties must be listed\n            \"additionalProperties\": False       # REQUIRED in strict mode\n   \
  \     }\n    }\n}]\n\nFull support matrix:\n\n| JSON Schema Feature | Strict Supported | Notes |\n|--------------------|-----------------|-------|\n\
  | `object` | Yes | Must declare all props in `required` + `additionalProperties: false` |\n| `string` | Yes | Base type\
  \ |\n| `number` | Yes | Supports `minimum`, `maximum`, `exclusiveMinimum`, `exclusiveMaximum`, `multipleOf` |\n| `integer`\
  \ | Yes | Same numeric constraints as number |\n| `boolean` | Yes | Standard |\n| `array` | Yes | `minItems`/`maxItems`\
  \ NOT supported |\n| `enum` | Yes | Restricts to predefined values |\n| `anyOf` | Yes | Multiple valid type alternatives\
  \ |\n| `$ref` | Yes | Reusable schema module references |\n| `$def` | Yes | Recursive structure definitions |\n| `pattern`\
  \ (string regex) | Yes | Validated at inference time |\n| `format` (string) | Yes | email, hostname, ipv4, ipv6, uuid |\n\
  | `minLength` / `maxLength` | No | Not supported |\n| `minItems` / `maxItems` | No | Not supported |\n| `additionalProperties:\
  \ true` | No | Must be false |\n\nError format: HTTP 400 returned if schema does not conform or uses unsupported features.\n\
  Server validates schema at request time, not at generation time.\n\nPerformance: Strict mode adds inference-time schema\
  \ validation overhead but guarantees\n100% compliance with declared schema -- eliminates post-processing validation failures."
2_5_agentic_training_pipeline: "V3.2 introduced massive agent training data synthesis (source: arXiv 2512.02556):\n- 1,827\
  \ distinct environments (not just \"1,800+\")\n- 85,000+ complex instructions across 4 agent categories\n- Improved tool-use\
  \ compliance and generalization across all task types\n\n#### 2.5.1 Training Data Breakdown by Category\n\n| Category |\
  \ Count | Source Method |\n|----------|-------|--------------|\n| Code Agent | 24,667 | GitHub issue-PR pairs, filtered\
  \ by heuristics + LLM judgment |\n| Search Agent | 50,275 | Multi-agent pipeline sampling long-tail entities across domains\
  \ |\n| Code Interpreter | 5,908 | Jupyter Notebook environments (math, logic, data science) |\n| General Agent | 4,417 |\
  \ Synthesized from 1,827 task-oriented environments |\n| Total | 85,267 | |\n\nCode Agent: Built from millions of GitHub\
  \ issue-PR pairs. Each environment requires\nexecutable setup with dependency resolution and test validation.\n\nSearch\
  \ Agent: Multi-language, multi-difficulty. QA pairs verified through search tool\nvalidation. Largest category (59% of training\
  \ data).\n\nCode Interpreter: Jupyter-based environments focused on problems spanning mathematics,\nlogic, and data science.\
  \ Iterative execution with output validation.\n\nGeneral Agent: \"Hard to solve but easy to verify\" task design. Categories\
  \ include\ntravel planning, multi-step reasoning. Iterative difficulty escalation with human annotators\nand verification\
  \ agents ensuring data quality.\n\nSearch agent verification pipeline (5-stage hard-negative filtering):\n1. Sample long-tail\
  \ informative entities from large-scale web corpora\n2. Question-construction agent explores entity using configurable search\
  \ tools\n3. Multiple answer-generation agents produce diverse candidate responses\n4. Verification agent retains ONLY samples\
  \ where: ground truth is correct AND all model-generated candidates are verifiably incorrect\n5. Result: questions that\
  \ are \"hard to solve, easy to verify\" -- oracle has answer, model cannot trivially succeed\n\nCode agent correctness filter\
  \ (zero-tolerance dual check):\nACCEPT if: patch produces non-zero false-to-positive tests (issue fixed)\nREJECT if: any\
  \ pass-to-fail tests (regression introduced)\n# Both conditions enforced simultaneously -- correctness AND non-regression\n\
  \nRL training (GRPO -- Group Relative Policy Optimization):\n- Algorithm: GRPO (Group Relative Policy Optimization, DeepSeek's\
  \ RL variant)\n- Reward types: rule-based outcome rewards (code: tests pass/fail) + generative reward models (search: answer\
  \ quality scoring)\n- Design principle: all tasks must be \"hard to solve, easy to verify\" -- enables scalable RL without\
  \ expensive human labeling at each step\n- Unified training: reasoning + agentic tasks + human alignment in single RL stage\
  \ (not separate phases)\n- Cold-start: DeepSeek-V3 methodology used to unify reasoning and tool-use within single trajectories\
  \ BEFORE full RL begins\n\nTraining methodology:\n- All domains support both thinking and non-thinking modes simultaneously\n\
  - Six specialized training domains: mathematics, programming, general logical reasoning,\n  general agentic tasks, agentic\
  \ coding, agentic search\n- Post-training: over 10% of pre-training compute dedicated to reinforcement learning\n- Key innovation:\
  \ reasoning integrated INTO tool execution (not sequential think-then-act)"
2_6_model_architecture_v3_2: '| Spec | Value |

  |------|-------|

  | Parameters | 685B (MoE) |

  | Context window | 128K tokens |

