tldr: 'Unified memory taxonomy from 7 surveys: 3 temporal scopes, 4 agentic structures, 5 storage substrates, 3 control policies,
  3 core operations. v2.0 enrichment adds: per-quadrant 3D-8Q implementation examples with real systems, consolidation algorithm
  details, memory design decision tree (8 gates), and implementation code skeletons.'
1_temporal_scope_duration_based_classification: The foundational split mirrors human cognitive science (Atkinson-Shiffrin
  model).
1_1_working_memory_short_term: '| Property | Description |

  |----------|-------------|

  | Definition | Whatever fits inside the current context window |

  | Cognitive analog | Baddeley''s central executive + phonological loop + visuospatial sketchpad |

  | Capacity | Bounded by context window (4K-1M tokens depending on model) |

  | Persistence | Single session / single task |

  | Formats | System prompt, recent messages, scratchpad, chain-of-thought traces |

  | Bottleneck | Token budget -- everything competes for the same window |


  The "From Human Memory to AI Memory" paper (2504.15965) identifies four quadrants of working memory by crossing Object (Personal
  vs System) x Form (Parametric vs Non-Parametric):


  | Quadrant | Object | Form | Example |

  |----------|--------|------|---------|

  | I | Personal | Non-Parametric | Real-time context supplementation from user profile |

  | III | Personal | Parametric | Temporarily enhanced contextual understanding |

  | V | System | Non-Parametric | Complex reasoning scratchpad (chain-of-thought) |

  | VII | System | Parametric | KV-Cache reuse, prompt caching |'
1_2_long_term_memory: 'Persists across sessions. Three subtypes from cognitive science, all mapped to AI:


  #### 1.2.1 Episodic Memory (Explicit/Declarative)


  | Property | Description |

  |----------|-------------|

  | Definition | Concrete experience records with context (who, what, when, where) |

  | Cognitive analog | Tulving''s episodic memory -- autobiographical events |

  | Content | Tool calls, conversation turns, environment observations, task outcomes |

  | Example | "User asked for DD/MM/YYYY format on 2026-04-10 in session #47" |

  | Storage | Vector-indexed stores with timestamp + importance metadata |

  | Retrieval | Embedding similarity + recency decay + importance weighting |

  | AI quadrant (2504.15965) | Quadrant II: Personal, Non-Parametric, Long-Term |


  #### 1.2.2 Semantic Memory (Explicit/Declarative)


  | Property | Description |

  |----------|-------------|

  | Definition | Abstracted, de-contextualized knowledge -- facts without episodes |

  | Cognitive analog | Tulving''s semantic memory -- general world knowledge |

  | Content | Consolidated patterns, user preferences, domain facts, entity attributes |

  | Example | "User prefers DD/MM/YYYY" (stripped of episode context) |

  | Formation | Consolidation from episodic records via clustering/summarization |

  | Storage | Knowledge graphs, structured records, parametric weights |

  | AI quadrants (2504.15965) | Quadrant IV (Personal, Parametric, Long-Term) + Quadrant VIII (System, Parametric, Long-Term)
  |


  #### 1.2.3 Procedural Memory (Implicit/Non-Declarative)


  | Property | Description |

  |----------|-------------|

  | Definition | Reusable skills, executable plans, learned procedures |

  | Cognitive analog | Motor skills, habits, conditioned responses |

  | Content | Code libraries, plan templates, tool-use sequences, SOPs |

  | Example | Voyager''s JavaScript skill library indexed by natural language descriptions |

  | Storage | Executable repositories, SKILL.md files, compiled plan templates |

  | Retrieval | Natural language description matching, task-type routing |

  | AI quadrant (2504.15965) | Quadrant VI: System, Non-Parametric, Long-Term |'
1_3_sensory_memory_input_buffer: '| Property | Description |

  |----------|-------------|

  | Definition | Brief storage of raw input before processing |

  | Cognitive analog | Iconic (visual) and echoic (auditory) memory, ~250ms |

  | AI equivalent | Tokenization, input parsing, modality conversion |

  | Persistence | Transient -- consumed immediately by encoder |


  ---'
2_four_agentic_memory_structures_anatomy_of_agentic_memory_2602_19320: The Anatomy paper organizes MAG (Memory-Augmented Generation)
  systems by structure, orthogonal to temporal scope.
2_1_lightweight_semantic_memory: '| Property | Description |

  |----------|-------------|

  | Definition | Independent textual units embedded in vector space, retrieved via top-k similarity |

  | Subdivisions | RL-optimized compression, heuristic/prompt-optimized, context window management, token-level |

  | Strengths | Simple, scalable, fast retrieval |

  | Weakness | Loses structured relationships; semantic similarity != task relevance |

  | Representative | Standard RAG systems (FAISS, Chroma, Pinecone) |'
2_2_entity_centric_and_personalized_memory: '| Property | Description |

  |----------|-------------|

  | Definition | Information organized around explicit entities using structured records or attribute-value pairs |

  | Subdivisions | Entity-centric memory (structured entity records) + personalized memory (persistent user profiles) |

  | Strengths | Preserves entity relationships; supports complex queries |

  | Weakness | Requires upfront schema design |

  | Representative | Knowledge graphs, entity databases, user profile stores |'
2_3_episodic_and_reflective_memory: '| Property | Description |

  |----------|-------------|

  | Definition | Interactions organized into episodes or higher-level summaries with periodic consolidation |

  | Subdivisions | Episodic buffer with learned control, episodic recall for exploration, episodic reflection & consolidation,
  episodic utility learning |

  | Strengths | Captures temporal dynamics; enables learning from experience |

  | Weakness | Summarization drift; over-generalization risk |

  | Representative | Generative Agents (Park et al. 2023), Reflexion |'
2_4_structured_and_hierarchical_memory: '| Property | Description |

  |----------|-------------|

  | Definition | Explicit organization over stored information using graphs or multi-tier storage |

  | Subdivisions | Graph-structured memory, OS-inspired hierarchical memory, policy-optimized memory management |

  | Strengths | Rich relational queries; principled capacity management |

  | Weakness | Orchestration complexity; cold-start problem |

  | Representative | MemGPT (OS-inspired tiers), temporal knowledge graphs |


  ---'
3_the_3d_8q_taxonomy_from_human_memory_to_ai_memory_2504_15965: 'Three dimensions, eight quadrants:


  | Dimension | Values | Description |

  |-----------|--------|-------------|

  | Object | Personal vs System | Who benefits -- user modeling vs system reasoning |

  | Form | Parametric vs Non-Parametric | Embedded in weights vs stored externally |

  | Time | Short-Term vs Long-Term | Session-scoped vs cross-session |'
complete_eight_quadrant_map_with_implementation_examples: '| Q | Object | Form | Time | Role | Real System | Implementation
  Pattern |

  |---|--------|------|------|------|-------------|----------------------|

  | I | Personal | Non-Parametric | Short-Term | Working Memory | ChatGPT memory injection, MemGPT user-context | Fetch user
  profile at session start; inject as system prompt prefix block |

  | II | Personal | Non-Parametric | Long-Term | Episodic Memory | Generative Agents (Park 2023), Claude memory tool | Vector
  store of (episode_text, timestamp, importance); retrieved by embedding sim + recency decay |

  | III | Personal | Parametric | Short-Term | Working Memory | LoRA hot-swap per user, prefix tuning | Load per-user LoRA
  adapter (r=8, ~1MB) at session init; unload after session |

  | IV | Personal | Parametric | Long-Term | Semantic Memory | Personalized fine-tuning, EWC continual learning | Nightly
  LoRA fine-tune on user history; merge with EWC regularization to prevent forgetting |

  | V | System | Non-Parametric | Short-Term | Working Memory | ReAct trajectory, CoT scratchpad, Reflexion buffer | Append
  (obs, act) pairs to in-context buffer; compress oldest 30% when >50% context budget |

  | VI | System | Non-Parametric | Long-Term | Procedural Memory | Voyager skill lib, Claude Code /skills, CEX builders |
  File store of SKILL.md + scripts; TF-IDF/embedding index; top-k retrieved on task NL match |

  | VII | System | Parametric | Short-Term | Working Memory | KV-cache, Anthropic prompt cache, vLLM paged attn | Cache fixed
  prefix tokens; reuse KV pairs across requests; 5-min TTL; ~90% latency reduction |

  | VIII | System | Parametric | Long-Term | Semantic Memory | GPT-4 weights, RLHF policy, continual pre-training | Pre-training
  encodes world knowledge; update via fine-tune or RLHF; frozen at deployment |'
per_quadrant_deep_implementation_notes: "#### Q1 -- Personal, Non-Parametric, Short-Term (Session User Profile)\n- Storage:\
  \ Key-value store `{user_id: {name, preferences, timezone, format_prefs, recent_topics}}`\n- Retrieval trigger: Every new\
  \ session start; optional re-injection on topic-shift detection\n- Token cost: ~200-500 tokens per profile after compression\n\
  - MemGPT implementation: `conversation_search()` + `archival_memory_search()` inject ranked user facts before each LLM call\n\
  - CEX equivalent: CLAUDE.md brand context + `.cex/runtime/decisions/decision_manifest.yaml`\n\n#### Q2 -- Personal, Non-Parametric,\
  \ Long-Term (Episodic/Personalization Store)\n- Write formula: `if LLM.importance_score(episode) >= 7: store(embed(episode),\
  \ timestamp, score, user_id)`\n- Read formula: `score = 0.3  recency_decay(t) + 0.5  cos_sim(embed(query), embed(episode))\
  \ + 0.2 * importance`\n  where `recency_decay(t) = exp(-lambda * hours_since_creation)`\n- Generative Agents: Lambda=0.995/hour;\
  \ top-3 by combined score injected as memory stream\n- Scale: Efficient up to ~100K episodes per user with HNSW index; beyond\
  \ that needs sharding\n\n#### Q3 -- Personal, Parametric, Short-Term (Per-User Adapter)\n- Mechanism: LoRA adapter (rank=8,\
  \ ~1MB) per user; stored in model registry\n- Load latency: ~50ms for adapter merge; unload is free (in-memory only)\n-\
  \ Tradeoff vs Q1: Q3 is non-interpretable but captures implicit patterns Q1 misses; 10x storage cost\n- Production blocker:\
  \ Cold-start (no adapter for new users); privacy isolation requirements\n\n#### Q4 -- Personal, Parametric, Long-Term (Personalized\
  \ Weights)\n- Mechanism: EWC regularization: `L = L_task + lambda  sum(F_i  (theta_i - theta_i*)^2)` where F_i = Fisher\
  \ info\n- Update schedule: Nightly batch; requires 100+ new interactions before fine-tune worthwhile\n- Privacy risk: Personal\
  \ facts encoded in shared weight space; deletion requires unlearning (TOFU benchmark)\n- Alternative: Isolated LoRA adapters\
  \ per user (Q3 + persistence = Q4 without weight sharing risk)\n\n#### Q5 -- System, Non-Parametric, Short-Term (Reasoning\
  \ Scratchpad)\n- Formats: `<think>...</think>` blocks (Claude), `reasoning_effort` output (OpenAI o-series), CoT prefixes\n\
  - Buffer management: Sliding window (keep last N turns) or importance-sampled compression\n- Reflexion pattern: Evaluator\
  \ produces verbal feedback -> stored in scratchpad -> Actor uses on retry\n- CEX equivalent: N07's 8F reasoning trace in\
  \ context during task execution\n\n#### Q6 -- System, Non-Parametric, Long-Term (Skill Library / Procedural Store)\n- File\
  \ structure: `skills/{skill_name}/SKILL.md` (L1 metadata) + `run.py` (L2) + `appendix/` (L3)\n- Index: TF-IDF or sentence-transformer\
  \ embeddings over skill descriptions\n- Voyager retrieval: `query_program_info(task_description)` -> GPT-4 code generation\
  \ from top-5 skills\n- Acquisition: Human-authored (62k stars), RL-discovered (SAGE: 8.9% improvement, 59% fewer tokens),\
  \ autonomous synthesis\n- CEX equivalent: `archetypes/builders/{kind}-builder/` (13 ISOs = L1/L2/L3 progressive disclosure)\n\
  \n#### Q7 -- System, Parametric, Short-Term (KV-Cache / Prompt Cache)\n- Anthropic implementation: Cache after min 1024\
  \ tokens; 5-min TTL; cache_control breakpoint API\n- Cost: Cached tokens = 10% of input price; write cost = same as uncached;\
  \ break-even at 2+ reuses\n- vLLM paged attention: Pages of KV blocks (typically 16 tokens/page); LRU eviction under memory\
  \ pressure\n- Best practice: Put static system prompt + instructions first (cache-stable); dynamic user content last\n\n\
  #### Q8 -- System, Parametric, Long-Term (Foundation Knowledge)\n- Encoding: Attention patterns in transformer weights encode\
  \ factual associations at training time\n- Probe accuracy: GPT-4 class models recall factual associations with ~85% accuracy\
  \ on PopQA (no retrieval)\n- Limitation: Knowledge cutoff; hallucination on low-frequency facts; cannot be updated at inference\n\
  - Update paths: Full fine-tune (expensive, catastrophic forgetting risk) vs continual pre-training with EWC vs RAG (Q2/Q6\
  \ preferred for dynamic facts)\n\n---"
4_storage_substrates_representational_formats: '| Substrate | Characteristics | Strengths | Limitations |

  |-----------|-----------------|-----------|-------------|

  | Context-resident text | Summaries, scratchpads, CoT traces | Fully transparent, zero infrastructure | Capacity-limited,
  summarization drift |

  | Vector-indexed stores | Dense embeddings + ANN search (FAISS, HNSW) | Scales to millions of records | Loses structured
  relationships |

  | Structured stores | SQL databases, key-value maps, knowledge graphs | Preserves relational structure; complex queries
  | Requires upfront schema design |

  | Executable repositories | Code libraries, tool definitions, plan templates | Direct skill invocation; avoids regeneration
  errors | Requires verification and maintenance |

  | Hybrid stores | Multiple tiers with different access patterns | Balances transparency, scale, queryability | Orchestration
  complexity |


  ---'
5_control_policies_who_decides_memory_operations: '| Policy | Mechanism | Strengths | Weaknesses |

  |--------|-----------|-----------|------------|

  | Heuristic | Hard-coded rules (top-k, summarize every N turns, expire after D days) | Predictable, debuggable | Context-blind
  |

  | Prompted self-control | Memory ops exposed as tool calls; LLM decides when to invoke | Flexible, adaptive | Quality depends
  on instruction-following |

  | Learned control | Memory ops trained as RL policy actions | Discovers non-obvious strategies (e.g., preemptive summarization)
  | Expensive to train; interpretability challenges |


  ---'
6_memory_operations_write_manage_read_loop: ''
6_1_write_path_encoding: '| Operation | Description |

  |-----------|-------------|

  | Filtering | Reject low-signal records (noise, redundancy) |

  | Canonicalization | Normalize dates, names, quantities |

  | Deduplication | Merge overlapping entries |

  | Priority scoring | Rank by task relevance and novelty |

  | Metadata tagging | Timestamp, source, task label, confidence |

  | Importance scoring | Self-assessed importance (1-10) for retrieval weighting |'
6_2_manage_path_consolidation_maintenance: '| Operation | Description |

  |-----------|-------------|

  | Consolidation | Episodic -> semantic transitions; offline clustering + abstraction |

  | Compression | Rolling summaries; hierarchical abstraction (turn -> session -> topic) |

  | Contradiction resolution | Flag conflicts; source attribution; temporal versioning |

  | Temporal versioning | Prefer newest records; track record lineage |

  | Eviction | LRU, LFU, or learned priority scoring under capacity constraints |

  | Forgetting | Time-based expiration, policy-triggered discard, machine unlearning |

  | Reconsolidation | Reactivate stored memory, modify/update to adapt to new information |

  | Reflection | Cluster observations; extract higher-order generalizations from episodes |'
6_3_read_path_retrieval: '| Operation | Description |

  |-----------|-------------|

  | Query formulation | LLM reformulation, multi-query fan-out, subgoal-based signals |

  | Two-stage retrieval | Fast filtering (BM25/metadata) -> slow reranking (cross-encoder) |

  | Retrieval gating | Decide whether retrieval is necessary (Self-RAG pattern) |

  | Token budgeting | Dynamically allocate context space between memory and task |

  | Caching | High-frequency records (user preferences) pre-loaded |

  | Multi-signal scoring | Recency (exponential decay) x relevance (embedding) x importance (self-assessed) |


  ---'
7_memory_consolidation_and_tiering: ''
7_1_consolidation_mechanisms_with_real_system_mappings: '| Mechanism | Description | Cognitive Analog | Real System | Algorithm
  |

  |-----------|-------------|-----------------|-------------|-----------|

  | Summarization | Compress episodes into compact representations | Sleep-based consolidation | MemGPT `summarize_conversation()`,
  Zep memory | Sliding-window LLM summarizer; trigger at 75% context capacity |

  | Reflection synthesis | Cluster observations -> extract higher-order rules | Metacognition | Generative Agents reflection
  stream | Rate-limited: reflect every N observations (default N=10); 3-step: rate, synthesize, store |

  | Temporal-hierarchical trees | Nest summaries at turn/session/topic granularity | Hippocampal replay | MemoryOS HH-page
  structure, Tarsier | Turn->Session->Topic nesting; upward propagation on buffer overflow |

  | Episodic -> semantic promotion | De-contextualize recurring patterns into facts | Systems consolidation | Generative Agents
  plan+act, MIRIX | Cluster k=5 similar episodes; LLM extracts invariant fact; store as entity attribute |

  | Graph restructuring | LLM-driven reorganization of knowledge graph edges | Schema assimilation | GraphRAG community detection,
  TKG updates | Periodic entity resolution + edge pruning + community re-clustering |

  | Reconsolidation | Reactivate and modify stored memory on new evidence | Reconsolidation (Brown 2003) | MemGPT `memory_insert()`
  overwrites | Retrieve old record, diff with new info, LLM-merge, update timestamp |'
7_1a_consolidation_algorithm_detail_generative_agents_pattern: "# Reflection trigger: every N new observations\nif len(recent_observations)\
  \ >= N:\n    # Step 1: Rate importance of last 100 memories (1-10 scale)\n    statements = agent.memory.get_recent(100)\n\
  \    salient = [s for s in statements if LLM.importance(s) >= 7]\n\n    # Step 2: Identify high-level questions worth reflecting\
  \ on\n    questions = LLM.generate_reflection_questions(salient, n=3)\n\n    # Step 3: For each question, retrieve evidence\
  \ + synthesize insight\n    for q in questions:\n        evidence = agent.memory.retrieve(q, top_k=5)\n        insight =\
  \ LLM.synthesize_insight(q, evidence)\n        agent.memory.add(insight, type=\"reflection\", importance=9)\nSource: Generative\
  \ Agents (Park et al. 2023)"
7_1b_memoryos_hierarchical_heat_page_architecture: 'MemoryOS (2026) implements a 3-tier OS-inspired architecture with heat-based
  promotion/demotion:


  | Tier | Analog | Capacity | Access | Heat Threshold |

  |------|--------|----------|--------|----------------|

  | Hot buffer (L1) | CPU registers/L1 cache | ~20 pages | Immediate in-context | heat > 0.7 |

  | Warm store (L2) | RAM | ~200 pages | Fast DB query (<10ms) | 0.3 < heat <= 0.7 |

  | Cold archive (L3) | Disk/SSD | Unbounded | Vector search (50-200ms) | heat <= 0.3 |


  Heat formula: `heat(p) = alpha  recency(p) + beta  access_freq(p) + gamma * importance(p)`

  Typical weights: alpha=0.4, beta=0.3, gamma=0.3


  Promotion: L3 -> L2 on access; L2 -> L1 when heat > 0.7 + space available

  Demotion: L1 -> L2 when heat drops below 0.3 for 30+ minutes'
7_1c_mirix_6_module_memory_architecture_2502_11840: 'MIRIX divides agent memory into 6 specialized modules rather than monolithic
  storage:


  | Module | Content | Consolidation Rule |

  |--------|---------|-------------------|

  | Kernel memory | Immutable facts (name, date, core identity) | Manual update only; never auto-consolidated |

  | Episodic buffer | Raw conversation turns | Compress to summary every 20 turns |

  | Semantic store | Abstracted knowledge from episodes | Promoted from episodic via reflection |

  | Procedural store | Tool use patterns, workflows | Synthesized from successful task completions |

  | Resource index | External document references | Updated on document access; LRU eviction |

  | Working memory | Active task context | Cleared after task completion |'
7_2_tiering_architecture_os_inspired: '| Tier | Analog | Access Speed | Capacity | Content |

  |------|--------|-------------|----------|---------|

  | Main context (RAM) | Working memory | Instant (in-context) | Limited (context window) | System prompt, recent messages,
  active records |

  | Recall storage (disk) | Episodic LTM | Fast (DB query) | Large (millions of records) | Searchable database of all past
  interactions |

  | Archival storage (cold) | Semantic LTM | Slow (vector search) | Very large | Documents, long-term knowledge, compressed
  history |'
7_3_eviction_strategies: '| Strategy | Description | Risk |

  |----------|-------------|------|

  | LRU (Least Recently Used) | Evict oldest-accessed records | Loses infrequent but critical info |

  | LFU (Least Frequently Used) | Evict least-accessed records | Cold-start bias against new records |

  | Importance-weighted | Learned priority scoring | Requires accurate importance estimation |

  | Time-based expiration | TTL with linear/exponential decay | Silent loss if TTL too aggressive |

  | Capacity-triggered compression | Summarize when buffer exceeds threshold | Summarization drift |


  ---'
8_skill_libraries_as_procedural_memory_2602_12430: ''
8_1_definition: 'Agent skills are "self-contained packages comprising a structured instruction file (SKILL.md), optional scripts,
  reference documents, and assets." They differ from tools: "tools execute and return results, whereas skills prepare the
  agent to solve a problem by injecting procedural knowledge."'
8_2_three_level_progressive_disclosure: '| Level | Content | Load Timing | Token Cost |

  |-------|---------|-------------|------------|

  | L1 | SKILL.md metadata (name, description) | Startup | ~dozens tokens per skill |

  | L2 | Full procedural instructions | On skill trigger | Hundreds to thousands |

  | L3 | Executable scripts, technical appendices | On-demand | Variable |'
8_3_six_acquisition_modalities: '| Method | Mechanism | Key Result |

  |--------|-----------|------------|

  | Human-authored | Manual SKILL.md creation | 62k+ GitHub stars within months (Claude Code) |

  | RL with libraries | SAGE sequential rollouts + skill-integrated reward | 8.9% improvement, 59% fewer tokens |

  | Autonomous discovery | SEAgent curriculum generation + specialist-to-generalist | 11.3% -> 34.5% success gains |

  | Structured bases | CUA-Skill parameterized graphs | 57.5% SOTA on GUI tasks |

  | Compositional synthesis | Dynamic skill selection/composition | 91.6% on AIME benchmark |

  | Skill compilation | Multi-agent -> single-agent compression | Phase transition at critical library size |'
8_4_skills_vs_tools_vs_rag: '| Dimension | Agent Skills | Tools (MCP) | RAG Passages |

  |-----------|-------------|-------------|-------------|

  | Role | Procedural knowledge injection | Action execution | Factual retrieval |

  | Content | Workflows + code + permissions | API endpoints | Document chunks |

  | Activation | Context modification (hidden) | Explicit invocation | Query-triggered |

  | Effect | Changes how agent thinks | Changes what agent can do | Changes what agent knows |

  | Persistence | Permanent in skill library | Session-configured | Index-dependent |'
8_5_security_considerations: '26.1% of skills in the wild contain at least one vulnerability. Three-component governance framework:

  1. Verification gates: Static analysis -> LLM semantic check -> behavioral sandbox -> permission validation

  2. Trust tiers: T1 (unvetted, instruction-only) -> T2 (verified) -> T3 (vendor-certified) -> T4 (trusted partner)

  3. Lifecycle trust evolution: Runtime monitoring with promotion/demotion based on behavior


  ---'
9_representative_systems_timeline: '| System | Year | Primary Memory | Substrate | Control |

  |--------|------|---------------|-----------|---------|

  | RAG | 2020 | Retrieval-augmented semantic | Vector index | Heuristic |

  | ReAct | 2022 | Trajectory traces | Context-resident | Heuristic |

  | Reflexion | 2023 | Reflective episodic | Context-resident | Prompted |

  | Generative Agents | 2023 | Episodic + reflective | Vector-indexed | Heuristic (recency/relevance/importance) |

  | Voyager | 2023 | Procedural (skill library) | Executable code | Heuristic |

  | MemGPT | 2024 | Hierarchical virtual (OS-inspired) | Hybrid (context + DB + vector) | Prompted (tool calls) |

  | MIRIX | 2025 | Multi-module (6 types) | Hybrid | Prompted |

  | MemoryOS | 2025 | OS-inspired hierarchical | Hybrid | Learned |

  | Agentic Memory | 2026 | Unified STM/LTM | Hybrid | Learned (RL policy) |


  ---'
10_benchmarks_and_evaluation: ''
10_1_key_benchmarks: '| Benchmark | Year | Tokens | Sessions | Focus |

  |-----------|------|--------|----------|-------|

  | HotpotQA | 2018 | ~1K | 1 | Factual QA (saturated for memory eval) |

  | LoCoMo | 2024 | ~20K | 35 | Factual QA + event summarization + dialogue |

  | MemBench | 2025 | ~100K | N/A | Factual vs reflective; effectiveness/efficiency/capacity |

  | MemoryAgentBench | 2025 | Variable | Multi-turn | 4 competencies: retrieval, learning, understanding, forgetting |

  | LongMemEval-M | 2025 | >1M | Variable | Requires external memory (exceeds any context window) |

  | MemoryArena | 2026 | Multi-session | Agentic tasks | Active memory use (passive recall models drop to 40-60%) |'
10_2_four_layer_evaluation_stack_2603_07670: '| Layer | What It Measures |

  |-------|-----------------|

  | L1 Task Effectiveness | Success rate, factual correctness, plan completion |

  | L2 Memory Quality | Precision/recall of retrieved records, contradiction rate, staleness, coverage |

  | L3 Efficiency | Latency per operation, prompt tokens consumed, storage growth |

  | L4 Governance | Privacy leakage, deletion compliance, access-scope violations |'
10_3_context_saturation_gap: 'Critical metric from Anatomy paper (2602.19320): `Delta = Score_MAG - Score_FullContext`. A
  benchmark meaningfully evaluates agentic memory only when Delta >> 0 (tasks exceed effective context capacity). ---'
11_architecture_deployment_patterns: '| Pattern | Description | Use Case |

  |---------|-------------|----------|

  | A: Monolithic Context | All memory in prompt; zero infrastructure | Short-lived agents, prototyping |

  | B: Context + Retrieval Store | Working memory in context; LTM in vector/structured store | Coding assistants, enterprise
  copilots (workhorse) |

  | C: Tiered with Learned Control | Multiple tiers with RL-trained orchestration | Long-running, high-stakes deployments
  |


  ---'
12_open_research_frontiers: '1. Principled consolidation -- estimating importance without future knowledge

  2. Causally grounded retrieval -- beyond semantic similarity to "what caused this?"

  3. Trustworthy reflection -- avoiding self-reinforcing errors in reflection loops

  4. Learning to forget -- selective forgetting under safety constraints + machine unlearning

  5. Multimodal embodied memory -- fusing text, vision, audio, proprioception

  6. Multi-agent memory governance -- access control, consensus protocols for shared stores

  7. Memory-efficient architectures -- sparse retrieval, compressed vectors

  8. Neuroscience integration -- spreading activation, reconsolidation, spaced repetition

  9. Foundation models for memory -- task-agnostic memory controllers

  10. Standardized evaluation -- GLUE-style leaderboard for memory systems


  ---'
13_mapping_to_cex_kinds: '| Taxonomy Concept | CEX Kind | Pillar | CEX Role |

  |-----------------|----------|--------|----------|

  | Entity facts (semantic memory about entities) | `entity_memory` | P10 | Stores facts about specific entities (people,
  orgs, concepts). Quadrant II/IV in 3D-8Q. |

  | Memory access policy (which memory, who reads) | `memory_scope` | P02 | Configures per-agent memory access -- maps to
  control policy layer (heuristic/prompted/learned). |

  | Compressed history (consolidation output) | `memory_summary` | P10 | Rolling summaries, hierarchical abstractions. The
  OUTPUT of consolidation operations. |

  | Memory classification (type taxonomy + decay) | `memory_type` | P10 | Classifies memory by source, confidence, decay rate.
  Maps directly to this taxonomy''s temporal scope + 3D-8Q quadrants. |

  | Search index (retrieval infrastructure) | `knowledge_index` | P10 | BM25/FAISS indexes. The READ PATH infrastructure --
  substrate for vector-indexed stores. |'
cex_coverage_gaps_identified: '| Taxonomy Concept | Status in CEX | Recommendation |

  |-----------------|---------------|----------------|

  | Procedural memory / skill library | No dedicated kind | Consider `skill_definition` kind (P04 or P03) for SKILL.md-style
  packages |

  | Episodic memory (raw episodes) | Partially covered by `learning_record` (P11) | `learning_record` captures corrections,
  not full episode traces |

  | Reflection / meta-memory | No dedicated kind | Consider `reflection_record` kind (P10) for synthesized generalizations
  |

  | Memory consolidation policy | No dedicated kind | Could extend `memory_type` with consolidation rules |

  | Memory tiering config | No dedicated kind | Could extend `memory_scope` with tier definitions (RAM/disk/cold) |

