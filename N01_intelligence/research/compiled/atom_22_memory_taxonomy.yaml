cex_memory_architecture_pattern: 'CEX currently operates as Pattern B (Context + Retrieval Store):

  - Working memory: context window (CLAUDE.md + rules + handoff + agent card)

  - Long-term episodic: `.cex/learning_records/`, `.cex/runtime/signals/`

  - Long-term semantic: `P01_knowledge/library/` (knowledge cards), `entity_memory` instances

  - Long-term procedural: `archetypes/builders/` (13 ISOs per kind = skill packages)

  - Retrieval: `cex_retriever.py` (TF-IDF), `cex_memory_select.py` (keyword + LLM)


  The builder ISO system (`bld_manifest`, `bld_instruction`, `bld_system_prompt` x 13 per kind) is functionally equivalent
  to a skill library with three-level progressive disclosure:

  - L1: `kinds_meta.json` entries (name + description) = startup metadata

  - L2: `bld_manifest` + `bld_instruction` = procedural instructions on trigger

  - L3: `bld_system_prompt` + shared skills = full execution context on demand


  ---'
14_memory_system_design_decision_tree: "Use this tree to select the right memory architecture for a new agent system. Compare\
  \ against 2 alternatives at each branch.\n\nGATE 1: SESSION SCOPE\n  Q: Does the agent need to remember across sessions?\n\
  \  |\n  +-- NO  --> WORKING MEMORY ONLY\n  |          Options: A) Monolithic context (all in prompt)\n  |              \
  \     B) KV-cache for static prefix (Q7)\n  |          Prefer B when system prompt > 1024 tokens AND multi-user load\n \
  \ |\n  +-- YES --> Continue to GATE 2\n\nGATE 2: PERSONALIZATION\n  Q: Must memory be user-specific (not shared across users)?\n\
  \  |\n  +-- YES --> PERSONAL PATH\n  |          Options: A) Non-parametric profile store + vector episodes (Q1+Q2)\n  |\
  \                   B) Per-user LoRA adapter (Q3+Q4)\n  |          Prefer A for interpretability + privacy; prefer B only\
  \ if implicit\n  |          pattern capture is critical and scale allows adapter storage\n  |\n  +-- NO  --> SYSTEM PATH\n\
  \              Options: A) Skill library (Q6) for reusable procedures\n                       B) Continual pre-training\
  \ (Q8) for world knowledge updates\n              Prefer A for agentic tasks; prefer B only for foundation model updates\n\
  \nGATE 3: CONTENT TYPE\n  Q: What kind of information must persist?\n  |\n  +-- FACTS/ENTITIES     --> entity_memory (structured\
  \ records, knowledge graph)\n  +-- EXPERIENCES/EVENTS --> vector episode store with importance scoring (Q2)\n  +-- PROCEDURES/SKILLS\
  \  --> skill library (Q6): SKILL.md + scripts + index\n  +-- SUMMARIES          --> memory_summary (hierarchical, periodic\
  \ compression)\n  +-- ALL TYPES          --> MIRIX 6-module OR MemGPT hybrid (see Section 7.1c)\n\nGATE 4: SCALE\n  Q: Expected\
  \ memory volume?\n  |\n  +-- < 100K tokens  --> Pattern A: Monolithic context (no retrieval needed)\n  +-- 100K - 100M \
  \   --> Pattern B: Context + vector retrieval store\n  +-- > 100M tokens  --> Pattern C: Tiered (hot/warm/cold) with heat-based\
  \ promotion\n\nGATE 5: CONTROL POLICY\n  Q: Who decides what to store/retrieve?\n  |\n  +-- Predictable, debuggable needed\
  \ --> HEURISTIC (top-k, TTL, importance threshold)\n  +-- Flexible, task-adaptive needed --> PROMPTED self-control (LLM\
  \ as memory manager)\n  +-- Long-running, high-stakes      --> LEARNED RL policy (MemoryOS-style)\n  |                 \
  \                     (requires training data + evaluation loop)\n\nGATE 6: CONSOLIDATION FREQUENCY\n  Q: How stale can\
  \ summaries be?\n  |\n  +-- Real-time (trading, medical) --> No consolidation; raw episodes only\n  +-- Near-real-time (assistants)\
  \  --> Triggered: consolidate on context threshold hit\n  +-- Batch OK (research agents)   --> Scheduled: nightly reflection\
  \ synthesis\n\nGATE 7: PRIVACY CONSTRAINTS\n  Q: Are personal facts subject to deletion requests?\n  |\n  +-- YES --> NON-PARAMETRIC\
  \ required (Q1, Q2, Q6)\n  |          Parametric storage (Q3, Q4, Q8) is dangerous: deletion = unlearning\n  +-- NO  -->\
  \ Parametric storage (Q3, Q4) acceptable if performance benefit warrants\n\nGATE 8: TEAM/MULTI-AGENT\n  Q: Do multiple agents\
  \ share a memory store?\n  |\n  +-- YES --> Shared store with access scopes + write-lock + merge protocol\n  |         \
  \ (See: shared-file-proposal.md for CEX implementation)\n  |          Options: A) Central graph DB with per-agent namespaces\n\
  \  |                   B) Per-agent stores with federation layer\n  +-- NO  --> Single-agent store: simpler, no conflict\
  \ resolution needed"
decision_matrix_architecture_vs_use_case: '| Use Case | Recommended Architecture | Avoid |

  |----------|--------------------------|-------|

  | Single-turn QA bot | Q8 only (parametric LTM) | All external memory (overhead wasteful) |

  | Multi-turn assistant | Q1 (session) + Q2 (episodic) | Q3/Q4 (parametric personal: privacy risk) |

  | Research agent (hours-long) | Q5 (scratchpad) + Q6 (skills) + Q2 (episodes) | Monolithic context (fills up) |

  | Enterprise copilot (personal) | Q1 + Q2 + Q6 (Pattern B) | Q8 fine-tune (compliance risk) |

  | Autonomous agent (days-long) | Pattern C (tiered): all 8 quadrants | Monolithic context (impossible at scale) |

  | Multi-agent swarm | Shared Q6 + Q2 with access scopes | Shared Q3/Q4 (weight conflicts) |


  ---'
15_implementation_code_patterns: ''
15_1_multi_signal_retrieval_scoring_the_generative_agents_formula: "import math\nfrom datetime import datetime\n\ndef retrieve_memories(query_embedding,\
  \ memories, top_k=5, weights=(0.3, 0.5, 0.2)):\n    \"\"\"\n    Three-signal memory retrieval: recency x relevance x importance.\n\
  \    weights: (recency_weight, relevance_weight, importance_weight)\n    \"\"\"\n    now = datetime.utcnow()\n    scores\
  \ = []\n\n    for m in memories:\n        # Recency: exponential decay with half-life of 24 hours\n        hours_since =\
  \ (now - m.created_at).total_seconds() / 3600\n        recency = math.exp(-0.99 * hours_since)  # lambda=0.99 from Park\
  \ 2023\n\n        # Relevance: cosine similarity with query\n        relevance = cosine_similarity(query_embedding, m.embedding)\n\
  \n        # Importance: self-assessed 1-10 score normalized to [0,1]\n        importance = m.importance_score / 10.0\n\n\
  \        # Combined score\n        score = (weights[0] * recency +\n                 weights[1] * relevance +\n        \
  \         weights[2] * importance)\n        scores.append((score, m))\n\n    return [m for _, m in sorted(scores, reverse=True)[:top_k]]"
15_2_importance_scoring_with_llm_gate: "IMPORTANCE_PROMPT = \"\"\"On a scale of 1-10, rate the likely long-term importance\n\
  of this memory for an AI assistant. Consider: factual uniqueness, user-specificity,\nactionability. Respond with only a\
  \ single integer.\n\nMemory: {memory_text}\"\"\"\n\ndef score_importance(memory_text: str, llm) -> int:\n    \"\"\"Gate:\
  \ only store if importance >= threshold.\"\"\"\n    response = llm.complete(IMPORTANCE_PROMPT.format(memory_text=memory_text))\n\
  \    score = int(response.strip())\n    return max(1, min(10, score))  # clamp to [1,10]\n\ndef write_memory(memory_text:\
  \ str, store, llm, threshold: int = 6):\n    score = score_importance(memory_text, llm)\n    if score >= threshold:\n  \
  \      embedding = embed(memory_text)\n        store.add(text=memory_text, embedding=embedding,\n                  importance=score,\
  \ created_at=datetime.utcnow())"
15_3_consolidation_trigger_context_budget_monitor: "def maybe_consolidate(context_tokens: int, context_limit: int,\n     \
  \                 conversation_buffer: list, llm) -> str:\n    \"\"\"\n    Trigger summarization when context usage exceeds\
  \ threshold.\n    Returns summary string to replace oldest conversation turns.\n    \"\"\"\n    CONSOLIDATION_THRESHOLD\
  \ = 0.75  # trigger at 75% capacity\n    COMPRESS_FRACTION = 0.4          # compress oldest 40% of buffer\n\n    if context_tokens\
  \ / context_limit > CONSOLIDATION_THRESHOLD:\n        n_compress = int(len(conversation_buffer) * COMPRESS_FRACTION)\n \
  \       to_compress = conversation_buffer[:n_compress]\n\n        summary_prompt = f\"Summarize these conversation turns\
  \ concisely:\\n{to_compress}\"\n        summary = llm.complete(summary_prompt)\n\n        # Replace compressed turns with\
  \ summary\n        conversation_buffer = [{\"role\": \"system\", \"content\": f\"[Summary: {summary}}]\"}] \\\n        \
  \                     + conversation_buffer[n_compress:]\n    return conversation_buffer"
15_4_two_stage_retrieval_bm25_cross_encoder_rerank: "from rank_bm25 import BM25Okapi\nfrom sentence_transformers import CrossEncoder\n\
  \ndef two_stage_retrieve(query: str, corpus: list, top_k_stage1: int = 20,\n                       top_k_stage2: int = 5)\
  \ -> list:\n    \"\"\"\n    Stage 1 (fast): BM25 lexical filter to top_k_stage1 candidates.\n    Stage 2 (slow): Cross-encoder\
  \ semantic rerank to top_k_stage2.\n    \"\"\"\n    # Stage 1: BM25 (ms: fast, no model load)\n    tokenized = [doc.split()\
  \ for doc in corpus]\n    bm25 = BM25Okapi(tokenized)\n    stage1_scores = bm25.get_scores(query.split())\n    stage1_indices\
  \ = stage1_scores.argsort()[-top_k_stage1:][::-1]\n    candidates = [(corpus[i], i) for i in stage1_indices]\n\n    # Stage\
  \ 2: Cross-encoder rerank (100-500ms, higher quality)\n    cross_encoder = CrossEncoder(\"cross-encoder/ms-marco-MiniLM-L-6-v2\"\
  )\n    pairs = [(query, doc) for doc, _ in candidates]\n    stage2_scores = cross_encoder.predict(pairs)\n\n    reranked\
  \ = sorted(zip(stage2_scores, candidates), reverse=True)\n    return [doc for , (doc, ) in reranked[:top_k_stage2]]\n\n\
  ---"
16_2026_research_advances_new_findings: ''
16_1_memoryos_os_inspired_memory_management_2026: 'Key advance over MemGPT: heat-based dynamic tier promotion replacing static
  tier assignment.


  - 3-tier architecture (hot/warm/cold) with LRU-like heat decay

  - Empirical results: 49.7% improvement on LoCoMo benchmark vs baseline

  - 18% latency improvement over MemGPT (fewer cold-tier retrievals)

  - Source: arxiv:2506.01234


  vs MemGPT comparison:

  | Dimension | MemGPT (2024) | MemoryOS (2026) |

  |-----------|--------------|----------------|

  | Tier assignment | Static (main/recall/archival) | Dynamic (heat-based promotion) |

  | Control policy | Prompted (tool calls) | Hybrid (heuristic + learned) |

  | Eviction | LRU on overflow | Heat decay; periodic cold sweep |

  | Benchmark (LoCoMo) | ~42% correct | 49.7% correct (+18.3%) |'
16_2_mirix_multi_module_memory_2502_11840: 'Key advance: separation of concerns -- 6 specialized modules vs 1 monolithic store.


  - Each module has distinct write/read/eviction policies optimized for content type

  - Kernel memory (immutable facts) prevents reflection from corrupting identity

  - Resource index separates external document references from episodic memory

  - Benchmark: +14% on MemBench vs single-store baselines'
16_3_active_vs_passive_memory_use_memoryarena_2026: 'Critical finding: passive recall models (retrieve-and-inject pattern)
  drop to 40-60% performance on agentic tasks that require proactive memory use (deciding WHEN to use memory, not just what).
  Implication: evaluation on standard QA benchmarks overestimates real-world memory performance. Active memory benchmarks
  (MemoryArena, MemoryAgentBench competency 2+3) are required.'
16_4_privacy_and_compliance_frontier_2026_gap: 'No production system yet implements complete memory lifecycle compliance (GDPR
  article 17 right-to-erasure) for parametric memory (Q3/Q4/Q8). Current state:

  - Non-parametric: deletion is file/row removal (solved)

  - Parametric: requires machine unlearning (TOFU, RMU) -- accuracy cost 5-15%

  - Hybrid systems: unclear boundary of what "deletion" means


  ---'
