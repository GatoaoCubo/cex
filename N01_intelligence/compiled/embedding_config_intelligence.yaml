tldr: Specifies the advanced embedding and chunking strategy for the N01 RAG knowledge base, using a specialized model and
  semantic chunking for high-fidelity retrieval of research-grade content.
1_purpose: This document defines the vector embedding model and the intelligent chunking strategy for all documents ingested
  into the N01 Research & Intelligence Nucleus knowledge base. This configuration is critical for the performance of N01's
  Retrieval-Augmented Generation (RAG) capabilities.
2_embedding_model_specification: 'The model is chosen for its state-of-the-art performance on technical and academic corpora.


  - Model Provider: `Google`

  - Model Name: `text-embedding-005-research` (A hypothetical model tuned for scientific and technical documents)

  - Vector Dimensions: `1024` (To capture the nuance of complex, dense information)

  - Distance Metric: `Cosine Similarity` (Standard for normalized, high-dimensional vectors)

  - Normalization: `Required (L2 Norm)`'
3_chunking_strategy_hierarchical_semantic: A static chunk size is suboptimal for the varied documents N01 processes. We employ
  a hierarchical, content-aware chunking strategy.
level_1_document_pre_processing:
- 'Action: Extract clean, structured text from source formats (PDF, HTML).'
- 'Metadata Extraction: Automatically extract and attach document-level metadata:'
- '`doc_id`'
- '`title`'
- '`authors`'
- '`publication_year`'
- '`source_type` (e.g., `academic_paper`, `market_report`, `patent`)'
level_2_semantic_chunking: "Instead of fixed-size chunks, we split based on semantic boundaries to preserve context.\n- Primary\
  \ Strategy: Chunk by structural elements of the document.\n  - For academic papers: Chunk by sections (`Abstract`, `Introduction`,\
  \ `Methodology`, `Conclusion`). Sub-chunk oversized sections by paragraph.\n  - For market reports: Chunk by section and\
  \ subsection headings.\n- Chunk Size Target: Aim for chunks between `300-600` tokens.\n- Chunk Overlap: `~15%` of chunk\
  \ size (e.g., ~75 tokens for a 500-token chunk) to ensure smooth transitions between related concepts."
level_3_metadata_enrichment: 'Each chunk vector is stored with a rich set of metadata to enable powerful hybrid search (semantic
  + filtered).

  - `chunk_id`

  - `doc_id` (inherited from parent)

  - `title` (inherited from parent)

  - `authors` (inherited from parent)

  - `publication_year` (inherited from parent)

  - `source_type` (inherited from parent)

  - `chunk_summary`: A concise, AI-generated summary of the chunk''s content (approx. 1-2 sentences). This can be used for
  reranking or previewing search results.

  - `keywords`: AI-generated keywords for the chunk''s specific content.'
4_vector_database_configuration:
- 'Development/Staging: `FAISS` (local, for rapid iteration)'
- 'Production: `Weaviate` or `Pinecone` (Managed, for scalability and hybrid search capabilities)'
- 'Index Type: HNSW (Hierarchical Navigable Small World) for a balance of speed and recall accuracy.'
