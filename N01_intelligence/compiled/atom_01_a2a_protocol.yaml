3_message_flow_diagrams: ''
3_1_synchronous_request_response: "Client                                          Server\n  |                           \
  \                    |\n  |  POST /.well-known/agent-card.json            |\n  |---------------------------------------------->|\n\
  \  |  AgentCard (capabilities, skills, auth)       |\n  |<----------------------------------------------|\n  |         \
  \                                      |\n  |  JSON-RPC: sendMessage(Message)               |\n  |---------------------------------------------->|\n\
  \  |                                               |\n  |  SendMessageResponse(Task | Message)          |\n  |<----------------------------------------------|\n\
  \  |                                               |\n  |  [if Task returned, poll:]                    |\n  |  JSON-RPC:\
  \ getTask(id)                        |\n  |---------------------------------------------->|\n  |  Task (status=WORKING)\
  \                        |\n  |<----------------------------------------------|\n  |                                   \
  \            |\n  |  JSON-RPC: getTask(id)                        |\n  |---------------------------------------------->|\n\
  \  |  Task (status=COMPLETED, artifacts=[...])     |\n  |<----------------------------------------------|"
3_2_streaming_sse: "Client                                          Server\n  |                                          \
  \     |\n  |  JSON-RPC: sendStreamingMessage(Message)      |\n  |---------------------------------------------->|\n  | \
  \                                              |\n  |  event: task                                  |\n  |  data: {id:\"\
  t1\", status:{state:SUBMITTED}}    |\n  |<----------------------------------------------|\n  |                         \
  \                      |\n  |  event: status_update                         |\n  |  data: {task_id:\"t1\", status:{state:WORKING}}\
  \ |\n  |<----------------------------------------------|\n  |                                               |\n  |  event:\
  \ artifact_update                       |\n  |  data: {task_id:\"t1\", artifact:{...},         |\n  |         last_chunk:false}\
  \                     |\n  |<----------------------------------------------|\n  |                                      \
  \         |\n  |  event: artifact_update                       |\n  |  data: {task_id:\"t1\", artifact:{...},         |\n\
  \  |         last_chunk:true}                      |\n  |<----------------------------------------------|\n  |         \
  \                                      |\n  |  event: status_update                         |\n  |  data: {task_id:\"t1\"\
  , status:{state:COMPLETED}|\n  |<----------------------------------------------|\n  |  [SSE stream closes]             \
  \             |"
3_3_push_notifications_async: "Client                                          Server\n  |                               \
  \                |\n  |  sendMessage(msg, config:{                    |\n  |    return_immediately: true,              \
  \    |\n  |    task_push_notification_config: {           |\n  |      url: \"https://client/webhook\",           |\n  |\
  \      authentication: {...}                    |\n  |    }                                          |\n  |  })        \
  \                                   |\n  |---------------------------------------------->|\n  |  Task (status=SUBMITTED)\
  \                      |\n  |<----------------------------------------------|\n  |                                     \
  \          |\n  |  [Server processes asynchronously...]         |\n  |                                               |\n\
  \  |  POST https://client/webhook                  |\n  |  {TaskStatusUpdateEvent: WORKING}             |\n  |<----------------------------------------------|\n\
  \  |                                               |\n  |  POST https://client/webhook                  |\n  |  {TaskArtifactUpdateEvent:\
  \ {...}}             |\n  |<----------------------------------------------|\n  |                                       \
  \        |\n  |  POST https://client/webhook                  |\n  |  {TaskStatusUpdateEvent: COMPLETED}           |\n \
  \ |<----------------------------------------------|"
3_4_multi_turn_conversation: "Client                                          Server\n  |                                \
  \               |\n  |  sendMessage(msg_1)                           |\n  |---------------------------------------------->|\n\
  \  |  Task(id:t1, context_id:ctx1,                 |\n  |       status:INPUT_REQUIRED)                  |\n  |<----------------------------------------------|\n\
  \  |                                               |\n  |  sendMessage(msg_2, task_id:t1, ctx:ctx1)     |\n  |---------------------------------------------->|\n\
  \  |  Task(id:t1, context_id:ctx1,                 |\n  |       status:COMPLETED, artifacts:[...])      |\n  |<----------------------------------------------|"
3_5_task_lifecycle_state_machine: "+---> REJECTED (terminal)\n                    |\n(new) ---> SUBMITTED ---+---> WORKING\
  \ ---+---> COMPLETED (terminal)\n                    |        |    ^      |\n                    |        |    |      +--->\
  \ FAILED (terminal)\n                    |        v    |\n                    |   INPUT_REQUIRED\n                    |\
  \        |\n                    |        v\n                    |   AUTH_REQUIRED\n                    |\n             \
  \       +---> CANCELED (terminal)\n                          (from any non-terminal)\n\n---"
4_agent_card_schema_complete: ''
4_1_discovery_mechanism: '| Aspect | Detail |

  |--------|--------|

  | Standard URL | `https://<base_url>/.well-known/agent-card.json` |

  | HTTP Method | GET (unauthenticated for public card) |

  | RFC | 8615 (Well-Known URIs) |

  | Extended Card | GET via `getExtendedAgentCard` (authenticated) |

  | Format | JSON with camelCase field names |'
4_2_full_field_hierarchy: 'AgentCard

  +-- name: string (required)

  +-- description: string

  +-- supported_interfaces: AgentInterface[] (required)

  |   +-- url: string (required)

  |   +-- protocol_binding: string (required) ["jsonrpc"|"grpc"|"rest"]

  |   +-- tenant: string

  |   +-- protocol_version: string

  +-- provider: AgentProvider

  |   +-- url: string

  |   +-- organization: string

  +-- version: string (required)

  +-- documentation_url: string

  +-- capabilities: AgentCapabilities (required)

  |   +-- streaming: bool

  |   +-- push_notifications: bool

  |   +-- extensions: AgentExtension[]

  |   +-- extended_agent_card: bool

  +-- security_schemes: map<string, SecurityScheme>

  |   +-- [name]: APIKeySecurityScheme | HTTPAuthSecurityScheme |

  |               OAuth2SecurityScheme | OpenIdConnectSecurityScheme |

  |               MutualTlsSecurityScheme

  +-- security_requirements: SecurityRequirement[]

  |   +-- schemes: map<string, StringList>

  +-- default_input_modes: string[] (MIME types)

  +-- default_output_modes: string[] (MIME types)

  +-- skills: AgentSkill[]

  |   +-- id: string (required)

  |   +-- name: string (required)

  |   +-- description: string

  |   +-- tags: string[]

  |   +-- examples: string[]

  |   +-- input_modes: string[]

  |   +-- output_modes: string[]

  |   +-- security_requirements: SecurityRequirement[]

  +-- signatures: AgentCardSignature[]

  |   +-- protected: string (required, base64url JWS header)

  |   +-- signature: string (required, base64url)

  |   +-- header: Struct

  +-- icon_url: string'
