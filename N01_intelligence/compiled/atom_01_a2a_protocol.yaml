  \    AgentCard, SendMessageRequest, SendMessageResponse,\n    GetTaskRequest, ListTasksRequest, ListTasksResponse,\n   \
  \ CancelTaskRequest, Task, StreamResponse,\n    GetExtendedAgentCardRequest,\n    CreateTaskPushNotificationConfigRequest,\n\
  \    TaskPushNotificationConfig,\n)\n\nclass A2AClient:\n    # Instantiation\n    def init(self, agent_card: AgentCard,\
  \ httpx_client: httpx.AsyncClient) -> None: ...\n\n    # Core operations\n    async def send_message(\n        self, request:\
  \ SendMessageRequest, **kwargs\n    ) -> SendMessageResponse: ...\n\n    async def send_streaming_message(\n        self,\
  \ request: SendMessageRequest, **kwargs\n    ) -> AsyncIterator[StreamResponse]: ...\n\n    async def get_task(self, request:\
  \ GetTaskRequest) -> Task: ...\n\n    async def list_tasks(self, request: ListTasksRequest) -> ListTasksResponse: ...\n\n\
  \    async def cancel_task(self, request: CancelTaskRequest) -> Task: ...\n\n    async def subscribe_to_task(\n        self,\
  \ task_id: str\n    ) -> AsyncIterator[StreamResponse]: ...\n\n    async def get_extended_agent_card(\n        self, request:\
  \ GetExtendedAgentCardRequest | None = None\n    ) -> AgentCard: ...\n\n    # Push notification CRUD\n    async def create_task_push_notification_config(\n\
  \        self, request: CreateTaskPushNotificationConfigRequest\n    ) -> TaskPushNotificationConfig: ...\n\n    async def\
  \ get_task_push_notification_config(\n        self, task_id: str, config_id: str\n    ) -> TaskPushNotificationConfig: ...\n\
  \n    async def list_task_push_notification_configs(\n        self, task_id: str\n    ) -> list[TaskPushNotificationConfig]:\
  \ ...\n\n    async def delete_task_push_notification_config(\n        self, task_id: str, config_id: str\n    ) -> None:\
  \ ..."
14_3_agentexecutor_abstract_base_server_side: "The single class developers implement to add business logic to an A2A server:\n\
  \nfrom a2a.server.agent_execution import AgentExecutor, RequestContext\nfrom a2a.server.events import EventQueue\nfrom abc\
  \ import ABC, abstractmethod\n\nclass AgentExecutor(ABC):\n    @abstractmethod\n    async def execute(\n        self,\n\
  \        context: RequestContext,   # incoming message + task + auth\n        event_queue: EventQueue,   # emit updates\
  \ here\n    ) -> None:\n        \"\"\"\n        Business logic entry point.\n        Must emit at least one terminal status\
  \ (COMPLETED/FAILED).\n        Raise exceptions to auto-emit FAILED status.\n        \"\"\"\n\n    @abstractmethod\n   \
  \ async def cancel(\n        self,\n        context: RequestContext,\n        event_queue: EventQueue,\n    ) -> None:\n\
  \        \"\"\"Called when client requests task cancellation.\"\"\""
