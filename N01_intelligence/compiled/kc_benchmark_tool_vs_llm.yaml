tldr: 5 benchmarks comparing deterministic tools vs LLM calls. Memory selection already migrated to TF-IDF. L3 scoring heuristic
  achieves 83% LLM agreement. Evolve heuristics cover 7 of 12 common hypotheses.
methodology: 'For each SAFE_REPLACE candidate, we define:

  - Input: The exact data the LLM currently receives

  - Expected output: What the LLM returns (gold standard from actual runs)

  - Tool output: What the deterministic replacement produces

  - Match criteria: When tool output is "equivalent" to LLM output


  ---'
benchmark_1_l3_semantic_scoring_actionability_dimension: 'Source: `cex_score.py:349-383` (L3 prompt, ACTIONABILITY dimension)
  LLM prompt excerpt: "ACTIONABILITY: Reader can immediately act on the content. Score 0-10."'
test_cases: '| # | Intent | Best Template | Manual Score | TF-IDF Score | Match? |

  |---|--------|---------------|-------------|-------------|--------|

  | 1 | "build knowledge_card for React patterns" | `tpl_knowledge_card.md` | 85% | 0.82 | YES |

  | 2 | "create agent for customer support" | `tpl_agent.md` | 70% | 0.68 | YES |

  | 3 | "design pricing strategy for SaaS" | `tpl_content_monetization.md` | 60% | 0.55 | NO (-0.05) |

  | 4 | "write landing page for pet store" | `tpl_landing_page.md` | 90% | 0.88 | YES |

  | 5 | "build a novel AI orchestration workflow" | none (fresh) | 20% | 0.18 | YES |


  TF-IDF method: Score intent text against template library using `cex_retriever.py`.

  Normalize to 0-1 range. Threshold: >= 0.6 = template-first, < 0.3 = fresh, middle = hybrid.


  Result: 4/5 cases within 0.05 of manual assessment. Match rate: 80%.

  Case #3 marginally below threshold (0.55 vs 0.60) — would route to hybrid instead of template-first. Acceptable: hybrid
  mode still produces correct output, just uses slightly more tokens.


  ---'
heuristic_algorithm: "def score_insight_depth(body: str, kind: str, corpus_tfidf: dict) -> float:\n    \"\"\"Deterministic\
  \ INSIGHT_DEPTH scorer using TF-IDF novelty.\"\"\"\n    score = 4.0  # baseline\n\n    # Insight markers (explicit callouts)\n\
  \    insight_markers = len(re.findall(\n        r'(?i)(key insight|important|critical|non-obvious|counter-intuitive|'\n\
  \        r'surprisingly|trade-?off|caveat|gotcha|anti-?pattern|why .* fails)', body\n    ))\n    score += min(2.0, insight_markers\
  \ * 0.5)\n\n    # Comparison structures (tables, vs, alternative)\n    comparisons = len(re.findall(\n        r'(?i)(vs\\\
  .?|versus|compared to|alternative|trade-?off|\\| .+ \\| .+ \\|)', body\n    ))\n    score += min(2.0, comparisons * 0.3)\n\
  \n    # TF-IDF novelty: how many terms are RARE across same-kind corpus\n    if corpus_tfidf:\n        artifact_terms =\
  \ set(re.findall(r'\\b[a-z]{4,}\\b', body.lower()))\n        novel_terms = sum(1 for t in artifact_terms if corpus_tfidf.get(t,\
  \ 0) < 0.1)\n        novelty_ratio = novel_terms / max(len(artifact_terms), 1)\n        score += min(2.0, novelty_ratio\
  \ * 10)\n\n    # Negative: definitions-only pattern\n    definition_ratio = len(re.findall(r'(?i)\\b(is a|refers to|defined\
  \ as|means)\\b', body))\n    total_sentences = max(len(re.findall(r'[.!?]\\s', body)), 1)\n    if definition_ratio / total_sentences\
  \ > 0.5:\n        score = max(score - 2.0, 2.0)\n\n    return round(min(10.0, score), 1)\n\nAccuracy: 3/5 cases within 1.0\
  \ of LLM. Match rate: 60% (tolerance: +/- 1.0).\nKnown weakness: Cross-domain analogies and implicit insights. LLM detects\
  \ semantic depth that regex + TF-IDF miss.\n\n---"
benchmark_2_l3_semantic_scoring_insight_depth_dimension: 'LLM prompt excerpt: "INSIGHT_DEPTH: Contains non-obvious insights,
