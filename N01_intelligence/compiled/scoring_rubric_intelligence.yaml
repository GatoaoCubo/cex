tldr: '5-dimension scoring for research output: triangulation, freshness, actionability, structure, depth.'
density_score: 0.92
scoring_examples: '| Dimension | Score 3 Example | Score 7 Example | Score 10 Example |

  |-----------|-----------------|-----------------|-------------------|

  | Triangulation | "OpenAI revenue is $1B (per TechCrunch)" | "OpenAI revenue $1B (TechCrunch, Reuters, Bloomberg agree)"
  | "OpenAI revenue $1B (TC/Reuters agree, Anthropic disputes timing)" |

  | Freshness | "2023 AI market was $50B" | "Q3 2025 AI market hit $120B" | "Jan 2026: AI market $140B, up 15% from Dec" |

  | Actionability | "Claude usage is growing" | "Claude grew 40% → adoption accelerating" | "Claude 40% growth → invest in
  competitor analysis, ETA Q2" |

  | Structure | Wall of text paragraphs | Key findings in bullets + table | Executive summary + visual grid + appendix |

  | Depth | "AI coding tools popular" | "GitHub Copilot has 1M users, 30% productivity gain" | "Copilot 1M users, 30% gain,
  but 60% churn in enterprise" |'
usage_guidelines: 'When to use: Research briefs, competitor analysis, market reports, intelligence summaries

  When NOT to use: Code documentation, marketing copy, instructional content


  Anti-patterns:

  - Scoring before research is complete

  - Conflating data volume with quality depth

  - Ignoring source bias in triangulation scoring

  - Accepting outdated data without temporal context'
score_thresholds:
- 'Publish: >= 8.0'
- 'Revise: 6.0-7.9 (specify which dimensions to improve)'
- 'Reject: < 6.0 (re-research needed)'
