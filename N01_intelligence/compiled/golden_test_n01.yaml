id: golden_test_n01
kind: golden_test
pillar: P07
nucleus: n01
title: N01 Research Pipeline Golden Tests
version: 1.0.0
created: 2026-04-17
author: n01_intelligence
domain: research-intelligence
quality: null
tags:
- golden_test
- regression_prevention
- n01
- test_fixtures
- ground_truth
tldr: '10 golden test cases for N01 research pipeline: fixed inputs with expected outputs. Prevents quality regressions when
  pipeline changes. Run before any changes to search_strategy, reasoning_strategy, or eval_framework.'
density_score: 0.89
purpose: 'N01 pipeline changes (new search strategy, new system prompt, new eval dimensions)

  can inadvertently degrade output quality. Golden tests catch regressions before they land.


  Each golden test has:

  1. Fixed input (research goal)

  2. Expected output properties (NOT exact text -- properties that must hold)

  3. Failure criteria (what would constitute a regression)'
golden_test_cases: ''
gt_01_pricing_comparison_competitive_analysis: "id: GT-01\ninput:\n  research_goal: \"Compare pricing of top 3 AI API providers\
  \ in May 2025\"\n  evidence_standard: high\nexpected_properties:\n  D3_comparative_score: >= 8.0\n  competitors_mentioned:\
  \ >= 3\n  price_data_present: true\n  confidence_scores: true\n  sources_count: >= 3\nfailure_conditions:\n  - only one\
  \ provider discussed\n  - no prices mentioned\n  - D3 score < 7.0\nknown_good_output_hash: null  # populated after first\
  \ run"
gt_02_tam_estimation_market_sizing: "id: GT-02\ninput:\n  research_goal: \"Estimate TAM, SAM, SOM for conversational AI market\
  \ in 2026\"\nevidence_standard: high\nexpected_properties:\n  market_size_numbers_present: true\n  methodology_explained:\
  \ true\n  D2_analytical_depth: >= 7.0\n  year_over_year_growth_present: true\nfailure_conditions:\n  - no dollar figures\n\
  \  - single-source market sizing\n  - no methodology explanation"
gt_03_hiring_signal_analysis: "id: GT-03\ninput:\n  research_goal: \"What is Anthropic's hiring velocity vs. OpenAI in Q1\
  \ 2026?\"\nevidence_standard: medium\nexpected_properties:\n  both_companies_covered: true\n  relative_comparison: true\n\
  \  trend_direction_stated: true\n  data_source_cited: true\nfailure_conditions:\n  - only one company discussed\n  - no\
  \ quantified comparison"
gt_04_literature_review_academic: "id: GT-04\ninput:\n  research_goal: \"Summarize key findings on hallucination in large\
  \ language models\"\nevidence_standard: high\nexpected_properties:\n  paper_count: >= 5\n  citation_count_mentioned: true\n\
  \  seminal_papers_identified: true\n  research_gaps_noted: true\nfailure_conditions:\n  - fewer than 3 papers cited\n  -\
  \ no comparison between papers\n  - no mention of conflicting findings"
gt_05_bias_audit_pass_through: "id: GT-05\ninput:\n  research_goal: \"OpenAI is the best AI company -- research to confirm\"\
  \n  # deliberately biased prompt to test B2 detection\nexpected_properties:\n  B2_confirmation_bias_flagged: true\n  counter_evidence_present:\
  \ true\n  bias_audit_score: < 7.0  # should detect the pre-formed hypothesis\nfailure_conditions:\n  - bias not detected\n\
  \  - only positive findings about OpenAI"
gt_06_through_gt_10: '| ID | Topic | Key Assertion |

  |----|-------|---------------|

  | GT-06 | Technology assessment (LLM capabilities) | D2 depth score >= 7.5 |

  | GT-07 | Funding trend detection | trend direction quantified |

  | GT-08 | Partnership analysis | 3+ implications derived |

  | GT-09 | Regulatory landscape | primary sources (filings) present |

  | GT-10 | Patent / IP analysis | citation network traversed |'
running_golden_tests: "python _tools/cex_system_test.py --scope n01 --golden-tests golden_test_n01\n\n# Per test:\nfor test_id\
  \ in [GT-01..GT-10]:\n    output = n01.research(test.input)\n    results = validate(output, test.expected_properties)\n\
  \    assert not any(results.failure_conditions)\n    log(test_id, results.property_scores)"
pass_fail_criteria: '| Test | Pass | Warn | Fail |

  |------|------|------|------|

  | All properties met | 10/10 tests | - | - |

  | 1-2 properties missed | - | WARN | - |

  | failure_condition triggered | - | - | FAIL (block merge) |

  | Overall pass rate | > 90% | 80-90% | < 80% |'
regression_policy: 'Golden tests BLOCK any pipeline change that causes FAIL on >= 1 test.

  WARN = investigate before merge.


  Changes requiring golden test run:

  - search_strategy_n01.md modification

  - reasoning_strategy_n01.md modification

  - system_prompt_n01_research.md modification

  - eval_framework_n01.md scoring change

  - New search API added to api_reference'
