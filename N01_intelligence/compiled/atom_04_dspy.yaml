1_full_module_type_registry: 'Modules are the building blocks. Each wraps a Signature and adds a prompting strategy.


  | Module | Behavior | When to Use |

  |--------|----------|-------------|

  | `dspy.Predict` | Basic predictor. No added fields. Directly implements the signature. | Simple classification, extraction,
  QA |

  | `dspy.ChainOfThought` | Injects `reasoning` field before output fields. Step-by-step thinking. | Complex reasoning, math,
  multi-hop QA |

  | `dspy.ProgramOfThought` | LM generates executable code; execution result becomes the answer. | Math, algorithms, data
  transformations |

  | `dspy.ReAct` | Reasoning + Acting agent loop. Can use tools iteratively. | Tool-using agents, multi-step tasks |

  | `dspy.CodeAct` | Code generation + tool execution via Python interpreter. | Code-based problem solving with tool access
  |

  | `dspy.MultiChainComparison` | Runs multiple CoT traces, compares them, picks best. | When single CoT is unreliable |

  | `dspy.Parallel` | Runs multiple module instances concurrently (`num_threads`). | Batch processing, parallel exploration
  |

  | `dspy.BestOfN` | Runs module N times, returns best by `reward_fn` or first passing `threshold`. | Quality improvement
  via sampling |

  | `dspy.Refine` | Iterative: runs module N times, generates feedback hints between attempts. | Self-correction loops |

  | `dspy.RLM` | Recursive LM -- explores large contexts via sandboxed Python REPL + recursive sub-LLM calls. | Long-context
  analysis, code exploration |

  | `dspy.Retrieve` | Top-k passage retrieval from configured retriever. | RAG pipelines |

  | `dspy.majority` | Voting function -- returns most frequent response from N predictions. | Ensemble aggregation |'
module_composition_pattern: "Custom programs inherit `dspy.Module` and override `forward()`:\n\nclass MultiHopQA(dspy.Module):\n\
  \    def init(self):\n        self.generate_query = dspy.ChainOfThought(\"claim -> query\")\n        self.retrieve = dspy.Retrieve(k=5)\n\
  \        self.generate_answer = dspy.ChainOfThought(\"context, question -> answer\")\n\n    def forward(self, question:\
  \ str):\n        query = self.generate_query(claim=question).query\n        passages = self.retrieve(query).passages\n \
  \       return self.generate_answer(context=passages, question=question)\n\nKey principle: \"DSPy is just Python code that\
  \ uses modules in any control flow.\"\n\n---"
2_optimizer_types_and_what_they_optimize: ''
taxonomy: '| Category | What it tunes | Optimizers |

  |----------|--------------|------------|

  | Automatic Few-Shot | Demonstrations (examples in prompt) | LabeledFewShot, BootstrapFewShot, BootstrapFewShotWithRandomSearch,
  KNNFewShot |

  | Automatic Instruction | Natural-language instructions + demos | COPRO, MIPROv2, SIMBA, GEPA, InferRules |

  | Automatic Finetuning | LM weights | BootstrapFinetune |

  | Meta / Program Transforms | Combinations of above | Ensemble, BetterTogether |'
individual_optimizer_details: '| Optimizer | Optimizes | Algorithm | Key Parameters |

  |-----------|-----------|-----------|----------------|

  | LabeledFewShot | Demos | Randomly samples k labeled examples from trainset | `k` |

  | BootstrapFewShot | Demos | Teacher module generates demos; metric validates which to keep | `max_labeled_demos`, `max_bootstrapped_demos`,
  `max_rounds` |

  | BootstrapFewShotWithRandomSearch | Demos | Repeats BootstrapFewShot with random search over candidates | `num_candidate_programs`,
  `num_threads` |

  | BootstrapFewShotWithOptuna | Demos | Hyperparameter search via Optuna | Same as BootstrapFewShot + Optuna config |

  | KNNFewShot | Demos | Semantic similarity (embeddings) to select nearest training examples | `Embedder`, trainset |

  | COPRO | Instructions | Coordinate ascent (hill-climbing) over instruction candidates | `depth`, `breadth`, `init_temperature`
  |

  | MIPROv2 | Instructions + Demos | 3-phase: (1) bootstrap demos, (2) propose instructions, (3) Bayesian optimization over
  combos | `num_trials`, `auto="light\|medium\|heavy"`, `minibatch_size` |

  | SIMBA | Instructions + Demos | Stochastic mini-batch sampling; finds high-variability examples; LM self-reflects on failures
  | `max_steps`, `max_demos` |

  | GEPA | Instructions | Evolutionary: Pareto-frontier candidates, reflective mutation via LM trace analysis, textual feedback
  | `reflection_lm`, `max_metric_calls`, `use_merge` |

  | InferRules | Rules/Instructions | Infers explicit rules from execution traces | -- |

  | BootstrapFinetune | LM Weights | Distills prompt-based program into weight updates via finetuning | `epochs`, `batch_size`,
  `learning_rate` |

  | Ensemble | Program selection | Combines N programs via `reduce_fn` (e.g., `dspy.majority`) | `reduce_fn` |

  | BetterTogether | Instructions + Weights | Meta-optimizer: sequences prompt optimization then weight optimization | --
  |'
decision_guide: '| Situation | Recommended Optimizer |

  |-----------|-----------------------|

  | ~10 labeled examples | BootstrapFewShot |

  | 50+ examples | BootstrapFewShotWithRandomSearch |

  | 0-shot (instructions only) | MIPROv2 (`max_*_demos=0`) or COPRO |

  | 200+ examples, 40+ trial budget | MIPROv2 (medium or heavy) |

  | Rich textual feedback available | GEPA |

  | Latency-sensitive, need small model | BootstrapFinetune |'
miprov2_three_phases_detail:
- 'Bootstrap stage: Randomly sample trainset examples, run through program, keep valid outputs as demo candidates (`num_candidates`
  sets).'
- 'Grounded proposal stage: Synthesize instruction candidates using dataset summaries, program code, bootstrapped examples,
  and random tips.'
- 'Discrete search stage: Bayesian optimization over `num_trials` iterations, evaluating instruction+demo combinations on
  validation data.'
gepa_algorithm_detail: '1. Initialize with unoptimized program

  2. Sample candidate from Pareto frontier

  3. Collect execution traces + textual feedback on minibatch

  4. LM reflects on traces: what worked, what failed, why

  5. Propose mutated instruction targeting observed failures

  6. Evaluate; update Pareto frontier if improved

  7. Optional merge: combine best-performing module variants

  8. Repeat until budget exhausted

  9. Return best on validation set


  GEPA uniquely accepts `ScoreWithFeedback` (score + textual explanation) rather than just scalar metrics.'
historical_note_teleprompter_optimizer: 'DSPy originally called these "teleprompters" (2023 paper). Renamed to "optimizers"
  for clarity. The `.compile()` method persists. Old code: `dspy.teleprompt.BootstrapFewShot` still works as import alias.
  ---'
3_signature_system_how_prompts_become_programs: ''
core_concept: A Signature is a declarative specification of input/output behavior. It separates INTERFACE ("what should the
  LM do?") from IMPLEMENTATION ("how do we prompt it?"). DSPy infers or learns the implementation automatically.
inline_signatures_shorthand: "# Basic QA\npredict = dspy.Predict(\"question -> answer\")\n\n# With types\npredict = dspy.Predict(\"\
  question: str -> answer: str\")\n\n# Multi-input\npredict = dspy.Predict(\"context: list[str], question: str -> answer:\
  \ str\")\n\n# Boolean classification\npredict = dspy.Predict(\"sentence -> sentiment: bool\")\n\n# With instructions\nsig\
  \ = dspy.Signature(\"comment -> toxic: bool\",\n    instructions=\"Mark toxic if comment includes insults or harassment.\"\
  )\npredict = dspy.Predict(sig)"
class_based_signatures_full_control: "class CheckCitationFaithfulness(dspy.Signature):\n    \"\"\"Verify that the text is\
  \ based on the provided context.\"\"\"\n\n    context: str = dspy.InputField(desc=\"facts here are assumed to be true\"\
  )\n    text: str = dspy.InputField()\n    faithfulness: bool = dspy.OutputField()\n    evidence: dict[str, list[str]] =\
  \ dspy.OutputField(desc=\"supporting evidence for claims\")"
field_parameters: '| Parameter | Applies To | Purpose |

  |-----------|-----------|---------|

  | `desc` | InputField, OutputField | Semantic hint for the LM |

  | Type hints | Both | `str`, `int`, `bool`, `float`, `list[str]`, `dict`, `Optional`, `Literal[...]`, Pydantic models |

  | `dspy.Image` | InputField | Multimodal image input |

  | `dspy.History` | InputField | Conversation history |'
literal_type_constraints: "class Emotion(dspy.Signature):\n    \"\"\"Classify emotion.\"\"\"\n    sentence: str = dspy.InputField()\n\
  \    sentiment: Literal['sadness', 'joy', 'love', 'anger', 'fear', 'surprise'] = dspy.OutputField()"
how_expansion_works:
- Adapter reads the Signature's fields and docstring
- Generates system message with field structure
- Formats input data per field types
- Module may inject extra fields (e.g., ChainOfThought adds `reasoning`)
- Optimizer may inject instructions and few-shot demos
- LM produces output; adapter parses it back into `dspy.Prediction`
adapters_signature_prompt_formatters: "| Adapter | Format | Best For |\n|---------|--------|----------|\n| `ChatAdapter` (default)\
  \ | `[[ ## field_name ## ]]` markers + `[[ ## completed ## ]]` | Universal compatibility |\n| `JSONAdapter` | JSON object\
  \ output | Models with `response_format` support; lower latency |\n| `XMLAdapter` | XML-structured output | When XML format\
  \ preferred |\n| `TwoStepAdapter` | Free-form first stage, structured extraction second | Reasoning models (o3, o1) that\
  \ struggle with structured output |\n\nConfiguration:\ndspy.configure(adapter=dspy.JSONAdapter())\n# or per-block:\nwith\
  \ dspy.context(adapter=dspy.XMLAdapter()):\n    result = my_module(input=\"...\")\n\n---"
4_metric_evaluation_vocabulary: ''
built_in_metrics: '| Metric | Type | What It Measures |

  |--------|------|-----------------|

  | `dspy.evaluate.answer_exact_match` | Function | Exact string match between prediction and gold |

  | `dspy.evaluate.answer_passage_match` | Function | Whether answer appears in a passage |

  | `dspy.evaluate.SemanticF1` | Class | Precision + recall + F1 via semantic overlap |

  | `dspy.evaluate.CompleteAndGrounded` | Class | Completeness (covers question) + groundedness (supported by context) |'
custom_metric_pattern: "def my_metric(gold, pred, trace=None):\n    # gold: dspy.Example with .labels()\n    # pred: dspy.Prediction\
  \ from your program\n    # trace: optimization context (None during eval)\n    # Return: bool (pass/fail) or float (0.0-1.0)\n\
  \    return pred.answer == gold.answer"
llm_as_judge_pattern: "class AnswerQuality(dspy.Signature):\n    \"\"\"Judge whether the answer is correct given context and\
  \ question.\"\"\"\n    context: str = dspy.InputField()\n    question: str = dspy.InputField()\n    answer: str = dspy.InputField()\n\
  \    correct: bool = dspy.OutputField()\n\njudge = dspy.ChainOfThought(AnswerQuality)\ndef llm_metric(gold, pred, trace=None):\n\
  \    return judge(context=gold.context, question=gold.question, answer=pred.answer).correct"
gepa_feedback_metric_advanced: "from dspy import ScoreWithFeedback\n\ndef feedback_metric(gold, pred, trace=None, predictor_name=None,\
  \ predictor_trace=None):\n    score = compute_score(gold, pred)\n    feedback = f\"Missing key facts: {find_gaps(gold, pred)}\"\
  \n    return ScoreWithFeedback(score=score, feedback=feedback)"
evaluate_utility: "evaluator = dspy.Evaluate(\n    devset=my_devset,\n    metric=my_metric,\n    num_threads=8,\n    display_progress=True,\n\
  \    display_table=5        # show top 5 rows\n)\nscore = evaluator(my_program)"
data_primitives: '| Class | Role |

  |-------|------|

  | `dspy.Example` | Training/test data row. Dict-like with `.inputs()` / `.labels()` split. |

  | `dspy.Prediction` | Module output. Subclass of Example. Access via `pred.field_name`. |

  | `dspy.Image` | Multimodal image wrapper for signatures |

  | `dspy.History` | Conversation history primitive |

  | `dspy.Audio` | Audio data primitive |

  | `dspy.Code` | Code execution primitive |


  ---'
5_assertions_computational_constraints: '| Construct | Type | On Failure |

  |-----------|------|-----------|

  | `dspy.Assert(condition, message)` | Hard constraint | Retries up to max; halts pipeline if exhausted |

  | `dspy.Suggest(condition, message)` | Soft constraint | Retries with feedback; continues if exhausted |


  Both inject the failing output + error message back into the prompt for self-refinement.

  Assertions also improve optimization: optimizers can bootstrap harder few-shot examples

  from assertion-validated traces.


  ---'
6_tools_and_retrieval: '| Class | Purpose |

  |-------|---------|

  | `dspy.Tool` | Wraps any Python function as a callable tool with signature introspection |

  | `dspy.ToolCalls` | Tool invocation handling within agent modules |

  | `dspy.Retrieve` | Top-k retrieval from configured retriever |

  | `dspy.ColBERTv2` | Dense retrieval backend |

  | `dspy.PythonInterpreter` | Sandboxed code execution tool |'
utilities: '| Utility | Purpose |

  |---------|---------|

  | `dspy.streamify` | Enable streaming output with `StreamListener` |

  | `dspy.asyncify` | Convert sync modules to async |

  | `dspy.configure_cache` | Control disk/memory caching |

  | `dspy.configure(track_usage=True)` | Token usage tracking per model |


  ---'
7_language_model_interface: '| Class | Purpose |

  |-------|---------|

  | `dspy.LM` | Language model wrapper (backed by litellm). Supports any provider. |

  | `dspy.Embedder` | Embedding model interface for retrieval/similarity |


  Configuration:

  lm = dspy.LM("openai/gpt-4o", temperature=0.7)

  dspy.configure(lm=lm)


  ---'
8_dspy_prompt_compilation_cex_prompt_compiler_kind_mapping: 'DSPy''s core thesis: prompts should be compiled, not written.
  This maps directly to CEX''s `prompt_compiler` kind (P03), which performs intent-to-artifact transmutation.'
conceptual_alignment: '| DSPy Concept | CEX Equivalent | Notes |

  |-------------|----------------|-------|

  | Signature | Kind schema (`_schema.yaml`) | Declarative I/O spec. DSPy: `"question -> answer"`. CEX: kind frontmatter +
  field definitions. |

  | Module | Builder (`archetypes/builders/{kind}-builder/`) | Wraps a signature with strategy. DSPy: `ChainOfThought`. CEX:
  13-ISO builder with sin lens. |

  | Optimizer | `cex_evolve.py` + `cex_score.py` | Tunes program quality. DSPy: MIPROv2 searches instruction space. CEX: evolve
  loop rescans + rewrites weak artifacts. |

  | Metric | Quality gate (3-layer scoring) | DSPy: `SemanticF1`. CEX: structural (30%) + rubric (30%) + semantic (40%). |

  | Evaluate | `cex_doctor.py` + `cex_system_test.py` | Batch validation. DSPy: `Evaluate(devset=...)`. CEX: 54-test suite
  + flywheel audit. |

  | Adapter | Prompt layers (`cex_prompt_layers.py`) | Formats context for LM. DSPy: ChatAdapter/JSONAdapter. CEX: 15+ pillar
  artifacts compiled into prompt. |

  | Assertion | 8F F7 GOVERN gates | Hard/soft constraints. DSPy: `dspy.Assert`. CEX: H01-H07 hard gates + 12LP checklist.
  |

  | Teleprompter (old) | Prompt Compiler kind | The original DSPy name for optimizer. CEX''s `prompt_compiler` kind description
  explicitly references "DSPy term". |

  | `.compile()` | `cex_compile.py` | DSPy: optimize program. CEX: .md -> .yaml compilation + index. |

  | Example / trainset | Knowledge Cards (KCs) | Training data. DSPy: labeled Examples. CEX: kc_{kind}.md files with domain
  knowledge. |

  | Few-shot demos | `examples/` + `compiled/` artifacts | In-context examples. DSPy: bootstrapped demos. CEX: F3 INJECT pulls
  similar artifacts. |

  | Program | 8F Pipeline | The composed system. DSPy: Module with forward(). CEX: F1-F8 sequential reasoning. |

  | `dspy.configure(lm=...)` | `nucleus_models.yaml` + `cex_router.py` | Model routing. DSPy: single LM config. CEX: per-nucleus
  model assignment with fallback chains. |'
deeper_parallel_the_compilation_loop: "DSPy:\n  Signature -> Module -> Program -> Optimizer.compile(trainset, metric) -> Optimized\
  \ Program\n  (declare)    (wrap)   (compose)   (search instruction/demo space)       (better prompts)\n\nCEX:\n  Kind ->\
  \ Builder -> 8F Pipeline -> cex_evolve.py(artifacts, quality_gate) -> Improved Artifacts\n  (schema) (ISOs)   (F1-F8)  \
  \      (rescan, rewrite, score, keep/discard)   (higher quality)\n\nBoth systems share the thesis that prompt quality should\
  \ be searched, not hand-crafted.\nDSPy searches over instruction text and demo selection via Bayesian optimization.\nCEX\
  \ searches over artifact content via heuristic passes and agent-mode rewrites."
key_difference: DSPy optimizes the prompt parameters (instructions, demos, weights) for a fixed program structure. CEX optimizes
  the artifact content (knowledge cards, templates, configs) for a fixed pipeline structure (8F). DSPy is runtime prompt optimization.
  CEX is build-time artifact optimization. ---
