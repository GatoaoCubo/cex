domain: research-intelligence
quality: null
tags:
- daemon
- competitor_monitor
- continuous_intelligence
- n01
- alerts
- change_detection
tldr: 'Background daemon for continuous competitor monitoring: pricing changes, product updates, hiring signals, and blog
  posts. Runs on configurable schedule, writes signals to .cex/runtime/signals/ on change detection.'
density_score: 0.88
purpose: Research is not a one-shot event. Competitive landscapes shift daily. N01 Analytical Envy means monitoring continuously,
  not querying on demand. This daemon runs in the background, detecting changes across tracked competitors and signaling N01
  when delta > threshold (new info worth acting on).
monitored_signal_categories: '| Signal Type | Source | Change Threshold | Priority |

  |-------------|--------|-----------------|---------|

  | Pricing change | competitor pricing pages | any text change in price fields | P1 |

  | New product/feature | product changelog, blog | new post or release note | P1 |

  | Hiring surge | LinkedIn job postings | > 5 new roles in 7 days | P1 |

  | Funding event | Crunchbase, TechCrunch | new announcement | P1 |

  | Partnership / acquisition | press releases, news | keyword match | P2 |

  | Leadership change | LinkedIn, press | CxO role change | P2 |

  | Pricing page removal | HTTP 404 or redirect | URL change | P2 |

  | Review spike (G2/Capterra) | review platform | > 10 new reviews/week | P3 |'
configuration: "# competitor_monitor_config.yaml\nschedule: \"0 8   *\"  # daily at 08:00\ncompetitors:\n  - slug: openai\n\
  \    pricing_url: \"https://openai.com/pricing\"\n    blog_url: \"https://openai.com/blog\"\n    jobs_query: \"OpenAI engineer\"\
  \n  - slug: anthropic\n    pricing_url: \"https://www.anthropic.com/pricing\"\n    blog_url: \"https://www.anthropic.com/news\"\
  \n    jobs_query: \"Anthropic engineer\"\nchange_threshold_chars: 50  # min chars changed to trigger alert\nsignal_output:\
  \ \".cex/runtime/signals/\""
execution_flow: "on_schedule():\n  for competitor in config.competitors:\n    for signal in [pricing, blog, jobs, news]:\n\
  \      current = fetch(signal.url)\n      previous = load_snapshot(competitor, signal.type)\n      delta = diff(current,\
  \ previous)\n      if abs(delta) > threshold:\n        write_signal(competitor, signal.type, delta)\n        save_snapshot(competitor,\
  \ signal.type, current)\n        notify(competitor, signal.type, delta)"
signal_format_output: 'Written to `.cex/runtime/signals/monitor_{competitor}{type}{timestamp}.json`:


  | Field | Type | Description |

  |-------|------|-------------|

  | `nucleus` | string | `n01` |

  | `signal_type` | string | `competitor_change` |

  | `competitor` | string | slug |

  | `change_type` | string | pricing / feature / hiring / news |

  | `delta_summary` | string | what changed (50-200 chars) |

  | `confidence` | float | 0-1, change detection confidence |

  | `url` | string | source URL |

  | `detected_at` | ISO8601 | detection timestamp |

  | `priority` | P1/P2/P3 | from signal category table |'
snapshot_storage: '| Location | Format | Retention |

  |----------|--------|-----------|

  | `.cex/cache/monitor_snapshots/` | {competitor}{signal}{date}.json | 30 days |

  | N01 compiled outputs | yearly summary | permanent |'
alert_routing: '| Priority | Alert Method | Latency |

  |----------|-------------|---------|

  | P1 | `.cex/runtime/signals/` write + N07 notification | < 1 min |

  | P2 | `.cex/runtime/signals/` write | next N07 check |

  | P3 | log only, weekly digest | weekly |'
performance_targets: '| Metric | Target |

  |--------|--------|

  | Full scan time (10 competitors) | < 5 min |

  | False positive rate | < 10% |

  | Detection latency (P1 signals) | < 24 hours |

  | Uptime | 99.5% (daemon restart on crash) |'
comparison_vs_alternatives: '| Approach | Coverage | Latency | Cost | N01 Fit |

  |----------|---------|---------|------|---------|

  | Manual monitoring | low | days | high time cost | no scale |

  | Google Alerts | medium | hours | free | no structured output |

  | This daemon | high | < 24h | compute only | optimal for N01 |

  | Commercial CI tools (Crayon, Klue) | very high | hours | $$$  | use as benchmark |'
