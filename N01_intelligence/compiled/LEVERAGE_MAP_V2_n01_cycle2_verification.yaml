still_missing_leverage_gaps: ''
critical_block_academic_research: '| Gap | Impact | Frequency | Why Blocking |

  |---|---|---|---|

  | PDF extraction | High | Every arXiv paper fetch | `cex_web_fetch.py` only handles HTML. Full paper text is in PDF. Without
  this, N01 reads 1-page abstract, misses results/citations/body. |

  | Citation parsing | High | Every research brief | Can fetch citations in raw text, but can''t extract authors/year/title/venue/DOI.
  Can''t build "who cites whom" graph. |'
high_reduce_coverage_gaps: '| Gap | Impact | Frequency | Workaround |

  |---|---|---|---|

  | Paywalled content | Medium | Industry papers (IEEE, ACM, Nature) | Manual lookups on institutional access or preprint
  archives |

  | Metadata extraction | Medium | Large research sweeps | Fallback to manual entry or regex + heuristic parsing |'
medium_operational: '| Gap | Impact | Workaround |

  |---|---|---|

  | Rate limiting | Low (only bulk harvests) | Implement sleep between calls in caller code |

  | Caching | Low | Manual de-duplication |

  | JavaScript rendering | Low (modern SPA research) | Skip dynamic content; use `--raw` mode |


  ---'
