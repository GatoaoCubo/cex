1_pdf_text_extractor_critical: "Artifact kind: `browser_tool`  \nImplementation: `cex_pdf_extract.py`\n\nAPI:\npython _tools/cex_pdf_extract.py\
  \ https://arxiv.org/pdf/1706.03762.pdf\npython _tools/cex_pdf_extract.py --local /path/to/paper.pdf\npython _tools/cex_pdf_extract.py\
  \ --max-pages 20  # truncate long papers\n\nWhy: \n- 60% of arXiv content is PDF-only\n- Without this, N01 can only read\
  \ 1-page abstracts, losing paper body, results, citations\n- Enables N01 to extract full text from downloaded papers\n\n\
  Estimated cost: 3 hours (pdfplumber or PyPDF2 wrapper, ASCII-only output)\n\nOwner: N03 (builder nucleus)"
2_citation_extractor_critical: "Artifact kind: `parser`  \nImplementation: `cex_citation_extractor.py`\n\nAPI:\npython _tools/cex_citation_extractor.py\
  \ --paper \"https://arxiv.org/abs/1706.03762\" --format json\npython _tools/cex_citation_extractor.py --text raw_paper_text.txt\
  \ --format bibtex\n\nOutput: Structured JSON with `[authors, year, title, venue, DOI, URL]`\n\nWhy:\n- Build \"who cites\
  \ whom\" graph for research domains\n- Feeds dependency analysis and authority ranking\n- Enables N01 to map research lineage\n\
  \nEstimated cost: 2 hours (regex + citation format parsing: IEEE, APA, BibTeX, ACM)\n\nOwner: N03 (builder nucleus)"
3_source_inventory_audit_high: "Artifact kind: `audit_log` + `quality_gate`  \nImplementation: N01 audit that scans existing\
  \ research artifacts\n\nQuery:\npython _tools/cex_source_inventory_audit.py --scan N01_intelligence/\n# Output: which sources\
  \ are fetchable (✓), PDF (need extractor), paywalled, dead\n\nWhy:\n- Catalog research debt\n- Answer: \"Of our 231 knowledge\
  \ cards, how many source references are actually accessible?\"\n- Prioritize future research builds\n\nEstimated cost: 1\
  \ hour analysis + 2 hours build\n\nOwner: N01 + N05 (operations for validation)\n\n---"
