expected_tool_cex_web_fetch_py: "Status: ✅ CONFIRMED PRESENT & FUNCTIONAL\n\nLocation: `_tools/cex_web_fetch.py` (72 lines)\n\
  \nAPI Surface:\n- `fetch(url: str, timeout=20) → str` — Raw HTTP GET with charset-aware decode\n- `html_to_text(html: str)\
  \ → str` — Strip scripts/styles, remove tags, normalize whitespace\n- `arxiv_url(arxiv_id: str) → str` — Generate arXiv\
  \ export URL from ID\n- CLI modes:\n  - `python cex_web_fetch.py <URL>` — Fetch & convert HTML→text (default)\n  - `python\
  \ cex_web_fetch.py --arxiv 1706.03762` — Shorthand for arXiv IDs\n  - `--raw` — Skip HTML→text conversion (raw body)\n \
  \ - `--max-bytes 20000` — Truncate output (default 20KB)\n\nSufficiency Assessment:\n\n| Capability | Status | Notes |\n\
  |---|---|---|\n| Generic URL fetching | ✅ Full | HTTP GET with User-Agent, charset detection |\n| ArXiv abstracts | ✅ Full\
  \ | Direct `export.arxiv.org/abs/` endpoint |\n| HTML→text conversion | ✅ Full | Removes scripts, styles, tags; normalizes\
  \ whitespace |\n| PDF handling | ❌ Missing | Only fetches HTML; PDF content inaccessible |\n| Citation parsing | ❌ Missing\
  \ | Extracts text, doesn't structure citations |\n| Authentication | ❌ Missing | No OAuth, Bearer token, or paywall support\
  \ |\n| JavaScript rendering | ❌ Missing | No Selenium/Playwright integration |\n| Caching | ❌ Missing | No cache layer;\
  \ re-fetches every call |\n\nLeverage gain: Tool fills the HTTP baseline gap. Enables N01 to fetch web sources and arXiv\
  \ abstracts directly (vs. hardcoded KC data only)."
