tldr: 'Typed API contract reference for all external data sources used by N01: web search, academic DBs, financial data, news
  feeds, and competitive intelligence APIs.'
density_score: 0.91
updated: '2026-04-17'
purpose: N01 MUST triangulate across at least 3 independent sources per claim. This reference defines the typed contract for
  every API category N01 consumes, enabling automated source selection, authentication, rate-limit tracking, and result normalization.
  Analytical Envy drives N01 to ALWAYS compare against competitors. Each API category maps to a specific intelligence use
  case.
api_categories: '| Category | Use Case | Required By | Priority |

  |----------|----------|-------------|----------|

  | Web Search | general queries, news, current events | all research tasks | P1 |

  | Academic | papers, citations, methodology | research quality eval | P1 |

  | Financial | earnings, filings, market data | competitive analysis | P1 |

  | Social Intelligence | sentiment, trends, brand mentions | market analysis | P2 |

  | Patent / IP | innovation tracking, moat analysis | competitive moat | P2 |

  | Job Postings | hiring signal = strategic intent | competitor intel | P2 |

  | Regulatory | compliance, filings, government data | risk assessment | P3 |'
web_search_apis: "| Field | Brave Search | SerpAPI | Exa AI |\n|-------|-------------|---------|--------|\n| Base URL | `https://api.search.brave.com/res/v1/web/search`\
  \ | `https://serpapi.com/search` | `https://api.exa.ai/search` |\n| Auth | `X-Subscription-Token: {key}` | `?api_key={key}`\
  \ | `Authorization: Bearer {key}` |\n| Method | GET | GET | POST |\n| Rate limit | 1 req/s free; 20 req/s paid | 100/month\
  \ free | 1000/month free |\n| Max results | 20 per call | 100 per call | 100 per call |\n| Key params | `q`, `count`, `freshness`,\
  \ `country` | `q`, `num`, `tbs`, `gl` | `query`, `numResults`, `useAutoprompt` |\n| Best for | current events, news | structured\
  \ SERP data | semantic / neural search |\n| Output field | `.web.results[].url` | `.organic_results[].link` | `.results[].url`\
  \ |\n\nRequest contract (Brave):\nGET /res/v1/web/search\n  ?q={encoded_query}\n  &count=10\n  &freshness={pd|pw|pm|py|none}\n\
  \  &country={US|BR|...}\nHeaders:\n  X-Subscription-Token: {BRAVE_API_KEY}\n  Accept: application/json\n\nNormalized output\
  \ fields (all sources):\n\n| Field | Type | Description |\n|-------|------|-------------|\n| `url` | string | Source URL\
  \ |\n| `title` | string | Page/article title |\n| `snippet` | string | Text excerpt |\n| `published_date` | ISO8601 or null\
  \ | Publication date |\n| `source_name` | string | Publisher/domain |\n| `relevance_score` | float 0-1 | Engine-provided\
  \ score |"
academic_apis: "| Field | Semantic Scholar | PubMed | CrossRef |\n|-------|-----------------|--------|---------|\n| Base URL\
  \ | `https://api.semanticscholar.org/graph/v1` | `https://eutils.ncbi.nlm.nih.gov/entrez/eutils` | `https://api.crossref.org/works`\
  \ |\n| Auth | `x-api-key: {key}` (optional, higher rate) | `?api_key={key}` (optional) | none (polite pool) |\n| Rate limit\
  \ | 100/5min unauth; 1/s auth | 10/s with key | 50/s polite pool |\n| Best for | AI/CS papers, citations graph | biomedical,\
  \ clinical | DOI resolution, citation counts |\n| Paper fields | `paperId`, `title`, `abstract`, `year`, `citationCount`,\
  \ `openAccessPdf` | `uid`, `title`, `abstract`, `pubdate` | `DOI`, `title`, `is-referenced-by-count` |\n\nSemantic Scholar\
  \ paper search:\nGET /graph/v1/paper/search\n  ?query={encoded_query}\n  &fields=paperId,title,abstract,year,citationCount,openAccessPdf,authors\n\
  \  &limit=20\n  &offset=0\nHeaders:\n  x-api-key: {SS_API_KEY}"
financial_market_data_apis: '| Field | Alpha Vantage | Yahoo Finance (unofficial) | SEC EDGAR |

  |-------|--------------|--------------------------|-----------|

  | Base URL | `https://www.alphavantage.co/query` | `https://query1.finance.yahoo.com` | `https://data.sec.gov` |

  | Auth | `?apikey={key}` | none | none (public) |

  | Rate limit | 5/min free; 75/min paid | 2000/hour | 10/s public |

  | Key use | stock prices, fundamentals | quick quotes, news | 10-K/10-Q filings |

  | Best for | time-series financial data | competitor overview | regulatory/financial filings |'
error_handling_contract: '| Error | HTTP Code | N01 Action |

  |-------|-----------|-----------|

  | Rate limit | 429 | exponential backoff: 2s, 4s, 8s (max 3 retries) |

  | Auth failure | 401/403 | log + fallback to next source in chain |

  | Not found | 404 | skip, log, continue pipeline |

  | Server error | 5xx | retry once after 5s, then fallback |

  | Timeout | - | 30s timeout per request, fallback on exceed |'
source_triangulation_rule: "Per the N01 quality gate (H01), every major claim requires 3 independent sources.\nTriangulation\
  \ algorithm:\n\nsources = []\nfor category in [web_search, academic, financial]:\n    result = query_api(category, claim_query)\n\
  \    if result.confidence > 0.6:\n        sources.append(result)\n    if len(sources) >= 3:\n        break\nif len(sources)\
  \ < 3:\n    flag_claim(claim, \"INSUFFICIENT_TRIANGULATION\")"
