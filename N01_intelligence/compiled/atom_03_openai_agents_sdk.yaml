3_handoff_protocol_vocabulary: The handoff system is the SDK's core multi-agent primitive, inherited from Swarm.
3_1_handoff_factory_function: "handoff(\n    agent: Agent,\n    tool_name_override: str | None,        # default: transfer_to_{agent.name}\n\
  \    tool_description_override: str | None,\n    on_handoff: Callable | None,           # callback on invocation\n    input_type:\
  \ type | None,               # Pydantic model for tool-call args\n    input_filter: Callable | None,         # transform\
  \ HandoffInputData\n    is_enabled: bool | Callable,           # dynamic enable/disable\n    nest_handoff_history: bool\
  \ | None,     # per-call history nesting override\n) -> Handoff"
