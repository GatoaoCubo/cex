11_key_differences_from_cex_architecture: '| Dimension | OpenAI Agents SDK | CEX |

  |-----------|-------------------|-----|

  | Agent definition | Python class (runtime) | 13 ISOs per kind (static + compiled) |

  | Handoff | In-process function call | File-based .md handoff + dispatch.sh |

  | Guardrail | Code decorator/class | 8F pipeline F7 GOVERN + quality gates |

  | Session | DB-backed (SQLite/Redis/etc) | File-based (.cex/runtime/) |

  | Tracing | OpenTelemetry-like spans | git log + signal files + cex_doctor |

  | Multi-agent | Single process, shared memory | Multi-process, file-based coordination |

  | Tool calling | Python function + MCP | Python tools + MCP + CLI tools |

  | Model routing | ModelProvider interface | cex_router.py + nucleus_models.yaml |

  | Quality control | Output guardrails | 3-layer scoring (structural + rubric + semantic) |

  | Orchestration | Runner.run() loop | N07 dispatch grid + wave planning |


  ---


  ---'
12_breaking_changes_changelog_v0_1_v0_13: 'Source: https://openai.github.io/openai-agents-python/release/ + GitHub releases


  | Version | Breaking Change | Migration |

  |---------|----------------|-----------|

  | v0.1.0 | `MCPServer.list_tools()` signature expanded -- added required `run_context` and `agent` params | Update any custom
  MCP server subclasses |

  | v0.2.0 | Methods accepting `Agent` now accept `AgentBase` (typing-only change) | Adjust type hints if using strict typing
  |

  | v0.3.0 | Realtime API migrated to `gpt-realtime` model and GA interface | Update RealtimeAgent model strings |

  | v0.4.0 | `openai` package v1.x no longer supported -- requires `openai>=2.0` | `pip install "openai>=2.0"` |

  | v0.6.0 | Handoff history now packaged as single assistant message; default transcript includes introductory context before
  conversation block | Audit handoff history consumers |

  | v0.7.0 | Nested handoff history no longer default -- was enabled, now opt-in | Add `RunConfig(nest_handoff_history=True)`
  to restore |

  | v0.7.0 | `reasoning.effort` default changed to `"none"` for `gpt-5.1`/`gpt-5.2` (was `"low"`) | Set `model_settings=ModelSettings(reasoning={"effort":"low"})`
  explicitly if needed |

  | v0.8.0 | Sync function tools now run via `asyncio.to_thread()` on worker threads (not event loop thread) | Migrate thread-local
  state dependencies to async |

  | v0.8.0 | MCP error handling now configurable -- default returns model-visible error instead of failing run | Set `mcp_config={"failure_error_function":
  None}` to restore fail-fast |

  | v0.9.0 | Python 3.9 support dropped (EOL) | Upgrade runtime to Python >= 3.10 |

  | v0.9.0 | `Agent#as_tool()` return type narrowed from `Tool` to `FunctionTool` | Update type annotations that relied on
  broader `Tool` union |

  | v0.10.0 -- v0.13.x | No public-interface breaking changes | -- |


  Release cadence note: Minor version bumps (Y in 0.Y.x) signal possible breaking changes to public non-beta APIs. Pin to
  0.Y.x to avoid unintended breaks.


  ---'
