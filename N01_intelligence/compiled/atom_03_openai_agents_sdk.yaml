13_7_singleagentvoiceworkflow: "`SingleAgentVoiceWorkflow` wraps a single text-based `Agent` for use in a `VoicePipeline`.\n\
  It handles session state, tool integration, and multi-turn handoffs within the voice loop.\n\nfrom agents.voice import SingleAgentVoiceWorkflow,\
  \ VoicePipeline, AudioInput\n\n# Any text agent works -- same as a non-voice agent\nagent = Agent(\n    name=\"Assistant\"\
  ,\n    instructions=\"You are a helpful voice assistant. Be concise.\",\n    model=\"gpt-4.1\",\n    tools=[get_weather],\n\
  \    handoffs=[spanish_agent],   # handoffs work in voice too\n)\n\npipeline = VoicePipeline(\n    workflow=SingleAgentVoiceWorkflow(agent),\n\
  \    config=VoicePipelineConfig(\n        stt_settings=STTModelSettings(language=\"en\"),\n        tts_settings=TTSModelSettings(voice=\"\
  alloy\"),\n    ),\n)\n\n# Push-to-talk mode\naudio_input = AudioInput(buffer=pcm_bytes)\nresult = await pipeline.run(audio_input)\n\
  \n# Stream audio output\nasync for event in result.stream():\n    if event.type == \"voice_stream_event_audio\":\n     \
  \   speaker.write(event.data)       # 1024-byte PCM chunk\n    elif event.type == \"voice_stream_event_lifecycle\":\n  \
  \      print(event.event)              # \"turn_started\" or \"turn_ended\""
13_8_custom_voiceworkflow: "For multi-agent or conditional voice flows, subclass `VoiceWorkflowBase`:\n\nfrom agents.voice\
  \ import VoiceWorkflowBase, VoiceWorkflowCallbacks\n\nclass MyVoiceWorkflow(VoiceWorkflowBase):\n    async def run(self,\
  \ transcription: str, callbacks: VoiceWorkflowCallbacks):\n        # Route to different agents based on transcription\n\
  \        result = await Runner.run(routing_agent, transcription)\n        await callbacks.on_text(result.final_output)"
13_9_voice_pipeline_limitations_as_of_v0_13_6: '- No built-in interruption support for `StreamedAudioInput` (user cannot interrupt
  mid-speech)

  - `RealtimeAgent` (gpt-realtime-1.5) is a separate path -- does NOT use VoicePipeline

  - Voice tracing spans: `transcription_span`, `speech_span`, `speech_group_span` auto-created

  - Install: `pip install "openai-agents[voice]"` (WebSockets optional dep)


  ---'
14_responses_api_integration_map: 'The Responses API is the primary (recommended) transport for the SDK. Key integration points:'
14_1_server_managed_conversation_state: 'Two mutually exclusive strategies for cross-turn continuity via OpenAI servers (no
  local session needed):


  | Strategy | Parameter | How It Works |

  |----------|-----------|-------------|

  | Response chaining | `previous_response_id` | Pass `result.last_response_id` to next `Runner.run()` call |

  | Auto-chaining | `auto_previous_response_id=True` | SDK automatically threads response IDs across turns |

  | Named conversation | `conversation_id` | Server creates a named resource; reuse same ID across workers/services |


  Constraint: `conversation_id` and `previous_response_id` are mutually exclusive. Neither can combine with local `Session`
  in the same run.'
14_2_response_chaining_pattern: 'config = RunConfig(auto_previous_response_id=True)


  # Turn 1

  result = await Runner.run(agent, "Hello", run_config=config)


  # Turn 2 -- SDK automatically links to previous response

  result = await Runner.run(agent, "Follow up", run_config=config)

  # result.last_response_id tracks the chain'
14_3_call_model_input_filter: "Hook executed immediately before each LLM call. Receives fully prepared items (including session\
  \ history) and can trim, inject, or transform:\n\ndef trim_old_items(ctx, agent, input_data):\n    # Keep only last 10 items\
  \ to reduce token burn\n    return ModelInputData(input=input_data.input[-10:])\n\nconfig = RunConfig(call_model_input_filter=trim_old_items)"
14_4_responses_api_only_features: '| Feature | Why Responses-only |

  |---------|-------------------|

  | `ToolSearchTool` | Deferred tool loading via server |

  | `conversation_id` | Server-managed conversation resource |

  | `previous_response_id` | Response chain pointer |

  | `store=True` in ModelSettings | Server-side response storage |

  | `truncation="auto"` in ModelSettings | Server drops oldest items on overflow |

  | `HostedMCPTool` | Remote MCP via server-side execution |

  | WebSocket transport | `OpenAIResponsesWSModel` + `ResponsesWebSocketSession` |'
14_5_responses_api_vs_chat_completions_compatibility: '| Capability | Responses API | Chat Completions |

  |-----------|---------------|-----------------|

  | SDK recommended | YES | Fallback only |

  | Hosted tools | YES | NO |

  | MCP (hosted) | YES | NO |

  | should_replay_reasoning_content | NO | YES (v0.10+) |

  | Response chaining | YES | NO |

  | Structured outputs | YES | YES |

  | Streaming | YES | YES |

  | Default model | gpt-4.1 | gpt-4.1 |


  ---'
