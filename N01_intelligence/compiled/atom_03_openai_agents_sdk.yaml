3_4_handoff_vs_agent_as_tool: '| Pattern | Control | History | Use When |

  |---------|---------|---------|----------|

  | Handoff | Full transfer -- receiving agent responds directly | Shared or nested | Specialist takes over conversation |

  | Agent.as_tool() | Orchestrator keeps control | Isolated (by default) | Sub-task, return result to orchestrator |


  ---'
4_guardrail_types_and_interface: ''
4_1_type_taxonomy: "Guardrail\n  +-- InputGuardrail          (agent-level, on user input)\n  |     +-- parallel mode     (concurrent\
  \ with agent, default)\n  |     +-- blocking mode     (before agent starts)\n  +-- OutputGuardrail         (agent-level,\
  \ on final output)\n  +-- ToolInputGuardrail      (tool-level, before tool execution)\n  +-- ToolOutputGuardrail     (tool-level,\
  \ after tool execution)"
4_2_guardrail_function_signature: "@input_guardrail\nasync def check(ctx: RunContextWrapper, agent: Agent, input: str | list)\
  \ -> GuardrailFunctionOutput:\n    return GuardrailFunctionOutput(\n        output_info={\"reason\": \"...\"},\n       \
  \ tripwire_triggered=False\n    )"
4_3_tripwire_mechanics:
- Guardrail returns `GuardrailFunctionOutput(tripwire_triggered=True)`
- SDK wraps in `InputGuardrailResult` or `OutputGuardrailResult`
- SDK raises `InputGuardrailTripwireTriggered` or `OutputGuardrailTripwireTriggered`
- Execution halts immediately
4_4_workflow_boundaries: '- Input guardrails: ONLY on the first agent in a chain

  - Output guardrails: ONLY on the last agent in a chain

  - Tool guardrails: on ANY agent that calls the guarded tool

  - For multi-agent per-tool safety: use tool guardrails, not agent guardrails


  ---'
5_tracing_observability_terms: ''
5_1_hierarchy: "Trace (workflow_name, trace_id, group_id)\n  +-- agent_span\n  |     +-- generation_span (LLM call)\n  | \
  \    +-- function_span (tool call)\n  |     +-- guardrail_span\n  |     +-- handoff_span\n  +-- agent_span (after handoff)\n\
  \  |     +-- generation_span\n  |     ...\n  +-- custom_span (user-defined)"
5_2_processing_pipeline: "Span created -> TracingProcessor.on_span_start()\n                  -> TracingProcessor.on_span_end()\n\
  \                    -> BatchTraceProcessor (batches)\n                      -> BackendSpanExporter (sends to OpenAI)"
5_3_integration_points: '- OpenAI Dashboard: native visualization

  - Custom exporters: implement `TracingProcessor`

  - OpenTelemetry: bridge via custom processor

  - Logfire, LangSmith, Braintrust: community integrations


  ---'
