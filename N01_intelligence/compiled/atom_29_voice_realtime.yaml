12_livekit_agents_room_track_plugin_system: 'Source: LiveKit Agents, LiveKit Docs'
12_1_room_architecture: "Agents join LiveKit rooms as full WebRTC participants. SFU (Selective Forwarding Unit) routes media\
  \ only to necessary participants -- horizontal scaling without media processing overhead.\n\nAgentServer\n  |-- WorkerPool\n\
  \        |-- Worker 1 -> Room A\n        |      |-- AudioTrack (subscribe: user input)\n        |      |-- AudioTrack (publish:\
  \ TTS output)\n        |-- Worker 2 -> Room B"
12_2_roomio_subsystems: '| Subsystem | Interface | Purpose |

  |-----------|-----------|---------|

  | Input stream | `AudioInput` | Subscribe to user track, buffer pre-connect audio |

  | Output stream | `AudioOutput` | Publish TTS audio as track |

  | Transcript sync | `TextOutput` | Sync STT transcripts with audio playback |

  | Participant lifecycle | event hooks | Handle join/leave, track subscribe/unsubscribe |'
12_3_plugin_architecture: "from livekit.plugins import openai, silero, deepgram, cartesia, turn_detector\n\nagent = VoicePipelineAgent(\n\
  \    vad=silero.VAD.load(),\n    stt=deepgram.STT(),\n    llm=openai.LLM(model=\"gpt-4o\"),\n    tts=cartesia.TTS(),\n \
  \   turn_detector=turn_detector.EOUModel(),\n)\n\nChanging a provider = one line change. No pipeline rewiring."
12_4_silero_vad_plugin_configuration: "silero.VAD.load(\n    min_speech_duration=0.05,       # seconds; min duration to classify\
  \ as speech\n    min_silence_duration=0.55,      # seconds; silence before speech end declared\n    prefix_padding_duration=0.5,\
  \    # seconds; audio before speech onset kept\n    max_buffered_speech=60.0,       # seconds; max buffer before force-flush\n\
  \    activation_threshold=0.5,       # 0.0-1.0; Silero probability threshold\n    sample_rate=16000,              # 8000\
  \ or 16000 Hz only\n    # deactivation defaults to max(activation_threshold - 0.15, 0.01)\n)"
12_5_eou_end_of_utterance_semantic_turn_detection: 'LiveKit''s EOU model is a 135M-parameter transformer (SmolLM v2 base)
  fine-tuned for turn completion prediction. Uses sliding window of last 4 conversation turns. Recommended combination: Silero
  VAD + EOU model together for best accuracy. Source: LiveKit EOU blog ---'
13_vad_cross_provider_reference: 'Source: Picovoice VAD Comparison 2026, Silero VAD'
13_1_accuracy_benchmark_at_5_fpr: '| Provider | TPR @ 5% FPR | Architecture | Latency/Frame | Open Source |

  |----------|-------------|-------------|--------------|-------------|

  | Cobra (Picovoice) | 98.9% | DNN on-device | <1ms CPU | No |

  | Silero VAD | 87.7% | PyTorch DNN | <1ms CPU (30ms) | Yes |

  | WebRTC VAD (Google) | 50.0% | GMM signal processing | <0.5ms CPU | Yes |

  | TEN VAD | N/A | DNN, 10-16ms frames | low-latency | Yes |


  At 5% FPR: WebRTC misses 1 in 2 speech frames; Silero misses 1 in 8; Cobra misses 1 in 100.'
13_2_configuration_snippets: 'WebRTC VAD:

  import webrtcvad

  vad = webrtcvad.Vad(aggressiveness=3)  # 0=least, 3=most aggressive

  # frame: 160/320/480 samples at 16kHz (10/20/30ms)


  Silero VAD:

  model, utils = torch.hub.load(''snakers4/silero-vad'', ''silero_vad'', onnx=True)

  threshold = 0.5            # speech probability threshold (0.0-1.0)

  sampling_rate = 16000      # 8000 or 16000 only

  window_size_samples = 512  # frame size in samples


  OpenAI server_vad:

  {"type": "server_vad", "threshold": 0.5, "silence_duration_ms": 500}


  OpenAI semantic_vad:

  {"type": "semantic_vad", "eagerness": "auto"}


  LiveKit Silero:

  silero.VAD.load(activation_threshold=0.5, min_silence_duration=0.55)


  ---'
14_moshi_s2s_architecture_deep_dive: 'Source: Moshi arXiv:2410.00037, Kyutai GitHub'
14_1_architecture_overview: "Full-duplex S2S foundation model -- no cascading pipeline. Simultaneously listens and speaks,\
  \ modeling both user and system audio as parallel streams.\n\nUser audio stream (continuous)\n  + System audio stream (Moshi's\
  \ own previous speech)\n         |\n    Mimi Codec (encoder) -- 80ms frames, 12.5Hz\n         |\n    Temporal Transformer\
  \ (7B, 32L) -- temporal dependencies\n         |\n    Depth Transformer (6L) -- inter-codebook deps per timestep\n     \
  \    |\n    Inner Monologue -- text token BEFORE audio tokens\n         |\n    Mimi Codec (decoder) -> Audio output"
14_2_temporal_transformer_specs: '| Parameter | Value |

  |-----------|-------|

  | Layers | 32 |

  | Attention heads | 32 |

  | Model dimension | 4,096 |

  | MLP dimension | 11,264 |

  | Context length | 4,096 tokens |

  | Position encoding | RoPE |

  | Normalization | RMSNorm |

  | Attention | FlashAttention |

  | Activation | Gated Linear Units (SiLU) |

  | Initialized from | Helium 7B text LM |'
14_3_depth_transformer_specs: '| Parameter | Value |

  |-----------|-------|

  | Layers | 6 |

  | Attention heads | 16 |

  | Model dimension | 1,024 |

  | MLP dimension | 4,096 |

  | Function | Inter-codebook dependency per timestep |'
14_4_mimi_codec_architecture: '| Component | Detail |

  |-----------|--------|

  | Architecture | SeaNet (causal convolutions) |

  | Encoder strides | 4 blocks: factors 4, 5, 6, 8 |

  | Bottleneck | 8 transformer layers before + after quantization |

  | Quantization | Split RVQ: 1 semantic VQ (WavLM-distilled) + 7 acoustic quantizers |

  | Codebook size | 2,048 entries each |

  | Bitrate | 1.1 kbps at 12.5Hz |

  | Frame size | 80ms |

  | Training | Adversarial-only (feature + discriminator losses) |'
14_5_inner_monologue_mechanism: 'Per-frame prediction sequence: `[text_token] -> [semantic_codebook] -> [acoustic_codebooks
  1..7]` Text tokens are Whisper-transcribed, time-aligned to 12.5Hz, and predicted before audio tokens at each timestep.
  Enables: improved factuality, zero-shot streaming ASR + TTS, real-time compatible generation.'
14_6_dual_stream_modeling: '| Dimension | Detail |

  |-----------|--------|

  | Streams | 2: user audio + Moshi audio |

  | Representation | Separate semantic + acoustic sequences per stream |

  | Turn-taking | No explicit speaker boundaries -- overlap/interruption natural |

  | Training | Diarized single-speaker audio + Fisher dataset (true separate channels) |'
14_7_latency_profile: '| Stage | Latency |

  |-------|---------|

  | Mimi frame size | 80ms |

  | Acoustic delay | 80ms |

  | Theoretical E2E | 160ms |

  | Practical E2E (L4 GPU) | 200ms |

  | Human conversation avg | 230ms (10 languages) |'
14_8_moshi_vs_alternatives: '| Dimension | Moshi | OpenAI Realtime | Cascading Pipeline |

  |-----------|-------|----------------|-------------------|

  | Architecture | Native dual-stream | Codec-based tokens | Modular STT+LLM+TTS |

  | Latency | 200ms | ~300ms | 500-1500ms |

  | Full-duplex | Yes | Yes | No (half-duplex) |

  | LLM flexibility | Fixed (Helium-7B) | Fixed (gpt-4o-realtime) | Any LLM |

  | Tool calling | Limited | Native | Full |

  | Open source | Yes (Kyutai) | No | Yes (components) |

  | Customizable voice | No | Yes (voice param) | Yes (TTS provider) |


  ---'
15_voice_agent_architecture_decision_tree_extended: "LATENCY REQUIREMENT?\n  <200ms -> Moshi (200ms practical, full-duplex,\
  \ open source)\n  <300ms -> OpenAI Realtime (gpt-4o-realtime, native tool calls)\n  <500ms -> Pipecat or LiveKit cascading\
  \ (modular, any LLM)\n  flexible -> standard cascading (maximum control)\n\nFULL-DUPLEX NEEDED?\n  Yes -> Moshi or OpenAI\
  \ Realtime\n  No  -> Cascading pipeline\n\nTOOL CALLING NEEDED?\n  Yes -> OpenAI Realtime (native) OR cascading (full)\n\
  \  No  -> Moshi OK\n\nOPEN SOURCE REQUIRED?\n  Yes -> Moshi (Kyutai) or Pipecat + Silero + open LLM\n  No  -> Any provider\n\
  \nFRAMEWORK CHOICE:\n  Pipecat               LiveKit\n  - 25+ TTS providers   - Room/SFU model\n  - 19+ STT providers  \
  \ - EOU semantic turn detection\n  - Frame-based pipes   - Multi-party voice rooms\n  - Observer metrics    - Managed infra\
  \ option\n  - Daily/LK/WS/local   - Worker pool scaling\n\nVAD SELECTION:\n  Accuracy priority  -> Cobra VAD (98.9% TPR)\n\
  \  Speed + open src   -> Silero VAD (87.7% TPR, <1ms)\n  Zero-dependency    -> WebRTC VAD (GMM, 50% TPR, fastest)\n  OpenAI\
  \ Realtime    -> server_vad (energy) or semantic_vad (transformer)\n  LiveKit agents     -> Silero + EOU model (recommended\
  \ combo)\n\nTRANSPORT:\n  Browser  -> WebRTC (ICE/DTLS/RTP, Opus)\n  Server   -> WebSocket (persistent, bidirectional)\n\
  \  Phone    -> SIP (PSTN gateway, IVR fallback)\n  Scale    -> LiveKit SFU (selective forwarding, horizontal scale)\n\n\
  ---"
