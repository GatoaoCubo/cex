tldr: Market intelligence pipeline for N01. 7-stage STORM+CRAG+CRITIC with 30+ sources, multi-model routing, budget-aware.
density_score: 0.92
purpose: 'Automated market intelligence for any business served by N01 Intelligence. Reads a company-specific YAML config
  and executes a 7-stage research pipeline: classify intent, plan multi-perspective queries (STORM), retrieve from 30+ sources
  in parallel with quality gates (CRAG), deduplicate entities, score on 7 dimensions, synthesize with domain-specific models,
  and verify with a thinking model (CRITIC).'
pipeline: "QUERY ─► S1 INTENT (classify domain, route)\n           │\n           ▼\n         S2 PLAN/STORM (5 perspectives\
  \ × 5-7 sub-Qs)\n           │\n           ▼\n         S3 RETRIEVE/CRAG (parallel, score ≥0.7)\n           │\n          \
  \ ▼\n         S4 RESOLVE (entity dedup cross-source)\n           │\n           ▼\n         S5 SCORE (Gartner 7-dim)\n  \
  \         │\n           ▼\n         S6 SYNTHESIZE/GoT (domain models)\n           │\n           ▼\n         S7 VERIFY/CRITIC\
  \ (thinking model, max 3 iter)\n           │\n     ┌─────┼─────┐\n     ▼     ▼     ▼\n   HTML  PPTX  JSON"
model_routing: '| Stage | Model | Parameters | Purpose |

  |-------|--------|------------|---------|

  | S1 Intent | gemini-2.5-pro | temp=0.1, max=512 | Domain classification, routing decisions |

  | S2 STORM | gemini-2.5-pro | temp=0.3, max=2048 | Multi-perspective query planning |

  | S3 CRAG | gemini-2.5-flash | temp=0.2, max=1024 | Retrieval quality scoring, filtering |

  | S4 Resolve | gemini-2.5-pro | temp=0.1, max=1024 | Entity deduplication, cross-referencing |

  | S5 Score | gemini-2.5-pro | temp=0.2, max=512 | 7-dimension Gartner scoring |

  | S6 Synthesize | gemini-2.5-pro | temp=0.4, max=4096 | Research synthesis, GoT reasoning |

  | S7 CRITIC | gemini-2.5-pro | temp=0.1, max=2048 | Verification, error detection |'
usage: '# Full research from config

  python research_pipeline.py --config config.yaml --query "mercado de acessorios para gatos"


  # Specific stages only

  python research_pipeline.py --config config.yaml --query "..." --stages 1-3


  # Dry run (plan only, no retrieval)

  python research_pipeline.py --config config.yaml --query "..." --dry-run'
source_categories: '| Category | Purpose | Examples |

  |----------|---------|---------|

  | Inbound | Product/marketplace data | MercadoLivre, Shopee, Amazon, G2 |

  | Outbound | Social intelligence | YouTube, Reddit, ReclameAqui |

  | Search | Web search engines | Serper, Exa, Brave, Tavily |

  | Trends | Price/trend tracking | Google Trends, Keepa |

  | RAG | Internal knowledge | Company docs, embeddings |'
config_reference: 'Company config: `_instances/{company}/N01_intelligence/research_pipeline_config.yaml` Template: `P04_tools/templates/tpl_research_pipeline.md`'
quality_gates:
- 7 stages complete ✓
- CRAG score ≥ 0.7 per result ✓
- CRITIC max 3 iterations ✓
- Budget caps enforced ✓
- Zero plaintext secrets ✓
