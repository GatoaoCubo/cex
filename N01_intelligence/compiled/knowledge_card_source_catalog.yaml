fallback_chains: '| Pipeline | Primary → Secondary → Tertiary → Final | Timeout (sec) | Skip Condition |

  |----------|----------------------------------------|---------------|----------------|

  | Marketplace | API direct (5s) → Firecrawl scrape (15s) → Serper site:search (10s) → skip | 30 total | 3 consecutive failures
  |

  | Search | Serper (3s) → Brave (5s) → Tavily (8s) → Exa (10s) | 26 total | No results + 429 error |

  | Social | YouTube API (5s) → Serper site:youtube (8s) → skip | 13 total | API quota exceeded |

  | Trends | pytrends (10s) → Serper trends (8s) → skip | 18 total | Region not supported |

  | Implementation: Try primary → if (timeout OR 4xx error OR empty) → next fallback → log failure reason'
