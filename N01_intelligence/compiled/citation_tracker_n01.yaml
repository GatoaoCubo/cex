tldr: 'Citation network tracker for N01: maps paper-to-paper citation graphs, identifies seminal works, tracks citation velocity,
  and discovers emerging research frontiers. Uses Semantic Scholar API.'
density_score: 0.87
updated: '2026-04-17'
purpose: 'Reading a paper in isolation = missing 90% of the signal.

  The citation graph reveals:

  - Which papers are foundational (high citations = standing on shoulders)

  - Which papers are rising fast (citation velocity = frontier papers)

  - Which clusters exist (community detection = school of thought)

  - What a paper builds on and what builds on it


  N01 Analytical Envy: always know who ELSE is working on the same problem.'
citation_graph_operations: ''
forward_citations_what_cites_this_paper: "Shows who built on this work. High count = foundational. Rapid recent growth = current\
  \ relevance.\n\nforward_citations(paper_id: str) -> list[Paper]:\n  SS_API.get(f\"/paper/{paper_id}/citations?fields=paperId,title,year,citationCount&limit=500\"\
  )"
backward_citations_what_this_paper_cites: "Shows the intellectual lineage. Identifies the papers N01 should also read.\n\n\
  backward_citations(paper_id: str) -> list[Paper]:\n  SS_API.get(f\"/paper/{paper_id}/references?fields=paperId,title,year,citationCount&limit=200\"\
  )"
citation_velocity: "Detects rising papers: papers with accelerating citation rate are frontier works.\n\nvelocity(paper_id:\
  \ str, window_years: int = 2) -> float:\n  annual_counts = get_annual_citations(paper_id)\n  recent = sum(annual_counts[-window_years:])\
  \ / window_years\n  historical = sum(annual_counts[:-window_years]) / max(1, len(annual_counts) - window_years)\n  return\
  \ recent / max(1, historical)  # velocity > 2.0 = accelerating rapidly"
citation_network_metrics: '| Metric | Calculation | Interpretation |

  |--------|------------|----------------|

  | H-index (domain) | h papers with >= h citations | overall field impact |

  | Citation velocity | recent_avg / historical_avg | trend: > 2.0 = accelerating |

  | PageRank (paper) | centrality in citation graph | intellectual importance |

  | Cluster coefficient | ratio of connected neighbors | community membership |

  | Breadth | unique citing domains | cross-disciplinary impact |'
seminal_paper_identification: '| Criteria | Threshold | Label |

  |----------|-----------|-------|

  | Citation count | > 1000 | SEMINAL |

  | Citation count | > 100 | SIGNIFICANT |

  | Velocity | > 2.0 AND count > 10 | RISING |

  | Velocity | < 0.5 | DECLINING |

  | Age AND count | < 2 years AND > 50 | BREAKOUT |'
research_frontier_detection: "Emerging papers are the highest-value intelligence signal:\n\nfrontier_papers = [p for p in\
  \ recent_papers\n    if p.citation_velocity > 2.0\n    and p.year >= current_year - 2\n    and p.citationCount > 10]\n\n\
  frontier_papers.sort(by=\"citation_velocity\", ascending=False)\n\nThese are the papers everyone will be citing in 12 months.\n\
  N01 reads them NOW."
output_format: '## Citation Analysis: {topic}


  ### Seminal Papers (top 5 by citations)

  | Paper | Year | Citations | Velocity | Significance |

  |-------|------|-----------|---------|-------------|


  ### Rising Papers (top 5 by velocity)

  | Paper | Year | Citations | Velocity | Why It Matters |

  |-------|------|-----------|---------|----------------|


  ### Research Clusters

  | Cluster | Core Papers | Theme |

  |---------|------------|-------|


  ### Research Gaps

  | Gap | Evidence | Opportunity |

  |-----|----------|-------------|'
rate_limits_semantic_scholar: '| Mode | Rate | Strategy |

  |------|------|---------|

  | Unauthenticated | 100 req / 5 min | batch paper IDs |

  | Authenticated | 1 req/s | streaming |

  | Bulk API | 10M papers CSV | for full corpus analysis |'
comparison_vs_alternatives: '| Tool | Graph Analysis | Velocity | Structured | N01 Fit |

  |------|---------------|---------|------------|---------|

  | Google Scholar | no API | no | no | manual only |

  | Semantic Scholar | full API | manual | yes | primary |

  | This tracker | API + velocity + graph | yes | yes (typed) | optimal |

  | Connected Papers | visual only | no | no | for exploration |'
