density_score: 1.0
purpose: '| Item | Decision |

  |------|----------|

  | Config name | `n01_research_secrets` |

  | Provider | `vault` |

  | Scope | Credential registry for N01 model access and external research connectors |

  | Lens | Analytical Envy accumulates source reach fast; secret hygiene ensures ambition does not become credential sprawl
  |

  | Value policy | identifiers and paths only, never live secret values |'
values: '| Secret ID | Usage | Storage Path | Rotation | Access Pattern |

  |----------|-------|--------------|----------|----------------|

  | `sec_n01_llm_provider` | base LLM gateway key | `vault://cex/n01/llm/provider` | every 30 days | injected |

  | `sec_n01_search_provider` | search or retrieval API | `vault://cex/n01/search/provider` | every 45 days | injected |

  | `sec_n01_trace_sink` | optional tracing endpoint token | `vault://cex/n01/telemetry/trace_sink` | every 60 days | env
  |'
provider: '| Field | Value |

  |------|-------|

  | backend | `vault` |

  | auth method | workload identity |

  | namespace | `cex/n01` |

  | audit log | true |

  | fallback | `env_ref_only` |'
rotation_policy: '| Secret ID | Frequency | Method | Trigger | Rollback |

  |----------|-----------|--------|---------|----------|

  | `sec_n01_llm_provider` | monthly | automatic | time-based or suspected leak | restore prior version for 1 hour |

  | `sec_n01_search_provider` | every 45 days | automatic | time-based or provider alert | revert to last good version |

  | `sec_n01_trace_sink` | every 60 days | manual | incident or operator change | disable tracing until replaced |'
encryption: '| Layer | Standard |

  |------|----------|

  | at rest | `AES-256-GCM` |

  | in transit | `TLS 1.3` |

  | secret versioning | enabled |

  | access audit | mandatory |'
access_pattern: '| Step | Behavior |

  |-----|----------|

  | 1 | runtime requests secret by `secret_id` only |

  | 2 | vault resolves workload identity and namespace policy |

  | 3 | value is injected into process memory or env for limited duration |

  | 4 | trace logs store only the `secret_id`, never the value |

  | 5 | expired lease forces re-fetch instead of local persistence |'
rationale: '| Design Choice | Why | Analytical Envy Interpretation |

  |--------------|-----|--------------------------------|

  | vault over flat env file | N01 touches many providers and should not leak breadth through copied keys | operational rigor
  supports ambitious research |

  | short rotation for provider key | model access is highest blast-radius secret | the strongest capability deserves the
  strongest hygiene |

  | tracing token separated | observability should not share blast radius with model access | compare systems without coupling
  every credential |

  | fallback is ref-only | emergency mode keeps config usable without storing secrets in docs | discipline under pressure
  matters most |

  | explicit secret ids | env config and runtime can point cleanly into this registry | envy scales better when references
  are stable |'
example: "name: n01_research_secrets\nprovider: vault\nrotation_policy:\n  frequency: monthly\n  method: automatic\nencryption:\n\
  \  at_rest: AES-256-GCM\n  in_transit: TLS 1.3\nsecret_paths:\n  - vault://cex/n01/llm/provider\n  - vault://cex/n01/search/provider\n\
  access_pattern: injected\nfallback: env_ref_only"
