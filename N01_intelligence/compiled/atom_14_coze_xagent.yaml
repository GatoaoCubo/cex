6_lessons_for_cex: ''
6_1_absorb_from_coze:
- 'Workflow node diversity: CEX workflows need typed nodes (LLM, Code, Knowledge, Database, Condition, Loop, Message, Question).
  Current YAML-only workflows lack composable node types.'
- 'Mid-execution user interaction: The Question node pattern (pause-for-input) could extend GDP beyond F4 to any pipeline
  step.'
- 'NL2SQL for structured data: Adding a database layer would unlock analytics use cases that filesystem artifacts cannot serve.'
- 'Card output format: A `card` kind in P05 for structured UI responses would bridge the gap between Markdown artifacts and
  interactive frontends.'
6_2_absorb_from_xagent:
- 'Formalize the dual loop: Name CEX''s existing pattern explicitly. N07 wave dispatch = outer loop. Nucleus 8F = inner loop.
  Add milestone objects.'
- 'Dynamic routing: Enhance `cex_router.py` to consider task complexity, not just domain, when selecting a nucleus.'
- 'Container isolation: For production deployments, wrap nucleus tool execution in Docker containers (ToolServer pattern).'
- 'Reactive human help: Complement GDP''s proactive decisions with a reactive "AskForHumanHelp" tool that nuclei can invoke
  mid-execution when stuck.'
