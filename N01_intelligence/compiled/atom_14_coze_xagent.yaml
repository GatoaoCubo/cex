tldr: Coze is ByteDance's visual agent platform (Go/Hertz backend, React+TypeScript frontend, Docker Compose self-hosting)
  with 13 workflow node types, Skills Marketplace API, and persistent planning. XAgent is Tsinghua/OpenBMB's autonomous agent
  with Dispatcher-Planner-Actor triad, dual-loop state machine (outer=planning, inner=ReACT execution), Docker-containerized
  ToolServer (Manager+Monitor+Node tiers), and AskForHumanHelp HITL protocol.
