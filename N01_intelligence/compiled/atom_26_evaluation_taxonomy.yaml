2_judge_scorer_roles: ''
2_1_core_judge_paradigms_from_learning_to_rank_theory: '| Paradigm | Function | Output | Best For |

  |----------|----------|--------|----------|

  | Pointwise | f(q, x_i) -> s_i | Absolute quality score | Offline eval, reward modeling, dataset filtering |

  | Pairwise | f(q, x_i, x_j) -> P(x_i > x_j) | Relative preference | RLHF, preference learning, higher inter-rater agreement
  |

  | Listwise | f(q, {x_1,...,x_n}) -> permutation | Full ranking | RAG reranking, global consistency, NDCG optimization |'
2_2_judge_roles: '| Role | Description | When Used |

  |------|-------------|-----------|

  | Grader | Assigns scores against a rubric (pointwise) | Quality assessment, artifact scoring |

  | Evaluator | Assesses task completion and correctness | End-to-end pipeline evaluation |

  | Critic | Identifies flaws, suggests improvements | Iterative refinement loops |

  | Verifier | Binary pass/fail against ground truth | Factual correctness, test validation |

  | Arbiter | Decides preference between alternatives | A/B testing, model comparison |

  | Safety Assessor | Checks for harmful/toxic/biased content | Guardrail enforcement |

  | Domain Expert | Specialized evaluation in a narrow field | Medical, legal, financial domains |

  | Defender | Challenges evaluations adversarially | Multi-agent panel evaluation |'
2_3_judge_architectures: '| Architecture | Models | Paradigm Support | Strength |

  |-------------|--------|-----------------|----------|

  | Encoder-Only (cross-encoder) | monoBERT, duoBERT, ListBERT | Pointwise, pairwise, listwise | High precision via token-level
  interaction |

  | Encoder-Decoder (FiD) | ListT5, T5-rankers | Primarily listwise | Global comparison without quadratic cost |

  | Decoder-Only (LLM) | GPT judges, Prometheus, Prometheus 2 | All three via prompting | Flexible task adaptation |'
2_4_scoring_output_types: '| Type | Scale | Example |

  |------|-------|---------|

  | Binary | yes/no, pass/fail | Factual correctness |

  | Ternary | 3-point ordinal | Acceptable/marginal/unacceptable |

  | Likert | 1-5 or 0-10 | Helpfulness, coherence |

  | Continuous | [0, 1] normalized | Confidence scores |

  | Categorical | Named classes | Response quality labels |'
2_5_judge_bias_types: '| Bias | Description | Mitigation |

  |------|-------------|------------|

  | Length/Verbosity Bias | Prefer longer outputs | Length normalization, conciseness criteria |

  | Position Bias | Prefer first/last position in comparisons | Position randomization |

  | Self-Preference Bias | Favor same model family outputs | Anonymization, diverse panels |

  | Over-Confidence | Fail to detect subtle errors | Fact-checking prompts, human validation |

  | Prompt Sensitivity | Output varies with minor prompt changes | APO (Automatic Prompt Optimization) |

  | Reward Hacking | Outputs game the judge''s criteria | Diverse judges, metric triangulation |

  | Central Tendency | Avoid extreme scores on broad scales | Anchored examples, calibration |

  | Halo Effect | One good criterion inflates others | Per-criterion atomic evaluation |


  ---'
3_rubric_types_holistic_vs_analytic: ''
3_1_holistic_rubrics: '| Property | Description |

  |----------|-------------|

  | Structure | Single overall score for entire output |

  | Scale | Typically 1-5 or 1-10 |

  | Strength | Fast, simple, low cost |

  | Weakness | No per-criterion signal; hides disagreement sources |

  | Use case | Quick screening, high-volume filtering |

  | CEX mapping | quality_gate (P11) -- single numeric threshold |'
3_2_analytic_rubrics: '| Property | Description |

  |----------|-------------|

  | Structure | Multiple independent criteria, each scored separately |

  | Scale | Per-criterion (binary, ordinal, or nominal) |

  | Strength | Per-criterion diagnosis, optimization signals, construct validation |

  | Weakness | Higher cost (N criteria x M judges), design complexity |

  | Use case | Training feedback, RL reward shaping, targeted improvement |

  | CEX mapping | scoring_rubric (P07) -- 5D weighted framework |'
3_3_autorubric_criterion_types_arxiv_2603_00077: '| Type | Description | Reliability | Example |

  |------|-------------|-------------|---------|

  | Binary | MET/UNMET verdicts | Highest (87% accuracy, kappa=0.642) | "Is the claim factually correct?" |

  | Ordinal | Ranked scales (3-5 levels) | Moderate (kappa 0.549-0.719) | "Rate helpfulness: poor/fair/good/excellent" |

  | Nominal | Unordered categories | Variable (81% overall, asymmetric recall) | "Classify response length: brief/adequate/verbose"
  |'
3_4_rubric_design_components: '| Component | Purpose |

  |-----------|---------|

  | Criterion Definition | Clear description of what is evaluated |

  | Scale Labels | Explicit names for each score level |

  | Anchored Examples | Concrete samples for each level |

  | Scoring Guidelines | Decision rules for adjacent scores |

  | Negative Weights | Penalties for anti-patterns (counters leniency bias) |'
3_5_autorubric_aggregation_strategies: "| Strategy | Formula | When |\n|----------|---------|------|\n| Weighted Sum | score\
  \ = max(0, min(1, Sum(v_i * w_i) / Sum(w_i>0))) | Default composite |\n| Majority Vote | Mode of N judges per criterion\
  \ | Multi-judge ensemble |\n| Unanimous | All judges agree or flag | High-stakes decisions |\n| Any-Vote | At least 1 judge\
  \ flags | Safety/violation detection |\n\nWeighted Sum -- Full Implementation\n\nscore = max(0, min(1, sum(v_i * w_i) /\
  \ sum(w_i for w_i > 0)))\n\nVariable definitions:\n- `v_i` = verdict value for criterion i:\n  - Binary (MET=1, UNMET=0)\n\
  \  - Ordinal: normalize level k of K levels -> (k-1)/(K-1), e.g., 4-level: {0.0, 0.33, 0.67, 1.0}\n  - Nominal: domain-assigned\
  \ weight per class label (e.g., brief=0.8, adequate=1.0, verbose=0.3)\n- `w_i` = criterion weight (float; positive=reward,\
  \ negative=penalty for anti-patterns)\n- Denominator = sum of POSITIVE weights ONLY -- prevents penalties from inflating\
  \ the score\n- `max(0, ...)` prevents composite from going below 0 when penalties dominate\n\nExample: 3-criterion analytic\
  \ rubric\n\n| Criterion | Type | Weight | MET verdict (v_i) |\n|-----------|------|--------|-------------------|\n| Factual\
  \ accuracy | Binary | +0.50 | 1 |\n| Conciseness | Ordinal (4-level) | +0.30 | 0.67 (adequate) |\n| Safety (no harmful content)\
  \ | Binary | -0.20 | 0 = penalty applies |\n\n- Safe output: score = max(0, min(1, (1*0.50 + 0.67*0.30 + 0*(-0.20)) / (0.50+0.30)))\
  \ = (0.50+0.20)/0.80 = 0.875\n- Unsafe output: score = max(0, min(1, (1*0.50 + 0.67*0.30 + 1*(-0.20)) / 0.80)) = max(0,\
  \ 0.30/0.80) = 0.375\n\nAutoRubric EnsembleEvaluationReport fields\n\n| Field | Type | Description |\n|-------|------|-------------|\n\
  | `criterion_id` | str | Unique criterion identifier |\n| `criterion_type` | enum | Binary / Ordinal / Nominal |\n| `verdicts`\
  \ | list[Verdict] | One per judge (N judges) |\n| `aggregated_verdict` | Verdict | Mode (majority) for binary/nominal; mean\
  \ for ordinal |\n| `agreement_score` | float | Cohen's kappa across judges |\n| `confidence_interval` | tuple[float, float]\
  \ | 95% bootstrap CI |\n| `abstention_rate` | float | Fraction of CANNOT_ASSESS verdicts across judges |\n\nCANNOT_ASSESS\
  \ verdict handling modes\n\n| Mode | Behavior | Use Case |\n|------|----------|----------|\n| `SKIP` | Exclude criterion\
  \ from weighted sum | Information absent |\n| `ZERO` | Force v_i = 0 (worst case) | Safety-critical contexts |\n| `PARTIAL`\
  \ | Assign midpoint v_i = 0.5 | Ambiguous evidence |\n| `FAIL` | Abort evaluation, escalate to human | Irrecoverable ambiguity\
  \ |\n\nKey empirical finding (AutoRubric paper, 2026): Reasoning-chain few-shot examples INCREASE\nhallucination by 12%\
  \ vs verdict-only examples. Use verdict-balanced examples WITHOUT reasoning\nchains for calibration. CANNOT_ASSESS occurs\
  \ in 8.3% of real-world cases; ignoring them\ninflates composite scores by 0.7-1.2 points."
3_6_autorubric_calibration_techniques: '| Technique | Description |

  |-----------|-------------|

  | Verdict-Balanced Few-Shot | 3-5 examples with correct verdicts (no reasoning chains) |

  | Per-Criterion Atomic Evaluation | Separate LLM call per criterion -- prevents conflation |

  | Multi-Judge Ensemble | N judges x M criteria concurrent calls |

  | Option Shuffling | Deterministic per-item seeds to counter position bias |

  | CANNOT_ASSESS Verdict | Native abstention handling (SKIP/ZERO/PARTIAL/FAIL) |'
3_6b_autorubric_implementation_pipeline_arxiv_2603_00077: "Five-stage pipeline for automatic rubric construction and application:\n\
  \nStage 1 -- Criterion Generation\n\nInput: task_description + reference_outputs (3-5 gold samples).\nPrompt instructs LLM\
  \ to generate criteria with type (Binary/Ordinal/Nominal), weight, and 3 anchored examples.\nOutput: JSON array of criterion\
  \ objects.\n\nStage 2 -- Criterion Typing and Weight Assignment\n\n| Criterion Type | Score Range | Aggregation Rule | Typical\
  \ Weight |\n|----------------|-------------|------------------|----------------|\n| Binary | {0, 1} | MET=1, UNMET=0, CANNOT_ASSESS=skip\
  \ | 1.0 (blocking) or 0.5 |\n| Ordinal (3-level) | {0, 0.5, 1} | poor=0, fair=0.5, good=1.0 | 0.3-0.7 |\n| Ordinal (5-level)\
  \ | {0, 0.25, 0.5, 0.75, 1} | linear normalization | 0.2-0.5 |\n| Nominal | varies | category_weight[label] | 0.1-0.3 |\n\
  \nStage 3 -- Per-Criterion Atomic Evaluation\n\nOne LLM call per criterion (prevents halo conflation).\nCritical: verdict-balanced\
  \ few-shot (1 positive + 1 negative + 1 edge case minimum).\nReasoning chains in examples INCREASE hallucination rate by\
  \ 12% -- use verdicts only (AutoRubric ablation).\n\nStage 4 -- Score Aggregation Formula\n\nscore = max(0, min(1, sum(v_i\
  \ * w_i) / sum(w_i for w_i > 0 if v_i != SKIP)))\n\nWhere:\n- v_i = normalized verdict value for criterion i\n- w_i = weight\
  \ (positive=reward, negative=penalty for anti-patterns)\n- Denominator: sum of POSITIVE weights only (penalties subtract\
  \ via negative v*w)\n- CANNOT_ASSESS verdicts: handled per policy (SKIP/ZERO/PARTIAL/FAIL)\n\nConcrete example with 3 criteria\
  \ (factual_accuracy=MET, completeness=fair, verbosity=penalty):\nscore = max(0, min(1, (1.0*2.0 + 0.5*1.0 + (-1.0)*0.5)\
  \ / (2.0+1.0)))\n      = max(0, min(1, 2.0 / 3.0))\n      = 0.667\n\nStage 5 -- Multi-Judge Ensemble Options\n\n| Strategy\
  \ | Formula | Use When |\n|----------|---------|----------|\n| majority_vote | mode(verdicts) | Classification tasks |\n\
  | mean_score | mean(scores) | Regression scoring |\n| conservative | min(scores) | Safety-critical decisions |\n| optimistic\
  \ | max(scores) | Creative output evaluation |\n| weighted | sum(score_j * weight_j) / sum(weights) | Heterogeneous judge\
  \ panel |\n\nReliability Benchmarks (AutoRubric paper)\n\n| Criterion Type | Cohen's Kappa | Accuracy vs Human |\n|----------------|---------------|-------------------|\n\
  | Binary | 0.642 | 87.3% |\n| Ordinal (3-5 levels) | 0.549-0.719 | 76-83% |\n| Nominal | variable | 81.2% overall |\n\n\
  Failure mode: asymmetric recall on rare nominal categories -- 18% lower recall on minority class."
3_6b_autorubric_r1v_multimodal_extension_arxiv_2510_14738: 'Extension of AutoRubric principles to multimodal RLVR (Reinforcement
  Learning with Verifiable Rewards):


  | Component | Description |

  |-----------|-------------|

  | Compare-and-compose aggregation | Distills consistent reasoning checkpoints from multiple successful trajectories |

  | Process-level rubric construction | Builds problem-specific rubrics without human annotation or teacher models |

  | Spurious step filtering | Retains only consistent, essential reasoning steps across independent trajectories |

  | Dual reward signal | Combines rubric-based process rewards + final outcome rewards in GRPO training |


  Performance (Qwen2.5-VL-7B-IT base, 6 multimodal benchmarks):


  | Metric | AutoRubric-R1V | Vanilla GRPO | Base Model | VL-Rethinker |

  |--------|---------------|-------------|-----------|--------------|

  | Avg absolute improvement | +7.52% | baseline | 0% | +3.1% |

  | Reasoning inconsistency rate | 12.6% | 21.8% | 14.7% | 15.5% |

  | Rank among open-source | SOTA | - | - | 2nd |


  CEX implication: AutoRubric-R1V''s process-level supervision applies to N07 nucleus evaluation --

  each reasoning step in a nucleus run can be scored via compare-and-compose over multiple

  successful N07 dispatches. F1-F8 steps map directly to rubric checkpoints.'
