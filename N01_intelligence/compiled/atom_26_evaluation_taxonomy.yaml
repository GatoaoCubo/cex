14_autorubric_implementation_deep_dive: 'Implementation-level detail for integrating AutoRubric-style evaluation into CEX
  pipelines. Source: arxiv 2603.00077 (March 2026)'
14_1_full_pipeline_architecture: "INPUTS\n  task_description    -- what was the task asking for?\n  expected_behavior   --\
  \ rubric seed or reference output\n  generated_output    -- candidate response to evaluate\n        |\n        v\nPHASE\
  \ 1: CRITERION GENERATION\n  Prompt: list N independent criteria, each with type/weight/penalty flag\n  Optimal: 5-12 criteria;\
  \ more than 15 degrades inter-rater agreement\n        |\n        v\nPHASE 2: PER-CRITERION ATOMIC SCORING (parallelizable)\n\
  \  Per criterion: verdict-balanced few-shot (3-5 examples, NO reasoning chains)\n  Binary  -> {MET, UNMET, CANNOT_ASSESS}\n\
  \  Ordinal -> {L1, L2, ..., LK}\n  Nominal -> {CAT_A, CAT_B, ...}\n        |\n        v\nPHASE 3: AGGREGATION\n  Binary:\
  \  v_i = 1 if MET, 0 if UNMET, None if CANNOT_ASSESS\n  Ordinal: v_i = (level_index - 1) / (K - 1)\n  weighted_sum = sum(v_i\
  \ * w_i for i where v_i is not None)\n  denominator  = sum(w_i for i where w_i > 0)\n  score = max(0.0, min(1.0, weighted_sum\
  \ / denominator))\n  Note: negative weights reduce score but do NOT reduce denominator"
14_2_key_formulas: "Weighted Composite Score:\nscore = max(0.0, min(1.0,\n    sum(v_i * w_i for i in criteria if v_i is not\
  \ None)\n    / sum(w_i for i in criteria if w_i > 0)\n))\n\nCANNOT_ASSESS Disposition:\nSKIP:    exclude from numerator\
  \ and denominator (optional criteria)\nZERO:    v_i = 0, keep in denominator (strict mode, high-stakes)\nPARTIAL: v_i =\
  \ 0.5, keep in denominator (exploratory mode)\nFAIL:    abort, escalate to human (safety-critical pipelines)\n\nInter-Rater\
  \ Reliability:\n# Cohen's Kappa (binary/nominal)\nkappa = (P_observed - P_expected) / (1 - P_expected)\n\n# Quadratic-Weighted\
  \ Kappa (ordinal)\nkappa_qw = 1 - sum(W_ij  O_ij) / sum(W_ij  E_ij)\nW_ij = (i - j)^2 / (N_levels - 1)^2\n\nPass@k Unbiased\
  \ Estimator:\npass_at_k = 1 - product((n-c-i)/(n-i) for i in range(k))\nwhere n = total samples, c = correct samples, k\
  \ = budget"
14_3_reliability_by_criterion_type_vs_alternatives: '| Criterion Type | AutoRubric Accuracy | AutoRubric Kappa | vs G-Eval
  holistic | vs Prometheus 2 |

  |---------------|--------------------|-----------------|--------------------|-----------------|

  | Binary | 87% | 0.642 | +14pp, +0.18 kappa | Comparable on structured tasks |

  | Ordinal (3-level) | 79% | 0.549 | +6pp | Prometheus wins on open-ended |

  | Ordinal (5-level) | 74% | 0.571 | +1pp | Comparable |

  | Nominal | 81% overall | asymmetric | +8pp macro avg | Varies by category |


  Key finding: Binary criteria most reliable -- use for hard gates.

  Reasoning-chain few-shot increases hallucination by 12% vs verdict-only.'
14_4_calibration_protocol: "Step 1: Curate verdict-balanced examples\n  - Binary: 1-2 MET + 1-2 UNMET + 0-1 CANNOT_ASSESS\n\
  \  - Ordinal: 1 example per level (K examples total)\n  - CRITICAL: NO reasoning chains (+12% hallucination if included)\n\
  \  - Include: criterion text + evidence snippet + verdict only\n\nStep 2: Validate calibration on 20+ held-out labeled items\n\
  \  - Binary target: accuracy >= 80%, kappa >= 0.50\n  - Ordinal target: quadratic kappa >= 0.55\n  - If below: add examples\
  \ or split into simpler sub-criteria\n\nStep 3: Anchor to CEX reference artifacts\n  - golden_test (quality 9.5+) = top-score\
  \ anchor\n  - quality_gate failing artifact = bottom-score anchor"
14_5_autorubric_to_cex_mapping: '| AutoRubric Component | CEX Equivalent | Location |

  |---------------------|---------------|----------|

  | Criterion generation | scoring_rubric frontmatter | P07_evaluation/ |

  | Per-criterion atomic eval | L2 Rubric in cex_score.py | _tools/cex_score.py |

  | Weighted composite | L2 layer (30% weight) | scoring logic |

  | CANNOT_ASSESS SKIP | density_score: null handling | artifact frontmatter |

  | Verdict-balanced few-shot | golden_test kind (P07) | calibration artifacts |

  | Multi-judge ensemble | llm_judge panel config | P07 judge configs |

  | kappa / Cronbach alpha | NOT YET IN CEX | Gap: add --reliability flag |


  ---'
15_classic_clear_full_scoring_formulas: Implementation-level formulas for enterprise agent evaluation.
15_1_classic_dimensional_formulas_iclr_2025_workshop: 'Cost (C): `C_score = max(0.0, 1.0 - (actual_cost_per_task / budget_cost_per_task))`


  Latency (L): `L_score = 1.0 - clip((actual_latency - sla_latency) / sla_latency, 0.0, 1.0)`

  (1.0 if within SLA, 0.0 if 2x SLA or worse)


  Accuracy (A): `A_score = count(tasks_completed_correctly) / total_tasks`


  Security (S1): `S1_score = 1.0 - (security_incidents / total_interactions)` (target >= 0.99)


  Stability (S2):

  cv = std(task_success_per_run) / mean(task_success_per_run)

  S2_score = 1.0 - clip(cv, 0.0, 1.0)   # target >= 0.90 (< 10% CV)


  CLASSic Composite:

  CLASSic = w_C*C + w_L*L + w_A*A + w_S1*S1 + w_S2*S2


  Default (equal):      0.2 each

  Customer support:     C=0.2, L=0.3, A=0.2, S1=0.15, S2=0.15

  Code/engineering:     C=0.1, L=0.1, A=0.5, S1=0.1,  S2=0.2

  Financial/regulated:  C=0.1, L=0.1, A=0.3, S1=0.3,  S2=0.2


  Production gate: CLASSic >= 0.85'
15_2_clear_dimensional_formulas_arxiv_2511_14136: 'Cost -- Cost-Normalized Accuracy (CNA):

  CNA = (task_accuracy / cost_per_task) * 100

  CNA_norm = clip(CNA / CNA_baseline / 2.0, 0.0, 1.0)


  Latency -- SLA Compliance Rate (SCR):

  SCR = count(tasks_within_sla) / total_tasks


  SLA thresholds: support=3s, code=30s, reasoning=120s, docs=300s, research=600s


  Assurance -- Policy Adherence Score (PAS):

  PAS = 1.0 - (policy_violations / total_policy_critical_actions)

  targets: regulated >= 0.99, standard >= 0.95


  Reliability -- Pass@k (unbiased estimator):

  pass_at_k = 1.0 - product((n-c-i)/(n-i) for i in range(k))


  Targets: mission-critical pass@8 >= 0.80, standard pass@3 >= 0.70


  CLEAR Composite:

  CLEAR = 0.2*CNA_norm + 0.2*SCR + 0.2*E + 0.2*PAS + 0.2*pass_at_k


  Enterprise gate: CLEAR >= 0.85 | Mission-critical: CLEAR >= 0.90'
15_3_classic_vs_clear_vs_cex_3_layer: '| Property | CLASSic | CLEAR | CEX 3-Layer |

  |----------|---------|-------|-------------|

  | Cost metric | Budget ratio | CNA (value-linked) | cex_token_budget.py |

  | Latency | SLA deviation | SCR (% within SLA) | Router latency (indirect) |

  | Quality | Task success rate | Domain accuracy (E) | L1+L2+L3 composite |

  | Security | Explicit S1 | Embedded in PAS | Guardrail kinds (P11) |

  | Reliability | CV-based stability | Pass@k probabilistic | quality_gate threshold |

  | Composite target | >= 0.85 | >= 0.85 | >= 9.0 (10pt scale) |

  | Best for | Security + regulated | ROI + reliability | Artifact quality workflow |'
