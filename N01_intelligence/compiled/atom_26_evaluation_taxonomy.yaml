12_evaluation_strategy_decision_tree: "Use this tree to select the correct evaluation approach for any CEX context.\n\nSTEP\
  \ 1: What is the primary output type?\n|\n+-- Structured artifact (YAML/MD with schema)?\n|     -> Use: L1 Structural (automated\
  \ rule-checks) + L2 Rubric (5D)\n|     -> Then: L3 LLM-Judge only if L1+L2 >= 8.5\n|\n+-- Natural language generation (copy,\
  \ docs, summaries)?\n|     -> Use: G-Eval (CoT LLM judge) + ROUGE/BERTScore for coverage\n|     -> Then: Pairwise for A/B\
  \ comparison if multiple variants\n|\n+-- Code / executable artifact?\n|     -> Use: Functional tests (pass/fail) as primary\
  \ gate\n|     -> Then: SWE-bench-style trajectory eval for agent code\n|     -> Then: Static analysis (L1) for format compliance\n\
  |\n+-- Agent trajectory / multi-step task?\n|     -> Use: Trajectory precision + recall + task completion\n|     -> Then:\
  \ Tool correctness + argument correctness\n|     -> Then: Step efficiency (unnecessary step detection)\n|\n+-- RAG pipeline\
  \ output?\n      -> Use: Faithfulness + Answer Relevancy + Contextual Precision\n      -> Then: Groundedness check (NLI-based\
  \ or LLM judge)\n      -> Then: Multi-turn metrics if conversational\n\nSTEP 2: What is the evaluation budget?\n|\n+-- Low\
  \ (< $0.10/artifact)?\n|     -> Use: Automated rule-checks (L1) + lightweight pointwise judge (haiku-level)\n|     -> Avoid:\
  \ Multi-judge panels, listwise, pairwise at scale\n|\n+-- Medium ($0.10-$1.00/artifact)?\n|     -> Use: L1 + L2 + single\
  \ sonnet-level pointwise judge (L3)\n|     -> Consider: 3-judge panel for high-stakes artifacts\n|\n+-- High (> $1.00/artifact)?\n\
  \      -> Use: Full 3-layer (L1+L2+L3) + multi-judge panel (3-5 judges)\n      -> Include: Pairwise comparison against golden_test\
  \ reference\n      -> Include: Human validation sample (5-10%)\n\nSTEP 3: What is the deployment stage?\n|\n+-- Pre-deployment\
  \ (development)?\n|     -> Priority: Analytic rubric (identify specific improvement targets)\n|     -> Trigger: Commit-triggered\
  \ CI gate\n|     -> Threshold: 8.0 floor (iterate below)\n|\n+-- Pre-release (staging)?\n|     -> Priority: End-to-end eval\
  \ + adversarial testing\n|     -> Trigger: Manual + schedule (daily)\n|     -> Threshold: 9.0 target, 8.5 hard floor\n|\n\
  +-- Production (monitoring)?\n      -> Priority: Drift detection (quality trend over time)\n      -> Trigger: Event-triggered\
  \ + scheduled (weekly baseline)\n      -> Threshold: Alert if rolling avg drops > 0.3 below baseline\n\nSTEP 4: Safety requirements?\n\
  |\n+-- None (internal tooling)?\n|     -> Skip safety dimension from CLASSic/CLEAR\n|\n+-- Standard (customer-facing)?\n\
  |     -> Add: toxicity + bias + hallucination checks to rubric\n|     -> Use: Safety assessor judge role (separate LLM call)\n\
  |\n+-- High (medical/legal/financial)?\n      -> Use: FORTRESS-style adversarial + MASK truthfulness\n      -> Use: Conservative\
  \ ensemble (min score wins)\n      -> Require: Human audit of 10%+ sample\n      -> Gate: PAS >= 0.99 before deploy\n\n\
  STEP 5: Judge type selection?\n|\n+-- Need absolute quality score? -> Pointwise\n|     +-- High reliability needed? -> Multi-judge\
  \ panel (majority vote)\n|     +-- Standard? -> Single judge with calibrated rubric\n|\n+-- Need relative preference? ->\
  \ Pairwise (higher inter-rater agreement)\n|\n+-- Need global ranking? -> Listwise (NDCG optimization)\n|\n+-- Need training\
  \ signal? -> Pairwise (RLHF-compatible) or Listwise (LambdaRank)\n\nCEX Artifact Pipeline Recommendation (implements above\
  \ tree for standard artifacts):\n1. L1 Structural check (automated, free)\n2. L2 5D Rubric score (analytic, medium cost)\n\
  3. If L1+L2 >= 8.5: L3 LLM judge (pointwise, haiku-level)\n4. If L3 score < 8.0: flag for cex_evolve.py improvement loop\n\
  5. Golden test comparison if kind has reference artifact\n\n---"
13_2026_research_updates: New papers and findings from Q1-Q2 2026 relevant to evaluation taxonomy.
13_1_autorubric_march_2026_new_in_this_update: 'Source: AutoRubric: Unifying Rubric-based LLM Evaluation


  Key findings not covered in earlier versions:

  - Binary criteria (kappa=0.642) significantly outperform ordinal in inter-rater reliability

  - Reasoning chains in few-shot examples INCREASE hallucination 12% vs verdict-only examples

  - CANNOT_ASSESS verdict handles 8.3% of real-world evaluation cases; ignoring these inflates scores by 0.7-1.2 points

  - Penalty weights (negative w_i) reduce leniency bias by 23% in tested rubrics

  - Auto-generated criteria match human-designed criteria at 81% overlap when task description is detailed'
13_2_swe_bench_pro_2026: 'Source: SWE-bench Pro leaderboard (https://www.swebench.com/)


  - 1,865 problems across 41 professional repositories (vs 500 in Verified)

  - Hidden test set prevents contamination

  - Claude 3.7 Sonnet: 62.3% resolution rate

  - Key insight: professional repos require multi-file reasoning -- single-file patch agents fail at 2x rate'
13_3_livemcpbench_2026: 'Source: LiveMCPBench


  - First benchmark evaluating real MCP server navigation at scale

  - Measures: server discovery, tool selection, parameter construction, multi-server chaining

  - Critical gap vs ToolBench: LiveMCPBench uses LIVE servers (no mocking) -- failure modes differ

  - Top agents reach 71% on mock-based benchmarks but only 43% on live servers'
13_4_browsecomp_2026_openai: 'Source: BrowseComp


  - 1,266 questions requiring persistent browsing to find hard-to-find information

  - Human baseline: 78.5% (with browsing tools); LLM-only baseline: 3.1%

  - Tests: multi-hop web reasoning, synthesis across sources, temporal tracking

  - Distinguishes: agents that CAN browse vs agents that can REASON about browsed content'
13_5_frames_for_factual_grounding_2025_2026: 'Source: FRAMES: Factuality, Retrieval, And Reasoning Evaluation for Multi-step
  Scenarios


  - 824 question-answer pairs requiring multi-hop retrieval + synthesis

  - Measures: retrieval precision, reasoning chain validity, final answer faithfulness

  - Key metric: End-to-end faithfulness (not just retrieval quality)

  - CEX relevance: maps to D4 Domain Accuracy + RAG faithfulness in evaluation pipeline'
13_6_survey_evaluation_of_llm_based_agents_arxiv_2503_16416_march_2026: 'First comprehensive survey of evaluation methodologies
  for LLM agents. Key taxonomy:


  4-Dimensional Taxonomy (what to evaluate x how to evaluate):


  | Dimension | Sub-components |

  |-----------|---------------|

  | Fundamental capabilities | Planning, tool use, self-reflection, memory |

  | Application-specific | Web agents, SWE agents, scientific agents, conversational agents |

  | Generalist agents | Agents spanning multiple domains |

  | Evaluation frameworks | Infrastructure, tooling, dataset construction |


  Critical gaps identified by the survey:

  1. Cost-efficiency evaluation largely absent from existing benchmarks

  2. Safety and robustness assessment inconsistent across frameworks

  3. Benchmarks favor static tasks; production deployments are dynamic'
13_7_survey_evaluation_and_benchmarking_of_llm_agents_arxiv_2507_21504_kdd_2026: '2-Dimensional Taxonomy (objectives x process):


  | Axis | Elements |

  |------|---------|

  | Objectives (What) | Agent behavior, capabilities, reliability, safety |

  | Process (How) | Interaction modes, datasets/benchmarks, metric computation, tooling |


  Active benchmark categories covered: Coding/SWE (SWE-bench, ScienceAgentBench, CORE-Bench,

  PaperBench, AppWorld), Web/Computer (BrowserGym, WebArena, WebCanvas, VisualWebArena, MMInA,

  AssistantBench), Multi-environment (AgentBench, GAIA, OSWorld).


  Key trend: Shift from static fixed tasks to continuously updated contamination-resistant benchmarks.

  Contamination occurs within 6 months for most fixed benchmarks -- rolling releases are required.'
13_8_deepresearcheval_arxiv_2601_09688_january_2026: 'Automated framework for evaluating long-form deep research reports (not
  QA pairs):


  | Component | Description |

  |-----------|-------------|

  | Page-as-unit paradigm | Page is the basic evaluation unit; detects local failures per page |

  | Adaptive scoring | Per-page logical quality assessment via LLM judge |

  | Paged-RAG mechanism | Retrieval-augmented fact verification against configurable reference DB |

  | Reference DB | Constructible from any document corpus; verifies claims against sources |


  Cost: ~433 seconds per full-length deep research report (Qwen-Plus API), suitable for offline batch eval.


  CEX mapping: Applicable to N01 research atom quality assessment when atoms exceed 5K bytes.

  For CEX''s 32-atom Atlas: budget ~4 hours for full DeepResearchEval sweep.'
13_10_evaluation_anti_patterns_found_in_2026_studies: '| Anti-Pattern | Discovered In | Effect | Mitigation |

  |--------------|--------------|--------|------------|

  | Reasoning-chain few-shot | AutoRubric 2026 | +12% hallucination | Use verdict-only examples |

  | Single-judge L3 eval | LLM-Judge survey | High variance (sigma=1.2 on 10pt scale) | 3-judge majority vote |

  | Holistic-only rubric | HELM 2.0 analysis | Masks per-criterion failure | Add analytic subcriteria |

  | Static benchmark reuse | LiveBench paper | Contamination within 6 months | Rolling benchmark refresh |

  | Mock-server evaluation | LiveMCPBench | 28pp gap vs live servers | Require live server testing |

  | CANNOT_ASSESS ignored | AutoRubric 2026 | +0.7-1.2 score inflation | Implement SKIP/ZERO/PARTIAL/FAIL policies |


  ---'
