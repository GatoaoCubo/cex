title: CEX Artifact Specification
author: CEX Working Group
date: 2023-10-15
description: 'Comprehensive technical specification for the CEX (Component Exchange) framework,

  covering 124 standardized kinds across 12 pillars, with cross-language term mapping,

  ingestion roadmap, and evaluation metrics.

  '
1_executive_summary: 'This document defines the CEX framework''s technical architecture, including:

  - 124 standardized artifact kinds

  - 12 core technical pillars

  - Cross-language terminology mapping

  - Ingestion pipeline strategy

  - Evaluation and feedback mechanisms


  The framework supports multi-model, multi-lingual, and multi-domain systems through:

  - 132 unique artifact kinds

  - 62 core kinds with dual-pillar assignments

  - 82 non-core kinds for specialized use cases


  ---'
2_technical_pillars_and_artifact_kinds: ''
2_1_pillar_overview: '| Pillar | Domain | Primary Use Case | Key Kinds |

  |--------|--------|------------------|-----------|

  | P01 Knowledge | Information Management | Knowledge representation | `knowledge_card`, `embedding_config` |

  | P02 Model | System Architecture | Model definition | `model_card`, `agent` |

  | P03 Prompt | Natural Language Processing | Prompt engineering | `prompt_template`, `reasoning_trace` |

  | P04 Tools | Functionality | Tool integration | `function_def`, `retriever` |

  | P05 Output | User Interaction | Response formatting | `formatter`, `edit_format` |

  | P06 Schema | Data Modeling | Type definitions | `input_schema`, `interface` |

  | P07 Evaluation | Quality Assurance | Performance metrics | `benchmark`, `scoring_rubric` |

  | P08 Architecture | System Design | Pattern definition | `component_map`, `pattern` |

  | P09 Config | Operational Parameters | Configuration management | `feature_flag`, `sandbox_config` |

  | P10 Memory | State Management | Memory persistence | `entity_memory`, `session_state` |

  | P11 Feedback | Safety Controls | Risk mitigation | `guardrail`, `safety_taxonomy` |

  | P12 Orchestration | Workflow Management | Process coordination | `workflow`, `handoff` |


  ---'
3_cross_language_term_mapping: ''
3_1_terminology_table: '| English | Chinese (zh) | Japanese (ja) | Korean (ko) | CEX Kind |

  |---------|--------------|----------------|-------------|----------|

  | Agent | 智能体 / 代理 | エージェント | 에이전트 | `agent` |

  | Tool | 工具 | ツール | 도구 | `function_def` |

  | Memory | 记忆 | メモリ | 기억 | `entity_memory` |

  | Workflow | 工作流 | ワークフロー | 워크플로우 | `workflow` |

  | Retrieval | 检索 | 検索 | 검색 | `retriever` |

  | Embedding | 向量化 | エンベディング | 임베딩 | `embedding_config` |

  | Prompt | 提示词 | プロンプト | 프롬프트 | `prompt_template` |

  | Knowledge Base | 知识库 | 知識ベース | 지식베이스 | `knowledge_card` |

  | Fine-tuning | 微调 | ファインチューニング | 파인튜닝 | `finetune_config` |

  | Guardrail | 防护栏 | ガードレール | 가드레일 | `guardrail` |

  | Evaluation | 评估 | 評価 | 평가 | `scoring_rubric` |

  | Pipeline | 流水线 | パイプライン | 파이프라인 | `workflow` |

  | Handoff | 交接 | ハンドオフ | 핸드오프 | `handoff` |

  | Router | 路由器 | ルーター | 라우터 | `router` |

  | Supervisor | 监督者 / 管理员 | スーパバイザ | 슈퍼바이저 | `supervisor` |

  | Role (MetaGPT) | 角色 | ロール | 역할 | `agent` |

  | SOP (MetaGPT) | 标准操作流程 | SOP | 표준 운영 절차 | `workflow` |

  | Action (MetaGPT) | 动作 | アクション | 액션 | `function_def` |

  | Session | 会话 | セッション | 세션 | `session_state` |

  | Streaming | 流式传输 | ストリーミング | 스트리밍 | `streaming_config` |


  > Note: Actual CJK characters are stored in YAML data files. Romanized forms shown for ASCII compatibility.


  ---'
4_ingestion_roadmap: ''
4_1_prioritized_sources: '| Rank | Source | Format | Term Count | Action | Effort |

  |------|--------|--------|------------|--------|--------|

  | 1 | NIST AI Glossary (CSV) | CSV | 511 | Parse CSV -> `glossary_entry` | LOW |

  | 2 | A2A .proto files | Protobuf | ~30 | Parse protobuf -> `interface` | LOW |

  | 3 | MCP JSON Schema | JSON Schema | ~25 | Parse schema -> `input_schema` | LOW |

  | 4 | OpenAI OpenAPI spec | OpenAPI 3.x | ~40 | Parse spec -> `api_client` | LOW |

  | 5 | LangChain concepts docs | Markdown | ~60 | Parse h2/h3 -> `glossary_entry` | MEDIUM |

  | 6 | LlamaIndex concepts docs | Markdown | ~40 | Parse h2/h3 -> `glossary_entry` | MEDIUM |

  | 7 | Google ML Glossary | HTML | 500+ | Scrape dl/dt/dd -> `glossary_entry` | MEDIUM |

  | 8 | ML Ontology (OWL/RDF) | RDF/OWL | 700 | Parse RDF -> `knowledge_card` | HIGH |

  | 9 | OWL Ontology Definitions | OWL | 300+ | Parse OWL -> `schema` | HIGH |

  | 10 | MetaGPT Documentation | Markdown | 200+ | Parse code blocks -> `function_def` | MEDIUM |


  ---'
5_evaluation_metrics: ''
5_1_quality_assurance_framework: '| Metric | Target | Current | Methodology |

  |--------|--------|---------|-------------|

  | Artifact Coverage | 100% | 92% | Cross-referencing with industry standards |

  | Language Support | 100% | 85% | Multi-lingual term mapping validation |

  | Schema Consistency | 95% | 88% | Automated schema validation tools |

  | Performance | <10ms | 12ms | Benchmarking against 100+ models |

  | Safety Compliance | 100% | 95% | Guardrail penetration testing |


  ---'
