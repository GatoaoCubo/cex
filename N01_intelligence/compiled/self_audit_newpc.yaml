3_identified_gaps: '| # | Gap | Impact | Priority | Comparison |

  |---|-----|--------|----------|------------|

  | 1 | No requirements.txt / pyproject.toml for N01 dependencies | New PC setup requires guessing which pip packages to install.
  numpy+sklearn gap would not exist if deps were declared. | HIGH | N05 (operations) should own a project-level requirements.txt
  |

  | 2 | KC library missing from disk | P01_knowledge/library/kind/ with 123 kind KCs is referenced in CLAUDE.md but absent.
  F2 BECOME and F3 INJECT cannot load builder knowledge cards. | HIGH | Blocks ALL nuclei, not just N01 |

  | 3 | No `chunk_strategy` or `vector_store` artifacts | Cannot configure RAG chunking or vector backends for long-document
  research. Semantic search over papers requires both. | MEDIUM | Partially mitigated by embedding_config but that only covers
  model selection, not chunking or storage |


