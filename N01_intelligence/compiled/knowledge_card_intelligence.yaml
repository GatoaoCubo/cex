data_source: Internal synthesis of best practices in academic and market research.
core_research_methodologies:
- 'Systematic Literature Review: A structured approach to locate, appraise, and synthesize
  all available evidence for a specific question.'
- 'Competitor SWOT Analysis: Framework for identifying and analyzing the Strengths,
  Weaknesses, Opportunities, and Threats of market competitors.'
- 'Market Trend Analysis: The process of analyzing data over time to identify consistent
  patterns or trends in a market.'
- 'Technology Benchmarking: A systematic comparison of selected technologies or products
  against a defined standard.'
- 'Thematic Synthesis: A method for identifying and analyzing patterns or themes across
  qualitative data.'
key_information_sources:
- 'Primary Research: Peer-reviewed articles from academic journals (e.g., arXiv,
  JSTOR, IEEE Xplore), original government reports.'
- 'Financial & Corporate Filings: Official documentation filed with regulatory bodies
  (e.g., SEC EDGAR database).'
- 'Patent Databases: Technical specifications and legal claims from patent offices
  (e.g., USPTO, EPO).'
- 'Reputable Market Research: Reports from established analyst firms (e.g., Gartner,
  Forrester, IDC).'
- 'Technical Documentation: Official product documentation, whitepapers, and developer
  guides.'
- 'Secondary Sources: Credible industry news outlets and conference proceedings.'
analysis_synthesis_frameworks:
- 'PESTLE Analysis: (Political, Economic, Social, Technological, Legal, Environmental)
  for understanding external market forces.'
- 'Porter''s Five Forces: For analyzing industry structure and competitive intensity.'
- 'First-Principles Thinking: Deconstructing complex problems into their most basic,
  foundational elements.'
hierarchy_of_evidence: |
  [Tier 1: Highest] Peer-Reviewed Scientific Papers, Controlled Trials
         |
  [Tier 2: High]    Official Govt. Reports, Corporate Financial Filings
         |
  [Tier 3: Moderate] Conference Papers, Market Research Reports, Patents
         |
  [Tier 4: Lower]   Technical Whitepapers, Reputable News Journalism
         |
  [Tier 5: Lowest]  Blog Posts, Opinion Articles, Unverified Sources
