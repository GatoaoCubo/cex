tldr: Quantitative benchmark for N01 research quality -- measures source density, triangulation rate, freshness compliance,
  output density, and pipeline throughput across research deliverables.
density_score: 0.94
setup: ''
environment: '| Component | Requirement |

  |-----------|-------------|

  | Python | >= 3.11 |

  | CEX SDK | `cex_score.py`, `cex_compile.py`, `cex_retriever.py` operational |

  | MCP servers | brave-search, firecrawl, markitdown, fetch accessible |

  | Corpus | N01_intelligence/P05_output/ contains >= 10 research outputs |

  | Scoring rubric | `scoring_rubric_intelligence.md` loaded |

  | Source quality contract | `source_quality_contract.md` loaded |'
fixtures:
- 'Sample research queries: 20 predefined queries covering all 6 output types (competitive_grid, swot, market_snapshot, trend_report,
  benchmark_report, executive_summary)'
- Expected source counts per query type (minimum triangulation targets)
- Known-good reference outputs for quality floor comparison
methodology: '| Parameter | Value |

  |-----------|-------|

  | Iterations | 10 (run each query type at least 10 times) |

  | Warmup runs | 1 (first run excluded from statistics) |

  | Percentiles | p50, p95, p99 |

  | Significance threshold | p < 0.05 (Mann-Whitney U test vs baseline) |

  | Measurement protocol | Automated scoring via `cex_score.py --apply` + manual spot-check on 20% sample |'
metrics: '| Metric | Unit | Baseline | Target | Direction |

  |--------|------|----------|--------|-----------|

  | Source density | sources/claim | 1.5 | 3.0 | higher_is_better |

  | Triangulation rate | % claims with 3+ sources | 45% | 80% | higher_is_better |

  | Freshness compliance | % sources within freshness window | 70% | 90% | higher_is_better |

  | Output density score | density (0.0-1.0) | 0.78 | 0.90 | higher_is_better |

  | Quality score (peer-reviewed) | quality (0.0-10.0) | 7.8 | 9.0 | higher_is_better |

  | Pipeline latency | minutes per research brief | 45 | 30 | lower_is_better |

  | Factual error rate | errors per output | 1.2 | 0.1 | lower_is_better |

  | Schema compliance | % outputs passing schema contracts | 85% | 100% | higher_is_better |

  | Context window utilization | % of 1M tokens used per session | 60% | 40% | lower_is_better |'
execution: "# Run full benchmark suite\npython _tools/cex_score.py --benchmark N01_intelligence/P05_output/ \\\n  --rubric N01_intelligence/quality/scoring_rubric_intelligence.md\
  \ \\\n  --iterations 10 \\\n  --output N01_intelligence/P05_output/benchmark_results.yaml\n\n# Run single metric: source density\n\
  python -c \"\nfrom pathlib import Path\nimport yaml\noutputs = list(Path('N01_intelligence/output').glob('output_*.md'))\n\
  for f in outputs:\n    content = f.read_text(encoding='utf-8')\n    # Count source references (URLs, citations, 'Source:'\
  \ tags)\n    import re\n    sources = len(re.findall(r'https?://|Source:|\\\\[\\\\d+\\\\]|\\\\(\\\\d{4}\\\\)', content))\n\
  \    claims = len(re.findall(r'\\\\|.\\\\|.\\\\||^- |^\\\\d+\\\\.', content, re.MULTILINE))\n    density = sources / max(claims,\
  \ 1)\n    print(f'{f.name}: {sources} sources / {claims} claims = {density:.2f} density')\n\"\n\n# Run freshness audit\n\
  python -c \"\nfrom pathlib import Path\nimport re\nfrom datetime import datetime, timedelta\ncutoff = datetime.now() - timedelta(days=90)\n\
  outputs = list(Path('N01_intelligence/output').glob('output_*.md'))\nfor f in outputs:\n    content = f.read_text(encoding='utf-8')\n\
  \    dates = re.findall(r'20[2-3]\\\\d-[01]\\\\d-[0-3]\\\\d', content)\n    fresh = sum(1 for d in dates if datetime.strptime(d,\
  \ '%Y-%m-%d') >= cutoff)\n    total = len(dates) if dates else 1\n    print(f'{f.name}: {fresh}/{total} dates within 90d\
  \ ({fresh/total*100:.0f}%)')\n\""
