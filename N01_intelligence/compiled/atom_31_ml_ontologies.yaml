  | `Metric` | `scoring_rubric` | P07 |

  | `Preprocessing_approach` | `knowledge_card` | P01 |

  | `ML_library` | `knowledge_card` | P01 |

  | `AutoML_solution` | `knowledge_card` | P01 |


  ---'
