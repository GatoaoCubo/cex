boundary: This artifact defines the technical implementation strategy for deploying fine-tuned models across CEX nuclei. It
  IS a detailed roadmap for transitioning from API-dependent execution to locally hosted models. It IS NOT a product specification,
  user guide, or business strategy document. The focus is strictly on model selection, dataset construction, deployment architecture,
  and risk mitigation.
related_kinds: "- technical_roadmap: Provides high-level implementation phases and timelines  \n- deployment_plan: Focuses\
  \ on hardware configuration and model serving architecture  \n- model_selection_guide: Details criteria for choosing base\
  \ models and adapters  \n- fine_tuning_pipeline: Describes dataset construction and training workflows  \n- quality_assurance_framework:\
  \ Defines evaluation criteria and success metrics  \n\n---"
executive_summary: This document outlines the technical roadmap for transitioning CEX's 184 nuclei from API-dependent model
  execution to locally deployed, fine-tuned models. The strategy leverages Gemma 4 26B A4B as the base model for most nuclei,
  with Qwen3 14B used where VRAM constraints require smaller models. The plan includes dataset construction, fine-tuning pipelines,
  deployment architecture, and a phased implementation timeline. ---
1_model_selection_and_justification: ''
1_1_candidate_models_evaluation: '| Model | VRAM Fit (Q4) | Base Quality | Context Window | License | Tool Use | MoE Efficiency
  | FT Ecosystem |

  |-------|----------------|--------------|----------------|---------|----------|----------------|--------------|

  | Gemma4:26b | ✅ 14GB | #3 Open | 256K | Apache 2.0 | ✅ | ✅ | HF + Unsloth |

  | Qwen3:14b | ✅ 10GB | #6 Open | 128K | Apache 2.0 | ✅ | ❌ | HF + Unsloth |

  | Llama4:17b | ❌ 12GB | #8 Open | 10M | Llama | ✅ | ❌ | HF + Unsloth |

  | DeepSeek-R1:7b | ✅ 5GB | #12 Open | 128K | MIT | ❌ | ❌ | Limited |


  Conclusion: Gemma4:26b is the optimal base model for most nuclei due to its balance of quality, VRAM efficiency, and Apache
  2.0 license. Qwen3:14b is selected for N04 and N05 where VRAM headroom is needed.


  ---'
2_dataset_construction_pipeline: ''
2_1_available_training_data: '| Source | Count | Format | Use Case |

  |--------|-------|--------|----------|

  | Builder ISOs | 2,400+ | MD + YAML | N03 (construction rules) |

  | Knowledge Cards | 2,000+ | MD | N01, N04 (domain knowledge) |

  | Quality Gates | 184 | MD | All (evaluation criteria) |

  | Golden Examples | 184 | MD | All (few-shot examples) |

  | Atlas Atoms | 32 | MD | N01 (research patterns) |

  | Marketing Artifacts | ~100+ | MD | N02 (copy patterns) |

  | Mission Plans | ~20+ | MD | N07 (orchestration) |

  | Commit History | 5,000+ | Git | N05 (code patterns) |'
2_2_training_pipeline: "# Dataset Construction Workflow\nfor nucleus in all_nuclei:\n    collect_artifacts(nucleus)\n    create_instruction_response_pairs(\n\
  \        instruction_template=\"Build a {kind} about {topic}\",\n        response_source=\"bld_examples_{kind}.md\"\n  \
  \  )\n    augment_with_quality_gates(\n        positive_examples=HARD_gate_pass,\n        negative_examples=HARD_gate_fail\n\
  \    )\n    format_for_qloRA(alpaca_format=True)\n    train_model(\n        base_model=\"gemma4:26b-a4b\",\n        adapter_size=r=16,\n\
  \        epochs=3\n    )\n    evaluate_with(cex_doctor.py)\n    deploy_model(ollama.create(\"cex-n0x\"))\n\n---"
3_deployment_architecture_phase_3: ''
3_1_hardware_configuration: "RTX 5070 Ti (16GB VRAM)  \n- Ollama serving ONE model at a time  \n- Sequential dispatch (1 nucleus\
  \ at a time)  \n- Future scalability: 2x 5070 Ti = 32GB VRAM (support 2 nuclei parallel)"
3_2_model_deployment: "[RTX 5070 Ti]\n  |\n  +-- Ollama Server\n       |\n       +-- cex-n07 (Gemma4:26b + N07 QLoRA) - orchestration\n\
  \       +-- cex-n03 (Gemma4:26b + N03 QLoRA) - building\n       +-- cex-n01 (Gemma4:26b + N01 QLoRA) - research\n      \
  \ +-- cex-n02 (Gemma4:26b + N02 QLoRA) - marketing\n       +-- cex-n04 (Qwen3:14b + N04 QLoRA) - knowledge\n       +-- cex-n05\
  \ (Qwen3:14b + N05 QLoRA) - operations\n       +-- cex-n06 (Gemma4:e4b + N06 FT) - commercial\n       +-- cex-pf  (Gemma4:e4b\
  \ + preflight FT) - context compression"
3_3_ollama_modelfile_example: '# cex-n03 Modelfile

  FROM gemma4:26b-a4b

  ADAPTER ./adapters/cex-n03-qlora/

  PARAMETER temperature 0.3

  PARAMETER num_ctx 65536

  SYSTEM "You are N03 Builder, the artifact construction nucleus of CEX..."


  ---'
4_implementation_roadmap: '| Phase | Timeline | Milestone | Cost Reduction |

  |-------|----------|-----------|----------------|

  | 0 | Immediate | 184 kinds + builders registered | API-dependent |

  | 1 | Week 1 | Gemma4:26b as local fallback | 50% API reduction |

  | 2 | Week 2-3 | Dataset construction pipeline | 30% API reduction |

  | 3 | Week 4-6 | QLoRA adapter deployment | 15% API reduction |

  | 4 | Week 7-8 | Full model deployment | Zero API dependency |


  ---'
5_risk_management: '| Risk Category | Mitigation Strategy | Owner |

  |---------------|---------------------|-------|

  | VRAM Limitations | Prioritize Qwen3:14b for N04/N05 | Hardware Team |

  | Data Quality | Implement cex_doctor.py validation | QA Team |

  | Model Drift | Weekly retraining cycles | ML Team |

  | Deployment Failures | Rolling deployment strategy | DevOps Team |

  | License Compliance | Legal review of Apache 2.0 terms | Legal Team |


  ---'
6_success_metrics: '| Metric | Target | Measurement |

  |-------|--------|-------------|

  | API Dependency | 0% | System logs analysis |

  | Model Accuracy | >92% | QA test suite |

  | Deployment Time | <2 hours | DevOps monitoring |

  | Training Cost | $5000/month | Cloud billing reports |

  | User Satisfaction | 4.5/5 | Internal surveys |


