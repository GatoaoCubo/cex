template: '# Market Snapshot: {{CATEGORY}}

  Geography: {{GEO}} | Date: {{DATE}} | Sources: {{COUNT}}


  ## Market Size

  | Metric | Value | Source | Confidence |

  |--------|-------|--------|-----------|

  | TAM (Total Addressable) | ${{VALUE}}B | {{PRIMARY_SOURCE}} | High/Medium/Low |

  | SAM (Serviceable Addressable) | ${{VALUE}}B | {{ANALYSIS_METHOD}} | High/Medium/Low |

  | SOM (Serviceable Obtainable) | ${{VALUE}}M | {{MODEL_BASIS}} | High/Medium/Low |

  | Growth Rate (3yr CAGR) | {{PERCENT}}% | {{RESEARCH_FIRM}} | High/Medium/Low |


  Confidence Levels: High (multiple sources, recent data) | Medium (single source, extrapolated) | Low (estimates, limited
  data)


  ## Segments

  | Segment | Size | Growth | Our Position |

  |---------|------|--------|-------------|

  | {{SEG1}} | ${{VALUE}}B | {{RATE}}% | Not present/Exploring/Targeting/Strong fit |


  ## Key Metrics

  - Active players: {{COUNT}}+ vendors

  - Avg. ticket: ${{VALUE}}/{{UNIT}}/{{PERIOD}}

  - Dominant model: {{BUSINESS_MODEL}}

  - Regulatory: {{STATUS}} (required/emerging/minimal)


  ## Sources

  {{NUMBERED_CITATIONS}}'
example_output: '# Market Snapshot: SaaS Project Management

  Geography: North America | Date: 2026-04-01 | Sources: 6


  ## Market Size

  | Metric | Value | Source | Confidence |

  |--------|-------|--------|-----------|

  | TAM (Total Addressable) | $47.2B | Gartner 2026 | High |

  | SAM (Serviceable Addressable) | $12.8B | Internal analysis | Medium |

  | SOM (Serviceable Obtainable) | $380M | Market model | Medium |

  | Growth Rate (3yr CAGR) | 11.2% | IDC Research | High |


  Confidence Levels: High (multiple sources, recent data) | Medium (single source, extrapolated) | Low (estimates, limited
  data)


  ## Segments

  | Segment | Size | Growth | Our Position |

  |---------|------|--------|-------------|

  | Enterprise (1000+ employees) | $8.2B | 8% | Not present |

  | SMB (10-999 employees) | $3.1B | 15% | Targeting |

  | Freelancer/Agency | $1.5B | 22% | Strong fit |


  ## Key Metrics

  - Active players: 180+ vendors

  - Avg. ticket: $12/user/month

  - Dominant model: Per-seat subscription

  - Regulatory: GDPR/SOC2 required


  ## Sources

  1. Gartner Magic Quadrant 2026

  2. IDC SaaS Market Report

  3. Company annual reports (top 5)

  4. G2 pricing data analysis

  5. Survey: 2,400 project managers

  6. Venture capital deal flow'
