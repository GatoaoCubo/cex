tldr: Search API configuration for N01 research -- Brave Search query patterns, result filtering, freshness constraints, and
  domain boosting for competitive intelligence.
density_score: 0.91
purpose: Configures the Brave Search MCP server for N01's research workflows. Search is the discovery phase -- it determines
  WHAT to scrape and analyze. Poor search config produces irrelevant sources that cascade through the entire pipeline. This
  config optimizes query construction, result filtering, and source prioritization.
brave_search_mcp_config: '| Parameter | Value | Rationale |

  |-----------|-------|-----------|

  | results_per_query | 10 | Balance breadth vs noise -- top 10 captures primary sources |

  | freshness | past_month (default) | Research requires current data; override to past_year for historical trends |

  | safe_search | moderate | Filter explicit content without over-filtering industry terms |

  | country | BR (default), US (fallback) | Primary market is Brazil; US for global competitive intel |

  | language | pt-BR, en | Bilingual research -- Portuguese primary, English for global context |

  | max_queries_per_session | 20 | Budget constraint -- 20 queries covers most research briefs |'
query_construction_patterns: ''
competitive_intelligence: 'Pattern: "{competitor_name} {product_category} {year} {metric}"

  Example: "PetLove pet food subscription 2026 market share"

  Boost:   site:crunchbase.com OR site:linkedin.com/company'
market_sizing: 'Pattern: "{market} TAM SAM SOM {country} {year}"

  Example: "pet care market TAM SAM SOM Brasil 2026"

  Boost:   site:statista.com OR site:euromonitor.com OR site:mordorintelligence.com'
trend_detection: 'Pattern: "{industry} trends {year} {region}"

  Example: "pet tech trends 2026 Latin America"

  Boost:   site:mckinsey.com OR site:bcg.com OR site:gartner.com'
paper_research: 'Pattern: "{topic} research paper survey {year}"

  Example: "LLM agent orchestration research paper survey 2025 2026"

  Boost:   site:arxiv.org OR site:scholar.google.com OR site:semanticscholar.org'
domain_authority_tiers: '| Tier | Domains | Trust Level | Usage |

  |------|---------|-------------|-------|

  | T1 -- Primary | statista.com, euromonitor.com, crunchbase.com, arxiv.org | HIGH -- cite directly | Market data, funding,
  academic research |

  | T2 -- Industry | mckinsey.com, bcg.com, gartner.com, forrester.com | HIGH -- cite with date | Strategic analysis, trend
  reports |

  | T3 -- News | bloomberg.com, reuters.com, techcrunch.com, g1.globo.com | MEDIUM -- cross-reference | Current events, announcements
  |

  | T4 -- Community | reddit.com, hackernews, medium.com, dev.to | LOW -- signal only | Sentiment, early signals, not citable
  |

  | T5 -- Unknown | Everything else | VERIFY -- triangulate before citing | Require 2+ T1/T2 confirmation |'
freshness_constraints: '| Research Type | Max Age | Override |

  |---------------|---------|----------|

  | Market snapshot | 90 days | Flag as STALE if older |

  | Competitive grid | 180 days | Acceptable for stable markets |

  | Trend report | 30 days | Trends move fast; stale = wrong |

  | Academic paper | 2 years | Research moves slower |

  | Pricing intelligence | 30 days | Prices change frequently |'
result_filtering: ''
include_prioritize:
- Results with dates in title or snippet (freshness signal)
- Results from T1/T2 domains (authority signal)
- Results containing numeric data (density signal)
- Results with structured content (tables, lists)
exclude_deprioritize:
- Results older than freshness constraint
- Results from T5 domains without corroboration
- Results that are primarily opinion/editorial without data
- Duplicate content across domains (keep highest-authority version)
comparison_brave_search_vs_alternatives: '| Capability | Brave Search (current) | Google Custom Search | Bing Web Search |

  |------------|----------------------|---------------------|-----------------|

  | Cost | Free tier (MCP) | $5/1000 queries | $7/1000 queries |

  | Freshness | Good (past_month filter) | Best (real-time) | Good |

  | API simplicity | MCP native | REST + key mgmt | REST + key mgmt |

  | Result quality | Good for research | Best overall | Good for news |

  | Rate limits | Generous free tier | 100 queries/day free | 1000/month free |


  Decision: Brave Search wins on cost and MCP integration. Upgrade to Google Custom Search if research quality degrades below
  85% relevance rate.'
anti_patterns:
- Never use single-word queries -- too broad, wastes result budget. Always combine entity + metric + timeframe.
- Never trust T4/T5 sources alone -- community sources are signals, not evidence. Always triangulate with T1/T2.
- Never skip freshness filtering -- stale data in competitive intelligence is worse than no data.
