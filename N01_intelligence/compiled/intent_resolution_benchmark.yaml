  | PT-20 | "preciso de guardrails pro agente" | guardrail | P11 | N03 | Easy | "guardrails" exact match |

  | PT-21 | "otimizar o consumo de tokens" | context_window_config | P03 | N03 | Medium | "consumo de tokens" -> context_window_config?
  optimizer? |

  | PT-22 | "o deploy ta quebrado" | bugloop | P11 | N05 | Hard | Vague: "deploy quebrado" needs diagnosis. Could be env_config,
  workflow, or bugloop |

