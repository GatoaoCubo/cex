4_6_scoring_rubric_for_benchmark_evaluation: '| Metric | Definition | Weight |

  |--------|-----------|--------|

  | Kind accuracy | Correct kind identified (exact match) | 40% |

  | Pillar accuracy | Correct pillar identified | 20% |

  | Nucleus accuracy | Correct nucleus routed to | 20% |

  | Compound detection | Correctly identified as compound (true/false) | 10% |

  | Clarification appropriateness | Triggered clarification when needed, didn''t when not | 10% |


  Pass threshold: 80% overall accuracy (weighted). Per-difficulty targets:

  - Easy: >= 95%

  - Medium: >= 75%

  - Hard: >= 50%


  ---'
part_5_cex_implementation_roadmap: 'Based on this research, the recommended implementation order (compared against 2 alternatives):


  | Priority | Feature | Effort | Impact | Dependencies |

  |----------|---------|--------|--------|-------------|

  | P0 | Run this benchmark against current `cex_8f_motor.py` to establish baseline | 2h | Measures current gap objectively
  | None |

  | P1 | Add confidence score output to `classify_objects()` | 4h | Enables all downstream improvements | None |

  | P2 | Implement embedding similarity (Layer 2 in proposed design) | 8h | Handles synonym resolution (+15% accuracy) | Embedding
  model choice |

  | P3 | Template-based decomposition (Layer 1.5) | 4h | Handles known compound patterns | P1 |

  | P4 | Inline progressive clarification (Part 2 design) | 8h | Handles ambiguous inputs | P1 |

  | P5 | LLM-as-judge fallback (Layer 3) | 4h | Handles novel/complex inputs | P1 + P2 |

  | P6 | LLM decomposition for genuine compounds | 4h | Handles implicit compounds | P1 + P3 |


  Alternative roadmap A (embedding-first): P0 -> P2 -> P1 -> P4 -> P3 -> P5 -> P6. Higher upfront investment but better long-term
  accuracy. Rejected because P1 (confidence scoring) is a prerequisite for knowing WHEN to use embeddings.


  Alternative roadmap B (LLM-first): P0 -> P5 -> P1 -> P4 -> P6 -> P2 -> P3. Fastest to implement but highest runtime cost.
  Rejected because LLM-for-everything is expensive at scale and unnecessary for 80% of inputs.


  ---'
