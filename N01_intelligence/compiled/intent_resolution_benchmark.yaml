part_1_confidence_scoring_research: ''
1_1_framework_comparison_confidence_methods: 'Every surveyed framework implements confidence scoring -- but with fundamentally
  different architectures. The table below compares 7 systems across 4 dimensions.


  | Framework | Confidence Method | Score Range | Default Threshold | Fallback Strategy |

  |-----------|------------------|-------------|-------------------|-------------------|

  | Rasa | DIET classifier softmax + FallbackClassifier | 0.0-1.0 | 0.3 (nlu_threshold) | Two-stage: (1) affirm intent, (2)
  rephrase. `ambiguity_threshold` = 0.1 for top-2 delta |

  | Dialogflow CX | ML classification with per-flow thresholds | 0.0-1.0 | 0.3 (configurable to 0.7+ recommended) | `no-match`
  event triggers fallback page. Generative fallback via LLM (2025+) |

  | Amazon Lex V2 | `nluIntentConfidenceScore` per interpretation | 0.0-1.0 | `nluIntentConfidenceThreshold` (configurable)
  | Returns up to 4 alternatives + `AMAZON.FallbackIntent`. Comparative scores, not absolute |

  | LlamaIndex | Selector implicit (LLM-based or Pydantic matching) | No explicit 0-1 score | No threshold parameter | Falls
  through to default QueryEngine. No structured fallback |

  | DSPy | Assertions as soft constraints; confidence via output field | Declarative (pass/fail) | `dspy.Suggest` (soft) vs
  `dspy.Assert` (hard) | Backtrack + retry (up to `max_backtrack` iterations). Self-refining loop |

  | OpenAI Agents SDK | Triage agent uses LLM reasoning (no numeric score) | Implicit (LLM judgment) | None (LLM decides)
  | `handoff()` to specialist or ask user. Guardrails validate I/O |

  | Semantic Router | Cosine similarity between query embedding and route utterance embeddings | 0.0-1.0 | ~0.5-0.82 (route-specific)
  | Below threshold -> default route or larger LLM fallback. Sub-ms latency |'
1_2_three_architectures_for_confidence_scoring: 'The industry has converged on three distinct approaches. CEX must choose
  one (or compose them).


  | Architecture | How It Works | Strengths | Weaknesses | Who Uses It |

  |-------------|-------------|-----------|------------|-------------|

  | A. Classifier softmax | Train an intent classifier; softmax gives probability distribution over intents | Numerically
  precise, trainable, fast | Requires training data, brittle on OOD inputs, overconfident on seen patterns | Rasa (DIET),
  Dialogflow CX, Amazon Lex |

  | B. Embedding similarity | Embed query + intent exemplars; cosine similarity = confidence | Zero-shot capable, no training
  needed, handles novel inputs | Threshold tuning is empirical, no probability interpretation, sensitive to embedding model
  | Semantic Router, LangChain SemanticRouter |

  | C. LLM-as-judge | Ask the LLM itself how confident it is (explicit field or chain-of-thought) | Most flexible, handles
  complex/ambiguous inputs, can explain reasoning | Slow (full LLM call), expensive, hallucination risk on confidence values
  | OpenAI Agents SDK (implicit), DSPy (via assertions) |


  Recommendation for CEX: Hybrid B+C (embedding similarity as fast gate, LLM-as-judge for ambiguous cases).


  Rationale vs alternatives:

  - vs A (classifier softmax): CEX has no training data and 123 kinds that change. A trained classifier would need retraining
  on every kind addition. Embedding similarity handles new kinds zero-shot.

  - vs B alone: Embedding similarity can''t handle compound intents ("build agent AND test it") or contextual disambiguation
  ("agent" in P02 vs "agent" in A2A). LLM-as-judge resolves these.

  - vs C alone: LLM-as-judge is too slow/expensive for every input. Embedding similarity handles 80%+ of inputs in <10ms.
  LLM only needed for the ambiguous 20%.'
1_3_threshold_design_what_the_industry_learned: '| Lesson | Source | Implication for CEX |

  |--------|--------|-------------------|

  | Dual threshold: confidence + ambiguity gap | Rasa (`nlu_threshold` + `ambiguity_threshold`) | CEX should reject when (a)
  top score < 0.5 OR (b) top-2 delta < 0.15 |

  | Per-flow thresholds beat global thresholds | Dialogflow CX (per-flow ML settings) | CEX should allow per-pillar or per-nucleus
  threshold tuning |

  | Comparative scores, not absolute | Amazon Lex (explicit warning in docs) | Don''t treat 0.7 as "good" universally -- compare
  relative rankings |

  | Route-specific thresholds outperform global | Semantic Router (per-route score_threshold) | Some kinds are naturally harder
  to match -- "agent" is ambiguous, "mcp_server" is precise |

  | Self-refining is better than hard failure | DSPy (assertion backtracking) | When confidence is low, try reformulating
  before falling back to user |

  | Sub-ms is achievable for embedding-based routing | Semantic Router benchmarks (<1ms for 100 routes) | CEX with 123 kinds
  can still achieve <10ms routing with embeddings |'
1_4_proposed_cex_confidence_scoring_design: "User Input\n    |\n    v\n[1] TF-IDF keyword match (current cex_query.py)\n \
  \   |-- exact match in OBJECT_TO_KINDS? --> confidence = 1.0 --> PROCEED\n    |-- TF-IDF top hit score > 0.8?     --> confidence\
  \ = TF-IDF score --> PROCEED\n    |\n    v (no match or low score)\n[2] Embedding similarity (NEW -- cosine against kind\
  \ exemplars)\n    |-- top cosine > 0.65?              --> confidence = cosine score --> PROCEED\n    |-- top cosine 0.40-0.65?\
  \           --> AMBIGUOUS (go to step 3)\n    |-- top cosine < 0.40?              --> UNKNOWN (go to step 4)\n    |\n  \
  \  v (ambiguous)\n[3] LLM-as-judge (NEW -- ask model to classify with reasoning)\n    |-- model returns kind + confidence\
  \  --> weighted average with step 2\n    |-- model says \"unclear\"             --> CLARIFY (go to step 4)\n    |\n    v\
  \ (unknown or unclear)\n[4] Clarification dialog (Part 2 of this research)\n    |-- ask user for more context\n    |-- re-run\
  \ pipeline with enriched input\n\nCost analysis vs alternatives:\n- Current CEX (keyword-only): 0ms, 0 cost, ~60% accuracy\
  \ on novel inputs\n- Proposed hybrid: <10ms for 80% (embedding), ~500ms for 15% (LLM), ~3s for 5% (clarification). 95%+\
  \ accuracy target.\n- Full LLM-as-judge (every input): ~500ms per input, ~$0.002/input. Overkill for \"cria agente\" which\
  \ is a trivial match.\n\n---"
part_2_multi_turn_clarification_patterns: ''
2_1_framework_comparison_how_systems_ask_for_clarification: '| Framework | Clarification Mechanism | Trigger | Turns Needed
  | User Experience |

  |-----------|------------------------|---------|-------------|-----------------|

  | Rasa | `TwoStageFallbackPolicy`: (1) affirm top intent, (2) if denied, rephrase. Forms for slot filling with `required_slots`
  and `slot_was_set` conditions | Confidence below `nlu_threshold` OR ambiguity below `ambiguity_threshold` | 2 (affirm/deny
  + rephrase) or N (for N missing slots) | "Did you mean X?" -> "No" -> "Please rephrase" |

  | Dialogflow CX | `no-match` event handlers per page. Generative fallback (2025+) uses LLM to ask targeted questions. Slot
  filling with `is_required` and custom reprompts | Confidence below per-flow threshold. Missing required parameters | 1-3
  per missing slot | "I didn''t catch that. Which city?" |

  | Amazon Lex | `AMAZON.FallbackIntent` + `elicitSlot` directive. Returns up to 4 alternative intents for disambiguation
  | All intents below `nluIntentConfidenceThreshold`. Missing slots for confirmed intent | 1 (disambiguation) + N (slots)
  | "Did you mean A, B, or C?" + slot prompts |

  | MAC Framework (2026) | Multi-agent: Supervisor detects ambiguity, Expert asks domain-specific questions. Hierarchical
  clarification reduces turns by 25% | Model uncertainty detection (entropy-based) | 4.86 avg (vs 6.53 without), +7.8% task
  success | Agent-to-agent clarification before user |

  | Microsoft CLU | Entity slot filling in multi-turn. Users correct/clarify throughout conversation. System accommodates
  various communication styles | Missing entities in recognized intent | Flexible (user-driven) | Natural conversation flow
  |'
2_2_four_clarification_patterns_industry_taxonomy: '| Pattern | When to Use | Example | Strength | Weakness |

  |---------|------------|---------|----------|----------|

  | P1: Binary Confirmation | Top intent has moderate confidence (0.5-0.7) | "Did you mean ''create an agent''? (yes/no)"
  | Fast, low friction, works for clear near-misses | Useless when top intent is wrong |

  | P2: Disambiguation Menu | Top 2-3 intents are close in confidence | "I see a few options: (a) agent, (b) agent_card, (c)
  agent_package. Which?" | Surfaces alternatives user might not know about | Overwhelming with >4 options |

  | P3: Slot Filling | Intent is clear but parameters are missing | "Got it -- create an agent. What domain? (e.g., sales,
  support, research)" | Progressive refinement, natural flow | Can feel interrogative with many slots |

  | P4: Open Rephrase | Confidence is very low (<0.3), no good candidates | "I''m not sure what you need. Can you describe
  it differently?" | Catches completely novel intents | Frustrating if system should have understood |'
2_3_proposed_cex_clarification_flow: "CEX currently has GDP (Guided Decision Protocol) for subjective decisions, but NO structured\
  \ clarification for ambiguous intents. GDP is all-or-nothing (6 questions upfront). The industry pattern is progressive\
  \ slot filling.\n\nProposed design (compared against 2 alternatives):\n\n| Approach | How | Pros | Cons | Verdict |\n|----------|-----|------|------|---------|\n\
  | A: GDP extension | Add intent-clarification questions to existing GDP flow | Reuses existing code. User already knows\
  \ GDP | GDP is for WHAT (subjective). Clarification is for WHICH (objective). Mixing them confuses both | REJECT |\n| B:\
  \ Standalone clarification agent | New N00-level module that intercepts low-confidence intents | Clean separation. Testable\
  \ independently. Can use MAC-style multi-agent | Another component to maintain. Overhead for simple clarifications | PARTIALLY\
  \ ACCEPT (for complex cases) |\n| C: Inline progressive clarification | Embed clarification into `cex_8f_motor.py` at F1\
  \ CONSTRAIN | Zero overhead for high-confidence. Progressive for ambiguous. Fastest path to production | Mixes resolution\
  \ + interaction in one module | ACCEPT as default |\n\nProposed CEX clarification protocol:\n\nconfidence >= 0.7  --> PROCEED\
  \ (no clarification)\nconfidence 0.5-0.7 --> P1 Binary: \"I'll interpret 'X' as {kind}. Correct? (y/n)\"\nconfidence 0.3-0.5\
  \ --> P2 Disambiguate: \"Did you mean: (a) {kind1}, (b) {kind2}, (c) {kind3}?\"\nconfidence < 0.3   --> P4 Open: \"I'm not\
  \ sure which artifact type fits. Can you describe what you want to achieve?\"\n\nAfter kind is resolved:\n  missing required\
  \ slots --> P3 Slot Fill: ask for each missing parameter progressively\n\nMulti-turn state tracking (new for CEX):\n\n#\
  \ .cex/runtime/clarification_state.yaml (ephemeral, per-session)\nsession_id: \"abc123\"\noriginal_input: \"build something\
  \ for onboarding\"\nclarification_turns:\n  - turn: 1\n    question: \"Did you mean: (a) workflow, (b) landing_page, (c)\
  \ prompt_template?\"\n    answer: \"a\"\n    resolved: { kind: workflow, confidence: 0.85 }\n  - turn: 2\n    question:\
  \ \"What triggers this workflow? (e.g., new user signup, course enrollment)\"\n    answer: \"new user signup\"\n    resolved:\
  \ { domain: \"onboarding\", trigger: \"signup\" }\nresolution:\n  kind: workflow\n  pillar: P12\n  nucleus: N03\n  confidence:\
  \ 0.85\n  turns_needed: 2\n\n---"
part_3_query_decomposition_research: ''
3_1_the_problem: 'CEX''s `cex_8f_motor.py` already detects multi-object intents ("cria agente e workflow") by splitting on
  ` e `, `+`, `,`. But this is syntactic splitting only -- it doesn''t handle:

  - Semantic compounds: "build a CRM with auth and payments" (1 project, 3 concerns)

  - Implicit compounds: "research and implement competitor pricing" (2 actions, 1 domain)

  - Cross-nucleus compounds: "analyze the market then write ad copy" (N01 then N02)'
3_2_framework_comparison_decomposition_approaches: '| Framework | Decomposition Method | Granularity | Handles Implicit Compounds?
  | Output Format |

  |-----------|---------------------|-------------|---------------------------|---------------|

  | LlamaIndex SubQuestionQE | LLM generates sub-questions from compound query. Each sub-question routed to a specific QueryEngineTool
  by metadata match | Per-retrieval-source | Yes (LLM understands semantic structure) | List of `SubQuestion(sub_question,
  tool_name)` |

  | LangChain QueryDecomposition | LLM decomposes query into atomic queries. Multi-Query Retriever generates N reformulations
  for diversity | Per-query (retrieval) | Partially (reformulation, not intent splitting) | List of reformulated query strings
  |

  | Google Research (EMNLP 2025) | Two-stage decomposition: (1) summarize context per screen, (2) extract intent from summaries.
  Small models outperform monolithic LLMs | Per-intent (action level) | Yes (designed for multi-action inputs) | Structured
  intent + entities per action |

  | CrewAI | Developer pre-decomposes via Task definitions. No automatic decomposition | Per-task (developer-defined) | No
  (manual) | Task objects with descriptions |

  | CEX (current) | Regex split on ` e ` / `+` / `,` in `parse_intent()` | Per-object (syntactic) | No | List of object strings
  |'
3_3_three_decomposition_architectures: "| Architecture | How | Strengths | Weaknesses | Fit for CEX |\n|-------------|-----|-----------|------------|-------------|\n\
  | D1: Regex/syntactic (current CEX) | Split on conjunctions and delimiters | Zero latency, zero cost, deterministic | Misses\
  \ implicit compounds. \"Build CRM\" stays as 1 intent even though it implies agent + workflow + API client | KEEP as Layer\
  \ 1 (fast path) |\n| D2: LLM decomposition (LlamaIndex/LangChain) | Ask LLM to decompose the query into sub-queries with\
  \ tool assignments | Handles any complexity. Can infer implicit sub-tasks | Slow (~500ms), expensive, may over-decompose\
  \ simple inputs | ADD as Layer 2 (for compounds) |\n| D3: Template-based decomposition | Pre-define decomposition rules\
  \ for known compound patterns | Fast, predictable, no LLM cost | Limited to known patterns. Doesn't generalize | ADD as\
  \ Layer 1.5 (known patterns) |\n\nProposed CEX decomposition pipeline:\n\nUser Input: \"research competitor pricing and\
  \ build a pricing page\"\n    |\n    v\n[Layer 1] Syntactic split (current regex)\n    --> [\"research competitor pricing\"\
  , \"build a pricing page\"]\n    --> If split produces 2+ segments: resolve each independently\n    |\n    v (if Layer 1\
  \ produces only 1 segment and it's complex)\n[Layer 1.5] Template matching (NEW)\n    --> Pattern: \"{verb1} X and {verb2}\
  \ Y\" --> split into 2 intents\n    --> Pattern: \"{verb} X with Y and Z\" --> 1 intent, 3 slot values\n    --> If matched:\
  \ split or annotate accordingly\n    |\n    v (if still ambiguous)\n[Layer 2] LLM decomposition (NEW -- only for genuine\
  \ compounds)\n    --> Prompt: \"Decompose this user request into atomic sub-tasks.\n                For each: intent_verb,\
  \ target_kind, target_nucleus, dependencies.\"\n    --> Output: structured JSON of sub-tasks\n    |\n    v\n[Merge] Dependency\
  \ analysis\n    --> Which sub-tasks can run in parallel? (different nuclei)\n    --> Which are sequential? (output of A\
  \ feeds input of B)\n    --> Generate wave plan for N07 dispatch"
3_4_template_library_for_known_compound_patterns: '| User Pattern | Decomposition | Dependency | Example |

  |-------------|--------------|------------|---------|

  | "{verb} X and Y" (same verb, different objects) | 2 parallel intents, same verb | None (parallel) | "create agent and
  workflow" -> N03: agent, N03: workflow |

  | "{verb1} X then {verb2} Y" (sequential actions) | 2 sequential intents | B depends on A | "research competitors then write
  copy" -> N01: KC, then N02: copy |

  | "{verb} X with Y and Z" (1 intent, compound params) | 1 intent, multi-slot | None (single artifact) | "build CRM with
  auth" -> N03: workflow (slots: auth=true) |

  | "{verb1} X and {verb2} it" (action + meta-action) | 2 sequential intents, shared object | B operates on A''s output |
  "create agent and test it" -> N03: agent, N05: unit_eval |

  | "X for Y" (intent + domain) | 1 intent, domain slot filled | None | "pricing page for SaaS" -> N03: landing_page (domain:
  SaaS) |'
3_5_industry_terminology: '| CEX Term | Industry Term | Used By | Standard? |

  |----------|-------------|---------|-----------|

  | "Multi-object detection" | Query Decomposition | LlamaIndex, LangChain, IR literature | Yes (standard in IR) |

  | "Syntactic split" | Conjunct Splitting | NLU literature, Rasa | Niche (NLU-specific) |

  | "LLM decomposition" | Sub-Question Generation | LlamaIndex (SubQuestionQueryEngine) | Emerging standard |

  | "Template matching" | Pattern-Based Intent Splitting | Dialogflow CX (composite entities) | Domain-specific |

  | "Wave plan" | Task Graph / DAG | CrewAI, AutoGen, Temporal | Yes (standard in orchestration) |


  ---'
part_4_benchmark_dataset_50_cases: ''
4_1_dataset_design: '| Dimension | Value |

  |-----------|-------|

  | Total cases | 50 |

  | Languages | 25 English + 25 Portuguese |

  | Difficulty levels | Easy (20), Medium (15), Hard (15) |

  | Coverage | 12 pillars, 8 nuclei, 35+ unique kinds |

  | Purpose | Measure intent resolution accuracy at F1 CONSTRAIN |


  Difficulty definitions:

  - Easy: exact keyword match or canonical kind name (e.g., "create agent")

  - Medium: synonym, abbreviation, or slight ambiguity (e.g., "deploy my app" = env_config + workflow)

  - Hard: vague, compound, metaphorical, or requires world knowledge (e.g., "make onboarding smooth")'
