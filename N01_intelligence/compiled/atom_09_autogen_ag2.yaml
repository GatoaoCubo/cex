  - First-node double-call in some conditional configs (issue #6716)

  - Experimental: breaking changes expected before v1.0


  ---'
17_microsoft_agent_framework_declarative_yaml_spec_ga_april_2026: 'Agent Framework 1.0 (GA April 2026) supports YAML/JSON
  definitions for agents and workflows. Sources: `learn.microsoft.com/en-us/agent-framework/agents/declarative` `learn.microsoft.com/en-us/agent-framework/workflows/declarative`'
declarative_agent_schema_python: "kind: Prompt                              # required; \"Prompt\" for LLM-backed agents\n\
  name: DiagnosticAgent                     # required; unique identifier\ndisplayName: Diagnostic Assistant         # optional;\
  \ human-readable label\ndescription: Performs system diagnostics  # optional; used in multi-agent routing\ninstructions:\
  \ You are a diagnostic...     # required; system prompt\n\nmodel:\n  id: =Env.AZURE_OPENAI_MODEL             # =Env.VAR_NAME\
  \ resolves env vars at runtime\n  connection:\n    kind: remote                          # \"remote\" = Azure Foundry, \"\
  local\" = local LLM\n    endpoint: =Env.FOUNDRY_PROJECT_ENDPOINT\n  options:                                # LLM sampling\
  \ parameters\n    temperature: 0.9\n    topP: 0.95\n\noutputSchema:                             # optional; enforces structured\
  \ JSON output\n  properties:\n    language:\n      type: string\n      required: true\n      description: Language of the\
  \ answer\n    answer:\n      type: string\n      required: true\n      description: The answer text"
loading_a_declarative_agent_python: "import asyncio\nfrom agent_framework.declarative import AgentFactory\nfrom azure.identity.aio\
  \ import AzureCliCredential\n\nasync def main():\n    yaml_str = open(\"agent-config.yaml\").read()\n    async with (\n\
  \        AzureCliCredential() as credential,\n        AgentFactory(client_kwargs={\"credential\": credential})\n       \
  \     .create_agent_from_yaml(yaml_str) as agent,\n    ):\n        response = await agent.run(\"Check system health\")\n\
  \        print(response.text)\n\nasyncio.run(main())"
declarative_workflow_schema_python: "name: my-workflow                         # required; unique identifier\ndescription:\
  \ What this workflow does      # optional\n\ninputs:                                   # optional; typed parameters\n  userQuery:\n\
  \    type: string\n    description: User query text\n\nactions:                                  # required; sequential\
  \ action list\n  - kind: SetVariable\n    id: capture_input\n    variable: Local.query\n    value: =inputs.userQuery\n\n\
  \  - kind: InvokeAzureAgent\n    id: call_agent\n    agentId: DiagnosticAgent\n    input: =Local.query\n\n  - kind: If\n\
  \    id: check_severity\n    condition: =Local.severity >= 8\n    actions:\n      - kind: InvokeAzureAgent\n        id:\
  \ escalate\n        agentId: EscalationAgent\n        input: \"Critical issue detected\"\n\n  - kind: SendActivity\n   \
  \ id: respond\n    activity: =Local.result\n\n  - kind: EndWorkflow\n    id: done"
declarative_workflow_action_types: '| Category | Action | Python | C# | Purpose |

  |----------|--------|--------|-----|---------|

  | Variables | `SetVariable` | Yes | Yes | Set a single variable |

  | Variables | `SetMultipleVariables` | Yes | Yes | Batch variable assignment |

  | Variables | `ResetVariable` | Yes | Yes | Clear a variable |

  | Variables | `AppendValue` | Yes | No | Append to list variable |

  | Control | `If` | Yes | Yes | Conditional branching |

  | Control | `ConditionGroup` | Yes | Yes | Multi-branch switch |

  | Control | `Foreach` | Yes | Yes | Iterate over collection |

  | Control | `BreakLoop` | Yes | Yes | Exit current loop |

  | Control | `GotoAction` | Yes | Yes | Jump to named action |

  | Control | `RepeatUntil` | Yes | No | Loop until condition |

  | Output | `SendActivity` | Yes | Yes | Send message to user |

  | Output | `EmitEvent` | Yes | No | Emit workflow event |

  | Agent | `InvokeAzureAgent` | Yes | Yes | Call a deployed agent |

  | Tool | `InvokeFunctionTool` | Yes | Yes | Call a function tool |

  | Tool | `InvokeMcpTool` | No | Yes | Call an MCP tool |

  | Human | `Question` | Yes | Yes | Ask user a question |

  | Human | `WaitForInput` | Yes | No | Block until input received |

  | Workflow | `EndWorkflow` | Yes | Yes | Terminate workflow |

  | Workflow | `EndConversation` | Yes | Yes | End the conversation |'
