13_package_installation_reference: '# AG2 (community fork)

  pip install ag2[openai]          # Core + OpenAI

  pip install ag2[anthropic]       # + Anthropic

  pip install ag2[jupyter]         # + Jupyter executor

  pip install ag2[docker]          # + Docker executor

  pip install ag2[websockets]      # + WebSocket support


  # Microsoft AutoGen 0.4 (maintenance)

  pip install autogen-agentchat    # High-level

  pip install autogen-core         # Low-level

  pip install autogen-ext          # Extensions


  # Microsoft Agent Framework (successor)

  pip install agent-framework


  - Python requirement: >= 3.10, < 3.14

  - AG2 repo: github.com/ag2ai/ag2 (4.4K stars, Apache 2.0)

  - Microsoft repo: github.com/microsoft/autogen (maintenance)

  - Agent Framework: github.com/microsoft/agent-framework


  ---'
14_key_architectural_differences_summary: '| Dimension | AG2 (community) | MS AutoGen 0.4 | MS Agent Framework |

  |-----------|-----------------|-----------------|---------------------|

  | API style | ConversableAgent (0.2 compat) | Event-driven + Team | Stateless Agent + Workflow |

  | State | Agent holds history | Agent holds history | Stateless; AgentSession opt-in |

  | Orchestration | GroupChat (unified v0.9) | Team + GraphFlow | WorkflowBuilder (data-flow DAG) |

  | Tool iteration | Manual (caller/executor split) | `max_tool_iterations` | Auto until completion |

  | MCP | Basic | Extension-based | First-class (Stdio, HTTP, WS) |

  | Code execution | 3 executors (local/Docker/Jupyter) | Same 3 executors | Hosted code interpreter (cloud) |

  | Governance | Community (AG2AI) | Microsoft (maintenance) | Microsoft (active, Semantic Kernel team) |

  | Target | 1.0 release | End of life | GA Q1 2026 |


  ---'
15_ag2_v0_9_pattern_classes_full_api: All patterns live in `autogen.agentchat.group.patterns`. Every pattern shares the same
  base constructor; behavior differs only in next-speaker selection logic.
common_constructor_signature: "Pattern(\n    initial_agent: ConversableAgent,             # First agent to speak\n    agents:\
  \ list[ConversableAgent],              # All participants\n    user_agent: ConversableAgent | None,         # Human-in-loop\
  \ agent (optional)\n    group_manager_args: dict | None,             # Passed to internal GroupChatManager\n    context_variables:\
  \ ContextVariables | None,  # Shared state\n    after_work: TransitionTarget | None,         # Default post-turn behavior\n\
  )"
pattern_decision_matrix: '| Pattern | Next-speaker selection | Handoffs respected? | Human input? | Use when |

  |---------|----------------------|---------------------|--------------|----------|

  | `AutoPattern` | LLM reads conversation + agent descriptions | Yes (override) | Optional | Dynamic routing, customer service
  |

  | `RoundRobinPattern` | Fixed index rotation through `agents` list | Yes (override) | Optional | Turn-taking, brainstorming
  |

  | `RandomPattern` | Uniform random, excludes current speaker | Yes (override) | Optional | Diverse viewpoints, creative
  tasks |

  | `ManualPattern` | Always reverts to `user_agent` for selection | N/A (user decides) | Required | Debugging, demos, education
  |

  | `DefaultPattern` | Purely handoff-driven; no fallback LLM | Required | Optional | Compliance, approval chains |'
autopattern_full_example: "from autogen import ConversableAgent, LLMConfig\nfrom autogen.agentchat import initiate_group_chat\n\
  from autogen.agentchat.group.patterns import AutoPattern\nfrom autogen.agentchat.group import (\n    AgentTarget, RevertToUserTarget,\n\
  \    OnCondition, StringLLMCondition, ContextVariables\n)\n\nllm_config = LLMConfig(api_type=\"openai\", model=\"gpt-4o\"\
  , temperature=0)\n\ntriage = ConversableAgent(\"triage\", system_message=\"Route queries.\", llm_config=llm_config)\nbilling\
  \ = ConversableAgent(\"billing\", system_message=\"Handle billing.\", llm_config=llm_config)\ntech = ConversableAgent(\"\
  tech\", system_message=\"Handle technical issues.\", llm_config=llm_config)\nuser = ConversableAgent(\"user\", human_input_mode=\"\
  ALWAYS\")\n\ntriage.handoffs.add_llm_conditions([\n    OnCondition(target=AgentTarget(billing),\n                condition=StringLLMCondition(prompt=\"\
  Issue is billing-related\")),\n    OnCondition(target=AgentTarget(tech),\n                condition=StringLLMCondition(prompt=\"\
  Issue is technical\")),\n])\ntriage.handoffs.set_after_work(RevertToUserTarget())\n\npattern = AutoPattern(\n    initial_agent=triage,\n\
  \    agents=[triage, billing, tech],\n    user_agent=user,\n    group_manager_args={\"llm_config\": llm_config},\n)\n\n\
  result, context, last_agent = initiate_group_chat(\n    pattern=pattern,\n    messages=\"My invoice is wrong.\",\n    max_rounds=10,\n\
  )"
defaultpattern_full_example_handoff_only_no_llm_fallback: "from autogen.agentchat.group.patterns import DefaultPattern\nfrom\
