6_conversation_patterns_orchestration: ''
two_agent_chat: "Simplest pattern. One `initiate_chat()` call between two agents.\n\nresult = agent_a.initiate_chat(\n   \
  \ agent_b,\n    message=\"Hello\",\n    max_turns=5\n)\n\nKey params: `message`, `max_turns`, `summary_method`, `clear_history`"
sequential_chat: "Chained two-agent conversations with carryover.\n\nresults = agent_a.initiate_chats([\n    {\"recipient\"\
  : agent_b, \"message\": \"Task 1\", \"max_turns\": 3,\n     \"summary_method\": \"reflection_with_llm\"},\n    {\"recipient\"\
  : agent_c, \"message\": \"Task 2\", \"max_turns\": 3,\n     \"carryover\": \"auto\"},  # carries summary from chat 1\n])\n\
  \nKey params: `carryover` (str/list/\"auto\"), `summary_method` (\"last_msg\" / \"reflection_with_llm\"), `summary_prompt`"
nested_chat: "Package a multi-step workflow as a single agent's reply handler.\n\nagent.register_nested_chats(\n    chat_queue=[\n\
  \        {\"recipient\": reviewer, \"message\": reflect_msg, \"max_turns\": 1},\n        {\"recipient\": editor, \"max_turns\"\
  : 1}\n    ],\n    trigger=writer  # activates when writer sends message\n)"
swarm_deprecated_in_v0_9: "from autogen import initiate_swarm_chat, AfterWorkOption\n\nchat_result, context, last_agent =\
  \ initiate_swarm_chat(\n    initial_agent=triage_agent,\n    agents=[triage_agent, specialist_a, specialist_b],\n    user_agent=user_proxy,\n\
  \    messages=\"Help me with X\",\n    swarm_manager_args={\"llm_config\": config},\n    after_work=AfterWorkOption.SWARM_MANAGER\n\
  )\n\nKey vocab: `initiate_swarm_chat`, `SwarmAgent`, `ON_CONDITION`, `AFTER_WORK`, `AfterWorkOption` (TERMINATE, REVERT_TO_USER,\
  \ STAY, SWARM_MANAGER), `SwarmResult`, `context_variables`, `register_hand_off`\n\n---"
