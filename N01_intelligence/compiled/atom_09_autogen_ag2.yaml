supported_languages: Python, Bash/Shell/Sh, PowerShell (pwsh, ps1), HTML, CSS, JavaScript
code_execution_flow: "AssistantAgent generates code block\n  -> UserProxyAgent detects code fence\n  -> Executor writes to\
  \ work_dir\n  -> Executor runs subprocess / Docker / Jupyter\n  -> CodeResult returned (exit_code, output)\n  -> UserProxyAgent\
  \ sends result back to AssistantAgent\n  -> Loop until termination or max_turns"
