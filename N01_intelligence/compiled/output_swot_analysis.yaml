template: '# SWOT: {{BRAND_NAME}} in {{CATEGORY}}

  Date: {{DATE}} | Sources: {{COUNT}}


  ## Matrix


  | | Helpful | Harmful |

  |---|---------|---------|

  | Internal | Strengths | Weaknesses |

  | | S1: {{QUANTIFIED_ADVANTAGE}} | W1: {{SPECIFIC_GAP_OR_LIMITATION}} |

  | | S2: {{UNIQUE_CAPABILITY}} | W2: {{RESOURCE_CONSTRAINT}} |

  | | S3: {{COMPETITIVE_EDGE}} | W3: {{PROCESS_INEFFICIENCY}} |

  | External | Opportunities | Threats |

  | | O1: {{MARKET_TREND_WITH_TIMING}} | T1: {{COMPETITIVE_RISK}} |

  | | O2: {{PARTNERSHIP_OR_EXPANSION}} | T2: {{EXTERNAL_DISRUPTION}} |

  | | O3: {{REGULATORY_OR_TECH_SHIFT}} | T3: {{MARKET_HEADWIND}} |


  ## Strategic Implications

  - SO (use strengths for opportunities): {{STRATEGY}}

  - WO (fix weaknesses to capture opportunities): {{STRATEGY}}

  - ST (use strengths to counter threats): {{STRATEGY}}

  - WT (minimize weaknesses, avoid threats): {{STRATEGY}}'
quality_criteria: '| Quadrant | Good Entry Has | Avoid |

  |----------|----------------|--------|

  | Strengths | Numbers, proof points, competitive differentiators | Vague claims, opinions |

  | Weaknesses | Specific gaps, measurable limitations | Everything that''s "not perfect" |

  | Opportunities | Timing, market size, clear action path | Wishful thinking, unvalidated assumptions |

  | Threats | Probability, impact, timeline | Remote possibilities, paranoia |'
example_analysis: "| | Helpful | Harmful |\n|---|---------|---------|\n| Internal | Strengths | Weaknesses |\n| | S1: 50K\
  \ email subscribers | W1: No mobile app |\n| | S2: 15 years domain expertise | W2: Limited social media presence |\n| |\
  \ S3: High customer retention (85%) | W3: Small dev team (3 people) |\n| External | Opportunities | Threats |\n| | O1: AI\
  \ integration trend | T1: New funded competitor launched |\n| | O2: Remote work adoption | T2: Economic downturn affecting\
  \ budgets |\n| | O3: Partnership with Platform X | T3: Regulatory changes in EU |\n\nStrategic Implications:\n- SO: Leverage\
  \ email list to promote AI-powered features for remote teams\n- WO: Build mobile app to capture mobile-first opportunities\
  \  \n- ST: Use retention rates as differentiator against new competitors\n- WT: Focus on core market, delay expansion until\
  \ economy stabilizes"
