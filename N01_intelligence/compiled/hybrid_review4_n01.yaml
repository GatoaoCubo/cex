trajectory_eval_critical_9_isos_modified: "Score pre-fix: ~4.5/10. Score post-fix: ~8.5/10.\n\nD04 CRITICAL -- Domain hallucination\
  \ (entire builder)\n- Root cause: qwen3:14b confused `trajectory_eval` (LLM agent step-level evaluation) with\n  robotics/autonomous\
  \ vehicle trajectory evaluation.\n- Contaminated ISOs: knowledge_card, schema, quality_gate, output_template, tools\n- Evidence:\
  \ ISO 17380:2017 (Autonomous Vehicles), ROS 2, CARLA, Gazebo, jerk measurements,\n  collision avoidance, start_point/end_point\
  \ coordinate fields.\n- Fix: Rebuilt 5 ISOs with correct domain: AgentBench, WebArena, SWE-bench, OSWorld,\n  tau-bench;\
  \ agent_id/task_id/step_count fields; step-log structure; failure root cause taxonomy.\n\nD02 -- Memory ISO kind=learning_record\n\
  - bld_memory: kind=learning_record (id=p10_lr_*) -> kind=memory (id=p10_mem_*)\n- Fix: Updated frontmatter kind + id + tags.\n\
  \nD03+D06 -- Quality gate runtime metrics + wrong HARD gate IDs\n- HARD gate IDs were `.md` file paths (e.g. `p07_te_trajectory_coverage.md`)\
  \ instead of H01-H07 pattern.\n- Metrics: jerk, collision, smoothness (robotics runtime, not artifact structure).\n- Fix:\
  \ Rebuilt with H01-H07 artifact-structural checks; 5D soft scoring aligned to step-log completeness.\n\nD07 -- Hallucinated\
  \ tools\n- Fake: cex_visualizer.py, cex_linter.py, cex_consistency_checker.py, cex_performance_analyzer.py\n- Wrong domain:\
  \ TrajectoryEval Framework, Waymo Open Dataset, CARLA Simulation\n- Fix: Replaced with real CEX tools (cex_compile.py, cex_score.py,\
  \ cex_retriever.py, cex_doctor.py,\n  cex_wave_validator.py, cex_hygiene.py) + correct benchmark references.\n\nD09 -- Architecture\
  \ wrong pillars\n- bld_architecture listed ALL 13 ISOs as pillar=P07. Correct pillars vary (P03, P04, P05, P06, P08, P09,\
  \ P10, P11).\n- Fix: Rebuilt architecture with correct pillar per ISO and correct dependency graph.\n\nD10 -- File reference\
  \ drift\n- bld_instruction: `SCHEMA.md` -> `bld_schema_trajectory_eval.md`, `OUTPUT_TEMPLATE.md` -> `bld_output_template_trajectory_eval.md`\n\
  \nValidator FAIL (pre-fix)\n- bld_config: Missing domain keyword ('trajectory', 'sequence', 'step').\n- Fix: Added \"LLM\
  \ agent step-level path analysis\" to naming section.\n\n---"
self_improvement_loop_high_4_isos_modified: "Score pre-fix: ~6.5/10. Score post-fix: ~8.5/10.\n\nD02 -- Memory ISO kind=learning_record\n\
  - bld_memory: kind=learning_record -> kind=memory, id=p10_mem_*\n\nD03 -- Quality gate H04-H08 tests runtime system metrics\n\
  - H04: learning_rate_stability >= 0.95 (runtime ML training metric, not artifact field)\n- H05: feedback_loop_integrity\
  \ == 100% (system operational metric)\n- H06: model_drift_detection <= 0.1 (training metric)\n- H07: training data freshness\
  \ >= 90% (operational metric)\n- H08: error recovery rate >= 99% (runtime metric)\n- Fix: Rebuilt H04-H07 as artifact-structural\
  \ checks (loop_stages count, metrics field,\n  feedback_sources reference, safety guard documentation).\n\nD07 -- Hallucinated\
  \ tools\n- Fake: cex_analyzer.py, cex_optimizer.py, cex_monitor.py, cex_stress_test.py\n- Wrong expansion: \"CEX Framework\
  \ (Core Execution eXchange)\" -- CEX is \"Typed Knowledge System for LLM Agents\"\n- Fix: Replaced with real CEX tools +\
  \ accurate external references (DSPy, STaR, Self-Refine, Constitutional AI).\n\nD10 -- File reference drift\n- bld_instruction:\
  \ `SCHEMA.md` -> `bld_schema_self_improvement_loop.md`, `OUTPUT_TEMPLATE.md` -> `bld_output_template_self_improvement_loop.md`\n\
  \nCitation issues fixed\n- RFC 8611 is a YANG data modeling RFC, NOT an ML metrics standard -- removed.\n- \"ML-Kits Framework\
  \ (Google)\" does not exist as a Google product -- removed.\n- Added: STaR (Zelikman 2022), DSPy (Khattab 2023), Self-Refine\
  \ (Madaan 2023), AlphaCode 2,\n  Constitutional AI (Anthropic 2022).\n\n---"
