  | `BaseCheckpointSaver` | Abstract checkpoint interface |

  | `MemorySaver` | In-memory checkpointer (dev/test) |

  | `SqliteSaver` | SQLite-backed checkpointer |

  | `PostgresSaver` | Postgres-backed checkpointer (production) |

  | `InMemoryCache` | Node-level result cache |


  Checkpoint interface methods:


  | Method | Purpose |

  |--------|---------|

  | `.put(config, checkpoint, metadata)` | Store checkpoint |

  | `.putWrites(config, writes)` | Store pending writes |

  | `.getTuple(config)` | Fetch checkpoint by thread_id + thread_ts |

  | `.list(config, filter)` | List checkpoints matching criteria |


  Key identifiers:


  | ID | Scope |

  |----|-------|

  | `thread_id` | Conversation-level persistence |

  | `thread_ts` | Point-in-time within a thread |

  | `checkpoint_ns` | Namespace for subgraph isolation |'
3_10_human_in_the_loop: '| Mechanism | Purpose |

  |-----------|---------|

  | `interrupt(value)` | Pause execution, surface value to user |

  | `interrupt_before=[nodes]` | Pause before specified nodes |

  | `interrupt_after=[nodes]` | Pause after specified nodes |

  | `Command(resume=value)` | Resume execution with user input |'
3_10_1_interrupt_resume_implementation_detail: "Interrupt types:\n\n| Mode | Declaration | When triggered |\n|------|-------------|----------------|\n\
  | Static | `compile(interrupt_before=[\"node_a\"])` | Before/after specified node, always |\n| Dynamic | `interrupt(value)`\
  \ inside node body | Conditional, based on state at runtime |\n\nDynamic interrupt pattern:\n\nfrom langgraph.types import\
  \ interrupt\n\ndef human_review_node(state):\n    # Pause here -- surface data to caller\n    decision = interrupt({\n \
  \       \"question\": \"Approve this action?\",\n        \"context\": state[\"proposed_action\"]\n    })\n    # Execution\
  \ resumes here; decision = value passed in Command(resume=...)\n    return {\"approved\": decision == \"approve\"}\n\nResume\
  \ flow:\n\n# Invoke hits interrupt -- returns state snapshot\nresult = graph.invoke(input_data, config)\n# result[\"interrupt\"\
  ] contains the interrupt value surfaced above\n\n# User inspects and decides, then resume:\ngraph.invoke(Command(resume=\"\
  approve\"), config)\n# config MUST have the same thread_id to restore from checkpoint\n\nMultiple interrupts in one node:\n\
  LangGraph tracks a `resume` list per task. On resume, execution restarts\nfrom the top of the node. Each `interrupt()` call\
  \ is matched index-based\nagainst the resume list -- consumed interrupts are skipped, first unconsumed halts.\n\nPersistence\
  \ requirement:\n`interrupt` requires a `checkpointer` in `compile()`. Without it, a\n`GraphInterruptException` is raised.\
  \ The checkpointer stores full graph\nstate including all pending resume values.\n\nState inspection during interrupt:\n\
  \n# Read frozen state while graph is paused\nstate_snapshot = graph.get_state(config)\n# state_snapshot.tasks contains pending\
  \ interrupt info\n\nInternal mechanism:\n`NodeInterrupt` exception is raised by `interrupt()` internally, caught by\nthe\
  \ Pregel engine, which writes a checkpoint and surfaces the value to the\ncaller. Do NOT catch `NodeInterrupt` in user code."
