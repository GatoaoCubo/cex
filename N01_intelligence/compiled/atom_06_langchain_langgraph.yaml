8_9_python_sdk_full_method_reference_langgraph_sdk: "Complete method table for `LangGraphClient` (async) / `SyncLangGraphClient`.\n\
  \n#### Threads namespace\n\n| Method | Signature | Returns |\n|--------|-----------|---------|\n| `create` | `(metadata=None,\
  \ config=None, if_exists=\"raise\")` | Thread |\n| `get` | `(thread_id)` | Thread |\n| `update` | `(thread_id, metadata=None)`\
  \ | Thread |\n| `delete` | `(thread_id)` | None |\n| `search` | `(metadata=None, status=None, limit=10, offset=0)` | list[Thread]\
  \ |\n| `copy` | `(thread_id)` | Thread |\n| `get_state` | `(thread_id, checkpoint_id=None, subgraphs=False)` | ThreadState\
  \ |\n| `update_state` | `(thread_id, values, as_node=None, checkpoint_id=None)` | dict |\n| `get_history` | `(thread_id,\
  \ limit=10, before=None, metadata=None)` | Iterator[ThreadState] |\n| `patch_state` | `(thread_id, metadata)` | dict |\n\
  \n#### Runs namespace\n\n| Method | Signature | Returns |\n|--------|-----------|---------|\n| `create` | `(thread_id, assistant_id,\
  \ *, input, config, metadata, stream_mode, interrupt_before, interrupt_after, multitask_strategy)` | Run |\n| `stream` |\
  \ `(thread_id, assistant_id, *, input, stream_mode, config, ...)` | AsyncIterator[StreamPart] |\n| `wait` | `(thread_id,\
  \ assistant_id, *, input, config, ...)` | dict |\n| `get` | `(thread_id, run_id)` | Run |\n| `list` | `(thread_id, *, limit=10,\
  \ offset=0)` | list[Run] |\n| `cancel` | `(thread_id, run_id, *, wait=False, action=\"interrupt\")` | None |\n| `join` |\
  \ `(thread_id, run_id)` | dict |\n| `join_stream` | `(thread_id, run_id)` | AsyncIterator[StreamPart] |\n| `delete` | `(thread_id,\
  \ run_id)` | None |\n\nMultitask strategies (when thread has a run in progress):\n\n| Strategy | Behavior |\n|----------|---------|\n\
  | `\"reject\"` | Raise error (default) |\n| `\"enqueue\"` | Queue behind current run |\n| `\"interrupt\"` | Cancel current,\
  \ start new |\n| `\"rollback\"` | Cancel current, restore prior state, start new |\n\n#### Assistants namespace\n\n| Method\
  \ | Signature | Returns |\n|--------|-----------|---------|\n| `create` | `(graph_id, config=None, metadata=None, name=None)`\
  \ | Assistant |\n| `get` | `(assistant_id)` | Assistant |\n| `update` | `(assistant_id, config=None, metadata=None, name=None)`\
  \ | Assistant |\n| `delete` | `(assistant_id)` | None |\n| `search` | `(metadata=None, graph_id=None, limit=10, offset=0)`\
  \ | list[Assistant] |\n| `get_schemas` | `(assistant_id)` | dict (input/output/config schemas) |\n| `get_subgraphs` | `(assistant_id,\
  \ namespace=None, recurse=False)` | dict[str, SubgraphSchemas] |\n| `create_version` | `(assistant_id, config=None, metadata=None)`\
  \ | Assistant |\n| `get_versions` | `(assistant_id, metadata=None, limit=10, offset=0)` | list[AssistantVersion] |\n| `set_latest`\
  \ | `(assistant_id, version)` | Assistant |\n\n#### Crons namespace\n\n| Method | Signature | Returns |\n|--------|-----------|---------|\n\
  | `create` | `(assistant_id, schedule, payload=None, metadata=None)` | Cron |\n| `create_for_thread` | `(thread_id, assistant_id,\
  \ schedule, payload=None)` | Cron |\n| `delete` | `(cron_id)` | None |\n| `search` | `(thread_id=None, assistant_id=None,\
  \ limit=10, offset=0)` | list[Cron] |\n\nSchedule format: standard cron string, e.g., `\"0 9   1\"` = every Monday at 09:00\
  \ UTC.\n\n#### Store namespace (SDK)\n\n| Method | Signature | Returns |\n|--------|-----------|---------|\n| `put_item`\
  \ | `(namespace: tuple[str, ...], key: str, value: dict)` | None |\n| `get_item` | `(namespace: tuple[str, ...], key: str)`\
  \ | Item |\n| `delete_item` | `(namespace: tuple[str, ...], key: str)` | None |\n| `search_items` | `(namespace_prefix:\
  \ tuple, query: str=None, limit: int=10, offset: int=0)` | list[Item] |\n| `list_namespaces` | `(prefix: tuple=None, suffix:\
  \ tuple=None, max_depth: int=None, limit: int=10)` | list[tuple] |\n\nItem schema:\n\n| Field | Type | Description |\n|-------|------|-------------|\n\
  | `namespace` | tuple[str, ...] | Hierarchical path, e.g., `(\"users\", \"u123\", \"preferences\")` |\n| `key` | str | Identifier\
  \ within namespace |\n| `value` | dict | Arbitrary JSON payload |\n| `created_at` | datetime | Creation timestamp |\n| `updated_at`\
  \ | datetime | Last-write timestamp |\n\n#### StreamPart schema\n\nclass StreamPart:\n    event: str    # \"values\" | \"\
  updates\" | \"messages\" | \"error\" | \"end\" | custom\n    data: Any     # shape depends on stream_mode; \"end\" has data=None\n\
  \n---"
