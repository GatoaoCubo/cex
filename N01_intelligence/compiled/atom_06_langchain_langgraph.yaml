9_4_evaluation_api: "| Function | Import | Purpose |\n|----------|--------|---------|\n| `evaluate` | `from langsmith import\
  \ evaluate` | Sync evaluation on dataset |\n| `aevaluate` | `from langsmith import aevaluate` | Async evaluation (preferred\
  \ for large sets) |\n| `client.evaluate` | SDK v1.x+ preferred method | Same as above via Client |\n\nevaluate() parameters:\n\
  \nfrom langsmith import evaluate\n\nresults = evaluate(\n    target,                       # Callable or LangChain Runnable\n\
  \    data,                         # Dataset name/ID or list[Example]\n    evaluators=[correctness_fn],  # list[Callable]\
  \ -- per-example scorers\n    summary_evaluators=[agg_fn],  # list[Callable] -- aggregate scorers\n    metadata={\"model\"\
  : \"gpt-4o\"}, # Stored with experiment\n    experiment_prefix=\"my-run-v1\",\n    max_concurrency=4,            # Parallel\
  \ example evaluation\n    num_repetitions=1,            # Run each example N times\n    blocking=True,                #\
  \ Wait for all results\n)\n\nEvaluator function signature:\n\nfrom langsmith.schemas import Run, Example\nfrom langsmith.evaluation\
  \ import EvaluationResult\n\ndef correctness_evaluator(run: Run, example: Example) -> EvaluationResult:\n    score = 1.0\
  \ if run.outputs[\"answer\"] == example.outputs[\"answer\"] else 0.0\n    return EvaluationResult(key=\"correctness\", score=score)"
9_5_dataset_versioning: '| Feature | API |

  |---------|-----|

  | Tag a version | `client.create_tag(dataset_id, name="v1.0")` |

  | Pin eval to version | `data="my-dataset:v1.0"` in `evaluate()` |

  | List examples at version | `client.list_examples(dataset_id, as_of="v1.0")` |'
9_6_cex_pillar_mapping_langsmith_datasets: '| LangSmith Concept | CEX Kind | Pillar |

  |-------------------|----------|--------|

  | Dataset | `benchmark` | P07 |

  | Example (row) | `eval_dataset` entry | P07 |

  | Evaluator function | `llm_judge` or `scoring_rubric` | P07 |

  | Annotation queue | `quality_gate` | P11 |

  | Experiment result | `benchmark` (output) | P07 |

  | Summary evaluator | `scoring_rubric` (aggregate) | P07 |


  ---'
10_comparative_context_vs_alternatives: '| Dimension | LangGraph | CrewAI | AutoGen | Semantic Kernel |

  |-----------|-----------|--------|---------|-----------------|

  | Graph model | Pregel BSP (super-steps) | Role-based crews | Conversation protocol | Plugin + planner |

  | State management | TypedDict + reducers | Agent memory dicts | ConversableAgent vars | SKContext |

  | HITL | interrupt() / resume | Manual callback | Human proxy agent | Plan interrupts |

  | Persistence | Checkpointer (Postgres/SQLite) | Memory backends | Memory DB | SK memory store |

  | Cloud deployment | LangGraph Platform (GA 2025) | Self-managed | AutoGen Studio | Azure AI Foundry |

  | Observability | LangSmith (native) | LangSmith / custom | OTel compatible | Azure AppInsights |

  | Multi-agent | Command + Send primitives | Hierarchical crews | GroupChat | Orchestrator pattern |

  | Evaluation | LangSmith datasets + evaluate() | Custom | Custom | Promptflow |

  | Long-term memory | InMemoryStore / PostgresStore | Custom dict | Memory DB | SK memory |

  | Task parallelism | asyncio.gather + Send fan-out | CrewAI parallel tasks | Async GroupChat | SK parallel steps |


  ---'
11_langgraph_store_api_cross_thread_long_term_memory: '`BaseStore` / `InMemoryStore` provides persistent key-value memory
  that survives across threads and graph invocations. Distinct from `Checkpointer` (which stores checkpoint-scoped state per
  thread).'
11_1_in_graph_store_access: "from langgraph.store.memory import InMemoryStore\nfrom langgraph.store.postgres import PostgresStore\
  \  # production\n\n# Pass store at compile time\nstore = InMemoryStore()\ngraph = graph_builder.compile(store=store)\n\n\
  # Access inside a node via config or InjectedStore annotation\ndef memory_node(state, config):\n    store = config.get(\"\
  store\")  # BaseStore instance\n    items = store.search((\"users\", state[\"user_id\"]), query=\"preferences\")\n    return\
  \ {\"context\": [i.value for i in items]}\n\n# Or via InjectedStore annotation (preferred):\nfrom langgraph.prebuilt import\
  \ InjectedStore\nfrom langchain_core.tools import tool\n\n@tool\ndef save_memory(content: str, store: Annotated[BaseStore,\
  \ InjectedStore()]) -> str:\n    store.put((\"memories\", \"shared\"), content[:20], {\"text\": content})\n    return \"\
  saved\""
11_2_basestore_interface: '| Method | Signature | Returns |

  |--------|-----------|---------|

  | `put` | `(namespace: tuple[str, ...], key: str, value: dict, index: list[str]=None)` | None |

  | `get` | `(namespace: tuple[str, ...], key: str)` | Item or None |

  | `delete` | `(namespace: tuple[str, ...], key: str)` | None |

  | `search` | `(namespace_prefix: tuple[str, ...], *, query: str=None, limit: int=10, offset: int=0, filter: dict=None)`
  | list[Item] |

  | `list_namespaces` | `(*, prefix: tuple=None, suffix: tuple=None, max_depth: int=None, limit: int=100)` | list[tuple[str,
  ...]] |

  | `aput` | async variant of `put` | None |

  | `aget` | async variant of `get` | Item or None |

  | `adelete` | async variant of `delete` | None |

  | `asearch` | async variant of `search` | list[Item] |

  | `alist_namespaces` | async variant of `list_namespaces` | list[tuple] |

  | `batch` | `(ops: Iterable[Op])` | list[Result] -- atomic batch ops |

  | `abatch` | async variant of `batch` | list[Result] |'
11_3_namespace_design_patterns: 'Namespaces are tuples. Convention: `(domain, entity_id, category)`.


  | Pattern | Namespace | Purpose |

  |---------|-----------|---------|

  | User preferences | `("users", user_id, "prefs")` | Per-user settings |

  | Shared facts | `("facts", "global")` | System-wide knowledge |

  | Agent working memory | `("agents", agent_id, "scratchpad")` | Per-agent temp state |

  | Conversation summaries | `("threads", thread_id, "summary")` | Compressed history |

  | Org-scoped memory | `("org", org_id, "policies")` | Multi-tenant isolation |


  Semantic search: When `PostgresStore` with `pgvector` is used, `query=` performs

  approximate nearest-neighbor search over embedded `value` fields specified in `index`.'
11_4_backends: '| Backend | Class | Production ready | Semantic search |

  |---------|-------|-----------------|-----------------|

  | In-memory | `InMemoryStore` | Dev/test only | No |

  | PostgreSQL | `PostgresStore` | Yes | Yes (pgvector) |

  | Redis | `RedisStore` (community) | Yes | With RediSearch |

  | Custom | Implement `BaseStore` | User-managed | User-managed |'
11_5_cex_pillar_mapping_store: '| Store Concept | CEX Kind | Pillar |

  |--------------|----------|--------|

  | `BaseStore` | `entity_memory` | P10 |

  | Namespace | `memory_scope` | P10 |

  | `put` / `get` / `search` | `retriever_config` | P01 |

  | PostgresStore + pgvector | `embedding_config` | P01 |

  | `batch` ops | `workflow` (atomic ops) | P12 |


  ---'
12_langsmith_experiments_api: 'Experiments are named evaluation runs against a dataset. Source: https://docs.smith.langchain.com/evaluation/how_to_guides/run_experiments_programmatically'
12_1_experiment_concepts: '| Term | Definition |

  |------|------------|

  | Experiment | One `evaluate()` call -- a batch of target fn runs against a dataset |

  | Experiment prefix | Human-readable name prefix (e.g., `"gpt-4o-v2"`) |

  | ExperimentResults | Object returned by `evaluate()` -- iterable of `ExperimentResultRow` |

  | ExperimentResultRow | Single example result: `run`, `example`, `evaluation_results` |

  | ComparativeExperiment | Side-by-side comparison of 2+ experiments on same dataset |'
12_2_running_experiments: "from langsmith import evaluate, aevaluate\n\n# Sync -- blocks until complete\nresults = evaluate(\n\
  \    target_fn,                        # Callable or Runnable\n    data=\"my-dataset\",                # Dataset name, ID,\
  \ or list[Example]\n    evaluators=[correctness_fn],      # Per-example scorers\n    summary_evaluators=[aggregate_fn],#\
  \ Whole-experiment scorers\n    experiment_prefix=\"my-run\",       # Appears in UI as \"my-run-<timestamp>\"\n    metadata={\"\
  model\": \"gpt-4o\"},     # Stored with every run\n    max_concurrency=4,                # Parallel example evaluation\n\
  \    num_repetitions=1,                # Run each example N times\n    blocking=True,                    # False = fire-and-forget\n\
  \    load_nested=False,                # Include nested runs in results\n)\n\n# Async -- preferred for large datasets\n\
  results = await aevaluate(target_fn, data=\"my-dataset\", evaluators=[fn])"
12_3_summary_evaluator_pattern: "from langsmith.schemas import Example, Run\nfrom langsmith.evaluation import EvaluationResult,\
  \ EvaluationResults\n\ndef agg_score(runs: list[Run], examples: list[Example]) -> EvaluationResults:\n    avg = sum(r.feedback_stats[\"\
  correctness\"][\"avg\"] for r in runs) / len(runs)\n    return EvaluationResults(results=[EvaluationResult(key=\"avg_correctness\"\
  , score=avg)])"
12_4_comparative_experiments: "from langsmith import evaluate\n\n# Run two experiments then compare\nexp1 = evaluate(fn_v1,\
  \ data=\"my-dataset\", experiment_prefix=\"v1\")\nexp2 = evaluate(fn_v2, data=\"my-dataset\", experiment_prefix=\"v2\")\n\
  \n# Compare in UI: annotate both with same dataset to enable side-by-side view\n# Programmatic comparison:\nfrom langsmith\
  \ import Client\nclient = Client()\nresults = client.get_pairwise_evaluations(\n    [exp1.experiment_name, exp2.experiment_name]\n\
  )"
12_5_online_evaluation_real_time_llm_judge: "# Configure online evaluator on LangSmith project (SDK or UI)\nclient.create_evaluator(\n\
  \    project_name=\"my-project\",\n    criteria=\"Is the response helpful? Reply YES or NO.\",\n    evaluator_type=\"LangChainStringEvaluator\"\
  ,\n    name=\"helpfulness\",\n    feedback_key=\"helpfulness\",\n)\n# Fires after every traced run -- no code changes needed\
  \ in application"
12_6_cex_mapping_experiments: '| LangSmith Concept | CEX Kind | Pillar |

  |------------------|----------|--------|

  | Experiment | `benchmark` | P07 |

  | Per-example evaluator | `llm_judge` or `scoring_rubric` | P07 |

  | Summary evaluator | `scoring_rubric` (aggregate) | P07 |

  | ComparativeExperiment | `benchmark` (multi-variant) | P07 |

  | Online evaluator | `llm_judge` (streaming) | P07 |

  | ExperimentResultRow | `eval_dataset` row | P07 |'
