1_lcel_runnable_type_hierarchy: 'LCEL (LangChain Expression Language) is the composition protocol. Every component

  implements `Runnable`, which defines invoke/batch/stream + pipe operator (`|`).'
1_1_runnable_interface_methods_on_every_lcel_object: '| Method | Sync | Async | Purpose |

  |--------|------|-------|---------|

  | `invoke(input)` | yes | `ainvoke` | Single-input execution |

  | `batch(inputs)` | yes | `abatch` | Multi-input parallel execution |

  | `stream(input)` | yes | `astream` | Token-level streaming |

  | `astream_events(input)` | -- | yes | Event-level streaming (v2) |

  | `astream_log(input)` | -- | yes | Log-patch streaming |

  | `bind(**kwargs)` | yes | -- | Bind kwargs to runnable |

  | `with_config(config)` | yes | -- | Override RunnableConfig |

  | `with_retry(...)` | yes | -- | Add retry policy |

  | `with_fallbacks(...)` | yes | -- | Add fallback chain |

  | `assign(**kwargs)` | yes | -- | Merge additional runnables into output |

  | `pick(keys)` | yes | -- | Select subset of output keys |

  | `pipe(other)` | yes | -- | Compose sequentially (same as `\|`) |

  | `get_graph()` | yes | -- | Return graph representation |

  | `get_name()` | yes | -- | Return runnable name |

  | `get_input_schema()` | yes | -- | Pydantic model for input |

  | `get_output_schema()` | yes | -- | Pydantic model for output |'
1_2_runnable_subclass_hierarchy: "Runnable (abstract base -- langchain_core.runnables.base)\n  |\n  +-- RunnableSerializable\
  \ (adds JSON serialization)\n  |     +-- RunnableSequence          # chain: A | B | C\n  |     +-- RunnableParallel    \
  \      # fan-out: {\"a\": A, \"b\": B}\n  |     +-- RunnableLambda            # wrap plain function\n  |     +-- RunnableEach\
  \              # apply to each item\n  |     +-- RunnableBinding           # bind kwargs\n  |     +-- RunnableGenerator\
  \         # generator/async-generator\n  |     +-- RunnableAssign            # merge keys into output\n  |     +-- RunnablePick\
  \              # select output keys\n  |     +-- RunnableBranch            # conditional dispatch\n  |     +-- RouterRunnable\
  \            # key-based routing\n  |     +-- RunnableWithFallbacks     # fallback chain\n  |     +-- RunnableRetry    \
  \         # retry with backoff\n  |     +-- RunnableWithMessageHistory# inject chat history\n  |     +-- RunnableConfigurableFields#\
  \ runtime-configurable params\n  |     +-- RunnableConfigurableAlternatives # swap implementations\n  |     +-- DynamicRunnable\
  \           # runtime-resolved runnable\n  |     +-- RunnablePassthrough       # identity (pass input through)\n  |\n  +--\
  \ BaseChatModel --> all chat models (ChatOpenAI, ChatAnthropic, etc.)\n  +-- BaseLLM --> all completion models\n  +-- BaseRetriever\
  \ --> all retrievers\n  +-- BaseOutputParser --> all output parsers\n  +-- BasePromptTemplate --> all prompt templates\n\
  \  +-- BaseTool --> all tools"
1_3_composition_primitives: '| Primitive | Syntax | Semantics |

  |-----------|--------|-----------|

  | `RunnableSequence` | `A \| B \| C` | Serial: output(A) -> input(B) -> input(C) |

  | `RunnableParallel` | `{"a": A, "b": B}` | Parallel: same input -> both, merge outputs |

  | `RunnableBranch` | `RunnableBranch([(cond, A)], default=B)` | First-match conditional |

  | `RunnablePassthrough` | `RunnablePassthrough()` | Identity function (pipe-through) |

  | `RunnableAssign` | `.assign(key=runnable)` | Merge new keys into dict output |

  | `RunnablePick` | `.pick("key")` | Select keys from dict output |

  | `RunnableWithFallbacks` | `.with_fallbacks([B, C])` | Try A, on failure try B, then C |'
