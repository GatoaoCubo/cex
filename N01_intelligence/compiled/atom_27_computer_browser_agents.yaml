12_anthropic_computer_use_tool_spec_deep_dive: '> Source: https://platform.claude.com/docs/en/agents-and-tools/tool-use/computer-use-tool'
12_1_tool_versions: '| Tool Version | Beta Header | Supported Models |

  |---|---|---|

  | `computer_20251124` (latest) | `computer-use-2025-11-24` | Claude Opus 4.6, Sonnet 4.6, Opus 4.5 |

  | `computer_20250124` | `computer-use-2025-01-24` | Sonnet 4.5, Haiku 4.5, Opus 4.1, Sonnet 4, Sonnet 3.7 |'
12_2_tool_declaration_schema: "{\n  \"type\": \"computer_20251124\",\n  \"name\": \"computer\",\n  \"display_width_px\": 1024,\n\
  \  \"display_height_px\": 768,\n  \"display_number\": 1,\n  \"enable_zoom\": true\n}\n\nParameters:\n- `display_width_px`\
  \ -- required integer pixels\n- `display_height_px` -- required integer pixels\n- `display_number` -- optional X11 display\
  \ number (default: 1)\n- `enable_zoom` -- optional boolean, `computer_20251124` only; enables the `zoom` action\n\nAPI constraint:\
  \ max 1568px on longest edge, approximately 1,150,000 total pixels."
12_3_action_types: 'Basic actions (all versions):


  | Action | Parameters | Notes |

  |---|---|---|

  | `screenshot` | none | Captures current display state |

  | `left_click` | `coordinate: [x, y]` | Single left click |

  | `type` | `text: str` | Type text string |

  | `key` | `text: str` | Keyboard shortcut, e.g. "ctrl+s" |

  | `mouse_move` | `coordinate: [x, y]` | Move cursor without clicking |


  Enhanced actions (computer_20250124 and later):


  | Action | Parameters | Notes |

  |---|---|---|

  | `scroll` | coordinate, scroll_direction (up/down/left/right), scroll_amount (int) | Wheel scroll |

  | `left_click_drag` | start_coordinate, coordinate | Click-drag |

  | `right_click` | `coordinate: [x, y]` | Right click |

  | `double_click` | `coordinate: [x, y]` | Double click |

  | `triple_click` | `coordinate: [x, y]` | Triple click (select all) |

  | `hold_key` | text: str, duration: float | Hold key N seconds |

  | `wait` | duration: float | Pause execution |


  New in computer_20251124:


  | Action | Parameters | Notes |

  |---|---|---|

  | `zoom` | `region: [x1, y1, x2, y2]` | Zoom into bounding box; requires `enable_zoom: true` |'
12_4_token_overhead: '| Component | Tokens |

  |---|---|

  | System prompt overhead | 466-499 |

  | Tool definition | 735 (Claude 4.x) |

  | Screenshots | Variable (vision tokens) |'
12_5_python_integration_pattern: "import anthropic\nclient = anthropic.Anthropic()\ntools = [{\"type\": \"computer_20251124\"\
  , \"name\": \"computer\",\n          \"display_width_px\": 1024, \"display_height_px\": 768,\n          \"enable_zoom\"\
  : True}]\nresponse = client.beta.messages.create(\n    model=\"claude-sonnet-4-6-20251101\",\n    max_tokens=4096,\n   \
  \ betas=[\"computer-use-2025-11-24\"],\n    tools=tools,\n    messages=[{\"role\": \"user\", \"content\": \"Open text editor\
  \ and type Hello World\"}],\n)\nfor block in response.content:\n    if block.type == \"tool_use\":\n        action = block.input[\"\
  action\"]\n        # dispatch action to desktop environment\n\n---"
13_playwright_mcp_a11y_snapshot_approach_deep_dive: '> Source: https://github.com/microsoft/playwright-mcp > Source: https://playwright.dev/docs/aria-snapshots'
13_1_screenshot_based_cua_vs_playwright_mcp: '| Dimension | Screenshot-based CUA | Playwright MCP a11y |

  |---|---|---|

  | Input to LLM | JPEG/PNG image | Structured YAML/text |

  | Context size | 800-2000 tokens/screenshot | 100-400 tokens/snapshot |

  | Element targeting | Pixel coordinates [x, y] | Ref tags like ref=e5 |

  | Vision model | Required | Not required |

  | Coordinate hallucination | Common | Eliminated |

  | Canvas/chart support | Yes (vision-only) | No |

  | Requires WCAG markup | No | Yes |'
13_2_snapshot_output_format: "heading \"todos\" [level=1]\n  textbox \"What needs to be done?\" [ref=e5]\n  button \"Add\"\
  \ [ref=e6]\nlistitem:\n  checkbox \"Toggle Todo\" [ref=e10] [checked=false]\n  text \"Buy groceries\"\n  button \"Delete\"\
  \ [ref=e11]\n\nEach node: Role | Name | State (checked, disabled) | Ref integer tag | Hierarchy."
13_3_interaction_pattern: '1. LLM calls browser_snapshot

  2. Receives ARIA YAML: sees "textbox [ref=e5]"

  3. Calls browser_type with {ref: "e5", text: "Buy milk"}

  Result: No pixel coordinates. No vision model. Deterministic.'
13_4_key_mcp_tools: '| Tool | Input | Output |

  |---|---|---|

  | `browser_snapshot` | none | Full page ARIA tree |

  | `browser_click` | ref: str OR coordinate: [x, y] | Click result |

  | `browser_type` | ref: str, text: str | Type result |

  | `browser_navigate` | url: str | Navigation result |

  | `browser_screenshot` | none | JPEG vision fallback |


  ---'
14_set_of_mark_som_implementation_deep_dive: '> Source: https://github.com/microsoft/SoM > Paper: Yang et al., 2023 -- https://arxiv.org/abs/2310.11441'
14_1_how_som_works: 'SoM overlays numbered marks on screenshot regions so VLMs reference elements by integer ID instead of
  pixel coordinates.


  Before:                        After SoM:

  [button: Submit]               [button: Submit] [1]

  [link: Home]                   [link: Home]     [2]

  [input: Email]                 [input: Email]   [3]


  Model output: "click 1"  vs  "click at [512, 384]"'
14_2_sam_integration_pipeline: '1. Run SAM on screenshot -> segmentation masks (COCO RLE)

  2. Convert masks to bounding boxes [x, y, w, h]

  3. Assign sequential integer IDs per box

  4. Render colored circles + numbers on image

  5. Pass annotated image + ID->bbox mapping to VLM

  6. VLM returns: "click element 5"

  7. Map element 5 -> bbox center -> pixel coord -> dispatch'
14_3_coco_rle_mask_format: "{\n  \"id\": 5,\n  \"segmentation\": {\"size\": [768, 1024], \"counts\": \"RLE_ENCODED_STRING\"\
  },\n  \"area\": 2048,\n  \"bbox\": [256, 128, 120, 40],\n  \"category_id\": 2\n}"
14_4_reference_files_microsoft_som_repository: '| File | Purpose |

  |---|---|

  | demo_som.py | Main demo: load image, run SAM, overlay marks |

  | demo_gpt4v_som.py | GPT-4V integration |

  | task_adapter/ | Mark assignment and overlay rendering |

  | client.py | Image processing utilities |'
14_5_minimal_python_pattern: "from PIL import Image, ImageDraw\n\ndef overlay_som_marks(image, bboxes):\n    draw = ImageDraw.Draw(image)\n\
  \    id_to_center = {}\n    for i, box in enumerate(bboxes, start=1):\n        x, y, w, h = box[\"bbox\"]\n        cx, cy\
  \ = x + w // 2, y + h // 2\n        r = 12\n        draw.ellipse([cx-r, cy-r, cx+r, cy+r], fill=\"red\", outline=\"white\"\
  )\n        draw.text((cx-6, cy-8), str(i), fill=\"white\")\n        id_to_center[i] = (cx, cy)\n    return image, id_to_center\n\
  # id_to_center maps element_id -> (x, y) for action dispatch"
14_6_som_vs_a11y_tree: '| Dimension | SoM | A11y Tree (Playwright MCP) |

  |---|---|---|

  | Requires vision model | Yes | No |

  | Works on any app | Yes | WCAG-compliant only |

  | Context size | Large (image tokens) | Small (YAML text) |

  | Coord hallucination | Reduced vs raw | Eliminated |

  | Canvas/chart support | Yes | No |

  | WinAgentArena improvement | +57% | N/A |


  ---'
