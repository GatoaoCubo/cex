16_architecture_decision_tree_for_computer_use_agents: "START: Build a computer use agent\n    |\n    +-- Web browser only?\n\
  \    |       YES -> Is target WCAG-compliant?\n    |                 YES -> Playwright MCP (a11y snapshot)\n    |      \
  \                   Zero vision cost, ref-based actions\n    |                 NO  -> Screenshot + SoM overlay\n    |  \
  \                       Vision model required, works on any site\n    |\n    +-- Desktop (any OS)?\n    |       YES -> OS\
  \ a11y APIs available?\n    |                 YES -> Hybrid: A11y API + Vision fallback\n    |                 NO  -> Anthropic\
  \ CU tool (computer_20251124)\n    |\n    +-- Mobile?\n            Android -> ADB (a11y) OR SeeClick (vision)\n        \
  \    iOS     -> XCUITest (a11y) OR screenshot + SoM\n\nSafety posture:\n    HIGH (financial/admin) -> Ref-based + HITL confirmation\
  \ required\n    MEDIUM (enterprise)    -> Hybrid a11y+vision + rate-limit risky actions\n    LOW (dev/research)     -> Coordinate-based\
  \ acceptable\n\nGrounding strategy:\n    Has vision budget       -> SoM overlay (numbered marks)\n    A11y-first       \
  \       -> A11y tree refs (Playwright MCP)\n    Low latency priority    -> Direct coordinates\n    Cross-platform portable\
  \ -> GUI-Actor (coordinate-free, open source)"
16_1_architecture_comparison: '| Architecture | Vision Required | Token Cost | Coord Hallucination | Cross-Platform | Safety
  Control |

  |---|---|---|---|---|---|

  | Screenshot + raw coords | Yes | High | Common | Yes | Low |

  | Screenshot + SoM | Yes | High | Reduced | Yes | Medium |

  | A11y tree only | No | Low | Eliminated | WCAG-only | High |

  | Hybrid a11y + vision | Optional | Medium | Low | Yes* | High |

  | Anthropic CU API | Yes (built-in) | Medium | Reduced | Desktop | Medium |


  *Falls back to screenshot for canvas, images, custom widgets.'
16_2_model_selection_by_task: '| Task | Recommended Model | Notes |

  |---|---|---|

  | Precise web forms | Any LLM + Playwright MCP | Low cost, deterministic |

  | Complex desktop (creative) | Claude Sonnet 4.6 | OSWorld near-human parity |

  | High-res element finding | GPT-5.2 | ScreenSpot-Pro SOTA |

  | Android automation | SeeClick | Trained for mobile layouts |

  | Enterprise web (ServiceNow) | GPT-4 | WorkArena benchmark winner |

  | Windows tasks | Navi + GPT-4V | +57% WinAgentArena |


  ---'
17_browser_infrastructure_cdp_key_domains: '> Source: https://chromedevtools.github.io/devtools-protocol/


  | CDP Domain | Purpose | Used By |

  |---|---|---|

  | `Input` | Mouse, keyboard, touch simulation | Playwright, Puppeteer |

  | `DOM` | Access/modify DOM nodes | Stagehand, browser-use |

  | `Accessibility` | A11y tree extraction | Playwright MCP |

  | `Page` | Lifecycle, screenshots, navigation | All browser tools |

  | `Network` | Request interception, throttling | Test frameworks |

  | `Target` | Multi-tab/window management | Session managers |'
17_1_a11y_tree_via_cdp_low_level: 'const {nodes} = await client.send(''Accessibility.getFullAXTree'');

  // nodes: AXNode[]

  // AXNode { nodeId, role, name, description, value, states, childIds }


  Playwright wraps this as `locator.ariaSnapshot()` (current recommended API).'
17_2_cloud_sandbox_providers: '| Provider | Isolation | Open Source | Notes |

  |---|---|---|---|

  | Browserbase | Per-session container | No | Playwright/CDP native |

  | E2B | Firecracker microVM | Yes | Code execution + browser |

  | Steel Browser | Docker container | Yes | Playwright-based |

  | Anchora | VM-level | No | Desktop-focused |'
