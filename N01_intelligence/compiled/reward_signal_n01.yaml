tldr: 'Reward signal definition for N01 research quality optimization: composite signal from eval_framework (D1-D5) + bias
  audit + stakeholder satisfaction. Used by self_improvement_loop to guide artifact evolution direction.'
density_score: 0.88
purpose: 'The self_improvement_loop_n01 must optimize in a DIRECTION.

  Without a defined reward signal, "better" is undefined.


  This artifact defines the composite reward signal that N01 maximizes:

  - What dimensions matter (eval_framework D1-D5)

  - How they combine (weighted sum)

  - What additional signals add context (bias, freshness, utility)

  - What the reward floor and ceiling look like'
reward_signal_components: '| Component | Source | Weight | Scale |

  |-----------|--------|--------|-------|

  | D1 Source Quality | eval_framework_n01 | 25% | 0-10 |

  | D2 Analytical Depth | eval_framework_n01 | 25% | 0-10 |

  | D3 Comparative Coverage | eval_framework_n01 | 25% | 0-10 |

  | D4 Claim Confidence | eval_framework_n01 | 15% | 0-10 |

  | D5 Actionability | eval_framework_n01 | 10% | 0-10 |

  | Bias penalty | bias_audit_n01 | modifier | -2 to 0 |

  | Freshness bonus | source date check | modifier | -1 to +1 |

  | Hallucination penalty | llm_judge_n01 | modifier | -3 to 0 |'
reward_formula: "base_score = (D1*0.25 + D2*0.25 + D3*0.25 + D4*0.15 + D5*0.10)\n\nbias_penalty = max(0, 6 - bias_audit_score)\
  \ * (-0.4)\n  # bias_audit < 6 = up to -2.0 penalty\n\nfreshness_mod = +0.5 if all_sources < 30d else (0 if all_sources\
  \ < 90d else -0.5)\n\nhallucination_penalty = (-1.5 * hallucination_rate)\n  # 10% hallucination rate = -0.15 penalty\n\n\
  reward = base_score + bias_penalty + freshness_mod + hallucination_penalty\nreward = clamp(reward, 0, 10)"
reward_thresholds: '| Reward Value | Status | Self-Improvement Action |

  |-------------|--------|------------------------|

  | >= 9.5 | Elite | use as few-shot example; no action |

  | 9.0 - 9.4 | Published | monitor for staleness only |

  | 8.0 - 8.9 | Improve | queue for next loop iteration |

  | 6.0 - 7.9 | Fix | immediate improvement target |

  | < 6.0 | Reject | rebuild from scratch |'
reward_signal_history_example: '| Artifact | Prev Reward | New Reward | Delta | Primary Improvement |

  |----------|------------|-----------|-------|---------------------|

  | kc_anthropic_analysis.md | 7.2 | 9.1 | +1.9 | D3 (added 3 competitors) |

  | kc_llm_pricing.md | 8.1 | 9.4 | +1.3 | D1 (added primary sources) |

  | kc_market_sizing.md | 6.8 | 8.8 | +2.0 | D2+D3 (depth + comparison) |'
analytical_envy_reward_boost: "N01 Analytical Envy gives D3 Comparative Coverage an Envy Multiplier:\n\nif D3_score >= 9.0:\n\
  \    envy_bonus = +0.3  # comparing BETTER than competitors\nelif D3_score <= 5.0:\n    envy_penalty = -0.5  # Analytical\
  \ Envy is violated\n\nNo other nucleus has this multiplier. D3 is the differentiator."
comparison_reward_signal_approaches: '| Signal | Captures | Analytical Envy | N01 Fit |

  |--------|----------|----------------|---------|

  | RAGAS composite | RAG accuracy | no | partial |

  | Human rating | holistic quality | partially | impractical |

  | This composite | D1-D5 + bias + freshness + hallucination | yes (D3 weighted) | optimal |

  | BLEU/ROUGE | text similarity | no | wrong metric for research |'
