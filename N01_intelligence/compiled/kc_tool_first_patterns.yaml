tldr: 7 industry patterns for replacing LLM calls with deterministic tools. Each mapped to an existing or buildable CEX tool.
  Covers intent resolution, scoring, memory selection, content generation, and embedding.
principle: 'Every LLM call should justify its existence against 3 alternatives:

  1. Lookup table -- Can a static mapping solve this?

  2. Heuristic -- Can rules + regex + counting solve this?

  3. TF-IDF/embedding similarity -- Can statistical matching solve this?


  Only if all 3 fail should the LLM be invoked. This is the tool-first principle (industry: "deterministic-first", "rule-before-model").


  ---'
pattern_1_intent_resolution_cascade: "Industry source: Rasa NLU, Amazon Lex, Dialogflow intent classification.\n\nArchitecture:\n\
  User input\n  |-> [1] Exact match (hash table)       -- O(1), 100% precision\n  |-> [2] Fuzzy match (difflib, 0.8)     --\
  \ O(n), 95% precision\n  |-> [3] TF-IDF ranking (cex_query.py)  -- O(n log n), 85% precision\n  |-> [4] LLM fallback (execute_prompt)\
  \  -- O(1) but slow + costly\n\nCEX implementation: `cex_8f_motor.py` already implements levels 1-3:\n- Level 1: `VERB_TABLE`\
  \ (65 verbs, line 156) + `OBJECT_TO_KINDS` (line 947)\n- Level 2: `difflib.get_close_matches()` at 0.8 threshold (line 913)\n\
  - Level 3: `cex_query.query_builders()` TF-IDF (line 987)\n- Level 4: Not used -- motor is fully deterministic\n\nComparison\
  \ vs. pure LLM:\n\n| Metric | Cascade (CEX) | Pure LLM | Winner |\n|--------|---------------|----------|--------|\n| Latency\
  \ | <50ms | 3-15s | Cascade (300x) |\n| Cost | $0 | ~500 tokens | Cascade |\n| Accuracy (known intents) | 98% | 95% | Cascade\
  \ |\n| Accuracy (novel intents) | 60% | 90% | LLM |\n| Determinism | 100% reproducible | Non-deterministic | Cascade |\n\
  \nGap: Novel intent handling. CEX mitigates via the \"generic\" fallback kind + user confirmation.\n\n---"
pattern_2_heuristic_scoring_with_llm_escalation: "Industry source: GitHub Copilot code review (heuristic first, LLM for nuance),\
  \ Google Search quality raters (automated signals + human review for edge cases).\n\nArchitecture:\nArtifact\n  |-> [L1]\
  \ Structural score (counts, regex)     -- 30% weight\n  |-> [L2] Rubric score (domain rules)           -- 30% weight\n \
  \ |-> [Gate] If L1+L2 avg < 8.5: STOP (no LLM)\n  |-> [L3] Semantic score (LLM, 1 call)          -- 40% weight\n\nCEX implementation:\
  \ `cex_score.py` uses this exact pattern.\n\nOptimization: Replace L3 with extended L2 heuristics.\n\n| L3 Dimension | Heuristic\
  \ Replacement | Method |\n|-------------|----------------------|--------|\n| ACTIONABILITY | Imperative verb count + \"\
  how to\" + code blocks + \"must/should\" | Regex + counting |\n| INSIGHT_DEPTH | TF-IDF novelty score vs. same-kind corpus\
  \ mean | Statistical deviation |\n| COMPLETENESS | Schema-required sections present / total required | Set intersection\
  \ |\n| DENSITY | Filler phrase ratio (already in L2) | Regex counting |\n| DOMAIN_EXPERTISE | Domain keyword density vs.\
  \ threshold (already in L2) | TF-IDF |\n| SEARCHABILITY | Tag count + TLDR presence + heading structure (already in L1)\
  \ | Structural |\n\nComparison:\n\n| Metric | Heuristic L3 | LLM L3 | Winner |\n|--------|-------------|---------|--------|\n\
  | Latency | <100ms | 5-30s | Heuristic (300x) |\n| Cost | $0 | ~1075 tokens | Heuristic |\n| Accuracy (mechanical dims)\
  \ | 90% | 95% | Tie (practical) |\n| Accuracy (INSIGHT_DEPTH) | 70% | 90% | LLM |\n| Reproducibility | 100% | ~85% (variance)\
  \ | Heuristic |\n\n---"
pattern_3_tf_idf_memory_selection: "Industry source: LlamaIndex `VectorStoreIndex` (embedding-first, keyword fallback), LangChain\
  \ `EnsembleRetriever` (BM25 + vector hybrid), Elasticsearch BM25 ranking.\n\nArchitecture:\nQuery + Memory corpus\n  |->\
  \ [1] TF-IDF index (one-time build, ~100ms)\n  |-> [2] Score query vs. all memories (~5ms)\n  |-> [3] Apply confidence weighting\
  \ + age decay\n  |-> [4] Return top-K\n\nCEX has this: `cex_retriever.py` implements TF-IDF over 2184 docs with 12K vocabulary.\
  \ The same engine can power `cex_memory_select.py`.\n\nComparison vs. current LLM selector:\n\n| Metric | TF-IDF | LLM (Sonnet)\
  \ | Keyword (current fallback) |\n|--------|--------|-------------|---------------------------|\n| Latency | ~5ms | 3-10s\
  \ | ~1ms |\n| Cost | $0 | ~725 tokens | $0 |\n| Semantic understanding | Medium | High | None |\n| Recall (relevant memories)\
  \ | 90% | 95% | 75% |\n| Determinism | 100% | Non-deterministic | 100% |\n\nImplementation: Reuse `cex_retriever.build_index()`\
  \ over memory header text. Apply same `confidence * age_decay` weighting that keyword fallback already uses. Drop-in replacement\
  \ for `_select_via_llm()`.\n\n---"
pattern_4_dspy_prompt_compilation_optimize_don_t_replace: 'Industry source: DSPy framework (Stanford NLP), "Compiling Declarative
  Language Model Calls into Self-Improving Pipelines" (Khattab et al., 2023).


  Concept: Instead of hand-writing prompts, define the task signature and let the compiler find the optimal prompt via few-shot
  example selection + instruction tuning.


  CEX analog: `cex_crew_runner.py` already does manual prompt composition (13 ISOs + memory + brand + context). DSPy would
  automate the selection of WHICH context to include.


  Applicability to CEX:


  | DSPy Feature | CEX Equivalent | Gap |

  |-------------|----------------|-----|

  | Signature definition | Builder ISOs (bld_instruction, bld_manifest) | None -- already defined |

  | Few-shot example selection | `cex_retriever.py` finds similar artifacts | Could auto-inject top-3 |

  | Prompt optimization | `cex_prompt_optimizer.py` heuristic analysis | No automatic rewriting |

  | Metric-driven compilation | `cex_score.py` 3-layer scoring | No feedback loop to prompts |


  Recommendation: NOT a replacement (still uses LLM). But optimizes token efficiency of CORE_LLM calls by selecting only the
  most relevant context. Estimated token reduction: 20-30% per prompt by dropping low-relevance ISOs.


  ---'
pattern_5_semantic_caching: "Industry source: GPTCache (Zilliz), LangChain `InMemoryCache`, Redis semantic cache.\n\nArchitecture:\n\
  Prompt hash -> Cache lookup\n  |-> [Hit] Return cached response (0 tokens, <1ms)\n  |-> [Miss] Call LLM -> Cache response\
  \ -> Return\n\nCEX implementation: `cex_score.py` already has content-hash caching (lines 413-440). When an artifact hasn't\
  \ changed, L3 score is served from cache.\n\nExpansion opportunity: Apply to `cex_evolve.py` agent mode. If an artifact's\
  \ content hash matches a previously-evolved version, skip the LLM call and return the cached hypothesis.\n\nComparison:\n\
  \n| Metric | No Cache | Content-Hash Cache | Semantic Cache |\n|--------|----------|-------------------|----------------|\n\
  | Cache hit rate | 0% | ~30% (unchanged files) | ~50% (similar files) |\n| Latency (hit) | 5-30s | <1ms | ~50ms (similarity\
  \ check) |\n| Storage | 0 | ~10MB/1000 artifacts | ~50MB/1000 artifacts |\n| Complexity | None | Low (already in CEX) |\
  \ Medium (needs embedding index) |\n\nRecommendation: Content-hash caching is already implemented in cex_score.py. Extend\
  \ to cex_evolve.py. Semantic caching (embedding-based) is overkill for CEX's corpus size.\n\n---"
pattern_6_template_first_generation: "Industry source: Rails scaffolding, Yeoman generators, Cookiecutter, Plop.js.\n\nArchitecture:\n\
  Kind + Schema + Brand config\n  |-> [1] Find template for kind (exact match)\n  |-> [2] Fill placeholders ({{BRAND_NAME}},\
  \ {{KIND}}, etc.)\n  |-> [3] Inject domain-specific content from KC library\n  |-> [4] LLM only for creative sections (if\
  \ any)\n\nCEX implementation: The 8F pipeline's F3 INJECT already loads templates:\n- `archetypes/builders/{kind}-builder/`\
  \ (13 ISOs per kind)\n- `P{xx}/{subdir}/tpl_{kind}.md` (output templates)\n- `brand_inject.py` replaces `{{BRAND_*}}` placeholders\n\
  \nCEX's Construction Triad (from F4 REASON):\n- Template match >= 60% -> Adapt template (minimal LLM)\n- Template match\
  \ 30-59% -> Hybrid (template structure + LLM content)\n- Template match < 30% -> Fresh generation (full LLM)\n\nGap: No\
  \ template match scoring is automated. Currently relies on builder's judgment.\n\nProposed automation: Use `cex_retriever.py`\
  \ TF-IDF to score intent against template library. If score >= 0.6, use template-first path. Saves ~2K tokens per artifact\
  \ for template-heavy kinds.\n\n---"
pattern_7_local_embedding_models: "Industry source: Hugging Face `sentence-transformers`, Ollama `nomic-embed-text`, MTEB\
  \ benchmark leaderboard.\n\nArchitecture:\nText -> Local model (CPU/GPU) -> Embedding vector\n  vs.\nText -> API call (OpenAI)\
  \ -> Embedding vector\n\nCEX current: `cex_kc_index.py` uses OpenAI `text-embedding-3-small` (1536 dims, $0.02/1M tokens).\n\
  \nAlternatives:\n\n| Model | Dims | Cost | Latency | MTEB Score | Local? |\n|-------|------|------|---------|------------|--------|\n\
  | OpenAI text-embedding-3-small | 1536 | $0.02/1M | ~100ms | 62.3 | No |\n| all-MiniLM-L6-v2 | 384 | $0 | ~50ms | 58.8 |\
  \ Yes |\n| nomic-embed-text (Ollama) | 768 | $0 | ~80ms | 61.5 | Yes |\n| BGE-small-en-v1.5 | 384 | $0 | ~40ms | 62.1 |\
  \ Yes |\n\nRecommendation: `nomic-embed-text` via Ollama. Already in CEX's provider chain (cex_intent.py uses Ollama as\
  \ fallback). 768 dims is sufficient for ~2000 document corpus. MTEB score within 1 point of OpenAI.\n\n---"
