18_aider_repo_map_pagerank_algorithm_specification: ''
18_1_architecture: "The repo map converts a codebase into a token-budgeted, PageRank-ranked symbol graph that fits inside\
  \ the model context window while maximizing relevance to the current chat.\n\nSource files\n    |\n[Tree-sitter] -- language\
  \ detection + AST parsing (130+ languages)\n    |\n[Tag Extraction] -- definitions (@name.definition.) + references (@name.reference.)\n\
  \    |\n[Graph Builder] -- directed edges: referencing_file -> defining_file\n    |\n[Personalization Vector] -- chat files\
  \ + mentioned identifiers get 100x boost\n    |\n[NetworkX PageRank] -- biased random walk favoring chat-relevant files\n\
  \    |\n[Token Budget Enforcer] -- accumulate files descending by score, stop at limit\n    |\n[to_tree()] -- render as\
  \ indented symbol list, inject into system prompt"
18_2_graph_construction_rules: '| Condition | Edge Direction | Weight |

  |-----------|---------------|--------|

  | File B references an identifier defined in file A | B -> A | 1.0 |

  | File A has definitions but receives zero incoming references | A -> A (self-loop) | 0.1 |


  Self-loops prevent isolated definition files from scoring zero and disappearing from the map.'
18_3_personalization_vector: 'The PageRank personalization vector biases the random walk toward files relevant to the current
  conversation:


  | File Category | Boost Value |

  |--------------|-------------|

  | Files open in current chat | `100 / len(chat_fnames)` |

  | Files whose identifiers were mentioned by user | `100 / len(mentioned_fnames)` |

  | All other files | `1 / len(all_fnames)` |


  This means a chat file with 10 files open gets 10x boost vs its neighbors, while unmentioned files contribute baseline noise
  only.'
18_4_tree_sitter_query_system: "Location: `aider/queries/{language}/tags.scm`\n\n; Example Python query file\n(function_definition\n\
  \  name: (identifier) @name.definition.function)\n\n(decorated_definition\n  definition: (function_definition\n    name:\
  \ (identifier) @name.definition.function))\n\n(call\n  function: (identifier) @name.reference.call)\n\n(call\n  function:\
  \ (attribute\n    attribute: (identifier) @name.reference.call))\n\n| Capture Pattern | Purpose |\n|----------------|---------|\n\
  | `@name.definition.*` | Functions, classes, structs, traits, impls, modules |\n| `@name.reference.*` | Calls, type usage,\
  \ imports, attribute access |\n\n- 130+ languages supported via tree-sitter detection\n- 40+ languages have dedicated `.scm`\
  \ query files for full definition/reference extraction\n- Fallback: Pygments lexer extracts bare identifiers when no `.scm`\
  \ query exists"
18_5_token_budget_algorithm: "target_tokens = min(\n    max_map_tokens  map_mul_no_files,    # default: 1024  8 = 8192\n \
  \   max_context_window - 4096             # reserve space for other prompt components\n)\n\n| Parameter | Default | CLI\
  \ Override |\n|-----------|---------|-------------|\n| `max_map_tokens` | 1024 | `--map-tokens N` |\n| `map_mul_no_files`\
  \ | 8 | `--map-multiplier-no-files N` |\n| Reserved padding | 4096 | Hardcoded |\n\nToken counting uses sampling on large\
  \ texts to avoid O(n) overhead per file."
18_6_caching_system: '| Property | Value |

  |----------|-------|

  | Backend | `diskcache.Cache` (SQLite-backed) |

  | Location | `.aider.tags.cache.v{VERSION}/` at repo root |

  | Cache key | Absolute file path (string) |

  | Cache value | `{"mtime": float, "data": [Tag, ...]}` |

  | Invalidation | `mtime != current file modification time` |

  | Version bump | When tag extraction logic changes (prevents stale AST data) |'
18_7_refresh_strategies: '| Strategy | Trigger | Use Case |

  |----------|---------|---------|

  | `auto` (default) | File changes OR user mentions identifier | Standard development |

  | `always` | Before every LLM call | Maximum accuracy, slower |

  | `files` | Only when chat files change | Stable codebase, targeted edits |

  | `manual` | Never (user-triggered only) | Testing, performance-critical pipelines |'
18_8_full_ranking_pipeline: "# Step 1: Tag extraction per file\ntags = get_ranked_tags(fnames, chat_fnames, mentioned_idents)\n\
  # -> Uses tree-sitter queries; builds defines={} and references={} dicts\n\n# Step 2: Graph building\nG = nx.DiGraph()\n\
  for ref_file in references:\n    for ident in references[ref_file]:\n        for def_file in defines.get(ident, []):\n \
  \           G.add_edge(ref_file, def_file, weight=1.0)\n# Self-loop for isolated definition files\nfor f in defines:\n \
  \   if f not in G:\n        G.add_edge(f, f, weight=0.1)\n\n# Step 3: PageRank with personalization\npersonalization = build_personalization_vector(chat_fnames,\
  \ mentioned_fnames)\nscores = nx.pagerank(G, personalization=personalization)\n\n# Step 4: Format output within token budget\n\
  output = to_tree(sorted(scores, key=scores.get, reverse=True), token_budget)\n\n---"
