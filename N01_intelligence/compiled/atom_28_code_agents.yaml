16_1_headless_cli_p_print_flag: '# Single-shot: prompt via flag, output to stdout, exit

  claude -p "Review this diff and list all bugs" < diff.txt


  # Structured output (machine-readable)

  claude -p "List all TODO comments" --output-format json


  # Real-time streaming (newline-delimited JSON events)

  claude -p "Refactor this function" --output-format stream-json


  # Remote mode: headless server controlled via REST/WebSocket (Q1 2026)

  claude --remote --api-key $MY_API_KEY


  | Flag | Behavior |

  |------|----------|

  | `-p` / `--print` | Non-interactive; print to stdout, exit |

  | `--output-format text` | Plain text (default) |

  | `--output-format json` | Final JSON result block |

  | `--output-format stream-json` | Newline-delimited JSON event stream |

  | `--remote` | Start headless server with REST + WebSocket API |

  | `--no-conversation` | Bare mode (recommended for scripts, future default for `-p`) |'
16_2_python_sdk: "import asyncio\nfrom claude_agent_sdk import query, ClaudeAgentOptions  # renamed from ClaudeCodeOptions\n\
  \nasync def main():\n    options = ClaudeAgentOptions(\n        max_turns=10,\n        system_prompt=\"You are a security-focused\
  \ code reviewer.\",\n        allowed_tools=[\"Read\", \"Grep\", \"Bash\"],\n        include_partial_messages=True,  # required\
  \ for streaming events\n    )\n    async for message in query(\n        prompt=\"Review all Python files in src/ for SQL\
  \ injection\",\n        options=options,\n    ):\n        if message.type == \"assistant\":\n            print(message.content)\n\
  \        elif message.type == \"result\":\n            print(f\"Done. Cost: {message.usage}\")\n\nasyncio.run(main())\n\n\
  Requirements: Python 3.10+, Node.js, Claude Code CLI installed."
