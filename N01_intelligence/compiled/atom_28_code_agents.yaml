tldr: 'Complete vocabulary of the code agent ecosystem (2024-2026): 9 major platforms, 9 edit format families with code examples,
  4 sandbox models, 3 context strategies, 2 inter-agent protocols. Maps 140+ terms to CEX kinds and proposes 8 new kinds.
  Includes Agent SDK API, Aider PageRank internals, Cursor VM architecture, and agent selection decision tree.'
1_platforms_surveyed: '| Platform | Vendor | Type | Open Source | Key Innovation |

  |----------|--------|------|-------------|----------------|

  | Claude Code | Anthropic | CLI agent | No | Subagents, hooks, CLAUDE.md, SDK headless mode |

  | Codex CLI | OpenAI | CLI agent | Yes (Rust) | Sandbox modes, AGENTS.md hierarchy, CSV batch spawn |

  | Aider | Paul Gauthier | Terminal pair programmer | Yes | 6 edit formats, repo map (tree-sitter + PageRank), architect
  mode |

  | Cursor | Anysphere | IDE agent | No | Background agents in VMs, Apply model, worktree isolation |

  | Windsurf | Cognition (ex-Codeium) | IDE agent | No | Cascade flow awareness, implicit memory, multi-pane agents |

  | Devin | Cognition | Autonomous agent | No | Full desktop environment, dynamic re-planning, PR merge rate |

  | SWE-Agent | Princeton NLP | Research agent | Yes | Agent-Computer Interface (ACI), trajectory recording, YAML config |

  | OpenHands | All Hands AI | Platform | Yes (MIT) | CodeAct unified action space, event-stream architecture, Docker sandbox
  |

  | Augment Code | Augment | Context engine | Partial (MCP) | Semantic dependency graph, 400K+ file indexing, cross-repo |


  ---'
2_edit_formats_complete_taxonomy: The mechanism by which an LLM communicates file changes to the host system.
2_1_format_families: '| Format | Origin | Mechanism | Pros | Cons |

  |--------|--------|-----------|------|------|

  | Whole file | Aider | LLM returns entire file content | Simple, no matching errors | Slow, expensive for large files, encourages
  lazy elision |

  | Search/replace blocks | Aider (`diff`) | `<<<<<<< SEARCH` / `=======` / `>>>>>>> REPLACE` markers | Precise, compact |
  Pattern matching can break with code evolution |

  | Unified diff (udiff) | Aider | Modified `diff -U0` format with `@@` hunks | Standard tooling compatibility, reduces lazy
  coding | High technical complexity for LLMs |

  | Diff-fenced | Aider (Gemini) | Search/replace with filepath inside fence | Gemini-compatible | Gemini-specific workaround
  |

  | Editor-diff / editor-whole | Aider | Streamlined variants for architect mode | Separates planning from editing | Two-model
  overhead |

  | OpenAI patch | Codex | ` Begin Patch` / ` End Patch` with `@@` context | No line-number dependency | Codex-specific format
  |

  | Tool-based edits | Claude Code, OpenHands | Function calls (Read, Edit, Write tools) | Structured, validated, atomic |
  Requires tool infrastructure |

  | Sketch + Apply model | Cursor | Primary LLM sketches change; dedicated 7B model applies | Fast (10.5K tok/s), 98% accuracy
  | Two-model pipeline |

  | Semantic edit | Morph | AST-aware transformations, not text-based | 98% accuracy, scope-aware | Proprietary, limited availability
  |'
2_2_edit_application_strategies: '| Strategy | Used By | Description |

  |----------|---------|-------------|

  | Exact match | Aider, Codex | Search string must match file content exactly |

  | Fuzzy match (Levenshtein) | RooCode, Aider fallback | Tolerate small differences in search block |

  | Layered matching | RooCode | Exact -> whitespace-insensitive -> fuzzy cascade |

  | Indentation-relative replacement | RooCode | Preserve surrounding indent context |

  | Middle-out fuzzy | RooCode | Match from center of block outward |

  | Fast Apply model | Cursor, Morph | Dedicated small model (7B) trained for code merge at 10.5K tok/s |

  | Speculative decoding | Morph Fast Apply | CUDA-kernel-level optimization for apply speed |'
2_3_concrete_format_examples_all_9_families: "1. Whole file — LLM returns the complete file after changes:\nshow_greeting.py\n\
  ` ` `python\nimport sys\ndef greeting(name):\n    print(\"Hey\", name)\nif name == 'main':\n    greeting(sys.argv[1])\n\
  ` ` `\n\n2. Search/replace (Aider `diff`) — most common Aider format:\nmathweb/flask/app.py\n` ` `python\n<<<<<<< SEARCH\n\
  from flask import Flask\n=======\nimport math\nfrom flask import Flask\n>>>>>>> REPLACE\n` ` `\n\n3. Unified diff (`udiff`)\
  \ — standard `-U0` variant:\n--- mathweb/flask/app.py\n+++ mathweb/flask/app.py\n@@ ... @@\n-class MathWeb:\n+import sympy\n\
  +\n+class MathWeb:\n\n4. Diff-fenced — search/replace with filepath inside fence (Gemini variant):\n# filepath: mathweb/flask/app.py\n\
  <<<<<<< SEARCH\nfrom flask import Flask\n=======\nimport math\nfrom flask import Flask\n>>>>>>> REPLACE\n\n5. Editor-diff\
  \ / editor-whole — Same syntax as formats 2/1 but produced by a second, smaller model in Aider architect mode. Architect\
  \ outputs plan; editor model produces final diffs.\n\n6. OpenAI patch (Codex):\n* Begin Patch\n* Update File: src/utils.py\n\
  @@ def add(a, b):\n-    return a + b\n+    return int(a) + int(b)\n* End Patch\nNo line-number dependency; context lines\
  \ anchor the hunk.\n\n7. Tool-based edits (Claude Code, OpenHands):\n{\"tool\": \"Edit\", \"file_path\": \"src/utils.py\"\
  ,\n \"old_string\": \"return a + b\",\n \"new_string\": \"return int(a) + int(b)\"}\nStructured function call. Atomic. No\
  \ diff syntax needed.\n\n8. Sketch + Apply model (Cursor):\n- Primary LLM outputs a \"sketch\" (loose prose description\
  \ of the change)\n- Dedicated 7B apply model reads sketch + original file, produces merged output at 10.5K tok/s\n\n9. Semantic\
  \ edit (Morph):\n- LLM specifies the change at the AST level (e.g., rename parameter in function scope)\n- Apply model transforms\
  \ the AST -- scope-aware, 98% accuracy, robust to code evolution\n\n---"
2_4_architect_mode_two_phase_editing: "Aider pioneered this pattern; Cursor and others adopted it.\n\nPhase 1: ARCHITECT (large\
  \ model)     Phase 2: EDITOR (same or smaller model)\n  - Reads full context                 - Receives architect's plan\n\
  \  - Reasons about approach             - Produces actual file edits\n  - Outputs high-level plan            - Uses editor-diff\
  \ or editor-whole format\n  - Does NOT touch files               - Applies changes atomically\n\nCEX parallel: N07 (orchestrator/architect)\
  \ dispatches to N03/N05 (editor/builder).\n\n---"
3_codebase_context_strategies: How agents understand the repository beyond the current file.
3_1_repo_map_aider: '| Component | Technology | Purpose |

  |-----------|-----------|---------|

  | AST parsing | Tree-sitter | Extract function/class definitions and references |

  | Dependency graph | Custom graph builder | Map call relationships between symbols |

  | Ranking | PageRank | Prioritize most-connected symbols |

  | Output | Condensed text map | Fits in context window, provides symbol-level visibility |


  The repo map provides symbol-level visibility without loading full file content. Aider automatically selects relevant context
  based on the current chat.


  #### 3.1a PageRank Algorithm — Implementation Detail


  The repo map is the core reason Aider achieves higher edit accuracy than agents using naive file inclusion. The algorithm
  runs in 5 stages:


  Stage 1 — Tag extraction via tree-sitter

  Each supported language has a `tags.scm` query file defining what counts as a definition (function/class declared) vs. a
  reference (called/imported). Tree-sitter parses all files into ASTs; the query files extract tagged symbols with line numbers.
  130+ languages supported.


  Stage 2 — Multigraph construction

  A directed multigraph is built:

  - Node = file or symbol

  - Edge = reference from one symbol to another

  - Self-loop edges (weight=0.1) added for definitions with zero references (prevents isolated nodes from being ignored by
  PageRank)


  Stage 3 — Personalized PageRank via NetworkX

  # Simplified from aider/repomap.py

  import networkx as nx


  G = build_reference_graph(tags)           # multigraph

  personalization = {f: 1.0 for f in chat_files}  # files in current chat

  ranked = nx.pagerank(G, personalization=personalization, weight="weight")

  # Result: dict {symbol -> float score}, higher = more central

  Files currently in the chat window receive boosted personalization scores, causing their callers/callees to rank higher
  — context expands outward from current work.


  Stage 4 — Token budget allocation via binary search

  The ranked symbol list is too large for the context window. Aider uses binary search over the inclusion threshold to find
  the largest subset that fits the token budget (configurable via `--map-tokens`, default 1024).


  Stage 5 — Compact text output

  Selected symbols are rendered as a tree outline (file path + function signatures only, no bodies). This gives the LLM structural
  awareness of 10K+ symbol codebases in ~1K tokens.


  | Metric | Value |

  |--------|-------|

  | Languages supported | 130+ |

  | Default map token budget | 1,024 tokens |

  | Graph algorithm | NetworkX `pagerank()` with personalization |

  | Self-loop weight (isolated nodes) | 0.1 |

  | Benchmark improvement vs no map | Significantly higher edit accuracy |


  Source: Building a better repository map with tree-sitter'
3_2_codebase_indexing_cursor_augment: '| Approach | Vendor | Scale | Method |

  |----------|--------|-------|--------|

  | Hybrid semantic-lexical | Cursor | Full project | Embedding + keyword index at project open |

  | Semantic dependency graph | Augment Code | 400K+ files | Call graphs, dependency chains, cross-repo |

  | Three-tier retrieval | Cline | Per-query | ripgrep (lexical) + fzf (fuzzy) + tree-sitter (AST) |

  | Knowledge graph | Codebase-Memory MCP | 66 languages | Tree-sitter -> SQLite graph, 14 MCP query tools |

  | Code review graph | code-review-graph | Per-repo | Persistent map, 6.8x fewer tokens on reviews |'
3_3_context_window_management: '| Technique | Description | Used By |

  |-----------|-------------|---------|

  | Context pruning | Drop older/irrelevant messages from conversation | All agents |

  | Subagent delegation | Offload research to separate context window | Claude Code, Codex |

  | Repo map injection | Add condensed codebase overview to system prompt | Aider |

  | Semantic retrieval | Query embeddings for relevant code chunks | Cursor, Augment |

  | File watching | Re-index only changed files (content-hash based) | Augment, Codebase-Memory |


  ---'
4_task_files_configuration_as_context: 'Files that persist instructions across sessions, read by agents at startup.


  | File | Agent | Location | Hierarchy |

  |------|-------|----------|-----------|

  | CLAUDE.md | Claude Code | Root, `.claude/`, `~/.claude/` | Project > directory > user-level |

  | AGENTS.md | Codex CLI | Root + subdirectories | Global -> project root -> cwd (walk down) |

  | AGENTS.override.md | Codex CLI | Same locations | Overrides AGENTS.md at same level |

  | .cursorrules | Cursor | Project root | Single file (legacy) |

  | .cursor/rules/*.mdc | Cursor | Project `.cursor/` dir | Multiple rule files, versioned |

  | Rules & Memory | Windsurf | Settings | Cascade learns conventions over ~48h |

  | .windsurfrules | Windsurf | Project root | Project-level instructions |

  | config.yaml | SWE-Agent | Repo root | Single YAML governs entire agent behavior |'
key_design_patterns: '| Pattern | Description | Example |

  |---------|-------------|---------|

  | Hierarchical override | More specific files override general ones | Codex: global AGENTS.md < project AGENTS.md < subdir
  AGENTS.md |

  | Separation of concerns | Different file for different rule types | Cursor: project rules, user rules, team rules, agent
  rules |

  | Implicit learning | Agent builds memory from usage patterns | Windsurf: ~48h to learn architecture patterns |

  | Compound memory | Multiple channels persist knowledge | AGENTS.md + git history + progress logs + task JSON |


  ---'
5_sandbox_and_isolation_models: 'How agents execute code safely.


  | Model | Agent | Isolation | Network | Persistence |

  |-------|-------|-----------|---------|-------------|

  | Local sandbox (macOS Seatbelt/Linux Landlock) | Codex CLI | OS-level policy per command | Configurable (deny/allow) |
  Working directory only |

  | Docker container | OpenHands, SWE-Agent | Container per session | Configurable | Ephemeral by default |

  | Cloud VM | Cursor Background Agents, Devin | Ubuntu VM per agent | Full internet | Branch + PR output |

  | Git worktree | Cursor, Claude Code | Filesystem isolation via git | Local | Separate branch |

  | Approval gates | Claude Code, Codex | Human-in-the-loop before dangerous ops | N/A | N/A |'
codex_sandbox_modes: '| Mode | Reads | Writes | Commands | Network |

  |------|-------|--------|----------|---------|

  | Read-only | Yes | Approval needed | Approval needed | No |

  | Auto (default) | Yes | Yes (in workdir) | Yes (in workdir) | No |

  | Full access | Yes | Yes (anywhere) | Yes (anywhere) | Yes |

  | YOLO | Yes | Yes | Yes (no approval) | Yes |'
cursor_background_agent_architecture: "User starts task in Cursor\n  |\n  v\nCloud VM provisioned (Ubuntu on AWS)\n  |-- Repo\
  \ cloned from GitHub\n  |-- Dockerfile applied (custom base image, optional)\n  |-- setup.sh executed (deps installed, services\
  \ started)\n  |-- Agent works on feature branch\n  |-- Tests executed in VM\n  |-- Video recording of session (since Feb\
  \ 2026)\n  |-- Browser / Computer Use access (since Feb 2026)\n  |\n  v\nPR created on GitHub\n  |-- User reviews in Cursor\
  \ or GitHub\n  |-- Up to 8 parallel agents\n\n#### VM Isolation Specification\n\n| Property | Value |\n|----------|-------|\n\
  | Infrastructure | AWS (Ubuntu-based VMs) |\n| Network | Full internet access (configurable) |\n| Storage | Ephemeral VM\
  \ disk; output via PR |\n| Configuration file | `.cursor/environment.json` (committable) |\n| Custom base image | Dockerfile\
  \ supported |\n| Post-checkout setup | `setup.sh` script |\n| Docker-in-Docker | Supported via `sudo service docker start`\
  \ in setup.sh |\n| Parallel agents | Up to 8 per project |\n| Computer Use | Browser + video recording (Feb 2026 update)\
  \ |\n| Secrets injection | Via Cursor settings, NOT in Dockerfile |\n\n`.cursor/environment.json` example:\n{\n  \"build\"\
  : {\n    \"dockerfile\": \".cursor/Dockerfile\"\n  },\n  \"startScript\": \".cursor/setup.sh\"\n}\n\nKey isolation properties\
  \ vs alternatives:\n- More persistent than Codex sandbox (VM survives across steps; Codex resets per command)\n- More capable\
  \ than Claude Code worktree (full OS, not just filesystem branch)\n- Less controllable than OpenHands Docker (no direct\
  \ container config beyond Dockerfile)\n\nSource: Cursor Background Agents docs\n\n---"
6_multi_file_edit_coordination: 'Patterns for agents editing multiple files in a single task.


  | Pattern | Description | Used By |

  |---------|-------------|---------|

  | Atomic multi-file commit | All file changes committed together | Claude Code (git add + commit) |

  | Fan-out edit | Single intent produces edits across N files | Aider (auto-adds related files via repo map) |

  | Worktree isolation | Each agent works in separate git worktree | Cursor 3 (`/worktree` command) |

  | Proposal pattern | Write `.proposal` files, merge post-wave | CEX (shared-file-proposal rule) |

  | Sequential file processing | Edit files one-by-one with tool calls | Claude Code, Codex (tool-based edits) |

  | Sketch-then-apply | Plan all changes first, apply in batch | Cursor (architect + apply model) |

  | Dependency-aware ordering | Edit in topological order of imports | Augment Code (dependency graph) |


  ---'
7_agent_loop_patterns: The core execution cycle of code agents.
7_1_standard_agent_loop_react: 'OBSERVE  ->  THINK  ->  ACT  ->  OBSERVE  ->  ...

  (read file)  (plan)  (edit/run)  (check result)'
7_2_named_loop_variants: '| Pattern | Description | Source |

  |---------|-------------|-------|

  | Lint-fix loop | Run linter -> collect errors -> fix -> re-run until clean | Common in all agents |

  | Test-repair cycle | Run tests -> parse failures -> fix code -> re-test -> commit | RepairAgent, SWE-Agent |

  | Spec-to-code | Read specification -> generate code -> validate against spec | Intent (Augment), Devin |

  | Bugloop | Detect bug -> localize fault -> generate patch -> verify fix | CEX bugloop kind, RepairAgent |

  | Self-evaluation loop | Generate -> score own output -> revise if below threshold | Claude Code (8F F7 GOVERN) |

  | Backtracking loop | Generate -> detect syntax error -> revert -> retry with context | ROCODE |

  | Ralph Wiggum technique | Pick task -> implement -> validate -> commit -> reset context -> next task | Addy Osmani blog
  |

  | Continuous coding loop | Task selection -> implementation -> validation -> commit -> progress log -> repeat | Self-improving
  agents pattern |'
7_3_multi_agent_orchestration_patterns: '| Pattern | Description | Used By |

  |---------|-------------|---------|

  | Planner-Worker | Planner agent strategizes; worker agents implement | Devin, CEX (N07 + N01-N06) |

  | Best-of-N | N agents generate competing solutions; pick best | Cursor 3 |

  | Wave dispatch | Groups of agents run in dependency-ordered waves | CEX (mission_runner) |

  | Parallel worktree | Each agent in isolated git worktree, merged after | Cursor, Intent |

  | Hierarchical delegation | Parent spawns child agents for subtasks | Claude Code subagents, Codex subagents |

  | Compound loops | Analysis -> Planning -> Execution chained across agents | Multi-agent pattern |


  ---'
8_background_headless_autonomous_agents: '| Capability | Claude Code | Codex CLI | Cursor | Devin |

  |-----------|-------------|-----------|--------|-------|

  | Headless mode | `-p` flag (stdout, exit) | `exec` subcommand | Background agents | Always headless |

  | SDK integration | Claude Agent SDK | Agents SDK | API (limited) | Slack/web interface |

  | Parallel agents | Subagents (5 per nucleus) | `max_threads: 6` | 8 worktree agents | 1 per session |

  | Session persistence | Context window | Transcript + plan history | VM state + branch | Full environment |

  | Output mechanism | Files + git commits | Files + git commits | PR on GitHub | PR on GitHub |

  | Monitoring | Hooks (PreToolUse, PostToolUse, Stop) | Approval queue | Agent dashboard | Session playback |


  ---'
