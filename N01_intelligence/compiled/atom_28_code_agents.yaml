family_7_tool_based_edits_function_calling: "LLM invokes structured tool calls. No text markers; edits are atomic JSON operations.\n\
  \n{\n  \"tool\": \"Edit\",\n  \"input\": {\n    \"file_path\": \"mathweb/flask/app.py\",\n    \"old_string\": \"from flask\
  \ import Flask\",\n    \"new_string\": \"import math\\nfrom flask import Flask\"\n  }\n}\n\nUsed by Claude Code (Agent SDK)\
  \ and OpenHands CodeAct. Requires tool execution infrastructure; validated at the API boundary.\n\n---"
family_8_sketch_apply_model_two_phase: 'Primary LLM sketches the change in natural language; a dedicated 7B apply model merges
  the sketch into the actual file.


  # Phase 1 (primary LLM sketch -- free-form natural language or rough diff):

  "Insert ''import math'' as the first import in app.py, before flask"


  # Phase 2 (apply model -- Morph Fast Apply 7B or Cursor internal):

  [Modified file bytes written directly; no intermediate format exposed to user]


  Performance (Morph A100): 10,500 tokens/second. Accuracy: 98% on edit benchmarks vs ~85% for search/replace.


