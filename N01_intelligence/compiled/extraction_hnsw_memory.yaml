source: ruvnet/ruflo v3.5
tldr: 'ruflo implements HNSW via agentdb + @ruvector/micro-hnsw-wasm with M=16, efConstruction=200, 1536-dim cosine. Two implementations:
  full HNSWIndex (multi-level graph) and HnswLite (BFS fallback). CEX adds HNSW as L2 layer behind existing TF-IDF.'
1_source_architecture: 'ruflo''s memory system is a hybrid backend: SQLite for structured queries + AgentDB/HNSW for semantic
  vector search. The routing strategy decides which backend handles each query type.'
process_tree: "HybridBackend (routing: auto | sqlite-first | agentdb-first)\n  |\n  +-- SQLite backend (exact, prefix, tag\
  \ queries)\n  +-- AgentDB backend (semantic, hybrid queries)\n        |\n        +-- HNSWIndex (pure TypeScript implementation)\n\
  \        +-- @ruvector/micro-hnsw-wasm (WASM bridge, optional)\n        +-- hnswlib-node (native fallback)"
2_hnsw_index_parameters_exact_values: '| Parameter | Default | Source file |

  |-----------|---------|-------------|

  | `dimensions` | 1536 | `v3/@claude-flow/memory/src/types.ts:246` |

  | `M` (max connections/layer) | 16 | `v3/@claude-flow/memory/src/agentdb-backend.ts:78` |

  | `efConstruction` | 200 | `v3/@claude-flow/memory/src/agentdb-backend.ts:79` |

  | `efSearch` | 100 | `v3/@claude-flow/memory/src/agentdb-backend.ts:80` |

  | `metric` | cosine | `v3/@claude-flow/memory/src/types.ts:44-48` |

  | `maxElements` | 1000000 | `v3/@claude-flow/memory/src/agentdb-backend.ts:82` |

  | `cacheEnabled` | true | `v3/@claude-flow/memory/src/agentdb-backend.ts:83` |'
distance_metrics_supported: cosine (default) | euclidean | dot | manhattan
alternative_dimensions:
- '1536: OpenAI ada-002 (default)'
- '384: MiniLM (mentioned in controller-registry.ts:113)'
3_data_structures: ''
hnswnode_hnsw_index_ts_192_207: "interface HNSWNode {\n  id: string;\n  vector: Float32Array;              // raw embedding\n\
  \  normalizedVector: Float32Array | null;  // pre-normalized for O(1) cosine\n  connections: Map<number, Set<string>>; \
  \ // per-layer adjacency list\n  level: number;                     // top layer of this node\n}"
searchoptions_types_ts: "interface SearchOptions {\n  k: number;              // number of results\n  ef?: number;       \
  \     // search expansion factor (higher = more accurate, slower)\n  threshold?: number;     // minimum similarity 0-1\n\
  \  metric?: DistanceMetric;\n  filters?: MemoryQuery;  // post-search filtering\n}"
querytype_routing: 'semantic  -> HNSW index

  exact     -> SQLite LIKE

  prefix    -> SQLite LIKE prefix%

  tag       -> SQLite tag join

  hybrid    -> both backends, merge + deduplicate'
4_performance_characteristics: '| Metric | Value | Source |

  |--------|-------|--------|

  | Speed vs brute-force | 150x-12,500x faster | CLAUDE.md benchmarks |

  | Cache hit rate | 95%+ | hybrid-backend.ts |

  | Batch insert size | 50 embeddings | agentdb-backend.ts:445-495 |

  | Level multiplier | `1/log(M)` = 0.25 for M=16 | hnsw-index.ts |

  | Storage precision | Float32 (32-bit per dimension) | types.ts |'
key_optimizations_in_ruflo:
- 'Pre-normalized vectors: eliminates sqrt in cosine similarity (O(1) vs O(n))'
- 'Binary/scalar/product quantization: optional compression for large indexes'
- 'BinaryMinHeap + BinaryMaxHeap: O(log n) candidate selection during search'
- 'Dual-write mode: both SQLite + AgentDB stay synchronized'
5_cex_integration_plan: ''
current_state_tools_cex_retriever_py: 'CEX uses pure-Python TF-IDF with stdlib only (no numpy/sklearn):

  - `build_tfidf()`: Counter-based DF, sparse dict vectors

  - `cosine_similarity()`: dot product over common keys

  - Vocab filter: words in 2+ docs but <90% of docs

  - Index size: 2184 docs, 12K vocab terms

  - Storage: JSON file at `.cex/retriever_index.json`


  Strengths (keep): zero dependencies, fast cold start, good for keyword matching

  Weakness (fix): no semantic understanding -- "agent orchestration" won''t match "multi-model dispatch"'
proposed_l2_hnsw_layer: "Query\n  |\n  +-- L1: TF-IDF (cex_retriever.py) -- fast, keyword-exact, 0 deps\n  |     returns top-20\
  \ candidates in <50ms\n  |\n  +-- L2: HNSW (cex_retriever_hnsw.py) -- semantic, embedding-based\n  |     returns top-20\
  \ candidates via vector similarity\n  |\n  +-- Merge: RRF (Reciprocal Rank Fusion) or weighted union\n        returns top-k\
  \ final results"
implementation_tools_cex_retriever_hnsw_py: 'Option A: hnswlib (C++ via Python bindings)

  - Library: `pip install hnswlib` (mature, 5K+ GitHub stars)

  - Pros: fast, battle-tested, pure C++ backend

  - Cons: requires C++ build tools on Windows


  Option B: chromadb (batteries-included)

  - Library: `pip install chromadb`

  - Pros: built-in HNSW + persistence + embedding functions

  - Cons: heavy dependency (pulls in onnxruntime, etc.)


  Option C: Ollama local embeddings + hnswlib (RECOMMENDED)

  - Use Ollama (already running on RTX 5070 Ti) for embeddings

  - Use hnswlib for index storage and search

  - Zero cloud dependency, all local

  - Model: `nomic-embed-text` (768 dims) or `mxbai-embed-large` (1024 dims)'
recommended_parameters_for_cex: '| Parameter | Value | Rationale |

  |-----------|-------|-----------|

  | dimensions | 768 | nomic-embed-text on local Ollama |

  | M | 16 | ruflo default, good balance for <100K docs |

  | efConstruction | 200 | ruflo default, high quality index build |

  | efSearch | 50 | CEX has ~2200 docs, lower ef is fine |

  | metric | cosine | standard for text embeddings |

  | maxElements | 50000 | 25x current corpus, room for growth |'
