2_3_vercel_ai_sdk_middleware_system: ''
2_3_1_architecture: 'Middleware wraps `LanguageModelV3` via `wrapLanguageModel()`, intercepting calls before/after the model
  without changing call-site code. Multiple middlewares form an onion: first in list is outermost (first to see params, last
  to see results).'
2_3_2_wraplanguagemodel_api: "import { wrapLanguageModel } from \"ai\";\n\nconst wrapped = wrapLanguageModel({\n  model: openai(\"\
  gpt-4.1\"),          // base LanguageModelV3\n  middleware: myMiddleware,           // or: [mw1, mw2, mw3]\n  modelId?:\
  \ \"custom-id\",             // override model.modelId\n  providerId?: \"custom-provider\",    // override model.provider\n\
  });\n// wrapped is a LanguageModelV3 -- drop-in replacement\n\nExecution order with `[mw1, mw2]`:\n- transformParams: `mw1\
  \ -> mw2 -> model`\n- results: `model -> mw2 -> mw1`"
2_3_3_languagemodelv3middleware_interface: "interface LanguageModelV3Middleware {\n  // Runs before BOTH generate and stream\
  \ calls.\n  transformParams?: (options: {\n    params: LanguageModelV3CallOptions;\n    type: \"generate\" | \"stream\"\
  ;\n  }) => Promise<LanguageModelV3CallOptions>;\n\n  // Intercept non-streaming doGenerate().\n  wrapGenerate?: (options:\
  \ {\n    doGenerate: () => Promise<LanguageModelV3GenerateResult>;\n    doStream: () => Promise<{ stream: ReadableStream<LanguageModelV3StreamPart>;\
  \ rawCall: RawCallResponse }>;\n    params: LanguageModelV3CallOptions;\n    model: LanguageModelV3;\n  }) => Promise<LanguageModelV3GenerateResult>;\n\
  \n  // Intercept streaming doStream().\n  wrapStream?: (options: {\n    doGenerate: () => Promise<LanguageModelV3GenerateResult>;\n\
  \    doStream: () => Promise<{ stream: ReadableStream<LanguageModelV3StreamPart>; rawCall: RawCallResponse }>;\n    params:\
  \ LanguageModelV3CallOptions;\n    model: LanguageModelV3;\n  }) => Promise<{ stream: ReadableStream<LanguageModelV3StreamPart>;\
  \ rawCall: RawCallResponse }>;\n}\n\nAll three methods are optional. Pass context via `params.providerMetadata.yourKey`."
2_3_4_built_in_middlewares: "extractReasoningMiddleware -- strips `<think>` blocks into separate reasoning field:\n\nimport\
  \ { extractReasoningMiddleware, wrapLanguageModel } from \"ai\";\n\nwrapLanguageModel({\n  model: deepseek(\"deepseek-r1\"\
  ),\n  middleware: extractReasoningMiddleware({\n    tagName: \"think\",           // default: \"think\"\n    startWithReasoning:\
  \ false,  // prepend reasoning to generation if true\n  }),\n});\n// result.reasoning / result.reasoningText populated\n\
  \nsimulateStreamingMiddleware -- makes non-streaming models stream:\n\nimport { simulateStreamingMiddleware } from \"ai\"\
  ;\n\nwrapLanguageModel({\n  model: nonStreamingModel,\n  middleware: simulateStreamingMiddleware(),\n});\n// wrapStream()\
  \ calls doGenerate() internally, emits fake stream parts\n\ndefaultSettingsMiddleware -- apply model defaults per-app:\n\
  \nimport { defaultSettingsMiddleware } from \"ai\";\n\nwrapLanguageModel({\n  model: openai(\"gpt-4.1\"),\n  middleware:\
  \ defaultSettingsMiddleware({\n    settings: {\n      temperature: 0.2,\n      maxOutputTokens: 1024,\n      providerOptions:\
  \ {\n        openai: { store: false },\n      },\n    },\n  }),\n});\n\naddToolInputExamplesMiddleware -- inject tool examples\
  \ into descriptions:\n\nimport { addToolInputExamplesMiddleware } from \"ai\";\n\nwrapLanguageModel({\n  model: provider(\"\
  model\"),\n  middleware: addToolInputExamplesMiddleware({\n    prefix: \"Input Examples:\",\n    format: (example, index)\
  \ => `${index + 1}. ${JSON.stringify(example.input)}`,\n    remove: true,   // strip inputExamples from schema after injection\n\
  \  }),\n});\n\nextractJsonMiddleware -- strip markdown code fences from JSON responses:\n\nimport { extractJsonMiddleware\
  \ } from \"ai\";\n\nwrapLanguageModel({\n  model: provider(\"model\"),\n  middleware: extractJsonMiddleware(),\n});"
2_3_5_custom_middleware_pattern: "const loggingMiddleware: LanguageModelV3Middleware = {\n  transformParams: async ({ params,\
  \ type }) => {\n    console.log(`[${type}] messages: ${params.prompt?.length ?? 0}`);\n    return params;\n  },\n  wrapGenerate:\
  \ async ({ doGenerate, params }) => {\n    const t0 = Date.now();\n    const result = await doGenerate();\n    console.log(`generate:\
  \ ${Date.now() - t0}ms, tokens: ${result.usage?.totalTokens}`);\n    return result;\n  },\n  wrapStream: async ({ doStream\
  \ }) => {\n    const { stream, ...rest } = await doStream();\n    const transform = new TransformStream();\n    stream.pipeTo(transform.writable);\n\
  \    return { stream: transform.readable, ...rest };\n  },\n};\n\n---"
2_4_datastreamprotocol_complete_wire_format: Wire format between Vercel AI SDK server helpers and `useChat`/`useCompletion`
  clients. Built on Server-Sent Events (SSE) + JSON per part.
2_4_1_transport_layer: 'HTTP/1.1 200 OK

  Content-Type: text/event-stream

  x-vercel-ai-ui-message-stream: v1    # REQUIRED -- signals protocol version v1

  Cache-Control: no-cache

  Transfer-Encoding: chunked


  data: {"type":"start","messageId":"msg_abc123"}

  data: {"type":"text-start","id":"txt_1"}

  data: {"type":"text-delta","id":"txt_1","delta":"Hello"}

  data: {"type":"text-delta","id":"txt_1","delta":" world"}

  data: {"type":"text-end","id":"txt_1"}

  data: {"type":"finish"}

  data: [DONE]'
2_4_2_all_part_types: 'Message lifecycle:


  | Type | Fields | Description |

  |------|--------|-------------|

  | `start` | `messageId: string` | Opens a new message frame |

  | `finish` | (none) | Closes the message frame |

  | `abort` | `reason?: string` | Client-side abort notification |


  Text content (start/delta/end pattern):


  | Type | Fields | Description |

  |------|--------|-------------|

  | `text-start` | `id: string` | Opens a text block |

  | `text-delta` | `id: string`, `delta: string` | Appends text fragment |

  | `text-end` | `id: string` | Closes text block |


  Reasoning (models with extended thinking):


  | Type | Fields | Description |

  |------|--------|-------------|

  | `reasoning-start` | `id: string` | Opens reasoning block |

  | `reasoning-delta` | `id: string`, `delta: string` | Appends reasoning fragment |

  | `reasoning-end` | `id: string` | Closes reasoning block |


  Tool execution:


  | Type | Fields | Description |

  |------|--------|-------------|

  | `tool-input-start` | `toolCallId`, `toolName` | Opens tool input streaming |

  | `tool-input-delta` | `toolCallId`, `inputTextDelta: string` | Streams tool arg JSON fragment |

  | `tool-input-available` | `toolCallId`, `toolName`, `input: object` | Complete tool args ready |

  | `tool-output-available` | `toolCallId`, `output: unknown` | Tool execution result |


  Sources and media:


  | Type | Fields | Description |

  |------|--------|-------------|

  | `source-url` | `sourceId`, `url`, `title?`, `providerMetadata?` | URL citation |

  | `source-document` | `sourceId`, `mediaType`, `title?`, `data?` | Document citation |

  | `file` | `url`, `mediaType` | Generated file attachment |


  Custom data and control:


  | Type | Fields | Description |

  |------|--------|-------------|

  | `data-<suffix>` | `data: unknown`, `transient?: boolean` | App-defined; `transient=true` = not persisted to message history
  |

  | `error` | `errorText: string` | Error during generation |


  Step boundaries (agentic multi-step):


  | Type | Fields | Description |

  |------|--------|-------------|

  | `start-step` | `messageId?` | Opens an agent step |

  | `finish-step` | `messageId?`, `isContinued: boolean` | `isContinued=true` means more steps follow |'
2_4_3_server_side_emission: "// Next.js Route Handler\nexport async function POST(req: Request) {\n  const result = streamText({\n\
  \    model: openai(\"gpt-4o\"),\n    messages: await req.json(),\n  });\n  return result.toUIMessageStreamResponse({\n \
  \   sendReasoning: true,\n    sendSources: true,\n    headers: { \"X-Custom\": \"value\" },\n    onError: (err) => err.message,\
  \   // transform errors before sending\n  });\n}"
2_4_4_custom_data_parts: "// Server: write data parts alongside text\nconst response = createDataStreamResponse({\n  execute:\
  \ async (writer) => {\n    writer.writeData({ status: \"processing\" });          // -> data-* part\n    writer.writeMessageAnnotation({\
  \ hitRate: 0.87 });    // -> annotation on message\n    const result = await streamText({ model, prompt });\n    result.mergeIntoDataStream(writer);\n\
  \  },\n});\n\n// Client: receive via onData\nuseChat({\n  onData: (items) => items.forEach(i => console.log(i)),\n});\n\n\
  ---"
2_5_complete_usechat_api_v5_sdk_5_x: ''
2_5_1_parameters: '| Parameter | Type | Default | Description |

  |-----------|------|---------|-------------|

  | `api` | `string` | `"/api/chat"` | Endpoint URL |

  | `chat` | `Chat<UIMessage>` | -- | Reuse existing Chat instance |

  | `transport` | `ChatTransport` | DefaultChatTransport | Custom transport layer |

  | `id` | `string` | random UUID | Stable ID; same ID shares state across components |

  | `messages` | `UIMessage[]` | `[]` | Initial message history |

  | `messageMetadataSchema` | `FlexibleSchema` | -- | Validation schema for message.metadata |

  | `dataPartSchemas` | `UIDataTypesToSchemas` | -- | Schemas for data-* part validation |

  | `generateId` | `IdGenerator` | nanoid | Custom ID generator |

  | `credentials` | `RequestCredentials` | -- | Fetch credentials mode |

  | `headers` | `Record<string,string>` | -- | Extra request headers |

  | `body` | `object` | -- | Extra request body fields |

  | `fetch` | `FetchFunction` | global fetch | Custom fetch implementation |

  | `prepareSendMessagesRequest` | `(options) => RequestOptions` | -- | Customize request before send |

  | `prepareReconnectToStreamRequest` | `(options) => RequestOptions` | -- | Customize reconnect |

  | `onToolCall` | `async ({ toolCall }) => result` | -- | Client-side tool handler |

