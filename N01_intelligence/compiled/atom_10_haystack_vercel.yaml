  \ category labels |\n| TransformersZeroShotTextRouter | User-defined zero-shot category labels |\n\n#### 1.3.9 Joiners\n\
  \n| Component | Merges |\n|-----------|--------|\n| DocumentJoiner | Lists of Documents (with dedup + score merge) |\n|\
  \ BranchJoiner | Pipeline branches into single output |\n| AnswerJoiner | Multiple GeneratedAnswer lists |\n| StringJoiner\
  \ | Strings from different components |\n| ListJoiner | Generic lists into flat list |\n\n#### 1.3.10 Writers\n\n| Component\
  \ | Purpose |\n|-----------|---------|\n| DocumentWriter | Write Documents to any DocumentStore |\n\n#### 1.3.11 PromptBuilder\n\
  \n| Component | Purpose |\n|-----------|---------|\n| PromptBuilder | Jinja2 template rendering -> string prompt |\n| ChatPromptBuilder\
  \ | Jinja2 template rendering -> ChatMessage list |\n\nInput: template string + dynamic variables. Output: rendered prompt\
  \ string or messages.\nTemplates use `{{ variable }}` syntax with full Jinja2 (loops, conditionals, filters).\n\n#### 1.3.12\
  \ Document Stores\n\n| Store | Backend | BM25 | Embedding | Hybrid | Filtering |\n|-------|---------|------|-----------|--------|-----------|\n\
  | InMemoryDocumentStore | Python dicts | Yes | Yes | No | Yes |\n| ElasticsearchDocumentStore | Elasticsearch | Yes | Yes\
  \ | No | Yes |\n| OpenSearchDocumentStore | OpenSearch | Yes | Yes | Yes | Yes |\n| PgvectorDocumentStore | PostgreSQL +\
  \ pgvector | Yes | Yes | No | Yes |\n| ChromaDocumentStore | Chroma | No | Yes | No | Yes |\n| PineconeDocumentStore | Pinecone\
  \ (cloud) | No | Yes | No | Yes |\n| QdrantDocumentStore | Qdrant | No | Yes | Yes | Yes |\n| WeaviateDocumentStore | Weaviate\
  \ | Yes | Yes | Yes | Yes |\n| AzureAISearchDocumentStore | Azure AI Search | Yes | Yes | Yes | Yes |\n| MongoDBAtlasDocumentStore\
  \ | MongoDB Atlas | Yes | Yes | No | Yes |\n| AstraDocumentStore | DataStax Astra | No | Yes | No | Yes |\n| FAISSDocumentStore\
  \ | FAISS | No | Yes | No | No |\n| Neo4jDocumentStore | Neo4j | No | Yes | No | Yes |\n| MilvusDocumentStore | Milvus |\
  \ No | Yes | No | Yes |\n| ArcadeDBDocumentStore | ArcadeDB | No | Yes | No | Yes |\n| ValkeyDocumentStore | Valkey | No\
  \ | Yes | No | Yes |\n\n#### 1.3.13 Agent & Tools\n\n| Component | Purpose |\n|-----------|---------|\n| Agent | Iterative\
  \ tool-calling loop over a ChatGenerator |\n| Tool | Callable function with name, description, JSON schema params |\n| ComponentTool\
  \ | Wraps any Haystack Component as an Agent Tool |\n| MCPTool | Model Context Protocol tool integration |\n\nAgent constructor:\
  \ `Agent(chat_generator, tools, system_prompt, exit_conditions, state_schema, max_agent_steps, streaming_callback)`.\n\n\
  Agent loop: generate -> detect tool calls -> execute tools -> feed results back -> repeat until exit_condition met (\"text\"\
  \ response or named tool).\n\n---"
