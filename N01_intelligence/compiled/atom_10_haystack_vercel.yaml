  \ segmentation via HanLP |\n| CSVDocumentCleaner | Remove empty CSV rows/columns |\n| CSVDocumentSplitter | Split CSV by\
  \ empty row/column boundaries |\n| TextCleaner | Remove regex, punctuation, numbers; lowercase |\n\n#### 1.3.8 Routers\n\
