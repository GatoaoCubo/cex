  \ objects |\n| PDFToImageContent | PDF pages -> ImageContent objects |\n\n#### 1.3.7 Preprocessors\n\n| Component | Purpose\
  \ |\n|-----------|---------|\n| DocumentCleaner | Remove whitespace, empty lines, headers/footers, regex patterns |\n| DocumentSplitter\
