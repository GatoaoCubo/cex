5_key_insights_for_cex: ''
5_1_what_cex_can_learn_from_haystack:
- 'Typed component protocol: Haystack''s `@component` + typed `run()` is close to CEX''s kind system. Each component declares
  its I/O contract -- analogous to CEX ISOs declaring builder inputs/outputs.'
- 'Pipeline serialization: YAML-native serialization means pipelines are data, not code. CEX already uses YAML for schemas
  -- a Pipeline kind could serialize CEX workflows the same way.'
- 'Document Store abstraction: 16 backends behind one interface. CEX''s `rag_source` kind could adopt this pattern for storage-agnostic
  retrieval.'
- 'Retriever taxonomy: The BM25/embedding/hybrid/sparse split maps directly to CEX chunk_strategy and embedding_config kinds.
  Haystack proves the taxonomy is industry-standard.'
- 'Agent as component: Haystack''s Agent is just another pipeline component with a tool loop. This validates CEX''s decision
  to treat agents as composable artifacts, not special entities.'
5_2_what_cex_can_learn_from_vercel_ai_sdk:
- 'Streaming-first: Every function has a streaming variant. CEX''s output pipeline (P05) should assume streaming as default,
  not batch.'
- 'Schema-as-output-constraint: `generateObject` with Zod proves that structured output is a first-class concern. CEX''s `schema`
  kind should include output schemas, not just input validation.'
- 'Provider abstraction depth: LanguageModelV4 hides 30+ providers behind one interface. CEX''s `model_provider` kind + `fallback_chain`
  already does this -- Vercel validates the pattern.'
- 'Implicit agent loop: No Agent class needed -- just generateText + maxSteps. This is simpler than Haystack''s explicit Agent.
  CEX could offer both patterns.'
- 'UI message protocol: UIMessage with parts (text, tool-invocation, reasoning, source, file) is a rich output format. CEX''s
  `output_template` kind could adopt this part-based structure.'
