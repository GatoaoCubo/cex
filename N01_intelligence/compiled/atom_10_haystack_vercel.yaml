1_4_pipeline_serialization_format_yaml: Haystack pipelines are data, not code. `pipeline.dumps()` / `pipeline.loads()` round-trip
  through a canonical YAML schema. Every component must implement `to_dict()` / `from_dict()` for the pipeline serializer
  to reconstruct it.
1_4_1_schema_structure: "# Top-level fields\nmax_runs_per_component: 100          # int, default 100; caps loops\nmetadata:\
  \ {}                         # dict, arbitrary pipeline metadata\ncomponents:                          # dict of named component\
  \ definitions\n  <component_name>:\n    type: <fully.qualified.class>    # e.g. haystack.components.preprocessors.document_cleaner.DocumentCleaner\n\
  \    init_parameters:                 # dict of constructor args (primitives + nested objects)\n      <param>: <value>\n\
  connections:                         # list of typed edges\n  - sender: <comp_name>.<output>     # e.g. embedder.embedding\n\
  \    receiver: <comp_name>.<input>    # e.g. retriever.query_embedding"
1_4_2_serialization_api: 'from haystack import Pipeline


  # Serialize

  yaml_str: str = pipeline.dumps()            # -> YAML string

  pipeline.dump(file_obj)                     # -> write to file


  # Deserialize

  pipeline = Pipeline.loads(yaml_str)

  pipeline = Pipeline.load(file_obj)


  # Dict round-trip (lower-level)

  d: dict = pipeline.to_dict()

  pipeline = Pipeline.from_dict(d, callbacks=DeserializationCallbacks())


  `DeserializationCallbacks` allow patching components during reconstruction

  (e.g. injecting secrets, swapping implementations without changing YAML).'
1_4_3_full_serialized_pipeline_example_rag: "max_runs_per_component: 100\nmetadata:\n  name: basic-rag\n  description: Embedding\
  \ RAG pipeline\ncomponents:\n  text_embedder:\n    type: haystack_integrations.components.embedders.openai.text_embedder.OpenAITextEmbedder\n\
  \    init_parameters:\n      model: text-embedding-3-small\n      dimensions: 1536\n  retriever:\n    type: haystack_integrations.components.retrievers.pinecone.embedding_retriever.PineconeEmbeddingRetriever\n\
  \    init_parameters:\n      document_store:\n        type: haystack_integrations.document_stores.pinecone.document_store.PineconeDocumentStore\n\
  \        init_parameters:\n          index: my-index\n          namespace: \"\"\n          dimension: 1536\n          metric:\
  \ cosine\n      top_k: 5\n      filter_policy: replace\n  prompt_builder:\n    type: haystack.components.builders.prompt_builder.PromptBuilder\n\
  \    init_parameters:\n      template: |\n        Answer using the documents below.\n        Documents: {% for doc in documents\
  \ %}{{ doc.content }}{% endfor %}\n        Question: {{ question }}\n  llm:\n    type: haystack_integrations.components.generators.openai.chat.chat_generator.OpenAIChatGenerator\n\
  \    init_parameters:\n      model: gpt-4o-mini\n      generation_kwargs:\n        temperature: 0.1\n        max_tokens:\
  \ 512\nconnections:\n  - sender: text_embedder.embedding\n    receiver: retriever.query_embedding\n  - sender: retriever.documents\n\
  \    receiver: prompt_builder.documents\n  - sender: prompt_builder.prompt\n    receiver: llm.prompt"
1_4_4_component_to_dict_contract: "Any custom component MUST implement:\n\n@component\nclass MyComponent:\n    def to_dict(self)\
  \ -> dict:\n        return default_to_dict(self, param1=self.param1, param2=self.param2)\n\n    @classmethod\n    def from_dict(cls,\
  \ data: dict):\n        return default_from_dict(cls, data)\n\n`default_to_dict` injects `type` as the fully qualified class\
  \ name automatically."
1_4_5_asyncpipeline: '`AsyncPipeline` is a drop-in replacement that executes independent branches in parallel:


  from haystack import AsyncPipeline


  pipeline = AsyncPipeline()

  pipeline.add_component("embedder", embedder)

  pipeline.add_component("retriever", retriever)

  pipeline.connect("embedder.embedding", "retriever.query_embedding")

  result = await pipeline.run({"embedder": {"text": "query"}})


  Branches with no shared dependency run concurrently. Components with input dependencies

  wait for their upstream outputs before starting.


  ---'
1_5_retriever_config_params_all_28_implementations: "All retrievers share this interface pattern:\n- Constructor: receives\
  \ `document_store` (mandatory) + retrieval strategy params\n- run(): receives `query` or `query_embedding` (mandatory) +\
  \ `top_k`, `filters` (optional)\n- Output: `{\"documents\": List[Document]}`\n\n`filters` always uses Haystack logical filter\
  \ syntax:\n\nfilters = {\n  \"operator\": \"AND\",\n  \"conditions\": [\n    {\"field\": \"meta.lang\", \"operator\": \"\
  ==\", \"value\": \"en\"},\n    {\"field\": \"meta.score\", \"operator\": \">=\", \"value\": 0.8},\n  ]\n}\n\n`FilterPolicy`\
  \ enum: `FilterPolicy.REPLACE` (run() filters override constructor) or\n`FilterPolicy.MERGE` (run() filters AND-merged with\
  \ constructor filters)."
