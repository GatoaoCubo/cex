  \ |\n| JSONConverter | .json |\n| ImageFileToDocument | images |\n| MultiFileConverter | CSV, DOCX, HTML, JSON, MD, PPTX,\
  \ PDF, TXT, XLSX |\n| KreuzbergConverter | 91+ formats (Rust engine) |\n| AzureDocumentIntelligenceConverter | PDF, JPEG,\
  \ PNG, BMP, TIFF, DOCX, XLSX, PPTX, HTML |\n| AzureOCRDocumentConverter | Same as above (OCR variant) |\n| MistralOCRDocumentConverter\
