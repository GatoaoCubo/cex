tldr: aiox-core uses 4 severity levels (CRITICAL/HIGH/MEDIUM/LOW) with configurable block/warn/document behaviors per level.
  CEX quality_gate kind should extend from binary pass/fail to severity-aware.
1_severity_model: 'aiox-core defines 4 severity levels used consistently across 3 quality gate layers:


  | Severity | Pipeline Impact | Block behavior |

  |----------|----------------|---------------|

  | CRITICAL | Immediate halt | Always blocks -- no override |

  | HIGH | Escalates or blocks | Blocks if `blocking: true`, else needs review |

  | MEDIUM | Needs revision | Does not block by default -- informational |

  | LOW | Documentation only | Never blocks -- logged for trends |'
configurable_behavior_per_severity_quality_gate_config_yaml: "coderabbit:\n  blockOn:     [CRITICAL]      # these severities\
  \ halt the pipeline\n  warnOn:      [HIGH]          # these produce warnings but continue\n  documentOn:  [MEDIUM]     \
  \   # logged, no action\n  ignoreOn:    [LOW]           # discarded"
2_three_layer_quality_gate_architecture: ''
layer_1_pre_commit_layer1_precommit_js: "Fast, automated, fail-fast:\n\nlayer1:\n  enabled: true\n  failFast: true       \
  \    # stop on first failure\n  checks:\n    lint:\n      enabled: true\n      command: \"npm run lint\"\n      failOn:\
  \ \"error\"      # error | warning\n      timeout: 60000\n    test:\n      enabled: true\n      command: \"npm test\"\n\
  \      timeout: 300000\n      coverage:\n        minimum: 80        # percent\n    typecheck:\n      enabled: true\n   \
  \   command: \"npm run typecheck\"\n      timeout: 120000\n\nResult structure:\n{\n  check: \"lint\" | \"test\" | \"typecheck\"\
  ,\n  pass: boolean,\n  exitCode: number,\n  errors: number,\n  warnings: number,\n  coverage?: number,\n  duration: number,\n\
  \  message: string\n}"
layer_2_pr_automation_layer2_pr_automation_js: "AI-assisted review with severity parsing:\n\n// Severity parsing from CodeRabbit\
  \ output\nconst patterns = [\n  { regex: /\\bCRITICAL\\b[:\\s]+([^\\n]+)/gi, severity: 'CRITICAL' },\n  { regex: /\\bHIGH\\\
  b[:\\s]+([^\\n]+)/gi, severity: 'HIGH' },\n  { regex: /\\bMEDIUM\\b[:\\s]+([^\\n]+)/gi, severity: 'MEDIUM' },\n  { regex:\
  \ /\\bLOW\\b[:\\s]+([^\\n]+)/gi, severity: 'LOW' },\n];\n\nResult includes severity breakdown:\n{\n  check: \"coderabbit\"\
  ,\n  pass: boolean,           // !hasBlockingIssues\n  issues: {\n    critical: 0, high: 0, medium: 0, low: 0, total: 0\n\
  \  },\n  details: [{ severity, message }]\n}"
layer_3_human_review_layer3_human_review_js: "Severity determination logic:\ndetermineSeverity(result) {\n  if (result.check\
  \ === 'test') return 'CRITICAL';\n  if (result.check === 'lint') return 'HIGH';\n  if (result.check === 'typecheck') return\
  \ 'HIGH';\n  if (result.issues?.critical > 0) return 'CRITICAL';\n  if (result.issues?.high > 0) return 'HIGH';\n  return\
  \ 'MEDIUM';\n}"
3_gate_evaluator_gate_evaluator_js: "Alternative gate for epic transitions -- uses a verdict system:\n\nconst GateVerdict\
  \ = {\n  APPROVED: 'approved',            // all criteria met\n  NEEDS_REVISION: 'needs_revision', // return to previous\
  \ step\n  BLOCKED: 'blocked'               // critical issue, halt\n};\n\nVerdict determination logic:\n\n_determineVerdict(result,\
  \ gateConfig) {\n  // Strict mode: any failure = blocked\n  if (this.strictMode && result.issues.length > 0) return BLOCKED;\n\
  \n  // Critical issues always block\n  if (result.issues.filter(i => i.severity === 'critical').length > 0) return BLOCKED;\n\
  \n  // Score below minimum\n  if (gateConfig.minScore && result.score < gateConfig.minScore) {\n    return gateConfig.blocking\
  \ ? BLOCKED : NEEDS_REVISION;\n  }\n\n  // High severity issues\n  if (result.issues.filter(i => i.severity === 'high').length\
  \ > 0) {\n    return gateConfig.blocking ? BLOCKED : NEEDS_REVISION;\n  }\n\n  // Allow minor issues if configured\n  if\
  \ (gateConfig.allowMinorIssues &&\n      result.issues.every(i => i.severity === 'low' || i.severity === 'medium')) {\n\
  \    return APPROVED;\n  }\n\n  // Any remaining issues\n  if (result.issues.length > 0) return NEEDS_REVISION;\n\n  return\
  \ APPROVED;\n}"
4_cex_integration_plan: ''
current_state: "CEX `quality_gate` kind (P11) is binary pass/fail with numeric score:\n\n# P11_feedback/_schema.yaml\nquality_gate:\n\
  \  description: \"Barreira de qualidade (pass/fail com score)\"\n  machine_format: yaml\n  naming: p11_qg_{{gate}}.yaml\n\
  \  constraints:\n    max_bytes: 4096\n  llm_function: GOVERN\n\nCEX scoring is 3-layer (structural 30% + rubric 30% + semantic\
  \ 40%) with\na hard floor at 8.0 and target at 9.0. But all failures are equal --\na missing frontmatter field and a completely\
  \ wrong artifact get the same\n\"FAIL\" treatment."
proposed_severity_aware_quality_gates: "#### 4.1 Extend quality_gate schema\n\nAdd to `P11_feedback/_schema.yaml`:\n\nquality_gate:\n\
  \  constraints:\n    max_bytes: 4096\n    severity_values: [critical, high, medium, low]  # NEW\n    verdict_values: [approved,\
  \ needs_revision, blocked]  # NEW\n  frontmatter_required:\n    - id\n    - kind\n    - rules          # NEW: array of {check,\
  \ severity, threshold}\n    - verdict_mode   # NEW: strict | standard | lenient\n\n#### 4.2 Rule structure with severity\n\
  \n# Example: p11_qg_artifact_publish.yaml\nid: qg_artifact_publish\nkind: quality_gate\ntitle: \"Artifact publish gate\"\
  \nverdict_mode: standard\nrules:\n  - check: frontmatter_complete\n    severity: critical        # missing frontmatter =\
  \ blocked\n    threshold: 1.0\n  - check: structural_score\n    severity: high            # low structural = needs revision\n\
  \    threshold: 0.7\n  - check: density\n    severity: medium          # low density = warning, not blocking\n    threshold:\
  \ 0.85\n  - check: ascii_clean\n    severity: critical        # non-ASCII in code = blocked\n    threshold: 1.0\n  - check:\
  \ spelling\n    severity: low             # typos = documented, not blocking\n    threshold: 0.9\n\n#### 4.3 Verdict determination\
  \ for cex_score.py\n\ndef determine_verdict(results: list[dict], mode: str) -> str:\n    \"\"\"Map severity-tagged check\
  \ results to a verdict.\"\"\"\n    criticals = [r for r in results if r[\"severity\"] == \"critical\" and not r[\"pass\"\
  ]]\n    highs = [r for r in results if r[\"severity\"] == \"high\" and not r[\"pass\"]]\n    mediums = [r for r in results\
  \ if r[\"severity\"] == \"medium\" and not r[\"pass\"]]\n\n    if criticals:\n        return \"blocked\"  # always\n\n \
  \   if mode == \"strict\":\n        if highs or mediums:\n            return \"blocked\"\n\n    if highs:\n        return\
  \ \"needs_revision\"\n\n    if mode == \"lenient\":\n        return \"approved\"  # mediums and lows don't matter\n\n  \
  \  if mediums:\n        return \"needs_revision\"  # standard mode\n\n    return \"approved\"\n\n#### 4.4 Integration with\
  \ existing scoring\n\nCurrent flow:\ncex_score.py -> structural (30%) + rubric (30%) + semantic (40%) -> score -> pass/fail\
  \ at 8.0\n\nProposed flow:\ncex_score.py -> structural + rubric + semantic -> score\n            -> severity checks -> tagged\
  \ results\n            -> determine_verdict(results, mode) -> approved | needs_revision | blocked\n            -> if blocked:\
  \ reject\n            -> if needs_revision: warn + allow publish with flag\n            -> if approved: publish clean\n\n\
  This means artifacts can be published with warnings (e.g., \"density 0.82, below\n0.85 target, but no critical issues\"\
  ). Currently everything below 8.0 is rejected\nequally."
