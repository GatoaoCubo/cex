5_comparative_analysis: '| Dimension | aiox-core gates | CEX quality_gate (current) | Proposed CEX severity gates |

  |-----------|----------------|---------------------------|---------------------------|

  | Severity levels | 4 (CRITICAL/HIGH/MEDIUM/LOW) | None (binary pass/fail) | 4 (critical/high/medium/low) |

  | Verdict types | 3 (APPROVED/NEEDS_REVISION/BLOCKED) | 2 (pass/fail) | 3 (approved/needs_revision/blocked) |

  | Verdict modes | strict + configurable | Fixed 8.0 threshold | strict/standard/lenient |

  | Per-rule severity | Yes (blockOn/warnOn/documentOn) | No | Yes (per rule in YAML) |

  | Score integration | Separate from severity | Score IS the gate | Score + severity = verdict |

  | Layer architecture | 3 layers (precommit/PR/human) | 3 layers (structural/rubric/semantic) | Keep CEX''s 3 layers + add
  severity |

  | Persistence | `.aiox/qa-status.json` | Frontmatter `quality` field | Frontmatter + verdict field |'
what_not_to_port:
- 3-layer gate architecture -- CEX's 3-layer scoring (structural/rubric/semantic) is different from aiox's (precommit/PR/human)
  -- keep CEX's approach
- CodeRabbit integration -- external tool dependency, not needed
- Human review orchestration -- CEX uses peer review via cex_score.py, not PR-based
- Notification system -- CEX uses signals, not notifications
- 24h sign-off expiry -- CEX's quality is permanent once scored
