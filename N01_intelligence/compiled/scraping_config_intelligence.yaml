tldr: Scraping rules for N01 research -- rate limits, retry policy, content extraction priorities, and domain-specific selectors
  for firecrawl and fetch MCP servers.
density_score: 0.93
purpose: Configures web scraping behavior for N01's two extraction MCP servers (firecrawl and fetch). Without this config,
  scraping is unthrottled and unfocused -- producing noisy data that wastes context window budget. This config enforces rate
  limits, content priorities, and domain-specific extraction rules.
boundary: This artifact is a domain-specific configuration for N01's firecrawl and fetch MCP servers, defining rate limits,
  retry policies, and extraction rules. It is not a general-purpose web scraping tool, nor does it apply to other MCP implementations
  or external scraping frameworks.
