mcp_server_configs: ''
firecrawl_primary_scraper: '| Parameter | Value | Rationale | Impact |

  |------|---|-------|-------|

  | max_pages_per_domain | 10 | Prevents over-crawling; 10 pages captures site structure without exhausting rate limits |
  Limits resource consumption |

  | request_delay_ms | 1500 | 1.5s between requests -- respects robots.txt spirit, avoids IP blocks | Reduces server load
  |

  | timeout_ms | 15000 | 15s per page -- balances completeness vs pipeline speed | Ensures timely data flow |

  | max_retries | 2 | Retry on 429/503; 3rd failure = skip (don''t block pipeline) | Maintains pipeline continuity |

  | content_format | markdown | Structured extraction to markdown -- feeds directly into 8F pipeline | Ensures compatibility
  with downstream tools |

  | include_metadata | true | Capture title, description, publish_date for freshness validation | Enhances data provenance
  |

  | follow_links | false | Stay on target page -- link following is separate research step | Prevents scope creep |

  | extract_tables | true | Tables contain competitive data (pricing, features, specs) | Prioritizes high-value content |'
fetch_fallback_direct: '| Parameter | Value | Rationale | Impact |

  |------|---|-------|-------|

  | max_size_bytes | 5242880 | 5MB cap -- prevents memory issues on large PDFs | Controls resource allocation |

  | timeout_ms | 30000 | 30s for direct fetch (allows larger downloads) | Accommodates large files |

  | user_agent | CEX-Research/1.0 | Identify as research bot -- transparency | Improves server trust |

  | accept_types | text/html, application/pdf, text/markdown | Only content types N01 can process | Filters irrelevant data
  |

  | ignore_robots | true | Research exemption -- fetch is for specific URLs, not crawling | Enables targeted extraction |'
domain_specific_rules: '| Domain Pattern | Action | Selector/Rule | Example URL |

  |------|---|-------|-------|

  | `*.linkedin.com` | Skip | Anti-scraping; use manual research instead | linkedin.com/in/john-doe |

  | `*.github.com` | Fetch raw | Use raw.githubusercontent.com for file content | github.com/user/repo/README.md |

  | `*.arxiv.org` | Fetch PDF | Use /pdf/ URL variant for full papers | arxiv.org/pdf/1234.5678 |

  | `*.statista.com` | Extract tables | Focus on data tables, skip navigation | statista.com/statistics/123456/ |

  | `*.crunchbase.com` | Extract structured | Company profiles, funding rounds | crunchbase.com/organization/acme |

  | `*.g1.globo.com` | Extract article | Skip ads, comments, sidebars | g1.globo.com/politica/123456 |

  | `news.*` | Extract article | Use article-body selectors, skip chrome | news.example.com/article/123456 |'
content_extraction_priorities: '| Priority | Content Type | Rationale | Example |

  |------|---|-------|-------|

  | 1 | Data tables | Highest density (pricing, specs) | Statista pricing grid |

  | 2 | Headings + first paragraphs | Captures structure and key claims | Article title and intro |

  | 3 | Lists and bullet points | Compressed information, high density | Feature comparison lists |

  | 4 | Full paragraphs | Narrative content (lowest density) | Detailed methodology sections |'
rate_limit_recovery: '| HTTP Status | Action | Wait | Example Scenario |

  |--|---|---|---|

  | 429 (Too Many Requests) | Retry with exponential backoff | 3s, 9s, skip | Hitting LinkedIn''s rate limit |

  | 403 (Forbidden) | Log and skip domain | N/A | Blocked by GitHub''s robots.txt |

  | 503 (Service Unavailable) | Retry once | 5s | Temporary server outage on arXiv |

  | Timeout | Log as incomplete, continue pipeline | N/A | Failed fetch on large PDF |'
anti_patterns: '| Anti-Pattern | Reason | Alternative |

  |------|---|---|

  | Never scrape without a search context | Wastes budget | Use firecrawl after brave-search |

  | Never follow links by default | Explodes page count | Research each link as deliberate decision |

  | Never process >5MB files inline | Chunk large PDFs through markitdown | Use markitdown for preprocessing |'
validation: '| Command | Purpose | Expected Output |

  |------|---|---|

  | `npx firecrawl-mcp --health` | Verify firecrawl MCP is responsive | "ok" or "ready" |

  | `uvx mcp-server-fetch --health` | Verify fetch MCP is responsive | "ok" or "ready" |

  | `npx firecrawl-mcp scrape --url "https://example.com"` | Test extraction on known page | Markdown output with structured
  data |'
