tldr: Routes all tasks involving deep research, analysis, literature review, and competitor
  intelligence to the N01 nucleus.
scope: intelligence_and_research
keywords:
- research
- analysis
- competitor
- intelligence
- papers
- trends
- summarize
- benchmark
- RAG
- literature review
- market analysis
agent_node: n01_intelligence
priority: 9
confidence_threshold: 0.8
fallback: n04_knowledge
routing_strategy: semantic_match
purpose: This rule directs all complex analytical, research, and synthesis tasks to
  the N01 Intelligence Nucleus. As the designated specialist engine for deep analysis,
  N01 is powered by Gemini 2.5-pro and is optimized for understanding and synthesizing
  vast amounts of information from technical and academic sources.
keyword_rationale: 'The keywords are carefully selected to create a high-fidelity
  filter for N01''s core competencies. They cover the full spectrum of its capabilities:'
fallback_logic: If the N01 agent is unavailable, or if the initial query has a semantic
  match score below the confidence_threshold of 0.80, the task is automatically routed
  to the n04_knowledge nucleus. N04 is a generalist agent capable of providing broader,
  less specialized answers, ensuring that the user''s request is always handled, even
  if the specialist is not the best fit.
