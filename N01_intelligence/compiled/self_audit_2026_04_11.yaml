5a_tools_in_tools_i_would_actually_use: '| Tool | Use case | Honesty |

  |---|---|---|

  | `cex_retriever.py` | "Before writing a new competitive brief, TF-IDF similarity search across 2184 docs finds existing
  briefs I can cite or supersede." | Would use weekly. Core F3 INJECT. |

  | `cex_query.py` | "Map a vague research intent (`find pricing for X`) to kind + builder via TF-IDF over builder manifests."
  | Would use at F1. |

  | `cex_memory_select.py` | "F3 INJECT context assembly -- keyword + LLM-picked subset of past research for current brief."
  | Would use. Cuts context from 200KB to 20KB. |

  | `cex_feedback.py` | "Snapshot N01 quality distribution before/after a research sweep; detect regression." | Would use
  after every grid. |

  | `cex_retriever.py` (second use) | "Pre-mortem: before dispatching a new `knowledge_card`, check if 5+ similar cards exist
  = signal to refactor, not create." | Would use. Anti-duplication gate. |


  Honest exclusions: `cex_doctor.py` (audits builders not artifacts, irrelevant to N01''s own content), `cex_schema_hydrate.py`
  (for builders, not my domain), `cex_materialize.py` (N03 territory).'
5b_tools_that_don_t_exist_but_should: '| Tool | Purpose | Build owner |

  |---|---|---|

  | `cex_source_verify.py` | Crawl all URLs in `citation` / `knowledge_card` artifacts, verify live, archive to Wayback, flag
  dead links. Without this, every brief rots invisibly. Current state: zero URL staleness detection. | N05 |

  | `cex_evidence_graph.py` | Build evidence graph: claim -> source -> confidence. Detects orphan claims (no source) and source
  overuse (one paper cited 20 times = weak argument). Industry parallel: Connected Papers, Semantic Scholar citation graph.
  N01 has neither. | N05 |

  | `cex_competitor_diff.py` | Daily snapshot of competitor pages (pricing, docs, landing), diff, surface changes. Current
  state: every competitor brief starts from zero, no longitudinal signal. Industry parallel: Visualping, Distill.io. | N05
  |

  | `cex_benchmark_runner.py` | Run BEIR, MTEB, FinanceBench against current `retriever_config` / `embedding_config`. Output
  benchmark cards with industry-standard numbers. Current state: no reproducible retrieval benchmark exists. | N05 |

  | `cex_paper_ingest.py` | arXiv / Semantic Scholar / OpenReview API -> chunk -> embed -> `knowledge_card` draft. Current
  state: manual copy-paste. Would cut research intake time ~80%. | N05 |


  Alternatives considered:

  - Perplexity Deep Research API replaces all 5 of the above with one subscription but creates vendor lock.

  - Elicit replaces `cex_paper_ingest` + partial `cex_evidence_graph` but only for academic papers (no competitor intel).

  - Manual process = status quo = unacceptable.


  Best path: build `cex_source_verify`, `cex_competitor_diff`, `cex_paper_ingest` (highest leverage) in N05. Defer `cex_evidence_graph`
  and `cex_benchmark_runner` until after corpus reaches 500+ knowledge_cards.'
