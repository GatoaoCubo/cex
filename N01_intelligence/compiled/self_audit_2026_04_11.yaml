closing_note_to_n07: 'Strengths to preserve: knowledge_card health, benchmark discipline (intent_resolution), zero-below-floor
  record. Weaknesses to fix in next wave: RAG fiction (G01-G03), non-canonical kinds (Section 4a), agent_card mis-label (4b),
  split-brain duplicates (4c). Honest self-criticism: I have been writing research outputs (briefs) instead of research infrastructure
  (retrievers, indexes, benchmarks). Every brief is a one-shot essay, not a compounding knowledge asset. Versus Perplexity
  (live index) and STORM (auto-retrieved briefs), I am a static library. The next wave should prioritise G01-G04 + tool wishlist
  5b items 1-3 to shift from library to system. No speculation in this report -- every claim references a file path or command
  output.'
