2_rules_compliance: 'Source: `.claude/rules/n01-intelligence.md`. Score = how well current repo state honors each rule.


  | # | Rule | Evidence | Score | Notes |

  |---|---|---|---|---|

  | 1 | Role = Research/Intelligence | `agents/agent_intelligence.md`, `output/output_competitive_landscape.md` | 10 | Domain
  content dominant. |

  | 2 | CLI = Claude Code opus-4-6 1M | `agent_card_n01.md:9`, boot config | 10 | Config-correct. |

  | 3 | Domain = research, market, competitors, papers, benchmarks | `output/output_market_snapshot.md`, `output/output_swot_analysis.md`,
  `quality/p07_benchmark_research_quality.md` | 9 | All present except live paper ingestion. |

  | 4 | Artifacts in `N01_intelligence/` | 121 files, 65 source | 10 | Compliant. |

  | 5 | Deep research with large docs | `report_input_intent_resolution.md` (25KB, 16 sources) | 8 | Deep but single-shot,
  no re-query. |

  | 6 | Intelligence briefs, competitor analyses, trend reports | `output/output_executive_summary.md`, `output/output_trend_report.md`
  | 9 | All 3 formats exist. |

  | 7 | RAG over papers via `embedding_config` + `rag_source` | Both configs exist but no `retriever_config`, no `vector_store`,
  no `chunk_strategy` | 4 | ASPIRATIONAL ONLY. Configs without pipeline = cargo cult. |

  | 8 | 8F mandatory for every task | No existing artifact embeds an 8F trace | 5 | Enforced at dispatch time, not recorded
  in output. |

  | 9 | All artifacts have domain-specific content | Spot-checked 10, all on-domain | 9 | |

  | 10 | `quality: null` (never self-score) | 20 null, 43 scored 9.0-9.2 | 7 | Likely compliant (evolve/score sweep origin)
  but unverifiable from file alone. |

  | 11 | Compile after save | 56 `compiled/*.yaml` for 65 source files | 9 | ~86% compile ratio. 9 source files lack a compiled
  counterpart. |

  | 12 | Route AWAY from N03/N02/N05 | 3 `agent` artifacts + `quality_gate` + `dispatch_rule` live under N01 | 6 | Borderline.
  N01 owns its routing but 3 agents is overreach. |


  Aggregate: 96/120 = 8.0 compliance. Lowest scores on (7) RAG fiction, (8) 8F trace absence, (11) compile coverage gap.


  Versus alternatives: Rule 7 equivalent in LangChain RAG = functional chain; in LlamaIndex = queryable index persisted to
  disk. N01''s equivalent = two YAML configs. Gap is an order of magnitude.'
3_gaps_what_s_missing: '| # | Gap | Priority | Effort | Rationale |

  |---|---|---|---|---|

  | G01 | No `chunk_strategy` artifact | CRITICAL | 2h | RAG pipeline head. Without this, `rag_source` has nothing to feed.
  |

  | G02 | No `retriever_config` artifact | CRITICAL | 2h | Search layer. Industry parity: Elasticsearch config, Pinecone client.
  |

  | G03 | No `vector_store` artifact | CRITICAL | 2h | Storage layer. Without it, embeddings are RAM-only and lost per session.
  |

  | G04 | No `citation` kind instance (contract exists as `schema` kind) | CRITICAL | 3h | Research without formal citations
  = untraceable claims. `schemas/citation_format_contract.md` is the contract, not a citation instance. |

  | G05 | No `embedder_provider` artifact | NORMAL | 1h | `embedding_config` exists but provider layer is implicit. |

  | G06 | Zero live benchmarks vs BEIR / MTEB / FinanceBench | NORMAL | 6h | `benchmark` kind has 1 artifact (`p07_benchmark_research_quality.md`)
  but measures internal quality, not retrieval performance vs industry baselines. |

  | G07 | No `glossary_entry` artifacts for research terms (OSINT, SERP, PRISMA, BEIR, MTEB, RAG, HyDE) | NORMAL | 2h | 10
  entries. Directly consumable by N04. |

  | G08 | No `few_shot_example` artifact for research prompting | NORMAL | 2h | F3 INJECT quality improves with examples.
  |

  | G09 | No `red_team_eval` for adversarial source contamination | NORMAL | 3h | Prompt injection via scraped pages is the
  #1 research-stack attack vector. |

  | G10 | No `eval_dataset` for competitor-intelligence factuality (FEVER-style) | NORMAL | 4h | 50 cases. Required to benchmark
  Gap G06 meaningfully. |

  | G11 | No `entity_memory` for canonical company/product/person refs | LOW | 2h | Cross-brief entity linking. |

  | G12 | 15 artifacts on non-canonical kinds (see Section 4) | NORMAL | 3h | Breaks `kinds_meta.json` lookups, compile loses
  type info. |

  | G13 | Duplicate `rag_source_intelligence.md` and `embedding_config_intelligence.md` in two dirs with different content
  | NORMAL | 1h | Merge or delete. Currently readers get different answers. |

  | G14 | No `research_pipeline` orchestration running on a schedule (artifact exists, schedule does not) | LOW | 2h | `tools/research_pipeline_intelligence.md`
  is a spec, not a cron. |

  | G15 | No longitudinal competitor snapshots -- every brief starts from zero | LOW | owned by G06/cex_competitor_diff |
  See Section 5b. |


  Total critical: 4 gaps, ~9h. Total normal: 7 gaps, ~21h. Total low: 4 gaps, ~4h + tool build.'
