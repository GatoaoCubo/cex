tldr: 'Complete taxonomy of cognitive and research biases affecting intelligence analysis: 12 bias types with detection signatures,
  impact severity, and mitigation strategies. Grounds the bias_audit_n01 detection protocol.'
density_score: 0.92
definition: Research bias = systematic error in how information is sought, collected, analyzed, or presented. Distinct from
  random error (noise) because it consistently skews in one direction. Analytical Envy means KNOWING our blind spots so we
  can compensate for them.
bias_taxonomy_12_types: ''
category_1_source_biases: '| Bias | Definition | Detection Signature | Impact | Mitigation |

  |------|-----------|--------------------|---------|----|

  | Selection bias | systematically choosing sources that support a view | 80%+ sources are same type/origin | H | diversify
  source categories |

  | Availability bias | using easy-to-find data over best data | only first-page search results | M | run L2/L3 search layers
  |

  | Publication bias | peer-reviewed literature over-represents positive results | no null results in literature review |
  M | include preprints, grey literature |

  | Geographic bias | over-representing US/Western sources | < 5% non-English sources for global topic | M | explicitly search
  non-English sources |'
category_2_cognitive_biases: '| Bias | Definition | Detection Signature | Impact | Mitigation |

  |------|-----------|--------------------|---------|----|

  | Confirmation bias | seeking evidence that confirms hypothesis | > 80% evidence supports initial hypothesis | H | require
  counter-evidence in AP-06 |

  | Anchoring bias | over-relying on first piece of information | conclusion tracks closely with first source | M | read multiple
  sources before concluding |

  | Representativeness | judging by pattern-match to prototype | "X is like Y therefore X has Y''s properties" | M | demand
  independent evidence |

  | Recency bias | over-weighting recent information | > 70% sources from past 30 days | M | include historical baseline |'
category_3_analytical_biases: '| Bias | Definition | Detection Signature | Impact | Mitigation |

  |------|-----------|--------------------|---------|----|

  | Survivorship bias | analyzing only successful cases | no failure cases in sample | H | explicitly include failed cases
  |

  | Base rate neglect | ignoring prior probability | "X does Y, therefore X will win" without market priors | H | always state
  base rate |

  | Narrative bias | fitting data to a compelling story | data cherry-picked to fit narrative arc | H | challenge narrative
  with contradictory data |

  | Overconfidence | assigning too-high confidence to estimates | uncertainty not acknowledged | M | apply confidence calibration
  |'
bias_severity_definitions: '| Severity | Definition | P-value Analogy | N01 Action |

  |----------|-----------|----------------|-----------|

  | H (High) | bias likely changes the conclusion | < 0.05 | reject and redo |

  | M (Medium) | bias affects specific claims but not conclusion | 0.05-0.20 | add caveats |

  | L (Low) | bias affects peripheral details | > 0.20 | note and proceed |'
bias_detection_heuristics: 'Applied by bias_audit_n01.md (B1-B5 checks are a subset of this taxonomy):


  | Heuristic | Question | Positive = bias risk |

  |-----------|---------|---------------------|

  | Single category | "Are all sources the same type?" | yes |

  | Directional evidence | "Does evidence only support one direction?" | yes |

  | Temporal cluster | "Are all sources from the same time period?" | yes |

  | First-hit dependence | "Does the conclusion match the first search result?" | yes |

  | Missing competitor | "Is the obvious alternative not mentioned?" | yes |

  | Confidence mismatch | "Is confidence > 0.85 with < 3 sources?" | yes |

  | Prototype matching | "Is the reasoning ''X is like Y, therefore...''?" | yes |

  | Missing base rate | "Is a comparison made without establishing the baseline?" | yes |'
intelligence_community_bias_mitigations: '| Technique | Origin | Application |

  |-----------|--------|------------|

  | ACH (Analysis of Competing Hypotheses) | CIA | test all hypotheses against evidence |

  | Devil''s Advocate | IC standard | assign analyst to argue against conclusion |

  | Red Teaming | military | outsider challenges assumption set |

  | Team A / Team B | NSA | parallel teams with different instructions |

  | Structured Debate | DIA | formal pro/con argumentation |


  N01 automated approximation: AP-06 bias check + counter-argument requirement in AP-08.'
comparison_bias_mitigation_approaches: '| Approach | Bias Types Covered | Automation | N01 Fit |

  |----------|------------------|-----------|---------|

  | None (naive research) | 0/12 | N/A | fail |

  | Self-review | 3-5/12 | 0% | partial (blind spots) |

  | bias_audit_n01 (B1-B5) | 5/12 | 80% | good (covers highest impact) |

  | This taxonomy + audit | 12/12 | 60% | optimal |

  | Human red team | 12/12 | 0% | use for highest-stakes decisions |'
