technical_architecture: ''
comparison_crewai_vs_cex_vs_langgraph: '| Dimension | CrewAI | CEX | LangGraph |

  |-----------|--------|-----|-----------|

  | Composition unit | Agent (role+goal+backstory) | Nucleus (domain+sin+builder ISOs) | Node (stateful function) |

  | Orchestration | Crew (sequential/hierarchical) | N07 + mission_runner (wave-based) | Graph (DAG-based) |

  | State management | FlowState (Pydantic) | Git + .cex/runtime/ (file-based) | StateGraph (typed dict) |

  | Memory | Unified Memory (LanceDB) | 4-type file-based memory | External (none built-in) |

  | Knowledge | RAG (LanceDB + embedder) | Knowledge Cards + TF-IDF retriever | External (none built-in) |

  | Quality control | crewai test (score 1-10) | 3-layer scoring (structural+rubric+semantic) | None built-in |

  | Event system | 80+ typed events + A2A | File-based signals | Callbacks (basic) |

  | Config pattern | YAML + @CrewBase decorator | 8F pipeline + builder ISOs | Python code only |

  | Persistence | SQLiteFlowPersistence + LanceDB | Git + .cex/runtime/ | External |

  | Open source | Yes (Apache 2.0) | Yes (internal) | Yes (MIT) |

  | Cloud offering | AMP Cloud ($99/mo+) | N/A | LangSmith + LangGraph Cloud |


  ---'
glossary: 'A2A: Agent-to-Agent protocol for cross-service delegation AgentPlanner: Planning module activated by planning=True
  in Crew BaseEvent: Base class for all CrewAI events (fields: timestamp, type) BaseTool: Abstract class for tool creation
  CrewBase: Decorator base class for YAML-configured crews CrewOutput: Execution result (raw, pydantic, json_dict, tasks_output,
  token_usage) FlowState: Pydantic state object managed by Flow HumanFeedbackResult: Result of @human_feedback with .feedback
  and .output LanceDB: Vector database powering CrewAI unified memory MemoryScope: Subtree-restricted view of unified memory
  MemorySlice: Multi-branch read-across memory view Process: Enum -- Process.sequential or Process.hierarchical SQLiteFlowPersistence:
  Default state persistence for @persist decorator StorageBackend: Protocol for custom memory storage backends TaskOutput:
  Task execution result (raw, pydantic, json_dict, messages, output_format) and_(): Flow combinator -- fires when ALL listened
  methods complete or_(): Flow combinator -- fires when ANY listened method completes @human_feedback: Flow decorator for
  pausing and collecting human approval @listen(): Flow decorator -- fires when listened method completes @persist: Flow decorator
  for automatic state persistence across restarts @router(): Flow decorator for conditional branching based on return label
  @start(): Flow decorator marking entry point @tool: Decorator for function-based tool creation ---'
