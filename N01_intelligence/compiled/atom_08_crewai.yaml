a2a_events_29: "Delegation: A2ADelegationStartedEvent (endpoint, task_description, agent_id, context_id, turn_data), A2ADelegationCompletedEvent\
  \ (status, result, error), A2AParallelDelegationStartedEvent (endpoint_list), A2AParallelDelegationCompletedEvent (success_count,\
  \ failure_count).\n\nConversation: A2AConversationStartedEvent (agent_id, endpoint, context_id), A2AMessageSentEvent (message_content,\
  \ turn_number), A2AResponseReceivedEvent (response_content, status, final), A2AConversationCompletedEvent (final_status,\
  \ result, total_turns), A2AStreamingStartedEvent (task_id, context_id, endpoint), A2AStreamingChunkEvent (chunk_text, index,\
  \ final).\n\nPolling & Notifications: A2APollingStartedEvent (polling_interval), A2APollingStatusEvent (task_state, elapsed_time,\
  \ poll_count), A2APushNotificationRegisteredEvent (callback_url), A2APushNotificationReceivedEvent (state), A2APushNotificationSentEvent\
  \ (delivery_status, error), A2APushNotificationTimeoutEvent (timeout_duration).\n\nConnection & Auth: A2AAgentCardFetchedEvent\
  \ (agent_card_metadata, cached, fetch_time), A2AAuthenticationFailedEvent (auth_type, http_status), A2AConnectionErrorEvent\
  \ (error_type), A2ATransportNegotiatedEvent (protocol_details), A2AContentTypeNegotiatedEvent (input_modes, output_modes).\n\
  \nArtifacts & Tasks: A2AArtifactReceivedEvent (artifact_id, name, mime_type, size), A2AServerTaskStartedEvent (task_id,\
  \ context_id), A2AServerTaskCompletedEvent (result), A2AServerTaskCanceledEvent (task_id), A2AServerTaskFailedEvent (error).\n\
  \nContext Lifecycle: A2AContextCreatedEvent (context_id, timestamp), A2AContextExpiredEvent (age, task_count), A2AContextIdleEvent\
  \ (idle_duration), A2AContextCompletedEvent (total_tasks, duration), A2AContextPrunedEvent (task_count, age).\n\nEvent listener\
  \ registration:\n\nfrom crewai.utilities.events import crewai_event_bus\nfrom crewai.utilities.events.base_event_listener\
  \ import BaseEventListener\n\nclass MyListener(BaseEventListener):\n    def on_crew_kickoff_started(self, source, event):\
  \ ...\n    def on_tool_usage_finished(self, source, event): ...\n\ncrewai_event_bus.register(MyListener())\n\n---"
yaml_configuration_pattern_full_project_structure: "my_project/\n  src/my_project/\n    config/\n      agents.yaml\n     \
  \ tasks.yaml\n    crew.py\n    main.py\n  pyproject.toml\n\nagents.yaml + tasks.yaml + crew.py + variable injection:\n\n\
  @CrewBase\nclass LatestAiDevelopmentCrew:\n    agents_config = \"config/agents.yaml\"\n    tasks_config = \"config/tasks.yaml\"\
  \n\n    @agent\n    def researcher(self) -> Agent:\n        return Agent(config=self.agents_config[\"researcher\"], tools=[SerperDevTool()])\n\
  \n    @task\n    def research_task(self) -> Task:\n        return Task(config=self.tasks_config[\"research_task\"])\n\n\
  \    @crew\n    def crew(self) -> Crew:\n        return Crew(agents=self.agents, tasks=self.tasks, process=Process.sequential)\n\
  \n# Variable injection:\ncrew.kickoff(inputs={\"topic\": \"AI Agents\"})\n\n---"
