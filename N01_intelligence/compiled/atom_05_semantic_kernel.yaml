2_5_filters_middleware_pipeline: '| Term | Type | Description |

  |------|------|-------------|

  | `IFunctionInvocationFilter` | Interface (C#) | Runs on every `KernelFunction` invocation -- logging, caching, error handling.
  |

  | `IPromptRenderFilter` | Interface (C#) | Runs before prompt rendering -- PII redaction, semantic caching, prompt modification.
  |

  | `IAutoFunctionInvocationFilter` | Interface (C#) | Runs during automatic function calling -- early termination, iteration
  control. |

  | `FunctionInvocationContext` | Class | Context passed to function invocation filters. |

  | `PromptRenderContext` | Class | Context passed to prompt render filters. |

  | `AutoFunctionInvocationContext` | Class | Context for auto-function filters -- includes chat history, function list, iteration
  count. |

  | `FilterTypes` | Enum (Python) | `FUNCTION_INVOCATION`, `PROMPT_RENDERING`, `AUTO_FUNCTION_INVOCATION`. |

  | `context.Terminate` | Property | Set `true` to stop auto-function-calling loop. |

  | `context.IsStreaming` | Property | Indicates streaming vs. non-streaming invocation mode. |

  | `context.RenderedPrompt` | Property | The rendered prompt text (modifiable in prompt render filter). |

  | `kernel.add_filter()` | Method (Python) | Registers a filter function with the kernel. |

  | `@kernel.filter()` | Decorator (Python) | Decorator-based filter registration. |'
2_6_vector_store_connectors_memory: "| Term | Type | Description |\n|------|------|-------------|\n| `VectorStore` | Abstract\
  \ Class | Cross-collection operations: list names, get collections. |\n| `VectorStoreCollection<TKey, TRecord>` | Abstract\
  \ Class (C#) | Single collection: CRUD + vector search. Inherits `IVectorSearchable<TRecord>`. |\n| `IVectorSearchable<TRecord>`\
  \ | Interface (C#) | Vector search capability -- `SearchAsync()`. |\n| `VectorSearchBase` | Class (Python) | Base for vector\
  \ search with `VectorizedSearchMixin`, `VectorizableTextSearchMixin`. |\n| `VectorizedSearch<Record>` | Interface (Java)\
  \ | Vector search by embedding vector. |\n| `VectorizableTextSearch<Record>` | Interface (Java) | Vector search by text\
  \ (DB generates embedding). |\n| `VectorStoreField` | Annotation (Python) | Marks model fields as `'key'`, `'data'`, or\
  \ `'vector'`. |\n| `[VectorStoreKey]` | Attribute (C#) | Marks the key field. |\n| `[VectorStoreData]` | Attribute (C#)\
  \ | Marks a data field. Options: `IsIndexed`, `IsFullTextIndexed`. |\n| `[VectorStoreVector]` | Attribute (C#) | Marks a\
  \ vector field with `Dimensions`, `DistanceFunction`, `IndexKind`. |\n| `@VectorStoreRecordKey` | Annotation (Java) | Java\
  \ key field marker. |\n| `@VectorStoreRecordData` | Annotation (Java) | Java data field marker. |\n| `@VectorStoreRecordVector`\
  \ | Annotation (Java) | Java vector field marker. |\n| `@vectorstoremodel` | Decorator (Python) | Marks a dataclass as a\
  \ vector store model. |\n| `DistanceFunction` | Enum | `CosineSimilarity`, `DotProduct`, `EuclideanDistance`, etc. |\n|\
  \ `IndexKind` | Enum | `Hnsw`, `Flat`, `IvfFlat`, etc. |\n| `VectorStoreRecordDefinition` | Class | Alternative to annotations\
  \ for schema definition. |\n| `EnsureCollectionExistsAsync()` | Method | Creates collection if it does not exist. |\n| `Upsert`\
  \ / `Get` / `Delete` | Methods | Standard CRUD operations on records. |\n| `SearchAsync` | Method | Perform vector similarity\
  \ search. |\n| `create_search_function()` | Method (Python) | Creates a kernel function from a vector collection for RAG.\
  \ |\n\nOut-of-the-box connectors (status as of Apr 2026):\n\n| Connector | .NET Status | Python Status | Java Status | NuGet\
  \ Package | Key Type |\n|-----------|-------------|---------------|-------------|---------------|----------|\n| Azure AI\
  \ Search | GA | RC | Preview | `...Connectors.AzureAISearch` | `string` |\n| Azure Cosmos DB MongoDB | Preview | Preview\
  \ | -- | `...Connectors.AzureCosmosDBMongoDB` | `string` |\n| Azure Cosmos DB NoSQL | Preview | Preview | -- | `...Connectors.AzureCosmosDBNoSQL`\
  \ | `string` |\n| Chroma | Preview | Preview | -- | `...Connectors.Chroma` | `string` |\n| Elasticsearch | Preview | Preview\
  \ | -- | `...Connectors.Elasticsearch` | `string` |\n| Faiss | -- | Preview | -- | (Python only, in-process) | `int` |\n\
  | In-Memory / Volatile | Preview | RC | -- | `...Connectors.InMemory` | any |\n| Milvus | Preview | Preview | -- | `...Connectors.Milvus`\
  \ | `string` |\n| MongoDB Atlas | Preview | Preview | -- | `...Connectors.MongoDB` | `string` |\n| Pinecone | Preview |\
  \ Preview | -- | `...Connectors.Pinecone` | `string` |\n| Postgres + pgvector | Preview | RC | -- | `...Connectors.Postgres`\
  \ | `string`/`long` |\n| Qdrant | Preview | RC | -- | `...Connectors.Qdrant` | `Guid`/`ulong` |\n| Redis | Preview | Preview\
  \ | -- | `...Connectors.Redis` | `string` |\n| SQL Server | Preview | -- | -- | `...Connectors.SqlServer` | `string` |\n\
  | SQLite | Preview | Preview | -- | `...Connectors.Sqlite` | `string` |\n| Weaviate | Preview | Preview | -- | `...Connectors.Weaviate`\
  \ | `Guid` |\n| JDBC MySQL | -- | -- | Preview | `semantickernel-data-jdbc` | `string` |\n| JDBC PostgreSQL | -- | -- |\
  \ Preview | `semantickernel-data-jdbc` | `string` |\n\nAll package names are prefixed `Microsoft.SemanticKernel` and require\
  \ `--prerelease` flag except Azure AI Search.\n\nConnection pattern -- C# (Qdrant example):\n\n// Via VectorStore abstraction\n\
  var vectorStore = new QdrantVectorStore(new QdrantClient(\"localhost\"), ownsClient: true);\nvar collection = vectorStore.GetCollection<ulong,\
  \ Hotel>(\"skhotels\");\nawait collection.EnsureCollectionExistsAsync();\n\n// Via Kernel DI (recommended for app integration)\n\
  builder.Services.AddQdrantVectorStore(\"localhost\");\n\nConnection pattern -- Python (collection-first):\n\nfrom semantic_kernel.connectors.qdrant\
  \ import QdrantCollection\n\ncollection = QdrantCollectionstr, Hotel\nawait collection.ensure_collection_exists()\n\nData\
  \ model annotation schema -- field-level config:\n\n| C# Attribute | Python VectorStoreField arg | Description |\n|---|---|---|\n\
  | `[VectorStoreKey]` | `VectorStoreField('key')` | Primary key |\n| `[VectorStoreData(IsIndexed = true)]` | `VectorStoreField('data',\
  \ is_filterable=True)` | Filterable data |\n| `[VectorStoreData(IsFullTextIndexed = true)]` | `VectorStoreField('data',\
  \ is_full_text_searchable=True)` | Full-text indexed |\n| `[VectorStoreVector(Dimensions: N, DistanceFunction = X, IndexKind\
  \ = Y)]` | `VectorStoreField('vector', dimensions=N, distance_function=X, index_kind=Y)` | Vector field |\n\nDistanceFunction\
  \ values: `CosineSimilarity`, `DotProduct`, `EuclideanDistance`, `ManhattanDistance`, `HammingDistance`\n\nIndexKind values:\
  \ `Hnsw`, `Flat`, `IvfFlat`, `DiskAnn`, `QuantizedFlat`\n\nSchema-without-annotations alternative (VectorStoreRecordDefinition\
  \ -- C#):\n\nvar definition = new VectorStoreRecordDefinition\n{\n    Properties = new List<VectorStoreRecordProperty>\n\
  \    {\n        new VectorStoreRecordKeyProperty(\"HotelId\", typeof(ulong)),\n        new VectorStoreRecordDataProperty(\"\
  HotelName\", typeof(string)) { IsIndexed = true },\n        new VectorStoreRecordVectorProperty(\"DescriptionEmbedding\"\
  , typeof(ReadOnlyMemory<float>))\n            { Dimensions = 1536, DistanceFunction = DistanceFunction.CosineSimilarity,\
  \ IndexKind = IndexKind.Hnsw }\n    }\n};\nvar collection = vectorStore.GetCollection<ulong, Hotel>(\"skhotels\", definition);\n\
  \nRAG via create_search_function (Python):\n\ncollection.create_search_function(\n    function_name=\"hotel_search\",\n\
  \    description=\"Search hotels by description\",\n    search_type=\"vector\",           # or \"keyword_hybrid\"\n    parameters=[...],\
  \               # KernelParameterMetadata list\n    string_mapper=lambda x: f\"{x.record.hotel_name}: {x.record.description}\"\
  ,\n)\n# Registers the function directly on the kernel for LLM function calling\nkernel.add_plugin(collection, plugin_name=\"\
  memory\")\n\nLegacy memory stores (deprecated, replaced by Vector Store abstraction):\n`IMemoryStore`, `MemoryRecord`, `ISemanticTextMemory`\
  \ -- superseded by `VectorStore` + `VectorStoreCollection`."
2_7_enterprise_readiness: '| Term | Description |

  |------|-------------|

  | Telemetry | OpenTelemetry integration for distributed tracing. |

  | Hooks | Legacy event-based extensibility (replaced by Filters). |

  | Filters | Primary middleware pipeline for security, logging, responsible AI. |

  | Responsible AI | PII detection/redaction, content safety, prompt injection protection. |

  | Semantic Caching | Cache LLM responses by semantic similarity using filters + vector stores. |'
2_8_mcp_integration_bidirectional_bridge: "SK is a bidirectional MCP bridge: it can act as an MCP host (consuming MCP servers\
  \ as plugins) and as an MCP server (exposing SK functions to any MCP client).\n\n#### Direction 1: MCP Server -> SK Plugin\
  \ (Consuming MCP)\n\n| Term | Type | Description |\n|------|------|-------------|\n| `MCPStdioPlugin` | Class (Python) |\
  \ Connects to a local MCP server via subprocess stdio transport. |\n| `MCPSsePlugin` | Class (Python) | Connects to a remote\
  \ MCP server via SSE over HTTPS. |\n| `MCPStreamableHttpPlugin` | Class (Python) | Connects via HTTP streaming (newer MCP\
  \ transport). |\n| `load_tools` | Option (bool) | Load tools from MCP server on connect (default: True). |\n| `load_prompts`\
  \ | Option (bool) | Load prompt templates from MCP server (default: True). |\n| `request_timeout` | Option (float) | Per-request\
  \ timeout in seconds for MCP calls. |\n\nPython -- import a local MCP server (stdio):\n\nfrom semantic_kernel.connectors.mcp\
  \ import MCPStdioPlugin\n\n# pip install semantic-kernel[mcp]\nasync with MCPStdioPlugin(\n    name=\"Github\",\n    description=\"\
  Github Plugin\",\n    command=\"docker\",\n    args=[\"run\", \"-i\", \"--rm\", \"-e\", \"GITHUB_PERSONAL_ACCESS_TOKEN\"\
  ,\n          \"ghcr.io/github/github-mcp-server\"],\n    env={\"GITHUB_PERSONAL_ACCESS_TOKEN\": \"...\"},\n) as github_plugin:\n\
  \    kernel.add_plugin(github_plugin)\n\nPython -- import a remote MCP server (SSE):\n\nfrom semantic_kernel.connectors.mcp\
  \ import MCPSsePlugin\n\nasync with MCPSsePlugin(\n    name=\"RemoteTools\",\n    description=\"Remote MCP Tools\",\n  \
  \  url=\"http://localhost:8080\",\n    load_prompts=False,     # skip if server has no prompts\n    request_timeout=30.0,\n\
  ) as remote_plugin:\n    kernel.add_plugin(remote_plugin)\n\n#### Direction 2: SK -> MCP Server (Exposing SK)\n\n| Term\
  \ | Type | Description |\n|------|------|-------------|\n| `.AddMcpServer()` | Extension (C#) | Registers SK functions as\
  \ MCP tools in ASP.NET DI. |\n| `.WithStdioServerTransport()` | Extension (C#) | Adds stdio transport (for Claude Desktop\
  \ / local MCP clients). |\n| `.WithTools(kernel)` | Extension (C#) | Exposes all kernel plugin functions as MCP tools. |\n\
  | `kernel.as_mcp_server()` | Method (Python) | Returns an MCP server instance exposing kernel functions. |\n\nC# -- expose\
  \ SK plugins as MCP server:\n\n// Register SK plugin\nkernelBuilder.Plugins.AddFromType<DateTimeUtils>();\nKernel kernel\
  \ = kernelBuilder.Build();\n\n// Build MCP server\nvar builder = Host.CreateEmptyApplicationBuilder(settings: null);\nbuilder.Services\n\
  \    .AddMcpServer()\n    .WithStdioServerTransport()  // or .WithHttpTransport() for SSE\n    .WithTools(kernel);     \
  \      // all KernelFunctions become MCP Tools\n\nawait builder.Build().RunAsync();\n\nMCP Tool Schema Auto-generation:\
  \ `[KernelFunction]` + `[Description]` attributes are automatically converted to MCP Tool JSON Schema, enabling seamless\
  \ discovery by any MCP host (Claude Desktop, Cursor, VS Code).\n\nSupported MCP transports: `stdio` (local processes), `SSE`\
  \ (HTTP server-sent events), `StreamableHttp` (newer streaming HTTP).\n\n---"
