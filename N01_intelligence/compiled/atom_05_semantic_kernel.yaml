5_process_framework_full_api_reference: 'Status: Experimental as of Apr 2026. GA targeted Q2 2026. Subject to breaking changes.'
5_1_core_concepts: '| Term | Type | Description |

  |------|------|-------------|

  | Process | Concept | A structured sequence of steps achieving a specific business goal. |

  | Step | Concept | An activity with defined inputs/outputs. Must contain at least one `KernelFunction`. |

  | Pattern | Concept | Sequence type: sequential, parallel, fan-in/fan-out, map-reduce. |

  | Event | Concept | Triggers transitions between steps. Steps emit events; other steps listen for them. |

  | State | Concept | Stateful steps persist data across invocations (checkpoint/restore). |'
5_2_type_registry: '| Term | Type | Description |

  |------|------|-------------|

  | `KernelProcess` | Class | The built process object ready for execution. |

  | `KernelProcessStep` | Class | Base for stateless steps. Subclass this and add `[KernelFunction]` methods. |

  | `KernelProcessStep<TState>` | Generic Class (C#) | Base for stateful steps with typed state `TState`. |

  | `KernelProcessStep[TState]` | Generic Class (Python) | Python stateful step base. |

  | `KernelProcessStepState<TState>` | Class | Carries the persistent state into/out of `ActivateAsync`. |

  | `KernelProcessStepContext` | Class | Injected into KernelFunctions -- allows manual event emission. |

  | `ProcessBuilder` | Class | Fluent API for wiring steps and events. |

  | `KernelProcessEvent` | Class | Event message with `Id` (string) and `Data` (any serializable object). |'
5_3_processbuilder_api: '| Method | Signature | Description |

  |--------|-----------|-------------|

  | `AddStepFromType<T>` (C#) | `-> ProcessStepBuilder` | Registers a step type; returns a builder handle. |

  | `add_step` (Python) | `add_step(StepClass) -> ProcessStepBuilder` | Registers a step type. |

  | `OnInputEvent` (C#) | `OnInputEvent(string id) -> ProcessStepEdgeBuilder` | Routes external events by ID into the process.
  |

  | `on_input_event` (Python) | `on_input_event(id) -> ProcessStepEdgeBuilder` | Python equivalent. |

  | `Build` / `build` | `-> KernelProcess` | Compiles the wired process into a runnable artifact. |'
5_4_step_edge_builder_event_routing: '| Method | Description |

  |--------|-------------|

  | `SendEventTo(target)` / `send_event_to(target)` | Routes event data to a target step. |

  | `OnFunctionResult()` / `on_function_result()` | Fires when a KernelFunction returns (captures return value). |

  | `OnEvent(eventId)` / `on_event(eventId)` | Fires when a step manually emits a named event. |

  | `function_name=` | Disambiguate target function when step has multiple KernelFunctions. |

  | `parameter_name=` | Disambiguate target parameter when function has multiple inputs. |'
5_5_step_state_management: "Steps can be stateless (`KernelProcessStep`) or stateful (`KernelProcessStep<TState>`):\n\n//\
  \ C# -- stateful step with persisted ChatHistory\npublic class GenerateDocumentationStep : KernelProcessStep<DocumentationState>\n\
  {\n    private DocumentationState _state = new();\n\n    // Called on step activation -- restore persisted state\n    override\
  \ public ValueTask ActivateAsync(KernelProcessStepState<DocumentationState> state)\n    {\n        this._state = state.State!;\n\
  \        this._state.ChatHistory ??= new ChatHistory(systemPrompt);\n        return base.ActivateAsync(state);\n    }\n\n\
  \    [KernelFunction]\n    public async Task GenerateDocumentationAsync(\n        Kernel kernel,\n        KernelProcessStepContext\
  \ context,   // injected -- enables EmitEventAsync\n        string productInfo)\n    {\n        this._state.ChatHistory!.AddUserMessage(productInfo);\n\
  \        var response = await kernel.GetRequiredService<IChatCompletionService>()\n            .GetChatMessageContentAsync(this._state.ChatHistory!);\n\
  \        await context.EmitEventAsync(\"DocumentationGenerated\", response.Content);\n    }\n}\n\n# Python -- stateful step\
  \ with pydantic model\nclass DocumentationState(BaseModel):\n    chat_history: ChatHistory | None = None\n\nclass GenerateDocumentationStep(KernelProcessStep[DocumentationState]):\n\
  \    state: DocumentationState = Field(default_factory=DocumentationState)\n\n    async def activate(self, state: KernelProcessStepState[DocumentationState]):\n\
  \        self.state = state.state\n        if self.state.chat_history is None:\n            self.state.chat_history = ChatHistory(system_message=system_prompt)\n\
  \n    @kernel_function\n    async def generate_documentation(\n        self,\n        context: KernelProcessStepContext,\
  \   # injected\n        product_info: str,\n        kernel: Kernel                       # injected\n    ) -> None:\n  \
  \      self.state.chat_history.add_user_message(product_info)\n        response = await chat_service.get_chat_message_content(...)\n\
  \        await context.emit_event(process_event=\"documentation_generated\", data=str(response))"
5_6_process_execution: "C# (StartAsync):\n\nvar process = processBuilder.Build();\nawait process.StartAsync(\n    kernel,\n\
  \    new KernelProcessEvent { Id = \"Start\", Data = \"Product Name\" }\n);\n\nPython (async context manager):\n\nfrom semantic_kernel.processes.local_runtime\
  \ import KernelProcessEvent, start\n\nasync with await start(\n    process=kernel_process,\n    kernel=kernel,\n    initial_event=KernelProcessEvent(id=\"\
  Start\", data=\"Product Name\"),\n) as process_context:\n    final_state = await process_context.get_state()"
5_7_supported_execution_patterns: '| Pattern | Description |

  |---------|-------------|

  | Sequential | A -> B -> C (default; OnFunctionResult chain) |

  | Parallel / Fan-Out | A -> [B, C, D] simultaneously (SendEventTo multiple targets) |

  | Fan-In | [B, C, D] -> E (step waits for all upstream events) |

  | Map-Reduce | Distribute over collection, aggregate results |

  | Conditional | Step emits different events based on logic (OnEvent discrimination) |

  | Loop / Retry | Step emits event back to itself or to an upstream step |

  | Human-in-the-Loop | Process pauses; external event resumes it |'
