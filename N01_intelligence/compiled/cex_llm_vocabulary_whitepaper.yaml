title: 'CEX Typed Knowledge System: A Comprehensive Vocabulary Reference'
author: N01 Intelligence Nucleus
date: '2026-04-05'
version: '1.2'
1_introduction: The CEX (Converged Ecosystem eXchange) typed knowledge system represents a unified framework for categorizing
  and standardizing terminology across AI, machine learning, and autonomous agent domains. This document synthesizes 68 source
  categories—spanning protocols, frameworks, academic surveys, and industry glossaries—into a coherent vocabulary of ~2,390
  unique terms. The goal is to create a reference that supports cross-platform interoperability, research alignment, and system
  design. ---
2_universal_converged_terms: ''
2_1_core_vocabulary: '| Term | Definition | Source Category |

  |------|------------|-----------------|

  | Autonomous Agent | Self-directed entity capable of perception, decision-making, and action | Academic Surveys |

  | ReAct | Reasoning-Acting framework for agent decision-making | Academic Surveys |

  | RAG | Retrieval-Augmented Generation for knowledge integration | Academic Surveys |

  | LLM-as-a-Judge | Evaluation methodology using large language models | Vendor Glossaries |

  | Aegis 2.0 | AI safety and governance framework | Standards & Ontologies |'
2_2_cross_domain_mapping: '- Memory Mechanisms: Covers agentic memory, human-AI memory parallels, and multi-agent memory protocols
  (see Appendix 22).

  - Skill Ontologies: Agent skills for LLMs, including coding, reasoning, and domain-specific capabilities (see arXiv:2602.12430).

  - Safety Protocols: Aligns with NIST AI RMF 1.0 and OWASP LLM Top 10 (2025).


  ---'
3_ecosystem_mapping: ''
3_1_framework_documentation: '| Framework | Key Concepts | CEX Mapping |

  |----------|--------------|-------------|

  | HuggingFace SmolAgents | Lightweight agent SDKs | CEX Kind: `smolagent` |

  | Anthropic Claude | Browser and code interaction APIs | CEX Kind: `cognitive_interface` |

  | OpenHands | Open-source code agent platform | CEX Kind: `code_agent` |'
3_2_academic_insights:
- 'Chain-of-Thought (CoT): Yao et al. (2023) formalized reasoning frameworks for LLMs.'
- 'Tree-of-Thoughts (ToT): Yao et al. (2023) introduced hierarchical reasoning for complex tasks.'
- 'Agent Skills: Liu et al. (2026) proposed skill ontologies for LLM autonomy.'
3_3_industry_standards: '- NIST AI 100-3: Defines risk management for AI systems.

  - W3C ML Schema: Standardizes machine learning data formats.

  - MLCommons Croissant: Ontology for dataset description.


  ---'
4_cex_kind_coverage: ''
4_1_fully_covered_terms:
- 'Voice Agents: Mapped to `voice_s2s` (OpenAI Realtime API) and `voice_agent` (Gemini Live).'
- 'Code Agents: Covered by `code_agent` (OpenHands) and `cognitive_interface` (Anthropic).'
4_2_partially_covered_terms:
- 'Browser Automation: Mapped to subfields of `cognitive_interface` (e.g., `browser_agent`).'
- 'Safety Protocols: Aligned with `aegis` but not yet a first-class kind.'
4_3_proposed_new_kinds: '| Proposed Kind | Description |

  |--------------|-------------|

  | `skill_ontology` | Formalized agent skill hierarchies |

  | `multi_agent_protocol` | Standardized communication between agents |

  | `llm_as_judge` | Evaluation framework using LLMs |


  ---'
