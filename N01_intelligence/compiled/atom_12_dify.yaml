  \    inputs={\"key\": \"value\"},\n    query=\"user question\",\n    response_mode=\"blocking\",    # or \"streaming\"\n\
  \    conversation_id=None         # None = new conversation\n)\n\n# Workflow\nresult = self.session.app.workflow.invoke(\n\
