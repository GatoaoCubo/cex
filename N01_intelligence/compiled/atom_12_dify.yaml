15_4_persistent_storage_session_storage: "# Set (value must be bytes)\nself.session.storage.set(\"cache_key\", json.dumps(data).encode(\"\
  utf-8\"))\n\n# Get (returns bytes or None)\nraw = self.session.storage.get(\"cache_key\")\nif raw:\n    data = json.loads(raw.decode(\"\
  utf-8\"))\n\n# Delete\nself.session.storage.delete(\"cache_key\")\n\nConstraints:\n- Values must be `bytes`; encode strings\
  \ via `.encode(\"utf-8\")`\n- Scope: workspace-level (shared across plugin instances in same workspace)\n- Size limit: declared\
  \ via `resource.permission.storage.size` in manifest (int64 bytes)\n- No TTL -- data persists until explicitly deleted\n\
  \n---"
16_agent_strategy_plugin_schema: ''
16_1_strategy_yaml_structure: "identity:\n  author: langgenius\n  name: function_calling\n  label:\n    en_US: Function Calling\n\
  \  description:\n    en_US: \"Tool-native FC strategy for models with native function calling support\"\n  icon: icon.svg\n\
  parameters:\n  - name: model\n    type: model-selector\n    scope: tool-call&llm         # restricts to FC-capable models\n\
  \    required: true\n    label:\n      en_US: Model\n  - name: tools\n    type: array[tools]\n    required: true\n    label:\n\
  \      en_US: Tools\n  - name: query\n    type: string\n    required: true\n    label:\n      en_US: Query\n  - name: max_iterations\n\
  \    type: number\n    required: false\n    default: 5\n    min: 1\n    max: 50\n    label:\n      en_US: Max Iterations\n\
  features:\n  - history-messages             # injects conversation history into context\noutput_schema:\n  type: object\n\
  \  properties:\n    text:\n      type: string\n    files:\n      type: array\nhas_runtime_parameters: false\nextra:\n  python:\n\
  \    source: strategies/function_calling.py"
16_2_strategy_implementation: "from collections.abc import Generator\nfrom dify_plugin import AgentStrategy\nfrom dify_plugin.entities.agent\
  \ import AgentInvokeMessage, LogMessageStatus\n\nclass FunctionCallingStrategy(AgentStrategy):\n    def _invoke(self, parameters:\
  \ dict) -> Generator[AgentInvokeMessage]:\n        query = parameters[\"query\"]\n        model_config = parameters[\"model\"\
  ]\n        tools = parameters[\"tools\"]\n        max_iterations = parameters.get(\"max_iterations\", 5)\n        history\
  \ = parameters.get(\"history\", [])  # from history-messages feature\n\n        messages = self._build_messages(query, history)\n\
  \n        for iteration in range(max_iterations):\n            log = self.create_log_message(\n                label=f\"\
  Iteration {iteration + 1}\",\n                data={\"iteration\": iteration},\n                status=LogMessageStatus.START\n\
  \            )\n            yield log\n\n            response = self.session.model.llm.invoke(\n                model_config=model_config,\n\
  \                prompt_messages=messages,\n                tools=tools,\n                stream=False\n            )\n\n\
  \            if response.message.tool_calls:\n                for tc in response.message.tool_calls:\n                 \
  \   yield self.finish_log_message(log, status=LogMessageStatus.SUCCESS)\n                    # invoke tool and add observation\
  \ to messages\n                    tool_result = self.session.tool.invoke_builtin_tool(\n                        provider=tc.function.name,\n\
  \                        tool_name=tc.function.name,\n                        parameters=tc.function.arguments\n       \
  \             )\n                    messages.append(AssistantPromptMessage(tool_calls=[tc]))\n                    messages.append(ToolPromptMessage(content=str(tool_result)))\n\
  \            else:\n                yield self.finish_log_message(log, status=LogMessageStatus.SUCCESS)\n              \
  \  yield self.create_text_message(response.message.content)\n                return\n\n        yield self.create_text_message(\"\
  Max iterations reached.\")"
16_3_agentinvokemessage_types: '| Type | Factory method | Purpose |

  |------|---------------|---------|

  | TextMessage | `create_text_message(text)` | Final answer text |

  | LogMessage | `create_log_message(label, data, status)` | UI tree visualization node |

  | ToolInvokeMessage | from `session.tool.*` calls | Tool result passthrough |


  LogMessageStatus values: `START`, `SUCCESS`, `ERROR`, `STOP`


  ---'
17_mcp_two_way_support_v1_6_0: ''
17_1_architecture_overview: "Dify supports bidirectional MCP since v1.6.0 (2025):\n\n[External MCP Client]              [Dify]\
  \                [External MCP Server]\n  Claude Desktop  <--MCP Server--  Dify Workflow/Chat\n  Cursor          <--MCP\
  \ Server--  Dify Workflow/Chat\n                                   Dify Tools >---MCP Client-->  Linear\n              \
  \                                 >---MCP Client-->  Notion\n                                               >---MCP Client-->\
  \  Zapier (8000+ apps)\n                                               >---MCP Client-->  Composio"
17_2_dify_as_mcp_server_publishing_workflows: 'Configuration steps:

  1. Open app > Publish > MCP Server

  2. Enable the module (off by default)

  3. Set endpoint name and describe input parameters in JSON schema

  4. Dify issues unique server URL containing embedded auth token

  5. Treat URL as an API key -- regenerate button invalidates previous URL


  Client integration:


  | Client | Config method |

  |--------|--------------|

  | Claude Desktop | Profile > Settings > Integrations > Add > paste server URL |

  | Cursor | `.cursor/mcp.json` with `{ "mcpServers": { "name": { "url": "..." } } }` |

  | Any MCP client | HTTP SSE or StreamableHTTP transport with server URL |


  Supported app types: Both Workflow and Chatflow apps

  Protocol version: `2025-03-26`

  Best practices: Specific parameter descriptions improve AI invocation quality; split complex workflows for lower latency'
17_3_dify_as_mcp_client_consuming_external_servers: 'Setup: Tools > MCP > Add MCP Server

  Transport: HTTP-based only (no stdio/local)


  In-workflow usage:


  | Usage pattern | Node type | When to use |

  |---------------|-----------|-------------|

  | Dynamic tool selection | Agent node | Complex tasks where AI chooses which MCP tool to invoke |

  | Precise invocation | MCP node (standalone) | Standardized, strictly-ordered tool calls |


  ---'
18_knowledge_pipeline_internal_data_flow: ''
18_1_full_pipeline_sequence: "[Data Source Node]\n        |\n        | raw documents\n        v\n[Extractor Node]        \
  \           choose one:\n  - Dify Extractor                   built-in; PDF/DOCX/images; complex layouts\n  - Unstructured\
  \                     strategy: auto | hi_res | fast | ocr_only\n  - Generic Doc Processor            standard: PDF, XLSX,\
  \ DOCX\n        |\n        | {x} Content (structured text + optional image refs)\n        v\n[Chunker Node]            \
  \         choose one:\n  - General Chunker               -> Array[Chunk]      (flat segments)\n  - Parent-Child Chunker\
  \          -> Array[ParentChunk] (hierarchical)\n  - Q&A Processor                 -> Array[QAChunk]    (question-answer\
  \ pairs)\n        |\n        | typed array of chunks\n        v\n[Knowledge Base Node]              indexing + vector/keyword\
  \ storage\n        |\n        v\n[User Input Node]                  optional: per-pipeline input fields\n        |\n   \
  \     v\n[Test & Publish]                   validation + single-file test run"
18_2_chunker_configuration: 'General Chunker:


  | Parameter | Type | Description |

  |-----------|------|-------------|

  | `chunk_size` | int | Max characters per chunk |

  | `chunk_overlap` | int | Overlap chars between adjacent chunks |

  | `separators` | list[string] | Custom delimiters (e.g. `["\n\n", "\n", " "]`) |

  | `preprocessing_rules` | list | Remove extra whitespace, URLs, emails |


  Parent-Child Chunker:


  | Parameter | Type | Options |

  |-----------|------|---------|

  | `parent_mode` | enum | `full_doc` (whole doc as parent) or `paragraph` (paragraph as parent) |

  | `child_chunk_size` | int | Max chars for child (retrieval) chunks |


  Q&A Processor: Input is a spreadsheet with Question/Answer columns. Each Q-A pair becomes one QAChunk. Questions are embedded
  for retrieval; answers are the returned content.'
18_3_knowledge_base_node_config_schema: '| Parameter | Options | Description |

  |-----------|---------|-------------|

  | `indexing_technique` | `high_quality`, `economy` | Embedding vs keyword index |

  | `retrieval_model` | `semantic_search`, `full_text_search`, `hybrid_search` | Query matching strategy |

  | `reranking_enable` | bool | Enable post-retrieval reranking |

  | `reranking_mode` | `reranking_model`, `weighted_score` | Rerank method |

  | `weights.semantic_weight` | float 0.0-1.0 | Hybrid mode semantic component weight |

  | `weights.keyword_weight` | float 0.0-1.0 | Hybrid mode keyword component weight |

  | `top_k` | int | Max chunks returned per query |

  | `score_threshold_enabled` | bool | Enable minimum similarity filter |

  | `score_threshold` | float 0.0-1.0 | Min similarity to include a chunk |

  | `summary_enabled` | bool | Auto-generate chunk summary |


  Multimodal constraints: Vision-capable embedding model required for image retrieval; vision rerank model required for image
  reranking; max 10 images per chunk.


  Immutability: Chunk structure (General/Parent-Child/Q&A) cannot be changed after publishing. Re-create the pipeline to change
  structure.'
18_4_user_input_node_pipeline_specific: 'Scope types:


  | Scope | Availability |

  |-------|-------------|

  | Unique | Only for the connected data source node |

  | Global | Accessible by all nodes in the pipeline |


  Supported field types: Text (max 256 chars), Paragraph, Select, Boolean, Number, Single file, File List


  Each field: `variable_name`, `display_name`, `required/optional`, `default_value`, `placeholder`, `tooltip`


  ---'
19_variable_system_complete_syntax_reference: ''
19_1_referencing_syntax_forms: '| Form | Syntax | Example |

  |------|--------|---------|

  | Simple node output | `{{node_name.output_var}}` | `{{llm_1.text}}` |

  | Dot notation (nested) | `{{node.var.field}}` | `{{http_req.body.data.items}}` |

  | Array bracket access | `{{node.var[n]}}` | `{{results[0].title}}` |

  | Chained deep access | `{{node.var[n].field.sub}}` | `{{api.response[2].meta.url}}` |

  | System variable | `{{sys.var_name}}` | `{{sys.query}}`, `{{sys.conversation_id}}` |

  | Environment variable | `{{env.VAR_NAME}}` | `{{env.OPENAI_API_KEY}}` |

  | Conversation variable | `{{conv_var_name}}` | `{{user_language}}` (Chatflow only) |

  | Slash UI trigger | `/` then select | Node config dropdown picker |


  In Jinja2 contexts (Template node, LLM prompt fields):

  {{ start.user_input | upper }}

  {{ items | length }}

  {{ data | default("fallback_value") }}

  {{ timestamp | strftime("%Y-%m-%d") }}

  {% for item in results %}{{ item.title }}{% endfor %}

  {% if score > 0.9 %}High confidence{% else %}Low confidence{% endif %}'
19_2_variable_scoping_rules: '| Category | Read scope | Write scope | Persists |

  |----------|-----------|-------------|---------|

  | Input variables (start node) | All nodes downstream | Immutable | Per run |

  | Node output variables | All downstream nodes | Set by node only | Per run |

  | System variables (`sys.*`) | All nodes globally | Platform-managed | Per run |

  | Environment variables (`env.*`) | All nodes globally | Read-only | Permanent |

  | Conversation variables | All nodes globally | Variable Assigner node | Per session |


  Naming rules: Node names must be unique within an app to prevent variable reference collisions.'
19_3_variable_assigner_write_operations: '| Data type | Available operations |

  |-----------|---------------------|

  | String | Overwrite, Clear, Set (if empty), Append (concatenate) |

  | Number | Overwrite, Clear, Set (if empty), +, -, *, / arithmetic |

  | Boolean | Set to true or false |

  | Object | Overwrite entire object |

  | Array[any] | Append item, Extend (concat arrays), Remove first, Remove last |'
19_4_node_output_variable_reference: '| Node | Output variable | Type |

  |------|--------------|----|

  | LLM | `text`, `usage`, `finish_reason` | string, object, string |

  | Agent | `final_answer`, `tool_outputs`, `reasoning_trace`, `iteration_count`, `success_status`, `agent_logs` | string,
  array, string, number, bool, array |

  | Knowledge Retrieval | `result`, `files` | array[chunk], array[file] |

  | Code | User-declared outputs | any |

  | Template | `output` | string |

  | HTTP Request | `body`, `status_code`, `headers` | string/object, number, object |

  | Parameter Extractor | Declared params + `is_success`, `reason` | mixed, bool, string |

  | Question Classifier | `class_name` | string |

  | Iteration | `output` | array |

  | Document Extractor | `text` | string or array[string] |

  | List Operator | `result`, `first_record`, `last_record` | array, item, item |

  | Variable Aggregator | `output` | type of active branch |'
