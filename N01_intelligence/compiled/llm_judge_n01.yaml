tldr: 'LLM-as-judge configuration for N01 research output evaluation: fact verification, source validation, comparative coverage
  check, hallucination detection. Uses eval_framework_n01.md as scoring rubric.'
density_score: 0.91
purpose: 'N01 Analytical Envy creates a paradox: the better N01 researches, the more confident it becomes.

  Confidence without external validation is confirmation bias in disguise.


  This LLM judge provides an independent evaluation pass -- a second Claude instance that:

  1. Checks factual claims against cited sources

  2. Identifies unsupported assertions (potential hallucination)

  3. Scores against eval_framework_n01.md dimensions

  4. Flags comparative gaps (missing competitors, missing benchmarks)'
judge_configuration: '| Parameter | Value | Rationale |

  |-----------|-------|-----------|

  | Judge model | claude-opus-4-6 | highest reasoning for fact-checking |

  | Role | "Adversarial Research Reviewer" | assume findings are wrong until proven |

  | Temperature | 0.1 | deterministic judgment |

  | Max output | 2000 tokens | structured verdict only |

  | Self-evaluation | disabled | judge never evaluates its own outputs |'
judge_system_prompt: 'You are an adversarial research reviewer with Analytical Envy.

  Your job is to find FLAWS in research, not to validate it.

  You assume every claim is wrong until the evidence proves otherwise.


  You evaluate research on 5 dimensions (see eval_framework_n01.md):

  D1 Source Quality, D2 Analytical Depth, D3 Comparative Coverage,

  D4 Claim Confidence, D5 Actionability.


  For each dimension, score 1-10 with specific evidence for your score.


  Also check:

  - HALLUCINATION: claims not supported by cited sources

  - COMPARISON GAP: significant competitors/alternatives not considered

  - RECENCY: claims about current state based on sources > 90 days old

  - OVERCONFIDENCE: strong assertions without proportional evidence


  Output format: structured JSON only. No prose.'
input_contract: "{\n  \"research_output\": \"<full research text>\",\n  \"cited_sources\": [\n    {\n      \"url\": \"string\"\
  ,\n      \"title\": \"string\",\n      \"snippet\": \"string (key relevant excerpt)\"\n    }\n  ],\n  \"research_goal\"\
  : \"string\",\n  \"claimed_competitors\": [\"string\"]\n}"
output_contract: "{\n  \"verdict\": \"PASS | REVISE | REJECT\",\n  \"overall_score\": 0.0,\n  \"dimensions\": {\n    \"D1_source_quality\"\
  : {\"score\": 0.0, \"evidence\": \"string\"},\n    \"D2_analytical_depth\": {\"score\": 0.0, \"evidence\": \"string\"},\n\
  \    \"D3_comparative_coverage\": {\"score\": 0.0, \"evidence\": \"string\"},\n    \"D4_claim_confidence\": {\"score\":\
  \ 0.0, \"evidence\": \"string\"},\n    \"D5_actionability\": {\"score\": 0.0, \"evidence\": \"string\"}\n  },\n  \"hallucination_flags\"\
  : [\n    {\"claim\": \"string\", \"issue\": \"not in cited sources | contradicted by source X\"}\n  ],\n  \"comparison_gaps\"\
  : [\"string\"],\n  \"remediation\": [\"specific actionable fix\"]\n}"
verdict_thresholds: '| Verdict | Score | Action |

  |---------|-------|--------|

  | PASS | >= 8.5 | publish, no changes required |

  | REVISE | 6.5 - 8.4 | apply remediation list, re-judge |

  | REJECT | < 6.5 | return to F3 INJECT, restart synthesis |'
hallucination_detection_protocol: "The judge checks each factual claim against the cited source snippets:\n\nfor claim in\
  \ extract_claims(research_output):\n    evidence = find_supporting_evidence(claim, cited_sources)\n    if evidence is None:\n\
  \        flag(claim, \"UNSUPPORTED\")\n    elif contradicts(claim, evidence):\n        flag(claim, \"CONTRADICTED: \" +\
  \ evidence.source)\n    elif overstates(claim, evidence):\n        flag(claim, \"OVERSTATED: original says \" + evidence.snippet)\n\
  \nHallucination rate = flagged_claims / total_claims. Target < 5%."
comparison_gap_detection: "The judge specifically flags missing comparisons (Analytical Envy enforcement):\n\nknown_competitors\
  \ = query_retriever(\"competitors of \" + topic)\nmentioned_in_research = extract_entities(research_output, type=\"competitor\"\
  )\ngaps = known_competitors - mentioned_in_research\nif len(gaps) > 2:\n    flag(\"COMPARISON GAP: {gaps} not discussed\"\
  )"
integration_with_8f_pipeline: "F6 PRODUCE: generate research output\nF7 GOVERN:\n  -> run quality_gate_intelligence.md (hard\
  \ gates H01-H05)\n  -> run bias_audit_n01.md (bias scores B1-B5)\n  -> run llm_judge_n01.md (D1-D5 + hallucination + gap\
  \ check)\n  if all pass:\n    F8 COLLABORATE: save + signal\n  else:\n    retry F6 with judge feedback (max 2 retries)"
benchmark_judge_approaches_compared: '| Approach | Hallucination Detection | Comparative Gap | Cost | N01 Fit |

  |----------|------------------------|-----------------|------|---------|

  | Self-check (same model) | low (blind spots) | low | none | fail -- bias |

  | Human reviewer | high | high | hours | impractical |

  | This judge (adversarial LLM) | medium-high | high | tokens | optimal |

  | G-Eval (generic) | medium | low (no D3) | tokens | partial |

  | RAGAS | medium | none | tokens | not for N01 |


  N01 unique requirement: D3 comparative gap detection is absent from all standard eval frameworks.

  This is the Analytical Envy delta -- we added it because no one else prioritizes comparison coverage.'
