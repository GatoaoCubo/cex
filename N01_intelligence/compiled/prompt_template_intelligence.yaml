tldr: 'Provides standardized, machine-readable prompt templates to trigger the N01 agent''s core research workflows: Literature
  Review, Comparative Analysis, and Trend Analysis.'
variable_syntax: handlebars
density_score: 0.94
1_purpose: This artifact provides standardized, structured prompt templates for initiating the core workflows of the N01 Research
  & Intelligence Nucleus. Using these templates ensures that all necessary parameters are provided to the orchestration engine,
  allowing it to reliably select the correct workflow and execute the task with high precision.
2_template_variables: '| Variable               | Type         | Required | Description                                                                                             |

  |------------------------|--------------|----------|---------------------------------------------------------------------------------------------------------|

  | `research_type`        | String       | Yes  | The type of workflow to execute. Must be one of: `LITERATURE_REVIEW`, `COMPARATIVE_ANALYSIS`,
  `TREND_ANALYSIS`. |

  | `primary_question`     | String       | Yes  | The central, high-level question the research must answer.                                              |

  | `topic`                | String       | Varies   | The main subject or area of interest (for Literature Review, Trend
  Analysis).                           |

  | `subjects`             | String Array | Varies   | A list of two or more items to be compared (for Comparative Analysis).                                  |

  | `comparison_criteria`  | String Array | Varies   | The specific, objective criteria to use for comparison.                                                 |

  | `time_horizon`         | String       | Varies   | The time period to focus on, e.g., "last 2 years", "2020-2025" (for
  Trend Analysis).                  |

  | `data_sources`         | String Array | No       | A list of preferred data sources or document IDs to be used.                                            |

  | `analytical_framework` | String       | No       | A specific framework to apply, e.g., "PESTLE", "Porter''s Five Forces".                                  |


  ---'
3_templates: ''
template_a_literature_review: "Triggers a systematic review of literature on a given topic to answer a specific question.\n\
  ---\nresearch_type: \"LITERATURE_REVIEW\"\ntopic: \"{{topic}}\"\nprimary_question: \"{{primary_question}}\"\n{{#if data_sources}}\n\
  data_sources:\n  {{#each data_sources}}- \"{{this}}\"\n  {{/each}}\n{{/if}}\n---\nExample:\n---\nresearch_type: \"LITERATURE_REVIEW\"\
  \ntopic: \"Solid-State Batteries\"\nprimary_question: \"What are the primary technical obstacles preventing the mass commercialization\
  \ of solid-state batteries as of early 2026?\"\ndata_sources:\n  - \"doc_id:arxiv_2512.01234\"\n  - \"doc_id:ieee_56789\"\
  \n---"
template_b_comparative_analysis: "Triggers a head-to-head benchmark of two or more subjects against defined criteria.\n---\n\
  research_type: \"COMPARATIVE_ANALYSIS\"\nprimary_question: \"How do the following subjects compare on the specified criteria?\"\
  \nsubjects:\n  {{#each subjects}}- \"{{this}}\"\n  {{/each}}\ncomparison_criteria:\n  {{#each comparison_criteria}}- \"\
  {{this}}\"\n  {{/each}}\n---\nExample:\n---\nresearch_type: \"COMPARATIVE_ANALYSIS\"\nprimary_question: \"How do the leading\
  \ open-source LLMs compare in terms of performance, architecture, and licensing?\"\nsubjects:\n  - \"Llama 3 70B\"\n  -\
  \ \"Mistral Large\"\n  - \"Jamba\"\ncomparison_criteria:\n  - \"Reported MMLU Score\"\n  - \"Model Architecture (e.g., MoE)\"\
  \n  - \"Context Window Size (tokens)\"\n  - \"Commercial Use License Terms\"\n---"
template_c_trend_analysis: 'Triggers an analysis of patterns, momentum, and future projections for a topic over a specific
  time horizon.

  ---

  research_type: "TREND_ANALYSIS"

  topic: "{{topic}}"

  primary_question: "{{primary_question}}"

  time_horizon: "{{time_horizon}}"

  {{#if analytical_framework}}

  analytical_framework: "{{analytical_framework}}"

  {{/if}}

  ---

  Example:

  ---

  research_type: "TREND_ANALYSIS"

  topic: "AI in Drug Discovery"

  primary_question: "What is the investment trend and velocity for AI in drug discovery, and which sub-fields are seeing the
  most momentum?"

  time_horizon: "2023-2026"

  analytical_framework: "Kinetic Analysis"

  ---'
