verification: "- Was the expected tool added? YES. `_tools/cex_web_fetch.py` exists in `_tools/` and is a standalone CLI fetcher.\n\
  - Evidence:\n  - `Get-ChildItem _tools` shows `cex_web_fetch.py`\n  - `_tools/cex_web_fetch.py` exposes `fetch()`, `html_to_text()`,\
  \ and `arxiv_url()`\n  - CLI surface: positional `url`, `--arxiv`, `--max-bytes`, `--raw`\n- Does its API match N01's needs?\
  \ Partially.\n  - Matches the baseline need for live HTTP fetch and simple arXiv abstract retrieval.\n  - Does not close\
  \ the citation-validator gap.\n  - Does not fetch PDF full text, render JavaScript, or extract structured metadata.\n\n\
  `rg -n \"arxiv|web_fetch\" _tools` also shows adjacent arXiv-related logic in `_tools/cex_source_harvester.py` and `_tools/cex_taxonomy_scout.py`,\
  \ but those are not duplicate generic fetchers. They classify or scan sources; `cex_web_fetch.py` is the only minimal fetch-and-extract\
  \ utility."
new_wired_tools_since_v1: "- `cex_web_fetch.py`\n  - New capability: generic URL fetch with charset-aware decoding\n  - New\
  \ capability: HTML to plain-text reduction\n  - New capability: `--arxiv` shortcut via `https://export.arxiv.org/abs/{id}`\n\
  \nThis closes the \"web search / ArXiv fetcher\" gap only at a baseline ingestion level. It gives N01 a direct path to pull\
  \ lightweight web content into research flows such as `cex_research.py`, but it does not yet turn fetched material into\
  \ validated research evidence."
still_missing:
- Citation validator
- Still missing as a dedicated tool.
- Current fetch output is unstructured text, so N01 still cannot check whether cited claims, authors, titles, venues, or source
  links are valid.
- PDF full-text extraction
- '`cex_web_fetch.py` targets HTML and arXiv abstract pages, not paper PDFs.'
- For N01, this is the main remaining blocker for paper-grade research.
- Metadata extraction
- No structured parse of author, publish date, domain, DOI, venue, or citation list.
- Reliability controls
- No retries, caching, rate limiting, or source provenance record in the fetcher itself.
next_iteration:
- Build `cex_citation_validator.py`
- 'Priority: highest'
- 'Why: this is the gap explicitly left open by the previous cycle and the current fetcher does not address it.'
- Build `cex_pdf_extract.py`
- 'Priority: high'
- 'Why: arXiv support is only partial until N01 can read paper bodies instead of just abstract pages.'
- Extend fetch output to emit structured provenance
- 'Priority: medium'
- 'Why: N01 research artifacts need reusable metadata, not only raw plain text.'
