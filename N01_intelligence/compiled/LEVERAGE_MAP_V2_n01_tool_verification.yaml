still_missing_leverage_gaps: ''
critical_gaps:
- PDF Extraction — ArXiv papers are PDFs; `cex_web_fetch.py` only handles HTML. N01 needs `pdf2text` (pdfplumber or PyPDF2
  wrapper).
- 'Impact: Research completeness — 40% of academic sources are PDF-only'
- Citation Parsing — Extract structured citations from papers (authors, year, title, venue).
- 'Impact: Dependency mapping — can''t track "who cites whom"'
- Paywalled Content — Journals (IEEE, ACM, Nature) behind authentication.
- 'Impact: Coverage — blocks 30% of industry research'
secondary_gaps:
- Dynamic Content — JavaScript rendering for blogs, Substack, Medium paywalls.
- Rate Limiting — No retry logic, exponential backoff, or cache warming.
- Metadata Extraction — Authors, dates, keywords from raw HTML.
by_severity: '| Gap | Impact | Frequency | Priority |

  |-----|--------|-----------|----------|

  | PDF extraction | High | Every arXiv fetch | CRITICAL |

  | Citation parser | High | Every research brief | CRITICAL |

  | Auth / paywall | Medium | Industry research | HIGH |

  | JS rendering | Low | Modern SPA research | MEDIUM |

  | Rate limiting | Low | Bulk harvests | MEDIUM |


  ---'
next_iteration_top_3_priorities: ''
1_pdf_text_extractor_highest_priority: "Artifact kind: `browser_tool`  \nImplementation: `cex_pdf_extract.py`  \nAPI:\npython\
  \ _tools/cex_pdf_extract.py https://arxiv.org/pdf/1706.03762.pdf\npython _tools/cex_pdf_extract.py --local /path/to/paper.pdf\n\
  Why: 60% of arXiv content is PDF-only. Without this, N01 can only read HTML abstracts, losing paper body, results, citations.\n\
  \nEstimated cost: 3 hours build (pdfplumber, ASCII-only output)"
2_citation_extractor_parser_critical: "Artifact kind: `parser`  \nImplementation: `cex_citation_extractor.py`  \nAPI:\npython\
  \ _tools/cex_citation_extractor.py --paper \"https://arxiv.org/abs/1706.03762\" --format bibtex|apa|json\nOutput: Structured\
  \ JSON with [authors, year, title, venue, DOI]\n\nWhy: Build a \"who cites whom\" graph for the research domain. Feeds dependency\
  \ analysis and authority ranking.\n\nEstimated cost: 2 hours build (regex + citation format parsing)"
3_source_inventory_audit_high: "Artifact kind: `audit_log` + `quality_gate`  \nImplementation: N01 audit that scans existing\
  \ research artifacts and flags which sources are:\n- Web (fetchable via `cex_web_fetch.py`) ✓\n- PDF (need extractor)\n\
  - Paywalled (need auth)\n- Dead (need link validation)\n\nWhy: Catalog the research debt. Answer: \"Of our 231 knowledge\
  \ cards, how many source references are actually accessible?\"\n\nEstimated cost: 1 hour analysis + 2 hours build\n\n---"
