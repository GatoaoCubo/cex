8_3_architecture_controversy_deepseek_v3_base: 'Within hours of the March 17, 2026 launch, the developer community identified
  that Rakuten AI 3.0 is architecturally identical to DeepSeek V3 with Japanese language fine-tuning layered on top:


  | Claim | Reality |

  |-------|---------|

  | "Japan''s homegrown AI" | Base model: DeepSeek V3 (Chinese) |

  | "Full-scratch development" | Fine-tuned adaptation, not full-scratch |

  | GENIAC compute subsidy | Used for fine-tuning, not pretraining |


  Assessment: Rakuten AI 3.0 provides genuine value as a Japanese-optimized large-scale MoE model available under Apache 2.0.
  The controversy is about the marketing framing ("homegrown") rather than the technical quality. The model is capable and
  accessible; the sovereignty claim is overstated.


  CEX relevance: The Rakuten case illustrates a pattern across the ecosystem -- distinguishing full-scratch Japanese pretraining
  (PFN, NTT, NEC) from Japanese fine-tuning of international base models (Rakuten, CyberAgent). Both strategies produce useful
  Japanese LLMs, but only the former achieves true data sovereignty.


  ---'
