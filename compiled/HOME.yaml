artifacts_by_nucleus: 'TABLE length(rows) as "Artifacts"

  FROM ""

  WHERE kind

  GROUP BY regexreplace(file.folder, "/.*", "") as "Folder"

  SORT length(rows) DESC

  LIMIT 12'
recent_knowledge_cards: 'TABLE kind, title

  FROM ""

  WHERE kind = "knowledge_card"

  SORT file.mtime DESC

  LIMIT 8'
quality_leaders_9_0: 'TABLE quality as "Score", kind, title

  FROM ""

  WHERE quality >= 9.0

  SORT quality DESC

  LIMIT 8'
unscored_artifacts: 'TABLE kind, title

  FROM ""

  WHERE kind AND !quality

  SORT file.mtime DESC

  LIMIT 8'
