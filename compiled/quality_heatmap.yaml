score_distribution: 'TABLE length(rows) as "Count"

  FROM ""

  WHERE quality

  GROUP BY round(quality, 0) as "Score Band"

  SORT round(quality, 0) DESC'
top_scores_9_5: 'TABLE quality as "Score", kind, title

  FROM ""

  WHERE quality >= 9.5

  SORT quality DESC

  LIMIT 15'
below_threshold_8_0: 'TABLE quality as "Score", kind, title

  FROM ""

  WHERE quality AND quality < 8.0

  SORT quality ASC

  LIMIT 20'
unscored_artifacts_quality_null: 'TABLE kind, title

  FROM ""

  WHERE kind AND !quality

  SORT file.mtime DESC

  LIMIT 25'
average_quality_per_pillar: 'TABLE round(average(rows.quality), 2) as "Avg", length(rows) as "Scored"

  FROM ""

  WHERE pillar AND quality

  GROUP BY pillar

  SORT round(average(rows.quality), 2) ASC'
