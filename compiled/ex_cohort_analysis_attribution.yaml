id: ex_cohort_analysis_attribution
kind: cohort_analysis
pillar: P11
version: 1.0.0
title: Attribution Framework -- Content + Promo Multi-Touch
description: Multi-touch attribution framework for content-driven ecommerce. Defines attribution models, UTM taxonomy, GA4
  event contracts, and cohort segmentation by promo participation.
domain: analytics
nucleus: N06
quality: null
