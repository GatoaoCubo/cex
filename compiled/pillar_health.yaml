id: dash_pillar_health
kind: dashboard
title: Pillar Health
version: 2.0.0
quality: 6.6
density_score: 0.98
updated: '2026-04-22'
related:
- dash_quality_heatmap
- dash_kind_census
- home
- dash_cross_ref_health
- dash_orphan_detector
artifact_count_per_pillar: 'TABLE length(rows) as "Artifacts"

  FROM ""

  WHERE pillar

  GROUP BY pillar

  SORT pillar ASC'
average_quality_per_pillar: 'TABLE round(average(rows.quality), 2) as "Avg Quality", length(rows) as "Scored"

  FROM ""

  WHERE pillar AND quality

  GROUP BY pillar

  SORT round(average(rows.quality), 2) ASC'
last_activity_per_pillar: 'TABLE max(rows.file.mtime) as "Last Modified", length(rows) as "Total"

  FROM ""

  WHERE pillar

  GROUP BY pillar

  SORT max(rows.file.mtime) DESC'
weakest_pillar_detail: 'TABLE quality as "Score", kind, title

  FROM ""

  WHERE pillar = "P06"

  SORT quality ASC

  LIMIT 10'
strongest_pillar_detail: 'TABLE quality as "Score", kind, title

  FROM ""

  WHERE pillar = "P01" AND quality

  SORT quality DESC

  LIMIT 10'
