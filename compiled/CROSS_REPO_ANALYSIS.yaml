executive_summary: 'codexa-core has massive knowledge accumulated across 6 months of development.

  CEX needs the PATTERNS, not the branding. This document classifies what to port.


  Key numbers:

  - 689 KCs in pool/knowledge/ (many duplicates, ~400 unique)

  - 128 skills with SKILL.md

  - 66 commands in .claude/commands/

  - 29 framework docs

  - 6 PowerShell spawn scripts


  CEX already has: 46 python tools, 7 commands, 108 sub-agents, 5 spawn scripts


  ---'
