taxonomy_note: 'The user asked about "invented taxonomy" — here''s what IS vs ISN''T:


  INVENTED (codexa-only, do NOT port):

  - Agent_group names (STELLA, SHAKA, etc) → already replaced by N01-N07

  - LAW numbers (LAW 0-13) → concepts are universal, numbering is invented

  - ADW (Agentic Design Workflow) → partially invented branding of universal patterns

  - ISO vectorstore → replaced by CEX''s builder spec system

  - Pool → replaced by CEX''s P01-P12 pillar system


  UNIVERSAL (port freely):

  - /handoff, /ship, /health → standard DevOps concepts

  - Chain of Thought, RAG, Tool Use → standard LLM patterns

  - OWASP, WCAG, JTBD, Ries & Trout → ind

  ustry standards

  - 8F pipeline: CEX own universal framework (already there)

  - Design tokens, brand archetypes: industry standards


  ---'
