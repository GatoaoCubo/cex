immediate_session_start: '#### S1: Fine-tune Dataset Preparation

  - Source: 1,630 ISOs + 123 KCs + 377 templates/examples.

  - Target: 2,000+ training pairs for QLoRA using `cex_continuous.py`.


  #### S2: QLoRA Fine-tune on Qwen 3 8B

  - Framework: Unsloth or Axolotl (QLoRA, 4-bit).

  - Hardware: GTX 1070 4GB (gradient checkpointing required).

  - Goal: Train `cex-qwen3:8b` and deploy via Ollama.


  #### S3: Hybrid Dispatch (Claude N07 + Ollama Nuclei)

  - Architecture: N07 uses Claude Opus; N01-N06 use Ollama/cex-qwen3.

  - Validation: Full 6-nucleus grid test via Ollama.


  #### S4: Benchmark Re-run

  - Command: `python _tools/cex_benchmark_ollama.py --models qwen3:8b,deepseek-r1:8b --timeout 600`.

  - Output: Results published to `.cex/benchmarks/`.


  #### S5: Content Factory Integration

  - Pipeline: N01 (input) → N02 (formatting) → N06 (distribution).

  - Remaining: Integration workflow validation.


  ---'
