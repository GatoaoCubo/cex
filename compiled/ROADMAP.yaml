title: CEX Development Roadmap
author: CEX Team
date: 2026-04-08
version: 1.0
goals:
- 'Expand Model Support: Integrate Ollama and fine-tuned models to reduce API costs and increase accessibility.'
- 'Improve Performance: Optimize token usage and pipeline execution time to ensure scalability.'
- 'Enhance Distribution: Launch v1.0 on Hotmart/Gumroad with full installer and release tools.'
- 'Enable Multi-Tenancy: Support multiple brands under a single infrastructure with isolated configurations.'
- 'Build SaaS API: Expose CEX capabilities via REST API for external integration and monetization.'
constraints:
- 'Resource Limitations: Hardware constraints (e.g., GTX 1070 4GB VRAM) require efficient memory management.'
- 'Dependency on External Tools: Ollama and Claude API availability may impact deployment timelines.'
- 'Time Constraints: Overnight bootstrap and fine-tuning iterations must complete within 4 hours.'
- 'Security Requirements: Sensitive data (tokens, credentials) must be excluded from version control.'
- 'User Accessibility: Ensure zero Claude dependency for budget-conscious users via Ollama-only mode.'
next_session_start_here: ''
s1_fine_tune_dataset_preparation: 'Build QLoRA training dataset from CEX''s own artifacts:

  - Source: 1,630 ISOs + 123 KCs + 377 templates/examples

  - Format: instruction/response pairs for Qwen 3 8B

  - Tool: `cex_continuous.py` (built in H2) has export mode

  - Target: 2,000+ training pairs covering all 123 kinds

  - Validate: train/test split, dedup, format check'
s2_qlora_fine_tune_on_qwen_3_8b: 'Train custom model `cex-qwen3:8b` using prepared dataset:

  - Framework: Unsloth or Axolotl (QLoRA, 4-bit)

  - Hardware: GTX 1070 4GB (tight -- use gradient checkpointing)

  - Epochs: 3-5 on full dataset

  - Eval: re-run benchmark tool, compare base vs FT

  - Deploy: `ollama create cex-qwen3 -f Modelfile`'
s3_hybrid_dispatch_claude_n07_ollama_nuclei: 'Wire the pipeline so `/mission` and `/grid` dispatch to Ollama:

  - N07 stays Claude Opus (orchestration needs full agent)

  - N01-N06 workers use Ollama/cex-qwen3 via `cex_8f_runner.py`

  - Handoff format stays the same (model reads via pipeline, not CLI)

  - F8 compiles + commits (pipeline handles, not model)

  - Test: full 6-nucleus grid via Ollama'
s4_benchmark_re_run_valid_comparison: 'Re-run with fixed code (HTTP API, 300s timeout, /no_think):

  - `python _tools/cex_benchmark_ollama.py --models qwen3:8b,deepseek-r1:8b --timeout 600`

  - Compare: base Qwen 3 vs base DeepSeek R1 vs FT cex-qwen3

  - Publish results to `.cex/benchmarks/`'
s5_content_factory_integration: 'Connect existing components into working pipeline:

  - N01 NotebookLM pipeline (H5) -> input

  - N02 content templates -> formatting

  - N06 monetization layer (H6) -> distribution

  - Remaining: integration workflow connecting the pieces


  ---'
next_medium_term_week: ''
m1_full_from_zero_bootstrap_test: 'Use `boot/overnight_infinite.cmd` to rebuild CEX from a clean state. Validates: mission_state,
  continuous batching, sub-agents, quality gates. Expected: ~3-4 hours with full grid + sub-agents.'
m2_release_v1_0_on_hotmart_gumroad: 'Pre-requisites:

  - `cex_release_check.py` passes 28/28 (3 README fixes remaining)

  - Course outline or quickstart guide for buyers

  - ZIP tested on clean Windows 10 VM

  - Payment + download flow tested end-to-end'
m3_ollama_only_mode_zero_claude_dependency: 'Make CEX fully functional without any Claude subscription:

  - Replace N07 orchestration with CLI wizard + cex_mission_runner.py

  - All nuclei via Ollama/cex-qwen3

  - install.cmd installs Ollama instead of Claude Code

  - Target audience: users who can''t afford $20/month


  ---'
next_long_term_month: ''
l1_cex_as_distributable_product: 'Release CEX as downloadable package:

  - install.cmd (built, H9) handles dependencies

  - release.cmd (built, H9) packages ZIP

  - Channels: Hotmart ZIP, GitHub Releases, Gumroad'
l2_fine_tuned_cex_model_production: 'Iterate on S2 prototype:

  - Larger dataset (add user artifacts, session outputs)

  - Multi-model: cex-qwen3:8b (free), cex-qwen3:32b (better GPU)

  - Publish on Ollama registry or HuggingFace

  - Potential revenue: sell fine-tuned model access'
l3_multi_tenant_cex: Multiple brands running on same infrastructure. Each brand = separate `.cex/brand/` config. Nuclei route
  based on brand context.
l4_cex_api_saas: 'REST API exposing CEX capabilities:

  - POST /build -> 8F pipeline -> artifact

  - POST /evolve -> improve artifact

  - GET /query -> find relevant artifacts

  - POST /mission -> decompose + execute

  - Revenue: usage-based pricing


  ---'
