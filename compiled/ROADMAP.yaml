roadmap: ''
next_session: "#### S1: Fine-tune dataset preparation  \nBuild QLoRA training dataset from CEX's own artifacts:  \n- Source:\
  \ 1,630 ISOs + 123 KCs + 377 templates/examples  \n- Format: instruction/response pairs for Qwen 3 8B  \n- Tool: `cex_continuous.py`\
  \ (built in H2) has export mode  \n- Target: 2,000+ training pairs covering all 123 kinds  \n- Validate: train/test split,\
  \ dedup, format check  \n\n#### S2: QLoRA fine-tune on Qwen 3 8B  \nTrain custom model `cex-qwen3:8b` using prepared dataset:\
  \  \n- Framework: Unsloth or Axolotl (QLoRA, 4-bit)  \n- Hardware: GTX 1070 4GB (tight -- use gradient checkpointing)  \n\
  - Epochs: 3-5 on full dataset  \n- Eval: re-run benchmarks, compare with base model  \n- Deploy: integrate into `cex_intent.py`\
  \ and `cex_8f_runner.py`  \n\n#### S3: Hybrid model testing  \n- Test hybrid models (local + cloud) for latency-sensitive\
  \ tasks  \n- Update `dispatch.sh` to prioritize local models for low-latency tasks  \n\n---"
medium_term_goals: "#### M1: Distribution expansion  \n- Add support for ARM64 and RISC-V architectures  \n- Optimize `install.cmd`\
