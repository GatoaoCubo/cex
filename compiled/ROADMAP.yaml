immediate_tasks_next_session: "#### S1: Fine-tune dataset preparation\nObjective: Build QLoRA training dataset from CEX artifacts\
  \  \nComponents:\n- Source: 1,630 ISOs + 123 KCs + 377 templates/examples\n- Format: Instruction/response pairs for Qwen\
  \ 3 8B\n- Tool: `cex_continuous.py` (export mode)\n- Target: 2,000+ training pairs covering all 123 kinds\n\n#### S2: QLoRA\
  \ fine-tune on Qwen 3 8B\nFramework: Unsloth or Axolotl (QLoRA, 4-bit)  \nHardware: GTX 1070 4GB (gradient checkpointing)\
  \  \nTarget: 3-5 epochs on full dataset  \nOutput: `cex-qwen3:8b` model via Ollama\n\n#### S3: Hybrid dispatch (Claude N07\
  \ + Ollama nuclei)\nImplementation:\n- N07: Claude Opus (orchestration)\n- N01-N06: Ollama/cex-qwen3 via `cex_8f_runner.py`\n\
  - Handoff format: Consistent with existing pipeline\n\n#### S4: Benchmark re-run\nCommand:  \npython _tools/cex_benchmark_ollama.py\
  \ --models qwen3:8b,deepseek-r1:8b --timeout 600\nOutput: Base vs FT performance comparison in `.cex/benchmarks/`\n\n####\
  \ S5: Content Factory integration\nPipeline:\n- N01: NotebookLM pipeline (H5) → input\n- N02: Content templates → formatting\n\
  - N06: Monetization layer (H6) → distribution\n\n---"
