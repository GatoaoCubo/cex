  \ --baseline reports/coverage_v2_baseline.txt\n# Output: .cex/reports/regression_v2_run1.json\n\nEffort: 4 hours  \nQuality\
  \ target: 9.0  \n\n---"
2_cex_ci_gate_py_critical_blocker: "Kind: quality_gate (P07/P11)  \nPillar: P07 Evaluation + P11 Feedback  \nWhy: Prevents\
  \ low-quality artifacts from merging to main.\n\nScope:\n- Pre-commit hook integration\n- Query: all staged artifacts\n\
  - Score: each via cex_score.py\n- Gate: block if any < 8.0\n- Message: list failing artifacts + required fixes\n\nUsage:\n\
  # In .git/hooks/pre-commit:\npython _tools/cex_ci_gate.py --staged\n\n# If exits 1: commit blocked\n# User must fix + git\
  \ add + retry commit\n\nEffort: 2.5 hours  \nQuality target: 9.0  \n\n---"
