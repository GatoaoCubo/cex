true_orphans_0_inlinks_0_outlinks: 'TABLE kind, pillar

  FROM ""

  WHERE kind AND length(file.inlinks) = 0 AND length(file.outlinks) = 0

  SORT file.mtime DESC

  LIMIT 30'
hub_nodes_most_connected: 'TABLE length(file.inlinks) as "In", length(file.outlinks) as "Out", kind

  FROM ""

  WHERE kind

  SORT length(file.inlinks) DESC

  LIMIT 15'
fresh_orphans_modified_last_7_days_0_inlinks: 'TABLE kind, file.mtime as "Modified"

  FROM ""

  WHERE kind AND length(file.inlinks) = 0 AND file.mtime >= date(today) - dur(7 days)

  SORT file.mtime DESC

  LIMIT 20'
missing_frontmatter_kind: 'TABLE file.folder as "Folder"

  FROM ""

  WHERE !kind AND !contains(file.name, "README") AND !contains(file.name, "HOME") AND !contains(file.folder, ".obsidian")

  SORT file.folder ASC

  LIMIT 20'
