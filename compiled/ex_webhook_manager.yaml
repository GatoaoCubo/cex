id: ex-webhook-manager
kind: webhook
pillar: P04
title: Shopify Webhook Manager
version: 0.1.0
quality: null
status: template
brand_placeholders:
- BRAND_SHOPIFY_STORE_DOMAIN
- BRAND_SHOPIFY_API_VERSION
- BRAND_SUPABASE_PROJECT_REF
- BRAND_SHOPIFY_WEBHOOK_SECRET
tags:
- commerce
- template
- distillation
- shopify
- webhook
- management
purpose: 'CRUD operations for Shopify webhook subscriptions: list, setup (create the required topic set), delete, clear-all,
  test-fire, and rotate-secret. Ensures the brand''s Shopify store always has exactly the webhook set the integration expects
  -- no gaps, no strays.'
when_to_use:
- First-time setup (see `ex_integration_guide_shopify.md`).
- After rotating `{{BRAND_SHOPIFY_WEBHOOK_SECRET}}` -- must re-register all webhooks.
- Audit run to detect drift (manual admin UI changes created stray webhooks).
interface: "POST /webhook-manager\n  { op: \"list\" | \"setup\" | \"delete\" | \"clear\" | \"test\" | \"rotate_secret\",\n\
  \    topic?: string,   // for delete\n    webhook_id?: string, // for delete/test\n  }\nReturns `{ before: [...], after:\
  \ [...], diff: {added, removed} }`."
brand_variables_used:
- '`{{BRAND_SHOPIFY_STORE_DOMAIN}}` -- target store.'
- '`{{BRAND_SHOPIFY_API_VERSION}}` -- pinned API version.'
- '`{{BRAND_SUPABASE_PROJECT_REF}}` -- callback address for all created webhooks.'
- '`{{BRAND_SHOPIFY_WEBHOOK_SECRET}}` -- HMAC shared secret; rotate via `op: "rotate_secret"`.'
required_topic_set: '| Topic | Purpose | Callback |

  |-------|---------|----------|

  | `products/update` | catalog mirror | `/shopify-webhook-handler` |

  | `products/delete` | soft-delete mirror | `/shopify-webhook-handler` |

  | `inventory_levels/update` | stock mirror | `/shopify-webhook-handler` |

  | `orders/create` | order pipeline | `/shopify-webhook-handler` |

  | `orders/paid` | fulfillment trigger | `/shopify-webhook-handler` |

  | `app/uninstalled` | cleanup | `/shopify-webhook-handler` |'
operations: ''
op_list: '`GET https://{{BRAND_SHOPIFY_STORE_DOMAIN}}/admin/api/{{BRAND_SHOPIFY_API_VERSION}}/webhooks.json`; returns full
  subscription list with `id, topic, address, updated_at`.'
op_setup_idempotent: 'For each topic in the required set:

  - If present with correct address -> noop.

  - If present with wrong address -> update.

  - If absent -> create via `POST /webhooks.json { webhook: {topic, address, format: "json"} }`.'
op_delete: '`DELETE /webhooks/{id}.json`; logs what was removed.'
op_clear: 'Deletes ALL webhooks on the store. Use only during decommission. Asks for `confirm: true` flag to avoid accidental
  triggering.'
op_test: Shopify doesn't offer a "test fire" endpoint; the manager instead POSTs a synthesized payload directly to the configured
  callback URL with the current HMAC secret -- verifies the handler is reachable and signature validation works.
op_rotate_secret:
- Generate new random secret.
- Delete all existing webhooks (they are bound to the old secret internally by Shopify).
- Re-create the full set with the new secret.
- Update `{{BRAND_SHOPIFY_WEBHOOK_SECRET}}` in the secret store.
drift_detection: 'Nightly cron runs `op: "list"` and compares to required set; alerts if diff is non-empty. Catches rogue
  webhooks added via Shopify admin UI.'
related_artifacts:
- '`ex_webhook_shopify.md` -- handler registered by this manager.'
- '`ex_integration_guide_shopify.md` -- setup flow.'
- '`ex_notifier_webhook.md` -- outbound notification companion.'
