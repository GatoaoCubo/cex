still_missing_leverage_gaps: ''
gap_1_citation_extraction_validation: "Why this matters: N01 research outputs (KCs, briefs, analyses) cite sources. Without\
  \ automated validation, citations are unmaintained — links break, DOI format drifts, metadata goes stale.\n\nWhat's needed:\n\
  1. Citation parser — extract citations from fetched HTML/plaintext\n   - Regex patterns for DOI, arXiv, ISBN, GitHub slugs,\
  \ URLs\n   - Support both implicit (URL in text) and explicit (citation blocks)\n   - Example: \"See Liu et al. 2023\" →\
  \ `{authors: [...], year: 2023, arxiv: 2303.18223}`\n\n2. Metadata extractor — pull author, date, venue from fetched pages\n\
  \   - Open Graph meta tags (og:title, og:author, og:publication_date)\n   - Schema.org structured data (ScholarArticle,\
  \ BlogPosting)\n   - arXiv API (faster than scraping)\n   - Fallback heuristics (h1/h2 for title, footer for date)\n\n3.\
  \ Validation engine — check citations for authenticity/liveness\n   - HTTP HEAD to detect broken links (304, 404, 410, 451)\n\
  \   - arXiv API lookup (verify ID format, retraction status)\n   - DOI resolution (crossref.org API)\n   - ISBN validation\
  \ (checksum + OpenLibrary)"
gap_2_citation_formatting_normalization: "Why this matters: N01 outputs need consistent citation formats (APA, MLA, Chicago,\
  \ BibTeX). Current solution: manual. Opportunity: generative.\n\nWhat's needed:\n1. Citation formatter — convert parsed\
  \ citation objects to standard formats\n   - Input: `{authors: [...], title, year, venue, doi, arxiv, url}`\n   - Output:\
  \ APA, MLA, Chicago, BibTeX, CSL-JSON\n   - Validation: check that output is structurally valid (APA requires period, etc.)\n\
  \n2. Template library — per-format rules (author order, punctuation, abbreviations)\n   - APA: \"(Author, Year)\" for in-text,\
  \ full list at end\n   - MLA: (Author Page) for in-text\n   - Chicago: superscript numbers or author-date\n   - BibTeX:\
  \ raw LaTeX-safe fields"
gap_3_knowledge_base_linkage: 'Why this matters: N01''s research feeds into P01_knowledge library. Citations should auto-link
  to existing KCs or flag new KC opportunities.


  What''s needed:

  1. Citation→Kind mapping — when N01 cites a paper on "tokenization," auto-suggest that it feeds `kc_tokenization.md` in
  P01

  2. Missing KC detector — if citation is novel (not mapped to existing KC), flag for N04 to create

  3. Citation aging — track when each source was last accessed, flag stale references for refresh'
gap_4_multimodal_fetch_low_priority: 'Why this matters: arXiv PDFs, GitHub README.md rendering, social media embeds add richness
  to research.


  What''s needed:

  1. PDF extraction (pypdf, pdfplumber) — extract text from arXiv PDFs instead of HTML

  2. Markdown rendering — GitHub/GitLab README render to plaintext for better extraction

  3. Rate limiting — respect API quotas (arXiv, GitHub, Crossref all have limits)


  ---'
