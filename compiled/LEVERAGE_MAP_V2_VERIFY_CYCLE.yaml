next_iteration_prioritized: ''
1_citation_extractor_cex_citation_parser_py_critical: "Purpose: Parse fetched content and extract structured citations.\n\n\
  Input: Plaintext from `cex_web_fetch.py`\n\nOutput: JSON with parsed citations\n[\n  {\n    \"authors\": [\"Liu, Z.\", \"\
  Wang, X.\"],\n    \"title\": \"Attention Is All You Need\",\n    \"year\": 2017,\n    \"venue\": \"NeurIPS\",\n    \"doi\"\
  : \"10.5555/3295222\",\n    \"arxiv\": \"1706.03762\",\n    \"url\": \"https://arxiv.org/abs/1706.03762\"\n  }\n]\n\nScope:\
  \ ~150 lines\n- Regex for DOI: `\\b10\\.\\d{4,}/\\S+`\n- Regex for arXiv: `\\barxiv:\\d{4}\\.\\d{4,}`\n- Regex for URLs:\
  \ `https?://[^\\s)]+`\n- Regex for author lists: `\\b[A-Z][a-z]+(?:,| and) [A-Z]\\.`\n- Fallback heuristics for missing\
  \ metadata\n\nSuccess criteria:\n- Extracts ≥80% of citations from academic papers (test vs. 10 arXiv papers)\n- Zero false\
  \ positives (random URLs should not be flagged as citations)\n- Handles DOI, arXiv, ISBN, GitHub URLs\n\n---"
2_citation_validator_cex_citation_validator_py_high: "Purpose: Check citations for authenticity, liveness, and completeness.\n\
  \nInput: Parsed citations from `cex_citation_parser.py`\n\nOutput: Validation status + metadata enrichment\n{\n  \"doi\"\
  : \"10.5555/3295222\",\n  \"status\": \"valid\",\n  \"http_status\": 301,\n  \"metadata\": {\n    \"authors\": [\"Vaswani,\
  \ A.\", ...],\n    \"title\": \"Attention Is All You Need\",\n    \"year\": 2017,\n    \"venue\": \"31st Conference on Neural\
  \ Information Processing Systems\"\n  },\n  \"last_checked\": \"2026-04-15T12:34:56Z\"\n}\n\nScope: ~200 lines\n- arXiv\
  \ API: `https://export.arxiv.org/api/query?id_list={arxiv_id}`\n- DOI resolution: `https://doi.org/{doi}` (follow 301 redirects)\n\
  - Crossref API: `https://api.crossref.org/works/{doi}` (metadata enrichment)\n- HTTP HEAD for URL liveness\n- ISBN checksum\
  \ validation\n\nSuccess criteria:\n- Validates ≥95% of DOI/arXiv citations (test vs. 50 real citations)\n- Detects broken\
  \ links (404, 410) with zero false negatives\n- Enriches metadata for ≥90% of academic papers\n\n---"
3_citation_formatter_cex_citation_format_py_medium: "Purpose: Convert parsed citations to standard formats (APA, MLA, Chicago,\
  \ BibTeX).\n\nInput: Validated citations from `cex_citation_validator.py`\n\nOutput: Formatted citation strings per requested\
  \ style\n# APA\nVaswani, A., et al. (2017). Attention is all you need. In Advances in neural information processing systems\
  \ (pp. 5998-6008).\n\n# BibTeX\n@inproceedings{vaswani2017attention,\n  title={Attention is all you need},\n  author={Vaswani,\
  \ Ashish and others},\n  booktitle={NeurIPS},\n  year={2017}\n}\n\nScope: ~250 lines\n- Template-based formatting per style\n\
  - Author abbreviation rules (et al. for ≥4 authors)\n- Punctuation & capitalization rules per style\n- Validation that output\
  \ matches style spec\n\nSuccess criteria:\n- Formats all citation types (book, journal, conference, web)\n- Output matches\
  \ citation style guide examples (test vs. official examples)\n- BibTeX output is valid (no unescaped special chars)\n\n\
  ---"
integration_points: "Once built, these tools should wire into:\n\n1. N01 Research Pipeline\n   - `cex_research.py` output\
  \ (src_*.md) → auto-extract citations → store in `N01_intelligence/research/citations/`\n\n2. N04 Knowledge Base\n   - Citation\
  \ validator flags new entities → suggest new KCs\n   - Citation formatter generates formatted references for KC outputs\n\
  \n3. Continuous Monitoring\n   - Nightly job: re-validate all citations in `.cex/P09_config/taxonomy_sources.yaml`\n   - Report\
  \ broken links + suggest archival (Wayback Machine) or removal\n\n4. Memory & Learning\n   - Track citation patterns per\
  \ domain (ML papers cite arXiv, management cite LinkedIn, etc.)\n   - Learn domain-specific citation formats for future\
  \ generation\n\n---"
conclusion: 'cex_web_fetch.py is 50% of the solution. It handles data ingestion. The missing 50% is data validation and formatting
  — transforming raw fetched content into trustworthy, reusable research artifacts. The 3-tool sequence (parser → validator
  → formatter) is a high-ROI pattern that will dramatically increase N01''s research output reliability and N04''s citation
  hygiene across the repo. Recommendation: Implement in order (1 → 2 → 3) with tests against real data (arXiv, DOI, GitHub)
  before wiring into research pipeline.'
