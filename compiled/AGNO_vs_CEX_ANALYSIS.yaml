9_conclus_o: 'Agno é melhor que CEX em runtime. Tem 11x mais código, 47 model providers, 129 tools, 22 vector DBs. É um SDK
  de produção maduro. CEX é melhor que Agno em design. Nenhum framework no mercado tem 99 tipos de builder com 13 documentos
  cada, pipeline de qualidade 8F, auto-evolução, ou sistema fractal 12P×7N. A estratégia correta é absorver, não substituir.
  CEX deve tratar Agno como um fornecedor de componentes de runtime — copiar os módulos que faltam, adaptá-los ao namespace
  CEX, e manter a camada de design/qualidade como diferencial competitivo. O resultado final: um sistema que PROJETA agentes
  com a profundidade do CEX e os EXECUTA com a maturidade do Agno. --- Análise gerada em 2026-04-01 por N01_intelligence.
  Fonte: https://github.com/agno-agi/agno (commit mais recente)'
