4_o_que_cex_faz_melhor_que_agno: ''
4_1_arquitetura_fractal_12p_7n: Agno tem `Agent`, `Team`, `Workflow` — flat. CEX tem 12 pillars × 7 nuclei, cada núcleo replicando
  toda a estrutura. Isso permite decomposição organizacional que Agno simplesmente não tem.
4_2_builder_system_99_kinds_13_isos: Agno cria agentes com ~20 linhas de config. CEX define 13 documentos por builder (system
  prompt, knowledge card, tools, schema, quality gate, memory, examples, architecture, collaboration, config, output template,
  instruction, manifest). Isso é design-time intelligence que Agno não oferece.
4_3_quality_pipeline_8f: Agno tem `BaseEval` com pre/post check — 2 pontos. CEX tem 8 funções obrigatórias (Constrain→Become→Inject→Reason→Call→Produce→Govern→Collaborate)
  com quality gates, retry loops, e scoring automatizado. Mais rigoroso.
4_4_auto_evolution: '`cex_evolve.py` implementa AutoResearch de Karpathy: pega um artefato, mede qualidade, gera variantes,
  mantém o melhor. Agno não tem nada parecido.'
4_5_brand_system: 6 ferramentas dedicadas (bootstrap, validate, propagate, audit, inject, ingest). Agno tem `CultureManager`
  experimental que não chega perto. ---
5_top_10_m_dulos_para_copiar_do_agno_cex: ''
5_1_model_provider_abstraction: "Onde: `agno/models/` (100 files, 18K lines)\nO que copiar: Pattern de `Model` base class\
  \ com `.invoke()` / `.ainvoke()`, response typing, metrics tracking.\nAdaptar para CEX: Criar `P02_model/providers/` com\
  \ wrappers tipados para cada provider. Substituir os `subprocess.run([\"claude\", ...])` atuais.\n\n# Pattern a absorver:\n\
  from agno.models.base import Model\nclass CEXModel(Model):\n    def invoke(self, messages, **kwargs) -> ModelResponse: ...\n\
  \    async def ainvoke(self, messages, **kwargs) -> ModelResponse: ..."
5_2_tool_registration_framework: 'Onde: `agno/tools/toolkit.py` + `agno/tools/function.py` O que copiar: O pattern de `Toolkit`
  como classe base + `Function` wrapper com type introspection + auto-schema generation. Adaptar para CEX: Criar `P04_tools/sdk/`
  — cada ferramenta CEX herda de `CEXToolkit`.'
5_3_mcp_integration: 'Onde: `agno/tools/mcp/` (MCPTools, MultiMCPTools) O que copiar: Client MCP que expõe ferramentas MCP
  como tools nativas. Adaptar para CEX: `P04_tools/mcp_bridge.py` — permite que builders CEX chamem qualquer servidor MCP.'
5_4_knowledge_readers: 'Onde: `agno/knowledge/reader/` (21 readers) O que copiar: Readers para PDF, DOCX, Web, YouTube, ArXiv,
  CSV, JSON, S3. Adaptar para CEX: `P01_knowledge/readers/` — ingestão de conhecimento externo para Knowledge Cards.'
5_5_vector_db_embeddings: 'Onde: `agno/vectordb/` (22 backends) + `agno/knowledge/embedder/` (19 providers) O que copiar:
  VectorDb base class + Embedder base class com `.search()` e `.embed()`. Adaptar para CEX: Substituir `cex_retriever.py`
  (TF-IDF) por vector search real. Manter TF-IDF como fallback zero-dep.'
5_6_guardrails: 'Onde: `agno/guardrails/` (PII, prompt injection, moderation) O que copiar: Inteiro — são 315 linhas, simples
  e eficazes. Adaptar para CEX: `P07_evals/guardrails/` — rodar como pre-check no F7 GOVERN.'
5_7_workflow_primitives: 'Onde: `agno/workflow/` (Step, Loop, Parallel, Condition, Router) O que copiar: Os tipos Step/Parallel/Loop/Condition/Router
  com state management. Adaptar para CEX: Enriquecer `cex_crew_runner.py` com essas primitivas. Manter 8F como orquestrador
  de alto nível, usar Agno workflows dentro de cada F.'
5_8_memory_manager_llm_powered: 'Onde: `agno/memory/manager.py` + `agno/learn/` O que copiar: LLM-powered memory extraction,
  6 tipos de store (user profile, entity, session, knowledge, decisions). Adaptar para CEX: Evoluir `cex_memory.py` de file-based
  para LLM-powered. Os 6 tipos mapeiam para dimensões CEX existentes.'
5_9_compression_manager: 'Onde: `agno/compression/manager.py` (283 lines) O que copiar: Tool result compression via LLM prompt.
  Adaptar para CEX: `_tools/cex_compress.py` — comprimir outputs longos antes de injetar no contexto.'
5_10_chunking_strategies: 'Onde: `agno/knowledge/chunking/` (9 estratégias) O que copiar: Semantic, recursive, code, markdown
  chunking. Adaptar para CEX: `P01_knowledge/chunking/` — usar para builder specs longos e knowledge cards. ---'
