id: ex-oauth-app-config-meli
kind: oauth_app_config
pillar: P04
title: Mercado Livre OAuth App Config
version: 0.1.0
quality: null
status: template
brand_placeholders:
- BRAND_MELI_CLIENT_ID
- BRAND_MELI_CLIENT_SECRET
