density_score: 1.0
identity: 'nucleus_id: "{{NUCLEUS_ID}}"          # n08, n09, n10 ... (sequential after N07)

  role_name: "{{ROLE_NAME}}"            # e.g., "sales", "legal", "research"

  sin_lens: "{{SIN_LENS}}"              # one of: envy, lust, pride, gluttony, wrath, greed, sloth

  sin_label: "{{SIN_LABEL}}"           # e.g., "Analytical Envy", "Creative Lust"

  model_tier: "{{MODEL_TIER}}"         # sonnet | opus | haiku

  model_id: "{{MODEL_ID}}"             # e.g., claude-sonnet-4-6

  context_window: {{CONTEXT_WINDOW}}   # 200000 | 1000000


  ---'
role_description: 'What this nucleus does:

  {{ROLE_DESCRIPTION}}


  What it does NOT do (boundary):

  {{ROLE_BOUNDARY}}


  When N07 dispatches to this nucleus:

  - {{DISPATCH_TRIGGER_1}}

  - {{DISPATCH_TRIGGER_2}}

  - {{DISPATCH_TRIGGER_3}}


  ---'
sin_lens_injection: 'The sin lens is the nucleus''s cultural DNA. It determines the optimization pressure

  applied to all ambiguous decisions.


  Sin: {{SIN_LENS}}

  Label: {{SIN_LABEL}}

  Optimizes for: {{SIN_OPTIMIZATION}}

  Under ambiguity, prefers: {{SIN_PREFERENCE}}

  Avoids: {{SIN_AVOIDANCE}}


  Sin lens examples from active nuclei:


  | Nucleus | Sin | Behavior under ambiguity |

  |---------|-----|--------------------------|

  | N01 | Analytical Envy | Chooses depth over speed; seeks more data |

  | N02 | Creative Lust | Chooses seduction over accuracy; tries bolder copy |

  | N03 | Inventive Pride | Chooses elegance over pragmatism; refactors |

  | N04 | Knowledge Gluttony | Ingests more sources; indexes deeper |

  | N05 | Gating Wrath | Fails fast; strict quality enforcement |

  | N06 | Strategic Greed | Maximizes revenue signal; monetizes edge cases |

  | N07 | Orchestrating Sloth | Delegates everything; orchestrates, never builds |


  ---'
primary_pillars: "primary_pillars:\n  - \"{{PRIMARY_PILLAR_1}}\"   # e.g., P01 -- where this nucleus produces most artifacts\n\
  \  - \"{{PRIMARY_PILLAR_2}}\"   # e.g., P07 -- secondary domain\nsecondary_pillars:\n  - \"{{SECONDARY_PILLAR_1}}\" # supported\
  \ but not primary\nreads_from:\n  - P01_knowledge             # all nuclei read P01 (KCs + context)\n  - P08_architecture\
  \          # all nuclei read P08 (agent cards + nucleus defs)\n\n---"
capabilities: ''
core_kinds_produced: '| Kind | Pillar | Frequency | Purpose |

  |------|--------|-----------|---------|

  | `{{KIND_1}}` | `{{PILLAR_1}}` | primary | {{KIND_1_PURPOSE}} |

  | `{{KIND_2}}` | `{{PILLAR_2}}` | primary | {{KIND_2_PURPOSE}} |

  | `{{KIND_3}}` | `{{PILLAR_3}}` | secondary | {{KIND_3_PURPOSE}} |'
tools_available: "tools:\n  - name: \"{{TOOL_1}}\"\n    purpose: \"{{TOOL_1_PURPOSE}}\"\n  - name: \"cex_8f_runner.py\"\n\
  \    purpose: \"8F pipeline execution\"\n  - name: \"cex_retriever.py\"\n    purpose: \"Artifact similarity search\"\n \
  \ - name: \"cex_compile.py\"\n    purpose: \"Artifact compilation\"\n\n---"
files_to_create: "The following files are required at minimum for a functional nucleus.\nCreate them in order (each depends\
  \ on the prior).\n\nN{{NUCLEUS_ID}}_{{ROLE_NAME}}/\n  rules/\n    n{{NUCLEUS_ID}}-{{ROLE_NAME}}.md          # 1. Identity\
  \ + 8F rules + routing\n  P08_architecture/\n    nucleus_def_n{{NUCLEUS_ID}}.md            # 2. This file (filled)\n   \
  \ agent_card_n{{NUCLEUS_ID}}.md             # 3. Deployment spec\n  P03_prompt/\n    system_prompt_n{{NUCLEUS_ID}}.md  \
  \        # 4. Voice + constraints + sin lens\n  P02_model/\n    agent_n{{NUCLEUS_ID}}.md                  # 5. Agent persona\
  \ definition\n  P10_memory/\n    memory_scope_n{{NUCLEUS_ID}}.md           # 6. What this nucleus remembers\n  P01_knowledge/\n\
  \    kc_{{ROLE_NAME}}_domain.md               # 7. Core domain knowledge card\n\nBoot script (required):\nboot/\n  n{{NUCLEUS_ID}}.ps1\
  \                        # 8. PowerShell boot wrapper\n\n---"
boot_script_template: "Save as `boot/n{{NUCLEUS_ID}}.ps1`:\n\n# N{{NUCLEUS_ID}} Boot -- {{SIN_LABEL}}\n# Model: {{MODEL_ID}}\
  \ | Context: {{CONTEXT_WINDOW}}\n\n$env:CEX_NUCLEUS = \"n{{NUCLEUS_ID}}\"\n$env:CEX_ROLE = \"{{ROLE_NAME}}\"\n$env:CEX_SIN\
  \ = \"{{SIN_LENS}}\"\n$env:CEX_MODEL = \"{{MODEL_ID}}\"\n\n# Load task from handoff file (never pass as CLI arg)\n$taskFile\
  \ = \".cex\\runtime\\handoffs\\n{{NUCLEUS_ID}}_task.md\"\nif (-not (Test-Path $taskFile)) {\n    Write-Error \"No handoff\
  \ found: $taskFile\"\n    exit 1\n}\n\n# Boot Claude with nucleus rules pre-loaded\nclaude --model $env:CEX_MODEL `\n  \
  \  --add-dir \"N{{NUCLEUS_ID}}_{{ROLE_NAME}}\" `\n    --system-prompt \"N{{NUCLEUS_ID}}_{{ROLE_NAME}}/P03_prompt/system_prompt_n{{NUCLEUS_ID}}.md\"\
  \n\n---"
nucleus_models_yaml_entry: "Add to `.cex/P09_config/nucleus_models.yaml`:\n\nn{{NUCLEUS_ID}}:\n  role: \"{{ROLE_NAME}}\"\n\
  \  sin_lens: \"{{SIN_LENS}}\"\n  model: \"{{MODEL_ID}}\"\n  context: {{CONTEXT_WINDOW}}\n  tier: \"{{MODEL_TIER}}\"\n  fallback_chain:\n\
  \    - claude\n    - gemini\n    - ollama\n  primary_pillars:\n    - \"{{PRIMARY_PILLAR_1}}\"\n    - \"{{PRIMARY_PILLAR_2}}\"\
  \n  boot_script: \"boot/n{{NUCLEUS_ID}}.ps1\"\n  agent_card: \"N{{NUCLEUS_ID}}_{{ROLE_NAME}}/P08_architecture/agent_card_n{{NUCLEUS_ID}}.md\"\
  \n\n---"
12_pillar_directory_structure: "Every nucleus inherits the N00 12-pillar structure.\nCreate these directories:\n\nN{{NUCLEUS_ID}}_{{ROLE_NAME}}/\n\
  \  P01_knowledge/       # facts, domain KCs, RAG sources\n  P02_model/           # agent definitions, model config\n  P03_prompt/\
  \          # system prompt, templates, chains\n  P04_tools/           # external tool wrappers\n  P05_output/          #\
  \ production artifacts (guides, pages)\n  P06_schema/          # data contracts, input validation\n  P07_evals/        \
  \   # quality gates, benchmarks, tests\n  P08_architecture/    # nucleus_def, agent_card, ADRs\n  P09_config/          #\
  \ runtime config, env, secrets\n  P10_memory/          # entity memory, session state\n  P11_feedback/        # quality\
  \ signals, compliance\n  P12_orchestration/   # workflows, crew templates\n  rules/               # nucleus identity rules\
  \ (n0X-*.md)\n  crews/               # composable crew templates\n  reports/             # analysis outputs\n\n---"
convention_over_configuration_variables: 'These variables are filled when instantiating from N00:


  | Variable | Example (N01) | Example (N04) | Description |

  |----------|---------------|---------------|-------------|

  | `{{NUCLEUS_ID}}` | `01` | `04` | Sequential ID after N00 |

  | `{{ROLE_NAME}}` | `intelligence` | `knowledge` | Nucleus operational role |

  | `{{SIN_LENS}}` | `envy` | `gluttony` | Cultural DNA sin |

  | `{{SIN_LABEL}}` | `Analytical Envy` | `Knowledge Gluttony` | Human-readable sin label |

  | `{{MODEL_ID}}` | `claude-sonnet-4-6` | `claude-sonnet-4-6` | LLM model identifier |

  | `{{MODEL_TIER}}` | `sonnet` | `sonnet` | Budget tier |

  | `{{CONTEXT_WINDOW}}` | `200000` | `200000` | Max token context |

  | `{{PRIMARY_PILLAR_1}}` | `P01` | `P01` | Main artifact pillar |

  | `{{PRIMARY_PILLAR_2}}` | `P07` | `P10` | Secondary pillar |


  ---'
quality_gate: 'Before a new nucleus is considered operational, it must pass:


  - [ ] `nucleus_def_n0X.md` exists and has all required fields

  - [ ] `agent_card_n0X.md` exists and references correct model

  - [ ] `system_prompt_n0X.md` contains sin lens injection

  - [ ] `rules/n0X-*.md` exists and defines routing rules

  - [ ] `boot/n0X.ps1` exists and boots successfully

  - [ ] First artifact produced scores >= 8.0

  - [ ] Registered in `nucleus_models.yaml`

  - [ ] `dispatch.sh solo n0X "test task"` succeeds


  # Validate new nucleus

  python _tools/cex_doctor.py --nucleus n0X

  python _tools/cex_setup_validator.py --check

  bash _spawn/dispatch.sh solo n0X "produce a test knowledge_card about your domain"


  ---'
