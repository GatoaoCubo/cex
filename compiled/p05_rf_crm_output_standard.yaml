  fetch\"]\n    data_discovery: \"2026-04-03\"\n    notas: \"Loja grande, aceita revenda\"\n\nsummary:\n  total_businesses:\
  \ 48\n  por_segmento:\n    pet_shop: 15\n    banho_tosa: 12\n    veterinario: 10\n    distribuidor: 3\n    hotel_pet: 5\n\
  \    outros: 3\n  por_potencial:\n    A: 12\n    B: 20\n    C: 16\n  taxa_contato_direto: 0.73\n  taxa_email: 0.52\n  taxa_website:\
