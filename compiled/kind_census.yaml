by_kind_top_25: 'TABLE length(rows) as "Count"

  FROM ""

  WHERE kind

  GROUP BY kind

  SORT length(rows) DESC

  LIMIT 25'
by_pillar: 'TABLE length(rows) as "Artifacts"

  FROM ""

  WHERE pillar

  GROUP BY pillar

  SORT pillar ASC'
by_nucleus_folder: 'TABLE length(rows) as "Artifacts"

  FROM "N01_intelligence" OR "N02_marketing" OR "N03_engineering" OR "N04_knowledge" OR "N05_operations" OR "N06_commercial"
  OR "N07_admin"

  WHERE kind

  GROUP BY regexreplace(file.folder, "/.*", "") as "Nucleus"

  SORT length(rows) DESC'
singleton_kinds_only_1_instance: 'TABLE length(rows) as "Count"

  FROM ""

  WHERE kind

  GROUP BY kind

  HAVING length(rows) = 1

  SORT kind ASC

  LIMIT 30'
