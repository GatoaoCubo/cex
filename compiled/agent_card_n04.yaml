  Routing TO N04: knowledge cards, RAG, embeddings, chunking, indexing, taxonomy, documentation, memory management, glossary,
  brain indexes, context docs, few-shot examples, entity memory, session state.


  Routing AWAY: research papers (N01), marketing copy (N02), build scaffold (N03), deploy/CI (N05), pricing/funnels (N06).


  N04 is the knowledge backbone of CEX. While N01 researches and N03 builds, N04 ingests, indexes, catalogs, and relates.
  Every fact that enters the system passes through N04''s domain -- from raw knowledge cards to the memory infrastructure
  that persists context across sessions.'
