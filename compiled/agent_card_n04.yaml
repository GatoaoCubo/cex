mcp_servers: '5 external services via `.mcp-n04.json`:


  | Server | Package | Purpose |

  |--------|---------|---------|

  | supabase | `@supabase/mcp-server-supabase` | Project management, schema ops, RLS policies, database admin |

  | postgres | `@anthropic/mcp-server-postgres` | Direct SQL queries against Supabase PostgreSQL -- migrations, bulk ops |

  | fetch | `mcp-server-fetch` | HTTP fetch -- retrieve web content, APIs, documentation for KC authoring |

  | firecrawl | `firecrawl-mcp` | Web crawling + scraping -- bulk content extraction, site ingestion |

  | notebooklm | `notebooklm-mcp` | NotebookLM content pipeline -- transform KCs into audio summaries, flashcards, quizzes
  |'
mcp_synergy_map: "firecrawl (crawl) --> knowledge_card (author) --> supabase/postgres (store)\n                          \
  \                             |\nfetch (enrich) -----> knowledge_card (update) --> notebooklm (transform)\n            \
  \                                           |\n                                                   audio_summary\n      \
  \                                             flashcards\n                                                   quiz\n\nN04\
  \ has the most MCP servers of any nucleus (5) because knowledge work requires both ingestion (firecrawl, fetch) and persistence\
  \ (supabase, postgres) plus transformation (notebooklm)."
my_strengths:
- 'Knowledge Card Factory: 8 core knowledge artifacts + 15 output deliverables. The heaviest output subdir of any nucleus
  capability. N04 can produce KC audits, gap reports, taxonomy maps, knowledge graphs, finetune datasets, SQL migrations,
  competitive intel, and curricula.'
- 'Schema Governance: 7 contracts define the structure for databases, embeddings, exports, freshness, KC structure, naming,
  and taxonomy. These contracts are the enforcement backbone -- every artifact that touches knowledge must conform.'
- 'Full RAG Stack: Covers the complete RAG pipeline end-to-end: embedding config -> chunk strategy -> retriever config ->
  rag source -> vectordb backend -> brain index. No other nucleus owns this chain.'
- 'Supabase Integration: Dedicated embedding config, dispatch rule, workflow, data layer tool, and KC for Supabase. Plus 2
  MCP servers (supabase + postgres) for direct database operations. This makes N04 the bridge between knowledge artifacts
  and persistent storage.'
- 'Memory Pillar Ownership: 8 kinds under P10 (knowledge_index through session_state) + 5 memory tools (select, update, types,
  age, core). N04 owns the memory lifecycle: creation, classification, decay, pruning, and summarization.'
- '5 MCP Servers: Most connected nucleus. Ingestion (firecrawl + fetch) -> storage (supabase + postgres) -> transformation
  (notebooklm). This pipeline turns raw web content into indexed, retrievable, transformable knowledge.'
- '20 Sub-Agent Definitions: Every domain kind has a dedicated builder agent in `.claude/P02_model/`, each loading 13 ISOs. This
  means N04 can dispatch specialized builders for any knowledge or memory artifact type.'
- 'P01 Library Depth: The P01 compiled directory holds 197 example artifacts -- the largest example corpus of any pillar.
  These serve as F3 injection sources for template-first construction.'
