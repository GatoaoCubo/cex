tldr: Directory-based business discovery batch — scrape industry-specific portals and local listings for contact data.
updated: '2026-04-13'
prerequisites: '1. `P05_output/p05_rf_crm_output_standard.md` — JSON output format

  2. `P06_schema/p06_val_business_contact_quality.md` — anti-fake validation

  3. Existing CRM data file (for dedup)


  ---'
directory_sources: '{{#DIRECTORY_SOURCES}}'
position_name_roi_tier: "URL: {{url}}\nMethod: {{method}}\n\n{{#cities}}\nScrape for: {{city_name}}, {{state}}\n{{/cities}}\n\
  \nExtract:\n  - Business name\n  - Full address\n  - Phone number\n  - Specialties / categories\n  - Rating (if available)\n\
  \  - Credentials (if available)\n\nWhy this source matters: {{rationale}}\n\n{{/DIRECTORY_SOURCES}}\n\n---"
fallback_generic_local_directories: 'If industry-specific directories don''t exist for your market:


  | Directory | Type | Coverage |

  |-----------|------|----------|

  | Google Business / Maps | Universal | Global |

  | TeleListas / Yellow Pages | Local listings | National |

  | City business registry | Municipal | Local |

  | Chamber of Commerce | Associations | Regional |


  ---'
data_extraction_schema: "For each contact found:\n\n{\n  \"nome_fantasia\": \"string (required)\",\n  \"endereco\": \"string\"\
  ,\n  \"cidade\": \"string (required)\",\n  \"uf\": \"string\",\n  \"telefone\": \"string (BR format: +55 XX XXXXX-XXXX)\"\
  ,\n  \"email\": \"string\",\n  \"website\": \"string\",\n  \"segmento\": \"string (required)\",\n  \"sub_segmento\": \"\
  string\",\n  \"fonte\": \"{{source_name}}\",\n  \"credenciais\": \"string\",\n  \"notas\": \"string\"\n}\n\n---"
quality_rules:
- Never fabricate — if a directory has no results, report zero (not invented data)
- Dedup before save — check name + city against existing CRM
- Phone format — validate Brazilian phone format (8 or 9 digits after DDD)
- At least 2 data points — name + city minimum; name + phone preferred
