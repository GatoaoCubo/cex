tldr: Reputation enrichment + professional registry discovery — add quality signals and discover regulated businesses.
updated: '2026-04-13'
prerequisites: '1. `P05_output/p05_rf_crm_output_standard.md` — JSON output format

  2. `P06_schema/p06_val_business_contact_quality.md` — anti-fake validation

  3. Existing CRM data file (enrichment target + dedup)


  ---'
objective: 'Two functions:

  1. Discovery: Find new businesses via professional registries and regulatory databases

  2. Enrichment: Add reputation data to existing contacts (reviews, ratings, complaints)


  ---'
source_1_review_platforms_enrichment: '{{#REVIEW_SOURCES}}'
name: "For top {{batch_size | default: '50'}} existing contacts (with business name):\n  SERPER: site:{{domain}} \"{{business_name}}\"\
  \n\nIf page found:\n  FIRECRAWL: {{result_url}}\n\n  Extract:\n    - Overall score ({{score_range}})\n    - Response rate\
  \ (%)\n    - Return rate (% would do business again)\n    - Complaint count (last 12 months)\n    - Status: {{status_labels}}\n\
  \nNo listing = positive signal for small businesses — means they're small/local without complaint volume. Mark as: `review_status:\
  \ \"no_listing\"`.\n\n{{/REVIEW_SOURCES}}\n\n---"
source_2_professional_registries_discovery: '{{#PROFESSIONAL_REGISTRY}}'
name_acronym: "{{#queries}}\nSERPER: site:{{domain}} \"{{search_term}}\" \"{{city}}\"\nEXA: \"{{registry_name}} {{INDUSTRY}}\
  \ {{city}}\"\n{{/queries}}\n\nFIRECRAWL: {{public_lookup_url}} (public consultation section)\n\nExtract:\n  - Business name\n\
  \  - Registration number\n  - Address\n  - Specialty / license type\n  - Active status\n\n{{/PROFESSIONAL_REGISTRY}}\n\n\
  ---"
source_3_business_intelligence_platforms: '| Platform | Type | Data Available |

  |----------|------|----------------|

  | {{PLATFORMS.business_intel_1 | default: ''Econodata''}} | B2B intelligence | Company size, revenue range, employees |

  | {{PLATFORMS.business_intel_2 | default: ''LinkedIn Sales Navigator''}} | Professional network | Decision makers, company
  info |


  ---'
data_schema_enrichment_fields: "{\n  \"review_source\": \"string\",\n  \"review_score\": \"float\",\n  \"review_response_rate\"\
  : \"float (0-1)\",\n  \"review_complaint_count\": \"integer\",\n  \"review_status\": \"string (excellent|good|regular|poor|no_listing)\"\
  ,\n  \"professional_registry\": \"string (registry name)\",\n  \"registry_number\": \"string\",\n  \"registry_active\":\
  \ \"boolean\",\n  \"registry_specialty\": \"string\"\n}\n\n---"
quality_rules:
- Match by normalized name — fuzzy match OK (Levenshtein < 3)
- Enrichment only — don't overwrite existing verified data
- 'Min rating filter: only flag contacts with score < {{MIN_RATING | default: ''3.0''}} for review'
- Registry = high trust — contacts found via professional registry get trust boost
