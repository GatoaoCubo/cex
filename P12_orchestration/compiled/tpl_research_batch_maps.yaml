tldr: Maps-based business discovery — systematic category × city matrix via Google Maps or equivalent provider.
updated: '2026-04-13'
prerequisites: '1. `P05_output/p05_rf_crm_output_standard.md` — JSON output format

  2. `P06_schema/p06_val_business_contact_quality.md` — anti-fake validation

  3. Existing CRM data file (for dedup)


  ---'
objective: 'Sweep {{MAPS_PROVIDER | default: ''Google Maps/Business Profile''}} by CATEGORY × CITY matrix to discover businesses
  not found in other sources. Maps data is often the most complete for phone, rating, reviews, hours, and exact coordinates.


  ---'
category_city_matrix: ''
categories_to_search: '{{#CATEGORIES}}

  | # | Category | Aliases |

  |---|----------|---------|

  {{#each}}

  | {{position}} | "{{primary}}" | {{aliases}} |

  {{/each}}

  {{/CATEGORIES}}'
cities_sweep_all: '{{#CITIES}}

  | City | State | Priority |

  |------|-------|:--------:|

  {{#each}}

  | {{name}} | {{state}} | {{priority}} |

  {{/each}}

  {{/CITIES}}'
query_format: 'SERPER: "{{category}}" near "{{city}}" {{state}}

  SERPER: "{{category}}" "{{city}}" phone hours


  Or with radius:


  SERPER: "{{category}}" within {{RADIUS_KM | default: ''15''}}km of "{{center_city}}"


  ---'
data_extraction_per_result: "{\n  \"nome_fantasia\": \"string (required)\",\n  \"endereco\": \"string (full address from Maps)\"\
  ,\n  \"cidade\": \"string (required)\",\n  \"uf\": \"string\",\n  \"telefone\": \"string\",\n  \"google_rating\": \"float\
  \ (1.0-5.0)\",\n  \"google_reviews\": \"integer\",\n  \"horario\": \"string (business hours)\",\n  \"google_maps_url\":\
  \ \"string\",\n  \"lat\": \"float\",\n  \"lng\": \"float\",\n  \"segmento\": \"string (required)\",\n  \"fonte\": \"google_maps\"\
  \n}\n\n---"
priority_rules:
- 'High-value signals: phone, coordinates, rating > 4.0, reviews > 10'
- 'Skip chains: if a national chain has 100+ locations, mark as `chain: true`'
- 'Dedup: match on normalized name + city before merge'
- 'Coordinates: always capture lat/lng for dashboard mapping'
