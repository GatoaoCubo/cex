tldr: Marketplace business discovery — find digitally active sellers via iFood, Rappi, Mercado Livre, Shopee, etc.
updated: '2026-04-13'
prerequisites: '1. `P05_output/p05_rf_crm_output_standard.md` — JSON output format

  2. `P06_schema/p06_val_business_contact_quality.md` — anti-fake validation

  3. Existing CRM data file (for dedup)


  ---'
objective: Find {{INDUSTRY}} businesses selling via delivery and marketplace platforms in {{REGION}}. These are the most digitally
  active prospects — they already sell online, understand e-commerce, and have operational infrastructure. ---
marketplace_sources: '{{#MARKETPLACES}}'
position_name: "{{#queries}}\nSERPER: site:{{domain}} \"{{search_term}}\" \"{{city}}\"\n{{/queries}}\n\n{{#scrape_urls}}\n\
  FIRECRAWL: {{url}}\n{{/scrape_urls}}\n\nExtract:\n  - Seller/store name\n  - Address (if listed)\n  - Rating / reviews on\
  \ platform\n  - Product category\n  - Delivery availability\n  - Price range signal\n\nWhy this matters: {{rationale}}\n\
  \n{{/MARKETPLACES}}\n\n---"
generic_marketplace_template: 'If your market doesn''t have the specific marketplaces above:


  | Platform Type | Examples | Value Signal |

  |--------------|----------|-------------|

  | Food/delivery | iFood, Rappi, UberEats, DoorDash | Active operations, delivery infrastructure |

  | E-commerce | Amazon, Mercado Livre, Shopee, Etsy | Digital maturity, pricing data |

  | Classifieds | OLX, Craiglist, Gumtree | Informal businesses, local reach |

  | Specialized | Industry-specific platforms | Niche authority |


  ---'
data_schema: "{\n  \"nome_fantasia\": \"string (store name on platform)\",\n  \"cidade\": \"string\",\n  \"uf\": \"string\"\
  ,\n  \"marketplace\": \"string (platform name)\",\n  \"marketplace_url\": \"string\",\n  \"rating_marketplace\": \"float\"\
  ,\n  \"reviews_marketplace\": \"integer\",\n  \"categorias\": [\"string\"],\n  \"faixa_preco\": \"string (low/medium/high)\"\
  ,\n  \"delivery\": \"boolean\",\n  \"segmento\": \"string\",\n  \"fonte\": \"{{marketplace_name}}\",\n  \"digital_maturity\"\
  : \"high\"\n}\n\n---"
quality_rules:
- Local sellers only — filter out national chains and dropshippers
- Active listings — must have recent (< 30 days) activity
- Location verification — confirm city matches target region
- Cross-reference — check if seller exists in other batches (dedup)
