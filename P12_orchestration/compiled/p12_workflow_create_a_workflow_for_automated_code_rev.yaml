id: p12_wf_automated_code_review
kind: workflow
pillar: P12
version: 1.0.0
created: '2024-12-28'
updated: '2024-12-28'
author: workflow-builder
title: Automated Code Review Workflow
steps_count: 6
execution: mixed
agent_nodes:
- code_analyzer
- security_scanner
- reviewer_consolidator
timeout: 1800
retry_policy: per_step
depends_on:
- git_diff_available
signals:
- 'On step complete: agent-specific completion signals with quality scores'
- 'On workflow complete: review_complete signal with final report path'
- 'On error: retry failed step once, then skip with partial results'
spawn_configs:
- p12_spawn_analyzer_solo
- p12_spawn_security_solo
- p12_spawn_reviewer_solo
domain: code_quality
quality: null
tags:
- workflow
- code-review
- security
- quality-assurance
tldr: '6-step mixed workflow: parallel analysis + security scan, sequential consolidation with quality gates'
density_score: 0.88
purpose: Orchestrates comprehensive automated code review through parallel analysis phases followed by sequential consolidation.
  Combines code structure analysis, security scanning, and style checking with human-readable feedback generation.
steps: ''
step_1_code_structure_analysis_code_analyzer:
- 'Agent: code_analyzer (claude-3-sonnet)'
- 'Action: Analyze code structure, architecture patterns, and logic flow'
- 'Input: git diff from pull request'
- 'Output: structured analysis with complexity metrics and architecture feedback'
- 'Signal: code_analysis_complete'
- 'Depends on: none'
step_2_security_vulnerability_scan_security_scanner:
- 'Agent: security_scanner (claude-3-sonnet)'
- 'Action: Scan for security vulnerabilities, injection risks, authentication issues'
- 'Input: git diff from pull request'
- 'Output: security report with severity levels and remediation suggestions'
- 'Signal: security_scan_complete'
- 'Depends on: none'
step_3_style_and_standards_check_code_analyzer:
- 'Agent: code_analyzer (claude-3-sonnet)'
- 'Action: Check code style, naming conventions, documentation completeness'
- 'Input: git diff from pull request'
- 'Output: style violations report with formatting suggestions'
- 'Signal: style_check_complete'
- 'Depends on: none'
step_4_logic_review_reviewer_consolidator:
- 'Agent: reviewer_consolidator (claude-3-opus)'
- 'Action: Deep logic review using outputs from parallel analysis steps'
- 'Input: code analysis + security report + style report from Steps 1-3'
- 'Output: logic assessment with performance and maintainability feedback'
- 'Signal: logic_review_complete'
- 'Depends on: Steps 1, 2, 3'
step_5_priority_assessment_reviewer_consolidator:
- 'Agent: reviewer_consolidator (claude-3-opus)'
- 'Action: Prioritize all findings by severity and impact'
- 'Input: logic assessment from Step 4'
- 'Output: prioritized issue list with recommended action items'
- 'Signal: priority_assessment_complete'
- 'Depends on: Step 4'
step_6_generate_review_report_reviewer_consolidator:
- 'Agent: reviewer_consolidator (claude-3-opus)'
- 'Action: Consolidate all findings into human-readable review report'
- 'Input: prioritized issues from Step 5'
- 'Output: final review report with executive summary and detailed findings'
- 'Signal: review_complete'
- 'Depends on: Step 5'
dependencies:
- git diff must be available for the target pull request
- spawn configs for analyzer, security scanner, and consolidator agents must exist
