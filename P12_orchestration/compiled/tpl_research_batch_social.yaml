tldr: Social media business discovery — find informal and micro businesses via hashtag mining and profile scraping.
updated: '2026-04-13'
prerequisites: '1. `P05_output/p05_rf_crm_output_standard.md` — JSON output format

  2. `P06_schema/p06_val_business_contact_quality.md` — anti-fake validation

  3. Existing CRM data file (for dedup)


  ---'
objective: 'Discover informal and micro businesses that don''t appear in formal directories: home-based services, independent
  professionals, micro-entrepreneurs. Social media is where these businesses live. ---'
platform_1_instagram_hashtag_mining: ''
hashtag_matrix_by_city: '{{#CITIES}}

  #### {{name}}


  {{#hashtags}}

  site:instagram.com {{tag}}

  {{/hashtags}}

  {{/CITIES}}


  #### Region-wide


  {{#HASHTAGS.regional}}

  site:instagram.com {{tag}}

  {{/HASHTAGS.regional}}'
per_profile_found: "IF public profile:\n  - Display name (business name)\n  - Bio → extract phone/WhatsApp/address/link\n\
  \  - City from bio or posts\n  - Category (if business profile)\n  - Follower count (influence signal)\n  - Post frequency\
  \ (activity signal)\n\n---"
platform_2_facebook_pages_groups: ''
search_strategy: '{{#CITIES}}

  SERPER: site:facebook.com "{{INDUSTRY}}" "{{city_name}}"

  SERPER: site:facebook.com/pages "{{INDUSTRY}}" "{{city_name}}"

  {{/CITIES}}'
groups_discovery_only_don_t_scrape_members: 'SERPER: site:facebook.com/groups "{{INDUSTRY}}" "{{REGION}}"


  Look for businesses that post in groups (self-promotion = active business).


  ---'
platform_3_linkedin_b2b_variant: '{{#CITIES}}

  SERPER: site:linkedin.com/company "{{INDUSTRY}}" "{{city_name}}"

  {{/CITIES}}


  ---'
data_schema: "{\n  \"nome_fantasia\": \"string (display name)\",\n  \"cidade\": \"string (from bio/posts)\",\n  \"uf\": \"\
  string\",\n  \"telefone\": \"string (from bio)\",\n  \"whatsapp\": \"string (from bio link)\",\n  \"instagram\": \"string\
  \ (@handle)\",\n  \"facebook\": \"string (page URL)\",\n  \"website\": \"string (from bio link)\",\n  \"segmento\": \"string\"\
  ,\n  \"sub_segmento\": \"string\",\n  \"porte\": \"MEI | micro | pequeno\",\n  \"fonte\": \"instagram | facebook | linkedin\"\
  ,\n  \"notas\": \"string (activity notes)\"\n}\n\n---"
quality_rules:
- Business profiles only — skip personal accounts
- Active in last 90 days — check last post date
- Location confirmed — city must be verifiable from bio/posts
- No DM scraping — public data only
