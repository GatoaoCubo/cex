prerequisites: '1. `P05_output/p05_rf_crm_output_standard.md` — JSON output format

  2. `P06_schema/p06_val_business_contact_quality.md` — anti-fake validation

  3. Existing CRM data file (for dedup)


  ---'
objective: Systematic sweep of business classification code × city combinations via government and open-data registries. This
  catches formally registered businesses that may not have online presence. ---
business_classification_codes: ''
brazil_cnae: '{{#CNAE_CODES}}

  | CNAE | Description | Segment |

  |------|-------------|---------|

  {{#each}}

  | {{code}} | {{description}} | `{{segment}}` |

  {{/each}}

  {{/CNAE_CODES}}'
usa_naics_if_applicable: '{{#NAICS_CODES}}

  | NAICS | Description | Segment |

  |-------|-------------|---------|

  {{#each}}

  | {{code}} | {{description}} | `{{segment}}` |

  {{/each}}

  {{/NAICS_CODES}}'
eu_nace_uk_sic_if_applicable: '{{#SIC_CODES}}

  | Code | Description | Segment |

  |------|-------------|---------|

  {{#each}}

  | {{code}} | {{description}} | `{{segment}}` |

  {{/each}}

  {{/SIC_CODES}}


  ---'
cities_to_sweep: '{{#CITIES}}

  | City | Priority | Current Contacts |

  |------|:--------:|:----------------:|

  {{#each}}

  | {{name}} | {{priority}} | {{current_count}} |

  {{/each}}

  {{/CITIES}}


  ---'
systematic_method_per_code_city: "Step 1: Open Data Registry\n  {{LEGAL_SOURCES.primary}} → search by code + city + status=ACTIVE\n\
  \nStep 2: Backup Registry\n  {{LEGAL_SOURCES.secondary}} → cross-reference\n\nStep 3: Validate\n  {{LEGAL_SOURCES.validation}}\
  \ → confirm active status\n\nFor each result:\n  Extract:\n    - Legal name (razão social)\n    - Trade name (nome fantasia)\n\
  \    - Tax ID (CNPJ / EIN / VAT)\n    - Classification code\n    - Status (active/inactive)\n    - Address\n    - Start\
  \ date\n    - Legal form (MEI, LLC, Corp, etc.)\n\n---"
data_schema: "{\n  \"razao_social\": \"string\",\n  \"nome_fantasia\": \"string\",\n  \"cnpj\": \"string (or tax_id)\",\n\
  \  \"cnae_principal\": \"string (or classification_code)\",\n  \"situacao\": \"ATIVA\",\n  \"endereco\": \"string\",\n \
  \ \"cidade\": \"string (required)\",\n  \"uf\": \"string\",\n  \"data_abertura\": \"string (YYYY-MM-DD)\",\n  \"natureza_juridica\"\
  : \"string\",\n  \"porte\": \"MEI | ME | EPP | medium | large\",\n  \"segmento\": \"string (derived from code)\",\n  \"\
  fonte\": \"{{registry_name}}\"\n}\n\n---"
quality_rules:
- Active only — skip dissolved/suspended businesses
- Dedup on tax ID — unique identifier prevents duplicates
- Cross-reference — merge with existing contacts by name+city
- Recency — flag businesses opened < 1 year (may not be operational yet)
