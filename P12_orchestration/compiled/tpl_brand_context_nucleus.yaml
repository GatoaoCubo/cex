source_cex_brand_brand_config_yaml: "| Variable | Description | Example Value | Data Type | Usage Context |\n|---------|-------------|----------------|-----------|----------------|\n\
  | BRAND_CATEGORY | Core industry classification | \"Premium Eco-Fashion\" | String | N01, N02, N06 |\n| BRAND_COMPETITORS\
  \ | Direct/indirect competitors | \"Zara, Patagonia, H&M\" | List | N01, N06 |\n| BRAND_CONTENT_PILLARS | Core messaging\
  \ themes | \"Sustainability, Innovation, Craftsmanship\" | List | N02, N03, N04 |\n| BRAND_ICP | Ideal customer profile\
  \ | \"Age 25-40, urban, eco-conscious\" | String | N02, N06, N05 |\n| BRAND_ICP_LOCATION | Geographic focus | \"North America,\
  \ EU, APAC\" | List | N01, N06 |\n| BRAND_ICP_VALUES | Customer-aligned values | \"Ethical sourcing, transparency\" | List\
  \ | N02, N04 |\n| BRAND_MISSION | Organizational purpose | \"Empower sustainable living through fashion\" | String | N04,\
  \ N07 |\n| BRAND_NAME | Official brand identifier | \"Verde Threads\" | String | All nuclei |\n| BRAND_PERSONALITY | Tone\
  \ descriptors | \"Authentic, forward-thinking, community-driven\" | List | N02, N03 |\n| BRAND_REGION | Primary market region\
  \ | \"Global\" | String | N01, N06 |\n| BRAND_TAGLINE | Short brand slogan | \"Wear the Future\" | String | N02, N03 |\n\
  | BRAND_VALUES | Internal guiding principles | \"Sustainability, Integrity, Innovation\" | List | N04, N07 |\n| BRAND_VISION\
  \ | Long-term aspiration | \"Lead the sustainable fashion revolution\" | String | N04, N07 |\n| BRAND_VOICE_TONE | Communication\
  \ style | \"Conversational, informative, aspirational\" | List | N02, N03 |\n\nExpanded Contextual Examples  \n- N01 Research:\
  \ BRAND_COMPETITORS data feeds competitive benchmarking for market positioning analysis  \n- N02 Marketing: BRAND_VOICE_TONE\
  \ parameters control AI-generated content for social media campaigns  \n- N03 Builder: BRAND_CONTENT_PILLARS dictate visual\
  \ identity guidelines for artifact templates  \n- N04 Knowledge: BRAND_VALUES are embedded in technical documentation for\
  \ product teams  \n- N06 Commercial: BRAND_ICP_LOCATION data shapes regional pricing strategies"
nucleus_specific_notes: "Nucleus: {{NUCLEUS_ID}} — {{NUCLEUS_NAME}}\n\nThis context shapes how {{NUCLEUS_ID}} interprets brand-related\
  \ tasks:\n- Research (N01): Use brand context to scope competitive analysis and market research  \n- Marketing (N02): Use\
  \ voice/tone/personality to generate on-brand copy  \n- Builder (N03): Use visual identity and content pillars for artifact\
  \ design  \n- Knowledge (N04): Use brand terminology and values for documentation  \n- Operations (N05): Use brand constraints\
  \ for technical decisions  \n- Commercial (N06): Use ICP and competitors for strategy  \n- Admin (N07): Use full context\
  \ for orchestration decisions  \n\nImplementation Workflow  \n1. Config Validation: brand_config.yaml must contain all 14\
  \ variables  \n2. Injection Process: brand_propagate.py maps variables to nucleus-specific templates  \n3. Usage Examples:\
  \  \n   - N02: {{BRAND_VOICE_TONE}} → \"Conversational, informative\" → Social media captions  \n   - N03: {{BRAND_CONTENT_PILLARS}}\
  \ → \"Sustainability, Innovation\" → Design system themes  \n   - N06: {{BRAND_ICP}} → \"Age 25-40, urban\" → Customer segmentation\
  \ models"
boundary: This artifact IS an auto-generated configuration template for brand context injection across nuclei. It IS NOT a
  brand strategy document, marketing plan, or legal compliance file. It exists solely to propagate brand parameters to nucleus-specific
  implementations.
