implementation_best_practices: "1. Version Control: Track changes to brand_config.yaml with Git to maintain audit trails \
  \ \n2. Validation Checks: Implement schema validation for all 14 variables before injection  \n3. Localization: Use BRAND_REGION\
  \ to create region-specific variants of this template  \n4. Audit Trails: Maintain a change log for each nucleus-specific\
  \ injection  \n5. Error Handling: Define fallback values for missing variables in brand_config.yaml  \n\nSample Injection\
  \ Output for N02 (Marketing)  \nBRAND_VOICE_TONE: \"Conversational, informative\"\nBRAND_CONTENT_PILLARS: [\"Sustainability\"\
  , \"Innovation\"]\nBRAND_ICP: \"Age 25-40, urban, eco-conscious\"\n\nSample Injection Output for N03 (Builder)  \nBRAND_CONTENT_PILLARS:\
  \ [\"Sustainability\", \"Innovation\"]\nBRAND_PERSONALITY: [\"Authentic\", \"Forward-thinking\"]\nBRAND_REGION: \"Global\"\
  \n\nSample Injection Output for N06 (Commercial)  \nBRAND_ICP: \"Age 25-40, urban, eco-conscious\"\nBRAND_COMPETITORS: [\"\
  Zara\", \"Patagonia\", \"H&M\"]\nBRAND_REGION: \"North America, EU, APAC\""
technical_constraints:
- 'Variable Types: All variables must be strings or lists (no nested objects)'
- 'Length Limits: BRAND_TAGLINE ≤ 20 characters, BRAND_MISSION ≤ 150 characters'
- 'Encoding: UTF-8 required for all text values'
- 'Dependencies: Requires brand_config.yaml to be in .cex/brand/ directory'
- 'Caching: Injection results are cached in .cex/nucleus/{NUCLEUS_ID}/brand_context.yaml'
error_handling:
- 'Missing Variables: Fallback to "Undefined" in generated templates'
- 'Invalid Types: Convert numbers to strings, booleans to "true"/"false"'
- 'Encoding Errors: Substitute invalid characters with [REDACTED]'
- 'Circular References: Break on detected loops in dependency graph'
- 'Version Mismatch: Log warning if brand_config.yaml is older than 3 months'
