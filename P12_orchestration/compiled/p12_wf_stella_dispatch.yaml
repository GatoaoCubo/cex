tldr: 'STELLA''s mandatory 5-phase dispatch: CLARIFY > ENRICH > COMPOSE > EXECUTE > MONITOR — orchestrates without executing'
density_score: 0.93
timeout: 60 min
source: codexa-core/.claude/rules/STELLA_RULES.md
overview: '| Property | Value |

  |----------|-------|

  | Trigger | User requests any task in STELLA terminal |

  | Input | User task description (natural language) |

  | Output | Completed satellite work (commits + signals) |

  | Timeout | 60 min (varies by satellite count) |'
steps: "[CLARIFY] --> [ENRICH] --> [COMPOSE] --> [EXECUTE] --> [MONITOR]\n                 |                           |\n\
  \            [brain_query]              [spawn_solo/grid]"
step_1_clarify:
- 'Input: User request (natural language)'
- 'Action: Decompose into satellite tasks. Present table: satellite, task, model. Ask "Confirma? (sim/ajustar)"'
- 'Output: Approved task decomposition (1 satellite = 1 deliverable, max 3 tasks per sat)'
- 'Duration: 1-2 min'
step_2_enrich:
- 'Input: Approved task list'
- 'Action: `brain_query("[domain] [keywords]")` per satellite. Generate 5-10 seed words per handoff. Identify scope fence
  (SOMENTE/NAO TOQUE)'
- 'Output: Context map with agents, artifacts, seeds per satellite'
- 'Duration: 1-3 min'
step_3_compose:
- 'Input: Enriched context per satellite'
- 'Action: Write `.claude/handoffs/{MISSION}_{sat}.md` with CONTEXTO, SEEDS, TAREFAS, SCOPE FENCE, COMMIT template, SIGNAL
  command'
- 'Output: Handoff files on disk (1 per satellite, or `batch_{N}` for >6 tasks)'
- 'Duration: 2-5 min'
step_4_execute:
- 'Input: Handoff files'
- 'Action: `spawn_solo.ps1` (1 sat) or `spawn_grid.ps1` (multi-sat, auto-detects static vs continuous)'
- 'Output: Running satellite terminals'
- 'Duration: 5-30 min (satellite work time)'
step_5_monitor:
- 'Input: Running satellites'
- 'Action: Check `.claude/signals/complete.json`, `git log --oneline -10`, `spawn_stop.ps1` when done'
- 'Output: Consolidated report, archived handoffs, git push'
- 'Duration: 2-5 min'
parallel_groups: '| Group | Steps | Max Concurrent |

  |-------|-------|----------------|

  | Satellite execution | Step 4 | 3 (BSOD limit at 4) |'
rollback: '| Step | Rollback Action |

  |------|-----------------|

  | COMPOSE | Delete handoff files from `.claude/handoffs/` |

  | EXECUTE | `spawn_stop.ps1` to kill satellite terminals |'
success_criteria: '- All satellite signals received with score >= 8.0

  - All commits present in `git log`

  - Zero orphaned terminals after MONITOR


