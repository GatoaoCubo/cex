id: p12_crew_agent_node_grid
kind: crew
pillar: P12
description: Multi-agent_node crew configuration for parallel task execution via spawn_grid
version: 1.0.0
created: 2026-03-25
author: stella
quality: 9.0
tags:
- crew
- multi-agent
- grid
- parallel
- orchestration
purpose: Defines how N agent_nodes collaborate on a mission. The crew is NOT the agents — it is the PROTOCOL that coordinates
  them.
configuration: "crew:\n  name: \"GENESIS\"\n  coordinator: orchestrator\n  protocol: parallel_grid\n  \n  members:\n    - agent_node:\
  \ research_agent\n      role: researcher\n      model: sonnet\n      tasks_from: \".claude/handoffs/GENESIS_batch_*_shaka.md\"\n\
  \    - agent_node: builder_agent\n      role: builder\n      model: opus\n      tasks_from: \".claude/handoffs/GENESIS_batch_*_edison.md\"\
  \n    - agent_node: knowledge_agent\n      role: knowledge\n      model: sonnet\n      tasks_from: \".claude/handoffs/GENESIS_batch_*_pytha.md\"\
  \n\n  coordination:\n    max_parallel: 6\n    mode: continuous  # static | continuous\n    shared_state: git_repo  # all\
  \ read/write same repo\n    conflict_resolution: file_isolation  # each agent_node edits different files\n    \n  lifecycle:\n\
  \    spawn: \"spawn_grid.ps1 -mission GENESIS -mode continuous\"\n    monitor: \"spawn_monitor.ps1 (30s poll)\"\n    completion:\
  \ \"all signals received\"\n    cleanup: \"spawn_stop.ps1 + archive handoffs\"\n\n  termination:\n    condition: all_signals_complete\n\
  \    timeout: 60m\n    on_stuck: escalate_to_stella"
the_crew_is_a_fractal_of_12_lps: 'A crew instantiates ALL 12 LPs at the group level: P01=shared pool, P02=N agent_nodes, P03=mission
  goal, P04=shared MCPs, P06=file isolation contract, P07=quality gates, P09=grid config, P10=shared git state, P11=monitor
  watchdog, P12=signal protocol.'
