tldr: '11-node video DAG: longform→script→scenes→parallel(TTS+visuals+music)→assemble→brand→render variants→export'
execution_order:
- - receive_longform
- - extract_script
- - segment_scenes
- - generate_voiceover
  - generate_visuals
  - generate_music
- - assemble_video
- - add_branding
- - render_variants
- - quality_check
- - export
parallel_groups:
- 'Wave 1: receive_longform'
- 'Wave 2: extract_script'
- 'Wave 3: segment_scenes'
- 'Wave 4: generate_voiceover, generate_visuals, generate_music (max parallelism = 3)'
- 'Wave 5: assemble_video (join barrier — waits for all 3)'
- 'Wave 6: add_branding'
- 'Wave 7: render_variants'
- 'Wave 8: quality_check'
- 'Wave 9: export'
critical_path: receive_longform (1min) → extract_script (8min) → segment_scenes (5min) → generate_visuals (12min) → assemble_video
  (8min) → add_branding (3min) → render_variants (5min) → quality_check (2min) → export (1min) = 45min
