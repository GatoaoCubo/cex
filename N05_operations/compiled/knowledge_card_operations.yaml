tldr: Distilled doctrine for operational work where code review, tests, debugging, CI/CD, deployment, and monitoring must
  be grounded in evidence.
when_to_use: When the request requires repository execution, release gating, runtime diagnosis, pipeline repair, or deployment-safe
  validation.
