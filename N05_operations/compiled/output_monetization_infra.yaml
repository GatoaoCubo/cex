download_version_management: "# _tools/cex_model_version.py\ndef check_model_updates():\n    \"\"\"Check for cex-brain model\
  \ updates.\"\"\"\n    current_version = get_local_model_version()\n    latest_version = get_remote_model_version()\n   \
  \ \n    if latest_version > current_version:\n        print(f\"\U0001F504 cex-brain update available: {latest_version}\"\
  )\n        print(\"Run: cex_license.py --update\")\n        return True\n    return False\n\ndef update_model():\n    \"\
  \"\"Download latest model without breaking existing installs.\"\"\"\n    # Download to temp location\n    download_model_version(get_remote_model_version(),\
  \ temp=True)\n    \n    # Backup current model\n    backup_current_model()\n    \n    # Atomic swap\n    os.rename(\"~/.cex/models/cex-brain-14b.gguf.new\"\
  , \n              \"~/.cex/models/cex-brain-14b.gguf\")\n    \n    # Update Ollama\n    os.system(\"ollama rm cex-brain\
  \ && ollama create cex-brain -f ~/.cex/models/Modelfile\")"
