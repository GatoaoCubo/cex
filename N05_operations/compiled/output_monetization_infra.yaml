5_monitoring_analytics: ''
github_metrics_free: "# _tools/cex_analytics.py\nimport requests\n\ndef get_github_metrics():\n    \"\"\"Fetch GitHub repo\
  \ analytics.\"\"\"\n    \n    response = requests.get(\n        \"https://api.github.com/repos/cex-org/cex\",\n        headers={\"\
  Authorization\": f\"token {os.getenv('GITHUB_TOKEN')}\"}\n    )\n    \n    data = response.json()\n    return {\n      \
