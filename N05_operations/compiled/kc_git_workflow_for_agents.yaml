id: kc_git_workflow_for_agents
kind: knowledge_card
title: Git Workflow for Autonomous Agents
version: 1.0.0
quality: 9.2
pillar: P01
language: en
auto_commits: 'Autonomous agents should auto-commit changes with:

  - Timestamp-based commit messages (`[AUTO] <timestamp>`)

  - Hash-based branch tracking (`origin/feature/<hash>`)

  - Automatic staging of all modified files'
branch_strategies: 'Use feature branches for isolated development:

  1. `git checkout -b feature/<purpose>`

  2. `git push --set-upstream origin feature/<purpose>`

  3. Merge with `git merge --no-ff feature/<purpose>`'
conflict_resolution: 'Resolve conflicts using:

  1. `git merge --no-ff` for linear history

  2. `git merge --no-ff -X recursive` for complex merges

  3. Manual resolution with `git mergetool`'
commit_message_conventions: 'Follow conventional commits:

  <type>(<scope>): <description>

  <type>: <description>

  Types: feat, fix, docs, style, refactor, test, chore'
pre_commit_hooks: 'Implement pre-commit checks with:

  1. Linting: `husky pre-commit` with ESLint/Prettier

  2. Testing: `npm test` integration

  3. Type checking: `tsc --noEmit`

  4. Code formatting: `prettier --write .`'
best_practices:
- Use `git rebase -i` for history cleanup (e.g., squashing 5 commits into a single atomic change)
- Enable `core.autocrlf=true` for cross-platform consistency (Windows vs Linux line endings)
- Configure `user.name` and `user.email` for audit trails (e.g., "agent-001@company.com")
- Use `git diff` before committing to verify changes (especially for binary files)
- Implement `git commit --amend` for last-commit fixes (avoid rewriting history after push)
comparison_of_git_workflows_for_autonomous_agents: '| Workflow Type         | Branching Strategy       | Merge Method               |
  Commit Message Style       | Use Case                          |

  |-----------------------|--------------------------|----------------------------|----------------------------|-----------------------------------|

  | GitFlow               | Feature + Release branches | Merge with squash        | Conventional Commits       | Long-term
  feature development     |

  | Trunk-Based           | No long-lived branches   | Rebase + Merge             | Semantic Commits           | Continuous
  delivery pipelines     |

  | Feature Branch        | Per-feature branches     | Merge --no-ff            | Conventional Commits       | Isolated experimentation          |

  | Trunk-Based (GitOps)  | No branches              | Merge with rebase        | GitOps-specific format     | Infrastructure-as-code
  workflows  |

  | Autonomous Agent      | Hash-based branches      | Auto-merge with CI       | Timestamp + Hash           | Self-contained
  agent development  |'
boundary: Static, versioned knowledge distilled from operational patterns. Not a configuration template, instruction manual,
  or deployment spec.
