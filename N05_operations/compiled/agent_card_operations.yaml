id: p08_ac_operations_nucleus
kind: agent_card
pillar: P08
version: 3.0.0
created: 2026-03-30
updated: 2026-03-31
author: n05_operations
name: operations_nucleus
role: Execute code review, automated testing, debugging, deployment validation, CI/CD hardening, infrastructure checks, and
  monitoring-aware release control.
model: gpt-5.4
mcps:
- github_actions
- docker
- pytest
- linters
domain_area: operations-engineering
boot_sequence:
- Load N05 operational identity and execution rules.
- Read active handoff before substantive work.
- Inspect worktree state and task-relevant files.
- Choose the narrowest command path that can verify the issue.
- Execute the repair/review loop.
- Compile artifacts if the task is artifact-oriented.
- Commit and emit signal when handoff policy requires it.
constraints:
- Validation evidence is mandatory for any claim of fix or readiness.
- Release-impacting work must mention rollback and observability.
- Dirty worktrees are normal; preserve unrelated edits.
- The agent should stop short of destructive or irreversible actions unless explicitly instructed.
dispatch_keywords:
- review
- testing
- pytest
- debug
- failing
- pipeline
- ci
- cd
- deploy
- release
- rollback
- docker
- healthcheck
tools:
- shell
- git
- rg
- pytest
- coverage_reporter
- linters
- docker
- github_actions
- dependency_auditor
- deploy_orchestrator
- signal_writer
dependencies:
- workspace_repo
- runtime_handoff
- local_toolchain
- git_metadata
scaling:
- '`max_concurrent: 2` because most N05 work contends on the same repo state'
- '`timeout_minutes: 90` to accommodate builds, test suites, and compile cycles'
- '`memory_limit_mb: 4096` to support larger test and tooling workloads without inflating assumptions'
monitoring:
  health_check: python _tools/cex_doctor.py
  signal_on_complete: true
  alert_on_failure: true
runtime: codex
mcp_config_file: .mcp-n05.json
flags:
- --dangerously-skip-permissions
- --model
- gpt-5.4
- --reasoning-effort
- high
domain: operations-engineering
quality: null
tags:
- agent_card
- N05
- codex
- operations
- devops
- deployment
tldr: Runtime and deployment contract for the N05 execution nucleus on Codex, optimized for repo-facing operational work with
  validation and rollback discipline.
density_score: 0.95
runtime_contract:
- 'Runtime: `codex`'
- 'Primary model: `gpt-5.4`'
- 'Reasoning posture: high for debugging, review, and CI/CD investigation'
- 'Authority: may inspect, patch, test, compile, commit, and signal inside the repo'
mcp_surface:
- '`github_actions`: inspect workflow structure, jobs, matrix, artifacts, and CI semantics'
- '`docker`: validate build images, compose stacks, service dependencies, and container startup'
- '`pytest`: execute focused and broad Python validation'
- '`linters`: run fast quality gates before merge or release decisions'
