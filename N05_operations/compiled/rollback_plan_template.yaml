rollback_execution_plan: ''
step_1_stop_traffic_if_critical: '# Temporarily block traffic to affected services

  railway env set MAINTENANCE_MODE=true'
step_2_database_rollback_if_needed: '# Check migration status

  railway connect postgres

  # Execute rollback migration if required

  # CRITICAL: Test in staging first'
step_3_service_rollbacks: "# API service rollback\nrailway rollback --service api --to-deployment [DEPLOYMENT_ID]\n\n# Frontend\
  \ rollback (if needed)  \nrailway rollback --service frontend --to-deployment [DEPLOYMENT_ID]\n\n# Dashboard rollback (if\
  \ needed)\nrailway rollback --service dashboard --to-deployment [DEPLOYMENT_ID]\n\n# Gateway rollback (if needed)\nrailway\
  \ rollback --service gateway --to-deployment [DEPLOYMENT_ID]"
step_4_health_verification: '# Verify health endpoints

  curl -f https://api.domain.com/health

  curl -f https://dashboard.domain.com/health


  # Check service communication

  # Verify authentication flows

  # Confirm database connectivity'
step_5_traffic_restoration: '# Remove maintenance mode

  railway env set MAINTENANCE_MODE=false


  # Monitor logs for errors

  railway logs --service api --tail'
validation_checklist:
- '[ ] Health Endpoints Responding'
- API /health returns 200
- Database connections active
- Cache operational (or fallback)
- '[ ] Service Communication'
- Frontend → API calls working
- Dashboard → API authentication
- Gateway → Service routing
- '[ ] Data Integrity'
- Database queries successful
- No data corruption detected
- User sessions preserved
- '[ ] Performance Metrics'
- Response times within normal range
- Error rates below threshold
- Resource utilization stable
recovery_time_objectives:
- 'Critical Path Recovery: 5 minutes'
- 'Full Service Recovery: 15 minutes'
- 'Performance Baseline: 30 minutes'
- 'Post-Incident Review: 24 hours'
