tldr: Architecture decision record for the multi-layer testing strategy covering unit, e2e, smoke, regression, benchmark,
  golden, and red-team evaluations.
density_score: 0.96
status: Accepted — 2026-04-07
context: CEX has 59 tools, 125 builders, 123 kinds, and a complex multi-nucleus architecture. Testing must cover tool correctness,
  artifact quality, pipeline integrity, and deployment safety. A single test layer is insufficient.
decision: "Adopt a 7-layer testing pyramid owned by N05:\n\n        /  Red-Team  \\          ← adversarial security testing\n\
  \       / E2E + Smoke  \\         ← integration + deploy verification\n      /   Regression    \\        ← baseline comparison\n\
  \     /   Golden Tests    \\       ← canonical correct outputs\n    /   Benchmarks        \\      ← performance measurement\n\
  \   /    Unit Evals         \\     ← individual tool/function tests\n  ━━━━━━━━━━━━━━━━━━━━━━━━━━\n      Static Analysis\
  \          ← pre-commit hooks + lint"
layer_responsibilities: '| layer | tool | frequency | gate_type |

  |-------|------|-----------|-----------|

  | Static Analysis | `cex_hooks.py`, `cex_sanitize.py` | Every commit | blocking |

  | Unit Evals | `cex_system_test.py` (54 tests) | Every PR | blocking |

  | Benchmarks | `benchmark_api_latency.md` suite | Pre-deploy | warning |

  | Golden Tests | Per-builder golden outputs | Every PR | blocking |

  | Regression | `cex_quality_monitor.py --compare` | Every PR | blocking |

  | E2E + Smoke | `smoke_eval_deploy.md` suite | Post-deploy | blocking (rollback) |

  | Red-Team | `red_team_eval_operations.md` suite | Monthly + pre-release | blocking |'
consequences: ''
positive:
- 'Defense in depth: Multiple layers catch different categories of defects'
- 'Fast feedback: Static analysis and unit tests run in seconds'
- 'Regression confidence: Baselines detect quality drift before users do'
- 'Security assurance: Red-team evals prove adversarial resilience'
- 'Deploy safety: Smoke evals catch production-specific failures'
negative:
- 'Maintenance cost: 7 test layers require ongoing maintenance'
- 'Baseline management: Golden tests and baselines need updating on intentional changes'
- 'Execution time: Full pyramid takes 5-10 minutes (static + unit + regression + benchmark)'
operational_rules:
- No PR merges without static analysis + unit evals + regression green
- No deploy without smoke eval passing within 30s budget
- Red-team eval required before any public-facing release
- Benchmark baselines updated quarterly or after architecture changes
- Golden test updates require explicit justification in PR description
