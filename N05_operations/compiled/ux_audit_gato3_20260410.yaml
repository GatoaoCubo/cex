recommendations_priority_order: '1. IMMEDIATE: Add prerender proxy (Prerender.io or Rendertron) to serve crawlable HTML to
  bots. This single change fixes the biggest SEO blocker.


  2. THIS WEEK: Install `vite-plugin-pwa` with Workbox. Configure: precache app shell, runtime cache for product images, offline
  fallback page.


  3. THIS WEEK: Either fully implement dark mode (add `ThemeProvider` from next-themes + toggle in Header) or strip all `dark:*`
  classes to prevent partial rendering.


  4. NEXT SPRINT: Upgrade cookie banner with granular consent categories. Add double opt-in to newsletter flow.


  5. BACKLOG: Generate complete PWA icon set, add SVG favicon, remove Lovable badge, clean up `/ro` redirect.


  ---'
