p0_critical_issues_broken_blocking: ''
p0_1_spa_without_ssr_search_engines_see_empty_shell: 'Severity: P0 (Revenue impact)

  Location: Site-wide architecture

  Evidence: WebFetch of all 6 tested URLs returned ONLY the JavaScript shell -- no rendered content visible. Google''s crawler
  faces the same problem.


  The site is a pure client-side React SPA. When any crawler (Googlebot, social media scrapers, link previews) fetches a page,
  it receives:


  <title>GATO3 | Produtos Premium para Gatos | Bem-estar Felino</title>

  <!-- ...GA4 script, font preload, Lovable badge... -->

  <div id="root"></div>

  <!-- JavaScript bundles -->


  No product data, no blog content, no navigation -- just an empty div.


  Impact:

  - Google MAY render JavaScript but with delays (days/weeks for indexing)

  - Social media link previews (WhatsApp, Instagram, Facebook) show only the generic title

  - Product pages will NOT appear in Google Shopping results without SSR

  - Blog posts lose all SEO value (Schema.org BlogPosting is generated client-side)


  Fix options (ranked by effort):

  1. Prerender.io / Rendertron -- Add a prerendering proxy (lowest effort, ~2h)

  2. Vite SSG plugin -- Static site generation at build time (~1 day)

  3. Migrate to Next.js -- Full SSR framework (highest effort, 1-2 weeks)


  Recommendation: Option 1 (prerender proxy) for immediate fix, plan Option 2 for next sprint.'
p0_2_no_service_worker_pwa_is_broken: 'Severity: P0

  Location: Missing `sw.js` / service worker registration

  Evidence: `manifest.json` exists at `/public/manifest.json` with correct config (name, icons, start_url), but NO service
  worker is registered anywhere in the codebase.


  manifest.json: EXISTS (correct)

  service worker: MISSING

  offline capability: NONE

  push notifications: NONE

  install prompt: BROKEN (Chrome won''t offer "Add to Home Screen" without SW)


  Fix: Install `vite-plugin-pwa` and configure Workbox caching strategy. ~2h of work.'
p0_3_dark_mode_toggle_missing_css_without_ui: "Severity: P0 (design inconsistency)\nLocation: `src/index.css` (dark mode variables\
  \ defined), UI (no toggle)\nEvidence: \n- `next-themes` package is installed in `package.json`\n- CSS dark mode variables\
  \ are defined (`.dark { ... }`)\n- Several pages have `dark:*` Tailwind classes\n- BUT no ThemeProvider wraps the app and\
  \ no toggle exists in the UI\n\nUsers on system-level dark mode may see a partially styled dark theme with broken contrast\
  \ or invisible elements.\n\nFix: Either remove all `dark:*` classes and the `next-themes` dependency, or properly implement\
  \ `ThemeProvider` + toggle button. ~1h.\n\n---"
p1_degraded_works_but_needs_attention: ''
p1_1_cookie_banner_accept_reject_without_granularity: 'Location: `src/components/CookieBanner.tsx`

  Finding: The LGPD cookie banner offers only "Accept All" and "Reject All". Under LGPD best practice, users should be able
  to selectively enable/disable categories (analytics, marketing, essential).


  Current implementation:

  - `role="dialog"` + `aria-label` (good a11y)

  - `localStorage` persistence via `gato3_cookie_consent`

  - Links to `/privacidade` (good)

  - Missing: granular consent per category


  Risk: Low legal risk for small businesses, but not best practice.

  Fix: Add category toggles (essential, analytics, marketing). ~4h.'
p1_2_newsletter_no_double_opt_in: "Location: `src/components/Footer.tsx` (Lines 20-87)\nFinding: Newsletter subscription writes\
  \ directly to Supabase `newsletter_subscribers` table without email confirmation (double opt-in).\n\nRisk: \n- Fake email\
  \ addresses pollute the list\n- LGPD requires demonstrable consent -- single opt-in is weaker evidence\n- Deliverability\
  \ drops with unverified emails\n\nFix: Add confirmation email flow via Supabase Edge Function + Resend/SendGrid. ~4h."
p1_3_manifest_icons_missing_standard_sizes: "Location: `public/manifest.json`\nFinding: Only 3 icon sizes defined:\n- favicon.png\
  \ (32x32)\n- apple-touch-icon.png (180x180)  \n- logo-gato3.png (600x606, maskable)\n\nMissing standard PWA sizes: 48x48,\
  \ 72x72, 96x96, 144x144, 192x192, 512x512.\n\nFix: Generate icon set from source logo. ~30min."
p1_4_voice_input_chrome_edge_only: 'Location: `src/components/RoChat.tsx` (Lines 94-138) Finding: Voice input uses Web Speech
  API which is only supported in Chromium browsers. Firefox and Safari users get a silent failure. Fix: Add feature detection
  and show/hide the mic button accordingly. ~30min. ---'
p2_cosmetic_polish: ''
p2_1_lovable_badge_visible_in_production: 'Location: All pages (injected by Lovable.dev platform) Finding: A "Built with Lovable"
  badge appears on all pages. This is fine for development but looks unprofessional in production. Fix: Remove Lovable badge
  in production build or use custom domain deployment without badge.'
p2_2_ro_legacy_route_still_active: 'Location: `src/App.tsx` route config Finding: `/ro` redirects to `/sac`. This is functional
  but creates a duplicate URL for the same content. Fix: Add `noindex` to the `/ro` redirect or remove the legacy route if
  no external links point to it.'
p2_3_missing_favicon_variety: 'Location: `index.html` Finding: Only PNG favicon. Modern browsers benefit from SVG favicons
  (scalable, dark mode aware). Fix: Add `<link rel="icon" type="image/svg+xml" href="/favicon.svg">`. ~15min. ---'
