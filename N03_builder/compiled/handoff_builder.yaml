purpose: Defines the contract between N07 Orchestrator (sender) and N03 Builder (receiver) for construction task handoffs.
  Both sides must comply to ensure clean task flow, no re-asking of decided questions, and proper completion signaling.
inbound_contract_n07_n03: ''
required_fields_in_handoff_file: '---

  nucleus: N03

  task: dispatch

  created: {ISO timestamp}

  ---'
required_sections: '| Section | Content |

  |---------|---------|

  | `# Task for N03` | Clear description of what to build |

  | `## DECISIONS` | Path to decision manifest if GDP decisions were made |

  | `## ON COMPLETION` | Commit convention and signal command |

  | `## SIGNAL` | Exact signal_writer command to emit |'
handoff_file_location: .cex/runtime/handoffs/n03_task.md
example_handoff: '---

  nucleus: N03

  task: dispatch

  created: 2026-04-07T19:00:00-03:00

  ---

  # Task for N03


  Build the agent_card for N03 builder nucleus with full 8F pipeline.


  ## DECISIONS (from user -- DO NOT re-ask)

  Read: .cex/runtime/decisions/decision_manifest.yaml


  ## ON COMPLETION

  1. Commit: git add -A && git commit -m "[N03] <description>"

  2. Signal complete:


  ## SIGNAL

  python -c "from _tools.signal_writer import write_signal; write_signal(''n03'', ''complete'', 9.0)"'
outbound_contract_n03_n07: ''
on_success:
- 'Commit: All artifacts committed with `[N03]` prefix'
- 'Signal: `write_signal(''n03'', ''complete'', 9.0)` to `.cex/runtime/signals/`'
- 'Artifacts: Listed in signal JSON `artifacts` field'
on_error:
- 'Signal: `write_signal(''n03'', ''error'', 0.0, ''error description'')`'
- 'No partial commits: Revert or stash incomplete work'
- 'Error detail: Include what failed and at which 8F step'
on_progress_long_tasks:
- 'Signal: `write_signal(''n03'', ''progress'', 0.0, ''step N of M'')`'
- 'Periodic: Every 3-4 artifacts or every 10 minutes'
rules:
- N03 MUST read the entire handoff before starting
- N03 MUST NOT re-ask questions listed under `## DECISIONS`
- N03 MUST commit with `[N03]` prefix
- N03 MUST signal on completion (success or error)
- N07 MUST provide decision manifest path if GDP decisions exist
- N07 MUST provide clear task description (not vague intent)
- Handoff file is consumed once — move to `.cex/runtime/handoffs/_done/` after
references:
- 'Signal protocol: N03_builder/orchestration/signal_builder.md'
- 'Dispatch rules: N03_builder/orchestration/dispatch_rule_builder.md'
- 'Workflow: N03_builder/orchestration/workflow_builder.md'
