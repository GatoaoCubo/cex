tldr: Signal protocol for N03 Builder — emits complete/error/progress signals to .cex/runtime/signals/ for N07 consumption.
density_score: 0.93
linked_artifacts:
  primary: N03_builder/orchestration/handoff_builder.md
  related:
  - N03_builder/orchestration/workflow_builder.md
  - N07_admin/orchestration/signal_admin.md
purpose: N03 Builder communicates task state to N07 Orchestrator via JSON signals written to `.cex/runtime/signals/`. Signals
  are the ONLY inter-nucleus communication mechanism — no direct calls, no shared state.
signal_types: ''
complete: "Emitted when task finishes successfully with all artifacts committed.\n\nfrom _tools.signal_writer import write_signal\n\
  write_signal('n03', 'complete', 9.0)\n\n{\n  \"agent_group\": \"n03\",\n  \"status\": \"complete\",\n  \"quality_score\"\
  : 9.0,\n  \"timestamp\": \"2026-04-07T19:55:00-03:00\",\n  \"task\": \"bootstrap_fractal\",\n  \"artifacts\": [\n    \"\
  N03_builder/agents/agent_builder.md\",\n    \"N03_builder/prompts/system_prompt_builder.md\"\n  ],\n  \"artifacts_count\"\
  : 2\n}"
error: "Emitted when task fails and N03 cannot recover.\n\nwrite_signal('n03', 'error', 0.0, 'schema validation failed at\
  \ F7')\n\n{\n  \"agent_group\": \"n03\",\n  \"status\": \"error\",\n  \"quality_score\": 0.0,\n  \"timestamp\": \"2026-04-07T19:55:00-03:00\"\
  ,\n  \"error\": \"schema validation failed at F7\",\n  \"failed_step\": \"F7_GOVERN\"\n}"
progress: "Emitted during long tasks to indicate ongoing work.\n\nwrite_signal('n03', 'progress', 0.0, 'built 4 of 12 artifacts')\n\
  \n{\n  \"agent_group\": \"n03\",\n  \"status\": \"progress\",\n  \"quality_score\": 0.0,\n  \"timestamp\": \"2026-04-07T19:55:00-03:00\"\
  ,\n  \"message\": \"built 4 of 12 artifacts\",\n  \"progress_pct\": 33\n}"
signal_path: '.cex/runtime/signals/n03_{status}.json


  Example: `.cex/runtime/signals/n03_complete.json`'
signal_rules:
- ALWAYS signal on task completion — never exit silently
- ALWAYS commit before signaling — signal implies work is committed
- NEVER emit `complete` if any BLOCKER gate failed
- ALWAYS include `artifacts` list in complete signals
- Use `progress` every 3-4 artifacts during batch builds
- Signal is fire-and-forget — N07 polls, N03 doesn't wait
n07_consumption: 'N07 reads signals via:

  bash _spawn/dispatch.sh status

  # or

  python _tools/cex_signal_watch.py --nucleus n03'
references:
- 'Handoff contract: N03_builder/orchestration/handoff_builder.md'
- 'N07 signal protocol: N07_admin/orchestration/signal_admin.md'
- 'Signal writer: `_tools/signal_writer.py`'
comparison_of_signal_types: '| Signal Type | Status   | Use Case                     | Required Fields                          |
  Example                                                                 |

  |-------------|----------|------------------------------|------------------------------------------|-------------------------------------------------------------------------|

  | Complete    | complete | Task success                 | artifacts, quality_score, timestamp      | {"agent_group": "n03",
  "status": "complete", "artifacts_count": 2}      |

  | Error       | error    | Task failure                 | error, failed_step, timestamp            | {"agent_group": "n03",
  "status": "error", "error": "schema validation"}|

  | Progress    | progress | Ongoing work                 | message, progress_pct, timestamp         | {"agent_group": "n03",
  "status": "progress", "progress_pct": 33}        |

  | Signal Path | n03_{status}.json | File naming convention | N/A                                      | .cex/runtime/signals/n03_complete.json                                 |

  | N07 Action  | N/A      | Signal processing workflow   | N/A                                      | Acknowledge, retry,
  or update UI based on signal type                  |'
related_kinds:
- 'Handoff Builder: Defines the contract for task handoff between N03 and N07, ensuring signal compatibility.'
- 'Workflow Builder: Manages the sequence of tasks in N03''s orchestration, triggering signals at defined checkpoints.'
- 'Signal Admin: Handles signal consumption and processing in N07, mapping signals to actionable workflows.'
- 'Artifact Committer: Ensures artifacts are properly stored before signaling, preventing incomplete state reporting.'
- 'Error Handler: Manages error recovery and reporting mechanisms, correlating N03 signals with N07 remediation steps.'
boundary_conditions:
- 'Signal Collision: If multiple signals are emitted simultaneously, N07 prioritizes `error` over `progress` and `complete`.'
- 'Artifact Mismatch: If `artifacts` list in `complete` signal does not match committed artifacts, N07 triggers validation.'
- 'Progress Threshold: `progress` signals are suppressed if progress_pct < 5% or > 95% to avoid noise.'
boundary_checks:
- 'Signal Validity: N07 validates JSON structure and required fields for all signals.'
- 'Timestamp Sync: Signals must have timestamps within 5 seconds of N07''s current time to be accepted.'
- 'Rate Limiting: N03 is restricted to 100 signals per minute to N07 to prevent overload.'
boundary_actions:
- 'Invalid Signal: N07 logs and discards signals with malformed JSON or missing required fields.'
- 'Timestamp Mismatch: N07 ignores signals with timestamps outside the 5-second window.'
- 'Rate Exceeded: N03 is throttled if it exceeds 100 signals/minute, with a 10-second cooldown enforced.'
boundary_examples: '| Scenario                        | Action                                                                 |

  |-------------------------------|------------------------------------------------------------------------|

  | `complete` with missing `artifacts` | N07 logs error: "Missing artifacts list in complete signal"           |

  | `progress` with 97% progress_pct | N07 suppresses signal: "Progress threshold exceeded (97%)"            |

  | Signal timestamp 10s old        | N07 ignores signal: "Timestamp mismatch (10s old)"                    |

  | 150 signals/minute from N03     | N07 throttles N03: "Rate limit exceeded (150/100 signals/minute)"     |'
boundary_testing:
