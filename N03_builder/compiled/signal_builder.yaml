tldr: Signal protocol for N03 Builder — emits complete/error/progress signals to .cex/runtime/signals/ for N07 consumption.
density_score: 0.93
linked_artifacts:
  primary: N03_builder/orchestration/handoff_builder.md
  related:
  - N03_builder/orchestration/workflow_builder.md
  - N07_admin/orchestration/signal_admin.md
purpose: N03 Builder communicates task state to N07 Orchestrator via JSON signals written to `.cex/runtime/signals/`. Signals
  are the ONLY inter-nucleus communication mechanism — no direct calls, no shared state.
signal_types: ''
complete: "Emitted when task finishes successfully with all artifacts committed.\n\nfrom _tools.signal_writer import write_signal\n\
  write_signal('n03', 'complete', 9.0)\n\n{\n  \"agent_group\": \"n03\",\n  \"status\": \"complete\",\n  \"quality_score\"\
  : 9.0,\n  \"timestamp\": \"2026-04-07T19:55:00-03:00\",\n  \"task\": \"bootstrap_fractal\",\n  \"artifacts\": [\n    \"\
  N03_builder/agents/agent_builder.md\",\n    \"N03_builder/prompts/system_prompt_builder.md\"\n  ],\n  \"artifacts_count\"\
  : 2\n}"
error: "Emitted when task fails and N03 cannot recover.\n\nwrite_signal('n03', 'error', 0.0, 'schema validation failed at\
  \ F7')\n\n{\n  \"agent_group\": \"n03\",\n  \"status\": \"error\",\n  \"quality_score\": 0.0,\n  \"timestamp\": \"2026-04-07T19:55:00-03:00\"\
  ,\n  \"error\": \"schema validation failed at F7\",\n  \"failed_step\": \"F7_GOVERN\"\n}"
progress: "Emitted during long tasks to indicate ongoing work.\n\nwrite_signal('n03', 'progress', 0.0, 'built 4 of 12 artifacts')\n\
  \n{\n  \"agent_group\": \"n03\",\n  \"status\": \"progress\",\n  \"quality_score\": 0.0,\n  \"timestamp\": \"2026-04-07T19:55:00-03:00\"\
  ,\n  \"message\": \"built 4 of 12 artifacts\",\n  \"progress_pct\": 33\n}"
signal_path: '.cex/runtime/signals/n03_{status}.json


  Example: `.cex/runtime/signals/n03_complete.json`'
signal_rules:
- ALWAYS signal on task completion — never exit silently
- ALWAYS commit before signaling — signal implies work is committed
- NEVER emit `complete` if any BLOCKER gate failed
- ALWAYS include `artifacts` list in complete signals
- Use `progress` every 3-4 artifacts during batch builds
- Signal is fire-and-forget — N07 polls, N03 doesn't wait
n07_consumption: 'N07 reads signals via:

  bash _spawn/dispatch.sh status

  # or

  python _tools/cex_signal_watch.py --nucleus n03'
references:
- 'Handoff contract: N03_builder/orchestration/handoff_builder.md'
- 'N07 signal protocol: N07_admin/orchestration/signal_admin.md'
- 'Signal writer: `_tools/signal_writer.py`'
