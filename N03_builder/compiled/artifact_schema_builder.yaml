id: p06_schema_builder_artifact
kind: schema
pillar: P06
title: Artifact Schema — Universal Frontmatter Contract
version: 2.0.0
created: 2026-04-07
updated: 2026-04-07
author: builder_agent
domain: construction
quality: 8.9
tags:
- schema
- builder
- N03
- frontmatter
- validation
- contract
tldr: Universal frontmatter schema that every CEX artifact must satisfy — 11 required fields + kind-specific extensions.
density_score: 0.95
linked_artifacts:
  primary: N03_builder/quality/quality_gate_builder.md
  related:
  - N03_builder/agents/agent_builder.md
  - .cex/kinds_meta.json
purpose: Every CEX artifact must include valid YAML frontmatter. This schema defines the universal required fields and the
  extension mechanism for kind-specific fields. The builder validates every artifact against this contract at F7 GOVERN.
universal_required_fields: 'id: string          # Unique identifier: {pillar}_{shortname}

  kind: string        # One of 123 registered kinds

  pillar: string      # P01-P12

  title: string       # Human-readable title

  version: string     # SemVer (e.g., "2.0.0")

  created: date       # ISO date (YYYY-MM-DD)

  updated: date       # ISO date (YYYY-MM-DD)

  author: string      # "builder_agent" for N03 output

  quality: null       # ALWAYS null — peer review scores

  tags: list          # Keyword tags (3-10 items)

  tldr: string        # One-line summary (< 160 chars)'
common_optional_fields: "domain: string           # Domain scope (e.g., construction, orchestration)\ndensity_score: float\
  \     # 0.0-1.0 information density\nlinked_artifacts:        # Cross-references\n  primary: string        # Main related\
  \ artifact\n  related: list          # Secondary references\ndata_source: string      # Where data came from"
kind_specific_extensions: ''
agent_p02: 'agent_group: string

  capabilities_count: integer

  tools_count: integer

  routing_keywords: list

  llm_function: string     # BECOME, REASON, CALL, etc.'
system_prompt_p03: 'target_agent: string

  persona: string

  rules_count: integer

  tone: string

  knowledge_boundary: string

  safety_level: string

  tools_listed: boolean

  output_format_type: string'
knowledge_card_p01: 'when_to_use: string

  keywords: list

  long_tails: list

  axioms: list'
workflow_p12: 'steps_count: integer

  execution: string        # sequential, parallel, mixed

  agent_groups: list

  timeout: integer

  retry_policy: string

  depends_on: list

  signals: list'
dispatch_rule_p12: "scope: string\nkeywords: list\nagent_group: string\nmodel: string\npriority: integer\nconfidence_threshold:\
  \ float\nfallback: string\nrouting_strategy: string\nconditions:\n  quality_min: float\n  signal_required: boolean"
quality_gate_p07: 'gate_count: integer

  pass_threshold: float

  reject_action: string'
comparison_of_kind_specific_fields: '| Kind          | Pillar | Required Fields                         | Example Use Case                          |

  |---------------|--------|-----------------------------------------|-------------------------------------------|

  | agent         | P02    | agent_group, capabilities_count         | Define agent capabilities for P02 tasks   |

  | system_prompt | P03    | target_agent, persona, rules_count      | Configure agent behavior for P03 prompts  |

  | knowledge_card| P01    | when_to_use, keywords, axioms           | Create knowledge cards for P01 queries    |

  | workflow      | P12    | steps_count, execution, agent_groups    | Orchestrate P12 workflows with agents     |

  | quality_gate  | P07    | gate_count, pass_threshold              | Implement P07 quality checks for artifacts|'
validation_rules:
- '`id` must be unique across the entire repository'
- '`kind` must exist in `.cex/kinds_meta.json`'
- '`pillar` must match the kind''s registered pillar'
- '`quality` must be exactly `null` — never a number or string'
- '`tags` must contain 3-10 items, no duplicates'
- '`tldr` must be under 160 characters'
- '`version` must follow SemVer format'
- '`created` and `updated` must be valid ISO dates'
boundary: This artifact defines the universal frontmatter contract for all CEX artifacts. It is NOT a data format itself,
  nor does it govern the content beyond YAML frontmatter. It establishes structural requirements but does not enforce semantic
  meaning of fields.
related_kinds:
- 'quality_gate: Enforces schema validation rules through automated checks'
- 'agent: Uses schema fields to define capabilities and routing parameters'
- 'kinds_meta: Maintains registry of valid `kind` values referenced by this schema'
- 'workflow: Relies on schema for agent_group and execution parameters'
- 'dispatch_rule: Uses schema-defined `kind` and `pillar` for routing decisions'
anti_patterns:
- 'Setting `quality: 9.0` (builder self-scoring — forbidden)'
- Omitting `tldr` (every artifact needs a one-liner)
- 'Using `pillar: knowledge` instead of `pillar: P01` (use codes)'
- Duplicating `id` across artifacts (must be globally unique)
- 'Empty `tags: []` (minimum 3 tags required)'
