tldr: Feedback template for N03 builder output reviews — structured format for peer scoring and improvement notes.
density_score: 0.91
linked_artifacts:
  primary: N03_builder/quality/quality_gate_builder.md
  related:
  - N03_builder/agents/agent_builder.md
purpose: Structured template for peer review of N03 builder output. Used by N07 or peer nuclei to score artifacts and provide
  actionable improvement feedback. N03 never self-scores — this template is for external reviewers.
review_template: "# Quality Review\nartifact: {path/to/artifact.md}\nreviewer: {nucleus_id}\nreview_date: {YYYY-MM-DD}\n\n\
  # Gate Checklist (PASS/FAIL)\nfrontmatter_valid: PASS\nrequired_fields: PASS\nquality_null: PASS\nschema_compliant: PASS\n\
  body_structure: PASS\npipeline_complete: PASS\ncompilation_sync: PASS\ncommit_convention: PASS\n\n# Scoring (reviewer assigns)\n\
  quality_score: {8.0-10.0}\ndensity_score: {0.0-1.0}\n\n# Feedback\nstrengths:\n  - {what was done well}\n  - {specific section\
  \ that excels}\nimprovements:\n  - {specific actionable improvement}\n  - {what to change and why}\nverdict: PUBLISH | REVIEW\
  \ | REJECT"
scoring_rubric: '| Dimension | Weight | 9.0+ | 8.0-8.9 | 7.0-7.9 | < 7.0 |

  |-----------|--------|------|---------|---------|-------|

  | Frontmatter | 20% | All fields perfect | Minor field issues | Missing optional fields | Missing required fields |

  | Structure | 25% | Matches ISO template exactly | Minor deviations | Major deviations | No structure |

  | Content | 30% | Dense, actionable, unique | Good coverage | Thin or generic | Filler content |

  | References | 15% | All cross-refs valid | Most refs valid | Few refs | No refs |

  | Density | 10% | 0.90+ density | 0.80-0.89 | 0.70-0.79 | < 0.70 |'
feedback_flow: "N03 builds artifact → commits with [N03] → signals complete\n     ↓\nN07 reads signal → runs cex_score.py\
  \ → applies review\n     ↓\nIf score >= 8.0: PUBLISH (move handoff to _done/)\nIf score 7.0-7.9: REVIEW (return to N03 with\
  \ feedback)\nIf score < 7.0: REJECT (N03 rebuilds from scratch)"
references:
- 'Quality gate: N03_builder/quality/quality_gate_builder.md'
- 'Score tool: `_tools/cex_score.py`'
- 'Feedback tool: `_tools/cex_feedback.py`'
