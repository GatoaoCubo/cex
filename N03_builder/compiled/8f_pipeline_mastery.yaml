f1_constrain_lessons: ''
pattern_resolve_before_build: Always run `cex_query.py` to resolve intent to kind before loading ISOs. Free-text intent can
  map to unexpected kinds — the query tool uses TF-IDF to find the best match across 123 kinds.
anti_pattern_assuming_kind: Never assume the kind from the task description alone. "Build an agent card" could be `agent_card`,
  `agent`, or `architecture` depending on context. Always verify against `.cex/kinds_meta.json`.
f2_become_lessons: ''
pattern_load_all_13_isos: Even if the task seems simple, load all 13 ISOs. ISOs 05 (anti-patterns) and 06 (linked kinds) often
  contain critical constraints that prevent rework.
anti_pattern_partial_iso_loading: Skipping ISOs 09 (memory) or 10 (brand) leads to context-poor artifacts that fail peer review.
  Load everything, even if not all ISOs are populated.
f3_inject_lessons: ''
pattern_brand_first_memory_second: Inject brand context before memory. Brand config establishes the tone and audience context
  that memory entries need to be interpreted against.
pattern_check_linked_artifacts: If the kind's ISO 06 lists linked kinds, check whether those artifacts exist. If they do,
  inject them as cross-references. This dramatically improves density.
f4_reason_lessons: ''
pattern_structure_before_content: Plan the heading structure and frontmatter fields before writing any body content. This
  prevents the "rewrite the frontmatter after the body" trap that wastes tokens and introduces inconsistencies.
pattern_gdp_gate_check: At F4, always check if the decision manifest exists and covers the current task. Subjective decisions
  (tone, audience, style) must come from the manifest, not from builder assumptions.
f5_call_lessons: ''
pattern_retriever_for_similar_artifacts: Before producing, run `cex_retriever.py` to find similar existing artifacts. They
  serve as golden examples and prevent duplicate or contradictory content.
f6_produce_lessons: ''
pattern_frontmatter_template: Always start from the universal frontmatter template (11 required fields). Then add kind-specific
  extensions. Never freeform the frontmatter.
pattern_density_score_estimation: 'Estimate density_score based on: unique concepts per section, cross-references, actionable
  content vs filler. Range 0.80-1.00 for well-crafted artifacts.'
f7_govern_lessons: ''
pattern_yaml_parse_test: 'Before saving, mentally parse the frontmatter YAML. Common errors:

  - Missing quotes around strings with colons

  - Incorrect list indentation

  - `quality: 9.0` instead of `quality: null`'
f8_collaborate_lessons: ''
pattern_commit_batch_size: Commit every 3-4 files during batch builds. This provides recovery points without creating excessive
  commit noise. Each commit should be a logical unit.
pattern_signal_after_commit: Always commit BEFORE signaling. A signal implies the work is committed and available. Signaling
  before committing leads to N07 reading incomplete state.
meta:
