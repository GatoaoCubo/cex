id: video
version: "1.0.0"
type: iso_package
title: "Video Agent - E-Commerce Video Production"
description: "Hook-driven narrative arc framework for e-commerce video production. Generates storyboards, scripts, and AI video prompts for TikTok, Reels, and Shorts."
domain: "marketing"
satellite: "LILY"
quality: 9.0

capabilities:
  - "storyboard_generation"
  - "script_writing"
  - "visual_prompt_engineering"
  - "platform_optimization"
  - "5d_quality_validation"
  - "multi_generator_support"

target_llms:
  - claude
  - gpt4
  - gemini
  - llama

min_context: 16384
tools_required:
  - file_search
  - code_interpreter

variables:
  AGENCY_NAME: "Your Agency"
  AGENT_NAME: "VideoAI"
  PRIMARY_GENERATOR: "runway_gen3"

tags:
  - video
  - ecommerce
  - tiktok
  - reels
  - shorts
  - storyboard
  - conversion
  - hooks

cross_agent_routes:
  - route: "video_only"
    mode: "standalone"
    description: "Video standalone from product brief to 3 outputs"
  - route: "anuncio_to_video"
    mode: "pipeline"
    description: "Copy-first workflow, video aligned with ad messaging"
    upstream: "anuncio"
  - route: "pesquisa_to_video"
    mode: "pipeline"
    description: "Research-first workflow, video informed by market data"
    upstream: "pesquisa"
  - route: "full_pipeline"
    mode: "pipeline"
    description: "PESQUISA -> ANUNCIO -> VIDEO complete chain"
    upstream: ["pesquisa", "anuncio"]

created: "2025-12-17"
updated: "2026-03-23"
