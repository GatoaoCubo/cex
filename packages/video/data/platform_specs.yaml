title: "Platform Specifications"
version: "1.0.0"
description: "Video specifications by platform"

platforms:
  tiktok:
    name: "TikTok"
    aspect_ratio: "9:16"
    resolution: "1080x1920"
    duration: {min: 15, max: 60, optimal: [15, 30]}
    hook_timing: {critical: 2, max: 3}
    safe_zones: {top: 150, bottom: 250}
    algorithm_factors: [watch_time, completion_rate, replay_count, engagement]
    optimization: {loop_friendly: true, native_feel: true, trending_sounds: true}

  instagram_reels:
    name: "Instagram Reels"
    aspect_ratio: "9:16"
    resolution: "1080x1920"
    duration: {min: 15, max: 90, optimal: [15, 30, 60]}
    hook_timing: {critical: 3, max: 5}
    safe_zones: {top: 100, bottom: 200}
    algorithm_factors: [watch_time, saves, shares, engagement]
    optimization: {higher_production: true, text_heavy_ok: true}

  youtube_shorts:
    name: "YouTube Shorts"
    aspect_ratio: "9:16"
    resolution: "1080x1920"
    duration: {min: 15, max: 60, optimal: [30, 60]}
    hook_timing: {critical: 3, max: 5}
    safe_zones: {top: 120, bottom: 180}
    algorithm_factors: [watch_time, swipe_away_rate, engagement, subscribe_conversion]
    optimization: {info_density: higher, subscribe_cta: true, loop_friendly: true}

  instagram_feed:
    name: "Instagram Feed Video"
    aspect_ratio: "1:1"
    resolution: "1080x1080"
    duration: {min: 3, max: 60, optimal: [15, 30]}
    hook_timing: {critical: 3, max: 5}
    safe_zones: {top: 50, bottom: 100}
    optimization: {autoplay_silent: true, captions_required: true}

  youtube:
    name: "YouTube (Horizontal)"
    aspect_ratio: "16:9"
    resolution: "1920x1080"
    duration: {min: 30, max: 600, optimal: [60, 180]}
    hook_timing: {critical: 5, max: 10}
    safe_zones: {top: 80, bottom: 120}
    optimization: {chapters: true, end_screen: true}

common_settings:
  fps: {standard: 24, smooth: 30, high: 60}
  bitrate: {720p: "5 Mbps", 1080p: "8 Mbps", 4K: "35 Mbps"}
  audio: {sample_rate: 48000, bitrate: "320 kbps", channels: stereo}
  codec: {video: "H.264", audio: "AAC"}
