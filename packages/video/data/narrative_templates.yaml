title: "Narrative Templates"
version: "1.0.0"
description: "Story arc structures for video production"

narrative_arcs:
  standard:
    name: "Hook-Problem-Solution-Proof-CTA"
    description: "Classic conversion narrative"
    phases: [HOOK, BUILD, BENEFIT, PROOF, CTA]
    timing_by_duration:
      15:
        HOOK: {start: 0, end: 2, shots: 1}
        BUILD: {start: 2, end: 6, shots: 1}
        BENEFIT: {start: 6, end: 11, shots: 2}
        PROOF: {start: 11, end: 13, shots: 1}
        CTA: {start: 13, end: 15, shots: 1}
      30:
        HOOK: {start: 0, end: 3, shots: 1}
        BUILD: {start: 3, end: 12, shots: 2}
        BENEFIT: {start: 12, end: 20, shots: 2}
        PROOF: {start: 20, end: 25, shots: 1}
        CTA: {start: 25, end: 30, shots: 1}
      60:
        HOOK: {start: 0, end: 5, shots: 1}
        BUILD: {start: 5, end: 23, shots: 3}
        BENEFIT: {start: 23, end: 41, shots: 3}
        PROOF: {start: 41, end: 51, shots: 1}
        CTA: {start: 51, end: 60, shots: 1}

  transformation:
    name: "Before-After-Bridge"
    phases: [HOOK, BEFORE, BRIDGE, AFTER, CTA]
    timing_by_duration:
      30:
        HOOK: {start: 0, end: 3, shots: 1}
        BEFORE: {start: 3, end: 10, shots: 2}
        BRIDGE: {start: 10, end: 17, shots: 2}
        AFTER: {start: 17, end: 25, shots: 1}
        CTA: {start: 25, end: 30, shots: 1}

  testimonial:
    name: "Social-Proof-First"
    phases: [HOOK, TESTIMONIAL, BENEFIT, DEMO, CTA]
    timing_by_duration:
      30:
        HOOK: {start: 0, end: 3, shots: 1}
        TESTIMONIAL: {start: 3, end: 12, shots: 2}
        BENEFIT: {start: 12, end: 18, shots: 1}
        DEMO: {start: 18, end: 25, shots: 2}
        CTA: {start: 25, end: 30, shots: 1}

phase_templates:
  HOOK:
    purpose: "Capture attention immediately"
    max_duration: 3
    techniques:
      energetic:
        examples_ptbr: ["Chega de {{PROBLEMA}}!", "{{PERGUNTA}}?", "Voce ainda {{COMPORTAMENTO}}?"]
        visual: "Product slam, quick zoom"
      calm:
        examples_ptbr: ["Imagine {{BENEFICIO}}...", "E se voce pudesse {{TRANSFORMACAO}}?"]
        visual: "Soft reveal, slow push"
      dramatic:
        examples_ptbr: ["{{DADO_IMPACTANTE}}. Voce sabia?", "O segredo que ninguem conta..."]
        visual: "Suspenseful reveal"
      playful:
        examples_ptbr: ["Plot twist: {{REVELACAO}}!", "Quem disse que {{MITO}}?"]
        visual: "Unexpected transition"

  BUILD:
    purpose: "Establish context and problem"
    narration_ptbr: ["O problema e real: {{DESCRICAO}}.", "Todo dia, {{SITUACAO}}.", "Voce conhece essa situacao: {{CENARIO}}."]

  BENEFIT:
    purpose: "Demonstrate solution and value"
    narration_ptbr: ["Com {{PRODUTO}}, {{BENEFICIO}}.", "{{FEATURE}} significa {{RESULTADO}}.", "Resultado: {{TRANSFORMACAO}}."]

  PROOF:
    purpose: "Build credibility"
    narration_ptbr: ["Mais de {{NUMERO}} clientes satisfeitos.", "{{ESTATISTICA}} comprovam.", "Avaliado com {{RATING}} estrelas."]

  CTA:
    purpose: "Drive action"
    narration_ptbr:
      energetic: "Compre agora e {{BENEFICIO}}!"
      calm: "Descubra mais. Link na bio."
      professional: "Garanta o seu. Link na descricao."
      playful: "Bora? Link ali embaixo!"

transition_suggestions:
  HOOK_to_BUILD: [cut, zoom_out, whip_pan]
  BUILD_to_BENEFIT: [wipe, dissolve, zoom_in]
  BENEFIT_to_PROOF: [cut, fade, slide]
  PROOF_to_CTA: [zoom_in, dissolve, cut]
