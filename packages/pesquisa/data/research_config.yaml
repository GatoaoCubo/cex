$schema: http://json-schema.org/draft-07/schema#
title: Research Configuration - pesquisa_agent v1.0.0
version: 1.0.0
description: Agent configuration for market research operations
agent_identity:
  agent_name: pesquisa_agent
  agent_type: research
  satellite: SHAKA
  domain: market_intelligence
  version: 1.0.0
execution_settings:
  timeout_ms: 300000
  retry_attempts: 3
  retry_backoff_ms: 5000
  max_concurrent_requests: 5
  rate_limit_per_minute: 30
marketplace_config:
  default_marketplaces:
  - id: mercado_livre
    name: Mercado Livre
    priority: 1
    enabled: true
    country: BR
  - id: shopee
    name: Shopee Brasil
    priority: 2
    enabled: true
    country: BR
  - id: amazon_br
    name: Amazon Brasil
    priority: 3
    enabled: true
    country: BR
  - id: magalu
    name: Magazine Luiza
    priority: 4
    enabled: false
    country: BR
  - id: americanas
    name: Americanas
    priority: 5
    enabled: false
    country: BR
  max_results_per_marketplace: 50
  min_results_required: 10
competitor_config:
  max_competitors: 10
  min_competitors: 3
  competitor_selection_criteria:
  - sales_rank
  - review_count
  - price_proximity
  - title_relevance
  analysis_depth: full
  include_seller_metrics: true
pricing_config:
  currency: BRL
  include_shipping: true
  price_outlier_threshold: 2.5
  percentile_ranges:
  - 10
  - 25
  - 50
  - 75
  - 90
  price_history_days: 30
seo_config:
  head_terms_count: 5
  mid_tail_count: 20
  long_tail_count: 50
  semantic_clusters: 5
  include_search_volume: true
  include_competition_score: true
output_config:
  default_format: markdown
  available_formats:
  - markdown
  - json
  - csv
  include_raw_data: false
  include_visualizations: true
  save_to_path: records/core/outputs/research/
quality_thresholds:
  data_completeness: 0.85
  source_quality: 0.8
  competitor_coverage: 0.75
  price_accuracy: 0.9
  seo_relevance: 0.8
  overall_pass: 0.8
fallback_config:
  enable_fallback: true
  fallback_marketplaces:
  - google_shopping
  - bing_shopping
  min_confidence_threshold: 0.4
  log_fallback_usage: true
integration_config:
  chain_to_anuncio: true
  chain_to_photo: false
  export_to_pool: true
  notify_on_complete: false
