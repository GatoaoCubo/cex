rate_limits:
  global:
    requests_per_minute: 30
    concurrent_requests: 3
    delay_between_requests_ms: 2000
    max_requests_per_session: 500
  per_marketplace:
    mercado_livre:
      requests_per_minute: 60
      note: Higher with API authentication
    shopee:
      requests_per_minute: 10
      note: Very aggressive rate limiting
    amazon_br:
      requests_per_minute: 1
      note: Use PA-API with proper throttling
    magalu:
      requests_per_minute: 30
      note: Moderate limits
    americanas:
      requests_per_minute: 30
      note: Moderate limits
    casas_bahia:
      requests_per_minute: 30
      note: Same as Americanas (Via Varejo)
    submarino:
      requests_per_minute: 30
      note: Same as Americanas (B2W)
    carrefour:
      requests_per_minute: 20
      note: Conservative approach recommended
    extra:
      requests_per_minute: 20
      note: Conservative approach recommended
  backoff_strategy:
    initial_delay_ms: 1000
    multiplier: 2
    max_delay_ms: 60000
    max_retries: 3
data_extraction_priority:
  essential:
  - price
  - title
  - seller_name
  - shipping_cost
  - review_rating
  important:
  - original_price
  - discount_percentage
  - reviews_count
  - sales_count
  - stock_quantity
  supplementary:
  - seller_reputation
  - delivery_time
  - variations
  - installment_options
  - badges
compliance:
  general_guidelines:
  - Always check robots.txt before automated access
  - Respect rate limits and implement proper backoff
  - Use official APIs when available for commercial use
  - Do not circumvent anti-bot measures
  - Store data in compliance with LGPD
  - Attribute data sources in research outputs
  lgpd_considerations:
    seller_data: Public business information, generally permissible
    price_data: Public information, freely usable
    review_data: May contain personal data, anonymize when possible
    retention_period: Delete raw data after analysis completion
output_formats:
  price_comparison:
    fields:
    - marketplace
    - price
    - shipping
    - total
    - seller
    - url
    sort_by: total_asc
  competitor_analysis:
    fields:
    - marketplace
    - seller
    - price
    - sales
    - rating
    - reviews
    sort_by: sales_desc
  market_overview:
    fields:
    - marketplace
    - avg_price
    - min_price
    - max_price
    - seller_count
    - listing_count
    aggregation: per_marketplace
integration:
  pesquisa_agent:
    default_strategy: default_research
    auto_expand_on_low_results: true
    minimum_results_threshold: 10
    fallback_strategy: full_coverage
  anuncio_agent:
    cross_reference: 09_marketplace_specs.json
    sync_priority_order: true
