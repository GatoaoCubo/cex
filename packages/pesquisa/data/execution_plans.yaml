$schema: http://json-schema.org/draft-07/schema#
title: Execution Plans - pesquisa_agent v1.0.0
version: 1.0.0
description: Pre-defined execution plans for Brazilian e-commerce market research
model: claude-opus-4-5-20251101
philosophy: Intelligence before creation - Research feeds all downstream agents
workflow_routes:
- route: 1
  mode: PESQUISA Full
  description: Complete 9-phase research with all analyses
  downstream:
  - anuncio
  - ads
  - marca
  - photo
- route: 2
  mode: PESQUISA Quick
  description: Fast 5-phase research for time-sensitive needs
  downstream:
  - anuncio
- route: 3
  mode: Competitor Only
  description: Only competitor analysis (profiles, benchmark, gaps)
  downstream:
  - ads
  - marca
- route: 4
  mode: Keywords Only
  description: Only SEO keyword research and taxonomy
  downstream:
  - anuncio
  - ads
- route: 5
  mode: Marketplace Scan
  description: Only marketplace search without analysis
  downstream:
  - anuncio
intelligent_fallback_system:
  description: 4-level fallback based on input confidence for research quality
  levels:
  - confidence_range: '>= 0.80'
    action: full_research
    markers: none
    description: Complete 9-phase research with full depth
    min_queries: 50
    min_competitors: 5
    min_marketplaces: 9
  - confidence_range: 0.60 - 0.79
    action: standard_research
    markers: '[VERIFICAR: motivo]'
    description: Standard research with verification markers
    min_queries: 30
    min_competitors: 3
    min_marketplaces: 5
  - confidence_range: 0.40 - 0.59
    action: quick_research
    markers: '[EXPANDIR: motivo]'
    description: Quick research with expansion placeholders
    min_queries: 15
    min_competitors: 3
    min_marketplaces: 3
  - confidence_range: < 0.40
    action: request_clarification
    markers: N/A
    description: Insufficient input - request product/category clarification
  input_confidence_factors:
    product_name_clarity: 0.25
    category_specificity: 0.25
    attributes_provided: 0.2
    target_audience_defined: 0.15
    price_range_specified: 0.15
plans:
  FULL:
    name: Full Market Research
    description: Complete 9-phase research workflow with all analyses and 22 structured
      blocks
    duration_estimate: 15-30 minutes
    use_cases:
    - New product launch
    - Market entry strategy
    - Competitive audit
    - Category expansion
    - Client deliverables
    steps:
    - step: 1
      name: input_validation
      description: Validate and normalize input parameters
      required: true
      timeout_ms: 30000
      validation:
        required_fields:
        - product_name
        - category
        optional_fields:
        - target_audience
        - price_range
        - known_attributes
        - marketplaces
    - step: 2
      name: query_generation
      description: Generate head terms, longtails, and synonyms
      hop: HOP_SHAKA_017_PESQUISA_AGENT_QUERY_GENERATION_HOP_V1_1.md
      block: blocks/AGT_EDISON_259_QUERY_GENERATION.md
      required: true
      timeout_ms: 60000
      output:
        head_terms: '[10-15]'
        longtails: '[30-50]'
        synonyms: '[20-30]'
        regional_variations: '[10-20]'
      validation:
        head_terms_count:
        - 10
        - 15
        longtails_count:
        - 30
        - 50
      on_failure: retry_with_feedback
      max_retries: 2
    - step: 3
      name: marketplace_search
      description: Execute searches across 9 Brazilian marketplaces
      hop: HOP_SHAKA_018_PESQUISA_AGENT_MARKETPLACE_SEARCH_HOP.md
      block: blocks/AGT_SHAKA_023_MARKETPLACE_SEARCH.md
      required: true
      timeout_ms: 180000
      marketplaces:
      - Mercado Livre
      - Shopee
      - Magalu
      - Amazon BR
      - Americanas
      - Casas Bahia
      - Submarino
      - TikTok Shop
      - Shein
      output:
        search_results: structured
        queries_log: json
        patterns: aggregated
      validation:
        min_queries_logged: 15
        min_results: 30
        min_marketplaces: 3
      on_failure: retry_different_marketplaces
      max_retries: 3
    - step: 4
      name: competitor_analysis
      description: Analyze top 3-5 competitors with SWOT mini profiles
      hop: HOP_SHAKA_019_PESQUISA_AGENT_COMPETITOR_ANALYSIS_HOP.md
      block: blocks/BLK_EDISON_013_COMPETITOR_ANALYSIS.md
      required: true
      timeout_ms: 180000
      output:
        competitor_profiles: '[3-5]'
        benchmark: quantitative
        gaps: prioritized
        opportunities: actionable
      validation:
        min_competitors_analyzed: 3
        benchmark_complete: true
      on_failure: retry_with_feedback
      max_retries: 2
    - step: 5
      name: price_comparison
      description: Analyze price positioning and ranges across marketplaces
      required: true
      timeout_ms: 60000
      output:
        price_ranges: BRL
        price_positioning: percentile
        price_gaps: opportunities
      validation:
        currency: BRL
        min_price_points: 10
    - step: 6
      name: gap_identification
      description: Identify market gaps and unmet customer needs
      required: true
      timeout_ms: 60000
      output:
        pain_points: extracted
        unmet_needs: categorized
        feature_gaps: prioritized
      validation:
        min_gaps_identified: 5
    - step: 7
      name: seo_taxonomy
      description: Consolidate inbound/outbound SEO taxonomy
      hop: HOP_SHAKA_020_PESQUISA_AGENT_SEO_TAXONOMY_HOP_V1_0.md
      block: blocks/BLK_EDISON_016_SEO_TAXONOMY.md
      required: true
      timeout_ms: 120000
      output:
        seo_inbound: '[100-250 keywords]'
        seo_outbound: '[50-100 keywords]'
        taxonomy: per_marketplace
        negative_keywords: '[20-50]'
      validation:
        inbound_keywords_count:
        - 100
        - 250
        taxonomy_marketplaces:
        - Mercado Livre
        - Shopee
        - Amazon BR
      on_failure: retry_with_feedback
      max_retries: 2
    - step: 8
      name: qa_validation
      description: Quality assurance validation of all research data
      required: true
      timeout_ms: 60000
      validation:
        all_22_blocks: true
        min_queries_logged: 15
        min_competitors: 3
        data_freshness_days: 7
        confidence_threshold: 7.0
      retry_on_fail: true
      max_retries: 2
    - step: 9
      name: output_assembly
      description: Assemble final research notes with 22 structured blocks
      hop: ISO_EDISON_039_OUTPUT_TEMPLATE.md
      required: true
      timeout_ms: 30000
      output_format: research_notes_22_blocks
      includes_handoff: true
    quality_threshold: 0.85
    output_format: RESEARCH_NOTES_MD
    output_blocks: 22
  QUICK:
    name: Quick Research
    description: Fast 5-phase research for time-sensitive needs
    duration_estimate: 5-10 minutes
    use_cases:
    - Product variations
    - Time-sensitive decisions
    - Initial market validation
    - Draft research for review
    - Quick competitive snapshot
    steps:
    - step: 1
      name: input_validation
      description: Validate and normalize input parameters
      required: true
      timeout_ms: 15000
    - step: 2
      name: query_generation
      description: Generate essential queries only
      hop: HOP_SHAKA_017_PESQUISA_AGENT_QUERY_GENERATION_HOP_V1_1.md
      required: true
      timeout_ms: 30000
      output:
        head_terms: '[5-10]'
        longtails: '[15-25]'
      validation:
        head_terms_count:
        - 5
        - 10
        longtails_count:
        - 15
        - 25
    - step: 3
      name: marketplace_search
      description: Search top 3 marketplaces only
      hop: HOP_SHAKA_018_PESQUISA_AGENT_MARKETPLACE_SEARCH_HOP.md
      required: true
      timeout_ms: 90000
      marketplaces:
      - Mercado Livre
      - Shopee
      - Amazon BR
      validation:
        min_queries_logged: 10
        min_results: 15
    - step: 4
      name: competitor_analysis
      description: Quick competitor snapshot (top 3)
      hop: HOP_SHAKA_019_PESQUISA_AGENT_COMPETITOR_ANALYSIS_HOP.md
      required: true
      timeout_ms: 90000
      output:
        competitor_profiles: '[3]'
        benchmark: basic
      validation:
        min_competitors_analyzed: 3
    - step: 5
      name: output_assembly
      description: Assemble condensed research notes
      hop: ISO_EDISON_039_OUTPUT_TEMPLATE.md
      required: true
      timeout_ms: 20000
      output_format: research_notes_condensed
    quality_threshold: 0.75
    output_format: RESEARCH_NOTES_CONDENSED
    output_blocks: 12
    skipped_phases:
    - price_comparison
    - gap_identification
    - seo_taxonomy
    - qa_validation
  COMPETITOR_ONLY:
    name: Competitor Analysis Only
    description: Focused competitor analysis without full market research
    duration_estimate: 5-8 minutes
    use_cases:
    - Competitive audit
    - Pricing strategy review
    - Benchmark update
    - SWOT analysis
    - Market positioning
    steps:
    - step: 1
      name: input_validation
      description: Validate product/category input
      required: true
      timeout_ms: 15000
    - step: 2
      name: competitor_identification
      description: Identify top competitors in category
      required: true
      timeout_ms: 60000
      output:
        competitor_list: '[5-10]'
        selection_criteria: defined
    - step: 3
      name: competitor_deep_dive
      description: Deep analysis of selected competitors
      hop: HOP_SHAKA_019_PESQUISA_AGENT_COMPETITOR_ANALYSIS_HOP.md
      block: blocks/BLK_EDISON_013_COMPETITOR_ANALYSIS.md
      required: true
      timeout_ms: 180000
      output:
        profiles: detailed_swot
        pricing_strategy: analyzed
        positioning: mapped
        strengths_weaknesses: prioritized
      validation:
        min_competitors: 3
        max_competitors: 5
    - step: 4
      name: benchmark_synthesis
      description: Create quantitative benchmark
      required: true
      timeout_ms: 60000
      output:
        benchmark_table: quantitative
        gaps: identified
        opportunities: prioritized
    - step: 5
      name: output_assembly
      description: Assemble competitor report
      required: true
      timeout_ms: 20000
      output_format: competitor_report
    quality_threshold: 0.8
    output_format: COMPETITOR_REPORT_MD
    output_sections:
    - competitor_profiles
    - benchmark_table
    - gaps_analysis
    - opportunities
    - recommendations
  KEYWORDS_ONLY:
    name: SEO Keyword Research Only
    description: Focused keyword and taxonomy research
    duration_estimate: 3-5 minutes
    use_cases:
    - SEO optimization
    - Backend keywords update
    - Category expansion
    - PPC campaign keywords
    - Content strategy keywords
    steps:
    - step: 1
      name: input_validation
      description: Validate product/category input
      required: true
      timeout_ms: 15000
    - step: 2
      name: query_generation
      description: Generate comprehensive keyword bank
      hop: HOP_SHAKA_017_PESQUISA_AGENT_QUERY_GENERATION_HOP_V1_1.md
      block: blocks/AGT_EDISON_259_QUERY_GENERATION.md
      required: true
      timeout_ms: 90000
      output:
        head_terms: '[10-15]'
        longtails: '[40-60]'
        synonyms: '[25-40]'
        regional_variations: '[15-25]'
        modifiers: '[20-30]'
      validation:
        total_keywords:
        - 100
        - 200
    - step: 3
      name: seo_taxonomy
      description: Build complete SEO taxonomy
      hop: HOP_SHAKA_020_PESQUISA_AGENT_SEO_TAXONOMY_HOP_V1_0.md
      block: blocks/BLK_EDISON_016_SEO_TAXONOMY.md
      required: true
      timeout_ms: 120000
      output:
        inbound_keywords: clustered
        outbound_keywords: categorized
        category_paths: per_marketplace
        negative_keywords: '[30-50]'
    - step: 4
      name: keyword_prioritization
      description: Prioritize keywords by intent and volume
      required: true
      timeout_ms: 60000
      output:
        priority_tier_1: '[20-30]'
        priority_tier_2: '[30-50]'
        priority_tier_3: '[50+]'
        negative_list: finalized
    - step: 5
      name: output_assembly
      description: Assemble keyword report
      required: true
      timeout_ms: 20000
      output_format: keyword_report
    quality_threshold: 0.8
    output_format: KEYWORD_REPORT_MD
    output_sections:
    - head_terms
    - longtails
    - synonyms_variations
    - inbound_seo
    - outbound_seo
    - negative_keywords
    - category_taxonomy
  MARKETPLACE_SCAN:
    name: Marketplace Scan Only
    description: Quick marketplace scan without deep analysis
    duration_estimate: 3-5 minutes
    use_cases:
    - Price check
    - Availability scan
    - Trend spotting
    - Quick market pulse
    steps:
    - step: 1
      name: input_validation
      description: Validate product/category input
      required: true
      timeout_ms: 15000
    - step: 2
      name: quick_query_gen
      description: Generate minimal query set
      required: true
      timeout_ms: 30000
      output:
        queries: '[5-10]'
    - step: 3
      name: marketplace_search
      description: Scan all 9 marketplaces
      hop: HOP_SHAKA_018_PESQUISA_AGENT_MARKETPLACE_SEARCH_HOP.md
      required: true
      timeout_ms: 120000
      marketplaces: all_9
      output:
        results_summary: per_marketplace
        price_ranges: extracted
        availability: status
    - step: 4
      name: output_assembly
      description: Assemble scan report
      required: true
      timeout_ms: 15000
      output_format: scan_report
    quality_threshold: 0.7
    output_format: MARKETPLACE_SCAN_MD
selection_logic:
  default_plan: FULL
  auto_select:
    conditions:
    - if: input.mode == 'quick' || input.urgente == true
      then: QUICK
    - if: input.only == 'competitors' || input.focus == 'concorrentes'
      then: COMPETITOR_ONLY
    - if: input.only == 'keywords' || input.focus == 'seo'
      then: KEYWORDS_ONLY
    - if: input.only == 'scan' || input.focus == 'marketplace'
      then: MARKETPLACE_SCAN
    - if: input.bulk == true
      then: QUICK
    - if: input.time_limit_minutes <= 5
      then: QUICK
    - if: input.time_limit_minutes <= 10
      then: COMPETITOR_ONLY
scoring_config:
  5d_weights:
    data_completeness: 0.25
    source_quality: 0.25
    competitor_coverage: 0.2
    price_accuracy: 0.15
    seo_relevance: 0.15
  dimension_definitions:
    data_completeness:
      description: Percentage of 22 blocks filled with valid data
      threshold: 0.8
      measurement: blocks_filled / 22
    source_quality:
      description: Quality and recency of marketplace data sources
      threshold: 0.75
      measurement: weighted_source_score
    competitor_coverage:
      description: Depth and breadth of competitor analysis
      threshold: 0.75
      measurement: competitors_analyzed * analysis_depth
    price_accuracy:
      description: Accuracy and currency of pricing data
      threshold: 0.8
      measurement: valid_prices / total_prices
    seo_relevance:
      description: Relevance and completeness of SEO taxonomy
      threshold: 0.75
      measurement: keyword_relevance_score
  pass_threshold: 0.85
  dimension_threshold: 0.75
  confidence_mapping:
    0.90-1.00: excellent
    0.80-0.89: good
    0.70-0.79: acceptable
    0.60-0.69: needs_improvement
    0.00-0.59: insufficient
output_templates:
  research_notes_22_blocks:
    format: markdown
    sections:
    - 'BLOCO 1: IDENTIFICACAO'
    - 'BLOCO 2-4: QUERIES (head, longtail, synonyms)'
    - 'BLOCO 5-10: MARKETPLACE DATA (per marketplace)'
    - 'BLOCO 11-15: COMPETITOR ANALYSIS (profiles + benchmark)'
    - 'BLOCO 16-19: SEO TAXONOMY (inbound, outbound, categories)'
    - 'BLOCO 20-21: GAPS & OPPORTUNITIES'
    - 'BLOCO 22: HANDOFF PARA ANUNCIO'
    metadata:
    - confidence
    - duration
    - queries_count
    - generated_date
  research_notes_condensed:
    format: markdown
    sections:
    - IDENTIFICACAO
    - QUERIES_ESSENCIAIS
    - TOP_COMPETITORS
    - KEY_INSIGHTS
    - HANDOFF
    metadata:
    - confidence
    - duration
handoff_config:
  downstream_agents:
    anuncio:
      receives:
      - head_terms
      - longtails
      - synonyms
      - attributes
      - pain_points
      - desired_gains
      format: structured_yaml
    ads:
      receives:
      - commercial_keywords
      - negative_keywords
      - competitor_benchmark
      - price_positioning
      format: structured_yaml
    marca:
      receives:
      - competitor_positioning
      - gaps
      - market_patterns
      format: structured_yaml
    photo:
      receives:
      - competitor_visual_patterns
      - product_attributes
      format: structured_yaml
  handoff_format: BLOCO_22_YAML
global_settings:
  max_total_timeout_ms: 1800000
  retry_on_timeout: true
  max_global_retries: 2
  log_all_steps: true
  save_intermediate_outputs: true
  output_format: MARKDOWN_22_BLOCKS
  language: PT-BR
  currency: BRL
  marketplaces_default:
  - Mercado Livre
  - Shopee
  - Magalu
  - Amazon BR
  - Americanas
  - Casas Bahia
  - Submarino
  - TikTok Shop
  - Shein
  min_competitors_default: 3
  max_competitors_default: 5
  data_freshness_max_days: 7
quality_gates:
  pre_execution:
    required_fields:
    - product_name
    - category
    min_input_confidence: 0.4
  during_execution:
    step_timeout_action: retry_or_skip
    validation_failure_action: retry_with_feedback
  post_execution:
    min_overall_confidence: 7.0
    min_queries_logged: 15
    min_competitors: 3
    min_marketplaces: 3
    blocks_complete: 22
learning_integration:
  memory_entity: pesquisa
  success_threshold: 8.0
  golden_threshold: 9.5
  patterns_to_track:
  - query_generation_effectiveness
  - competitor_identification_accuracy
  - price_data_quality
  - seo_relevance_score
