$schema: http://json-schema.org/draft-07/schema#
title: Execution Plan - pesquisa_agent v1.0.0
version: 1.0.0
description: 9-phase research workflow with market intelligence pipeline
workflow_routes:
- route: 1
  mode: FULL_RESEARCH
  description: Complete 9-phase research pipeline
- route: 2
  mode: COMPETITOR_ONLY
  description: Competitor analysis standalone
- route: 3
  mode: PRICING_ONLY
  description: Price comparison standalone
- route: 4
  mode: SEO_TAXONOMY
  description: SEO/keyword taxonomy only
intelligent_fallback_system:
  description: 4-level fallback based on input confidence
  levels:
  - confidence_range: '>= 0.80'
    action: generate_full
    markers: none
    description: Full research with all data points
  - confidence_range: 0.60 - 0.79
    action: generate_with_suggestions
    markers: '[VERIFICAR: fonte]'
    description: Research with source verification markers
  - confidence_range: 0.40 - 0.59
    action: generate_partial
    markers: '[COMPLETAR: dados]'
    description: Partial research with data placeholders
  - confidence_range: < 0.40
    action: request_enrichment
    markers: N/A
    description: Stop workflow, request more product information
phases:
- phase: s0
  name: input_validation
  description: Validate research request and extract product parameters
  required: true
  timeout_ms: 30000
  validations:
  - product_name_present
  - category_identifiable
  - target_marketplace_defined
- phase: s1
  name: query_generation
  hop: ISO_EDISON_027_QUERY_GENERATION.md
  description: Generate optimized search queries for marketplaces
  required: true
  timeout_ms: 60000
  output:
    primary_queries: 3
    long_tail_queries: 10
    competitor_queries: 5
- phase: s2
  name: marketplace_search
  hop: ISO_SHAKA_001_MARKETPLACE_SEARCH.md
  description: Execute searches across configured marketplaces
  required: true
  timeout_ms: 180000
  marketplaces:
  - mercado_livre
  - shopee
  - amazon_br
  results_per_marketplace: 20
- phase: s3
  name: competitor_analysis
  hop: 17_HOP_competitor_analysis.md
  description: Analyze top competitors from search results
  required: true
  timeout_ms: 120000
  max_competitors: 10
  analysis_points:
  - pricing_strategy
  - title_patterns
  - keyword_usage
  - review_sentiment
  - sales_velocity
- phase: s4
  name: price_comparison
  description: Compare prices across platforms and competitors
  required: true
  timeout_ms: 60000
  metrics:
  - min_price
  - max_price
  - avg_price
  - median_price
  - price_range_percentiles
- phase: s5
  name: gap_identification
  description: Identify market gaps and opportunities
  required: true
  timeout_ms: 90000
  gap_types:
  - price_gap
  - feature_gap
  - positioning_gap
  - content_quality_gap
  - review_gap
- phase: s6
  name: seo_taxonomy
  hop: ISO_LILY_001_SEO_TAXONOMY.md
  description: Build SEO keyword taxonomy from research
  required: true
  timeout_ms: 120000
  output:
    head_terms: 5
    mid_tail_terms: 20
    long_tail_terms: 50
    semantic_clusters: 5
- phase: s7
  name: qa_validation
  description: Quality validation of research data
  required: true
  timeout_ms: 60000
  retry_on_fail: true
  max_retries: 2
  validation_checks:
  - data_completeness
  - source_verification
  - price_accuracy
  - competitor_coverage
- phase: s8
  name: output_assembly
  description: Assemble final research report
  required: true
  timeout_ms: 30000
  output_formats:
  - research_report_md
  - competitor_matrix_json
  - keyword_taxonomy_json
  - pricing_analysis_json
plans:
  FULL:
    name: Full Research Pipeline
    description: Complete 9-phase market research workflow
    duration_estimate: 15-25 minutes
    use_cases:
    - New product launch
    - Market entry analysis
    - Competitor deep dive
    - Strategic pricing decisions
    phases:
    - s0
    - s1
    - s2
    - s3
    - s4
    - s5
    - s6
    - s7
    - s8
    quality_threshold: 0.85
  QUICK:
    name: Quick Research
    description: Streamlined research without deep competitor analysis
    duration_estimate: 5-10 minutes
    use_cases:
    - Product variations
    - Price check updates
    - Quick market scan
    phases:
    - s0
    - s1
    - s2
    - s4
    - s8
    quality_threshold: 0.75
  COMPETITOR_ONLY:
    name: Competitor Analysis Only
    description: Focus on competitor analysis
    duration_estimate: 5-8 minutes
    use_cases:
    - Competitor monitoring
    - Competitive positioning
    phases:
    - s0
    - s1
    - s2
    - s3
    - s8
    quality_threshold: 0.8
  SEO_ONLY:
    name: SEO Taxonomy Only
    description: Generate keyword taxonomy for SEO
    duration_estimate: 3-5 minutes
    use_cases:
    - Keyword research
    - SEO optimization
    - Content planning
    phases:
    - s0
    - s1
    - s6
    - s8
    quality_threshold: 0.8
selection_logic:
  default_plan: FULL
  auto_select:
    conditions:
    - if: input.mode == 'quick'
      then: QUICK
    - if: input.only == 'competitors'
      then: COMPETITOR_ONLY
    - if: input.only == 'seo' || input.only == 'keywords'
      then: SEO_ONLY
    - if: input.bulk == true
      then: QUICK
global_settings:
  max_total_timeout_ms: 900000
  retry_on_timeout: true
  max_global_retries: 2
  log_all_phases: true
  save_intermediate_outputs: true
  output_format: RESEARCH_REPORT
