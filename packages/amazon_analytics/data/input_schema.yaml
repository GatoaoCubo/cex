title: "Amazon Analytics Agent Input Schema"
version: "1.0.0"
description: "Input validation schema for Amazon performance analytics and product validation"

schema:
  type: object
  properties:
    analysis_type:
      type: string
      enum: [campaign, product_validation, listing, business]
      description: "Type of analysis to perform"

    campaign_data:
      type: object
      description: "Campaign metrics (required when analysis_type=campaign)"
      properties:
        acos:
          type: number
          description: "ACOS percentage"
        roas:
          type: number
          description: "Return on Ad Spend"
        spend:
          type: number
          description: "Total ad spend in R$"
        sales:
          type: number
          description: "Total ad-attributed sales in R$"
        impressions:
          type: integer
          description: "Total impressions"
        clicks:
          type: integer
          description: "Total clicks"
        orders:
          type: integer
          description: "Total orders from ads"
        period_days:
          type: integer
          minimum: 7
          description: "Analysis period in days (min 7)"
      required: [acos, spend, sales, period_days]

    product_data:
      type: object
      description: "Product data for PPD validation (required when analysis_type=product_validation)"
      properties:
        search_term:
          type: string
          description: "Main search term"
        sales_30d:
          type: integer
          description: "Estimated sales in last 30 days"
        num_sellers:
          type: integer
          description: "Number of active sellers"
        avg_price:
          type: number
          description: "Average selling price in R$"
        num_reviews:
          type: integer
          description: "Total reviews on top listings"
        avg_rating:
          type: number
          description: "Average star rating"
        buy_box_price:
          type: number
          description: "Current Buy Box price in R$"
      required: [search_term, sales_30d, num_sellers]

    listing_data:
      type: object
      description: "Listing metrics (required when analysis_type=listing)"
      properties:
        sessions:
          type: integer
          description: "Total sessions"
        conversions:
          type: integer
          description: "Total conversions/orders"
        conversion_rate:
          type: number
          description: "Conversion rate %"
        page_views:
          type: integer
          description: "Total page views"
        buy_box_percentage:
          type: number
          description: "Buy Box win rate %"
      required: [sessions, conversion_rate]

    target_margin:
      type: number
      description: "Target profit margin % (critical for ACOS context)"

    product_age_months:
      type: integer
      description: "Product age in months (for maturity-adjusted benchmarks)"

  required: [analysis_type]
