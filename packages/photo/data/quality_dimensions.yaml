$schema: http://json-schema.org/draft-07/schema#
title: Quality Dimensions - 5D Scoring Schema for Photo Agent v1.0
version: 1.0.0
description: 5-dimensional quality scoring for photo_agent image generation outputs
dimensions:
  prompt_completeness:
    id: D1
    name: Prompt Completeness
    portuguese: Completude do Prompt
    weight: 0.25
    threshold: 0.8
    description: All scene elements, camera settings, and lighting specifications
      clearly defined
    rationale: Complete prompts produce consistent, predictable images. Incomplete
      prompts lead to AI model confusion and unsuitable outputs.
    scoring_rubric:
      '1.0': 'Perfect: Scene elements, camera settings, lighting, mood all specified
        with exact parameters'
      '0.8': 'Good: 90%+ elements specified, minor parameters can be inferred'
      '0.6': 'Adequate: 75%+ elements specified, some ambiguity remains'
      '0.4': 'Poor: 50-75% specified, significant gaps in scene/technical details'
      '0.2': 'Fail: <50% specified, vague or missing critical parameters'
    checks:
    - id: PC1.1
      name: scene_elements
      description: All objects, people, props, backgrounds clearly specified
      weight: 0.25
    - id: PC1.2
      name: camera_settings
      description: Lens type, aperture, focal length, angle specified
      weight: 0.25
    - id: PC1.3
      name: lighting_specs
      description: Light type, direction, intensity, color temperature defined
      weight: 0.25
    - id: PC1.4
      name: composition_details
      description: Framing, depth of field, composition rules specified
      weight: 0.15
    - id: PC1.5
      name: mood_atmosphere
      description: Desired mood, atmosphere, style reference included
      weight: 0.1
  brand_alignment:
    id: D2
    name: Brand Alignment
    portuguese: Alinhamento de Marca
    weight: 0.2
    threshold: 0.8
    description: Image matches brand guidelines, color palette, visual style, and
      identity
    rationale: Brand-consistent imagery builds recognition and trust. Misaligned images
      confuse audience and dilute brand identity.
    scoring_rubric:
      '1.0': 'Perfect: Exact brand colors, style, tone; consistent with all guidelines'
      '0.8': 'Good: 95%+ alignment with brand palette and visual identity'
      '0.6': 'Adequate: 80%+ alignment, minor style variations'
      '0.4': 'Poor: 60-80% alignment, noticeable brand inconsistencies'
      '0.2': 'Fail: <60% alignment or major brand guideline violations'
    checks:
    - id: BA2.1
      name: color_palette
      description: Uses brand primary/secondary colors correctly
      weight: 0.3
    - id: BA2.2
      name: visual_style
      description: Matches brand aesthetic (minimal, luxury, playful, professional)
      weight: 0.25
    - id: BA2.3
      name: tone_consistency
      description: Image tone aligns with brand voice and personality
      weight: 0.2
    - id: BA2.4
      name: typography_elements
      description: Any text uses brand fonts and styling
      weight: 0.15
    - id: BA2.5
      name: guidelines_compliance
      description: Follows all documented brand image guidelines
      weight: 0.1
  technical_accuracy:
    id: D3
    name: Technical Accuracy
    portuguese: Precisao Tecnica
    weight: 0.2
    threshold: 0.85
    description: Correct aspect ratios, resolution, format, and AI model compatibility
    rationale: Technical errors cause deployment failures, platform rejections, and
      lost productivity. Accuracy ensures first-time acceptance.
    scoring_rubric:
      '1.0': 'Perfect: All specs met (aspect ratio, resolution, format, compression)'
      '0.8': 'Good: 95%+ specs accurate, minor format adjustments needed'
      '0.6': 'Adequate: 85%+ accurate, needs one spec correction'
      '0.4': 'Poor: 70-85% accurate, multiple spec violations'
      '0.2': 'Fail: <70% accurate, incompatible with intended platform'
    checks:
    - id: TA3.1
      name: aspect_ratio
      description: Correct aspect ratio for platform (16:9, 1:1, 4:5, 9:16)
      weight: 0.3
    - id: TA3.2
      name: resolution_specs
      description: Minimum resolution met (1080p, 2K, 4K as specified)
      weight: 0.25
    - id: TA3.3
      name: file_format
      description: Correct format (JPG, PNG, WebP) with appropriate compression
      weight: 0.2
    - id: TA3.4
      name: model_compatibility
      description: Image compatible with intended AI/platform model requirements
      weight: 0.15
    - id: TA3.5
      name: color_profile
      description: Correct color space (sRGB, CMYK, Adobe RGB) applied
      weight: 0.1
  scene_diversity:
    id: D4
    name: Scene Diversity
    portuguese: Diversidade de Cenas
    weight: 0.2
    threshold: 0.75
    description: Variety of angles, contexts, compositions, and perspectives across
      image set
    rationale: Diverse imagery prevents ad fatigue, improves CTR, and shows product/service
      from multiple angles for better customer decision-making.
    scoring_rubric:
      '1.0': 'Excellent: 4+ distinct angles/contexts with varied compositions'
      '0.8': 'Good: 3-4 angles with good variety, minor repetition'
      '0.6': 'Adequate: 2-3 angles with some variety'
      '0.4': 'Poor: 1-2 angles, limited perspective variation'
      '0.2': 'Fail: Single angle or extremely repetitive scenes'
    checks:
    - id: SD4.1
      name: camera_angles
      description: Multiple distinct camera angles (wide, close-up, side, top-down)
      weight: 0.3
    - id: SD4.2
      name: context_variation
      description: Scenes show product/subject in different contexts/environments
      weight: 0.25
    - id: SD4.3
      name: composition_types
      description: Mix of composition styles (portrait, landscape, detail shots)
      weight: 0.2
    - id: SD4.4
      name: use_case_coverage
      description: Images demonstrate different use cases or applications
      weight: 0.15
    - id: SD4.5
      name: background_variety
      description: Different backgrounds/settings (lifestyle, studio, on-location)
      weight: 0.1
  marketplace_compliance:
    id: D5
    name: Marketplace Compliance
    portuguese: Conformidade de Marketplace
    weight: 0.15
    threshold: 0.8
    description: Meets image requirements for Mercado Livre, Shopee, Amazon, Instagram
    rationale: Non-compliant images get rejected or hidden by algorithms, reducing
      visibility and sales. Compliance ensures maximum platform reach.
    scoring_rubric:
      '1.0': 'Perfect: Meets all marketplace requirements across all target platforms'
      '0.8': 'Good: 95%+ compliant with minor platform variations'
      '0.6': 'Adequate: 85%+ compliant, acceptable for most platforms'
      '0.4': 'Poor: 70-85% compliant, rejection risk on some platforms'
      '0.2': 'Fail: <70% compliant, likely to be rejected'
    checks:
    - id: MC5.1
      name: file_size_limits
      description: 'File size within platform limits (ML: 20MB, Shopee: 5MB, Amazon:
        10MB)'
      weight: 0.25
    - id: MC5.2
      name: dimension_requirements
      description: Image dimensions meet minimum/maximum specs per platform
      weight: 0.25
    - id: MC5.3
      name: content_policies
      description: 'No violations: no watermarks, excessive text, suspicious elements'
      weight: 0.25
    - id: MC5.4
      name: visibility_algorithm
      description: Image likely to pass platform visibility/quality algorithms
      weight: 0.15
    - id: MC5.5
      name: mobile_optimization
      description: Image renders correctly on mobile devices (clarity at 400x400px
        min)
      weight: 0.1
overall_scoring:
  formula: weighted_sum(dimension_scores * dimension_weights)
  pass_threshold: 0.8
  all_dimensions_threshold: 0.75
  pass_condition: overall >= 0.80 AND all dimensions >= 0.75
  statuses:
    PASS: '>= 0.80 AND all dimensions >= 0.75'
    WARN: 0.70 - 0.79 OR one dimension < 0.75
    FAIL: < 0.70 OR technical_accuracy < 0.70 OR marketplace_compliance < 0.70
weight_summary:
  prompt_completeness: 25%
  brand_alignment: 20%
  technical_accuracy: 20%
  scene_diversity: 20%
  marketplace_compliance: 15%
  total: 100%
critical_checks:
- id: CC1
  name: Correct aspect ratio for platform
- id: CC2
  name: Minimum resolution met (1080p+)
- id: CC3
  name: File size within marketplace limits
- id: CC4
  name: Brand colors and style applied
- id: CC5
  name: No watermarks or suspicious content
- id: CC6
  name: Scene elements match prompt specification
- id: CC7
  name: Multiple angles/contexts in set (if batch)
output_schema:
  type: object
  properties:
    dimensions:
      type: object
      properties:
        prompt_completeness:
          type: object
          properties:
            score:
              type: number
              minimum: 0
              maximum: 1
            passed:
              type: boolean
            issues:
              type: array
              items:
                type: string
        brand_alignment:
          $ref: '#/output_schema/properties/dimensions/properties/prompt_completeness'
        technical_accuracy:
          $ref: '#/output_schema/properties/dimensions/properties/prompt_completeness'
        scene_diversity:
          $ref: '#/output_schema/properties/dimensions/properties/prompt_completeness'
        marketplace_compliance:
          $ref: '#/output_schema/properties/dimensions/properties/prompt_completeness'
    overall_score:
      type: number
      minimum: 0
      maximum: 1
    passed:
      type: boolean
    recommendation:
      type: string
      enum:
      - PROCEED_TO_OUTPUT
      - RETRY_WITH_FIXES
      - OUTPUT_WITH_WARNING
      - BLOCK_OUTPUT
