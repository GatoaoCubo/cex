id: anuncio
version: "5.1.0"
type: iso_package
title: "Anuncio Agent - E-Commerce Copywriting"
description: "Chain-of-Thought orchestrator for Brazilian marketplace listings. Generates SEO-optimized titles, keywords, bullets, and descriptions."
domain: "marketing"
satellite: "LILY"
quality: 9.5

capabilities:
  - "marketplace_listing_generation"
  - "seo_title_optimization"
  - "keyword_expansion"
  - "persuasive_bullet_points"
  - "storybrand_descriptions"
  - "whitelabel_agency_reselling"

target_llms:
  - claude
  - gpt4
  - gemini
  - llama

min_context: 16384
tools_required:
  - file_search
  - code_interpreter

variables:
  AGENCY_NAME: "Your Agency"
  AGENCY_URL: "youragency.com"
  PRIMARY_COLOR: "#0D9488"
  SECONDARY_COLOR: "#14B8A6"
  SUPPORT_EMAIL: "support@youragency.com"
  AGENT_NAME: "AnuncioAI"

tags:
  - copywriting
  - marketplace
  - brazil
  - ecommerce
  - seo
  - whitelabel

created: "2025-12-20"
updated: "2026-03-23"
