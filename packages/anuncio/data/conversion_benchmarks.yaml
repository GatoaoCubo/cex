$schema: http://json-schema.org/draft-07/schema#
title: Conversion Benchmarks — Brazilian Marketplaces
version: 1.0.0
compiled: '2026-03-06'
sources:
- salesduo.com/blog/amazon-conversion-rate-guide
- ecombrainly.com/amazon-conversion-rate
- novadata.io/resources/blog/listing-optimization
- flairox.com/amazon-product-listing-optimization
- gosmarter.com.br/algoritmo-mercado-livre
- gobots.ai/blog/algoritmos-de-ranqueamento-dos-anuncios-no-mercado-livre
- arcosscale.com.br/seo-para-shopee-guia-definitivo-rankear-primeiro-lugar
- vtex.com/pt-br/blog/mobile-first
- ecommercebrasil.com.br
title_ctr:
  description: Click-through rate impact by title optimization factor
  mercadolivre:
    avg_ctr_pct: 3.5
    top_10pct_ctr: 8.5
    key_factor: keyword_position_1
    char_limit: 60
    use_all_chars: true
    mobile_visible_chars: 45
    notes: Keyword principal na posicao 1 do titulo. Usar todos os 60 chars. Sem pontuacao
      ou simbolos.
  shopee:
    avg_ctr_pct: 3.0
    top_10pct_ctr: 7.5
    key_factor: title_relevance_plus_emoji
    char_limit: 120
    recommended_chars: 100
    mobile_visible_chars: 60
    notes: 'Emojis no titulo aumentam CTR mobile. Formula: Marca + Produto + Caracteristica
      + Keyword.'
  amazon_br:
    avg_ctr_pct: 4.2
    top_10pct_ctr: 9.0
    key_factor: first_80_chars_mobile
    char_limit: 200
    recommended_chars: 150
    mobile_critical_chars: 80
    notes: Primeiros 80 chars sao o que aparece em mobile antes do corte. Informacao
      critica deve vir primeiro.
conversion_rate:
  description: Listing-to-purchase conversion rates by platform and condition
  mercadolivre:
    avg_cvr_pct: 4.0
    top_10pct_cvr: 10.0
    source: estimated_industry_benchmark
    confidence: low
    key_drivers:
    - preco_competitivo
    - reputacao_verde
    - imagens_qualidade
    - descricao_completa_3300chars
    - entrega_rapida_full
  shopee:
    avg_cvr_pct: 3.0
    top_10pct_cvr: 8.0
    source: estimated_industry_benchmark
    confidence: low
    key_drivers:
    - flash_sale_participacao
    - frete_gratis
    - avaliacoes_positivas
    - resposta_rapida_2h
    - frete_patrocinado
  amazon_br:
    avg_cvr_pct: 10.5
    avg_cvr_range:
    - 9.87
    - 11.1
    fba_prime_cvr_pct: 20.0
    fba_prime_cvr_range:
    - 15.0
    - 25.0
    top_performers_cvr: 30.0
    source: salesduo.com + ecombrainly.com
    confidence: high
    key_drivers:
    - fba_prime_badge
    - a_plus_content
    - reviews_count_quality
    - backend_keywords_250bytes
    - conversion_rate_is_ranking_factor
content_impact:
  description: Measured conversion lift from content improvements
  amazon_br:
    a_plus_basic_cvr_lift_pct:
    - 5
    - 8
    a_plus_premium_cvr_lift_pct:
    - 15
    - 20
    source: novadata.io + flairox.com
    confidence: high
  images_before_text_behavior:
    pct_shoppers_view_images_first: 60
    platform: amazon_br
    source: flairox.com/amazon-product-listing-optimization
    implication: Imagem principal e a primeira impressao — deve ser perfeita
  description_length_ml:
    min_indexed: 1
    recommended_minimum: 3300
    ideal: 3500
    max: 50000
    note: Abaixo de 3300 chars impacta qualidade do anuncio no algoritmo ML
mobile_behavior_brazil:
  description: Mobile access statistics for Brazilian e-commerce
  mobile_internet_access_pct: 92.1
  mobile_session_share_pct: 58.0
  source: vtex.com/pt-br/blog/mobile-first + nuvemshop.com.br
  confidence: high
  implications:
    title: Projetar titulo para leitura em 45-60 chars visiveis
    description: Primeiro paragrafo = beneficio principal, nao especificacoes tecnicas
    images: Imagem principal deve ser clara em thumbnail 150x150px
    bullets: Bullets com emojis > paragrafos em mobile
ranking_algorithm_weights:
  description: Estimated relative importance of ranking factors per platform (2026)
  mercadolivre:
    algorithm_version: '2026'
    factors:
      titulo_relevancia:
        weight: alto
        action: keyword_position_1_all_60_chars
      taxa_conversao:
        weight: alto
        action: optimize_price_images_title
      historico_vendas:
        weight: alto
        action: velocity_recente_pesa_mais
      reputacao_vendedor:
        weight: alto
        action: manter_verde_obrigatorio
      velocidade_entrega:
        weight: medio_alto
        action: full_ml_envios_vantagem
      preco_competitivo:
        weight: medio
        action: preco_total_produto_frete
      qualidade_anuncio:
        weight: medio
        action: descricao_3300_imagens_7_ficha
      ctr:
        weight: medio
        action: imagem_principal_titulo_geram_clique
  shopee:
    algorithm_version: '2026'
    pillars:
      relevancia:
        weight: alto
        components:
        - keyword_match_titulo
        - keyword_match_descricao
        - hashtags
      desempenho_loja:
        weight: alto
        components:
        - avaliacoes_positivas
        - taxa_resposta_alta
        - cancelamento_baixo
        - envio_rapido
      engajamento_comprador:
        weight: medio_alto
        components:
        - ctr
        - taxa_conversao
        - favoritos
        - flash_sale
  amazon_br:
    algorithm_version: A10_2026
    factors:
      taxa_conversao:
        weight: primario
        action: clarity_relevance_trust
      relevancia_keywords:
        weight: primario
        action: title_bullets_backend_250bytes
      reviews_rating:
        weight: alto
        action: solicitar_review_pos_entrega
      sales_rank:
        weight: alto
        action: historico_de_vendas
      prime_fba:
        weight: medio_alto
        action: fba_aumenta_cvr_15_25pct
      ctr:
        weight: medio
        action: titulo_80chars_mobile_otimizado
      backend_keywords:
        weight: medio
        action: 250_bytes_sem_repeticao
bullet_engagement:
  description: Best practices for bullet point engagement
  universal:
    structure: '[BENEFICIO]: [Detalhe] [Prova/Especificacao]'
    length_chars:
      ideal: 150
      max: 275
    format: emoji_inicio + negrito_keyword_estrategico
    order: benefit_first_feature_second
    proven_patterns:
    - '✔ [Beneficio]: [Feature que prova]'
    - '✅ [Compatibilidade com]: [lista de modelos]'
    - '🔋 [Performance]: [metrica concreta]'
    - '🛡 [Garantia]: [periodo] + [cobertura]'
  amazon_br:
    count: 5
    chars_per_bullet: 500
    structure: 'CAPITALIZED_BENEFIT: detail with proof'
    notes: Caps no inicio aumenta visual scanning — padrao Amazon
  mercadolivre:
    count: null
    note: Incluir na descricao com formatacao manual — sem campo dedicado
    recommended_count: 6
  shopee:
    count: null
    note: Usar emojis e bullets na descricao — sem campo dedicado
    recommended_count: 5
description_scroll_depth:
  description: Estimated scroll engagement patterns for marketplace descriptions
  fold_1_above:
    reads_pct: 95
    content: Beneficio principal + confirmacao do produto buscado
  fold_2_specs:
    reads_pct: 65
    content: Especificacoes tecnicas, dimensoes, compatibilidade
  fold_3_context:
    reads_pct: 35
    content: Casos de uso, para quem e, diferenciais
  fold_4_guarantee:
    reads_pct: 20
    content: Garantia, suporte, informacoes de envio
  implication: 80% do impacto de conversao esta nos primeiros 2 folds. Priorizar beneficio
    e specs.
  source: estimated_based_on_mobile_behavior_research
  confidence: medium
trigger_effectiveness:
  description: Mental triggers effectiveness ranking for BR marketplace listings
  triggers:
  - name: prova_social
    effectiveness: muito_alto
    application: numero de vendas, avaliacoes 5 estrelas, nota media
    example: Mais de 5.000 compradores satisfeitos
  - name: escassez
    effectiveness: alto
    application: estoque limitado, edicao especial
    example: Ultimas unidades em estoque
  - name: urgencia
    effectiveness: alto
    application: prazo de entrega, ofertas por tempo
    example: Pedido hoje, entrega amanha
  - name: autoridade
    effectiveness: medio_alto
    application: certificacoes, marca oficial, anos no mercado
    example: Certificado Inmetro + 10 anos de garantia
  - name: clareza
    effectiveness: medio_alto
    application: plug and play, sem configuracao
    example: Conecta e usa — sem necessidade de app ou driver
  rule: Usar no maximo 1-2 gatilhos por listing. Acumular muitos = perda de credibilidade.
