id: voice
version: "1.0.0"
type: iso_package
title: "Voice Agent - Voice Interaction Interface"
description: "Voice interaction agent for hands-free Claude Code operation. Handles speech-to-text, text-to-speech, and voice command routing."
domain: "execution"
satellite: "ATLAS"
quality: 9.0

capabilities:
  - "voice_interaction"
  - "speech_to_text"
  - "text_to_speech"
  - "voice_command_routing"
  - "audio_processing"

target_llms:
  - claude
  - gpt4
  - gemini

min_context: 4096
tools_required:
  - voice_api
  - audio_processing

variables:
  VOICE_PROVIDER: "elevenlabs"
  VOICE_MODEL: "eleven_multilingual_v2"

tags:
  - voice
  - accessibility
  - hands_free
  - audio
  - interaction

created: "2025-12-09"
updated: "2026-03-23"
