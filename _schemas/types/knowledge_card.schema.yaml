# CEX Type Schema: knowledge_card
# Source of truth for LLM generation and validation
# Version: 1.0.0 | LP: P01 | Function: INJECT

type: knowledge_card
lp: P01
llm_function: INJECT
description: Fato atomico pesquisavel — a unidade fundamental de conhecimento
boundary: Conhecimento destilado, estatico, versionado. NAO eh instrucao, template, ou configuracao.
max_bytes: 5120

# --- METADATA (obrigatorio em todo KC) ---
metadata:
  required:
    id: {type: string, pattern: "^[a-z0-9_]+$", description: "Identificador unico snake_case"}
    type: {type: string, const: "knowledge_card"}
    lp: {type: string, const: "P01"}
    llm_function: {type: string, const: "INJECT"}
    title: {type: string, max_length: 120}
    version: {type: string, pattern: "^\d+\.\d+\.\d+$"}
    created: {type: date}
    updated: {type: date}
    author: {type: string}
    domain: {type: string, description: "Dominio de conhecimento (architecture, code, market, etc)"}
    quality: {type: float, min: 7.0, max: 10.0}
    tags: {type: list, min_items: 2, item_type: string}
    tldr: {type: string, max_length: 200, description: "1 frase densa que resume o KC"}
  
  extended:
    when_to_use: {type: string, description: "Quando outra LLM deve buscar este KC"}
    keywords: {type: list, item_type: string, max_items: 10}
    source: {type: string, description: "URL ou path do codigo/doc original"}
    code_provenance: {type: string, description: "Arquivo, funcao, commit de onde veio"}
    confidence: {type: float, min: 0.0, max: 1.0, description: "Confianca nos fatos"}
    linked_kcs: {type: list, item_type: string, description: "IDs de KCs relacionados"}

# --- CONTENT (o conhecimento em si) ---
content:
  # Cada KC tem EXATAMENTE estas secoes estruturadas:
  
  summary:
    type: string
    required: true
    max_length: 300
    description: "Resumo executivo em 1-3 frases densas"
  
  facts:
    type: list
    required: true
    min_items: 3
    item_schema:
      claim: {type: string, description: "Afirmacao verificavel"}
      source: {type: string, description: "De onde veio (URL, file, commit)"}
      confidence: {type: float, default: 0.9}
    description: "Fatos atomicos com fonte — o OURO do KC"
  
  patterns:
    type: list
    required: false
    item_schema:
      trigger: {type: string, description: "Quando usar"}
      action: {type: string, description: "O que fazer"}
    description: "Padroes observados (trigger -> action)"
  
  anti_patterns:
    type: list
    required: false
    item_type: string
    description: "O que NAO fazer"
  
  code_snippets:
    type: list
    required: false
    item_schema:
      lang: {type: string}
      purpose: {type: string}
      code: {type: string}
      source_file: {type: string, description: "Path do arquivo original"}
    description: "Trechos de codigo com proposito e origem"
  
  relationships:
    type: list
    required: false
    item_schema:
      target: {type: string, description: "ID do artefato relacionado"}
      relation: {type: string, enum: [uses, extends, replaces, contradicts, depends_on]}
    description: "Conexoes com outros artefatos CEX"

# --- VALIDATION RULES ---
validation:
  - "id == filename stem (sem extensao)"
  - "Cada fact deve ter source nao-vazio"
  - "summary <= 300 chars"
  - "Total bytes <= 5120"
  - "min 3 facts"
  - "tags min 2 items"
  - "quality >= 7.0"
