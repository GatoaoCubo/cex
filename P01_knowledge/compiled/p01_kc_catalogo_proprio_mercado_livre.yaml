metricas_por_etapa: '| Etapa | Duracao | KPI | Meta |

  |-------|---------|-----|------|

  | Pesquisa | 3 dias | SKUs mapeados | 20 com volume > 50/mes |

  | Catalogo | 5 dias | Listings ativos | 20 com fotos proprias |

  | Preco | 30 dias | Buy Box share | >= 30% dos SKUs |

  | Logistica | 7 dias | Full ativado | 100% dos SKUs |

  | Escala | continuo | Revenue growth | +15% MoM |'
decisao_quando_parar_margem_zero: "SE (vendas >= 10/mes por SKU) E (Buy Box >= 30%)\n  ENTAO: aumentar margem gradualmente\
  \ (+2% por semana)\nSENAO: manter margem zero por mais 15 dias\nSE (60 dias sem Buy Box): avaliar se SKU vale continuar"
