quick_reference:
- 'Buy Box: Logistica 40% | Preco 30% | Reputacao 20% | Historico 10%'
- 'Timeline: 30-45 dias para posicionamento inicial'
- Margem zero por 30 dias (investimento)
- Full logistica = requisito obrigatorio para Buy Box
fases:
- 'PESQUISA: identificar top 20 produtos por volume (dados ML)'
- 'CATALOGO: criar listings com fotos e descricoes otimizadas'
- 'PRECO: agressivo nos primeiros 30 dias (margem zero)'
- 'LOGISTICA: ativar Full (ML coleta e entrega)'
- 'ESCALA: expandir catalogo baseado em dados de venda'
regras_de_ouro:
- NUNCA ficar sem estoque (ruptura mata ranking)
- Preco sempre competitivo (+-5% da concorrencia)
- Responder perguntas em < 1h (impacta reputacao)
- Frete gratis via Full (nao absorva frete manualmente)
- Fotos proprias > fotos genericas do fabricante
