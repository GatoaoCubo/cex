configuration_schema: ''
identity_required: "identity:\n  organization: string          # Organization name\n  domain: string               # Intelligence\
  \ domain focus\n  language: enum               # pt-BR, en, es, fr, de\n  region: enum                # BR, US, EU, UK,\
  \ LATAM, APAC"
sources_minimum_2_categories: "sources:\n  inbound: [list]             # Marketplace/product sources\n  outbound: [list] \
  \           # Social/community sources  \n  search: [list]              # Web search engines\n  trends: [list]         \
  \     # Trend/tracking sources\n  rag: [list]                 # Internal knowledge base"
storm_perspectives_minimum_3: "storm_perspectives:\n  - role: string              # Expert perspective role\n    focus: string\
  \             # Research focus areas\n  - role: analyst\n    focus: \"market sizing growth trends competitive landscape\"\
  \n  - role: customer\n    focus: \"pain points needs satisfaction switching costs\"\n  - role: competitor\n    focus: \"\
  positioning pricing features roadmap strategy\"\n  - role: regulator\n    focus: \"compliance requirements policy changes\
  \ risks\"\n  - role: technical_expert\n    focus: \"capabilities limitations architecture scalability\""
multi_model_routing: "multi_model:\n  extraction: string          # Fast model for structured data\n  reasoning: string  \
  \         # Strong model for analysis\n  social: string              # Optimized for sentiment/social\n  critic: string\
  \              # Thinking model for verification"
budget_controls: "budget:\n  serper_daily: int           # Daily Serper query limit\n  firecrawl_monthly: int      # Monthly\
  \ Firecrawl credits\n  firecrawl_per_research: int # Credits per research session\n  api_monthly_cap: int        # Total\
  \ monthly API spend limit"
quality_gates: "quality:\n  crag_min_score: float       # Minimum retrieval quality (0.0-1.0)\n  critic_max_iterations: int\
  \  # Maximum verification cycles\n  final_min_score: float      # Minimum final report score\n  confidence_threshold: float\
  \ # Minimum confidence for conclusions"
implementation_example: ''
n01_intelligence_nucleus_deployment: "# 1. Configure for organization\ncp templates/research_pipeline_config.yaml N01_intelligence/config/\n\
  vim N01_intelligence/config/research_pipeline_config.yaml\n\n# 2. Deploy pipeline\npython N01_intelligence/tools/research_pipeline.py\
  \ \\\n  --config config/research_pipeline_config.yaml \\\n  --query \"competitive analysis of AI coding assistants\" \\\n\
  \  --output reports/competitor_analysis_2026_04.html\n\n# 3. Monitor execution\ntail -f logs/research_pipeline.log"
quality_assurance_workflow: "# CRAG Quality Gate (per-source)\nmarketplace_sources:\n  min_score: 0.7\n  fallback: next_source\n\
  search_sources:\n  min_score: 0.6\n  fallback: alternative_engine\nsocial_sources:\n  min_score: 0.5  # Lower threshold\
  \ for noisy social data\n  fallback: skip\n\n# CRITIC Verification\nverification:\n  max_iterations: 3\n  confidence_minimum:\
  \ 0.75\n  fact_checking: enabled\n  source_attribution: required"
