tl_dr: BM25 (Okapi Best Match 25) e um algoritmo de ranking baseado em frequencia de termos que busca em documentos locais
  sem embeddings, sem servidor, sem GPU. Processa 161 linhas em ~10ms e 1000 linhas em ~50ms usando apenas Python stdlib.
conceito_central: 'BM25 calcula relevancia usando TF-IDF probabilistico: termos raros em um documento que sao raros no corpus
  recebem score alto. Dois parametros controlam o comportamento: k1 (saturacao de frequencia, tipicamente 1.2-2.0) e b (normalizacao
  por comprimento, tipicamente 0.75). O algoritmo tokeniza queries e documentos, constroi indice invertido e rankeia por score.
  A forca do BM25 e simplicidade: nenhuma dependencia externa, funciona offline, resultado deterministico e interpretavel.
  A fraqueza e que opera exclusivamente em keywords — "carro" nao encontra "veiculo". Para buscas conceituais, embeddings
  sao necessarios. BM25 e ideal como primeiro estagio de retrieval ou como unico estagio para dados estruturados com keywords
  bem definidas. Em sistemas hibridos (BM25 + embeddings), BM25 serve como recall rapido e embeddings como reranker semantico.
  Isso combina velocidade com compreensao conceitual.'
arquitetura_patterns: "| Aspecto | Valor | Nota |\n|---------|-------|------|\n| Complexidade | O(n) por query | n = documentos\
  \ no corpus |\n| Latencia 161 docs | ~10ms | Sem cache, rebuild por query |\n| Latencia 1000 docs | ~50ms | Sem cache, rebuild\
  \ por query |\n| Dependencias | Zero | Python stdlib apenas |\n| Parametro k1 | 1.2-2.0 | Saturacao de frequencia |\n| Parametro\
  \ b | 0.75 | Normalizacao por tamanho |\n\nPattern de implementacao:\n\nfrom rank_bm25 import BM25Okapi\n\ncorpus = [doc.split()\
  \ for doc in documents]\nbm25 = BM25Okapi(corpus)  # fit once, query many\nscores = bm25.get_scores(query.split())\ntop_n\
  \ = sorted(range(len(scores)),\n    key=lambda i: scores[i], reverse=True)[:5]\n\nPara producao: instanciar BM25 uma vez\
  \ no startup e reutilizar. Rebuild apenas quando corpus muda. Separar search_cols (indexados) de output_cols (retornados)\
  \ para precisao.\n\nHibrido BM25 + embeddings (reranking pipeline):\nQuery -> BM25 recall (top 20, ~10ms)\n  -> embedding\
  \ rerank (top 5, ~200ms)\n  -> LLM context injection\n\nBM25 como primeiro estagio garante velocidade. Embeddings como segundo\
  \ estagio adicionam compreensao semantica. Custo total: ~210ms vs ~500ms com embeddings puro. Fallback: se embedding service\
  \ cai, BM25 sozinho ainda funciona."
exemplos_praticos: '| Cenario | search_cols | Resultado |

  |---------|------------|-----------|

  | Produto por tipo | keywords, category | Top 3 matches com score |

  | Guideline UX | rule_name, description | Regras aplicaveis |

  | Font pairing | style, mood, use_case | Pares tipograficos |

  | Skill discovery | name, description | Skills relevantes |


  Fluxo tipico:

  1. Carregar CSV com pandas

  2. Concatenar search_cols em campo unico

  3. Tokenizar e construir indice BM25

  4. Query retorna top-N com score > threshold

  5. Filtrar output_cols dos resultados


  Threshold recomendado: descartar resultados com score < 1.0 (muito generico). Limitar a 3-5 resultados para contexto LLM.'
anti_patterns:
- Buscar em muitas colunas verbosas (degrada precisao)
- Retornar todos os resultados sem threshold de score
- Assumir que BM25 entende sinonimos ou conceitos
- Rebuild do indice a cada query em producao (cachear!)
- Um CSV gigante multi-dominio ao inves de CSVs focados
- Usar BM25 como unica busca para perguntas abertas
