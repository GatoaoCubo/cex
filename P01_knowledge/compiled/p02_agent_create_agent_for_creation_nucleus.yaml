  Emits to: validator (quality check), knowledge-index-builder (indexing after commit), routing registry (agent registration),
  git (commit via F8) Signal: `write_signal(''n03'', ''complete'', score)` on successful F8 — orchestrator monitors `.cex/runtime/signals/`'
quality_gates: 'HARD: id matches `^p02_agent_[a-z][a-z0-9_]+$`, kind == "agent", quality == null, all 10 required fields present,
  agent_package >= 10 files, llm_function == BECOME, agent_group assigned and non-blank. SOFT: tldr <= 160ch (158ch), tags
