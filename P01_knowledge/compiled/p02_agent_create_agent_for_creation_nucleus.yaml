common_issues:
- 'Scope creep: Focus on creation orchestration, delegate specialized building to domain builders'
- 'Quality drift: Enforce 8F pipeline consistently across all spawned builders'
- 'Dependency cycles: Validate artifact dependencies before initiating builds'
- 'Resource contention: Coordinate builder scheduling to prevent nucleus conflicts'
- 'Integration gaps: Verify cross-artifact interfaces before marking builds complete'
invocation: Spawn via builder nucleus when creation tasks require multi-artifact coordination. Boot with creation_intent and
