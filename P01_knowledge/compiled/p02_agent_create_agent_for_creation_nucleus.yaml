  | 1 | cex_8f_runner.py | Execute full 8F pipeline with quality validation |

  | 2 | cex_compile.py | Convert .md artifacts to .yaml machine format |

  | 3 | cex_doctor.py | Health check and quality gate validation |

  | 4 | signal_writer.py | Emit completion signals to orchestrator |'
