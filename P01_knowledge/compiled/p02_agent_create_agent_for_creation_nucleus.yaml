overview: creation-nucleus is a builder specialist in creation orchestration. Coordinates and executes artifact generation
  across all CEX domains, managing build pipelines, quality gates, and cross-pillar dependencies for comprehensive creation
  workflows.
architecture: "Capabilities:\n- orchestrate multi-artifact build sequences across all 12 pillars\n- scaffold complete artifact\
  \ families with proper dependencies  \n- coordinate builder selection and dispatch for complex creation tasks\n- validate\
  \ cross-artifact consistency and integration points\n- manage build quality gates and peer review workflows\n- synthesize\
  \ creation requirements into executable build plans\n\nTools:\n| # | Tool | Purpose |\n|---|------|---------|\n| 1 | cex_8f_runner.py\
  \ | Execute 8F pipeline for individual artifacts |\n| 2 | cex_crew_runner.py | Coordinate multi-builder crews for complex\
  \ builds |\n| 3 | cex_doctor.py | Validate artifact quality and system health |\n\nSatellite Position:\n- Satellite: builder\
  \  \n- Peers: system-prompt-builder, workflow-builder, interface-builder\n- Upstream: orchestrator (task planning)\n- Downstream:\
  \ specialized builders (artifact production)"
