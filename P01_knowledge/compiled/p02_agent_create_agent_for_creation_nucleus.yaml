  (specific), ## When to Use includes NOT-when exclusions, no filler phrases.'
common_issues:
- 'Kind misclassification: TF-IDF returns wrong builder → cross-check kind against `.cex/kinds_meta.json` before F2 BECOME'
- 'Stale ISOs: Builder ISOs not freshly loaded → run `cex_doctor.py` pre-F2; abort if health < 80%'
- 'Byte overflow at F6: Body exceeds 5120B → compress Overview and Common Issues; remove duplicate capability bullets'
- 'F7 gate failure: Score < 8.0 on first draft → retry F6 (max 2 retries), then escalate via signal to N07'
- 'F8 compile failure: .md → .yaml conversion error → re-validate frontmatter YAML syntax; rerun `cex_compile.py --validate`
  before commit'
invocation: '# Via 8F motor (recommended for N03 dispatch)

  python _tools/cex_8f_runner.py --intent "create agent for X" --nucleus n03


  # Via N07 dispatch (grid or solo)

  bash _spawn/dispatch.sh solo n03 "create agent for X"


  # In-context direct build

  /build create agent for X'
