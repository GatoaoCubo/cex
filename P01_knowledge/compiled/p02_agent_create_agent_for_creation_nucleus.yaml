common_issues:
- 'Intent ambiguity: decompose complex intents into specific artifact types before building'
- 'Quality threshold miss: validate against gates early, iterate on content density'
- 'Template mismatch: verify template compatibility with target kind before generation'
- 'Dependency conflicts: check artifact relationships and resolve before final output'
- 'Schema violations: validate frontmatter fields against pillar schemas during construction'
