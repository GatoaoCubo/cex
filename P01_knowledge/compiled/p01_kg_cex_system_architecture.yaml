overview: 'This knowledge graph covers the CEX typed knowledge system architecture -- 8 nuclei (N00-N07), 12 pillars (P01-P12),
  125+ builders, 130 kinds, and the artifacts they produce. A graph is needed here because the relationships between these
  components are multi-hop and bidirectional: N03 dispatches builders, builders produce kinds, kinds live in pillars, pillars
  contain artifacts, and N07 orchestrates all nuclei -- flat vector search cannot traverse these chains. This graph answers:
  "which nucleus owns what?", "which builder produces which kind?", "which pillar governs which kind?", "what does N07 orchestrate?",
  and "how do pipeline stages map to nuclei?"'
extraction_config: "| Parameter | Value |\n|-----------|-------|\n| Method | schema_constrained LLM triplet extraction |\n\
  | LLM model | claude-sonnet-4-6 |\n| Temperature | 0.0 |\n| Output format | JSON list of {subject, predicate, object} |\n\
  | Extraction prompt | schema-constrained with entity type whitelist |\n\nExtraction prompt template:\nExtract all entities\
  \ and relations from the following CEX architecture text.\nEntity types: Nucleus, Pillar, Builder, Kind, Artifact, Pipeline\n\
  Relation types: orchestrates, dispatches_to, owns_artifacts_in, builds,\n  produces, governs, contains, maps_to, feeds\n\
  Constraints:\n  - Nucleus values must be N00-N07 format\n  - Pillar values must be P01-P12 format\n  - Builder values must\
  \ end in \"-builder\"\n  - Kind values must match kinds_meta.json registry\nOutput format: JSON list of {\"subject\": \"\
  ...\", \"predicate\": \"...\", \"object\": \"...\"}\nText: {text}"
storage_and_traversal: '| Parameter | Value | Rationale |

  |-----------|-------|-----------|

  | Storage backend | in_memory | CEX architecture is a static schema domain (<500 nodes); no persistence across sessions
  needed for architectural queries; LlamaIndex KG in_memory is the natural fit |

  | Traversal strategy | hybrid | Local mode answers entity-centric questions ("what does N03 do?", "what kinds live in P01?");
  global mode answers structural summaries ("what are the main system clusters?", "what is the role of P11?") |

  | Max depth | 3 | Covers the key 3-hop chain: Nucleus -> Builder -> Kind -> Pillar; deeper hops add noise |

  | Query language | python | LlamaIndex KG Python API; Cypher not needed at this scale |

  | Pruning rule | relevance_score >= 0.65 | Prune low-confidence extracted triplets at ingestion time |'
integration: '| Component | Value |

  |-----------|-------|

  | Embedding model | text-embedding-3-small (or nomic-embed-text for local) |

  | Dedup strategy | fuzzy |

  | Dedup threshold | 0.88 |

  | Community detection | leiden |

  | Community granularity | medium |

  | Downstream consumers | cex_retriever.py, N07 orchestrator reasoning, cex_query.py discovery, architecture audit tooling
  |'
