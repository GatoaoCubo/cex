entity_types: '| Name | Description | Extraction Hint | Examples |

  |------|-------------|----------------|----------|

  | Nucleus | Specialized AI agent nucleus with a domain role (N00-N07) | "N0[0-7]", "nucleus", names like "N03 Builder",
  "N07 Orchestrator" | N07, N03, N01, N00 |

  | Pillar | Architectural domain layer (P01-P12) organizing artifact kinds | "P0[1-9]", "P1[0-2]", "pillar", domain labels
  like "P01 Knowledge" | P01, P08, P11, P12 |

  | Builder | Specialized artifact constructor (13-ISO stack per kind) | "{kind}-builder", "builder", "ISO stack", "bld_"
  prefix files | knowledge-graph-builder, agent-builder, prompt-template-builder |

  | Kind | Artifact type definition with schema, naming, and constraints | "kind:", "artifact kind", "kc_{kind}", named schemas
  in kinds_meta | knowledge_graph, agent, prompt_template, knowledge_card |

  | Artifact | Concrete produced instance of a kind (a .md file with frontmatter) | ".md file", "p01_", "p02_", "frontmatter
  id:", produced output | p01_kg_cex.md, p03_sp_n07.md, p08_ac_n03.md |

  | Pipeline | Named execution sequence or processing stage | "8F", "F1-F8", "pipeline stage", function names like "CONSTRAIN"
  | 8F pipeline, F1 CONSTRAIN, F6 PRODUCE, F7 GOVERN |'
relation_types: '| Name | Source Type | Target Type | Description | Directionality |

  |------|-------------|-------------|-------------|----------------|

  | orchestrates | Nucleus | Nucleus | N07 orchestrates all other nuclei (N01-N06); N00 is genesis archetype | directed |

  | dispatches_to | Nucleus | Nucleus | N07 dispatches work tasks to specialized nuclei via handoff files | directed |

  | owns_artifacts_in | Nucleus | Pillar | Each nucleus produces artifacts in its primary pillar domain | directed |

  | builds | Nucleus | Builder | A nucleus (N03) loads and executes a builder to produce artifacts | directed |

  | produces | Builder | Kind | A builder specializes in producing a specific kind of artifact | directed |

  | governs | Pillar | Kind | A pillar defines the schema, naming, and constraints for its kinds | directed |

  | contains | Pillar | Artifact | A pillar directory physically stores all artifact instances of its kinds | directed |

  | maps_to | Kind | Pillar | Every kind is assigned to exactly one pillar in kinds_meta.json | directed |

  | feeds | Artifact | Artifact | One artifact is consumed as input when producing another artifact | directed |'
