purpose: Routes brand identity, visual design, voice definition, and monetization strategy tasks to the brand specialist.
  The atlas agent specializes in brand consistency, visual identity systems, and commercial strategy optimization.
keyword_rationale: Bilingual PT/EN coverage captures both Portuguese brand commands ("marca", "identidade", "monetizar") and
  English task descriptions ("brand", "identity", "monetize"). Visual terms ("logo", "color", "style") and voice terms ("tone",
  "voice") cover the full brand development spectrum from identity to implementation.
fallback_logic: edison (creative/marketing specialist) handles brand-adjacent tasks when atlas is unavailable, providing continuity
  for brand voice and creative direction without the specialized monetization expertise.
