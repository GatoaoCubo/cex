purpose: Routes brand identity, voice, positioning, and style guide tasks to the marketing specialist agent. The atlas agent
  is optimized for brand development with expertise in visual identity, messaging frameworks, and brand consistency across
  touchpoints.
keyword_rationale: Bilingual PT/EN coverage captures both Portuguese operator commands ("marca", "identidade") and English
  task descriptions ("brand", "identity"). Includes core brand concepts like voice, positioning, style, and guidelines that
  span brand strategy and execution. Hybrid strategy handles both exact keyword matches and semantic similarity for brand-adjacent
  terms.
fallback_logic: Monetizer agent handles brand monetization and commercial positioning when atlas is unavailable. Can address
  brand value propositions, pricing psychology, and revenue-focused brand messaging without full brand strategy capabilities.
