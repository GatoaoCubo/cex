tldr: 'Four core system testing patterns: smoke tests (critical path), user journey (E2E workflow), chaos testing (failure
  modes), performance baseline (regression detection)'
when_to_use: When designing comprehensive system test suites that validate complete application behavior across all integration
  layers
keywords:
- smoke-testing
- user-journey
- chaos-engineering
- performance-baseline
long_tails:
- How to implement smoke tests for microservice deployments
- User journey testing with cross-system data dependencies
- Chaos engineering patterns for production resiliency validation
axioms:
- ALWAYS test critical user paths within 5 minutes of deployment
- NEVER mock external dependencies in true system tests
- IF system test takes >30min THEN split into focused test suites
