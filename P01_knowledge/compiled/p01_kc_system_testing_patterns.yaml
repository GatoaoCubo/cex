tldr: Test pyramid (70% unit, 20% integration, 10% e2e), contract testing for service boundaries, chaos engineering for resilience,
  smoke tests for deploy confidence
when_to_use: When designing testing strategy for microservices, validating distributed system reliability, or establishing
  CI/CD quality gates
keywords:
- test-pyramid
- contract-testing
- chaos-engineering
- smoke-testing
long_tails:
- How to implement contract testing between microservices
- Chaos engineering patterns for production resilience testing
- System testing strategy for distributed applications
axioms:
- ALWAYS follow test pyramid ratios to optimize cost and speed
- NEVER skip contract tests when services have external dependencies
- ALWAYS run smoke tests before production deployment
