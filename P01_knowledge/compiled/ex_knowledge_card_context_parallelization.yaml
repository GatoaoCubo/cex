summary: 'Agente unico carrega 10K-100K tokens de contexto irrelevante por tarefa. Arquitetura paralela: orchestrator (500
  tokens, so routing) + N workers (2K tokens, dominio narrow) + aggregator (merge + quality). Resultado: 79% reducao tokens,
  velocidade = tempo do worker mais lento (nao soma).'
spec: '| Approach | Tokens/task | Velocidade | Custo relativo |

  |----------|-------------|------------|----------------|

  | 1 agente x 50K contexto | 50,000 | 1x (serial) | 100% |

  | Orch(500) + 5 workers(2K) | 10,500 | 3-6x (paralelo) | 21% |

  | Savings | 79% reducao | 3-6x speedup | 79% economia |


  | Componente | Tokens | Funcao |

  |------------|--------|--------|

  | Orchestrator | ~500 | Routing logic, sem dominio |

  | Worker | ~1K-2K | Contexto narrow, 1 dominio |

  | Aggregator | ~500 | Merge results + quality check |'
patterns: '| Trigger | Action |

  |---------|--------|

  | Agente com >10K contexto | Decompor em workers especializados |

  | Tarefas independentes entre si | Parallelizar workers (spawn N) |

  | Tarefas dependentes | Pipeline sequencial (A->B->C) |

  | Quality check necessario | Aggregator valida merge |'
anti_patterns:
- Carregar contexto full em cada worker (anula o beneficio)
- Workers com escopo muito amplo (>3K tokens = nao eh narrow)
- Spawn >10 workers simultaneos (RAM/rate limit)
- Nao medir savings real (estimativa ≠ producao)
code: "<!-- source: pattern generico | lang: python | purpose: worker com contexto narrow -->\n# Orchestrator: routing only\
  \ (~500 tokens)\ndef orchestrate(task):\n    workers = decompose(task)  # split em subtarefas\n    results = parallel_run(workers)\
  \  # cada worker ~2K tokens\n    return aggregate(results)  # merge + quality check\n\n# Worker: contexto narrow, 1 dominio\n\
  def worker_marketing(product):\n    context = load_domain_context(\"marketing\", max_tokens=2000)\n    return llm_call(context\
  \ + product)  # 2K vs 50K\n\n<!-- source: benchmark empirico | lang: yaml | purpose: metricas de referencia -->\nparallelization_benchmarks:\n\
  \  max_parallel_workers: 10\n  worker_context_size: 1000-2500 tokens\n  measured_reduction: 40-80% vs agente unico\n  speed_multiplier:\
  \ 3-6x (tempo do mais lento, nao soma)\n  sweet_spot: 3-5 workers (alem de 10 = overhead > ganho)"
