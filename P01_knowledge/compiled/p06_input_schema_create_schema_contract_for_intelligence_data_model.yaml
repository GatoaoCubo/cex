id: p06_is_intelligence_data_model
kind: input_schema
pillar: P06
version: 1.0.0
created: '2026-04-02'
updated: '2026-04-02'
author: builder_agent
scope: intelligence data model creation and analysis operations
fields: '| # | Name | Type | Required | Default | Description |

  |---|------|------|----------|---------|-------------|

  | 1 | model_name | string | YES | — | Unique model slug identifier |

  | 2 | domain | string | YES | — | Intelligence domain enum (market_research, competitor_analysis, trend_analysis, threat_intelligence,
  benchmarking) |

  | 3 | entity_types | list | YES | — | Entity types to include (min 1) |

  | 4 | relationship_types | list | NO | [] | Relationship edges between entities |

  | 5 | source_formats | list | NO | ["text","json"] | Accepted raw data formats |

  | 6 | time_horizon | string | NO | "current" | Temporal scope: current / historical / predictive / all |

  | 7 | confidence_threshold | float | NO | 0.7 | Minimum confidence to include a finding (0.0–1.0) |

  | 8 | max_depth | integer | NO | 3 | Max relationship traversal depth (>= 1) |

  | 9 | output_format | string | NO | "structured" | Output style: structured / narrative / hybrid / graph |

  | 10 | tags | list | NO | [] | Indexing metadata tags |'
coercion:
- from: string
  to: float
  rule: Parse confidence_threshold from numeric string via float(); reject if non-numeric or outside [0.0, 1.0]
- from: string
  to: integer
  rule: Parse max_depth from numeric string via int(); reject if non-numeric or < 1
- from: string
  to: list
  rule: Coerce entity_types and relationship_types from comma-separated string to list[string] when a flat string is received
examples: "{\n  \"model_name\": \"ai_trends_2026\",\n  \"domain\": \"trend_analysis\",\n  \"entity_types\": [\"paper\", \"\
  technique\", \"organization\"],\n  \"time_horizon\": \"historical\",\n  \"confidence_threshold\": 0.6,\n  \"output_format\"\
  : \"hybrid\"\n}"
domain: intelligence-data-modeling
quality: 9.1
tags:
- input-schema
- intelligence
- data-model
- research
- P06
tldr: 'Input contract for intelligence data model ops: requires model_name, domain, entity_types; optional depth, confidence,
  time horizon, and output format.'
density_score: 0.92
keywords:
- input_schema
- intelligence
- data_model
- entity_types
- relationship_types
- confidence_threshold
- domain
- time_horizon
contract_definition: Intelligence data model creation and analysis operations receive structured input defining the model
  identity, intelligence domain, entity taxonomy, and operational parameters. Callers must provide a unique model name, the
  intelligence domain (e.g. competitor analysis, trend analysis), and at least one entity type to model. Optionally, callers
  configure relationship types between entities, accepted source formats, temporal scope, confidence threshold for findings
  inclusion, traversal depth for graph resolution, output representation style, and indexing tags. The receiver produces a
  fully typed intelligence data model artifact ready for ingestion by N01 pipelines and retriever configurations.
coercion_rules: '| From | To | Rule |

  |------|----|------|

  | string | float | Parse `confidence_threshold` via `float()`; reject if non-numeric or outside [0.0, 1.0] |

  | string | integer | Parse `max_depth` via `int()`; reject if non-numeric or < 1 |

  | string | list | Split `entity_types` / `relationship_types` on comma when a flat string is received |'
references:
- 'JSON Schema draft-07: json-schema.org'
- 'OpenAPI requestBody specification: spec.openapis.org/oas/v3.1.0'
- 'CEX P06 Schema: `P06_schema/_schema.yaml`'
