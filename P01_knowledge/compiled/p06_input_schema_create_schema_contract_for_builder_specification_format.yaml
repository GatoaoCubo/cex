contract_definition: Builder specification creation receives structured input defining a CEX builder's identity, functional
  scope, routing surface, and crew position. Callers provide a kebab-case identifier, output pillar, artifact domain, a one-sentence
  identity, enumerated capabilities, router keywords, natural language trigger phrases, and a crew role label. Optional fields
  cover the 8F function, execution limits, versioning, authorship, and tags. The receiver produces a complete builder spec
  (bld_manifest + ISOs) that the 8F pipeline, cex_query router, and crew orchestrator can consume.
coercion_rules: '| From | To | Rule |

  |------|----|------|

  | string (lowercase) | string (uppercase) | pillar "p06" → "P06"; llm_function "produce" → "PRODUCE" |

  | string (numeric) | integer | max_turns "25" → 25; reject non-numeric strings |

  | comma-separated string | list | capabilities, routing_keywords, routing_triggers split on "," with strip |'
references:
- CEX kinds_meta.json — canonical kind and pillar registry
- archetypes/builders/ — builder directory structure (13 ISOs per builder)
- .claude/rules/n03-8f-enforcement.md — 8F pipeline functions reference
