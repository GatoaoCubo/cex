id: p05_fmt_orchestration_reports
kind: formatter
pillar: P05
version: 1.0.0
created: '2026-04-02'
updated: '2026-04-02'
author: formatter-builder
target_format: markdown
input_type: structured_data
rule_count: 8
domain: orchestration_monitoring
quality: 9.1
tags:
- formatter
- markdown
- orchestration
- P05
- report
- nucleus
- mission
tldr: Converts orchestration run data into structured Markdown with mission status, nucleus activity, quality metrics, and
  resource utilization tables
template_engine: string_format
pretty_print: true
escaping: none
encoding: utf8
locale: en-US
streaming: false
keywords:
- orchestration-report
- mission-status
- nucleus-activity
- quality-metrics
- markdown-formatter
density_score: 0.88
formatting_rules: '| Name | Input Field | Transform | Pattern | Options |

  |------|-------------|-----------|---------|---------|

  | mission_header | mission_name | template | `## Mission: {value}` | uppercase_first: true |

  | status_badge | mission_status | stringify | `Status: {value}` | map: {running: "🟡 RUNNING", complete: "✅ COMPLETE", failed:
  "❌ FAILED", partial: "⚠️ PARTIAL"} |

  | quality_score | quality_avg | number_format | `{value:.1f}/10.0` | precision: 1, min_width: 5, fallback: "N/A" |

  | timestamp_fmt | completed_at | date_format | `{value:%Y-%m-%d %H:%M} UTC` | timezone: UTC, fallback: "In Progress" |

  | nucleus_table | nucleus_activity | tabulate | `\| {nucleus} \| {tasks_done} \| {pct_complete}% \| {quality_avg:.1f} \|`
  | headers: ["Nucleus", "Tasks", "Complete", "Quality"], align: left |

  | artifact_table | artifacts_produced | tabulate | `\| {kind} \| {name} \| {score:.1f} \|` | headers: ["Kind", "Artifact",
  "Score"], align: left, max_rows: 20 |

  | resource_pct | resource_utilization | number_format | `{value:.0%}` | percent_style: true, fallback: "—" |

  | error_list | errors | template | `- {nucleus}: {message}` | omit_if_empty: true, section_header: "## Errors" |'
input_specification: "Type: structured_data\nStructure: Single orchestration run object with nested nucleus activity records\
  \ and artifact inventory.\n\nExample:\n{\n  \"mission_name\": \"BRAND_LAUNCH_v2\",\n  \"mission_status\": \"complete\",\n\
  \  \"completed_at\": \"2026-04-02T14:07:30Z\",\n  \"quality_avg\": 9.1,\n  \"resource_utilization\": 0.74,\n  \"nucleus_activity\"\
  : [\n    {\"nucleus\": \"N03\", \"tasks_done\": 12, \"pct_complete\": 100, \"quality_avg\": 9.2},\n    {\"nucleus\": \"\
  N02\", \"tasks_done\": 5, \"pct_complete\": 100, \"quality_avg\": 8.9}\n  ],\n  \"artifacts_produced\": [\n    {\"kind\"\
  : \"agent\", \"name\": \"p02_agent_brand_core\", \"score\": 9.3}\n  ],\n  \"errors\": []\n}"
output_specification: 'Format: markdown


  Example:

  ## Mission: BRAND_LAUNCH_v2

  Status: ✅ COMPLETE

  Completed: 2026-04-02 14:07 UTC | Quality Avg: 9.1/10.0 | Resources: 74%


  ### Nucleus Activity

  | Nucleus | Tasks | Complete | Quality |

  |---------|-------|----------|---------|

  | N03     | 12    | 100%     | 9.2     |

  | N02     | 5     | 100%     | 8.9     |


  ### Artifacts Produced

  | Kind  | Artifact               | Score |

  |-------|------------------------|-------|

  | agent | p02_agent_brand_core   | 9.3   |'
template: 'Engine: string_format


  {mission_header}

  {status_badge}

  Completed: {timestamp_fmt} | Quality Avg: {quality_score} | Resources: {resource_pct}


  ### Nucleus Activity

  {nucleus_table}


  ### Artifacts Produced

  {artifact_table}

  {error_list}'
edge_cases:
- 'Null `completed_at`: render as `In Progress` via date_format fallback'
- 'Null `quality_avg`: render as `N/A`; never compute average over zero samples'
- 'Empty `errors` list: omit `## Errors` section entirely (omit_if_empty: true)'
- 'Empty `nucleus_activity`: render table with header row and single `— no nuclei active —` row'
- 'Pipe characters in artifact names: escaped as `\|` in all table cells'
- '`pct_complete` > 100 or < 0: clamp to [0, 100] range before rendering'
- '`mission_status` not in map: render raw value uppercased with no badge emoji'
references:
- 'CommonMark table spec: https://spec.commonmark.org/0.30/#tables-extension'
- 'Python strftime directives: https://docs.python.org/3/library/datetime.html#strftime-strptime-behavior'
- 'CEX formatter schema: `archetypes/builders/formatter-builder/bld_schema_formatter.md`'
- 'Orchestration monitoring KC: `P01_knowledge/library/kind/kc_formatter.md`'
