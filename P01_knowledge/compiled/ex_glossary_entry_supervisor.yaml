title: Glossary — Agent Node
term: agent_group
definition: Unidade autonoma de execucao no sistema CEX. Cada agent_group tem dominio fixo (Research, Build, Marketing), modelo
  LLM dedicado (opus ou sonnet), e MCPs exclusivos. O orchestrator (N07) coordena; agent_groups executam.
