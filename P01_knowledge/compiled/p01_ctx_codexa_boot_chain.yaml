id: p01_ctx_codexa_boot_chain
type: context_doc
domain: architecture
scope: boot_initialization
boot_layers: "LAYER 0: ENVIRONMENT\n  .env (API keys) + CODEXA_SATELLITE env var\n       |\nLAYER 1: BOOT SCRIPT (boot/{satellite}.cmd)\n\
  \  set CLAUDECODE= | set CODEXA_SATELLITE= | claude launch\n       |\nLAYER 2: CLAUDE.MD (auto-loaded)\n  \"Check CODEXA_SATELLITE\
  \ -> read PRIME_{SAT}.md\"\n       |\nLAYER 3: RULES (.claude/rules/, 10 files auto-loaded)\n  navigation, encoding, multi_repo,\
  \ boot-autonomy-flags,\n  STELLA_RULES, satellite-execution, agents-context,\n  satellites-context, codexa-learning\n  \
  \     |\nLAYER 4: PRIME_{SAT}.md (satellite identity + capabilities)\n       |\nLAYER 5: MENTAL_MODEL.yaml (deep identity\
  \ + execution history)\n       |\nLAYER 6: HANDOFF (dispatch queue)\n  .claude/handoffs/{satellite}_*.md\n       |\nLAYER\
  \ 7: EXECUTION\n  Agent loaded -> Skill applied -> Sub-agents spawned -> Output validated"
key_properties:
- 'Deterministic: same env = same boot state'
- 'Fractal: each layer references the next'
- 'Identity-first: satellite knows WHO it is before WHAT to do'
- 'Fail-safe: missing layer = graceful fallback (general session)'
critical_details: '| Layer | Token Cost | Mandatory |

  |-------|-----------|-----------|

  | L0 env | 0 | yes |

  | L1 boot script | 0 | yes (satellites) |

  | L2 CLAUDE.md | ~2K | yes |

  | L3 rules | ~8K | yes (auto-loaded) |

  | L4 PRIME | ~3K | yes (satellites) |

  | L5 mental_model | ~2K | recommended |

  | L6 handoff | ~1K | if dispatched |

  | L7 execution | variable | yes |


  Source: `records/framework/docs/META_BOOTSTRAP.md`'
