title: P12 Dispatch Rule Create Dispatch Rule For Creation Routing
purpose: Routes all artifact creation, build, and scaffolding tasks to the builder nucleus (N03). Builder carries the full
  8F pipeline, 114 builder archetypes, and CEX construction toolkit. Any task requesting a new artifact, schema, template,
  component, or structured output routes here. N03 is the authoritative executor for `create`, `build`, and `scaffold` intent
  signals.
keyword_rationale: Bilingual PT/EN coverage fires on both Portuguese operator commands and English task descriptions. Verb
  forms (`create`, `build`, `construct`) capture direct construction intent. `scaffold` and `generate` catch code-generation
  and template-instantiation sub-tasks. PT variants (`criar`, `construir`, `gerar`, `montar`, `produzir`, `implementar`) ensure
  multi-language operator commands route without fallback degradation. Generic query verbs (`get`, `fetch`, `run`) deliberately
  excluded to avoid false matches on read, query, or execution tasks that belong to executor or knowledge-engine.
fallback_logic: '`executor` handles tasks at the intersection of build and run phases (e.g., code generation followed by immediate
  execution, or artifact instantiation from existing templates). Below 0.75 confidence, the router evaluates adjacent rules
  before activating fallback. `executor` is preferred over `knowledge-engine` because partially-built artifacts need execution
  capability, not indexing or retrieval.'
