id: p12_dr_creation
kind: dispatch_rule
pillar: P12
version: 1.0.0
created: 2026-04-02
updated: 2026-04-02
author: dispatch-rule-builder
domain: creation
quality: 8.7
tags:
- dispatch
- creation
- build
- atlas
- routing
tldr: Route artifact creation and building tasks to atlas builder agent_node with opus model
scope: creation
keywords:
- criar
- create
- construir
- build
- gerar
- generate
- scaffold
- implementar
- implement
- produzir
- produce
- desenvolver
- develop
agent_node: atlas
model: opus
priority: 8
confidence_threshold: 0.75
fallback: pytha
conditions:
  exclude_domains:
  - research
  - marketing
  - documentation
routing_strategy: hybrid
density_score: 0.79
purpose: Routes artifact creation, building, and scaffolding tasks to the atlas builder agent_node. Atlas specializes in the
  8F pipeline and artifact construction across all CEX kinds, ensuring proper frontmatter, schema compliance, and quality
  gates. This rule captures the core "build something" intent that drives most CEX workflows.
keyword_rationale: Bilingual PT/EN coverage captures both Portuguese operator commands and English task descriptions. Core
  verbs (criar/create, construir/build) anchor the primary intent, while implementation terms (scaffold, implementar, produzir)
  catch adjacent construction tasks. The hybrid strategy combines keyword matching with semantic understanding for nuanced
  creation requests.
fallback_logic: Routes to pytha (knowledge agent) when atlas is unavailable, as knowledge agents can scaffold basic artifacts
  and understand CEX patterns, though without the specialized 8F pipeline optimization that atlas provides.
