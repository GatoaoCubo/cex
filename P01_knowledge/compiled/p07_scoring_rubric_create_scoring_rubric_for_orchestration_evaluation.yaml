framework_overview: '5D Orchestration evaluates workflow artifacts, DAGs, dispatch rules, handoff protocols, and spawn configurations
  across 5 critical dimensions. Designed for mission-critical orchestration where failure cascades across multiple nuclei.
  Prioritizes correctness and reliability over optimization, reflecting the high cost of orchestration failures in production
  environments. Target artifacts: Any P12 pillar orchestration component that coordinates multiple agents, manages handoffs
  between nuclei, or controls execution flow in the CEX system.'
dimensions: '| Dimension | Weight | Scale | Criteria | Example (10) | Example (5) |

  |-----------|--------|-------|----------|-------------|-------------|

  | Correctness | 35% | 0-10 | Execution produces expected outputs, handles all specified inputs, zero logic errors | All
  15 test cases pass, handles edge cases, proper error codes | 12/15 tests pass, minor edge case failures |

  | Reliability | 25% | 0-10 | Graceful failure handling, retry mechanisms, timeout management, circuit breakers | Fails fast
  with clear errors, 3-tier retry with exponential backoff | Basic error handling, single retry attempt |

  | Efficiency | 20% | 0-10 | Resource utilization, execution time, parallelization, blocking minimization | 80% parallel
  execution, <2s latency, memory efficient | 40% parallel, 5s latency, acceptable memory |

  | Scalability | 15% | 0-10 | Performance under load, queue management, resource scaling, bottleneck identification | Handles
  100+ concurrent tasks, auto-scaling, no bottlenecks | Handles 20 concurrent, manual scaling needed |

  | Maintainability | 5% | 0-10 | Code clarity, documentation, debugging support, modification ease | Self-documenting config,
  debug traces, modular design | Basic comments, some debug info available |'
thresholds: '| Tier | Score | Action |

  |------|-------|--------|

  | GOLDEN | >= 9.5 | Deploy to production, use as reference implementation |

  | PUBLISH | >= 8.0 | Deploy to staging, schedule production deployment |

  | REVIEW | >= 7.0 | Return with specific dimension feedback, require fixes |

  | REJECT | < 7.0 | Redo from scratch, fundamental design issues |'
calibration:
- 'GOLDEN (9.8): p12_wf_mission_pipeline — perfect execution flow, handles 6 nuclei in parallel, comprehensive error handling,
  auto-recovery, <1s latency'
- 'PUBLISH (8.4): Standard workflow with 4 nuclei, good error handling, 2s latency, manual intervention on some failures'
- 'REVIEW (7.1): Basic workflow with 2 nuclei, minimal error handling, 5s latency, requires manual restart on failures'
- 'REJECT (4.2): Sequential execution only, no error handling, frequent hangs, debugging impossible'
automation: '| Dimension | Status | Tool |

  |-----------|--------|------|

  | Correctness | automated | cex_system_test.py --orchestration + pytest execution validation |

  | Reliability | semi-automated | Error pattern analysis + manual failure scenario review |

  | Efficiency | automated | Performance profiling via cex_token_budget.py + execution timing |

  | Scalability | manual | Load testing with increasing task volumes |

  | Maintainability | semi-automated | Code complexity metrics + manual documentation review |'
references:
- CEX Orchestration Patterns v2.1 (N07 specification)
- Temporal Workflow Engine evaluation framework
- Martin Fowler's Enterprise Integration Patterns
