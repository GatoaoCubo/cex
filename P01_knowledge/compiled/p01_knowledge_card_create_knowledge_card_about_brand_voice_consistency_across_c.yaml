comparativo: '| Channel | Formality Level | Word Count | Response Time | Voice Adaptation |

  |---------|----------------|------------|---------------|------------------|

  | LinkedIn | 85% formal | 500-2000 | 24-48h | Professional emphasis |

  | Instagram | 40% formal | 50-150 | 1-4h | Visual-first, casual |

  | Email | 70% formal | 200-800 | Variable | Direct, actionable |

  | Website | 80% formal | 1000+ | Static | Complete brand voice |

  | Twitter | 30% formal | 10-280 | 15min-2h | Conversational, timely |'
