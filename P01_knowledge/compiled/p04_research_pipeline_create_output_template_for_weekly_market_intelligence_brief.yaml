tldr: 7-stage research pipeline with standardized output templates for weekly market intelligence briefs across multiple domains
  and formats
density_score: 0.91
pipeline_architecture_7_stages: ''
stage_1_intent_classification: "Model: Fast classifier (Gemini Flash)\nInput: Research query + domain + timeframe (weekly)\n\
  Output: Classified intent with brief type routing\nintent_types:\n  competitive_brief: competitor moves, pricing changes,\
  \ product launches\n  market_trend: demand shifts, seasonal patterns, emerging segments\n  regulatory_brief: policy changes,\
  \ compliance updates, industry standards\n  consumer_sentiment: reviews, social mentions, satisfaction trends\n  pricing_intelligence:\
  \ price movements, promotional patterns, value perception"
stage_2_plan_storm_multi_perspective: "Model: Reasoning model (GPT-4o mini)\nInput: Classified intent + weekly timeframe\n\
  Output: 5 expert perspectives × 6-8 time-bounded sub-questions\nperspectives:\n  market_analyst:\n    focus: \"volume trends,\
  \ growth metrics, market share shifts this week\"\n    questions: [\"What volume changes occurred in top 3 categories?\"\
  , \"Which competitors gained/lost share?\", \"What pricing adjustments were made?\"]\n  consumer_researcher:\n    focus:\
  \ \"sentiment shifts, review patterns, social mentions this week\"  \n    questions: [\"What sentiment changes occurred?\"\
  , \"Which products got negative reviews?\", \"What social trends emerged?\"]\n  competitive_intelligence:\n    focus: \"\
  competitor moves, product launches, strategic changes this week\"\n    questions: [\"What new products launched?\", \"Which\
  \ competitors changed pricing?\", \"What marketing campaigns started?\"]\n  regulatory_monitor:\n    focus: \"policy updates,\
  \ compliance changes, industry standards this week\"\n    questions: [\"What regulations were announced?\", \"Which compliance\
  \ deadlines approached?\", \"What industry standards updated?\"]\n  business_strategist:\n    focus: \"opportunities, threats,\
  \ strategic implications for this week\"\n    questions: [\"What opportunities opened?\", \"Which threats materialized?\"\
  , \"What strategic responses are needed?\"]"
stage_3_retrieve_crag_with_quality_gates: "Model: API orchestrator + Gemini Flash for quality scoring\nInput: 30-40 sub-questions\
  \ from STORM planning\nOutput: Scored, filtered results (≥0.7 quality threshold)\nsource_categories:\n  inbound_marketplaces:\
  \ [mercadolivre, shopee, amazon, magalu, americanas]\n  outbound_social: [youtube, reddit, twitter, tiktok, reclameaqui]\
  \  \n  search_engines: [serper, exa, gemini_search, brave]\n  trend_platforms: [pytrends, keepa, semrush, similar_web]\n\
  \  news_feeds: [google_news, bing_news, reuters, industry_pubs]\n\nquality_gates:\n  marketplace_data: 0.8  # high precision\
  \ needed for pricing\n  social_mentions: 0.6   # social data naturally noisy\n  news_articles: 0.7     # medium precision\
  \ for trends  \n  search_results: 0.7    # web search quality varies"
stage_4_resolve_entity_deduplication: "Model: Deterministic + embedding similarity\nInput: Raw scored results from multiple\
  \ sources\nOutput: Deduplicated entities with source attribution\nresolution_strategy:\n  products: EAN/GTIN matching +\
  \ title similarity (>0.85)\n  companies: name normalization + domain matching\n  news_events: timestamp clustering + headline\
  \ similarity\n  social_mentions: author dedup + content hash matching"
stage_5_score_gartner_7_dimension_intelligence_scoring: "Model: Gemini Flash for rapid scoring\nInput: Deduplicated entities\n\
  Output: Multi-dimensional scores per entity\nscoring_dimensions:\n  relevance: 0.0-1.0     # how relevant to research query\n\
  \  impact: 0.0-1.0        # potential business impact\n  urgency: 0.0-1.0       # time sensitivity for response\n  confidence:\
  \ 0.0-1.0    # data quality and source reliability\n  actionability: 0.0-1.0 # how actionable the insight is\n  novelty:\
  \ 0.0-1.0       # how new/unexpected the information\n  strategic_value: 0.0-1.0 # long-term strategic importance"
stage_6_synthesize_graph_of_thoughts_multi_model: "Model: Domain-specific model routing\nInput: Scored, prioritized intelligence\
  \ data\nOutput: Structured weekly brief sections\nsynthesis_models:\n  executive_summary: claude-3-sonnet    # concise,\
  \ business-focused\n  competitive_analysis: gpt-4o         # analytical depth\n  market_trends: gemini-2.5-pro        #\
  \ pattern recognition\n  consumer_insights: claude-3-sonnet    # human behavior understanding\n  recommendations: gpt-4o\
  \              # strategic reasoning"
stage_7_verify_critic_self_correction: "Model: Thinking model (o1-mini)\nInput: Synthesized brief + source data\nOutput: Verified,\
  \ corrected brief (max 3 iterations)\nverification_checks:\n  factual_accuracy: cross-reference numbers with sources\n \
  \ logical_consistency: ensure conclusions follow from data\n  completeness: verify all STORM perspectives addressed\n  bias_detection:\
  \ flag potential analytical bias\n  recommendation_quality: assess actionability and specificity"
output_template_structure: ''
weekly_brief_template_html_pptx_json: "template_sections:\n  header:\n    title: \"Weekly Market Intelligence Brief - {{domain}}\
  \ - Week {{week_number}}\"\n    date_range: \"{{start_date}} to {{end_date}}\"\n    analyst: \"{{analyst_name}}\"\n    confidence_score:\
  \ \"{{overall_confidence}}/10\"\n    \n  executive_summary:\n    key_insights: \"{{top_3_insights}}\"\n    impact_assessment:\
  \ \"{{business_impact_summary}}\"\n    urgency_flags: \"{{immediate_action_items}}\"\n    \n  competitive_landscape:\n \
  \   new_entrants: \"{{new_competitors_this_week}}\"\n    pricing_moves: \"{{pricing_changes_table}}\"\n    product_launches:\
  \ \"{{new_products_with_impact}}\"\n    market_share_shifts: \"{{share_change_visualization}}\"\n    \n  market_trends:\n\
  \    demand_patterns: \"{{volume_trend_charts}}\"\n    seasonal_factors: \"{{seasonality_analysis}}\"\n    emerging_segments:\
  \ \"{{new_categories_or_niches}}\"\n    consumer_behavior: \"{{behavior_shift_indicators}}\"\n    \n  regulatory_updates:\n\
  \    policy_changes: \"{{new_regulations_this_week}}\"\n    compliance_deadlines: \"{{upcoming_compliance_dates}}\"\n  \
  \  industry_standards: \"{{standards_updates}}\"\n    \n  consumer_insights:\n    sentiment_analysis: \"{{sentiment_score_changes}}\"\
  \n    review_patterns: \"{{review_trend_analysis}}\"\n    social_mentions: \"{{social_media_intelligence}}\"\n    pain_points:\
  \ \"{{emerging_customer_issues}}\"\n    \n  strategic_recommendations:\n    immediate_actions: \"{{this_week_action_items}}\"\
  \n    short_term_opportunities: \"{{2_4_week_opportunities}}\"\n    risk_mitigation: \"{{identified_threats_and_responses}}\"\
  \n    monitoring_priorities: \"{{what_to_watch_next_week}}\"\n    \n  appendix:\n    data_sources: \"{{source_list_with_confidence}}\"\
  \n    methodology: \"{{STORM_CRAG_CRITIC_summary}}\"\n    confidence_intervals: \"{{uncertainty_ranges}}\""
multi_format_output_specifications: ''
html_report_template: "<!DOCTYPE html>\n<html>\n<head>\n    <title>{{brief_title}}</title>\n    <style>\n        .confidence-high\
  \ { color: #2E7D32; }\n        .confidence-medium { color: #F57F17; }\n        .confidence-low { color: #C62828; }\n   \
  \     .urgent { border-left: 4px solid #FF5722; }\n    </style>\n</head>\n<body>\n    <header class=\"brief-header\">\n\
  \        <h1>{{title}}</h1>\n        <div class=\"metadata\">\n            <span>{{date_range}}</span>\n            <span>Confidence:\
  \ {{confidence}}/10</span>\n        </div>\n    </header>\n    \n    <section class=\"executive-summary urgent\">\n    \
  \    <h2>Executive Summary</h2>\n        {{#each key_insights}}\n        <div class=\"insight confidence-{{this.confidence_level}}\"\
  >\n            {{this.text}}\n        </div>\n        {{/each}}\n    </section>\n    \n    <!-- Additional sections follow\
  \ template structure -->\n</body>\n</html>"
pptx_template_structure: "slide_structure:\n  slide_1_cover:\n    title: \"Weekly Intelligence Brief\"\n    subtitle: \"{{domain}}\
  \ - {{date_range}}\"\n    confidence_indicator: \"Overall Confidence: {{confidence}}/10\"\n    \n  slide_2_summary:\n  \
  \  title: \"Executive Summary - Top 3 Insights\"\n    bullets: \"{{key_insights_formatted}}\"\n    urgency_callouts: \"\
  {{urgent_items_highlighted}}\"\n    \n  slide_3_competitive:\n    title: \"Competitive Moves This Week\"\n    table: \"\
  {{competitor_activity_table}}\"\n    chart: \"{{market_share_changes}}\"\n    \n  slide_4_trends:\n    title: \"Market Trends\
  \ & Consumer Behavior\" \n    charts: [\"{{demand_chart}}\", \"{{sentiment_chart}}\"]\n    insights: \"{{trend_bullets}}\"\
  \n    \n  slide_5_actions:\n    title: \"Recommended Actions\"\n    immediate: \"{{this_week_actions}}\"\n    short_term:\
  \ \"{{2_4_week_opportunities}}\"\n    watch_list: \"{{monitoring_priorities}}\""
json_data_export: "{\n  \"brief_metadata\": {\n    \"id\": \"{{brief_id}}\",\n    \"domain\": \"{{domain}}\",\n    \"week\"\
  : \"{{week_number}}\",\n    \"date_range\": {\"start\": \"{{start_date}}\", \"end\": \"{{end_date}}\"},\n    \"confidence_score\"\
  : {{overall_confidence}},\n    \"analyst\": \"{{analyst_name}}\"\n  },\n  \"insights\": [\n    {\n      \"category\": \"\
  competitive|trend|regulatory|consumer\",\n      \"text\": \"{{insight_text}}\",\n      \"confidence\": {{0.0_to_1.0}},\n\
  \      \"impact\": {{0.0_to_1.0}}, \n      \"urgency\": {{0.0_to_1.0}},\n      \"sources\": [\"{{source_1}}\", \"{{source_2}}\"\
  ],\n      \"evidence\": [\n        {\"type\": \"data_point\", \"value\": \"{{metric}}\", \"source\": \"{{source}}\"},\n\
  \        {\"type\": \"quote\", \"text\": \"{{quote}}\", \"source\": \"{{source}}\"}\n      ]\n    }\n  ],\n  \"recommendations\"\
  : [\n    {\n      \"timeframe\": \"immediate|short_term|long_term\",\n      \"action\": \"{{action_description}}\",\n  \
  \    \"rationale\": \"{{why_recommended}}\",\n      \"success_metrics\": [\"{{metric_1}}\", \"{{metric_2}}\"],\n      \"\
  resources_needed\": [\"{{resource_1}}\", \"{{resource_2}}\"]\n    }\n  ],\n  \"data_quality\": {\n    \"sources_used\":\
  \ {{source_count}},\n    \"crag_pass_rate\": {{percentage}},\n    \"critic_iterations\": {{iteration_count}},\n    \"confidence_distribution\"\
  : {\n      \"high\": {{percentage}},\n      \"medium\": {{percentage}}, \n      \"low\": {{percentage}}\n    }\n  }\n}"
configuration_schema: ''
weekly_brief_config: "brief_config:\n  schedule: weekly\n  delivery_day: friday\n  lookback_period: 7_days\n  format_priority:\
  \ [html, pptx, json]\n  \n  content_requirements:\n    max_insights: 5\n    max_recommendations: 8\n    executive_summary_words:\
  \ 150\n    confidence_threshold: 0.6\n    \n  distribution:\n    internal_stakeholders: [\"{{email_list}}\"]\n    external_clients:\
  \ [\"{{client_email_list}}\"]\n    archive_location: \"{{s3_bucket_or_folder}}\"}\n    \nquality_gates:\n  min_sources_per_insight:\
  \ 2\n  min_confidence_for_urgent: 0.8\n  max_uncertainty_range: 0.3\n  required_perspectives: 4  # out of 5 STORM perspectives"
budget_controls: "weekly_budget:\n  serper_queries: 50        # web search budget per week\n  firecrawl_pages: 25       #\
  \ content crawling budget\n  social_api_calls: 200     # social platform API usage\n  llm_tokens: 100000        # total\
  \ LLM token budget\n  \ncost_optimization:\n  cache_duration: 24_hours  # cache results within week\n  batch_processing:\
  \ true    # batch similar queries\n  fallback_free_sources: [pytrends, reddit_free, youtube_free]"
quality_metrics: "success_metrics:\n  insight_accuracy: target_85_percent\n  recommendation_adoption: target_60_percent  \n\
  \  stakeholder_satisfaction: target_4_of_5\n  time_to_delivery: target_24_hours\n  \nmonitoring:\n  crag_quality_trends:\
  \ track_weekly\n  critic_correction_rate: track_weekly\n  source_reliability: track_monthly\n  confidence_calibration: track_monthly"
