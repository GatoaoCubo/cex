id: p12_dr_engineering
kind: dispatch_rule
pillar: P12
version: 1.0.0
created: 2026-04-02
updated: 2026-04-02
author: dispatch-rule-builder
domain: engineering
quality: 8.7
tags:
- dispatch
- engineering
- builder
- coding
- development
tldr: Route engineering, development and coding tasks to builder agent_node with opus model
scope: engineering
keywords:
- engenharia
- engineering
- codigo
- code
- desenvolver
- develop
- programar
- program
- build
- construir
- implementar
- implement
- software
- app
agent_node: builder
model: opus
priority: 8
confidence_threshold: 0.75
fallback: executor
conditions:
  exclude_domains:
  - research_papers
  - marketing_copy
routing_strategy: hybrid
density_score: 0.79
purpose: Routes software engineering, development, and coding tasks to the builder agent_node. The builder specializes in
  artifact creation, code implementation, and technical scaffolding with access to opus model for complex engineering reasoning
  and multi-step development tasks.
keyword_rationale: Bilingual PT/EN coverage captures both Portuguese operator commands ("desenvolver app") and English technical
  descriptions ("implement authentication"). Keywords span the full engineering lifecycle from high-level "engenharia" to
  specific actions like "programar" and "implementar". Generic terms like "software" and "app" catch domain-adjacent requests.
fallback_logic: Routes to executor when builder is unavailable. Executor handles operational aspects of engineering like testing,
  deployment, and code review, providing complementary engineering capabilities when primary builder agent_node cannot accept
  the task.
