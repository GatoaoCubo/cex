quick_reference: 'topic: N04 Knowledge Engineer (Knowledge Nucleus)

  scope: KC lifecycle, RAG, Supabase, fine-tuning, ML datasets, taxonomy

  owner: n04_knowledge_engineer

  criticality: high

  cli: gemini 2.5-pro (1M context window)

  artifacts_dir: N04_knowledge/

  model_advantage: 1M ctx — full KC pool in single pass'
key_concepts: '| Concept | Role | Concrete Detail |

  |---------|------|-----------------|

  | KC Lifecycle | Core mission | Create → validate (density >= 0.80) → version → inject → archive |

  | compose_prompt() | Injection point | Retrieves top-k KCs via BM25 + vector hybrid into every nucleus prompt |

  | Supabase layer | DB backend | Stores KC vectors, metadata, BM25 index; enables hybrid search at runtime |

  | Fine-tuning JSONL | ML output | Exports KCs as `{instruction, input, output}` triples for model training |

  | Taxonomy | Classification | domain_tags, card_type (domain_kc/meta_kc), pillar routing, freshness decay |

  | chunk_strategy | RAG config | Defines chunking window, overlap, and embedding model for each source type |

  | embedding_config | RAG config | Provider (OpenAI/Cohere/Bedrock), dimensions, batch size, normalization |'
strategy_phases:
- 'Ingest: Receive raw source or research brief → parse → extract atomic facts → classify domain_kc vs meta_kc'
- 'Distill: Apply density gate (>= 0.80) → replace prose with tables/bullets → strip filler language'
- 'Index: Embed KC body → upsert to Supabase with metadata + tags → refresh BM25 index'
- 'Inject: compose_prompt() retrieves top-k KCs by hybrid score → prepends to nucleus system prompt'
- 'Maintain: Decay freshness scores → flag stale KCs → version on substantive edit → archive on expiry'
golden_rules:
- 'ROUTE to N04: RAG pipelines, KC authoring, embedding_config, chunk_strategy, taxonomy, Supabase schema'
- 'NEVER route to N04: artifact construction (→ N03), marketing copy (→ N02), CI/CD debug (→ N05)'
- 'METRIZE: hit_rate = kc_hits / total_retrieval_calls; target >= 80% relevant retrievals'
- 'EXPORT: JSONL format `{"instruction": "...", "input": "...", "output": "..."}` per KC fact'
flow: "[Raw Source / Research Brief]\n          |\n    [N04 Ingest + Distill]\n          |\n  [density >= 0.80 gate]\n   \
  \       |\n   [Supabase Vector Store]\n    (BM25 + pgvector)\n          |\n   [compose_prompt() hybrid retrieval at runtime]\n\
  \          |\n   [Top-k KCs injected into every nucleus prompt]\n          |\n   [Fine-tuning JSONL export → model training]"
comparativo_routing_decision_matrix: '| Task | Route To | Why |

  |------|----------|-----|

  | Author new KC from research | N04 | KC lifecycle ownership |

  | Build agent grounded in KCs | N03 | Artifact construction (not KC) |

  | Configure embedding model | N04 | embedding_config kind |

  | Define chunk strategy for RAG | N04 | chunk_strategy kind |

  | Research papers to source KCs | N01 | Intelligence/large-doc analysis |

  | Debug RAG retrieval code | N05 | Operations/DevOps |

  | Marketing copy backed by KCs | N02 | Marketing nucleus |

  | Orchestrate multi-nucleus mission | N07 | Orchestrator only |'
