tldr: 'Config-driven social media publishing pipeline with 10-step automation: LOAD→FETCH→SELECT→GENERATE→OPTIMIZE→HASHTAGS→PUBLISH→LOG→NOTIFY→ROTATE'
density_score: 0.92
pipeline_architecture: ''
10_step_publishing_pipeline: '| Step | Name | Input | Process | Output | Failure Recovery |

  |------|------|-------|---------|--------|-----------------|

  | 1 | LOAD | config.yaml path | Parse and validate configuration | Validated config object | FileNotFound → abort with error
  |

  | 2 | FETCH | catalog source + credentials | Query API/DB for content list | Array of content items | Timeout → retry 3x,
  then skip cycle |

  | 3 | SELECT | content list + rotation state | Apply cooldown rules and content mix | Next item to publish | Empty queue
  → skip cycle gracefully |

  | 4 | GENERATE | item + persona + platform | LLM call for caption generation | Platform-optimized caption | LLM error →
  use fallback template |

  | 5 | OPTIMIZE | platform + timezone + calendar | Calculate best posting time | Scheduled datetime | Missing data → use
  default schedule |

  | 6 | HASHTAGS | niche + brand tags + platform limits | Generate hashtag string | Optimized hashtags within limits | Over
  limit → truncate to max |

  | 7 | PUBLISH | caption + media + hashtags + API | Send to social platform | Post ID + public URL | API error → exponential
  backoff retry |

  | 8 | LOG | post result + metadata + timestamp | Write structured JSON log | Audit trail entry | Log failure → stderr +
  continue |

  | 9 | NOTIFY | post URL + status + webhook config | Send notification to team | Notification delivered | Channel down →
  skip silently |

  | 10 | ROTATE | posted item + cooldown period | Update rotation state | Refreshed cooldown tracker | State corrupt → rebuild
  from logs |'
configuration_template: "# Social Publisher Configuration\n# Company: {{empresa}}\n# Generated: {{timestamp}}\n\nidentity:\n\
  \  empresa: \"{{empresa}}\"\n  handle: \"{{social_handle}}\"\n  nicho: \"{{nicho}}\"           # pet, food, saas, fashion,\
  \ fitness, beauty, tech, education\n  tom: \"{{tom}}\"               # casual/professional, friendly/formal, playful/serious\n\
  \  persona: \"{{persona_name}}\"  # Brand voice persona name\n  bio: \"{{brand_bio}}\"         # Max 160 chars for bio optimization\n\
  \nplatforms: [{{platforms_list}}]  # instagram, facebook, tiktok, linkedin, twitter, youtube\n\nschedule:\n  timezone: \"\
  {{timezone}}\"      # IANA timezone: America/Sao_Paulo, US/Eastern, Europe/London\n  calendar:\n    monday:    { type: \"\
  {{mon_type}}\", time: \"{{mon_time}}\" }    # product/educational/tips/trends\n    tuesday:   { type: \"{{tue_type}}\",\
  \ time: \"{{tue_time}}\" }\n    wednesday: { type: \"{{wed_type}}\", time: \"{{wed_time}}\" }\n    thursday:  { type: \"\
  {{thu_type}}\", time: \"{{thu_time}}\" }\n    friday:    { type: \"{{fri_type}}\", time: \"{{fri_time}}\" }\n    saturday:\
  \  { type: \"{{sat_type}}\", time: \"{{sat_time}}\" }\n    sunday:    { type: \"{{sun_type}}\", time: \"{{sun_time}}\" }\n\
  \ncontent_mix:\n  product: {{pct_product}}       # 0-100: % posts featuring products/services\n  educational: {{pct_educational}}\
  \ # 0-100: % educational/how-to content\n  tips: {{pct_tips}}             # 0-100: % quick tips and tricks\n  trends: {{pct_trends}}\
  \         # 0-100: % trending topics and news\n  # CONSTRAINT: product + educational + tips + trends MUST = 100\n\ncatalog:\n\
  \  type: \"{{catalog_type}}\"      # supabase, shopify, airtable, csv, api, manual\n  url_env: \"{{CATALOG_URL_ENV}}\" \
  \       # Environment variable for connection URL\n  key_env: \"{{CATALOG_KEY_ENV}}\"        # Environment variable for\
  \ API key\n  table: \"{{catalog_table}}\"            # Table/collection name\n  fields:\n    title: \"{{title_field}}\"\
  \           # Product/content title field\n    description: \"{{desc_field}}\"      # Description field\n    image: \"{{image_field}}\"\
  \           # Image URL field\n    price: \"{{price_field}}\"           # Price field (optional)\n    category: \"{{category_field}}\"\
  \     # Category/type field\n  cooldown_days: {{cooldown}}           # Min days before reposting same item (1-30)\n\npublisher:\n\
  \  type: \"{{publisher_type}}\"    # ayrshare, postiz, meta_graph\n  api_key_env: \"{{PUBLISHER_KEY_ENV}}\"  # Environment\
  \ variable for API key\n  base_url_env: \"{{PUBLISHER_URL_ENV}}\" # For self-hosted (Postiz)\n  batch_size: {{batch_size}}\
  \            # Posts per batch (1-10)\n  retry:\n    max: {{retry_max}}                  # Maximum retry attempts (1-5)\n\
  \    backoff: \"exponential\"              # exponential, linear, fixed\n    base_seconds: {{retry_base}}        # Base\
  \ wait time in seconds (10-300)\n\nhashtags:\n  brand: [{{brand_hashtags}}]           # Brand-specific hashtags\n  niche:\
  \ [{{niche_hashtags}}]           # Niche/industry hashtags\n  trending: [{{trending_hashtags}}]     # Trending/seasonal\
  \ hashtags\n  max_per_post: {{max_hashtags}}        # Platform limit (IG: 30, TW: 3, LI: 5)\n  strategy: \"{{hashtag_strategy}}\"\
  \      # mix_all, brand_first, niche_heavy\n\nllm_generation:\n  provider: \"{{llm_provider}}\"          # anthropic, openai,\
  \ google\n  model: \"{{llm_model}}\"                # claude-3-sonnet, gpt-4, gemini-pro\n  api_key_env: \"{{LLM_KEY_ENV}}\"\
  \       # Environment variable for LLM API key\n  max_tokens: {{max_tokens}}            # Token limit for caption generation\n\
  \  temperature: {{temperature}}          # Creativity level (0.0-1.0)\n  system_prompt: |\n    You are {{persona_name}}\
  \ from {{empresa}}. \n    Write {{tom}} social media captions for {{nicho}} audience.\n    Brand bio: {{brand_bio}}\n\n\
  notifications:\n  enabled: {{notify_enabled}}           # true/false\n  channels:\n    discord:\n      enabled: {{discord_enabled}}\
  \      # true/false\n      webhook_env: \"{{DISCORD_WEBHOOK_ENV}}\"\n    slack:\n      enabled: {{slack_enabled}}      \
  \  # true/false\n      webhook_env: \"{{SLACK_WEBHOOK_ENV}}\"\n    email:\n      enabled: {{email_enabled}}        # true/false\n\
  \      smtp_env: \"{{EMAIL_SMTP_ENV}}\"\n      recipient: \"{{notification_email}}\"\n\nautomation:\n  cron:\n    type:\
  \ \"{{cron_type}}\"              # windows_task, crontab, systemd\n    interval: \"{{cron_interval}}\"      # daily, hourly,\
  \ \"0 19   *\"\n    enabled: {{cron_enabled}}          # true/false\n  monitoring:\n    health_check_url: \"{{health_url}}\"\
  \  # Optional health check endpoint\n    log_level: \"{{log_level}}\"          # DEBUG, INFO, WARN, ERROR\n    max_log_files:\
  \ {{max_logs}}         # Log rotation limit\n\nquality_gates:\n  caption:\n    min_length: {{min_caption}}         # Minimum\
  \ caption length\n    max_length: {{max_caption}}         # Platform-specific max length\n    required_elements: [{{required_elements}}]\
  \  # call_to_action, brand_mention, hashtags\n  engagement:\n    min_quality_score: {{min_score}}    # Minimum LLM quality\
  \ score (0-10)\n    profanity_check: {{profanity_check}} # true/false\n    brand_voice_check: {{voice_check}}   # true/false\n\
  \  posting:\n    avoid_duplicates: {{avoid_dupes}}    # true/false\n    respect_cooldown: {{respect_cool}}   # true/false\n\
  \    platform_limits: {{platform_lims}}  # true/false"
platform_matrix: '| Platform | Max Caption | Max Hashtags | Image Sizes | Best Times | API Provider |

  |----------|------------|-------------|-------------|------------|-------------|

  | Instagram | 2200 chars | 30 (rec: 5-10) | 1080×1080, 1080×1350 | 11-13h, 19-21h | Meta Graph, Ayrshare |

  | Facebook | 63206 chars | No limit (rec: 3-5) | 1200×630 | 13-16h | Meta Graph, Ayrshare |

  | TikTok | 2200 chars | 5-8 | 1080×1920 (video) | 19-22h | Ayrshare, Postiz |

  | LinkedIn | 3000 chars | 3-5 | 1200×627 | 8-10h, 17-18h | Ayrshare, Postiz |

  | Twitter/X | 280 chars | 2-3 | 1200×675 | 9-11h, 12-13h | Ayrshare, Postiz |

  | YouTube | 5000 chars | No limit | 1280×720 | 14-16h, 20-22h | Direct API |'
content_calendar_template: "# 7-Day Content Calendar Template\nweekly_schedule:\n  structure: |\n    MON: Educational (how-to,\
  \ tutorials)\n    TUE: Tips (quick wins, hacks)\n    WED: Product (features, launches)\n    THU: Educational (industry insights)\n\
  \    FRI: Trends (news, viral topics)\n    SAT: Tips (weekend activities)\n    SUN: Product (testimonials, reviews)\n  \n\
  \  posting_times:\n    business_hours: \"09:00-17:00\"\n    peak_engagement: \"12:00-13:00, 19:00-21:00\"\n    weekend_shift:\
  \ \"+2h\"  # Post 2 hours later on weekends\n  \n  content_rotation:\n    cycle_length: 21  # Days before repeating content\
  \ themes\n    cooldown_enforcement: strict  # strict/flexible\n    seasonal_adjustments: true"
quality_validation_rules: ''
hard_requirements_must_pass:
- All content_mix percentages sum to exactly 100
- No API keys in plaintext (only ENV_VAR references)
- All platforms in list are supported
- cooldown_days >= 1
- Timezone is valid IANA string
- Retry configuration present and valid
soft_requirements_warnings:
- At least 2 publisher types supported
- Notification channel configured
- Hashtag strategy defined
- Caption length within platform limits
- Posting times optimized for timezone
- LLM generation parameters tuned
- Quality gates configured
- Monitoring/logging enabled
runtime_state_management: "# Runtime state tracking (auto-generated)\nrotation_state:\n  last_posted: \"2026-04-02T10:20:00Z\"\
  \n  content_history:\n    - id: \"product_123\"\n      posted_at: \"2026-04-01T19:00:00Z\"\n      platforms: [\"instagram\"\
  , \"facebook\"]\n      cooldown_until: \"2026-04-04T19:00:00Z\"\n  cycle_position:\n    week: 1\n    day: \"tuesday\"\n\
  \    content_type: \"tips\"\n  next_scheduled: \"2026-04-02T19:00:00Z\"\n\nanalytics_tracking:\n  posts_this_month: 28\n\
  \  engagement_avg: 4.2\n  best_performing_time: \"19:00\"\n  best_performing_type: \"product\"\n  platform_performance:\n\
  \    instagram: { posts: 15, avg_engagement: 5.1 }\n    facebook: { posts: 13, avg_engagement: 3.3 }"
