density_score: 0.91
purpose: 'Produces a precisely scoped knowledge task prompt for any topic within any domain. The same mold generates distinct
  prompts across six knowledge operations — synthesize, extract, compare, summarize, map, and audit — by substituting `task_type`
  and the remaining variables. Reuse scope covers any situation where an LLM must execute a structured knowledge operation:
  building knowledge cards, extracting entities from documents, comparing concepts, auditing knowledge bases, or mapping concept
  relationships. Composable: designed for embedding as a sub-block inside mission-level or multi-step pipeline templates.'
variables_table: '| Name | Type | Required | Default | Description |

  |---|---|---|---|---|

  | topic | string | true | null | The subject, concept, or entity the knowledge task will address |

  | domain | string | true | null | Knowledge domain classifying the topic (e.g., machine_learning, finance, biology) |

  | task_type | string | true | null | Knowledge operation: synthesize, extract, compare, summarize, map, or audit |

  | audience | string | false | "intermediate" | Target reader level calibrating terminology and depth |

  | depth | string | false | "standard" | Coverage depth: brief, standard, or deep |

  | output_format | string | false | "structured" | Output shape: structured, prose, or bullet |

  | sources | list | false | [] | Reference sources, URLs, or citation keys to incorporate |

  | constraints | list | false | [] | Explicit focus constraints, exclusion rules, or scope boundaries |'
template_body: "You are a knowledge specialist operating in the {{domain}} domain.\n\nTASK: {{task_type}}\nTOPIC: {{topic}}\n\
  AUDIENCE: {{audience}}\nDEPTH: {{depth}}\nOUTPUT FORMAT: {{output_format}}\n\n{{#sources}}\nSOURCES TO INCORPORATE:\n{{#sources}}\n\
  - {{.}}\n{{/sources}}\n{{/sources}}\n\n{{#constraints}}\nSCOPE CONSTRAINTS:\n{{#constraints}}\n- {{.}}\n{{/constraints}}\n\
  {{/constraints}}\n\n---\n\nTASK EXECUTION GUIDE\n\nApply the operation \"{{task_type}}\" to \"{{topic}}\" within {{domain}}\
  \ as follows:\n\nsynthesize  → Integrate multiple perspectives into a unified, original account. Resolve contradictions.\
  \ Surface the consensus and the contested edges.\nextract     → Identify and list discrete, atomic facts, entities, or relationships.\
  \ One claim per item. No interpretation.\ncompare     → Produce a structured comparison: shared properties, divergent properties,\
  \ and the implications of the differences.\nsummarize   → Compress the core meaning into the minimum tokens that preserve\
  \ fidelity. Preserve key terms. Omit elaboration.\nmap         → Generate a concept map: nodes (key terms in {{domain}}),\
  \ edges (relationships), and a brief label for each edge type.\naudit       → Evaluate existing knowledge for gaps, outdated\
  \ claims, internal contradictions, and missing cross-references. Return a scored gap report.\n\n---\n\nOUTPUT REQUIREMENTS\n\
  \nFormat: {{output_format}}\n  structured → Use ## headers, tables, and bullet lists. Every section must have a label.\n\
  \  prose      → Continuous paragraphs. No headers except the title. Transitions required.\n  bullet     → Flat or nested\
  \ bullet lists only. No prose paragraphs.\n\nDepth calibration for {{depth}}:\n  brief    → 150–300 words. Essential claims\
  \ only.\n  standard → 400–700 words. Core concepts + 1 example per concept.\n  deep     → 800–1400 words. Full elaboration,\
  \ edge cases, cross-domain links.\n\nAudience calibration for {{audience}}:\n  beginner     → Define all domain terms on\
  \ first use. Avoid jargon. Use analogies.\n  intermediate → Assume domain literacy. Define only specialized sub-terms.\n\
  \  expert       → Use full technical vocabulary. Omit foundational explanations.\n\nDeliver the {{task_type}} output for\
  \ {{topic}} now."
