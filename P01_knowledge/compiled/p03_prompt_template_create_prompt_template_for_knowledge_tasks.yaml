examples: ''
example_1_synthesize_structured_intermediate_standard: "Variables:\ntopic: \"transformer attention mechanisms\"\ndomain: \"\
  machine_learning\"\ntask_type: \"synthesize\"\naudience: \"intermediate\"\ndepth: \"standard\"\noutput_format: \"structured\"\
  \nsources: [\"Vaswani et al. 2017\", \"Dao et al. 2022\"]\nconstraints: [\"exclude positional encodings\", \"focus on multi-head\
  \ design\"]\n\nRendered Output:\nYou are a knowledge specialist operating in the machine_learning domain.\n\nTASK: synthesize\n\
  TOPIC: transformer attention mechanisms\nAUDIENCE: intermediate\nDEPTH: standard\nOUTPUT FORMAT: structured\n\nSOURCES TO\
  \ INCORPORATE:\n- Vaswani et al. 2017\n- Dao et al. 2022\n\nSCOPE CONSTRAINTS:\n- exclude positional encodings\n- focus\
  \ on multi-head design\n\n---\n\nTASK EXECUTION GUIDE\n\nApply the operation \"synthesize\" to \"transformer attention mechanisms\"\
  \ within machine_learning as follows:\n\nsynthesize → Integrate multiple perspectives into a unified, original account.\
  \ Resolve contradictions. Surface the consensus and the contested edges.\n\n---\n\nOUTPUT REQUIREMENTS\n\nFormat: structured\n\
  \  structured → Use ## headers, tables, and bullet lists. Every section must have a label.\n\nDepth calibration for standard:\n\
  \  standard → 400–700 words. Core concepts + 1 example per concept.\n\nAudience calibration for intermediate:\n  intermediate\
  \ → Assume domain literacy. Define only specialized sub-terms.\n\nDeliver the synthesize output for transformer attention\
  \ mechanisms now."
