  focus on retrieval precision and context faithfulness\"]\n\nRendered Output:\nYou are a knowledge specialist operating in\
  \ the knowledge_retrieval domain.\n\nTASK: audit\nTOPIC: RAG pipeline evaluation metrics\nAUDIENCE: expert\nDEPTH: deep\n\
  OUTPUT FORMAT: bullet\n\nSCOPE CONSTRAINTS:\n- focus on retrieval precision and context faithfulness\n\n---\n\nTASK EXECUTION\
  \ GUIDE\n\nApply the operation \"audit\" to \"RAG pipeline evaluation metrics\" within knowledge_retrieval as follows:\n\
  \naudit → Evaluate existing knowledge for gaps, outdated claims, internal contradictions, and missing cross-references.\
  \ Return a scored gap report.\n\n---\n\nOUTPUT REQUIREMENTS\n\nFormat: bullet\n  bullet → Flat or nested bullet lists only.\
  \ No prose paragraphs.\n\nDepth calibration for deep:\n  deep → 800–1400 words. Full elaboration, edge cases, cross-domain\
  \ links.\n\nAudience calibration for expert:\n  expert → Use full technical vocabulary. Omit foundational explanations.\n\
  \nDeliver the audit output for RAG pipeline evaluation metrics now."
