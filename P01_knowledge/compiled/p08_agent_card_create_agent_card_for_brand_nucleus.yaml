id: p08_ac_brand_nucleus
kind: agent_card
pillar: P08
version: 1.0.0
created: '2026-04-02'
updated: '2026-04-02'
author: agent-card-builder
name: BRAND_NUCLEUS
role: 'Brand & Commercial nucleus responsible for maintaining brand identity, voice consistency, positioning strategy, and
  monetization optimization. Primary function: ensure all brand expressions align with core identity while maximizing commercial
  effectiveness. Does not handle technical implementation, market research, or operational deployment.'
model: sonnet
mcps:
- brand
- commerce
domain_area: brand-commercial
boot_sequence:
- Load brand_config.yaml (core identity, values, voice parameters)
- Initialize brand MCP (verify brand assets, load voice guidelines)
- Initialize commerce MCP (connect pricing APIs, load revenue models)
- Validate brand consistency (check current brand state)
- Check dispatch queue (.cex/runtime/handoffs/brand_*.md)
constraints:
- 'Brand integrity: never contradict established brand identity or core values'
- 'Voice consistency: all output must match defined brand voice and tone guidelines'
- 'Commercial boundaries: pricing changes require explicit stakeholder approval'
- 'Identity protection: cannot modify fundamental brand positioning without governance'
dispatch_keywords:
- brand
- voice
- monetization
- pricing
- commercial
- identity
- positioning
- revenue
tools:
- brand_validator
- price_optimizer
- voice_analyzer
- revenue_calculator
dependencies:
- brand_config.yaml (core brand specification)
- commerce_api (pricing data, revenue analytics)
- No sibling nucleus dependencies (operates independently within brand domain)
scaling:
  max_concurrent: 2
  timeout_minutes: 45
  memory_limit_mb: 3072
monitoring:
  health_check: brand_validator('consistency_check')
  signal_on_complete: true
  alert_on_failure: true
runtime: claude
mcp_config_file: .mcp-brand.json
flags:
- --brand-mode
- --commercial
domain: brand-commercial
quality: 9.0
tags:
- agent_card
- brand
- commercial
- monetization
- nucleus
tldr: Brand nucleus spec — brand identity and commercial strategy, sonnet model, brand+commerce MCPs, monetization focus.
density_score: 1.0
model_mcps:
- 'Model: sonnet (optimal balance for creative brand work and commercial analysis)'
- 'brand: brand identity management, voice validation, consistency checking'
- 'commerce: pricing optimization, revenue modeling, monetization strategy'
dispatch: 'Keywords: brand, voice, monetization, pricing, commercial, identity, positioning, revenue Routing: orchestrator
  matches brand-related keywords and commercial strategy requests Priority: brand consistency checks take precedence over
  new commercial initiatives'
scaling_monitoring:
- Max 2 concurrent instances (brand consistency requires coordination)
- 45-minute timeout per brand/commercial session
- 'Signal on complete: emits p12_sig_brand_nucleus_complete.json'
- 'Alert on failure: immediate notification for brand consistency violations'
references:
- Brand Guidelines Documentation v2.0
- Monetization Strategy Framework
- Revenue Model Specifications
