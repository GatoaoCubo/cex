tldr: Fixed-size (256-512 tok) for speed, semantic for coherence, sliding window for overlap, document-aware for structure.
  256-512 tokens is the sweet spot -- 1024+ degrades retrieval@5 by ~9%.
when_to_use: Designing RAG document preprocessing or optimizing retrieval quality vs performance
