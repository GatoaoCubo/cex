tldr: 'RAG chunking strategies balance context preservation vs retrieval precision: fixed-size (256-512 tokens) for speed,
  semantic for coherence, sliding window for overlap, document-aware for structure'
when_to_use: When designing RAG pipeline document preprocessing or optimizing retrieval quality vs performance trade-offs
