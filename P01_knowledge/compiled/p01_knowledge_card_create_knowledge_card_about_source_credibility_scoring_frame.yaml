calculation_formulas: '| Component | Formula | Range | Example |

  |-----------|---------|-------|---------|

  | Authority Score | (Domain_Expertise × 0.6) + (Publication_Track × 0.4) | 0-100 | (85 × 0.6) + (72 × 0.4) = 79.8 |

  | Accuracy Rate | Verified_Claims ÷ Total_Claims × 100 | 0-100% | 87/100 × 100 = 87% |

  | Transparency Index | (Editorial_Policy + Funding_Disclosure + Correction_Practice) ÷ 3 | 0-1.0 | (0.9 + 0.7 + 0.8) ÷ 3
  = 0.8 |

  | Bias Coefficient | Political_Lean + (Sensationalism × 0.5) | -1.5 to +1.5 | -0.3 + (0.4 × 0.5) = -0.1 |

  | Temporal Weight | Recent_6mo × 3 + Year_1 × 2 + Year_2+ × 1 | N/A | (85 × 3) + (78 × 2) + (72 × 1) = 483 |'
strategy_phases:
- 'Baseline Assessment: Domain authority + publication history + editorial standards (40% weight)'
- 'Performance Tracking: Accuracy rate over rolling 12-month window (35% weight)'
- 'Transparency Audit: Funding disclosure + correction policy + bias declaration (15% weight)'
- 'Cross-Validation: Source consensus + expert review + fact-checker alignment (10% weight)'
- 'Dynamic Adjustment: Real-time updates based on new accuracy data + community feedback'
golden_rules:
- WEIGHT recent accuracy (6 months) 3x higher than historical performance
- PENALIZE sources without transparent funding disclosure by 30%
- REQUIRE minimum 20 fact-checkable claims before establishing baseline score
- CROSS-VALIDATE disputed claims with 3+ independent authoritative sources
- UPDATE scores monthly for active sources, quarterly for dormant sources
flow: "[Source Claim] -> [Authority Check] -> [Accuracy History] -> [Bias Analysis]\n                                    \
  \                               |\n[Transparency Audit] -> [Cross-Validation] -> [Score Calculation] -> [Credibility Rating]\n\
  \                                                   |\n                               [0-30: Low | 31-70: Medium | 71-100:\
  \ High]"
