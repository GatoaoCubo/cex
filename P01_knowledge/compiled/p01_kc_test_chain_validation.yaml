conceitos_chave:
- 'CEX chain tem 3 niveis: meta-template > template > instancia'
- Meta-template define REGRAS de geracao (max 2KB, dual output, density >= 0.8)
- Templates contem {{vars}} resolvidas pelo generator no momento da criacao
- Instancias sao validadas contra _schema.yaml (campos, constraints, naming)
- Density = tokens_uteis / tokens_total (minimo 0.8 para pool)
