executive_summary: P05 padroniza as saidas do sistema CEX com 4 tipos de artefato. Output schemas definem estrutura (JSON/YAML),
  parsers extraem dados, formatters transformam entre formatos, e naming rules garantem consistencia de nomenclatura. Todos
  limitados a 4096 bytes.
spec_table: '| Campo | Valor | Nota |

  |-------|-------|------|

  | Tipos | 4 | output_schema, parser, formatter, naming_rule |

  | Max bytes (todos) | 4096 | Uniforme entre tipos |

  | output_schema naming | p05_os_{{format}}.yaml | Contrato YAML |

  | parser naming | p05_parser_{{target}}.md | Extrator com docs |

  | formatter naming | p05_fmt_{{format}}.md | json, md, yaml |

  | naming_rule naming | p05_nr_{{scope}}.md | Regra de nomenclatura |'
patterns:
- 'Output schema em YAML define contrato exato: campos, tipos, required, examples'
- Parser extrai dados estruturados de saida raw (regex, JSON path, YAML parse)
- Formatter transforma entre formatos (JSON > MD, YAML > table, etc)
- 'Naming rules cascateiam: LP > tipo > topic — garante `id == filename stem`'
anti_patterns:
- 'Agente sem output_schema: saida varia entre execucoes'
- 'Parser sem target definido: nao sabe o que extrair'
- 'Naming rule ambigua: colisao de IDs entre artefatos'
- 'Formatter sem format de entrada: transformacao impossivel'
application: No CEX, P05 trabalha em par com P06 (Schema) — P05 define "o que sai", P06 valida "o contrato". O agent_package
  de P02 mapeia output_template.md para P05, garantindo que todo agente tem saida definida.
references:
