key_concepts:
- 'Commercial Keywords: Buy/purchase intent terms with CPC >$2, conversion rate 3-8%'
- 'Product Schema: Structured data for price, availability, reviews (rich snippets boost CTR 20-30%)'
- 'Content Hierarchy: Homepage → Category → Subcategory → Product (max 3 clicks from home)'
- 'Faceted Navigation: SEO-friendly filters without duplicate content or infinite URL parameters'
strategy_phases:
- 'Audit (Week 1): Technical SEO crawl via Screaming Frog, identify 404s, thin content <150 words, duplicate meta tags. Target:
  fix 80% critical issues'
- 'Research (Week 2): Map 50-100 commercial keywords per product category using Ahrefs/SEMrush. Focus on difficulty <30, volume
  >500/month'
- 'Create (Weeks 3-8): Write 200+ word unique product descriptions, category pages with 500+ words, buying guides targeting
  TOFU keywords'
- 'Optimize (Week 9): Implement title tags <60 chars, meta descriptions 150-160 chars, internal links 3-5 per page, Core Web
  Vitals <2.5s LCP'
- 'Monitor (Ongoing): Track organic traffic growth 15-25% MoM, conversion rate 8-12%, average order value from organic vs
  paid channels'
golden_rules:
- TARGET long-tail product keywords (3+ words, lower competition, higher intent)
- STRUCTURE URLs as /category/subcategory/product-name (breadcrumb hierarchy)
- WRITE unique descriptions >150 words per product (avoid manufacturer copy)
- IMPLEMENT review schema and FAQ markup for enhanced SERP features
- OPTIMIZE for mobile-first indexing with responsive design and fast loading
flow: "[Keyword Research] → [Content Mapping] → [Page Creation] → [Technical SEO]\n        ↓                    ↓        \
  \       ↓              ↓\n   Commercial Intent    Buyer Journey    Product Pages   Schema Markup\n        ↓            \
  \        ↓               ↓              ↓\n   [Internal Linking] → [Performance Monitor] → [Conversion Track] → [Iterate]"
comparativo: '| Content Type | Search Volume | Intent | Conversion Rate | Pages Needed |

  |--------------|---------------|---------|-----------------|--------------|

  | Product Pages | Low-Medium | Commercial | 8-15% | 1 per SKU |

  | Category Pages | Medium-High | Commercial | 3-8% | 1 per category |

  | Buying Guides | Medium | Informational | 1-3% | 5-10 pillar |

  | Comparison Posts | Low | Consideration | 5-12% | 3-5 key comparisons |'
