tldr: Quality evaluation combines automated gates (HARD/SOFT), multi-dimensional scoring (D1-D5), and peer review to assess
  artifact fitness across technical, content, and usability dimensions
when_to_use: When establishing quality standards for artifacts, documents, code, or knowledge products requiring systematic
  evaluation
