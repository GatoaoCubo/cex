tl_dr: CSVs funcionam como knowledge bases consultaveis em runtime via BM25. Sem banco de dados, sem embeddings, sem servidor.
  Cada CSV e um dominio especializado (produtos, estilos, cores, tipografia) com busca em ~50ms. Pattern comprovado com 55+
  CSVs em producao cobrindo design, UX e recomendacoes.
conceito_central: 'A premissa e que dados estruturados com keywords bem definidas nao precisam de embeddings para retrieval
  eficaz. Um CSV com colunas de busca (search_cols) e colunas de output (output_cols) separadas cria uma decision table consultavel:
  cada linha e uma regra codificada como dado, nao como codigo. O pattern funciona porque CSVs sao: editaveis por humanos
  (Excel, Google Sheets), versionaveis (git diff legivel), portaveis (sem dependencia de runtime) e composiveis (multiplos
  CSVs consultados em paralelo). A busca BM25 no search_cols retorna as linhas mais relevantes, e o sistema extrai apenas
  os output_cols necessarios. A separacao de dominios e critica: um CSV por tipo de conhecimento (produtos, estilos, guidelines)
  garante que BM25 opera num espaco lexico focado. CSVs grandes multi-proposito degradam precisao porque termos comuns a varios
  dominios diluem o ranking.'
arquitetura_patterns: "| Componente | Arquivo | Conteudo |\n|------------|---------|----------|\n| Catalogo | products.csv\
  \ | 161 tipos de produto + recomendacoes |\n| Estilos | styles.csv | 67 estilos UI + CSS keywords |\n| Cores | colors.csv\
  \ | 161 paletas por tipo de produto |\n| Tipografia | typography.csv | 57 font pairings + Google Fonts |\n| Landing | landing.csv\
  \ | 24 patterns + CTA strategies |\n| UX Rules | ux-guidelines.csv | 99 regras + anti-patterns |\n\nSchema padrao de cada\
  \ CSV:\nsearch_cols: colunas indexadas pelo BM25 (keywords, desc)\noutput_cols: colunas retornadas nos resultados (completas)\n\
  Linha 1: header com nomes das colunas\n\nMulti-domain search (5 CSVs paralelos):\nRequest -> detect domain (regex)\n  ->\
  \ products.csv  (categoria?)\n  -> styles.csv    (estilo UI?)\n  -> colors.csv    (paleta?)\n  -> landing.csv   (pattern?)\n\
  \  -> typography.csv (fonts?)\n-> merge resultados -> output unificado\n\nEstrutura replicavel para qualquer dominio:\n\
  dominio/\n  data/entities.csv    # catalogo de entidades\n  data/rules.csv       # regras de recomendacao\n  data/guidelines.csv\
  \  # anti-patterns + best practices\n  scripts/core.py      # BM25 engine (reutilizavel)"
exemplos_praticos: '| Request | CSV consultado | Resultado |

  |---------|---------------|-----------|

  | Landing page para spa | products.csv | Estilo, paleta, pattern |

  | Font para e-commerce | typography.csv | Pares com Google Fonts URL |

  | Regra UX para forms | ux-guidelines.csv | Regras ARIA + anti-patterns |

  | Grafico para dados | charts.csv | Tipo recomendado + quando nao usar |


  Fluxo completo:

  1. User request chega ao sistema

  2. Regex detecta dominio automaticamente

  3. BM25 busca nos search_cols do CSV do dominio

  4. Top 3-5 resultados extraidos com output_cols

  5. Resultado injetado como contexto para geracao LLM


  CSV como decision table:

  Product Type,Primary Style,Anti-Pattern

  Banking,Trust & Authority,"AI purple gradients"

  Gaming,3D & Hyperrealism,"Flat design"

  Healthcare,Accessible & Ethical,"Low contrast"'
anti_patterns:
- CSV gigante multi-dominio (degrada precisao BM25)
- Recomendacoes hardcoded em codigo ao inves de CSV
- Embeddings para dados estruturados simples (overkill)
- Dados duplicados entre CSVs de dominios diferentes
- Search_cols com textos longos (BM25 prefere keywords)
- Ausencia de output_cols separadas (retorna tudo)
