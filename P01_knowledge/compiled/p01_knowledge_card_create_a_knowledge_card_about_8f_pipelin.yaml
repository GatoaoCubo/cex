tldr: '8F governance defines control gates at each pipeline stage: commit hooks, build gates, test thresholds, security scans,
  deploy approvals, monitoring triggers, feedback loops, and fix workflows'
when_to_use: When implementing governance controls for automated software delivery pipelines or auditing pipeline compliance
keywords:
- pipeline-governance
- approval-gates
- compliance-controls
long_tails:
- How to implement approval workflows in 8F pipeline stages
- Governance checkpoints and control mechanisms for DevOps pipelines
axioms:
- ALWAYS require automated policy checks before manual approvals
- NEVER allow production deployment without security scan completion
linked_artifacts:
  primary: null
  related: []
density_score: 0.87
data_source: 8F pipeline governance standards
quick_reference: 'topic: 8f_pipeline_governance

  scope: Control gates across 8-stage software delivery pipeline

  owner: devops_governance_team

  criticality: high'
key_concepts:
- 'Control Gates: Automated policy enforcement at stage boundaries'
- 'Approval Matrix: RACI model for manual intervention points'
- 'Audit Trail: Immutable logging of all governance decisions'
- 'Risk Thresholds: Quantified limits triggering escalation workflows'
stage_governance_map: '| Stage | Automated Gates | Manual Approvals | Audit Points |

  |-------|----------------|------------------|--------------|

  | F1-Commit | Pre-commit hooks, SAST scan | Security exception | Git logs |

  | F2-Build | Dependency scan, license check | Build break override | Build artifacts |

  | F3-Test | Coverage >80%, performance SLA | Test skip approval | Test results |

  | F4-Package | Vulnerability scan, SBOM gen | Critical vuln waiver | Package registry |

  | F5-Deploy | Infrastructure scan, rollback | Production deploy | Deployment logs |

  | F6-Monitor | SLO breach alerts, anomaly detect | Alert suppression | Metrics store |

  | F7-Feedback | User feedback routing, triage | Priority escalation | Ticket system |

  | F8-Fix | Hotfix validation, regression test | Emergency bypass | Change records |'
approval_workflows: ''
standard_flow:
- 'Automated Check: Policy engine evaluates stage criteria'
- 'Gate Decision: Pass/fail/escalate based on risk score'
- 'Manual Review: Required for escalated items only'
- 'Approval Record: Immutable log with timestamp and justification'
emergency_bypass:
- 'Trigger: P0 incident during business hours'
- 'Authority: On-call SRE + Engineering Manager dual approval'
- 'Constraints: 4-hour retroactive compliance review required'
- 'Rollback: Automated revert if compliance fails post-review'
compliance_mechanisms: ''
policy_enforcement_points:
- 'Pre-commit: Git hooks validate commit messages, secrets scan'
- 'Build-time: SAST, dependency vulnerabilities, license compliance'
- 'Deploy-time: Infrastructure-as-Code validation, security groups'
- 'Runtime: Continuous compliance monitoring, drift detection'
risk_scoring_matrix: '| Risk Factor | Weight | Threshold | Action |

  |-------------|--------|-----------|---------|

  | Critical CVE | 10x | Score >50 | Block deployment |

  | Test coverage drop | 3x | <80% coverage | Require approval |

  | Performance regression | 5x | >20% slower | Auto-rollback |

  | Security policy violation | 8x | Any violation | Security team review |'
stakeholder_raci: '| Decision Type | Engineering | Security | Compliance | SRE |

  |---------------|------------|----------|------------|-----|

  | Code commit | R/A | C | I | I |

  | Security waiver | C | R/A | C | I |

  | Production deploy | R | C | I | A |

  | Emergency bypass | C | C | I | R/A |'
metrics_monitoring: ''
governance_kpis:
- 'Policy Compliance Rate: >95% automated gate pass rate'
- 'Manual Approval Time: <4 hours median for standard approvals'
- 'Exception Rate: <5% of deployments require manual override'
- 'Audit Completeness: 100% governance decisions logged'
alert_thresholds:
- 'Policy violation spike: >10% increase in 1-hour window'
- 'Approval backlog: >20 pending approvals for >8 hours'
- 'Bypass frequency: >3 emergency bypasses per week'
anti_patterns:
- 'Approval Theater: Manual gates without clear criteria or authority'
- 'Policy Drift: Automated rules not synchronized with manual processes'
- 'Audit Gaps: Missing governance decision logging in any stage'
- 'Bypass Abuse: Emergency procedures used for non-urgent changes'
references:
- 'Related: DevOps governance best practices framework'
- 'Source: https://www.nist.gov/cyberframework (compliance standards)'
