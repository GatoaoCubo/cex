id: p05_fmt_brand_reports
kind: formatter
pillar: P05
version: 1.0.0
created: '2026-04-02'
updated: '2026-04-02'
author: builder_agent
target_format: markdown
input_type: structured_data
rule_count: 8
domain: brand_reporting
quality: 9.1
tags:
- formatter
- brand
- reports
- markdown
- P05
- metrics
- identity
tldr: Formats brand performance and identity data into structured Markdown reports with metrics tables, value hierarchies,
  and visual elements
template_engine: string_format
pretty_print: true
escaping: none
encoding: utf8
locale: pt-BR
streaming: false
keywords:
- brand-reports
- identity-formatter
- metrics-display
- brand-dashboard
density_score: 0.89
formatting_rules: '| Name | Input Field | Transform | Pattern | Options |

  |------|-------------|-----------|---------|---------|

  | header_block | brand_name | template | `# {value} - Brand Report\n\nReport Date: {date}\nPeriod: {period}` | title_case:
  true |

  | metrics_table | brand_metrics | tabulate | `\| Metric \| Value \| Target \| Status \|\n\|-----\|-----\|-----\|-----\|\n{rows}`
  | status_icons: true |

  | values_list | brand_values | stringify | `- {name}: {description}` | max_description: 120 |

  | color_palette | brand_colors | template | `{name}: \`{hex_code}\` {color_sample}` | include_sample: true |

  | performance_summary | performance_data | number_format | `{metric}: {value:+.1%} vs target` | locale: pt-BR, show_trend:
  true |

  | guidelines_section | brand_guidelines | template | `## {category}\n\n{content}\n\n---` | markdown_safe: true |

  | asset_inventory | brand_assets | tabulate | `\| Asset \| Type \| Status \| Usage \|\n{asset_rows}` | max_rows: 50 |

  | contact_block | brand_contacts | template | `{role}: {name} ({email})` | obfuscate_email: false |'
input_specification: "Type: structured_data\nStructure: Brand report object containing identity, metrics, guidelines, and\
  \ performance data.\nExample:\n{\n  \"brand_name\": \"CODEXA Systems\",\n  \"report_date\": \"2026-04-02\",\n  \"period\"\
  : \"Q1 2026\",\n  \"brand_metrics\": [\n    {\"metric\": \"Brand Awareness\", \"value\": 67, \"target\": 70, \"status\"\
  : \"warning\"},\n    {\"metric\": \"Net Promoter Score\", \"value\": 8.2, \"target\": 8.0, \"status\": \"success\"}\n  ],\n\
  \  \"brand_values\": [\n    {\"name\": \"Innovation\", \"description\": \"Pushing boundaries in AI-assisted development\"\
  },\n    {\"name\": \"Quality\", \"description\": \"Delivering robust, tested solutions\"}\n  ],\n  \"brand_colors\": [\n\
  \    {\"name\": \"Primary Blue\", \"hex_code\": \"#0066CC\", \"usage\": \"Headers, CTAs\"},\n    {\"name\": \"Accent Orange\"\
  , \"hex_code\": \"#FF6B35\", \"usage\": \"Highlights, alerts\"}\n  ],\n  \"performance_data\": [\n    {\"metric\": \"Conversion\
  \ Rate\", \"value\": 0.045, \"target\": 0.040},\n    {\"metric\": \"Customer Satisfaction\", \"value\": 0.89, \"target\"\
  : 0.85}\n  ]\n}"
output_specification: 'Format: markdown

  Example:

  # CODEXA Systems - Brand Report


  Report Date: 2026-04-02

  Period: Q1 2026


  ## Performance Metrics


  | Metric | Value | Target | Status |

  |--------|-------|--------|---------|

  | Brand Awareness | 67% | 70% | ⚠️ Warning |

  | Net Promoter Score | 8.2 | 8.0 | ✅ Success |


  ## Brand Values


  - Innovation: Pushing boundaries in AI-assisted development

  - Quality: Delivering robust, tested solutions


  ## Color Palette


  Primary Blue: `#0066CC` 🔵 Headers, CTAs

  Accent Orange: `#FF6B35` 🟠 Highlights, alerts


  ## Performance Summary


  Conversion Rate: +12.5% vs target

  Customer Satisfaction: +4.7% vs target'
template: 'Engine: string_format

  # {brand_name} - Brand Report


  Report Date: {report_date}

  Period: {period}


  ## Performance Metrics


  {metrics_table}


  ## Brand Values


  {values_list}


  ## Color Palette


  {color_palette}


  ## Performance Summary


  {performance_summary}


  ## Brand Guidelines


  {guidelines_section}


  ## Asset Inventory


  {asset_inventory}


  ## Team Contacts


  {contact_block}'
edge_cases:
- 'Null values: render as `N/A` for missing metrics, `—` for missing targets'
- 'Empty strings: omit section entirely if no data (e.g., no guidelines provided)'
- 'Special characters: escape pipe `|` as `\|` in Markdown tables, preserve hex color codes'
- 'Overflow: truncate descriptions at max_length with `...`, limit asset inventory to 50 rows with "and X more" footer'
- 'Color codes: validate hex format `#RRGGBB`, fallback to `#000000` for invalid codes'
- 'Percentage formatting: display as `XX.X%` with one decimal for metrics, `+X.X%` vs target for performance'
references:
- 'Markdown table specification: CommonMark 0.30'
- 'Brand identity standards: Corporate Visual Identity Guidelines'
- 'Performance metrics: Brand Health Tracking Framework'
- 'Color accessibility: WCAG 2.1 contrast requirements'
