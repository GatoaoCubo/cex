- como criar skill reutilizavel para Claude Code
- qual pattern de debugging funciona melhor com LLM
axioms:
- Code gen sem context = hallucination (sempre fornecer surrounding code)
- Skill broad = skill inutil (focar e compor, nao generalizar)
linked_artifacts:
  agent: p02_agent_codexa
  skill: p04_skill_bugloop
density_score: 0.85
executive_summary: 'Claude excels em coding com patterns especificos: code generation precisa de language/framework explicito
  + examples + decomposition, debugging segue 4 steps (analyze > hypothesize > fix > verify), refactoring precisa de full
  file context, e test writing cobre happy/error/boundary paths. Skills sao capability bundles com trigger + tools + behavior.'
spec_table: '| Pattern | Requisito Chave | Output |

  |---------|----------------|--------|

  | Code Generation | Language + framework + style example | Codigo funcional |

  | Debugging | Error msg + stack trace + context | Fix + explicacao |

  | Refactoring | Full file (nao snippet) + goals | Codigo refatorado |

  | Test Writing | Funcao + framework + edge cases | Suite de testes |

  | Skill Definition | Trigger + tools + behavior | Capability bundle |'
coding_patterns: ''
code_generation:
- Specify language/framework requirements no system prompt
- Incluir example code mostrando style desejado
- Step-by-step decomposition para features complexas
- Extended thinking para desafios algoritmicos
debugging_4_step:
- Analisar error message + stack trace
- Identificar hipotese de root cause
- Sugerir fix com explicacao
- Verificar que fix nao introduz regressoes
refactoring:
- Fornecer full file context (nao snippets isolados)
- 'Especificar goals: readability, performance, DRY'
- Pedir explicacao das mudancas
- Extended thinking para refactors arquiteturais
test_writing:
- Fornecer funcao/classe para testar
- Especificar framework (pytest, jest, etc.)
- Pedir edge case coverage explicito
- '3 paths obrigatorios: happy path, error path, boundary'
skills_system: ''
definicao: 'name: "skill-name"

  description: "O que esta skill faz"

  trigger: "/skill-name ou keyword detection"

  tools: [list, of, required, tools]

  behavior: "Instrucoes de execucao"'
categorias: '| Categoria | Exemplos | Satellite |

  |-----------|----------|-----------|

  | Core | commit, build, test | ATLAS |

  | Domain | research, marketing | SHAKA, LILY |

  | Utility | embed, memory, security | PYTHA |'
anti_patterns:
- 'Code gen sem language version: output pode usar API deprecated — sempre especificar versao'
- 'Edit sem surrounding context: LLM nao sabe o que esta ao redor — fornecer full file'
- 'Skip test generation: feature sem testes = debt futuro — sempre gerar testes junto'
- 'Skill broad: skill que "faz tudo" = nao faz nada bem — skills devem ser focused e composable'
application: 'CODEXA tem 118 skills em `records/skills/` seguindo este pattern. Cada skill tem frontmatter YAML (trigger,
  description, examples) que alimenta routing via Brain MCP. Ao criar skill nova: (1) definir trigger claro, (2) listar tools
  necessarias, (3) incluir 2+ examples concretos.'
