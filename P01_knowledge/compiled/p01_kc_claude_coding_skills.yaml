tldr: Patterns para usar Claude em coding - code gen com context, debugging 4-step, refactoring com full file, test writing
  com edge cases, skills como capability bundles reutilizaveis
when_to_use: Ao construir coding assistants, automatizar code tasks, ou criar skills reutilizaveis para Claude Code
