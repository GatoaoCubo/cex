key_concepts:
- 'JSON Schema: RFC 7159 validation with type constraints, required fields, format patterns'
- 'Pydantic v2: 5-50x faster parsing than v1, native JSON Schema export, ValidationError details'
- 'Structured Outputs: OpenAI native JSON mode (gpt-4o-mini+), 100% valid JSON guaranteed'
- 'Parse Success Rate: Industry standard 95%+ with retry logic, 85% single-attempt baseline'
- 'Error Context: Include parse error + malformed output in retry prompt for 40% improvement'
strategy_phases:
- 'Schema Design: Define strict Pydantic models with Field constraints and examples'
- 'Prompt Engineering: Include JSON example + format instructions + error recovery hints'
- 'Parse + Validate: Try JSON.loads() → Pydantic.model_validate() with exception capture'
- 'Retry Logic: Max 3 attempts with exponential backoff (100ms, 500ms, 2s delays)'
- 'Fallback: Graceful degradation or human review queue for persistent failures'
golden_rules:
- 'VALIDATE twice: JSON syntax + business schema compliance'
- 'RETRY with context: include previous error + malformed output in next prompt'
- 'CONSTRAIN early: use Pydantic Field() with regex, min/max, enum constraints'
- 'LOG failures: track parse error patterns for prompt optimization'
- 'TIMEOUT parsing: 5s max for large JSON objects (10MB+ responses)'
flow: "[LLM Response] → [JSON.loads()] → [Pydantic.validate()] → [Business Logic]\n                       ↓ FAIL         \
  \     ↓ FAIL              \n                 [Retry Prompt] ← [Error Context + Sample]"
comparativo: '| Approach | Parse Rate | Latency | Use Case |

  |----------|-----------|---------|----------|

  | Raw JSON.loads() | 70-80% | 1ms | Simple structures, high tolerance |

  | Pydantic v2 | 90-95% | 10ms | Business data, strict validation |

  | OpenAI Structured | 99.9% | +50ms | Critical accuracy, GPT-4o only |

  | Custom Parser | 85-90% | 5ms | Domain-specific formats, legacy |'
validation_patterns: "# Pydantic v2 with retry\nfrom pydantic import BaseModel, Field, ValidationError\nimport json\nfrom\
  \ typing import Optional\n\nclass LLMOutput(BaseModel):\n    title: str = Field(min_length=1, max_length=100)\n    confidence:\
  \ float = Field(ge=0.0, le=1.0)\n    tags: list[str] = Field(min_items=1, max_items=10)\n    \ndef parse_with_retry(response:\
  \ str, max_attempts: int = 3) -> Optional[LLMOutput]:\n    for attempt in range(max_attempts):\n        try:\n         \
  \   data = json.loads(response)\n            return LLMOutput.model_validate(data)\n        except (json.JSONDecodeError,\
  \ ValidationError) as e:\n            if attempt == max_attempts - 1:\n                return None\n            # Include\
  \ error in retry prompt\n            response = retry_llm_call(f\"Parse error: {e}\\nFix this JSON: {response}\")"
error_patterns: '| Error Type | Frequency | Fix Strategy |

  |------------|-----------|--------------|

  | Trailing comma | 15% | Prompt: "no trailing commas in JSON" |

  | Missing quotes | 12% | Include correct JSON example in prompt |

  | Wrong data type | 8% | Use Pydantic Field() constraints |

  | Extra fields | 5% | Set `model_config = {"extra": "forbid"}` |'
