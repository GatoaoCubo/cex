tldr: 'Quality gate for engineering artifacts: code quality, testing, docs, security, and deployment readiness with 8.0+ threshold.'
density_score: 0.87
definition: '| Property | Value |

  |----------|-------|

  | Metric | engineering_quality_score |

  | Threshold | 8.0 |

  | Operator | >= |

  | Scope | All engineering artifacts including code modules, APIs, configs, and technical documentation |'
hard_gates: 'Failure on any single gate results in immediate rejection regardless of soft score.


  | ID | Criterion | Failure Action |

  |----|-----------|----------------|

  | H01 | YAML frontmatter parses without syntax errors | block |

  | H02 | ID follows namespace pattern `p11_qg_*` | block |

  | H03 | ID field matches filename stem exactly | block |

  | H04 | Kind field equals literal `quality_gate` | block |

  | H05 | Quality field is null at authoring time | block |

  | H06 | All required frontmatter fields present and non-empty | block |

  | H07 | Code passes linting without critical violations | block |

  | H08 | Security scan shows no high/critical vulnerabilities | block |

  | H09 | All public interfaces have documentation | block |

  | H10 | Deployment configuration is valid and complete | block |'
soft_gates: 'Weighted scoring contributing to aggregate quality score.


  | ID | Criterion | Weight | Scoring Method |

  |----|-----------|--------|----------------|

  | S01 | Code coverage >= 80% for unit tests | 20% | graduated |

  | S02 | Technical documentation completeness score | 20% | graduated |

  | S03 | Code maintainability index >= 70 | 20% | graduated |

  | S04 | Performance benchmarks within acceptable limits | 15% | binary |

  | S05 | Security best practices compliance score | 15% | graduated |

  | S06 | Deployment readiness checklist completion | 10% | graduated |'
scoring_formula: "aggregate_score = (\n  (S01_score * 0.20) +\n  (S02_score * 0.20) +\n  (S03_score * 0.20) +\n  (S04_score\
  \ * 0.15) +\n  (S05_score * 0.15) +\n  (S06_score * 0.10)\n) * 10\n\nPASS condition: all HARD gates pass AND aggregate_score\
  \ >= 8.0"
actions: '| Outcome | Consequence |

  |---------|-------------|

  | GOLDEN (>= 9.5) | Artifact promoted to production pool as reference implementation |

  | PUBLISH (>= 8.0) | Artifact approved for production deployment |

  | REVIEW (>= 7.0) | Artifact returned with scored feedback, one revision cycle allowed |

  | REJECT (< 7.0) | Artifact blocked, requires significant rework before resubmission |'
bypass_policy: '| Field | Value |

  |-------|-------|

  | Conditions | Critical production hotfix with time-sensitive deployment requirements |

  | Approver | Engineering lead + security officer dual approval required |

  | Audit Requirements | Record in engineering audit log with justification, risk assessment, and remediation timeline |

  | Expiry | 72 hours maximum, full compliance required before permanent deployment |


  Note: HARD gates H01-H05 are never bypassable as they ensure basic artifact integrity.'
