version: 1.0.0
created: '2026-04-02'
updated: '2026-04-02'
author: prompt-template-builder
variables:
- name: task_type
  type: string
  required: true
  default: null
  description: The type of engineering task (code_review, debugging, architecture_design, feature_implementation, testing,
    deployment)
- name: technology_stack
  type: list
  required: true
  default: null
  description: Technologies, frameworks, and languages involved in the task
- name: complexity_level
  type: string
  required: false
  default: medium
  description: Task complexity level (low, medium, high, critical)
- name: deliverables
  type: list
  required: true
  default: null
  description: Expected outputs or artifacts from the engineering task
- name: timeline
  type: string
  required: false
  default: standard
  description: Time constraint or urgency level for task completion
- name: context
  type: string
  required: true
  default: null
  description: Background information, system context, or business requirements
- name: constraints
  type: list
  required: false
  default: []
  description: Technical constraints, limitations, or requirements that must be respected
- name: success_criteria
  type: list
  required: true
  default: null
  description: Measurable criteria that define successful task completion
variable_syntax: mustache
composable: true
domain: engineering
quality: 9.2
tags:
