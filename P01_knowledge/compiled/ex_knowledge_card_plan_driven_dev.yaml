summary: 'Plan-driven development trata planos como prompts executaveis, nao documentos de design. Cada task de 2-5 minutos
  contem caminhos exatos, codigo completo, steps de verificacao e dependencias explicitas. Ciclo completo: brainstorm → write-plan
  → execute-plan → verify. Audiencia-alvo: "junior engineer sem contexto e sem julgamento" — se o plano nao for claro para
  este perfil, nao esta pronto. Dois modos de execucao: subagent-driven (paralelo, sem intervencao humana) e sequential (fallback
  com checkpoints humanos).'
spec: '| Aspecto | Valor | Motivo |

  |---------|-------|--------|

  | Granularidade | 2-5 min por task | Tasks maiores causam desvio |

  | Campos por task | paths, codigo, verificacao, deps | Sub-agente nao infere contexto |

  | Audiencia | Junior sem contexto | Forca clareza maxima |

  | TDD | Obrigatorio | Testes primeiro, sempre |

  | Status contract | DONE, CONCERNS, BLOCKED, NEEDS_CTX | Protocolo pos-task padrao |

  | Modo paralelo | 1 sub-agente por task | Rapido para tasks independentes |

  | Modo sequential | Fallback sem sub-agentes | Checkpoints humanos por batch |

  | Plano output | plans/YYYY-MM-DD-topic.md | Rastreavel por data e topico |

  | Review pre-exec | Obrigatorio | Granularidade + deps + verificacoes |


  Principios de design: TDD obrigatorio, YAGNI ruthlessly, DRY no design, isolation para paralelismo. Plano deve ser revisado
  criticamente antes de executar — tasks com granularidade correta, dependencias claras, verificacoes testaveis, e caminhos
  de arquivo existentes ou com task de criacao.'
patterns: '| Trigger | Action |

  |---------|--------|

  | Feature aprovada | Brainstorm → design doc → plano executavel |

  | Task envolve codigo | Escrever teste RED antes de implementar |

  | Tasks sem dependencia mutua | Despachar em paralelo via sub-agentes |

  | Plano pronto | Revisar: granularidade, deps, verificacoes |

  | Sub-agente reporta BLOCKED | Parar cadeia, resolver dependencia externa |

  | Contexto insuficiente | Sub-agente retorna NEEDS_CONTEXT (nao inventa) |'
code: "<!-- lang: python | purpose: plan-to-prompt conversion for subagent dispatch -->\n# Controller converte task do plano\
  \ em prompt executavel\ndef task_to_prompt(task, plan):\n    dep = plan.get_task(task.depends_on)\n    return f\"\"\"You\
  \ are implementing Task {task.id}: {task.name}.\n\n    Task Description\n    {task.full_text}\n\n    Context\n    Follows\
  \ Task {dep.id} ({dep.summary}).\n    Files: {', '.join(task.file_paths)}\n\n    Your Job\n    1. Write failing tests first\
  \ (TDD)\n    2. Implement exactly what the task specifies\n    3. Run verification: {task.verification}\n    4. Commit with\
  \ message: \"{task.commit_msg}\"\n    5. Report: DONE | DONE_WITH_CONCERNS | BLOCKED | NEEDS_CONTEXT\"\"\"\n\n# Dispatch:\
  \ paralelo para independentes, sequencial para dependentes\nfor batch in plan.dependency_batches():\n    results = parallel_execute(\n\
  \        [task_to_prompt(t, plan) for t in batch],\n        tools=[\"read\", \"write\", \"edit\", \"bash\"]\n    )\n   \
  \ if any(r.status == \"BLOCKED\" for r in results):\n        escalate(blocked=[r for r in results if r.status == \"BLOCKED\"\
  ])\n    for r in results:\n        if r.status == \"DONE_WITH_CONCERNS\":\n            log_concerns(r.task_id, r.concerns)\n\
  \nFluxo tipico: plan loader le arquivo `.md`, parser extrai tasks com metadata (files, deps, verification), dispatcher agrupa\
  \ por dependencia em batches, executor despacha batch inteiro em paralelo. Resultado de cada task alimenta o contexto da\
  \ proxima wave."
anti_patterns:
- Plano como design doc sem steps executaveis (sub-agente nao sabe o que fazer)
- Tasks de 30+ minutos (perda de foco, desvio do objetivo)
- Verificacao ausente ("implemente X" sem "confirme via Y")
- Pular brainstorming e ir direto ao plano (design nao validado)
- Referenciar arquivos inexistentes sem task de criacao previa
