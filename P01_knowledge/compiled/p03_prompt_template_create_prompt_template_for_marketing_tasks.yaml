id: p03_pt_marketing_task_execution
kind: prompt_template
pillar: P03
title: Marketing Task Execution Template
version: 1.0.0
created: '2026-04-02'
updated: '2026-04-02'
author: prompt-template-builder
variables:
- name: task_type
  type: string
  required: true
  default: null
  description: The specific marketing deliverable to produce (e.g., email subject line, social caption, ad headline, landing
    page hero copy)
- name: target_audience
  type: string
  required: true
  default: null
  description: Description of the intended reader — demographics, pain points, and knowledge level
- name: brand_voice
  type: string
  required: true
  default: null
  description: Tone and personality descriptors that govern word choice and register (e.g., "conversational and witty", "authoritative
    and technical")
- name: product_name
  type: string
  required: true
  default: null
  description: Name of the product, service, or offer being promoted
- name: key_benefits
  type: list
  required: true
  default: null
  description: Ordered list of core value propositions to weave into the copy, highest-impact first
- name: channel
  type: string
  required: true
  default: null
  description: Distribution channel that constrains format and length (e.g., Instagram, email newsletter, Google Ads, landing
    page)
- name: cta
  type: string
  required: false
  default: Learn More
  description: Call-to-action phrase the copy must drive the reader toward
- name: word_limit
  type: integer
  required: false
  default: 200
  description: Maximum word count for the output copy
- name: competitor_differentiation
  type: string
  required: false
  default: null
  description: One-sentence statement of what sets this product apart from alternatives; used as the sharpest hook when present
variable_syntax: mustache
composable: true
domain: marketing
quality: 9.2
tags:
- prompt-template
- marketing
- copywriting
- P03
- reusable
- multi-channel
tldr: Generates persuasive marketing copy for any channel, audience, and task type with enforced brand voice and CTA focus.
keywords:
- marketing
- copywriting
- ads
- CTA
- brand voice
- social media
- email
- landing page
- conversion
density_score: 0.88
injection_point: user
purpose: 'Produces channel-specific marketing copy calibrated to a named audience and an enforced brand voice. Reuse scope:
  any single-channel marketing deliverable — email subject lines, social captions, paid ad headlines, CTA button variants,
  landing page hero copy, or product descriptions. Invoke once per deliverable; vary `task_type`, `channel`, and `target_audience`
  to produce distinct copy assets from the same mold. Marked `composable: true` — embed as a copy-generation block inside
  larger campaign or funnel templates.'
variables_table: '| Name | Type | Required | Default | Description |

  |---|---|---|---|---|

  | task_type | string | true | null | The specific marketing deliverable to produce |

  | target_audience | string | true | null | Reader demographics, pain points, and knowledge level |

  | brand_voice | string | true | null | Tone and personality descriptors governing word choice |

  | product_name | string | true | null | Name of the product, service, or offer being promoted |

  | key_benefits | list | true | null | Ordered value propositions, highest-impact first |

  | channel | string | true | null | Distribution channel constraining format and length |

  | cta | string | false | "Learn More" | Call-to-action phrase the copy drives toward |

  | word_limit | integer | false | 200 | Maximum word count for the output |

  | competitor_differentiation | string | false | null | One-sentence differentiator; used as hook when present |'
template_body: "You are a senior conversion copywriter. Your task: produce {{task_type}} copy for {{channel}}.\n\n## Assignment\n\
  - Product: {{product_name}}\n- Audience: {{target_audience}}\n- Brand voice: {{brand_voice}}\n- Word limit: {{word_limit}}\n\
  - CTA: {{cta}}\n\n## Value Propositions\nUse all of the following; sequence them by resonance with {{target_audience}}:\n\
  {{#key_benefits}}\n- {{.}}\n{{/key_benefits}}\n\n{{#competitor_differentiation}}\n## Differentiation Angle\n{{competitor_differentiation}}\n\
  This is your sharpest hook — lead with it or anchor the headline to it.\n{{/competitor_differentiation}}\n\n## Channel Constraints\n\
  Write specifically for {{channel}}. Apply its native format, character limits, and\nengagement conventions. Copy that ignores\
  \ channel context will be rejected — adapt\nsentence length, whitespace, and structure to what performs on {{channel}}.\n\
  \n## Output Rules\n1. Produce final {{task_type}} copy only — no preamble, no meta-commentary.\n2. Stay within {{word_limit}}\
  \ words.\n3. Every sentence must advance the reader toward: \"{{cta}}\".\n4. Voice must match throughout: {{brand_voice}}.\n\
  5. If {{channel}} supports A/B testing conventions (e.g. email subject lines, ad\n   headlines), produce exactly 2 variants\
  \ labeled A and B."
