id: p01_gl_agent_node
term: agent_node
definition: Unidade autonoma de execucao no organization. Cada agent_node tem dominio fixo (Research, Build, Marketing), modelo
  LLM dedicado (opus ou sonnet), e MCPs exclusivos. orchestrator orquestra, agent_nodes executam.
synonyms:
- worker
- executor
- specialist
usage: '"Spawnar agent_node builder_agent para build" | "3 agent_nodes em paralelo via grid"'
