framework_overview: 5D Brand evaluates brand artifacts across 5 orthogonal dimensions that determine brand effectiveness and
  market impact. Designed for brand_config files, agent personalities, marketing copy, and any artifact that carries brand
  identity. Complements brand quality gates (P11) by providing nuanced scoring for brand strength beyond pass/fail validation.
dimensions: '| Dimension | Weight | Scale | Criteria | Example (10) | Example (5) |

  |-----------|--------|-------|----------|-------------|-------------|

  | Consistency | 25% | 0-10 | Visual/verbal elements align across touchpoints, no contradictions | Same tone/colors/voice
  across 10+ artifacts, zero conflicts | Some variation in tone, 2-3 minor inconsistencies |

  | Clarity | 25% | 0-10 | Brand positioning, value prop, audience clearly defined and understood | One-sentence value prop,
  specific target audience, clear category | Vague positioning, broad "everyone" audience |

  | Differentiation | 20% | 0-10 | Distinct from competitors, unique positioning, clear competitive advantage | Proprietary
  methodology, unique angle, stands apart from 5+ competitors | Some unique elements, partially distinct from competition
  |

  | Authenticity | 15% | 0-10 | Genuine to stated values, believable claims, consistent with actions | Values demonstrated
  through actions, credible expertise, honest limitations | Some value alignment, mostly credible but generic |

  | Memorability | 15% | 0-10 | Distinctive elements that stick in memory, recognizable brand assets | Unique visual/verbal
  hooks, immediate recognition, quotable phrases | Some memorable elements, partially recognizable |'
thresholds: '| Tier | Score | Action |

  |------|-------|--------|

  | GOLDEN | >= 9.5 | Use as brand template, showcase in portfolio, reference standard |

  | PUBLISH | >= 8.0 | Deploy to production, approved for public use |

  | REVIEW | >= 7.0 | Return with dimension-specific feedback, iterate specific elements |

  | REJECT | < 7.0 | Restart brand discovery process, fundamental positioning issues |'
calibration:
- 'GOLDEN (9.7): p07_gt_brand_tech_startup — proprietary "AI-first architecture", targets CTOs at Series A startups, consistent
  orange/navy across 12 touchpoints, memorable "Code Less, Ship More" tagline'
- 'PUBLISH (8.4): Solid SaaS brand with clear B2B positioning, consistent design system, adequate differentiation from 3 competitors,
  professional but not memorable'
- 'REVIEW (7.1): Generic consulting brand with vague "we help businesses grow" positioning, inconsistent colors, some authentic
  case studies but forgettable'
- 'REJECT (4.2): No clear audience, contradictory messages across materials, generic stock photos, indistinguishable from
  dozens of competitors'
automation: '| Dimension | Status | Tool |

  |-----------|--------|------|

  | Consistency | semi-automated | brand_audit.py (color/font/tone analysis) + manual review |

  | Clarity | manual | Human assessment of positioning clarity and audience specificity |

  | Differentiation | semi-automated | Competitor analysis via web search + manual competitive assessment |

  | Authenticity | manual | Values alignment check against actions and claims |

  | Memorability | manual | Human evaluation of distinctive elements and recall factors |'
references:
- Brand Audit Framework (Aaker & Joachimsthaler, 2000)
- Distinctive Brand Assets (Romaniuk & Sharp, 2016)
- brand_audit.py v3.1 (CEX brand consistency checker)
