tldr: Quality gates para lifecycle de artifacts - Draft(7.0+) Pool(8.0+) Golden(9.5+) com CHK/VAL enforcement automatico
when_to_use: Ao criar/promover artifacts no pool, definir criterios de qualidade, implementar validacao automatica
keywords:
- quality-gate
- artifact-lifecycle
- pool-promotion
- CHK-VAL
- validation
long_tails:
- como definir criterios de qualidade para promotion de artifacts
- qual score minimo para um artifact entrar no pool
axioms:
- Artifact sem quality gate = lixo no pool (entropia cresce sem filtro)
- Score YAML != score body = artifact inconsistente (delta max 0.5)
linked_artifacts:
  agent: p02_agent_qa
  skill: p04_skill_pool_validator
density_score: 0.88
executive_summary: 'Quality gates controlam o fluxo de artifacts pelo lifecycle Draft > Pool > Golden. Cada stage tem criterios
  progressivos: Draft (7.0+) valida estrutura basica, Pool (8.0+) exige completude e naming, Golden (9.5+) requer peer review
  e patterns documentados. CHK/VAL artifacts automatizam enforcement.'
spec_table: '| Campo | Valor | Nota |

  |-------|-------|------|

  | Draft threshold | >= 7.0 | YAML valido + id + title + 100 words |

  | Pool threshold | >= 8.0 | + tldr + UNC naming + satellite + 3+ tags |

  | Golden threshold | >= 9.5 | + peer review + cross-refs + anti-patterns |

  | CHK artifacts | Checklists | `CHK_POOL_001_KC_QUALITY.md` CI pipeline |

  | VAL artifacts | Schema validators | `VAL_POOL_001_FRONTMATTER_SCHEMA.md` |

  | Demotion trigger | > 6 meses sem update | Ou duplicata, ou API removida |'
lifecycle_flow: "Draft (7.0+) --> Pool (8.0+) --> Golden (9.5+)\n   |                |                |\n   v            \
  \    v                v\n Created        Validated        Promoted\n by satellite   by CHK/VAL       by peer review"
gate_criteria: ''
draft_gate_7_0: '| Criterio | Automatizavel |

  |----------|:------------:|

  | YAML frontmatter valido | SIM |

  | Campo `id` presente | SIM |

  | Titulo descritivo (nao generico) | NAO |

  | quality_score >= 7.0 | SIM |

  | Conteudo > 100 palavras | SIM |'
pool_gate_8_0: '| Criterio | Automatizavel |

  |----------|:------------:|

  | Todos criterios Draft | SIM |

  | quality_score >= 8.0 | SIM |

  | Campo `tldr` presente | SIM |

  | UNC naming compliant | SIM |

  | Satellite e domain assigned | SIM |

  | Tags array com 3+ items | SIM |

  | Sem titulo duplicado no pool | SIM |'
golden_gate_9_5: '| Criterio | Automatizavel |

  |----------|:------------:|

  | Todos criterios Pool | SIM |

  | quality_score >= 9.5 | SIM |

  | Review por satellite diferente | NAO |

  | Cross-referenced por outros KCs | NAO |

  | Patterns documentados | NAO |

  | Anti-patterns documentados | NAO |'
patterns:
- 'Promotion workflow: satellite cria (draft) > CHK/VAL auto (pool) > peer review (golden)'
- 'Demotion criteria: conteudo desatualizado (>6mo), duplicata detectada, score rebaixado, API/tool removida'
- 'CHK pattern: checklist de validacao em CI — output PASS/FAIL com detalhes por campo'
- 'VAL pattern: schema validation de frontmatter — output Valid/Invalid com erros por campo'
anti_patterns:
- 'Score inflation: self-assign 9.5 sem peer review — golden exige satellite diferente'
- 'Empty fields: tldr="TBD", tags=[] — Pool Gate rejeita campos placeholder'
- 'Skip CHK/VAL: merge sem CI validation — garbage entra no pool, density degrada'
- 'No demotion: artifacts de 2024 nunca revisitados — pool vira cemiterio de conteudo stale'
application: 'Todo artifact CODEXA passa por este lifecycle. Ao criar KC/HOP/AGT/SKL: (1) auto-assign score honesto, (2) rodar
  CHK/VAL antes de commit, (3) solicitar peer review se score >= 9.0. O pool so cresce em qualidade se os gates sao respeitados.'
references:
- '`records/pool/knowledge/KC_ATLAS_010_QUALITY_GATE_IMPLEMENTATION.md` (fonte original)'
