integration: Receives dispatch from N07 orchestrator via handoff files in `.cex/runtime/handoffs/`. Produces artifacts to
  appropriate pillar directories (P01-P12) with git commit and signal emission. Integrates with cex_retriever for template
  matching and cex_memory for construction patterns.
quality_gates: 'HARD gates: YAML parses, id matches pillar pattern, kind validation, quality null enforcement, required frontmatter
  fields, body structure compliance, byte limits, naming conventions. SOFT gates: density >= 0.80, tldr conciseness, tag completeness,
  template similarity, domain specificity, anti-pattern avoidance, link validation, examples presence.'
common_issues:
- 'Template mismatch: Use hybrid construction when similarity < 60%'
- 'Quality gate failure: Apply iterative refinement with specific gate feedback'
- 'Kind misclassification: Re-route to correct specialized builder'
- 'Density shortfall: Compress prose, eliminate filler, increase fact density'
- 'Schema violation: Validate frontmatter against pillar-specific requirements'
invocation: 'Spawn via: `bash _spawn/dispatch.sh solo n03 "create {kind} for {domain}"` Direct: `/build {intent}` triggers
