name: Unstructured Text Chunking
method: 'The `recursive_character` method involves splitting text based on prioritized separators: double newlines, single
  newlines, sentences, and words. This approach ensures that chunks maintain a logical flow and context. If a chunk exceeds
  the specified size, the method progresses to the next separator.'
chunk_size: 1000
chunk_overlap: 100
separators:
- '


  '
- '

  '
- '. '
- ' '
quality: null
tags:
- chunk_strategy
- unstructured_text
- text_splitting
tldr: Chunk unstructured text using recursive character method with overlap to preserve context.
overview: This chunk strategy is designed for unstructured text, utilizing a recursive character method to split documents
  into manageable segments while retaining contextual coherence. It is particularly effective for documents without consistent
  formatting, enabling efficient retrieval-augmented generation (RAG) processes.
parameters: '| Parameter     | Value                          | Rationale                                                       |

  |---------------|--------------------------------|-----------------------------------------------------------------|

  | chunk_size    | 1000 tokens                    | Balances detail retention with manageability for most contexts. |

  | chunk_overlap | 100 tokens                     | Ensures context preservation across chunks for effective retrieval. |

  | separators    | ["\n\n", "\n", ". ", " "]      | Prioritizes larger text blocks, down to individual words.       |'
integration:
- 'Input: Processes raw text documents from a document loader.'
- 'Output: Produces a list of chunks with metadata detailing the original text source and position.'
- 'Compatibility: Pairs well with common embedding and retrieval configurations, ensuring seamless integration within RAG
  pipelines.'
