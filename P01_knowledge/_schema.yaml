# P01 Knowledge Schema v4.0
# v2.0: machine_format per type
# Baseado em destilacao de 7 KCs golden do codexa-core
# Sources: DISTILL_GOLDEN_KC_PATTERNS.md
lp: P01
name: Knowledge
description: O que o agente SABE
types:
  knowledge_card:
    description: Fato atomico pesquisavel (densidade > 0.8)
    boundary: Conhecimento destilado, estatico, versionado. NAO eh instrucao, template,
      ou configuracao.
    layer: content
    core: true
    machine_format: yaml
    naming: p01_kc_{{topic}}.md + .yaml
    constraints:
      max_bytes: 5120
      min_bullets: 3
      density_min: 0.8
      quality_min: 7.0
    frontmatter_required:
    - id
    - type
    - lp
    - title
    - version
    - created
    - updated
    - author
    - domain
    - quality
    - tags
    - tldr
    - when_to_use
    frontmatter_cex:
    - keywords
    - long_tails
    - axioms
    - linked_artifacts
    - density_score
    - data_source
    body_structure:
      domain_kc:
      - quick_reference
      - conceitos_chave
      - strategy_phases
      - regras_de_ouro
      - visual_flow
      - comparativo
      - artefatos
      meta_kc:
      - executive_summary
      - spec_table
      - patterns
      - anti_patterns
      - application
      - references
    validation:
    - content_hash nao vazio (auto SHA256)
    - id == filename stem
    - quality YAML +/- 1.0 do body
    - tags = lista de strings (nunca lista-em-string)
    - cada bullet max 80 chars
    - secoes com < 3 linhas: expandir ou remover
    llm_function: INJECT
  rag_source:
    description: Fonte externa indexavel
    boundary: Ponteiro para fonte externa indexavel. NAO eh o conteudo em si, apenas
      referencia com URL e freshness.
    layer: content
    core: false
    machine_format: yaml
    naming: p01_rs_{{source}}.md + .yaml
    constraints:
      max_bytes: 1024
    frontmatter_required:
    - id
    - type
    - url
    - domain
    - last_checked
    llm_function: INJECT
  glossary_entry:
    description: Definicao de termo
    boundary: Definicao curta de termo do dominio. NAO eh knowledge_card (sem densidade
      min) nem context_doc (sem escopo).
    layer: content
    core: false
    machine_format: yaml
    naming: p01_gl_{{term}}.md + .yaml
    constraints:
      max_bytes: 512
      max_definition_lines: 3
    frontmatter_required:
    - id
    - term
    - definition
    - synonyms
    llm_function: INJECT
  context_doc:
    description: Contexto de dominio
    boundary: Contexto de dominio para hidratar prompts. NAO eh knowledge_card (sem
      density gate) nem glossary_entry (nao define termo).
    layer: content
    core: false
    machine_format: yaml
    naming: p01_ctx_{{topic}}.md + .yaml
    constraints:
      max_bytes: 2048
    frontmatter_required:
    - id
    - type
    - domain
    - scope
    llm_function: INJECT
  embedding_config:
    description: Configuracao de embedding model
    boundary: Configuracao de modelo de embedding. NAO eh brain_index (P10) que configura
      o indice, apenas o modelo vetorial.
    layer: spec
    core: false
    machine_format: yaml
    naming: p01_emb_{{model}}.yaml
    constraints:
      max_bytes: 512
    frontmatter_required:
    - id
    - model_name
    - dimensions
    - chunk_size
    llm_function: GOVERN
  few_shot_example:
    description: Exemplo input/output pra prompt
    boundary: Par input/output para few-shot learning. NAO eh golden_test (P07) que
      avalia qualidade, apenas exemplifica formato.
    layer: prompt
    core: true
    machine_format: yaml
    naming: p01_fse_{{topic}}.md + .yaml
    constraints:
      max_bytes: 1024
    frontmatter_required:
    - id
    - type
    - input
    - output
    - quality
    llm_function: INJECT
