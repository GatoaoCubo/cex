quick_reference: "base_url: https://api.elevenlabs.io/v1\nauth: xi-api-key header\nmodels:\n  - eleven_multilingual_v2   \
  \ # Best quality, 29 languages, PT-BR excellent. ~300ms latency.\n  - eleven_turbo_v2_5         # 32 languages, ~200ms latency.\
  \ Slightly lower quality.\n  - eleven_monolingual_v1     # English only, legacy.\n  - eleven_flash_v2_5         # Fastest,\
  \ ~75ms. Good for real-time.\nrate_limit: 100 concurrent requests (paid), 2 concurrent (free)\noutput_format: mp3_44100_128\
  \ (default), pcm_16000, pcm_22050, pcm_24000, pcm_44100, ulaw_8000"
core_endpoints: '| Endpoint | Method | Purpose |

  |----------|--------|---------|

  | `/text-to-speech/{voice_id}` | POST | Generate audio from text (returns audio bytes) |

  | `/text-to-speech/{voice_id}/stream` | POST | Stream audio chunks (chunked transfer) |

  | `/voices` | GET | List available voices |

  | `/voices/{voice_id}` | GET | Get voice details |

  | `/voices/add` | POST | Add cloned voice from audio samples |

  | `/voice-generation/generate-voice` | POST | Generate random voice from description |

  | `/user/subscription` | GET | Check quota remaining |

  | `/history` | GET | List generated audio history |

  | `/models` | GET | List available models |'
pt_br_voices_built_in_no_cloning_needed: '| Voice ID | Name | Style | Best For |

  |----------|------|-------|----------|

  | `EXAVITQu4vr4xnSDxMaL` | Sarah | Warm, conversational | Narration, courses |

  | `onwK4e9ZLuTAKqWW03F9` | Daniel | Authoritative, clear | Business, tutorials |

  | `TX3LPaxmHKxFdv7VOQHJ` | Liam | Young, energetic | Social content |

  | `pFZP5JQG7iQjIQuC4Bku` | Lily | Soft, friendly | Podcasts, stories |


  Note: multilingual_v2 auto-detects PT-BR from input text. No language parameter needed.'
generate_5_minute_narration_example: "import httpx\n\nheaders = {\"xi-api-key\": ELEVENLABS_API_KEY, \"Content-Type\": \"\
  application/json\"}\n\n# ~750 words = ~5 min narration at normal speed\ntext = \"\"\"Neste episódio, vamos explorar como\
  \ a inteligência artificial\nestá transformando a criação de conteúdo digital...\"\"\"  # full script here\n\nresp = httpx.post(\n\
  \    \"https://api.elevenlabs.io/v1/text-to-speech/EXAVITQu4vr4xnSDxMaL\",\n    headers=headers,\n    json={\n        \"\
  text\": text,\n        \"model_id\": \"eleven_multilingual_v2\",\n        \"voice_settings\": {\n            \"stability\"\
  : 0.5,        # 0=variable, 1=monotone. 0.5 is natural.\n            \"similarity_boost\": 0.75, # 0=creative, 1=exact clone.\
  \ 0.75 for consistency.\n            \"style\": 0.3,            # 0=neutral, 1=exaggerated. Keep low for narration.\n  \
  \          \"use_speaker_boost\": True # Enhances clarity. Costs ~10% more chars.\n        },\n        \"output_format\"\
  : \"mp3_44100_128\"\n    },\n    timeout=120  # Long texts take time to synthesize\n)\n\nwith open(\"narration.mp3\", \"\
  wb\") as f:\n    f.write(resp.content)"
streaming_for_real_time_playback: "with httpx.stream(\"POST\", f\"{base_url}/text-to-speech/{voice_id}/stream\",\n    headers=headers,\n\
  \    json={\"text\": text, \"model_id\": \"eleven_turbo_v2_5\"}\n) as response:\n    for chunk in response.iter_bytes(chunk_size=4096):\n\
  \        audio_player.write(chunk)  # play as it arrives"
voice_cloning: "files = [\n    (\"files\", (\"sample1.mp3\", open(\"sample1.mp3\", \"rb\"), \"audio/mpeg\")),\n    (\"files\"\
  , (\"sample2.mp3\", open(\"sample2.mp3\", \"rb\"), \"audio/mpeg\")),\n]\ndata = {\"name\": \"My Custom Voice\", \"description\"\
  : \"Brand narrator\"}\nresp = httpx.post(f\"{base_url}/voices/add\",\n    headers={\"xi-api-key\": ELEVENLABS_API_KEY},\n\
  \    data=data, files=files\n)\ncustom_voice_id = resp.json()[\"voice_id\"]\n\nRequirements: 1-25 audio samples, each 1-10\
  \ min. Clean audio, single speaker, minimal background noise. Total recommended: 3-5 min of diverse speech."
pricing_per_character: '| Plan | Characters/mo | Cost | Per 1K chars |

  |------|--------------|------|-------------|

  | Free | 10,000 | $0 | — |

  | Starter | 30,000 | $5/mo | $0.17 |

  | Creator | 100,000 | $22/mo | $0.22 |

  | Pro | 500,000 | $99/mo | $0.20 |

  | Scale | 2,000,000 | $330/mo | $0.17 |


  A 5-minute narration (~750 words, ~4,500 chars) costs approximately $0.75-$1.00 on Creator plan.'
gotchas:
- Character count includes spaces and punctuation. A 1000-word text is ~6,000 chars, not ~5,000.
- Multilingual_v2 is not turbo. Expect 2-5x slower than turbo for the same text. Use turbo for drafts, multilingual for final.
- Voice stability < 0.3 causes wild variation between generations. Keep at 0.4-0.6 for consistent narration.
- 'Max text per request: 5,000 chars. For longer content, split into chunks and concatenate audio with FFmpeg.'
- Speaker boost doubles clarity but costs ~10% more characters. Worth it for final exports, skip for drafts.
- Cloned voices require Professional Voice License for commercial use. Built-in voices are licensed for all commercial use
  on paid plans.
- Rate limit errors (429) return after ~10s. Implement exponential backoff starting at 1s.
