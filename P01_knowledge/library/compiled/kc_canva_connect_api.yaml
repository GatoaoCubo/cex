quick_reference: 'base_url: https://api.canva.com/rest/v1

  auth: OAuth 2.0 PKCE (Authorization Code + PKCE)

  client_id: OC-AZ1jygW5KXZ_

  scopes: design:content:read design:content:write design:meta:read asset:read asset:write brandtemplate:content:read brandtemplate:meta:read
  folder:read folder:write export:read export:write

  token_endpoint: https://api.canva.com/rest/v1/oauth/token

  authorize_endpoint: https://www.canva.com/api/oauth/authorize

  rate_limit: 100 requests/min per user token

  content_type: application/json'
authentication_oauth_2_0_pkce_flow: 'Canva uses Authorization Code with PKCE (no client_secret needed for public clients).
  The flow:


  1. Generate `code_verifier` (43-128 chars, URL-safe random) and `code_challenge` = base64url(SHA256(code_verifier))

  2. Redirect user to `authorize_endpoint` with `client_id`, `redirect_uri`, `code_challenge`, `code_challenge_method=S256`,
  `scope`, `response_type=code`

  3. User authorizes → Canva redirects back with `code`

  4. Exchange `code` + `code_verifier` at `token_endpoint` for `access_token` (4h TTL) + `refresh_token`

  5. Refresh with `grant_type=refresh_token` before expiry


  Token storage: persist `refresh_token` securely. Access tokens expire in 4 hours.'
core_endpoints: '| Endpoint | Method | Purpose |

  |----------|--------|---------|

  | `/designs` | POST | Create blank or from brand template |

  | `/designs/{id}` | GET | Get design metadata |

  | `/designs/{id}/autofill` | POST | Autofill template placeholders with data |

  | `/exports` | POST | Start async export job |

  | `/exports/{id}` | GET | Poll export status, get download URL |

  | `/assets` | POST | Upload asset to user''s media library |

  | `/assets/{id}` | GET/DELETE | Get or remove asset |

  | `/brand-templates` | GET | List brand templates |

  | `/brand-templates/{id}` | GET | Get template details + placeholder names |

  | `/folders` | POST | Create folder |

  | `/folders/{id}/items` | GET | List folder contents |'
design_creation_export_example: "import httpx, time\n\nheaders = {\"Authorization\": f\"Bearer {access_token}\", \"Content-Type\"\
  : \"application/json\"}\n\n# 1. Create from brand template\nresp = httpx.post(\"https://api.canva.com/rest/v1/designs\"\
  , headers=headers, json={\n    \"design_type\": {\"type\": \"preset\", \"name\": \"InstagramPost\"},\n    \"title\": \"\
  Weekly Post — Week 14\"\n})\ndesign_id = resp.json()[\"design\"][\"id\"]\n\n# 2. Autofill placeholders (template must have\
  \ named placeholders)\nhttpx.post(f\"https://api.canva.com/rest/v1/designs/{design_id}/autofill\", headers=headers, json={\n\
  \    \"data\": {\n        \"title_text\": \"5 Dicas de Produtividade\",\n        \"body_text\": \"Aprenda como automatizar\
  \ seu conteúdo\",\n        \"image_placeholder\": {\"type\": \"image\", \"asset_id\": \"abc123\"}\n    }\n})\n\n# 3. Export\
  \ as PNG (async — poll until done)\nexport_resp = httpx.post(\"https://api.canva.com/rest/v1/exports\", headers=headers,\
  \ json={\n    \"design_id\": design_id,\n    \"format\": {\"type\": \"png\", \"quality\": \"high\", \"width\": 1080, \"\
  height\": 1080}\n})\nexport_id = export_resp.json()[\"export\"][\"id\"]\n\nwhile True:\n    status = httpx.get(f\"https://api.canva.com/rest/v1/exports/{export_id}\"\
  , headers=headers).json()\n    if status[\"export\"][\"status\"] == \"completed\":\n        download_url = status[\"export\"\
  ][\"urls\"][0]\n        break\n    time.sleep(2)"
export_formats: '| Format | Extensions | Notes |

  |--------|-----------|-------|

  | PNG | .png | Up to 4x resolution. Best for social media images. |

  | JPG | .jpg | Lossy. Smaller files. Quality param 1-100. |

  | PDF (standard) | .pdf | Single or multi-page. |

  | PDF (print) | .pdf | Crop marks, bleed (3mm). CMYK profile. |

  | PPTX | .pptx | Editable PowerPoint. Text stays editable. |

  | MP4 | .mp4 | Video designs only. 720p or 1080p. |

  | GIF | .gif | Animated designs. Max 20 pages/frames. |

  | SVG | .svg | Pro/Enterprise only. Vector output. |'
gotchas:
- 'Autofill requires named placeholders: template must be set up in Canva with named data fields. If placeholders are unnamed,
  autofill silently ignores them.'
- 'Export is async: always poll `/exports/{id}` — there''s no webhook callback. Typical wait: 5-30s for images, 30-120s for
  video.'
- 'Rate limit 429: back off exponentially. The 100/min limit is per-user, not per-app.'
- 'Brand templates vs regular templates: only brand templates (Canva for Teams) support autofill. Free/Pro templates do not.'
- 'Asset upload size: max 25MB per file for images. Video assets up to 1GB.'
- 'Token refresh race: if two processes refresh simultaneously, one token invalidates the other. Use a mutex on refresh.'
- 'CORS: API is server-side only. No browser calls — use a backend proxy.'
cost: Canva Connect API is free for Canva for Teams subscribers. No per-call charges. The cost is the Teams subscription (~$100/year
  per seat for up to 5 people).
