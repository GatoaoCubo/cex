best_practices: '| Practice | Recommendation | Use Case | Notes |

  |--|--|--|--|

  | Chunk Size Optimization | 1024-4096 bytes for text, 4096-8192 for binary | Text documents, multimedia files | Avoid sizes
  >8192 bytes for text |

  | Timeout Management | 2-3x expected processing time | Real-time systems, high-latency networks | Shorter timeouts for critical
  paths |

  | Retry Strategy | 2-3 attempts for transient errors | Networked systems, distributed processing | Avoid excessive retries
  for persistent failures |

  | Progress Monitoring | 2-10 seconds interval | Long-running operations, user-facing systems | Align with UI refresh rates
  |

  | Chunking Strategy | "dynamic" for variable data, "fixed" for consistent formats | Logs, sensor data, structured records
  | "dynamic" improves adaptability |

  | Parallel Processing | Enable on multi-core systems | High-throughput workloads | Disable for single-threaded environments
  |'
