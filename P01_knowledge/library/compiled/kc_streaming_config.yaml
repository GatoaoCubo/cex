example_configuration: "streaming:\n  enabled: true\n  chunk_size: 2048\n  buffer_size: 8192\n  timeout: 60\n  retry_attempts:\
  \ 3\n  progress_interval: 5\n  chunking_strategy: \"fixed\"\n  parallel_processing: true\n\nThis configuration is ideal\
  \ for processing large text documents while maintaining good performance and reliability. The fixed chunking strategy ensures\
  \ consistent processing, while parallel processing improves throughput. For comparison, a dynamic strategy would adapt chunk\
  \ sizes based on content patterns, which is better suited for variable-length data like logs or sensor streams."
