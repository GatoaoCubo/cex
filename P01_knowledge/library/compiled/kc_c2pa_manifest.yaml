id: kc_c2pa_manifest
kind: knowledge_card
title: C2PA 2.3 Content Credential Manifest
version: 1.1.0
quality: null
pillar: P01
author: CEX Documentation Team
date: 2023-11-15
tags:
- C2PA
- provenance
- digital assets
- authenticity
- metadata
last_modified: 2023-11-16
density_score: 1.0
overview: The C2PA (Certified Claims and Provenance for Authenticity) manifest is a JSON-based metadata format that provides
  cryptographic proof of a digital asset's authenticity, ownership, and usage rights. It enables verification of content integrity
  and provenance across the digital supply chain.
key_features:
- 'Immutable Provenance: Cryptographic signatures ensure data integrity'
- 'Claim Validation: Verifiable claims about content ownership and usage'
- 'Cross-Platform Compatibility: Works with major digital asset platforms'
- 'Extensible Schema: Supports additional metadata through custom claims'
manifest_structure: 'The manifest contains three core components:'
1_header: '| Field | Description | Required |

  |-------|-------------|----------|

  | `@context` | URI to the context document | ✅ Yes |

  | `type` | Must be "Manifest" | ✅ Yes |

  | `id` | Unique identifier for the manifest | ✅ Yes |

  | `version` | Schema version | ✅ Yes |'
2_claims: '| Claim Type | Description | Use Case |

  |------------|-------------|----------|

  | Ownership | Proves content ownership | Digital rights management |

  | Usage | Grants specific usage permissions | Content licensing |

  | Authenticity | Verifies content integrity | Fraud prevention |

  | Attribution | Credits original creators | Content discovery |'
3_provenance: '| Provenance Type | Description | Example |

  |------------------|-------------|---------|

  | Creation | Records content creation | New digital asset |

  | Modification | Tracks content changes | Version history |

  | Distribution | Records content sharing | Content syndication |

  | Destruction | Proves content removal | Data erasure |'
core_components: ''
validation_process:
- 'Signature Verification: Check cryptographic signatures against public keys'
- 'Schema Validation: Ensure compliance with C2PA schema version'
- 'Claim Validation: Verify claim types and validity periods'
- 'Provenance Chain: Confirm continuity of provenance records'
use_cases: ''
1_digital_rights_management: "{\n  \"claim\": {\n    \"type\": \"Usage\",\n    \"issuer\": \"https://rights.example.com\"\
  ,\n    \"subject\": \"urn:uuid:123e4567-e89b-12d3-a456-426614174000\",\n    \"validFrom\": \"2023-10-01T00:00:00Z\",\n \
  \   \"validUntil\": \"2024-01-01T00:00:00Z\",\n    \"permissions\": [\"view\", \"share\"]\n  }\n}"
2_content_verification: "{\n  \"provenance\": {\n    \"type\": \"Creation\",\n    \"creator\": \"https://validator.example.com\"\
  ,\n    \"timestamp\": \"2023-11-15T14:30:00Z\",\n    \"software\": \"C2PA Validator 2.1.0\",\n    \"signature\": \"base64-encoded-signature\"\
  \n  }\n}"
3_compliance_reporting: "{\n  \"claim\": {\n    \"type\": \"Compliance\",\n    \"issuer\": \"https://compliance.example.com\"\
  ,\n    \"subject\": \"urn:uuid:78901234-5678-90ab-cdef-112233445566\",\n    \"validFrom\": \"2023-09-01T00:00:00Z\",\n \
  \   \"validUntil\": \"2024-09-01T00:00:00Z\",\n    \"standards\": [\"ISO 23058\", \"IEEE 1609.2\"]\n  }\n}"
best_practices:
- 'Use UUIDs: Always use UUIDs for identifiers'
- 'Version Control: Always specify the schema version'
- 'Secure Signatures: Use strong cryptographic algorithms'
- 'Timestamping: Include accurate timestamps for provenance'
- 'Minimal Claims: Only include necessary claims to reduce attack surface'
common_pitfalls: '| Issue | Solution |

  |-------|----------|

  | Missing signature | Always include cryptographic signatures |

  | Invalid timestamp | Use trusted time-stamping services |

  | Outdated schema | Always use the latest schema version |

  | Missing context | Always include the @context field |

  | Invalid claim types | Only use approved claim types |'
implementation_guide:
- 'Generate UUID: Create a unique identifier for the manifest'
- 'Create Claims: Define ownership, usage, and authenticity claims'
- 'Add Provenance: Record creation and modification history'
- 'Sign Manifest: Use cryptographic signatures for integrity'
- 'Validate: Verify against C2PA schema and public keys'
tools:
- 'C2PA Validator: https://github.com/c2pa/c2pa-validator'
- 'Manifest Generator: https://tools.c2pa.org/manifest-generator'
- 'Schema Viewer: https://w3id.org/c2pa/context.jsonld'
references:
- C2PA Specification
- W3C Provenance Working Group
- ISO 23058:2022
- IEEE 1609.2
appendix: ''
sample_manifest: "{\n  \"@context\": \"https://w3id.org/c2pa/context.jsonld\",\n  \"type\": \"Manifest\",\n  \"id\": \"urn:uuid:123e4567-e89b-12d3-a456-426614174000\"\
  ,\n  \"version\": \"1.0.0\",\n  \"claim\": {\n    \"type\": \"Ownership\",\n    \"issuer\": \"https://example.com/issuer\"\
  ,\n    \"subject\": \"urn:uuid:78901234-5678-90ab-cdef-112233445566\",\n    \"validFrom\": \"2023-01-01T00:00:00Z\",\n \
  \   \"validUntil\": \"2024-01-01T00:00:00Z\",\n    \"signature\": \"base64-encoded-signature\"\n  },\n  \"provenance\":\
  \ {\n    \"type\": \"Creation\",\n    \"creator\": \"https://example.com/creator\",\n    \"timestamp\": \"2023-11-15T14:30:00Z\"\
  ,\n    \"software\": \"C2PA Validator 2.1.0\",\n    \"signature\": \"base64-encoded-signature\"\n  }\n}"
glossary: '| Term | Definition |

  |------|------------|

  | Claim | A statement about the content''s properties |

  | Provenance | Record of the content''s origin and history |

  | Signature | Cryptographic proof of authenticity |

  | UUID | Universally Unique Identifier |

  | Schema | Definition of the manifest structure |

  | Validator | Tool for verifying manifest integrity |

  | Context | Metadata about the manifest''s structure |

  | Issuer | Entity that created the claim |

  | Subject | Content being described by the claim |

  | Timestamp | Record of when the claim was made |

  | Software | Tool used to create the manifest |

  | Standard | Industry-wide specification for manifests |

  | Compliance | Adherence to specific regulations or standards |

  | Authenticity | Verification of content originality |

  | Ownership | Proof of content ownership |

  | Usage | Permissions for content usage |

  | Attribution | Credit to original creators |

  | Destruction | Proof of content removal |

  | Distribution | Record of content sharing |

  | Modification | Tracking of content changes |

  | Creation | Record of content origin |

  | Validation | Process of verifying manifest integrity |

  | Verification | Process of confirming claims |

  | Integrity | Assurance of data authenticity |

  | Security | Protection against tampering |

  | Trust | Confidence in content authenticity |

  | Transparency | Openness about content history |

  | Accountability | Responsibility for content integrity |

  | Traceability | Ability to track content history |

  | Non-repudiation | Proof of content origin |

