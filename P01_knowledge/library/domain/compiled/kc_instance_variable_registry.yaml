implementation_priority: '| Priority | Variables | Nucleus | Effort |

  |----------|-----------|---------|--------|

  | P0 — immediate | `INDUSTRY`, `CATEGORIES`, `CITIES`, `TARGET_COUNT` | N03 | Low — used in every CRM template |

  | P1 — high | `MAP_CENTER_*`, `MAP_ZOOM`, `CRM_DATA_SOURCE` | N03 | Medium — dashboard template |

  | P1 — high | `CNAE_CODES`, `LEGAL_SOURCES`, `SEARCH_PROVIDERS` | N03 | Medium — research templates |

  | P2 — medium | `DB_PROVIDER`, `TABLES`, `MAP_PROVIDER`, `AUTH_METHOD` | N05 | Medium — infra templates |

  | P3 — low | `BRAND_EMAIL`, `BRAND_DOMAIN` | N03 | Low — derivable from existing config |'
alternatives_considered: ''
alt_1_flat_brand_namespace_extend_existing: 'Add all 25 vars as `BRAND_INDUSTRY`, `BRAND_TARGET_COUNT`, etc. within `brand_config.yaml`.
  Pros: Single config file, existing injection pipeline works. Cons: Bloats brand config with CRM-specific fields irrelevant
  to non-CRM brands. Mixes identity with operational config.'
alt_2_separate_instance_config_yaml_recommended: 'New file `.cex/instance/instance_config.yaml` with 4 sections (crm_pipeline,
  dashboard, infrastructure, research). Pros: Clean separation — brand identity ≠ operational config. New brands only fill
  what they need. `brand_inject.py` loads both files. Cons: Two config files to maintain. Requires extending `brand_inject.py`.'
alt_3_per_template_frontmatter_defaults: 'Each template file carries `defaults:` in its frontmatter. Unfilled vars use the
  default.


  Pros: Self-documenting templates. No central config bloat.

  Cons: Defaults scattered across 20+ files. Hard to audit. Breaks the "single source of truth" principle.


  Recommendation: Alt 2 — `instance_config.yaml` separates identity from operations. The `| default:` syntax (already in `brand_inject.py`)
  handles missing values for brands that don''t use CRM.'
