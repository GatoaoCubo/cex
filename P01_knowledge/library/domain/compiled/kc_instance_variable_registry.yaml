category_7_learning_records_not_variables_structural_pattern: "Extracted from: `.cex/learning_records/emergent_autonomy_20260403/`\n\
  \nThese are not mustache-templated. They are runtime artifacts that follow a structural pattern:\n\n.cex/learning_records/{{MISSION_SLUG}}/\n\
  \  ├── {{PHASE}}{{DOMAIN}}{{NUCLEUS}}.md\n  └── signal_{{NUCLEUS}}_{{TIMESTAMP}}.json\n\nTemplate already implicit in the\
  \ file-naming convention. No variable injection needed — just document the convention."
