tldr: Registry of 67 {{mustache}} variables extracted from gato-ao-cubo branch. 7 categories, 44 BRAND_* (existing) + 23 new
  CRM/pipeline/dashboard vars. Maps instance → archetype separation.
density_score: 1.0
executive_summary: '| Metric | Count |

  |--------|-------|

  | Total unique variables | 67 |

  | Existing `BRAND_*` (already in `brand_config_template.yaml`) | 44 |

  | New instance variables (need templates) | 23 |

  | Categories | 7 |

  | Branch-only files (private, never templated) | ~30 |

  | Compiled artifacts unique to gato-ao-cubo | 21 |

  | Hardcoded instance references found | 60+ occurrences |'
methodology: 'Two approaches compared:


  | Approach | Pros | Cons | Verdict |

  |----------|------|------|---------|

  | A. Grep-based extraction (diff + pattern match) | Fast, exhaustive, catches all hardcoded strings | False positives, misses
  semantic variables | Used for discovery |

  | B. Spec-guided mapping (spec_instance_extraction.md) | Structured, 7 categories pre-defined, N07-validated | May miss
  emergent patterns not in spec | Used for classification |


  Hybrid used: Grep found candidates → Spec validated categories → Manual analysis resolved ambiguities.'
category_1_brand_variables_44_already_registered: 'These exist in `brand_config_template.yaml` and are documented in `kc_brand_variable_audit.md`.
  No duplication here — see that KC for the full list. Key insight: The gato-ao-cubo branch fills ALL 44 with real data. The
  template in main has `{{BRAND_*}}` placeholders. This layer is solved.'
