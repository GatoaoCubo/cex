tldr: 'Transform verbose sources (docs, conversations, code) into dense, structured KCs. Keep signal, remove noise. Target:
  1-2KB that replaces 10KB+ of raw source.'
keywords:
- distillation
- compression
- knowledge-card
- signal-to-noise
- density
density_score: 0.92
process: "RAW SOURCE (10KB+ docs, conversations, code)\n  → EXTRACT signal (concepts, patterns, decisions)\n  → STRUCTURE\
  \ (frontmatter + sections + tables)\n  → COMPRESS (remove redundancy, increase density)\n  → VALIDATE (does 1KB KC replace\
  \ 10KB source?)\n  → OUTPUT: knowledge_card (1-2KB, density >= 0.85)"
distillation_heuristics: '| Keep | Remove |

  |------|--------|

  | Definitions, boundaries | Verbose explanations |

  | Decision criteria (when/when-not) | Historical context |

  | Tables, structured data | Prose paragraphs |

  | Anti-patterns | Obvious best practices |

  | Provider-specific differences | Generic advice |'
