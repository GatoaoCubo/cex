tldr: 'Design for any LLM: use text in/out as primitive, structured output as JSON, tool use via MCP, avoid provider-specific
  features as core dependencies.'
when_to_use: Building systems that must work across Claude, GPT, Gemini, Llama, or future models
keywords:
- universal
- provider-agnostic
- portability
- abstraction
- llm-interface
density_score: 0.93
the_primitive: Every LLM accepts text → produces text. Build on this, not on provider-specific APIs.
universal_capabilities_all_major_llms: '| Capability | Claude | GPT | Gemini | Llama |

  |-----------|--------|-----|--------|-------|

  | Text generation | ✅ | ✅ | ✅ | ✅ |

  | System prompts | ✅ | ✅ | ✅ | ✅ |

  | JSON output | ✅ | ✅ | ✅ | ✅ |

  | Tool/function calls | ✅ | ✅ | ✅ | ✅* |

  | Image input | ✅ | ✅ | ✅ | ✅* |

  | Streaming | ✅ | ✅ | ✅ | ✅ |


  *Depends on hosting platform'
provider_specific_avoid_as_core_dependency: '| Feature | Provider | Portable Alternative |

  |---------|----------|---------------------|

  | Artifacts | Claude | Write to file |

  | Prompt caching | Claude | External cache |

  | Batch API | GPT | Sequential + cache |

  | Code execution | GPT | Local subprocess |

  | Grounding | Gemini | MCP fetch + search |'
cex_design_principle:
- '`claude -p` subprocess = portable (swap for `gemini`, `llm`, etc.)'
- Prompts are text files (.md) = any LLM can read them
- No `import anthropic` in tools = zero SDK dependency
- MCP = universal tool interface
