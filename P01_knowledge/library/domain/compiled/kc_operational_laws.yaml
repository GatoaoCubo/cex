density_score: 0.92
cex_operational_laws_4_rules:
- 8F mandatory — every artifact passes F1-F8
- GDP before dispatch — subjective decisions with user first
- N07 never builds — only plans, specs, dispatches, consolidates
- quality:null — never self-score, peer-review assigns quality
properties_of_good_operational_laws:
- 'Invariant: always true, no exceptions'
- 'Testable: can verify compliance automatically'
- 'Short: fits in working memory (max 5-7 rules)'
- 'Justified: each exists because violating it caused real problems'
