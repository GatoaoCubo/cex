tldr: Don't dump entire files into LLM context. Use retrieval + relevant excerpts. Full-file injection wastes tokens, increases
  cost, decreases accuracy.
when_to_use: Reviewing prompt design for token efficiency
keywords:
- anti-pattern
- file-storage
- token-waste
- context-pollution
density_score: 0.91
the_problem: Dumping entire files (10K+ tokens) into context when the LLM only needs 200 tokens of relevant info.
symptoms:
- Prompts >50K tokens for simple tasks
- High API costs with no quality improvement
- LLM "forgets" instructions buried under file dumps
- Slow response times
fix:
- Retrieve relevant chunks (RAG), not whole files
- Summarize large files before injection
- Use `cex_token_budget.py` to enforce limits
- Place critical instructions at start AND end of prompt (primacy + recency)
