chicken_egg_resolution: 'The meta-factory needs builder specs to know how to build. But builder specs are what it produces.
  Solution: seed the meta-factory with 13 meta-templates (bld_meta_*.md) that define the STRUCTURE of builder specs, not the
  content.'
