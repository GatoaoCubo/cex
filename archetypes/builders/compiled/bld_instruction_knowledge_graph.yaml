phase_1_research: "1. Identify the domain: what subject area does this knowledge graph cover?\n   Examples: biomedical, financial,\
  \ legal, software architecture, competitive intelligence.\n2. Enumerate entity types needed for this domain -- aim for 3-10\
  \ types.\n   Start with nouns: Organization, Person, Product, Technology, Concept, Event, Location.\n   Constrain aggressively\
  \ -- each added type increases extraction noise.\n3. Enumerate relation types needed -- aim for 5-15 types.\n   Start with\
  \ verbs: acquired, employs, uses, competes_with, developed_by, located_in.\n   For each relation, identify: source_type,\
  \ target_type, directionality (directed/undirected).\n4. Determine extraction strategy: LLM prompt for triplet extraction?\
  \ Named entity recognition?\n   Schema-constrained extraction (give the LLM a whitelist)? Pattern matching?\n5. Select storage\
  \ backend based on scale and query patterns:\n   - in_memory: prototyping, < 10k nodes, no persistence needed\n   - json:\
  \ simple persistence, < 50k nodes, no complex traversal\n   - falkordb: production, in-memory Cypher, high performance,\
  \ Redis-compatible\n   - neo4j: production, full ACID, complex Cypher queries, large graphs\n6. Determine traversal strategy:\n\
  \   - local: entity-centric retrieval (answer \"what do I know about entity X?\")\n   - global: community-based retrieval\
  \ (answer \"what are the main themes in this corpus?\")\n   - hybrid: combine both (most versatile, recommended default)\n\
  7. Define deduplication strategy:\n   - exact: string equality only (fast, misses \"OpenAI\" vs \"Open AI\")\n   - fuzzy:\
  \ edit distance / embedding similarity (good default)\n   - llm: LLM resolves ambiguous cases (most accurate, higher cost)\n\
  8. Check existing knowledge_graph artifacts via cex_retriever for the same domain --\n   avoid duplicating a schema that\
  \ already covers this domain."
phase_2_compose:
- Read bld_schema_knowledge_graph.md -- source of truth for all fields.
- Read bld_output_template_knowledge_graph.md -- fill the template following schema constraints.
- 'Fill all required frontmatter fields; set quality: null -- never self-score.'
- 'Write Overview section: what domain, why graph (not flat vector), what questions it answers.'
- 'Write Entity Types section: table with columns name, description, extraction_hint, examples.'
- 'Extraction hint: phrase or pattern that signals this entity type in text.'
- 'Examples: 2-3 instance values to clarify the type boundary.'
- 'Write Relation Types section: table with columns name, source_type, target_type, description, directionality.'
- 'directionality: directed (A -> B) or undirected (A -- B).'
- Every relation must reference only entity types defined in the Entity Types section.
- 'Write Extraction Config section:'
- Extraction prompt template or reference to a prompt_template artifact.
- 'Output format: JSON triplets {subject, predicate, object} or structured YAML.'
- LLM model and temperature recommendation for extraction.
- 'Write Storage and Traversal section:'
- Storage backend with rationale (why this backend for this scale/use case).
- Traversal strategy with max_depth and pruning rules.
- Query patterns supported (Cypher, Gremlin, SPARQL, or Python API).
- 'Write Integration section:'
- Embedding model reference (or link to embedding_config artifact).
- Dedup strategy with threshold configuration.
- Community detection algorithm and granularity.
- 'Downstream consumers: which agents or pipelines use this graph.'
- Confirm body <= 8192 bytes.
phase_3_validate: "1. Check bld_quality_gate_knowledge_graph.md -- verify each HARD gate manually.\n2. Confirm YAML frontmatter\
  \ parses without errors.\n3. Confirm id matches `^p01_kg_[a-z][a-z0-9_]+$`.\n4. Confirm entity_types list is non-empty and\
  \ matches the Entity Types table names exactly.\n5. Confirm relation_types list is non-empty and matches the Relation Types\
  \ table names exactly.\n6. Confirm each relation type references only entity types defined in entity_types list.\n7. Confirm\
  \ storage_backend is one of: neo4j, falkordb, in_memory, json.\n8. Confirm traversal_strategy is one of: local, global,\
  \ hybrid.\n9. Confirm quality is null.\n10. Confirm body <= 8192 bytes.\n11. Cross-check: is this a schema definition? If\
  \ this contains actual entity instances (data),\n    move instances to entity_memory (P10). If this is a vector index config,\
  \ it belongs in\n    knowledge_index (P10). If this is an external source pointer, it belongs in rag_source (P01).\n12.\
  \ If score < 8.0: revise in the same pass before outputting."
