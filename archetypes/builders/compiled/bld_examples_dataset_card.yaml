data_collection: Data was scraped from public IMDB forums between 2022 and 2023. All PII was removed during ingestion.
data_structure:
- '`review_text`: string (The raw text of the review)'
- '`label`: integer (0 for negative, 1 for positive)'
- '`timestamp`: datetime (Date of the review)'
limitations: The dataset contains a bias toward modern films (post-2010) and does not represent non-English cinema.
usage: Intended for training binary classifiers for sentiment detection.
