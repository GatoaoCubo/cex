observation: Context window configs that fail most often are missing output_reserve (model truncates mid-response) or have
  budgets exceeding total_tokens. Equal allocation across sections wastes capacity — RAG-heavy needs 50%+ for context.
pattern:
- Reserve output first — minimum 2000 tokens, typically 15-30% of total
- Budget proportionally — match workload (RAG-heavy → 50% context)
- Priority tiers — system prompt always protected first
- Validate arithmetic — sum(budgets) + reserve <= total_tokens
