kind: collaboration
id: bld_collaboration_prompt_compiler
pillar: P02
llm_function: COLLABORATE
purpose: How prompt-compiler-builder works in crews with other builders
pattern: each builder must know its ROLE in a team, what it RECEIVES and PRODUCES
quality: null
title: Collaboration Prompt Compiler
version: 1.0.0
author: n03_builder
tags:
- prompt_compiler
- builder
- collaboration
- P03
tldr: 'Collaboration protocol for prompt-compiler-builder: receives kinds registry, produces resolution tables, feeds routers
  and dispatchers.'
domain: prompt_compiler construction
created: '2026-04-12'
updated: '2026-04-12'
density_score: 0.9
my_role_in_crews: 'I am the FIRST RESOLVER. I answer ONE question: "what does the user want, expressed as {kind, pillar, nucleus,
  verb}?" I produce intent resolution tables that every other builder consumes. Without me, builders receive raw user input
  and must guess the kind. With me, they receive a structured tuple and execute precisely.'
crew_compositions: ''
crew_full_intent_pipeline: "  1. prompt-compiler-builder  -> \"resolve user input to {kind, pillar, nucleus, verb}\"\n  2.\
  \ router-builder           -> \"route resolved kind to correct provider\"\n  3. dispatch-rule-builder    -> \"dispatch resolved\
  \ nucleus to agent\""
crew_bilingual_user_experience: "  1. prompt-compiler-builder  -> \"bilingual intent resolution (PT-BR + EN)\"\n  2. glossary-entry-builder\
  \   -> \"terminology standardization across languages\"\n  3. prompt-template-builder  -> \"localized prompt templates\""
crew_knowledge_augmented_resolution: "  1. prompt-compiler-builder  -> \"base intent resolution tables\"\n  2. retriever-builder\
  \        -> \"semantic similarity for fallback matching\"\n  3. knowledge-card-builder   -> \"domain knowledge enriching\
  \ resolution context\""
handoff_protocol: ''
i_receive:
- 'seeds: kinds_meta.json, existing transmutation rules, target languages'
- 'optional: domain-specific patterns, user feedback on misresolutions'
i_produce:
- prompt_compiler artifact (YAML frontmatter + kind resolution tables + verb map + fallback, max 16384 bytes)
- 'committed to: `P03_prompt/p03_pc_{name}.md`'
i_signal:
- 'signal: complete (with quality score from QUALITY_GATES)'
- 'if quality < 8.0: signal retry with failure reasons'
builders_i_depend_on:
- 'knowledge-card-builder: provides kind KCs with detailed boundaries'
- 'glossary-entry-builder: provides terminology for bilingual patterns'
builders_that_depend_on_me: '| Builder | Why |

  |---------|-----|

  | router-builder | Uses resolved kind to determine provider routing |

  | dispatch-rule-builder | Uses resolved nucleus to dispatch tasks |

  | prompt-template-builder | Uses resolved kind to select correct template |

  | system-prompt-builder | Uses resolved domain to configure agent identity |'
