core_concept: Aggregate Root is the Evans DDD pattern for transactional consistency boundaries. The root is the ONLY object
  within its cluster accessible from outside. All mutations go through the root, which enforces domain invariants atomically.
when_to_use:
- Domain object has business rules that span multiple sub-entities
- Multiple objects must change together in one transaction
- Need a clear entry point for domain operations
when_not_to_use:
- 'Simple CRUD with no cross-entity rules: use type_def or input_schema'
- 'Data contract between services: use interface'
- 'Event routing: use process_manager'
key_rules_from_evans:
- Each aggregate has ONE root entity with a global identity
- External objects hold references only to the root (never to internal entities)
- Objects inside the boundary may reference each other freely
- A database transaction should not cross aggregate boundaries
- Delete root = delete everything inside the boundary
