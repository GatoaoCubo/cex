kind: collaboration
id: bld_collaboration_streaming_config
pillar: P12
llm_function: COLLABORATE
purpose: How streaming-config-builder works in crews with other builders
pattern: each builder knows its ROLE, what it RECEIVES and PRODUCES
quality: null
title: Collaboration Streaming Config
version: 1.0.0
author: n03_builder
tags:
- streaming_config
- builder
- collaboration
- P12
tldr: streaming-config-builder crews with agent-builder, api-client-builder, mcp-server-builder for real-time transport.
domain: streaming config construction
created: '2026-04-13'
updated: '2026-04-13'
density_score: 0.9
my_role_in_crews: 'I am a SPECIALIST. I answer ONE question: "how should data stream from producer to consumer, with what
  protocol and tuning?" I do not define response data shapes. I do not define serialization formats. I specify transport parameters
  so any server implementation delivers real-time data correctly.'
crew_compositions: ''
crew_llm_inference_streaming: "  1. agent-builder -> \"agent definition and inference endpoint\"\n  2. streaming-config-builder\
  \ -> \"SSE transport spec for token delivery\"\n  3. output-template-builder -> \"token wrapping and [DONE] sentinel format\""
crew_real_time_api: "  1. api-client-builder -> \"client consuming the stream\"\n  2. streaming-config-builder -> \"WebSocket\
  \ or SSE transport config\"\n  3. rate-limit-config-builder -> \"connection count and burst limits\"\n  4. trace-config-builder\
  \ -> \"observability for stream health\""
crew_mcp_server_with_streaming: "  1. mcp-server-builder -> \"MCP server definition\"\n  2. streaming-config-builder -> \"\
  SSE transport for MCP protocol\"\n  3. env-config-builder -> \"STREAM_AUTH_TOKEN and endpoint env vars\""
handoff_protocol: ''
i_receive:
- 'seeds: use case description, protocol preference (if any), expected data rate'
- 'optional: proxy/LB constraints, consumer identity, max connection budget'
i_produce:
- streaming_config artifact (.md + .yaml frontmatter)
- 'committed to: `P05_output/examples/p05_sc_{name}.md`'
i_signal:
- 'signal: complete (with quality score from QUALITY_GATES)'
- 'if quality < 8.0: signal retry with failure reasons'
builders_i_depend_on:
- 'rate-limit-config-builder: reveals connection and rate constraints that bound max_connections'
- 'env-config-builder: holds STREAM_AUTH_TOKEN and base URL env vars referenced by this config'
builders_that_depend_on_me: '| Builder | Why |

  |---------|-----|

  | agent-builder | Agent reads streaming_config for inference token delivery protocol |

  | api-client-builder | Client uses timeout, reconnect, and protocol settings from this config |

  | mcp-server-builder | MCP server reads SSE/WS transport config for its streaming interface |

  | output-template-builder | Template wraps streamed content; needs to know protocol sentinel format |'
