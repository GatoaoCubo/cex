example_1_supervised_text_classification: '---

  id: p02_tm_text_classification_bert

  kind: training_method

  pillar: P02

  title: "Supervised Text Classification with BERT"

  version: "1.0.0"

  learning_paradigm: supervised

  compute_intensity: medium

  domain: NLP

  quality: null

  ---

  ## Overview

  Supervised fine-tuning of BERT-base for binary/multi-class text classification.


  ## Learning Paradigm

  | Attribute | Value |

  |-----------|-------|

  | paradigm | supervised |

  | objective | cross-entropy loss |

  | requires_labels | Yes (class labels) |


  ## Compute Profile

  | Attribute | Value |

  |-----------|-------|

  | intensity | medium |

  | hardware | 1x A100 40GB or 4x RTX 3090 |

  | memory | ~12GB per GPU |


  ## Hyperparameters

  | Parameter | Value |

  |-----------|-------|

  | learning_rate | 2e-5 |

  | batch_size | 32 |

  | epochs | 3 |

  | optimizer | adamw |

  | warmup_ratio | 0.1 |'
