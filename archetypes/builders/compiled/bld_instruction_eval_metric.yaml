phase_1_research:
- Identify domain-specific KPIs aligned with P07 governance goals.
- Analyze historical data to determine baseline metric thresholds.
- Define success criteria (e.g., accuracy, fairness, scalability).
- Survey stakeholders for metric prioritization and weighting.
- Review existing evaluation frameworks for compatibility.
- Document data sources and quality requirements.
phase_2_compose:
- Set up environment with SCHEMA.md dependencies.
- Name metric using `P07_<DOMAIN>_<MEASURE>` convention.
- 'Map metric to SCHEMA.md fields: `id`, `description`, `formula`.'
- Write calculation logic in Python (reference OUTPUT_TEMPLATE.md).
- Implement edge case handling (e.g., null values, outliers).
- 'Embed metadata: governance owner, data lineage, version.'
- Validate against OUTPUT_TEMPLATE.md structure.
- Add unit tests for formula and edge cases.
- Finalize artifact with governance approval.
