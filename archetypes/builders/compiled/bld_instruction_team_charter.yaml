phase_1_research:
- Read the GDP decision manifest at `.cex/runtime/decisions/decision_manifest.yaml` to extract user's WHAT decisions.
- Load the referenced `crew_template_ref` to understand the crew's capability profile.
- Identify all stakeholders from the mission context (user, nuclei, external systems).
- Survey existing charters in `N06_commercial/` and `P12_*/` for reuse patterns.
- 'Extract budget constraints: token budget from context_window_config, time from schedule, cost from commercial targets.'
- Map deliverables to nucleus capabilities (N01-N06 routing table).
phase_2_compose:
- Reference SCHEMA.md for required fields (charter_id, crew_template_ref, mission_statement, deliverables, etc.).
- 'Write `mission_statement` as a single sentence: "This crew will [ACTION] [OBJECT] by [DEADLINE] to achieve [OUTCOME]."'
- Define `deliverables` as a numbered list with artifact kinds and pillar paths.
- Translate GDP decisions into `success_metrics` using OKR format (Objective + 3 Key Results).
- 'Set `budget` as three sub-fields: tokens (integer), time_hours (float), cost_usd (float).'
- Set `deadline` as ISO 8601 datetime.
- List `stakeholders` as RACI table (Responsible, Accountable, Consulted, Informed).
- Define `quality_gate` referencing the 8F floor (8.0) and target (9.0).
- Write `escalation_protocol` as IF-THEN rules (e.g., IF score < 8.0 THEN escalate to N07).
- 'Write `termination_criteria` as three conditions: success, failure, timeout.'
phase_3_validate:
- '[ ] charter_id present and unique (pattern: `p12_tc_{{mission}}_v{{n}}`).'
- '[ ] crew_template_ref resolves to an existing template file.'
- '[ ] mission_statement is one sentence, action-oriented, includes deadline.'
- '[ ] deliverables list has at least one entry with kind and path.'
- '[ ] success_metrics follow OKR format (1 Objective + >= 2 Key Results).'
- '[ ] budget fields all present: tokens, time_hours, cost_usd.'
- '[ ] deadline is valid ISO 8601 datetime.'
- '[ ] stakeholders table includes all four RACI roles.'
- '[ ] quality_gate references 8F thresholds.'
- '[ ] escalation_protocol has at least one IF-THEN rule.'
- '[ ] termination_criteria covers success, failure, and timeout.'
