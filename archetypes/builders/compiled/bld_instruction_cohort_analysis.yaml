phase_1_research:
- Define retention cohort criteria (e.g., user acquisition date, engagement thresholds).
- Identify data sources for user behavior (e.g., CRM, app analytics, transaction logs).
- Determine LTV modeling variables (e.g., revenue per user, churn rate, cohort size).
- Perform exploratory analysis to detect anomalies in cohort survival curves.
- Validate alignment with business KPIs (e.g., 30-day retention, 12-month LTV).
- Document assumptions and edge cases (e.g., overlapping cohorts, missing data).
phase_2_compose:
- Align artifact structure with bld_schema_cohort_analysis.md (cohort definition, metrics, methodology).
- Specify cohort parameters (e.g., start date, segmentation rules).
- 'Write objective section: "Measure retention and LTV for [product/service] users."'
- 'Detail data pipeline: ETL steps for cohort identification and metric aggregation.'
- Populate survival analysis section with formulae (e.g., retention rate = active / total).
- Embed LTV calculation logic (e.g., CLV = average revenue x retention period).
- Reference bld_output_template_cohort_analysis.md for visualization placement (e.g., cohort heatmaps).
- 'Add governance controls: data quality checks, cohort validation rules.'
- 'Finalize with appendices: schema diagrams, data dictionary, and calculation proofs.'
phase_3_validate:
- '[ ] [OK] Cohort definitions match bld_schema_cohort_analysis.md and business requirements'
- '[ ] [OK] Retention/LTV metrics align with domain-specific KPIs'
- '[ ] [OK] Survival curves and LTV projections pass statistical validity tests'
- '[ ] [OK] Visualizations (heatmaps, trend lines) reflect accurate data transformations'
- '[ ] [OK] Artifact complies with governance standards (data provenance, audit trails)'
