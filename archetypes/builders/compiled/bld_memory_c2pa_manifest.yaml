density_score: 0.85
observation: C2PA 2.2+ introduced explicit AI-ML generator guidance that was absent in 1.x. Teams using earlier spec versions
  omit the c2pa.ai_generator assertion entirely, producing manifests that lack attribution for AI-generated content. Adobe
  Firefly, Nikon, and Microsoft all use C2PA 2.3 natively; artifacts built for these platforms must conform to 2.3.
pattern: Always include c2pa.ai_generator assertion with digitalSourceType for AI-generated content. Use IANA MIME types (image/jpeg,
  not jpg). Embed manifest BEFORE final compression to prevent hash invalidation.
evidence: C2PA 2.3 spec released 2025. Adobe Firefly native integration confirmed. CAI verification portal (verify.contentauthenticity.org)
  validates live manifests. C2PA 2.4 adds AI watermarking hooks (announced 2025).
recommendations:
- Include c2pa.ai_generator assertion for ALL AI-generated content (required by C2PA 2.2+).
- Use trainedAlgorithmicMedia for pure AI generation; compositeSynthetic for AI-composited media.
- Always include ingredient content hashes to enable provenance chain verification.
- Embed manifest before JPEG compression (hash must match final bytes).
- Reference c2pa-rs SDK (Rust, open source) or CAI SDK (JavaScript) for signing implementation.
- Test manifests at verify.contentauthenticity.org before deployment.
