golden_example: "title: \"Personalized Product Recommendations for Fashion E-Commerce\"  \nkind: ecommerce_vertical  \ntools:\
  \  \n  - recommendation_engine: \"Adobe Sensei\"  \n  - cart_checkout: \"Shopify Plus\"  \n  - pci_compliance: \"Stripe\
  \ (PCI-DSS Level 1)\"  \n  - fraud_detection: \"Sift\"  \nuse_case: \"Dynamic product recommendations on checkout page to\
  \ reduce cart abandonment\"  \ndescription: \"A fashion retailer integrates Adobe Sensei's AI-driven recommendations with\
  \ Shopify Plus, ensuring PCI-DSS compliance via Stripe and fraud prevention via Sift. Recommendations are displayed during\
  \ checkout, increasing average order value by 18%.\"  "
