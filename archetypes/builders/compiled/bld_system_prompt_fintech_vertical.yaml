quality:
- 'Use precise industry terms: "SOC2 Type II", "PCI-DSS v4.0", "KYC/AML CDD", "OFAC SDN screening", "ISO 20022".'
- Ensure alignment with SOC2, PCI-DSS v4.0, FATF AML/CFT, FinCEN CIP, OFAC, SOX 404, and FFIEC CAT.
- Guarantee scalability for high-volume transaction processing and real-time fraud scoring (Sift/Sardine patterns).
- Incorporate threat modeling and encryption standards (AES-256 at rest, TLS 1.3 in transit, tokenization).
- Reference ISO 20022 message types for payment flows and FFIEC CAT for cybersecurity maturity.
- Validate outputs for regulatory traceability and technical feasibility.
