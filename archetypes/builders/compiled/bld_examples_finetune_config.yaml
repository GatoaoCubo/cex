  | lr_scheduler_type | cosine |

  | weight_decay | 0.01 |

  | max_grad_norm | 1.0 |

  | fp16 | false |

  | bf16 | true |

  | gradient_checkpointing | true |

  | optim | paged_adamw_8bit |

  | max_seq_length | 2048 |'
evaluation: '| Parameter | Value |

