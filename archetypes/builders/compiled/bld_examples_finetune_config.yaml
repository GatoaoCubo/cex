golden_example: "INPUT: \"Configure QLoRA fine-tuning of Llama-3-8B for instruction following on a custom dataset\"\nOUTPUT:\n\
  id: p02_ft_llama3_8b_instruct_qlora\nkind: finetune_config\npillar: P02\nversion: \"1.0.0\"\ncreated: \"2026-04-13\"\nupdated:\
  \ \"2026-04-13\"\nauthor: \"builder_agent\"\nbase_model: \"meta-llama/Meta-Llama-3-8B\"\nadapter_type: qlora\ndataset: \"\
  data/instruct_train.jsonl\"\nquality: null\ntags: [finetune_config, qlora, llama3, instruction-following, sft]\ntldr: \"\
  QLoRA SFT on Llama-3-8B: rank=16, 4-bit NF4, 3 epochs, cosine LR, instruction dataset 50K rows\"\ndescription: \"QLoRA fine-tune\
  \ of Llama-3-8B for instruction following using a 50K-row Alpaca-format dataset\"\ntask_type: sft\nframework: trl\ncompute:\
