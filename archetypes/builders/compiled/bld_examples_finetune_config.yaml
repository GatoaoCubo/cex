overview: Adapt Llama-3-8B to follow instructions in a custom domain using supervised fine-tuning. QLoRA chosen to fit within
  24GB VRAM while retaining near-full-fine-tune quality. 4-bit NF4 quantization of base model with LoRA adapters on attention
  and MLP projections.
base_model: '| Field | Value |

  |-------|-------|

  | model_id | meta-llama/Meta-Llama-3-8B |

  | architecture | llama3 |

  | param_count | 8B |

  | license | llama3 |

  | quantization | 4bit (NF4, loaded for training) |'
dataset: '| Field | Value |

  |-------|-------|

  | path | data/instruct_train.jsonl |

  | size | 50000 rows |

  | format | alpaca |

  | field_mapping | instruction / input / output |

  | language | en |

  | preprocessing | filter max_len=2048, deduplicate |'
adapter_config: '| Parameter | Value |

  |-----------|-------|

  | r (rank) | 16 |

  | lora_alpha | 32 |

  | lora_dropout | 0.05 |

  | target_modules | q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj |

  | bias | none |

  | task_type | CAUSAL_LM |

  | bits | 4 |

  | quant_type | nf4 |

  | double_quant | true |'
hyperparameters: '| Parameter | Value |

  |-----------|-------|

  | learning_rate | 2e-4 |

