golden_example: "name: \"Chain-of-Thought with Self-Consistency\"\nkind: prompt_technique\nvendor: Anthropic\nmodel: Claude\
  \ 3.5\nversion: 1.0\nbody: |\n  1. Frame the problem as a multi-step reasoning task\n  2. Generate 3 independent solutions\
  \ using separate reasoning paths\n  3. Compare results and select the most consistent answer\n  4. Use explicit markers\
  \ like [Reasoning 1], [Reasoning 2] for clarity\n  Example: \"Solve this math problem by showing three different solution\
  \ paths, then choose the most consistent answer.\""
anti_example_1_template_confusion: "name: \"Generic Question Template\"\nkind: prompt_technique\nvendor: OpenAI\nmodel: GPT-4\n\
  version: 0.1\nbody: |\n  \"Please answer the following question: [Question here]. Provide a detailed explanation.\""
why_it_fails: The instruction is too vague to qualify as a technique. It doesn't define a specific pattern or method for structuring
  the prompt, making it non-reproducible.
