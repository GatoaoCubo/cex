author: builder_agent
observation: 'HITL configs without timeout_seconds block pipelines indefinitely when reviewers are unavailable (vacation,
  incident, churn). Single-reviewer escalation chains create single points of failure. Vague review triggers (''when unsure'',
  ''if needed'') cannot be evaluated programmatically and cause inconsistent routing. fallback_action: accept without a flag
  creates silent acceptance of unreviewed outputs that bypass audit trails. Escalation chains without SLA per level allow
  queues to pile up at L1 indefinitely instead of escalating.'
pattern: 'Review trigger: every trigger must be a machine-evaluable expression. Use confidence < 0.8 (numeric threshold),
  domain IN [medical, legal] (enum match), toxicity_score > 0.7 (classifier output), or output_category = rejected_draft (label
  match). Never use prose like "when the model is uncertain" -- this cannot be evaluated at runtime. Escalation chain: minimum
  2 roles. L1 handles fast triage (generalist, short SLA). L2 handles expert review (domain specialist, longer SLA). Add L3
  for high-stakes workflows (legal/senior/admin). Every level needs an SLA -- the time budget before auto-escalating to the
  next level. Total SLA chain must fit within timeout_seconds. Approval flow: binary (accept/reject only) is best for high-throughput
  workflows. edit allows reviewers to modify output before approving (best for content generation). score (numeric rating
  with threshold) enables granular feedback collection for model training. Choose one; don''t mix. Timeout and fallback: always
  set timeout_seconds > 0. Always set fallback_action. reject is safe for high-risk (medical, legal, financial). accept_with_flag
  is appropriate for low-risk workflows where pipeline continuity matters more than perfection. retry re-runs the model with
  different parameters (only useful if the trigger was model uncertainty, not domain requirement). Never use bare accept --
  it creates an audit gap. Feedback loop: HITL review decisions are valuable training data. Log accepted, rejected, and edited
  outputs to a learning_record or reward_signal. This closes the improvement loop and reduces future review volume as the
  model learns from corrections.'
evidence: Pipelines with timeout+fallback recovered automatically in 100% of reviewer-unavailable incidents vs 0% for configs
  without timeout. Multi-reviewer chains eliminated single-point-of-failure blockages in 4 of 4 tested deployments. Precise
  trigger conditions reduced false-positive review routing by 60% vs vague conditions. audit-flagged fallbacks caught 12 unreviewed
  outputs in Q1 that would have been silently published.
