summary: 'HITL configuration failures cluster into two categories: availability failures (pipeline blocks because no human
  responded and there was no timeout or fallback) and routing failures (wrong outputs sent to review because trigger condition
  was vague or misconfigured). Both categories are preventable with precise specification.'
anti_pattern:
- 'timeout_seconds: 0 or missing -- pipeline blocks indefinitely on reviewer absence.'
- Single reviewer in escalation_chain -- one person's vacation = blocked queue.
- Vague review_trigger -- cannot be evaluated at runtime; causes inconsistent routing.
- 'fallback_action: accept -- silent acceptance bypasses audit trail; never safe.'
- No SLA per escalation level -- L1 queue fills up, never escalates to L2.
