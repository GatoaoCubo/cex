phase_1_research:
- Identify user intent and evaluation goals for the playground.
- Map technical constraints (e.g., resource limits, API versions).
- Analyze existing configs for compatibility and reuse.
- Document security policies (e.g., access controls, data isolation).
- Benchmark performance thresholds for interactive scenarios.
- Define success metrics for product evaluation.
phase_2_compose:
- Set up environment with SCHEMA.md as the structural blueprint.
- Define root parameters (e.g., `sandbox_id`, `evaluation_mode`).
- 'Structure config sections: `constraints`, `resources`, `security`.'
- Populate `constraints` with P09-specific rules from research.
- Embed resource limits from Phase 1 benchmarks.
- Apply security policies from Phase 1 to `security` section.
- Validate against SCHEMA.md using a linter tool.
- Format output using OUTPUT_TEMPLATE.md syntax.
- Add metadata (e.g., `created_by`, `version`).
