tldr: Consumer lag specialist. Works with circuit-breaker, rate-limit-config, and monitor in resilience crews.
domain: backpressure policy construction
created: '2026-04-17'
updated: '2026-04-17'
density_score: 0.9
my_role_in_crews: 'I am a FLOW CONTROL SPECIALIST. I answer ONE question: "how should this pipeline respond when consumers
  cannot keep up with producers?" I do not handle dependency failures (circuit breakers). I do not throttle inbound requests
  (rate limits). I declare the overflow policy and buffer contract for producer-consumer imbalance.'
crew_compositions: ''
crew_pipeline_resilience: "  1. circuit-breaker-builder      -> \"dependency fault isolation per service\"\n  2. backpressure-policy-builder\
  \  -> \"consumer lag management per queue\"\n  3. rate-limit-config-builder    -> \"inbound request throttling\"\n  4. runtime-rule-builder\
  \         -> \"retry and backoff strategy\""
crew_event_streaming_setup: "  1. backpressure-policy-builder  -> \"Kafka consumer overflow policy\"\n  2. env-config-builder\
  \           -> \"Kafka connection and topic config\"\n  3. monitor-builder              -> \"consumer lag observability\""
crew_llm_inference_pipeline: "  1. rate-limit-config-builder    -> \"provider RPM/TPM quotas\"\n  2. circuit-breaker-builder\
  \      -> \"provider failure isolation\"\n  3. backpressure-policy-builder  -> \"job queue overflow policy\"\n  4. agent-builder\
  \                -> \"inference agent with all policies wired\""
handoff_protocol: ''
i_receive:
- 'seeds: queue/channel name, producer throughput, consumer throughput'
- 'acceptable data loss: can items be dropped? which end?'
- 'buffer memory budget: max items to hold'
i_produce:
- backpressure_policy artifact (.md with YAML frontmatter)
- 'committed to: `N0X_{domain}/P09_config/p09_bp_{scope_slug}.md`'
i_signal:
- 'signal: complete (with quality score)'
- 'if quality < 8.0: signal retry with gate failures listed'
builders_i_depend_on: None -- independent builder (layer 0). Backpressure policies can be defined standalone.
builders_that_depend_on_me: '| Builder | Why |

  |---------|-----|

  | agent-builder | Agents configure job queues using backpressure_policy at runtime |

  | monitor-builder | Monitors track queue depth and shed events against policy thresholds |

  | circuit-breaker-builder | Circuit breakers may consult backpressure state during half-open probing |

  | workflow-builder | Workflows reference backpressure_policy for async step queues |'
