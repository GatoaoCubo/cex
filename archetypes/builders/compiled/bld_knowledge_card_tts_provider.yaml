domain_overview: 'Text-to-speech (TTS) provider integration converts text into spoken audio via third-party APIs or self-hosted
  models. The market has bifurcated into cloud APIs (high quality, instant availability) and generative open-source models
  (voice cloning, zero-shot synthesis).


  Cloud APIs -- commercial:

  - ElevenLabs: State-of-the-art voice quality. Turbo v2.5 model, ~300ms latency, voice cloning from 1min sample. $0.30/1K
  chars (Starter), $0.18/1K (Creator). Supports 29 languages. MOS ~4.7/5.

  - OpenAI TTS: 6 voices (alloy/echo/fable/onyx/nova/shimmer), streaming via HTTP chunks, $0.015/1K chars (tts-1), $0.030/1K
  (tts-1-hd). Simple REST API, no SSML.

  - Google Cloud TTS: 380+ voices, 50+ languages. Neural2 voices (MOS ~4.5), Studio voices (MOS ~4.7). $4/1M chars (Standard),
  $16/1M chars (Neural2), $160/1M chars (Studio).

  - Azure Cognitive Services TTS: 500+ neural voices, 140 languages. Custom Neural Voice (speaker cloning). $0.016/1K chars
  (Neural). Real-time streaming via WebSockets.

  - Amazon Polly: 60+ voices, 29 languages. Neural TTS (NTTS) + standard. $4/1M chars (NTTS), $0.004/1K chars standard. SSML
  support, brand voice customization.

  - IBM Watson TTS: 30+ voices, 13 languages. On-premise deployment option (CloudPak). $0.02/1K chars.

  - Resemble.ai: Real-time API (<500ms), voice cloning, emotion control. $0.006/sec audio.

  - Play.ht: 900+ AI voices, 142 languages, real-time streaming. $0.001/word.


  Open-source / self-hosted:

  - Coqui TTS (XTTS v2): Multi-speaker, voice cloning, 17 languages, runs on consumer GPU (4GB VRAM). Apache 2.0.

  - Bark (Suno AI): Generative audio model, supports non-verbal sounds, music. Not real-time (2-30s generation). MIT.

  - Tortoise-TTS: High quality but slow (30-120s). Best for offline quality.

  - Piper TTS: Fast, lightweight, ONNX-based. <100ms on CPU. Ideal for embedded/edge.

  - StyleTTS2: SOTA open-source, human-level quality. Research-grade.


  Integration focuses on API compatibility, latency optimization, and SSML support. MOS (Mean Opinion Score) is the standard
  quality benchmark (4.0+ = good, 4.5+ = excellent, 4.7+ = near-human).'
key_concepts: "| Concept          | Definition                                                                 | Source  \
  \                        |  \n|------------------|----------------------------------------------------------------------------|---------------------------------|\
  \  \n| TTS API          | Interface for requesting speech synthesis from a provider                   | AWS Polly, Google\
  \ Cloud TTS     |  \n| Voice Model      | Pretrained speaker profile (e.g., gender, age, accent)                    | Azure\
  \ Cognitive Services        |  \n| Latency          | Time between text input and audio delivery                       \
  \         | ISO/IEC 24612                   |  \n| Language Support | Provider’s list of supported languages and locales\
  \                        | Google Cloud TTS Documentation  |  \n| SSML             | Speech Synthesis Markup Language for\
  \ text formatting                      | W3C SSML Specification          |  \n| Audio Format     | Output encoding (e.g.,\
  \ 16kHz PCM, MP3)                                    | RTP Protocol                    |  \n| Provider Quotas  | API request\
  \ limits and usage-based pricing                                | AWS Pricing Model               |  \n| Customization \
  \   | Provider-specific parameters (e.g., pitch, speed)                         | Azure TTS Custom Voice          |  \n\
  | API Key          | Authentication token for accessing provider endpoints                     | OAuth 2.0             \
  \          |  \n| Webhooks         | Callbacks for asynchronous job status updates                             | Twilio\
  \ TTS Integration          |  \n| Error Handling   | Mechanisms for retrying failed requests or fallback synthesis     \
  \        | RFC 7231                        |  \n| Billing Model    | Pricing structure (e.g., per-character, per-minute)\
  \                       | Google Cloud TTS Pricing        |"
