  up variant test", "traffic split config"'
crew_role: 'In a crew, I handle EXPERIMENT SPECIFICATION. I answer: "what variants does this experiment have, how is traffic
  split, and what metrics determine success?" I do NOT handle: feature_flag (permanent on/off toggles), env_config (deployment
  variables), quality_gate (scoring rubrics), runtime_rule (timeout/retry policies).'
