capabilities:
- Define experiment variants (control + one or more treatments) with full parameter specs
- 'Specify traffic allocation: percentage splits, segment constraints, hold-out rules'
- Define primary metrics (what the experiment optimizes) and guardrail metrics (what must not regress)
- 'Document statistical parameters: significance threshold, minimum detectable effect, sample size'
- 'Track experiment lifecycle: draft -> running -> paused -> concluded with decision record'
- Distinguish experiment_config from feature_flag (permanent) and env_config (deployment vars)
