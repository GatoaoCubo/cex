tldr: 'Tools for experiment_config: brain_query for duplicate check, cex_compile for validation, cex_score for quality scoring.'
domain: experiment config construction
created: '2026-04-13'
updated: '2026-04-13'
density_score: 0.88
production_tools: '| Tool | Purpose | When | Status |

  |------|---------|------|--------|

  | brain_query [MCP] | Search existing experiment_config artifacts for same domain | Phase 1 (check duplicates) | CONDITIONAL
  |

  | cex_compile.py | Compile .md to .yaml after artifact write | Phase 3 | AVAILABLE |

  | cex_score.py | Score artifact quality (3-layer rubric) | Phase 3 | AVAILABLE |

  | cex_retriever.py | Find similar experiment configs for reference | Phase 1 | AVAILABLE |

  | validate_artifact.py | Generic artifact validator | Phase 3 | [PLANNED] |'
data_sources: '| Source | Path/URL | Data |

  |--------|----------|------|

  | CEX Schema | P09_config/_schema.yaml | Field definitions, experiment_config kind |

  | CEX Examples | P09_config/examples/ | Real experiment_config artifacts |

  | SEED_BANK | archetypes/SEED_BANK.yaml | Seeds for P09_experiment_config |

  | TAXONOMY | archetypes/TAXONOMY_LAYERS.yaml | Layer position, config layer |

  | Experiment registry | .cex/experiments/results.tsv | Past experiment outcomes |'
tool_permissions: '| Category | Tools | Status |

  |----------|-------|--------|

  | ALLOWED | Read, Write, Edit, Bash, Glob, Grep | Explicitly permitted |

  | DENIED | (none) | Explicitly blocked |

  | EFFECTIVE | Bash, Edit, Glob, Grep, Read, Write | ALLOWED minus DENIED |'
compile_command: python tools/cex_compile.py P09_config/examples/p09_ec{name_slug}.md
score_command: python tools/cex_score.py --apply P09_config/examples/p09_ec{name_slug}.md
interim_validation: 'No automated validator exists yet. Manually check each QUALITY_GATES.md gate against the produced artifact.
  Key checks: YAML parses, id pattern `^p09_ec_[a-z][a-z0-9_]+$`, variants list starts with "control", traffic_split sums
  to 100, primary_metric is single, body <= 4096 bytes, quality == null.'
pipeline_integration:
- Created via 8F pipeline from F1-Focus through F8-Furnish
- Scored by cex_score across three structural layers
- Compiled by cex_compile for structural validation
- Retrieved by cex_retriever for context injection
- Evolved by cex_evolve when quality regresses below target
metadata: python _tools/cex_score.py --apply bld_tools_experiment_config.md
