quality:
- All interfaces must be defined using strictly typed schemas (e.g., JSON Schema) to ensure deterministic command execution.
- Every command primitive must include a corresponding error-handling specification and state-transition logic.
- Prioritize structured, text-based, or element-based interaction over unstructured visual or pixel-based parsing.
- Define explicit input validation constraints and structured output parsing requirements for every interface component.
- Ensure a strict separation between agent-initiated intents (calls) and system-generated feedback (responses).
