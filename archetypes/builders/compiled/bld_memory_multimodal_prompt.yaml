density_score: 0.85
observation: Misalignment between modalities (e.g., text describing unrelated visual/audio content) and ambiguous modality
  roles (e.g., unclear which modality drives the task) frequently hinder effectiveness. Overloading prompts with unrelated
  modalities also reduces coherence.
pattern: Structured prompts with explicit modality labels (e.g., `[IMAGE]`, `[AUDIO]`, `[TEXT]`) and sequential alignment
  (e.g., "Describe the scene in the image using the audio context") improve cross-modal reasoning. Clear task boundaries and
  modality-specific instructions enhance consistency.
evidence: Reviewed artifacts showed 30% higher success rates when modalities were labeled and aligned to a shared task, versus
  15% for unstructured prompts.
recommendations:
- Use explicit modality delimiters (e.g., `[IMAGE]`, `[AUDIO]`) to disambiguate inputs.
- Align modalities to a shared task (e.g., "Compare the audio and image to identify discrepancies").
- Avoid redundant or conflicting modalities unless explicitly required for the task.
- Test prompts iteratively with diverse modality combinations to ensure robustness.
- Include example-based guidance (e.g., "Use the text to caption the image, then verify with the audio").
