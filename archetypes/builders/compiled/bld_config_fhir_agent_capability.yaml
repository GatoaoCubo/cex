naming_convention: 'Pattern: `p08_fhir_{{capability_slug}}.md` Examples: `p08_fhir_cds_sepsis_alert.md`, `p08_fhir_summarization_discharge.md`,
  `p08_fhir_coding_icd10_auto.md`'
paths: 'Artifacts stored in: `P08_architecture/fhir_capabilities/{{capability_category}}/{{id}}.md`'
limits: 'max_bytes: 5120 max_turns: 6 effort_level: 4'
