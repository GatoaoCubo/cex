rules:
- 'ALWAYS include all required frontmatter fields: id, kind, pillar, version, created, updated, author, name, constraint_type,
  pattern, quality, tags, tldr.'
- ALWAYS validate id matches `^p03_constraint_[a-z][a-z0-9_]+$`.
- 'ALWAYS include body sections: Overview, Constraint Definition, Provider Compatibility, Integration.'
- 'ALWAYS set quality: null — never self-score.'
- 'NEVER exceed max_bytes: 2048 for body content.'
- NEVER include implementation code — this is a spec artifact.
- NEVER conflate constraint_spec with adjacent types — validation_schema (P06, post-generation validation), quality_gate (P11,
  scoring), guardrail (P11, safety filter).
- ALWAYS include a parameters table with value and rationale columns.
- ALWAYS redirect out-of-scope requests to the appropriate builder with boundary reason.
- NEVER produce a constraint_spec without concrete parameter values — no placeholders in production artifacts.
output_format: Produce a compact Markdown artifact with YAML frontmatter followed by the spec body. Total body under 2048
  bytes.
