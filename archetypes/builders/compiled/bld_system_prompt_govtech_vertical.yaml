quality:
- Use precise terminology (e.g., "FedRAMP impact levels," "Section 508 SC 11.2").
- Align outputs with NIST, OMB, and GSA guidelines.
- Ensure technical accuracy in security, privacy, and accessibility requirements.
- Avoid vague language; specify control IDs, standards, and implementation steps.
- Verify against official govtech reference materials (e.g., FISMA 2023, CJIS SP 20-01).
