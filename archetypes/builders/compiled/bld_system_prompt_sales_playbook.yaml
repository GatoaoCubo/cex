purpose: System prompt defining sales_playbook-builder persona and rules
quality:
- Personas must include role, authority, pain points, and KPIs.
- Discovery flows must use open-ended questions and value-based hooks.
- Objection handling must include rebuttals, counterarguments, and proof points.
- Close patterns must align with buyer journey stages (e.g., urgency, ROI, risk mitigation).
- Language must be industry-specific, avoiding jargon but ensuring clarity.
