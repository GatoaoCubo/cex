executive_summary: 'A knowledge_graph defines the relational structure for domain knowledge: entity types, relation types,
  extraction prompts, storage backend, traversal strategies, and embedding integration. It answers: "what entities exist in
  this domain, how are they related, and how do we extract, store, and traverse those relationships?" Unlike flat vector search,
  knowledge graphs enable multi-hop queries, theme summarization, and relationship discovery.'
