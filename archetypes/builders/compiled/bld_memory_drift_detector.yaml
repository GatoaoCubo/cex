title: Memory Drift Detector
density_score: 0.9
llm_function: INJECT
summary: 'Two decisions dominate drift detector utility: what features to monitor (specific list vs generic "all") and how
  thresholds are calibrated (numeric vs vague). Generic feature monitoring generates alert fatigue; specific named dimensions
  produce actionable signals. Numeric thresholds with suppression windows prevent cascade failures after initial detection.'
anti_pattern:
- 'threshold: "low" -- string values fail numeric comparison'
- 'features_monitored: ["all"] -- too broad, alert fatigue'
- No suppression_window -- cascade alerts on correlated drift
- Conflating with regression_check -- different detection method, different remediation
- No window_config reference -- detector has no baseline to compare against
- PSI on categorical features -- PSI assumes continuous; use JS or chi-square for categoricals
