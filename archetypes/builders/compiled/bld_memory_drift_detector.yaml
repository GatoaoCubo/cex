observation: Drift detectors with threshold=0 or 'low' string values produced alert storms. Detectors monitoring 'all features'
  generically missed actionable signals while firing on noise. Concrete feature lists with calibrated numeric thresholds produced
  useful alerts in 4/5 test deployments.
pattern: 'Named features + calibrated numeric threshold + suppression window.

  1. features_monitored: list specific dimension names, not "all"

  2. detection_method: match test to feature type (KS/PSI=continuous, chi-square/JS=categorical)

  3. threshold: always float, not string; calibrate against domain-specific baseline variance

  4. alert_rule.suppression_window: always set; 1-4h for operational detectors

  5. window_config: always declare reference source; rolling baseline > fixed for non-stationary environments'
evidence: '5 test deployments: 2 alert-storm failures (threshold misconfigured), 1 missed-signal failure (features: all),
  4/5 successes with named features + numeric thresholds.'
