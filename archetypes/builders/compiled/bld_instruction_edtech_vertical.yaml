phase_1_research:
- Identify FERPA and COPPA compliance requirements for student data handling.
- Analyze LMS integration standards (LTI 1.3, IMS Global).
- Map data privacy frameworks (GDPR, FERPA) to EdTech use cases.
- Survey common EdTech vertical use cases (e.g., adaptive learning, assessment tools).
- 'Document stakeholder needs: schools, parents, developers, regulators.'
- Evaluate existing LMS APIs for compatibility and security features.
phase_2_compose:
- Define artifact structure per bld_schema_edtech_vertical.md (focus_area, target_demographic, compliance fields).
- 'Write FERPA/COPPA compliance section: name records type, data minimization approach, and parental consent flow.'
- 'Draft LTI 1.3 integration specs: OAuth 2.0 + IMS Security Framework v1.0, resource links, tool configuration per Canvas/Moodle/Blackboard.'
- 'Outline student data privacy protocols: AES-256 encryption, pseudonymization approach, access control model.'
- Develop use case scenarios (e.g., secure grade sync via xAPI, COPPA-compliant onboarding for K-12).
- Reference bld_output_template_edtech_vertical.md for formatting (headers, tables, regulatory sections).
- Embed LTI code snippets (e.g., tool launch URL, placement options).
- Cross-reference schema elements with template placeholders.
- Finalize artifact with regulatory citations and LMS vendor examples.
phase_3_validate:
- '[ ] Verify FERPA data minimization: only collect student records necessary for stated purpose.'
- '[ ] Confirm COPPA parental consent mechanism is explicit for users under 13.'
- '[ ] Confirm LTI 1.3 OAuth 2.0 launch flow uses IMS Global Security Framework v1.0.'
- '[ ] Confirm 1EdTech xAPI or Caliper standard cited for learning analytics data.'
- '[ ] Verify district procurement path: state ed-tech approval list or ISTE certification noted.'
- '[ ] Confirm artifact adheres to bld_schema_edtech_vertical.md ID pattern and required fields.'
