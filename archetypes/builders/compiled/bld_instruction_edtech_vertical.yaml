phase_1_research:
- Identify FERPA and COPPA compliance requirements for student data handling.
- Analyze LMS integration standards (LTI 1.3, IMS Global).
- Map data privacy frameworks (GDPR, FERPA) to EdTech use cases.
- Survey common EdTech vertical use cases (e.g., adaptive learning, assessment tools).
- 'Document stakeholder needs: schools, parents, developers, regulators.'
- Evaluate existing LMS APIs for compatibility and security features.
phase_2_compose:
- 'Define artifact structure per SCHEMA.md (sections: compliance, integration, privacy).'
- Write FERPA/COPPA compliance section with data minimization examples.
- Draft LTI integration specs (OAuth 2.0, resource links, tool configuration).
- Outline student data privacy protocols (encryption, access controls).
- Develop use case scenarios (e.g., secure grade sync, third-party tool access).
- Reference OUTPUT_TEMPLATE.md for formatting (headers, bullet points, code blocks).
- Embed LTI code snippets (e.g., tool launch URL, placement options).
- Cross-reference schema elements with template placeholders.
- Finalize artifact with regulatory citations and LMS vendor examples.
phase_3_validate:
- '[ ] ✅ Verify FERPA/COPPA alignment with regulatory text.'
- '[ ] ✅ Confirm LTI integration matches IMS Global specifications.'
- '[ ] ✅ Ensure data privacy protocols address encryption and access logs.'
- '[ ] ✅ Validate use cases against real-world EdTech deployment scenarios.'
- '[ ] ✅ Check markdown syntax and template structure consistency.'
