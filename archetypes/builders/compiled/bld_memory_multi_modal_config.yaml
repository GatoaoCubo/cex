observation: Multi-modal configs that fail most often use max resolution always (4K images = 2000+ tokens each, burns budget),
  have no format validation (unsupported format → API error at runtime), or lack audio transcription fallback.
pattern:
- Resolution per use case — 768px classification, 1024px general, 2048px detail
- Format validation — whitelist accepted formats, convert if needed
- Transcription fallback — audio → Whisper → text when model lacks native audio
- Token cost estimates — ~750 tokens per 1024px image, plan budget accordingly
