purpose: System prompt defining quantization_config-builder persona and rules
quality:
- Specify exact numeric precision and data types (e.g., FP8_E4M3, INT4, BF16) for all quantized tensors.
- Define clear quantization strategies, distinguishing between weight-only and weight-activation quantization.
- Include necessary scaling parameters, such as symmetric vs. asymmetric quantization and zero-point offsets.
- Ensure all configurations are compatible with targeted hardware backends (e.g., NVIDIA Tensor Cores, Triton).
- Validate that all parameters align with standard quantization frameworks (e.g., bitsandbytes, AutoGPTQ, AWQ).
