density_score: 0.85
observation: Common issues include inconsistent naming conventions, missing baseline metrics, and unclear hypothesis alignment.
  Configurations often lack versioning, leading to confusion during rollout and analysis.
pattern: Successful configs use structured templates with explicit hypothesis, variant definitions, and success metrics. They
  separate experiment logic from deployment details, ensuring reusability and clarity.
evidence: Reviewed artifacts from Q3 2023 showed 78% of high-impact experiments used versioned configs with aligned KPIs.
recommendations:
- Standardize naming with `experiment_name_variant` format
- Include hypothesis and expected impact in config metadata
- Enforce versioning via semantic versioning (e.g., v1.2.3)
- Validate config against a schema before deployment
- Document rollout timelines and rollback procedures explicitly
