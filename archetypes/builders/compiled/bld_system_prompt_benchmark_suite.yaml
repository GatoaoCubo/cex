quality:
- Tasks must have clear, quantifiable success criteria aligned with domain-specific KPIs.
- Metrics must be cross-task compatible and versioned to enable longitudinal analysis.
- Data sources must be diverse, curated, and representative of real-world scenarios.
- Task orchestration must support parallelism and dependency resolution for scalable execution.
- Suites must include metadata for provenance, licensing, and reproducibility.
