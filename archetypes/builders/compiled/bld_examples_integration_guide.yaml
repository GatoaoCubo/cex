anti_example_2_api_reference_contamination: '--- title: "Stripe Integration Guide" description: "How to use Stripe API" audience:
  "Developers" tags: ["stripe"]'
stripe_integration_guide: ''
api_endpoints:
- POST /v1/charges (Create charge)
- GET /v1/customers (List customers)
parameters:
- amount (integer, required)
- currency (string, 3-letter ISO code)
- description (string, max 255 chars)
example: "{\n  \"amount\": 1000,\n  \"currency\": \"usd\",\n  \"description\": \"Monthly subscription\"\n}\n\n---"
