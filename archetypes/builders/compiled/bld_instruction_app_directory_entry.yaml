phase_1_research:
- Identify app’s core value proposition and target audience.
- Analyze competitors’ directory entries for tagline structure.
- Collect 3–5 high-res screenshots (UI/UX flow, key features).
- Document install steps (platform-specific, 2–4 concise bullet points).
- Verify demo link accessibility and compliance with free-tier terms.
- Confirm legal requirements (privacy policy, licensing).
phase_2_compose:
- Use SCHEMA.md to define metadata fields (name, category, tags).
- Write tagline (max 25 chars, action-oriented, no jargon).
- 'Insert screenshots in ORDER: splash screen, feature highlight, UI demo.'
- Format install steps as numbered list (e.g., “Download from App Store”).
- Embed demo link (HTTPS, no external redirects).
- 'Add metadata: version, OS compatibility, app size.'
- Apply OUTPUT_TEMPLATE.md structure (header, body, footer sections).
- Replace placeholders with validated content.
- Proofread for typos, schema alignment, and free-tier eligibility.
phase_3_validate: '[ ] ✅ Check schema compliance (all required fields present). [ ] ✅ Verify screenshot resolution (≥1024x768px,
  no watermarks). [ ] ✅ Confirm install steps match app’s actual workflow. [ ] ✅ Test demo link (loads in browser, no 404
  errors). [ ] ✅ Ensure tagline adheres to 25-char limit and tone guidelines.'
