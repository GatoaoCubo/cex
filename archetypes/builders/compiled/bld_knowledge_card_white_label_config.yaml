domain_overview: White-label configurations enable SaaS providers to deliver customizable, rebrandable deployments for resellers
  or enterprise clients. These configurations typically isolate branding, UI/UX, and API integrations from core product logic,
  allowing resellers to embed the service into their own ecosystems without exposing underlying infrastructure. Key focus
  areas include dynamic theming, API endpoint customization, and secure credential management. Unlike brand_config (identity-related
  settings) or env_config (runtime parameters), white_label_config prioritizes reseller-specific overrides while maintaining
  product integrity. The domain intersects with multi-tenancy, API management, and software composition, requiring robust
  abstractions to balance flexibility with security. Industry adoption spans platforms like CRM, e-commerce, and analytics
  tools, where resellers demand tailored deployments without compromising upstream functionality.
key_concepts: "| Concept                        | Definition                                                             \
  \    | Source                              |  \n|------------------------------|----------------------------------------------------------------------------|-------------------------------------|\
  \  \n| Customizable UI Components   | Modular UI elements allowing reseller branding overrides                   | W3C UI\
  \ Accessibility Guidelines     |  \n| Branding Assets              | Logos, color schemes, and typography managed externally\
  \                   | ISO 20252:2019 (Brand Management)   |  \n| API Keys                     | Reseller-specific credentials\
  \ for external system integration             | OAuth 2.0 (RFC 6749)                |  \n| Configuration Templates     \
  \ | Predefined YAML/JSON structures for reseller overrides                    | OpenAPI Specification (RFC 7807)    |  \n\
  | Runtime Environment Isolation| Isolation of reseller-specific settings from core application logic       | RFC 7231 (HTTP/1.1)\
  \                 |  \n| Brand-Specific Routing       | Custom URL paths or subdomains for reseller deployments        \
  \           | RFC 7285 (HTTP/2)                   |  \n| Secure Configuration Storage | Encrypted storage of reseller secrets\
  \ and overrides                       | NIST SP 800-57 (Key Management)     |  \n| Configuration Validation     | Schema-based\
  \ checks for reseller input integrity                          | JSON Schema (RFC 7396)              |  \n| Multi-Tenant\
  \ Configuration   | Shared infrastructure with reseller-specific configuration layers         | ISO/IEC 2382-1:2011 (Software\
  \ Terms)|  \n| Brand-Specific Analytics     | Reseller-specific tracking IDs and data export rules                     \
  \ | GA4 (Google Analytics 4)            |  \n| Legal Compliance Flags       | Toggleable settings for GDPR, CCPA, or regional\
  \ regulations               | IETF RFC 7991 (Data Privacy)        |  \n| Reseller-Specific Quotas     | Custom rate limits\
  \ or resource allocations per reseller                   | RFC 7523 (OAuth 2.0 Token Introspection)|"
industry_standards:
- OAuth 2.0 (RFC 6749)
- OpenAPI Specification (RFC 7807)
- ISO/IEC 2382-1:2011 (Software Terminology)
- NIST SP 800-57 (Key Management)
- GDPR (EU Regulation 2016/679)
- RFC 7231 (HTTP/1.1)
- JSON Schema (RFC 7396)
- ISO 20252:2019 (Brand Management)
common_patterns:
- Configuration as Code -- Store white-label settings in versioned YAML files.
- Modular UI Frameworks -- CSS variable injection via theming API for runtime branding.
- Abstraction Layers -- Isolate reseller logic from core application code.
- Stripe Connect sub-accounts -- Platform fee model with connected account payouts.
- Policy-Driven Validation -- Enforce schema rules for reseller input consistency.
- Custom domain provisioning -- Automated CNAME + SSL cert issuance per reseller.
- OEM licensing tiers -- Wholesale price + margin floor + retail pricing freedom for reseller.
stripe_connect_sub_account_model: "White-label platforms commonly use Stripe Connect to manage reseller billing:  \n- Platform\
  \ account: owns product, sets pricing floors, collects platform fees (1-3% typical).  \n- Connected (sub) account: reseller's\
  \ Stripe account, receives payouts minus platform fee.  \n- Charge types: Direct charges (reseller controls UX), Destination\
  \ charges (platform controls UX), Separate charges + transfers (split billing).  \n- OEM licensing model: platform licenses\
  \ product to reseller at wholesale price; reseller sets retail price. Margin = retail - wholesale - platform fee.  \n- Config\
  \ artifact must specify: `stripe_connect_type`, `platform_fee_percent`, `reseller_margin_floor`, `payout_schedule`."
branding_components_must_configure_in_every_white_label_config: "| Component | Config Key | Notes |  \n|-----------|------------|-------|\
  \  \n| Custom domain | `custom_domain` | e.g., app.reseller.com -- requires DNS CNAME |  \n| Branded email sender | `email_from_domain`\
  \ | e.g., noreply@reseller.com -- requires SPF/DKIM |  \n| Logo (header) | `logo_url` | PNG/SVG, min 200x50px |  \n| Favicon\
  \ | `favicon_url` | ICO/PNG 32x32 |  \n| Primary color | `brand_color_primary` | HEX, used in buttons/links |  \n| Co-branded\
  \ footer | `cobrand_text` | \"Powered by [Platform]\" or fully white-labeled |  \n| Theming API | `theme_api_enabled` |\
  \ Exposes CSS variable overrides to reseller |"
pitfalls:
- Hardcoding Branding -- Embedding reseller-specific data directly into core code.
- Insecure Credential Handling -- Storing Stripe Connect keys or API tokens in plaintext config.
- Missing reseller margin floor -- Allowing resellers to price below cost, eroding platform revenue.
- Single custom domain -- Not supporting multiple domains per reseller (multi-brand accounts).
- No theming API versioning -- CSS variable changes breaking existing reseller themes on deploy.
