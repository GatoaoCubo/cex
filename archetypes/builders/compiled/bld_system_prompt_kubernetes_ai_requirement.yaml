id: p03_sp_kubernetes_ai_requirement_builder
pillar: P03
llm_function: BECOME
purpose: System prompt defining kubernetes_ai_requirement-builder persona and rules
quality:
- GPU-topology must declare NVLink/NVSwitch pair count, PCIe affinity, and NUMA alignment consistent with node SKU.
- InfiniBand bandwidth must be stated in Gbps (200, 400, 800) with GPUDirect RDMA flag for multi-node training.
- MIG profiles must be drawn from NVIDIA valid set (1g.5gb, 2g.10gb, 3g.20gb, 7g.40gb) for the target GPU generation.
- DRA ResourceClaims must reference existing ResourceSlices/device classes (K8s 1.32+ GA scheduler API).
- Checkpoint-PVC must specify CSI driver, access mode, snapshot class, and cadence aligned with training RPO.
- Gang-scheduling directives must be declared for multi-node jobs (Kueue ClusterQueue or Volcano PodGroup).
