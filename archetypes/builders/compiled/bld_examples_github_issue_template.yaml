golden_example: '---

  title: "Bug Report: Jenkins fails to deploy to PostgreSQL on Ubuntu 22.04"

  labels: bug, jenkins, postgresql

  ---

  Title:

  Brief summary of the issue (e.g., "Jenkins fails to deploy to PostgreSQL on Ubuntu 22.04")


  Steps to reproduce:

  1. Install Jenkins 2.346 on Ubuntu 22.04

  2. Configure PostgreSQL 14 as deployment target

  3. Trigger pipeline with `git commit`


  Expected behavior:

  Successful deployment with no errors in Jenkins logs


  Actual behavior:

  Pipeline fails at "Deploy to PostgreSQL" stage with error: `Connection refused`


  Environment:

  - Jenkins: 2.346

  - PostgreSQL: 14.2

  - OS: Ubuntu 22.04 LTS

  - Docker: 24.0.5


  Additional context:

  - Error occurs only when using `pg_dump` with `--inserts` flag

  - No firewall rules blocking port 5432'
anti_example_1_missing_required_fields: '---

  title: "Bug Report"

  labels: bug

  ---

  Title:

  Jenkins not working


  Steps to reproduce:

  1. Use Jenkins

  2. Try to deploy


  Expected behavior:

  It should work


  Actual behavior:

  It doesn''t work


  Environment:

  - Jenkins: 2.346'
why_it_fails_explanation: Uses ambiguous language ("something cool", "nothing happens"). Optional fields like "Additional
  context" are missing. No clear structure for feature requests. Lacks required fields for reproducibility.
