observation: Pitch decks often overcomplicate slides with excessive text or fail to clearly link problem/solution to traction.
  Overemphasis on product features rather than customer pain points reduces impact.
pattern: Strong decks use concise, visual storytelling to align problem/solution with traction metrics. Each slide focuses
  on a single idea, supported by data or customer quotes.
evidence: Reviewed decks with problem-solution alignment and traction metrics (e.g., user growth, revenue) saw 30% higher
  engagement in pitch reviews.
recommendations:
- Lead with the problem, not the solution, to hook the audience.
- Use visuals (charts, icons) to simplify complex data on traction slides.
- Keep slides under 5 bullet points; avoid dense paragraphs.
- Tie the ask directly to traction (e.g., "We need $X to scale to 1M users").
- Test slides with non-experts to ensure clarity and focus.
