phase_1_research: "1. Identify the agent type and primary use case (customer support, research, coding, etc.).\n2. Determine\
  \ which memory layers are required: working (always), episodic (if multi-session),\n   semantic (if fact-heavy), procedural\
  \ (if skill-driven).\n3. Map the agent's target commercial tier (free/pro/enterprise) against the tier matrix\n   in bld_knowledge_card_memory_architecture.md.\n\
  4. Review reference architectures: MemGPT/Letta for hierarchical design, Zep for\n   temporal graphs, mem0 for selective\
  \ extraction, Cognee for knowledge graphs.\n5. Identify storage constraints: vector DB provider, graph DB availability,\
  \ KV store limits.\n6. Check bld_schema_memory_architecture.md for required frontmatter and body structure."
phase_2_compose:
- 'Write frontmatter per bld_schema_memory_architecture.md (all required fields, quality: null).'
- 'Write Overview section: agent type, memory goals, which layers are active and why.'
- 'Write Memory Layer Definitions table:'
- 'Columns: Layer | Backend | Retention | Tier Required | Notes'
- Row per active layer with concrete backend (e.g., "pgvector", "Neo4j", "Redis").
- 'Write Storage Backends section: one subsection per active layer with backend config.'
- 'Write Read Pipeline: step-by-step retrieval flow from query to context injection.'
- 'Write Write Pipeline: step-by-step extraction/classification/storage after generation.'
- 'Write Eviction Policy: per-layer strategy (LRU, LFU, TTL, importance score).'
- 'Write Commercial Tier Matrix: FREE vs. PRO vs. ENTERPRISE feature differences.'
- 'Write Integration Points: cross-reference consolidation_policy and procedural_memory kinds.'
phase_3_validate:
- '[ ] Schema compliance: all required frontmatter fields present, ID matches pattern.'
- '[ ] Domain accuracy: all content describes LLM agent memory, not hardware memory.'
- '[ ] Layer completeness: working layer present; other layers justified or excluded.'
- '[ ] Tier matrix present: FREE/PRO/ENTERPRISE differentiation explicit.'
- '[ ] Industry references: at least one system cited (MemGPT, Zep, mem0, Cognee, LangMem).'
- '[ ] Eviction policy specified: no layer left with unbounded retention.'
- '[ ] quality: null in frontmatter (never self-score).'
- '[ ] No Unicode characters in body (ASCII only per ascii-code-rule.md).'
