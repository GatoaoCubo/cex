tldr: Build a complete agent_card covering role, model, MCPs, boot sequence, constraints, dispatch rules, and scaling.
density_score: 0.91
context: 'The agent-card-builder produces `agent_card` artifacts — complete architectural

  specifications for an autonomous agent agent_node. A agent_card defines everything needed

  to instantiate, operate, and monitor a agent_node: its role, model, MCP servers, boot sequence,

  constraints, dispatch rules, and scaling configuration.

  Input contract:

  - `{{agent_node_name}}`: kebab-case identifier (e.g. `research-sat`, `build-sat`)

  - `{{domain}}`: primary operational domain (e.g. `web_research`, `code_generation`)

  - `{{model}}`: LLM model identifier (e.g. `claude-opus-4`, `claude-sonnet-4`)

  - `{{tools_list}}`: comma-separated list of MCP servers or built-in tools

  - `{{constraints_raw}}`: free-text description of operational boundaries

  Output contract: A single `agent_card` YAML file with 24+ frontmatter fields,

  a narrative identity section, and structured subsections for boot sequence, dispatch rules,

  constraints, and monitoring.

  Boundaries:

  - Handles full agent_node architecture only.

  - Individual agent identity belongs in a separate agent artifact.

  - Per-provider boot configuration belongs in a boot_config artifact.

  - Reusable operation patterns belong in pattern artifacts.'
phases: ''
phase_1_analyze_role_and_boundary: "Primary action: Define the agent_node's operational role and establish what it does\n\
  versus what it explicitly does not do.\nINPUT: agent_node_name, domain, constraints_raw\n1. Express the agent_node's single\
  \ primary function:\n   role_statement = \"{{agent_node_name}} is responsible for [ONE THING]\"\n   Reject vague roles like\
  \ \"general purpose\" or \"multi-domain\"\n2. Map the NOT-domain boundary:\n   for each adjacent domain in [research, build,\
  \ execute, monitor, orchestrate, store]:\n     if domain != agent_node's primary domain:\n       add to NOT_HANDLES list\
  \ with brief reason\n   Minimum 2 entries required.\n3. Determine LLM function type:\n   if agent_node makes decisions \
  \    -> BECOME\n   if agent_node calls external tools -> CALL\n   if agent_node coordinates others  -> COLLABORATE\n   if\
  \ agent_node injects context     -> INJECT\n4. Extract capability_keywords (5-10 terms) from domain description.\nOUTPUT:\
  \ role_statement, not_handles[], llm_function, capability_keywords[]\nVerification: `role_statement` is one sentence. `not_handles`\
  \ has >= 2 entries."
phase_2_specify_model_and_tools: "Primary action: Select and document the model configuration and MCP server bindings.\nINPUT:\
  \ model, tools_list, role_statement\n1. Model specification:\n   model_config = {\n     id: {{model}},\n     context_window:\
  \ lookup by family (opus=200k, sonnet=200k, haiku=200k),\n     temperature: 0.3 for deterministic tasks | 0.7 for creative\
  \ tasks,\n     max_tokens: sized to expected output\n   }\n2. MCP server binding for each tool in tools_list:\n   mcp_entry\
  \ = {\n     name: tool_name,\n     transport: \"stdio\" | \"http\",\n     required: true | false,\n     fallback: null |\
  \ alternative_tool\n   }\n3. Boot sequence (ordered list):\n   boot_steps = [\n     \"load system prompt\",\n     \"initialize\
  \ MCP connections\",\n     \"verify tool availability\",\n     \"load domain context\",\n     \"ready\"\n   ]\n   Add agent-cardific\
  \ steps between generic ones.\n   Assign estimated duration in seconds to each step.\n4. boot_time_seconds = sum(step durations)\n\
  OUTPUT: model_config{}, mcp_bindings[], boot_sequence[], boot_time_seconds\nVerification: each MCP entry has `transport`\
  \ and `required` fields.\n`boot_sequence` has >= 4 steps."
phase_3_define_dispatch_and_constraints: "Primary action: Specify how the agent_node receives work, what it accepts or rejects,\n\
  and its operational limits.\nINPUT: constraints_raw, capability_keywords[], role_statement\n1. Dispatch rules:\n   dispatch\
  \ = {\n     triggers: [keywords that route tasks here],  # >= 3 required\n     input_format: \"handoff_file\" | \"inline_prompt\"\
  \ | \"both\",\n     max_prompt_chars: 200 if inline else null,\n     priority: \"normal\" | \"high\" | \"low\"\n   }\n2.\
  \ Constraint extraction from constraints_raw:\n   hard_constraints = []   # things the agent_node MUST NEVER do\n   soft_constraints\
  \ = []   # things the agent_node SHOULD prefer\n   for each sentence in constraints_raw:\n     if NEVER/MUST NOT/FORBIDDEN\
  \ -> hard_constraint\n     if PREFER/AVOID/MINIMIZE    -> soft_constraint\n3. Scaling configuration:\n   scaling = {\n \
  \    max_parallel_instances: 1 | 2 | 3,\n     shared_resources: [resources that conflict if parallel],\n     cooldown_seconds:\
  \ wait time between sequential runs\n   }\n4. Monitoring spec:\n   monitoring = {\n     signal_on_complete: true,\n    \
  \ signal_on_error: true,\n     heartbeat_interval_seconds: null | integer,\n     log_level: \"info\" | \"debug\" | \"error\"\
  \n   }\nOUTPUT: dispatch{}, hard_constraints[], soft_constraints[], scaling{}, monitoring{}\nVerification: `dispatch.triggers`\
  \ has >= 3 keywords. `hard_constraints` is non-empty."
phase_4_assemble_and_validate_artifact: 'Primary action: Combine all phase outputs into the final agent_card YAML and run
  quality gates.'
