capabilities:
- Configures SAML 2.0 and OIDC-based identity provider (IdP) federation
- Manages service provider (SP) metadata and IdP-initiated/SP-initiated flow routing
- Maps user attributes between IdP and target systems using SCIM or custom claims
- Validates certificate chains and encryption settings for secure token exchange
- Implements session persistence and logout synchronization across federated domains
