domain_overview: Customer segmentation defines distinct groups of organizations or individuals sharing firmographic traits
  (e.g., industry, size, revenue) and unmet needs. In B2B contexts, this informs Ideal Customer Profile (ICP) development,
  aligning product/service offerings with market demand. Segmentation leverages data from CRM systems, market research, and
  financial benchmarks to prioritize high-value targets. Key frameworks like the Boston Matrix and TAM/SAM/SOM models guide
  segmentation by evaluating market potential and fit. Effective segments balance specificity (to target resources) and scalability
  (to ensure growth opportunities).
key_concepts: "| Concept               | Definition                                                                 | Source\
  \                                  |  \n|-----------------------|----------------------------------------------------------------------------|-----------------------------------------|\
  \  \n| Firmographics       | Organizational attributes (industry, revenue, location) used for segmentation | Dun & Bradstreet\
  \                        |  \n| Needs Analysis        | Identification of pain points and unmet requirements           \
  \             | Kano Model (Journal of Quality         |  \n| ICP Definition        | Profile of the most valuable customer\
  \ type based on fit and potential       | HubSpot’s ICP Framework                 |  \n| CLTV (Customer Lifetime Value)\
  \ | Predicted revenue from a customer over their lifecycle                    | Harvard Business Review (2018)        |\
  \  \n| CAC (Customer Acquisition Cost) | Cost to acquire a new customer                                           | Gartner\
  \ (2020)                          |  \n| TAM/SAM/SOM           | Total Addressable Market, Serviceable Available Market,\
  \ Serviceable Obtainable Market | CB Insights (2021)                      |  \n| Boston Matrix         | Segments markets\
  \ by growth and share to prioritize investment              | Boston Consulting Group (1970)         |  \n| RFM Model  \
  \           | Recency, Frequency, Monetary value for behavioral segmentation             | Marketing Science Institute (1990)\
  \      |"
industry_standards:
- Customer Segmentation Standard (DMA 0023)
- RFM Model (Marketing Science Institute)
- Kano Model (Journal of the Japanese Society for Quality Management)
- TAM/SAM/SOM Framework (CB Insights)
- CLTV/CAC Metrics (Harvard Business Review, Gartner)
common_patterns:
- Use firmographics (industry, revenue) to filter ICP candidates.
- Align needs with product capabilities via value proposition mapping.
- Prioritize segments with high CLTV and low CAC.
- Integrate TAM/SAM/SOM to validate market scalability.
- Apply RFM scoring for behavioral segmentation in B2C.
pitfalls:
- Conflating ICP with persona (overemphasizing individual traits vs. organizational fit).
- Using outdated or unverified data sources (e.g., legacy CRM without cleaning).
- Ignoring behavioral data in favor of static firmographics.
- Over-segmenting, leading to fragmented resource allocation.
- Failing to align segments with business goals (e.g., growth vs. retention).
