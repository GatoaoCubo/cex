tldr: Build a director spawn_config YAML with CLI flags, MCP profile, timeout policy, and prompt sizing for solo/grid/continuous
  modes.
density_score: 0.92
context: 'The spawn-config-builder produces a `spawn_config` artifact — a structured YAML that defines exactly how a director
  process is launched. Downstream orchestration scripts consume this artifact to spawn terminals with the correct flags, model,
  MCP profile, timeout, and prompt strategy.

  Input contract:

  - `director`: string — canonical director name (e.g. `builder_agent`, `research_agent`, `marketing_agent`)

  - `mode`: enum — `solo` | `grid` | `continuous`

  - `model`: string — LLM model identifier (e.g. `claude-opus-4-6`, `claude-sonnet`)

  - `task_description`: string — what the director must accomplish (used to size the prompt)

  - `handoff_file`: string or null — relative path to handoff `.md` file if task exceeds 200 chars

  - `mcp_profile`: string or null — path to `.mcp-{sat}.json` if director requires MCP tools

  - `timeout_ms`: integer or null — override default timeout (default: 120000 for solo, 300000 for grid/continuous)

  Output contract: a single `spawn_config` YAML block with 19 required fields, ready to be written to `records/spawn_configs/{director}_{mode}.yaml`.

  Variables used throughout:

  - `{{director}}` — uppercased director name

  - `{{mode}}` — spawn mode

  - `{{model}}` — model identifier

  - `{{inline_prompt}}` — prompt string <= 200 chars

  - `{{handoff_path}}` — relative path to handoff file

  - `{{mcp_path}}` — path to MCP config file'
phases: ''
phase_1_analyze_requirements: "Action: Parse all inputs and determine prompt strategy.\nIF len(task_description) <= 200:\n\
  \    prompt_strategy = \"inline\"\n    inline_prompt = task_description\n    handoff_path = null\nELSE:\n    prompt_strategy\
  \ = \"handoff\"\n    inline_prompt = \"Read handoff file and execute: \" + handoff_file\n    handoff_path = handoff_file\n\
  \    ASSERT len(inline_prompt) <= 200\nAlso determine:\n- `interactive_mode`: always `true` for grid/continuous; `true`\
  \ for solo unless explicitly headless\n- `timeout_ms`: use provided value, else apply defaults (solo=120000, grid=300000,\
  \ continuous=600000)\n- `mcp_required`: `true` if `mcp_profile` is not null\nVerifiable exit: prompt_strategy is set; inline_prompt\
  \ length <= 200; timeout_ms is an integer."
phase_2_resolve_cli_flags: "Action: Build the ordered CLI flags list for the director launch command.\nflags = [\"--dangerously-skip-permissions\"\
  , \"--no-chrome\"]\nIF prompt_strategy == \"handoff\":\n    flags.append(\"-p\")   # non-interactive dispatch skips workspace\
  \ trust prompt\nIF mcp_required:\n    flags.append(\"--mcp-config \" + mcp_path)\n    flags.append(\"--strict-mcp-config\"\
  )\nIF model is not null:\n    flags.append(\"--model \" + model)\nRules:\n- `-p` flag is MANDATORY when using handoff files\
  \ (prevents workspace trust hang)\n- `--mcp-config` MUST use a relative path, never absolute (avoids PS->cmd chain hang)\n\
  - `--no-chrome` is always present; browser access requires separate boot script\nVerifiable exit: flags list contains `--dangerously-skip-permissions`;\
  \ `-p` present iff prompt_strategy == \"handoff\"."
phase_3_compose_spawn_config_yaml: 'Action: Assemble all resolved values into the 19-field YAML structure.

  Required fields in order:

  1. `id` — `spawn_{director}_{mode}`

  2. `kind` — `spawn_config`

  3. `pillar` — `P12`

  4. `version` — `1.0.0`

  5. `director` — `{{director}}`

  6. `mode` — `{{mode}}`

  7. `model` — `{{model}}`

  8. `prompt_strategy` — `inline` or `handoff`

  9. `inline_prompt` — `{{inline_prompt}}`

  10. `handoff_path` — `{{handoff_path}}` or `null`

  11. `cli_flags` — list from Phase 2

  12. `mcp_profile` — `{{mcp_path}}` or `null`

  13. `interactive` — boolean

  14. `timeout_ms` — integer

  15. `spawn_delay_ms` — `5000` (always; prevents terminal race conditions)

  16. `retry_on_failure` — `true`

  17. `max_retries` — `2`

  18. `log_output` — `true`

  19. `created` — ISO date string

  Verifiable exit: YAML parses cleanly; all 19 fields present; no null for required non-nullable fields.'
phase_4_validate_against_quality_gates: "Action: Run the 8 HARD gates before emitting output.\nHARD gates (all must pass):\n\
  \  H1: director name is non-empty and matches known director list\n  H2: mode is one of [solo, grid, continuous]\n  H3:\
  \ inline_prompt length <= 200 characters\n  H4: cli_flags contains \"--dangerously-skip-permissions\"\n  H5: if prompt_strategy\
  \ == \"handoff\", cli_flags contains \"-p\"\n  H6: timeout_ms is a positive integer\n  H7: spawn_delay_ms == 5000\n  H8:\
  \ all 19 YAML fields are present\nSOFT gates (log warnings, do not block):\n  S1: model field matches a known model identifier\n\
  \  S2: handoff_path points to an existing file (if not null)\n  S3: mcp_profile path ends in .json (if not null)\n  S4:\
  \ retry config is reasonable (max_retries <= 5)\nIf any HARD gate fails: fix the violation and re-validate. Do not emit\
  \ until all HARD gates pass.\nVerifiable exit: checklist shows 8/8 HARD pass."
output_contract: ''
