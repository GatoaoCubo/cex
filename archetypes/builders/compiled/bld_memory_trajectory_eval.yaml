observation: Common issues include inconsistent data formatting between simulation and real-world logs, and unclear definitions
  of success/failure thresholds. Overlooking edge cases (e.g., partial task completion) often leads to incomplete evaluation
  coverage.
pattern: Modular evaluation pipelines with decoupled metric calculators and scenario-specific configuration files improve
  reusability. Prioritizing traceability between agent decisions and evaluation outcomes enhances interpretability.
evidence: Reviewed artifacts showed that modular designs (e.g., `trajectory_eval-builder-v2`) reduced integration errors by
  30% compared to monolithic implementations.
recommendations:
- Standardize trajectory data formats (e.g., JSON with timestamped state-action pairs).
- Use version-controlled configuration files for metric thresholds and scenario parameters.
- Implement automated checks for edge cases (e.g., partial task completion).
- Document evaluation assumptions explicitly in artifact metadata.
- Align metric definitions with task-specific success criteria (e.g., safety, efficiency).
