golden_example_1_e2b_cloud_sandbox_ai_code_execution: "---\nid: p09_sb_ai_code_runner\nkind: sandbox_config\npillar: P09\n\
  title: \"AI Code Runner -- E2B Firecracker Sandbox\"\nversion: \"1.0.0\"\nplatform: e2b\nsandbox_type: isolated\n---\n\n\
  resource_limits:\n  cpu: 1            # 1 vCPU (Firecracker KVM)\n  memory_mb: 512    # 512 MB RAM; OOM kills on exceed\n\
  \  disk_mb: 1024     # 1 GB ephemeral scratch\n  timeout_seconds: 30  # wall-clock; SIGKILL on exceed\n  max_pids: 50\n\n\
  network:\n  mode: none         # air-gapped; no internet access\n  egress: none\n  allowed_hosts: []\n  dns: false\n\nfilesystem:\n\
  \  root: /tmp/sandbox\n  read_only_root: true\n  scratch_dir: /tmp\n  scratch_size_mb: 512\n  mounts: []\n\nisolation:\n\
  \  runtime: firecracker\n  namespaces: [pid, net, mnt, uts, ipc, user]\n  seccomp_profile: default\n  capabilities:\n  \
  \  drop: [ALL]\n    add: []\n  no_new_privs: true\n\naudit:\n  syscall_logging: true\n  log_destination: /var/log/sandbox/\n\
  \  log_retention_days: 7\n\nWhy it passes: CPU+RAM+disk+timeout all defined. Air-gapped network. Read-only root + ephemeral\n\
  scratch. Firecracker microVM provides VM-level isolation. All capabilities dropped. Seccomp enabled.\n\n---"
golden_example_2_docker_gvisor_sandbox_untrusted_code: "---\nid: p09_sb_untrusted_exec\nkind: sandbox_config\npillar: P09\n\
  title: \"Untrusted Code Execution -- Docker + gVisor\"\nplatform: gvisor\nsandbox_type: isolated\n---\n\nresource_limits:\n\
  \  cpu: 0.5\n  memory_mb: 256\n  disk_mb: 512\n  timeout_seconds: 15\n\nnetwork:\n  mode: bridge\n  egress: whitelist\n\
  \  allowed_hosts: [api.example.com]\n  allowed_ports: [443]\n\nfilesystem:\n  read_only_root: true\n  scratch_dir: /tmp\n\
  \  scratch_size_mb: 256\n\nisolation:\n  runtime: runsc        # gVisor user-space kernel\n  seccomp_profile: default\n\
  \  apparmor_profile: docker-default\n  capabilities:\n    drop: [ALL]\n    add: [NET_BIND_SERVICE]\n  no_new_privs: true\n\
  \nWhy it passes: gVisor intercepts all syscalls via user-space kernel (strongest isolation).\nEgress whitelist restricts\
  \ outbound. Timeout enforced. All caps dropped.\n\n---"
anti_example_1_missing_timeout_open_network: "---\nid: p09_sb_broken\nkind: sandbox_config\nplatform: docker\n---\n\nresource_limits:\n\
  \  cpu: 4\n  memory_mb: 4096\n  # MISSING: timeout_seconds -- sandbox can hang indefinitely\n\nnetwork:\n  mode: host  \
  \  # FAIL: shares host network namespace\n  egress: all   # FAIL: unrestricted outbound (data exfiltration risk)\n\nfilesystem:\n\
  \  root: /home/user    # FAIL: writable host home directory\n  read_only_root: false\n\nisolation:\n  capabilities:\n  \
  \  drop: []   # FAIL: all caps retained (privilege escalation)\n\nWhy it fails: H04 FAIL (missing timeout). H05 FAIL (network\
  \ unrestricted). H06 FAIL\n(writable root filesystem). H07 FAIL (no seccomp, no MAC). Resource limits too large.\n\n---"
anti_example_2_nsjail_without_seccomp_incomplete_isolation: "---\nid: p09_sb_incomplete_nsjail\nkind: sandbox_config\nplatform:\
  \ nsjail\n---\n\nresource_limits:\n  cpu: 1\n  memory_mb: 128\n  timeout_seconds: 10\n\nnetwork:\n  mode: none\n\nfilesystem:\n\
  \  read_only_root: true\n  scratch_dir: /tmp\n\nisolation:\n  runtime: nsjail\n  seccomp_profile: none   # FAIL: no syscall\
  \ filtering; kernel attack surface exposed\n  capabilities:\n    drop: [ALL]\n\nWhy it fails: H07 FAIL -- nsjail without\
  \ seccomp leaves full kernel syscall surface exposed.\nEven with namespace isolation, unprivileged syscalls can exploit\
  \ kernel vulnerabilities.\nFix: add `seccomp_profile: default` or custom nsjail `seccomp_string` policy."
