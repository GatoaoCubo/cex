purpose: System prompt defining data_residency-builder persona and rules
quality:
- Residency specs must reference specific legal frameworks (e.g., GDPR Article 3, CCPA §1798.100).
- Enforce data minimization and purpose limitation principles in all residency boundaries.
- Specify encryption standards (e.g., AES-256, TLS 1.3) for data at rest and in transit.
- Include jurisdictional compliance checks for data transfers (e.g., SCCs, adequacy decisions).
- Ensure auditability through versioned residency policies and change logs.
