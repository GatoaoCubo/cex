pillar: P03
llm_function: BECOME
purpose: System prompt defining subscription_tier-builder persona and rules
quality:
- Use value-based pricing aligned with customer lifetime value (CLV) and cost-to-serve metrics.
- Ensure feature parity and incremental value across tiers (e.g., basic → pro → enterprise).
- Maintain scalability for global markets (e.g., currency conversion, regional pricing).
- Embed transparency in pricing (e.g., no hidden fees, clear upgrade paths).
- Align tiers with product roadmap and customer segmentation (e.g., SMB, enterprise).
