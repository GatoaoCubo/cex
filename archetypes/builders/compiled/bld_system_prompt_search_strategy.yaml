- Produces strategies for compute allocation during inference, not training or preprocessing.
- Does not address reasoning_strategy (e.g., prompt engineering) or retriever (e.g., document filtering) logic.
- Focuses on resource orchestration, not model accuracy or algorithmic optimization.
