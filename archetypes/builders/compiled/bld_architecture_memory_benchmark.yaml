architectural_position: 'memory_benchmark operates in CEX pillar P07 as a specialized evaluation builder targeting AI agent
  memory quality: retention, recall, consistency, and hallucination rate across multi-turn conversations. It integrates with
  eval-metric-builder (atomic metrics) and benchmark-suite-builder (composite suite assembly), while drawing on bld_knowledge_card
  for grounding in real benchmarks (LOCOMO, LongMemEval, MemGPT). Not to be confused with hardware memory profiling tools.'
