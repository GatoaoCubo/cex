idempotent: true
atomic: false
rollback: Delete the produced format file. No LLM behavior changes until the format is injected into a prompt.
dependencies: []
logging: true
tldr: Design how the LLM structures its output — sections, fields, examples — and produce a response_format artifact ready
  for prompt injection.
density_score: 0.92
context: 'A response_format is a prompt-injected specification that tells the LLM how to structure its output. It is placed
  into the prompt (system or user turn) so the model sees the format during generation. It governs the shape of every response
  the agent produces for a given task. The LLM reads this artifact; the system does not execute it.

  Inputs

  | Field | Type | Description |

  |---|---|---|

  | `task` | string | What the LLM will do (e.g. `extract entities`, `summarize document`, `classify intent`) |

  | `format_type` | enum | `json` \| `yaml` \| `markdown` \| `csv` \| `plaintext` |

  | `injection_point` | enum | `system_prompt` \| `user_message` |

  | `sections` | list | Named output sections or fields the format must contain (ordered) |

  | `target_kind` | string | The artifact or task type this format serves (for discovery and routing) |

  Output

  A single `.md` file with YAML frontmatter (17 required fields) + 4 mandatory body sections: Format Overview, Sections, Example
  Output, Injection Instructions. The format specification must be written exactly as it will appear when injected into the
  prompt.

  Critical boundary

  - response_format = what the LLM sees during generation and uses to shape output (this builder)

  - validation_schema = what the system checks after generation (different builder)

  - parser = code that extracts structured data from LLM output (different builder)

  - formatter = code that converts one format to another (different builder)'
phases: ''
phase_1_research_output_structure_design: "Determine the exact structure the LLM must produce and how it will be consumed.\n\
  FOR each section in sections:\n  classify:\n    required:  LLM must always emit this section\n    optional:  LLM emits only\
  \ when relevant data is present\n    repeated:  LLM emits one instance per item (array/list pattern)\n  FOR json/yaml format:\n\
  \    field_name (snake_case), value_type, nullable (bool)\n  FOR markdown format:\n    heading_level (##, ###), content_type\
  \ (prose, list, table, code block)\n  FOR csv format:\n    column_name, data_type, column_order (integer)\n  FOR plaintext\
  \ format:\n    structural constraints described as prose rules\ninjection_point selection:\n  system_prompt:  format is\
  \ a standing instruction (best for consistent output shape across sessions)\n  user_message:   format is per-request (best\
  \ for task-specific variation)\nconsumption context:\n  WHO reads the output: human | parser | validation_schema | another\
  \ LLM\n  This affects how strict the format must be.\nCheck brain_query [IF MCP] for existing response_formats in same domain\
  \ to avoid duplicates.\nDeliverable: ordered section list with types, optionality, and injection strategy."
phase_2_classify_boundary_check: "Confirm the artifact belongs to `response_format` and not a sibling kind.\nIF caller wants\
  \ code that parses the LLM's output into structured data:\n  RETURN \"Route to parser-builder — parsers extract data post-generation.\"\
  \nIF caller wants a schema to validate the LLM's output after generation:\n  RETURN \"Route to validation-schema-builder.\"\
  \nIF caller wants to transform the LLM's output from one format to another:\n  RETURN \"Route to formatter-builder.\"\n\
  IF caller wants to define a standing instruction the LLM follows:\n  CHECK: is it about OUTPUT SHAPE (proceed here) or AGENT\
  \ BEHAVIOR (route to system-prompt-builder)?\nIF the format will be injected into the prompt so the LLM sees it during generation:\n\
  \  PROCEED as response_format\nDeliverable: confirmed `kind: response_format` with one-line justification."
phase_3_compose_build_the_format_artifact: "Assemble frontmatter and all 4 required body sections, following SCHEMA.md.\n\
  ```\nID generation:\n  id = \"p05_rf_\" + task_slug + \"_\" + format_type\n  task_slug: snake_case, describes the task\n\
  \  must conform to valid response_format id pattern\nFrontmatter (all 17 required fields from SCHEMA.md):\n  id, kind (=\
  \ response_format), pillar (= P05), title, version,\n  created, updated, author, task, format_type, injection_point,\n \
  \ target_kind, sections (ordered list), sections_count (integer),\n  quality (= null), tags, domain\nBody sections (in this\
  \ order):\n  ## Format Overview\n  One paragraph: what structure this format defines and for what task.\n  State whether\
  \ strict mode applies (LLM must follow exactly) or\n  approximate mode (LLM uses format as a guide).\n  ## Sections\n  Ordered\
  \ list of sections with per-section constraints:\n    - Section name, heading level (for markdown), field names (for json/yaml)\n\
  \    - Required vs optional for each section\n    - Content type: prose | list | table | code block | key-value pairs\n\
  \    - Cardinality for repeated sections (min/max items if known)\n  ## Example Output\n  At least one complete, realistic\
  \ example.\n  Must be valid for the declared format_type:\n    json/yaml: parseable, no placeholder strings like \"value1\"\
  \ or \"string\"\n    markdown:  rendered section headers with realistic content\n    csv:       header row + minimum 2 data\
  \ rows\n  Variables in example must match the sections list."
