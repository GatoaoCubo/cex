domain_overview: A pitch deck is a concise, visual narrative used to communicate a business opportunity to investors, typically
  structured around problem/solution, traction, and funding ask. It serves as a high-level overview, emphasizing scalability,
  market potential, and team credibility. Unlike case studies, which focus on detailed narratives, or pricing pages, which
  highlight tiered offerings, pitch decks prioritize brevity and strategic alignment with investor priorities. Key slides
  often include problem/solution, market size, traction, team, and ask, with data-driven storytelling to validate assumptions
  and demonstrate ROI potential. The structure adheres to venture capital (VC) norms, where clarity and confidence are critical.
  Investors evaluate execution risk, market opportunity, and unit economics, requiring pitch decks to balance technical depth
  with accessibility. Common frameworks like the Business Model Canvas or Lean Startup principles inform slide content, ensuring
  alignment with stages of startup growth and investor expectations.
key_concepts: "| Concept               | Definition                                                                 | Source\
  \                          |  \n|----------------------|----------------------------------------------------------------------------|----------------------------------|\
  \  \n| Problem Statement    | Clear, specific description of a market pain point with quantified impact  | Harvard Business\
  \ Review        |  \n| Solution             | Product/service that directly addresses the problem with unique value    \
  \  | The Lean Startup (Eric Ries)   |  \n| Traction             | Metrics proving demand (e.g., users, revenue, partnerships)\
  \                | Y Combinator Startup School    |  \n| Ask                  | Specific funding amount, use of funds, and\
  \ expected ROI                    | PitchBook Data                 |  \n| TAM/SAM/SOM          | Total Addressable Market,\
  \ Serviceable Available Market, Serviceable Obtainable Market | Standard & Poor’s Reports      |  \n| CAC/LTV          \
  \    | Customer Acquisition Cost vs. Lifetime Value                               | Bain & Company                 |  \n\
  | Customer Segments    | Defined target markets based on demographics, behavior, or needs           | Customer Development\
  \ Model     |  \n| Value Proposition    | Unique benefit delivered to customers                                      | Value\
  \ Proposition Canvas       |  \n| Competitive Advantage| Sustainable edge over rivals (e.g., IP, network effects)      \
  \             | Porter’s Five Forces           |  \n| Go-to-Market Strategy| Plan for customer acquisition, pricing, and\
  \ distribution                   | Harvard Business Review        |"
industry_standards:
- Business Model Canvas (Osterwalder & Pigneur)
- Lean Startup (Eric Ries)
- TAM/SAM/SOM framework (Standard & Poor’s)
- Customer Development Model (Steve Blank)
- Value Proposition Canvas (Alain Chesnais)
- Porter’s Five Forces (Michael Porter)
- Go-to-Market Strategy (Harvard Business Review)
- Y Combinator Fundraising Milestones
common_patterns:
- Problem/solution narrative with data-driven validation
- Traction slides using metrics (users, revenue, growth rates)
- Ask aligned with stage-specific funding benchmarks
- Visual storytelling (charts, icons, minimal text)
- Team slide emphasizing relevant experience and network
pitfalls:
- Vague problem statements without quantified impact
- Overhyping solution without addressing scalability risks
- Traction slides lacking context (e.g., no benchmarking)
- Unclear ask with no tie to milestones or ROI
- Ignoring competition or underestimating barriers to entry
