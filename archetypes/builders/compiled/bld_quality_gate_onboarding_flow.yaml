definition: "| metric                | threshold | operator | scope         |  \n|-----------------------|-----------|----------|---------------|\
  \  \n| User activation rate  | 85%       | >=       | All users     |"
hard_gates: "| ID                  | Check                          | Fail Condition                              |  \n|---------------------|--------------------------------|---------------------------------------------|\
  \  \n| H01                 | YAML frontmatter valid         | Invalid or missing YAML frontmatter         |  \n| H02   \
  \              | ID matches pattern             | ID does not match ^p05_of_[a-z][a-z0-9_]+.md$ |  \n| H03             \
  \    | Onboarding completion rate     | < 80% completion rate                       |  \n| H04                 | Aha-moment\
  \ engagement rate     | < 70% engagement rate                       |  \n| H05                 | Error rate during onboarding\
  \   | > 5% error rate                             |  \n| H06                 | Time to first transaction      | > 10 minutes\
  \                                |  \n| H07                 | Milestone completion rate      | < 90% milestone completion\
  \                  |"
soft_scoring: "| Dim         | Dimension               | Weight | Scoring Guide                          |  \n|-------------|-------------------------|--------|----------------------------------------|\
  \  \n| D01         | Completion rate         | 0.15   | 1.00 (85%+) → 0.00 (<60%)              |  \n| D02         | Aha-moment\
  \ engagement   | 0.15   | 1.00 (70%+) → 0.00 (<40%)              |  \n| D03         | Error rate              | 0.10   |\
  \ 1.00 (≤2%) → 0.00 (>10%)               |  \n| D04         | Time to first transaction | 0.10   | 1.00 (≤5 min) → 0.00\
  \ (>15 min)         |  \n| D05         | Milestone completion    | 0.10   | 1.00 (95%+) → 0.00 (<70%)              |  \n\
  | D06         | UX feedback score       | 0.10   | 1.00 (4.5/5+) → 0.00 (≤3.0/5)          |  \n| D07         | Activation\
  \ within 24h   | 0.10   | 1.00 (80%+) → 0.00 (<50%)              |  \n| D08         | User satisfaction       | 0.10   |\
  \ 1.00 (4.0/5+) → 0.00 (≤2.5/5)          |"
actions: "| Score   | Action                                      |  \n|---------|---------------------------------------------|\
  \  \n| GOLDEN  | No action required                          |  \n| PUBLISH | Publish with notes                       \
  \   |  \n| REVIEW  | Review with engineering                     |  \n| REJECT  | Reject and fix before resubmission   \
  \       |"
bypass: "| conditions                          | approver | audit trail         |  \n|------------------------------------|----------|---------------------|\
  \  \n| Critical bug fix with CTO approval | CTO      | Ticket #PROD-12345  |"
