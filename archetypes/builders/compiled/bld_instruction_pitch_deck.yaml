phase_1_research:
- Define target audience (investors, customers) and their pain points.
- Analyze competitors’ pitch decks to identify common structures and gaps.
- Document the problem statement with data (e.g., market size, customer surveys).
- Outline the solution’s unique value proposition and technical feasibility.
- Gather traction metrics (users, revenue, partnerships, milestones).
- Define the ask (funding amount, use of funds, exit expectations).
phase_2_compose:
- 'Use bld_schema_pitch_deck.md to structure slides: Problem, Solution, Traction, Ask.'
- 'Write problem slide: 1 sentence headline, 3 supporting data points.'
- 'Write solution slide: 1 core feature, 2 technical differentiators.'
- 'Write traction slide: 1 metric headline, 2 visual charts (e.g., growth, adoption).'
- 'Write ask slide: 1 funding target, 2 use-of-funds bullet points.'
- Reference bld_output_template_pitch_deck.md for slide layout, fonts, and color codes.
- 'Add visuals: 1 diagram per problem/solution, 1 customer testimonial.'
- Insert 1-2 icons per slide for visual hierarchy (e.g., rocket for growth).
- Proofread for conciseness (max 10 words per bullet, no jargon).
phase_3_validate:
- '[ ] Peer review: Does each slide align with bld_schema_pitch_deck.md?'
- '[ ] Data accuracy: Are metrics sourced from verified reports?'
- '[ ] Consistency: Does design match bld_output_template_pitch_deck.md?'
- '[ ] Clarity: Can a non-expert explain the problem/solution in 1 minute?'
- '[ ] Approval: Signed off by CEO and CTO for technical and business claims.'
