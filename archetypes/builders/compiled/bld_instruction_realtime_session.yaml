phase_1_research: "1. Identify provider + model pair: must be realtime-capable\n   (e.g., `openai` + `gpt-4o-realtime-preview-2024-12-17`;\
  \ `gemini` + `gemini-2.0-flash-exp`)\n   -- consult bld_knowledge_card_realtime_session.md provider table\n2. Choose transport:\
  \ `webrtc` (browser, opus), `websocket` (server or browser, pcm16),\n   `grpc_bidi` (server-to-server, Gemini)\n3. Verify\
  \ codec-transport pairing: webrtc -> opus@48kHz; websocket -> pcm16@24kHz or g711_ulaw\n4. Confirm VAD strategy for use\
  \ case: `server_vad` (default), `semantic_vad` (Gemini only),\n   `none` (requires manual `response.create` trigger)\n5.\
  \ Define latency budget: first audio delta target (recommend <= 300 ms after speech_stopped)\n6. Identify tools the model\
  \ may call mid-stream (JSON Schema definitions required)"
phase_2_compose: "1. Read `bld_schema_realtime_session.md` -- assign `id` matching `^p04_rs_[a-z0-9_]{3,48}\\.md$`\n2. Read\
  \ `bld_output_template_realtime_session.md` -- follow exact frontmatter + JSON structure\n3. Write session config JSON:\
  \ `model`, `modalities`, `voice`, `input_audio_format`,\n   `output_audio_format`, `turn_detection`, `tools`, `tool_choice`,\
  \ `max_response_output_tokens`\n4. Configure `turn_detection`:\n   - `server_vad`: set `threshold` (0.5 default), `prefix_padding_ms`\
  \ (300), `silence_duration_ms` (500)\n   - `none`: document the manual `response.create` trigger event or wake-word\n5.\
  \ Write ephemeral token mint flow: `POST /v1/realtime/sessions` + 60s TTL note + NEVER ship raw key\n6. Write interruption\
  \ handler: `input_audio_buffer.speech_started` -> `response.cancel`\n   + `audioPlayer.flush()` + `conversation.item.truncate`\n\
  7. Build latency budget table: ICE/DTLS setup, first audio delta, end-to-end perceived\n8. Document all 7 lifecycle events\
  \ and their handlers\n9. Write reconnect strategy: max retries, backoff table, state resume via conversation.item.create"
phase_3_validate:
- '[ ] `id` matches schema pattern: `^p04_rs_[a-z0-9_]{3,48}\.md$` (H02)'
- '[ ] `provider` + `model` are realtime-capable pair -- not generic chat model (H04)'
- '[ ] `transport` in {webrtc, websocket, grpc_bidi} (H05)'
- '[ ] Codec matches transport: opus for webrtc, pcm16/g711_ulaw for websocket (H06)'
- '[ ] `turn_detection.type` specified; if server_vad then threshold+padding+silence_ms set (H07)'
- '[ ] Barge-in handler present: speech_started -> response.cancel + flush (H08)'
- '[ ] No raw API key in body; ephemeral token mint endpoint documented (H09)'
- '[ ] Latency budget table present with first-audio-delta target (H10)'
- '[ ] `quality: null` in frontmatter (H05-variant)'
- '[ ] All 7 lifecycle events handled'
