golden_example: '--- kind: quantization_config version: "1.2" --- method: "bitsandbytes" bits: 4 compute_dtype: "bfloat16"
  bnb_4bit_quant_type: "nf4" bnb_4bit_use_double_quant: true bnb_4bit_compute_dtype: "bfloat16"'
anti_example_1_including_context_compression_settings: '--- kind: quantization_config --- bits: 4 compression_config: method:
  "token_pruning" reduction_ratio: 0.5 context_window_compression: true'
why_it_fails: This example incorrectly includes `model_architecture` parameters such as `num_layers`, `hidden_size`, and `vocab_size`.
  These parameters define the structural topology of the model and belong in a separate architecture configuration, not within
  the quantization settings.
