architectural_position: kubernetes_ai_requirement sits in CEX P09 (runtime config pillar) as the declarative contract between
  AI workloads and Certified Kubernetes AI Platforms. It upstreams from workload_spec (declared by ML teams) and downstreams
  to cluster_admission (enforced by KAR conformance CLI and DRA scheduler). It anchors the Kubernetes AI Conformance Program
  (Nov 2025) by making GPU-topology, InfiniBand, MIG, DRA, and checkpoint-PVC requirements machine-verifiable -- ensuring
  portable multi-node training and disaggregated inference across CNCF-certified vendors.
