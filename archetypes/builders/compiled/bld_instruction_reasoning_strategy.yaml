phase_1_research: "This ISO selects a reasoning strategy (e.g. chain-of-thought) and the conditions under which it applies.\n\
  1. Define problem scope and target domain for reasoning tasks.  \n2. Analyze existing structured reasoning frameworks (e.g.,\
  \ CoT, ReAct).  \n3. Map gaps in current strategies for the specified domain.  \n4. Identify key reasoning patterns (e.g.,\
  \ deduction, induction, abduction).  \n5. Evaluate trade-offs between complexity and interpretability.  \n6. Validate feasibility\
  \ via small-scale prototype testing."
