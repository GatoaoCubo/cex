phase_1_research:
- 'Identify the target consumer: Aider format (whole/diff/udiff-simple/diff-fenced), git pipeline, or custom LLM agent.'
- 'Determine input granularity: line-level (default), token-level, character-level, or AST-level.'
- 'Select algorithm:'
- 'Myers: default for fast O(ND) line diffs; git''s fallback algorithm'
- 'patience/histogram: prefer when code has many identical-looking lines (braces, blanks)'
- 'Ratcliff-Obershelp: gestalt matching; use when difflib.SequenceMatcher is the runtime'
- 'custom: AST-level structural diff (tree-sitter + GumTree) for semantic code changes'
- 'Benchmark against real files: small (<200 lines), medium (200-2000), large (2000+).'
- 'Document context: patch application tool (git apply, patch, difflib), three-way merge requirements.'
phase_2_compose:
- 'Fill OUTPUT_TEMPLATE.md: algorithm_type, granularity, comparison_basis (required fields).'
- 'Write Algorithm section: time/space complexity, patch format (unified/context/custom).'
- 'Write Patch Application section: tool, --3way flag, whitespace handling, encoding normalization.'
- 'Write Edge Cases table: empty diff, binary, CRLF/LF, identical files, partial match (min 5 rows).'
- 'Reference real tools: difflib, git apply --3way, patch -p1, Aider format name.'
- 'Validate ID pattern: p04_ds_{{name}}.md'
phase_3_validate:
- '[ ] algorithm_type in [Myers, LCS, patience, histogram, Ratcliff-Obershelp, custom]'
- '[ ] granularity in [line, token, character, AST, semantic]'
- '[ ] Edge cases table has >= 5 rows'
- '[ ] At least 1 real tool cited (difflib / git apply / patch / Aider format)'
- '[ ] No fictional tool references (no strat_backtest.py, CCXT, Backtrader, etc.)'
- '[ ] Patch application is idempotent (documented)'
- '[ ] cex_compile.py run on artifact path'
