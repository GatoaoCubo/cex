updated: 2026-04-06
author: instruction-builder
title: Toolkit Builder Instructions
target: toolkit-builder agent
phases_count: 3
prerequisites:
- Target agent or nucleus is identified
- Required operations are known (what the agent needs to do)
- Risk assessment of operations is available (read vs write vs delete)
- MCP server availability is confirmed (if MCP tools are included)
validation_method: checklist
domain: toolkit
quality: null
tags:
- instruction
- toolkit
- permissions
- P04
idempotent: true
atomic: true
rollback: Revert to previous toolkit version — toolkits are versioned permission documents
dependencies: []
logging: true
tldr: Produce a YAML toolkit bundle with tool definitions, confirmation tiers, and deny lists — under 4096 bytes, least-privilege
  enforced, no tool implementation code included.
density_score: 0.86
context: 'The toolkit-builder produces `toolkit` artifacts — YAML bundles defining which tools an agent

  or nucleus can access and under what permission constraints. A toolkit answers exactly: what

  tools are available, what confirmation level each requires, and which agents are denied specific

  tools. Toolkits are consumed by the agent runtime and skill loader; they are not tool

  implementations, agent identities, or workflow definitions.

  Input contract:

  - `{{name}}`: toolkit name (e.g. `file_ops`, `git_ops`, `research_tools`)

  - `{{target_agent}}`: agent or nucleus that will use this toolkit

  - `{{operations}}`: list of operations the agent needs to perform

  - `{{risk_profile}}`: read/write/delete classification per operation

  - `{{mcp_endpoints}}`: optional MCP server mappings for tool execution

  Output contract: A single `toolkit` YAML file named `p04_tk_{{name}}.yaml`,

  under 4096 bytes, with tool definitions, confirmation tiers, and deny lists. No tool

  implementation code, no agent identity, no workflow logic.

  Boundaries:

  - A toolkit is a permission bundle — one bundle per agent role or domain.

  - Tool implementation code belongs in N05 operations.

  - Agent identity and persona belong in a system_prompt artifact.

  - Routing policy belongs in a dispatch_rule artifact.

  - Maximum 15 tools per toolkit — split if more are needed.'
phases: ''
phase_1_classify: "Primary action: Confirm this is a tool permission bundle and determine the minimum\nrequired toolkit structure\
  \ before writing any YAML.\nINPUT: name, target_agent, operations, risk_profile, mcp_endpoints\n1. Confirm this is a permission\
  \ bundle, not a tool implementation or agent config:\n   Is it defining WHICH tools an agent can use?              -> toolkit\n\
  \   Is it implementing HOW a tool works?                      -> NOT a toolkit\n   Is it defining WHO the agent is?    \
  \                      -> NOT a toolkit\n2. Validate toolkit name:\n   Must match pattern: ^[a-z][a-z0-9_]+$\n   Must be\
  \ descriptive of the domain: file_ops, git_ops, search, web\n   Examples: \"file_ops\", \"git_ops\", \"research_tools\"\
  , \"build_tools\"\n3. Classify each operation by risk:\n   READ operations (list, search, read, glob, grep)   -> confirmation:\
  \ auto\n   WRITE operations (write, edit, create, append)      -> confirmation: confirm\n   DELETE operations (delete, remove,\
  \ clean, reset)    -> confirmation: confirm\n   DANGEROUS operations (force push, drop, format)     -> confirmation: deny\
  \ (default)\n4. Check for overlapping tools:\n   Scan existing toolkits for the same tools\n   Flag overlaps — each tool\
  \ should live in exactly one toolkit\n   If overlap found: decide which toolkit owns it, deny in the other\n5. Map to MCP\
  \ endpoints (if applicable):\n   Match each tool to its MCP server endpoint\n   Validate endpoint availability\n   Flag\
  \ tools without MCP backing as \"local-only\"\nOUTPUT: validated_name, risk_classified_ops, overlap_flags, mcp_mappings\n\
  Verification: `validated_name` matches naming pattern. Each operation has a risk\nclassification. No unresolved overlaps.\
  \ MCP endpoints validated if present."
phase_2_compose: "Primary action: Assemble the YAML toolkit with tool definitions, confirmation\ntiers, deny lists, and MCP\
  \ mapping.\nINPUT: validated_name, target_agent, risk_classified_ops, overlap_flags, mcp_mappings\n1. Set filename: p04_tk_{{name}}.yaml\n\
  2. Assemble frontmatter:\n   id: p04_tk_{{name}}\n   kind: toolkit\n   pillar: P04\n   name: {{name}}\n   category: {{domain_category}}\n\
  \   quality: null\n3. Compose tool definitions (ordered by risk: auto first, confirm second):\n   For each tool:\n     name:\
  \ tool identifier (snake_case)\n     description: one-line purpose statement\n     requires_confirmation: auto | confirm\
  \ | deny\n     mcp_endpoint: MCP server path (if applicable)\n     denied_for: list of agents/nuclei denied this tool (if\
  \ any)\n   Rules:\n     - Read tools: requires_confirmation = auto\n     - Write tools: requires_confirmation = confirm\n\
  \     - Dangerous tools: requires_confirmation = deny (or omit from toolkit)\n     - Maximum 15 tools per toolkit\n4. Compose\
  \ deny list:\n   For each denied tool-agent pair:\n     tool: tool name\n     denied_for: [list of agents/nuclei]\n    \
  \ reason: why denied (one line)\n5. Compose category metadata:\n   category: domain grouping (file_ops, git_ops, search,\
  \ web, system)\n   scope: nucleus | global | agent-specific\n6. Size check:\n   Estimate YAML byte count\n   If > 4096 bytes:\
  \ split into sub-toolkits by category\n   until each sub-toolkit <= 4096 bytes\nOUTPUT: toolkit YAML content (assembled,\
  \ not yet validated)\nVerification: all required fields present. Tool count <= 15. Each tool has\nconfirmation tier. Deny\
  \ lists are explicit. Size <= 4096 bytes."
phase_3_validate: "Primary action: Run all quality gates against the assembled YAML and output the\nfinal file only if all\
  \ HARD gates pass.\nINPUT: toolkit YAML content\n1. HARD quality gates (all must pass):\n   HARD_1: id matches pattern ^p04_tk_[a-z][a-z0-9_]+$\n\
  \   HARD_2: kind == \"toolkit\"\n   HARD_3: name is non-empty string\n   HARD_4: tools is non-empty list with >= 1 entry\n\
  \   HARD_5: each tool has name, description, requires_confirmation\n   HARD_6: requires_confirmation is one of: auto, confirm,\
  \ deny\n   HARD_7: no write/delete tool has requires_confirmation = auto\n   HARD_8: tool count <= 15\n   HARD_9: quality\
  \ == null\n   HARD_10: YAML parses without syntax errors\n   HARD_11: total YAML size <= 4096 bytes\n   HARD_12: no tool\
  \ implementation code in the toolkit\n2. Scope check:\n   Verify toolkit contains NO tool implementation code\n   Verify\
  \ toolkit contains NO agent identity or persona\n   Verify toolkit contains NO workflow or routing logic\n3. If all HARD\
  \ gates pass: emit file\n   If any HARD gate fails: return to Phase 2 with failure reasons\nOUTPUT: validated toolkit YAML\
  \ file"
