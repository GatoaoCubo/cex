summary: Voice pipelines define system-level architecture -- WHAT components interact and HOW data flows -- not provider-specific
  implementation. The critical production insight is that modularity (each stage independently replaceable) determines long-term
  maintainability more than any performance optimization. The most common failure is building a voice_pipeline that locks
  into a single STT or TTS provider, eliminating fallback options.
pattern:
- 'All 4 stages required: STT, NLU, dialogue management, TTS -- no shortcuts'
- 'Provider abstraction at every stage: define interfaces, not vendor APIs'
- 'Fallback chains: if STT-A fails, route to STT-B -- never single-provider dependency'
- 'Data flow must be explicit: direction, format, and error signal for each connection'
- 'Error recovery at stage boundaries: failed NLU must not cascade to silent TTS failure'
- 'Audio preprocessing as a first-class stage: noise reduction and normalization before STT'
anti_pattern:
- Single-provider pipeline -- catastrophic failure if vendor has outage or changes API
- Missing dialogue management -- STT + TTS without context is not a pipeline, it is a relay
- No audio preprocessing -- ASR accuracy degrades 30-60% without normalization
- Silent error propagation -- NLU failure should produce explicit fallback, not garbage TTS
- Hardcoded latency targets without measurement methodology -- unverifiable constraints
- Confusing voice_pipeline (architecture) with stt_provider (single STT configuration)
context: Voice pipelines sit in the P04 tools layer as the architectural specification for voice agent systems. They are consumed
  by deployment engineers (container orchestration, cloud voice services) who instantiate each pipeline stage. The id pattern
  `p04_vp_*` signals tools context. They differ from stt_provider (single STT config) and realtime_session (live state).
impact: Pipelines with provider abstraction layers recovered from vendor outages with zero downtime vs 15-minute mean recovery
  for hardcoded pipelines. Explicit error boundaries reduced cascading failures by 80%. Audio preprocessing reduced WER (Word
  Error Rate) by 25-40% across noisy environment test cases.
reproducibility: 'For reliable pipeline production: (1) define all 4 core stages explicitly, (2) use provider-agnostic interfaces
  at each stage, (3) document fallback chain for each stage, (4) specify data flow direction and format between stages, (5)
  include audio preprocessing, (6) validate against H01-H08 HARD gates.'
