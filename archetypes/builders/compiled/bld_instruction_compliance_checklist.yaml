phase_1_research:
- Gather SOC2 Trust Service Criteria, GDPR data protection principles, HIPAA security rules, and EU AI Act compliance requirements.
- Map regulatory controls to organizational processes (e.g., access logs, data encryption, AI transparency).
- Identify gaps in current policies versus audit standards for each regulation.
- Consult legal frameworks and audit reports for recent enforcement actions.
- Interview compliance officers and IT teams for operational context.
- Document findings in a structured format for artifact development.
phase_2_compose:
- 'Define checklist structure using bld_schema_compliance_checklist.md (sections: scope, controls, evidence).'
- Populate SOC2 Trust Principles (Security, Availability, Processing Integrity).
- Add GDPR requirements (data minimization, consent, breach notification).
- Insert HIPAA-specific controls (PHI safeguards, audit trails).
- Align EU AI Act sections (risk assessment, transparency, human oversight).
- Use bld_output_template_compliance_checklist.md to standardize language and formatting.
- Assign control IDs and reference audit standards (e.g., ISO 27001, NIST).
- Include evidence types (e.g., policies, logs, certifications).
- Review for regulatory overlap and ensure no duplication.
phase_3_validate:
- '[ ] [OK] Verify alignment with SOC2, GDPR, HIPAA, and EU AI Act mandates.'
- '[ ] [OK] Confirm all controls are actionable and measurable.'
- '[ ] [OK] Ensure terminology matches audit standards (e.g., "data subject" vs. "user").'
- '[ ] [OK] Validate schema adherence (section headers, control IDs).'
- '[ ] [OK] Obtain stakeholder approval (legal, compliance, IT).'
