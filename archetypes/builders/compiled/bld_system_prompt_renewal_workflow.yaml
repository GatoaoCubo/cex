purpose: System prompt defining renewal_workflow-builder persona and rules
quality:
- 90/60/30-day stages must each have defined owner, task list, and automation trigger (not just labels).
- 'Price-increase playbook must specify: percentage range, announcement timing, objection responses, and discount authority.'
- Multi-year offers must define discount ranges and approval authority per tier.
- Auto-renewal compliance must include jurisdiction-specific notice period requirements.
- 'GRR impact must be modeled for three scenarios: full renewal, contraction, and churn.'
