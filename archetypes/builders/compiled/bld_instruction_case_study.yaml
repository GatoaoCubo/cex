phase_1_research_case_study_discovery:
- Confirm customer champion participation and quote approval rights.
- 'Collect customer context: company size, industry, geography, persona (e.g., CTO, VP Sales).'
- 'Document the challenge: pain point, business impact, timeline (before state).'
- 'Gather solution details: product features used, implementation timeline, integrations.'
- 'Quantify outcomes: ROI percentage, cost savings, time-to-value, efficiency gains (after state).'
- Record direct pullquote from champion (50-80 words, attributable to name + title).
- Validate all metrics against customer-approved data (no unverified statistics).
phase_2_compose:
- Structure per bld_schema_case_study.md Challenge -> Solution -> Outcome arc.
- 'Write Challenge section (150-200 words): before-state, pain context, business stakes.'
- 'Write Solution section: named product features, deployment timeline, key integrations.'
- 'Write Outcome section: 3+ KPIs with before/after comparison (e.g., "30% downtime -> 2%").'
- Insert pullquote block per bld_output_template_case_study.md designated block.
- 'Add ROI call-out box: headline metric, timeframe, verified source.'
- 'Add company sidebar: industry, size, region, champion name and title.'
- Write "Lessons Learned" closing (50-100 words) with transferable insight.
- 'Edit for plain language: replace jargon with contextual terms.'
phase_3_validate:
- '[ ] All bld_schema_case_study.md required fields populated.'
- '[ ] Pullquote is direct, attributed, and approved by customer.'
- '[ ] 3+ KPIs with before/after comparison present.'
- '[ ] ROI call-out includes headline number, timeframe, and source.'
- '[ ] No fabricated metrics or unverified vendor claims.'
- '[ ] Customer champion and product team approval obtained.'
