phase_1_research:
- Identify target customer and confirm participation
- 'Collect customer data: industry, role, pain points'
- Document specific challenge and business impact
- 'Gather solution details: product usage, implementation steps'
- 'Quantify outcomes: metrics, ROI, time-to-value'
- Record direct quote from customer (150-200 words)
phase_2_compose:
- 'Structure narrative using SCHEMA.md: Challenge → Solution → Outcome'
- Write 200-word challenge section with problem context
- 'Detail solution: product features, deployment timeline'
- Quantify outcomes with 3+ measurable KPIs
- Insert customer quote in OUTPUT_TEMPLATE.md's designated block
- 'Add company-specific data: industry, location, role'
- Include 1-2 technical implementation details
- Edit for clarity, conciseness, and brand alignment
- Add visual placeholder for customer logo/photo
phase_3_validate: '[ ] ✅ All SCHEMA.md fields populated [ ] ✅ Quote meets word count and tone guidelines [ ] ✅ Metrics align
  with customer-provided data [ ] ✅ Template formatting matches OUTPUT_TEMPLATE.md [ ] ✅ Approved by customer and product
  teams'
