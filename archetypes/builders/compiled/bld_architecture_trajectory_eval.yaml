architectural_position: trajectory_eval operates as the evaluation and feedback loop within CEX P07, ensuring builder ISOs
  align with trajectory goals through schema validation, quality checks, and dynamic configuration. It bridges raw data processing
  (P01) with strategic decision-making (P09) by maintaining consistent output standards and enabling iterative refinement
  of builder logic.
