phase_1_research:
- Analyze competitor pricing pages for tier structure and value proposition placement.
- Identify product/service unique selling points (USPs) relevant to each pricing tier.
- Map customer segments to pricing tiers based on usage patterns and willingness to pay.
- Gather data on pricing models (e.g., subscription, freemium, tiered licensing).
- Create user personas for each tier to tailor conversion copy.
- Benchmark industry-standard pricing metrics (e.g., cost per feature, ROI benchmarks).
phase_2_compose:
- 'Outline structure using SCHEMA.md: header, tier comparison table, feature breakdown, CTA.'
- Define tier names (e.g., Basic, Pro, Enterprise) and corresponding pricing.
- Write value propositions for each tier, emphasizing USPs and ROI.
- Draft conversion copy (e.g., "Upgrade to unlock X feature") aligned with OUTPUT_TEMPLATE.md.
- Populate tier comparison table with features, pricing, and benefits.
- Insert pricing table with currency, billing cycles, and discounts.
- Add CTAs (e.g., "Start free trial," "Contact sales") for each tier.
- Ensure consistency with brand voice and schema-defined content blocks.
- Review for clarity, conciseness, and alignment with research findings.
phase_3_validate: '[ ] ✅ Tier comparison table accurately reflects feature differences. [ ] ✅ Conversion copy includes clear
  value propositions and CTAs. [ ] ✅ Pricing aligns with research benchmarks and customer personas. [ ] ✅ Mobile responsiveness
  tested for tables and CTAs. [ ] ✅ Accessibility checked (e.g., contrast ratios, screen reader compatibility).'
