crew_role: Produces formal nucleus_def contracts that make the CEX 8-nucleus fractal architecture machine-readable and orchestration-ready.
  Acts as the fractal cartographer that maps each nucleus's identity, boundaries, and composability contracts.
receives_from: '| Source | What | Format |

  |--------|------|--------|

  | nucleus_models.yaml | CLI + model bindings per nucleus | YAML |

  | N0{X} agent cards | Domain agents, kinds_owned, capabilities | Markdown |

  | .claude/rules/n0{X}-*.md | Sin lens, routing rules, domain | Markdown |

  | N00_genesis/README.md | Fractal structure, pillar map | Markdown |

  | .cex/kinds_meta.json | Pillar assignments, kind boundaries | JSON |

  | boot/n0{X}.ps1 | Boot script paths for contract | PowerShell |'
produces_for: '| Consumer | What | Format |

  |----------|------|--------|

  | N07 Orchestrator | Dispatch contracts (role, boot_script, cli_binding) | Markdown |

  | cex_router.py | CLI selection input (cli_binding, fallback_chain) | Markdown |

  | N04 Knowledge | Indexed nucleus registry for retrieval | Markdown |

  | spawn_grid.ps1 | Boot configuration (nucleus_id, boot_script) | Markdown |

  | cex_retriever.py | Semantic search target for nucleus queries | Markdown |'
boundary: Does NOT handle individual agent definitions (handled by agent-builder). Does NOT handle model provider configuration
  (handled by model-provider-builder). Does NOT handle crew assembly logic (handled by collaboration-pattern-builder). Legal
  boundaries between nuclei (routing rules) are defined in .claude/rules/ files, not within nucleus_def artifacts.
crew_patterns: ''
pattern_1_nucleus_registry_build: "nucleus-def-builder (x7, one per N01-N07)\n  --> produces: p02_nd_n01.md through p02_nd_n07.md\n\
  \  --> N04 indexes all 7 artifacts\n  --> N07 reads registry for dispatch routing"
pattern_2_new_nucleus_registration: "N03 builder-architect (designs new nucleus)\n  --> nucleus-def-builder (formalizes the\
  \ definition)\n  --> N05 operations (validates boot contract)\n  --> N07 orchestrator (integrates into dispatch)"
pattern_3_nucleus_audit: "N01 intelligence (scans actual nucleus directories)\n  --> nucleus-def-builder (updates nucleus_def\
  \ artifacts)\n  --> cex_doctor.py (verifies alignment between def + reality)"
