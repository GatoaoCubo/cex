observation: Cost budgets that omit per-model sub-limits cause unexpected overage on high-cost frontier models while cheap
  models stay under cap. Budgets without reset policies accumulate forever, blocking all LLM calls after the first big batch
  job. Missing alert thresholds mean teams discover overages only when the billing invoice arrives, not in real time. Budgets
  scoped too broadly (global USD only) hide which provider or model is consuming the most spend.
pattern: 'Budget entry specification: each entry requires seven fields. Provider name (anthropic, openai, google, ollama).
  Model slug or ''*'' for all models under that provider. Token limit (integer, or null if governing by USD only). USD limit
  (number, or null if governing by token count only -- at least one must be non-null). Alert threshold percentage (warn at
  80% by default, block at 100%). Reset policy from the enum set. Overage action (block, warn, log). Alert section: include
  `## Alert Policy` in every cost_budget body, even when alert_enabled is false -- write "alerts disabled" to make the omission
  intentional and auditable. Reset policy: always explicit. "monthly" is safe for most workloads. "rolling_30d" is safer for
  jobs that run on the 1st of the month. "none" is valid for one-time project caps that should never reset. Scope hierarchy:
  narrowest accurate scope wins. "p09_cb_anthropic_opus" scoped to one model is more actionable than "p09_cb_global" when
  debugging which model caused an overage. Never include credentials: the artifact describes the shape and limits of spend
  governance, not the billing account credentials. API keys and payment methods belong in a secrets manager.'
evidence: Per-model sub-limits caught 3 cases of unexpected opus usage billed at 15x flash price. Explicit reset policies
  prevented 2 indefinite accumulation bugs that would have blocked overnight jobs. Real-time webhook alerts reduced overage
  discovery lag from days (billing cycle) to minutes in 4 production deployments. Provider-level breakdown reduced cost attribution
  time by ~60% during incident postmortems.
