summary: 'Cost budget failures split into two categories: financial surprises (overages discovered on billing invoice because
  thresholds were absent or too coarse) and operational failures (all LLM calls blocked because budgets accumulated without
  reset). A seven-field budget entry specification and explicit alert/escalation section address both categories.'
anti_patterns:
- Single global USD limit with no per-provider breakdown -- auditors cannot attribute spend.
- Omitting the `## Alert Policy` section -- teams cannot confirm alert coverage was reviewed.
- 'reset_policy: none on high-volume scopes -- budget fills up and blocks all calls permanently.'
