tldr: '3-phase process: research paradigm + compute + dataset, compose all sections, validate gates.'
domain: training_method construction
created: '2026-04-13'
updated: '2026-04-13'
density_score: 0.9
phase_1_research:
- 'Identify the learning paradigm: supervised, unsupervised, self-supervised, reinforcement learning, transfer learning, or
  hybrid'
- 'Determine compute intensity based on model scale:'
- 'Low (CPU or single GPU): small models, classic ML, linear/tree-based'
- 'Medium (1-4 GPU): mid-scale neural nets, BERT-scale, LoRA fine-tunes'
- 'High (multi-GPU/TPU): LLM pre-training, large vision models, foundation models'
- 'Catalog dataset requirements: source, size, label format, preprocessing pipeline'
- Identify key hyperparameters for the chosen paradigm (optimizer, LR, batch size, epochs)
- 'Define evaluation strategy: metrics, validation frequency, convergence criteria'
- Check existing training_method artifacts via retriever -- avoid duplicating a spec that covers the same paradigm and domain
phase_2_compose:
- Read bld_schema_training_method.md -- source of truth for all required fields
- Read bld_output_template_training_method.md -- fill the template following schema constraints
- 'Fill all required frontmatter: id, kind, pillar, title, version, learning_paradigm, compute_intensity, quality: null'
- 'Write Overview section: paradigm choice rationale, target model type, compute justification (1 sentence each)'
- 'Write Learning Paradigm section: table with paradigm type, objective function, label requirements, typical use cases'
- 'Write Compute Profile section: table with compute_intensity, hardware target, memory requirements, typical training time'
- 'Write Hyperparameters section: table with all key hyperparameters and recommended ranges'
- 'Write Dataset Requirements section: table with source, size, format, preprocessing, label schema'
- 'Write Evaluation section: table with metrics, validation strategy, convergence criteria'
- Confirm body <= 4096 bytes
phase_3_validate:
- Check bld_quality_gate_training_method.md -- verify each HARD gate manually
- Confirm YAML frontmatter parses without errors
- Confirm `id` matches naming pattern (e.g., `p02_tm_[a-z][a-z0-9_]+`)
- 'Confirm `learning_paradigm` is from allowed enum: supervised, unsupervised, reinforcement, self_supervised, transfer, hybrid'
- 'Confirm `compute_intensity` is from allowed enum: low, medium, high'
- Confirm all required hyperparameters have documented values or ranges
- Confirm dataset section includes format and preprocessing steps
- Confirm at least one evaluation metric is specified
- Confirm no credentials, API keys, or tokens appear in any field
- Confirm `quality` is null
- Confirm body <= 4096 bytes
- 'Cross-check: is this a training paradigm specification? If it specifies a fine-tuning job it belongs in `finetune_config`.
  If it documents a trained model it belongs in `model_card`. If it defines an RL reward signal it belongs in `reward_model`.'
- 'If score < 8.0: revise in the same pass before outputting'
