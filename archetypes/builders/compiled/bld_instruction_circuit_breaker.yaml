purpose: Step-by-step production process for circuit_breaker
pattern: 3-phase pipeline (define -> compose -> validate)
quality: 7.1
title: Instruction Circuit Breaker
version: 1.0.0
author: n03_builder
tags:
- circuit_breaker
- builder
- instruction
tldr: '3-phase: define failure thresholds and state machine, compose with cooldown and probe config, validate gates.'
domain: circuit breaker construction
created: '2026-04-17'
updated: '2026-04-17'
density_score: 0.9
phase_1_define:
- Identify the dependency being protected (API name, service, model provider)
- 'Determine failure_rate_threshold: percentage of calls that must fail to trip (e.g. 50%)'
- 'Choose sliding_window_type: COUNT_BASED (last N calls) or TIME_BASED (last N seconds)'
- 'Set sliding_window_size: number of calls or seconds for the window'
- 'Set minimum_number_of_calls: minimum calls before failure rate is computed'
- 'Set cooldown_duration: seconds/minutes circuit stays OPEN before half-open probe'
- 'Define probe_count: how many test calls in HALF-OPEN state before closing'
- 'Specify fallback_response: what to return while circuit is OPEN (error msg, cached value, default)'
- 'List monitored_exceptions: which error types count as failures (e.g. HTTP 5xx, timeout, ConnectionError)'
- 'Define slow_call_threshold: duration in ms above which call is counted as slow failure (optional)'
phase_2_compose:
- Read SCHEMA.md and OUTPUT_TEMPLATE.md
- 'Fill frontmatter: all required fields (quality: null)'
- 'Set id: `p09_cb_{service_slug}` -- verify pattern `^p09_cb_[a-z][a-z0-9_]+$`'
- 'Write Overview section: what dependency is protected and why'
- 'Write State Machine section: CLOSED/OPEN/HALF-OPEN transitions with thresholds'
- 'Write Cooldown section: duration, probe count, recovery criteria'
- 'Write Fallback section: what is returned during open state'
- Verify body <= 3072 bytes
phase_3_validate:
- Confirm id matches `^p09_cb_[a-z][a-z0-9_]+$`
- Confirm kind == circuit_breaker
- Confirm failure_rate_threshold is a positive integer in range [1, 100]
- Confirm cooldown_duration is a positive integer (seconds)
- Confirm probe_count is a positive integer
- 'Confirm all 4 body sections present: Overview, State Machine, Cooldown, Fallback'
- 'Cross-check: not rate_limit_config (no RPM/TPM quotas), not fallback_chain (not ordered provider list)'
- 'Confirm quality: null'
- Revise if score < 8.0
