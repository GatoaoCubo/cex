definition: "| metric       | threshold | operator | scope  |  \n|--------------|-----------|----------|--------|  \n| sensitivity\
  \  | 0.7       | >=       | global |  \n| threshold    | 0.3       | <=       | per-channel |  \n| operator     | valid\
  \     | in       | all    |"
hard_gates: "| ID   | Check               | Fail Condition                          |  \n|------|---------------------|-----------------------------------------|\
  \  \n| H01  | YAML valid          | Invalid YAML syntax                     |  \n| H02  | ID matches pattern  | ID does\
  \ not match `p09_vad_[a-zA-Z0-9_]+` |  \n| H03  | kind matches        | kind != `vad_config`                   |  \n| H04\
  \  | sensitivity range   | sensitivity < 0.1 or > 1.0            |  \n| H05  | aggressiveness range | aggressiveness not\
  \ in {0,1,2,3}       |  \n| H06  | frame_size_ms valid | frame_size_ms not in {10,20,30}        |  \n| H07  | noise_floor_db\
  \ range | noise_floor_db < -70 or > -10 dBFS   |"
soft_scoring: "| Dim | Dimension          | Weight | Scoring Guide                               |  \n|-----|--------------------|--------|---------------------------------------------|\
  \  \n| D1  | YAML structure     | 0.15   | 1.0 if valid, 0.5 if partial, 0 otherwise   |  \n| D2  | Sensitivity tuning |\
  \ 0.15   | 1.0 if env-specific, 0.5 if generic default |  \n| D3  | Engine coverage    | 0.10   | 1.0 if engine named (webrtc/silero/kaldi),\
  \ 0.5 otherwise |  \n| D4  | Frame size valid   | 0.10   | 1.0 if in {10,20,30}ms, 0 otherwise         |  \n| D5  | Use\
  \ case docs      | 0.10   | 1.0 if use_case section present, 0.5 otherwise |  \n| D6  | ID uniqueness      | 0.10   | 1.0\
  \ if ID unique, 0.5 if duplicate          |  \n| D7  | Documentation      | 0.10   | 1.0 if comments present, 0.5 if missing\
  \     |  \n| D8  | HARD gate coverage | 0.20   | 1.0 if meets all H01-H07, 0.5 if partial   |"
actions: "| Score     | Action                          |  \n|-----------|---------------------------------|  \n| GOLDEN \
  \   | >=9.5: No action required       |  \n| PUBLISH   | >=8.0: Auto-publish             |  \n| REVIEW    | >=7.0: Require\
  \ manual review    |  \n| REJECT    | <7.0: Reject and rework         |"
bypass: "| conditions                        | approver | audit trail         |  \n|----------------------------------|----------|---------------------|\
