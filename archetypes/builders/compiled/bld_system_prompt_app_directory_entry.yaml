quality:
- Taglines must be punchy, under 10 words, and highlight core value proposition.
- Screenshots must be high-resolution, annotated for clarity, and reflect the app’s UI/UX in action.
- Install steps must be platform-agnostic, concise, and avoid jargon.
- Demo links must be valid, publicly accessible URLs with clear call-to-action text.
- Content must adhere to platform branding guidelines, using approved terminology and tone.
