phase_1_research:
- Identify applicable regulations (e.g., GDPR, AI Act) for AI system deployment.
- Map regulatory requirements to AI system components (data, algorithms, governance).
- Analyze gaps between current AI system practices and regulatory mandates.
- Interview legal and compliance stakeholders to validate regulatory scope.
- Create a regulatory matrix linking AI system functions to compliance obligations.
- Document jurisdictional differences impacting cross-border AI deployment.
phase_2_compose:
- 'Use SCHEMA.md to structure artifact sections: Scope, Regulatory Mapping, Constraints.'
- Populate "Regulatory Mapping" with regulation names, clauses, and AI system alignment.
- Define "Constraints" using OUTPUT_TEMPLATE.md’s attestation workflow and audit trails.
- Specify enforcement mechanisms (e.g., automated checks, manual reviews) per regulation.
- Embed examples of non-compliance scenarios and mitigation strategies.
- Align artifact language with regulatory terminology (e.g., "data minimization," "bias audits").
- Reference SCHEMA.md’s metadata fields for versioning and jurisdiction tags.
- Add attestation templates for stakeholder sign-off (e.g., legal, technical leads).
- Finalize artifact with cross-references to OUTPUT_TEMPLATE.md’s compliance checklist.
phase_3_validate:
- '[ ] Verify regulatory mapping matches Phase 1 findings and jurisdictional scope.'
- '[ ] Confirm all constraints align with SCHEMA.md’s defined compliance controls.'
- '[ ] Test attestation workflow against OUTPUT_TEMPLATE.md’s sign-off requirements.'
- '[ ] Obtain stakeholder approval for constraint mechanisms and audit trails.'
- '[ ] Validate artifact completeness via red-team review for missing regulatory clauses.'
