tldr: '3-phase build process for hitl_config: research workflow + compose gate spec + validate all HARD gates.'
domain: hitl_config construction
created: '2026-04-13'
updated: '2026-04-13'
density_score: 0.9
phase_1_research:
- 'Identify the workflow: what AI process outputs are being reviewed? (e.g., content generation, code review, medical diagnosis
  support)'
- 'Determine WHY human review is needed: regulatory requirement, high stakes, model uncertainty, edge case domain'
- 'Define the review_trigger condition precisely: what score, flag, or output property routes to human? (confidence threshold,
  domain label, toxicity score, output category)'
- 'Identify the reviewer population: who has the expertise to judge this output? Map to roles (L1: generalist, L2: domain
  expert, L3: senior/legal/admin)'
- 'Determine approval_flow type: binary (simple accept/reject), edit (reviewer modifies output), or score (reviewer rates
  quality numerically)'
- 'Set realistic timeout_seconds based on SLA requirements and reviewer availability (default: 3600 for async, 300 for real-time)'
- 'Choose fallback_action: reject (safe for high-risk), accept_with_flag (low-risk with audit), retry (model can be re-run)'
- Check existing hitl_configs in P11/examples/ for the same workflow -- do not duplicate a gate that already covers this scope
phase_2_compose:
- Read SCHEMA.md -- source of truth for all fields
- Read OUTPUT_TEMPLATE.md -- fill the template following SCHEMA constraints
- 'Fill all required frontmatter fields; set `quality: null` -- never self-score'
- 'Write Overview section: what workflow, why human judgment is required, who is affected downstream'
- 'Write Review Trigger section: exact condition(s) as evaluable expressions; include threshold values; note what data the
  condition reads'
- 'Write Escalation Chain section: table with columns level, role, SLA (minutes), contact channel, escalation condition'
- 'Write Approval Flow section: which flow type (binary/edit/score), what each reviewer action means, how approved/rejected
  outputs are handled downstream'
- 'Write Timeout and Fallback section: timeout_seconds value, which escalation level it applies to, fallback_action and justification
  for why that fallback is appropriate for this risk level'
- Add optional Priority Rules section if high-risk outputs need fast-lane routing to senior reviewers
- Add optional Feedback Loop section if review decisions should feed back to model training
- Confirm body <= 3072 bytes
phase_3_validate:
- Check QUALITY_GATES.md -- verify each HARD gate manually
- Confirm YAML frontmatter parses without errors
- Confirm `id` matches `^p11_hitl_[a-z][a-z0-9_]+$`
- Confirm escalation_chain list has >= 2 roles
- 'Confirm approval_flow is one of: binary, edit, score'
- 'Confirm fallback_action is one of: reject, accept_with_flag, retry'
- Confirm timeout_seconds > 0
- Confirm no reviewer SLA is longer than timeout_seconds (escalation chain must fit within timeout)
- Confirm review_trigger is a precise, evaluable condition -- not vague prose
- Confirm `quality` is null
- Confirm body <= 3072 bytes
- 'Cross-check: does this require human judgment? If it can be fully automated, it belongs in `guardrail` (automated block)
  or `quality_gate` (automated score). hitl_config is ONLY for cases where human decision is required.'
- 'If score < 8.0: revise in the same pass before outputting'
