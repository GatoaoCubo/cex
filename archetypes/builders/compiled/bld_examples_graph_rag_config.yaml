golden_example: "---\ntitle: \"Graph RAG Configuration for Legal Document Analysis\"\nkind: graph_rag_config\n---\nGraph Database:\
  \ Neo4j (version 5.19.0)\nVector Store: Pinecone (index: \"legal-docs-2024\")\nRAG Components:\n- LLM: GPT-4 (OpenAI) for\
  \ query refinement and answer generation\n- Graph Traversal: BFS with depth limit 3 for entity relationship exploration\n\
  - Node Types:\n  - `Case`: Properties include `case_id`, `court`, `date`\n  - `Entity`: Properties include `name`, `type`\
  \ (person, organization)\n  - `Citation`: Links `Case` nodes via `CITES` relationships\nEdge Types:\n- `RELATED_TO`: Connects\
  \ entities mentioned in the same document\n- `REFERRED_IN`: Links cases to cited legal precedents\nQuery Flow:\n1. User\
  \ input → 2. Vector search in Pinecone → 3. Graph traversal → 4. LLM answer synthesis\nTraversal Constraints:\n- Max hops:\
  \ 3\n- Filter: Only include nodes with `relevance_score > 0.7`"
anti_example_1_confusing_config_with_knowledge_graph_data: '---

  title: "Legal Knowledge Graph"

  kind: graph_rag_config

  ---

  Nodes:

  - `Case_1234`: {court: "Supreme Court", date: "2022-05-15"}

  - `Entity_5678`: {name: "John Doe", type: "person"}

  Edges:

  - `Case_1234` --[CITES]--> `Case_9876`

  ## Why it fails

  This example describes actual graph data (nodes/edges) instead of the architecture configuration. It violates the boundary
  by acting as a knowledge graph instance rather than defining how the RAG system interacts with the graph.'
anti_example_2_missing_critical_components: '---

  title: "Minimal Graph RAG Setup"

  kind: graph_rag_config

  ---

  Graph Database: Neo4j

  Vector Store: Not specified

  Traversal: DFS without depth limits

  ## Why it fails

  The configuration omits essential components like the vector store integration and lacks explicit RAG pipeline details.
  Without a defined vector store and traversal constraints, the system cannot effectively retrieve or synthesize answers from
  the graph.'
