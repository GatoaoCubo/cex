phase_1_research:
- Analyze real-time protocol requirements (e.g., UDP, TCP, QUIC).
- Benchmark latency, throughput, and packet loss tolerance.
- Identify security constraints (encryption, authentication).
- Evaluate compatibility with existing network infrastructure.
- Define Quality of Service (QoS) parameters.
- Review industry standards (RFCs, IETF specs).
phase_2_compose:
- Set up working directory with SCHEMA.md and OUTPUT_TEMPLATE.md.
- Define transport layer parameters (port ranges, MTU).
- Map schema fields to config artifact structure.
- Write config using template syntax (YAML/JSON).
- Apply CONSTRAIN rules from Pillar P09.
- Embed protocol-specific settings (e.g., QUIC version).
- Add error handling for invalid configurations.
- Document config with inline comments.
- Finalize artifact with versioning and metadata.
