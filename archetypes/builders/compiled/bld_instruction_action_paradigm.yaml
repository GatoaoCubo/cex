phase_1_research:
- Analyze existing action paradigms (e.g., reactive, deliberative, hybrid).
- Map agent-environment interaction models (e.g., state-action spaces, reward functions).
- Study action representation formats (e.g., discrete, continuous, symbolic).
- Investigate execution mechanisms (e.g., rule-based, learning-based, hybrid).
- Review validation criteria for action reliability and adaptability.
- Document case studies of successful action paradigm implementations.
phase_2_compose:
- Define schema structure per SCHEMA.md (action types, parameters, outcomes).
- 'Specify function CALL interface (input: environment state; output: action).'
- Map action types to environment-specific APIs (e.g., robotics, simulation).
- Write execution logic for each action type (e.g., planning, reacting, learning).
- Integrate validation hooks (e.g., pre/post-condition checks, error handling).
- Use OUTPUT_TEMPLATE.md to format artifact (e.g., YAML, JSON, code blocks).
- Add examples for each action type with environment-specific parameters.
- Embed references to research findings (Phase 1) in artifact metadata.
- Finalize artifact with versioning, authorship, and usage guidelines.
phase_3_validate:
- '[ ] Verify schema compliance with SCHEMA.md (all required fields present).'
- '[ ] Confirm action_type is classified (reactive/deliberative/hierarchical/hybrid).'
- '[ ] Verify preconditions and postconditions are defined for all actions.'
- '[ ] Confirm failure recovery is documented for each action class.'
- '[ ] Validate id matches pattern: p04_act_[a-z0-9_]+'
- '[ ] Run H01-H08 quality gate checks before delivering.'
