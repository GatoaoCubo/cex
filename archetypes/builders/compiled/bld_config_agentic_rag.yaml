tldr: Naming, paths, limits for agentic RAG retrieval + agent tool plan + reflection loop
domain: agentic_rag construction
created: '2026-04-14'
updated: '2026-04-14'
density_score: 0.85
naming_convention: 'Pattern: `p01_arag_<name>.yaml` Examples: `p01_arag_research_agent.yaml`, `p01_arag_sales_query.yaml`'
paths: 'Artifacts: `/mnt/cex/data/artifacts/agentic_rag/` Tool traces: `/var/log/cex/agentic_rag/traces/` Retrieval cache:
  `/tmp/cex/agentic_rag/retrieval_cache/` Reflection plans: `/mnt/cex/data/agentic_rag/plans/`'
limits: 'max_bytes: 4096 max_turns: 8 max_tool_calls: 12 max_retrieval_depth: 3 max_reflection_iterations: 4 effort_level:
  4'
agent_tool_registry: 'tools: [retrieve_vector, retrieve_graph, generate_subquery, reflect_plan, rerank_results] plan_strategy:
  react retrieval_policy: adaptive'
hooks: 'pre_build: validate_retriever_registry post_build: score_tool_plan_coverage on_error: rollback_plan_state on_quality_fail:
  trigger_reflection_retry'
