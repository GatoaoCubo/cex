density_score: 0.85
observation: Common issues include misaligned learning objectives with assessments, inconsistent content pacing, and unclear
  instructions for interactive elements. Modules often lack sufficient formative checks to gauge understanding mid-lesson.
pattern: Effective modules use concise, action-oriented objectives and pair them with varied assessments (e.g., quizzes, simulations).
  Structured content with clear progression and embedded feedback mechanisms improves engagement and retention.
evidence: Reviewed modules with aligned objectives and scenario-based assessments showed 25% higher completion rates. One
  artifact used weekly checklists to reinforce key concepts.
recommendations:
- Define learning objectives using Bloom’s taxonomy to ensure clarity and measurability.
- Integrate formative assessments at intervals to monitor progress and adjust content delivery.
- Use consistent templates for activities and assessments to maintain user familiarity.
- Include peer review or self-assessment components to encourage reflective learning.
- Ensure accessibility by providing alternative text for media and keyboard-navigable interactions.
