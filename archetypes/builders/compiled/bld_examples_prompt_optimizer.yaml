golden_example: '--- tool: PromptHero Prompt Optimizer version: 2.1.0 description: "Automated prompt refinement and compilation
  for LLMs" vendor: PromptHero Inc. license: Apache-2.0 --- Functionality Optimizes prompts via context-aware rephrasing,
  query expansion, and intent alignment. Integrates with Anthropic''s Claude 3 for real-time feedback. Example: Converts "Write
  a story" → "Write a 500-word sci-fi story about AI ethics with a twist ending." Use Case Enhances query precision for Meta''s
  Llama 3, reducing hallucinations by 37% in enterprise NLP pipelines.'
anti_example_1_conflating_with_prompt_compiler: '--- tool: CEX Internal Prompt Compiler version: 1.0.0 description: "Compiles
  prompts into executable code for LLMs" vendor: CEX Engineering license: Proprietary --- Functionality Generates code templates
  from natural language prompts. Example: Converts "Sort this data" → Python script with Pandas. Use Case Used in CEX''s internal
  data processing workflows.'
why_it_fails: Lacks specificity in optimization techniques (e.g., no mention of rephrasing, alignment, or integration with
  LLMs). Fails to meet CEX kind requirements for actionable, well-defined functionality.
