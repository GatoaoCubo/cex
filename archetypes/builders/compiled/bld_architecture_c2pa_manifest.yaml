architectural_position: 'c2pa_manifest occupies the P10 content provenance layer. It is the media-side complement to vc_credential
  (agent identity side). While vc_credential attests WHO the agent is, c2pa_manifest attests WHAT the agent produced. Together
  they form the full provenance chain: issuer identity (VC) -> generation context (C2PA manifest) -> output content. Upstream:
  model-card (P02) for model attribution. Downstream: content distribution platforms, compliance auditors, CAI verification
  portal.'
