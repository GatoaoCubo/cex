kind: collaboration
id: bld_collaboration_openapi_spec
pillar: P12
llm_function: COLLABORATE
purpose: How openapi-spec-builder works in crews with other builders
pattern: each builder must know its ROLE in a team, what it RECEIVES and PRODUCES
quality: null
title: Collaboration OpenAPI Spec
version: 1.0.0
author: n03_builder
tags:
- openapi_spec
- builder
- collaboration
tldr: API contract specialist. Upstream of api_client and api_reference. Downstream of domain model design.
domain: openapi spec construction
created: '2026-04-17'
updated: '2026-04-17'
density_score: 0.9
my_role_in_crews: 'I am an API CONTRACT SPECIALIST. I answer ONE question: "what is the machine-readable surface of this REST
  API?" I do not write SDK code. I do not write human documentation. I do not handle async events. I declare the API contract
  in OAS 3.x format consumed by tooling.'
crew_compositions: ''
crew_api_first_development: "  1. openapi-spec-builder    -> \"OAS 3.x contract (machine-readable)\"\n  2. api-reference-builder\
  \   -> \"human-readable docs from spec\"\n  3. api-client-builder      -> \"SDK implementation from spec\"\n  4. event-schema-builder\
  \    -> \"async event schemas alongside REST\""
crew_integration_package: "  1. data-contract-builder   -> \"producer-consumer SLA and data model\"\n  2. openapi-spec-builder\
  \    -> \"REST API surface (paths, schemas, security)\"\n  3. event-schema-builder    -> \"event payload schemas\"\n  4.\
  \ agent-builder           -> \"agent that consumes the API\""
crew_api_gateway_configuration: "  1. openapi-spec-builder    -> \"API contract for gateway import\"\n  2. rate-limit-config-builder\
  \ -> \"inbound throttle per endpoint\"\n  3. env-config-builder      -> \"API keys, base URLs, timeouts\""
handoff_protocol: ''
i_receive:
- 'seeds: API name, base URL, list of endpoints with purpose'
- 'data models: entity names and their key fields'
- 'auth requirement: JWT, API key, OAuth2, or public'
- 'error handling requirements: what status codes are expected'
i_produce:
- openapi_spec artifact (.md with YAML frontmatter + OAS document)
- 'committed to: `N0X_{domain}/P06_schema/p06_oas_{api_slug}.md`'
i_signal:
- 'signal: complete (with quality score)'
- 'if quality < 8.0: signal retry with gate failures listed'
builders_i_depend_on: None for contract definition -- independent builder (layer 0). May reference data_contract for shared
  schema definitions.
builders_that_depend_on_me: '| Builder | Why |

  |---------|-----|

  | api-client-builder | Generates SDK code from OAS spec |

  | api-reference-builder | Renders human docs from OAS spec |

  | agent-builder | Agents reference spec for tool configuration |

  | env-config-builder | API base URLs defined in servers section |'
