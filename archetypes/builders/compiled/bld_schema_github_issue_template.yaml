  \ the issue and assign priority (high/medium/low).\n\n4. Related Issues and Dependencies\n   Link to related issues or dependencies\
  \ (e.g., blocked_by, related_issues).\n\n5. TLDR Summary\n   Concise one-sentence summary of the issue."
constraints:
