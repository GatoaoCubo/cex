kind: collaboration
id: bld_collaboration_ontology
pillar: P12
llm_function: COLLABORATE
purpose: How ontology-builder works in crews with other builders
pattern: each builder must know its ROLE in a team, what it RECEIVES and PRODUCES
quality: null
title: Collaboration Ontology
version: 1.0.0
author: n03_builder
tags:
- ontology
- collaboration
- P01
- crew
- builder
tldr: 'ontology-builder crew role: defines classification structure consumed by knowledge_graph, rag_source, and embedding_config
  builders.'
domain: ontology construction
created: '2026-04-13'
updated: '2026-04-13'
density_score: 0.9
my_role_in_crews: 'I am a SCHEMA SPECIALIST. I answer ONE question: "what classes, properties, and axioms define this knowledge
  domain?" I do not populate entity instances. I do not write single-term definitions. I define the CLASSIFICATION SYSTEM
  so downstream builders (knowledge_graph, rag_source, embedding_config) have a schema to build against.'
crew_compositions: ''
crew_knowledge_domain_setup: "  1. ontology-builder -> \"classification structure: classes, properties, axioms\"\n  2. glossary-entry-builder\
  \ -> \"human-readable definitions for each class\"\n  3. knowledge-graph-builder -> \"entity instances conforming to ontology\
  \ schema\""
crew_rag_knowledge_system: "  1. ontology-builder -> \"domain taxonomy for chunk categorization\"\n  2. chunk-strategy-builder\
  \ -> \"how to segment documents by ontology class\"\n  3. rag-source-builder -> \"document corpus with class-annotated chunks\"\
  \n  4. embedding-config-builder -> \"vector config using ontology class namespaces as filters\"\n  5. retriever-config-builder\
  \ -> \"retrieval pipeline filtered by ontology class\""
crew_structured_data_pipeline: "  1. ontology-builder -> \"schema.org-mapped class hierarchy\"\n  2. knowledge-graph-builder\
  \ -> \"entity instances for structured data markup\"\n  3. output-template-builder -> \"JSON-LD templates using ontology\
  \ namespace\""
handoff_protocol: ''
i_receive:
- 'seeds: domain name, list of candidate classes, primary standard preference'
- 'optional: existing schema.org class names to map to, property requirements, axiom requirements'
- 'context: any existing ontologies in the same domain to extend rather than duplicate'
i_produce:
- ontology artifact (.md + compiled .yaml)
- 'committed to: `P01_knowledge/examples/p01_ont_{name}.md`'
i_signal:
- 'signal: complete (with quality score from QUALITY_GATES)'
- 'if quality < 8.0: signal retry with failure reasons listed'
builders_i_depend_on: '| Builder | Why |

  |---------|-----|

  | guardrail-builder | Security rules for ontology logical consistency may require a guardrail |'
builders_that_depend_on_me: '| Builder | Why |

  |---------|-----|

  | knowledge-graph-builder | KG populates entity instances conforming to my class schema |

  | glossary-entry-builder | Glossary entries link to my class hierarchy for formal backing |

  | rag-source-builder | RAG corpus uses my ontology classes for chunk-level metadata |

  | embedding-config-builder | Vector config uses my namespace prefixes as metadata filters |

  | retriever-config-builder | Retrieval pipeline uses my class labels as filter dimensions |

  | output-template-builder | JSON-LD templates reference my class URIs and namespace |'
conflict_resolution: '| Conflict | Resolution |

  |----------|-----------|

  | Two ontologies define same class differently | Use earlier version as canonical; extend with subclass in newer version
  |

  | Local class collides with schema.org class | Map local class to schema.org class directly; do not redefine |

  | Standard mismatch (OWL vs SKOS requested) | Use `standard: mixed`; annotate each class with its standard origin |

  | Domain boundary dispute (medical vs clinical) | Narrow to most specific domain slug; create separate ontology for other
  domain |'
