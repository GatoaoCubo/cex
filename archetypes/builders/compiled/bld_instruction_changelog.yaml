density_score: 0.85
phase_1_research:
- Identify latest version using semver (e.g., `v1.2.3`).
- Extract feature additions from code commits and PRs.
- List bug fixes from issue trackers and test results.
- Document breaking changes affecting API/UX from release notes.
- Cross-reference with previous changelogs for consistency.
- Verify semver compliance (major/minor/patch) based on changes.
phase_2_compose:
- Create new changelog entry in SCHEMA.md format.
- Set version header (e.g., `## v1.2.3 - 2023-10-01`).
- Populate `Features` section with user-facing improvements.
- Detail `Fixes` with issue IDs and resolved problems.
- Highlight `Breaking Changes` with migration steps.
- Use OUTPUT_TEMPLATE.md for markdown syntax and structure.
- Ensure semver tags align with version header.
- Validate section headings match SCHEMA.md requirements.
- Proofread for clarity, grammar, and alignment with product goals.
phase_3_validate:
- '[ ] ✅ Semver format matches `vX.Y.Z` in header and tags.'
- '[ ] ✅ All required sections (`Features`, `Fixes`, `Breaking Changes`) present.'
- '[ ] ✅ Changes categorized correctly per impact (e.g., no fixes in features).'
- '[ ] ✅ Template syntax (bold, links, lists) adheres to OUTPUT_TEMPLATE.md.'
- '[ ] ✅ Peer review confirms accuracy and completeness.'
