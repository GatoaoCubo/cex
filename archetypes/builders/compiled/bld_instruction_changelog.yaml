updated: '2026-04-14'
density_score: 0.85
phase_1_research:
- Identify the version being documented using SemVer (MAJOR.MINOR.PATCH per semver.org).
- 'Determine version bump type: MAJOR (breaking changes), MINOR (new features), PATCH (fixes only).'
- 'Collect Added entries: new features or capabilities introduced.'
- 'Collect Changed entries: modifications to existing functionality.'
- 'Collect Deprecated entries: features flagged for future removal with removal timeline.'
- 'Collect Removed entries: features deleted in this release.'
- 'Collect Fixed entries: bug fixes with issue IDs and PR references.'
- 'Collect Security entries: vulnerability patches with CVE references where applicable.'
- Cross-reference previous changelog entries for consistent terminology.
phase_2_compose:
- Create new entry per bld_schema_changelog.md field spec.
- 'Set version header: `## [X.Y.Z] - YYYY-MM-DD` (Keep a Changelog format).'
- Maintain `## [Unreleased]` section at top for in-progress changes.
- 'Populate `### Added` section with new capabilities (imperative: "Add X").'
- 'Populate `### Changed` section with modified behavior (imperative: "Change Y").'
- Populate `### Deprecated` section with removal notices and target version.
- 'Populate `### Removed` section with deleted features (imperative: "Remove Z").'
- 'Populate `### Fixed` section with issue ID and resolution (imperative: "Fix A").'
- Populate `### Security` section with CVE ID and affected versions.
- For MAJOR versions, add `### Migration` section with step-by-step upgrade path.
- Prefix breaking-change entries with "BREAKING:" for scanner visibility.
- Use bld_output_template_changelog.md for markdown structure.
phase_3_validate:
- '[ ] SemVer format X.Y.Z (no leading `v`) in frontmatter version field.'
- '[ ] All 6 Keep a Changelog sections present (Added/Changed/Deprecated/Removed/Fixed/Security).'
- '[ ] MAJOR bump includes Migration section with actionable steps.'
- '[ ] Breaking change entries prefixed with "BREAKING:".'
- '[ ] Each entry uses imperative mood: "Add X", "Fix Y", "Remove Z".'
- '[ ] Peer review confirms accuracy against issue tracker and PRs.'
