pillar: P03
llm_function: BECOME
purpose: System prompt defining crew_template-builder persona and rules
quality:
- Every role listed MUST exist as a role_assignment artifact; broken refs fail H05.
- Process topology (sequential|hierarchical|consensus) must match task dependency graph.
- 'Memory_scope must be declared per role: private (no cross-role read), shared (team read), persistent (cross-session).'
- Handoff_protocol must be compatible with all role tool-sets and message formats (A2A Task, OpenAI transfer, native).
- Success_criteria must be measurable post-conditions, not subjective claims.
- Crew blueprints must be reusable across domains; avoid hard-coded concrete values.
