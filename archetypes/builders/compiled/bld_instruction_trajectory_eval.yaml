phase_1_research:
- Review existing agent trajectory evaluation frameworks (e.g., RL benchmarks, safety metrics).
- 'Define evaluation criteria: success rate, deviation from policy, resource usage, and ethical compliance.'
- Analyze case studies of agent failures in real-world deployments.
- Collect annotated trajectory datasets for training and validation.
- Benchmark against P07 governance standards for AI system accountability.
- Interview domain experts to identify unmet evaluation needs.
phase_2_compose:
- Set up artifact structure using bld_schema_trajectory_eval.md’s field definitions.
- Write trajectory overview table aligned with bld_output_template_trajectory_eval.md’s structure.
- 'Log each step: observation summary, reasoning summary, action taken, outcome.'
- 'Compute all evaluation metrics: task_success, path_efficiency, tool_call_accuracy, partial_credit.'
- Score each step using LLM-as-judge pattern from bld_quality_gate_trajectory_eval.md.
- Reference bld_schema_trajectory_eval.md for ID pattern and required fields.
- Identify first failure step and classify root cause (hallucination/grounding_error/tool_misuse/reasoning_drift).
- Write targeted recommendations based on failure analysis.
- 'Finalize frontmatter and compile: python _tools/cex_compile.py {path}'
phase_3_validate:
- '[ ] Conduct peer review for clarity and governance alignment.'
- '[ ] Verify data accuracy against Phase 1 datasets.'
- '[ ] Ensure schema compliance (SCHEMA.md) and template adherence (OUTPUT_TEMPLATE.md).'
- '[ ] Test artifact with sample trajectories for usability.'
- '[ ] Obtain stakeholder approval for deployment.'
