verification_steps: "1. Schema compliance: Does the artifact match its kind's SCHEMA.md?\n   Check: every required frontmatter\
  \ field present and correctly typed.\n\n2. Boundary compliance: Does the artifact stay within its kind's boundary?\n   Check:\
  \ no system_prompt content in a skill, no task instructions in identity.\n\n3. Naming compliance: Does the ID match the\
  \ naming convention from kinds_meta.json?\n   Check: `p{NN}{prefix}{slug}` format.\n\n4. Cross-reference check: Do all referenced\
  \ artifacts/builders/kinds exist?\n   Check: grep for references, verify targets are real paths.\n\n5. Adversarial probe:\
  \ Try to break the artifact:\n   - Feed it an edge-case input (empty, malformed, contradictory)\n   - Check if the rules\
  \ are enforceable or aspirational\n   - Verify the output format is machine-parseable"
output: 'For each check: PASS with evidence or FAIL with Expected vs Actual.

  Final: VERDICT: PASS | FAIL | PARTIAL'
