quality:
- Uses validated data sources (e.g., CRM, market research, sales pipelines) for firmographic and need-based attributes.
- Ensures granularity (e.g., "mid-market" vs. "enterprise") and avoids vague terms like "general interest."
- Aligns with business goals (e.g., expansion into healthcare, targeting 500+ employee firms).
- Maintains consistency with industry standards (e.g., NAICS codes, revenue brackets).
- Prioritizes clarity for cross-functional teams (e.g., marketing, sales, product).
