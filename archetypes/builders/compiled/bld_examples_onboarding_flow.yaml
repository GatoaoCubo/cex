golden_example: "Title: Binance Onboarding Flow with Activation Milestones  \nKind: onboarding_flow  \nDescription: A streamlined\
  \ onboarding process for new users with clear milestones and an aha-moment at first trade.  \nBoundary: Activation flow\
  \ (account creation to first trade).  \n\nSteps:  \n1. Sign-up: Google reCAPTCHA + email verification (via SendGrid).  \n\
  2. KYC: Upload ID (via Stripe KYC).  \n3. Wallet Setup: Connect MetaMask (via WalletConnect).  \n4. First Deposit: Prompt\
  \ to deposit fiat (via Plaid integration).  \n5. Aha-Moment: Display \"Your first $100 in BTC is ready!\" after deposit\
  \ confirmation.  \n6. First Trade: Guided trade tutorial (via TradingView widget).  \n7. Completion: Badge \"Pro Trader\"\
  \ + referral incentive (via Airtable).  \n\nAha-Moment Design:  \n- Visual highlight of asset growth post-deposit.  \n-\
  \ Micro-interaction on trade completion (\"You’ve unlocked X tokens!\")."
anti_example_1_missing_aha_moment: "Title: Coinbase Onboarding Flow (Incomplete)  \nKind: onboarding_flow  \nDescription:\
  \ A flow that ends at KYC completion without celebrating user progress.  \nBoundary: Activation flow.  \n\nSteps:  \n1.\
  \ Sign-up with email.  \n2. KYC verification.  \n3. End flow.  \n\nWhy it fails:  \n- No clear milestone or aha-moment after\
  \ KYC. Users feel unguided and disengaged.  \n- Missing the critical step of linking wallet or making a first trade."
anti_example_2_over_complicated_milestones: "Title: Kraken Onboarding Flow (Cluttered)  \nKind: onboarding_flow  \nDescription:\
  \ 12 steps with vague milestones and no progress tracking.  \nBoundary: Activation flow.  \n\nSteps:  \n1. Sign-up.  \n\
  2. Verify phone.  \n3. Upload ID.  \n4. Set password.  \n5. Choose trading preferences.  \n6. ... (steps 6–12 omitted for\
  \ brevity).  \n\nWhy it fails:  \n- Excessive steps without clear purpose or value proposition.  \n- No aha-moment to motivate\
  \ users; high drop-off at step 4."
