golden_example: "---  \ntitle: Legal Vertical Artifact for Contract Analysis  \nkind: legal_vertical  \nvendor: ContractWorks\
  \  \nuse_case: Contract Review for M&A Transactions  \ndate: 2023-10-05  \n---  \nPrivilege Management: Uses AI to flag\
  \ privileged communications in due diligence, integrating with Relativity for e-discovery workflows.  \nBillable Hour Tracking:\
  \ Syncs with Bill.com to auto-generate time entries for contract review tasks, reducing manual logging by 40%.  \nContract\
  \ Analysis: Parses 10,000+ clauses across 500+ contracts using natural language processing, identifying non-compliance with\
  \ GDPR and CCPA.  \nUse Cases: Deployed by Baker McKenzie for cross-border merger contracts, reducing review time from 8\
  \ weeks to 3 weeks.  "
