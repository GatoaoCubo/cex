phase_1_research:
- Define problem domain, reward structure, and environment dynamics.
- Review RL literature for suitable algorithm (e.g., DQN, PPO, SAC).
- Select benchmark environments (e.g., OpenAI Gym, MuJoCo).
- Analyze hyperparameter sensitivity and exploration-exploitation tradeoffs.
- Identify baseline performance metrics (e.g., cumulative reward, convergence speed).
- Document research gaps and algorithmic modifications required.
phase_2_compose:
- Implement environment interface per SCHEMA.md (observation/action spaces).
- Define RL agent class with policy, value function, and training loop.
- Code reward shaping and discount factor (γ) per domain requirements.
- Integrate experience replay buffer and noise injection (if applicable).
- Write optimizer configuration (learning rates, batch sizes) from OUTPUT_TEMPLATE.md.
- Add logging hooks for training metrics (episodes, losses, rewards).
- Implement early stopping and checkpointing mechanisms.
- Write unit tests for policy update and environment interaction.
- Finalize code structure with version control and dependency management.
phase_3_validate: '[ ] ✅ Unit tests pass for all core functions (policy, loss, update). [ ] ✅ Training converges to baseline
  metrics in benchmark environments. [ ] ✅ Hyperparameter sweeps show stable performance across seeds. [ ] ✅ Algorithm adheres
  to SCHEMA.md and OUTPUT_TEMPLATE.md formats. [ ] ✅ Documentation covers usage, limitations, and tuning guidelines.'
