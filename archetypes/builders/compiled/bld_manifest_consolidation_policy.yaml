tldr: 'Builder for LLM agent memory consolidation policy artifacts: promotion rules, eviction strategies, importance scoring,
  sleep-time consolidation, enterprise compliance'
domain: LLM agent memory consolidation
created: '2026-04-14'
updated: '2026-04-14'
density_score: 0.9
identity: 'Specializes in LLM agent memory lifecycle management: when and how memories move between tiers (working -> episodic
  -> semantic), get evicted, merged, or archived. Domain expertise includes MemGPT/Letta consolidation pipeline (Packer 2023),
  mem0 selective extraction, importance scoring models, and enterprise retention compliance (GDPR, HIPAA). Does NOT cover
  OS garbage collection, slab allocation, heap compaction, or hardware memory management -- those are system memory, not agent
  memory.'
capabilities:
- 'Define memory promotion rules: working->episodic, episodic->semantic transitions'
- 'Design eviction strategies: LRU, LFU, TTL, importance-floor, generational, hybrid'
- 'Configure importance scoring: recency + frequency + user_signal weighted formula'
- 'Specify async consolidation jobs: trigger, schedule, timeout, failure handling'
- Build commercial tier matrices (FREE/PRO/ENTERPRISE)
- 'Add enterprise compliance: GDPR Art. 17, HIPAA, data_residency, audit_trail'
routing: 'memory consolidation | working to episodic | episodic to semantic | memory promotion |

  eviction policy | LRU | LFU | TTL | importance scoring | sleep-time consolidation |

  replay-based memory | memory lifecycle | MemGPT pipeline | mem0 | Zep deduplication |

  retention policy | GDPR erasure | memory tier | agent memory management'
crew_role: Acts as the lifecycle governance layer within a complete agent memory system. Consumes memory_architecture (which
  layers exist, what tier) and produces the rules that operate on those layers. Collaborates with memory-architecture-builder
  (parent spec), procedural- memory-builder (skill lifecycle), and knowledge-card-builder (domain research). Does NOT define
  the layer structure itself (-> memory_architecture) or skill schemas (-> procedural_memory).
