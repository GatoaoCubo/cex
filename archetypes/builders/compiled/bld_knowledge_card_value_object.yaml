core_concept: 'Value Object is the Evans DDD pattern for domain attributes that have no identity. Equality is structural:
  two Money(10, USD) instances are identical and interchangeable. Immutability is absolute: to change a value, construct a
  new instance.'
when_to_use:
- Domain attribute is defined entirely by its data (Money, Email, Address)
- Two instances with same data are interchangeable (no tracking needed)
- Attribute has domain-level validation rules
- Attribute participates in rich transformations (add, scale, convert)
when_not_to_use:
- 'Object needs to be tracked over time (identity): use entity instead'
- 'Simple enum: use enum_def'
- 'Generic type alias without domain semantics: use type_def'
- 'Raw input validation (pre-domain): use input_schema'
key_properties_from_evans:
- No identity -- no id/uuid field
- Immutable -- constructor sets all attributes, no setters
- Structural equality -- equals() compares all attributes
- Whole value -- carries validation at construction time (invalid state impossible)
- Side-effect-free transformations -- withX() returns new instance
