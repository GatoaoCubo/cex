phase_1_research:
- Identify the AI system or domain being profiled (e.g., GenAI chatbot, automated decision system, recommendation engine).
- Determine applicable AI 600-1 GenAI risk categories relevant to the system.
- Map organizational context to NIST AI-RMF functions (GOVERN/MAP/MEASURE/MANAGE).
- Gather existing governance policies, risk registers, and audit findings.
- Identify action-IDs from the NIST AI-RMF Playbook applicable to identified risks.
- Cross-reference with ISO/IEC 42001 controls and EU AI Act obligations for crosswalk table.
phase_2_compose:
- Reference SCHEMA for required fields (profile scope, function coverage, risk categories, action-IDs).
- For each of 4 functions (GOVERN/MAP/MEASURE/MANAGE), list applicable action-IDs and implementation status.
- For each of 12 GenAI risk categories, assign severity level and map to controlling action-IDs.
- Populate crosswalk table linking AI-RMF actions to ISO 42001 controls (where applicable).
- Document risk response approach per category (Accept / Mitigate / Transfer / Avoid).
- 'Include profile scope declaration: system name, deployment context, profiler identity, review date.'
- Flag gaps where action-IDs have no implementation assigned.
- Add evidence pointers (policy docs, test results, audit logs) per action-ID where available.
- Proofread for action-ID format consistency (e.g., GV-1.1 not "Govern 1.1").
phase_3_validate:
- '[ ] All 4 functions (GOVERN/MAP/MEASURE/MANAGE) addressed with at least 1 action-ID each.'
- '[ ] All 12 GenAI risk-categories from AI 600-1 listed with severity assignments.'
- '[ ] Action-IDs follow NIST format (GV/MP/MS/MG prefix + numeric suffix).'
- '[ ] Profile scope field present (system name, context, review date).'
- '[ ] Crosswalk table has at least ISO 42001 column populated.'
- '[ ] No action-ID referenced that does not exist in NIST AI-RMF Playbook v1.0.'
