title: Instruction Bounded Context Builder
density_score: 0.84
updated: '2026-04-17'
phase_1_scope:
- Name the bounded context (noun phrase from domain language, not tech terms)
- 'Write the scope statement: what domain model applies HERE (not in other BCs)'
- Identify the team/squad that owns this context
- List the key aggregates and their relationships within this BC
- Identify neighboring BCs and their integration patterns
phase_2_compose:
- Read bld_schema_bounded_context.md for required fields
- 'Set id: bc_{context_name} (snake_case, domain language)'
- Set domain_vocabulary reference (dv_{context}_vocabulary.md)
- 'Document integration patterns with neighboring contexts:'
- 'ACL (Anti-Corruption Layer): protecting this BC from upstream model'
- 'OHS (Open Host Service): publishing a public API for consumers'
- 'CF (Conformist): adopting upstream model as-is'
- 'Set quality: null -- never self-score'
phase_3_validate:
- 'HARD gates:'
- id follows pattern bc_{context}
- kind == bounded_context
- quality == null
- scope_statement present (what model applies here)
- team_owner present
- '>= 1 aggregate listed'
- 'SOFT gates:'
- domain_vocabulary reference present
- integration patterns documented with rationale
- upstream_contexts and downstream_contexts listed
- key invariants stated (business rules that hold within this BC)
