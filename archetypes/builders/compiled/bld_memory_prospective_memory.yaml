memory_scope: project
quality: null
title: Memory Prospective Memory
density_score: 0.9
llm_function: INJECT
summary: Prospective memory fails when action payloads are vague. An agent that restarts after context loss reads the reminder
  and must be able to execute it without any other context. This requires self-contained action payloads.
anti_pattern:
- 'action_payload: "do something later" -- not executable'
- No trigger_type -- agent cannot know when to fire
- No owner -- cannot route on reboot
- Confusing with schedule (P12) -- schedule is workflow config, not agent memory
