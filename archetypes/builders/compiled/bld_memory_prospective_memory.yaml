author: builder_agent
observation: Agents without prospective_memory missed follow-up tasks when context windows were cleared. Vague action payloads
  ('check something later') could not be executed by agents rebooted after context loss.
pattern:
- action_payload = full executable instruction (not "check something")
- 'trigger_type: always declare one of time, event, condition'
- 'For time triggers: set expiry for one-shot, recurrence for recurring'
- 'For condition triggers: polling mechanism must be declared'
- 'owner: always declare -- orphaned reminders cannot be executed after reboot'
