phase_1_research:
- Identify the target account segment (SMB/MM/ENT) and current ARR band.
- 'Extract product usage signals: active seats vs. licensed seats, feature adoption rate, usage velocity (WAU/MAU).'
- 'Map upsell triggers: seat threshold (>80% utilization), feature unlock events, integration milestones.'
- 'Identify cross-sell adjacency: which add-on SKUs have highest attach rate for this segment?'
- 'Review NRR benchmarks: current account NRR vs. target >120%.'
- 'Pull QBR history: last expansion conversation, customer health score, champion strength.'
phase_2_compose:
- Reference bld_schema_expansion_play.md for required fields (account_id, trigger_type, expansion_type, NRR_target).
- 'Define the expansion motion: seat upsell, tier upgrade, add-on cross-sell, or usage-based ramp.'
- 'Write the AE/CSM talk track: value narrative, business case, ROI calculation.'
- Set trigger thresholds and automation rules (e.g., alert when seat utilization > 80% for 14 days).
- 'Build the account mapping: economic buyer, champion, expansion blocker, procurement contact.'
- 'Define the QBR slide structure: current value delivered, expansion opportunity, success metrics.'
- 'Set NRR contribution calculation: expansion ARR / beginning ARR * 100.'
- 'Add objection handling: budget freeze, contract timing, competing priorities.'
- Define success criteria and follow-up cadence post-expansion conversation.
phase_3_validate:
- '[ ] Upsell triggers are quantified (not vague -- e.g., "> 80% seat utilization for 14 days").'
- '[ ] NRR model includes expansion, contraction, and churn components.'
- '[ ] Talk track has opening hook, value statement, ask, and next step.'
- '[ ] Account map covers economic buyer and champion (minimum 2 stakeholders).'
- '[ ] QBR structure maps to customer success metrics, not internal metrics.'
- '[ ] Cross-sell play references specific SKU and attach rate data.'
