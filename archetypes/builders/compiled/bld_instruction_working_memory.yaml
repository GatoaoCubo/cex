pillar: P03
llm_function: REASON
purpose: Step-by-step production process for working_memory
pattern: 3-phase pipeline (scope -> compose -> validate)
quality: null
title: Instruction Working Memory
version: 1.0.0
author: n03_builder
tags:
- working_memory
- builder
- instruction
tldr: '3-phase process: scope the task and context slots, compose with expiry and clear policy, validate gates.'
domain: working memory construction
created: '2026-04-17'
updated: '2026-04-17'
density_score: 0.9
phase_1_scope: "1. Identify the task: what specific in-flight task this memory serves (task_id)\n2. List required context\
  \ slots: what intermediate state does the task need to hold?\n   (e.g., current_step, accumulated_results, error_count,\
  \ intermediate_data)\n3. Determine capacity_limit: max tokens or slot count to prevent unbounded growth\n4. Set expiry:\
  \ TTL in seconds/minutes, or \"on_task_complete\" trigger\n5. Define clear_on_complete policy: what happens when task finishes\n\
  \   - CLEAR: wipe all slots (ephemeral use case)\n   - PROMOTE: move key slots to entity_memory or episodic_memory before\
  \ clearing\n6. Identify any slots that should survive task completion (candidates for promotion)\n7. Check for existing\
  \ working_memory artifacts with overlapping task_id"
phase_2_compose:
- Read SCHEMA.md -- source of truth for all fields
- Read OUTPUT_TEMPLATE.md -- fill `{{vars}}` following SCHEMA constraints
- 'Fill frontmatter: all required fields (quality: null)'
- 'Write context_slots: typed key-value schema for each slot'
- Declare capacity_limit with unit (tokens or slots)
- Write expiry policy (TTL or task-triggered)
- Write clear_on_complete with promotion targets if any
- 'Write Overview: what task this memory serves, why it needs working memory'
- 'Write Context Slots: table of slot name, type, purpose, example value'
- Verify body <= 3072 bytes
phase_3_validate:
- Check QUALITY_GATES.md -- verify each HARD gate manually
- Confirm id matches `^p10_wm_[a-z][a-z0-9_]+$`
- Confirm kind == working_memory
- Confirm task_id is declared and non-empty
- Confirm context_slots has >= 1 slot defined
- Confirm expiry is declared (TTL or trigger)
- 'Cross-check: no long-term facts (those belong in entity_memory), no session persistence (session_state), no past episodes
  (episodic_memory)'
- 'Revise if score < 8.0 -- most common fix: add slot type annotations or clear_on_complete policy'
