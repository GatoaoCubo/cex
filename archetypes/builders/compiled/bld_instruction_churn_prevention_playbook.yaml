phase_1_research:
- 'Identify churn signals: map health score components (usage, NPS, support tickets, QBR cadence).'
- 'Define at-risk thresholds: red (<40), yellow (40-60), green (>60) on 100-point scale.'
- 'Inventory churn reason taxonomy: product gap, budget cut, competitor switch, champion departure.'
- 'Audit historical saves: what interventions worked, what failed, at what health score range.'
- 'Map escalation chain: CSM -> CS Manager -> VP CS -> executive sponsor.'
- 'Identify win-back window: 30/60/90-day post-churn re-engagement viability.'
phase_2_compose:
- Reference bld_schema_churn_prevention_playbook.md for required frontmatter (id, kind, pillar, health_score_model).
- 'Write health score definition: components, weights, thresholds.'
- 'Define intervention triggers: score delta, days-inactive, days-to-renewal.'
- 'Write save-the-account script sections: opening, discovery, objection handlers, close.'
- 'Write win-back sequence: 30-day (acknowledge), 60-day (new value prop), 90-day (final offer).'
- 'Map Gainsight CTAs: trigger conditions, assignee, due date SLA.'
- 'Define success criteria: what constitutes a "save" (renewal signed, health restored).'
- Reference bld_output_template_churn_prevention_playbook.md for section structure.
- Cross-reference nps_survey kind for detractor signal integration.
phase_3_validate:
- '[ ] Health score model covers all 5 components (usage, NPS, support, engagement, contract).'
- '[ ] Intervention triggers cover all three risk bands (red, yellow, at-contract-renewal).'
- '[ ] Save script has opening, discovery, objection handling, and close sections.'
- '[ ] Win-back sequence has at least 3 touchpoints (30/60/90-day).'
- '[ ] Escalation path is fully defined (CSM -> VP CS minimum).'
- '[ ] Domain keywords present: churn, retention, health-score, save, win-back, at-risk.'
