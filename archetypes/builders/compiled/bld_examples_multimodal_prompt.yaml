golden_example: "model: \"Salesforce/blip\"\nmodalities: [image, text, audio]\ntask: \"Generate a caption for an image and\
  \ describe the corresponding audio\"\nprompt: |\n  [Image: A cat sitting on a windowsill]\n  [Audio: Meowing sound]\n  Describe\
  \ this scene and the audio in detail."
anti_example_1_text_only_prompt: 'model: "Salesforce/blip"

  modalities: [text]

  task: "Generate a caption"

  prompt: "Describe this image of a cat on a windowsill"'
why_it_fails: Includes model parameters (max_tokens, temperature) which belong to multi_modal_config, not the actual multimodal
  prompt content.
anti_example_2_model_configuration: "model: \"Salesforce/blip\"\nmodalities: [image, text]\ntask: \"Generate caption\"\nprompt:\
  \ |\n  [Image: Cat on windowsill]\n  max_tokens: 50\n  temperature: 0.7"
