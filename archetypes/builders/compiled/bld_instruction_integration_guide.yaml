phase_1_research:
- Gather API specifications, SDKs, and authentication protocols from platform partners.
- Interview paid-tier customers to identify onboarding pain points and integration requirements.
- Analyze existing documentation for gaps in workflow diagrams, error codes, and rate-limiting rules.
- Map integration patterns (e.g., OAuth 2.0, webhook subscriptions) used across partner ecosystems.
- Document platform-specific constraints (e.g., data formats, latency thresholds, compliance rules).
- Compile a list of use cases for core features (e.g., user provisioning, payment processing).
phase_2_compose:
- 'Structure the guide using SCHEMA.md’s hierarchy: overview, prerequisites, API references, code samples.'
- Write an introduction explaining the platform’s integration philosophy and partner benefits.
- Detail API endpoints with HTTP methods, parameters, and response formats (reference SCHEMA.md).
- Include code samples in multiple languages (Python, JavaScript, cURL) per OUTPUT_TEMPLATE.md.
- Explain authentication flows (API keys, OAuth, SSO) with step-by-step configuration guides.
- Add troubleshooting sections for common errors (4xx/5xx codes, timeout scenarios).
- Embed workflow diagrams for end-to-end onboarding processes (e.g., from registration to production).
- Reference OUTPUT_TEMPLATE.md to ensure consistency in terminology and formatting.
- Finalize with a checklist for partners to validate integration completeness.
phase_3_validate:
- '[ ] Confirm alignment with SCHEMA.md’s structure and OUTPUT_TEMPLATE.md’s formatting rules.'
- '[ ] Verify code samples execute without errors in sandbox environments.'
- '[ ] Ensure all API endpoints and authentication methods are accurately described.'
- '[ ] Validate that onboarding workflows match partner feedback from Phase 1.'
- '[ ] Obtain stakeholder approval for final content and technical accuracy.'
