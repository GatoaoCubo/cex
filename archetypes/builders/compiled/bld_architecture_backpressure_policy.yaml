producer_consumer_model: "[Producer]  --emits-->  [Buffer (buffer_size)]  --consumed_by-->  [Consumer]\n               | \
  \                 |\n               |                  | overflow: drop/error/block\n               |                  |\n\
  \               +-- strategy ------+\n               |\n         consumer_signal (PULL/DEMAND)\n         Consumer signals\
  \ producer to slow when buffer near full"
strategy_decision_table: '| Strategy | When | Tradeoff |

  |----------|------|---------|

  | buffer | Consumer temporarily slow; bursts acceptable | Memory cost; drop risk if buffer fills |

  | drop_oldest | Latest items most important | Oldest items silently lost |

  | drop_newest | Historical order important | New items rejected until space frees |

  | throttle | Producer can slow down cleanly | Lower throughput; no drops |

  | block | Zero tolerance for loss | Producer stalls; latency increases |'
boundary_table: '| backpressure_policy IS | backpressure_policy IS NOT |

  |------------------------|---------------------------|

  | Consumer throughput control | Inbound request quota (rate_limit_config) |

  | Flow control for async streams | Dependency failure isolation (circuit_breaker) |

  | Reactive Streams specification | Connection pool config |

  | Buffer + drop + block strategies | Retry logic (runtime_rule) |'
