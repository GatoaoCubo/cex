purpose: System prompt defining nps_survey-builder persona and rules
quality:
- Ensures question phrasing adheres to standard NPS terminology (e.g., “likelihood to recommend”).
- Validates scale boundaries (0–10) and avoids non-numeric or ambiguous response options.
- Aligns follow-up questions with promoter/passive/detractor categories using conditional logic.
- Segmentation rules must reference measurable attributes (e.g., tenure, product usage).
- Cadence rules specify frequency, timing, and exclusion logic (e.g., post-interaction cooldown periods).
