  \nlinked_artifacts:\n  primary: \"quality-gate-builder\"\n  related: [p11_qg_kc_publish, p07_gt_kc_prompt_caching]\n## Framework\
  \ Overview\n5D evaluates knowledge_cards across 5 orthogonal dimensions.\nDesigned to complement the KC quality_gate (P11)\
  \ which enforces HARD pass/fail.\nThis rubric provides the SOFT scoring framework for nuanced quality assessment.\n## Dimensions\n\
  | Dimension | Weight | Scale | Criteria | Example (10) | Example (5) |\n|-----------|--------|-------|----------|-------------|-------------|\n\
  | Density | 25% | 0-10 | Ratio of concrete data to total text >= 0.80 | 0.93 density, zero filler phrases | 0.65 density,\
  \ has \"this document describes\" |\n| Completeness | 25% | 0-10 | All required sections present, >= 3 bullets each | 7\
  \ sections, 4+ bullets, all fields filled | 4 sections, some empty, missing tags |\n| Actionability | 20% | 0-10 | Contains\
  \ commands, code, or specific steps | 3 CLI commands, 2 code snippets, concrete steps | General advice, no specific commands\
  \ |\n| Boundary | 15% | 0-10 | Clear IS/IS NOT, no drift to other types | Explicit boundary table, 3+ IS NOT rows | Vague\
  \ scope, overlaps with other kinds |\n| References | 15% | 0-10 | >= 1 source URL, dates, verifiable claims | 3 URLs, all\
  \ accessible, dated 2026 | No URLs, unverifiable claims |\n## Thresholds\n| Tier | Score | Action |\n|------|-------|--------|\n\
  | GOLDEN | >= 9.5 | Promote to calibration set, mark as reference |\n| PUBLISH | >= 8.0 | Merge to pool |\n| REVIEW | >=\
  \ 7.0 | Return with specific dimension feedback |\n| REJECT | < 7.0 | Redo from scratch with new research |\n## Calibration\n\
  - GOLDEN (9.8): p07_gt_kc_prompt_caching — density 0.93, 7 sections, 3 URLs, explicit boundary\n- PUBLISH (8.3): typical\
  \ KC with all sections, density 0.82, 1 URL, adequate boundary\n- REVIEW (7.2): KC with 5 sections, density 0.75, no URLs,\
  \ vague boundary\n- REJECT (5.0): KC with 3 sections, density 0.50, filler prose, no boundary section\n## Automation\n|\
  \ Dimension | Status | Tool |\n|-----------|--------|------|\n| Density | automated | validate_kc.py (char ratio calculation)\
  \ |\n| Completeness | automated | validate_kc.py (section/field counting) |\n| Actionability | manual | Human review for\
  \ command quality |\n| Boundary | semi-automated | Grep for IS/IS NOT patterns |\n| References | semi-automated | URL presence\
  \ check + manual accessibility |\n## References\n- AAC&U VALUE Rubrics: https://www.aacu.org/initiatives/value-initiative\n\
  - validate_kc.py v2.0 (CEX 5D implementation reference)\nWHY THIS IS GOLDEN:\n- quality: null (H06 pass)\n- id matches p07_sr_\
