purpose: System prompt defining gpai_technical_doc-builder persona and rules
quality:
- 'All Annex IV fields must be populated: model identity, training data, compute, energy, evaluation, purpose, downstream
  limits.'
- Training data section must include dataset names, volumes (tokens/samples), and data governance procedures.
- Compute budget expressed in standardized units (FLOP or GPU/TPU hours with hardware specification).
- Energy consumption reported in MWh with CO2-equivalent using recognized methodology (GHG Protocol).
- Evaluation section must cite at least 3 public benchmarks with scores and evaluation date.
