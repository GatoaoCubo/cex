domain_overview: This ISO applies to the dual loop pattern, coordinating an outer orchestrator with one or more inner worker
  loops. Dual-loop architecture is a control paradigm used in robotics, autonomous systems, and industrial automation to separate
  real-time execution (inner loop) from strategic decision-making (outer loop). The inner loop manages low-latency tasks like
  motor control and sensor feedback, while the outer loop handles higher-level planning, error correction, and goal adaptation.
  This separation ensures responsiveness and stability in dynamic environments, such as autonomous vehicle navigation or robotic
  manipulation. Industry adoption is driven by the need to balance speed and adaptability. For example, in aerospace, the
  inner loop ensures flight stability, while the outer loop optimizes trajectory planning. Similarly, in manufacturing, dual-loop
  systems enable real-time adjustments to production lines while maintaining long-term process goals.
key_concepts: '| Concept              | Definition                                                                 | Source                          |

  |----------------------|----------------------------------------------------------------------------|----------------------------------|

  | Inner Loop           | Real-time control layer handling actuation, sensor feedback, and PID control | Modern Robotics
  (Siciliano)  |

  | Outer Loop           | High-level planning layer for goal setting, error correction, and adaptation | Autonomous Systems
  (Kumar)    |

  | Feedback Integration | Mechanism to relay inner-loop sensor data to outer-loop decision-making      | IEEE 1878-2017                  |

  | Latency Compensation | Techniques to mitigate delays between loop layers (e.g., predictive control) | Control Systems
  Engineering   |

  | Hierarchical Control | Structured delegation of tasks between loops to avoid conflicts              | ISO 26262:2018                  |

  | Dynamic Reconfiguration | Ability to adjust loop priorities during runtime (e.g., emergency braking) | Robotics: Science
  and Systems |

  | Feedforward Control  | Outer-loop prediction of disturbances to preempt inner-loop corrections      | Feedback Control
  Systems      |

  | Model Predictive Control (MPC) | Outer-loop optimization using system models for future state prediction | IEEE Transactions
  on Robotics |'
industry_standards:
- ROS (Robot Operating System)
- ISO 26262:2018 (Automotive functional safety)
- IEEE 1878-2017 (Autonomous system standards)
- Model Predictive Control (MPC) frameworks
- IEC 61508 (Functional safety of electrical/electronic systems)
common_patterns:
- Hierarchical task delegation – Assign distinct responsibilities to each loop.
- Feedback-driven adaptation – Use inner-loop data to refine outer-loop goals.
- Latency-aware prioritization – Allocate resources to time-critical inner-loop tasks.
- Hybrid control modes – Switch between loops based on environmental conditions.
pitfalls:
- Confusing loop boundaries (e.g., outer-loop decisions violating inner-loop constraints).
- Overloading the outer loop with real-time data, causing delays.
- Ignoring latency in feedback paths, leading to instability.
- Hardcoding loop parameters, reducing adaptability in dynamic environments.
- Poor modularity between loops, complicating maintenance and scaling.
