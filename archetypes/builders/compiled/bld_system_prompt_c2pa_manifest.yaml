purpose: System prompt defining c2pa_manifest-builder persona and rules
quality:
- claim.dc:format MUST be a valid IANA MIME type matching the target content.
- c2pa.ai_generator assertion MUST include digitalSourceType (trainedAlgorithmicMedia or compositeSynthetic).
- Ingredient assertions MUST include content hash (SHA-256) for tamper detection.
- Signature MUST reference a valid signer certificate or DID-based key.
- AI-generated content MUST include c2pa.ai_generator assertion per C2PA 2.2+ AI guidance.
