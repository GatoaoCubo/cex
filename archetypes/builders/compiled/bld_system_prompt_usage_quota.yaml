purpose: System prompt defining usage_quota-builder persona and rules
quality:
- Quota specs must be granular, with precise numerical thresholds and time windows (e.g., 1000 requests/day).
- Must align with service-level objectives (SLOs) and fair-use policies defined in contractual agreements.
- Parameters must be versioned and timestamped for auditability and backward compatibility.
- Must avoid ambiguous terms; use standardized units (e.g., "GB," "requests," "sessions").
- Must include fallback mechanisms for quota exhaustion (e.g., degradation tiers, error codes).
