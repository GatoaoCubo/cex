density_score: 0.88
phase_1_research:
- 'Identify the provider: OpenAI Batch API, Anthropic Message Batches, Azure OpenAI, or custom.'
- Confirm the model supports batch mode -- not all models are batch-eligible (e.g., OpenAI gpt-4o supports batch; o1 does
  not; Anthropic claude-3-5-sonnet-20241022 supports Message Batches).
- 'Determine the endpoint path: `/v1/chat/completions` (OpenAI), `/v1/messages` (Anthropic), or provider-specific.'
- 'Establish batch sizing: how many requests per batch submission? What is the provider''s max (OpenAI: 50,000 requests or
  200MB per batch file).'
- 'Define the completion window: OpenAI offers 24h; Anthropic processes within minutes to hours. Document the SLA expectation.'
- 'Determine cost controls: what is the maximum acceptable spend per batch run? Note the discount rate (typically 50% vs sync
  API).'
- 'Define retry policy: how many retries on provider error? Exponential or fixed backoff? What is the threshold for declaring
  a batch failed vs partially succeeded?'
- 'Confirm input/output format: JSONL is standard. Identify storage location for input file and output file (S3, GCS, local
  path, or provider-managed storage).'
- Check existing batch_configs via brain_query [IF MCP] for the same provider -- do not duplicate a config already covering
  this use case.
phase_2_compose:
- Read SCHEMA.md -- source of truth for all fields.
- Read OUTPUT_TEMPLATE.md -- fill the template following SCHEMA constraints.
- 'Fill all required frontmatter fields; set `quality: null` -- never self-score.'
- 'Write Overview section: provider, use case, who triggers the batch, and which env var holds the credential.'
- 'Write Job Parameters section: table with parameter, value, description for provider, model, endpoint, max_requests, completion_window,
  concurrency.'
- 'Write Cost Controls section: cost_cap_usd, token_budget (if applicable), discount rate vs sync, and monitoring alert threshold.'
- 'Write Retry and Error Policy section: max_retries, backoff strategy (exponential recommended), per-request vs whole-batch
  retry behavior, dead-letter handling for permanently failed requests.'
- 'Write Input/Output Format section: format type (JSONL), request schema summary, response schema summary, storage path or
  bucket reference.'
- Confirm body <= 2048 bytes.
phase_3_validate:
- Check QUALITY_GATES.md -- verify each HARD gate manually.
- Confirm YAML frontmatter parses without errors.
- Confirm `id` matches `^p09_bc_[a-z][a-z0-9_]+$`.
- 'Confirm `provider` is one of: openai, anthropic, azure_openai, custom.'
- Confirm `completion_window` is >= 1h (batch is async; sub-hour = wrong kind).
- Confirm `cost_cap_usd` is set (financial control gate).
- Confirm no actual API keys or credentials appear anywhere in the artifact.
- Confirm `quality` is null.
- Confirm body <= 2048 bytes.
- 'Cross-check: is this a single bulk async request spec? If it has cron timing -- it belongs in `schedule`. If it has multiple
  dependent steps -- it belongs in `workflow`. If it governs per-request timeouts -- it belongs in `runtime_rule`. This artifact
  configures a bulk async job, not a pipeline.'
- 'If score < 8.0: revise in the same pass before outputting.'
