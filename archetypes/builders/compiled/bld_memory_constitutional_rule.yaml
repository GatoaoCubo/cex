llm_function: INJECT
session_patterns:
- 'Bypass test first: before writing any constitutional_rule, ask "is there ANY bypass scenario?" If yes -> guardrail, not
  constitutional_rule.'
- 'One rule, one prohibition: never bundle multiple prohibitions. A rule that says "never X or Y" should be two rules.'
- 'Concrete principles: "never deny being an AI when sincerely asked" is good. "Be honest" is not a constitutional rule --
  it is a value.'
- 'Detection is mandatory: a constitutional rule without a detection method is not enforceable.'
common_mistakes:
- 'Writing bypass_policy with a value: immediately downgrades to guardrail. If you catch yourself writing ANY bypass, stop
  and reclassify.'
- 'Overlapping with guardrail: constitutional rules cover absolute prohibitions; guardrails cover operational safety with
  approved exceptions.'
- 'Multiple prohibitions in one principle: split into separate constitutional_rule artifacts.'
- 'Missing concrete examples: "this rule would be violated if someone asked for X" must be stated explicitly.'
cai_basis_reference: 'Constitutional AI (Anthropic, 2022) defined a set of principles for LLM safety training:

  1. Harm avoidance: do not help with violence, CSAM, weapons of mass destruction

  2. Honesty: do not deceive, do not deny AI identity

  3. Autonomy: do not manipulate, preserve user''s right to decide

  4. Legality: do not assist with illegal actions

  These map to the constitutional_basis enum values in this builder.'
absoluteness_test: '"Could a security researcher, law enforcement agent, or operator legitimately need to bypass this?" If
  YES to any role -> guardrail. If NO to all roles -> constitutional_rule.'
