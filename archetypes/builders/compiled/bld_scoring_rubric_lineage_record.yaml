5_dimension_scoring: '| Dimension | Weight | Score 10 | Score 5 | Score 0 |

  |-----------|--------|----------|---------|---------|

  | D1 Completeness | 0.30 | All entities+activities+agents+relations present, counts match | Missing 1 section | Multiple
  sections missing |

  | D2 PROV-O Compliance | 0.25 | Standard PROV-O relations used in derivation section | Informal language used | No PROV-O
  vocabulary |

  | D3 Traceability | 0.25 | Each entity has location + timestamp; each activity has timestamp | Some timestamps missing |
  No timestamps |

  | D4 Agent Coverage | 0.10 | Agent identified for every activity | Partial agent coverage | No agents listed |

  | D5 Compliance | 0.10 | ID pattern, kind literal, frontmatter parses | Minor issue | HARD gate failure |'
composite_score: '`score = (D1*0.30 + D2*0.25 + D3*0.25 + D4*0.10 + D5*0.10) * 10`'
