phase_1_research: "This ISO configures a thinking budget: how many tokens the model may spend on internal reasoning before\
  \ emitting.\n1. Analyze existing thinking_config templates for P09 constraints  \n2. Identify token budget thresholds from\
  \ historical performance data  \n3. Map required parameters to schema constraints in SCHEMA.md  \n4. Evaluate tradeoffs\
  \ between token limits and processing speed  \n5. Document edge cases for constrained thinking scenarios  \n6. Cross-reference\
  \ with P09 compliance checklists"
phase_2_compose:
- 'Initialize config file with `kind: thinking_config` header'
- Define `max_token_budget` using values from research phase
- Apply schema constraints from SCHEMA.md to parameter blocks
- Set `thinking_depth` to 3-5 based on performance benchmarks
- Embed token allocation rules in `budget_rules` section
- Write `constraint_triggers` using OUTPUT_TEMPLATE.md format
- Add version control metadata to config footer
- Validate parameter ranges against schema min/max values
- Finalize config with P09 compliance annotations
phase_3_validate: '[ ] Check syntax against SCHEMA.md [ ] Verify at least 3 budget tiers defined with numeric thresholds [
  ] Confirm fallback strategy documented for budget exhaustion [ ] Confirm timeout upper bound is set [ ] Verify boundary
  note distinguishes from reasoning_strategy and context_window_config [ ] Validate id matches pattern: p09_thk_[a-z0-9_]+
  [ ] Run H01-H08 quality gate checks before delivering'
