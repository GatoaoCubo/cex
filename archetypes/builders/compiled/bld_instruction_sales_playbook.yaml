phase_1_research:
- Identify target buyer personas via customer interviews and CRM data
- Map discovery flow stages using sales call transcripts and lead qualification metrics
- Document common objections from win/loss analysis and support ticket logs
- Analyze close patterns from successful deals in the last 12 months
- Collect product use cases and value propositions from engineering and marketing
- Benchmark competitor sales materials for gap analysis
phase_2_compose:
- Outline playbook structure per bld_schema_sales_playbook.md (persona, flow, objections, close)
- Define personas with roles, pain points, and decision-making criteria
- Create discovery flow with 3-5 stages and probing questions per stage
- List 10-15 objections with tailored responses and counterarguments
- Detail 3-5 close patterns with triggers, scripts, and success metrics
- Align content with bld_output_template_sales_playbook.md formatting rules
- Embed product demos and case studies as supporting materials
- Conduct peer review for clarity and alignment with sales strategy
- Finalize with executive approval and version control
phase_3_validate:
- '[ ] All personas include role, goals, and pain points'
- '[ ] Discovery flow covers qualification to proposal stages'
- '[ ] Objection handling includes 3+ response variants per category'
- '[ ] Close patterns reference measurable outcomes'
- '[ ] Template compliance verified with bld_schema_sales_playbook.md'
