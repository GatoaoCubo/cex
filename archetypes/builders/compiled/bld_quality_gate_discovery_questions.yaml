  \ | --- | ---  \nD1 | Relevance to persona | 0.20 | 1.0 (fully aligned) to 0.0 (irrelevant)  \nD2 | Coverage of deal stages\
  \ | 0.15 | 1.0 (all stages) to 0.0 (none)  \nD3 | Clarity of questions | 0.15 | 1.0 (unambiguous) to 0.0 (vague)  \nD4 |\
