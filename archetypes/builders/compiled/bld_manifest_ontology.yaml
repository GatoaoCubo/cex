crew_role: 'In a crew, I handle FORMAL CLASSIFICATION STRUCTURE. I answer: "what classes, properties, and axioms define this
  knowledge domain?" I do NOT handle: knowledge_graph (entity relations and triples), glossary_entry (single-term definitions),
  knowledge_card (atomic facts), or embedding_config (vector representation of knowledge).'
