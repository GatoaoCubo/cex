kind: schema
id: bld_schema_model_card
pillar: P06
llm_function: CONSTRAIN
purpose: Formal schema definition for model_card — SINGLE SOURCE OF TRUTH
pattern: TEMPLATE derives from this. CONFIG restricts this. Never the inverse.
quality: 9.1
title: Schema Model Card
version: 1.0.0
author: n03_builder
tags:
- model_card
- builder
- examples
tldr: Golden and anti-examples for model card construction, demonstrating ideal structure and common pitfalls.
domain: model card construction
created: '2026-04-07'
updated: '2026-04-07'
density_score: 0.9
frontmatter_fields: '| Field | Type | Required | Default | Source |

  |-------|------|----------|---------|--------|

  | id | string (p02_mc_{provider}_{slug}) | YES | — | CEX naming |

  | kind | literal "model_card" | YES | — | CEX |

  | pillar | literal "P02" | YES | — | CEX |

  | version | semver string | YES | "1.0.0" | CEX |

  | created | date YYYY-MM-DD | YES | — | CEX |

  | updated | date YYYY-MM-DD | YES | — | CEX |

  | author | string | YES | — | CEX |

  | model_name | string | YES | — | Mitchell 2019 |

  | provider | enum (see below) | YES | — | LiteLLM |

  | model_type | enum (text-generation/embedding/multimodal) | YES | — | HF pipeline_tag |

  | status | enum (active/deprecated/sunset) | YES | active | CEX-ext |

  | release_date | date or null | REC | null | HF, Meta |

  | knowledge_cutoff | YYYY-MM or null | REC | null | Mitchell |

  | context_window | integer > 0 | YES | — | Universal |

  | max_output | integer > 0 | YES | — | Anthropic SDK |

  | modalities | object (5 bools) | YES | — | LangChain |

  | features | object (8 bools) | YES | — | LiteLLM |

  | pricing | object (see Pricing Policy) | YES | — | LiteLLM |

  | domain | literal "model_selection" | YES | — | CEX |

  | quality | null | YES | null | CEX (never self-score) |

  | tags | list[string], len >= 3 | YES | — | CEX |

  | tldr | string < 160ch | YES | — | CEX |

  | when_to_use | string | YES | — | CEX |

  | keywords | list[string] | REC | — | CEX |

  | linked_artifacts | object | REC | — | CEX |

  | data_source | URL string | YES | — | CEX |'
provider_enum: 'Valid: anthropic, openai, google, meta, mistral, cohere, deepseek, alibaba, ai21, other'
pricing_policy: "Frontmatter uses BASE TIER (lowest published price for standard API access).\nIf provider has tiered pricing\
  \ (e.g., Google <=200K / >200K), use lowest tier.\nDocument higher tiers in body Specifications table.\npricing:\n  input:\
  \ float    # base tier, per 1M tokens, USD. null if open-weight.\n  output: float   # base tier, per 1M tokens, USD. null\
  \ if open-weight.\n  cache_read: float or null   # null if provider has no caching\n  cache_write: float or null  # null\
  \ if provider has no symmetric cache write\n  unit: per_1M_tokens         # ALWAYS this value\nRule: open-weight = null\
  \ (not 0). Free commercial tier = 0.00 (not null)."
modalities_object: "modalities:\n  text_input: bool\n  text_output: bool\n  image_input: bool\n  audio_input: bool\n  pdf_input:\
  \ bool"
features_object: "features:\n  tool_calling: bool\n  structured_output: bool\n  reasoning: bool\n  prompt_caching: bool\n\
  \  code_execution: bool\n  web_search: bool\n  fine_tunable: bool\n  batch_api: bool"
body_structure_required_sections:
- '`## Boundary` -- model_card IS / IS NOT'
- '`## Specifications` — table with Value + Source columns'
- '`## Capabilities` — boolean table matching features object'
- '`## When to Use` — decision table >= 5 rows with alternatives'
- '`## References` — >= 1 official URL'
constraints:
- 'max_bytes: 4096 (body only, excl frontmatter)'
- 'naming: p02_mc_{provider}_{model_slug}.md'
- id == filename stem
- every Specifications row MUST have Source URL (never `-`)
- all modalities/features values MUST be boolean
