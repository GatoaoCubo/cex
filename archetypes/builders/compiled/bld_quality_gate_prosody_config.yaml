density_score: 0.85
definition: "| metric         | threshold      | operator | scope         |  \n|----------------|----------------|----------|---------------|\
  \  \n| prosody_config | must exist     | exists   | each config file |"
hard_gates: "| ID   | Check                  | Fail Condition                          |  \n|------|------------------------|-----------------------------------------|\
  \  \n| H01  | YAML valid             | Invalid YAML syntax                     |  \n| H02  | ID matches pattern     | ID\
  \ does not match `^[a-zA-Z0-9_]+$`   |  \n| H03  | kind matches           | kind is not `prosody_config`          |  \n\
  | H04  | voice_personality exists | Missing voice_personality field       |  \n| H05  | emotion_settings valid | Emotion\
  \ values not in allowed list    |  \n| H06  | no duplicate IDs       | Duplicate ID detected                 |  \n| H07\
  \  | config not empty       | Empty or whitespace-only config       |"
soft_scoring_weights_sum_to_1_00: '| Dim | Dimension              | Weight | Scoring Guide                              |

  |-----|------------------------|--------|--------------------------------------------|

  | D1  | Voice personality      | 0.15   | 1.0=clear emotion map, 0.5=ambiguous, 0.0=missing |

  | D2  | Emission path validity | 0.15   | 1.0=SSML or provider-native correct, 0.5=partial, 0.0=mismatch |

  | D3  | Provider coverage      | 0.15   | 1.0=target providers declared + tested, 0.5=one, 0.0=none |

  | D4  | SSML/tag syntax        | 0.10   | 1.0=valid per W3C SSML 1.1, 0.5=minor, 0.0=broken |

  | D5  | Naturalness            | 0.10   | 1.0=natural, 0.5=stiff, 0.0=mechanical     |

  | D6  | Cultural/language fit  | 0.10   | 1.0=locale-appropriate pitch/rate, 0.5=neutral, 0.0=mismatched |

  | D7  | Technical validity     | 0.10   | 1.0=valid numeric/enum, 0.5=partial, 0.0=subjective strings |

  | D8  | Boundary hygiene       | 0.15   | 1.0=no tts_provider/agent_profile bleed, 0.5=minor, 0.0=mixed |'
actions: "| Score     | Action                          |  \n|-----------|---------------------------------|  \n| GOLDEN \
  \   | Auto-approve, deploy immediately|  \n| PUBLISH   | Manual review, schedule deploy  |  \n| REVIEW    | Flag for stakeholder\
  \ feedback   |  \n| REJECT    | Block, require rework           |"
bypass: "| conditions                          | approver              | audit trail         |  \n|------------------------------------|-----------------------|---------------------|\
  \  \n| Urgent release required            | Senior Product Manager| JIRA-12345          |  \n| Legacy system compatibility\
  \ override | CTO                 | SLA-6789            |"
