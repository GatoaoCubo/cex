phase_1_research:
- Identify crew purpose and task boundary (what the team will produce).
- Decompose task into role responsibilities; each responsibility maps to a role_assignment.
- Analyze dependency graph across roles (which outputs feed which inputs).
- 'Pick process topology: sequential (linear), hierarchical (manager-workers), consensus (peer-voting).'
- 'Determine memory-scope per role: private (no leakage), shared (team-visible), persistent (cross-session).'
- Research CrewAI Process, AutoGen GroupChat, or OpenAI Swarm pattern matching closest to this crew.
phase_2_compose:
- Reference SCHEMA.md for required fields (crew_name, purpose, roles, process, memory_scope, success_criteria).
- Populate OUTPUT_TEMPLATE.md with crew blueprint from design.
- Reference each role via its role_assignment id (p02_ra_{role}.md); do NOT inline role identity.
- 'Define process block: for sequential list order, hierarchical name manager role, consensus set voting rule.'
- 'Define handoff_protocol: message format (A2A Task, OpenAI transfer function, or composable-crew native).'
- 'Set memory_scope: map each role to private|shared|persistent with retention hint.'
- Encode success_criteria as measurable post-conditions (quality threshold, artifact count, gate pass).
- 'Add metadata: crewai_equivalent, autogen_equivalent, swarm_equivalent (for taxonomy mapping).'
- 'Proofread: all role refs valid, process topology matches dependency graph.'
phase_3_validate:
- '[ ] All roles referenced exist as role_assignment artifacts.'
- '[ ] Process topology matches task dependency structure.'
- '[ ] Memory-scope defined for every role.'
- '[ ] Handoff-protocol named and compatible with all participating roles.'
- '[ ] success_criteria measurable and checkable post-run.'
- '[ ] File size <= 4096 bytes.'
