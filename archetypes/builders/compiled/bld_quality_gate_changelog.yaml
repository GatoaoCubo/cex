purpose: Quality gate with HARD and SOFT scoring for changelog
quality: null
title: Quality Gate Changelog
version: 1.0.0
author: wave1_builder_gen_v2
tags:
- changelog
- builder
- quality_gate
tldr: Quality gate with HARD and SOFT scoring for changelog
domain: changelog construction
created: '2026-04-14'
updated: '2026-04-14'
density_score: 0.85
definition: (metric, threshold, operator, scope) Schema ID pattern, ^p01_ch_[a-z][a-z0-9_]+.md$, matches, all changelog files
hard_gates: "(ID | Check | Fail Condition)  \nH01 | YAML frontmatter valid | invalid YAML syntax  \nH02 | ID matches pattern\
  \ ^p01_ch_[a-z][a-z0-9_]+.md$ | invalid filename format  \nH03 | kind field matches 'changelog' | kind ≠ 'changelog'  \n\
  H04 | semver version present | missing version field  \nH05 | features section exists | missing 'features' list  \nH06 |\
  \ fixes section exists | missing 'fixes' list  \nH07 | breaking changes section exists | missing 'breaking_changes' list\
  \  \nH08 | no markdown in sections | markdown detected in features/fixes/breaking_changes"
soft_scoring: "(Dim | Dimension | Weight | Scoring Guide)  \nClarity | Readability of entries | 0.15 | 1.0=clear, 0.0=ambiguous\
  \  \nCompleteness | All required sections filled | 0.20 | 1.0=all present, 0.0=missing  \nStructure | Consistent formatting\
  \ | 0.15 | 1.0=uniform, 0.0=disjointed  \nConsistency | Semver alignment with code | 0.15 | 1.0=matches, 0.0=conflicting\
  \  \nSemver Accuracy | Correct version bump | 0.10 | 1.0=correct, 0.0=incorrect  \nDate Format | ISO 8601 date | 0.10 |\
  \ 1.0=valid, 0.0=invalid  \nSummary Quality | Concise summary present | 0.15 | 1.0=clear, 0.0=missing"
actions: "(Score | Action)  \nGOLDEN | >=9.5 | Auto-publish  \nPUBLISH | >=8.0 | Auto-publish  \nREVIEW | >=7.0 | Require\
  \ review  \nREJECT | <7.0 | Block release"
bypass: (conditions, approver, audit trail) Urgent hotfix with CTO approval, CTO, audit log entry with timestamp and reason
