density_score: 0.85
observation: Registry entries with all 8 required fields (capability_name, provider_agent, input_schema, output_schema, cost_tokens,
  quality_baseline, availability, keyword_index) produce 2-3x higher dispatch precision than partial entries. The most common
  omission is keyword_index, which prevents TF-IDF-based retrieval from surfacing the agent.
pattern: Three-layer indexing (builder_sub_agents | nucleus_domain_agents | nucleus_cards) with separate sections per layer
  prevents confusion between invocation paths. Builder sub-agents are invoked as Claude Code sub-agents; nucleus domain agents
  are invoked via dispatch.sh; nucleus cards describe the nucleus itself. Mixing them in one flat list causes routing errors.
evidence: In the CEX WAVE6/WAVE7 grid cycles, orchestrators that used flat agent lists dispatched to wrong nuclei ~20% of
  the time. Introducing the three-layer structure reduced misrouting to <5% in WAVE8 planning sessions.
recommendations:
- Always validate `provider_agent` paths with a glob before writing to registry.
- Use verb-noun form for `capability_name` (e.g., "Build knowledge card" not "knowledge cards").
- Derive `keyword_index` from the union of the agent's `domain` and `capabilities` fields -- never invent keywords.
- 'Mark `quality_baseline: unscored` for any agent with `quality: null` in source.'
- Include a `coverage_gaps` section even if empty -- absence of gaps is itself information.
- Re-run `cex_doctor.py` after registry creation to catch phantom references early.
