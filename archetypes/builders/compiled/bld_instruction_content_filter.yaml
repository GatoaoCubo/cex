phase_1_research: "This ISO defines a content filter -- the moderation rules that gate output or input.\n1. Analyze input/output\
  \ data formats (e.g., JSON, XML, text) for content_filter.  \n2. Identify governance policies (e.g., censorship rules, NSFW\
  \ thresholds).  \n3. Evaluate existing filtering tools (e.g., regex, NLP models, keyword lists).  \n4. Map content lifecycle\
  \ stages (ingestion → filtering → output).  \n5. Benchmark performance metrics (latency, accuracy, throughput).  \n6. Document\
  \ edge cases (e.g., multilingual content, obfuscation techniques)."
phase_2_compose:
- 'Define schema in SCHEMA.md (fields: `filter_id`, `policy`, `rules`, `priority`).'
- Write rule sets using regex/NLP patterns per OUTPUT_TEMPLATE.md.
- Assign governance policies to filter stages (e.g., pre-processing, post-processing).
- Configure pipeline components (e.g., parser, sanitizer, classifier).
- Implement rule validation logic (e.g., syntax checks, policy conflicts).
- Integrate logging/metrics for filter performance tracking.
- Test with sample data from Phase 1 research.
- Refine rules based on test outcomes.
- Finalize artifact with version control and metadata.
