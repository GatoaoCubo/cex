quality:
- Metadata must adhere to platform-specific schema (e.g., HuggingFace's model card format).
- Permissions must use standardized OAuth2 scopes or API key tiers.
- Pricing must include tiered models, currency codes, and usage-based billing terms.
- Compliance details must reference GDPR, CCPA, or other relevant regulations.
- All fields must be validated against platform schema using JSON Schema or equivalent.
