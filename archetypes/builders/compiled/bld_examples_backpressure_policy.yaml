golden_example: 'INPUT: "Create backpressure policy for N07 artifact pipeline stream"

  id: p09_bp_n07_artifact_pipeline

  kind: backpressure_policy

  pillar: P09

  version: "1.0.0"

  created: "2026-04-17"

  updated: "2026-04-17"

  author: "builder_agent"

  strategy: buffer

  buffer_size: 100

  overflow_action: drop

  consumer_signal: demand

  max_pending: 50

  producer: "n07_mission_dispatcher"

  consumer: "n03_artifact_builder"

  platform: "custom"

  quality: null

  tags: [backpressure_policy, n07_pipeline, artifact_stream, P09]

  tldr: "N07->N03 artifact pipeline: buffer 100 items, drop overflow, demand-based consumer signal."'
overview: 'Controls flow from N07 mission dispatcher to N03 artifact builder. N07 emits build tasks faster than N03 can process
  when running large missions. WHY THIS IS GOLDEN: strategy in enum, buffer_size numeric, overflow_action declared, consumer_signal
  declared, quality null, tags >= 3 with backpressure_policy.'
