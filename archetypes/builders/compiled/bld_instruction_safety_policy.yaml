phase_1_research:
- Identify regulatory requirements (e.g., GDPR, AI Act)
- Interview stakeholders for safety governance priorities
- Analyze historical AI risk incidents in the industry
- Benchmark against peer organization policies
- Map technical constraints (e.g., model interpretability limits)
- Document ethical principles from board-approved frameworks
phase_2_compose:
- Define policy scope (e.g., model deployment, data usage)
- 'Structure sections per SCHEMA.md: Purpose, Scope, Rules'
- Draft CONSTRAIN rules using "shall" and "must" verbs
- Align with OUTPUT_TEMPLATE.md section headers
- Embed technical constraints from Phase 1 research
- Reference applicable regulations in compliance section
- Add audit trail requirements for policy violations
- Include escalation procedures for safety breaches
- Finalize language using plain English and active voice
phase_3_validate:
- '[ ] ✅ Validate schema compliance with SCHEMA.md'
- '[ ] ✅ Confirm stakeholder sign-off on v1.0 draft'
- '[ ] ✅ Test policy against 3 hypothetical risk scenarios'
- '[ ] ✅ Verify legal team approval for regulatory alignment'
- '[ ] ✅ Obtain CISO endorsement for technical feasibility'
