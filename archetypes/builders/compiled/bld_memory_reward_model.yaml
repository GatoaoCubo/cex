observation: Common issues include misalignment between reward signals and desired outcomes, overfitting to narrow examples,
  and ambiguous criteria leading to inconsistent model behavior.
pattern: Successful configurations use explicit, measurable criteria aligned with task goals, and modular components to isolate
  and test individual reward aspects.
evidence: Reviewed artifacts with well-defined reward criteria showed 20-30% higher alignment scores compared to those with
  vague objectives.
recommendations:
- Define reward criteria using concrete, task-specific metrics.
- Decouple reward components to enable independent validation.
- Include diverse edge cases in training data to prevent overfitting.
- Document assumptions and limitations in the model configuration.
- Iterate reward design with feedback from downstream evaluation stages.
