golden_example: "kind: faq_entry\ntitle: How do I update my payment method on Stripe?\nbody: |\n  To update your payment method\
  \ on Stripe, log in to your account, navigate to the Payment Methods section under Account Settings, and select Edit next\
  \ to the method you wish to update. Follow the prompts to enter new card details or update existing information. Changes\
  \ are saved automatically.\nrelated_links:\n  - https://stripe.com/docs/payments/accept-a-payment\n  - https://stripe.com/docs/faq\n\
