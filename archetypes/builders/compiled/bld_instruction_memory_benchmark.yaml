density_score: 0.87
phase_1_research:
- 'Define the memory evaluation goal: retention, recall, consistency, or hallucination rate?'
- 'Identify target agent architecture: pure in-context, RAG/external store, or hybrid?'
- 'Review real benchmarks for methodology: LOCOMO, LongMemEval, MemGPT evals, MT-Bench-101.'
- 'Select turn distance range: short (5-10 turns), medium (20-50), long (100+ or multi-session).'
- 'Choose primary metrics: exact-match, F1, ROUGE-L, or LLM-judge; define hallucination detector.'
- 'Document scope: what memory types are out of scope (hardware DRAM, caching layers, etc.).'
phase_2_compose:
- Load bld_schema_memory_benchmark.md for required fields (memory_type, eval_distance).
- 'Write frontmatter: id matching ^p07_mb_[a-z][a-z0-9_]+.md$, kind=memory_benchmark, pillar=P07.'
- 'Write Overview: target system, memory type, scope boundary.'
- 'Write Metrics section: for each metric, include name, formula, scale, and primary tool.'
- 'Write Test Protocol: conversation generation method, fact planting, query turn distances.'
- 'Write Reference Benchmarks: cite >= 1 real benchmark (LOCOMO, LongMemEval, MemGPT, NiH).'
- 'Write Evaluation Criteria: pass/fail thresholds, hallucination budget, baseline.'
- 'Add Notes: known failure modes, scope caveats.'
phase_3_validate:
- '[ ] frontmatter YAML parses without error (H01).'
- '[ ] id matches ^p07_mb_[a-z][a-z0-9_]+.md$ (H02).'
- '[ ] kind == memory_benchmark (H03).'
- '[ ] >= 2 metrics defined with formulas (H04, H05).'
- '[ ] >= 1 real benchmark cited (H06) -- NOT hardware DRAM benchmarks.'
- '[ ] No DRAM/SRAM/bandwidth/ECC references in body (H07).'
- '[ ] Run: python _tools/cex_wave_validator.py --scope archetypes/builders/memory-benchmark-builder/'
- '[ ] Run: python _tools/cex_compile.py {path}'
