phase_1_research:
- 'Define memory evaluation criteria: latency, throughput, error rates, and consistency.'
- Identify target memory systems (e.g., DRAM, SSD, persistent memory).
- Review existing benchmarks (e.g., STREAM, MEMBENCH) for methodology gaps.
- Analyze hardware/software requirements for test environments.
- Select memory workloads (e.g., random access, sequential writes).
- 'Document risks: false positives, environmental interference, scalability limits.'
phase_2_compose:
- Set up development environment with SCHEMA.md constraints.
- 'Define benchmark structure: test cases, metrics, and reporting formats.'
- Write test cases for memory access patterns (sequential, random, burst).
- Implement memory stress tests (e.g., sustained writes, read-modify-write cycles).
- Integrate OUTPUT_TEMPLATE.md for result formatting (CSV, JSON, HTML).
- 'Add metadata: test version, hardware specs, OS details.'
- Write documentation for usage, configuration, and interpretation.
- Conduct code review for compliance with SCHEMA.md and P07 standards.
- Finalize artifact with version control and release notes.
phase_3_validate:
- '[ ] Run unit tests for all memory operations (pass/fail).'
- '[ ] Cross-validate results against industry benchmarks.'
- '[ ] Test on 3+ hardware platforms (e.g., x86, ARM, FPGA).'
- '[ ] Verify output matches OUTPUT_TEMPLATE.md structure.'
- '[ ] Confirm governance compliance (P07, GOVERN function).'
