title: Embedder Provider Builder Execution Protocol
target: embedder-provider-builder agent
phases_count: 4
prerequisites:
- Embedding provider and model are identified
- Provider API documentation is accessible (model page, dimensions, rate limits)
- The embedding model is not already configured in the P01 examples directory
validation_method: checklist
domain: embedder_provider
quality: null
tags:
- instruction
- embedder-provider
- P01
- embedding
- dimensions
- normalization
idempotent: true
atomic: false
rollback: Discard generated artifact; no embedding index is modified
dependencies: []
logging: true
tldr: Research and configure an embedding model's connection parameters, dimensions, normalization, and batch limits from
  official sources into a complete embedder_provider artifact.
density_score: 0.9
context: 'The embedder-provider-builder produces `embedder_provider` artifacts (P01) — embedding model connection configurations
  for RAG pipelines. Configs specify the exact provider API, model identifier, embedding dimensions, normalization behavior,
  batch size limits, and authentication. An embedder_provider is a connection spec, not a vector database config (vectordb_backend),
  not an LLM routing rule (model_provider), and not a retrieval pipeline (retriever).

  Inputs:

  - `$provider (required) - string - "One of: openai, cohere, voyage, jina, nomic, local, other"`

  - `$model (required) - string - "Exact model identifier as used in the provider API (e.g. ''text-embedding-3-small'', ''embed-english-v3.0'',
  ''all-MiniLM-L6-v2'')"`

  - `$use_case (optional) - string - "Target use case: semantic search, clustering, classification, code search"`

  - `$dimension_override (optional) - integer - "Reduced dimension count for matryoshka-capable models"`

  Output: A single `embedder_provider` artifact with 20+ frontmatter fields and 5 body sections: Boundary, Configuration Matrix,
  Dimension Tradeoffs, Integration Pattern, Anti-Patterns. Body <= 4096 bytes.'
phases: ''
phase_1_research: "Action: Gather all embedding model specifications from official sources.\n1. Identify the model: exact\
  \ API name, provider, version.\n2. Locate official documentation:\n   - Provider embedding model page (dimensions, capabilities)\n\
  \   - API reference (max tokens, batch limits, rate limits)\n   - Pricing page (per-token or per-request costs)\n   - MTEB\
  \ benchmark results (retrieval, clustering, classification scores)\n3. Extract all schema fields from official sources:\n\
  \   - `dimensions`: integer, native embedding dimension\n   - `max_tokens`: integer, max input tokens per request\n   -\
  \ `batch_size`: integer, max texts per batch request\n   - `normalize`: boolean, whether output is L2-normalized\n   - `truncate`:\
  \ boolean or string, truncation behavior on overflow\n   - `matryoshka`: boolean, supports dimension reduction via MRL\n\
  \   - `sparse_support`: boolean, supports hybrid dense+sparse\n   - `api_key_env`: string, environment variable name for\
  \ authentication\n4. Rule: if a data point is unavailable, set field to `null` — never infer.\n5. Check for existing embedder_provider\
  \ artifacts for the same model to avoid duplicates.\nVerification: Every non-null field has a source URL identified. Dimensions\
  \ match official documentation exactly."
phase_2_compose: "Action: Write all frontmatter fields and body sections within the 4096-byte body limit.\n1. Read SCHEMA\
  \ — source of truth for all fields.\n2. Read OUTPUT_TEMPLATE — fill every `{{var}}` following schema constraints.\n3. Fill\
  \ frontmatter: all required fields (`null` valid for optional; `quality: null` mandatory).\n4. Write `## Boundary` section\
  \ — what an embedder_provider IS and IS NOT.\n5. Write `## Configuration Matrix` table:\n   | Parameter | Value | Source\
  \ |\n   |-----------|-------|--------|\n   Rows: provider, model, dimensions, max_tokens, batch_size, normalize, truncate,\
  \ distance_metric, pricing.\n6. Write `## Dimension Tradeoffs` — table comparing native vs reduced dimensions:\n   | Dimensions\
  \ | MTEB Score | Storage | Latency | Use Case |\n   |------------|------------|---------|---------|----------|\n7. Write\
  \ `## Integration Pattern` — code snippet showing provider SDK initialization.\n8. Write `## Anti-Patterns` — >= 4 common\
  \ mistakes with this embedding model.\n9. Write `## References` — >= 1 official URL.\nVerification: Every Configuration\
  \ row has Source URL. Dimensions are integers. Body <= 4096 bytes."
phase_3_validate: 'Action: Run all 10 HARD gates. Fix any failure before output.

  | Gate | Check |

  |------|-------|

  | H01 | YAML frontmatter parses without error |

  | H02 | `id` matches `^p01_emb_[a-z][a-z0-9_]+$` |

  | H03 | `id` equals filename stem exactly |

  | H04 | `kind` == literal string `"embedder_provider"` |

  | H05 | `quality` == `null` |

  | H06 | Required fields present: `id`, `kind`, `pillar`, `provider`, `model`, `dimensions`, `max_tokens`, `normalize` |

  | H07 | `provider` matches a known enum value |

  | H08 | `dimensions` is a positive integer |

  | H09 | `max_tokens` is a positive integer |

  | H10 | Body <= 4096 bytes |

  Score all SOFT gates. If soft score < 8.0, revise in the same pass.'
phase_4_deliver: 'Action: Save, compile, commit, signal.

  1. Save artifact to `P01_knowledge/examples/p01_emb_{provider}_{model_slug}.md`

  2. Compile: `python _tools/cex_compile.py {path}`

  3. Git commit with descriptive message

  4. Signal: `write_signal(''n03'', ''complete'', {score})`'
