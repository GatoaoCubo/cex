golden_example: "cex_kind: procedural_memory  \nname: \"Microsoft Power Automate Flow for Invoice Processing\"  \ndescription:\
  \ \"Automates invoice data extraction and accounting entry creation.\"  \nbody:  \n  - trigger: \"Email received in 'Invoices'\
  \ folder\"  \n  - action: \"Extract PDF text using Azure Cognitive Services\"  \n  - action: \"Parse structured data with\
  \ Power Automate's AI Builder\"  \n  - action: \"Create accounting entry in Dynamics 365\"  \n  - validation: \"Send confirmation\
  \ email with parsed data summary\"  "
anti_example_1_confusing_with_declarative_knowledge: "cex_kind: procedural_memory  \nname: \"Salesforce Object Schema\"  \n\
  description: \"Stores CRM entity definitions and field relationships.\"  \nbody:  \n  - entity: \"Account\"  \n  - fields:\
  \ \"Name, Industry, Revenue\"  \n  - relationships: \"Account -> Contact (one-to-many)\"  "
why_it_fails: Lacks specificity in actions, tools, or validation. No concrete procedures or automation logic, making retrieval
  ineffective.
anti_example_2_vague_unstructured_steps: "cex_kind: procedural_memory  \nname: \"Generic Task Management\"  \ndescription:\
  \ \"Tracks user tasks without defined workflows.\"  \nbody:  \n  - step: \"User adds task\"  \n  - step: \"System assigns\
  \ task\"  \n  - step: \"Task completed\"  "
