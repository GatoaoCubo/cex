golden_example_customer_support_agent_pro_tier: '---

  id: p10_cp_customer_support_pro

  kind: consolidation_policy

  pillar: P10

  title: "Consolidation Policy: Customer Support Agent (PRO)"

  version: "1.0.0"

  created: "2026-04-14"

  author: n06_commercial

  domain: customer-support

  quality: null

  tags: [consolidation_policy, customer_support, pro]

  tldr: "PRO tier: session-end episodic promotion, importance-gated semantic, 90-day TTL, LRU eviction."

  tier: pro

  eviction_strategy: hybrid

  consolidation_async: true

  importance_floor: 0.3

  retention_days: 90

  promotion_threshold: 0.7

  audit_trail: false

  ---


  Why golden: all required frontmatter, consolidation_async: true, tier=pro,

  eviction_strategy=hybrid, importance_floor + promotion_threshold defined. Body includes

  Promotion Rules table, Eviction Rules table, importance scoring formula, async job spec,

  and FREE/PRO/ENTERPRISE tier matrix. No OS memory terminology.'
anti_example_1_os_gc_domain_contamination_d04: "---\nid: p10_cp_pytorch_gc\nkind: consolidation_policy\ntitle: \"PyTorch Memory\
  \ Consolidation for LLM Inference\"\nvendor: Meta\nversion: 1.13.1\ndescription: \"Memory lifecycle for PyTorch inference\
  \ with mark-and-sweep GC\"\nbody:\n  garbage_collection:\n    interval: \"every 100ms\"\n    strategy: \"mark_and_sweep\"\
  \n  eviction:\n    trigger: \"90% GPU utilization\"\n    action: \"evict_low_priority_tensors\"\n---\n\nWhy it fails:\n\
  - Describes PyTorch tensor management and GPU memory -- NOT agent memory\n- `garbage_collection: mark_and_sweep` is OS/GC\
  \ terminology, wrong domain\n- No `consolidation_async` field, no `importance_floor`, no `tier`\n- No Promotion Rules (working->episodic)\
  \ or Semantic Promotion\n- Missing all required frontmatter fields (`pillar`, `quality`, `tags`, `tldr`)"
anti_example_2_missing_promotion_rules: '---

  id: p10_cp_minimal

  kind: consolidation_policy

  pillar: P10

  tier: pro

  consolidation_async: true

  eviction_strategy: ttl

  retention_days: 90

  ---

  ## Eviction Rules

  Delete everything older than 90 days.


  Why it fails:

  - Has eviction but NO promotion rules: episodic -> semantic promotion is missing

  - Eviction rule is a sentence, not a structured table

  - No importance scoring section

  - No Commercial Tier Matrix

  - Missing required frontmatter: `quality`, `tags`, `tldr`, `domain`, `author`

  - Fails H05 (Promotion Rules section absent), D2 (0.0), D3 (0.0)'
