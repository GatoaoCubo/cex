title: 'Examples: data_contract'
example_1_sales_billing_order_contract: "id: dc_sales_billing_order\nkind: data_contract\npillar: P06\ntitle: \"Sales -> Billing:\
  \ Order Contract\"\nproducer_system: sales-service\nconsumer_system: billing-service\nentity: Order\ncontract_version: 1.2.0\n\
  effective_date: \"2026-04-01\"\nquality: null\ntags: [sales, billing, order, data-contract]\nSchema: order_id (uuid, non-null),\
  \ customer_id (uuid, non-null),\n        total_amount (decimal, non-null), currency (ISO-4217, non-null),\n        status\
  \ (enum: pending|confirmed|cancelled)\nSLA: freshness < 5s, availability 99.9%, latency_p99 < 200ms"
example_2_events_analytics_clickstream: "id: dc_events_analytics_clickstream\nkind: data_contract\npillar: P06\ntitle: \"\
  Events -> Analytics: Clickstream Contract\"\nproducer_system: event-collector\nconsumer_system: analytics-warehouse\nentity:\
  \ ClickEvent\ncontract_version: 2.0.0\neffective_date: \"2026-03-01\"\nquality: null\ntags: [events, analytics, clickstream,\
  \ data-contract]\nSchema: event_id (uuid), user_id (uuid, nullable), session_id (string),\n        page_url (string), timestamp\
  \ (ISO-8601)\nSLA: freshness < 15min (batch), availability 99.5%, completeness >= 99%"
anti_example_wrong: 'id: llm_output_validator    # WRONG: this is validation_schema, not data_contract

  kind: data_contract         # WRONG: LLM output validation != cross-system contract

  # Missing producer_system   # WRONG: required field'
