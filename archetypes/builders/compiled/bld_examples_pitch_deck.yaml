golden_example_pitch_deck: 'Title: Streamline HR with AI

  Subtitle: Automating payroll and benefits for SMEs

  Author: Jane Doe, CEO | HireFlow Inc.

  Date: March 2024'
problem: Small businesses waste 20+ hours/month on manual payroll, leading to errors and compliance risks.
solution: HireFlow automates payroll, tax filings, and benefits using AI, integrating with QuickBooks, Xero, and Slack.
traction:
- 10,000+ businesses active users
- 50% YoY growth since 2022
- 4.8/5 NPS score
ask: $5M Series A to expand to Europe and build AI-driven benefits planning. ---
anti_example_1_missing_problem_solution_structure: 'Title: HireFlow – The Future of HR

  Body:

  - "We offer a platform for payroll and benefits."

  - "Our users love our UI."

  - "We’ve grown 50% YoY."'
why_it_fails: Traction lacks quantifiable data (e.g., user numbers, growth rates). Investors can’t assess momentum or validate
  claims.
anti_example_2_vague_traction_metrics: 'Title: HireFlow – Automating HR

  Body:

  - "Problem: Manual payroll is tedious."

  - "Solution: AI-driven automation."

  - "Traction: We’re growing fast."

  - "Ask: $5M for expansion."'
