id_pattern: ^p11_sht_[a-z][a-z0-9_]+\.md$
body_structure:
- Taxonomy Overview -- Scope declaration, source standards, classifier alignment, version rationale
- 'Hazard Category Definitions -- Per category: code, Llama Guard label, definition, boundary conditions, false-positive risks'
- 'Severity Level Matrix -- Per category: 4 rows (low/medium/high/critical) with criteria and response template'
- Response Template Catalog -- SAFE_COMPLETE / WARN_PARTIAL / REFUSE_EXPLAIN / HARD_REFUSE definitions
- Cross-Category Boundaries -- Table of adjacent category pairs with disambiguation rules
- 'Regulatory Mapping -- Per category: applicable laws (GDPR, CSAM statutes, CBRN export controls)'
constraints:
- 'taxonomy_scope must declare: full-12 OR list of included categories with justification.'
- All included categories must have Llama Guard 4 label mapped.
- CBRN category (S8) must include Chemical/Biological/Radiological/Nuclear sub-categories.
- Each category requires 4 severity level definitions.
- 'Response template: HARD_REFUSE required for critical severity on all categories.'
- source_standard must reference MLCommons AILuminate v1.0 or later.
- classifier_alignment must reference Llama Guard version if specified.
