common_patterns:
- 'Control Group Baseline: Always include a control group for comparison.'
- 'Hypothesis-Driven Variations: Align variations to specific, measurable hypotheses.'
- 'Randomized Assignment: Use stratified randomization to balance covariates.'
- 'Metric Alignment: Define success metrics upfront and avoid post-hoc adjustments.'
- 'Duration-Based Stopping Rules: Set fixed experiment durations to prevent premature termination.'
- 'Funnel Analysis Integration: Track conversion funnels to identify drop-off points.'
pitfalls:
- 'Underpowered Tests: Insufficient sample sizes lead to inconclusive results.'
- 'Confounding Variables: Uncontrolled factors (e.g., seasonality) skew outcomes.'
- 'Premature Stopping: Halting experiments early increases false positive risks.'
- 'Biased Sampling: Non-random user allocation introduces selection bias.'
- 'Ignoring Statistical Significance: Acting on non-significant results wastes resources.'
