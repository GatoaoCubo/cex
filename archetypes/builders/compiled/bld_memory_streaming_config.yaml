observation: Streaming configs that omit heartbeat intervals cause proxy timeouts after 30-60 seconds, silently dropping active
  LLM inference streams mid-generation. Configs without backpressure strategies cause memory exhaustion when slow consumers
  fall behind fast producers. Missing flush_interval_ms for SSE causes tokens to accumulate in the buffer and arrive in large
  bursts rather than character-by-character. Selecting WebSocket when SSE suffices adds bidirectional complexity with no benefit
  for unidirectional LLM token streams.
pattern: 'Protocol selection: SSE for unidirectional token streams (LLM output, notifications,

  logs). WebSocket for bidirectional sessions (chat, collaborative editing). Chunked for

  large one-shot payloads (file downloads, batch exports). Never use WebSocket where SSE

  suffices -- extra handshake complexity with no benefit.


  Heartbeat interval: set below the lowest proxy or load balancer timeout in the path.

  Nginx default: 60s. AWS ALB: 60s. Cloudflare: 100s. Use 15-30s as a safe default.

  A heartbeat of 0 disables keepalive -- proxies will terminate the connection.


  Backpressure strategy:

  - drop: fast producers, slow consumers, data loss acceptable (LLM token streaming)

  - block: producer halts until consumer catches up (chat messages must not be lost)

  - buffer: accumulate with limit; switch to drop at limit (event broadcast)


  Flush interval: 50ms or less for smooth token-by-token rendering. Values above 200ms

  produce visible batching that degrades the streaming UX. For non-interactive streams

  (batch, download), larger intervals reduce syscall overhead.'
evidence: 'Heartbeat intervals at 15s prevented proxy timeouts in 100% of tested deployments with nginx default 60s proxy_read_timeout.
  Explicit backpressure strategy (drop for LLM, block for chat) eliminated 3 OOM crashes in load tests. flush_interval_ms:
  50 produced smooth token rendering; flush_interval_ms: 500 caused visible batching. SSE reduced implementation complexity
  by 60% vs WebSocket for unidirectional token delivery.'
