summary: 'Streaming configuration failures fall into three categories: connection failures (stream silently dropped by proxy
  because no heartbeat), memory failures (server OOM because slow consumer has no backpressure), and UX failures (tokens arrive
  in bursts because flush interval is too large). Four required fields address all three systematically.'
anti_patterns:
- Omitting heartbeat_interval_ms for SSE/WebSocket -- proxies terminate after idle timeout
- 'Setting buffer_bytes: 0 -- disables flow control, causes immediate backpressure on every write'
- Using WebSocket for unidirectional output -- bidirectional complexity with no benefit
- Setting flush_interval_ms > 200 for LLM token streams -- tokens batch-arrive, poor UX
