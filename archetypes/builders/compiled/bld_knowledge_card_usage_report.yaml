showback_vs_chargeback: "Critical distinction for enterprise billing and FinOps alignment:  \n\n| Model | Definition | Who\
  \ Pays | Use Case |  \n|-------|-----------|----------|----------|  \n| Showback | Usage visibility only -- teams see what\
  \ they consume but are not billed internally | Central IT / Finance | Cost awareness, optimization culture |  \n| Chargeback\
  \ | Internal billing -- departments are invoiced for actual consumption | Each business unit | Cost accountability, P&L\
  \ per team |  \n| Hybrid | Showback for new services, chargeback for mature services | Mixed | Gradual FinOps maturity rollout\
  \ |  \n\n- Every usage_report artifact must declare `billing_model: showback | chargeback | hybrid`.  \n- Chargeback reports\
  \ require: department_id, cost_center, allocation_rule, invoice_period.  \n- Showback reports require: team_id, resource_label,\
  \ consumption_summary."
department_allocation_rules: "| Rule Type | Logic | Example |  \n|-----------|-------|---------|  \n| Proportional | Allocate\
  \ cost by % of total usage | Team A used 40% of API calls -> 40% of total cost |  \n| Fixed quota | Pre-allocated budget\
  \ per department | Marketing: $5,000/mo cap |  \n| Actual metered | Bill exactly what was consumed | Per-API-call billing\
  \ at $0.001/call |  \n| Tiered commitment | Volume discount at thresholds | >1M calls/mo = $0.0008/call |"
data_export_integrations_must_reference_in_usage_report: "| Platform | Use Case | Config Key |  \n|----------|----------|------------|\
  \  \n| Snowflake Data Share | Cross-org data access without copying | `snowflake_share_name` |  \n| Databricks Delta Lake\
  \ | Usage data lakehouse for analytics | `databricks_table_path` |  \n| Metabase | Self-serve CFO/manager dashboards | `metabase_dashboard_id`\
  \ |  \n| Looker | Embedded analytics for enterprise portals | `looker_explore_url` |  \n| CSV export | Manual reporting,\
  \ audit submissions | `csv_export_enabled: true` |"
common_patterns:
- Time-based aggregation with ISO 8601 intervals (hourly, daily, monthly).
- 'Normalization to standard units: requests -> thousands, bytes -> GB, seconds -> hours.'
- 'Multi-dimensional filtering: user_id, team_id, region, service_name, cost_center.'
- Anomaly detection for outlier usage patterns (>2 standard deviations = flag).
- 'Hierarchical rollup: per-user -> per-team -> per-department -> organization-wide.'
- Showback vs. chargeback mode declared explicitly in report metadata.
- Data share to Snowflake/Databricks for cross-org FinOps integration.
pitfalls:
- Conflating showback and chargeback -- each has different authorization and approval flows.
- Over-aggregation leading to loss of actionable per-team detail.
- Inconsistent time zone handling across global users (always store in UTC, display in local).
- Missing allocation_rule for chargeback (causes finance disputes at month-end).
- No CSV export option (audit teams always need raw data access).
