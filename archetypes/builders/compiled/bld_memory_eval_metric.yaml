density_score: 0.85
observation: Common issues include ambiguous definitions leading to inconsistent scoring, lack of alignment with task objectives,
  and over-reliance on simplistic metrics that fail to capture nuanced performance aspects.
pattern: Effective metrics use precise, quantifiable criteria tied to specific task outcomes, often combining multiple dimensions
  (e.g., accuracy + fairness) while maintaining clarity.
evidence: Reviewed artifacts showed that metrics like "token_error_rate" (aligned with language modeling goals) performed
  better than vague terms like "quality."
recommendations:
- Define metrics with explicit formulas and thresholds.
- Ensure alignment with downstream use cases (e.g., safety, efficiency).
- Avoid conflating evaluation with scoring rubrics; keep metrics objective.
- Document assumptions (e.g., data distribution, error types).
- Test metrics across edge cases to validate robustness.
