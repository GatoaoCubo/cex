idempotent: true
atomic: true
rollback: Delete the produced rule file. No system behavior changes until the rule is applied to the runtime.
dependencies: []
logging: true
tldr: Specify timeout, retry, rate limit, or circuit breaker parameters for a named operation with units, trigger behavior,
  and tuning guidance.
density_score: 0.93
context: 'A runtime_rule specifies the operational parameters that govern how a system component behaves under load, failure,
  or resource pressure. Rules are technical, numeric, and scoped to a specific component or operation. They are not behavioral
  policies (law), safety constraints (guardrail), or lifecycle rules — they are configuration-level specifications for engineers
  and runtime systems to implement.

  Inputs

  | Field | Type | Description |

  |---|---|---|

  | `operation` | string | The specific component or endpoint this rule governs (e.g. `llm_api_call`, `crawl_job`, `embedding_pipeline`)
  |

  | `rule_type` | enum | `timeout` \| `retry` \| `rate_limit` \| `circuit_breaker` \| `concurrency` |

  | `scope` | string | Which layer this applies to: `per_request`, `per_user`, `per_service`, `global` |

  | `domain` | string | The subject domain (e.g. `llm_inference`, `data_ingestion`, `api_gateway`) |

  Output

  A single `.md` file with YAML frontmatter (all required fields) + 3 mandatory body sections: Rule Specification, Trigger
  Behavior, Tuning Guide. Body must be <= 3072 bytes. All numeric values must include units.

  Boundary rules

  - runtime_rule = technical parameters for timeouts, retries, limits, breakers (this builder)

  - lifecycle_rule = when to promote, retire, or deprecate an artifact (different builder)

  - law = inviolable behavioral rules that must never be overridden (different builder)

  - guardrail = safety boundaries for agent behavior (different builder)

  - env_config = environment-specific variables (different builder)

  - feature_flag = on/off toggle for feature availability (different builder)'
phases: ''
phase_1_research_rule_specification: "Identify the operation, classify the rule type, and determine appropriate numeric values.\n\
  Identify the operation:\n  name: specific component, endpoint, or pipeline step (not vague like \"the system\")\n  layer:\
  \ which architectural layer (e.g. HTTP client, LLM SDK, database driver)\n  failure mode: what goes wrong without this rule\
  \ (hung requests, cascading failures, overload)\nClassify rule_type:\n  timeout:         maximum time allowed for an operation\
  \ to complete\n  retry:           how many times and at what intervals to retry a failed operation\n  rate_limit:      maximum\
  \ request or token throughput per time window\n  circuit_breaker: threshold at which to stop calling a failing service temporarily\n\
  \  concurrency:     maximum number of simultaneous in-flight operations\nResearch numeric values:\n  timeout:        LLM\
  \ APIs typically 30-120s; DB queries 5-30s; HTTP calls 10-30s\n  retry:          2-5 attempts; exponential backoff starting\
  \ 1s, max 60s\n  rate_limit:     match provider limits; express in req/s, req/min, tokens/min\n  circuit_breaker: 50% error\
  \ rate over 10 requests; recovery window 30-60s\n  concurrency:    1-10 for expensive ops; 10-100 for lightweight ops\n\
  RULE: Every numeric value MUST have a unit (ms, s, min, req/s, tokens/min, connections)\nRULE: No vague terms — replace\
  \ \"fast\", \"many\", \"some\", \"reasonable\" with exact numbers\nGenerate rule_slug: snake_case, lowercase (e.g. llm_api_call_timeout,\
  \ crawl_job_retry)\nCheck brain_query [IF MCP] for existing runtime_rule for the same operation.\nAssess severity: what\
  \ is the blast radius if this rule is misconfigured?\nDeliverable: rule type, operation, scope, numeric values with units,\
  \ and severity assessment."
phase_2_classify_boundary_check: "Confirm the artifact belongs to `runtime_rule` and not a sibling kind.\nIF the rule is about\
  \ when to retire or promote an artifact through its lifecycle:\n  RETURN \"Route to lifecycle-rule-builder.\"\nIF the rule\
  \ is an inviolable behavioral constraint that must never be overridden:\n  RETURN \"Route to law-builder — laws are non-technical\
  \ behavioral rules.\"\nIF the rule defines a safety boundary for agent behavior:\n  RETURN \"Route to guardrail-builder.\"\
  \nIF the value is an environment variable (API key, base URL, flag):\n  RETURN \"Route to env-config-builder.\"\nIF the\
  \ value is a boolean feature toggle:\n  RETURN \"Route to feature-flag-builder.\"\nIF the rule governs timeout, retry, rate\
  \ limit, circuit breaker, or concurrency\n  AND applies to a named operation at runtime:\n  PROCEED as runtime_rule\nDeliverable:\
  \ confirmed `kind: runtime_rule` with one-line justification."
phase_3_compose_build_the_rule_artifact: "Assemble frontmatter and all 3 required body sections following SCHEMA.md and OUTPUT_TEMPLATE.md.\n\
  ```\nID generation:\n  id = \"p09_rr_\" + rule_slug\n  must match: ^p09_rr_[a-z][a-z0-9_]+$\nFrontmatter (all required fields\
  \ from SCHEMA.md):\n  id, kind (= runtime_rule), pillar (= P09), title, version,\n  created, updated, author, rule_type,\
  \ operation, scope,\n  domain, quality (= null), tags\nBody sections (in this order):\n  ## Rule Specification\n  Parameter\
  \ table with exact values and units:\n    | Parameter         | Value       | Unit  | Notes           |\n    | {param_name}\
  \      | {number}    | {ms}  | {context note}  |\n  ALL values must be concrete numbers, not ranges."
