quality:
- Certifications must be validated against recognized industry standards (e.g., ISO, AWS, Microsoft).
- Regional data must use ISO 3166-1 alpha-2 country codes.
- Contact information must be verified for accuracy and compliance with data privacy laws (e.g., GDPR).
- Tier classifications (e.g., Gold, Platinum) must align with vendor-specific channel programs.
- Entries must be machine-readable (e.g., JSON, CSV) with consistent schema and no ambiguous fields.
