phase_1_research:
- Study HIPAA compliance requirements for data encryption and access controls.
- Analyze HL7/FHIR standards for interoperability in EHR systems.
- Map PHI (Protected Health Information) handling workflows in clinical settings.
- Identify use cases for secure data exchange between hospitals and insurers.
- Evaluate risks in non-compliant data processing for healthcare applications.
- Review industry benchmarks for healthcare data privacy and security.
phase_2_compose:
- Align artifact structure with SCHEMA.md's healthcare-specific data models.
- Define PHI fields using FHIR resources (e.g., Patient, Encounter).
- Implement HIPAA-compliant encryption protocols in data transmission layers.
- Write use cases for telemedicine and remote patient monitoring.
- Reference HL7 v2.x messaging formats for legacy system integration.
- Embed audit logging requirements per HIPAA audit controls.
- Use OUTPUT_TEMPLATE.md to format artifact with metadata headers.
- Validate terminology against SNOMED-CT and LOINC standards.
- Finalize artifact with compliance checklists and versioning metadata.
phase_3_validate:
- '[ ] ✅ Confirm HIPAA compliance in data storage and transmission.'
- '[ ] ✅ Verify HL7/FHIR conformance using FHIR Validator tool.'
- '[ ] ✅ Ensure PHI fields are anonymized in sample datasets.'
- '[ ] ✅ Test use cases against SCHEMA.md''s validation rules.'
- '[ ] ✅ Cross-check artifact against OUTPUT_TEMPLATE.md structure.'
