golden_example: "import boto3\nimport os\n\ndef upload_to_s3(file_path, bucket_name, object_key):\n    \"\"\"Upload file to\
  \ S3 bucket.\"\"\"\n    try:\n        s3_client = boto3.client('s3')\n        s3_client.upload_file(file_path, bucket_name,\
  \ object_key)\n        print(f\"Uploaded {file_path} to s3://{bucket_name}/{object_key}\")\n    except Exception as e:\n\
  \        print(f\"Error uploading file: {e}\")\n        raise"
anti_example_1_missing_error_handling: "import boto3\n\ndef upload_to_s3(file_path, bucket_name, object_key):\n    s3_client\
  \ = boto3.client('s3')\n    s3_client.upload_file(file_path, bucket_name, object_key)\n    print(f\"Uploaded {file_path}\
  \ to s3://{bucket_name}/{object_key}\")"
why_it_fails: Hardcoding credentials violates security best practices. It exposes sensitive information in code repositories
  and increases risk of credential leakage. Proper approach uses environment variables or IAM roles.
