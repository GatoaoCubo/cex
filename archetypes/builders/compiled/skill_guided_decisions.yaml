id: skill_guided_decisions
kind: instruction
scope: shared
purpose: Teach all builders and nuclei to present structured decision points instead of assuming. The Co-pilot Protocol.
version: 1.0.0
created: 2026-03-31
author: n07_orchestrator
quality: null
tags:
