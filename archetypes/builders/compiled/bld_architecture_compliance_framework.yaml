architectural_position: The compliance_framework-builder sits within CEX's P11 Feedback pillar as the external regulatory
  mapping module. It consumes outputs from threat_model (risk exposure data), incident_report (breach notifications triggering
  GDPR Art. 33 obligations), and safety_policy (internal rules to cross-reference). It produces compliance attestations consumed
  by audit processes, legal teams, and external regulators. Covers GDPR, EU AI Act, NIST AI RMF, ISO 42001, HIPAA, and sector-specific
  regulations. Does NOT enforce runtime safety (guardrail) or detect threats (threat_model).
