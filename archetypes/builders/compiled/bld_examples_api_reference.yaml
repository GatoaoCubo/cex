golden_example: "---\ntitle: Stripe API Reference\ndescription: REST API for payment processing\nauth: API keys (https://stripe.com/docs/api/authentication)\n\
  version: 2023-10-12\n---\n\n# Stripe API Reference\n\n## Customers\n\n### Create Customer\nMethod: POST\nPath: /v1/customers\n\
  Params:\n- `email` (required, string)\n- `name` (optional, string)\n- `payment_method` (optional, string)\n\nResponses:\n\
  - 200: {\"id\": \"cus_123\", \"email\": \"user@example.com\"}\n- 400: {\"error\": \"Invalid email format\"}\n\nExample:\n\
  curl https://api.stripe.com/v1/customers \\\n  -u sk_test_123: \\\n  -d email=user@example.com\n\n## Repositories\n\n###\
  \ List Repos\nMethod: GET\nPath: /repos/{owner}/{repo}/branches\nParams:\n- `owner` (required, string)\n- `repo` (required,\
  \ string)\n\nResponses:\n- 200: [{\"name\": \"main\", \"commit\": {\"sha\": \"abc123\"}}]\n- 404: {\"error\": \"Repository\
  \ not found\"}"
anti_example_1_missing_authentication: '# GitHub API Reference


