domain_overview: Net Promoter Score (NPS) surveys are a cornerstone of customer experience (CX) measurement, enabling organizations
  to gauge loyalty and predict growth. The core mechanism involves a single question ("How likely are you to recommend [company/product]
  to a friend?") on a 0–10 scale, with responses segmented into promoters (9–10), passives (7–8), and detractors (0–6). NPS
  is widely adopted across industries for its simplicity and correlation with revenue growth, as highlighted in Reichheld’s
  seminal 2003 Harvard Business Review paper. Follow-up questions, segmentation, and response routing enhance actionable insights,
  while cadence ensures consistent feedback without survey fatigue.
key_concepts: "| Concept               | Definition                                                                 | Source\
  \                                  |  \n|----------------------|----------------------------------------------------------------------------|-----------------------------------------|\
  \  \n| NPS Question         | Core 0–10 scale question measuring likelihood to recommend                | Reichheld (2003)\
  \                        |  \n| Scale                | 0–10 numerical scale for quantifying sentiment                  \
  \           | Net Promoter System (Bain & Company)    |  \n| Follow-up Questions  | Additional questions to gather qualitative\
  \ feedback on responses           | Bernd Schmitt (2018)                    |  \n| Segmentation         | Grouping respondents\
  \ by demographics, product usage, or tenure            | ISO 10520:2014 (Customer Satisfaction)  |  \n| Cadence        \
  \      | Frequency of survey deployment (e.g., quarterly, post-interaction)        | Forrester CX Best Practices (2020)\
  \      |  \n| Response Routing     | Directing responses to specific teams (e.g., support, product) based on NPS | Salesforce\
  \ Einstein Analytics (2021)    |  \n| Promoters/Detractors  | Categorization of respondents based on NPS score         \
  \                 | Reichheld & Sackmann (2011)             |  \n| Open-Ended Feedback  | Qualitative input collected post-NPS\
  \ question                             | American Customer Satisfaction Index (ACSI) |  \n| Survey Timing        | Strategic\
  \ placement (e.g., post-purchase, post-support)                   | Customer Experience Journal (2019)      |  \n| Response\
  \ Rate Optimization | Techniques to minimize drop-offs (e.g., concise design, incentives) | Nielsen Norman Group (2022)\
  \             |"
industry_standards:
- Net Promoter System (Bain & Company)
- ISO 10520:2014 (Customer Satisfaction Measurement)
- American Customer Satisfaction Index (ACSI)
- Forrester CX Best Practices (2020)
- 'Harvard Business Review: "One Question That Can Transform Your Business" (Reichheld, 2003)'
common_patterns:
- Use a single, standardized NPS question with 0–10 scale.
- Route detractor responses to customer success teams for immediate action.
- Segment surveys by product line or customer tier for targeted analysis.
- Deploy surveys post-interaction (e.g., after support, purchase).
- Include open-ended follow-ups for qualitative insights.
- Schedule recurring cadence (e.g., quarterly) to track trends.
pitfalls:
- Overloading surveys with too many questions, reducing completion rates.
- Failing to align segmentation with business goals (e.g., irrelevant groupings).
- Ignoring detractor feedback, missing critical retention opportunities.
- Inconsistent cadence leading to survey fatigue or skewed data.
- Not leveraging response routing to prioritize high-impact feedback.
