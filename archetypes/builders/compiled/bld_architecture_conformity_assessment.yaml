8f_pipeline_mapping: '| 8F Stage | ISOs Active | Purpose |

  |----------|------------|---------|

  | F1 CONSTRAIN | manifest, schema, config, architecture | Resolve kind, pillar, naming, field constraints |

  | F2 BECOME | manifest, system_prompt | Activate specialist identity and scope rules |

  | F3 INJECT | knowledge_card, memory, examples | Load EU AI Act domain knowledge and learned patterns |

  | F4 REASON | instruction | Drive 3-phase protocol: RESEARCH, COMPOSE, VALIDATE |

  | F5 CALL | tools | Execute cex_compile, cex_score, cex_doctor; check schema |

  | F6 PRODUCE | output_template, instruction | Generate Annex-IV artifact using template + research |

  | F7 GOVERN | quality_gate, examples | Apply H01-H08 gates and D01-D05 scoring; compare to examples |

  | F8 COLLABORATE | collaboration, tools | Save, compile, commit, signal; deliver to crew partners |'
dependency_graph: 'manifest ------> system_prompt (activates)

  manifest ------> collaboration (routing triggers)

  schema ---------> quality_gate (field counts for H-gates)

  schema ---------> output_template (field placeholders)

  knowledge_card -> instruction (domain terms)

  knowledge_card -> examples (regulatory basis for examples)

  instruction ----> output_template (which sections to populate)

  examples -------> quality_gate (D-score calibration)

  memory ---------> instruction (learned pitfall avoidance)

  config ---------> schema (naming pattern)

  config ---------> tools (path config for compile/score)

  tools ----------> quality_gate (score execution)

  architecture ---> collaboration (component interfaces)'
data_flow: "User Input (system_name, category, evidence docs)\n        |\n        v\nF1 CONSTRAIN (schema + config + manifest)\n\
  \  -- Resolve Annex III category\n  -- Determine Art. 43 procedure (internal / notified body)\n  -- Set naming: p11_ca_{system_slug}.md\n\
  \  -- Load field constraints from schema\n        |\n        v\nF2 BECOME (system_prompt + manifest)\n  -- Activate EU AI\
  \ Act conformity specialist identity\n  -- Apply ALWAYS/NEVER rules\n  -- Confirm scope: high-risk Annex III only\n    \
  \    |\n        v\nF3 INJECT (knowledge_card + memory + examples)\n  -- Load Annex III category definitions\n  -- Load Annex\
  \ IV section requirements\n  -- Load Art. 9 RMS requirements\n  -- Load Art. 10 data governance requirements\n  -- Load\
  \ Art. 14 human-oversight requirements\n  -- Load Art. 72 PMM requirements\n  -- Load learned pitfalls from memory\n  --\
  \ Reference golden example (MedTriage)\n        |\n        v\nF4 REASON (instruction -- Phase 1 RESEARCH)\n  -- Enumerate\
  \ RMS evidence items\n  -- Gather data-governance documentation\n  -- Collect human-oversight records\n  -- Compile PMM\
  \ data\n        |\n        v\nF5 CALL (tools)\n  -- Check schema validation (notified_body_id required if notified body)\n\
  \  -- Load similar artifacts from cex_retriever\n  -- Verify all required evidence is present\n        |\n        v\nF6\
  \ PRODUCE (output_template + instruction -- Phase 2 COMPOSE)\n  -- Populate all 7 Annex IV categories\n  -- Insert EU AI\
  \ Act citations\n  -- Flag Aug-2026 deadline items\n  -- Generate RMS table, DGP table, HOM controls, PMM plan\n       \
  \ |\n        v\nF7 GOVERN (quality_gate + examples -- Phase 3 VALIDATE)\n  -- H01-H08 hard gates\n  -- D01-D05 soft scoring\n\
  \  -- Compare to MedTriage golden example\n  -- If score < 8.0: return to F6\n        |\n        v\nF8 COLLABORATE (collaboration\
  \ + tools)\n  -- Save to P11/ directory\n  -- Compile: python _tools/cex_compile.py\n  -- Score: python _tools/cex_score.py\
  \ --apply\n  -- Commit: git add + git commit\n  -- Signal: write_signal('n03', 'complete', score)\n  -- Deliver Annex-IV\
  \ package to legal team"
file_naming_architecture: '| Pattern | Example | Used For |

  |---------|---------|---------|

  | p11_ca_[system].md | p11_ca_medtriage_v2.md | Conformity assessment artifacts |

  | bld_[iso]_conformity_assessment.md | bld_manifest_conformity_assessment.md | Builder ISOs (this directory) |

  | p11_ca_[system]_annex_iv.pdf | p11_ca_medtriage_v2_annex_iv.pdf | Export package (out of scope for builder) |'
integration_points: '| External System | Interface | Direction |

  |----------------|-----------|-----------|

  | Legal team | Annex IV package (.md + compiled) | OUT |

  | N01 Intelligence | AI Act research KCs | IN |

  | N05 Operations | System audit logs, accuracy test results | IN |

  | N06 Commercial | Compliance cost estimates | OUT |

  | N04 Knowledge | Conformity KCs for knowledge library | OUT |

  | cex_compile.py | Artifact compilation | OUT |

  | cex_score.py | Quality scoring | IN/OUT |

  | cex_doctor.py | System health validation | IN |

  | cex_retriever.py | Similar artifact discovery | IN |'
