session_config: "{\n  \"model\": \"gpt-4o-realtime-preview-2024-12-17\",\n  \"modalities\": [\"audio\", \"text\"],\n  \"voice\"\
  : \"alloy\",\n  \"instructions\": \"You are a customer support agent for Acme Corp. Be concise.\",\n  \"input_audio_format\"\
  : \"pcm16\",\n  \"output_audio_format\": \"pcm16\",\n  \"input_audio_transcription\": {\"model\": \"whisper-1\"},\n  \"\
  turn_detection\": {\n    \"type\": \"server_vad\",\n    \"threshold\": 0.5,\n    \"prefix_padding_ms\": 300,\n    \"silence_duration_ms\"\
  : 500\n  },\n  \"tools\": [],\n  \"tool_choice\": \"auto\",\n  \"temperature\": 0.8,\n  \"max_response_output_tokens\":\
  \ 1024\n}"
why_it_passes: '- Provider + model pinned to realtime-capable version ✓

  - Transport `websocket` paired with `pcm16` codec ✓

  - `server_vad` with explicit threshold, padding, silence_ms ✓

  - `quality: null` in frontmatter ✓

  - ID matches `^p04_rs_[a-z0-9_]{3,48}\.md$` ✓


  ---'
