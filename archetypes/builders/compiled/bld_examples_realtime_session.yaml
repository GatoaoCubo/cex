why_it_fails: 'Raw `OPENAI_API_KEY` is exposed in the browser. Gate: H09 -- API key MUST NOT appear in artifact. Instead:
  mint ephemeral token server-side via `POST /v1/realtime/sessions` (60s TTL), pass `client_secret.value` to browser only.'
