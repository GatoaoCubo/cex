id: p03_ins_rag_source
kind: instruction
pillar: P01
version: 1.0.0
created: 2026-03-27
updated: 2026-03-27
author: instruction-builder
title: RAG Source Builder Instructions
target: rag-source-builder agent
phases_count: 4
prerequisites:
- A URL for the external source is available and syntactically valid
- Caller has identified the domain this source serves (e.g. llm_providers, benchmarks, tooling)
- Caller can estimate how frequently the source is updated (daily, weekly, monthly, static)
validation_method: checklist
domain: rag_source
quality: null
tags:
- instruction
- rag-source
- P01
- content
- indexing
- freshness
- pointer
idempotent: true
atomic: true
rollback: Delete the produced pointer file. No content was fetched or stored.
dependencies: []
logging: true
tldr: Catalog an external URL as an indexable rag_source pointer with freshness policy, reliability, and format — under 1024
  bytes, no content.
density_score: 0.92
context: 'A rag_source is a pointer record: it catalogs where authoritative external data lives so a retrieval pipeline can
  schedule crawls and index the content. The artifact contains metadata about the source — URL, domain, format, freshness
  schedule, reliability classification — but it does NOT contain any extracted content. The 1024-byte body limit enforces
  this constraint structurally.

  Inputs

  | Field | Type | Description |

  |---|---|---|

  | `url` | string | Full URL of the external source |

  | `domain` | string | CEX subject domain this source serves (e.g. `llm_providers`, `benchmarks`, `tooling`) |

  | `description` | string | One sentence: what this source contains and why it is authoritative |

  | `update_frequency` | string | How often the source publishes new content: `realtime`, `daily`, `weekly`, `monthly`, `static`
  |

  Output

  A single `.md` file with YAML frontmatter (5 required + optional recommended fields) and a minimal body. Total size must
  be <= 1024 bytes. Contains no extracted content from the source.

  Boundary rules

  - rag_source = pointer to external URL for crawling and indexing (this builder)

  - knowledge_card = distilled content extracted from a source (different builder)

  - context_doc = domain background context written for an agent to read at boot (different builder)

  - embedding_config = configuration for how the vector index is built (different builder)'
phases: ''
phase_1_discover_qualify_the_source: "Identify, validate, and classify the source before writing anything.\nURL validation:\n\
  \  scheme must be https:// or http://  (reject ftp://, file://, data://)\n  domain must be a public hostname    (reject\
  \ localhost, 127.x, 192.168.x, 10.x)\n  no authentication tokens in plaintext in the URL\nDuplicate check:\n  IF brain_query\
  \ [IF MCP] available:\n    brain_query(\"rag_source {{domain}} {{url_hostname}}\")\n    IF existing entry found for same\
  \ URL: STOP and report duplicate\nFormat inference:\n  url ends in .pdf                    -> format = pdf\n  url ends in\
  \ .csv or .tsv            -> format = csv\n  url contains /api/ or /v1/ or /v2/  -> format = api\n  url ends in .json  \
  \                 -> format = json\n  otherwise                           -> format = html\nReliability classification:\n\
  \  high:    official government, academic, or primary-source domain\n  medium:  established industry publication or known\
  \ aggregator\n  low:     user-generated content, forums, or unverified third parties\nsource_slug generation:\n  lowercase,\
  \ underscores, max 30 chars, describes the source\n  must match: ^[a-z][a-z0-9_]+$\n  example: anthropic_claude_api_docs,\
  \ huggingface_model_hub\nStaleness threshold (infer from update_frequency):\n  realtime  -> \"1h\"\n  daily     -> \"24h\"\
  \n  weekly    -> \"7d\"\n  monthly   -> \"30d\"\n  static    -> null (manual trigger only)\nChecklist before proceeding\
  \ to Phase 2:\n- URL present and syntactically valid\n- Domain identified\n- No duplicate found in brain (or brain MCP unavailable\
  \ — proceed with note)\n- Format, reliability, and source_slug determined"
phase_2_classify_boundary_check: "Confirm this artifact is `rag_source` and not a sibling kind.\nIF caller wants to store\
  \ extracted or summarized content from the URL:\n  RETURN \"Route to knowledge-card-builder — distills content, not a pointer.\"\
  \nIF caller wants domain background context for an agent:\n  RETURN \"Route to context-doc-builder — writes agent context,\
  \ not a source pointer.\"\nIF caller wants to configure vectorization or embedding parameters:\n  RETURN \"Route to embedding-config-builder.\"\
  \nIF the source is an internal file, not a publicly accessible URL:\n  RETURN \"rag_source is for external URLs. Use a different\
  \ kind for internal files.\"\nIF URL is valid AND purpose is to register the source for crawling/indexing:\n  PROCEED as\
  \ rag_source\nDeliverable: confirmed `kind: rag_source` with one-line justification."
phase_3_compose_build_the_pointer_record: "Assemble frontmatter and body. Stay within the 1024-byte body limit.\n```\nID generation:\n\
  \  id = \"p01_rs_\" + source_slug\n  must match: ^p01_rs_[a-z][a-z0-9_]+$\n  id must equal the filename stem (e.g. p01_rs_anthropic_claude_api_docs.md)\n\
  Frontmatter (5 required fields — MUST all be present):\n  id:           p01_rs_{source_slug}\n  kind:         rag_source\n\
  \  url:          {validated_url}\n  domain:       {domain}\n  last_checked: {today YYYY-MM-DD}\nFrontmatter (recommended\
  \ additional fields):\n  pillar:             P01\n  version:            \"1.0.0\"\n  created:            {today YYYY-MM-DD}\n\
  \  updated:            {today YYYY-MM-DD}\n  author:             {author}\n  format:             {html|json|api|pdf|csv}\n\
  \  reliability:        {high|medium|low}\n  update_frequency:   {realtime|daily|weekly|monthly|static}\n  staleness_threshold:\
  \ {duration or null}\n  quality:            null\n  tags:               [rag-source, {domain}, {format}]  -- minimum 3 tags\n\
  \  tldr:               {<= 160 chars summary of what this source provides}\nBody (must stay within 1024 bytes total):\n\
  \  ## Source Description\n  What is this source? What content does it contain? Who maintains it?\n  One short paragraph.\
  \ Do NOT include extracted content."
