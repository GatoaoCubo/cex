phase_1_research:
- Identify SOC2+PCI-DSS compliance requirements for fintech data handling.
- Map KYC/AML regulatory frameworks (e.g., FATF, GDPR, AMLA).
- Analyze fraud detection methodologies (machine learning, rule-based systems).
- Document industry-specific use cases (e.g., real-time transaction monitoring).
- Interview stakeholders for pain points in compliance and fraud prevention.
- Benchmark competitors’ approaches to security and regulatory alignment.
phase_2_compose:
- Align artifact structure with SCHEMA.md’s compliance section.
- Draft SOC2+PCI-DSS controls using OUTPUT_TEMPLATE.md’s control matrix.
- Write KYC/AML workflows with example data formats (e.g., JSON for customer onboarding).
- Detail fraud detection algorithms with pseudocode and performance metrics.
- Embed use cases (e.g., “detecting synthetic identity fraud in 10ms”).
- Reference SCHEMA.md’s data governance section for artifact consistency.
- Integrate PCI-DSS scope definitions (e.g., cardholder data environments).
- Cross-check artifact against OUTPUT_TEMPLATE.md’s compliance checklist.
- Finalize with stakeholder-approved terminology and regulatory citations.
phase_3_validate:
- '[ ] ✅ Verify SOC2+PCI-DSS alignment via third-party audit tools.'
- '[ ] ✅ Confirm KYC/AML workflows pass mock regulatory stress tests.'
- '[ ] ✅ Ensure fraud detection logic matches schema-defined thresholds.'
- '[ ] ✅ Validate use cases against real-world fintech incident reports.'
- '[ ] ✅ Conduct peer review for clarity and adherence to OUTPUT_TEMPLATE.md.'
