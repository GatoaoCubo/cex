phase_1_research:
- Identify SOC2+PCI-DSS compliance requirements for fintech data handling.
- Map KYC/AML regulatory frameworks (e.g., FATF, GDPR, AMLA).
- Analyze fraud detection methodologies (machine learning, rule-based systems).
- Document industry-specific use cases (e.g., real-time transaction monitoring).
- Interview stakeholders for pain points in compliance and fraud prevention.
- Benchmark competitors’ approaches to security and regulatory alignment.
phase_2_compose:
- Align artifact structure with bld_schema_fintech_vertical.md’s compliance section.
- Draft SOC2 Type II + PCI-DSS v4.0 controls using bld_output_template_fintech_vertical.md’s control matrix.
- Write KYC/AML workflows with example data formats (e.g., JSON for customer onboarding, FinCEN CIP fields).
- Detail fraud detection algorithms (Sift/Sardine integration patterns) with performance metrics.
- Embed use cases (e.g., “OFAC SDN list screening at onboarding”, “detecting synthetic identity fraud”).
- Reference bld_schema_fintech_vertical.md’s data governance section for artifact consistency.
- Integrate PCI-DSS v4.0 scope definitions (cardholder data environments, tokenization).
- Add FFIEC Cybersecurity Assessment Tool (CAT) mapping and ISO 20022 message types where relevant.
- Cross-check artifact against bld_output_template_fintech_vertical.md’s compliance checklist.
- Finalize with SOX Section 404 controls documentation if applicable.
