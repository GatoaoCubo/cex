golden_example: "{\n  \"@context\": [\n    \"https://www.w3.org/ns/credentials/v2\",\n    \"https://cex.ai/ns/agent-identity/v1\"\
  \n  ],\n  \"id\": \"https://cex.ai/credentials/agent-n03-capability-2026\",\n  \"type\": [\"VerifiableCredential\", \"AgentCapabilityCredential\"\
  ],\n  \"issuer\": {\n    \"id\": \"did:web:cex.ai\",\n    \"name\": \"CEX Nucleus N07 Orchestrator\"\n  },\n  \"validFrom\"\
  : \"2026-04-14T00:00:00Z\",\n  \"validUntil\": \"2027-04-14T00:00:00Z\",\n  \"credentialSubject\": {\n    \"id\": \"did:key:z6MkAgent03BuilderXXXX\"\
  ,\n    \"capabilityDomain\": \"artifact-construction\",\n    \"qualityFloor\": \"9.0\",\n    \"pipeline\": \"8F\",\n   \
  \ \"nucleusRole\": \"N03-Builder\"\n  },\n  \"credentialSchema\": {\n    \"id\": \"https://cex.ai/schemas/agent-capability/v2\"\
  ,\n    \"type\": \"JsonSchemaValidator2018\"\n  },\n  \"credentialStatus\": {\n    \"id\": \"https://cex.ai/status/list/2026#42\"\
  ,\n    \"type\": \"StatusList2021Entry\",\n    \"statusPurpose\": \"revocation\",\n    \"statusListIndex\": \"42\",\n  \
  \  \"statusListCredential\": \"https://cex.ai/status/list/2026\"\n  },\n  \"proof\": {\n    \"type\": \"DataIntegrityProof\"\
  ,\n    \"cryptosuite\": \"ecdsa-rdfc-2022\",\n    \"created\": \"2026-04-14T00:00:00Z\",\n    \"verificationMethod\": \"\
  did:web:cex.ai#key-1\",\n    \"proofPurpose\": \"assertionMethod\",\n    \"proofValue\": \"z3xWg4LKd...\"\n  }\n}"
anti_example_1_legacy_vc_1_x_fields: "{\n  \"@context\": [\"https://www.w3.org/2018/credentials/v1\"],\n  \"issuanceDate\"\
  : \"2026-04-14\",\n  \"issuer\": \"https://cex.ai\"\n}\nWhy it fails: Uses VC 1.x context and deprecated `issuanceDate`\
  \ field. VC 2.0 requires `https://www.w3.org/ns/credentials/v2` context and `validFrom` (not `issuanceDate`). Non-DID issuer\
  \ violates agent identity requirement."
anti_example_2_missing_proof: "{\n  \"@context\": [\"https://www.w3.org/ns/credentials/v2\"],\n  \"id\": \"https://cex.ai/credentials/test\"\
  ,\n  \"type\": [\"VerifiableCredential\"],\n  \"issuer\": \"did:web:cex.ai\",\n  \"validFrom\": \"2026-04-14T00:00:00Z\"\
  ,\n  \"credentialSubject\": {\"id\": \"did:key:z6Mk...\"}\n}\nWhy it fails: No proof block. A VC without a data-integrity\
  \ proof is an unsigned claim -- not verifiable. Also missing credentialSchema and credentialStatus."
anti_example_3_jwt_encoding_in_wrong_kind: 'Why it fails: JWT-encoded VCs belong to the vc-jose-cose profile kind. This kind
  exclusively handles JSON-LD with data-integrity proofs. Mixing encoding formats causes verifier confusion.'
