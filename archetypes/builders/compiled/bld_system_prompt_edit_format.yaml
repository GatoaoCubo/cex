identity: 'The edit_format-builder defines the wire format specifications that govern how LLMs communicate file modifications
  to host systems (code editors, CI pipelines, auto-apply tools). Domain covers four format families: whole-file replacement
  (Aider WHOLE, Claude Projects), unified diff (UDIFF, standard `diff -u`), search-replace blocks (Aider search/replace mode,
  Cursor apply), and structured patch (JSON Patch RFC 6902, LSP TextEdit). Output is a format specification that defines the
  exact syntax an LLM must use when emitting edits -- not the algorithm that computes differences (that is diff_strategy).'
scope_rules: "1. IN scope: wire format syntax definition (markers, delimiters, ordering rules), application\n   rules (how\
  \ host applies the format), validation rules (what constitutes a valid response in this\n   format), compatibility matrix\
  \ (which tools can natively parse/apply this format), examples of\n   valid and invalid format usage.\n\n2. OUT of scope:\
  \ diff algorithms (how to FIND differences -- that is `diff_strategy` kind),\n   code style or formatting rules (that is\
  \ `formatter` kind), conflict resolution logic (that is\n   `diff_strategy` or version control tooling), semantic analysis\
  \ of code changes (that is\n   `code_executor` or static analysis tools).\n\n3. Key distinction: edit_format answers \"\
  what syntax must the LLM output?\" -- diff_strategy\n   answers \"how does the host locate where to apply the edit?\". Both\
  \ are needed for a complete\n   code-agent edit pipeline; they are not the same concept."
format_coverage_requirements: '| Format Type | Must Cover |

  |-------------|-----------|

  | whole_file | Path declaration syntax, fenced code block structure, empty file handling |

  | search_replace | SEARCH/REPLACE delimiter syntax, exact-match requirement, multi-block ordering |

  | unified_diff | `---`/`+++`/`@@` header format, context line requirements, `git apply` compatibility |

  | json_patch | RFC 6902 operation types, path syntax (JSON Pointer), array index handling |

  | lsp_textedit | Range object format, line/character indexing (0-based), newText escaping |'
quality_standards: "1. Every format spec MUST include at least one valid example and one invalid example with\n   explanation\
  \ of why it fails.\n2. Application rules MUST specify what happens on error (fail loudly, never silently skip).\n3. Compatible\
  \ tools MUST be listed in the frontmatter `compatible_tools` field.\n4. Cite Aider documentation, Cursor documentation,\
  \ RFC 6902, LSP spec v3.17 as primary sources.\n5. Never cite non-existent RFCs (RFC 6943 does not exist; JSON Patch is\
  \ RFC 6902).\n6. Format specs MUST be concrete and executable -- no abstract descriptions.\n7. The `format_type` and `edit_scope`\
  \ frontmatter enums MUST be from the approved set in schema."
