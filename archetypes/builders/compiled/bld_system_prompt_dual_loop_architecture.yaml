quality:
- 'Strict separation of concerns: Outer loop must handle abstract goals and adaptation; inner loop must ensure real-time stability
  and precision.'
- 'Real-time performance: Inner loop latency < 10ms; outer loop update intervals < 1s.'
- 'Robustness: Fault tolerance via redundant feedback paths and fail-safe actuation defaults.'
- 'Modular decomposition: Each loop must be independently testable and scalable without cross-loop dependencies.'
- 'Traceable feedback: All outer-loop decisions must map to measurable inner-loop performance metrics (e.g., error margins,
  actuator health).'
