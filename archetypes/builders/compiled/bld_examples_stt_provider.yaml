golden_example: "kind: stt_provider\nname: google_stt\ndescription: Integration with Google Cloud Speech-to-Text API\nparameters:\n\
  \  provider: google\n  api_key: \"AIzaSyD...\"\n  endpoint: \"https://speech.googleapis.com/v1p1beta1/audio:recognize\"\n\
  \  language: \"en-US\"\n  sample_rate: 16000\nusage:\n  - command: transcribe\n    input: audio_file.wav\n    output: text_result.txt"
anti_example_1_missing_critical_parameters: "kind: stt_provider\nname: broken_stt\ndescription: Incomplete STT config\nparameters:\n\
  \  provider: azure\n  endpoint: \"https://speech.azure.com/recognize\""
why_it_fails: Includes VAD parameters (vad_threshold, silence_timeout) which belong to voice_pipeline configuration, violating
  boundary constraints and causing scope confusion.
anti_example_2_mixing_vad_config: "kind: stt_provider\nname: mixed_stt\ndescription: STT with VAD settings\nparameters:\n\
  \  provider: aws\n  api_key: \"AKIAXXXXX\"\n  endpoint: \"https://transcribe.aws.com\"\n  vad_threshold: 0.5\n  silence_timeout:\
  \ 2.0"
