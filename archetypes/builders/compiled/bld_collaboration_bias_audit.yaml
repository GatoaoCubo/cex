crew_role: 'This ISO drives a bias audit: measuring fairness across demographic slices. Audits models and datasets for bias,
  analyzes fairness metrics, and generates actionable bias mitigation recommendations. Collaborates with data preprocessors
  and model evaluators to ensure equitable outcomes.'
receives_from: "| Builder        | What                  | Format      |  \n|----------------|-----------------------|-------------|\
  \  \n| data_preprocessor | Raw dataset           | CSV/JSON    |  \n| model_evaluator   | Model predictions     | JSON \
  \       |  \n| fairness_spec     | Bias criteria         | YAML        |"
produces_for: "| Builder        | What                        | Format      |  \n|----------------|-----------------------------|-------------|\
  \  \n| report_generator | Bias audit report           | PDF/Markdown|  \n| model_evaluator  | Fairness metric breakdown\
  \   | JSON        |  \n| mitigation_team  | Mitigation action plan      | YAML        |"
boundary: Does NOT handle benchmarking (use `benchmark_builder`) or define single evaluation metrics (use `eval_metric_builder`).
  Data preprocessing is handled by `data_preprocessor`.
