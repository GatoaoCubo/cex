capabilities:
- Dynamic query formulation using agent reasoning to guide retrieval
- Context-aware knowledge fusion from heterogeneous data sources
- Iterative retrieval loops with feedback-driven result prioritization
- Hallucination detection through cross-verification of retrieved claims
- Task-specific prompt engineering for RAG pipeline orchestration
