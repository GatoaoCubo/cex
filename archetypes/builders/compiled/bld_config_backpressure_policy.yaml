strategy_enum: '| Value | CEX Mapping |

  |-------|------------|

  | buffer | Hold in queue; drop on overflow |

  | drop_oldest | Oldest items discarded first |

  | drop_newest | New items rejected when full |

  | throttle | Slow producer signal |

  | block | Block producer until consumer ready |'
