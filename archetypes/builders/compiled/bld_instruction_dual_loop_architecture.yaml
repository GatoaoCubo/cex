phase_1_research: "This ISO applies to the dual loop pattern, coordinating an outer orchestrator with one or more inner worker\
  \ loops.\n1. Define dual-loop architecture purpose: outer loop for long-term planning, inner loop for real-time execution.\
  \  \n2. Analyze existing agent control frameworks for compatibility with P08 REASON function.  \n3. Identify key components:\
  \ outer loop (goals, policies), inner loop (sensors, actuators).  \n4. Map interaction protocols between loops (e.g., feedback,\
  \ error correction).  \n5. Evaluate trade-offs between loop autonomy and coordination.  \n6. Document research findings\
  \ in schema-compatible format (SCHEMA.md)."
