production_tools: "| Tool | Purpose | When |  \n|------|---------|------|  \n| cex_compile.py | Integrates text, image, and\
  \ audio inputs into a unified prompt | During multimodal content creation |  \n| cex_score.py | Evaluates prompt quality\
  \ using multimodal alignment metrics | After initial prompt generation |  \n| cex_retriever.py | Fetches relevant external\
  \ data (e.g., images, videos) for prompt context | When contextual data is required |  \n| cex_doctor.py | Diagnoses and\
  \ fixes multimodal prompt inconsistencies | During debugging or validation phases |  \n| cex_optimizer.py | Refines prompts\
  \ for efficiency and cross-modal coherence | Before deployment or iteration |  \n| cex_synthesizer.py | Combines modalities\
  \ into a structured output format (e.g., JSON, HTML) | For final output preparation |"
validation_tools: "| Tool | Purpose | When |  \n|------|---------|------|  \n| val_consistency_check.py | Ensures alignment\
  \ between text and non-text modalities | During validation cycles |  \n| val_quality_eval.py | Assesses clarity and relevance\
  \ of multimodal prompts | Post-generation quality checks |  \n| val_alignment_test.py | Verifies model adherence to prompt\
  \ instructions across modalities | After training or updates |  \n| val_robustness_test.py | Tests prompt resilience against\
  \ noisy or incomplete inputs | For edge case handling |"
