hard_gates: "(Table: ID | Check | Fail Condition)  \n| ID      | Check                          | Fail Condition         \
  \                             |  \n|---------|--------------------------------|-----------------------------------------------------|\
  \  \n| H01     | YAML frontmatter valid         | Invalid YAML syntax or missing frontmatter          |  \n| H02     | ID\
  \ matches ^p12_wn_[a-z][a-z0-9_]+.md$ | ID does not match required schema pattern         |  \n| H03     | kind field matches\
  \ 'workflow_node' | kind is not 'workflow_node'                        |  \n| H04     | 'name' field present           |\
  \ Missing 'name' field                               |  \n| H05     | 'inputs' and 'outputs' defined | Missing 'inputs'\
  \ or 'outputs'                      |  \n| H06     | 'type' field valid             | 'type' not in [trigger, processor,\
  \ decision]       |  \n| H07     | 'description' field present    | Missing 'description'                              |\
  \  \n| H08     | Unique node ID in workflow     | Duplicate node ID detected                         |"
soft_scoring: "(Table: Dim | Dimension | Weight | Scoring Guide)  \n| Dim | Dimension         | Weight | Scoring Guide   \
  \                                   |  \n|-----|-------------------|--------|----------------------------------------------------|\
  \  \n| D1  | Code Quality      | 0.15   | Clean, readable code; no syntax errors             |  \n| D2  | Documentation\
  \     | 0.10   | Complete and accurate 'description' field          |  \n| D3  | Input/Output      | 0.15   | Valid, non-ambiguous\
  \ 'inputs'/'outputs'            |  \n| D4  | Error Handling    | 0.10   | Robust error handling for edge cases         \
  \      |  \n| D5  | Performance       | 0.10   | Efficient execution, minimal latency               |  \n| D6  | Maintainability\
  \   | 0.10   | Modular design, clear separation of concerns       |  \n| D7  | Test Coverage     | 0.10   | Unit/integration\
  \ tests cover >80% of logic         |  \n| D8  | Type Safety       | 0.10   | Strong typing enforced for inputs/outputs\
  \          |"
actions: "(Table: Score | Action)  \n| Score      | Action                                      |  \n|------------|---------------------------------------------|\
  \  \n| GOLDEN     | Auto-approve and deploy                     |  \n| PUBLISH    | Manual review required before deployment\
  \    |  \n| REVIEW     | Flag for technical lead review              |  \n| REJECT     | Reject; fix all HARD/Gate failures\
  \          |"
bypass: "(Table: conditions, approver, audit trail)  \n| Conditions              | Approver         | Audit Trail        \
  \                      |  \n|-------------------------|------------------|------------------------------------------|  \n\
  | Emergency workflow fix  | Lead Architect   | Bypass logged with justification and date |"
