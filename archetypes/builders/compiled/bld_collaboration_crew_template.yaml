crew_role: 'Acts as the team-architect of P12 orchestration: composes role_assignment atoms into reusable crew blueprints.
  Upstream from supervisor (which instantiates and runs the crew) and workflow (which may sequence multiple crews).'
receives_from: '| Builder                    | What                         | Format      |

  |----------------------------|------------------------------|-------------|

  | role-assignment-builder    | Role atoms (agent bindings)  | p02_ra_*.md |

  | handoff-protocol-builder   | Inter-role transfer formats  | p12_hp_*.md |

  | workflow-builder           | Task dependency graph        | p12_wf_*.md |

  | quality-gate-builder       | Gate IDs for success_criteria| p11_qg_*.md |'
produces_for: '| Builder               | What                            | Format         |

  |-----------------------|---------------------------------|----------------|

  | supervisor-builder    | Crew blueprint to instantiate   | p12_ct_*.md    |

  | workflow-builder      | Reusable team step              | reference      |

  | agent-package-builder | Distributable crew bundle       | artifact ref   |

  | N07 orchestrator      | Dispatch-time crew instantiation| handoff ref    |'
boundary: 'Does NOT bind individual agents to roles (that is role-assignment-builder). Does NOT execute the crew at runtime
  (supervisor-builder handles instantiation). Does NOT define single-task transfers (handoff-builder). Does NOT own agent
  identity (agent-builder). Owns ONLY the declarative blueprint: roles + process + memory + success.'
