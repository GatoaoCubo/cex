observation: Common issues include underestimating viral coefficient thresholds, leading to slow adoption, and reward structures
  that incentivize short-term gains over long-term retention.
pattern: Effective designs balance immediate rewards with long-term value, using tiered incentives to scale participation
  while maintaining program sustainability.
evidence: Reviewed artifacts showed programs with viral coefficients >1.5 achieved 40% faster growth, while those with unclear
  reward tiers saw 30% higher churn.
recommendations:
- Calculate viral coefficient early using hypothetical user behavior models.
- Implement tiered rewards that escalate with referral volume (e.g., 1st referrer gets $5, 10th gets $20).
- Track referral sources explicitly to avoid ambiguity in credit allocation.
- Test reward thresholds against retention metrics to prevent burnout.
- Ensure program rules are visible in onboarding flows to reduce confusion.
