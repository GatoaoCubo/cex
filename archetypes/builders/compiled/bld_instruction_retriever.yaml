kind: instruction
id: bld_instruction_retriever
pillar: P03
llm_function: REASON
purpose: Step-by-step production process for retriever artifacts
pattern: 3-phase pipeline (Research -> Compose -> Validate)
version: 1.0.0
created: 2026-03-28
updated: 2026-03-28
author: builder_agent
quality: null
tags:
- instruction
- retriever
- P03
- RAG
- vector-search
density_score: 0.86
phase_1_research:
- Identify the vector store backend — ask if not specified (Chroma, Pinecone, FAISS, Qdrant, Weaviate, Milvus, Elasticsearch,
  custom)
- 'Determine the embedding model: name, provider, dimension size (e.g. text-embedding-3-small = 1536d)'
- 'Choose similarity metric based on embedding model recommendations:'
- 'OpenAI models: cosine (normalized) or dot_product'
- 'Cohere embed-v3: dot_product (natively normalized)'
- 'Sentence-transformers: cosine'
- 'Custom/unknown: cosine (safe default)'
- 'Decide search strategy:'
- 'vector: dense embeddings only — best for semantic similarity'
- 'keyword: BM25/TF-IDF — best for exact term matching'
- 'hybrid: RRF or weighted fusion — best for most production RAG'
- 'Define top_k: typical range 5-20; for reranking pipelines use top_k=50 then rerank to top 5'
- 'Decide reranker: Cohere rerank-v3, ColBERT, cross-encoder/ms-marco — only if top_k > 20 or precision critical'
- 'Map metadata_filters: which document fields can be filtered pre-search (e.g. source, date, category, language)'
- Confirm namespace/collection scoping — multi-tenant or single collection
- Check for existing retriever artifacts to avoid duplicates (glob p04_retr_*.md)
- 'Confirm store slug for id: snake_case, lowercase, no hyphens'
phase_2_compose:
- Read bld_schema_retriever.md — source of truth for all fields
- Read bld_output_template_retriever.md — fill {{vars}} following schema constraints
- 'Fill frontmatter: all required fields present, quality: null'
- 'Write `## Overview`: store backend, embedding model, use case context'
- 'Write `## Search Strategy`: vector/keyword/hybrid rationale, similarity metric justification, reranking if applicable'
- 'Write `## Configuration`: top_k value, metadata_filters list, namespace, score threshold if applicable'
- 'Write `## Integration`: SDK/library reference, auth pattern, connection string format (no secrets)'
- Measure body byte count — must be <= 2048 bytes
- Verify id matches `^p04_retr_[a-z][a-z0-9_]+$` and equals filename stem
phase_3_validate:
- Open bld_quality_gate_retriever.md — verify each HARD gate in order
- 'H01: YAML frontmatter parses without errors'
- 'H02: id matches `^p04_retr_[a-z][a-z0-9_]+$` and equals filename stem'
- 'H03: kind == "retriever"'
- 'H04: quality == null'
- 'H05: all required fields present (id, name, store_type, embedding_model, similarity_metric, top_k)'
- 'H06: store_type is valid enum value'
- 'H07: embedding_model is a non-empty string'
- 'H08: similarity_metric is valid enum value'
- 'H09: top_k >= 1'
- 'H10: body <= 2048 bytes'
- Score SOFT gates (target >= 7.0)
- 'Boundary check: is this local store search? Not web? Not file ingestion? Not SQL?'
- If any HARD gate fails — fix before delivering artifact
