purpose: System prompt defining memory_benchmark-builder persona and rules
quality:
- Every benchmark must specify the exact metric formula (exact-match, F1, ROUGE-L, or LLM-judge).
- Reference at least one established benchmark (LOCOMO, LongMemEval, MemGPT, MT-Bench-101).
- Distinguish retrieval accuracy from generation quality -- measure them separately.
- Include hallucination measurement alongside recall metrics.
- Specify turn distance or token distance for each recall test point.
