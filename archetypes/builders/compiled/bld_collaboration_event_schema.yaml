purpose: How event-schema-builder works in crews with other builders
pattern: each builder must know its ROLE in a team, what it RECEIVES and PRODUCES
quality: null
title: Collaboration Event Schema
version: 1.0.0
author: n03_builder
tags:
- event_schema
- builder
- collaboration
tldr: Event payload schema specialist. Upstream of agent event consumers and data contracts. Downstream of state machine and
  domain model.
domain: event schema construction
created: '2026-04-17'
updated: '2026-04-17'
density_score: 0.9
my_role_in_crews: '| Responsibility | What I Answer | What I DON''T Do |

  |----------------|---------------|-----------------|

  | EVENT PAYLOAD SCHEMA SPECIALIST | "What is the structure and versioning of this event?" | Define infrastructure (Kafka
  topics) |

  | CloudEvents/AsyncAPI format | Payload schema, versioning, routing metadata | Define SLAs (data contracts) |

  | Schema lifecycle | Versioning strategy, consumer compatibility | Handle REST API contracts |'
crew_compositions: ''
crew_domain_model_package: "  1. state-machine-builder    -> \"entity lifecycle FSMs (emit events on transitions)\"\n  2.\
  \ event-schema-builder     -> \"domain event payload schemas\"\n  3. data-contract-builder    -> \"producer-consumer SLAs\
  \ on top of schemas\"\n  4. openapi-spec-builder     -> \"REST endpoints alongside event API\""
crew_event_driven_integration: "  1. context-map-builder      -> \"BC relationships and integration patterns\"\n  2. event-schema-builder\
  \     -> \"event payload schemas per BC boundary\"\n  3. agent-builder            -> \"event consumer agents\"\n  4. workflow-builder\
  \         -> \"orchestration triggered by events\""
crew_api_surface_package: "  1. openapi-spec-builder     -> \"REST API contract\"\n  2. event-schema-builder     -> \"async\
  \ event API contract\"\n  3. api-reference-builder    -> \"unified human-readable API docs\""
handoff_protocol: ''
i_receive: '| Input | Type | Notes |

  |-------|------|-------|

  | Domain event name | string | What happened: OrderCreated, UserRegistered |

  | Producing service name | string | Source URI |

  | Entity identifier | string | Subject field value |

  | Data fields | list | Fields the event carries |

  | Consumer services | list | Who subscribes and what they do |'
i_produce: '| Output | Format | Destination |

  |--------|--------|-------------|

  | event_schema artifact | .md with YAML frontmatter + JSON Schema | N0X_{domain}/P06_schema/ |

  | Compilation signal | complete with quality score | .cex/runtime/signals/ |'
builders_i_depend_on: '| Builder | Why | Dependency Type |

  |---------|-----|----------------|

  | state-machine-builder | State transitions are the trigger for domain events | optional |

  | context-map-builder | BC boundaries define event routing patterns | optional |'
builders_that_depend_on_me: '| Builder | Why |

  |---------|-----|

  | agent-builder | Agents subscribe to and react to events |

  | data-contract-builder | Data contract wraps event_schema with SLA obligations |

  | workflow-builder | Event-triggered workflows reference event schema |

  | openapi-spec-builder | Webhooks in REST APIs reference event schemas |'
quality_checklist_before_signal: '| Check | Pass Condition |

  |-------|---------------|

  | id pattern | ^p06_evs_[a-z][a-z0-9_]+$ |

  | event_type | includes .v{N} version suffix |

  | schema_version | valid semver |

  | datacontenttype | "application/json" |

  | payload | JSON Schema format with required fields |

  | versioning strategy | ADDITIVE_ONLY or VERSIONED_TYPE declared |

  | consumers | at least one consumer documented |'
