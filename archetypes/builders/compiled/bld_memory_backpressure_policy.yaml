title: Memory Backpressure Policy
density_score: 0.9
llm_function: INJECT
summary: Backpressure misconfigurations cause silent data loss (drop without monitoring) or latency cascades (block in real-time).
  Always declare strategy explicitly. Always declare overflow_action. Monitor drop events.
anti_pattern:
- No overflow_action -- platform default is unpredictable
- drop without monitoring -- silent data loss
- block in streaming pipeline -- latency cascade upstream
- buffer_size unlimited -- OOM on sustained burst
- Conflating with rate_limit -- backpressure is consumer-driven, rate limit is quota-driven
