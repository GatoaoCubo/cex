observation: Pipelines without declared backpressure_policy defaulted to platform-specific behavior (unbounded buffer in some,
  drop in others). drop strategy without monitoring caused silent data loss. block strategy in real-time pipelines cascaded
  latency upstream.
pattern:
- 'strategy: always explicit -- never rely on platform default'
- 'overflow_action: declare; if drop, instrument with counter metric'
- 'buffer_size: size for peak burst, not average load'
- 'consumer_signal: demand for reactive pipelines, pull for polling'
