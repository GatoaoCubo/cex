  domain: "customer support"

  language: en

  sample_rate: 16000

  quality: null

  tags: [voice_pipeline, customer_support, deepgram, rasa, elevenlabs]

  tldr: "5-stage English contact center pipeline: RNNoise+VAD preprocessing, Deepgram Nova-2 STT, Rasa NLU, LangChain DM,
  ElevenLabs TTS."

  ---'
pipeline_stages: '| Stage | Provider | Input | Output |

  |-------|----------|-------|--------|

  | Audio Preprocessing | RNNoise + WebRTC VAD | Raw PCM 16kHz | Cleaned PCM 16kHz |

  | STT | Deepgram Nova-2 (WebSocket streaming) | Cleaned PCM | JSON transcript |

  | NLU | Rasa Open Source 3.x | Transcript text | Intent + entities |

  | Dialogue Management | LangChain + GPT-4o | Intent + session history | Response text |

  | TTS | ElevenLabs Turbo v2.5 (streaming) | Response text | MP3/PCM audio stream |'
why_it_passes: '- All 5 stages present including audio preprocessing ✓

  - Real provider names (Deepgram Nova-2, Rasa, ElevenLabs Turbo) ✓

  - Provider abstraction: each stage uses interface, not hardcoded API ✓

  - `quality: null` in frontmatter ✓

  - ID matches `^p04_vp_[a-z0-9_]+$` ✓


  ---'
anti_example_1_placeholder_provider_names: "---\nkind: voice_pipeline\nid: p04_vp_basic\npillar: P04\ntitle: \"Basic Voice\
  \ Pipeline\"\nquality: null\n---\ncomponents:\n  - name: speech_recognition\n    type: stt\n    providers: [providerA, providerB]\n\
  \  - name: text_to_speech\n    type: tts\n    providers: [providerX, providerY]"
why_it_fails: 'No fallback chains defined. When Deepgram has an outage (avg 2-3x/year for any SaaS), pipeline goes down completely.
  Recovery time: 15+ minutes mean (manual intervention). With fallback to OpenAI Whisper v3: zero-downtime automatic failover.'
anti_example_2_missing_audio_preprocessing: "---\nkind: voice_pipeline\nid: p04_vp_no_preproc\npillar: P04\ntitle: \"Unprocessed\
