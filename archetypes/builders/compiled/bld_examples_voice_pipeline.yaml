  \ dialogflow_cx\n  - name: tts\n    provider: google_cloud_tts"
anti_example_3_single_provider_no_fallback: "---\nkind: voice_pipeline\nid: p04_vp_locked\npillar: P04\ntitle: \"Single-Provider\
