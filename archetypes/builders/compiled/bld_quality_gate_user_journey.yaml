definition: "(Table: metric, threshold, operator, scope)  \n| metric | threshold | operator | scope |  \n|---|---|---|---|\
  \  \n| User journey map completeness | 100% | >= | Awareness to conversion |"
hard_gates: "(Table: ID | Check | Fail Condition)  \n| ID | Check | Fail Condition |  \n|---|---|---|  \n| H01 | YAML frontmatter\
  \ valid | Invalid or missing YAML |  \n| H02 | ID matches pattern ^p05_uj_[a-z][a-z0-9_]+.md$ | ID format mismatch |  \n\
  | H03 | kind field matches 'user_journey' | Kind field incorrect |  \n| H04 | Journey map includes all 5 stages (awareness,\
  \ interest, decision, purchase, retention) | Missing stage |  \n| H05 | User personas defined and aligned with journey |\
  \ No personas or misalignment |  \n| H06 | Touchpoints mapped with >90% coverage | <90% coverage |  \n| H07 | Conversion\
  \ rate benchmarks included | No benchmarks |"
soft_scoring: "(Table: Dim | Dimension | Weight | Scoring Guide)  \n| Dim | Dimension | Weight | Scoring Guide |  \n|---|---|---|---|\
  \  \n| D01 | Journey completeness | 0.15 | 1.0 (complete) to 0.0 (incomplete) |  \n| D02 | Persona alignment | 0.15 | 1.0\
  \ (aligned) to 0.0 (misaligned) |  \n| D03 | Touchpoint coverage | 0.15 | 1.0 (90%+) to 0.0 (<50%) |  \n| D04 | Conversion\
  \ benchmarks | 0.15 | 1.0 (realistic) to 0.0 (invalid) |  \n| D05 | Consistency across channels | 0.10 | 1.0 (consistent)\
  \ to 0.0 (inconsistent) |  \n| D06 | Feedback integration | 0.10 | 1.0 (included) to 0.0 (missing) |  \n| D07 | Visual clarity\
  \ | 0.10 | 1.0 (clear) to 0.0 (unclear) |  \n| D08 | Stakeholder alignment | 0.10 | 1.0 (aligned) to 0.0 (disaligned) |"
actions: "(Table: Score | Action)  \n| Score | Action |  \n|---|---|  \n| GOLDEN | >=9.5 | Auto-publish with celebration |\
  \  \n| PUBLISH | >=8.0 | Publish to production |  \n| REVIEW | >=7.0 | Require stakeholder review |  \n| REJECT | <7.0 |\
  \ Reject and rework |"
bypass: "(Table: conditions, approver, audit trail)  \n| conditions | approver | audit trail |  \n|---|---|---|  \n| Critical\
  \ feature launch with senior PM approval | Senior Product Manager | Email + Slack notification |"
