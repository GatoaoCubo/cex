credential_document: "{\n  \"@context\": [\n    \"https://www.w3.org/ns/credentials/v2\",\n    \"{{domain_context_url}}\"\n\
  \  ],\n  \"id\": \"https://{{issuer_domain}}/credentials/{{uuid}}\",\n  \"type\": [\"VerifiableCredential\", \"{{credential_type}}\"\
  ],\n  \"issuer\": {\n    \"id\": \"{{issuer_did}}\",\n    \"name\": \"{{issuer_name}}\"\n  },\n  \"validFrom\": \"{{valid_from}}\"\
  ,\n  \"validUntil\": \"{{valid_until}}\",\n  \"credentialSubject\": {\n    \"id\": \"{{subject_did}}\",\n    \"{{claim_key}}\"\
  : \"{{claim_value}}\"\n  },\n  \"credentialSchema\": {\n    \"id\": \"{{schema_registry_url}}/{{schema_id}}\",\n    \"type\"\
  : \"JsonSchemaValidator2018\"\n  },\n  \"credentialStatus\": {\n    \"id\": \"{{status_list_url}}#{{status_index}}\",\n\
  \    \"type\": \"StatusList2021Entry\",\n    \"statusPurpose\": \"revocation\",\n    \"statusListIndex\": \"{{status_index}}\"\
  ,\n    \"statusListCredential\": \"{{status_list_url}}\"\n  },\n  \"refreshService\": {\n    \"id\": \"{{refresh_service_url}}\"\
  ,\n    \"type\": \"ManualRefreshService2018\"\n  }\n}"
proof_block: "{\n  \"proof\": {\n    \"type\": \"DataIntegrityProof\",\n    \"cryptosuite\": \"{{cryptosuite}}\",\n    \"\
  created\": \"{{proof_created}}\",\n    \"verificationMethod\": \"{{issuer_did}}#{{key_id}}\",\n    \"proofPurpose\": \"\
  assertionMethod\",\n    \"proofValue\": \"{{base58_or_multibase_proof}}\"\n  }\n}"
usage_context: '| Scenario | Presented To | Verification Method |

