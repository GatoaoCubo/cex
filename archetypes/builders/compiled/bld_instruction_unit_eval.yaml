dependencies: []
logging: true
tldr: Build a unit_eval YAML that tests one agent or prompt in isolation with a concrete input, expected output, and verifiable
  assertions.
density_score: 0.9
context: 'The unit-eval-builder produces a `unit_eval` artifact -- a structured YAML that defines an isolated test for a single
  agent or prompt. Each unit_eval specifies the exact input, the expected output, the assertions that must hold, and the setup/teardown
  state needed to run the test independently.

  Critical distinction: `unit_eval` tests one component in isolation with a known expected output. It is NOT a quick sanity
  check (smoke_eval), a full pipeline test (e2e_eval), or a quality calibration benchmark (golden_test). Mixing these types
  produces tests that fail for the wrong reasons.

  Input contract:

  - `target_id`: string -- the id of the agent or prompt artifact being tested

  - `target_kind`: enum -- `system_prompt` | `action_prompt` | `prompt_template` | `instruction`

  - `test_name`: string -- kebab-case test identifier (e.g. `rejects-empty-input`, `formats-output-as-json`)

  - `input`: string or object -- the exact value fed to the target

  - `expected_output`: string or object -- the correct output for this input

  - `assertions`: list -- each assertion maps a property to an expected value or condition

  - `setup`: object or null -- preconditions and state to initialize before the test

  - `teardown`: object or null -- cleanup steps after the test runs

  - `timeout_s`: integer -- maximum seconds allowed (default 60)

  - `edge_case`: boolean -- whether this test covers a boundary or failure condition

  Output contract: a single `unit_eval` YAML with all required fields, stored at `records/evals/unit/{test_name}.yaml`.

  Variables:

  - `{{test_name}}` -- kebab-case test identifier

  - `{{target_id}}` -- id of the artifact under test

  - `{{input}}` -- exact test input

  - `{{expected_output}}` -- expected result

  - `{{assertion_N}}` -- Nth assertion object'
phases: ''
phase_1_analyze_target_and_define_test_scope: "Action: Understand what the target does and derive one testable behavior per\
  \ eval.\nFOR the given target_id:\n    1. Identify the target's primary output contract\n    2. Select ONE specific behavior\
  \ to test (not multiple)\n    3. Determine if input requires setup state or can run standalone\nIF edge_case:\n    input\
  \ = boundary value or invalid input\n    expected_output = error, rejection, or fallback response\nELSE:\n    input = representative\
  \ valid input\n    expected_output = correct nominal output\nASSERT: test_name describes the behavior being tested, not\
  \ the target name\n  good: \"rejects-null-agent-name\"\n  bad:  \"system-prompt-builder-test-1\"\nVerifiable exit: one behavior\
  \ selected; test_name describes that behavior; input and expected_output are defined."
phase_2_define_assertions: "Action: Translate expected_output into a list of verifiable assertion objects.\nAssertion object\
  \ schema:\n{\n  property: string -- what to check (e.g. \"output.kind\", \"output.length\", \"exit_code\"),\n  operator:\
  \ enum [equals, contains, matches, greater_than, less_than, is_null, is_not_null],\n  expected: the value to compare against,\n\
  \  gate_ref: string or null -- reference to a quality gate this assertion enforces\n}\nAssertion rules:\n- Every assertion\
  \ must have a concrete expected value -- no vague checks (\"should be good\")\n- At least one assertion must check the primary\
  \ output field\n- For structured outputs: add one assertion per required field\n- For string outputs: add assertions for\
  \ presence of key terms and absence of forbidden terms\nASSERT len(assertions) >= 1\nFOR each assertion:\n    ASSERT assertion.expected\
  \ is not null\n    ASSERT assertion.operator is a valid enum value\nVerifiable exit: assertions list is non-empty; all assertions\
  \ have concrete expected values."
phase_3_define_setup_and_teardown: "Action: Specify state isolation requirements.\nIF target requires external state (file,\
  \ db record, env var):\n    setup = { state_type: description, initial_values: {...} }\n    teardown = { cleanup: description\
  \ }\nELSE:\n    setup = null\n    teardown = null\ntimeout_s = 60  # default for unit scope\nIF target is known to be slow\
  \ (>60s expected):\n    timeout_s = explicit override, max 300\nVerifiable exit: setup is null or has state_type and initial_values;\
  \ teardown matches setup (both null or both defined)."
phase_4_validate_against_quality_gates: "Action: Run 7 HARD gates before emitting; log 3 SOFT gates as warnings.\nHARD gates\
  \ (all must pass):\n  H1: target_id is non-empty and references a known artifact\n  H2: target_kind is one of the 4 valid\
  \ enum values\n  H3: test_name is kebab-case and describes the behavior (not the target)\n  H4: input is defined and non-empty\n\
  \  H5: expected_output is defined and non-empty\n  H6: assertions list has >= 1 item, each with property, operator, and\
  \ expected\n  H7: timeout_s is a positive integer <= 300\nSOFT gates (log warnings):\n  S1: edge_case is true for boundary/failure\
  \ tests (not defaulted false)\n  S2: teardown is defined when setup is defined\n  S3: at least one assertion references\
  \ a gate_ref\nVerifiable exit: 7/7 HARD gates pass."
output_contract: ''
