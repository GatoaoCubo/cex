golden_example: 'Score: 9.6/10. All H01-H08 gates pass. No AP style violations. --- FOR IMMEDIATE RELEASE DATALOOP LAUNCHES
  AI-POWERED PIPELINE THAT CUTS DATA PREP TIME BY 70% SAN FRANCISCO, Calif., April 14, 2026 -- DataLoop Inc. today launched
  DataLoop Accelerate, an AI-powered data preparation platform that reduces the time data teams spend on pipeline configuration
  from hours to minutes, available immediately to enterprise customers. DataLoop Accelerate uses large language model inference
  to automatically detect schema mismatches, resolve null values, and generate transformation scripts from natural language
  descriptions. The platform integrates with Snowflake, Databricks, and BigQuery out of the box, with no custom connectors
  required. Pricing starts at $2,500 per month for teams of up to 20 data engineers. Early access customers report a 70 percent
  reduction in data preparation time across production pipelines. Meridian Analytics, a DataLoop customer since 2024, reduced
  its weekly pipeline maintenance from 16 hours to fewer than five after deploying Accelerate in January 2026. "Data engineering
  teams spend more than half their time on undifferentiated preparation work that adds no analytical value," said Priya Nair,
  Chief Executive Officer at DataLoop Inc. "Accelerate changes that equation so teams can focus on the insights, not the plumbing."
  ### About DataLoop Inc.: DataLoop Inc. builds AI-powered data infrastructure tools for enterprise analytics teams. Founded
  in 2021 and headquartered in San Francisco, DataLoop serves more than 300 enterprise customers across financial services,
  healthcare, and technology verticals. The company has raised $47 million in venture funding and employs 110 people. Media
  Contact: James Ortega Head of Communications, DataLoop Inc. james.ortega@dataloop.io (415) 555-0182 ---'
why_this_is_golden: '| Element | Assessment |

  |---|---|

  | Headline | 63 chars, active voice, concrete "70%" hook, ALL CAPS |

  | Dateline | CITY in caps, "Calif." abbreviation, correct date format |

  | Lede | 35 words, answers who/what/when/where/why |

  | Body | Two solid paragraphs, specific pricing and integration details |

  | Quote | Human-sounding, attributed with full name and spelled-out title |

  | ### mark | Present |

  | Boilerplate | 75 words, third person, covers founding/HQ/customers/funding |

  | Contact | Name, email (format valid), phone with area code |'
anti_example_1_buried_lede: '--- FOR IMMEDIATE RELEASE THE EVOLVING LANDSCAPE OF ENTERPRISE DATA MANAGEMENT IN 2026 SAN FRANCISCO,
  Calif., April 14, 2026 -- As organizations continue to grapple with the increasing volume and complexity of data flowing
  through modern enterprise infrastructure, the demand for solutions that can abstract away the complexity of data pipeline
  management has never been higher. It is in this context that DataLoop Inc. is pleased to announce the launch of DataLoop
  Accelerate. ---'
why_this_fails: '| Failure | Explanation |

  |---|---|

  | No boilerplate | Journalists who cover the story need company background. Without it they must research the company separately
  -- many will not bother. Wire services flag releases without boilerplate. H07 hard gate fails. |

  | CEO not spelled out | "CEO" must be "Chief Executive Officer" on first reference per AP style. D01 score deducted. |

  | Quote uses marketing language | "This changes how data teams work" is vague. No specific claim. D03 score low. |

  | Contact block incomplete | Email only. No name, no title, no phone. H08 hard gate fails on missing email format check.
  |'
