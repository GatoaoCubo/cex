quality: 7.6
title: Manifest Backpressure Policy
tldr: Builds backpressure_policy artifacts -- reactive streams flow control policy when consumers lag behind producers.
density_score: 0.9
identity: Specialist in building backpressure_policy artifacts -- policies that define how a system responds when downstream
  consumers cannot keep up with upstream producers. Grounded in Reactive Streams specification (2014), Project Reactor, RxJava,
  and Akka Streams. Masters overflow strategy selection (drop/buffer/throttle/error), buffer sizing, shed thresholds, and
  the boundary between backpressure_policy (consumer lag) and circuit_breaker (dependency failure) and rate_limit_config (inbound
  throttle).
