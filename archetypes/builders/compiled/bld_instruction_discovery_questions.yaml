phase_1_research:
- Map buyer personas (e.g., CFO, IT director) using company data and role-specific pain points.
- Identify deal stages (e.g., Needs Analysis, Solution Demo) and align with MEDDIC/BANT criteria.
- Analyze buyer journey maps to pinpoint decision-making triggers and objections per persona.
- Review existing sales content (e.g., case studies, proposals) for recurring questions and gaps.
- Interview 3–5 stakeholders per persona to validate pain points and decision drivers.
- Compile research into a structured dataset with persona, stage, and question categories.
phase_2_compose:
- 'Use bld_schema_discovery_questions.md to define artifact structure: persona, stage, question, intent (MEDDIC/BANT), and
  response type.'
- 'Reference bld_output_template_discovery_questions.md for formatting: headers, bullet points, and alignment with sales playbooks.'
- Write open-ended questions targeting persona-specific challenges (e.g., “What metrics define success for your team?”).
- Ensure each question maps to a MEDDIC/BANT criterion (e.g., Budget, Authority, Need).
- Group questions by deal stage, prioritizing early-stage questions for qualification.
- Use concise, jargon-free language; avoid yes/no questions unless explicitly required.
- Categorize questions by intent (e.g., “What’s your current solution?” for Need, “Who approves purchases?” for Authority).
- Cross-check against research data to ensure coverage of all personas and stages.
- Finalize artifact with metadata (e.g., version, author, last reviewed date).
phase_3_validate:
- '[ ] Confirm alignment with bld_schema_discovery_questions.md and bld_output_template_discovery_questions.md structure.'
- '[ ] Verify 100% coverage of personas and deal stages in the artifact.'
- '[ ] Test questions with 2–3 stakeholders for clarity and relevance.'
- '[ ] Ensure MEDDIC/BANT criteria are explicitly addressed in question intent.'
- '[ ] Obtain approval from sales leadership and subject-matter experts.'
