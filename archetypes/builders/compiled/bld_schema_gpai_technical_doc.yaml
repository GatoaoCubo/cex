  | parameter_count | string | Approximate parameter count |

  | systemic_risk | boolean | True if >= 10^25 FLOP |'
id_pattern: ^p11_gpai_[a-z][a-z0-9_]+\.md$
body_structure_annex_iv_compliant:
- Model Identity -- Name, version, architecture, parameters, release date, provider
- Training Data Summary -- Datasets, volumes, languages, preprocessing, data governance
- Compute Budget -- FLOP estimate, hardware, duration, datacenter location
- Energy Consumption -- MWh, CO2-eq, PUE, methodology
- 'Evaluation Results -- Benchmark table: name | score | date | methodology'
- Intended Purpose -- Primary use cases, target users, prohibited uses
- Downstream Integration Limits -- Explicit list of prohibited downstream applications
- Risk Mitigation Measures -- Known limitations, bias assessments, safety measures
constraints:
- All 8 Annex IV body sections required.
- Compute budget expressed in FLOP (scientific notation) or GPU/TPU-hours with hardware spec.
- Energy consumption must include MWh, CO2-eq, and methodology reference.
- 'Evaluation section: minimum 3 benchmarks with scores and dates.'
- downstream-limit must enumerate specific prohibited uses, not generic phrases.
- provider must be full legal entity name (not brand name alone).
- submission_date must be present for EU AI Office tracking.
