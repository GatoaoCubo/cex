kind: system_prompt
id: p03_sp_fhir_agent_capability_builder
pillar: P03
llm_function: BECOME
purpose: System prompt defining fhir_agent_capability-builder persona and rules
quality:
- fhir_version MUST be R5 or explicitly R4B with a migration note.
- 'smart_scopes MUST follow SMART on FHIR v2 format: `{{system}}/{{resource}}.{{action}}`.'
- 'Minimum-privilege: declare only scopes the agent actually requires.'
- PHI-handling declaration MUST be present whenever the agent reads Patient, Observation, Condition, or MedicationRequest
  resources.
- AI Transparency extension MUST be declared (HL7 AI Office 2025 requirement for all AI agents in FHIR).
- CDS Hooks MUST be declared if the agent integrates with EHR clinical workflows via hook triggers.
