tldr: '3-phase build process for ontology: domain scoping, class/property/axiom composition, and structural validation.'
domain: ontology construction
created: '2026-04-13'
updated: '2026-04-13'
density_score: 0.9
phase_1_research:
- 'Identify the domain: what subject area does this ontology cover? (medical, legal, ecommerce, agents, etc.)'
- 'Choose the primary standard: OWL (complex inference), SKOS (hierarchical vocabularies), schema.org (web interoperability),
  or mixed'
- 'Enumerate top-level classes: what are the root concepts that everything else classifies under?'
- 'Build the class hierarchy: for each top-level class, identify subclasses recursively (depth >= 2 for non-trivial domains)'
- 'Identify properties: what attributes describe each class? What relations link classes?'
- 'Classify properties by type: datatype property (literal value) vs object property (links to another class)'
- 'Determine axioms needed: which classes are disjoint? Which properties are functional, transitive, or symmetric?'
- Check existing ontologies via brain_query [IF MCP] -- do not reinvent SNOMED, schema.org Person, etc.; extend instead
- 'Identify schema.org overlap: map local classes to schema.org equivalents where the domain overlaps'
- 'Define namespace prefix: choose a short namespace (e.g., "cex:", "med:", "prod:") for all local terms'
phase_2_compose:
- Read SCHEMA.md -- source of truth for all required frontmatter fields
- Read OUTPUT_TEMPLATE.md -- fill the template following SCHEMA constraints
- 'Fill all required frontmatter fields; set `quality: null` -- never self-score'
- 'Write Overview section: domain scope, primary standard, intended consumers, version rationale'
- 'Write Class Hierarchy section: tree structure or table with columns (class, parent, label, description, schema.org equivalent)'
- 'Write Properties section: table with columns (property, type, domain, range, cardinality, axiom flags)'
- 'Write Axioms section: explicit declarations for disjointness, functional, transitive, symmetric, inverse properties'
- 'Write Schema.org Mapping section: table mapping local classes/properties to schema.org URIs'
- Add optional Turtle/RDF snippet to illustrate key patterns (ASCII-only, no Unicode)
- Confirm body <= 8192 bytes
phase_3_validate:
- Check QUALITY_GATES.md -- verify each HARD gate manually
- Confirm YAML frontmatter parses without errors
- Confirm `id` matches `^p01_ont_[a-z][a-z0-9_]+$`
- 'Confirm `classes` list in frontmatter matches class names in ## Class Hierarchy section'
- 'Confirm `standard` field is set to one of: OWL, SKOS, schema.org, RDF, mixed'
- 'Confirm at least one property is defined in ## Properties section'
- 'Confirm ## Axioms section is present (may say "none" if domain has no axiom requirements)'
- 'Confirm ## Schema.org Mapping section is present (may say "not applicable" for purely internal ontologies)'
- Confirm no instance data in artifact -- only structural definitions
- Confirm `quality` is null
- Confirm body <= 8192 bytes
- 'Cross-check boundary: is this a classification structure? If it contains entity instances it belongs in knowledge_graph.
  If it defines one term it belongs in glossary_entry. If it states a fact it belongs in knowledge_card.'
- 'If score < 8.0: revise in the same pass before outputting'
