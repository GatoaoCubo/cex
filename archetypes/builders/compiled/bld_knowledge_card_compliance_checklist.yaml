domain_overview: Compliance checklists are structured artifacts used to validate adherence to regulatory and industry-specific
  requirements during audits. For SOC2, GDPR, HIPAA, and the EU AI Act, these checklists ensure organizations meet standards
  for data protection, privacy, security, and AI governance. SOC2 focuses on trust services criteria (security, availability,
  processing integrity, confidentiality, and privacy) for cloud service providers. GDPR mandates strict data subject rights
  and breach notification protocols for EU data processing. HIPAA enforces safeguards for protected health information (PHI)
  in healthcare. The EU AI Act introduces risk-based requirements for AI systems, including transparency and human oversight.
  Checklists help map controls to these frameworks, ensuring audit readiness.
key_concepts: "| Concept | Definition | Source |  \n|-------|------------|------|  \n| Data Protection Impact Assessment (DPIA)\
  \ | Evaluation of data processing risks under GDPR | GDPR Art. 35 |  \n| Access Controls | Restricting system access to\
  \ authorized users | SOC2 Trust Services Criteria |  \n| Breach Notification | Mandatory disclosure of data breaches within\
  \ 72 hours | GDPR Art. 33 |  \n| HIPAA Administrative Safeguards | Policies and procedures to manage PHI | HIPAA Privacy\
  \ Rule |  \n| AI Risk Assessment | Identifying harms from high-risk AI systems | EU AI Act Art. 13 |  \n| Encryption Requirements\
  \ | Protecting data at rest and in transit | NIST SP 800-53 |  \n| Consent Management | Explicit user consent for data processing\
  \ | GDPR Art. 7 |  \n| Audit Trail Logging | Recording system activities for forensic analysis | SOC2 Trust Services Criteria\
  \ |"
industry_standards:
- SOC2 Trust Services Criteria (AICPA)
- GDPR Regulation (EU) 2016/679
- HIPAA Privacy and Security Rules (45 CFR 160, 162, 164)
- EU AI Act (2024/1614)
- ISO/IEC 27001:2022 (Information Security Management)
- NIST SP 800-53 (Security and Privacy Controls)
- RFC 7258 (Privacy Considerations for IoT)
- OECD AI Principles (2019)
common_patterns:
- Map data flows to regulatory scope (e.g., GDPR Article 3).
- Use automated tools for continuous compliance monitoring.
- Document policies aligned with specific framework requirements.
- Conduct regular third-party vendor assessments.
- Embed audit trails for all critical system interactions.
- Perform role-based access control (RBAC) reviews quarterly.
pitfalls:
- Assuming generic controls apply to all regulations without customization.
- Overlooking GDPR’s “right to be forgotten” in data retention policies.
- Failing to update HIPAA breach notification procedures for cloud storage.
- Ignoring EU AI Act’s transparency requirements for high-risk AI.
- Not aligning audit checklists with the latest regulatory amendments.
