anti_example_1_invalid_ans_name_format: 'What went wrong: Name uses underscores instead of hyphens. Fails H04; invalid per
  IETF draft-narajala-ans-00.


  ---

  kind: agent_name_service_record

  id: p04_ans_billing_agent_acme

  pillar: P04

  quality: null

  agent_name: "billing_agent.acme_corp.agents"   # WRONG: underscores not allowed

  endpoint_url: "https://agents.acme.com/billing"

  registry_operator: "cncf"

  ...

  ---


  Failure analysis:


  | Gate | Result | Reason |

  |------|--------|--------|

  | H04 | FAIL | `billing_agent.acme_corp.agents` -- underscores violate DNS-like format |

  | H02 | PASS | (id is valid -- id uses underscores, name must not) |


  Fix: Replace `billing_agent.acme_corp.agents` with `billing-agent.acme-corp.agents`


  Lesson: ANS names follow DNS label syntax (RFC 1035): lowercase, hyphens only. snake_case does not apply.'
anti_example_2_missing_protocol_adapters: "What went wrong: Only an endpoint URL; no protocol-adapter entries. Useless --\
  \ no way to know how to connect.\n\n---\nkind: agent_name_service_record\nid: p04_ans_support_example\npillar: P04\nquality:\
  \ null\nagent_name: \"support.example.agents\"\nendpoint_url: \"https://agents.example.com/support\"\nregistry_operator:\
  \ \"self\"\ndiscovery_endpoint: \"https://example.com/.well-known/agent/support\"\nlifecycle:\n  registered: \"2026-04-14\"\
  \n---\n# ANS Record: support.example.agents\nThe support agent is available at https://agents.example.com/support.\nContact\
  \ it for any help requests.\n\nFailure analysis:\n\n| Gate | Result | Reason |\n|------|--------|--------|\n| H06 | FAIL\
  \ | `protocol_adapters` array absent -- 0 adapters declared |\n| H08 | PASS | lifecycle.registered present |\n| H07 | PASS\
  \ | discovery_endpoint present |\n\nScore with H06 fixed (hypothetically):\n\n| Dimension | Score | Reason |\n|-----------|-------|--------|\n\
  | D2 Protocol coverage | 0.0 | Still 0 adapters -- H06 was the symptom |\n| D3 PKI completeness | 0.0 | No pki_cert_reference,\
  \ self-hosted operator |\n| D4 Capability richness | 0.0 | No capability_advertisement block |\n| Overall | < 5.0 | Well\
  \ below publish threshold |\n\nFix: Add >=1 protocol-adapter (mcp|a2a), a capability_advertisement, and optionally a PKI-cert.\n\
  \nLesson: A raw endpoint URL is NOT an ANS record. It must declare HOW to connect (adapter), WHAT the agent does (capabilities),\
  \ and WHO speaks (PKI-cert). Without these: dead URL."
