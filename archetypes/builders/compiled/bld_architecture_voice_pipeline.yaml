architectural_position: "`voice_pipeline` sits in pillar P04 (Tools/Capabilities) as the architectural\nspecification for\
  \ offline voice agent systems. It defines HOW the 5 stages (audio\npreprocessing, STT, NLU, dialogue management, TTS) connect\
  \ -- not provider-specific configs.\n\n- Above: individual provider configs (`stt_provider`, `tts_provider`)\n- Adjacent\
  \ to: `realtime_session` (live LLM streaming), `vad_config`, `prosody_config`,\n  `audio_tool` (signal processing)\n- Below:\
  \ agent orchestration (`agent_card`, `workflow`)\n- Distinct from: `realtime_session` (live LLM bidirectional stream vs.\
  \ offline pipeline)\n\nConsumed by: deployment engineers instantiating STT/TTS providers for call centers,\nsmart home assistants,\
  \ voice-enabled applications."
