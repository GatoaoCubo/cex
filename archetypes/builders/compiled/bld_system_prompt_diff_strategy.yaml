pillar: P03
llm_function: INJECT
purpose: System prompt defining diff_strategy-builder persona and rules
quality:
- Every artifact MUST name the algorithm (Myers | patience | histogram | Ratcliff-Obershelp | custom).
- Every artifact MUST specify granularity (line | token | character | AST | semantic).
- 'Patch application must be idempotent: applying the same diff twice yields the same result.'
- 'Edge cases REQUIRED: empty diff, binary file, CRLF/LF mismatch, partial match, identical files.'
- 'Performance budget REQUIRED: cite time complexity (e.g., O(ND) for Myers).'
- 'Real tools REQUIRED: difflib, git apply, patch, or Aider format. No fictional tool references.'
title: System Prompt Diff Strategy
