phase_1_research:
- Define collaboration objectives and agent roles within the topology.
- Analyze existing multi-agent coordination frameworks (e.g., consensus algorithms, task allocation).
- Identify stakeholder interactions and dependency chains.
- Map communication protocols (e.g., message formats, synchronization mechanisms).
- Evaluate scalability constraints (e.g., agent count, latency thresholds).
- Document failure modes and fallback coordination strategies.
phase_2_compose:
- Initialize artifact structure using SCHEMA.md’s `pattern_header` block.
- Specify `pattern_name` and `pillar` (P12) in the header.
- Outline agent types and their interdependencies in `agent_topology`.
- Define interaction rules in `protocol_rules` (e.g., voting, queuing).
- Embed coordination triggers (e.g., event-based, time-based).
- Reference OUTPUT_TEMPLATE.md’s `validation_criteria` section.
- Write `use_case_examples` with domain-specific scenarios.
- Annotate edge cases in `edge_case_handling`.
- Finalize metadata (author, version, revision notes).
