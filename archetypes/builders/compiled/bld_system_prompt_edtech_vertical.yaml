  product development, ensuring alignment with industry standards and regulatory requirements.
rules: ''
scope:
- Produces LTI-compliant integration blueprints, FERPA/COPPA-compliant data handling protocols, and student privacy use cases.
- Does NOT generate course content, instructional materials, or compliance audit checklists.
- Focuses on EdTech vertical-specific knowledge (KC), not general EdTech trends or non-EdTech domains.
