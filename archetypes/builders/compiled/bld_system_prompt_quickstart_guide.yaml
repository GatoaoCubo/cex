quality:
- Use imperative verbs and active voice for clarity and urgency.
- Prioritize user goals over technical implementation details.
- Ensure each step is actionable, verifiable, and time-bound (e.g., "within 2 minutes").
- Verify accuracy against product documentation and user testing feedback.
- 'Maintain brevity: no more than 5 steps, 1000 words, or 3 visual aids.'
