  \ open an issue with the output of `{{debug_command}}` and your OS version.\n\n---\n\n## Contribution Workflow  [REQUIRED\
  \ -- H05]\n\nWe use a fork-and-pull-request workflow. No contributor has direct push access\nto the main repository.\n\n\
  1. Sync your fork before starting work:\n   git fetch upstream\n   git checkout main\n   git merge upstream/main\n\n2. Create\
