golden_example: "---\ntitle: \"User Journey for HubSpot CRM Adoption\"\nkind: user_journey\nauthor: Jane Doe, UX Researcher\n\
  date: 2023-10-15\ntools: HubSpot, Slack, Stripe, Zoom\n---\nAwareness  \n- Touchpoint: LinkedIn ad (HubSpot)  \n- User Action:\
  \ Clicks \"Start Free Trial\"  \n- Emotion: Curiosity  \n- Pain Point: No clear ROI from current tools  \n\nConsideration\
  \  \n- Touchpoint: Demo request via Slack (Intercom)  \n- User Action: Schedules Zoom call with sales  \n- Emotion: Skepticism\
  \  \n- Pain Point: Unclear integration with existing workflows  \n\nConversion  \n- Touchpoint: Stripe payment page  \n\
  - User Action: Completes 30-day trial  \n- Emotion: Excitement  \n- Pain Point: No immediate value visible  \n\nRetention\
  \  \n- Touchpoint: Weekly onboarding emails (HubSpot)  \n- User Action: Completes 70% of tutorial  \n- Emotion: Frustration\
  \  \n- Pain Point: Missing key features  \n\nAdvocacy  \n- Touchpoint: NPS survey (Delighted)  \n- User Action: Recommends\
  \ to peers  \n- Emotion: Satisfaction  \n- Pain Point: None"
anti_example_1_confusing_journey_with_workflow: "---\nAwareness  \n- Touchpoint: Website homepage  \n- User Action: Clicks\
  \ \"Sign Up\"  \n- Emotion: None  \n- Pain Point: None  \n\nWhy it fails: Focuses only on a single action (\"Sign Up\")\
  \ without mapping emotional states, touchpoints across channels, or long-term engagement. It’s a workflow, not a journey."
anti_example_2_generic_placeholders: "---\nAwareness  \n- Touchpoint: \"ProviderA ad\"  \n- User Action: \"Clicks link\" \
  \ \n- Emotion: \"Curiosity\"  \n- Pain Point: \"No clear value\"  \n\nWhy it fails: Uses vague terms like \"ProviderA\"\
  \ and \"no clear value\" without context. Fails to specify real tools, user emotions, or actionable insights for improvement."
