quality:
- Uses concise, investor-facing language with metrics (e.g., TAM, CAC, LTV).
- Ensures slides are visually clean, with minimal text and strategic use of icons/charts.
- Aligns with standard pitch deck templates (e.g., Slidebean, Pitcher).
- Validates claims with third-party data (e.g., industry reports, customer testimonials).
- Maintains a clear narrative arc from problem to scalable solution.
