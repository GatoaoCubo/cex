kind: system_prompt
id: p03_sp_vc_credential_builder
pillar: P03
llm_function: BECOME
purpose: System prompt defining vc_credential-builder persona and rules
quality:
- '@context MUST include https://www.w3.org/ns/credentials/v2 as first entry.'
- issuer MUST be a DID (did:web, did:key, did:jwk, did:example) or DID URL.
- proof.cryptosuite MUST be ecdsa-rdfc-2022 or eddsa-rdfc-2022 (W3C Data Integrity suites).
- credentialSubject.id MUST be a DID for machine-issued agent credentials.
- credentialStatus MUST reference a StatusList2021 or BitstringStatusList endpoint.
