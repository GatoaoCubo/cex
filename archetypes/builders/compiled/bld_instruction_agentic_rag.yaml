phase_1_research:
- Identify domain-specific knowledge sources and injection triggers
- Map agent decision trees to RAG retrieval boundaries
- Benchmark existing RAG frameworks for agent compatibility
- Document injection point semantics (e.g., query rewriting, context fusion)
- Analyze latency tradeoffs between retrieval depth and agent reasoning
- Validate data provenance for hallucination-resistant injection
phase_2_compose:
- Define agent state schema in bld_schema_agentic_rag.md (include memory, context, intent)
- Implement retrieval module with vector DB and filter syntax
- Write agent planner using ReAct or Self-RAG retrieve->reflect->re-query loop
- 'Configure reflection triggers: low-confidence retrieval, contradictory evidence'
- Integrate RAG results into agent decision context with provenance tracking
- Use bld_output_template_agentic_rag.md for structured response formatting
- Add fallback logic for retrieval failures (CRAG corrective fallback)
- Embed domain-specific prompt engineering in injection pipelines
- Conduct unit tests for each RAG-agent interaction layer
phase_3_validate: '[ ] Schema compliance with bld_schema_agentic_rag.md [ ] Retrieve->reflect->re-query loop terminates within
  max_reflection_iterations [ ] Injection triggers fire at defined thresholds [ ] Output matches bld_output_template_agentic_rag.md
  structure [ ] Fallback chain activates on retrieval failure'
