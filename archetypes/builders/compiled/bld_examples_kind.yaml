golden_example: "INPUT: \"Create builder for kind: env_config (P09, GOVERN)\"\n\nOUTPUT (manifest ISO only -- showing quality\
  \ standard for all 13):\n\n---\nid: env-config-builder\nkind: type_builder\npillar: P09\nparent: null\ndomain: env_config\n\
  llm_function: GOVERN\nversion: 1.0.0\ncreated: 2026-03-26\nupdated: 2026-03-26\nauthor: builder_agent\ntags: [kind-builder,\
  \ env-config, P09, config, environment, variables]\nkeywords: [env, environment, variable, config, secret, dotenv, envvar,\
  \ settings]\ntriggers: [\"define environment variables\", \"create env config\", \"document system variables\"]\ncapabilities:\
  \ >\n  L1: Specialist in building env_config artifacts.\n  L2: Define environment variables with scope, type, default, and\
  \ sensitivity.\n  L3: When user needs to create or scaffold env config.\nquality: null\ntitle: \"Manifest Env Config\"\n\
  tldr: \"Specialist in env_config artifacts: variable catalogs with scope, type, default, validation, sensitivity.\"\ndensity_score:\
  \ 0.90\n---\n# env-config-builder\n## Identity\nSpecialist in building env_config artifacts -- specifications of environment\n\
  variables for a system scope. Masters scoping (global, agent_group, service),\nsensitive var handling, defaults, validation\
  \ rules, override precedence, and\nthe boundary between env_config (generic variables) and boot_config (P02,\nper-provider)\
  \ or feature_flag (P09, logical on/off).\n## Capabilities\n1. Define environment variables with scope, type, default, and\
  \ sensitivity\n2. Specify validation rules (regex, range, enum) per variable\n3. Document override precedence (env > file\
  \ > default)\n4. Mark sensitive variables with masking rules\n5. Validate against quality gates (HARD + SOFT)\n6. Distinguish\
  \ env_config from boot_config, feature_flag, path_config\n## Routing\nkeywords: [env, environment, variable, config, secret,\
  \ dotenv]\ntriggers: \"define environment variables\", \"create env config\"\n## Crew Role\nIn a crew, I handle ENVIRONMENT\
  \ VARIABLE SPECIFICATION.\nI answer: \"what environment variables does this scope need?\"\nI do NOT handle: boot_config,\
  \ feature_flag, path_config, permission.\n\nWHY THIS IS GOLDEN:\n- quality: null (H01 pass -- never self-scored)\n- kind:\
  \ type_builder (H02 pass -- correct meta-kind)\n- All required frontmatter fields present (H03 pass)\n- 6 capabilities listed,\
  \ each specific to the domain (H04 pass)\n- Boundary section clearly states what this builder IS NOT (H05 pass)\n- Routing\
  \ keywords match the kind's domain vocabulary (S01 pass)\n- Crew role defines scope and exclusions (S02 pass)\n- tldr is\
  \ 82 chars, under 160 limit (S03 pass)\n- ASCII-only content, no emoji (S04 pass)"
