architectural_position: stt_provider sits at the interface between user voice inputs and downstream NLP/processing pipelines.
  It translates raw audio into structured transcription output (text, timestamps, confidence scores) consumed by voice assistants,
  call analytics, and accessibility tools. Relies on centralized validation for format compliance and integrates with voice_pipeline
  and vad_config builders for end-to-end speech processing.
