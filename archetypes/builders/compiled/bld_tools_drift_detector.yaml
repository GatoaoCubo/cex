  | ALLOWED | Read, Write, Edit, Bash, Glob, Grep | Explicitly permitted |

  | DENIED | (none) | Explicitly blocked |

  | EFFECTIVE | Bash, Edit, Glob, Grep, Read, Write | ALLOWED minus DENIED |'
