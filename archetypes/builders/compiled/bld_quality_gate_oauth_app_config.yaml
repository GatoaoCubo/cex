definition: "| metric | threshold | operator | scope |  \n|---|---|---|---|  \n| schema_id | ^p09_oauth_[a-z][a-z0-9_]+.yaml$\
  \ | matches | H02 |  \n| required_fields | 7 | >= | app config |"
hard_gates: "| ID | Check | Fail Condition |  \n|---|---|---|  \n| H01 | YAML frontmatter valid | invalid YAML syntax |  \n\
  | H02 | ID matches pattern ^p09_oauth_[a-z][a-z0-9_]+.yaml$ | invalid schema ID |  \n| H03 | kind field matches 'oauth_app_config'\
  \ | incorrect kind value |  \n| H04 | client_id present | missing client_id |  \n| H05 | redirect_uris are valid URLs |\
  \ invalid redirect URI format |  \n| H06 | scopes are non-empty | empty or missing scopes |  \n| H07 | token_lifetime <=\
  \ 86400 | token lifetime exceeds 24h |  \n| H08 | refresh_token_policy is 'fixed' or 'rolling' | invalid refresh policy\
  \ |"
soft_scoring: "| Dim | Dimension | Weight | Scoring Guide |  \n|---|---|---|---|  \n| D01 | Scope completeness | 0.15 | 1.0\
  \ if all required scopes present |  \n| D02 | Redirect validity | 0.15 | 1.0 if all URIs are HTTPS and registered |  \n\
  | D03 | Token lifetime | 0.15 | 1.0 if <= 24h and aligned with policy |  \n| D04 | Refresh policy | 0.15 | 1.0 if 'rolling'\
