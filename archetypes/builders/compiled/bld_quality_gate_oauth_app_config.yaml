  \  \n| D06 | Documentation | 0.10 | 1.0 if app config includes usage examples |  \n| D07 | Compliance | 0.20 | 1.0 if aligns\
  \ with CEX OAuth2 spec |"
actions: "| Score | Action |  \n|---|---|  \n| GOLDEN | >=9.5 | Auto-approve and deploy |  \n| PUBLISH | >=8.0 | Deploy after\
