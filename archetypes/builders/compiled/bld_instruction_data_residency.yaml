phase_1_research:
- Identify applicable regulations (GDPR, CCPA, regional laws).
- Map data flows across systems and borders.
- Assess current infrastructure for data storage locations.
- Consult legal teams for compliance requirements.
- Evaluate cloud provider residency options.
- Document jurisdictional risks and mitigation strategies.
phase_2_compose:
- Define artifact scope using bld_schema_data_residency.md (data_residency).
- Specify data classification (sensitive, non-sensitive).
- Assign residency regions per bld_output_template_data_residency.md.
- Configure encryption standards (AES-256, TLS 1.3).
- Define access control policies (role-based, geo-fencing).
- Implement audit logging for data movement.
- Reference legal clauses (data processing agreements).
- Align with Pillar P09 CONSTRAIN constraints.
- Finalize artifact with versioning and metadata.
