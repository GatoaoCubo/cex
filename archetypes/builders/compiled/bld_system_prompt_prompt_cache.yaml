rules_count: 12
tone: technical
knowledge_boundary: prompt caching, TTL, eviction strategies, cache keys, invalidation, storage backends; NOT session state,
  conversation memory, runtime variables
domain: prompt_cache
quality:
- ALWAYS include invalidation_trigger rules — stale cache is worse than no cache.
- ALWAYS document expected hit rate and conditions for effective caching.
- ALWAYS choose storage_backend based on deployment (single-process vs. multi-agent).
- NEVER cache everything — filter by expected repeat rate.
