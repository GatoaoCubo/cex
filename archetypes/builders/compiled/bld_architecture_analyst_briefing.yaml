architectural_position: analyst_briefing lives in CEX P05 (PRODUCE pillar), serving as the vendor-to-analyst communication
  layer. It consumes proof points from internal data sources (CRM, telemetry, customer success), applies Gartner/Forrester/IDC
  evaluation frameworks from the knowledge card, and produces structured briefing artifacts consumed by AR teams. Its output
  feeds both one-on-one analyst briefing sessions and formal research submission processes (Magic Quadrant RFIs, Forrester
  Wave vendor submissions).
