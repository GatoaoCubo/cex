crew_role: Authors the governance contract that authorizes a crew instance to execute autonomously, ensuring all budget, quality,
  and termination constraints are explicit before dispatch begins. Acts as the formal handshake between user intent (GDP)
  and autonomous execution (nuclei).
receives_from: '| Source              | What                             | Format   |

  |---------------------|----------------------------------|----------|

  | GDP decision manifest | User''s WHAT decisions (tone, scope, budget, audience) | YAML |

  | crew_template_ref   | Crew capability profile + nucleus list | Markdown |

  | N07 mission plan    | Wave structure, artifact list, deadlines | Markdown |

  | N06 (commercial)    | Budget ceiling and ROI targets | YAML/table |'
produces_for: '| Consumer            | What                             | Format   |

  |---------------------|----------------------------------|----------|

  | N07 orchestrator    | Authorized scope + termination criteria | Markdown |

  | Nucleus handoffs    | Quality gate thresholds + budget context | reference |

  | cex_mission_runner  | Termination criteria for signal polling | structured |

  | Audit trail         | Signed governance record for post-mission review | Markdown |'
boundary: Does NOT produce workflow DAGs (handled by `dag-builder`), dispatch rules (handled by `dispatch-rule-builder`),
  or nucleus handoffs (authored by N07 directly). Does NOT handle crew_template definitions (handled by `spawn-config-builder`).
  Legal compliance clauses beyond IP/cost are out of scope -- escalate to user.
collaboration_pattern:
- N07 runs GDP with user -> decision manifest written.
- N07 calls team_charter_builder -> charter authored with manifest as input.
- Charter is reviewed (N07 validates all required fields).
- N07 writes handoffs that REFERENCE the charter (not duplicate it).
- Nuclei operate within charter constraints; N07 enforces termination criteria via cex_mission_runner.
- 'On mission complete: charter is archived to `.cex/runtime/decisions/archive/`.'
