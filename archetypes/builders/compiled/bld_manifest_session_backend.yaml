capabilities:
- Define persistence backend with path/connection_string and credentials by reference
- Specify TTL policies for automatic expiration of inactive sessions
- Document serialization format with trade-offs (json readable, msgpack fast, protobuf typed)
- Configure encryption at rest for sessions with sensitive data
- Define session scoping per nucleus for isolation between agents
- Validate artifact against quality gates (8 HARD + 11 SOFT)
- Distinguish session_backend from compression_config, memory config, cache config
quality: 9.1
title: Manifest Session Backend
tldr: Golden and anti-examples for session backend construction, demonstrating ideal structure and common pitfalls.
density_score: 0.9
identity: Specialist in building session_backend artifacts -- specifications for session state persistence for LLM agents.
  Masters backends (file, sqlite, redis, postgres), connection strings, TTL policies, serialization formats (json, msgpack,
  protobuf), encryption at rest, session scoping per nucleus, and the boundary between session_backend (where to persist state)
  and compression_config (how to reduce state) or memory config (what to remember). Produces session_backend artifacts with
  complete frontmatter and documented backend specification.
routing: 'keywords: [session, backend, persistence, state, file, sqlite, redis, postgres, ttl, serialization, encryption,
