crew_role: 'In a crew, I handle SESSION STATE PERSISTENCE SPECIFICATION. I answer: "where and how should this agent persist
  its session state between turns?" I do NOT handle: compression_config (how to reduce context), memory config (what to remember
  long-term), cache config (ephemeral key-value caching), env_config (environment variables).'
