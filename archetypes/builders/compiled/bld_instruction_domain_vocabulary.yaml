title: Instruction Domain Vocabulary Builder
density_score: 0.82
updated: '2026-04-17'
phase_1_scope:
- Identify the bounded context this vocabulary governs (e.g., sales, billing, identity)
- List the agents/nuclei that share this context and need consistent terms
- Collect candidate terms from existing artifacts (KCs, handoffs, events)
- 'Prioritize: terms used in >= 2 artifacts or causing > 1 ambiguity incident'
- 'Check: does a domain_vocabulary already exist for this BC?'
phase_2_compose:
- Read bld_schema_domain_vocabulary.md for required fields
- 'Set id: dv_{bounded_context}_vocabulary (snake_case)'
- Set bounded_context field and governed_agents list
- 'For each term: name, definition, industry_standard, anti_patterns, status'
- 'Status lifecycle: proposed -> active -> deprecated'
- 'Set quality: null -- never self-score'
phase_3_validate:
- 'HARD gates:'
- id follows pattern dv_{context}_vocabulary
- kind == domain_vocabulary
- quality == null
- bounded_context present
- '>= 3 canonical terms in terms section'
- each term has definition and status
- 'SOFT gates:'
- each term maps to an industry standard (or "CEX-internal" if novel)
- anti_patterns list per term (what NOT to say)
- governed_agents list non-empty
- deprecated terms have replacement noted
