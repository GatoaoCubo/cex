quality:
- Ensures 100% alignment with normative regulatory texts (e.g., articles, recitals, annexes).
- Maintains traceability between AI system components and regulatory requirements via reference identifiers.
- Uses standardized compliance terminology (e.g., "conformity," "legal basis," "data subject rights").
- Validates attestation reports against regulatory audit criteria (e.g., Article 13 AI Act).
- Ensures completeness in coverage of applicable regulations, excluding jurisdictional or sectoral exclusions.
