title: 'Scoring Rubric: data_contract'
5_dimensions: '| # | Dimension | Weight | Description |

  |---|-----------|--------|-------------|

  | D1 | Schema precision | 30% | All fields typed, nullable flagged, described |

  | D2 | SLA specificity | 25% | Numeric thresholds for freshness, availability, latency |

  | D3 | Boundary clarity | 20% | Producer + consumer named; entity PascalCase |

  | D4 | Versioning maturity | 15% | Independent version, backward compat policy, deprecation |

  | D5 | Enforcement | 10% | Schema registry, contract tests, owner named |'
scoring_formula: '`score = (D1*0.30 + D2*0.25 + D3*0.20 + D4*0.15 + D5*0.10) * 10`'
dimension_scoring_guide: ''
d1_schema_precision_0_10:
- '10: every field has type + nullable + description'
- '7: all fields typed, some missing descriptions'
- '4: fields listed without types'
- '0: no schema section'
d2_sla_specificity_0_10:
- '10: freshness + availability + latency all numeric with units'
- '6: two of three metrics present with numbers'
- '3: one metric, vague'
- '0: no SLA section'
d3_boundary_clarity_0_10:
- '10: producer + consumer + entity + effective_date all clear'
- '6: producer + consumer named, entity unclear'
- '0: boundary not defined'
d4_versioning_maturity_0_10:
- '10: contract_version + backward_compat + deprecation_notice'
- '5: version present, no policy'
- '0: no versioning info'
d5_enforcement_0_10:
- '10: schema registry + contract tests + owner'
- '5: owner only'
- '0: no enforcement'
