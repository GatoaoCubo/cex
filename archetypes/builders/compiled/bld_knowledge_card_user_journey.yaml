domain_overview: User journey mapping focuses on the end-to-end experience of a customer interacting with a product, service,
  or brand, spanning stages from initial awareness to post-purchase advocacy. It emphasizes emotional, behavioral, and contextual
  touchpoints across channels, ensuring alignment with customer needs and business goals. Unlike workflows or onboarding flows,
  user journeys prioritize holistic, human-centered perspectives, often informed by qualitative research, analytics, and empathy
  mapping. Key frameworks like the Customer Journey Map (CJM) by Forrester and the Touchpoint Matrix highlight the importance
  of mapping stages such as awareness, consideration, conversion, retention, and advocacy.
key_concepts: "| Concept | Definition | Source |  \n|---|---|---|  \n| Customer Lifetime Value (CLV) | Predicted net profit\
  \ from a customer over their entire relationship | Reichheld & Sasser (1990) |  \n| Net Promoter Score (NPS) | Metric measuring\
  \ customer loyalty and advocacy | Reichheld (2003) |  \n| Touchpoint Matrix | Framework categorizing interactions by frequency\
  \ and emotional impact | Forrester (2015) |  \n| Jobs-to-be-Done (JTBD) | Theory focusing on the \"jobs\" customers aim\
  \ to accomplish | Christensen et al. (2015) |  \n| Customer Journey Map (CJM) | Visual representation of stages, touchpoints,\
  \ and pain points | Forrester (2016) |  \n| Experience Canvas | Tool for mapping emotional and functional aspects of a journey\
  \ | IDEO (2012) |  \n| User Experience Honeycomb | Framework emphasizing usability, accessibility, and desirability | Garrett\
  \ (2011) |  \n| Kano Model | Method for classifying customer preferences into basic, performance, and delighters | Kano\
  \ (1984) |  \n| Customer Success Framework | Model aligning journey stages with retention and growth metrics | Gartner (2020)\
  \ |  \n| Lean Customer Journey Map | Agile approach to mapping journeys with minimalistic, iterative techniques | Ries (2011)\
  \ |"
industry_standards:
- Customer Journey Map (CJM) Framework (Forrester)
- Touchpoint Matrix (Forrester)
- Experience Canvas (IDEO)
- Kano Model (Noriaki Kano)
- Lean Customer Journey Map (Eric Ries)
- Service Blueprint (Gerry McGovern)
- Customer Experience Map (CEM) (McKinsey)
- Net Promoter System (NPS) (Fred Reichheld)
common_patterns:
- 'Awareness Stage: First exposure through marketing, social media, or referrals.'
- 'Consideration Stage: Research, comparison, and evaluation of options.'
- 'Conversion Stage: Purchase, sign-up, or trial initiation.'
- 'Retention Stage: Post-purchase support, engagement, and loyalty building.'
- 'Advocacy Stage: Referrals, reviews, and brand promotion by satisfied users.'
- 'Cross-Channel Touchpoints: Seamless interactions across digital, physical, and human channels.'
pitfalls:
- Confusing journey maps with system workflows or onboarding flows.
- Overlooking emotional drivers and pain points in favor of functional steps.
- Failing to involve real users or stakeholders in co-creation.
- Ignoring post-conversion stages (e.g., retention, advocacy).
- Using vague or inconsistent touchpoint definitions.
