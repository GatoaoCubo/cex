  |------------------|----------------------|--------------|

  | 95%+             | "I think you mean X (95%)" | Execute X |

  | 85-94%           | "I think you mean X (85%)" | Confirm with user |

  | 70-84%           | "I think you mean X (70%)" | Suggest alternatives |

  | <70%             | "Unclear intent" | Escalate to human |

