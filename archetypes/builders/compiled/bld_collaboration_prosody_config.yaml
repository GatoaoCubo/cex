  \  \n| prosody_config    | Final prosody configuration | JSON    |  \n| emotion_mapping   | Emotion-to-prosody parameter\
  \ mappings | YAML  |  \n| validation_report | Compliance check against rules | Markdown |"
boundary: Does NOT handle TTS provider integrations (handled by `tts_provider_builder`) or agent persona definitions (handled
  by `agent_profile_builder`). Emotion state generation is excluded; only mapping and configuration are scoped.
