kind: collaboration
id: bld_collaboration_batch_config
pillar: P12
llm_function: COLLABORATE
purpose: How batch-config-builder works in crews with other builders
pattern: each builder must know its ROLE in a team, what it RECEIVES and PRODUCES
quality: null
title: Collaboration Batch Config
version: 1.0.0
author: n03_builder
tags:
- batch_config
- builder
- collaboration
- P12
tldr: 'batch-config-builder is a SPECIALIST: receives provider+model+scale seeds, produces async job config. Works in deployment
  and pipeline crews.'
domain: batch config construction
created: '2026-04-13'
updated: '2026-04-13'
density_score: 0.88
my_role_in_crews: 'I am a SPECIALIST. I answer ONE question: "what provider, model, cost cap, and retry policy does this batch
  job need?" I do not schedule when the job runs. I do not orchestrate multi-step pipelines. I specify async bulk API job
  parameters so batch processing is cost-controlled and reliable.'
crew_compositions: ''
crew_bulk_inference_pipeline: "  1. env-config-builder -> \"API key env vars, storage credentials\"\n  2. batch-config-builder\
  \ -> \"async bulk job parameters (provider, model, cost, retry)\"\n  3. schedule-builder -> \"cron trigger for when to submit\
  \ the batch\"\n  4. workflow-builder -> \"orchestration: trigger -> submit -> poll -> process results\""
crew_async_evaluation_pipeline: "  1. scoring-rubric-builder -> \"evaluation criteria\"\n  2. batch-config-builder -> \"batch\
  \ job for bulk LLM judge evaluation\"\n  3. llm-judge-builder -> \"per-request scoring prompt\"\n  4. output-template-builder\
  \ -> \"result aggregation format\""
crew_cost_optimized_data_processing: "  1. env-config-builder -> \"credentials and storage paths\"\n  2. batch-config-builder\
  \ -> \"OpenAI/Anthropic batch job configuration\"\n  3. runtime-rule-builder -> \"sync API fallback for time-sensitive requests\"\
  \n  4. feature-flag-builder -> \"toggle between batch and sync mode\""
handoff_protocol: ''
i_receive:
- 'seeds: provider (openai/anthropic), model ID, use case description'
- 'optional: expected request volume, cost budget, completion window SLA, storage paths'
- 'optional: existing env_config artifact path (for credential env var reference)'
i_produce:
- batch_config artifact (.md + .yaml frontmatter)
- 'committed to: `P09_config/examples/p09_bc_{name_slug}.md`'
i_signal:
- 'signal: complete (with quality score from QUALITY_GATES)'
- 'if quality < 8.0: signal retry with failure reasons'
builders_i_depend_on:
- 'env-config-builder: provides API credential env var names and storage credential env vars'
builders_that_depend_on_me: '| Builder | Why |

  |---------|-----|

  | workflow-builder | Batch job is a step; workflow needs job config to build submission + poll logic |

  | schedule-builder | Schedule needs to know what job to trigger (references batch_config id) |

  | output-template-builder | Output format (JSONL schema) defines result structure for downstream processing |

  | llm-judge-builder | Bulk evaluation jobs reference batch_config for how to submit judge prompts |'
escalation_rules:
- 'If user requests cron timing: redirect to schedule-builder'
- 'If user requests multi-step pipeline: redirect to workflow-builder'
- 'If user requests per-request timeout: redirect to runtime-rule-builder'
- 'If user requests on/off toggle for batch mode: redirect to feature-flag-builder'
