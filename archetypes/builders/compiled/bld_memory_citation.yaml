observation: Citations without excerpts are the most common failure — a URL alone provides no context if the link rots. Reliability
  tier misclassification (blog as tier_1) undermines trust. Missing date_accessed makes temporal validity impossible to assess.
pattern:
- Always excerpt — 1-3 sentences with specific data from the source
- Strict tier classification — tier_1 only for peer-reviewed/primary research
- Temporal tracking — date_accessed on every citation, freshness policy when time-sensitive
- Relevance mapping — specify which domains/kinds the citation supports
evidence: Initial pattern from KC analysis — no production log yet.
