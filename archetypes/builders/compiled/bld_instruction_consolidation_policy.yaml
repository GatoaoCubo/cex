tldr: '8F production process for LLM agent memory consolidation policy: load schema, define promotion rules, eviction strategy,
  importance scoring, tier matrix, compliance'
domain: LLM agent memory consolidation
created: '2026-04-14'
updated: '2026-04-14'
density_score: 0.9
phase_1_research: "1. Identify the parent memory_architecture artifact (which layers are active, what tier).\n2. Determine\
  \ which memory transitions need consolidation rules:\n   - Does the agent have episodic memory? If yes, define working ->\
  \ episodic promotion.\n   - Does the agent have semantic memory? If yes, define episodic -> semantic promotion.\n3. Map\
  \ the target commercial tier (free/pro/enterprise) against the tier matrix\n   in bld_knowledge_card_consolidation_policy.md.\n\
  4. Review reference pipelines: MemGPT/Letta consolidation pipeline (Packer 2023),\n   mem0 selective extraction, Zep deduplication/merge.\n\
  5. Identify compliance requirements: GDPR Art. 17, HIPAA, data residency constraints.\n6. Check bld_schema_consolidation_policy.md\
  \ for required frontmatter and body structure."
phase_2_compose: "1. Write frontmatter per bld_schema_consolidation_policy.md (all required fields,\n   quality: null, consolidation_async:\
  \ true).\n2. Write Overview: agent type, tier, consolidation strategy summary.\n3. Write Promotion Rules table:\n   - Columns:\
  \ Trigger | Source Layer | Target Layer | Condition | Action\n   - Row per active transition (working->episodic on session\
  \ end, etc.)\n4. Write Eviction Rules table:\n   - Columns: Layer | Strategy | Trigger | Action\n   - Row per active layer\
  \ with concrete trigger (TTL, importance floor, LRU budget)\n5. Write Importance Scoring section: formula, model reference,\
  \ or scoring rubric.\n6. Write Consolidation Job section: async trigger, schedule, timeout, failure handling.\n7. Write\
  \ Commercial Tier Matrix: FREE/PRO/ENTERPRISE capability comparison.\n8. Write Compliance Config (required for enterprise):\
  \ retention_days, data_residency,\n   gdpr_erasure procedure, audit_trail config."
phase_3_validate:
- '[ ] Schema compliance: all required frontmatter fields present, ID matches pattern.'
- '[ ] Domain accuracy: content is agent memory consolidation, not OS/GC memory.'
- '[ ] consolidation_async: true in frontmatter.'
- '[ ] Promotion Rules table: at least one row for active tier.'
- '[ ] Eviction Rules table: at least one row per active layer.'
- '[ ] Tier matrix present: FREE/PRO/ENTERPRISE differentiation explicit.'
- '[ ] Compliance section present if tier=enterprise.'
- '[ ] No OS memory terminology: GC, slab, heap, TLB, fragmentation, compaction.'
- '[ ] quality: null in frontmatter (never self-score).'
- '[ ] No Unicode characters (ASCII only per ascii-code-rule.md).'
