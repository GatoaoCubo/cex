golden_example: "---\ntitle: AI Compliance Framework for EU AI Act & GDPR\nversion: 1.0\nauthor: Compliance Team\ndate: 2023-10-01\n\
  regulatory_scope: [EU AI Act, GDPR, CCPA]\n---\n\n### Regulatory Mapping\n- EU AI Act (Art. 13): High-risk AI systems require\
  \ transparency in data processing.\n  → Mapped to: Data logging module (v1.2), user consent dashboard.\n- GDPR (Art. 22):\
  \ Right to object to automated decision-making.\n  → Mapped to: Manual override switch in scoring algorithms.\n- CCPA (§\
  \ 999.313): Consumer right to access data used for AI training.\n  → Mapped to: Data export API endpoint (v2.1).\n\n###\
  \ Attestation\n> This system complies with mapped regulations as of 2023-10-01.\n> Signed by: [Compliance Officer Name],\
  \ [Date]"
anti_example_1_missing_regulatory_scope: '---

  title: AI Compliance Framework

  version: 0.5

  author: Dev Team

  date: 2023-09-15

  ---


  ### Regulatory Mapping

  - "Data must be encrypted": Implemented via AES-256.

  - "User consent required": Handled by checkbox on signup.'
why_it_fails: The framework conflates regulatory compliance with internal safety policies (not laws). It violates the boundary
  by focusing on organizational rules rather than external regulatory requirements.
anti_example_2_conflating_with_safety_policies: '---

  title: AI Safety & Compliance Framework

  version: 1.0

  author: Ops Team

  date: 2023-10-05

  regulatory_scope: [Internal Safety Policy]

  ---


  ### Regulatory Mapping

  - "No unattended AI deployment": Requires 24/7 monitoring.

  - "Annual risk assessment": Conducted by Q4 each year.'
