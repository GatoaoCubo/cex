phase_1_research:
- Analyze existing Claude/LangChain/HuggingFace app manifests for metadata structure.
- 'Identify required metadata fields: name, version, provider, description, tags.'
- Map platform-specific permission models (API keys, IAM roles, token-based).
- 'Define pricing tiers: free, tiered, pay-as-you-go, subscription.'
- 'Review compliance constraints: data residency, encryption, audit logs.'
- Document schema dependencies from SCHEMA.md (required/optional fields).
phase_2_compose:
- Create YAML file with root key `marketplace_app_manifest`.
- Populate metadata section using SCHEMA.md (name, version, provider).
- Define permissions under `perms` with platform-specific scopes.
- Specify pricing model in `pricing` (type, cost, currency).
- Add constraints under `constraints` (data residency, encryption).
- Reference OUTPUT_TEMPLATE.md for nested structure (e.g., `dependencies`).
- Validate against SCHEMA.md using YAML linter.
- 'Insert platform-specific config blocks (Claude: `api_keys`, LangChain: `llm_type`).'
- Finalize with `checksum` hash of manifest content.
phase_3_validate:
- '[ ] ✅ All required fields in metadata exist (name, version, provider).'
- '[ ] ✅ Permissions align with platform-specific schema (IAM, API keys).'
- '[ ] ✅ Pricing model matches declared type (free, tiered, etc.).'
- '[ ] ✅ Constraints comply with data residency/encryption rules.'
- '[ ] ✅ YAML syntax passes SCHEMA.md validation and linter checks.'
