quality:
- Aligns with ISO 20000-1 and ITIL 4 SLA standards.
- Uses unambiguous metrics (e.g., "downtime" vs. "service disruption").
- Specifies penalties (e.g., credit percentages) and remedies (e.g., service credits, escalations).
- Ensures enforceable SLI (Service Level Indicator) definitions and SLO (Service Level Objective) targets.
- Includes termination clauses and dispute resolution mechanisms.
