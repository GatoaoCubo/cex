definition: "(Table: metric, threshold, operator, scope)  \n| metric       | threshold | operator | scope      |  \n|--------------|-----------|----------|------------|\
  \  \n| completion_rate | 85%       | >=       | all users  |"
hard_gates: "(Table: ID | Check | Fail Condition)  \n| ID          | Check                          | Fail Condition     \
  \                                 |  \n|-------------|--------------------------------|-----------------------------------------------------|\
  \  \n| H01         | YAML frontmatter valid         | Invalid YAML syntax or missing required fields      |  \n| H02   \
  \      | ID matches ^p05_pt_[a-z][a-z0-9_]+.md$ | ID does not conform to schema pattern              |  \n| H03        \
  \ | kind field matches 'product_tour' | kind field is incorrect or missing                  |  \n| H04         | Steps are\
  \ sequential and non-overlapping | Steps are out of order or overlap                 |  \n| H05         | Tooltips have\
  \ clear, concise text | Tooltip text is ambiguous or exceeds 150 characters |  \n| H06         | Triggers are user-initiated\
  \      | Triggers are automatic or non-interactive         |  \n| H07         | Accessibility compliance (ARIA)  | Missing\
  \ ARIA attributes or keyboard navigation fails |"
soft_scoring: "(Table: Dim | Dimension | Weight | Scoring Guide)  \n| Dim | Dimension       | Weight | Scoring Guide     \
  \                                 |  \n|-----|------------------|--------|----------------------------------------------------|\
  \  \n| D01 | Usability        | 0.15   | 1.0: Seamless; 0.5: Minor friction; 0.0: Broken     |  \n| D02 | Clarity      \
  \    | 0.15   | 1.0: Clear instructions; 0.5: Ambiguous; 0.0: Confusing |  \n| D03 | Engagement       | 0.10   | 1.0: High\
  \ retention; 0.5: Moderate; 0.0: Low        |  \n| D04 | Accessibility    | 0.15   | 1.0: Full compliance; 0.5: Partial;\
  \ 0.0: Non-compliant |  \n| D05 | Consistency      | 0.10   | 1.0: Uniform design; 0.5: Inconsistent; 0.0: Disjointed |\
  \  \n| D06 | Performance      | 0.10   | 1.0: <200ms load; 0.5: 200-500ms; 0.0: >500ms       |  \n| D07 | Localization \
  \    | 0.10   | 1.0: All locales covered; 0.5: Partial; 0.0: Missing |  \n| D08 | Visual Design    | 0.15   | 1.0: Polished;\
  \ 0.5: Minor flaws; 0.0: Poor          |"
actions: "(Table: Score | Action)  \n| Score      | Action                          |  \n|------------|---------------------------------|\
  \  \n| GOLDEN     | Auto-approve and deploy         |  \n| PUBLISH    | Manual review required          |  \n| REVIEW  \
  \   | QA validation needed            |  \n| REJECT     | Reject and request major fixes  |"
bypass: "(Table: conditions, approver, audit trail)  \n| conditions                | approver        | audit trail       \
  \                   |  \n|---------------------------|------------------|--------------------------------------|  \n| Critical\
  \ bug fix required | Product Manager  | Bypass logged with reason and date   |"
