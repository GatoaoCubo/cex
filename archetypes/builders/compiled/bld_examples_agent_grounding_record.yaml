example_2_anti_example_missing_output_hash_score_0_0_hard_gate_h05_fail: "---\nkind: agent_grounding_record\nid: p10_gr_bad_nohash\n\
  ...\n---\ninference_id: 3a4b5c6d-...\nmodel:\n  id: gpt-4o\n  provider: openai\ntool_calls:\n  - tool_name: web_search\n\
  \    timestamp: 2026-04-14T10:00:00Z\nrag_chunks:\n  - chunk_id: chunk_001\n    source_url: https://example.com/docs/page1\n\
  \    retrieval_score: 0.88\noutput_hash: null    # <-- COMPLIANCE VIOLATION\notel_span_id: a1b2c3d4e5f60718\n\nWhy this\
  \ FAILS: `output_hash: null` triggers Hard Gate H05 failure. Score = 0.0. A grounding record without an output-hash cannot\
  \ prove the record corresponds to any specific output. Any post-market-monitoring audit based on this record would be invalid.\
  \ The record also lacks `tool_input_hash`, `tool_output_hash`, and `content_hash` on RAG chunks.\n\nFix: Recompute SHA-256\
  \ from raw model output bytes. If the raw output is no longer available, the inference run must be re-executed under proper\
  \ instrumentation."
example_3_anti_example_rag_chunks_without_source_url_score_2_1_d2_0_0: "inference_id: 9b8a7c6d-...\nmodel:\n  id: claude-sonnet-4-6\n\
  \  provider: anthropic\nrag_chunks:\n  - chunk_id: chunk_abc\n    source_url: null      # <-- BREAKS TRACEABILITY\n    retrieval_score:\
  \ 0.91\n    content_hash: 1a2b3c...\n  - chunk_id: chunk_def\n    source_url: unknown   # <-- ALSO INVALID\n    retrieval_score:\
  \ 0.85\n    content_hash: 2b3c4d...\noutput_hash: 7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2b3c4d5e6f70\notel_span_id:\
  \ b2c3d4e5f6071819\n\nWhy this fails D2: `source_url: null` and `source_url: \"unknown\"` are both invalid. The entire purpose\
  \ of RAG-chunk provenance is to trace the output back to a specific source document. Without source_url, the grounding record\
  \ cannot satisfy EU AI Act post-market-monitoring requirements or C2PA content credential binding.\n\nFix: Trace the chunk\
  \ back through the vector store to its originating document. If the vector store does not record source metadata, the RAG\
  \ pipeline must be updated to capture it before grounding records can be generated."
