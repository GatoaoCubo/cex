density_score: 0.85
observation: Misaligned role hierarchies often cause unintended access overlaps, while overly broad resource scopes break
  tenant isolation. Policies frequently omit explicit tenant identifiers, leading to cross-tenant data exposure.
pattern: Granular role definitions paired with tenant-specific resource constraints ensure isolation. Hierarchical roles with
  inherited permissions reduce redundancy while maintaining clarity.
evidence: Reviewed policies using "tenant-abc-admin" roles with restricted resource paths demonstrated effective isolation.
  Overlapping roles in another artifact caused unauthorized access across tenants.
recommendations:
- Enforce tenant-specific role names and resource scopes.
- Avoid wildcard resource patterns; use explicit path matching.
- Validate role inheritance to prevent accidental privilege escalation.
- Include tenant ID attributes in policy conditions for dynamic isolation.
- Audit policies for unused roles and redundant permissions quarterly.
