quality:
- Policies must use standardized memory metrics (e.g., bytes, retention time).
- Must align with garbage collection (GC) and memory management subsystems.
- Must avoid vendor-specific hardware assumptions unless explicitly qualified.
- Must ensure deterministic eviction strategies for low-memory states.
- Must minimize fragmentation risks through contiguous allocation policies.
