tldr: '3-phase: design episode schema and retrieval keys, compose with decay policy, validate gates.'
domain: episodic memory construction
created: '2026-04-17'
updated: '2026-04-17'
density_score: 0.9
phase_1_design:
- Identify the agent or nucleus this episodic store serves
- 'Define episode schema: what fields each stored episode has (timestamp, context, outcome, retrieval_keys)'
- 'Choose retrieval method: recency (most recent N), relevance (embedding similarity), hybrid'
- 'Set episode_count limit: how many episodes to retain before pruning'
- 'Define decay policy: time-based decay, relevance decay, or no decay'
- 'Identify retrieval keys: what queries will surface relevant past episodes'
- 'Define promotion source: which working_memory promote_targets feed this store'
- Check for existing episodic_memory artifacts with overlapping scope
phase_2_compose:
- Read SCHEMA.md -- source of truth
- Read OUTPUT_TEMPLATE.md -- fill all template fields
- 'Fill frontmatter: all required fields (quality: null)'
- 'Write episode_schema: field table with types'
- 'Write retrieval_config: method and parameters'
- Declare decay_policy with numeric values
- Write episode_count limit
- Write 1-2 example episodes to demonstrate schema
- 'Write Overview: what agent this serves, why episodic memory is needed'
- Verify body <= 4096 bytes
phase_3_validate:
- Confirm id matches `^p10_ep_[a-z][a-z0-9_]+$`
- Confirm kind == episodic_memory
- Confirm episode_schema has >= 3 fields including timestamp
- Confirm retrieval_method is declared
- Confirm episode_count limit is numeric
- 'Cross-check: no entity facts (entity_memory), no compressed summaries (memory_summary)'
- 'Revise if score < 8.0 -- most common fix: add retrieval keys or decay policy'
