  \ \"bool\"\ncapacity_limit:\n  value: 8000\n  unit: tokens\nexpiry: \"on_task_complete\"\nclear_on_complete: promote\npromote_targets:\
  \ [episodic_memory]\nnucleus: \"n04\"\nquality: null\ntags: [working_memory, n04, knowledge_card_build, P10]\ntldr: \"Working\
  \ memory for N04 knowledge card build: tracks phase, sections, quality, promotes episode on complete.\"\ndescription: \"\
