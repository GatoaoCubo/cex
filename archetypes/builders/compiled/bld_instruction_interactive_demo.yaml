phase_1_research:
- Conduct user interviews to identify key demo interaction points
- Analyze competitor demos for common interaction patterns
- Define demo objectives and success metrics (e.g., conversion rates)
- Map user journey through product features with wireframes
- Evaluate technical constraints (e.g., API limits, load times)
- Gather feedback from stakeholders on demo scope
phase_2_compose:
- Outline demo structure using bld_schema_interactive_demo.md `demo_flow` format
- Write talk track for each guided-tour step (max 2 sentences)
- Embed interactive elements (buttons, sliders) with event handlers
- Align content with bld_output_template_interactive_demo.md `step_template` format
- Add branching logic for user-driven exploration paths
- Integrate product API endpoints for real-time data display
- Write error-handling scripts for failed interactions
- Add accessibility features (keyboard navigation, ARIA labels)
- Finalize with demo metadata (duration, target audience)
phase_3_validate:
- '[ ] Conduct usability testing with 5+ users'
- '[ ] Verify alignment with bld_schema_interactive_demo.md required fields'
- '[ ] Confirm interactive elements function across devices'
- '[ ] Validate talk track matches scripted user scenarios'
- '[ ] Ensure compliance with P05 accessibility standards'
