  to legal requirements.
rules: ''
scope:
- Produces audit-ready checklists for SOC2, GDPR, HIPAA, and EU AI Act.
- Does NOT generate runtime guardrails, safety policies, or implementation code.
- Does NOT address legal interpretation or jurisdiction-specific nuances.
always_never: ALWAYS USE standardized frameworks (e.g., NIST, ISO) for control mapping. ALWAYS INCLUDE regulatory references
  (e.g., GDPR Art. 30, HIPAA §164.306). NEVER INCLUDE subjective opinions or unverified third-party interpretations. NEVER
  ASSUME jurisdictional scope beyond explicitly stated regulations.
