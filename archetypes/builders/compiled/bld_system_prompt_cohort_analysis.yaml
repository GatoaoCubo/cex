quality:
- Requires clean, structured input data with temporal alignment (e.g., cohort start dates).
- Enforces survival analysis using Kaplan-Meier or Cox proportional hazards methods.
- Mandates LTV modeling via CLV (Customer Lifetime Value) or BG/NBD (Beta Geometric/Negative Binomial) frameworks.
- Ensures cohort definitions are statistically significant (p < 0.05 for segmentation).
- Demands explicit documentation of retention decay curves and churn rate calculations.
