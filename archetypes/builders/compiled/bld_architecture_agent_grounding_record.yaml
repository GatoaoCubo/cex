pillar_position: '| Property  | Value                    |

  |-----------|--------------------------|

  | Pillar    | P10 (Memory)             |

  | Subdir    | P10_memory/grounding/    |

  | Naming    | p10_gr_[prefix].md     |

  | Max bytes | 4096                     |


  P10 (Memory) is appropriate because grounding records are persistence artifacts -- they record the state of an inference
  run for future retrieval, audit, and analysis. They are not outputs (P05), not schemas (P06), not configurations (P09) --
  they are memory artifacts that encode what happened during inference.


  ---'
data_flow: "INPUT SIGNALS\n  otel_span_id      <- OTel instrumentation layer\n  tool_call_logs    <- Tool execution framework\n\
  \  rag_retriever_log <- Vector store / retriever\n  model_response    <- AI provider API response\n\nPHASE 1 (RESEARCH)\n\
  \  Collect: tool_calls array, rag_chunks array, model ref, output bytes\n\nPHASE 2 (COMPOSE)\n  Compute: output_hash = sha256(raw_output_bytes)\n\
  \  Compute: tool_input_hash = sha256(serialized_tool_input) per tool\n  Compute: tool_output_hash = sha256(serialized_tool_output)\
  \ per tool\n  Compute: content_hash = sha256(chunk_text) per RAG chunk\n  Compute: grounding_coverage_pct = cited_claims\
  \ / total_claims\n  Assemble: full grounding record per bld_output_template\n\nPHASE 3 (VALIDATE)\n  Run: H01-H08 hard gates\n\
  \  Run: D1-D5 soft scoring\n  Gate: score >= 9.0 for production records\n\nOUTPUT ARTIFACTS\n  p10_gr_[prefix].md  -> P10_memory/grounding/\n\
  \  Signal               -> .cex/runtime/signals/\n  C2PA manifest link   -> c2pa_manifest_ref (external)\n  OTel span link\
  \       -> otel_span_id (external)\n\n---"
scaling_considerations: '| Scenario                    | Challenge                               | Architecture Response                                   |

  |-----------------------------|-----------------------------------------|---------------------------------------------------------|

  | High-volume inference (>100 runs/min) | Grounding records per minute = artifact sprawl | Batch into audit_log daily; archive
  old records |

  | Large tool call counts (>20 per run) | Exceeds 4096 byte limit            | Truncate to counts + hashes; pointer to full_trace_log_ref
  |

  | Large RAG chunk sets (>30 chunks) | Exceeds byte limit                 | Same: truncate with full_trace_log_ref pointer          |

  | Real-time traceability needs | Latency of hash computation            | Pre-compute hashes in the inference pipeline;
  write record async |

  | Multi-model chained inference | Multiple model IDs per inference      | One grounding record per model call; link via
  session_id |'
