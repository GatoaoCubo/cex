transport_type_enum: 'transport_type: webrtc | websocket | sse | grpc_streaming | quic | tcp | udp | http2'
id_pattern: '^p09_tc_[a-z0-9_]+$


  Examples: `p09_tc_webrtc_media`, `p09_tc_ws_events`, `p09_tc_grpc_inference`'
body_structure: "1. Transport Type Declaration\n   State `transport_type` and primary `protocol` reference.\n\n2. Protocol-Specific\
  \ Parameters\n   All mandatory fields for the declared `transport_type` (see system_prompt for per-protocol mandatory fields).\n\
  \n3. Security Configuration\n   TLS/DTLS version, certificate paths (for server configs), DTLS role (for WebRTC).\n\n4.\
  \ Resilience Parameters\n   Keepalive, heartbeat, ping/pong intervals, reconnection/retry policy with backoff.\n\n5. QoS\
  \ and Performance\n   DSCP marking, message size limits, flow control windows, congestion control algorithm.\n\n6. Notes\n\
  \   Deployment context, NAT topology assumptions, known limitations."
constraints:
- '`quality` MUST be null (never "draft", "review", or a numeric score)'
- '`transport_type` MUST be from the enum above'
- All required fields must be present and non-empty
- ID MUST match naming pattern
- WebRTC configs MUST include at least one TURN server entry
- All encrypted transports MUST specify TLS version >= 1.2
- 'Max file size: 4096 bytes (configs can be verbose; expanded from 2048)'
