tldr: '3-phase pipeline to produce cost_budget artifacts: research scope and providers, compose catalog and alerts, validate
  all gates.'
domain: cost budget construction
created: '2026-04-13'
updated: '2026-04-13'
density_score: 0.9
phase_1_research: "1. Identify the scope: global (all providers), a named provider (anthropic, openai, google),\n   or a specific\
  \ model slug (claude-opus-4-6, gpt-4o, gemini-2.5-pro)\n2. Catalog all providers and models that need budget governance\
  \ -- include current or projected\n   monthly spend and token volumes\n3. Determine the currency unit: USD (monetary) or\
  \ token_units (raw token count)\n4. Classify the reset policy for each entry: daily, weekly, monthly, rolling_7d, rolling_30d,\n\
  \   or none (no reset -- cumulative cap)\n5. Define alert thresholds: warn_pct (typically 80%) and block_pct (typically\
  \ 100%)\n6. Determine overage_action per scope: block (hard stop API calls), warn (notify only),\n   log (silent audit trail)\n\
  7. Define escalation path: who is notified on warn, who is notified on block, which channels\n   (log file, email, webhook,\
  \ pagerduty)\n8. Check existing cost_budgets via cex_retriever for the same scope -- do not duplicate a\n   budget that\
  \ already covers this provider"
phase_2_compose: "1. Read SCHEMA.md -- source of truth for all fields\n2. Read OUTPUT_TEMPLATE.md -- fill the template following\
  \ SCHEMA constraints\n3. Fill all required frontmatter fields; set `quality: null` -- never self-score\n4. Write Overview\
  \ section: what scope, why these limits, who enforces them (1-2 sentences)\n5. Write Budget Catalog section: table with\
  \ columns provider, model, token_limit, usd_limit,\n   alert_threshold_pct, reset_policy, overage_action\n6. Write Alert\
  \ Policy section: channels, warn threshold behavior, block threshold behavior,\n   escalation contacts or webhook endpoints\n\
  7. Write Overage Rules section: what happens on breach (grace period, auto-block, notification\n   chain), how to request\
  \ a limit increase\n8. Confirm body <= 3072 bytes"
phase_3_validate: "1. Check QUALITY_GATES.md -- verify each HARD gate manually\n2. Confirm YAML frontmatter parses without\
  \ errors\n3. Confirm `id` matches `^p09_cb_[a-z][a-z0-9_]+$`\n4. Confirm at least one budget entry is defined\n5. Confirm\
  \ all budget entries have both a limit (token or USD) and an overage_action\n6. Confirm alert thresholds are present and\
  \ warn_pct < block_pct\n7. Confirm no actual API keys, billing credentials, or payment data appear anywhere\n8. Confirm\
  \ `quality` is null\n9. Confirm body <= 3072 bytes\n10. Cross-check: does this govern SPEND (cost_budget) or THROUGHPUT\
  \ (rate_limit_config)?\n    If the limits are in RPM/TPM this belongs in rate_limit_config. If the limits are in\n    USD\
  \ or total tokens this is cost_budget. Never mix the two.\n11. If score < 8.0: revise in the same pass before outputting"
