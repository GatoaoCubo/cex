author: builder_agent
observation: Context maps without explicit pattern labels (ACL/OHS/Conformist) become obsolete within 6 months -- teams add
  integrations without updating the map. Conformist relationships without ACL planning become painful coupling over time.
  Maps that omit team ownership leave architectural governance gaps.
pattern: 'Named pattern + team owner + Conformist migration plan.


  Relationship discipline:

  1. Every relationship labeled with: ACL / OHS / Conformist / Partnership / Shared_Kernel

  2. Direction explicit: upstream (U) vs downstream (D)

  3. Integration_type declared: sync / async / batch


  Team ownership discipline:

  1. Every BC has one owning team

  2. Team coupling risk documented per relationship

  3. Conformist relationships flagged with "MIGRATION RISK" annotation


  ACL discipline:

  1. Prefer ACL over Conformist for any non-trivial integration

  2. ACL translation layer owned by downstream team

  3. OHS preferred when upstream can formalize their API'
evidence: '6 architecture reviews: 4 had unlabeled relationships causing confusion; 3 Conformist without ACL plan became blocking
  dependencies within 12 months.'
