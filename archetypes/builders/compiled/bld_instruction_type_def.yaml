tldr: Build a precise type_def YAML that declares base type, constraints, composition rules, nullable semantics, generics,
  and serialization spec.
density_score: 0.91
context: 'The type-def-builder produces a `type_def` artifact -- a machine-parseable YAML that declares a reusable custom
  type. These types form the vocabulary layer that other artifacts reference: `input_schema` uses them to define field types,
  `validator` uses them to enforce constraints, and `grammar` uses them for structural rules.

  Critical distinction: `type_def` is purely declarative vocabulary. It does NOT define input validation contracts (`input_schema`),
  pass/fail enforcement rules (`validator`), or integration interfaces (`interface`). Confusing these produces types that
  duplicate validation logic they should not own.

  Input contract:

  - `type_name`: string -- kebab-case identifier (e.g. `iso-score`, `agent-id`, `wave-index`)

  - `base_type`: enum -- `string` | `integer` | `number` | `boolean` | `object` | `array` | `union`

  - `description`: string -- one sentence describing what values this type represents

  - `constraints`: list of constraint objects (see Phase 2)

  - `composition`: object or null -- union/intersection/discriminated-union definition

  - `nullable`: boolean -- whether null is a valid value

  - `generics`: list of type parameters or null (e.g. `[T]` for `list<T>`)

  - `serialization`: object -- format-specific encoding rules per target format

  - `examples`: list of 2-3 valid example values

  Output contract: a single `type_def` YAML with all required fields, stored at `records/type_defs/{type_name}.yaml`.

  Variables:

  - `{{type_name}}` -- kebab-case type identifier

  - `{{base_type}}` -- base type enum value

  - `{{constraint_N}}` -- Nth constraint object

  - `{{serialization_json}}` -- JSON encoding rule

  - `{{serialization_yaml}}` -- YAML encoding rule'
phases: ''
phase_1_classify_type_and_identify_composition_pattern: "Action: Determine the structural category of the type being defined.\n\
  IF base_type == \"union\":\n    composition_kind = \"union\"\n    REQUIRE: composition.members list with >= 2 types\n  \
  \  IF members share overlapping fields:\n        REQUIRE: composition.discriminator (a literal string field)\nELIF base_type\
  \ == \"object\" AND composition is not null:\n    IF composition.kind == \"intersection\":\n        composition_kind = \"\
  intersection\"\n        REQUIRE: composition.of list with >= 2 base object types\n    ELSE:\n        composition_kind =\
  \ \"extension\"\nELSE:\n    composition_kind = \"primitive_or_constrained\"\n    composition = null\nFor discriminated unions:\
  \ the discriminator field must be a literal string type present in all union members.\nVerifiable exit: composition_kind\
  \ is set; union types have >= 2 members; discriminated unions have a discriminator field identified."
phase_2_define_constraint_set: "Action: Translate each constraint requirement into a structured constraint object.\nConstraint\
  \ object schema:\n{\n  kind: enum [min, max, min_length, max_length, pattern, enum_values,\n              min_items, max_items,\
  \ unique_items, required_keys, custom],\n  value: the constraint threshold, pattern, or list,\n  error_message: string (human-readable\
  \ violation message)\n}\nConstraint rules by base_type:\nstring  -> allowed: min_length, max_length, pattern, enum_values\n\
  integer -> allowed: min, max, enum_values\nnumber  -> allowed: min, max (inclusive/exclusive flag optional)\narray   ->\
  \ allowed: min_items, max_items, unique_items\nobject  -> allowed: required_keys, custom\nunion   -> constraints apply to\
  \ the resolved member type, not the union itself\nCross-type rules: `pattern` requires a valid regex; `enum_values` requires\
  \ >= 2 distinct values; `min` must be <= `max` when both are present.\nVerifiable exit: each constraint has kind, value,\
  \ and error_message; no invalid constraint for the base_type."
phase_3_specify_serialization_rules: "Action: Define encoding behavior per serialization format.\nFOR each target_format in\
  \ [json, yaml, protobuf]:\n    IF target_format in serialization input:\n        encode_rule = provided rule\n    ELSE:\n\
  \        encode_rule = derive_default(base_type, target_format)\nDefault derivation:\n  json:    string->string, integer->number,\
  \ number->number,\n           boolean->true/false, object->object, array->array\n  yaml:    same as json with YAML scalar\
  \ rules\n  protobuf: string->wire2, integer->int32/int64, number->double,\n            boolean->bool, object->message, array->repeated\
  \ field\nVerifiable exit: at least JSON serialization rule is defined; all rules are format-consistent."
phase_4_validate_against_quality_gates: 'Action: Run 8 HARD gates before emitting; log 4 SOFT gates as warnings.'
