domain_overview: 'Incident reports in AI systems document the lifecycle of critical failures, focusing on root cause analysis,
  impact assessment, and corrective actions. Unlike traditional software incidents, AI-related events often involve complex
  interactions between data, models, and infrastructure, requiring specialized investigation techniques. Post-mortems are
  central to SRE (Site Reliability Engineering) practices, ensuring transparency and systemic improvements. Industry leaders
  like Google and Microsoft emphasize blameless post-mortems to foster learning without punitive measures. AI incident reports
  must address unique challenges: model drift, data biases, inference errors, and integration with legacy systems. Standards
  such as IEEE 1220-2010 and ISO/IEC 25010 provide frameworks for reliability and quality, while NIST guidelines stress incident
  response rigor. Effective reports balance technical detail with stakeholder communication, aligning with the "blameless
  culture" advocated by SRE communities.'
key_concepts: "| Concept              | Definition                                                                 | Source\
  \                      |  \n|----------------------|----------------------------------------------------------------------------|-----------------------------|\
  \  \n| Incident             | Unplanned event disrupting system functionality or safety                 | Google SRE Book\
  \           |  \n| Root Cause           | Fundamental flaw enabling an incident, often non-obvious                  | Microsoft\
  \ Post-Mortem Guide |  \n| Timeline             | Chronological record of incident occurrence and response             \
  \     | IEEE 1220-2010             |  \n| Impact Assessment    | Quantification of downtime, financial loss, or reputational\
  \ damage        | ISO/IEC 25010             |  \n| Mitigation           | Immediate steps to contain incident effects  \
  \                             | NIST SP 800-61            |  \n| Owner                | Primary team/individual accountable\
  \ for incident resolution               | SRE Best Practices        |  \n| Severity             | Classification based on\
  \ scope, duration, and risk (e.g., P1-P5)           | Atlassian Incident Guide  |  \n| Blameless Culture    | Post-mortem\
  \ approach avoiding punitive blame to encourage transparency    | Etsy SRE Blog             |  \n| Action Items        \
  \ | Specific, measurable tasks to prevent recurrence                          | Harvard CSAIL Report      |  \n| Lessons\
  \ Learned      | Generalizable insights from incident analysis                             | ACM SIGOPS                |\
  \  \n| Escalation Path      | Defined workflow for notifying stakeholders during incidents              | AWS Incident Response\
  \     |  \n| Post-Mortem          | Document summarizing incident, analysis, and improvements                 | Google SRE\
  \ Book           |"
industry_standards:
- Google SRE Book (Incident Management)
- IEEE 1220-2010 (System Reliability)
- ISO/IEC 25010 (System Quality Attributes)
- NIST SP 800-61 (Incident Response)
- ACM SIGOPS Post-Mortem Guidelines
- Microsoft Azure Incident Response Framework
common_patterns:
- Structured Timeline – Log events with timestamps, actors, and system states.
- 5 Whys Analysis – Iterative questioning to identify root causes.
- Blameless Ownership – Assign responsibility without attributing fault.
- Cross-Functional Review – Involve engineering, ops, and business stakeholders.
- Actionable Metrics – Track resolution time, recurrence rates, and remediation progress.
- Template Consistency – Use standardized sections (e.g., summary, analysis, lessons).
pitfalls:
- Assigning Blame – Discourages honesty and stifles collaboration.
- Incomplete Data – Omitting logs or context leads to flawed analysis.
- Delayed Reporting – Prolongs downtime and obscures true root causes.
- Ignoring Non-Technical Factors – Overlooking organizational or process issues.
- No Follow-Up – Action items left untracked result in recurring incidents.
