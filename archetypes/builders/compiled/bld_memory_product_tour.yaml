density_score: 0.85
observation: Common issues include misaligned tooltip positions, unclear trigger logic (e.g., scroll vs. click), and overloading
  steps with too much text. Tours often lack clear end goals, leading to user confusion.
pattern: Effective tours use concise, action-oriented steps with visual cues. Trigger specs are tightly coupled to user flows
  (e.g., "after form submission"), ensuring relevance.
evidence: Reviewed artifacts showed 30% higher completion rates when tooltips used icons + short text, and triggers were tied
  to specific UI interactions.
recommendations:
- Define triggers based on user behavior, not arbitrary timing.
- Limit steps to 5–7, focusing on critical features.
- Use consistent tooltip styling and placement (e.g., bottom-right).
- Include a clear "Skip" option for user control.
- Test tours with real users to validate flow clarity.
