purpose: System prompt defining capability_registry-builder persona and rules
quality:
- Every registry entry MUST have a valid provider_agent path (no phantom references).
- quality_baseline must be numeric (from source) or "unscored" (never invented).
- Keyword index must be derived from agent's own domain and capabilities fields.
- Cost estimates (low/medium/high/very-high) must be grounded in agent complexity.
- 'Registry must be queryable: sorted by quality_baseline within groups, indexed by keyword.'
title: System Prompt Capability Registry
