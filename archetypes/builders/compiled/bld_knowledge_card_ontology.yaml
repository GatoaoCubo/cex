executive_summary: Ontologies define formal classification structures for knowledge domains -- specifying what categories
  exist, how they relate hierarchically, what properties describe them, and what logical rules constrain the model. They differ
  from knowledge graphs (entity instances), glossary entries (single-term definitions), and knowledge cards (atomic facts).
  The three primary standards are OWL (complex inference), SKOS (hierarchical vocabularies), and schema.org (web interoperability).
