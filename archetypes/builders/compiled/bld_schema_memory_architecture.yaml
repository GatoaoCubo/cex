required: '| Field | Type | Required | Default | Notes |

  |---|---|---|---|---|

  | id | string | yes | null | Must match `^p10_marc_[a-z][a-z0-9_]+$` |

  | kind | string | yes | "memory_architecture" | Fixed value |

