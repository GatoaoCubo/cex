crew_role: 'In a crew, I handle KNOWLEDGE GRAPH SCHEMA DEFINITION. I answer: "what entity types and relation types does this
  domain need, with what extraction logic, storage backend, and traversal strategy?" I do NOT handle: entity_memory (P10,
  per-entity state storage), knowledge_index (P10, flat vector index config), rag_source (P01, external source pointer), chunk_strategy
  (P01, text splitting), retriever_config (P01, search parameters), embedding_config (P01, vector model).'
