phase_1_research:
- 'Identify the GPAI model: name, version, model family, provider entity (legal name + EU representative if non-EU).'
- 'Collect training data inventory: dataset names, sources, volumes (tokens/samples), languages, date range.'
- 'Gather compute budget data: total FLOP count, hardware type, training duration, datacenter location.'
- 'Compile energy consumption figures: MWh consumed during training, estimated CO2-eq, PUE of datacenter.'
- 'Retrieve evaluation results: benchmark names (MMLU, HellaSwag, HumanEval, etc.), scores, evaluation date.'
- Document intended purpose and known limitations per Article 53(1)(a)-(b).
- 'Define downstream-limit clauses: prohibited use cases, required safeguards for integrators.'
phase_2_compose:
- Reference SCHEMA for Annex IV required fields.
- 'Populate Section 1: Model Identity (name, version, provider, release date, model family).'
- 'Populate Section 2: Training Data Summary (datasets, volumes, preprocessing, filtering methods, data governance).'
- 'Populate Section 3: Compute Budget (FLOP estimate, hardware type, training duration, location).'
- 'Populate Section 4: Energy Consumption (MWh, CO2-eq, PUE, reporting methodology per GHG Protocol).'
- 'Populate Section 5: Evaluation Results (benchmarks, scores, evaluation methodology, known gaps).'
- 'Populate Section 6: Intended Purpose and Use Cases (primary use cases, target users, deployment context).'
- 'Populate Section 7: Downstream Integration Limits (prohibited uses, required safety measures, API terms).'
- 'Populate Section 8: Risk Mitigation Measures (known limitations, bias assessments, safety evaluations run).'
- Cross-reference with EU AI Office submission checklist to ensure completeness.
phase_3_validate:
- '[ ] All Annex IV fields present (model identity, training data, compute, energy, evaluation, purpose, limits).'
- '[ ] Training data summary includes dataset names, volumes, and data governance procedures.'
- '[ ] Compute budget expressed in FLOP or equivalent standardized unit.'
- '[ ] Energy consumption reported in MWh with CO2-eq equivalent.'
- '[ ] At least 3 evaluation benchmarks cited with scores and methodology.'
- '[ ] Downstream-limit clauses explicitly list prohibited use cases.'
- '[ ] Provider legal entity name and EU representative (if non-EU) present.'
- '[ ] Document dated and versioned for EU AI Office submission tracking.'
