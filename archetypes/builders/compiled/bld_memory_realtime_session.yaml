tldr: 'Learned patterns for LLM realtime sessions: VAD tuning, barge-in, ephemeral tokens, codec-transport matching.'
domain: realtime_session construction
created: '2026-04-13'
updated: '2026-04-13'
density_score: 0.9
summary: 'LLM realtime sessions fail in production for two reasons: (1) generic model IDs that don''t support streaming audio,
  and (2) missing barge-in handlers that cause the model to talk over the user. The third-most-common failure is shipping
  raw API keys to the browser instead of minting ephemeral tokens server-side. These three issues account for ~80% of first-deploy
  failures.'
pattern: "1. Pin the model: `gpt-4o-realtime-preview-2024-12-17` not `gpt-4o`. Realtime\n   capability requires a realtime-specific\
  \ model. Check provider changelog before pinning.\n2. VAD thresholds matter: `threshold: 0.5` works in quiet environments;\
  \ noisy\n   call centers need `threshold: 0.7-0.8`. `silence_duration_ms: 500` prevents\n   premature turn-end on short\
  \ pauses; extend to 800ms for non-native speakers.\n3. Barge-in is mandatory: On `input_audio_buffer.speech_started`, emit\n\
  \   `response.cancel` AND flush client audio queue. Truncate server transcript via\n   `conversation.item.truncate`. Missing\
  \ flush causes audio artifacts for 200-400ms.\n4. Codec-transport lock: WebRTC requires `opus@48kHz`. WebSocket requires\
  \ `pcm16@24kHz`\n   or `g711_ulaw`. Mixing these causes silent decode failure.\n5. Ephemeral tokens expire in 60s: Mint\
  \ server-side, deliver to client just before\n   connection. Never reuse. On reconnect, mint a new token.\n6. State resume\
  \ on reconnect: Store `conversation.item.id` + unacked audio.\n   On reconnect, replay via `conversation.item.create` before\
  \ `response.create`."
anti_pattern: "1. `model: gpt-4o` -- chat model, no audio streaming. Hard silent fail.\n2. No interruption handler -- model\
  \ speaks over user. 100% UX failure.\n3. Raw API key in browser -- security incident. Ephemeral tokens have 60s TTL.\n4.\
  \ `turn_detection: none` without manual trigger -- model waits forever, never responds.\n5. Missing latency budget -- latency\
  \ > 800ms end-to-end perceived is unacceptable;\n   without targets, engineers optimize nothing.\n6. Ignoring lifecycle\
  \ events -- `error` event silent -> no reconnect triggered."
context: '`realtime_session` artifacts sit in P04 (Tools layer) as LLM session configs. Consumed by: frontend engineers using
  `@openai/realtime-api-beta` SDK, LiveKit Agents Python SDK, Daily Bots voice platform, Vapi call management API, or Retell
  AI. Adjacent kinds: `voice_pipeline` (full STT/NLU/TTS pipeline), `vad_config` (standalone VAD), `audio_tool` (signal processing).'
impact: Teams that pre-document barge-in handlers cut first-deploy UX failure rate by ~75%. Pinning model versions prevented
  3 production outages when providers deprecated `-preview` endpoints. Ephemeral token pattern eliminates API key leak vectors
  entirely.
reproducibility: 'For reliable realtime session production:

  1. Pick provider + model pair from KC provider table

  2. Match codec to transport (strict pairing)

  3. Configure VAD with explicit ms values

  4. Wire barge-in handler (cancel + flush + truncate)

  5. Document ephemeral token mint flow

  6. Build latency budget table with measurement method

  7. Validate H01-H10 before delivery'
