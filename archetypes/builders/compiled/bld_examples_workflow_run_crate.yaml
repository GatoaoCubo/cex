anti_example_1_missing_createaction: "{\n  \"@context\": [\"https://www.researchobject.org/ro-crate/1.2/context\"],\n  \"\
  @graph\": [\n    {\"@type\": \"Dataset\", \"@id\": \"./\", \"name\": \"My Workflow Run\"},\n    {\"@type\": \"File\", \"\
  @id\": \"workflow.ga\"}\n  ]\n}\nWhy it fails: No CreateAction entity. The CreateAction is the provenance graph spine --\
  \ it links the workflow (instrument) to inputs (object) and outputs (result) with the executing researcher (agent/ORCID).\
  \ Without it, the crate cannot be used for reproducibility or provenance verification."
anti_example_2_non_orcid_person_id: "{\n  \"@type\": \"Person\",\n  \"@id\": \"author\",\n  \"name\": \"John Smith\"\n}\n\
  Why it fails: Person @id must be a full ORCID URL (https://orcid.org/XXXX-XXXX-XXXX-XXXX). Local IRI \"author\" is not resolvable,\
  \ breaks FAIR Signposting, and prevents cross-crate author deduplication."
anti_example_3_no_dataset_checksums: "{\n  \"@type\": \"Dataset\",\n  \"@id\": \"input/data.csv\",\n  \"name\": \"Input Data\"\
  \n}\nWhy it fails: Missing sha256/md5 checksum. Without content hashes, input and output datasets cannot be verified for\
  \ integrity, defeating the reproducibility purpose of Workflow Run Crate. RO-Crate 1.2 recommends sha256 for all file entities."
