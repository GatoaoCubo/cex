domain_overview: 'Prosody_config defines voice personality and emotional expression for TTS output -- pitch, rate, volume,
  emphasis, pauses, and provider-specific emotion/style tags. The config is consumed by tts_provider at inference time. Two
  emission paths coexist: (1) SSML (W3C Speech Synthesis Markup Language 1.1) -- portable tags recognized by Google Cloud
  TTS, Azure Speech, AWS Polly, IBM Watson; (2) provider-native controls -- JSON/param payloads for neural TTS vendors that
  exceed SSML expressiveness (ElevenLabs v3, PlayHT Play3.0, Cartesia Sonic, Hume Octave). The circumplex model of affect
  (valence x arousal) maps cleanly onto the two dominant provider paradigms: `style` + `stability` sliders (ElevenLabs) or
  explicit emotion tags (PlayHT, Cartesia). Prosody_config MUST stay declarative -- no audio bytes, no model weights, no agent
  persona logic (that belongs in agent_profile).'
key_concepts: '| Concept              | Definition                                                                     | Source                          |

  |----------------------|--------------------------------------------------------------------------------|---------------------------------|

  | SSML                 | W3C XML markup for speech synthesis: `<prosody>`, `<break>`, `<emphasis>`     | W3C SSML 1.1 (2010)             |

  | Pitch contour        | F0 pattern over time; SSML `pitch` attr: x-low..x-high, Hz, st, %              | W3C SSML 1.1 Sec
  3.2.4          |

  | Speaking rate        | WPM or SSML `rate`: x-slow..x-fast, %, or numeric                              | W3C SSML 1.1 Sec
  3.2.4          |

  | Volume               | SSML `volume`: silent, x-soft..x-loud, dB                                      | W3C SSML 1.1 Sec
  3.2.4          |

  | Break                | SSML `<break time="500ms"/>` or strength=none..x-strong                        | W3C SSML 1.1 Sec
  3.2.3          |

  | Emphasis             | SSML `<emphasis level="strong">` strong/moderate/reduced                       | W3C SSML 1.1 Sec
  3.2.2          |

  | Style tag            | Provider-native emotion label (e.g., `cheerful`, `whispering`, `angry`)        | Azure Neural TTS
  / ElevenLabs   |

  | Stability            | ElevenLabs slider 0.0-1.0: low=expressive, high=monotone                       | ElevenLabs v3
  API docs          |

  | Similarity boost     | ElevenLabs slider 0.0-1.0: voice cloning fidelity vs. style flexibility        | ElevenLabs v3
  API docs          |

  | Style exaggeration   | ElevenLabs v3 `style` 0.0-1.0: amplifies detected emotion from reference       | ElevenLabs v3
  API docs          |

  | Emotion directive    | Cartesia Sonic inline `[happy]`, `[sad]`, `[excited]` markers in text          | Cartesia Sonic
  API (2024)       |

  | Voice engine tag     | PlayHT `voice_engine: PlayHT2.0-turbo` + `emotion: male_happy` enum            | PlayHT Play3.0
  API              |'
provider_prosody_matrix_2024: '| Provider           | SSML? | Emotion Tags                              | Pitch/Rate/Vol     |
  Notes                                        |

  |--------------------|-------|-------------------------------------------|--------------------|----------------------------------------------|

  | Azure Neural TTS   | Yes   | `<mstts:express-as style="cheerful">`     | SSML full          | 14 styles: cheerful, sad,
  angry, whispering  |

  | Google Cloud TTS   | Yes   | SSML only (no custom styles)              | SSML full          | WaveNet/Neural2 voices;
  no native emotion    |

  | AWS Polly          | Yes   | `<amazon:domain name="news">` + SSML      | SSML full          | Neural voices; limited emotion
  (newscaster)  |

  | ElevenLabs v3      | No    | `stability`, `similarity_boost`, `style`  | voice_settings obj | Most expressive; multilingual;
  0-1 sliders   |

  | PlayHT Play3.0     | Partial| `emotion: male_happy` enum (8 values)     | speed only         | Low-latency streaming;
  fewer prosody knobs   |

  | Cartesia Sonic     | No    | Inline `[emotion]` brackets in text        | speed, language    | ~90ms latency; text-embedded
  directives      |

  | Hume Octave        | No    | `description: "excited whisper"` free-text | prompt-based       | LLM-interpreted prosody;
  no numeric knobs    |

  | IBM Watson TTS     | Yes   | `<express-as type="GoodNews">`            | SSML full          | 4 express-as types                           |'
industry_standards:
- W3C SSML 1.1 (Speech Synthesis Markup Language)
- W3C PLS 1.0 (Pronunciation Lexicon Specification)
- ISO/IEC 24612 (Linguistic annotation framework)
- IPA (International Phonetic Alphabet) for phoneme override
- ITU-T P.800 (MOS scoring for synthesized speech)
common_patterns:
- Declare a baseline prosody block (neutral), then define named emotion variants that delta from it.
- When target provider supports SSML, emit SSML strings; when native, emit provider-specific JSON payload.
- 'Map circumplex (valence, arousal) -> provider sliders: high arousal + positive valence = ElevenLabs style=0.6, stability=0.3.'
- Use `<break>` tags at clause boundaries for natural phrasing (200-500ms typical).
- Keep SSML and native payloads in parallel fields -- do NOT conflate.
- Test across 3+ providers before shipping; prosody perception is non-portable.
pitfalls:
- Embedding tts_provider API keys in prosody_config (belongs in tts_provider/secret_config).
- Using SSML tags with providers that ignore them silently (ElevenLabs, Cartesia).
- Over-exaggerating style (ElevenLabs style>0.7) -- causes unnatural artifacts.
- Forgetting language-specific pitch norms (Mandarin tonal vs. English stress).
- Shipping a single "excited" preset without A/B-ing vs. neutral baseline.
- Mixing prosody with agent_profile persona text -- breaks separation of concerns.
