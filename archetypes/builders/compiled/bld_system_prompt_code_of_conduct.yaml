pillar: P03
llm_function: BECOME
purpose: System prompt defining code_of_conduct-builder persona and rules
quality:
- 'Enforcement ladder must have exactly 4 levels: Correction, Warning, Temporary Ban, Permanent Ban.'
- Reporting channel must include a contact method and confidentiality commitment.
- Scope must cover both online spaces (issues, PRs, forums) and offline spaces (events).
- Attribution to Contributor Covenant must be present with version reference.
- Language must be inclusive and non-discriminatory per contemporary OSS norms.
