phase_1_research:
- Identify partner data sources (CRM, ERP, channel portals).
- Extract partner tier classifications (Gold, Silver, etc.) and region codes.
- Map certifications to industry standards (ISO, CSP, etc.).
- Validate contact info formats (email, phone, URL).
- Audit for duplicate partner entries across regions.
- Analyze regional distribution gaps for partner coverage.
phase_2_compose:
- Reference SCHEMA.md for required fields (name, tier, region, certifications).
- Populate OUTPUT_TEMPLATE.md with partner data from validated sources.
- Format tier labels consistently (e.g., "Gold", "Platinum").
- Use ISO 3166-1 alpha-2 codes for region fields.
- List certifications as comma-separated values (e.g., "CSP, ISO 27001").
- 'Ensure contact fields follow schema (email: user@domain.com, phone: +1234567890).'
- Cross-reference partner names with schema for spelling accuracy.
- Add metadata tags for filtering (e.g., `tier:Gold`, `region:US`).
- Proofread for typos and schema compliance.
phase_3_validate:
- '[ ] ✅ All required fields present (name, tier, region, certifications, contact).'
- '[ ] ✅ Data formats match SCHEMA.md (e.g., region codes, email syntax).'
- '[ ] ✅ Certifications mapped to valid industry standards.'
- '[ ] ✅ Contact info validated (email deliverability, phone format).'
- '[ ] ✅ Regional distribution aligns with research phase findings.'
