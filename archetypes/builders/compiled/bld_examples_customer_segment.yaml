golden_example: "title: Mid-Market Healthcare Provider ICP\nkind: customer_segment\nfirmographics:\n  industry: Healthcare\n\
  \  company_size: 100-500 employees\n  revenue: $10M-$50M\n  location: North America, Europe\n  technology_stack: Epic, Cerner,\
  \ Microsoft 365\nneeds:\n  - Streamlined patient data management\n  - HIPAA-compliant analytics tools\n  - Integration with\
  \ existing EHR systems\n  - Scalable cloud infrastructure\n  - 24/7 technical support"
anti_example_1_vague_generalization: "title: Small Businesses\nkind: customer_segment\nfirmographics:\n  industry: All industries\n\
  \  company_size: 1-10 employees\nneeds:\n  - \"Basic tools\"\n  - \"Low cost\"\n  - \"Easy to use\""
why_it_fails: Mixes personal attributes (age, education) with firmographics. Focuses on user preferences rather than organizational
  needs, misaligning with ICP definition requirements.
anti_example_2_persona_confusion: "title: Tech-Savvy Entrepreneurs\nkind: customer_segment\nfirmographics:\n  industry: All\
  \ industries\n  company_size: 1-10 employees\n  personal_attributes:\n    - Age: 25-35\n    - Education: College degree\n\
  \    - Tech proficiency: High\nneeds:\n  - \"Cool features\"\n  - \"Modern UI\"\n  - \"Social media integration\""
