example_1_e_commerce_sales_bc: "id: bc_sales\nkind: bounded_context\npillar: P08\ntitle: \"Sales Bounded Context\"\ncontext_name:\
  \ Sales\nteam_owner: sales-squad\nscope_statement: \"Customer purchase intent to confirmed order; pricing and discount rules\
  \ apply here.\"\ndomain_vocabulary: dv_sales_vocabulary\nquality: null\ntags: [sales, ecommerce, bounded-context]\nAggregates:\
  \ Order (manages purchase lifecycle), Cart (pre-confirmation state)\nIntegration: bc_billing (downstream, OHS -- Sales publishes\
  \ OrderPlaced)\n             bc_inventory (upstream, ACL -- Sales insulates from inventory model)\nBusiness rules: Order.total\
  \ must equal sum(line_items) + tax - discount"
example_2_cex_orchestration_bc: 'id: bc_cex_orchestration

  kind: bounded_context

  pillar: P08

  title: "CEX Orchestration Bounded Context"

  context_name: CexOrchestration

  team_owner: n07-orchestrator

  scope_statement: "Mission planning, nucleus dispatch, wave orchestration, and consolidation of results."

  domain_vocabulary: dv_cex_core_vocabulary

  quality: null

  tags: [cex, orchestration, n07, bounded-context]

  Aggregates: Mission (wave plan + dispatch state), HandoffRegistry (active handoffs)

  Integration: all nucleus BCs (downstream, OHS -- N07 publishes handoffs)'
anti_example_wrong: 'id: api_gateway_service     # WRONG: this is a deployment component, not a BC

