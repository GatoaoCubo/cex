golden_example: "---\ntitle: \"Discovery Questions for Mid-Market SaaS Buyer (Deal Stage: Needs Analysis)\"\npersona: \"IT\
  \ Director at a mid-sized healthcare provider\"\ndeal_stage: \"Needs Analysis\"\nquestions:\n  - \"What are your current\
  \ challenges with patient data management in compliance with HIPAA regulations?\"\n  - \"How many hours per week does your\
  \ IT team spend manually reconciling data across systems?\"\n  - \"What specific KPIs would you use to measure success if\
  \ we implemented a cloud-based EHR solution?\"\n  - \"Who are the key stakeholders involved in evaluating new healthcare\
  \ IT solutions?\"\n  - \"What is your current annual budget allocation for digital transformation initiatives?\"\n\n---"
anti_example_1_vague_and_broad_questions: "questions:\n  - \"What are your goals for the next year?\"\n  - \"How do you see\
  \ technology impacting your business?\"\n  - \"What challenges are you facing?\""
