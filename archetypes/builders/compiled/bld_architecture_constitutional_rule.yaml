updated: '2026-04-17'
pattern_origin: 'Anthropic Constitutional AI (Bai et al. 2022): a set of principles used to evaluate and revise model outputs.
  Extended here: constitutional_rule = runtime-enforced absolute prohibition, not just an RLHF training signal.'
the_absoluteness_property: 'A constitutional_rule has ONE property that distinguishes it from all other safety kinds: bypass_policy:
  none. No role, no context, no instruction can override it. This is the architectural guarantee: the rule is not a preference
  or a default -- it is a hard stop.'
hierarchy_from_softest_to_hardest: "safety_policy     -- document, advisory, no enforcement\n    |\nguardrail         -- soft\
  \ constraint, has bypass with approver\n    |\nconstitutional_rule -- hard constraint, bypass_policy: none, core: true"
relationship_to_other_kinds: '| Kind | Relationship |

  |------|-------------|

  | guardrail | soft constraint with defined bypass policy (approver + audit trail) |

  | quality_gate | governs output quality, not agent behavior |

  | permission | controls what users can ACCESS, not what agents can DO |

  | safety_policy | advisory document, no runtime enforcement |'
constitutional_basis_categories: '| Basis | Protects | Example Rule |

  |-------|---------|-------------|

  | harm_prevention | physical, psychological, societal safety | never generate content that facilitates mass violence |

  | honesty | no deception, no manipulation | never deny being an AI when directly asked |

  | autonomy_preservation | user''s right to make own decisions | never use dark patterns to push a specific choice |

  | legality | compliance with applicable law | never assist with actions that are illegal in user''s jurisdiction |'
enforcement_model: 'Constitutional rules are checked before output delivery. If violation detected: hard block, no partial
  output, no bypass option. Detection can be: keyword filter, semantic classifier, regex, LLM judge (depends on rule).'
