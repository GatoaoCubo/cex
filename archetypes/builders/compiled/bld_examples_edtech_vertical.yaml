golden_example: "title: EdTech Vertical Integration with LTI and Privacy Compliance  \nkind: edtech_vertical  \ndescription:\
  \ Secure student data management with LTI integration and FERPA/COPPA compliance  \ntools:  \n  - LMS: Canvas LMS  \n  -\
  \ Data Privacy: Google Workspace for Education (with encryption at rest and in transit)  \n  - LTI Provider: Microsoft Teams\
  \ for Education (LTI 1.3 compliant)  \nuse_cases:  \n  - Student performance analytics with anonymized data  \n  - Parental\
  \ consent workflows for COPPA-compliant data collection  \n  - Seamless grade sync between LMS and external assessment tools\
  \  \ncompliance:  \n  - FERPA: Data access restricted to authorized educational purposes  \n  - COPPA: Age verification\
  \ and opt-in mechanisms for under-13 users  "
anti_example_1_missing_lti_compliance: "title: EdTech Vertical Integration (Incomplete)  \nkind: edtech_vertical  \ndescription:\
  \ Student data management without LTI integration  \ntools:  \n  - LMS: Moodle  \n  - Data Privacy: Custom in-house solution\
  \ (no third-party audits)  \nuse_cases:  \n  - Manual data transfer between systems  \n  - No student consent tracking \
  \ \ncompliance:  \n  - FERPA: Not explicitly addressed  \n  - COPPA: Not applicable (no under-13 user handling)  "
why_it_fails: The analytics tool collects data from minors without COPPA-compliant consent mechanisms, exposing the organization
  to legal risks and data breaches.
