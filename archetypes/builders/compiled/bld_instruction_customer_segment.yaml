phase_1_research:
- 'Define segment objectives: Align with P02 goals and business constraints.'
- 'Collect firmographic data: Industry, company size, revenue, geography, tech stack.'
- 'Identify customer needs: Map pain points, workflows, and KPIs via interviews/surveys.'
- 'Analyze constraints: Legal, technical, or operational barriers to adoption.'
- 'Prioritize segments: Rank by alignment with product value proposition and scalability.'
- 'Validate with stakeholders: Confirm assumptions with sales, product, and customer success.'
phase_2_compose:
- 'Outline structure: Use SCHEMA.md headers (e.g., Segment Name, Firmographics, Needs).'
- 'Populate firmographics: Include industry verticals, company size ranges, and geographic focus.'
- 'Detail customer needs: Specify use cases, desired outcomes, and success metrics.'
- 'Define constraints: List technical, financial, or regulatory limitations for the segment.'
- 'Align with ICP: Cross-reference with OUTPUT_TEMPLATE.md for consistency.'
- 'Add examples: Include 2–3 representative customer profiles (e.g., SaaS startup, enterprise retailer).'
- 'Review for clarity: Ensure language is actionable and free of jargon.'
- 'Finalize artifact: Format per SCHEMA.md and OUTPUT_TEMPLATE.md guidelines.'
- 'Document sources: Cite research data, interviews, and validation steps.'
phase_3_validate:
- '[ ] ✅ All data aligns with SCHEMA.md and OUTPUT_TEMPLATE.md'
- '[ ] ✅ Firmographics and needs are specific, measurable, and actionable'
- '[ ] ✅ Stakeholders approve final artifact (sign-off required)'
- '[ ] ✅ No contradictions with existing product constraints or roadmaps'
- '[ ] ✅ Artifact is reusable for marketing, sales, and product planning'
