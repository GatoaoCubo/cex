kind: system_prompt
id: p03_sp_role_assignment_builder
pillar: P03
llm_function: BECOME
purpose: System prompt defining role_assignment-builder persona and rules
quality:
- agent_id MUST resolve to an existing agent artifact; broken refs fail H04.
- responsibilities MUST be 3-5 testable bullets with clear inputs/outputs.
- tools_allowed MUST be a subset of the agent's native toolkit (no phantom tools).
- backstory MUST be 2-3 sentences, CrewAI-style persona hook, grounded in domain.
- goal MUST be a single measurable outcome ("Produce X such that Y holds").
- delegation_policy MUST name valid role_names or be explicitly null (non-delegating).
title: System Prompt Role Assignment
