domain_overview: The prompt_optimizer domain focuses on refining natural language prompts to enhance the performance of large
  language models (LLMs) in specific tasks. As LLMs become central to applications like chatbots, code generation, and data
  analysis, the quality of prompts directly impacts output accuracy, coherence, and efficiency. This domain intersects with
  prompt engineering, instruction tuning, and model alignment, emphasizing systematic methods to reduce ambiguity, improve
  clarity, and optimize resource usage. Key challenges include balancing prompt complexity with interpretability, mitigating
  hallucinations, and ensuring compatibility with downstream systems. Prompt optimization differs from general optimization
  by focusing on linguistic and structural improvements rather than computational efficiency. It leverages techniques from
  NLP, machine learning, and human-computer interaction to iteratively refine prompts through metrics like BLEU, ROUGE, or
  task-specific accuracy. The field is shaped by advancements in few-shot learning, prompt templating, and model-agnostic
  methods, with a growing emphasis on ethical considerations such as bias mitigation and transparency.
key_concepts: '| Concept | Definition | Source |

  |--------|------------|-------|

  | DSPy signatures | Declarative prompt specification + compiled optimization | Khattab et al. (Stanford, 2023) |

  | OPRO | Optimization by prompting -- LLM generates and scores candidates | Yang et al. (DeepMind, 2023) |

  | APE | Automatic prompt engineer -- candidate generation via LLM + scoring | Zhou et al. (2023) |

  | PromptWizard | Feedback-driven iterative prompt refinement with critique | Microsoft Research (2024) |

  | Prompt Templates | Structured formats for consistent input generation | Liu et al. (2023) |

  | Prompt Compression | Reducing prompt length without losing efficacy | Chen et al. (2023) |

  | Instruction Tuning | Fine-tuning models using task-specific prompts | Wei et al. (2022) |

  | Prompt Evaluation Metrics | Task-specific accuracy, BLEU, ROUGE for pass scoring | Papineni et al. (2002) |'
industry_standards:
- 'DSPy framework (Stanford NLP, 2023): systematic compilation of prompt pipelines'
- 'OPRO (DeepMind, 2023): LLM-as-optimizer for prompt search'
- 'APE (Zhou et al., 2023): automatic prompt engineer benchmark'
- 'PromptWizard (Microsoft, 2024): feedback-loop prompt refinement'
- 'P-Tuning v2 (Microsoft): parameter-efficient prompt optimization'
common_patterns:
- Iterative refinement using A/B testing for prompt variants
- Template-based optimization with dynamic slot insertion
- Metric-driven tuning via reinforcement learning
- Adversarial testing to expose prompt weaknesses
- Prompt compression using subword tokenization
pitfalls:
- Overfitting to narrow examples, reducing generalizability
- Ignoring domain-specific context in prompt design
- Neglecting hallucination risks during compression
- Misalignment between prompt structure and model capabilities
- Overlooking user feedback loops in iterative optimization
