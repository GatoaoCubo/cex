created: '2026-04-14'
updated: '2026-04-14'
density_score: 0.87
phase_1_research:
- Identify role_name and the crew(s) that will use it (scope).
- 'Select agent_id source: `.claude/agents/{slug}.md` for sub-agents, `N0x/agents/*` for nucleus agents.'
- Confirm the agent exists and read its manifest for native capability + tool list.
- Draft responsibilities as 3-5 crisp bullet points (inputs consumed, outputs produced, invariants).
- Identify potential delegate roles in target crew_template; build can_delegate_to list.
- Review agent toolkit; select tools_allowed subset appropriate to this role (least-privilege).
phase_2_compose:
- Reference SCHEMA.md for required fields (role_name, agent_id, responsibilities, tools_allowed, delegation_policy, backstory,
  goal).
- Populate OUTPUT_TEMPLATE.md with binding details.
- 'Craft `backstory` as 2-3 sentence persona hook grounded in domain (CrewAI idiom: "You are a...").'
- Craft `goal` as one-sentence measurable outcome ("Produce X such that Y holds").
- Set `delegation_policy.can_delegate_to` list (role_names, not agent_ids) or null if non-delegating.
- 'Set `delegation_policy.conditions`: rule-based triggers (on quality < 8, on keyword match, on timeout).'
- List `tools_allowed` as explicit subset of agent's native toolkit; prefix with `-` to exclude.
- 'Proofread: agent_id resolvable, responsibilities checkable, tools subset valid.'
phase_3_validate:
- '[ ] agent_id resolves to an existing .claude/agents/ OR N0x/agents/ artifact.'
- '[ ] role_name is snake_case, unique within target crew_template.'
- '[ ] responsibilities list has 3-5 bullets, each testable.'
- '[ ] tools_allowed is a subset of the agent''s native toolkit.'
- '[ ] delegation_policy.can_delegate_to list references valid role names (not agent_ids).'
- '[ ] backstory <= 300 chars, goal <= 150 chars.'
- '[ ] File size <= 3072 bytes.'
