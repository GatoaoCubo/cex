phase_1_research:
- 'Define voice_pipeline requirements: latency, accuracy, language support'
- Analyze existing voice agent architectures (e.g., ASR, TTS, NLU integration)
- Gather audio datasets for training and validation (noise, accents, environments)
- Evaluate speech recognition models (e.g., Whisper, Kaldi) for performance metrics
- Research real-time processing frameworks (e.g., WebRTC, TensorFlow Lite)
- Document security/privacy constraints (data encryption, compliance)
phase_2_compose:
- Set up dev environment with Python 3.10+, PyTorch 2.0, and SCHEMA.md
- 'Define pipeline stages in SCHEMA.md: input → ASR → NLU → response → TTS'
- Implement audio preprocessing (normalization, noise reduction)
- Integrate ASR model with OUTPUT_TEMPLATE.md's `transcript` field
- Develop NLU module for intent classification and slot filling
- Wire TTS engine (e.g., Tacotron 2) to generate synthetic speech
- Add error handling for ASR/NLU failures (fallback responses)
- Write unit tests for each pipeline stage using pytest
- Package artifact with Dockerfile and requirements.txt
phase_3_validate: '[ ] Validate schema alignment with SCHEMA.md [ ] Confirm all 4 core stages present: STT, NLU, dialogue
  management, TTS [ ] Verify audio preprocessing stage is documented [ ] Confirm provider abstraction (no hardcoded vendor
  names at interface level) [ ] Verify fallback chain documented for each stage [ ] Confirm error recovery defined at each
  stage boundary [ ] Validate id matches pattern: p04_vp_[a-z0-9_]+ [ ] Run H01-H08 quality gate checks before delivering'
