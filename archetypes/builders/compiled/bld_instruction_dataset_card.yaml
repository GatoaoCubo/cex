density_score: 0.9
phase_1_discover:
- Identify dataset name, version, owner, and primary modality (tabular, text, image, audio, multimodal).
- Locate source systems, raw files, and ingestion timestamps.
- Determine license (MIT, CC-BY-4.0, CDLA, proprietary) and redistribution constraints.
- 'Capture motivation: what task does this dataset enable? Who funded or commissioned it?'
- 'Verify Datasheets-for-Datasets coverage (Gebru et al. 2021): motivation, composition, collection, preprocessing, uses,
  distribution, maintenance.'
phase_2_structure:
- Define splits (train/val/test) with row counts and sampling strategy.
- 'Enumerate features: name, dtype, cardinality, null-rate, example value.'
- 'Record collection methodology: crawl, survey, sensor, synthetic, purchased.'
- 'Document preprocessing: deduplication, normalization, filtering, tokenization.'
- Flag PII fields, consent basis, anonymization method (k-anonymity, differential privacy).
phase_3_govern:
- List intended uses AND out-of-scope uses (per HF Dataset Cards spec).
- Record known biases, distributional gaps, and demographic coverage.
- 'Add GDPR/CCPA fields: data origin country, retention policy, subject-access contact.'
- Cite provenance (papers, URLs, contracts) with retrieval dates.
- Add Croissant-compatible JSON-LD block when dataset will be published to ML Commons.
phase_4_emit:
- Write frontmatter per bld_schema_dataset_card.md.
- Fill body sections in order defined by bld_output_template_dataset_card.md.
- Validate against bld_quality_gate_dataset_card.md (HARD gates H01-H07).
- Run `python _tools/cex_compile.py {path}`; resolve validator errors.
- Commit, then signal N04 (knowledge ownership) for indexing.
reference_standards:
- Datasheets for Datasets (Gebru et al., 2021)
- HuggingFace Dataset Cards spec (dataset_info.yaml)
- ML Commons Croissant metadata format
- Google Data Cards Playbook
- GDPR Art. 30 (records of processing)
