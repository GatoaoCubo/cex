id: bld_architecture_alert_rule
kind: component_map
pillar: P08
llm_function: CONSTRAIN
version: 1.0.0
quality: null
tags:
- alert_rule
- architecture
- observability
title: Architecture Alert Rule
position_in_cex_kind_taxonomy: "P09 Config\n  alert_rule        <-- THIS KIND (threshold -> notification)\n  env_config  \
  \      (environment variables)\n  rate_limit_config (API rate limits)\n  feature_flag      (boolean toggles)\n\nP11 Feedback\n\
  \  guardrail         (LLM behavior constraint -- NOT alert_rule)\n  quality_gate      (artifact scoring -- NOT alert_rule)\n\
  \  signal            (telemetry data -- alert_rule fires on signal)"
relationships: '| Relation | Kind | Direction | Notes |

  |----------|------|-----------|-------|

  | fires on | signal | alert evaluates signal | Signal is what''s measured |

  | routes to | agent / webhook | one-to-many | PagerDuty, Slack, webhook |

  | triggers | workflow | optional | Auto-remediation workflows |

  | grouped by | rate_limit_config | optional | Alert routing rules |

  | documented in | runbook | one-to-one | Remediation procedure |'
prometheus_integration: "alert_rule maps directly to Prometheus alerting rules:\n# Prometheus equivalent:\ngroups:\n  - name:\
  \ {alert_name}\n    rules:\n      - alert: {alert_name}\n        expr: {metric_expression}\n        for: {for_duration}\n\
  \        labels:\n          severity: {severity}\n        annotations:\n          summary: {title}"
when_to_use_alert_rule_vs_alternatives: '| Scenario | Use |

  |----------|-----|

  | System metric exceeds threshold | alert_rule |

  | LLM output violates constraint | guardrail |

  | Artifact scores below threshold | quality_gate |

  | On-call schedule configuration | rate_limit_config or external tool |'
