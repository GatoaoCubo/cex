anti_example_1_missing_required_fields: '| capability_name | provider_agent |

  |----------------|----------------|

  | Build reports  | some-builder   |'
why_it_fails: 'All three agent layers mixed in one flat table. Builder sub-agents, nucleus domain agents, and nucleus cards
  have different invocation paths: sub-agents are invoked as Claude Code sub-agents; domain agents via dispatch.sh; nucleus
  cards describe the nucleus itself. Mixing them causes routing errors where N07 attempts to dispatch a builder sub-agent
  path as a nucleus boot.'
anti_example_2_phantom_agent_reference: '| capability_name | provider_agent | ...

  |----------------|----------------|

  | Build dashboards | .claude/P02_model/dashboard-builder.md | ...'
anti_example_3_invented_quality_scores: '| capability_name | quality_baseline |

  |----------------|-----------------|

  | Build landing page | 8.5 |'
anti_example_4_flat_list_without_layer_separation: '| capability_name | provider_agent | availability |

  |----------------|----------------|--------------|

  | Build landing page | .claude/agents/landing-page-builder.md | active |

  | Knowledge management | N04_knowledge/P02_model/agent_knowledge.md | active |

  | Orchestration | N07_admin/agent_card_n07.md | active |'
key_distinctions: '| Aspect | Good Registry Entry | Bad Registry Entry |

  |--------|--------------------|--------------------|

  | provider_agent | Validated path to existing file | Path to non-existent file |

  | quality_baseline | "unscored" when source is null | Invented numeric score |

  | keyword_index | >= 5 domain-derived terms | 1-2 generic terms |

  | availability | "active" / "deprecated" / "experimental" | Missing or free-text |

  | layer | Entries in correct section (builder / nucleus / card) | Mixed flat list |'
