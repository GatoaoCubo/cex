phase_1_research:
- Identify issuer DID method (did:web, did:key, did:jwk) and resolve DID document.
- 'Define subject claims: what attributes are being attested (agent capabilities, compliance status, training data provenance).'
- 'Select credentialSchema: JSON Schema or OWL ontology reference for claim validation.'
- 'Choose proof cryptosuite: ecdsa-rdfc-2022 (secp256r1) or eddsa-rdfc-2022 (Ed25519).'
- 'Determine credentialStatus mechanism: StatusList2021 bitstring revocation list endpoint.'
- Identify refreshService endpoint if credential has TTL and needs auto-renewal.
phase_2_compose:
- Reference SCHEMA.md for required VC 2.0 fields (id, type, issuer, validFrom, credentialSubject, proof).
- 'Set @context: ["https://www.w3.org/ns/credentials/v2", additional domain contexts].'
- 'Assign id as unique IRI: https://issuer.example/credentials/[uuid].'
- 'Set type array: ["VerifiableCredential", "[domain_type]Credential"].'
- Set issuer as DID string or issuer object with name and id fields.
- Set validFrom (ISO 8601, required) and validUntil (ISO 8601, optional).
- Populate credentialSubject with id (subject DID) and claim properties.
- Add credentialSchema with id (schema IRI) and type (JsonSchemaValidator2018).
- Add credentialStatus with id (status list URL) and statusListIndex.
- 'Generate proof block: type, cryptosuite, created, verificationMethod, proofPurpose, proofValue.'
- Validate proof against W3C Data Integrity spec before finalizing.
phase_3_validate:
- '[ ] @context includes https://www.w3.org/ns/credentials/v2'
- '[ ] issuer is a valid DID or DID URL'
- '[ ] credentialSubject.id is a valid DID'
- '[ ] proof.cryptosuite is ecdsa-rdfc-2022 or eddsa-rdfc-2022'
- '[ ] credentialStatus.type is StatusList2021Entry'
- '[ ] validFrom is ISO 8601 datetime'
- '[ ] Domain keywords present: W3C, verifiable-credential, VC-2.0, DID, issuer, subject, proof'
