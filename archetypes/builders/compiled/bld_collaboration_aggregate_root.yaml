id: bld_rules_aggregate_root
kind: knowledge_card
pillar: P06
title: Aggregate Root Builder -- Rules
version: 1.0.0
quality: 5.7
tags:
- builder
- aggregate_root
- rules
llm_function: CONSTRAIN
density_score: 0.82
updated: '2026-04-17'
absolute_rules_hard_never_violate:
- One transaction = one aggregate. Never span two aggregates in a single transaction.
- External references to cluster members go through the root only -- never directly.
- Cross-aggregate references use IDs (value_object), never object instances.
- 'Repository interface: find_by_id and save only. No query methods on the aggregate repo.'
- Invariants must be checkable after every command -- they are not guidelines.
- 'quality: null always -- never self-score.'
soft_rules_recommend_deviate_with_justification:
- 'Aggregate cluster size: prefer 2-5 members. Document reason if > 7.'
- Optimistic concurrency preferred over pessimistic unless contention proven.
- Domain events should be named in past tense (OrderPlaced, not PlaceOrder).
- 'Invariant count: 2-5 per aggregate. More than 8 suggests over-aggregation.'
boundary_rules:
- 'THIS BUILDER handles: aggregate_root (P06)'
- 'NOT this builder: interface (contract definition) -> interface-builder'
- 'NOT this builder: input_schema (data validation) -> input-schema-builder'
- 'NOT this builder: value_object (immutable attribute type) -> value-object-builder'
- 'NOT this builder: domain event specification -> domain-event-builder'
cex_specific_rules:
- 'id pattern: p06_ar_{slug} -- always prefix p06_ar_'
- 'Pillar: always P06 (Schema)'
- 'Producing nucleus: N03 (Engineering) -- not N04 or N05'
- 'Compile after save: python _tools/cex_compile.py {path}'
