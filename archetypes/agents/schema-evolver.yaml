# Meta-Agent: schema-evolver
# Gerado: 2026-03-23 19:01 UTC
# Fonte: cex_meta_agents.py

id: schema-evolver
type: meta_agent
lp: P02
version: 1.0.0
description: Proposes changes to _schema.yaml based on patterns observed in existing examples. Data-driven
  evolution.
capabilities:
- analyze_examples
- detect_patterns
- propose_schema_changes
- validate_backward_compatibility
- generate_migration_plan
tools:
- validate_schema.py
- validate_examples.py
inputs:
  lp: string (P01-P12)
  type: string (optional, specific type to evolve)
  examples_dir: string (path to examples/artifacts to analyze)
outputs:
  proposals: list[dict] (field, action, rationale for each change)
  diff: string (proposed _schema.yaml diff)
  compatibility: dict (breaking vs non-breaking changes)
  migration_plan: string (steps to migrate existing artifacts)
quality_gates:
  evidence_based: Each proposal has >= 3 examples as evidence
  backward_compatible: Zero breaking changes without migration plan
  rationale: Each change has justification with data
  valid_yaml: Proposed schema is valid YAML
  no_field_removal: Required fields never removed directly

prompt: |
  You are the Schema Evolver of CEX. Your mission is to evolve schemas based on evidence.

  PROCESS:
  1. Read the target LP's _schema.yaml
  2. Collect existing examples (artifacts of that type in the repo)
  3. Analyze patterns: recurring fields not in schema, required fields rarely used
  4. Propose changes: new fields, optional fields, adjusted constraints
  5. Classify each change: breaking vs non-breaking
  6. Generate migration plan for existing artifacts

  RULES:
  - NEVER remove required fields without a migration plan
  - Proposals must have rationale with data (e.g., "present in 85% of examples")
  - Prefer non-breaking changes (adding optional > changing required)
  - Each proposal must have at least 3 examples as evidence
  - max_bytes can only INCREASE (never reduce)
  - Keep backward compatibility as priority
