tldr: Lessons from the N03 bootstrap -- bigram parser fixes, proprietary cleanup, self-referential construction.
density_score: 0.85
l01_bigram_parser_needs_digits: 'The Motor regex stripped digits from words, breaking kinds like e2e_eval. Fix: changed [^a-z]
  to [^a-z0-9_] in bigram/trigram resolution. Impact: 94/99 to 99/99 kind resolution.'
l02_proprietary_terms_leak_everywhere: '624 author: fields contained satellite names. 81 content files had company refs. Fix:
  systematic grep + replace across entire repo. Lesson: run proprietary check BEFORE any release.'
l03_type_to_template_must_stay_in_sync: '3 kinds were in kinds_meta but missing from TYPE_TO_TEMPLATE.yaml. Fix: cex_kind_register.py
  --validate catches this automatically. Lesson: always validate registries after any kind change.'
l04_heredocs_break_on_complex_content: 'Bash heredocs fail on content with backticks, quotes, dollar signs, or backslashes.
  Fix: use Python chr(10).join() or direct Python file writes. Lesson: never use heredocs for artifact content.'
l05_f8_must_auto_index: 'Originally F8 only saved + compiled. Missing index step meant new artifacts were invisible to search
  until manual re-index. Fix: added cex_index.py call after compile in Runner.F8.'
l06_n03_is_self_referential: The builder nucleus builds itself. Phase 1 must be manual (genesis). Phase 2 uses the builder
  to complete itself (autopoiesis). Phase 3 rewrites originals with full context (strange loop).
