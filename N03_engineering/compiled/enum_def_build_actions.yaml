tldr: 'Canonical enumerations for all CEX build-time constants: BUILD_ACTION, PILLAR, NUCLEUS, MODEL_TIER, SIGNAL_EVENT, QUALITY_TIER,
  PIPELINE_FUNCTION. Machine-parseable source of truth for all 259 builders.'
