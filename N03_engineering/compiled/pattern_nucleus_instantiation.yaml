id: p08_pat_nucleus_instantiation
kind: pattern
pillar: P08
title: Pattern -- Nucleus Instantiation from N00 Archetype
version: 1.0.0
created: 2026-04-17
author: n03_engineering
domain: nucleus-construction
quality: null
tags:
- pattern
- nucleus
- instantiation
- N00
- archetype
- convention-over-configuration
- coc
- new-nucleus-bootstrap
tldr: Convention-over-Configuration pattern for creating a new nucleus (N08+) from the N00_genesis archetype. 9-step protocol
  with explicit file list, naming rules, and CoC compliance checks.
density_score: 0.92
purpose: 'N00_genesis is the archetype (industry: abstract base class). Creating a new nucleus (N08, N09, ...) means INSTANTIATING
  the archetype with domain-specific content, not reimplementing the base contract from scratch. CoC rule: every nucleus has
  the same 13 subdirectory structure. A nucleus that deviates from this structure is NOT a nucleus — it is a collection of
  files.'
preconditions: '| Check | Command | Expected |

  |-------|---------|---------|

  | N00_genesis exists | `ls N00_genesis/` | 12 pillar dirs + README.md |

  | kinds_meta.json current | `python _tools/cex_doctor.py --kinds` | 257 kinds |

  | No existing nucleus at target slot | `ls N0{X}_*/` | does not exist |

  | nucleus_sins.yaml has slot | `grep "n0{X}" .cex/config/nucleus_sins.yaml` | sin defined |'
instantiation_protocol_9_steps: ''
step_1_claim_the_sin: 'Read `.cex/config/nucleus_sins.yaml`. Pick the sin for the new nucleus.

  Write `N0{X}_{domain}/P08_architecture/nucleus_def_n0{X}.md`:


  id: p08_nd_n0{X}

  kind: nucleus_def

  nucleus: n0{X}

  domain: {domain}

  sin: {sin_name}

  sin_pt: {sin_in_portuguese}

  model_tier: sonnet|opus'
step_2_mirror_p01_p12_structure: "for P in P01_knowledge P02_model P03_prompt P04_tools P05_output \\\n         P06_schema\
  \ P07_evals P08_architecture P09_config \\\n         P10_memory P11_feedback P12_orchestration; do\n  mkdir -p N0{X}_{domain}/$P\n\
  \  cp N00_genesis/$P/README.md N0{X}_{domain}/$P/README.md\ndone\n\nCoC: directories must match this exact list. No additional\
  \ pillars. No renamed pillars."
step_3_write_the_agent_identity_p02: 'File: `N0{X}{domain}/P02_model/agent{domain}.md` Kind: `agent` Required fields: id,
  kind, nucleus, sin, domain, capabilities[], tools[] Source: copy `N00_genesis/P02_model/` pattern, inject domain-specific
  capabilities.'
step_4_write_the_system_prompt_p03: 'File: `N0{X}{domain}/P03_prompt/system_prompt{domain}.md`

  Kind: `system_prompt`

  Required: sin_lens paragraph, F2b SPEAK activation, 8F protocol reference


  Pattern:

  You are N0{X}, the {domain} nucleus of CEX.

  Your sin: {sin}. Your lens: {sin_behavioral_description}.

  Load controlled vocabulary: N0{X}{domain}/P01_knowledge/kc{domain}_vocabulary.md

  Follow 8F pipeline: .claude/rules/8f-reasoning.md'
step_5_write_boot_config_p09: 'File: `N0{X}{domain}/P09_config/boot_config{domain}.md`

  Kind: `boot_config`

  Required: cli (claude|codex|gemini|ollama), model, context_window, fallback_chain[]


  Boot scripts are PowerShell (see `boot/n0{X}.ps1` template from `.claude/rules/new-nucleus-bootstrap.md`).'
step_6_write_nucleus_rules: 'File: `N0{X}_{domain}/rules/n0{X}-{domain}.md` Pattern: copy `N03_engineering/rules/n03-builder.md`,
  adapt sin, domain, routing rules. CoC: exactly one rules file per nucleus. File name must match `n0{X}-*.md`.'
step_7_write_agent_card_p08: 'File: `N0{X}{domain}/P08_architecture/agent_card{domain}.md` Kind: `agent_card` Required: capabilities[],
  input_schema, output_schema, quality_target, routing_rules[]'
step_8_write_vocabulary_kc_p01: 'File: `N0{X}{domain}/P01_knowledge/kc{domain}_vocabulary.md` Kind: `knowledge_card` Required:
  canonical_terms table, anti-patterns table, cross-nucleus shared terms (never redefine)'
step_9_validate_and_register: '# Validate structure

  python _tools/cex_doctor.py --nucleus n0{X}


  # Run system test

  python _tools/cex_system_test.py --nucleus n0{X}


  # Register in boot scripts

  # Add to _spawn/dispatch.sh nucleus_list


  # Signal ready

  python -c "from _tools.signal_writer import write_signal; write_signal(''n0{X}'', ''bootstrapped'', 9.0)"'
file_inventory_minimum_viable_nucleus: '| File | Kind | Step |

  |------|------|------|

  | `N0{X}_{domain}/P08_architecture/nucleus_def_n0{X}.md` | nucleus_def | 1 |

  | `N0{X}{domain}/P02_model/agent{domain}.md` | agent | 3 |

  | `N0{X}{domain}/P03_prompt/system_prompt{domain}.md` | system_prompt | 4 |

  | `N0{X}{domain}/P09_config/boot_config{domain}.md` | boot_config | 5 |

  | `N0{X}_{domain}/rules/n0{X}-{domain}.md` | rule | 6 |

  | `N0{X}{domain}/P08_architecture/agent_card{domain}.md` | agent_card | 7 |

  | `N0{X}{domain}/P01_knowledge/kc{domain}_vocabulary.md` | knowledge_card | 8 |

  | `boot/n0{X}.ps1` | (external) | 5 |'
coc_compliance_checks: '| Check | Rule | Violation Consequence |

  |-------|------|-----------------------|

  | 13-subdir structure | Must match N00_genesis | cex_doctor.py FAIL |

  | Nucleus slot | N08 follows N07, no gaps | dispatch.sh routing broken |

  | Sin uniqueness | Each nucleus has unique sin | Identity collision |

  | Vocabulary KC | Must exist before first dispatch | F2b SPEAK crashes |

  | rules file | Exactly 1, named `n0{X}-*.md` | Lazy-load at boot fails |

  | boot_config | cli field from allowed values | Routing fails at boot |'
what_coc_gives_you: '| Without CoC | With CoC (this pattern) |

  |-------------|------------------------|

  | Each nucleus invents its own structure | All nuclei share one known layout |

  | Discovery requires manual inspection | `ls N0X_*/P{xx}/` works for any nucleus |

  | N07 dispatch needs custom routing | Uniform routing: nuclei are interchangeable |

  | New nucleus takes 2 hours | New nucleus takes 20 minutes |

  | Agent card format varies | agent_card_{domain}.md is always the entry point |'
cross_references:
- '`.claude/rules/new-nucleus-bootstrap.md` — 9-file minimum checklist (authoritative)'
- '`N00_genesis/P08_architecture/nucleus_def_n00.md` — archetype definition'
- '`N03_engineering/P08_architecture/nucleus_def_n03.md` — N03 as instantiation example'
- '`N03_engineering/P08_architecture/pattern_8f_full_trace.md` — trace convention loaded by new nuclei'
