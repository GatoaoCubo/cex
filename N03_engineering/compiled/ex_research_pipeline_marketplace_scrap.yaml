updated: '2026-04-17'
purpose: Automated research pipeline that cross-references the internal Supabase product catalog against Bling ERP and Mercado
  Livre — detects orphans, duplicates, and enrichment opportunities, then produces a structured audit report.
when_to_use:
- Auditing catalog integrity across Supabase, Bling, and Mercado Livre.
- Finding products in Supabase that are missing from Bling (before mass creation).
- Discovering ML catalog items that match internal products for auto-enrichment.
- Generating a weekly discrepancy report for catalog management.
pipeline_stages: "Stage 1: COLLECT\n  |-- Fetch all Supabase product IDs + codes + titles\n  |-- Fetch all Bling product codes\
  \ via paginated API\n  |-- Search ML catalog for each product (by EAN or title)\n\nStage 2: DIFF\n  |-- In Supabase but\
  \ NOT in Bling -> orphan_supabase_only[]\n  |-- In Bling but NOT in Supabase -> orphan_bling_only[]\n  |-- In both but stock\
  \ mismatch  -> stock_discrepancy[]\n  |-- In Supabase with ML match   -> enrichable[]\n\nStage 3: SCORE\n  |-- Severity\
  \ score per discrepancy (HIGH=stock differs >10%, MEDIUM=missing, LOW=metadata)\n  |-- Estimated effort to fix (auto-fixable\
  \ vs manual)\n\nStage 4: REPORT\n  |-- Write structured JSON report to Supabase storage\n  |-- Write summary markdown to\
  \ research_reports/ table\n  |-- Emit signal for N07 consolidation"
interface: '| Input | Type | Description |

  |-------|------|-------------|

  | `supabase_products` | DB query | All active products from Supabase |

  | `bling_products` | Bling API v3 | Paginated product list |

  | `meli_search` | ML API | Catalog search per product |

  | `dry_run` | bool | If true, report only; do not fix |

  | `auto_fix` | bool | If true, trigger auto-creation for orphans |


  | Output | Type | Description |

  |--------|------|-------------|

  | `audit_report.json` | Supabase storage | Full discrepancy dataset |

  | `audit_summary.md` | Markdown | Human-readable summary |

  | `enrichable_ids[]` | Array | Supabase product IDs with ML matches |

  | `orphan_supabase_only[]` | Array | Products to create in Bling |'
configuration: "{\n  \"batch_size\": 50,\n  \"bling_rate_limit_ms\": 400,\n  \"meli_rate_limit_ms\": 200,\n  \"stock_discrepancy_threshold_pct\"\
  : 10,\n  \"max_enrichment_candidates\": 100,\n  \"report_storage_bucket\": \"audit-reports\",\n  \"report_path_prefix\"\
  : \"catalog/{{BRAND_SUPABASE_PROJECT_REF}}\"\n}"
example_invocation: "# Dry run: report only\ncurl -X POST \\\n  https://{{BRAND_SUPABASE_PROJECT_REF}}.supabase.co/functions/v1/bling-audit\
  \ \\\n  -H \"Authorization: Bearer $SUPABASE_SERVICE_KEY\" \\\n  -d '{\"dry_run\": true}'\n\n# With auto-fix: create missing\
  \ Bling products\ncurl -X POST \\\n  https://{{BRAND_SUPABASE_PROJECT_REF}}.supabase.co/functions/v1/bling-audit \\\n  -H\
  \ \"Authorization: Bearer $SUPABASE_SERVICE_KEY\" \\\n  -d '{\"dry_run\": false, \"auto_fix\": true}'"
sample_report_structure: "{\n  \"run_at\": \"2026-04-17T10:00:00Z\",\n  \"supabase_total\": 312,\n  \"bling_total\": 289,\n\
  \  \"orphan_supabase_only\": [{ \"id\": \"uuid\", \"code\": \"CAT-001\", \"title\": \"...\" }],\n  \"orphan_bling_only\"\
  : [{ \"bling_id\": 12345, \"code\": \"BL-900\" }],\n  \"stock_discrepancy\": [{ \"code\": \"CAT-005\", \"supabase_stock\"\
  : 10, \"bling_stock\": 3 }],\n  \"enrichable\": [{ \"supabase_id\": \"uuid\", \"meli_id\": \"MLB123456\", \"confidence\"\
  : 0.92 }]\n}"
