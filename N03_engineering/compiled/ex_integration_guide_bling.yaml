purpose: Step-by-step integration guide for connecting Bling ERP (Brazilian) to a Supabase product catalog — covers OAuth
  2.0 authorization, product sync via API v3, inbound webhooks for stock events, and scheduled token refresh.
when_to_use:
- Connecting a Bling ERP account to manage Brazilian fiscal documents (NF-e) alongside a Shopify/Supabase commerce stack.
- Keeping product stock quantities in Bling synchronized with Supabase.
- Automating product creation in Bling from Supabase catalog entries.
prerequisites: '| Requirement | Value |

  |-------------|-------|

  | Bling plan | Pro or above (API v3 access required) |

  | API version | v3 (REST + OAuth 2.0) |

  | Base URL | `https://www.bling.com.br/Api/v3` |

  | OAuth app registration | `https://developer.bling.com.br` |

  | Supabase project | `{{BRAND_SUPABASE_PROJECT_REF}}` |'
architecture: "Bling ERP API v3 (OAuth 2.0)\n      |\n      |-- REST endpoints ---------> edge function: sync-bling-product\n\
  \      |                             edge function: sync-all-products-bling\n      |                             edge function:\
  \ bling-create-missing\n      |\n      |-- Webhooks (HMAC) -------> edge function: bling-webhook\n      |\n      |-- Token\
  \ refresh ----------> edge function: token-auto-refresh (cron)\n      |\nSupabase DB (products, bling_tokens tables)"
oauth_2_0_authorization_flow: Bling uses standard OAuth 2.0 authorization code flow.
step_1_register_oauth_app:
- Go to `https://developer.bling.com.br` → create an application.
- 'Set redirect URI to: `https://{{BRAND_SUPABASE_PROJECT_REF}}.supabase.co/functions/v1/bling-oauth-callback`.'
- Note the `client_id` and `client_secret` → store in Supabase secrets as `{{BRAND_BLING_CLIENT_ID}}` and `{{BRAND_BLING_CLIENT_SECRET}}`.
step_2_authorize_one_time: "GET https://www.bling.com.br/Api/v3/oauth/authorize\n  ?response_type=code\n  &client_id={{BRAND_BLING_CLIENT_ID}}\n\
  \  &state={random_nonce}\n\nRedirect to this URL from your admin UI. Bling redirects back with `?code=...`."
step_3_exchange_code_for_tokens: "The `bling-oauth-callback` edge function handles this automatically:\n\nconst tokenRes =\
  \ await fetch('https://www.bling.com.br/Api/v3/oauth/token', {\n  method: 'POST',\n  headers: { 'Content-Type': 'application/x-www-form-urlencoded'\
  \ },\n  body: new URLSearchParams({\n    grant_type: 'authorization_code',\n    code,\n    redirect_uri: REDIRECT_URI,\n\
  \    client_id: Deno.env.get('BLING_CLIENT_ID')!,\n    client_secret: Deno.env.get('BLING_CLIENT_SECRET')!,\n  }),\n});\n\
  const { access_token, refresh_token, expires_in } = await tokenRes.json();\n// Store in Supabase bling_tokens table\n\n\
  Token TTL: access token ~60 minutes; refresh token ~6 months."
step_4_deploy_edge_functions: 'supabase functions deploy bling-oauth-callback

  supabase functions deploy bling-webhook

  supabase functions deploy sync-bling-product

  supabase functions deploy sync-all-products-bling

  supabase functions deploy token-auto-refresh


  supabase secrets set BLING_CLIENT_ID={{BRAND_BLING_CLIENT_ID}}

  supabase secrets set BLING_CLIENT_SECRET={{BRAND_BLING_CLIENT_SECRET}}'
step_5_scheduled_token_refresh: "Create a cron job in Supabase (or pg_cron) to call `token-auto-refresh` every 50 minutes:\n\
  \nselect cron.schedule('bling-token-refresh', '/50    *',\n  $$select net.http_post(url := 'https://{{BRAND_SUPABASE_PROJECT_REF}}.supabase.co/functions/v1/token-auto-refresh',\n\
  \    headers := '{\"Authorization\": \"Bearer {SUPABASE_SERVICE_KEY}\"}')$$);"
step_6_initial_sync: "Invoke `sync-all-products-bling` to push existing Supabase catalog to Bling:\n\ncurl -X POST \\\n  https://{{BRAND_SUPABASE_PROJECT_REF}}.supabase.co/functions/v1/sync-all-products-bling\
  \ \\\n  -H \"Authorization: Bearer $SUPABASE_SERVICE_KEY\""
interface: '| Input | Type | Description |

  |-------|------|-------------|

  | `BLING_CLIENT_ID` | env secret | OAuth app client ID |

  | `BLING_CLIENT_SECRET` | env secret | OAuth app client secret |

  | `BLING_ACCESS_TOKEN` | DB (bling_tokens) | Current access token |

  | `BLING_REFRESH_TOKEN` | DB (bling_tokens) | Refresh token |


  | Output | Description |

  |--------|-------------|

  | Supabase `products` rows | Updated with `bling_id`, `bling_synced_at` |

  | Bling product records | Created/updated via API v3 |'
