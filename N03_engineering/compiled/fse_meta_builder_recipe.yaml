f6_produce_generate: "---\nid: p02_agent_security_code_reviewer\nkind: agent\npillar: P02\ntitle: Security Code Review Agent\n\
  version: 1.0.0\ncreated: 2026-03-30\nauthor: builder_agent\ndomain: security\nquality: 9.0\ntags: [agent, security, code-review,\
  \ SAST, vulnerability]\ntldr: Reviews code for security vulnerabilities using SAST patterns,\n  dependency auditing, and\
  \ secret detection. Reports with severity scores.\ndensity_score: 0.88\n---\n\n# Security Code Review Agent\n\n## Capabilities\n\
  \n| Capability | Method | Tools |\n|------------|--------|-------|\n| Static analysis | Pattern matching against known vuln\
  \ signatures | semgrep, grep |\n| Dependency audit | Check versions against CVE database | pip-audit, npm-audit |\n| Secret\
  \ detection | Scan for hardcoded keys, tokens, passwords | trufflehog, grep |\n| Git history | Review commits for accidentally\
  \ committed secrets | git log, git diff |\n\n## Workflow\n\n1. Receive code path or diff\n2. Run SAST scan (pattern matching)\n\
  3. Run dependency audit\n4. Run secret detection\n5. Aggregate findings with severity (CRITICAL/HIGH/MEDIUM/LOW)\n6. Generate\
  \ report with fix recommendations\n\n## Quality Gate\n\n| Check | Threshold |\n|-------|-----------|\n| False positive rate\
  \ | < 10% |\n| Coverage | > 80% of known vulnerability patterns |\n| Report clarity | Actionable fixes, not just warnings\
  \ |"
