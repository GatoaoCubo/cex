id: p07_rc_n03
kind: regression_check
pillar: P07
title: Regression Check -- N03 Build Quality
version: 1.0.0
created: 2026-04-17
author: n03_engineering
domain: artifact-construction
quality: null
tags:
- regression-check
- N03
- quality
- build
- drift-detection
- 8F
tldr: Regression detection protocol for N03 artifact quality. Tracks quality trends per kind, flags score drops >= 0.5 from
  rolling baseline, detects vocabulary drift, and identifies structural regressions after schema migrations.
density_score: 0.89
purpose: Detects when artifact quality DEGRADES over build iterations. Run automatically at F7b LEARN after every scored artifact.
  Primary defense against quality rot in high-churn pillars (P03, P06, P08).
regression_triggers: '| Trigger | Threshold | Severity |

  |---------|-----------|---------|

  | Score drop from baseline | >= 0.5 point drop | HIGH |

  | Vocabulary drift rate | > 2 non-canonical terms in batch of 5 | MEDIUM |

  | Density regression | density_score drops >= 0.10 from kind average | MEDIUM |

  | Frontmatter field loss | Required field absent after schema migration | HIGH |

  | id naming pattern violation | 2+ violations in rolling window of 10 | LOW |

  | Compile error rate | > 1 compile error per 10 builds | HIGH |'
baseline_management: ''
score_baseline_per_kind: "baseline:\n  kind: input_schema\n  window: 10                   # rolling window of last N artifacts\n\
  \  baseline_score: 9.1          # rolling average\n  min_score: 8.8               # floor in window\n  last_updated: 2026-04-17\n\
  \  trend: stable                # stable | improving | degrading\n\nBaseline updated after every build:\nbaseline = (0.8\
  \  previous_baseline) + (0.2  new_score)"
trend_classification: '| Trend | Condition |

  |-------|----------|

  | improving | 3 consecutive scores > baseline |

  | stable | scores within +/- 0.3 of baseline |

  | degrading | 2 consecutive scores < (baseline - 0.5) |

  | volatile | standard deviation > 1.0 in window |'
regression_types: ''
r1_score_regression_high: 'condition: new_score < (baseline - 0.5)

  action: BLOCK build; write regression signal; notify N07

  signal: {type: "regression", kind: "{kind}", severity: "HIGH", delta: {score_delta}, baseline: {baseline}}'
r2_vocabulary_drift_medium: 'condition: non_canonical_term_count > 2 in last 5 artifacts of same kind

  action: WARN; inject vocabulary KC into next F3 INJECT call; update taught_terms_registry

  signal: {type: "vocab_drift", kind: "{kind}", severity: "MEDIUM", terms: [...]}'
r3_density_regression_medium: 'condition: density_score < (kind_average_density - 0.10)

  action: WARN; flag for F6 retry with density emphasis

  signal: {type: "density_regression", kind: "{kind}", current: {score}, average: {average}}'
r4_structural_regression_high: 'condition: required_field missing OR yaml_parse_error after schema migration

  action: BLOCK; rollback artifact to previous version; alert N07

  signal: {type: "structural_regression", kind: "{kind}", missing_field: "{field}"}'
detection_protocol: "AFTER F7 GOVERN:\n  1. Load baseline for this kind from .cex/experiments/results.tsv\n  2. Compare new_score\
  \ against baseline\n     -> if drop >= 0.5: R1 trigger\n  3. Scan body for non-canonical terms (load spec_metaphor_dictionary)\n\
  \     -> if count > 2 in last 5: R2 trigger\n  4. Compare density_score against kind running average\n     -> if drop >=\
  \ 0.10: R3 trigger\n  5. Compare frontmatter fields against validation_schema\n     -> if required field missing: R4 trigger\n\
  \  6. Update baseline (exponential moving average)\n  7. Write row to .cex/experiments/results.tsv: timestamp, kind, score,\
  \ density, flags"
output_format: '# .cex/experiments/results.tsv column headers:

  # timestamp | nucleus | kind | artifact_id | score | density | regression_flags | action

  2026-04-17T14:23:11 | n03 | input_schema | p06_is_build_contract | null | 0.91 | [] | approved'
suppression_rules: 'Regression checks are suppressed for:

  - `verb=MIGRATE` (structural changes expected; only check for parse errors)

  - `dry_run=true`

  - First artifact of a kind (no baseline yet; initialize baseline from score)

  - Audit logs and changelog artifacts (quality not tracked for ephemeral kinds)'
