core_functions_f1_f8: '| Function | Description | Example | Output Format |

  |--------|-------------|---------|---------------|

  | F1: Intent Parsing | Convert natural language input to structured task parameters | "Write a Python script to sort CSV
  data" → `{task: "sort_csv", language: "python", format: "csv"}` | JSON object |

  | F2: Task Decomposition | Break into subtasks with dependencies | `{subtasks: ["parse_csv", "validate_data", "sort_records",
  "export_results"]}` | Task graph |

  | F3: Context Initialization | Set up environment variables, authentication tokens, and base parameters | `set_env("OPENAI_API_KEY",
  "your_key_here")` | Environment map |

  | F4: Decision Making | Implement guided decision protocol (GDP) for subjective choices | User approval required for: tone,
  audience, style, format preferences | Decision log |

  | F5: Execution Engine | Run subtasks in parallel/sequential order | Supports: `parallel`, `sequential`, `chain` (with `{previous}`
  context) | Execution trace |

  | F6: Result Aggregation | Merge outputs from parallel tasks | Handles: data fusion, conflict resolution, format normalization
  | Aggregated dataset |

  | F7: Quality Validation | Run automated checks against quality thresholds (≥8.0) | Validates: syntax, structure, completeness,
  format compliance | Validation report |

  | F8: Output Formatting | Finalize output with headers/footers, formatting, metadata | Includes: author, timestamp, version
  | Finalized document |'
implementation_patterns: ''
comparison_of_execution_strategies: '| Strategy | Scalability | Latency | Complexity | Use Case |

  |--------|-------------|---------|------------|----------|

  | Parallel | High | Low | Medium | Batch processing |

  | Sequential | Medium | Medium | Low | Linear workflows |

  | Chain | Medium | High | High | Dependent tasks with context |

  | Hybrid | High | Medium | High | Mixed workloads |

  | Asynchronous | Very High | Very Low | High | Real-time systems |'
error_handling_logging:
- 'Retry Policy: Exponential backoff (max 3 retries)'
- 'Logging: Errors logged to `cex_error.log` with stack trace'
- 'Trace Logging: Includes timestamps, function names, execution status'
- 'Example: `[2023-10-05 14:30:00] [F5] Executing subtask ''sort_records''`'
best_practices:
- 'Input Validation: Always validate inputs before decomposition'
- 'Example: Reject malformed JSON inputs with error code `E001`'
- 'Versioning: Use versioned output formats for compatibility'
- 'Example: `v2.0.0` for Python scripts, `v1.1.0` for CSV exports'
- 'Circuit Breakers: Implement for failing subtasks'
- 'Threshold: 5 failures in 10 minutes triggers breaker'
- 'Audit Trail: Maintain for all decisions and changes'
- 'Format: `decision_log_{timestamp}.json`'
boundary: Static, versioned distilled knowledge. Not instruction, template, or configuration.
