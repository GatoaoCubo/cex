id: p05_fmt_content_adapter
kind: formatter
pillar: P05
version: 1.0.0
created: '2026-04-08'
updated: '2026-04-08'
author: n03_builder
target_format: multi
input_type: structured_data
rule_count: 12
domain: content_factory
quality: null
tags:
- formatter
- content-factory
- multi-format
- adapter
- publishing
tldr: 'Universal adapter: CEX artifact (md+frontmatter) -> 5 publishable formats (clean md, HTML, PPTX outline, video script,
  podcast script)'
template_engine: mustache
pretty_print: true
escaping: html
encoding: utf8
locale: pt-BR
streaming: false
keywords:
- content-adapter
- multi-format
- publishing
- conversion
- pandoc
- marp
- typst
density_score: 0.93
formatting_rules: '| Name | Input Field | Transform | Pattern | Options |

  |------|-------------|-----------|---------|---------|

  | strip_frontmatter | raw_artifact | regex_remove | `^---[\s\S]*?---\n` | Remove YAML frontmatter block |

  | normalize_headers | body_markdown | regex_replace | `^(#{1,6})\s+` -> normalized levels | Ensure H1 = title, H2 = sections
  |

  | inject_brand_vars | body_markdown | template_expand | `{{BRAND_*}}` -> brand_config values | Resolve all mustache brand
  variables |

  | extract_sections | body_markdown | split_by_header | `^## (.+)$` | Returns ordered list of {title, content} |

  | to_clean_markdown | sections[] | reassemble | `# {title}\n\n{content}` per section | Strip internal refs, tables of quality
  scores |

  | to_html | clean_markdown | pandoc_convert | `pandoc -f markdown -t html5 --standalone` | Add brand CSS inline, responsive
  meta |

  | to_pptx_outline | sections[] | slide_transform | 1 section = 1 slide, bullets from paragraphs | Max 5 bullets/slide, speaker
  notes from detail |

  | to_video_script | sections[] | temporal_map | section -> segment(duration, narration, visual_cue) | 90s total, hook/build/benefit/proof/CTA
  structure |

  | to_podcast_script | sections[] | dialogue_map | section -> talking_point(host_a, host_b, duration) | 15-25 min, intro/body/outro,
  2-host format |

  | apply_brand_colors | html_output | css_inject | `--primary: {BRAND_COLORS.primary}` | Inject CSS custom properties from
  brand_config |

  | sanitize_emojis | all_outputs | regex_replace | Unicode emoji -> ASCII tags | `[OK]`, `[WARN]`, `[!!]` per ascii-code-rule
  |

  | validate_length | all_outputs | length_check | per-format max bytes | video: 2KB, podcast: 5KB, slides: 10KB, html: 50KB
  |'
input_specification: 'Type: structured_data (CEX artifact)


  Structure: Markdown file with YAML frontmatter. Expected fields in frontmatter: `id`, `kind`, `title`, `domain`, `tags`.
  Body is structured Markdown with H2 sections. Artifacts may contain mustache variables (`{{BRAND_*}}`), internal cross-references,
  quality tables, and Properties sections that should be stripped for publication.


  Example:

  ---

  id: kc_example

  kind: knowledge_card

  title: "Example Knowledge Card"

  domain: "meta"

  tags: [example]

  ---


  ## Introduction


  Content about the topic with {{BRAND_NAME}} references.


  ## Core Concepts


  Detailed explanation with tables and examples.


  ## Properties


  | Property | Value |

  |----------|-------|

  | Kind | knowledge_card |'
output_specification: 'Format: multi (5 target formats from single input)'
clean_markdown: '# Example Knowledge Card


  ## Introduction


  Content about the topic with CEX references.


  ## Core Concepts


  Detailed explanation with tables and examples.'
html: "<!DOCTYPE html>\n<html lang=\"pt-BR\">\n<head>\n  <meta charset=\"utf-8\">\n  <meta name=\"viewport\" content=\"width=device-width,\
  \ initial-scale=1\">\n  <title>Example Knowledge Card</title>\n  <style>:root{--primary:#0D1117;--accent:#58A6FF}</style>\n\
  </head>\n<body>\n  <article>\n    <h1>Example Knowledge Card</h1>\n    <section><h2>Introduction</h2><p>Content...</p></section>\n\
  \  </article>\n</body>\n</html>"
pptx_outline: "slides:\n  - title: \"Example Knowledge Card\"\n    bullets: []\n    speaker_notes: \"Title slide -- introduce\
  \ topic\"\n  - title: \"Introduction\"\n    bullets: [\"Content about the topic\", \"Key point from paragraph\"]\n    speaker_notes:\
  \ \"Expand on the introduction...\"\n  - title: \"Core Concepts\"\n    bullets: [\"Concept 1\", \"Concept 2\", \"Concept\
  \ 3\"]\n    speaker_notes: \"Detail each concept...\""
video_script: "total_duration: 90\nsegments:\n  - phase: hook\n    duration: 5\n    narration: \"Did you know...?\"\n    visual_cue:\
  \ \"Title card with brand logo\"\n  - phase: build\n    duration: 30\n    narration: \"Here is how it works...\"\n    visual_cue:\
  \ \"Animated diagram of core concepts\""
podcast_script: "total_duration: 1200\nformat: two_host\nsegments:\n  - phase: intro\n    duration: 60\n    host_a: \"Welcome\
  \ to the show. Today we are covering...\"\n    host_b: \"This is a topic I have been curious about...\"\n  - phase: body\n\
  \    duration: 1080\n    talking_points:\n      - topic: \"Introduction\"\n        host_a: \"Let us start with the basics...\"\
  \n        host_b: \"What I find interesting is...\""
template: "Engine: mustache\n\n{{! Clean Markdown template }}\n# {{title}}\n\n{{#sections}}\n## {{section_title}}\n\n{{section_content}}\n\
  \n{{/sections}}\n\n{{! PPTX outline template }}\nslides:\n{{#sections}}\n  - title: \"{{section_title}}\"\n    bullets:\
  \ [{{#bullets}}\"{{.}}\"{{^last}}, {{/last}}{{/bullets}}]\n    speaker_notes: \"{{speaker_notes}}\"\n{{/sections}}"
edge_cases:
- 'Null values: If a frontmatter field is missing, use empty string for template vars; log warning'
- 'Empty strings: Skip empty sections entirely (do not produce blank slides or script segments)'
- 'Special characters: HTML-escape `<>&"''` for HTML output; shell-escape backticks for script formats; preserve Markdown
  formatting in clean-md output'
- 'Overflow: If input exceeds 50KB, truncate at nearest section boundary and append "[truncated]" marker; video script enforces
  90s hard cap by dropping lowest-priority segments'
tool_chain: '| Output Format | Primary Tool | Fallback | Config |

  |---------------|-------------|----------|--------|

  | Clean Markdown | built-in (regex + template) | -- | -- |

  | HTML | Pandoc (`pandoc -f markdown -t html5`) | WeasyPrint (for PDF from HTML) | `--standalone --css brand.css` |

  | PPTX | Marp CLI (`marp --pptx`) | Canva API (POST /v1/designs) | `--theme brand-theme` |

  | Video Script | built-in (temporal mapper) | -- | cs_cf_video constraints |

  | Podcast Script | built-in (dialogue mapper) | -- | cs_cf_podcast constraints |

  | PDF (from eBook) | Typst (`typst compile`) | Pandoc (`pandoc -t pdf`) | brand template |

  | EPUB | Pandoc (`pandoc -t epub3`) | -- | metadata.yaml |'
references:
- '`_docs/specs/spec_content_factory_v1.md` -- defines format requirements and tool stack'
