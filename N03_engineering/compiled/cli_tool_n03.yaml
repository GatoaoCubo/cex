id: p04_ct_n03_build
kind: cli_tool
pillar: P04
title: CLI Tool -- N03 Build Interface (cex_build)
version: 1.0.0
created: 2026-04-17
author: n03_engineering
domain: artifact-construction
quality: null
tags:
- cli-tool
- N03
- build
- interface
- cex-build
- 8F
- dispatch
tldr: CLI interface contract for cex_build.py -- N03's primary build entry point. Documents all flags, subcommands, exit codes,
  and integration with the 8F pipeline. Used by N07 dispatch and direct human invocation.
density_score: 0.91
overview: '`cex_build.py` is N03''s primary CLI. It accepts a build contract, executes the full 8F pipeline, and outputs a
  structured result. All N07 dispatches to N03 route through this interface or its equivalent cex_8f_runner.py.'
base_command: 'python cex_sdk/cex_8f_runner.py [OPTIONS]

  # Alias: python _tools/cex_build.py [OPTIONS]  (if installed)'
subcommands: '| Subcommand | Purpose |

  |-----------|---------|

  | `build` | Execute full 8F pipeline (default) |

  | `validate` | Run F7 GOVERN only (no F6, no F8) |

  | `dry-run` | Execute F1-F5, print plan, stop before F6 |

  | `improve` | Run self-improvement loop on target artifact |

  | `batch` | Process list of intents from file |'
options_build_subcommand: '| Flag | Short | Type | Default | Description |

  |------|-------|------|---------|-------------|

  | `--intent` | `-i` | string | required* | Natural language build request |

  | `--kind` | `-k` | string | resolved | Explicit kind override |

  | `--pillar` | `-p` | string | derived | Pillar override |

  | `--verb` | `-v` | enum | CREATE | BUILD_ACTION verb |

  | `--quality-target` | `-q` | float | 9.0 | Minimum quality score |

  | `--domain` | `-d` | string | null | Domain for context injection |

  | `--output-dir` | `-o` | path | derived | Override output directory |

  | `--model` | `-m` | enum | opus | Model tier: haiku/sonnet/opus |

  | `--dry-run` | | bool | false | Simulate; print plan only |

  | `--no-compile` | | bool | false | Skip cex_compile.py after save |

  | `--no-signal` | | bool | false | Skip signal_writer.py |

  | `--force` | `-f` | bool | false | Overwrite existing artifact |

  | `--nucleus` | `-n` | enum | n03 | Executing nucleus ID |


  *`--intent` OR `--kind` required; both may be specified.'
exit_codes: '| Code | Meaning | Action |

  |------|---------|--------|

  | 0 | Build complete; all gates passed | N07 proceeds to next wave |

  | 1 | Build failed; artifact not saved | N07 checks failure signal |

  | 2 | Validation error; bad input contract | N07 corrects dispatch params |

  | 3 | Compile error; artifact saved but invalid YAML | N07 triggers bugloop |

  | 4 | Quality gate failed after 2 retries | N07 escalation required |

  | 5 | Token budget exhausted | N07 pauses dispatch |'
usage_examples: ''
minimal_build: python cex_sdk/cex_8f_runner.py -i "create a system prompt for the research agent"
explicit_kind_quality_target: "python cex_sdk/cex_8f_runner.py \\\n  --kind knowledge_card \\\n  --verb CREATE \\\n  --domain\
  \ \"embedding strategies\" \\\n  --quality-target 9.5 \\\n  --nucleus n03"
validate_existing_artifact_no_write: "python cex_sdk/cex_8f_runner.py validate \\\n  --kind scoring_rubric \\\n  N03_engineering/P07_evals/scoring_rubric_n03.md"
batch_build_from_file: "python cex_sdk/cex_8f_runner.py batch \\\n  --file .cex/runtime/handoffs/batch_n03_w1.txt \\\n  --nucleus\
  \ n03 \\\n  --quality-target 9.0"
dry_run_print_plan_no_write: "python cex_sdk/cex_8f_runner.py --dry-run \\\n  -i \"create an input schema for the build contract\"\
  \ \\\n  --kind input_schema"
stdout_format_machine_parseable: '=== 8F PIPELINE ===

  F1 CONSTRAIN: kind=input_schema, pillar=P06, max=3072B

  F2 BECOME: input-schema-builder loaded (13 ISOs)

  F2b SPEAK: vocabulary loaded (20 terms). Drift prevention: active.

  F3 INJECT: kc_input_schema.md + 2 examples. Match: 72%

  F4 REASON: 5 sections, approach=template (adapt from match)

  F5 CALL: compile+doctor+index ready. 3 similar found.

  F6 PRODUCE: 2,840 bytes, 5 sections, density=0.91

  F7 GOVERN: Score pending. Gates: 7/7. 12LP: 12/12

  F8 COLLABORATE: saved N03_engineering/P06_schema/input_schema_build_contract.md. Compiled. Committed.

  ===================

  EXIT: 0'
integration_with_n07_dispatch: "N07 writes handoff to `.cex/runtime/handoffs/n03_task.md`.\nN03 reads handoff on boot. Handoff\
  \ contains structured CLI arguments:\n\n# Handoff excerpt\ncli_args:\n  kind: input_schema\n  verb: CREATE\n  quality_target:\
  \ 9.0\n  nucleus: n03\n  compile: true\n  signal: true\n\nN03 boot script: `boot/n03.ps1` reads task file, constructs CLI\
  \ call, executes."
