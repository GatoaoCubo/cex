title: Aider CLI Integration Patterns
version: 1.0.0
quality: 9.2
pillar: P01
density_score: 0.95
updated: '2026-04-13'
core_integration_options: "| Flag          | Purpose                                  | Autonomy Level | Typical Use Case\
  \                     | Example Command                          |\n|---------------|------------------------------------------|----------------|--------------------------------------|------------------------------------------|\n\
  | `--file`      | Single-file editing with context         | Low            | Code review, quick fixes             | `aider\
  \ --file src/main.py`             |\n| `--read`      | Read-only analysis                       | None           | Security\
  \ audits, documentation       | `aider --read --file README.md`        |\n| `--yes-always`| Full autonomy for repetitive\
  \ tasks       | High           | Refactoring, formatting              | `aider --yes-always --file utils.py`   |\n| `--subtree-only`\
  \ | Focus on specific subdirectories     | Medium         | Large repo maintenance               | `aider --subtree-only\
  \ --file docs/`    |\n\nKey Considerations:  \n- `--file` is optimal for isolated changes but lacks context beyond the file.\
  \  \n- `--yes-always` requires strict validation to prevent unintended modifications.  \n- `--subtree-only` reduces computational\
  \ load in monorepos but may miss cross-file dependencies."
git_integration: "| Feature             | Description                                  | Language Support | Default Behavior\
  \                     | Configuration Example                  |\n|--------------------|----------------------------------------------|------------------|--------------------------------------|----------------------------------------|\n\
  | `--auto-commits`   | Enables semantic commit messages             | 15+ languages    | English (en)                  \
  \       | `--auto-commits --commit-language pt`  |\n| `--commit-language`| Sets commit message language                \
  \ | 15+ languages    | Auto-detected from repo              | `--commit-language en`                 |\n| `--branch`   \
  \      | Specifies target branch for commits          | N/A              | Current branch                       | `--branch\
  \ feature/new-ui`              |\n| `--dry-run`        | Simulates commits without modifying history  | N/A            \
  \  | Disabled by default                  | `--dry-run --auto-commits`             |\n\nBest Practices:  \n- Use `--auto-commits`\
  \ with `--commit-language` for multilingual teams.  \n- Combine `--dry-run` with `--yes-always` to validate complex workflows.\
  \  \n- Avoid `--auto-commits` on production branches without explicit approval."
modelfile_customization: "model:\n  name: \"gpt-4o\"\n  temperature: 0.7\n  max_tokens: 1500\n  safety: \"strict\"\n  prompt_template:\
  \ \"You are a code reviewer. Analyze {file} and suggest improvements.\"\n\nConfiguration Parameters:  \n- `temperature`:\
  \ Controls creativity (0.0-1.0). Lower values = deterministic.  \n- `max_tokens`: Limits response length (min 500, max 4000).\
  \  \n- `safety`: Enforces content policies (strict/medium/none).  \n- `prompt_template`: Customizes model behavior per use\
  \ case.  \n\nUse Cases:  \n- `temperature: 0.2` for code generation requiring consistency.  \n- `max_tokens: 2000` for complex\
  \ refactoring tasks.  \n- `safety: medium` for internal tools with relaxed policies."
8f_pipeline_function: "Primary Function: INJECT  \nInjects model-generated content into the codebase via CLI, Git, or API.\
  \  \nSecondary Functions:  \n- VALIDATE: Checks code against Modelfile constraints.  \n- TRANSFORM: Applies formatting rules\
  \ defined in the project.  \n- PUBLISH: Deploys changes to staging environments.  \n\nPipeline Flow:  \n1. User initiates\
  \ command (e.g., `aider --file src/app.py`).  \n2. Model generates suggestions based on Modelfile parameters.  \n3. Changes\
  \ are validated against safety and token limits.  \n4. Approved changes are injected into the working directory.  \n5. Auto-commits\
  \ trigger if enabled."
boundary: This artifact is a distilled, versioned knowledge card. It is NOT a configuration template, instruction manual,
  or executable code. It provides static guidance for CLI integration patterns.
