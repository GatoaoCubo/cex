advanced_use_cases: '| Scenario                          | Integration Pattern        | Required Flags               | Outcome                                  |
  Example                                  |

  |----------------------------------|----------------------------|------------------------------|------------------------------------------|------------------------------------------|

  | Refactoring legacy code          | `--yes-always` + `--file`  | `--yes-always --file legacy.js` | Fully automated refactoring              |
  Replaces `console.log` with logging lib  |

  | Multilingual commit messages     | `--auto-commits` + `--commit-language` | `--auto-commits --commit-language pt` | Portuguese
  commit messages               | `feat: adicionar novo componente`        |

  | Subtree maintenance in monorepos | `--subtree-only` + `--branch` | `--subtree-only --branch feature/ui` | Isolated changes
  in `ui/` directory      | Updates only `ui/` without touching core |

  | Dry-run validation               | `--dry-run` + `--yes-always` | `--dry-run --yes-always --file test.py` | Simulates
  full execution without changes | Shows potential conflicts                |

  | Custom prompt injection          | `--model` + `--prompt-template` | `--model gpt-4o --prompt-template "You are a security
  auditor"` | Tailored model behavior                  | Analyzes code for vulnerabilities        |'
