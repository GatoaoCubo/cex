scenario_refactoring_in_monorepos: '| Step | Tool | Action | Outcome |

  |------|------|--------|---------|

  | 1    | `--subtree-only` | Limit scope to `packages/core/` | Isolated changes reduce risk |

  | 2    | `--yes-always` | Enable bulk refactoring | 15 files updated in 30s |

  | 3    | `--auto-commits` | Commit with `refactor:` prefix | Semantic history tracking |

  | 4    | `--commit-language=ja` | Japanese commit messages | Team collaboration in Japan |'
performance_metrics: '| Task Type | Time (s) | Accuracy (%) | Resource Usage |

  |-----------|----------|--------------|----------------|

  | Code completion | 0.8 | 98.2 | 12% CPU |

  | Refactoring | 3.2 | 95.7 | 28% CPU |

  | Commit generation | 0.5 | 99.1 | 8% CPU |

  | Safety checks | 1.1 | 100 | 15% CPU |

  | Cross-repo analysis | 7.4 | 92.3 | 45% CPU |'
best_practices:
- Use `--subtree-only` for large repositories to avoid unnecessary processing
- Combine `--yes-always` with safety_level=medium for controlled automation
- Set `language` explicitly for multilingual codebases
- Leverage `--commit-language` for international teams
- Monitor resource usage during complex operations like cross-repo analysis
- Backup Modelfile configurations before overriding with `--model`
- Use `--read` for pre-commit validation to catch issues early
- Document custom prompt templates for team consistency
