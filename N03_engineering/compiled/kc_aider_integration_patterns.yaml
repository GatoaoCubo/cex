core_integration_options: "| Flag           | Purpose                          | Usage Scenario                          |\
  \ Example Command                          | Notes                                  |\n|----------------|----------------------------------|-----------------------------------------|------------------------------------------|----------------------------------------|\n\
  | `--file`       | Single-file editing              | Code refinement, quick fixes            | `aider --file src/main.py`\
  \               | Maintains context-aware suggestions    |\n| `--read`       | Read-only analysis               | Code review,\
  \ documentation generation   | `aider --read README.md`                 | No file modifications allowed          |\n| `--yes-always`\
  \ | Full autonomy for repetitive tasks | Bulk refactoring, formatting            | `aider --yes-always --file *.py`    \
  \     | Overrides safety checks                |\n| `--subtree-only` | Focus on specific directories  | Large repo navigation\
  \                   | `aider --subtree-only src/services/`     | Limits processing to subdirectory      |\n| `--model` \
  \     | Model parameter override         | Custom model configurations             | `aider --model gpt-4 --file test.py`\
  \     | Takes precedence over Modelfile        |\n\nKey Use Cases  \n- `--file` is optimal for isolated code changes (e.g.,\
  \ fixing a single bug)  \n- `--yes-always` reduces friction in CI/CD pipelines requiring bulk formatting  \n- `--subtree-only`\
  \ improves performance in monorepos with 1000+ files"
git_integration: "--auto-commits  \nEnables semantic commit generation with AI-curated messages. Supports:  \n- Conventional\
  \ Commit format (feat, fix, docs)  \n- Automatic branch naming (`feature/username/commit-summary`)  \n- Commit history pruning\
  \ (via `--prune-commits` flag)  \n\n--commit-language  \nLanguage-specific commit message generation:  \n| Language | Example\
  \ Commit Message                          |  \n|---------|-------------------------------------------------|  \n| English\
  \ | `feat: add user authentication flow`            |  \n| Spanish | `feat: agregar flujo de autenticación de usuario` |\
  \  \n| Portuguese | `feat: adicionar fluxo de autenticação de usuário` |  \n\nAdvanced Configuration  \n- `--commit-template`:\
  \ Custom template for commit messages  \n- `--signoff`: Adds `Signed-off-by` line for DCO compliance"
modelfile_customization: "Parameter Configuration  \n| Parameter         | Default Value | Description                   \
  \           | Example Use Case                     |  \n|-------------------|---------------|------------------------------------------|--------------------------------------|\
  \  \n| `max_tokens`      | 2048          | Controls response length                 | Increase for complex code generation\
  \ |  \n| `temperature`     | 0.7           | Creativity control (0.0-1.0)           | Lower for deterministic output   \
  \    |  \n| `safety_checks`   | enabled       | Enables content filtering                | Disable for experimental workflows\
  \   |  \n| `prompt_template` | default       | Custom prompt structure                  | Tailor for domain-specific tasks\
  \     |  \n\nBest Practices  \n- Store `Modelfile` in `.aider/` directory for project-wide consistency  \n- Use `--model`\
  \ flag to override settings during ad-hoc sessions  \n- Lock model versions with `model_version: \"gpt-4.0\"` for reproducibility"
boundary: This artifact represents distilled, versioned knowledge about Aider CLI integration strategies. It is NOT a configuration
  template, executable script, or instructional guide. Focuses on static patterns, not dynamic workflows.
8f_pipeline_function: "Primary function: INJECT  \nInjects AI-generated code changes into the development pipeline with: \
  \ \n- Context-aware suggestions (via `--file`)  \n- Automated commit generation (`--auto-commits`)  \n- Model parameter\
  \ customization (via `Modelfile`)  \n\nPipeline Stages  \n1. Input: Code file or directory  \n2. Processing: AI analysis\
  \ with context  \n3. Output: Proposed changes with commit message  \n4. Validation: Safety checks and user confirmation\
  \  \n5. Commit: Automatic version control update  \n6. Feedback: Performance metrics logging  \n7. Iteration: Loop for refinement"
