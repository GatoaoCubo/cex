  | `anthropic_api_key` | env_or_vault | `ANTHROPIC_API_KEY` | `90_day_rotate_or_on_exposure` | injected into process env
  | platform_owner |

  | `openai_api_key` | env_or_vault | `OPENAI_API_KEY` | `90_day_rotate_or_on_exposure` | injected into process env | platform_owner
