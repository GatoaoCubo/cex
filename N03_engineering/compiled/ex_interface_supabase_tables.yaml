domain_type_aliases: "// Domain-level aliases for ergonomic usage\nexport type Product       = Database['public']['Tables']['products']['Row'];\n\
  export type ProductInsert = Database['public']['Tables']['products']['Insert'];\nexport type ProductUpdate = Database['public']['Tables']['products']['Update'];\n\
  export type SyncLog       = Database['public']['Tables']['sync_log']['Row'];\nexport type BlingToken    = Database['public']['Tables']['bling_tokens']['Row'];\n\
  export type MeliToken     = Database['public']['Tables']['meli_tokens']['Row'];\n\n// Product image shape (stored as JSONB)\n\
  export interface ProductImage {\n  id:       string;\n  src:      string;\n  alt:      string;\n  position: number;\n}"
typed_client_usage: "import { createClient } from '@supabase/supabase-js';\nimport type { Database } from './types';\n\nconst\
  \ supabase = createClient<Database>(url, key);\n\n// Fully typed: upsert product\nconst { error } = await supabase\n  .from('products')\n\
  \  .upsert({ sku: 'CAT-001', title: 'Ração Premium', price: 49.90, stock: 100, status: 'active' });\n\n// Typed select\n\
  const { data: products } = await supabase\n  .from('products')\n  .select('id, sku, title, stock')\n  .eq('status', 'active');\n\
  // products: Pick<Product, 'id' | 'sku' | 'title' | 'stock'>[]"
regeneration_command: "# After any schema migration, regenerate types\nsupabase gen types typescript --project-id {{BRAND_SUPABASE_PROJECT_REF}}\
  \ \\\n  > src/integrations/supabase/types.ts\n\nAdd to `package.json`:\n{ \"scripts\": { \"gen:types\": \"supabase gen types\
  \ typescript --project-id {{BRAND_SUPABASE_PROJECT_REF}} > src/integrations/supabase/types.ts\" } }"
