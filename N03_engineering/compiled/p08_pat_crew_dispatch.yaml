id: p08_pat_crew_dispatch
kind: pattern
pillar: P08
version: 1.0.0
created: '2026-03-30'
updated: '2026-03-30'
author: pattern-builder
domain: orchestration
quality: null
tags:
- pattern
- crew
- dispatch
- orchestration
- quality-assurance
- multi-agent
tldr: Spawn builder+validator sub-agents in sequence per artifact; orchestrator accepts, revises, or rebuilds based on validator
  result.
name: Crew Dispatch
problem: Whenever a single agent produces and validates an artifact, blind spots in production go undetected in review. This
  recurs on every build where producer and checker are the same entity — systematic gate undercount and false confidence.
solution: "Two-stage crew per artifact:\n\n1. Handoff — orchestrator writes `.cex/runtime/handoffs/{mission}_{artifact}.md`\n\
  2. kind-builder — runs 8F; sets `quality: null`; signals complete\n3. validator — checks H01-H07 + S01-S06; writes verdict\
  \ signal\n4. Route — orchestrator reads verdict:\n\nscore >= 8.0 + hard gates pass  -->  ACCEPT (commit)\nscore 7.0-7.9\
  \ / soft fail      -->  REVISE (max 2)\nhard fail / score < 7.0        -->  REBUILD\n\nhandoff = write_handoff(mission,\
  \ kind, path)\nbuilder = spawn(\"kind-builder\", kind=kind, path=path)\nawait signal(builder, \"complete\")\nvalidator =\
  \ spawn(\"validator\", path=path, kind=kind)\nresult = await signal(validator, \"verdict\")\nif result.score >= 8.0 and\
  \ result.hard_pass:\n    commit(path)\nelif retries < 2:\n    re_dispatch(builder, feedback=result.issues)\nelse:\n    rebuild(kind)\n\
  \nParallel: N crews via `spawn_grid.ps1`; each independent, no shared files."
context:
- CEX orchestration layer (N07 or N03) managing builds via spawn scripts
- Every production build where quality gates are contractual
- Without independent validation, H01-H07 failures reach consumers
forces:
- 'Speed vs independence: single agent is fastest; independent validation adds a spawn cycle'
- 'Autonomy vs coordination: sub-agents run headless; orchestrator must write handoffs, monitor signals, route results'
- 'Sequential vs parallel: builder completes before validator starts; multiple crews run in parallel'
consequences: 'Benefits:

  - Independent gate catches builder blind spots before commit

  - Structured, auditable validator signal

  - Grid dispatch scales throughput with N parallel crews


  Costs:

  - Two spawn cycles per artifact vs single-agent build

  - Orchestrator coordination: handoffs, signals, routing

  - Sequential dependency: validator idles while builder runs'
related_patterns:
- 'Continuous Batching (`p08_pat_continuous_batching`): fills slots as crews complete'
- 'Construction Triad (`p08_pat_construction_triad`): builder applies Template-First inside 8F'
anti_patterns:
- 'Self-validation: builder checks own output — blind spots persist; no independent signal'
- 'Inline review: orchestrator judges directly — no structured checklist; not reproducible'
- 'Skip validator on deadline: hard gate failures enter repo; quality debt compounds'
applicability: Use for every production artifact build. Do NOT use for ephemeral scratch files or rapid prototypes below quality
  threshold.
keywords:
- crew
- dispatch
- builder
- validator
- orchestrator
- handoff
- quality-gate
- spawn
examples:
- 'Single crew: builder produces `pattern` artifact (8F, quality: null); validator returns 8.5, all gates pass; orchestrator
  commits.'
- 'Grid — 6 crews: 6 artifacts via `spawn_grid.ps1`; 12 signals monitored; 5 accepted first pass, 1 revised once.'
variants:
- 'Single-shot: no REVISE loop; validator verdict is final. For batch throughput over polish.'
- 'Async retry queue: validator runs async; failures queue for next orchestrator cycle.'
references:
- '`.claude/rules/n03-8f-enforcement.md` — hard gate definitions'
- '`_spawn/spawn_grid.ps1` — parallel crew launch'
- '`_docs/PLAYBOOK.md` — handoff format and dispatch workflow'
