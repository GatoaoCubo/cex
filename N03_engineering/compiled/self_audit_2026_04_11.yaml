2_rules_compliance: 'Scoring each rule in `.claude/rules/n03-builder.md` 0-10 with file evidence.


  | # | Rule | Score | Evidence |

  |---|------|-------|----------|

  | 1 | 8F mandatory, no exceptions | 9/10 | Every builder has 13 ISOs matching F1-F8 phases. Cannot verify live pipeline
  execution for retroactive artifacts. |

  | 2 | Quality floor 9.0 | 10/10 | No N03 artifact below 9.0. Zero publish-floor violations. |

  | 3 | Complete YAML frontmatter | 9/10 | 55/56 N03 files have frontmatter. `N03_engineering/README.md` lacks a `quality:`
  field. Builder ISO files: 0 missing (doctor). |

  | 4 | `quality: null` NEVER self-score | 2/10 | 46/56 N03 files self-score. Rule file itself (`.claude/rules/n03-builder.md`)
  carries `quality: 9.0`. Most severe rule break in the system. |

  | 5 | Compile after save | 6/10 | Cannot audit retroactively. `_compiled/` has compiled outputs, but not every `.md` maps
  to a corresponding compiled artifact. Infer partial compliance. |

  | 6 | Signal on complete | 7/10 | `.cex/runtime/signals/` has signals from recent dispatches. Cannot verify historical builds.
  Newer runs compliant. |


  Overall rule compliance: 7.2/10. Rule 4 alone drags the average down.

  The fact that the rules file itself violates rule 4 is a self-referential

  failure mode that should be fixed in the same commit that cleans the rest.


  ---'
3_gaps: 'Ranked by priority x effort (both 1-5, higher = worse / more work).


  | # | Gap | Pri | Effort | Notes |

  |---|-----|-----|--------|-------|

  | G1 | 46 self-scored N03 artifacts | 5 | 1 | One sed across `N03_engineering/` setting `quality: null`. |

  | G2 | `.claude/rules/n03-builder.md` self-scored | 5 | 1 | Same fix. Embarrassing but trivial. |

  | G3 | `N03_engineering/README.md` missing `quality` field | 3 | 1 | Add frontmatter block. |

  | G4 | Zero `tpl_{kind}.md` files under `archetypes/builders/` | 3 | 4 | `dispatch-depth.md` refers to `P{xx}/{subdir}/tpl_{kind}.md`
  but the subtree does not exist anywhere. Either retire the reference or build the 123 templates. |

  | G5 | `.claude/agents/validator.md` has no matching builder | 2 | 1 | Likely intentional (validator is a checker, not a
  builder). Document the exception in `n03-builder.md`. |

  | G6 | `.claude/agents/kind-builder.md` meta-agent not in `_builder-builder/` | 2 | 2 | Exists as a dir but is special.
  Mention explicitly in rules. |

  | G7 | No ISO structural drift detector | 4 | 3 | Today the 13-ISO invariant is enforced only by doctor''s "expected 1599"
  total. A single builder could rename files without being flagged. Proposed tool: `cex_iso_lint.py`. |

  | G8 | No diff tool between two builder sets | 3 | 3 | Cannot compare current vs previous builder state during refactors.
  Proposed: `cex_builder_diff.py`. |

  | G9 | No promote pipeline for draft builders | 3 | 4 | New builders live somewhere informal before landing in registry.
  Proposed: `cex_builder_promote.py`. |

  | G10 | `bld_norms.md` sits at `archetypes/builders/bld_norms.md` as a loose file | 2 | 1 | Either move into `_shared/`
  or mark as global norm file in the rules. |

  | G11 | Reports dir did not exist before this file | 1 | 0 | Fixed as side effect of this audit. |

  | G12 | `_shared/` has only 3 skill files (`skill_guided_decisions`, `skill_memory_update`, `skill_verification_protocol`)
  | 2 | 3 | Suspect more shared skills exist across builders but are inlined per-builder. Consolidation opportunity. |


  ---'
