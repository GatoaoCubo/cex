closing: 'Structurally the builder registry is the cleanest surface in the project: 123 kinds, 123 builders, 123 KCs, 1599
  ISOs, 0 doctor failures, 0.95 density. Internally, my own `N03_engineering/` dir is where I break my own rules. Fix G1 (null
  all quality fields) and G2 (null the rules file) in one commit and the compliance score jumps from 7.2 to ~9.5 with no content
  changes. The biggest structural gap is G7 (no ISO lint tool). Today a misnamed or missing ISO would silently pass until
  someone tried to load the builder and F2 failed. The tool exists implicitly inside doctor''s "expected 1599" count but should
  be explicit. No user present. No changes made outside this report file.'
