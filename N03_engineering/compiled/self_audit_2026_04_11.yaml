5b_tools_that_should_exist_but_don_t: '| Tool | Purpose | Owner |

  |------|---------|-------|

  | `cex_iso_lint.py` | Enforce the 13-ISO contract: every `{kind}-builder/` has exactly the expected 13 filenames, frontmatter,
  and max-bytes. Fails CI on drift. | N05 |

  | `cex_builder_diff.py` | Compare two builder ISO sets (git rev A vs rev B, or filesystem vs registry). Report structural
