id: ex_oauth_app_config_bling
kind: oauth_app_config
pillar: P09
title: Bling ERP OAuth 2.0 App Configuration
version: 0.1.0
quality: null
status: template
brand_placeholders:
- BRAND_BLING_CLIENT_ID
- BRAND_BLING_CLIENT_SECRET
- BRAND_SUPABASE_PROJECT_REF
tags:
- commerce
- template
- distillation
- bling
- erp
- oauth
purpose: OAuth 2.0 configuration for Bling ERP API v3 — defines the authorization code flow, token storage schema, and proactive
  refresh strategy for maintaining a valid access token against `{{BRAND_BLING_CLIENT_ID}}`.
when_to_use:
- Initializing Bling ERP integration for the first time (one-time authorization).
- Documenting the token lifecycle for security audits.
- Implementing the token refresh scheduler as a Supabase cron.
app_registration:
- Navigate to `https://developer.bling.com.br` → Applications → New App.
- 'Set Redirect URI: `https://{{BRAND_SUPABASE_PROJECT_REF}}.supabase.co/functions/v1/bling-oauth-callback`.'
- Copy `client_id` and `client_secret`.
- 'Store as Supabase secrets:'
oauth_2_0_parameters: '| Parameter | Value |

  |-----------|-------|

  | Authorization endpoint | `https://www.bling.com.br/Api/v3/oauth/authorize` |

  | Token endpoint | `https://www.bling.com.br/Api/v3/oauth/token` |

  | Grant type | `authorization_code` |

  | Response type | `code` |

  | Token TTL (access) | ~3600 seconds |

  | Token TTL (refresh) | ~180 days |

  | Redirect URI | `https://{{BRAND_SUPABASE_PROJECT_REF}}.supabase.co/functions/v1/bling-oauth-callback` |'
token_storage_schema: "create table bling_tokens (\n  id          uuid primary key default gen_random_uuid(),\n  access_token\
  \  text not null,\n  refresh_token text not null,\n  expires_at    timestamptz not null,\n  scope         text,\n  created_at\
  \    timestamptz default now(),\n  updated_at    timestamptz default now()\n);\n-- Only one row expected; use upsert on\
  \ id = fixed UUID constant."
token_refresh_strategy: "Access tokens expire in ~60 minutes. Proactive refresh at 50-minute intervals via Supabase `pg_cron`:\n\
  \nselect cron.schedule(\n  'bling-token-refresh',\n  '/50    *',\n  $$\n    select net.http_post(\n      url := 'https://{{BRAND_SUPABASE_PROJECT_REF}}.supabase.co/functions/v1/token-auto-refresh',\n\
  \      headers := jsonb_build_object('Authorization', 'Bearer ' || current_setting('app.service_key'))\n    );\n  $$\n);"
refresh_token_request: 'POST https://www.bling.com.br/Api/v3/oauth/token

  Content-Type: application/x-www-form-urlencoded


  grant_type=refresh_token

  &refresh_token={STORED_REFRESH_TOKEN}

  &client_id={BLING_CLIENT_ID}

  &client_secret={BLING_CLIENT_SECRET}'
interface: '| Input | Type | Description |

  |-------|------|-------------|

  | `BLING_CLIENT_ID` | env secret | OAuth app client ID |

  | `BLING_CLIENT_SECRET` | env secret | OAuth app client secret |

  | Authorization code | URL param | Short-lived code from OAuth redirect |


  | Output | Description |

  |--------|-------------|

  | `access_token` | Bearer token for API v3 calls |

  | `refresh_token` | Long-lived token for refresh flow |

  | `expires_in` | Seconds until access token expiry |'
brand_variables_used: '| Variable | Purpose |

  |----------|---------|

  | `{{BRAND_BLING_CLIENT_ID}}` | Bling OAuth app client ID env name |

  | `{{BRAND_BLING_CLIENT_SECRET}}` | Bling OAuth app client secret env name |

  | `{{BRAND_SUPABASE_PROJECT_REF}}` | Supabase project for callback URL |'
related_artifacts: '| Artifact | Kind | Role |

