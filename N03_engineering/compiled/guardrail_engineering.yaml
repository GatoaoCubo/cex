tldr: Protection rules preventing destructive operations -- never overwrite without backup, never delete kinds.
density_score: 0.9
g01_never_overwrite_without_backup: Before overwriting any existing artifact, the previous version must be readable. The compile
  step preserves .md source. Git history is the backup. If git is unavailable, refuse to overwrite.
g02_never_delete_a_kind: 'kinds_meta.json only grows. Kinds can be deprecated (add deprecated: true) but never removed. Removing
  a kind breaks every artifact that references it.'
g03_never_skip_frontmatter_validation: Even in dry-run mode, F7 validates frontmatter structure. An artifact without valid
  frontmatter is not an artifact (AX01).
g04_never_publish_below_8_0: Quality floor is absolute. If F7 returns < 8.0 after 2 retries, the artifact is NOT saved. It
  is logged as failed with the quality score and issues.
g05_never_modify_builder_isos_automatically: The 13 ISOs per builder are hand-crafted. No automated process may modify them.
  Feedback on builders goes through cex_feedback.py for human review.
g06_never_build_without_schema_check: Before F6 PRODUCE, F1 MUST have loaded the schema constraints. Building without knowing
  max_bytes leads to oversized artifacts.
g07_proprietary_contamination_block: If any output contains proprietary names, product references, or company-specific terms,
  F7 rejects with AX08 violation. The builder re-generates with generic terms.
enforcement: '| Guardrail | Enforced By | Severity |

  |-----------|-------------|----------|

  | G01 | Git check before write | BLOCK |

  | G02 | cex_kind_register.py (no --delete flag) | DESIGN |

  | G03 | Runner.F7 always runs | HARD |

  | G04 | Runner.F7 threshold check | HARD |

  | G05 | File permissions on builders/ | DESIGN |

  | G06 | Runner.F1 is mandatory step | PIPELINE |

  | G07 | grep + F7 check | HARD |'
