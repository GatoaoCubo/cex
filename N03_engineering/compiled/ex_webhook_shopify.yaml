purpose: Inbound webhook handler for Shopify store events â€” validates HMAC-SHA256 signatures and processes `products/update`,
  `products/create`, `products/delete`, and `inventory_levels/update` payloads into the Supabase `products` table.
when_to_use:
- Receiving real-time product change events from Shopify without polling.
- Keeping Supabase product data in sync within seconds of a Shopify admin action.
- Triggering downstream workflows (inventory reconciliation, SEO generation) on product events.
events: '| Event Topic | Trigger Condition | Payload Fields |

  |-------------|------------------|----------------|

  | `products/update` | Any product field changed in Shopify admin | `id`, `title`, `handle`, `variants`, `images`, `status`
  |

  | `products/create` | New product published in Shopify | Same as update |

  | `products/delete` | Product deleted from Shopify | `id` only |

  | `inventory_levels/update` | Inventory quantity changed at any location | `inventory_item_id`, `location_id`, `available`
  |'
verification: "| Field | Value |\n|-------|-------|\n| Method | `HMAC-SHA256` |\n| Header | `X-Shopify-Hmac-Sha256` (base64-encoded)\
  \ |\n| Secret env | `{{BRAND_SHOPIFY_WEBHOOK_SECRET}}` |\n| Algorithm | `HMAC(secret, rawBody, SHA256)` â†’ base64 â†’ compare\
  \ constant-time |\n\nasync function verifyShopifyHmac(req: Request, secret: string): Promise<boolean> {\n  const hmacHeader\
  \ = req.headers.get('X-Shopify-Hmac-Sha256') ?? '';\n  const body = await req.arrayBuffer();\n  const key = await crypto.subtle.importKey('raw',\
  \ new TextEncoder().encode(secret), { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']);\n  const sig = await crypto.subtle.sign('HMAC',\
  \ key, body);\n  const computed = btoa(String.fromCharCode(...new Uint8Array(sig)));\n  return computed === hmacHeader;\
  \ // timing-safe comparison recommended\n}\n\nNever process a webhook that fails HMAC validation. Return `401` immediately."
retry_and_delivery: "| Field | Value |\n|-------|-------|\n| Direction | Inbound |\n| Delivery guarantee | At-least-once (Shopify\
  \ retries for 48h on non-2xx) |\n| Idempotency key | `X-Shopify-Webhook-Id` header |\n| Timeout (your endpoint) | Must respond\
  \ within 5 seconds; heavy work goes async |\n| Retry schedule | Shopify: 19 attempts over 48h (exponential) |\n\nPattern:\
  \ validate â†’ acknowledge (200) â†’ process async.\n\n// Acknowledge immediately, process in background\nDeno.serve(async (req)\
  \ => {\n  const verified = await verifyShopifyHmac(req.clone(), Deno.env.get('SHOPIFY_WEBHOOK_SECRET')!);\n  if (!verified)\
  \ return new Response('Unauthorized', { status: 401 });\n  const topic = req.headers.get('X-Shopify-Topic') ?? '';\n  const\
  \ id = req.headers.get('X-Shopify-Webhook-Id') ?? '';\n  // Idempotency: check if id already processed\n  EdgeRuntime.waitUntil(processEvent(topic,\
  \ await req.json(), id));\n  return new Response('OK', { status: 200 });\n});"
interface: '| Input | Type | Description |

  |-------|------|-------------|

  | `X-Shopify-Hmac-Sha256` | header | HMAC-SHA256 signature (base64) |

  | `X-Shopify-Topic` | header | Event topic string |

  | `X-Shopify-Webhook-Id` | header | Unique delivery ID for idempotency |

  | Request body | JSON | Event payload |


  | Output | Description |

  |--------|-------------|

  | `200 OK` | Accepted (always if verified) |

  | `401` | HMAC verification failed |

  | Supabase upsert | Product row updated/inserted/deleted |'
