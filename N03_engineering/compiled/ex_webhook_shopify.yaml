  |----------|---------|

  | `{{BRAND_SHOPIFY_DOMAIN}}` | Source store domain |

  | `{{BRAND_SHOPIFY_WEBHOOK_SECRET}}` | HMAC validation secret (env name) |

  | `{{BRAND_SUPABASE_PROJECT_REF}}` | Target Supabase project |'
example_webhook_registration: "curl -X POST \\\n  https://{{BRAND_SHOPIFY_DOMAIN}}/admin/api/2024-01/webhooks.json \\\n  -H\
  \ \"X-Shopify-Access-Token: $SHOPIFY_ADMIN_TOKEN\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\n    \"webhook\"\
  : {\n      \"topic\": \"products/update\",\n      \"address\": \"https://{{BRAND_SUPABASE_PROJECT_REF}}.supabase.co/functions/v1/shopify-webhook-handler\"\
  ,\n      \"format\": \"json\"\n    }\n  }'"
