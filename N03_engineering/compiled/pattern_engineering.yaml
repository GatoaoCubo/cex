p1_direct_build_single_kind: 'Most common. One intent, one kind, one artifact. Intent > Motor > Kind > 8F Pipeline > Artifact
  When: explicit kind request, examples available. Model: sonnet default. Time: 10-60s.'
p2_crew_composition_multi_kind: 'Intent requires multiple related artifacts in dependency order. Intent > Motor > [Kind1,
  Kind2, Kind3] > Select crew > Build sequentially When: build agent end-to-end (agent + SP + boot_config + ...). Model: opus.
  Time: 2-10 min.'
p3_nucleus_bootstrap_full_n0x: 'Build entire nucleus with 7+ core artifacts. Seed > cex_nucleus_builder.py > agent_card >
  agent > SP > ... Each artifact gets context from previously built ones. Model: opus + xthinking. Time: 10-30 min.'
selection: '| Intent Signal | Pattern |

  |---------------|---------|

  | create a {{kind}} | P1 Direct |

  | build {{thing}} with {{deps}} | P2 Crew |

  | scaffold nucleus N0x | P3 Bootstrap |

  | ambiguous | P1 via Motor |'
