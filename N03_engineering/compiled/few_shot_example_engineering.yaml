tldr: 3 golden artifact patterns the builder learns from -- agent, KC, workflow.
density_score: 0.85
pattern_1_agent_quality_9_5: 'Why golden: Complete frontmatter, all sections filled, boundaries table, immediately usable.
  Frontmatter pattern: id=p02_agent_{{name}}, kind=agent, pillar=P02 capabilities_count and tools_count are ACTUAL counts,
  never placeholders. tldr is one sentence telling exactly what this agent does. Body: Identity > Capabilities (numbered)
  > Tools (table) > Routing > Boundaries (Does/NOT table) > Crew Role'
pattern_2_knowledge_card_quality_9_3: 'Why golden: Dense, searchable, no filler, spec block with actual constraints. Frontmatter:
  when_to_use and keywords fields are critical for discoverability. feeds_kinds lists which artifact kinds consume this KC.
  Body: Spec (yaml) > Definition > When to Use > Boundaries > Relations > Anti-Patterns'
pattern_3_workflow_quality_9_1: 'Why golden: Every step has agent, input, output, signal, depends_on. steps_count is actual
  count. execution is sequential/parallel/mixed. signals lists ALL signals emitted across all steps. Body: Purpose > Steps
  (Agent/Input/Output/Signal/Depends each) > Quality Gates > Signals'
what_makes_golden:
- ZERO placeholder values in frontmatter (no null, no TBD)
- Every section has 3+ lines of substantive content
- Tables have real data, not example rows
- Density >= 0.90
- Compiles to valid YAML without warnings
