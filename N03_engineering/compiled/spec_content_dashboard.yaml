tldr: Next.js admin page spec for managing 96 content items across 13 weeks. Calendar view, pipeline kanban, pillar mix analytics,
  quality gates, and publish tracking.
density_score: 0.92
purpose: 'Specifies the `/admin/content` page for the `gato-cubo-commerce` Next.js application. This dashboard is the operational
  control center for the GATO3 content pipeline -- where the admin reviews, schedules, and tracks all 96 content items (70
  Instagram + 26 blog posts) across the 13-week Q2 editorial calendar. Designed for the semi-automated workflow (DP8): content
  is created by CEX nuclei, seeded into Supabase by `seed_content_pipeline.py`, managed via this dashboard, and published
  manually to platforms.'
target_stack: '| Layer | Technology |

  |-------|-----------|

  | Framework | Next.js (existing commerce app) |

  | UI | shadcn/ui + Tailwind CSS |

  | Data | Supabase (fuuguegkqnpzrrhwymgw) |

  | Auth | Supabase Auth (authenticated role) |

  | State | React Query (TanStack Query) for server state |

  | Route | `/admin/content` (protected, authenticated only) |'
data_sources: 'All data comes from 4 Supabase tables created by `20260410220003_content_pipeline_clean.sql`:


  | Table | Purpose | Key columns |

  |-------|---------|-------------|

  | `content_items` | Core content | id, title, slug, content_type, category, status, body_markdown, caption, hashtags, scheduled_date,
  published_url |

  | `content_schedule` | Per-platform scheduling | id, content_item_id, scheduled_date, scheduled_time, platform, status |

  | `content_media` | Attached assets | id, content_item_id, media_type, storage_path, external_url |

  | `content_sources` | Reference sources | id, title, url, source_type |'
