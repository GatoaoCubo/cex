content_card_component: 'Each card in the calendar displays:


  | Field | Source | Display |

  |-------|--------|---------|

  | Platform badge | content_type | Color-coded: IG-FEED (blue), IG-REEL (purple), IG-STORY (orange), BLOG (green) |

  | Format | content_type | Carrossel, Reel, Single, Story, Blog |

  | Category | category | Tag with pillar color |

  | Title | title | Truncated to 2 lines |

  | Time | content_schedule.scheduled_time | HH:MM format |

  | Status | status | Badge: draft (gray), ready (yellow), scheduled (blue), published (green) |

  | Media indicator | content_media join | Camera icon if media attached, empty circle if not |

  | Product refs | product_refs | Small product tag(s) |'
card_actions_on_click_expand: '| Action | Effect | API call |

  |--------|--------|----------|

  | View details | Opens detail drawer | GET content_items?id=eq.{id} |

  | Edit status | Status dropdown | PATCH content_items {status} |

  | Reschedule | Date picker | PATCH content_schedule {scheduled_date, scheduled_time} |

  | Copy caption | Copies caption + hashtags to clipboard | Client-side |

  | Mark published | Sets published_at + URL input | PATCH content_items + content_schedule |

  | Skip | Marks as skipped | PATCH content_schedule {status: ''skipped''} |'
calendar_filters: '| Filter | Options | Default |

  |--------|---------|---------|

  | Platform | All, Instagram, Blog | All |

  | Category | All, Educativo, Meme/Humor, Produto, Seasonal | All |

  | Status | All, Draft, Ready, Scheduled, Published | All |

  | Week | 1-13 | Current week |'
tab_2_pipeline_view_kanban:
- Drag-and-drop to change status (draft -> ready -> scheduled)
- Published column shows published_url as link
- Cards are the same component as Calendar view (compact variant)
- 'Filter bar: same filters as Calendar + search by title'
pipeline_queries: "-- Draft items needing review\nSELECT * FROM content_items WHERE status = 'draft'\n  ORDER BY scheduled_date\
  \ ASC;\n\n-- This week's scheduled items\nSELECT ci.*, cs.scheduled_time, cs.platform\nFROM content_items ci\nJOIN content_schedule\
  \ cs ON cs.content_item_id = ci.id\nWHERE cs.scheduled_date BETWEEN current_date AND current_date + 7\n  AND cs.status =\
  \ 'pending'\nORDER BY cs.scheduled_date, cs.scheduled_time;\n\n-- Publishing velocity (items published per week)\nSELECT\
  \ date_trunc('week', published_at) AS week,\n       count(*) AS published_count\nFROM content_items WHERE status = 'published'\n\
  GROUP BY 1 ORDER BY 1;"
tab_3_analytics_view: ''
summary_cards_top_row: '| Card | Query | Display |

  |------|-------|---------|

  | Total items | COUNT(*) FROM content_items | Number + progress bar (vs 96 target) |

  | Published | COUNT(*) WHERE status=''published'' | Number + % of total |

  | This week | COUNT(*) WHERE scheduled_date in current week | Number + daily breakdown |

  | Avg quality | Not in DB yet (future: quality_score column) | Placeholder for rubric integration |'
pillar_mix_chart: "Pie/donut chart showing category distribution:\n\n| Category | Target % | Color |\n|----------|----------|-------|\n\
  | Educativo | 40% | #2563EB (blue) |\n| Meme/Humor | 30% | #7C3AED (purple) |\n| Produto | 20% | #059669 (green) |\n| Seasonal\
  \ | 10% | #D97706 (amber) |\n\nSELECT category, count(*) AS total,\n       count(*) FILTER (WHERE status = 'published')\
  \ AS published\nFROM content_items\nGROUP BY category;\n\nDisplay: dual ring -- outer = total, inner = published. Shows\
  \ deviation from target."
content_type_distribution: 'Bar chart:


  SELECT content_type, count(*) AS total

  FROM content_items

  GROUP BY content_type

  ORDER BY total DESC;'
publishing_timeline: "Line chart showing cumulative published items over 13-week horizon:\n\nSELECT cs.scheduled_date, count(*)\
  \ AS scheduled,\n       count(*) FILTER (WHERE cs.status = 'published') AS published\nFROM content_schedule cs\nGROUP BY\
  \ cs.scheduled_date\nORDER BY cs.scheduled_date;\n\nX-axis: dates (Apr 15 - Jul 15), Y-axis: cumulative count.\nTwo lines:\
  \ planned (total scheduled) vs actual (published)."
product_integration_heatmap: "Table showing which products appear most frequently in content:\n\nSELECT unnest(product_refs)\
  \ AS product, count(*) AS mentions,\n       count(*) FILTER (WHERE status = 'published') AS published_mentions\nFROM content_items\n\
  WHERE product_refs IS NOT NULL\nGROUP BY 1\nORDER BY mentions DESC;"
tab_4_settings: '| Setting | Action | Implementation |

  |---------|--------|----------------|

  | Re-seed | Run seed script against current markdown files | API route calls seed_content_pipeline.py |

  | Export calendar | Download current schedule as CSV | Client-side CSV from Supabase query |

  | Sync check | Compare markdown files vs DB items | Diff slug lists, show additions/removals |

  | Clear and re-seed | Drop all items and re-insert | Confirmation modal, then clear + seed |'
