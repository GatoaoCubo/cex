tldr: 'Golden output tests for N03''s primary builders. Each test case defines: input intent, expected kind, expected frontmatter
  fields, structural assertions, and forbidden patterns. Run before any builder ISO update.'
density_score: 0.91
purpose: Golden tests capture the EXPECTED output of N03's builders. When a builder ISO is updated, golden tests detect unintended
  regressions. These are NOT unit tests -- they test end-to-end builder output shape, not logic.
test_execution: 'python _tools/cex_system_test.py --golden --nucleus n03

  # Or specific kind:

  python _tools/cex_system_test.py --golden --kind input_schema


  Pass condition: all assertions match for every test case.

  Fail condition: any assertion fails OR frontmatter field missing.

  Regression: test that previously passed now fails.'
golden_test_format: "Each test case:\ntest_id: gt_n03_{kind}_{variant}\nkind: string                    # target kind\nintent:\
  \ string                  # input to builder\nexpected:\n  frontmatter:\n    kind: string                # must match exactly\n\
  \    pillar: string              # must match exactly\n    quality: null               # always null\n    density_score:\
  \ \">= 0.85\"    # numeric assertion\n  body:\n    min_sections: integer       # H2 count minimum\n    must_contain: string[]\
  \      # required strings in body\n    must_not_contain: string[]  # forbidden patterns\n    density_floor: 0.80\n  compile:\n\
  \    exit_code: 0                # cex_compile.py must succeed"
test_cases: ''
