updated: '2026-04-17'
purpose: OAuth 2.0 app configuration for Shopify Admin API access — defines scopes, token storage, and the authorization flow
  for connecting `{{BRAND_SHOPIFY_DOMAIN}}` to backend services.
when_to_use:
- First-time Shopify app installation requiring merchant authorization.
- Rotating Admin API tokens without re-installing the app.
- Documenting required OAuth scopes for security reviews and onboarding.
app_configuration: '| Field | Value |

  |-------|-------|

  | App type | Custom app (private) |

  | API access | Admin API |

  | Auth method | Custom app token (not OAuth code flow for private apps) |

  | Token storage | Supabase secrets / `.env` |

  | Token rotation | Manual (Shopify does not auto-rotate custom app tokens) |


  > Note: For public Shopify apps (multi-merchant), use the full OAuth 2.0 authorization code flow below. For single-store
  private apps, skip to Token Storage.'
oauth_2_0_flow_public_apps: "1. Redirect merchant to:\n   https://{{BRAND_SHOPIFY_DOMAIN}}/admin/oauth/authorize\n     ?client_id={SHOPIFY_CLIENT_ID}\n\
  \     &scope={SCOPES}\n     &redirect_uri={REDIRECT_URI}\n     &state={NONCE}\n\n2. Merchant approves → Shopify redirects\
  \ to REDIRECT_URI with ?code=...&state=...\n\n3. Validate state == nonce (CSRF check).\n\n4. Exchange code for access token:\n\
  \   POST https://{{BRAND_SHOPIFY_DOMAIN}}/admin/oauth/access_token\n   Body: { client_id, client_secret, code }\n   Response:\
  \ { access_token, scope }\n\n5. Store access_token in Supabase secrets."
required_oauth_scopes: '| Scope | Permission |

  |-------|-----------|

  | `read_products` | Read product catalog |

  | `write_products` | Create/update products |

  | `read_inventory` | Read inventory levels |

  | `write_inventory` | Update inventory quantities |

  | `read_orders` | Read order data (optional, for reporting) |


  Minimum required: `read_products, write_products, read_inventory, write_inventory`.'
token_storage: '| Token | Env Var | Storage |

  |-------|---------|---------|

  | Admin API token | `SHOPIFY_ADMIN_TOKEN` | Supabase Edge secrets |

  | Client ID | `SHOPIFY_CLIENT_ID` | Supabase Edge secrets |

  | Client secret | `SHOPIFY_CLIENT_SECRET` | Supabase Edge secrets |


  supabase secrets set SHOPIFY_ADMIN_TOKEN=shpat_...

  supabase secrets set SHOPIFY_CLIENT_ID=...

  supabase secrets set SHOPIFY_CLIENT_SECRET=...'
interface: '| Input | Type | Description |

  |-------|------|-------------|

  | `SHOPIFY_ADMIN_TOKEN` | env secret | Custom app Admin API token |

  | `SHOPIFY_CLIENT_ID` | env secret | OAuth app client ID |

  | `SHOPIFY_CLIENT_SECRET` | env secret | OAuth app client secret |


  | Output | Description |

  |--------|-------------|

  | Authenticated Shopify API calls | Via `X-Shopify-Access-Token` header |

  | Merchant authorization | Completed OAuth flow |'
brand_variables_used: '| Variable | Purpose |

  |----------|---------|

  | `{{BRAND_SHOPIFY_DOMAIN}}` | Store''s myshopify.com domain |

  | `{{BRAND_SHOPIFY_API_VERSION}}` | Admin API version string |'
example_usage: "// Shopify authenticated request\nconst shopifyFetch = (path: string, opts: RequestInit = {}) =>\n  fetch(\n\
  \    `https://${Deno.env.get('SHOPIFY_STORE_DOMAIN')}/admin/api/${Deno.env.get('SHOPIFY_API_VERSION')}${path}`,\n    {\n\
  \      ...opts,\n      headers: {\n        'X-Shopify-Access-Token': Deno.env.get('SHOPIFY_ADMIN_TOKEN')!,\n        'Content-Type':\
  \ 'application/json',\n        ...(opts.headers ?? {}),\n      },\n    }\n  );"
