purpose: Routing rules that determine which marketplace each product sync operation targets — controls conditional dispatch
  to Shopify, Bling ERP, and Mercado Livre based on product attributes, sync mode, and marketplace availability.
when_to_use:
- Routing product updates to the correct marketplace(s) without hardcoded if-else logic.
- Skipping marketplaces that are not enabled for a specific product category or brand.
- Implementing marketplace-specific field filtering before dispatch.
rule_set: ''
rule_1_route_by_product_status: '| Product Status | Shopify | Bling | Mercado Livre |

  |---------------|---------|-------|---------------|

  | `active` | YES | YES | optional |

  | `draft` | NO | YES (internal) | NO |

  | `archived` | NO (delete) | NO | NO |'
rule_2_route_by_sync_mode: '| Sync Mode | Shopify | Bling | Mercado Livre |

  |-----------|---------|-------|---------------|

  | `pull` | source | NO | enrichment only |

  | `push` | target | target | NO |

  | `bidirectional` | source + target | target | enrichment |

  | `single` | target | target | enrichment |'
rule_3_route_by_product_category: '| Category | Shopify | Bling | Mercado Livre |

  |----------|---------|-------|---------------|

  | `pet_food` | YES | YES | YES |

  | `accessories` | YES | YES | YES |

  | `digital` | YES | NO (NF-e not applicable) | NO |

  | `B2B_only` | NO | YES | NO |'
rule_4_route_by_field_changed: '| Changed Field | Shopify | Bling | Notes |

  |--------------|---------|-------|-------|

  | `title` | YES | YES | SEO + catalog label |

  | `price` | YES | YES | Both require price sync |

  | `stock` | NO | YES | Shopify uses inventory_levels API separately |

  | `description` | YES | NO | Bling descriptions are set at creation only |

  | `images` | YES | NO | Bling does not manage images via API |

  | `status` | YES | YES | Publish/unpublish controls |'
dispatch_logic_pseudocode: "function getTargets(product: Product, mode: SyncMode, changedFields: string[]): Marketplace[]\
  \ {\n  const targets: Marketplace[] = [];\n\n  if (product.status === 'archived') return [];\n\n  // Shopify\n  if (mode\
  \ !== 'pull' && product.status === 'active') {\n    if (product.category !== 'B2B_only' && product.category !== 'digital')\
  \ {\n      if (changedFields.some(f => ['title', 'price', 'description', 'images', 'status'].includes(f))) {\n        targets.push('shopify');\n\
  \      }\n    }\n  }\n\n  // Bling\n  if (['push', 'bidirectional', 'single'].includes(mode) && product.category !== 'digital')\
  \ {\n    if (changedFields.some(f => ['title', 'price', 'stock', 'status'].includes(f))) {\n      targets.push('bling');\n\
  \    }\n  }\n\n  // Mercado Livre (enrichment only — no push)\n  if (mode === 'pull' || mode === 'bidirectional') {\n  \
  \  if (product.meli_id || product.ean) {\n      targets.push('meli_enrich');\n    }\n  }\n\n  return targets;\n}"
priority_order_on_conflict: '| Priority | Marketplace | Rationale |

  |----------|-------------|-----------|

  | 1 | Supabase | Internal source of truth |

  | 2 | Shopify | Customer-facing; freshness critical |

  | 3 | Bling | ERP sync; can lag by minutes |

  | 4 | Mercado Livre | Read-only enrichment; no write authority |'
interface: '| Input | Type | Description |

  |-------|------|-------------|

  | `product` | Product object | Full product with all fields |

  | `mode` | enum | Current sync mode |

  | `changed_fields` | string[] | Which fields changed |


  | Output | Type | Description |

  |--------|------|-------------|

  | `targets` | Marketplace[] | Ordered list of dispatch targets |

  | `skip_reason` | string? | Why a marketplace was skipped |'
brand_variables_used: '| Variable | Purpose |

  |----------|---------|

  | `{{BRAND_SHOPIFY_DOMAIN}}` | Shopify target store |

  | `{{BRAND_VERTICAL}}` | Drives category rules (ecommerce vs edtech) |'
