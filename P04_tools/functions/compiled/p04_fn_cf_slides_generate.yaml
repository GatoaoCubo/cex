id: p04_fn_cf_slides_generate
kind: function_def
pillar: P04
version: 1.0.0
created: 2026-04-06
updated: 2026-04-06
author: builder_agent
name: generate_slides
description: Generate a slide presentation from Markdown using Marp. Call when the Content Factory needs PPTX, PDF, or HTML
  slides from structured Markdown content with speaker notes and visual themes.
parameters: ''
returns: 'Type: object with `output_path`, `slide_count`, `file_size_bytes`, `format`.'
provider_compat:
- openai
- anthropic
- gemini
strict: false
domain: content_factory
quality: null
tags:
- function_def
- marp
- slides
- presentation
- pptx
- content_factory
tldr: LLM-callable function to generate PPTX/PDF/HTML slides from Marp Markdown via CLI
examples: ''
error_types:
- input_not_found
- marp_not_installed
- invalid_markdown
- theme_not_found
density_score: 0.99
overview: Generates slide presentations from Marp-formatted Markdown. The LLM calls this when the Content Factory pipeline
  has structured slide content (from `p03_pt_cf_slide_deck` template) and needs it compiled into deliverable PPTX, PDF, or
  HTML format. Marp handles theming, pagination, and speaker notes.
input_path: 'Type: string | Required: yes

  Path to a Marp-compatible Markdown file. Must use `---` as slide separators and `<!-- -->` for speaker notes.'
output_path: 'Type: string | Required: yes

  Destination for generated file. Extension should match format.'
format: 'Type: string (enum) | Required: yes

  - `pptx`: Editable PowerPoint — best for client delivery

  - `pdf`: Fixed layout — best for distribution and printing

  - `html`: Interactive — best for web embedding and live presentations'
theme: 'Type: string | Required: no | Default: default

  Marp built-in theme (`default`, `gaia`, `uncover`) or path to custom CSS.'
width_height: 'Type: integer | Required: no | Default: 1280x720

  Slide dimensions in pixels. Common: 1280x720 (16:9), 1920x1080 (HD), 960x720 (4:3).'
paginate: 'Type: boolean | Required: no | Default: true

  Show slide numbers. Disable for title slides and social content.'
cli_command: marp --theme {theme} --{format} --allow-local-files -o {output_path} {input_path}
example_1_course_module_slides_to_pptx: '{"input_path": "slides/ai_agents_m3.md", "output_path": "output/ai_agents_m3.pptx",
  "format": "pptx", "theme": "themes/brand-dark.css", "paginate": true}'
example_2_pitch_deck_to_pdf: '{"input_path": "slides/pitch_series_a.md", "output_path": "output/pitch.pdf", "format": "pdf",
  "theme": "gaia", "width": 1920, "height": 1080}'
