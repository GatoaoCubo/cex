tldr: Browser toolkit — 5 tools (screenshot, navigate, click, fill_form, extract_text) for web automation via Chrome MCP.
  Confirmation required for mutations.
when_to_use: Agents that need to interact with web pages for research, testing, or data extraction
keywords:
- toolkit
- browser
- chrome
- MCP
- web
- automation
- screenshot
density_score: null
tools: '| Tool | Type | Input | Output | Confirmation |

  |------|------|-------|--------|-------------|

  | screenshot | read | url or current tab | PNG image | no |

  | navigate | write | url | page_loaded status | yes |

  | click | write | selector | element state | yes |

  | fill_form | write | selector, value | filled status | yes |

  | extract_text | read | selector (optional) | text content | no |'
permissions: '| Permission Level | Tools | Rationale |

  |-----------------|-------|-----------|

  | Auto-approve | screenshot, extract_text | Read-only, no side effects |

  | Confirm once | navigate | URL change is reversible |

  | Confirm each | click, fill_form | Mutations may submit forms or trigger actions |'
denied_nuclei: '| Nucleus | Reason |

  |---------|--------|

  | N04 (Knowledge) | Knowledge management uses RAG, not browsers |

  | N06 (Commercial) | Commercial analysis uses structured data, not scraping |'
mcp_server_config: "server: chrome-mcp\ntransport: stdio\ncommand: npx\nargs: [\"-y\", \"@anthropic/chrome-mcp\"]\ncapabilities:\n\
  \  - screenshot\n  - navigate\n  - click\n  - fill_form\n  - extract_text"
example_usage: "Agent: N01 (Research)\nTask: \"Extract pricing from competitor landing page\"\nTools used:\n  1. navigate(\"\
  https://competitor.com/pricing\")\n  2. screenshot() → verify page loaded\n  3. extract_text(\".pricing-table\") → structured\
  \ pricing data"
composition: '| Toolkit | Pairs With | Pattern |

  |---------|-----------|---------|

  | browser_tools | search_tools | Search → navigate → extract |

  | browser_tools | file_ops | Extract → save to file |

  | browser_tools | data_tools | Extract → parse → analyze |'
boundary: 'toolkit IS: a bundled collection of related tools with permissions, denials, and MCP config. toolkit IS NOT: a
  tool definition (single tool spec), a permission rule (access control), or an agent (tool user).'
