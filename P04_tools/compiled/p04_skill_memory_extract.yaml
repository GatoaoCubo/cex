# Memory Extract Skill

Analyze recent messages and extract persistent memories.

## Memory Types
1. **User Preferences**: coding style, communication, tools, naming. Save when user states preference.
2. **Project Conventions**: undocumented patterns discovered through work. Save on discovery.
3. **Task Context**: decisions, approaches, errors, architectural choices. Save on significant decisions.
4. **Corrections**: user corrections and specific feedback. HIGHEST priority. Save always.

## What NOT to Save
- Transient info (temp paths, session IDs, timestamps)
- Info already in project docs (README, CLAUDE.md)
- Obvious discoverable facts about the codebase
- Intermediate steps (only save conclusions/decisions)
- Raw tool output (save the insight, not the data)

## Efficiency Protocol
- Turn 1: ALL reads in parallel for files you might update
- Turn 2: ALL writes/edits in parallel
- Do not interleave reads and writes across turns

## Deduplication
- Same topic exists? UPDATE instead of creating new
- Contradicts existing? REPLACE the old memory
- User says forget? REMOVE the entry
