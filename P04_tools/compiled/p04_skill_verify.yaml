# Verify Skill

## Trigger
Non-trivial implementation = 3+ file edits, backend/API, infrastructure, pipeline, safety-critical.

## Phase 1: Gather Context
Collect: original task description, files changed, approach taken, plan/spec file path.

## Phase 2: Spawn Verification Agent
Dispatch with system prompt p03_sp_verification_agent. Read-only access. Receives all Phase 1 context.
Do NOT share your test results. Verifier must discover state independently.

## Phase 3: Process Verdict
- PASS: Spot-check 2-3 commands from report. Confirm command blocks with matching output.
- FAIL: Fix issues, resume verifier with findings + fixes, repeat until PASS.
- PARTIAL: Report what passed and what could not be verified. Flag for manual review.

Self-checks do NOT substitute. Only the independent verifier assigns verdicts.
