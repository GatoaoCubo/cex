# Compact Skill

CRITICAL: Respond with TEXT ONLY. Do NOT call any tools.

## Analysis Phase
Wrap analysis in <analysis> tags. Chronologically analyze each message:
- User requests and intents
- Approaches taken
- Key decisions, concepts, patterns
- File names, code snippets, function signatures, edits
- Errors and fixes
- User feedback and corrections

## Summary Phase (9 required sections in <summary> tags)

1. **Primary Request and Intent**: All explicit requests in detail
2. **Key Technical Concepts**: Technologies and frameworks discussed
3. **Files and Code Sections**: Files examined/modified/created with snippets and why
4. **Errors and Fixes**: All errors and resolutions, including user feedback
5. **Problem Solving**: Problems solved and ongoing troubleshooting
6. **All User Messages**: ALL non-tool user messages (critical for intent tracking)
7. **Pending Tasks**: Outstanding tasks explicitly requested
8. **Current Work**: Precise description of work immediately before summary
9. **Optional Next Step**: Next step aligned with most recent request, with direct quotes

## Post-Processing
Strip <analysis> block. Format <summary> into readable sections.
Preserve most recent N messages verbatim.
