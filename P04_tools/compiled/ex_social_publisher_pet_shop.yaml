  \ \"Ro\"\n  bio: \"Design minimalista para gatos exigentes \U0001F431\"\n\nplatforms: [instagram, facebook]\n\nschedule:\n\
  \  timezone: \"America/Sao_Paulo\"\n  calendar:\n    monday:    { type: educational, time: \"12:00\" }\n    tuesday:   {\
  \ type: tips, time: \"19:00\" }\n    wednesday: { type: product, time: \"13:00\" }\n    thursday:  { type: educational,\
  \ time: \"12:00\" }\n    friday:    { type: trend, time: \"19:00\" }\n    saturday:  { type: tips, time: \"10:00\" }\n \
  \   sunday:    { type: product, time: \"11:00\" }\n\ncontent_mix:\n  product: 40\n  educational: 30\n  tips: 20\n  trends:\
  \ 10\n\ncatalog:\n  type: supabase\n  url_env: SUPABASE_URL\n  key_env: SUPABASE_KEY\n  table: products\n  cooldown_days:\
  \ 3\n\npublisher:\n  type: ayrshare\n  api_key_env: AYRSHARE_API_KEY\n  batch_size: 3\n  retry:\n    max: 3\n    backoff:\
  \ exponential\n    base_seconds: 30\n\nhashtags:\n  brand: [\"gato3\", \"gatoaocubo\"]\n  niche: [\"produtosparagatos\"\
  , \"designminimalista\", \"acessoriospet\", \"petlovers\", \"gateiros\"]\n  max_per_post: 10\n\nnotifications:\n  type:\
  \ discord\n  webhook_env: DISCORD_WEBHOOK_URL\n\ncron:\n  type: windows_task\n  interval: daily"
