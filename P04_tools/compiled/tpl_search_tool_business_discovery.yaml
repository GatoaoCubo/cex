id: tpl_search_tool_business_discovery
kind: template
pillar: P04
title: Search Tool — Business Discovery Configuration
version: 1.0.0
quality: null
created: 2026-04-07
author: n03_builder
origin: gato-ao-cubo/P04 search artifacts
variables:
- INDUSTRY
- REGION
- SEARCH_PROVIDERS
- VERTICALS
- CITIES
density_score: 0.95
tags:
- template
- search-tool
- business-discovery
- research
- instance-extraction
tldr: Search tool configuration for multi-source business discovery — optimized queries by vertical and region.
search_provider_stack: '| Priority | Provider | Capability | Rate Limit |

  |:--------:|----------|-----------|:----------:|

  {{#SEARCH_PROVIDERS}}

  | {{priority}} | {{name}} | {{capability}} | {{rate_limit}} |

  {{/SEARCH_PROVIDERS}}


  Default stack (if not specified):

  1. SERPER (Google Search API) — web + maps + news

  2. EXA (semantic search) — deep web, academic, niche

  3. FIRECRAWL (scraper) — structured extraction from pages


  ---'
search_terms_by_vertical: '{{#VERTICALS}}'
name_slug: 'Primary queries:

  {{#primary_terms}}

  "{{term}}" "{{city}}" {{state}}

  {{/primary_terms}}


  Long-tail queries:

  {{#longtail_terms}}

  {{term}}

  {{/longtail_terms}}


  Negative keywords (filter out):

  {{#negative_terms}}

  -"{{term}}"

  {{/negative_terms}}


  {{/VERTICALS}}


  ---'
regional_variations: '| Region Type | Query Modifier | Example |

  |------------|----------------|---------|

  | Metropolitan | `near "{{CITY}}"` | `"{{INDUSTRY}}" near "São Paulo"` |

  | Interior | `"{{CITY}}" {{STATE}}` | `"{{INDUSTRY}}" "Campinas" SP` |

  | National | `"{{COUNTRY}}"` | `"{{INDUSTRY}}" "Brasil"` |

  | By radius | `within {{KM}}km of` | `within 15km of "center"` |


  ---'
output_schema: "Each discovered business → JSON object:\n\n{\n  \"nome\": \"string (required)\",\n  \"cidade\": \"string (required)\"\
  ,\n  \"segmento\": \"string (required)\",\n  \"vertical\": \"string (from VERTICALS)\",\n  \"telefone\": \"string\",\n \
  \ \"endereco\": \"string\",\n  \"website\": \"string\",\n  \"fonte\": \"string (search provider)\",\n  \"query_used\": \"\
  string (for audit trail)\",\n  \"confidence\": \"high | medium | low\"\n}\n\n---"
discovery_pipeline_sequence: "Phase 1: Broad sweep (SERPER)\n  → {{VERTICALS.count}} verticals × {{CITIES.count}} cities\n\
  \  → Collect URLs + snippets\n\nPhase 2: Deep extraction (FIRECRAWL)\n  → Top results from Phase 1\n  → Structured data\
  \ from business pages\n\nPhase 3: Semantic fill (EXA)\n  → Gaps from Phase 1+2\n  → Niche sources, blogs, directories\n\n\
  Phase 4: Dedup + merge\n  → Normalize names\n  → Match by name + city\n  → Merge data from multiple sources\n\n---"
rate_limiting: '| Provider | Requests/min | Daily cap | Backoff |

  |----------|:------------:|:---------:|---------|

  | SERPER | 60 | 10,000 | exponential 2s→60s |

  | EXA | 30 | 5,000 | linear 1s→30s |

  | FIRECRAWL | 10 | 1,000 | fixed 3s |'
