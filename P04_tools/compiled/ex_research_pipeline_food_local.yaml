tldr: Config for local food business — social-first research (YouTube, Instagram, TikTok), Google Trends for seasonality,
  iFood/Rappi for delivery landscape.
density_score: 0.88
updated: '2026-04-07'
about: Config for a local artisan bakery researching food trends, delivery landscape, and social media content strategy. Social-first
  approach with heavy YouTube and TikTok analysis.
config: "identity:\n  empresa: \"Forno & Massa\"\n  nicho: food_artisan\n  idioma: pt-BR\n  pais: BR\n\nsources:\n  inbound:\n\
  \    - ifood           # delivery marketplace — pricing, competitors\n    - rappi           # delivery marketplace — coverage,\
  \ promotions\n  outbound:\n    - youtube         # recipe videos, bakery vlogs, food trends\n    - reddit          # r/culinaria,\
  \ r/saopaulo\n    - reclameaqui     # delivery complaint analysis\n    - instagram       # via Serper site search — visual\
  \ trends\n    - tiktok          # via Serper site search — viral food content\n  search:\n    - serper          # Google\
  \ SERP — local bakery search\n    - brave           # local business reviews\n  trends:\n    - pytrends        # \"pao artesanal\"\
  , \"fermentacao natural\" trends\n  rag:\n    - local_docs      # recipes, supplier contacts, cost sheets\n\nstorm_perspectives:\n\
  \  - role: customer\n    focus: \"sabor preco localizacao entrega horario frescor\"\n  - role: competitor\n    focus: \"\
  cardapio precificacao delivery diferencial-unico\"\n  - role: trend_analyst\n    focus: \"ingredientes-moda sazonalidade\
  \ dietas restricoes\"\n  - role: food_critic\n    focus: \"qualidade apresentacao embalagem experiencia\"\n  - role: marketer\n\
  \    focus: \"conteudo-visual hashtags reels stories engajamento\"\n\nmulti_model:\n  extraction: gemini-2.5-flash\n  reasoning:\
  \ gemini-2.5-flash    # food analysis is less complex\n  social: gemini-2.5-flash       # high volume social data\n  critic:\
  \ o4-mini\n\nbudget:\n  firecrawl_monthly: 500          # less marketplace scraping\n  firecrawl_per_research: 5\n  serper_daily:\
  \ 30                # local search volume is lower\n\noutput:\n  formats: [html, json]\n  idioma: pt-BR\n  template: brief\
  \                 # shorter reports for local business\n\nquality:\n  crag_min_score: 0.6             # social data is noisier\
  \ — lower threshold\n  critic_max_iterations: 2        # simpler analysis — fewer iterations\n  final_min_score: 7.5   \
  \         # local research has less data"
niche_notes:
- 'Social-first: food content discovery happens on Instagram/TikTok/YouTube, not marketplaces'
- 'iFood/Rappi: delivery platforms reveal local competitor landscape and pricing'
- 'Lower CRAG threshold (0.6): social media data is inherently noisier'
- 'Fewer CRITIC iterations (2): local food analysis is less complex than market research'
- 'Seasonal focus: pytrends reveals "panetone" in Dec, "ovo de Pascoa" in Apr'
- 'Brief template: small business owners need actionable summaries, not 20-page reports'
- 'Lower budget: local businesses have tighter budgets — optimize for free/cheap sources'
