id: p04_vision_gpt4v
kind: vision_tool
pillar: P04
version: 1.0.0
created: 2026-03-28
updated: 2026-03-28
author: builder_agent
name: GPT-4V Image Analyzer
input_types: ''
capabilities: ''
output_format: 'JSON envelope: `{"capability": "string", "results": {...}, "model": "gpt-4-vision-preview"}`'
providers:
- openai_vision
quality: 8.6
tags:
- vision_tool
- gpt4v
- ocr
- image_analysis
tldr: GPT-4V vision tool for image description, OCR, and object detection via OpenAI API
description: Analyzes images using GPT-4V to extract text, describe content, and detect objects
max_resolution: 2048x2048
supported_formats:
- png
- jpg
- jpeg
- webp
- gif
confidence_threshold: 0.8
batch_support: false
max_bytes_per_image: 20971520
overview: Analyzes images using OpenAI's GPT-4V model to extract structured information. Used by agents that need to understand
  screenshots, product photos, or document scans.
base64: Base64-encoded image string. Max 20MB after decoding. Preferred for programmatic use.
url: Public HTTPS URL pointing to an image. Must be accessible without authentication.
image_description: 'Generates natural language description of image contents. Confidence range: 0.85-0.99. Results filtered
  at confidence_threshold. Output: `{"description": "string", "confidence": float}`'
ocr: 'Extracts visible text from images including screenshots, photos of documents. Output: `{"text": "string", "regions":
  [{"bbox": [x,y,w,h], "text": "string"}]}`'
object_detection: 'Identifies and localizes objects within the image. Output: `{"objects": [{"label": "string", "bbox": [x,y,w,h],
  "confidence": float}]}`'
