# Simplify Skill

## Phase 1: Identify Changes
Run git diff (or git diff HEAD if staged). Review changed files.

## Phase 2: Three Parallel Review Agents

### Agent 1 -- Reuse Review
Search for existing utilities that replace new code. Flag duplicates. Flag inline logic
that could use existing utilities (string manipulation, path handling, type guards).

### Agent 2 -- Quality Review
1. Redundant state (duplicates, unnecessary caching, observers that could be direct calls)
2. Parameter sprawl (adding params instead of restructuring)
3. Copy-paste with variation (near-duplicates needing shared abstraction)
4. Leaky abstractions (exposing internals)
5. Stringly-typed code (raw strings where constants/enums exist)
6. Unnecessary nesting (wrapper structures adding no value)
7. Unnecessary comments (explaining WHAT instead of WHY)

### Agent 3 -- Efficiency Review
1. Unnecessary work (redundant computations, repeated reads, N+1 patterns)
2. Missed concurrency (sequential independent operations)
3. Hot-path bloat (blocking work on startup/per-request paths)
4. Recurring no-op updates (unconditional state updates, no change detection)
5. Unnecessary existence checks (TOCTOU anti-pattern)
6. Memory leaks (unbounded structures, missing cleanup)
7. Overly broad operations (reading all when filtering for one)

## Phase 3: Fix Issues
Aggregate findings. Fix each directly. Skip false positives. Summarize results.
