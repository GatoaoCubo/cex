when_to_simplify: 'Trigger simplification review after any code change that:

  - Adds more than 50 lines to a single file

  - Introduces a new abstraction (class, module, utility)

  - Duplicates logic that exists elsewhere in the codebase

  - Has cyclomatic complexity > 10 in any function'
simplification_checklist: '| Category            | Action                                      | Tool/Method                          |
  Example                                                                 |

  |---------------------|---------------------------------------------|--------------------------------------|-------------------------------------------------------------------------|

  | Reuse Analysis      | Search for existing utilities               | Code search, AST comparison        | Replaced 120
  lines of CSV parsing with `pandas.read_csv()`             |

  | Complexity Reduction| Extract complex conditionals                | Refactoring tools, manual review   | Converted 30-line
  if/else chain to 5 early return statements           |

  | Readability         | Rename variables to reveal intent           | Linters, code reviews              | Changed `x` to
  `user_has_valid_subscription`                          |

  | Efficiency          | Identify O(n²) loops                        | Profiling tools, code analysis     | Replaced nested
  loops with set lookup (reduced from 100ms to 2ms)      |

  | Maintainability     | Remove dead code                            | Static analysis, coverage reports  | Deleted 45 lines
  of unused error handling from legacy module           |'
output: Report changes as a diff with rationale for each simplification.
example_diff: '- def process_data(data):

  -     if data[''type''] == ''A'':

  -         return handle_a(data)

  -     elif data[''type''] == ''B'':

  -         return handle_b(data)

  -     else:

  -         return default_handler(data)

  + def process_data(data):

  +     handler_map = {

  +         ''A'': handle_a,

  +         ''B'': handle_b,

  +     }

  +     return handler_map.get(data[''type''], default_handler)(data)


  Rationale: Replaced conditional chain with dictionary lookup for improved readability and maintainability.'
boundary: This artifact is a structured approach to improving code quality through systematic simplification. It is not a
  replacement for comprehensive code reviews or architectural design. It focuses on incremental improvements rather than wholesale
  rewrites.
related_kinds:
- 'Code Refactoring: Directly related through shared goals of improving code structure and maintainability.'
- 'Code Quality Analysis: Complementary, as simplification often follows quality analysis findings.'
- 'Performance Optimization: Overlaps in efficiency reviews but focuses on readability first.'
- 'Design Pattern Application: Sometimes used in refactoring but not the primary focus here.'
- 'Code Duplication Detection: Closely related through reuse analysis techniques.'
comparison_of_simplification_techniques: '| Approach              | Focus Area               | Tools Used                          |
  Typical Use Case                          | Pros                                      | Cons                                      |

  |-----------------------|--------------------------|-------------------------------------|-------------------------------------------|-------------------------------------------|-------------------------------------------|

  | Refactoring           | Structure                | IDEs, refactoring tools             | Modernizing legacy code                   |
  Improves maintainability                  | Can introduce new bugs if not tested      |

  | Code Duplication      | Reuse                    | AST comparison, search tools        | Identifying copy-paste patterns         |
  Reduces redundancy                        | May miss semantically similar code       |

  | Performance Optim     | Efficiency               | Profilers, static analysis          | Bottleneck remediation                    |
  Significant speed improvements            | May sacrifice readability for speed     |

  | Design Patterns       | Architecture             | Code reviews, pattern libraries     | Standardizing complex logic               |
  Enhances scalability                      | Over-engineering for simple cases       |

  | Automated Linting     | Consistency              | Linters, formatters                 | Enforcing style guides                    |
  Ensures uniformity                        | Doesn''t address logical complexity      |'
advanced_considerations: ''
cyclomatic_complexity_thresholds: '| Complexity Level | Lines of Code | Risk Level | Recommended Action                  |

  |------------------|---------------|------------|-------------------------------------|

  | 1-5              | 10-30         | Low        | No action required                  |

  | 6-10             | 30-60         | Medium     | Add comments for complex logic    |

  | 11-15            | 60-100        | High       | Extract methods or use guards     |

  | 16-20            | 100-150       | Critical   | Rewrite logic or split into modules|

  | >20              | >150          | Unmanageable | Requires architectural redesign   |'
efficiency_metrics: '| Metric               | Target Value | Example Improvement                          |

  |----------------------|--------------|----------------------------------------------|

  | Time Complexity      | O(n)         | Replaced O(n²) loop with set lookup          |

  | Memory Usage         | <10MB        | Optimized data structures reduced usage by 60%|

  | API Call Frequency   | <5/req       | Batched 10 calls into 1 optimized request    |

  | File I/O Operations  | <3/req       | Reduced from 7 to 2 with caching             |

  | Error Coverage       | 100%         | Added 3 edge cases to existing error handling|'
best_practices:
- 'Prioritize readability: Simplify for maintainability first, optimize for performance second.'
- 'Use incremental changes: Break large refactors into small, testable commits.'
- 'Automate where possible: Integrate linters and complexity checkers into CI/CD pipelines.'
- 'Document rationale: Every change should explain why the simplification improves the code.'
- 'Balance abstraction: Avoid over-engineering; prefer simple solutions that work now.'
