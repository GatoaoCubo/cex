id: tpl_retriever_business_intel
kind: template
pillar: P04
title: Retriever — Multi-Source Business Intelligence
version: 1.0.0
quality: null
created: 2026-04-07
author: n03_builder
origin: gato-ao-cubo/P04 retriever artifacts
variables:
- SOURCES
- MERGE_STRATEGY
- DEDUP_FIELDS
- INDUSTRY
- REGION
density_score: 0.95
tags:
- template
- retriever
- business-intelligence
- merge
- dedup
- instance-extraction
tldr: Multi-source business intelligence retriever — merge data from N sources with configurable dedup and quality scoring.
source_registry: '{{#SOURCES}}

  | # | Source | Type | Trust Level | Fields Provided |

  |---|--------|------|:-----------:|-----------------|

  {{#each}}

  | {{position}} | {{name}} | {{type}} | {{trust}} | {{fields}} |

  {{/each}}

  {{/SOURCES}}


  ---'
merge_strategy_merge_strategy_default_trust_weighted: ''
available_strategies: '| Strategy | Description | Use When |

  |----------|-------------|----------|

  | `trust_weighted` | Higher-trust source wins conflicts | Multiple overlapping sources |

  | `most_complete` | Record with most non-null fields wins | Sparse data from many sources |

  | `latest_wins` | Most recently fetched data wins | Time-sensitive data |

  | `manual_review` | Flag conflicts for human review | Critical data (financial, legal) |'
merge_rules: "merge:\n  strategy: {{MERGE_STRATEGY | default: 'trust_weighted'}}\n  conflict_resolution:\n    phone: highest_trust\
  \       # Phone from most trusted source\n    address: most_complete     # Longest/most detailed address\n    rating: average\
  \            # Average across sources\n    name: longest              # Longest version (usually most complete)\n    tax_id:\
  \ any_non_null       # First non-null wins (unique identifier)\n\n---"
dedup_configuration: ''
primary_key_fields: "dedup:\n  primary_fields: {{DEDUP_FIELDS | default: '[nome_fantasia, cidade]'}}\n  algorithm: fuzzy_match\n\
  \  threshold: 0.85              # Levenshtein similarity threshold\n  normalize:\n    - lowercase\n    - strip_accents\n\
  \    - remove_legal_suffixes    # \"LTDA\", \"ME\", \"EIRELI\", \"LLC\", \"Inc\"\n    - collapse_whitespace"
dedup_pipeline: "Input: N records from K sources\n  │\n  ├── 1. Normalize all name fields\n  ├── 2. Group by city (exact match)\n\
  \  ├── 3. Within city: pairwise fuzzy match on name\n  ├── 4. If similarity > threshold → merge (using strategy)\n  ├──\
  \ 5. If tax_id match → merge (override name match)\n  └── 6. Output: M unique records (M ≤ N)\n\nStats:\n  - Input: {N}\
  \ records from {K} sources\n  - Duplicates found: {N - M}\n  - Unique output: {M}\n  - Merge rate: {(N-M)/N * 100}%\n\n\
  ---"
quality_scoring: 'Each merged record gets a quality score (0-100):


  | Factor | Weight | Scoring |

  |--------|:------:|---------|

  | Phone present | 20 | +20 if valid phone |

  | Address present | 15 | +15 if street-level address |

  | Tax ID present | 15 | +15 if validated |

  | Email/website | 10 | +10 if any web presence |

  | Social media | 10 | +10 if Instagram/Facebook |

  | Rating available | 10 | +10 if any platform rating |

  | Multiple sources | 10 | +10 if found in 2+ sources |

  | Location coords | 10 | +10 if lat/lng available |


  Tiers: S+ (90-100) | S (80-89) | A (70-79) | B (60-69) | C (< 60)


  ---'
output_schema: "{\n  \"id\": \"uuid\",\n  \"nome_fantasia\": \"string\",\n  \"cidade\": \"string\",\n  \"quality_score\":\
  \ \"integer (0-100)\",\n  \"quality_tier\": \"S+ | S | A | B | C\",\n  \"sources\": [\"string (list of source names)\"],\n\
  \  \"source_count\": \"integer\",\n  \"merged_at\": \"ISO-8601 datetime\",\n  \"fields_filled\": \"integer (out of total)\"\
  ,\n  \"completeness\": \"float (0-1)\"\n}"
