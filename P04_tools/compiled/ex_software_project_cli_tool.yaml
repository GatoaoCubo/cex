tldr: 'Complete CLI tool project: CEX artifact scorer with Typer+Rich. Shows pyproject.toml, src layout, Pydantic models,
  pytest fixtures, Ruff config, Dockerfile, GitHub Actions CI.'
density_score: 0.9
config: "project: { name: cex-scorer, version: 1.0.0, type: cli_tool, python: \"3.12\" }\npackage: { name: cex_scorer, cli_name:\
  \ cex-score }\ndependencies:\n  core: [pydantic>=2.0, typer>=0.9, rich>=13.0, pyyaml>=6.0]\n  dev: [pytest>=7.0, pytest-cov>=4.0,\
  \ ruff>=0.1.0]\ndeploy: { target: none }\nconfig: { env_prefix: SCORER }"
key_files: 'pyproject.toml: Hatchling build, Typer entry point, Ruff+pytest config. src/cex_scorer/cli.py: Typer CLI with
  `score`, `batch`, `report` commands. src/cex_scorer/scorer.py: 5D scoring logic (size, frontmatter, sections, density, domain).
  src/cex_scorer/models.py: `ScoreResult(BaseModel)` with score, notes, dimensions. tests/conftest.py: Fixtures for sample
  artifacts (valid, invalid, empty). tests/test_scorer.py: 12 parametrized tests covering all 5 dimensions.'
architecture: 'src/cex_scorer/

  ├── cli.py          # Interface (Typer commands)

  ├── scorer.py       # Domain (scoring logic, zero deps)

  ├── models.py       # Domain (Pydantic data models)

  └── config.py       # Infra (BaseSettings)

  tests/

  ├── conftest.py     # Fixtures (sample artifacts via tmp_path)

  └── test_scorer.py  # Unit tests (parametrized per dimension)'
what_makes_it_good:
- 'Clear separation: CLI → domain logic → models'
- Parametrized tests cover all scoring dimensions
- Rich console output for terminal users
- '`--json` flag for programmatic usage'
- Zero external service deps (works offline)
