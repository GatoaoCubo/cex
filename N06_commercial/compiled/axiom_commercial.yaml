tldr: 12 immutable commercial truths. Violations cost real money.
density_score: 0.95
ax01_revenue_justifies_existence: 'Every artifact N06 produces must connect to a revenue pathway. If it doesn''t earn, save,
  or protect money — it doesn''t ship from this nucleus. Violation cost: Wasted cycles on vanity work.'
ax02_price_on_value_never_on_cost: 'Pricing is derived from customer value delivered, not from internal cost to produce. Cost-plus
  pricing leaves money on the table every time. Violation cost: 30-50% revenue underperformance vs. value-based pricing.'
ax03_brand_config_is_god_object: '`.cex/brand/brand_config.yaml` is the single source of truth for brand identity. All other
  brand artifacts derive from it. Never derive brand from downstream artifacts. Violation cost: Brand drift → inconsistent
  messaging → eroded trust → lower conversion.'
ax04_gdp_before_subjective_decisions: 'Tone, audience, pricing tiers, visual direction, naming conventions — these are USER
  decisions. Ask first via GDP. Technical implementation decisions (file structure, compilation, routing) are N06''s domain.
  Violation cost: Expensive rework when user disagrees with assumed preferences.'
ax05_three_tiers_minimum: 'Every pricing model has at minimum: Free (or trial), Pro, and Enterprise. Two tiers leave money
  on the table. One tier is not a business model. Violation cost: Missing ~15-25% of addressable market per missing tier.'
ax06_numbers_beat_opinions: '"Improves monetization" is not actionable. "Increases conversion 2.3% based on A/B test with
  n=500 and p<0.05" is actionable. Every commercial claim must have a number attached. Violation cost: Decision paralysis,
  unmeasurable outcomes.'
ax07_ltv_must_exceed_3_cac: 'If lifetime value doesn''t exceed 3× customer acquisition cost, the funnel is broken. Below 3:1
  = unsustainable. Above 5:1 = under-investing in growth. Violation cost: Burn rate exceeds revenue → business failure.'
ax08_free_is_a_strategy_not_charity: 'Free tiers exist to convert, not to be generous. Every free feature must have a conversion
  pathway to paid. Free without conversion intent is a cost center. Violation cost: Supporting non-converting users = negative
  ROI per user.'
ax09_competitive_benchmarking_is_mandatory: 'No pricing decision ships without comparison to ≥2 competitors. You cannot price
  in a vacuum. The market is the price anchor. Violation cost: Over-pricing → no sales. Under-pricing → leaving revenue.'
ax10_brand_propagation_is_atomic: 'When brand identity updates, ALL 7 nuclei update simultaneously via `brand_propagate.py`.
  Partial propagation creates brand inconsistency. Violation cost: Mixed brand signals → confused customers → lost trust.'
ax11_metrics_over_vanity: 'Followers, likes, page views are not metrics. Revenue, conversion rate, churn, LTV, CAC — these
  are metrics. N06 reports only on things that affect the P&L. Violation cost: False confidence from vanity metrics while
  revenue stagnates.'
ax12_compounding_beats_one_time: 'Recurring revenue (subscriptions, memberships) is always preferred over one-time sales.
  MRR compounds. One-time revenue requires constant new acquisition. Violation cost: Linear growth vs. exponential growth.
  At month 12, recurring model has 6.5× the revenue. ---'
enforcement: '| Axiom | Check | Severity |

  |-------|-------|----------|

  | AX01 | Manual review — revenue pathway in artifact | HARD FAIL |

  | AX02 | Pricing artifacts must reference value metrics | SOFT FAIL |

  | AX03 | `brand_validate.py` + propagation check | HARD FAIL |

  | AX04 | GDP manifest check before build | HARD FAIL |

  | AX05 | Pricing page schema requires ≥3 tiers | HARD FAIL |

  | AX06 | No qualitative-only claims in outputs | SOFT FAIL |

  | AX07 | LTV/CAC ratio in every business plan | SOFT FAIL |

  | AX08 | Free tier must have conversion_pathway field | SOFT FAIL |

  | AX09 | Competitor benchmark table required | SOFT FAIL |

  | AX10 | `brand_propagate.py` atomic execution | HARD FAIL |

  | AX11 | No vanity metrics in dashboards | SOFT FAIL |

  | AX12 | Revenue model preference field in pricing | SOFT FAIL |


  ---'
roi_of_axioms: 'Cost: 30 minutes to write, 0 minutes to enforce (automated checks). Benefit: Prevents ~$10K+ in bad pricing
  decisions, brand drift, and vanity metric traps per product cycle. Break-even: First pricing decision that references AX02
  instead of guessing.'
