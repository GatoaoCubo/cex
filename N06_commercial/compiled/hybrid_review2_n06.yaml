diff_quality_code_agent_tier_differentiation: '| Tier       | Diff Strategy            | Price Signal  | Why                                   |

  |:-----------|:-------------------------|:--------------|:--------------------------------------|

  | Basic      | Myers whole-file replace  | Base          | No context; always applies            |

  | Standard   | Myers unified diff        | Base + 30%    | Context-aware; standard git workflow  |

  | Pro        | patience/histogram        | Base + 80%    | Fewer merge conflicts on real code    |

  | Enterprise | AST/semantic diff         | Base + 200%   | Structural refactors; multi-file safe |'
why_this_matters_for_pricing: "1. Patch failure rate drives support costs and churn. histogram > Myers for code-heavy files.\n\
  2. LLM token cost: Aider udiff-simple uses ~30% fewer tokens than whole-file replacement\n   on edits to large files ->\
  \ direct cost savings -> upsell \"token-efficient\" tier.\n3. Enterprise code quality: AST diff enables structural changes\
  \ (rename class across files)\n   that line-based diff cannot safely apply -> clear enterprise feature gate."
competitive_signal: 'Aider exposes 4 edit formats precisely because no single diff strategy fits all models/contexts. Products
  that abstract this choice (one format for all) leave margin on the table. Products that expose it with smart defaults command
  premium. Recommended CEX product action: Add diff_strategy selector to code-agent configuration UI. Default: histogram for
  Python/JS/TS (brace-heavy). Offer patience for refactor workflows, whole for non-technical users. Gate AST/semantic diff
  to Enterprise.'
