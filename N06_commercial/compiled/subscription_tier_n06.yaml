conversion_rates_benchmarks: '| Conversion | Industry Avg | N06 Target |

  |-----------|:---:|:---:|

  | FREE -> STARTER | 2-5% | 8% |

  | STARTER -> PRO | 15-25% | 30% |

  | PRO -> ENTERPRISE | 5-10% | 15% |

  | Monthly -> Annual | 20-40% | 45% |'
payback_period: '| Tier | CAC Target | Payback Period |

  |------|:---:|:---:|

  | STARTER | <$50 | <2 months |

  | PRO | <$300 | <3 months |

  | ENTERPRISE | <$3,000 | <9 months |'
annual_vs_monthly_pricing_strategy: 'Annual discount: 20% (presented as "2 months free").


  Annual customer benefits:

  - Predictable revenue: reduces churn 35-60% vs monthly

  - Cash flow: upfront collection improves runway

  - Commitment signal: annual customers 3x less likely to churn


  Levers to push annual:

  1. Annual discount on checkout default selection

  2. "Most popular" badge on annual

  3. Annual-only features (data residency for ENTERPRISE)

  4. Annual invoicing for Enterprise (vs credit card)'
cannibalization_guard: "PRO ($149) must NOT compete with ENTERPRISE floor ($500):\n  - PRO caps seats at 5 (Enterprise = unlimited)\n\
  \  - PRO lacks SSO (Enterprise blocker)\n  - PRO lacks SLA (Enterprise requirement)\n\nSTARTER ($49) must NOT feel \"good\
  \ enough\" for power users:\n  - No API access (developer workflow blocker)\n  - N03 locked (no artifact construction)\n\
  \  - 1 seat (no team use)"
