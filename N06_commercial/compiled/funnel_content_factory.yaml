tldr: '4-stage sales funnel for Content Factory: Lead magnet (free podcast/flashcards) -> Tripwire (single ebook R$19) ->
  Core offer (Full Content Pack R$147) -> Upsell (monthly subscription R$497/mo). Each stage has conversion targets, assets,
  copy hooks, and nucleus ownership.'
