pairing_rationale: Allrounder traz personalidade display geométrica para títulos e headlines, mantendo legibilidade. Kenao
  oferece excelente legibilidade em interfaces e textos corridos, complementando a geometria do Allrounder. JetBrains Mono
  garante clareza em elementos técnicos. Juntas criam harmonia visual sem competição.
