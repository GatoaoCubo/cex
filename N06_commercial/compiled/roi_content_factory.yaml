5_3_cost_at_scale: '| Monthly Volume | Token Cost | Revenue (Pro R$497) | Token % of Revenue |

  |---------------|-----------|--------------------|--------------------|

  | 4 briefs (typical Pro) | R$57.60 | R$497 | 11.6% |

  | 10 briefs (heavy Pro) | R$144.00 | R$497 + R$400 overage | 16.1% |

  | 30 briefs (Studio) | R$432.00 | R$1,497 | 28.9% |

  | 100 briefs (Factory) | R$1,440.00 | R$3,997 | 36.0% |


  Key insight: Token costs scale linearly, revenue scales per-tier. Even at heavy usage (Factory tier), tokens are 36% of
  revenue -- 64% gross margin before any other costs.


  ---'
