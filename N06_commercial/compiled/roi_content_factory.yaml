tldr: 'ROI calculator for Content Factory customers. Inputs: current hours/week on content, team size, hourly rate, content
  volume. Outputs: monthly savings (R$8K-45K), revenue potential, break-even point (1-3 days for all tiers). Includes manual
  vs CF comparison across 11 formats, ICP-specific scenarios, and token cost analysis.'
density_score: 0.95
