  X-Stripe-Version: 2024-06-20               (pin API version)


  All keys stored in `secret_config` (P09). Never hardcode. Rotate via N05 ops pipeline.'
core_endpoints: ''
1_create_checkout_session: "POST https://api.stripe.com/v1/checkout/sessions\n\nRequest:\n\n| Field | Type | Required | Notes\
  \ |\n|-------|------|----------|-------|\n| `line_items[0].price` | string | YES | Stripe Price ID (`price_*`) |\n| `line_items[0].quantity`\
  \ | integer | YES | Min 1 |\n| `mode` | string | YES | `payment`, `subscription`, `setup` |\n| `success_url` | string |\
  \ YES | Must include `{CHECKOUT_SESSION_ID}` |\n| `cancel_url` | string | YES | Return path on abandon |\n| `customer_email`\
  \ | string | NO | Pre-fill email field |\n| `customer` | string | NO | Existing `cus_*` ID |\n| `allow_promotion_codes`\
  \ | boolean | NO | Enables discount code field |\n| `subscription_data.trial_period_days` | integer | NO | Free trial length\
  \ |\n| `metadata` | object | NO | UTM, referral, affiliate |\n\nResponse (200):\n{\n  \"id\": \"cs_live_...\",\n  \"url\"\
  : \"https://checkout.stripe.com/pay/cs_live_...\",\n  \"payment_status\": \"unpaid\",\n  \"status\": \"open\",\n  \"customer\"\
  : null,\n  \"amount_total\": 9900,\n  \"currency\": \"usd\"\n}\n\nRevenue note: Redirect user to `response.url`. Session\
  \ expires in 24h. Track session ID in `metadata` for attribution.\n\n---"
2_create_subscription_server_side: 'POST https://api.stripe.com/v1/subscriptions


  | Field | Type | Required | Notes |

  |-------|------|----------|-------|

  | `customer` | string | YES | `cus_*` ID |

  | `items[0].price` | string | YES | Stripe Price ID |

  | `trial_period_days` | integer | NO | Overrides price''s trial setting |

  | `cancel_at_period_end` | boolean | NO | Cancels at period end vs immediate |

  | `metadata` | object | NO | `plan_tier`, `nucleus`, `referral_code` |


  ---'
3_retrieve_subscription: 'GET https://api.stripe.com/v1/subscriptions/{sub_id}


  Key response fields for churn analysis:

  - `status`: `trialing | active | past_due | canceled | unpaid | paused`

  - `current_period_end`: Unix timestamp -- trigger renewal_workflow at -7 days

  - `cancel_at_period_end`: Boolean -- flag for churn_prevention_playbook

  - `items.data[0].price.unit_amount`: Current MRR in cents


  ---'
4_update_subscription_upgrade_downgrade: "POST https://api.stripe.com/v1/subscriptions/{sub_id}\n\nFor plan changes:\n{\n\
  \  \"items\": [{\"id\": \"si_*\", \"price\": \"price_new_plan\"}],\n  \"proration_behavior\": \"create_prorations\"\n}\n\
  \n`proration_behavior` options:\n- `create_prorations` -- credit unused time (recommended for upgrades)\n- `none` -- no\
  \ proration, starts new period (use for downgrades)\n- `always_invoice` -- immediate invoice\n\n---"
5_cancel_subscription: 'DELETE https://api.stripe.com/v1/subscriptions/{sub_id}


  Or soft cancel (at period end):

  POST https://api.stripe.com/v1/subscriptions/{sub_id}

  Body: {"cancel_at_period_end": true}


  N06 rule: always use `cancel_at_period_end: true` first. Run churn_prevention_playbook before hard cancel.


  ---'
webhook_events: "All events arrive at `POST /webhook/stripe` with `Stripe-Signature` header.\n\n# Signature verification (Python)\n\
  import stripe\nevent = stripe.Webhook.construct_event(\n    payload, sig_header, webhook_secret\n)"
critical_n06_events: '| Event | Trigger | N06 Action |

  |-------|---------|-----------|

  | `checkout.session.completed` | Successful payment | Provision access, trigger onboarding |

  | `customer.subscription.created` | New subscription | Set entity_memory health=new |

  | `customer.subscription.updated` | Plan change | Update tier in entity_memory |

  | `customer.subscription.deleted` | Cancellation | Trigger win-back sequence |

  | `invoice.payment_failed` | Payment failure | Trigger churn_prevention_playbook |

  | `invoice.upcoming` | 7 days pre-renewal | Trigger renewal_workflow |

  | `customer.subscription.trial_will_end` | 3 days before trial end | Trigger conversion sequence |

  | `charge.refunded` | Refund | Flag for cohort_analysis |


  ---'
revenue_reporting: ''
mrr_calculation_via_stripe: 'GET https://api.stripe.com/v1/subscriptions?status=active&limit=100


  Aggregate: `sum(item.price.unit_amount * item.quantity)` for monthly, divide annual by 12.'
cohort_data: Use `created` timestamp on `customer` object for cohort bucketing. Cross-reference with `metadata.utm_source`
  for channel cohort. ---
error_codes: '| Code | Meaning | N06 Recovery |

  |------|---------|-------------|

  | `card_declined` | Card rejected | Retry prompt + backup payment method |

  | `insufficient_funds` | Insufficient funds | Offer installment or downgrade |

  | `expired_card` | Card expired | Email update request |

  | `invalid_cvc` | CVC mismatch | Re-prompt checkout |

  | `rate_limit` | API rate limited | Exponential backoff, max 3 retries |'
