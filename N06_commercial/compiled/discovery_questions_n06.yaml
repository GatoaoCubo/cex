purpose: Provides N06 with a structured question bank for commercial discovery. Questions follow SPIN methodology (Situation,
  Problem, Implication, Need-Payoff) and are organized by persona, use case, and stage. Every question has a purpose -- extract
  information that maps directly to ROI calculator inputs, ICP scoring, or tier recommendation.
spin_question_bank: ''
situation_questions_context_building: "S1: \"How large is your team that creates [artifact type / content / commercial materials]?\"\
  \n    -> Input: team_size for roi_calculator\n\nS2: \"How often do you produce [artifact type] -- weekly, daily, monthly?\"\
  \n    -> Input: builds_per_week for roi_calculator\n\nS3: \"What tools are you currently using for this?\"\n    -> Informs:\
  \ competitive context + switch cost\n\nS4: \"Who typically reviews and approves these outputs before they go live?\"\n \
  \   -> Informs: revision_cycles for roi_calculator + decision process\n\nS5: \"Do you have brand guidelines documented anywhere\
  \ today?\"\n    -> Informs: brand_config value proposition strength\n\nS6: \"Are these mostly internal documents or customer-facing\
  \ materials?\"\n    -> Informs: quality sensitivity + tier recommendation"
problem_questions_pain_identification: "P1: \"What's the most frustrating part of how you create [artifact type] today?\"\n\
  \    -> Informs: pain framing for demo and close\n\nP2: \"How many revision cycles does a typical [artifact] go through\
  \ before sign-off?\"\n    -> Input: revision_cycles for roi_calculator\n\nP3: \"Has inconsistent quality or off-brand output\
  \ ever caused a real problem?\"\n    -> Informs: quality risk framing; high-value if yes\n\nP4: \"How long does it take\
  \ from 'we need a [artifact]' to having a final version?\"\n    -> Input: hours_per_build baseline\n\nP5: \"Are there requests\
  \ you can't currently meet because the team doesn't have enough capacity?\"\n    -> Informs: capacity constraint = strong\
  \ purchase motivation\n\nP6: \"When someone leaves your team, what happens to their knowledge and templates?\"\n    -> Informs:\
  \ institutional knowledge loss angle (CEX entity_memory value prop)"
implication_questions_amplify_pain: "I1: \"If you could cut [hours_per_build] in half, what would your team do with that time?\"\
  \n    -> Purpose: make status quo pain concrete; ROI calculator preview\n\nI2: \"What's the downstream impact when [artifact]\
  \ is delayed or off-brand?\"\n    -> Purpose: connect pain to business outcome (lost revenue, deals slipped)\n\nI3: \"If\
  \ this pace continues, how does that affect your team's ability to scale?\"\n    -> Purpose: create urgency around growth\
  \ bottleneck\n\nI4: \"What's the cost of having a senior person spend [X hours] on this vs strategic work?\"\n    -> Input:\
  \ hourly_rate for roi_calculator (prompt for fully-loaded cost)\n\nI5: \"Has a missed [artifact] or slow turnaround ever\
  \ cost you a deal or a customer?\"\n    -> Purpose: monetize pain; creates powerful close anchor"
need_payoff_questions_solve_and_close: "N1: \"If you could produce a professional [artifact] in under 5 minutes -- with brand\
  \ voice locked in --\n     what would you use that time for?\"\n    -> Purpose: make the benefit concrete in their terms\n\
  \nN2: \"If the ROI math works out to [X]% return -- is that the kind of decision that's\n     straightforward for you to\
  \ make, or does it need sign-off?\"\n    -> Purpose: identify economic buyer and decision process simultaneously\n\nN3:\
  \ \"What would need to be true about [CEX] for you to be confident enough to try it?\"\n    -> Purpose: uncover hidden objections;\
  \ surface specific proof needs\n\nN4: \"If we could get your team running in one day -- would starting this week make sense?\"\
  \n    -> Purpose: test urgency + timeline; identify blockers"
persona_specific_questions: ''
founder_solo_operator: '"How much of your week goes into content and commercial materials vs actual [core work]?"

  "What''s the hourly rate you''d assign to that time?"

  "If you had an assistant who could handle 80% of this -- what would you do differently?"'
marketing_manager_team_lead: '"How many pieces of content / commercial output does your team produce per month?"

  "What''s your current workflow from brief to final output?"

  "How do you maintain brand consistency across team members?"'
sales_leader: '"How long does it take your reps to create custom proposals or decks for prospects?"

  "Do your reps go off-brand or off-message when customizing materials?"

  "What''s the cost when a deal slips because materials weren''t ready in time?"'
enterprise_procurement_it: '"What compliance requirements do you have for AI tools? (GDPR, SOC2, data residency?)"

  "Who owns vendor evaluation -- is this a procurement-led or team-led process?"

  "What''s your standard SLA requirement for business-critical tools?"'
question_sequencing_protocol: "Stage 1 -- Opening (5 min): 2-3 SITUATION questions\n  Goal: understand context, avoid asking\
  \ things you could have researched\n\nStage 2 -- Pain exploration (8 min): 2-3 PROBLEM questions\n  Goal: find the primary\
  \ pain; get quantifiable data for roi_calculator\n\nStage 3 -- Amplification (5 min): 1-2 IMPLICATION questions\n  Goal:\
  \ make status quo cost feel real and urgent\n\nStage 4 -- Vision (5 min): 2 NEED-PAYOFF questions\n  Goal: get them articulating\
  \ the solution in their own words\n\nDO NOT: run through all questions sequentially. Adapt to what they say.\nDO: let their\
  \ answers guide which question comes next."
question_red_flags: '| Answer | Interpretation | Action |

  |--------|---------------|--------|

  | "We don''t really have a process" | Very early stage, no urgency | Educate; longer sales cycle |

  | "We need to check with [many people]" | Committee decision, low champion | Find champion, loop them in early |

  | "We already tried [AI tool] and it didn''t work" | AI skepticism from bad experience | Differentiation conversation +
  focused demo |

  | "We''re not looking to buy right now" | No urgency | Quantify status quo cost; create urgency |

  | "Budget isn''t approved yet" | Budget cycle mismatch | Understand when and follow up on schedule |'
