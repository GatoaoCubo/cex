4_order_lifecycle: "[SUBMIT] --> [VALIDATE] --> [ESTIMATE] --> [AUTHORIZE] --> [QUEUE] --> [EXECUTE] --> [DELIVER]\n     \
  \          |               |               |\n               v               v               v\n          Reject if    \
  \   Calculate        Check credits\n          invalid        credits needed    or trigger\n          (V1-V9)           \
  \               checkout\n\n| Stage | Owner | Output |\n|-------|-------|--------|\n| SUBMIT | Customer (UI/API/CLI) | Raw\
  \ order payload |\n| VALIDATE | N05 (input validator) | Validated order or error codes |\n| ESTIMATE | N06 (pricing engine)\
  \ | credits_required, estimated_time |\n| AUTHORIZE | N06 (billing) | Payment confirmed or checkout_url |\n| QUEUE | N07\
  \ (orchestrator) | Position in pipeline, ETA |\n| EXECUTE | N03+N04 (producers) | Content artifacts per format |\n| DELIVER\
  \ | N05 (ops) | Files + notification + optional auto-publish |\n\n---"
