5_related_kinds: '- validation_schema: Defines output validation rules that ensure the input conforms to system constraints.
  This schema is validated against a separate validation_schema to confirm compliance before processing.


  - pricing_engine: Uses format selections and tier information to calculate credit costs. The pricing_engine relies on this
  schema''s fields to estimate required credits for each order.


  - orchestrator: Manages the order lifecycle stages (submit, validate, execute, deliver). The orchestrator uses this schema
  to route orders through the pipeline based on their configuration.


  - billing: Processes payment based on the `credits_required` field calculated by the pricing_engine. The billing system
  interacts with this schema to confirm sufficient credits before authorizing order execution.


  ---'
