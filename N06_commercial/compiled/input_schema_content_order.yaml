5_order_lifecycle: "graph TD\n    A[Order Submission] --> B{Validation}\n    B -->|Success| C[Credit Check]\n    B -->|Failure|\
  \ D[Error Response]\n    C -->|Success| E[Content Generation]\n    C -->|Failure| F[Payment Required]\n    E --> G[Delivery]\n\
  \    G --> H[Completion]\n\n---"
6_api_endpoint_mapping: '| Stage | Endpoint | Method | Description |

  |------|----------|--------|-------------|

  | Submit | `/api/v1/orders` | POST | Create new content order |

  | Validate | `/api/v1/orders/{id}/validate` | GET | Check order validity |

  | Credit Check | `/api/v1/orders/{id}/credits` | GET | Verify credit availability |

  | Generate | `/api/v1/orders/{id}/generate` | POST | Initiate content generation |

  | Deliver | `/api/v1/orders/{id}/deliver` | GET | Retrieve generated content |

  | Status | `/api/v1/orders/{id}/status` | GET | Check order progress |


  ---'
7_related_kinds: '- validation_schema: Defines the structure and constraints for output artifacts, ensuring consistency after
  content generation.

  - content_producer: Implements the execution phase, generating content artifacts based on validated orders.

  - pricing_engine: Calculates credit requirements and applies discounts/surcharges during the estimation phase.

  - billing_system: Manages credit checks, payment authorizations, and refund calculations throughout the order lifecycle.

  - orchestrator: Coordinates the pipeline stages, queuing orders and managing their execution order and progress tracking.


  ---'
