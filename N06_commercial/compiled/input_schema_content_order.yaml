2_1_pre_pipeline_gates: '| # | Rule | Error Code | Message |

  |---|------|-----------|---------|

  | V1 | `topic.length >= 10` | TOPIC_TOO_SHORT | "Topic must be at least 10 characters. Be specific." |

  | V2 | `audience` object present | AUDIENCE_MISSING | "Who is this for? Specify segment and skill_level." |

  | V3 | `formats` has >= 1 item | NO_FORMATS | "Select at least 1 output format." |

  | V4 | `course_config` present if `course_module` in formats | COURSE_CONFIG_MISSING | "Course module selected but no course_config
  provided." |

  | V5 | `billing.credits_available >= billing.credits_required` | INSUFFICIENT_CREDITS | "Not enough credits. Need {required},
  have {available}." |

  | V6 | `brand_config` file exists (if not ''auto'') | BRAND_NOT_FOUND | "Brand config file not found at specified path."
  |

  | V7 | No duplicate formats in array | DUPLICATE_FORMAT | "Format ''{format}'' listed twice." |

  | V8 | `video_produced_*` requires tier >= creator | VIDEO_REQUIRES_PAID | "Video production requires Creator tier or above."
  |

  | V9 | `course_module` requires tier >= pro | COURSE_REQUIRES_PRO | "Course modules require Pro tier or above." |'
2_2_credit_calculation: "def calculate_credits(order):\n    CREDIT_MAP = {\n        \"blog_post\": 8,\n        \"social_media_set\"\
  : 12,\n        \"video_script\": 5,\n        \"video_produced_short\": 25,\n        \"video_produced_long\": 45,\n     \
  \   \"podcast_episode\": 10,\n        \"course_module\": 30,\n        \"ebook_chapter\": 10,\n        \"presentation\":\
  \ 12,\n        \"email_sequence\": 8,\n        \"landing_page\": 15,\n    }\n    \n    base = sum(CREDIT_MAP[f] for f in\
  \ order[\"formats\"])\n    \n    # Course modules multiply by count\n    if \"course_module\" in order[\"formats\"]:\n \
  \       modules = order.get(\"course_config\", {}).get(\"modules\", 8)\n        base += CREDIT_MAP[\"course_module\"] *\
  \ (modules - 1)  # first already counted\n    \n    # Rush surcharge\n    if order.get(\"delivery\", {}).get(\"priority\"\
  ) == \"rush\":\n        base = int(base * 1.5)\n    \n    # Bundle discount (4+ formats = 20% off)\n    if len(order[\"\
  formats\"]) >= 4:\n        base = int(base * 0.80)\n    \n    return base\n\n---"
