domain: content-monetization
quality: 8.9
tags:
- dispatch_rule
- content-monetization
- billing
- checkout
- credits
- PIX
- N06
tldr: Routes billing, checkout, credit, course generation, and payment tasks to content-monetization-builder via N06.
scope: content-monetization
keywords:
- monetizar
- monetize
- billing
- faturamento
- checkout
- pagamento
- payment
- PIX
- boleto
- créditos
- credits
- wallet
- saldo
- curso
- course
- assinatura
- subscription
- plano
- plan
- pricing
- preço
- precificar
- invoice
- cobrança
- charge
- receita
- revenue
- MercadoPago
- Stripe
- geração de curso
- course generation
- anúncio monetizado
- ads checkout
- email transacional
- transactional email
- ERP sync
- BaseLinker
- pack de créditos
- credit pack
agent_group: content_monetization_builder
model: sonnet
priority: 9
confidence_threshold: 0.65
fallback: commercial_hub
routing_strategy: keyword_match
purpose: Routes tasks related to billing execution, credit wallet management, checkout session setup, course content generation,
  ad monetization, transactional email dispatch, and ERP synchronization to `content_monetization_builder` (N06 Commercial
  Nucleus).
trigger_conditions: 'Route to `content_monetization_builder` when intent contains ANY of:'
primary_triggers_confidence_0_85_immediate_route: '| Keyword | Language | Intent |

  |---------|----------|--------|

  | monetizar / monetize | PT/EN | Content monetization task |

  | billing / faturamento | PT/EN | Billing execution |

  | checkout / pagamento | PT/EN | Payment session creation |

  | PIX / boleto | PT | Brazilian payment methods |

  | créditos / credits | PT/EN | Credit wallet operation |

  | credit pack / pack de créditos | PT/EN | Credit pack purchase |

  | geração de curso / course generation | PT/EN | LLM course content pipeline |

  | assinatura / subscription | PT/EN | Recurring billing setup |

  | plano de cobrança / billing plan | PT/EN | Pricing tier config |'
secondary_triggers_route_if_no_higher_priority_nucleus_matches:
- invoice, cobrança, charge, receita, revenue, wallet, saldo
- MercadoPago, Stripe, BaseLinker, Bling
- email transacional, transactional email, email sequence
- anúncio monetizado, ads checkout, ad billing
- PIPELINE_COSTS, PARSE, PRICING, CREDITS
routing_decision_tree: "Does intent involve payment, billing, or checkout?\n  YES → content_monetization_builder (N06)\n\n\
  Does intent involve credit wallet or pack purchase?\n  YES → content_monetization_builder (N06)\n\nDoes intent involve LLM\
  \ course generation (outline→module→sales_page→emails)?\n  YES → content_monetization_builder (N06)\n\nDoes intent involve\
  \ ad content validation with billing gate?\n  YES → content_monetization_builder (N06)\n\nDoes intent involve ERP sync (BaseLinker/Bling)\
  \ for paid orders?\n  YES → content_monetization_builder (N06)\n\nDoes intent involve writing production payment code?\n\
  \  NO → Route to N05 (engineering_hub) — implementation, not config\n\nDoes intent involve general pricing strategy without\
  \ billing execution?\n  NO → Route to commercial_hub (N06 general) — strategy only"
keyword_rationale: PT-BR terms are primary because codexa-core targets Brazilian market (MercadoPago, PIX, boleto). English
  terms cover SaaS integrations (Stripe, USD billing). Technical terms (PIPELINE_COSTS, BillingExecutor, idempotency_key)
  route direct integration queries. Both language sets are required for hybrid PT/EN codebases.
priority_tiers: '| Priority | Keywords | Action |

  |----------|----------|--------|

  | 10 (critical) | PIX aprovado, webhook payment.approved, checkout.session.completed | Immediate route — live payment event
  |

  | 9 (high) | monetizar, billing, checkout, créditos, assinatura | Standard route to builder |

  | 7 (medium) | curso, email sequence, ad validation | Route after checking N02/N05 first |

  | 0 (fallback) | * (any unmatched) | Escalate to commercial_hub |'
fallback_logic: 'If confidence < 0.65:

  1. Check commercial_hub (N06 general) — generic monetization?

  2. Check N05 (engineering) — payment code implementation?

  3. If still ambiguous: request clarification: "billing execution, course generation, credit config, or checkout setup?"

  4. Never silently drop a content monetization task'
non_routes_explicit_exclusions: '| Task | Correct Target |

  |------|---------------|

  | Write Stripe/MP Python code | N05 engineering_hub |

  | Design pricing strategy (no execution) | commercial_hub (N06 general) |

  | Research competitor payment models | N01 research_hub |

  | Write marketing copy for course | N02 marketing_hub |

  | Build RAG knowledge base for billing docs | N04 knowledge_hub |

  | Deploy payment microservice to prod | N05 engineering_hub |'
