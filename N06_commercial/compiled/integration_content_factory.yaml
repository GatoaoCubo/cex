1_system_architecture: "CUSTOMER\n    |\n    v\n[LANDING PAGE] ---- N03 builds, N06 provides {{BRAND_PRICE_*}} variables\n\
  \    |\n    | Selects tier / buys Content Pack\n    v\n[CHECKOUT] -------- Stripe (INT) / Hotmart (BR courses) / Eduzz (BR\
