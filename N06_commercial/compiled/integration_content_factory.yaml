  | `{{BRAND_PRICE_COURSE_MASTER}}` | R$997 | output_monetization_business_plan.md | Hotmart checkout |

  | `{{BRAND_PRICE_CREDIT_STARTER}}` | R$60 (50 credits) | pricing_content_factory.md | Credit pack purchase |

