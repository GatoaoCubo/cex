3_credit_system_architecture: ''
3_1_data_model_supabase: "-- Credit accounts (1 per customer)\nCREATE TABLE credit_accounts (\n    id UUID PRIMARY KEY DEFAULT\
  \ gen_random_uuid(),\n    customer_id UUID NOT NULL REFERENCES customers(id),\n    stripe_customer_id TEXT,\n    tier TEXT\
  \ NOT NULL DEFAULT 'free',\n    credits_balance INTEGER NOT NULL DEFAULT 0,\n    credits_allocated INTEGER NOT NULL DEFAULT\
  \ 0,  -- monthly allocation\n    credits_used_this_period INTEGER NOT NULL DEFAULT 0,\n    period_start TIMESTAMPTZ NOT\
  \ NULL DEFAULT NOW(),\n    period_end TIMESTAMPTZ NOT NULL,\n    created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    updated_at\
  \ TIMESTAMPTZ NOT NULL DEFAULT NOW()\n);\n\n-- Credit transactions (audit trail)\nCREATE TABLE credit_transactions (\n \
  \   id UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    account_id UUID NOT NULL REFERENCES credit_accounts(id),\n    amount\
  \ INTEGER NOT NULL,  -- positive = credit, negative = debit\n    type TEXT NOT NULL,  -- 'allocation', 'usage', 'purchase',\
  \ 'refund', 'overage'\n    description TEXT,\n    format TEXT,  -- which content format consumed credits\n    brief_id UUID,\
  \  -- links to the content brief\n    stripe_payment_id TEXT,\n    created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()\n);\n\n\
  -- Content briefs (links to pipeline)\nCREATE TABLE content_briefs (\n    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n\
  \    account_id UUID NOT NULL REFERENCES credit_accounts(id),\n    topic TEXT NOT NULL,\n    audience TEXT,\n    formats\
  \ JSONB NOT NULL,  -- [\"blog\", \"social\", \"video_short\"]\n    credits_estimated INTEGER NOT NULL,\n    credits_actual\
  \ INTEGER,\n    status TEXT NOT NULL DEFAULT 'pending',  -- pending, processing, complete, failed\n    pipeline_run_id TEXT,\
  \  -- links to dag_cf_master execution\n    outputs JSONB,  -- URLs/paths to produced content\n    quality_score REAL,\n\
  \    created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    completed_at TIMESTAMPTZ\n);"
3_2_credit_allocation_by_tier: '| Tier | Monthly Credits | Overage Rate | Reset Policy |

  |------|---------------|-------------|-------------|

  | Free | 15 (capped per format) | N/A | Monthly reset, no rollover |

  | Creator | 150 | R$1.20/credit | Monthly reset, no rollover |

  | Pro | 600 | R$1.00/credit | Monthly reset, 50 credits rollover max |

  | Studio | 2,000 | R$0.85/credit | Monthly reset, 200 credits rollover |

  | Factory | 6,000 | R$0.70/credit | Monthly reset, 500 credits rollover |'
3_3_credit_deduction_flow: "Customer submits brief\n    |\n    v\nEstimate credits needed (based on formats selected)\n  \
  \  |\n    v\nCheck balance >= estimate?\n    |\n    +--> YES: Reserve credits (soft lock)\n    |         |\n    |      \
  \   v\n    |    Run dag_cf_master pipeline\n    |         |\n    |         v\n    |    Deduct actual credits used (may differ\
  \ from estimate)\n    |    Release excess reservation\n    |         |\n    |         v\n    |    Deliver outputs\n    |\n\
  \    +--> NO: Check overage policy\n              |\n              +--> Overage allowed (paid tier): Proceed, bill overage\
  \ via Stripe\n              +--> No overage (Free): Return error \"Upgrade to continue\"\n\n---"
4_brand_price_variable_injection: ''
