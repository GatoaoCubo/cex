revenue_model_recommendation_unchanged_reinforced: '| Model | Fit | Monthly ARPU | Notes |

  |-------|-----|-------------|-------|

  | Tier-based (FREE/PRO/ENTERPRISE) | HIGH | $0/$99/$5K | Aligns with kind complexity. Wave 4 strengthens tier differentiation.
  |

  | API calls (programmatic access) | HIGH | $0.01-0.10/call | Complements tier. Usage_quota kind makes this self-configurable.
  |

  | Training data license | ENTERPRISE | $25K-200K one-time | 2,666 premium ISOs @ 9.0+ quality. Wave 4 adds compliance +
  commercial examples. |

  | White-label / OEM | ENTERPRISE | $10K-50K/mo | white_label_config kind now exists -- direct sales motion enabled |


  Training data licensing is the highest-margin play: 2,666 ISOs averaging 9.0+ quality is a premium fine-tuning dataset for
  enterprise AI teams. Wave 4 adds compliance, commercial, and multi-tenant examples that no public dataset covers. Estimated
  dataset value: $150K-$500K one-time license per enterprise.


  White-label is the multiplier: white_label_config + enterprise_sla + sso_config now form a complete OEM stack. System integrators
  can white-label CEX and resell at 3-5x. One OEM deal = $50K-$200K/year ACV.'
