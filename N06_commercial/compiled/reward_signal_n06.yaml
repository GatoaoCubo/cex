purpose: Registry of commercial plays, pricing decisions, and sales patterns that have produced validated positive revenue
  outcomes. When N06 encounters an ambiguous commercial decision, this registry surfaces the closest matching winning pattern.
signal_schema: "reward_entry:\n  id: REW_{date}_{sequence}\n  date: ISO8601\n  domain: pricing | conversion | retention |\
  \ acquisition | expansion | onboarding\n  pattern: what was done\n  context: when/where it was applied\n  outcome_metric:\
  \ what was measured\n  outcome_value: quantified result\n  confidence: high | medium | low\n  replicability: \"conditions\
  \ under which this pattern replicates\"\n  artifacts_encoding_pattern: [list of artifacts that implement this]"
active_reward_signals: ''
rew_2026_001_usage_based_upgrade_prompt: 'id: REW_2026_001

  date: 2026-04-17

  domain: expansion

  pattern: "In-app progress bar showing builds used / builds available, with upgrade CTA at 80%"

  context: "STARTER tier, monthly plan, users approaching 80 of 100 build quota"

  outcome_metric: "upgrade_rate STARTER->PRO"

  outcome_value: "+40% conversion rate vs no prompt (industry benchmark: Calendly, Linear)"

  confidence: high

  replicability: "Works best when: user has experienced value (5+ builds), prompt appears inline (not modal), CTA shows monthly
  cost per remaining quota unit"

  artifacts_encoding_pattern: [expansion_play_n06.md, subscription_tier_n06.md]'
rew_2026_002_onboarding_checkpoint_gates: 'id: REW_2026_002

  date: 2026-04-17

  domain: onboarding

  pattern: "3-step onboarding checklist (setup brand config, run first build, share output) with progress rewards"

  context: "New STARTER signups in first 72 hours"

  outcome_metric: "activation_rate (first build within 24h)"

  outcome_value: "+65% activation vs no checklist (industry benchmark: Notion, ClickUp)"

  confidence: high

  replicability: "Checklist must be: max 3 steps, each completable in <5 min, each step delivers immediate visible value.
  Failure mode: checklist is long (>5 steps) or abstract (''explore features'')"

  artifacts_encoding_pattern: [churn_prevention_playbook_n06.md]'
rew_2026_003_pause_cancel_framing: 'id: REW_2026_003

  date: 2026-04-17

  domain: retention

  pattern: "When customer selects ''cancel'', primary CTA is ''Pause for 2 months'' not ''Confirm cancel''"

  context: "Cancel flow for STARTER and PRO, reason=''project ended'' or ''taking a break''"

  outcome_metric: "save_rate"

  outcome_value: "+55% save rate vs standard cancel confirmation (Hotjar, Buffer benchmark)"

  confidence: high

  replicability: "Works best when: pause duration is fixed (2-3 months), data is explicitly promised to survive, one-click
  reactivation is communicated. Fails if: pause period is unclear, reactivation requires re-entering card"

  artifacts_encoding_pattern: [churn_prevention_playbook_n06.md]'
rew_2026_004_roi_first_features_second: 'id: REW_2026_004

  date: 2026-04-17

  domain: conversion

  pattern: "Lead sales demo with ROI calculator (customer''s numbers), then features demo"

  context: "ENTERPRISE and PRO sales calls with decision makers"

  outcome_metric: "demo_to_proposal_conversion"

  outcome_value: "+35% proposal conversion (benchmark: Gong.io analysis of top-performing demos)"

  confidence: medium

  replicability: "Works best when: ROI calc uses customer''s own numbers (not generic scenarios), ROI > 10x price, demo follows
  the ROI framing not vice versa. Fails if: ROI calc numbers feel inflated or are challenged"

  artifacts_encoding_pattern: [roi_calculator_n06.md, sales_playbook_n06.md]'
rew_2026_005_dual_sided_referral_superiority: 'id: REW_2026_005

  date: 2026-04-17

  domain: acquisition

  pattern: "Both referrer AND referee receive reward, triggered at conversion not signup"

  context: "Referral program launch"

  outcome_metric: "referral_program_k_factor"

  outcome_value: "K > 0.3 (viral coefficient; benchmark: Dropbox achieved K=0.6 with dual-sided referral)"

  confidence: high

  replicability: "Works best when: reward is substantial relative to price (1 month free vs $5 credit), reward triggers on
  conversion not signup (prevents fraud), referrer gets progress visibility on their link"

  artifacts_encoding_pattern: [referral_program_n06.md]'
pattern_matching_algorithm: "def find_matching_patterns(situation: dict) -> list[dict]:\n    \"\"\"\n    Input: {domain, context_keywords,\
  \ decision_type}\n    Output: ranked list of matching reward signals\n    \"\"\"\n    matches = []\n    for signal in REWARD_REGISTRY:\n\
  \        score = 0\n        if signal[\"domain\"] == situation[\"domain\"]:\n            score += 10\n        for kw in\
  \ situation[\"context_keywords\"]:\n            if kw in signal[\"pattern\"] or kw in signal[\"context\"]:\n           \
  \     score += 5\n        if score > 0:\n            matches.append({\"signal\": signal, \"match_score\": score})\n    return\
  \ sorted(matches, key=lambda x: x[\"match_score\"], reverse=True)"
