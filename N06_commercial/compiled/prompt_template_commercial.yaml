id: p03_pt_commercial_nucleus
kind: prompt_template
pillar: P03
title: Commercial Nucleus Prompt Templates
version: 3.0.0
created: 2026-03-30
updated: 2026-03-31
author: n06_commercial
variables:
- name: product_name
  type: string
  required: true
  default: null
  description: Name of the digital product or course.
- name: target_audience
  type: string
  required: true
  default: null
  description: Specific audience segment (e.g., "freelance designers earning R$3-5k/month").
- name: transformation
  type: string
  required: true
  default: null
  description: Measurable outcome the buyer achieves (e.g., "land their first R$10k client in 90 days").
- name: price_range
  type: string
  required: false
  default: null
  description: Optional price anchor or range to inform tier design.
- name: platform
  type: string
  required: false
  default: Hotmart
  description: Deployment platform (Hotmart, Kiwify, Kajabi, Teachable).
- name: traffic_source
  type: string
  required: false
  default: null
  description: Where traffic enters the funnel (Instagram, YouTube, Google, cold email).
- name: audience_size
  type: string
  required: false
  default: null
  description: Estimated reachable audience size for revenue model projections.
variable_syntax: mustache
composable: true
domain: commercial-monetization
quality: null
tags:
- prompt_template
- commercial
- N06
- pricing
- course
- funnel
- upsell
- revenue-model
tldr: Five reusable N06 templates — Pricing Strategy, Course Outline, Funnel Build, Upsell Sequence, and Revenue Model.
density_score: 0.91
template_1_pricing_strategy: "Use when: You need to price a digital product or course.\n\nDesign a 3-tier pricing strategy\
  \ for {{product_name}}.\n\nTARGET AUDIENCE: {{target_audience}}\nTRANSFORMATION: {{transformation}}\nPLATFORM: {{platform}}\n\
  {{#price_range}}PRICE ANCHOR: {{price_range}}{{/price_range}}\n\nDeliverables:\n1. Transformation Value Assessment — quantify\
  \ what the outcome is worth to the buyer\n2. 3-Tier Pricing Table (Basic / Pro / VIP) with:\n   - Price per tier\n   - Inclusions\
  \ per tier\n   - Psychological rationale for each price point\n3. Revenue Model — 3 scenarios (conservative / realistic\
  \ / optimistic):\n   - Units × Price × Conversion Rate = Revenue\n4. Recommended launch price with written rationale (2-3\
  \ sentences)\n5. Payment plan option (installments) if applicable\n\nApply value-based pricing. Anchor to transformation,\
  \ not production cost.\n\n---"
template_2_course_outline: "Use when: You need to structure a course curriculum.\n\nBuild a course outline for {{product_name}}.\n\
  \nTARGET AUDIENCE: {{target_audience}}\nTRANSFORMATION: {{transformation}}\nPLATFORM: {{platform}}\n\nDeliverables:\n1.\
  \ Transformation Arc:\n   - BEFORE: [student situation, pain, frustration at start]\n   - JOURNEY: [module milestones —\
  \ what shifts at each module]\n   - AFTER: [specific outcome, skill, status, or income gained]\n\n2. Module Structure (4-8\
  \ modules):\n   For each module:\n   - Module title (outcome-focused, not topic-focused)\n   - 3-5 lesson titles\n   - Estimated\
  \ duration\n   - What the student can DO after this module\n\n3. Pricing Tier Recommendation:\n   - Justify based on transformation\
  \ depth and delivery mode\n   - Recommend platform tier (Hotmart Standard / Plus / VIP)\n\n4. Upsell Path:\n   - What is\
  \ the logical next product after completing this course?\n\n---"
template_3_funnel_build: "Use when: You need a complete sales funnel for a product.\n\nBuild a complete sales funnel for {{product_name}}.\n\
  \nTARGET AUDIENCE: {{target_audience}}\nTRANSFORMATION: {{transformation}}\nTRAFFIC SOURCE: {{traffic_source}}\nPLATFORM:\
  \ {{platform}}\n\nDeliverables:\n\nTOFU (Top of Funnel):\n- 3 ad hooks / post headlines targeting the specific pain of {{target_audience}}\n\
  - CTA for each hook (lead magnet name, opt-in page headline)\n- Expected conversion benchmark: [X%]\n\nMOFU (Middle of Funnel):\n\
  - Lead magnet title + 3-bullet value proposition\n- 3-email nurture sequence:\n  - Email 1 (day 0): Deliver + educate\n\
  \  - Email 2 (day 2): Deepen pain + introduce mechanism\n  - Email 3 (day 4): Transition to offer\n\nBOFU (Bottom of Funnel):\n\
  - Sales page headline (outcome-specific)\n- VSL outline (hook → problem → mechanism → proof → offer → CTA)\n- Guarantee\
  \ framing\n- Primary CTA text\n\nPOST-PURCHASE:\n- Order bump: [name, price, one-sentence value prop]\n- OTO1: [name, price,\
  \ take rate estimate]\n- Downsell: [fallback if OTO declined]\n\n---"
template_4_upsell_sequence: "Use when: You need to maximize LTV after the first sale.\n\nDesign a complete upsell sequence\
  \ for buyers of {{product_name}}.\n\nTARGET AUDIENCE: {{target_audience}} who just purchased\nBASE PRICE: {{price_range}}\n\
  \nDeliverables:\n\n1. ORDER BUMP (shown at checkout):\n   - Product name\n   - Price (15-30% of base price)\n   - One-sentence\
  \ value: \"Add X to your order and get Y faster\"\n   - Expected take rate: [%]\n\n2. OTO1 (shown immediately after purchase):\n\
  \   - Product name + transformation\n   - Price (50-100% of base price)\n   - Pitch: what does this unlock that the base\
  \ product doesn't?\n   - Urgency element\n   - Expected take rate: [%]\n\n3. OTO2 (shown after OTO1 decline or accept):\n\
  \   - Done-for-you / implementation layer\n   - Price (2-3x base price)\n   - Expected take rate: [%]\n\n4. DOWNSELL (shown\
  \ after OTO1 decline):\n   - Stripped-down version OR payment plan version\n   - Price (30-40% of OTO1)\n   - Expected conversion\
  \ of declinees: [%]\n\n5. LTV PROJECTION:\n   - AOV = Base + (Bump × take%) + (OTO1 × take%) + (OTO2 × take%)\n   - LTV\
  \ = AOV × [repeat purchase or subscription factor]\n\n---\n\n---"
template_5_revenue_model: "Use when: You need to project revenue scenarios before a launch or pricing decision.\n\nBuild a\
  \ revenue model for {{product_name}}.\n\nTARGET AUDIENCE: {{target_audience}}\nTRANSFORMATION: {{transformation}}\nBASE\
  \ PRICE: {{price_range}}\nPLATFORM: {{platform}}\n{{#audience_size}}REACHABLE AUDIENCE: {{audience_size}}{{/audience_size}}\n\
  \nDeliverables:\n\n1. UNIT ECONOMICS (per sale):\n   - Base price\n   - Order bump price + take rate → contribution\n  \
  \ - OTO1 price + take rate → contribution\n   - OTO2 price + take rate → contribution\n   - AOV = Base + (Bump × %) + (OTO1\
  \ × %) + (OTO2 × %)\n\n2. REVENUE SCENARIOS:\n   | Scenario | Sales | AOV | Revenue |\n   |----------|-------|-----|---------|\n\
  \   | Conservative | [X] | [AOV] | [R$] |\n   | Realistic | [X] | [AOV] | [R$] |\n   | Optimistic | [X] | [AOV] | [R$] |\n\
  \n3. FUNNEL MATH (show conversion chain):\n   Audience → TOFU reach ([X%]) → MOFU opt-ins ([X%]) → BOFU clicks ([X%]) →\
  \ Sales ([X%]) = [N] buyers\n\n4. LTV PROJECTION:\n   - LTV = AOV × Purchase Frequency × Customer Lifespan\n   - Target:\
  \ LTV >= 3x AOV\n\n5. CAC CEILING:\n   - Max acceptable CAC = 30% of AOV = R$[X]\n   - Required ROAS to break even: [X]x\n\
  \n---"
composability: 'These templates chain naturally for a product launch:


  Template 2 (Course Outline) → Template 1 (Pricing Strategy) → Template 5 (Revenue Model) → Template 3 (Funnel Build) → Template
  4 (Upsell Sequence)


  Run in sequence or dispatch to N06 via grid for parallel execution.'
