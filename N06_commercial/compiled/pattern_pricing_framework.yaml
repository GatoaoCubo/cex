tldr: 'Structured pricing methodology: research → value quantification → tier design → testing → optimization. Prevents gut-feel
  pricing.'
density_score: 0.92
problem: 'Pricing is the #1 revenue lever, yet most products price by gut feel or cost-plus. A 1% improvement in pricing yields
  11% profit improvement (McKinsey), compared to 3.3% for volume and 7.8% for cost reduction. Cost of bad pricing: Under-price
  by 20% → you need 25% more customers to match revenue. Over-price by 20% → conversion drops 30-50%. Both are expensive.
  ---'
framework_stages: "┌───────────┐   ┌───────────┐   ┌───────────┐   ┌───────────┐   ┌───────────┐\n│ RESEARCH  │──▶│ QUANTIFY\
  \  │──▶│ DESIGN    │──▶│ TEST      │──▶│ OPTIMIZE  │\n│           │   │           │   │           │   │           │   │\
  \           │\n│ Competitor│   │ Value per │   │ Tier      │   │ A/B with  │   │ Iterate   │\n│ + market  │   │ customer\
  \  │   │ structure │   │ real users│   │ quarterly │\n└───────────┘   └───────────┘   └───────────┘   └───────────┘   └───────────┘\n\
  \  AX09            AX02            AX05            AX06            AX11"
stage_1_research: 'Inputs:

  - 2+ competitor pricing pages (AX09 mandate)

  - Market size estimate (TAM/SAM/SOM)

  - Customer willingness-to-pay signals


  Activities:

  1. Scrape competitor pricing via `fetch` MCP

  2. Map feature sets per tier across competitors

  3. Identify price anchors in the market

  4. Note psychological price points ($9, $29, $49, $99, $199)


  Output: Competitive pricing matrix


  | Competitor | Free | Pro | Enterprise | Key Differentiator |

  |-----------|------|-----|-----------|-------------------|

  | Comp A    | ✅   | $29 | $99/seat  | Feature X         |

  | Comp B    | ❌   | $19 | Custom    | Integration Y     |

  | Our range | ✅   | $?? | $??       | Our differentiator|'
stage_2_quantify: 'Goal: Convert product value into dollar terms.


  Value calculation framework:

  Time saved: hours_saved × hourly_rate = $value_per_month

  Errors prevented: errors_per_month × cost_per_error = $value_per_month

  Revenue generated: additional_revenue_attributable = $value_per_month

  Combined value: sum of above = Total Monthly Value (TMV)


  Price = TMV × capture_rate (typically 10-30%)


  GDP required: User must validate value assumptions.'
stage_3_design: "Tier architecture (AX05: minimum 3):\n\ntiers:\n  free:\n    price: 0\n    purpose: \"acquisition + qualification\"\
  \n    limits: \"usage cap or feature gate\"\n    conversion_trigger: \"what makes them upgrade?\"\n    \n  pro:\n    price:\
  \ \"TMV × 0.10 to TMV × 0.20\"\n    purpose: \"core revenue driver\"\n    features: \"all free + power features\"\n    billing:\
  \ \"monthly with annual discount (20%)\"\n    \n  enterprise:\n    price: \"TMV × 0.25 to TMV × 0.30 per seat\"\n    purpose:\
  \ \"price anchor + large accounts\"\n    features: \"all pro + admin, SSO, SLA, support\"\n    billing: \"annual contract,\
  \ custom negotiation\"\n\nPricing psychology:\n- End in 9 ($29 not $30) for consumer\n- Round numbers ($50, $100) for enterprise\n\
  - Annual = monthly × 10 (not × 12) — the \"2 months free\" anchor\n- Show savings: \"Save 20% with annual billing\""
stage_4_test: "Method: Sequential testing (not A/B if traffic is low)\n\ntest_plan:\n  week_1_2: \"Launch with pro at price_high\"\
  \n  week_3_4: \"Drop to price_mid, compare conversion\"\n  week_5_6: \"Drop to price_low, compare conversion\"\n  analysis:\
  \ \"Plot price vs. conversion × revenue = optimal\"\n\nFor sufficient traffic: True A/B test with 95% confidence.\n\nMetrics\
  \ to track:\n- Conversion rate per tier\n- Revenue per visitor\n- Upgrade rate (free → pro)\n- Churn rate per tier\n- ARPU\
  \ (Average Revenue Per User)"
stage_5_optimize: 'Quarterly review cycle:

  1. Pull metrics from Stripe MCP

  2. Compare against targets in `pricing_optimization_memory.md`

  3. Identify: which tier is underperforming?

  4. Hypothesize fix → run test → measure → decide

  5. Log results to memory


  ---'
anti_patterns: '| Anti-Pattern | Why It Fails | Better Approach |

  |-------------|-------------|-----------------|

  | "Match the cheapest competitor" | Race to zero margin | Differentiate on value, not price |

  | "One price for everyone" | Misses willingness-to-pay variance | Segment with tiers |

  | "Free forever, monetize later" | Never monetizes | Free with clear conversion gates |

  | "Enterprise = Pro × 10" | Not value-justified | Enterprise based on org-level value |

  | "Change price weekly" | Erodes trust | Test quietly, change quarterly max |


  ---'
decision_record_template: 'Every pricing decision gets logged:


  decision_id: "PR-YYYY-MM-DD-NNN"

  product: "product_name"

  previous_price: "$X"

  new_price: "$Y"

  change_pct: "+/-Z%"

  rationale: "Why this change"

  data_source: "experiment PX-NNN | competitor analysis | user feedback"

  expected_impact: "conversion +X% or revenue +$Y/mo"

  actual_impact: "measured after 30 days"

  keep_or_revert: "keep | revert"


  ---'
integration_with_cex_tools: '| Tool | Role in Pricing |

  |------|----------------|

  | `fetch` MCP | Scrape competitor pricing pages |

  | Stripe MCP | Pull revenue data, manage subscription tiers |

  | Hotmart MCP | Course pricing, affiliate commission rates |

  | `cex_evolve.py` | Auto-improve pricing page copy |

  | `brand_audit.py` | Verify pricing aligns with brand positioning |

  | `pricing_optimization_memory.md` | Store all pricing experiment results |'
