dispatch:
- 'Keywords: brand, marca, identidade, brand-book, persona, arquétipo, voz, naming, tagline, posicionamento, UVP, ICP, design-tokens,
  paleta, pricing, curso, funil, monetizar, receita, upsell, checkout'
- 'Priority: 10 (highest — brand discovery blocks all other branded output)'
- 'Fallback: N01 Research (market data) or N03 Builder (artifact construction)'
brand_propagation_architecture: "N06 generates .cex/brand/brand_config.yaml\n  │\n  ├──→ N01: BRAND_ICP, BRAND_COMPETITORS,\
  \ BRAND_CATEGORY\n  ├──→ N02: BRAND_VOICE, BRAND_COLORS, BRAND_FONTS, BRAND_VALUES\n  ├──→ N03: BRAND_COLORS, BRAND_FONTS,\
  \ BRAND_STYLE\n  ├──→ N04: BRAND_NAME, BRAND_CATEGORY, BRAND_CONTENT_PILLARS\n  ├──→ N05: BRAND_NAME, BRAND_LOGO_URL (env\
  \ vars, service labels)\n  ├──→ N07: BRAND_NAME (commit messages, logging)\n  └──→ boot/*.cmd: BRAND_NAME (window titles)"
scaling_monitoring:
- Max 3 concurrent instances (brand audit + pricing + funnel can parallelize)
- 45-minute timeout (brand discovery interview can be long)
- Health check via `brand_validate.py --check`
- 'Signal on complete: `.cex/runtime/signals/n06_complete.json`'
- 'Alert on failure: `.cex/runtime/signals/n06_error.json`'
