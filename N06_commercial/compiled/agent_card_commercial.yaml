tldr: 'brand_architect: Opus 4.6 model, Anthropic Max subscription. Phase 1 = Brand Discovery (12-15 Qs -> brand book -> brand_config.yaml
  -> propagate). Phase 2 = Revenue (pricing, funnels, courses -- all brand-aligned).'
density_score: 0.94
linked_artifacts:
  primary: p02_agent_commercial_nucleus
