role: The `brand_architect` agent card defines the deployment spec for N06 Brand Architect & Revenue Engineer. It handles
  brand identity discovery and codification (Phase 1) and revenue-facing artifacts (Phase 2).
model: opus-4-6
mcps: '| MCP | Purpose | Status |

  |-----|---------|--------|

  | fetch | Web research for competitor analysis, market data | active |

  | stripe_mcp | Subscription analytics, churn rate, payment data | planned |

  | hotmart_mcp | Course sales data, affiliate commissions, products | planned |'
domain_area: brand-identity-monetization
quality: 8.6
tags:
