section_5_narrative: ''
block_20_origin_story: 'GATO³ nasceu da percepção de que o mercado pet tratava gatos como cães menores — produtos genéricos,
  sem curadoria, sem design. Três dimensões definem tudo que fazemos: o bem-estar do gato, a tranquilidade do tutor e a harmonia
  da casa. O ³ no nome não é decoração — é compromisso. Cada produto passa por veterinários comportamentalistas antes de entrar
  no catálogo. Cada conteúdo é guiado pela Ro, nossa persona que traduz ciência felina em passos práticos. Cada decisão visual
  segue uma estética PB minimalista que prova: produtos para gatos podem ser bonitos. De tapetes gelados a camas de janela,
  de arranhadores a kits Gatitude — tudo existe para que o tutor viva mais leve e o gato viva melhor. Vendemos no site próprio
  (gato3.com.br), Mercado Livre e Shopee, e atendemos tanto tutores (B2C) quanto revendedores (B2B) que compartilham nossa
  visão de curadoria premium acessível.'
block_21_mission: '> Harmonizar casa e rotina para que gatos vivam melhor e tutores vivam mais leves — unindo curadoria veterinária,
  educação acolhedora e design que desaparece no ambiente.'
block_22_vision: '> Ser a referência nacional em bem-estar felino, onde cada produto, conteúdo e interação eleva a convivência
  entre gatos, tutores e lares.'
block_23_values:
- Amor aos felinos — Cada decisão é filtrada pelo bem-estar felino, nunca pelo lucro rápido
- Educação acolhedora — Traduzimos ciência em passos práticos, sem julgamento ou tom professoral
- Qualidade impecável — Curadoria rigorosa — se não usaríamos com nossos gatos, não vendemos
- Inovação com propósito — Design minimalista que resolve problemas reais sem agredir o ambiente
- Comunidade — Construímos rede de tutores informados que se apoiam mutuamente
block_24_manifesto: 'Gatos não são cães pequenos. Tutores não são consumidores ignorantes. Casas não precisam virar pet shops.
  O ³ em GATO³ representa nossa tríade sagrada: gato feliz, tutor tranquilo, casa elegante. Enquanto o mercado empurra produtos
  genéricos e promessas vazias, nós curamos com critério científico e design intencional. A Ro é nossa voz — acolhedora mas
  informada, prática mas nunca simplista. Cada produto que escolhemos passou pelo filtro de veterinários comportamentalistas.
  Cada foto que publicamos honra a estética minimalista que não briga com sua decoração. Acreditamos que convivência harmoniosa
  entre espécies é possível, que educação transforma mais que marketing, que design inteligente resolve problemas sem criar
  novos. Não vendemos produtos — curamos soluções. Não fazemos marketing — construímos confiança. Não prometemos milagres
  — entregamos resultados sustentáveis. GATO³ é para tutores que entendem que o melhor investimento é aquele que beneficia
  todos os moradores da casa — inclusive os que andam em quatro patas. ---'
section_6_guidelines: ''
block_25_extended_do_s:
- Sempre mostrar produto em contexto real de uso (não fundo branco isolado)
- Usar depoimentos autênticos de tutores — nada de "cliente satisfeito"
- Citar fontes científicas quando falar de comportamento felino
- Fotografar em ambientes reais minimalistas (não cenários montados)
- Incluir protocolo da Ro em conteúdos educacionais
- Destacar validação veterinária como diferencial competitivo
- Manter hierarquia visual clara — título, subtítulo, CTA bem definidos
- Usar testemunhos visuais (antes/depois) quando possível
block_26_extended_don_ts:
- Nunca usar termos como "revolucionário", "milagroso", "único no mundo"
- Não fotografar produtos empilhados ou em quantidade — minimalismo sempre
- Evitar modelos posando com pets — foco na interação natural
- Não usar cores vibrantes que quebrem a paleta PB (nem em detalhes)
- Jamais copiar tom de concorrentes (especialmente Zee.Dog ou Petlove)
- Não prometer resultados em prazos específicos ("em 7 dias seu gato...")
- Evitar layouts carregados — espaço negativo é estratégico
- Nunca descartar marca d'água ou assinatura GATO³ em materiais
block_27_compliance:
- 'ANVISA: Produtos pet devem atender RDC 51/2011 — materiais seguros, não tóxicos, laudos técnicos atualizados'
- 'INMETRO: Certificação obrigatória para brinquedos pet — resistência, materiais, rotulagem conforme portaria 302/2021'
- 'CONAR: Publicidade responsável — não antropomorfizar resultados, claims baseados em evidência científica'
- 'CDC: Garantia legal 30 dias + adicional 90 dias, SAC claro, política de trocas transparente'
