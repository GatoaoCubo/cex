section_2_positioning: ''
block_6_unique_value_proposition: 'Headline: Para tutores de gatos que buscam elegância e funcionalidade

  Subheadline: GATO³ é a curadoria de bem-estar felino que harmoniza gato, tutor e casa porque cada produto é validado por
  veterinários comportamentalistas e desenhado para desaparecer no ambiente.


  Proof Points:

  1. Validação veterinária comportamental em cada produto do catálogo

  2. Design PB minimalista que integra com decoração existente

  3. Educação acolhedora via Persona Ro com protocolos práticos'
block_7_market_segment:
- 'Demographics: Tutores de gatos 25-45 anos, urbanos, classe B-C+ (R$ 5-15k), ABC Paulista → Grande SP'
- 'Psychographics: Valorizam bem-estar animal, design funcional, educação antes de compra impulsiva'
- 'Behavioral: Buscam soluções práticas e elegantes, pesquisam antes de comprar, querem harmonia gato+casa'
block_8_differentiation: '> "Somos a única curadoria de produtos felinos que une validação veterinária comportamental + estética
  PB minimalista + educação acolhedora via persona-guia (Ro)"


  | Attribute | GATO³ | CatMyPet | Chalesco |

  |-----------|-------|----------|----------|

  | Validação veterinária | ✅ | ❌ | ⚠️ |

  | Design minimalista PB | ✅ | ✅ | ❌ |

  | Persona-guia educacional | ✅ | ❌ | ❌ |'
block_9_transformation_promise: '> From tutor inseguro com gato estressado em casa bagunçada to tutor confiante com felino
  feliz em lar elegante through educação acolhedora da Ro + curadoria de produtos premium validados por veterinários'
block_10_ries_trout_statement: '> "GATO³ is the curadoria de bem-estar felino for tutores de gatos urbanos que valorizam segurança,
  design funcional e estética minimalista who want lar harmonioso onde gato, tutor e casa coexistem em paz" ---'
section_3_voice: ''
block_11_5d_voice_scale: '| Dimension | Score | Description |

  |-----------|-------|-------------|

  | Formality | 3/5 | Equilibrio entre sofisticação e acessibilidade — não técnico demais, não casual demais |

  | Enthusiasm | 3/5 | Tom moderado — engajado mas controlado, sem excessos ou frieza |

  | Humor | 2/5 | Sutileza — leveza ocasional mas sempre respeitosa e adequada ao contexto |

  | Warmth | 4/5 | Acolhedor — abraça o tutor sem julgamento, oferece apoio emocional |

  | Authority | 3/5 | Conhecimento confiável — baseado em ciência veterinária mas não autoritário |'
block_12_language_style:
- 'Sentence structure: Frases curtas e parágrafos enxutos, ritmo fluido e digestivo'
- 'Vocabulary level: Linguagem acessível com termos técnicos explicados quando necessário'
- 'Jargon policy: Evitar jargão veterinário — traduzir ciência em passos práticos'
block_13_voice_do_s:
- Usar frases curtas e parágrafos enxutos
- Explicar o porquê — ciência acessível, nunca jargão
- Dar passos práticos e acionáveis (protocolos da Ro)
- Tratar o tutor como parceiro, nunca como ignorante
- Contextualizar produto como meio, não como fim
block_14_voice_don_ts:
- Prometer milagres ou resultados garantidos
- Usar gíria, infantilizar ou falar como pet shop genérico
- Medicalizar sem respaldo veterinário
- Usar CAPS LOCK, excesso de emojis ou tom de vendedor
- Comparar diretamente com concorrentes pelo nome
