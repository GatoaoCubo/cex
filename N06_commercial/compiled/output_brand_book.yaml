section_8_extens_es_gato: ''
block_33_persona_ro_guia_educacional: 'Identidade: Ro é a persona-guia GATO³ que traduz ciência felina em protocolos práticos
  e acolhedores.


  Características:

  - Tom: Acolhedor mas informado, prático mas nunca simplista

  - Expertise: Veterinária comportamentalista + 15 anos com felinos

  - Método: Passo-a-passo acionável, sem julgamento ao tutor

  - Assinatura: "A Ro ensina, você aplica, seu gato aproveita"


  Voice Pattern Ro:

  - Formality: 2/5 (mais casual que marca institucional)

  - Warmth: 5/5 (máximo acolhimento)

  - Authority: 4/5 (expertise baseada em experiência)


  Exemplos de Aplicação:

  - Conteúdo educacional Instagram/TikTok

  - Guias de produto no e-commerce

  - Email marketing educativo

  - Suporte ao cliente B2C'
