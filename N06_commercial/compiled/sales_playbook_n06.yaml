strategic_frame: 'Sales is structured value delivery. Every conversation follows the same architecture: qualify fast (avoid
  wasting time on non-ICP), demonstrate ROI (not features), handle objections (preempt, not react), and close on value (not
  pressure). Strategic Greed is patient -- it closes deals where the ROI math is undeniable.'
icp_qualification_meddic_framework: 'Before demo, qualify all 6 dimensions:


  | Dimension | Question to Ask | Disqualify If |

  |-----------|----------------|---------------|

  | Metrics | "What does success look like in 90 days? How do you measure it?" | No measurable goal |

  | Economic Buyer | "Who signs off on tools like this?" | No access to economic buyer |

  | Decision Criteria | "What''s most important to you: speed, quality, cost, compliance?" | Criteria CEX can''t win |

  | Decision Process | "Walk me through how you''d evaluate this. What''s the timeline?" | No process = no urgency |

  | Identify Pain | "What''s the most painful part of how you do this today?" | Pain doesn''t match N06 value |

  | Champion | "Who else on your team would benefit from seeing this?" | No internal advocate |


  Score: 5-6 = hot lead (direct to demo). 3-4 = nurture. <3 = politely exit.'
discovery_phase_15_minutes: "1. Context question (2 min):\n   \"Tell me about how you currently create [artifact type / brand\
  \ materials / commercial content].\"\n   \n2. Pain quantification (5 min):\n   \"How many hours per week does your team\
  \ spend on this?\"\n   \"What's the quality like? How many revision cycles?\"\n   \"What's the cost of getting it wrong\
  \ or slow?\"\n   \n3. Desired state (5 min):\n   \"In an ideal world, what does this process look like?\"\n   \"What would\
  \ you do with the time you'd save?\"\n   \n4. ROI setup (3 min):\n   \"Let me run some quick math with your numbers...\"\
  \n   [Input into roi_calculator_n06 live during call]"
demo_sequence_30_minutes: "Slide 1 -- Their Pain (2 min):\n  \"Based on what you told me: [reflect back their pain points]\"\
  \n  \"You're spending [X hours/week], which at [$Y/hr] is [$Z/month]\"\n  \"That's [$Z*12] per year on a manual process.\"\
  \n\nSlide 2 -- CEX Positioning (3 min):\n  \"CEX is not a writing tool or a template library.\"\n  \"It's a typed enterprise\
  \ brain -- 257 kinds of commercial knowledge, 8 reasoning steps per artifact.\"\n  \"The 8F pipeline is what makes a 5-word\
  \ input produce a professional output.\"\n\nSlide 3 -- ROI Proof (5 min):\n  Show roi_calculator with their numbers.\n \
  \ \"Your ROI: [X]% in the first month. Payback: [N] days.\"\n  \"Even if we're only half right, you're still [net_value/2]\
  \ ahead.\"\n\nSlide 4 -- Live Demo (15 min):\n  \"Let me build something relevant to your exact use case right now.\"\n\
  \  Pick the use case closest to their pain.\n  Show: intent -> 8F pipeline -> artifact output (3 minutes)\n  Show: iteration\
  \ (change one thing, regenerate in seconds)\n\nSlide 5 -- Plan + Pricing (5 min):\n  \"Based on your team size and use case,\
  \ [TIER] is the fit.\"\n  Show feature matrix for recommended tier vs the one below.\n  \"The step up from [tier-1] to [recommended]\
  \ gets you [key feature they need].\""
objection_handling: '| Objection | Root Cause | Response |

  |-----------|-----------|---------|

  | "We already use [ChatGPT / Jasper / Copy.ai]" | Not differentiated | "Those are generation tools. CEX is a typed knowledge
  system. The difference: those give you text. CEX gives you artifact types with quality gates, brand memory, and 8F reasoning.
  Let me show you the gap in 2 minutes." |

  | "It''s too expensive" | Value not proven | "Let''s look at your math. At [$rate/hr] x [hours] -- you''re spending [$X/month]
  on this manually. CEX is [$price/month]. The math says you''re spending [$X] to avoid [$price]. Does that feel right?" |

  | "We need to think about it" | Missing urgency | "What would help you decide faster? Is there a specific use case you''d
  want to test first?" + Offer 14-day pilot on most relevant use case |

  | "Our team won''t adopt it" | Change management fear | "What you''re describing is a training problem, not a tool problem.
  We onboard [similar team size] in [hours]. Here''s how..." + Show learning_record REW_002 onboarding checkpoint pattern
  |

  | "We need IT/Legal approval" | Enterprise sales cycle | Switch to Enterprise flow. Schedule intro call with IT/Legal stakeholders.
  Provide security docs + data residency options. |

  | "Can we get a discount?" | Price sensitivity | "I can offer annual pricing -- that''s 2 months free, same as 17% off.
  Want me to run the annual numbers?" Do NOT offer ad hoc discounts outside of annual framing. |'
closing_protocol: ''
trial_close_use_throughout_demo: '"Does this solve the problem you described earlier?" "Can you see your team using this for
  [their use case]?"'
hard_close_end_of_demo: "\"Based on everything we covered:\n - Your ROI is [X]% -- payback in [N] days\n - [TIER] plan solves\
  \ the [specific pain they identified]\n - Setup takes [time], you'd be running by [date]\n\nWhat would you need to move\
  \ forward this week?\""
next_steps_protocol:
- 'Hot lead: send checkout link in meeting + follow up in 24h'
- 'Warm lead: send ROI one-pager + schedule follow-up in 3 days'
- 'Needs approval: loop in economic buyer + send formal proposal'
qualification_disqualifiers_exit_politely: 'PASS if any of:

  - Team < 1 person (solo hobbyist, not commercial buyer)

  - Budget < $50/month firm (below STARTER, no upgrade path)

  - Timeline > 6 months (no urgency)

  - Not the decision maker AND no champion identified

  - Use case is pure content generation (better fit: Jasper, Copy.ai)'
