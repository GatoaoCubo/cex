  \ execution passes with:\n  `python _tools/cex_cohort_analyzer.py --demo --json`"
execution_evidence: "- Demo run output:\n  `Analyzed 200 users across 4 cohorts`\n- Custom edge case run output:\n  `Cohort\
  \     Size  M0     M1     M2`\n- The edge case confirms month-0 and month-1 retention stay active when churn\n  lands on\
  \ the next month boundary, which is a reasonable monthly-cohort rule."
cohort_math_assessment: '| Check | Result | Evidence |

  |------|--------|----------|

  | File exists | PASS | `_tools/cex_cohort_analyzer.py` listed in `_tools/` |

  | Demo runs | PASS | Analyzed 200 users across 4 cohorts |

  | Cohort grouping | PASS | Grouped by signup month via `month_key(signup)` |

  | Active user counting | PASS | Counts retained users per cohort month bucket |

  | Retention table | PARTIAL | Percentages computed from active count / cohort size |

  | JSON semantics | PARTIAL | Field named `retention` contains counts, not percentages |

  | Time horizon rendering | FAIL | Future months print `0.0%`, which can be mistaken for churn instead of unavailable horizon
  data |'
what_is_correct: "- Signup month bucketing is correct for a monthly cohort view.\n- Churn exclusion logic is directionally\
  \ correct.\n  A user churned before a checkpoint month is excluded from that month.\n- The tool is useful for first-pass\
  \ retention analysis on CSV exports.\n- The implementation is stdlib-only and easy to wire into Stripe or Hotmart\n  exports\
  \ later."
what_is_not_correct_yet: "1. The JSON output is not true retention percent output.\n   It returns active user counts under\
  \ a `retention` key.\n2. The ASCII table treats unavailable future months as `0.0%`.\n   That depresses newer cohorts and\
  \ can be misread as severe churn.\n3. `month_diff()` is defined but unused.\n   The tool works without it, but this signals\
  \ unfinished logic."
sufficiency_for_n06: '- Useful now for manual retention inspection: YES

  - Safe as a decision-grade cohort reporting tool: NOT YET

  - Safe as a building block for LTV work: YES, with caveats

  - Safe as a direct revenue dashboard source: NO


  Conclusion:

  `cex_cohort_analyzer.py` is a valid new wired tool and a meaningful upgrade for

  N06, but the verification result is `PARTIAL`, not `FULL PASS`.'
