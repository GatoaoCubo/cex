part_4_top_3_next_builds_prioritized_for_n06: ''
priority_1_pricing_simulator: "Kind: `optimization` or `pricing_experiment_tool` (P04)\nImpact: +3-7% revenue\nEffort: Medium\
  \ (150 LOC)\nDependency: None\nWhat it does:\n- Input: current pricing tiers (name, price, features, current volume)\n-\
  \ Simulate price changes: test $99→$119, $499→$399, etc.\n- Output: revenue impact, margin impact, estimated CAC payback\n\
  - A/B test framework: treatment vs. control cohorts\n\nExample:\nInput: {\n  \"tiers\": [\n    {\"name\": \"pro\", \"price\"\
  : 99, \"volume\": 50},\n    {\"name\": \"enterprise\", \"price\": 499, \"volume\": 5}\n  ],\n  \"tests\": [\n    {\"tier\"\
  : \"pro\", \"new_price\": 119, \"elasticity\": -0.2}\n  ]\n}\n\nOutput: {\n  \"baseline_mrr\": 5495,\n  \"test_mrr\": 5687,\n\
  \  \"delta\": 192,\n  \"delta_pct\": 3.5,\n  \"payback_months\": 12\n}\n\nNucleus: N06 (commercial) or N03 (build)\nBuilder:\
  \ `pricing-simulator-builder`\n\n---"
priority_2_ltv_calculator: "Kind: `optimizer` or `business_model` (P11)\nImpact: +2-5% profitability\nEffort: Medium (200\
  \ LOC)\nDependency: `cex_cohort_analyzer` output (retention %)\nWhat it does:\n- Input: ARPU (avg revenue per user), retention\
  \ curve (from cohort analyzer), CAC (cost per acquisition)\n- Calculate: LTV = (ARPU × retention_months) / (1 + discount_rate)\
  \ - CAC\n- Output: LTV by cohort, LTV:CAC ratio, payback period, profitable segments\n\nExample:\nInput: {\n  \"arpu\":\
  \ 100,\n  \"retention_curve\": [1.0, 0.90, 0.81, 0.73, ...],\n  \"cac\": 250,\n  \"discount_rate\": 0.02\n}\n\nOutput: {\n\
  \  \"ltv_60m\": 4,200,\n  \"ltv_to_cac\": 16.8,\n  \"payback_months\": 2.5,\n  \"profitable\": true\n}\n\nNucleus: N06 (commercial)\n\
  Builder: `ltv-calculator-builder`\n\n---"
priority_3_funnel_analyzer: "Kind: `analyzer` or `funnel_diagnostic_tool` (P04)\nImpact: +5-15% conversion\nEffort: Medium\
  \ (250 LOC)\nDependency: None (input: stage counts, costs)\nWhat it does:\n- Input: funnel stages (awareness, interest,\
  \ decision, action) + conversion counts + stage cost\n- Calculate: conversion %, drop-off %, bottleneck identification,\
  \ cost-per-conversion per stage\n- Output: ranked fix recommendations (biggest ROI improvements first)\n\nExample:\nInput:\
  \ {\n  \"stages\": [\n    {\"name\": \"landing\", \"count\": 1000},\n    {\"name\": \"trial\", \"count\": 150},\n    {\"\
  name\": \"paid\", \"count\": 30}\n  ]\n}\n\nOutput: {\n  \"landing_to_trial\": 15.0%,\n  \"trial_to_paid\": 20.0%,\n  \"\
  overall_conversion\": 3.0%,\n  \"bottleneck\": \"landing_to_trial (85% drop)\",\n  \"fix_priority\": \"A/B test landing\
  \ page CTA\"\n}\n\nNucleus: N06 (commercial)\nBuilder: `funnel-analyzer-builder`\n\n---"
