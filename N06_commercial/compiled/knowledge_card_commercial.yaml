pricing_frameworks: ''
value_based_pricing: 'Price = perceived transformation value to the buyer, not cost to produce.

  - Formula: `Price = (Outcome Value) × (Certainty Factor) × (Speed Factor)`

  - Example: Course that helps land a R$10k/month job → price R$1,500-R$3,000'
anchor_pricing: 'Always present a higher anchor before the real price.

  - "Would normally cost R$5,000. Today: R$997."

  - Anchors shift perceived value and justify the actual price'
tiered_pricing_3_tier_standard: '| Tier | Price Ratio | What it includes |

  |------|-------------|-----------------|

  | Basic | 1x | Core content only |

  | Pro | 2.5x | Core + community + Q&A |

  | VIP/Mentorship | 5x | Core + community + live sessions + 1:1 |


  Rule: 70-80% of buyers choose middle tier when anchored by VIP.'
psychological_pricing:
- 'Charm pricing: R$997 not R$1,000 (3x cheaper perception)'
- 'Round pricing for premium: R$2,000 feels MORE premium than R$1,997'
- 'Payment plans: 12x R$97 vs. R$997 à vista — installments increase access, reduce perceived barrier'
course_monetization_models: '| Model | Structure | Best For |

  |-------|-----------|----------|

  | One-time | Single payment, lifetime access | Low-ticket (<R$500), lead gen |

  | Cohort | Fixed start/end, group learning | Premium (R$2k+), community-driven |

  | Subscription | Monthly/annual, library access | Content depth, recurring revenue |

  | Hybrid | One-time + upsell to subscription | Most scalable — entry + LTV |'
transformation_arc_mandatory_for_every_course: "BEFORE: [Student situation, pain, frustration]\n    ↓ [Course journey — modules\
  \ as milestones]\nAFTER: [Concrete outcome, skill, status, income]\nWithout a transformation arc, the course has no pricing\
  \ anchor."
platform_considerations: '| Platform | Best For | Pricing Behavior |

  |----------|----------|-----------------|

  | Hotmart | Brazilian market, affiliates | 3-tier + order bump native |

  | Kiwify | PT-BR, lower fees | Simple checkout, fast setup |

  | Kajabi | International, all-in-one | Higher ticket, community |

  | Teachable | International, clean UX | Standard course delivery |'
sales_funnel_stages: TOFU (Top of Funnel) → MOFU (Middle) → BOFU (Bottom) → CHECKOUT → POST-PURCHASE
stage_benchmarks: '| Stage | Artifact | Conversion Benchmark |

  |-------|----------|---------------------|

  | TOFU | Ad / organic post | 1-3% click-through |

  | MOFU | Lead magnet / webinar | 20-40% opt-in |

  | BOFU | Sales page / VSL | 2-5% of traffic → purchase |

  | Checkout | Checkout page | 60-80% completion (of initiated) |

  | Post-purchase | OTO / order bump | 15-30% OTO take rate |'
vsl_video_sales_letter_structure:
- 'Hook (0-30s): Call out the avatar + pain. "Se você é [X] e ainda não consegue [Y]..."'
- 'Problem (30s-2min): Agitate the pain. Cost of inaction.'
- 'Revelation (2-4min): The mechanism — why other solutions fail, why THIS works'
- 'Proof (4-6min): Results, testimonials, case studies'
- 'Offer (6-8min): What''s included, price reveal, anchor + discount'
- 'CTA (8-end): Urgency + guarantee + call to action'
upsell_architecture: ''
standard_sequence: "PURCHASE → Order Bump (15-30% take rate, low-ticket add-on)\n         → OTO1 (complementary high-value,\
  \ 20-35% take rate)\n         → OTO2 (implementation/done-for-you, 10-20% take rate)\n         → Downsell (payment plan\
  \ / lite version if OTO declined, 25-40% of declinees)"
ltv_calculation: 'LTV = AOV × Purchase Frequency × Customer Lifespan

  AOV = (Base Price × % buyers) + (OTO1 × % take) + (OTO2 × % take) + (Bump × % take)'
revenue_modeling: ''
key_metrics: '| Metric | Definition | Target |

  |--------|-----------|--------|

  | AOV | Average Order Value | 1.5-2.5x base price (with upsells) |

  | LTV | Lifetime Customer Value | 3-5x AOV |

  | CAC | Customer Acquisition Cost | < 30% of AOV |

  | Funnel ROI | Revenue / Ad Spend | >= 3x (ROAS 3+) |

  | Refund Rate | Refunds / Sales | < 5% |'
mrr_scenarios_course_launch_example: 'Conservative: 100 sales × R$997 = R$99,700

  Realistic:    250 sales × R$997 + 30% OTO (R$497) = R$286,700

  Optimistic:   500 sales × R$997 + 25% OTO + order bump = R$560,000+'
golden_rules:
- Price = transformation value. Justify with outcome, not effort.
- Every offer needs 3 tiers. Middle tier anchored by VIP.
- Every funnel needs a post-purchase upsell. First sale is smallest.
- Every course needs a transformation arc. Start → end state.
- Every revenue projection needs units × price × conversion rate.
- Validate conversion benchmarks before committing to projections.
flow: '[Intent] → [Identify Artifact Type] → [Load Framework] → [Apply Benchmarks] → [Produce Artifact] → [Validate]'
