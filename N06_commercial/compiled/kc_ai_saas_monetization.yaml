title: AI SaaS Monetization Models
version: 1.0.0
quality: 8.8
pillar: P01
core_models:
- 'Per-Token Pricing: Charge per API request/token (e.g., chatbot services). OpenAI charges $0.002 per token for GPT-3.5,
  generating $1.2M/month at 100M tokens. Scalable for high-volume users but risky for low-usage clients.'
- 'Seat-Based: Monthly/yearly user licenses (e.g., enterprise collaboration tools). Slack charges $12.50/user/month for premium
  plans, with 100k+ companies using it. Scalable but limited by user growth.'
- 'Usage-Based: Tiered pricing by feature/function (e.g., analytics platforms). Google Analytics offers free tier with $100/month
  for advanced features. High revenue potential but complex to implement.'
- 'Freemium: Free tier with premium upgrades (e.g., AI coding assistants). Grammarly converts 5% of free users to paid ($12/month),
  achieving 200k+ paid subscribers. High CAC but strong LTV.'
- 'Enterprise Tiers: Custom pricing for large organizations (e.g., customer success platforms). Salesforce offers $150k/year
  for its AI modules, targeting Fortune 500 clients. High margins but long sales cycles.'
