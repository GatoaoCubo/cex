# P02 Model Schema v4.0
# v2.0: machine_format per type
# Baseado em: DISTILL_GOLDEN_AGT_SKL_PATTERNS.md
# Evidence: 31 golden agents, 78 golden documents, ISO patterns
lp: P02
name: Model
description: QUEM o agente EH
types:
  agent:
    description: Definicao de agente (persona + capabilities)
    boundary: Definicao completa de agente (persona + capabilities). NAO eh skill
      (P04, habilidade executavel) nem system_prompt (P03, como fala).
    layer: spec
    core: true
    machine_format: yaml
    naming: p02_agent_{{name}}.md + .yaml
    constraints:
      max_bytes: 5120
      quality_min: 7.0
    frontmatter_required:
    - id
    - type
    - lp
    - title
    - version
    - satellite
    - domain
    - quality
    - tags
    - tldr
    body_structure:
    - overview
    - architecture
    - file_structure
    - when_to_use
    - input_output
    - integration
    - quality_gates
    - common_issues
    - invocation
    - related_agents
    - footer
    iso_vectorstore:
      min_files: 10
      required:
      - MANIFEST
      - QUICK_START
      - PRIME
      - INSTRUCTIONS
      - ARCHITECTURE
      - OUTPUT_TEMPLATE
      - EXAMPLES
      - ERROR_HANDLING
      - UPLOAD_KIT
      - SYSTEM_INSTRUCTION
    llm_function: BECOME
  lens:
    description: Perspectiva especializada sobre dominio
    boundary: Perspectiva especializada sobre dominio. NAO eh agent (sem capabilities)
      nem mental_model (sem routing rules).
    layer: content
    core: false
    machine_format: yaml
    naming: p02_lens_{{perspective}}.md + .yaml
    constraints:
      max_bytes: 2048
    frontmatter_required:
    - id
    - type
    - perspective
    - applies_to
    llm_function: INJECT
  boot_config:
    description: Configuracao de inicializacao por provider
    boundary: Bootstrap por provider (claude, cursor, codex). NAO eh env_config (P09,
      variaveis genericas) nem spawn_config (P12, satelites).
    layer: runtime
    core: false
    machine_format: yaml
    naming: p02_boot_{{provider}}.md
    constraints:
      max_bytes: 2048
    frontmatter_required:
    - id
    - provider
    - identity
    - constraints
    - tools
    llm_function: GOVERN
  mental_model:
    description: Mapa mental do agente (routing, decisoes)
    boundary: Identidade fixa do agente com routing e decisoes. NAO eh mental_model
      P10 (estado variavel por sessao).
    layer: spec
    core: true
    machine_format: yaml
    naming: p02_mm_{{agent}}.yaml
    constraints:
      max_bytes: 2048
    frontmatter_required:
    - id
    - agent
    - routing_rules
    - decision_tree
    llm_function: BECOME
  model_card:
    description: Spec do LLM usado (pricing, context, capabilities)
    boundary: Spec de LLM (pricing, context window, capabilities). NAO eh agent (P02,
      quem usa o modelo) nem boot_config (como inicia).
    layer: spec
    core: false
    machine_format: yaml
    naming: p02_mc_{{model}}.md + .yaml
    constraints:
      max_bytes: 2048
    frontmatter_required:
    - id
    - model_name
    - provider
    - context_window
    - pricing
    llm_function: GOVERN
  router:
    description: Regra de roteamento (task > satellite)
    boundary: Roteamento task-to-satellite. NAO eh dispatch_rule (P12, keyword>satellite)
      nem fallback_chain (modelo>modelo).
    layer: runtime
    core: true
    machine_format: yaml
    naming: p02_rt_{{scope}}.yaml
    constraints:
      max_bytes: 1024
    frontmatter_required:
    - id
    - routes
    - fallback
    llm_function: REASON
  fallback_chain:
    description: Sequencia de fallback (model A > B > C)
    boundary: Sequencia de fallback entre modelos LLM. NAO eh chain (P03, sequencia
      de prompts) nem router (task routing).
    layer: runtime
    core: false
    machine_format: yaml
    naming: p02_fb_{{chain}}.yaml
    constraints:
      max_bytes: 512
    frontmatter_required:
    - id
    - chain
    - timeout_per_step
    llm_function: GOVERN
  iso_package:
    description: Pacote portable de agente AI (ISO format) — self-contained, LLM-agnostic
    boundary: Pacote distribuivel de agente em formato ISO. NAO eh agent (spec do
      agente) — iso_package eh o bundle portable.
    layer: spec
    core: true
    machine_format: yaml
    naming: agents/{{agent_name}}/manifest.yaml
    constraints:
      max_bytes: 4096
    required_files:
    - manifest.yaml
    - system_instruction.md
    - instructions.md
    recommended_files:
    - architecture.md
    - output_template.md
    - examples.md
    - error_handling.md
    optional_files:
    - quick_start.md
    - input_schema.yaml
    - upload_kit.md
    - upload_kit_whitelabel.md
    tiers:
      minimal: 3
      standard: 7
      complete: 10
      whitelabel: 12
    quality_gates:
      system_instruction_max_tokens: 4096
      min_examples: 2
      density_min: 0.8
      score_min: 8.0
      no_hardcoded_paths: true
    lp_mapping:
      manifest.yaml: P02
      system_instruction.md: P03
      instructions.md: P03
      architecture.md: P08
      output_template.md: P05
      examples.md: P07
      error_handling.md: P11
      quick_start.md: P01
      input_schema.yaml: P06
      upload_kit.md: P04
    llm_function: BECOME
