# P02 Model Schema
# Baseado em: DISTILL_GOLDEN_AGT_SKL_PATTERNS.md
# Evidence: 31 golden agents, 78 golden documents, ISO patterns

lp: P02
name: Model
description: QUEM o agente EH

types:
  agent:
    description: Definicao de agente (persona + capabilities)
    naming: p02_agent_{{name}}.md + .yaml
    constraints:
      max_bytes: 5120
      quality_min: 7.0
    frontmatter_required:
      - id
      - type            # agent
      - lp              # P02
      - title
      - version
      - satellite       # qual satellite opera
      - domain
      - quality
      - tags
      - tldr
    body_structure:     # 11 secoes padrao (DISTILL_AGT)
      - overview
      - architecture    # ASCII diagram ou tabela
      - file_structure
      - when_to_use     # YES/NO tabela
      - input_output
      - integration     # upstream + downstream
      - quality_gates   # 5D ou 12LP
      - common_issues
      - invocation
      - related_agents
      - footer          # Satellite: {{SAT}} | Quality: {{Q}}
    iso_vectorstore:
      min_files: 10     # baseline
      required:
        - MANIFEST
        - QUICK_START
        - PRIME
        - INSTRUCTIONS
        - ARCHITECTURE
        - OUTPUT_TEMPLATE
        - EXAMPLES
        - ERROR_HANDLING
        - UPLOAD_KIT
        - SYSTEM_INSTRUCTION

  lens:
    description: Perspectiva especializada sobre dominio
    naming: p02_lens_{{perspective}}.md + .yaml
    constraints:
      max_bytes: 2048
    frontmatter_required:
      - id
      - type
      - perspective
      - applies_to

  boot_config:
    description: Configuracao de inicializacao por provider
    naming: p02_boot_{{provider}}.md
    constraints:
      max_bytes: 2048
    frontmatter_required:
      - id
      - provider        # claude, cursor, windsurf, codex, copilot, pi
      - identity
      - constraints
      - tools

  mental_model:
    description: Mapa mental do agente (routing, decisoes)
    naming: p02_mm_{{agent}}.yaml
    constraints:
      max_bytes: 2048
    frontmatter_required:
      - id
      - agent
      - routing_rules
      - decision_tree

  model_card:
    description: Spec do LLM usado (pricing, context, capabilities)
    naming: p02_mc_{{model}}.md + .yaml
    constraints:
      max_bytes: 2048
    frontmatter_required:
      - id
      - model_name
      - provider
      - context_window
      - pricing

  router:
    description: Regra de roteamento (task > satellite)
    naming: p02_rt_{{scope}}.yaml
    constraints:
      max_bytes: 1024
    frontmatter_required:
      - id
      - routes
      - fallback

  fallback_chain:
    description: Sequencia de fallback (model A > B > C)
    naming: p02_fb_{{chain}}.yaml
    constraints:
      max_bytes: 512
    frontmatter_required:
      - id
      - chain
      - timeout_per_step

  iso_package:
    description: Pacote portable de agente AI (ISO format) — self-contained, LLM-agnostic
    naming: agents/{{agent_name}}/manifest.yaml
    constraints:
      max_bytes: 4096
    required_files:
      - manifest.yaml
      - system_instruction.md
      - instructions.md
    recommended_files:
      - architecture.md
      - output_template.md
      - examples.md
      - error_handling.md
    optional_files:
      - quick_start.md
      - input_schema.yaml
      - upload_kit.md
      - upload_kit_whitelabel.md
    tiers:
      minimal: 3     # required only
      standard: 7    # + recommended
      complete: 10   # + optional
      whitelabel: 12 # + whitelabel variants
    quality_gates:
      system_instruction_max_tokens: 4096
      min_examples: 2
      density_min: 0.8
      score_min: 8.0
      no_hardcoded_paths: true
    lp_mapping:
      manifest.yaml: P02
      system_instruction.md: P03
      instructions.md: P03
      architecture.md: P08
      output_template.md: P05
      examples.md: P07
      error_handling.md: P11
      quick_start.md: P01
      input_schema.yaml: P06
      upload_kit.md: P04

# Evidence: 31 golden agents, 22+ ISO files in mature agents
# ISO count = maturity: 10=baseline, 17=mature, 22+=golden
# Shokunin iteration 2 | 2026-03-22