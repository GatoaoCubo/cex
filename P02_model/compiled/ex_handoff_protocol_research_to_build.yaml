id: p02_hp_research_to_build
kind: handoff_protocol
pillar: P02
title: Research-to-Build Handoff (research_agent to builder_agent)
version: 1.0.0
created: 2026-03-29
updated: 2026-03-29
author: builder_agent
domain: orchestration
quality: 9.1
tags:
- handoff-protocol
- shaka
- edison
- research
- build
- agent_group
- a2a
tldr: Protocolo de handoff entre research_agent (pesquisa) e builder_agent (build) — research_agent entrega findings+sources+quality_score
  via arquivo .md, builder_agent consome e produz build artifacts
when_to_use: Quando pesquisa research_agent deve alimentar implementacao builder_agent sem intervencao manual de orchestrator
overview: Define o contrato de transferencia de contexto entre research_agent (agent_group de pesquisa) e builder_agent (agent_group
  de build). research_agent produz findings estruturados como knowledge cards ou research reports; builder_agent consome esses
  artifacts para implementar agentes, skills, ou componentes. O handoff e assincrono via filesystem — nao requer ambos agent_groups
  ativos simultaneamente.
trigger: '| Field | Value |

  |-------|-------|

  | event | `research_complete` |

  | source_agent_group | research_agent |

  | target_agent_group | builder_agent |

  | trigger_mechanism | Signal file: `.claude/signals/shaka_complete_*.json` |

  | detection | orchestrator poll (15s interval) ou `stella_signal_monitor.py --watch` |'
context_contract_research_agent_builder_agent: "handoff_file: .claude/handoffs/{MISSION}_edison.md\nrequired_context:\n  findings:\n\
  \    type: list[object]\n    description: Descobertas da pesquisa, cada uma com evidencia\n    min_items: 3\n    schema:\n\
  \      - finding: string       # Descoberta principal\n      - evidence: string      # URL, citacao, ou dados que suportam\n\
  \      - confidence: float     # 0.0-1.0 confianca na descoberta\n      - relevance: enum       # critical | high | medium\
  \ | low\n  sources:\n    type: list[object]\n    description: Fontes consultadas com metadados\n    min_items: 1\n    schema:\n\
  \      - url: string\n      - title: string\n      - type: enum            # documentation | paper | repo | blog | marketplace\n\
  \      - accessed_at: datetime\n      - credibility: float    # 0.0-1.0\n  quality_score:\n    type: float\n    description:\
  \ Auto-avaliacao da qualidade da pesquisa (Shokunin)\n    minimum: 7.0              # Abaixo de 7.0, orchestrator rejeita\
  \ e solicita redo\n  seeds:\n    type: list[string]\n    description: Palavras-chave para input hydration do builder_agent\n\
  \    min_items: 5\noptional_context:\n  knowledge_card_path:\n    type: string\n    description: Path da KC gerada, se knowledge_agent\
  \ ja processou\n  competitor_data:\n    type: object\n    description: Dados de concorrentes se pesquisa foi competitiva\n\
  \  raw_data_path:\n    type: string\n    description: Path para dados brutos (JSON/CSV) se coletados"
return_contract_builder_agent_orchestrator: "signal_file: .claude/signals/edison_complete_*.json\nreturn_artifacts:\n  - type:\
  \ string              # agent | skill | component | knowledge_card\n  - path: string              # Caminho do artifact\
  \ criado\n  - quality_score: float      # 7.0+\n  - tests_passed: boolean     # Se aplicavel\n  - commit_sha: string   \
  \     # Hash do commit com o artifact"
handoff_file_template: '# builder_agent — {MISSION}: {Title}

  Autonomia Total | Quality 9.0+

  REGRA: Commit e signal ANTES de qualquer pausa.


  ## CONTEXTO

  research_agent completou pesquisa sobre {topic}. Score: {quality_score}.

  Findings principais: {top_3_findings_summary}


  ## RESEARCH ARTIFACTS

  - KC: {knowledge_card_path or "nao gerada"}

  - Raw data: {raw_data_path or "nao coletado"}

  - Sources: {source_count} fontes ({credibility_avg} credibilidade media)


  ## SEEDS

  `{seed1}, {seed2}, {seed3}, {seed4}, {seed5}`


  ## FINDINGS (structured)

  {findings_yaml_block}


  ## TAREFAS

  ### Step 1: Internalizar pesquisa

  Ler KC em {knowledge_card_path}. Extrair patterns e anti-patterns.


  ### Step 2: Implementar

  {specific_build_instructions}


  ### Step 3: Validar

  Testar artifact contra quality gates do tipo.


  ## SCOPE FENCE

  - SOMENTE: {allowed_paths}

  - NAO TOQUE: {forbidden_paths}


  ## COMMIT

  git add {artifact_paths} && git commit -m "builder_agent[{MISSION}]: {desc}"


  ## SIGNAL

  python -c "from records.core.python.signal_writer import write_signal; write_signal(''edison'', ''complete'', {score})"'
error_handling: '| Scenario | Action |

  |----------|--------|

  | research_agent signal com score < 7.0 | orchestrator rejeita, solicita re-research com feedback |

  | Handoff file missing required fields | builder_agent solicita contexto adicional via orchestrator |

  | builder_agent nao consegue localizar KC | Prosseguir com findings inline do handoff |

  | Build falha apos 3 tentativas | builder_agent sinaliza `partial` com score real e lista de bloqueios |'
sequence_diagram: "orchestrator                    research_agent                     builder_agent\n  |                 \
  \        |                         |\n  |-- dispatch handoff ---->|                         |\n  |                     \
  \    |-- research (async) ---->|\n  |                         |                         |\n  |                         |<--\
  \ findings + KC -------|\n  |                         |                         |\n  |<-- signal: complete ----|       \
  \                  |\n  |    (score >= 7.0)       |                         |\n  |                         |           \
  \              |\n  |-- compose handoff_edison.md ----------------------|\n  |                                         \
  \          |\n  |-- spawn builder_agent with handoff --------------------->|\n  |                                      \
  \             |\n  |                                   |-- read handoff |\n  |                                   |-- build\
  \ ------>|\n  |                                   |-- commit ----->|\n  |                                   |-- signal ----->|\n\
  \  |                                                   |\n  |<---------------- signal: complete ----------------|"
real_example_2026_03_05: 'Mission ISOFIX: research_agent pesquisou 118 agents para gap analysis. Handoff para builder_agent
  continha 47 findings com paths de ISOs faltantes. builder_agent executou 7 batches em continuous mode, criando 820+ ISO
  files. Score final: 9.0.'
