$schema: http://json-schema.org/draft-07/schema#
title: photo_agent Input Schema
version: 10.1.0
description: Input validation for photo_agent
type: object
required:
- product_image
properties:
  product_image:
    type: string
    format: binary
    description: Product image file (JPG, PNG, WebP)
    contentMediaType:
    - image/jpeg
    - image/png
    - image/webp
    maxFileSize: 10MB
    minResolution: 500x500
  brand_colors:
    type: array
    items:
      type: string
      pattern: ^#[0-9A-Fa-f]{6}$
    maxItems: 5
    description: Brand hex color codes
  style_preference:
    type: string
    enum:
    - minimalist
    - dramatic
    - lifestyle
    - editorial
    - commercial
    default: commercial
    description: Photography style preference
  marketplace_target:
    type: string
    enum:
    - mercado_livre
    - shopee
    - magalu
    - amazon_br
    - all
    default: all
    description: Target marketplace for optimization
  exclude_scenes:
    type: array
    items:
      type: integer
      minimum: 1
      maximum: 9
    description: Scene numbers to exclude from generation
  product_category:
    type: string
    description: Product category for style hints
  additional_props:
    type: array
    items:
      type: string
    description: Additional props to include in flat lay scene
analysis_output:
  type: object
  properties:
    PRODUTO:
      type: string
      description: Short product description
    COR:
      type: string
      pattern: ^#[0-9A-Fa-f]{6}$
      description: Primary hex color
    MATERIAL:
      type: string
      description: Material and finish
    FORMA:
      type: string
      description: Shape and format
  required:
  - PRODUTO
  - COR
  - MATERIAL
  - FORMA
