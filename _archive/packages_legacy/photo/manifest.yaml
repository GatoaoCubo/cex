id: photo
version: "4.3.0"
type: iso_package
title: "Photo Agent - AI Product Photography"
description: "Conversion-framework agent for AI product photography. Generates 9-scene emotion-based prompts for marketplace product images."
domain: "marketing"
satellite: "LILY"
quality: 9.5

capabilities:
  - "product_photo_analysis"
  - "emotion_based_prompt_generation"
  - "9_scene_conversion_grid"
  - "marketplace_image_optimization"
  - "whitelabel_agency_reselling"

target_llms:
  - claude
  - gpt4
  - gemini
  - llama

min_context: 8192
tools_required:
  - file_search
  - vision

variables:
  AGENCY_NAME: "Your Agency"
  DOMAIN: "your-domain"

tags:
  - photography
  - ai_images
  - marketplace
  - brazil
  - ecommerce
  - conversion

created: "2025-12-18"
updated: "2026-03-23"
