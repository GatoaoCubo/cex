title: "5D Quality Dimensions"
version: "1.0.0"
description: "5-dimension scoring schema for video validation"

dimensions:
  narrative_arc:
    weight: 0.25
    description: "Story structure, hook strength, CTA clarity"
    criteria:
      hook_timing: {weight: 0.30, scoring: {10: "Hook 0-2s", 8: "Hook 2-3s", 6: "Hook 3-4s", 4: "Hook after 4s", 0: "No hook"}}
      phases_present: {weight: 0.25, scoring: {10: "All 5 phases", 8: "4 phases", 6: "3 phases"}}
      cta_clarity: {weight: 0.25, scoring: {10: "Clear specific CTA", 8: "Clear generic CTA", 6: "Implied CTA"}}
      timing_accuracy: {weight: 0.20, scoring: {10: "Exact match", 8: "Within 1s", 6: "Within 2s"}}

  visual_quality:
    weight: 0.25
    description: "Shot composition, transitions, pacing"
    criteria:
      camera_specified: {weight: 0.30, scoring: {10: "All shots", 8: "90%+", 6: "75%+"}}
      style_consistency: {weight: 0.30, scoring: {10: "Perfect consistency", 8: "Minor variations", 6: "Some inconsistencies"}}
      prompt_completeness: {weight: 0.25, scoring: {10: "All 6 elements", 8: "5 of 6", 6: "4 of 6"}}
      pacing: {weight: 0.15, scoring: {10: "Matches style perfectly", 8: "Good pacing", 6: "Acceptable"}}

  platform_compliance:
    weight: 0.20
    description: "Format, duration, safe zones"
    criteria:
      duration_valid: {weight: 0.35, scoring: {10: "Optimal for platform", 8: "Within limits", 6: "Edge of limits"}}
      aspect_ratio: {weight: 0.25, scoring: {10: "Correct specified", 8: "Correct implicit", 6: "Acceptable alt"}}
      safe_zones: {weight: 0.25, scoring: {10: "All in safe zones", 8: "90%+", 6: "Most"}}
      export_settings: {weight: 0.15, scoring: {10: "All correct", 8: "Most correct", 6: "Basic correct"}}

  engagement_potential:
    weight: 0.15
    description: "Trend alignment, scroll-stopping power"
    criteria:
      hook_strength: {weight: 0.40, scoring: {10: "Pattern interrupt", 8: "Strong grab", 6: "Decent"}}
      emotional_triggers: {weight: 0.30, scoring: {10: "Strong journey", 8: "Good connection", 6: "Some elements"}}
      loop_potential: {weight: 0.30, scoring: {10: "Perfect loop", 8: "Good potential", 6: "Acceptable ending"}}

  production_feasibility:
    weight: 0.15
    description: "AI tool compatibility, realistic requests"
    criteria:
      ai_compatible: {weight: 0.40, scoring: {10: "All AI-optimized", 8: "Most work well", 6: "Some need adjustment"}}
      realistic_requests: {weight: 0.35, scoring: {10: "All realistic", 8: "Mostly realistic", 6: "Some challenging"}}
      text_avoidance: {weight: 0.25, scoring: {10: "No text in AI prompts", 8: "Minimal", 6: "Some"}}

scoring:
  calculation: "sum(dimension_score * dimension_weight)"
  thresholds:
    fail: {max: 6.9, status: FAIL}
    pass: {min: 7.0, max: 7.9, status: PASS}
    good: {min: 8.0, max: 8.9, status: GOOD}
    excellent: {min: 9.0, max: 10.0, status: EXCELLENT}
  minimum_pass: 7.0
