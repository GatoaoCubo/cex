title: "video_agent Input Schema"
version: "1.0.0"
description: "Input validation for video agent"

type: object
required: [product_brief, duration, key_benefits, style]

properties:
  product_brief:
    type: string
    minLength: 10
    maxLength: 500
    description: "Product description for video"
    examples: ["Garrafa Termica Premium Inox 500ml"]

  duration:
    type: integer
    enum: [15, 30, 60]
    description: "Video duration in seconds"
    default: 30

  key_benefits:
    type: array
    items:
      type: string
      minLength: 3
      maxLength: 100
    minItems: 2
    maxItems: 5
    description: "Key product benefits to highlight"

  style:
    type: string
    enum: [energetic, calm, dramatic, minimal]
    description: "Visual and narrative style"
    default: energetic

  platform:
    type: string
    enum: [tiktok, instagram_reels, youtube_shorts, instagram_feed, youtube]
    default: tiktok

  tone:
    type: string
    enum: [energetic, calm, professional, playful]
    default: energetic

  brand_colors:
    type: array
    items:
      type: string
      pattern: "^#[0-9A-Fa-f]{6}$"
    maxItems: 3

  target_audience:
    type: string
    maxLength: 200

  pain_points:
    type: array
    items: {type: string}
    maxItems: 3

  generator_preference:
    type: string
    enum: [runway_gen3, pika, kling, auto]
    default: auto

pipeline_inputs:
  from_pesquisa:
    properties:
      product_name: {type: string}
      product_attributes: {type: array}
      competitor_patterns: {type: array}
      audience_insights: {type: string}

  from_anuncio:
    properties:
      key_benefits: {type: array}
      pain_points: {type: array}
      messaging_hooks: {type: array}
      target_audience: {type: string}
