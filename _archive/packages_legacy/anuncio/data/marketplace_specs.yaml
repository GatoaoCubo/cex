$schema: http://json-schema.org/draft-07/schema#
title: Marketplace Specifications - Brazilian E-commerce
version: 3.6.0
updated: '2026-03-06'
description: Character limits, requirements, and 2026 algorithm data by platform
marketplaces:
  mercado_livre:
    name: Mercado Livre
    country: BR
    limits:
      title:
        min: 1
        max: 60
        recommended: 60
        note: Usar todos os 60 caracteres
      description:
        min: 1
        max: 50000
        recommended: 3500
        note: Minimo 3300 para qualidade
      keywords:
        type: backend
        limit: unlimited
        note: Indexacao por descricao e atributos
      bullets:
        count: null
        char_per_bullet: null
        note: Incluir na descricao
      images:
        min: 1
        max: 12
        recommended: 7
        format:
        - jpg
        - png
        min_resolution: 500x500
    features:
      variations: true
      video: true
      storefront: true
      ads_integration: true
    seo_factors:
    - title_keywords
    - description_keywords
    - sales_velocity
    - reputation
    - shipping_speed
    - price_competitiveness
  shopee:
    name: Shopee
    country: BR
    limits:
      title:
        min: 20
        max: 120
        recommended: 100
        note: Mais espaco que ML
      description:
        min: 1
        max: 3000
        recommended: 2500
        note: Limite menor que ML
      keywords:
        type: hashtags
        limit: 18
        note: Hashtags no final da descricao
      bullets:
        count: null
        char_per_bullet: null
        note: Usar emojis e formatacao
      images:
        min: 3
        max: 9
        recommended: 9
        format:
        - jpg
        - png
        min_resolution: 800x800
    features:
      variations: true
      video: true
      live_streaming: true
      vouchers: true
      flash_sale: true
    seo_factors:
    - title_keywords
    - hashtags
    - sales_velocity
    - response_rate
    - shipping_options
  magalu:
    name: Magazine Luiza
    country: BR
    limits:
      title:
        min: 1
        max: 150
        recommended: 120
        note: Titulo mais longo permitido
      description:
        min: 1
        max: 4000
        recommended: 3500
        note: HTML basico permitido
      keywords:
        type: tags
        limit: 20
        note: Tags de categoria
      bullets:
        count: 10
        char_per_bullet: 500
        note: Caracteristicas destacadas
      images:
        min: 1
        max: 10
        recommended: 6
        format:
        - jpg
        - png
        min_resolution: 1000x1000
    features:
      variations: true
      video: true
      parceiro_magalu: true
      retira_loja: true
    seo_factors:
    - title_keywords
    - category_alignment
    - brand_name
    - ratings
  amazon_br:
    name: Amazon Brasil
    country: BR
    limits:
      title:
        min: 1
        max: 200
        recommended: 150
        note: Seguir formula Amazon
      description:
        min: 1
        max: 2000
        recommended: 1500
        note: Bullet points separados
      keywords:
        type: backend
        limit: 250
        unit: bytes
        note: Backend search terms
      bullets:
        count: 5
        char_per_bullet: 500
        note: Bullet points oficiais
      images:
        min: 1
        max: 9
        recommended: 7
        format:
        - jpg
        - png
        - gif
        - tiff
        min_resolution: 1000x1000
    features:
      variations: true
      a_plus_content: true
      brand_registry: true
      fba: true
      prime: true
    seo_factors:
    - title_keywords
    - backend_keywords
    - sales_rank
    - reviews
    - conversion_rate
    - prime_eligibility
universal_defaults:
  title:
    default_limit: 60
    strategy: use_smallest_limit
  description:
    default_limit: 3300
    strategy: use_recommended_minimum
  keywords:
    blocks: 2
    terms_per_block: 120
    strategy: maximize_coverage
  bullets:
    count: 10
    chars: 275
    strategy: benefit_first
optimization_matrix:
  priority_order:
  - mercado_livre
  - shopee
  - amazon_br
  - magalu
  if_conflict: use_most_restrictive
  platform_specific_output: false
algorithm_2026:
  mercado_livre:
    version: '2026'
    top_factors:
    - titulo_relevancia
    - taxa_conversao
    - historico_vendas
    - reputacao_vendedor
    title_rules:
    - Keyword principal na posicao 1 do titulo
    - Usar todos os 60 caracteres disponíveis
    - Sem pontuacao, virgulas ou simbolos
    - Sem palavras promocionais (oferta, barato, gratis)
    - Sem artigos (o, a, os, as) — desperdicam chars
    title_formula: '[Produto] [Marca] [Modelo] [Especificacao-chave] [Compatibilidade/Voltagem]'
    description_minimum_chars: 3300
    description_ideal_chars: 3500
    images_recommended: 7
    full_ml_envios_boost: true
  shopee:
    version: '2026'
    algorithm_pillars:
    - relevancia
    - desempenho_loja
    - engajamento_comprador
    title_formula: '[Marca] [Produto/Modelo] [Caracteristica Principal] [Beneficio]
      [Keyword]'
    title_emoji_allowed: true
    flash_sale_boost: true
    frete_patrocinado_boost: true
    response_time_target_hours: 2
    hashtags_position: end_of_description
    hashtags_max: 18
  amazon_br:
    version: A10_2026
    primary_factors:
    - taxa_conversao
    - relevancia_keywords
    mobile_critical_chars: 80
    title_formula: '[Marca] [Produto] [Modelo] [Especificacao] [Quantidade/Tamanho]
      [Compatibilidade]'
    backend_keywords_bytes: 250
    backend_keywords_rules:
    - Sem virgulas
    - Sem keywords repetidas do titulo ou bullets
    - Incluir sinonimos e erros ortograficos comuns
    a_plus_basic_cvr_lift_pct:
    - 5
    - 8
    a_plus_premium_cvr_lift_pct:
    - 15
    - 20
    avg_cvr_pct: 10.5
    fba_prime_cvr_pct:
    - 15
    - 25
mobile_brazil_2026:
  mobile_internet_access_pct: 92.1
  mobile_session_share_pct: 58.0
  source: vtex.com/pt-br/blog/mobile-first
  rules:
  - Beneficio principal no primeiro paragrafo (acima do fold)
  - Paragrafos curtos — maximo 2-3 linhas
  - Bullets com emojis superam paragrafos em mobile
  - Imagem principal legivel em thumbnail 150x150px
  - Evitar tabelas HTML complexas em descricoes
