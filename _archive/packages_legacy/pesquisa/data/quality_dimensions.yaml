$schema: http://json-schema.org/draft-07/schema#
title: Quality Dimensions - 5D Scoring Schema for Research v1.0
version: 1.0.0
description: 5-dimensional quality scoring for pesquisa_agent research outputs
dimensions:
  data_completeness:
    id: D1
    name: Data Completeness
    portuguese: Completude de Dados
    weight: 0.25
    threshold: 0.8
    description: All required research fields populated with valid data
    rationale: Incomplete research leads to poor business decisions. Data completeness
      is foundational.
    scoring_rubric:
      '1.0': 'Perfect: All fields populated, no gaps, all sources verified'
      '0.8': 'Good: 90%+ fields populated, minor gaps documented'
      '0.6': 'Adequate: 75%+ fields, some gaps need manual filling'
      '0.4': 'Poor: 50-75% fields, significant gaps'
      '0.2': 'Fail: <50% fields, research incomplete'
    checks:
    - id: DC1.1
      name: product_fields
      description: All product identification fields populated
      weight: 0.25
    - id: DC1.2
      name: competitor_data
      description: Competitor data complete (name, price, reviews, sales)
      weight: 0.25
    - id: DC1.3
      name: pricing_data
      description: Price comparison data complete across marketplaces
      weight: 0.2
    - id: DC1.4
      name: keyword_data
      description: SEO keyword taxonomy fully populated
      weight: 0.15
    - id: DC1.5
      name: gap_analysis
      description: Market gap analysis complete with opportunities
      weight: 0.15
  source_quality:
    id: D2
    name: Source Quality
    portuguese: Qualidade das Fontes
    weight: 0.25
    threshold: 0.8
    description: Data sourced from verified, authoritative marketplace sources
    rationale: Research is only as good as its sources. Verified data prevents costly
      mistakes.
    scoring_rubric:
      '1.0': 'Excellent: All sources verified, timestamps current, official APIs used'
      '0.8': 'Good: 90%+ verified sources, some manual verification needed'
      '0.6': 'Adequate: 75%+ verified, some secondary sources used'
      '0.4': 'Poor: <75% verified, reliance on unverified sources'
      '0.2': 'Fail: Majority unverified, data unreliable'
    checks:
    - id: SQ2.1
      name: marketplace_official
      description: Data from official marketplace sources
      weight: 0.3
    - id: SQ2.2
      name: data_freshness
      description: Data collected within last 24 hours
      weight: 0.25
    - id: SQ2.3
      name: source_attribution
      description: All data points have source attribution
      weight: 0.2
    - id: SQ2.4
      name: cross_verification
      description: Key data points cross-verified across sources
      weight: 0.15
    - id: SQ2.5
      name: api_reliability
      description: API sources with known reliability scores
      weight: 0.1
  competitor_coverage:
    id: D3
    name: Competitor Coverage
    portuguese: Cobertura de Concorrentes
    weight: 0.2
    threshold: 0.75
    description: Adequate competitor analysis with 3-5 key competitors minimum
    rationale: Understanding competition is essential for positioning and pricing
      strategy.
    scoring_rubric:
      '1.0': 'Perfect: 5+ competitors analyzed with full metrics'
      '0.8': 'Good: 4-5 competitors with comprehensive analysis'
      '0.6': 'Adequate: 3 competitors with basic analysis'
      '0.4': 'Poor: 1-2 competitors or shallow analysis'
      '0.2': 'Fail: No competitor analysis or irrelevant competitors'
    checks:
    - id: CC3.1
      name: competitor_count
      description: Minimum 3 competitors analyzed, target 5+
      weight: 0.25
    - id: CC3.2
      name: competitor_relevance
      description: Competitors are direct category competitors
      weight: 0.25
    - id: CC3.3
      name: metrics_depth
      description: 'Full metrics: price, reviews, sales, positioning'
      weight: 0.2
    - id: CC3.4
      name: marketplace_spread
      description: Competitors from multiple marketplaces
      weight: 0.15
    - id: CC3.5
      name: insight_quality
      description: Actionable insights derived from competitor data
      weight: 0.15
  price_accuracy:
    id: D4
    name: Price Accuracy
    portuguese: Precisao de Precos
    weight: 0.15
    threshold: 0.85
    description: Price data validated and accurate across platforms
    rationale: Pricing decisions require accurate data. Errors can lead to margin
      loss or missed sales.
    scoring_rubric:
      '1.0': 'Perfect: All prices verified, shipping included, outliers flagged'
      '0.8': 'Good: 95%+ prices accurate, minor discrepancies noted'
      '0.6': 'Adequate: 85%+ accurate, some manual verification needed'
      '0.4': 'Poor: 70-85% accurate, significant discrepancies'
      '0.2': 'Fail: <70% accurate, unreliable for decisions'
    checks:
    - id: PA4.1
      name: price_verification
      description: Prices verified against live marketplace data
      weight: 0.3
    - id: PA4.2
      name: shipping_included
      description: Shipping costs included in total price
      weight: 0.2
    - id: PA4.3
      name: currency_consistency
      description: All prices in consistent currency (BRL)
      weight: 0.15
    - id: PA4.4
      name: outlier_detection
      description: Statistical outliers identified and flagged
      weight: 0.2
    - id: PA4.5
      name: price_range_validity
      description: Price ranges are statistically valid
      weight: 0.15
  seo_relevance:
    id: D5
    name: SEO Relevance
    portuguese: Relevancia SEO
    weight: 0.15
    threshold: 0.75
    description: Keywords match search intent and have commercial viability
    rationale: SEO research must align with buyer intent to drive qualified traffic.
    scoring_rubric:
      '1.0': 'Excellent: Keywords perfectly aligned with intent, high commercial value'
      '0.8': 'Good: Strong keyword coverage, good intent match'
      '0.6': 'Adequate: Basic keywords covered, some intent gaps'
      '0.4': 'Poor: Keywords too broad or misaligned with intent'
      '0.2': 'Fail: Keywords irrelevant or no commercial value'
    checks:
    - id: SR5.1
      name: intent_alignment
      description: Keywords match buyer search intent
      weight: 0.3
    - id: SR5.2
      name: taxonomy_structure
      description: Proper head/mid/long-tail structure
      weight: 0.2
    - id: SR5.3
      name: semantic_coverage
      description: Semantic variations and synonyms included
      weight: 0.2
    - id: SR5.4
      name: commercial_viability
      description: Keywords have commercial/transactional intent
      weight: 0.15
    - id: SR5.5
      name: competition_balance
      description: Mix of high and low competition terms
      weight: 0.15
overall_scoring:
  formula: weighted_sum(dimension_scores * dimension_weights)
  pass_threshold: 0.8
  all_dimensions_threshold: 0.75
  pass_condition: overall >= 0.80 AND all dimensions >= 0.75
  statuses:
    PASS: '>= 0.80 AND all dimensions >= 0.75'
    WARN: 0.70 - 0.79 OR one dimension < 0.75
    FAIL: < 0.70 OR price_accuracy < 0.70
weight_summary:
  data_completeness: 25%
  source_quality: 25%
  competitor_coverage: 20%
  price_accuracy: 15%
  seo_relevance: 15%
  total: 100%
critical_checks:
- id: CC1
  name: Minimum 3 competitors analyzed
- id: CC2
  name: All marketplaces searched
- id: CC3
  name: Price data from last 24h
- id: CC4
  name: Source attribution present
- id: CC5
  name: Head terms identified
- id: CC6
  name: Gap analysis complete
- id: CC7
  name: Actionable insights provided
output_schema:
  type: object
  properties:
    dimensions:
      type: object
      properties:
        data_completeness:
          type: object
          properties:
            score:
              type: number
              minimum: 0
              maximum: 1
            passed:
              type: boolean
            issues:
              type: array
              items:
                type: string
        source_quality:
          $ref: '#/output_schema/properties/dimensions/properties/data_completeness'
        competitor_coverage:
          $ref: '#/output_schema/properties/dimensions/properties/data_completeness'
        price_accuracy:
          $ref: '#/output_schema/properties/dimensions/properties/data_completeness'
        seo_relevance:
          $ref: '#/output_schema/properties/dimensions/properties/data_completeness'
    overall_score:
      type: number
      minimum: 0
      maximum: 1
    passed:
      type: boolean
    recommendation:
      type: string
      enum:
      - PROCEED_TO_OUTPUT
      - RETRY_WITH_FIXES
      - OUTPUT_WITH_WARNING
      - BLOCK_OUTPUT
