          do dia-a-dia, criando conexao como amigo que entende sua fome
      validation_rules:
      - Posicao X e Y devem ser consistentes com quadrante
      - Quadrante deve alinhar com arquetipo de marca
      - Voice description deve refletir caracteristicas do quadrante
    messaging_guidelines:
      id: VOZ-003
      name: Guia de Mensagens (Do's e Don'ts)
      purpose: Definir regras praticas de comunicacao da marca
      template:
        dos:
          description: Praticas recomendadas de comunicacao
          min_items: 5
          max_items: 8
          format: Acao + Exemplo concreto
        donts:
          description: Praticas a evitar
          min_items: 5
          max_items: 8
          format: Acao + Alternativa correta
        seed_words:
          description: Vocabulario proprietario da marca
          min_items: 5
          format: Palavra + Significado + Contexto de uso
        example_phrases:
          description: Frases-modelo em diferentes contextos
          min_items: 10
          contexts:
          - boas_vindas
          - confirmacao
          - erro
          - promocao
          - despedida
      example:
        brand: NUBANK
        dos:
        - action: Use linguagem simples e direta
          example: Seu cartao chegou! em vez de Confirmamos a entrega do seu meio
            de pagamento
        - action: Fale em primeira pessoa do plural (nos)
          example: Estamos aqui pra ajudar em vez de A empresa esta disponivel
        - action: Celebre conquistas do cliente
          example: Parabens! Voce ja economizou R$500 em anuidade
        - action: Use emojis com moderacao
          example: Tudo certo por aqui! (com emoji positivo ocasional)
        - action: Explique termos tecnicos
          example: IOF (um imposto do governo) em vez de so IOF
        - action: Seja transparente sobre custos
          example: Essa operacao custa R$2,50 - mesmo que seja ruim
        donts:
        - avoid: Usar jargao bancario
          instead: correntista → cliente, operacao de credito → emprestimo
        - avoid: Ser excessivamente formal
          instead: Prezado Senhor → Ola, João
        - avoid: Culpar o cliente por erros
          instead: Voce errou a senha → A senha digitada nao confere
        - avoid: Usar asteriscos e letrinhas
          instead: Deixar condicoes claras no texto principal
        - avoid: Prometer e nao cumprir
          instead: So comunicar o que podemos entregar
        - avoid: Ser frio em momentos dificeis
          instead: Sabemos que isso e frustrante...
        seed_words:
        - word: roxinho
          meaning: O cartao Nubank (apelido carinhoso)
          usage: Meu roxinho chegou! / Paga no roxinho?
        - word: descomplicar
          meaning: Tornar simples o que era complexo
          usage: Descomplicamos o mundo financeiro
        - word: digital first
          meaning: Prioridade para experiencia digital
          usage: Nascemos digital first
        - word: Nu
          meaning: Prefixo para produtos e servicos
          usage: NuConta, NuInvest, NuCripto
        - word: humanizado
          meaning: Atendimento com empatia real
          usage: Atendimento humanizado, nao robotico
        example_phrases:
          boas_vindas:
          - Ola! Que bom ter voce por aqui.
          - Bem-vindo ao roxinho! Estamos prontos pra ajudar.
          confirmacao:
          - Tudo certo! Sua solicitacao foi processada.
          - Feito! Ja pode conferir na sua conta.
          erro:
          - Ops, algo deu errado. Mas ja estamos resolvendo.
          - Hmm, nao conseguimos processar. Tenta de novo?
          promocao:
          - Surpresa! Seu limite aumentou. Voce merece.
          - 'Boas noticias: desbloqueamos um beneficio pra voce.'
          despedida:
          - Qualquer coisa, estamos aqui. Ate mais!
          - Resolvido! Se precisar, e so chamar.
      validation_rules:
      - Minimo 5 do's com exemplo concreto cada
      - Minimo 5 don'ts com alternativa cada
      - Minimo 5 seed words com significado e contexto
      - Minimo 10 example phrases cobrindo 5 contextos
      - Todas as regras devem alinhar com arquetipo e dimensoes
  narrative:
    heros_journey:
      id: NAR-001
      name: Jornada do Heroi (Campbell)
      author: Joseph Campbell
      source: The Hero with a Thousand Faces (1949)
      purpose: Estruturar narrativa de marca usando arquetipo universal
      brand_adaptation: A marca e o MENTOR, o cliente e o HEROI
      stages:
      - stage: 1
        name: mundo_comum
        name_en: Ordinary World
        description: O cliente vive sua vida normal com um problema latente
        brand_role: Observar e entender o mundo do cliente
        prompt: Como e a vida do cliente ANTES de conhecer a marca?
      - stage: 2
        name: chamado
        name_en: Call to Adventure
        description: O cliente percebe que precisa de mudanca
        brand_role: Apresentar a possibilidade de transformacao
        prompt: O que faz o cliente buscar uma solucao?
      - stage: 3
        name: recusa
        name_en: Refusal of the Call
        description: O cliente hesita, tem duvidas e objecoes
        brand_role: Reconhecer e validar os medos
        prompt: Quais objecoes o cliente tem antes de agir?
      - stage: 4
        name: mentor
        name_en: Meeting the Mentor
        description: O cliente encontra a marca como guia
        brand_role: Ser o mentor que oferece ferramentas e sabedoria
        prompt: Como a marca se apresenta como guia confiavel?
      - stage: 5
        name: travessia
        name_en: Crossing the Threshold
        description: O cliente decide agir e compra/contrata
        brand_role: Facilitar a decisao e primeira experiencia
        prompt: Qual e o momento de conversao?
      - stage: 6
        name: testes
        name_en: Tests, Allies, Enemies
        description: O cliente usa o produto e enfrenta desafios
        brand_role: Apoiar nos desafios, criar comunidade
        prompt: Quais dificuldades o cliente enfrenta ao usar?
      - stage: 7
        name: caverna
        name_en: Approach to Innermost Cave
        description: O cliente se prepara para o desafio maximo
        brand_role: Preparar para o momento de verdade
        prompt: Qual o maior teste que o cliente enfrentara?
      - stage: 8
        name: provacao
        name_en: Ordeal
        description: O cliente enfrenta seu maior desafio
        brand_role: Estar presente no momento critico
        prompt: Como a marca apoia no momento mais dificil?
      - stage: 9
        name: recompensa
        name_en: Reward
        description: O cliente conquista o que buscava
        brand_role: Celebrar a vitoria
        prompt: Qual a transformacao alcancada?
      - stage: 10
        name: retorno
        name_en: The Road Back
        description: O cliente volta ao mundo comum transformado
        brand_role: Facilitar a integracao da nova identidade
        prompt: Como o cliente leva a transformacao para sua vida?
      - stage: 11
        name: ressurreicao
        name_en: Resurrection
        description: O cliente prova sua transformacao
        brand_role: Criar momentos de demonstracao
        prompt: Como o cliente demonstra sua mudanca aos outros?
      - stage: 12
        name: elixir
        name_en: Return with Elixir
        description: O cliente compartilha sua sabedoria
        brand_role: Facilitar advocacy e indicacoes
        prompt: Como o cliente se torna embaixador da marca?
      template:
        hero: '{customer_persona}'
        mentor: '{brand_name}'
        journey: '{stages_filled}'
      example:
        brand: CROSSFIT
        hero: Profissional sedentario, 35 anos, que quer mudar de vida
        journey:
          mundo_comum: Joao trabalha 10h/dia, come mal, esta 15kg acima do peso, nao
            tem energia
          chamado: Apos exame medico preocupante, decide que precisa mudar
          recusa: Ja tentei academia e desisti, nao tenho tempo, CrossFit e pra atletas
          mentor: 'CrossFit aparece com proposta: comunidade que nao deixa desistir,
            treinos curtos e intensos'
          travessia: Primeira aula experimental - assustadora mas acolhedora
          testes: Primeiras semanas duras, musculos doendo, mas comunidade apoiando
          caverna: Primeiro WOD competitivo contra o tempo
          provacao: Momento em que quer desistir no meio do treino, mas colegas gritando
            apoio
          recompensa: Consegue fazer primeiro pull-up, perde 10kg em 3 meses
          retorno: Volta ao escritorio com mais energia, colegas notam diferenca
          ressurreicao: Completa primeiro campeonato local
          elixir: Traz amigos para experimentar, vira exemplo no trabalho
      validation_rules:
      - Todas as 12 etapas devem estar preenchidas
      - Hero deve ser persona realista do publico-alvo
      - Mentor (marca) deve ter papel ativo mas nao protagonista
      - Transformacao deve ser crivel e desejavel
    storybrand:
      id: NAR-002
      name: StoryBrand Framework
      author: Donald Miller
      source: Building a StoryBrand (2017)
      purpose: Clarificar mensagem de marca usando estrutura narrativa
      principle: O cliente e o heroi, nao a marca
      elements:
      - id: 1
        name: character
        name_pt: Personagem
        description: O cliente (heroi) que quer algo
        prompt: Quem e seu cliente e o que ele quer?
        format: '{persona} quer {desejo}'
      - id: 2
        name: problem
        name_pt: Problema
        description: O obstaculo que impede o heroi
        prompt: Qual problema externo, interno e filosofico o cliente enfrenta?
        sub_elements:
          external: Problema tangivel e obvio
          internal: Frustracao ou medo causado pelo problema
          philosophical: Por que isso e simplesmente errado?
      - id: 3
        name: guide
        name_pt: Guia
        description: A marca como guia experiente
        prompt: Como sua marca demonstra empatia e autoridade?
        sub_elements:
          empathy: Entendemos como voce se sente...
          authority: E temos a experiencia para ajudar...
      - id: 4
        name: plan
        name_pt: Plano
        description: Os passos simples para sucesso
        prompt: Quais 3-4 passos simples o cliente deve seguir?
        format: 3-4 passos claros e memoraveis
      - id: 5
        name: call_to_action
        name_pt: Chamada para Acao
        description: O que o cliente deve fazer agora
        prompt: Qual acao direta e qual acao de transicao?
        sub_elements:
          direct: Acao de compra/contratacao
          transitional: Acao de menor compromisso
      - id: 6
        name: success
        name_pt: Sucesso
        description: Como sera a vida apos a transformacao
        prompt: O que o cliente tera, sentira e sera?
        format: Visao clara do estado futuro desejado
      - id: 7
        name: failure
        name_pt: Fracasso
        description: O que acontece se nao agir
        prompt: Quais as consequencias de nao resolver o problema?
        format: Stakes reais sem ser alarmista
      template:
        one_liner: '{character} enfrenta {problem}. {guide} oferece {plan}. {call_to_action}
          para {success} e evitar {failure}.'
        brandscript: '{full_7_elements}'
      example:
        brand: EVERNOTE
        brandscript:
          character:
            persona: Profissionais ocupados e criativos
            want: Organizar ideias e nunca esquecer o que e importante
          problem:
            external: Informacoes espalhadas em varios lugares (papeis, apps, emails)
            internal: Ansiedade de estar esquecendo algo importante
            philosophical: Ninguem deveria perder uma ideia brilhante por falta de
              organizacao
          guide:
            empathy: Sabemos como e frustrante ter uma ideia incrivel e nao lembrar
              depois
            authority: 250 milhoes de usuarios confiam suas ideias ao Evernote
          plan:
          - 1. Baixe o app gratuito
          - 2. Capture qualquer ideia (texto, foto, audio)
          - 3. Encontre tudo instantaneamente com busca inteligente
          call_to_action:
            direct: Comece gratis agora
            transitional: 'Baixe o guia: 10 formas de organizar sua vida'
          success:
            have: Todas as ideias organizadas em um lugar
            feel: Tranquilidade de nunca perder nada importante
            become: Uma pessoa mais produtiva e confiavel
          failure:
            consequence: Continuar perdendo ideias valiosas e oportunidades por desorganizacao
        one_liner: Profissionais ocupados lutam com informacoes espalhadas. Evernote
          captura e organiza tudo em um lugar. Baixe gratis e nunca mais perca uma
          ideia.
      validation_rules:
      - Todos os 7 elementos devem estar preenchidos
      - Character deve ser especifico (nao generico)
      - Problem deve ter 3 niveis (externo, interno, filosofico)
      - Plan deve ter 3-4 passos memoraveis
      - One-liner deve ter no maximo 50 palavras
    origin_story:
      id: NAR-003
      name: Estrutura de Historia de Origem
      purpose: Criar narrativa fundacional autentica da marca
      elements:
      - name: spark
        name_pt: Fagulha
        description: O momento de percepcao que iniciou tudo
        prompt: O que aconteceu que fez o fundador perceber a oportunidade?
      - name: struggle
        name_pt: Luta
        description: Os desafios enfrentados no inicio
        prompt: Quais obstaculos foram superados?
      - name: breakthrough
        name_pt: Descoberta
        description: O momento de virada ou inovacao
        prompt: Qual insight ou invencao mudou tudo?
      - name: mission
        name_pt: Missao
        description: O proposito maior que guia a marca
        prompt: Por que a marca existe alem do lucro?
      - name: future
        name_pt: Futuro
        description: A visao de mundo que a marca quer criar
        prompt: Como o mundo sera diferente gracas a marca?
      template: Tudo comecou quando {spark}. No inicio, enfrentamos {struggle}. Foi
        entao que descobrimos {breakthrough}. Hoje, nossa missao e {mission}. Sonhamos
        com um mundo onde {future}.
      example:
        brand: AIRBNB
        story:
          spark: Brian e Joe nao conseguiam pagar aluguel em San Francisco. Colocaram
            colchoes de ar na sala e hospedaram convidados de uma conferencia de design.
          struggle: Ninguem acreditava na ideia. Receberam 7 rejeicoes de investidores.
            Tiveram que vender caixas de cereal para sobreviver.
          breakthrough: Perceberam que as pessoas nao queriam so um lugar para dormir
            - queriam experiencias locais autenticas e conexao humana.
          mission: Criar um mundo onde qualquer pessoa pode pertencer em qualquer
            lugar.
          future: Viagens serao sobre conexao humana, nao hoteis padronizados. Qualquer
            um pode ser anfitriao e transformar espaco vazio em renda.
        formatted: Tudo comecou quando Brian e Joe nao conseguiam pagar aluguel em
          San Francisco e colocaram colchoes de ar na sala. No inicio, enfrentaram
          7 rejeicoes de investidores. Foi entao que descobriram que pessoas queriam
          experiencias locais autenticas. Hoje, sua missao e criar um mundo onde qualquer
          pessoa pode pertencer em qualquer lugar.
      validation_rules:
      - Historia deve ser autentica (verificavel)
      - Spark deve ser momento especifico, nao generico
      - Struggle deve mostrar vulnerabilidade real
      - Mission deve conectar com proposito maior
      - Historia completa deve ter 300-600 palavras
scoring:
  5D_framework:
    name: Framework de Validacao 5D para Marca
    version: 1.0.0
    total_score_range:
    - 0.0
    - 10.0
    dimensions:
    - id: D1
      name: Identity
      name_pt: Identidade
      weight: 2.0
      question: A identidade de marca e coerente internamente?
      checks:
      - id: D1.1
        name: archetype_selection
        description: Arquetipo primario e secundario sao complementares
      - id: D1.2
        name: traits_alignment
        description: Tracos de personalidade alinham com arquetipo
      - id: D1.3
        name: essence_clarity
        description: Essencia da marca em 3-5 palavras claras
      - id: D1.4
        name: names_reflect_identity
        description: Nomes e taglines refletem personalidade
    - id: D2
      name: Positioning
      name_pt: Posicionamento
      weight: 2.0
      question: O posicionamento e diferenciado e defensavel?
      checks:
      - id: D2.1
        name: uvp_differentiation
        description: UVP >= 70% diferenciado vs concorrentes
      - id: D2.2
        name: target_specificity
        description: Segmento com 3 dimensoes (demo, psycho, behavioral)
      - id: D2.3
        name: ries_trout_complete
        description: Declaracao Ries & Trout completa e clara
      - id: D2.4
        name: promise_verifiable
        description: Promessa de marca e verificavel pelo cliente
    - id: D3
      name: Voice
      name_pt: Voz
      weight: 2.0
      question: O tom de voz e consistente e acionavel?
      checks:
      - id: D3.1
        name: dimensions_positioned
        description: 4 dimensoes de personalidade posicionadas (1-5)
      - id: D3.2
        name: dos_donts_complete
        description: 5-8 Do's e 5-8 Don'ts com exemplos
      - id: D3.3
        name: seed_words_defined
        description: Minimo 5 seed words proprietarias
      - id: D3.4
        name: example_phrases
        description: 10 frases exemplo em contextos variados
      - id: D3.5
        name: voice_archetype_match
        description: Voz coerente com arquetipo escolhido
    - id: D4
      name: Visual
      name_pt: Visual
      weight: 2.0
      question: A identidade visual e coerente e aplicavel?
      checks:
      - id: D4.1
        name: palette_defined
        description: Paleta de cores com HEX + RGB + psicologia
      - id: D4.2
        name: typography_selected
        description: Tipografia primaria e secundaria definidas
      - id: D4.3
        name: mood_board_prompts
        description: 9 prompts de mood board (3x3)
      - id: D4.4
        name: wcag_compliance
        description: Cores atendem WCAG AA para contraste
      - id: D4.5
        name: visual_personality_match
        description: Visual coerente com personalidade de marca
    - id: D5
      name: Narrative
      name_pt: Narrativa
      weight: 2.0
      question: A narrativa de marca e envolvente e autentica?
      checks:
      - id: D5.1
        name: origin_story
        description: Historia de origem >= 500 caracteres
      - id: D5.2
        name: mission_statement
        description: Missao 100-150 caracteres, clara e inspiradora
      - id: D5.3
        name: vision_statement
        description: Visao 100-150 caracteres, ambiciosa e crivel
      - id: D5.4
        name: core_values
        description: 5 valores defensaveis com comportamentos
      - id: D5.5
        name: manifesto
        description: Manifesto >= 300 caracteres, emocional
    thresholds:
      complete:
        min_score: 8.5
        label: COMPLETO
        description: Estrategia de marca pronta para implementacao
        action: Aprovar e prosseguir para execucao
      approved:
        min_score: 7.0
        max_score: 8.49
        label: APROVADO
        description: Estrategia solida com pequenos ajustes necessarios
        action: Revisar pontos especificos e revalidar
      needs_revision:
        min_score: 5.0
        max_score: 6.99
        label: REVISAO NECESSARIA
        description: Gaps significativos que impedem implementacao
        action: Revisar dimensoes com score < 1.4
      rejected:
        max_score: 4.99
        label: REJEITADO
        description: Estrategia incompleta ou incoerente
        action: Refazer do inicio com mais informacoes
    calculation:
      formula: sum(dimension_scores)
      dimension_score: (checks_passed / total_checks) * weight
      example:
        D1:
          passed: 4
          total: 4
          weight: 2.0
          score: 2.0
        D2:
          passed: 3
          total: 4
          weight: 2.0
          score: 1.5
        D3:
          passed: 5
          total: 5
          weight: 2.0
          score: 2.0
        D4:
          passed: 4
          total: 5
          weight: 2.0
          score: 1.6
        D5:
          passed: 4
          total: 5
          weight: 2.0
          score: 1.6
        total: 8.7
