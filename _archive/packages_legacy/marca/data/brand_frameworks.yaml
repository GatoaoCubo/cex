        - Old Spice
        - Fanta
        colors:
        - Amarelo
        - Laranja
        - Cores vibrantes
        dont:
        - Seriedade excessiva
        - Formalidade
        - Previsibilidade
      - id: caregiver
        name: Cuidador
        name_en: The Caregiver
        motto: Ame seu proximo como a si mesmo
        core_desire: Proteger e cuidar dos outros
        goal: Ajudar os outros
        fear: Egoismo e ingratidao
        strategy: Fazer coisas pelos outros
        gift: Compaixao e generosidade
        voice:
        - Acolhedor
        - Protetor
        - Generoso
        - Compassivo
        brands_example:
        - Johnson & Johnson
        - UNICEF
        - Volvo
        colors:
        - Azul
        - Branco
        - Verde suave
        dont:
        - Egoismo
        - Indiferenca
        - Frieza
      - id: ruler
        name: Governante
        name_en: The Ruler
        motto: Poder nao e tudo, e a unica coisa
        core_desire: Controle
        goal: Criar familia ou comunidade prospera
        fear: Caos, ser destronado
        strategy: Exercer lideranca
        gift: Responsabilidade e lideranca
        voice:
        - Autoritario
        - Sofisticado
        - Articulado
        - Lider
        brands_example:
        - Mercedes-Benz
        - Rolex
        - American Express
        colors:
        - Preto
        - Dourado
        - Azul marinho
        - Vinho
        dont:
        - Informalidade excessiva
        - Desorganizacao
        - Fraqueza
      - id: creator
        name: Criador
        name_en: The Creator
        motto: Se pode ser imaginado, pode ser criado
        core_desire: Criar algo de valor duradouro
        goal: Realizar uma visao
        fear: Visao ou execucao mediocre
        strategy: Desenvolver controle e habilidade artistica
        gift: Criatividade e imaginacao
        voice:
        - Inventivo
        - Artistico
        - Perfeccionista
        - Expressivo
        brands_example:
        - LEGO
        - Adobe
        - Crayola
        colors:
        - Todas - paleta expressiva
        dont:
        - Copiar
        - Conformismo
        - Pressa sem qualidade
      selection_guide:
        questions:
        - Qual emocao voce quer que o cliente sinta?
        - Qual e o maior medo do seu publico?
        - Qual transformacao voce oferece?
        - Se sua marca fosse uma pessoa, como ela agiria em uma festa?
        - Qual historia sua marca conta?
        combination_rules:
        - Primario = 70-80% da comunicacao
        - Secundario = 20-30% para nuance
        - Evitar arquetipos opostos (Innocent x Outlaw)
        - Arquetipos da mesma categoria combinam bem
      example:
        brand: NATURA
        primary_archetype:
          id: caregiver
          percentage: 75
          manifestation: Cuidado com as pessoas e o planeta, relacionamento com consultoras
        secondary_archetype:
          id: explorer
          percentage: 25
          manifestation: Exploracao da biodiversidade brasileira, inovacao em ingredientes
        voice_blend:
          from_caregiver:
          - Acolhedor
          - Protetor
          - Generoso
          from_explorer:
          - Autêntico
          - Descobridor
      validation_rules:
      - Escolher 1 arquetipo primario (70-80%)
      - 'Opcional: 1 secundario complementar (20-30%)'
      - Verificar se arquetipos nao sao conflitantes
      - Voz da marca deve refletir arquetipos escolhidos
  voice:
    personality_dimensions:
      id: VOZ-001
      name: Dimensoes de Personalidade de Marca
      author: CODEXA Framework
      purpose: Posicionar tom de voz em 4 espectros complementares
      dimensions:
      - id: formality
        name: Formalidade
        min_label: Casual
        max_label: Formal
        scale: 1-5
        description: Nivel de formalidade na linguagem
        examples:
          '1': E ai! Bora la que vai ser top!
          '3': Ola! Vamos comecar juntos essa jornada.
          '5': Prezado cliente, temos o prazer de apresentar.
      - id: enthusiasm
        name: Entusiasmo
        min_label: Reservado
        max_label: Entusiastico
        scale: 1-5
        description: Nivel de energia e empolgacao
        examples:
          '1': O produto esta disponivel.
          '3': Estamos felizes em compartilhar!
          '5': UAU! Voce precisa conhecer isso AGORA!
      - id: humor
        name: Humor
        min_label: Serio
        max_label: Divertido
        scale: 1-5
        description: Uso de humor e leveza
        examples:
          '1': Informamos que o processo foi concluido.
          '3': Pronto! Missao cumprida com sucesso.
          '5': Boom! Arrasamos! Quem manda e nos!
      - id: authority
        name: Autoridade
        min_label: Amigavel
        max_label: Autoritativo
        scale: 1-5
        description: Nivel de especialista vs parceiro
        examples:
          '1': O que voce acha de tentarmos assim?
          '3': Recomendamos fortemente esta abordagem.
          '5': A unica forma correta de fazer isso e...
      template:
        brand: '{brand_name}'
        positioning:
          formality: '{formality_value}'
          enthusiasm: '{enthusiasm_value}'
          humor: '{humor_value}'
          authority: '{authority_value}'
        summary: '{voice_summary}'
      example:
        brand: NUBANK
        positioning:
          formality: 2
          enthusiasm: 4
          humor: 3
          authority: 3
        summary: Tom casual e energico, com pitadas de humor inteligente, posicionando-se
          como especialista acessivel
        voice_dna: Amigo especialista que explica financas de forma descomplicada
      archetype_alignment:
        innocent:
          formality: 2
          enthusiasm: 4
          humor: 3
          authority: 2
        explorer:
          formality: 2
          enthusiasm: 4
          humor: 3
          authority: 3
        sage:
          formality: 4
          enthusiasm: 2
          humor: 2
          authority: 5
        hero:
          formality: 3
          enthusiasm: 5
          humor: 2
          authority: 4
        outlaw:
          formality: 1
          enthusiasm: 4
          humor: 3
          authority: 3
        magician:
          formality: 3
          enthusiasm: 4
          humor: 3
          authority: 4
        regular_guy:
          formality: 2
          enthusiasm: 3
          humor: 3
          authority: 2
        lover:
          formality: 3
          enthusiasm: 4
          humor: 2
          authority: 2
        jester:
          formality: 1
          enthusiasm: 5
          humor: 5
          authority: 1
        caregiver:
          formality: 3
          enthusiasm: 3
          humor: 2
          authority: 3
        ruler:
          formality: 5
          enthusiasm: 3
          humor: 1
          authority: 5
        creator:
          formality: 3
          enthusiasm: 4
          humor: 3
          authority: 4
      validation_rules:
      - Todos os 4 valores devem estar entre 1-5
      - Dimensoes devem ser coerentes entre si
      - Valores devem alinhar com arquetipo escolhido (tolerancia +/- 1)
      - Summary deve capturar essencia das 4 dimensoes
    tone_matrix:
      id: VOZ-002
      name: Matriz de Tom de Voz
      purpose: Mapear tom em matriz 2x2 para facil visualizacao
      axes:
        x:
          name: formal_informal
          left: Informal
          right: Formal
        y:
          name: serious_playful
          bottom: Serio
          top: Divertido
      quadrants:
        top_left:
