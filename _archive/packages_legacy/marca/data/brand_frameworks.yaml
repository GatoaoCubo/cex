framework: Brand Strategy Frameworks Collection
version: 1.0.0
agent: marca
description: Frameworks estrategicos para construcao de marca. Cada framework inclui
  template, campos obrigatorios e exemplo completo.
last_updated: '2025-12-20'
frameworks:
  positioning:
    ries_trout:
      id: POS-001
      name: Declaracao de Posicionamento Ries & Trout
      author: Al Ries & Jack Trout
      source: 'Positioning: The Battle for Your Mind (1981)'
      purpose: Criar declaracao clara de posicionamento de marca
      template: Para {target_audience} que {need}, {brand} e {category} que {benefit}
        porque {reason_to_believe}.
      template_english: For {target_audience} who {need}, {brand} is the {category}
        that {benefit} because {reason_to_believe}.
      fields:
      - name: target_audience
        description: Publico-alvo especifico (demografico + psicografico)
        required: true
        example: mulheres 25-45 que buscam praticidade no dia a dia
      - name: need
        description: Necessidade ou problema do publico
        required: true
        example: precisam de maquiagem duravel para rotina corrida
      - name: brand
        description: Nome da marca
        required: true
        example: BEAUTYFIX
      - name: category
        description: Categoria de mercado em que a marca compete
        required: true
        example: a linha de cosmeticos profissionais
      - name: benefit
        description: Beneficio principal que diferencia a marca
        required: true
        example: oferece 24h de fixacao sem retoque
      - name: reason_to_believe
        description: Prova ou razao para acreditar no beneficio
        required: true
        example: nossa formula patenteada com microparticulas de silicone
      example:
        target_audience: mulheres 25-45 que buscam praticidade no dia a dia
        need: precisam de maquiagem duravel para rotina corrida
        brand: BEAUTYFIX
        category: a linha de cosmeticos profissionais
        benefit: oferece 24h de fixacao sem retoque
        reason_to_believe: nossa formula patenteada com microparticulas de silicone
        result: Para mulheres 25-45 que buscam praticidade no dia a dia que precisam
          de maquiagem duravel para rotina corrida, BEAUTYFIX e a linha de cosmeticos
          profissionais que oferece 24h de fixacao sem retoque porque nossa formula
          patenteada com microparticulas de silicone.
      validation_rules:
      - target_audience deve ter pelo menos 2 caracteristicas (demo + psycho)
      - benefit deve ser mensuravel ou verificavel
      - reason_to_believe deve ser factual e defensavel
      - category deve ser reconhecida pelo consumidor
    blue_ocean:
      id: POS-002
      name: Estrategia do Oceano Azul - Canvas
      author: W. Chan Kim & Renee Mauborgne
      source: Blue Ocean Strategy (2005)
      purpose: Identificar diferenciais criando novo espaco de mercado
      template:
        eliminate: 'Fatores que a industria compete mas podem ser eliminados: {eliminate_factors}'
        reduce: 'Fatores que podem ser reduzidos abaixo do padrao da industria: {reduce_factors}'
        raise: 'Fatores que podem ser elevados acima do padrao da industria: {raise_factors}'
        create: 'Fatores que a industria nunca ofereceu e podem ser criados: {create_factors}'
      factors:
      - name: preco
        description: Nivel de preco em relacao a concorrencia
        scale: 1-10
      - name: qualidade
        description: Qualidade percebida do produto/servico
        scale: 1-10
      - name: conveniencia
        description: Facilidade de compra e uso
        scale: 1-10
      - name: variedade
        description: Amplitude de opcoes oferecidas
        scale: 1-10
      - name: atendimento
        description: Qualidade do suporte ao cliente
        scale: 1-10
      - name: inovacao
        description: Nivel de inovacao tecnologica
        scale: 1-10
      - name: sustentabilidade
        description: Compromisso ambiental e social
        scale: 1-10
      - name: exclusividade
        description: Sensacao de exclusividade/status
        scale: 1-10
      example:
        brand: ECOSMART - Eletronicos Sustentaveis
        canvas:
          eliminate:
          - embalagens plasticas
          - manuais impressos extensos
          - obsolescencia programada
          reduce:
          - variedade de modelos (foco em 3 SKUs)
          - custo de marketing tradicional
          raise:
          - durabilidade (garantia 5 anos)
          - repairabilidade (pecas modulares)
          - transparencia de origem
          create:
          - programa de trade-in com desconto
          - certificado de pegada de carbono
          - comunidade de usuarios reparadores
        strategy_curve:
          preco:
            industria: 5
            ecosmart: 6
            note: ligeiramente acima mas justificado
          qualidade:
            industria: 6
            ecosmart: 9
            note: muito acima - foco principal
          conveniencia:
            industria: 8
            ecosmart: 7
            note: ligeiramente abaixo
          variedade:
            industria: 9
            ecosmart: 3
            note: muito abaixo - intencional
          atendimento:
            industria: 5
            ecosmart: 8
            note: acima - comunidade ativa
          inovacao:
            industria: 7
            ecosmart: 7
            note: par com industria
          sustentabilidade:
            industria: 3
            ecosmart: 10
            note: diferencial maximo
          exclusividade:
            industria: 4
            ecosmart: 7
            note: acima - nicho consciente
      validation_rules:
      - Deve ter pelo menos 2 fatores em 'eliminate' ou 'reduce'
      - Deve ter pelo menos 2 fatores em 'raise' ou 'create'
      - Strategy curve deve mostrar diferenca clara vs industria
      - Fatores criados devem ser valorizados pelo publico-alvo
    jobs_to_be_done:
      id: POS-003
      name: Framework Jobs-to-be-Done
      author: Clayton Christensen
      source: Competing Against Luck (2016)
      purpose: Entender o 'trabalho' que o cliente contrata o produto para fazer
      template: Quando {situation}, eu quero {motivation} para que eu possa {outcome}.
      template_english: When {situation}, I want to {motivation} so I can {outcome}.
      fields:
      - name: situation
        description: Contexto ou gatilho que cria a necessidade
        required: true
        example: estou saindo para o trabalho com pressa
      - name: motivation
        description: Acao ou solucao desejada
        required: true
        example: aplicar maquiagem rapidamente
      - name: outcome
        description: Resultado final desejado (emocional ou funcional)
        required: true
        example: parecer profissional o dia todo sem preocupacao
      job_types:
      - type: functional
        description: O que o cliente quer realizar
        example: aplicar maquiagem em 5 minutos
      - type: emotional
        description: Como o cliente quer se sentir
        example: sentir confianca na aparencia
      - type: social
        description: Como o cliente quer ser percebido
        example: parecer profissional e bem-cuidada
      example:
        brand: BEAUTYFIX
        primary_job:
          situation: estou saindo para o trabalho com pressa e sei que nao terei tempo
            para retoques
          motivation: aplicar maquiagem que dure o dia inteiro
          outcome: parecer profissional em todas as reunioes sem me preocupar com
            a aparencia
          result: Quando estou saindo para o trabalho com pressa e sei que nao terei
            tempo para retoques, eu quero aplicar maquiagem que dure o dia inteiro
            para que eu possa parecer profissional em todas as reunioes sem me preocupar
            com a aparencia.
        secondary_jobs:
        - type: emotional
          statement: Quando acordo cansada, quero me sentir bonita rapidamente para
            comecar o dia com confianca.
        - type: social
          statement: Quando tenho evento apos trabalho, quero maquiagem que transicione
            bem para parecer arrumada sem refazer tudo.
        competing_solutions:
        - Maquiagem tradicional (precisa retoque)
        - Nao usar maquiagem (nao resolve necessidade emocional)
        - Levar necessaire para retoques (inconveniente)
        - Maquiagem permanente (caro e arriscado)
      validation_rules:
      - Situation deve ser especifica e reconhecivel
      - Motivation deve ser acionavel
      - Outcome deve conectar com beneficio emocional
      - Deve identificar pelo menos 3 solucoes concorrentes
    value_proposition_canvas:
      id: POS-004
      name: Canvas de Proposta de Valor
      author: Alexander Osterwalder
      source: Value Proposition Design (2014)
      purpose: Alinhar proposta de valor com perfil do cliente
      template:
        customer_profile:
          jobs: 'Tarefas que o cliente tenta realizar: {customer_jobs}'
          pains: 'Frustraccoes e obstaculos: {customer_pains}'
          gains: 'Beneficios e resultados desejados: {customer_gains}'
        value_map:
          products_services: 'O que oferecemos: {products_services}'
          pain_relievers: 'Como aliviamos as dores: {pain_relievers}'
          gain_creators: 'Como geramos ganhos: {gain_creators}'
      fields:
      - name: customer_jobs
        description: Lista de 3-5 tarefas principais do cliente
        required: true
      - name: customer_pains
        description: Lista de 3-5 principais dores/frustraccoes
        required: true
      - name: customer_gains
        description: Lista de 3-5 ganhos desejados
        required: true
      - name: products_services
        description: Lista de produtos/servicos oferecidos
        required: true
      - name: pain_relievers
        description: Como cada produto alivia uma dor especifica
        required: true
      - name: gain_creators
        description: Como cada produto gera um ganho especifico
        required: true
      example:
        brand: FITBOX - Marmitas Fitness
        customer_profile:
          jobs:
          - Manter dieta equilibrada
          - Economizar tempo na semana
          - Controlar calorias e macros
          - Variar refeicoes sem perder praticidade
          pains:
          - Falta de tempo para cozinhar
          - Marmitas saudaveis sao caras
          - Comida fitness e sem sabor
          - Dificuldade em calcular macros
          - Desperdicio quando compra ingredientes
          gains:
          - Comer bem sem esforco
          - Economizar dinheiro vs delivery
          - Atingir metas de saude
          - Variedade sem monotonia
          - Praticidade no dia a dia
        value_map:
          products_services:
          - Marmitas congeladas com macros calculados
          - Assinatura semanal personalizada
          - App com tracking de consumo
          - Cardapio rotativo (20+ opcoes)
          pain_relievers:
          - Entrega semanal elimina tempo de preparo
          - Preco competitivo (R$18-25/refeicao)
          - Chef profissional = sabor garantido
          - Rotulos com macros detalhados
          - Porcoes individuais = zero desperdicio
          gain_creators:
          - 5min no micro = refeicao pronta
          - 30% mais barato que delivery saudavel
          - Resultados visiveis em 30 dias
          - 20 pratos novos por mes
          - App sincroniza com MyFitnessPal
        fit_analysis:
          pain_relief_coverage: 5/5 dores endereçadas
          gain_creation_coverage: 5/5 ganhos criados
          fit_score: 9.2
      validation_rules:
      - Cada dor deve ter pelo menos 1 pain reliever correspondente
      - Cada ganho deve ter pelo menos 1 gain creator correspondente
      - Jobs devem estar alinhados com produtos/servicos
      - Fit score minimo de 7.0 para aprovacao
  identity:
    brand_key:
      id: ID-001
      name: Unilever Brand Key
      author: Unilever
      source: Unilever Brand Development Framework
      purpose: Definir todos os elementos fundamentais da identidade de marca
      components:
      - name: root_strengths
        description: Forcas fundamentais e heranca da marca
        order: 1
        prompt: Quais sao as raizes e competencias essenciais da marca?
      - name: competitive_environment
        description: Contexto competitivo e alternativas do consumidor
        order: 2
        prompt: Com quem a marca compete pela atencao e preferencia?
      - name: target
        description: Publico-alvo com perfil detalhado
        order: 3
        prompt: Quem e o consumidor ideal e como ele vive?
      - name: insight
        description: Verdade humana profunda sobre o consumidor
        order: 4
        prompt: Qual insight nao-obvio motiva o comportamento do consumidor?
      - name: benefits
        description: Beneficios funcionais e emocionais
        order: 5
        prompt: O que a marca entrega funcionalmente e emocionalmente?
      - name: values_personality
        description: Valores e personalidade da marca
        order: 6
        prompt: Quais valores a marca representa e como ela se comporta?
      - name: reason_to_believe
        description: Provas e evidencias que sustentam a promessa
        order: 7
        prompt: Por que o consumidor deve acreditar na marca?
      - name: discriminator
        description: O diferencial unico e defensavel
        order: 8
        prompt: O que torna a marca inimitavel?
      - name: essence
        description: A alma da marca em uma frase
        order: 9
        prompt: Qual e a essencia emocional da marca em 3-5 palavras?
      template:
        root_strengths: '{root_strengths}'
        competitive_environment: '{competitive_environment}'
        target: '{target}'
        insight: '{insight}'
        benefits:
          functional: '{functional_benefits}'
          emotional: '{emotional_benefits}'
        values_personality: '{values_personality}'
        reason_to_believe: '{reason_to_believe}'
        discriminator: '{discriminator}'
        essence: '{essence}'
      example:
        brand: TERRAVIVA - Alimentos Organicos
        root_strengths:
        - 20 anos de agricultura familiar organica
        - Certificacao IBD desde 2005
        - Relacao direta com 50+ produtores locais
        - Rastreabilidade completa do campo a mesa
        competitive_environment:
        - Marcas organicas premium (Jasmine, Mãe Terra)
        - Supermercados com linha propria organica
        - Feiras de produtores locais
        - Hortas urbanas e CSA (agricultura suportada por comunidade)
        target: Familias urbanas classe A/B, 30-50 anos, com filhos, que valorizam
          saude e sustentabilidade, dispostas a pagar mais por qualidade e procedencia,
          frequentam feiras organicas aos finais de semana
        insight: Os pais sentem culpa por nao ter tempo de cozinhar do zero para os
          filhos, e buscam atalhos que ainda permitam se sentir 'bons pais' alimentando
          a familia com qualidade
        benefits:
          functional:
          - Alimentos sem agrotoxicos
          - Sabor mais intenso e natural
          - Maior durabilidade na geladeira
          - Informacao completa de origem
          emotional:
          - Tranquilidade de estar cuidando da familia
          - Orgulho de apoiar pequenos produtores
          - Conexao com a natureza mesmo na cidade
          - Sensacao de escolha consciente
        values_personality:
          values:
          - Autenticidade
          - Sustentabilidade
          - Comunidade
          - Transparencia
          - Cuidado
          personality: 'Como uma avo do interior: acolhedora, simples, honesta, que
            conta historias sobre de onde vem cada ingrediente'
        reason_to_believe:
        - QR code em cada produto com video do produtor
        - Certificacao IBD + Selo Organico Brasil
        - Programa 'Conheca o Produtor' com visitas agendadas
        - Garantia de devolucao se nao gostar
        discriminator: Unica marca organica que conecta cada produto a historia real
          do produtor via QR code, criando transparencia radical
        essence: Comida de verdade, gente de verdade
      validation_rules:
      - Todos os 9 componentes devem ser preenchidos
      - Insight deve revelar verdade nao-obvia
      - Discriminator deve ser verificavel e defensavel
      - Essence deve ter no maximo 5 palavras
    brand_pyramid:
      id: ID-002
      name: Piramide de Ressonancia de Marca (Keller)
      author: Kevin Lane Keller
      source: Strategic Brand Management (2008)
      purpose: Construir brand equity atraves de 6 niveis de relacionamento
      levels:
      - level: 1
        name: salience
        name_pt: Saliencia
        question: Quem e voce?
        focus: Awareness e identificacao
        metrics:
        - recall
        - recognition
        - top_of_mind
      - level: 2
        name: performance
        name_pt: Desempenho
        question: O que voce e?
        focus: Atributos funcionais e qualidade
        metrics:
        - reliability
        - durability
        - serviceability
        - price
      - level: 3
        name: imagery
        name_pt: Imagem
        question: O que voce e?
        focus: Perfil do usuario e personalidade
        metrics:
        - user_profiles
        - usage_situations
        - personality
        - heritage
      - level: 4
        name: judgments
        name_pt: Julgamentos
        question: O que eu penso sobre voce?
        focus: Opiniao racional do consumidor
        metrics:
        - quality
        - credibility
        - consideration
        - superiority
      - level: 5
        name: feelings
        name_pt: Sentimentos
        question: O que eu sinto sobre voce?
        focus: Reacao emocional a marca
        metrics:
        - warmth
        - fun
        - excitement
        - security
        - social_approval
        - self_respect
      - level: 6
        name: resonance
        name_pt: Ressonancia
        question: Qual nossa conexao?
        focus: Relacionamento e lealdade profunda
        metrics:
        - loyalty
        - attachment
        - community
        - engagement
      template:
        salience:
          category_identification: '{category_identification}'
          needs_satisfied: '{needs_satisfied}'
          awareness_depth: '{awareness_depth}'
          awareness_breadth: '{awareness_breadth}'
        performance: '{performance_attributes}'
        imagery: '{brand_imagery}'
        judgments: '{brand_judgments}'
        feelings: '{brand_feelings}'
        resonance: '{brand_resonance}'
      example:
        brand: NATURA
        pyramid:
          salience:
            category_identification: Cosmeticos e perfumaria brasileira
            needs_satisfied: Beleza, bem-estar, presente com significado
            awareness_depth: 95% reconhecimento espontaneo no Brasil
            awareness_breadth: Associada a ocasioes de presente, auto-cuidado, sustentabilidade
          performance:
            primary_attributes:
            - Ingredientes naturais brasileiros
            - Fragrâncias marcantes
            - Embalagens refil
            reliability: Alta - consistencia de qualidade
            price_positioning: Premium acessivel
            service: Consultoras como canal personalizado
          imagery:
            user_profile: Mulheres conscientes, que valorizam brasilidade e sustentabilidade
            usage_situations: Rotina diaria, presentes, momentos de auto-cuidado
            personality: Autentica, acolhedora, consciente, brasileira
            heritage: Empresa B Corp, compromisso ambiental desde fundacao
          judgments:
            quality: Alta qualidade com ingredientes naturais
            credibility: Expertise em biodiversidade brasileira
            consideration: Top 3 em consideracao no segmento
            superiority: Lider em sustentabilidade no setor
          feelings:
            primary:
            - warmth
            - self_respect
            - social_approval
            warmth: Conexao com natureza e brasilidade
            self_respect: Escolha consciente e alinhada com valores
            social_approval: Marca bem vista socialmente
          resonance:
            loyalty: Alto indice de recompra (70%+)
            attachment: Relacao emocional com linhas classicas (Ekos, Tododia)
            community: Rede de 1.8M consultoras engajadas
            engagement: Programa de fidelidade + conteudo educativo
      validation_rules:
      - Construir da base (salience) ao topo (resonance)
      - Niveis inferiores devem estar solidos antes de subir
      - Performance e Imagery devem estar equilibrados
      - Judgments e Feelings devem estar equilibrados
    archetypes:
      id: ID-003
      name: 12 Arquetipos de Marca (Jung/Mark & Pearson)
      author: Carol S. Pearson & Margaret Mark
      source: The Hero and the Outlaw (2001)
      purpose: Definir personalidade de marca atraves de arquetipos universais
      categories:
        independence_fulfillment:
          name: Independencia e Realizacao
          archetypes:
          - innocent
          - explorer
          - sage
        risk_mastery:
          name: Risco e Maestria
          archetypes:
          - hero
          - outlaw
          - magician
        belonging_enjoyment:
          name: Pertencimento e Prazer
          archetypes:
          - regular_guy
          - lover
          - jester
        stability_control:
          name: Estabilidade e Controle
          archetypes:
          - caregiver
          - ruler
          - creator
      archetypes:
      - id: innocent
        name: Inocente
        name_en: The Innocent
        motto: Livre para ser voce e eu
        core_desire: Experimentar o paraiso
        goal: Ser feliz
        fear: Fazer algo errado e ser punido
        strategy: Fazer as coisas certas
        gift: Fe e otimismo
        voice:
        - Otimista
        - Puro
        - Simples
        - Nostalgico
        brands_example:
        - Coca-Cola
        - Dove
        - Nintendo
        colors:
        - Branco
        - Azul claro
        - Rosa pastel
        dont:
        - Cinismo
        - Complexidade
        - Ironia pesada
      - id: explorer
        name: Explorador
        name_en: The Explorer
        motto: Nao me limite
        core_desire: Liberdade para descobrir
        goal: Experimentar uma vida melhor e mais autentica
        fear: Ficar preso, conformidade, vazio interior
        strategy: Jornada, busca, experiencia do novo
        gift: Autonomia e ambicao
        voice:
        - Aventureiro
        - Independente
        - Ousado
        - Autêntico
        brands_example:
        - Jeep
        - The North Face
        - Starbucks
        colors:
        - Verde
        - Marrom terra
        - Laranja
        dont:
        - Rotina
        - Limitações
        - Conformismo
      - id: sage
        name: Sabio
        name_en: The Sage
        motto: A verdade libertara voce
        core_desire: Encontrar a verdade
        goal: Usar inteligencia para entender o mundo
        fear: Ser enganado, ignorancia
        strategy: Buscar informacao e conhecimento
        gift: Sabedoria e inteligencia
        voice:
        - Inteligente
        - Analitico
        - Guia
        - Educativo
        brands_example:
        - Google
        - BBC
        - TED
        colors:
        - Azul escuro
        - Preto
        - Branco
        dont:
        - Superficialidade
        - Opiniao sem base
        - Arrogancia
      - id: hero
        name: Heroi
        name_en: The Hero
        motto: Onde ha vontade, ha um caminho
        core_desire: Provar seu valor atraves de acao corajosa
        goal: Melhorar o mundo atraves de maestria
        fear: Fraqueza, vulnerabilidade, desistir
        strategy: Ser forte e competente
        gift: Competencia e coragem
        voice:
        - Corajoso
        - Determinado
        - Inspirador
        - Forte
        brands_example:
        - Nike
        - FedEx
        - BMW
        colors:
        - Vermelho
        - Preto
        - Dourado
        dont:
        - Vitimismo
        - Fraqueza
        - Desculpas
      - id: outlaw
        name: Fora-da-Lei
        name_en: The Outlaw
        motto: Regras sao feitas para serem quebradas
        core_desire: Revolucao ou vinganca
        goal: Destruir o que nao funciona
        fear: Ser comum ou impotente
        strategy: Romper, destruir, chocar
        gift: Liberdade radical
        voice:
        - Rebelde
        - Provocador
        - Disruptivo
        - Selvagem
        brands_example:
        - Harley-Davidson
        - Virgin
        - Diesel
        colors:
        - Preto
        - Vermelho
        - Prata
        dont:
        - Conformismo
        - Submissao
        - Tradicao cega
      - id: magician
        name: Mago
        name_en: The Magician
        motto: Faco acontecer
        core_desire: Conhecer as leis fundamentais do universo
        goal: Fazer sonhos se tornarem realidade
        fear: Consequencias negativas nao intencionais
        strategy: Desenvolver visao e vive-la
        gift: Encontrar solucoes win-win
        voice:
        - Visionario
        - Transformador
        - Inspirador
        - Catalisador
        brands_example:
        - Apple
        - Disney
        - Tesla
        colors:
        - Roxo
        - Preto
        - Prata
        dont:
        - Monotonia
        - Status quo
        - Falta de imaginacao
      - id: regular_guy
        name: Cara Comum
        name_en: The Regular Guy/Girl
        motto: Todos foram criados iguais
        core_desire: Conexao com outros
        goal: Pertencer
        fear: Ser deixado de fora
        strategy: Desenvolver virtudes comuns, ser acessivel
        gift: Realismo e empatia
        voice:
        - Acessivel
        - Honesto
        - Pratico
        - Inclusivo
        brands_example:
        - IKEA
        - Havaianas
        - Budweiser
        colors:
        - Azul
        - Verde
        - Cores neutras
        dont:
        - Elitismo
        - Exclusividade
        - Pretensao
      - id: lover
        name: Amante
        name_en: The Lover
        motto: So tenho olhos para voce
        core_desire: Intimidade e experiencia sensorial
        goal: Relacionamento com pessoas e experiencias que ama
        fear: Ficar sozinho, nao ser desejado
        strategy: Tornar-se mais atraente fisica e emocionalmente
        gift: Paixao, gratidao, apreciacao
        voice:
        - Sensual
        - Empatico
        - Intimo
        - Apaixonado
        brands_example:
