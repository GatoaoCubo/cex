        motto: Se nao pode dançar, nao quero fazer parte
        core_desire: Viver o momento com alegria total
        goal: Se divertir e alegrar o mundo
        fear: Ser chato ou aborrecer os outros
        strategy: Brincar, fazer piadas, ser engraçado
        gift: Alegria
        voice:
        - Divertido
        - Irreverente
        - Otimista
        - Espontâneo
        brands_example:
