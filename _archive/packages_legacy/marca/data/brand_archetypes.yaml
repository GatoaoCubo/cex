        accent:
        - '#FF0000'
        - '#FF4500'
        avoid:
        - '#FFB6C1'
        - '#E6E6FA'
        - '#98FB98'
      color_psychology: Preto dominante, vermelho intenso, tons escuros - cores de
        rebeliao e poder
      typography_style: Fontes distorcidas, grunge, stencil, aspecto underground
      typography_examples:
      - Impact
      - Bebas Neue
      - Permanent Marker
      - Special Elite
      imagery_style: Grafite, cultura urbana, tatuagens, motos, rock, expressoes desafiadoras
      photography_mood: Baixo-chave, texturas urbanas, angulos nao convencionais
      logo_characteristics:
      - Formas agressivas e angulares
      - Simbolos de rebeliao (caveiras, raios, chamas)
      - Tipografia distorcida ou stencil
      - Aspecto cru e nao polido
    brazilian_examples:
    - brand: Corinthians
      rationale: Identidade de fiel, rebeldia, time do povo contra o establishment
    - brand: Diesel Brasil
      rationale: Moda provocativa, irreverencia, desafio aos padroes
    - brand: Monster Energy Brasil
      rationale: Esportes radicais, atitude extrema, anticonformismo
    - brand: Reserva
      rationale: Moda masculina com atitude irreverente e questionadora
    international_examples:
