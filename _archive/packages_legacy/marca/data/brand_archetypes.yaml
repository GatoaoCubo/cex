    international_examples:
    - Nike
    - Adidas
    - Under Armour
    - FedEx
    - BMW M
    ideal_categories:
    - Artigos esportivos
    - Suplementos fitness
    - Servicos de coaching
    - Equipamentos de performance
    - Automotivo esportivo
    price_positioning:
    - Medio
    - Premium
    target_audience_profile:
      demographics: Adultos 18-45, ambos generos, estilo de vida ativo
      psychographics: Competitivos, orientados a metas, valorizam esforco e resultados
      values:
      - Vitoria
      - Disciplina
      - Superacao
      - Excelencia
    compatible_secondaries:
    - explorer
    - ruler
    - magician
    neutral_combinations:
    - creator
    - sage
    avoid_combinations:
    - innocent
    - caregiver
    - jester
    combination_rationale:
      explorer: Heroi que conquista novos territorios
      ruler: Lideranca atraves de competencia e vitoria
      avoid_innocent: Pureza contradiz combatividade heroica
  outlaw:
    id: outlaw
    name_pt: Rebelde
    name_en: Outlaw
    motto: Regras foram feitas para serem quebradas
    core_desire: Revolucao, vinganca ou libertacao
    goal: Derrubar o que nao esta funcionando
    fear: Impotencia, irrelevancia, ser comum, conformismo
    strategy: Romper, destruir ou chocar para criar mudanca
    brand_promise: Liberdade para ser quem voce realmente e
    personality_traits:
    - Rebelde
    - Disruptivo
    - Ousado
    - Libertario
    - Provocador
    - Inconformista
    - Radical
    shadow_traits:
    - Autodestruicao
    - Criminalidade
    - Negatividade cronica
    tone_of_voice:
      formality: 1
      enthusiasm: 4
      humor: 4
      authority: 2
      warmth: 2
      description: Tom provocativo, irreverente e desafiador. Linguagem direta, as
        vezes agressiva.
    communication_style:
      do:
      - Desafie o status quo diretamente
      - Use linguagem provocativa e ousada
      - Celebre a diferenca e individualidade
      - Questione convencoes e padroes
      - Crie polarizacao (ame ou odeie)
      dont:
      - Ser institucional ou corporativo
      - Pedir permissao ou desculpas
      - Seguir formulas e padroes de mercado
      - Ser politicamente correto demais
      - Agradar a todos
    visual_identity:
      colors:
        primary:
        - '#000000'
        - '#1C1C1C'
        - '#800000'
        secondary:
        - '#DC143C'
        - '#8B0000'
