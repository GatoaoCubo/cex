title: Arquetipos de Marca Junguianos
description: 12 arquetipos de marca adaptados para e-commerce brasileiro com guias
  de tom de voz, identidade visual e combinacoes estrategicas
version: 1.0.0
agent: marca
total_archetypes: 12
source: Carl Jung + Margaret Mark & Carol Pearson (The Hero and the Outlaw)
archetypes:
  innocent:
    id: innocent
    name_pt: Inocente
    name_en: Innocent
    motto: Livre para ser voce mesmo
    core_desire: Experimentar o paraiso, felicidade e simplicidade
    goal: Ser feliz e trazer felicidade aos outros
    fear: Fazer algo errado e ser punido, corrupcao, complexidade
    strategy: Fazer as coisas certas, ser otimista, transmitir pureza e simplicidade
    brand_promise: A vida pode ser simples e boa
    personality_traits:
    - Otimista
    - Puro
    - Honesto
    - Romantico
    - Leal
    - Simples
    - Nostalgico
    shadow_traits:
    - Ingenuidade excessiva
    - Negacao de problemas
    - Dependencia
    tone_of_voice:
      formality: 2
      enthusiasm: 4
      humor: 3
      authority: 2
      warmth: 5
      description: Tom acolhedor, simples e genuino. Evita jargoes tecnicos. Usa linguagem
        acessivel e otimista.
    communication_style:
      do:
      - Use linguagem simples e direta
      - Transmita otimismo genuino
      - Conte historias de momentos felizes
      - Valorize tradicao e nostalgia
      - Celebre pequenas alegrias do cotidiano
      dont:
      - Usar ironia ou sarcasmo
      - Abordar temas polemicos
      - Fazer promessas complexas
      - Usar linguagem agressiva de vendas
      - Focar em medos ou problemas
    visual_identity:
      colors:
        primary:
        - '#FFFFFF'
        - '#F5F5DC'
        - '#87CEEB'
        secondary:
        - '#98D8C8'
        - '#FFD1DC'
        - '#FFFACD'
        accent:
        - '#FFB6C1'
        - '#90EE90'
        avoid:
        - '#000000'
        - '#8B0000'
        - '#2F4F4F'
      color_psychology: Cores claras, pastel e suaves que transmitem pureza, paz e
        simplicidade
      typography_style: Sans-serif arredondadas, fontes manuscritas delicadas, alta
        legibilidade
      typography_examples:
      - Quicksand
      - Nunito
      - Poppins
      - Comic Neue
      imagery_style: Imagens luminosas, natureza, familias felizes, criancas, paisagens
        bucolicas, luz natural
      photography_mood: Alto-chave, luz natural, cores suaves, expressoes genuinas
        de alegria
      logo_characteristics:
      - Formas organicas e arredondadas
      - Simbolos de natureza (folhas, sol, nuvens)
      - Tipografia amigavel
      - Espacamento generoso
    brazilian_examples:
    - brand: Natura
      rationale: Comunica beleza natural, sustentabilidade e conexao com a natureza
        brasileira
    - brand: Leite Moca
      rationale: Nostalgia, tradicao familiar, momentos doces e simples da vida
    - brand: Nestle
      rationale: Valores familiares, nutricao, tradicao e momentos de partilha
    - brand: Sadia
      rationale: Confianca, tradicao, qualidade simples e honesta
    international_examples:
    - Coca-Cola
    - Dove
    - Innocent Drinks
    - Aveeno
    ideal_categories:
    - Alimentos naturais
    - Produtos para bebes
    - Cosmeticos organicos
    - Produtos artesanais
    - Bem-estar e saude
    price_positioning:
    - Popular
    - Medio
    target_audience_profile:
      demographics: Familias, maes, pessoas que valorizam tradicao
      psychographics: Buscam simplicidade, autenticidade, conexao emocional
      values:
      - Familia
      - Tradicao
      - Simplicidade
      - Honestidade
    compatible_secondaries:
    - caregiver
    - everyman
    - sage
    neutral_combinations:
    - explorer
    - creator
    avoid_combinations:
    - outlaw
    - jester
    - ruler
    combination_rationale:
      caregiver: Amplifica o cuidado genuino e a protecao
      everyman: Reforcar acessibilidade e conexao popular
      avoid_outlaw: Rebeldia contradiz pureza e inocencia
  explorer:
    id: explorer
    name_pt: Explorador
    name_en: Explorer
    motto: Nao me cerque
    core_desire: Liberdade para descobrir a si mesmo atraves da exploracao do mundo
    goal: Experimentar uma vida melhor, mais autentica e gratificante
    fear: Ficar preso, conformismo, vazio interior, limitacao
    strategy: Viajar, buscar novas experiencias, escapar do tedio e da rotina
    brand_promise: A jornada e a recompensa
    personality_traits:
    - Aventureiro
    - Independente
    - Ambicioso
    - Individualista
    - Pioneiro
    - Inquieto
    - Autentico
    shadow_traits:
    - Desajuste social
    - Incapacidade de compromisso
    - Perfeccionismo paralisante
    tone_of_voice:
      formality: 2
      enthusiasm: 5
      humor: 3
      authority: 3
      warmth: 3
      description: Tom inspirador, encorajador e empolgante. Vocabulario de descoberta
        e liberdade.
    communication_style:
      do:
      - Use verbos de acao e movimento
      - Inspire a busca por novas experiencias
      - Valorize autenticidade e individualidade
      - Conte historias de descobertas
      - Celebre a coragem de explorar
      dont:
      - Enfatizar seguranca e conforto
      - Usar linguagem corporativa rigida
      - Focar em rotinas e padroes
      - Limitar possibilidades
      - Ser excessivamente cauteloso
    visual_identity:
      colors:
        primary:
        - '#2E8B57'
        - '#4682B4'
        - '#D2691E'
        secondary:
        - '#8B4513'
        - '#556B2F'
        - '#708090'
        accent:
        - '#FF8C00'
        - '#CD853F'
        avoid:
        - '#FF69B4'
        - '#DA70D6'
        - '#FFB6C1'
      color_psychology: Tons terrosos, verdes de natureza, azuis de ceu aberto - cores
        da aventura outdoor
      typography_style: Sans-serif robustas, fontes condensadas, aspecto de carimbos
        ou vintage
      typography_examples:
      - Oswald
      - Barlow Condensed
      - Source Sans Pro
      - Archivo
      imagery_style: Paisagens grandiosas, estradas, montanhas, pessoas em movimento,
        equipamentos outdoor
      photography_mood: Grande angular, luz dramatica, texturas naturais, perspectivas
        expansivas
      logo_characteristics:
      - Formas geometricas angulares
      - Simbolos de direcao (setas, bussolas)
      - Texturas rusticas
      - Aspecto robusto e duravel
    brazilian_examples:
    - brand: Havaianas
      rationale: Espirito livre brasileiro, versatilidade, presenca global com raizes
        locais
    - brand: Latam Airlines
      rationale: Conectar destinos, descoberta de novos lugares, liberdade de viajar
    - brand: Track & Field
      rationale: Estilo de vida ativo, outdoor, esportes e aventura
    - brand: Decathlon Brasil
      rationale: Equipamentos para todas as aventuras esportivas e outdoor
    international_examples:
    - Jeep
    - The North Face
    - Patagonia
    - GoPro
    - Red Bull
    ideal_categories:
    - Equipamentos outdoor
    - Turismo e viagens
    - Esportes de aventura
    - Vestuario esportivo
    - Tecnologia portatil
    price_positioning:
    - Medio
    - Premium
    target_audience_profile:
      demographics: Jovens adultos 25-45, solteiros ou casais sem filhos
      psychographics: Buscam experiencias sobre posses, valorizam liberdade e autenticidade
      values:
      - Liberdade
      - Autenticidade
      - Aventura
      - Autodescoberta
    compatible_secondaries:
    - hero
    - outlaw
    - creator
    neutral_combinations:
    - sage
    - magician
    avoid_combinations:
    - caregiver
    - ruler
    - everyman
    combination_rationale:
      hero: Amplifica coragem e superacao de desafios
      outlaw: Reforcar anticonformismo e quebra de regras
      avoid_caregiver: Cuidado com outros limita liberdade individual
  sage:
    id: sage
    name_pt: Sabio
    name_en: Sage
    motto: A verdade libertara voce
    core_desire: Encontrar a verdade e compreender o mundo
    goal: Usar inteligencia e analise para entender o mundo
    fear: Ser enganado, ignorancia, desinformacao
    strategy: Buscar informacao, conhecimento e dados para compreender
    brand_promise: Conhecimento confiavel para decisoes melhores
    personality_traits:
    - Inteligente
    - Analitico
    - Confiavel
    - Ponderado
    - Objetivo
    - Expertise
    - Reflexivo
    shadow_traits:
    - Arrogancia intelectual
    - Frieza emocional
    - Paralisia por analise
    tone_of_voice:
      formality: 4
      enthusiasm: 2
      humor: 2
      authority: 5
      warmth: 2
      description: Tom informativo, preciso e confiavel. Vocabulario tecnico quando
        apropriado, sempre com clareza.
    communication_style:
      do:
      - Apresente dados e evidencias
      - Use fontes confiaveis e cite referencias
      - Explique conceitos complexos com clareza
      - Demonstre expertise e profundidade
      - Oferer analises e insights
      dont:
      - Fazer afirmacoes sem embasamento
      - Usar linguagem excessivamente emocional
      - Simplificar demais (perda de precisao)
      - Fazer promessas exageradas
      - Ignorar contrapontos validos
    visual_identity:
      colors:
        primary:
        - '#1E3A5F'
        - '#2C3E50'
        - '#34495E'
        secondary:
        - '#95A5A6'
        - '#7F8C8D'
        - '#BDC3C7'
        accent:
        - '#3498DB'
        - '#1ABC9C'
        avoid:
        - '#FF1493'
        - '#FF4500'
        - '#FFD700'
      color_psychology: Azuis profundos e cinzas sofisticados que transmitem confianca
        e seriedade intelectual
      typography_style: Serifadas classicas para credibilidade, sans-serif limpas
        para modernidade
      typography_examples:
      - Merriweather
      - Lora
      - IBM Plex Sans
      - Source Serif Pro
      imagery_style: Graficos, dados visualizados, ambientes academicos, bibliotecas,
        tecnologia, simbolos de conhecimento
      photography_mood: Iluminacao controlada, composicao equilibrada, ambientes profissionais
      logo_characteristics:
      - Formas geometricas precisas
      - Simbolos de conhecimento (livros, corujas, lampadas)
      - Tipografia classica e elegante
      - Design clean e minimalista
    brazilian_examples:
    - brand: Estadao
      rationale: Jornalismo serio, credibilidade, analise profunda de fatos
    - brand: FGV
      rationale: Educacao de excelencia, pesquisa, formacao de liderancas
    - brand: XP Investimentos
      rationale: Educacao financeira, conhecimento para investir melhor
    - brand: Abril Educacao
      rationale: Conhecimento, formacao, conteudo educacional de qualidade
    international_examples:
    - Google
    - BBC
    - The Economist
    - TED
    - Harvard
    ideal_categories:
    - Educacao e cursos
    - Consultoria
    - Tecnologia B2B
    - Financas e investimentos
    - Publicacoes e midia
    price_positioning:
    - Premium
    - Luxury
    target_audience_profile:
      demographics: Profissionais 30-55, alta escolaridade, tomadores de decisao
      psychographics: Valorizam conhecimento, buscam fontes confiaveis, tomam decisoes
        racionais
      values:
      - Conhecimento
      - Verdade
      - Analise
      - Competencia
    compatible_secondaries:
    - creator
    - ruler
    - innocent
    neutral_combinations:
    - caregiver
    - hero
    avoid_combinations:
    - jester
    - outlaw
    - lover
    combination_rationale:
      creator: Conhecimento aplicado a inovacao
      ruler: Autoridade baseada em expertise
      avoid_jester: Humor pode minar credibilidade intelectual
  hero:
    id: hero
    name_pt: Heroi
    name_en: Hero
    motto: Onde ha vontade, ha um caminho
    core_desire: Provar seu valor atraves de acoes corajosas e dificeis
    goal: Exercer maestria de forma que melhore o mundo
    fear: Fraqueza, vulnerabilidade, desistir, ser covarde
    strategy: Ser forte, competente e poderoso quanto possivel
    brand_promise: Voce pode superar qualquer desafio
    personality_traits:
    - Corajoso
    - Determinado
    - Forte
    - Competitivo
    - Honrado
    - Disciplinado
    - Vencedor
    shadow_traits:
    - Arrogancia
    - Necessidade constante de conflito
    - Incapacidade de delegar
    tone_of_voice:
      formality: 3
      enthusiasm: 5
      humor: 2
      authority: 4
      warmth: 3
      description: Tom motivacional, empoderador e energico. Linguagem de superacao
        e conquista.
    communication_style:
      do:
      - Use linguagem de superacao e vitoria
      - Mostre resultados concretos e tangiveis
      - Inspire acao e determinacao
      - Celebre conquistas e esforco
      - Desafie o cliente a ser melhor
      dont:
      - Aceitar mediocridade ou desculpas
      - Ser condescendente ou paternalista
      - Focar em limitacoes ou fraquezas
      - Usar linguagem passiva
      - Evitar desafios ou conflitos
    visual_identity:
      colors:
        primary:
        - '#C41E3A'
        - '#B22222'
        - '#000000'
        secondary:
        - '#FFD700'
        - '#DAA520'
        - '#2F4F4F'
        accent:
        - '#FF4500'
        - '#DC143C'
        avoid:
        - '#FFB6C1'
        - '#E6E6FA'
        - '#F0FFF0'
      color_psychology: Vermelho poderoso, preto forte, dourado de vitoria - cores
        de energia e conquista
      typography_style: Sans-serif bold e impactantes, fontes condensadas atleticas
      typography_examples:
      - Montserrat Bold
