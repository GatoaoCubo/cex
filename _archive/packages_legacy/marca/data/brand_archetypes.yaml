      photography_mood: Iluminacao dramatica, elementos misticos, transicoes visuais
      logo_characteristics:
      - Simbolos misticos (estrelas, lua, olhos)
      - Formas fluidas e transformadoras
      - Tipografia elegante e misteriosa
      - Elementos de luz e brilho
    brazilian_examples:
    - brand: Apple Brasil
      rationale: Tecnologia como magia, transformacao atraves de design e inovacao
    - brand: O Boticario
      rationale: Transformacao de beleza, experiencias sensoriais, encantamento
    - brand: Nubank
      rationale: Transformacao digital do sistema financeiro, magia do simples
    - brand: iFood
      rationale: Transformacao da experiencia de alimentacao, conveniencia magica
    international_examples:
    - Apple
    - Disney
    - Dyson
    - Tesla
    - Mastercard
    ideal_categories:
    - Tecnologia
    - Cosmeticos e beleza
    - Servicos de transformacao
    - Experiencias e entretenimento
    - Wellness e bem-estar
    price_positioning:
    - Premium
    - Luxury
    target_audience_profile:
      demographics: Adultos 25-50, poder aquisitivo medio-alto, early adopters
      psychographics: Buscam transformacao, valorizam experiencias unicas, visionarios
      values:
      - Transformacao
      - Inovacao
      - Experiencia
      - Magia
    compatible_secondaries:
    - creator
    - sage
    - hero
    neutral_combinations:
    - explorer
    - lover
    avoid_combinations:
    - everyman
    - jester
    - outlaw
    combination_rationale:
      creator: Visao transformadora aplicada a criacao
      sage: Conhecimento profundo como base da magia
      avoid_everyman: Magia e comum sao opostos por natureza
  everyman:
    id: everyman
    name_pt: Cara Comum
    name_en: Everyman
    motto: Todos os homens e mulheres sao criados iguais
    core_desire: Conectar-se com outros, pertencer
    goal: Pertencer, se encaixar, ser aceito como e
    fear: Ser deixado de fora, se destacar demais, parecer esnobe
    strategy: Desenvolver virtudes solidas e comuns, ser autentico e pe-no-chao
    brand_promise: Somos como voce, entendemos voce
    personality_traits:
