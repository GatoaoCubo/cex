    - Diesel
    - Virgin
    - MTV Classic
    ideal_categories:
    - Moda alternativa
    - Bebidas energeticas
    - Motocicletas e acessorios
    - Musica e entretenimento
    - Esportes radicais
    price_positioning:
    - Medio
    - Premium
    target_audience_profile:
      demographics: Jovens 18-35, predominantemente masculino, urbanos
      psychographics: Anticonformistas, buscam autenticidade, rejeitam mainstream
      values:
      - Liberdade
      - Autenticidade
      - Rebeldia
      - Individualismo
    compatible_secondaries:
    - explorer
    - creator
    - jester
    neutral_combinations:
    - hero
    - magician
    avoid_combinations:
    - innocent
    - caregiver
    - ruler
    combination_rationale:
      explorer: Rebeldia que busca novos caminhos
      creator: Disruptcao criativa e inovacao radical
      avoid_innocent: Pureza e inocencia contradizem rebeldia
  magician:
    id: magician
    name_pt: Mago
    name_en: Magician
    motto: Eu faco acontecer
    core_desire: Compreender as leis fundamentais do universo e transforma-las
    goal: Fazer sonhos se tornarem realidade, transformar
    fear: Consequencias negativas nao intencionais, charlatanismo
    strategy: Desenvolver visao e vive-la, criar experiencias transformadoras
    brand_promise: Transformacao e a concretizacao de sonhos
    personality_traits:
    - Visionario
    - Transformador
    - Intuitivo
    - Carismatico
    - Mistico
    - Catalico
    - Inspirador
    shadow_traits:
    - Manipulacao
    - Desconexao com realidade
    - Charlatanismo
    tone_of_voice:
      formality: 3
      enthusiasm: 4
      humor: 2
      authority: 4
      warmth: 4
      description: Tom visionario, inspirador e misterioso. Linguagem de transformacao
        e possibilidades.
    communication_style:
      do:
      - Fale de transformacao e possibilidades
      - Use metaforas e linguagem evocativa
      - Crie senso de magia e encantamento
      - Mostre o antes e depois transformador
      - Prometa e entregue experiencias unicas
      dont:
      - Ser excessivamente racional ou tecnico
      - Prometer sem poder entregar
      - Parecer manipulador ou enganoso
      - Desmistificar demais o processo
      - Ser mundano ou ordinario
    visual_identity:
      colors:
        primary:
        - '#4B0082'
        - '#663399'
        - '#191970'
        secondary:
        - '#C0C0C0'
        - '#FFD700'
        - '#000080'
        accent:
