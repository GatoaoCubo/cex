        - '#8A2BE2'
        avoid:
        - '#808080'
        - '#A9A9A9'
        - '#D3D3D3'
      color_psychology: Roxos misticos, dourado alquimico, azul profundo - cores de
        mistero e transformacao
      typography_style: Fontes elegantes e misteriosas, scripts sofisticados
      typography_examples:
