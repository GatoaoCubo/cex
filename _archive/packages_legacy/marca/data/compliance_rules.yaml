severity_definitions:
  critical:
    description: Violacao pode resultar em multa, processo ou interdicao
    action: Bloqueio imediato do conteudo ate correcao
    review_required: true
    auto_reject: true
  required:
    description: Exigencia legal ou normativa que deve ser cumprida
    action: Correcao obrigatoria antes de publicacao
    review_required: true
    auto_reject: false
  recommended:
    description: Boa pratica que melhora qualidade e reduz riscos
    action: Sugestao de melhoria, nao bloqueante
    review_required: false
    auto_reject: false
validation_workflow:
  steps:
  - step: 1
    name: identify_category
    description: Identificar categoria do produto para mapear reguladores
    input: product_category from input_schema
    output: applicable_regulators[]
  - step: 2
    name: check_critical_rules
    description: Verificar todas as regras criticas da categoria
    input: applicable_regulators[].rules where severity=critical
    output: critical_violations[]
  - step: 3
    name: check_required_rules
    description: Verificar regras obrigatorias
    input: applicable_regulators[].rules where severity=required
    output: required_violations[]
  - step: 4
    name: run_checklist
    description: Executar checklist de validacao
    input: validation_checklist where applies_to includes category
    output: checklist_results[]
  - step: 5
    name: generate_report
    description: Gerar relatorio de compliance
    input: all violations + checklist_results
    output: compliance_report
  pass_conditions:
    critical: zero violations
    required: all corrected before publish
    recommended: optional improvements noted
