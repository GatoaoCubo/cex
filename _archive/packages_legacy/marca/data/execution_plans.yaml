        $origin_story:
          type: string
          description: Min 500 chars
        $mission_statement:
          type: string
          description: 100-150 chars
        $vision_statement:
          type: string
          description: 100-150 chars
        $core_values:
          type: array[5]
          description: Defensible values with behaviors
        $brand_manifesto:
          type: string
          description: Min 300 chars
      estimated_tokens: 2000
      estimated_time: 8-10 min
      dependencies:
      - step_1
      - step_2
      - step_3
      quality_gate:
        min_score: 7.0
        validation_rules:
        - origin_story_chars >= 500
        - mission_chars >= 100 AND mission_chars <= 150
        - vision_chars >= 100 AND vision_chars <= 150
        - values_count == 5
        - manifesto_chars >= 300
    - step: 6
      name: Brand Guidelines
      phase: guidelines
      hop: prompts/15_brand_guidelines_HOP.md
      blocks:
      - 25
      - 26
      - 27
      - 28
      section: 'Section 6: Brand Guidelines'
      status: pending_hop
      inputs:
        from_previous:
        - name: $brand_identity
          source: step_1
        - name: $voice
          source: step_3
        - name: $visual
          source: step_4
        from_context:
        - name: $product_category
          source: user_input
          description: For compliance rules
      outputs:
        $extended_dos:
          type: array[8-10]
          description: Extended messaging guidelines
        $extended_donts:
          type: array[8-10]
          description: Extended prohibitions
        $compliance_rules:
          type: object
          description: ANVISA, INMETRO, CONAR, CDC applicable rules
        $consistency_checklist:
          type: array[10]
          description: Brand consistency verification points
      estimated_tokens: 1800
      estimated_time: 6-8 min
      dependencies:
      - step_1
      - step_3
      - step_4
      quality_gate:
        min_score: 7.0
        validation_rules:
        - dos_count >= 8
        - donts_count >= 8
        - compliance_rules_present == true
        - checklist_count == 10
    - step: 7
      name: Validation & Integration
      phase: validation
      hop: prompts/16_brand_validation_HOP.md
      blocks:
      - 29
      - 30
      - 31
      - 32
      section: 'Section 7: Validation'
      status: pending_hop
      inputs:
        from_previous: all_previous_outputs
        from_context:
        - name: $competitors
          source: user_input
      outputs:
        $consistency_score:
          type: float
          description: 0-1 score with breakdown
        $uniqueness_score:
          type: float
          description: 0-10 with analysis
        $competitive_audit:
          type: object
          description: Comparison matrix
        $integration_notes:
          type: object
          description: Handoff for anuncio, photo, curso agents
      estimated_tokens: 1500
      estimated_time: 5-7 min
      dependencies:
      - step_1
      - step_2
      - step_3
      - step_4
      - step_5
      - step_6
      quality_gate:
        min_score: 8.0
        validation_rules:
        - consistency_score >= 0.85
        - uniqueness_score >= 8.0
        - all_cross_validations_pass == true
    - step: 8
      name: Final Assembly
      phase: output
      hop: null
      blocks: all
      section: Final Output
      status: assembly
      inputs:
        from_previous: all_outputs
      outputs:
        $brand_strategy:
          type: document
          description: Complete 32-block brand strategy
        $brand_strategy_json:
          type: json
          description: Compact JSON for programmatic use
        $metadata:
          type: object
          description: Execution metadata
      estimated_tokens: 500
      estimated_time: 2-3 min
      dependencies:
      - step_7
      template: iso_vectorstore/ISO_EDISON_039_OUTPUT_TEMPLATE.md
      quality_gate:
        min_5d_score: 8.0
        cross_validation:
        - archetype <-> positioning alignment
        - traits <-> voice consistency
        - visual <-> personality coherence
        - narrative <-> values harmony
    final_output:
      format: ISO_EDISON_039_OUTPUT_TEMPLATE.md
      validation: 16_HOP_validation.md
      quality_gate:
        min_5d_score: 8.0
        consistency_threshold: 0.85
        uniqueness_threshold: 8.0
      deliverables:
      - brand_strategy.md
      - brand_strategy.json
