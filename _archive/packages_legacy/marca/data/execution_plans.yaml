execution_modes:
  sequential:
    description: Execute steps in order, wait for each to complete
    use_when: Default mode, most reliable
    token_efficiency: baseline
    parallelism: 1
  parallel_safe:
    description: Steps 1-3 sequential, then visual+narrative parallel, then validation
    use_when: Full plan with time pressure
    token_efficiency: 20% faster
    parallelism: 2
    parallel_groups:
    - steps:
      - 1
      - 2
      - 3
      mode: sequential
    - steps:
      - 4
      - 5
      mode: parallel
    - steps:
      - 6
      - 7
      - 8
      mode: sequential
  full_parallel:
    description: Maximum parallelism - NOT RECOMMENDED
    use_when: Never - dependencies may break
    token_efficiency: unpredictable
    risk: high
    warning: Dependencies between steps require sequential execution for quality
quality_gates:
  thresholds:
    rejected:
      max_score: 6.9
      action: retry_or_escalate
    experimental:
      min_score: 7.0
      max_score: 7.9
      action: accept_with_warning
    production:
      min_score: 8.0
      max_score: 9.4
      action: accept
    golden:
      min_score: 9.5
      action: accept_and_remember
  cross_validation:
    identity_positioning:
      check: archetype aligns with positioning
      weight: 0.3
    voice_personality:
      check: voice dimensions match personality traits
      weight: 0.25
    visual_archetype:
      check: color psychology aligns with archetype
      weight: 0.2
    narrative_values:
      check: story reinforces core values
      weight: 0.25
  compliance:
    anvisa: if product_category in ['cosmetics', 'supplements', 'health']
    inmetro: if product_category in ['electronics', 'textiles', 'toys']
    conar: always (advertising ethics)
    cdc: always (consumer protection)
retry_logic:
  strategy: retry_with_feedback
  max_retries_per_step: 2
  max_total_retries: 6
  feedback_injection:
    format: 'CORRECAO NECESSARIA:

      - Criterio: {criterion}

      - Problema: {issue}

      - Sugestao: {fix}


      Por favor, aplique a correcao e gere novamente.'
  escalation:
    after_max_retries: return_partial_with_warnings
    notify: user
integration:
  upstream:
    pesquisa_agent:
      provides:
      - market_research.md
      - competitor_analysis
      - audience_insights
      optional: true
    user_input:
      provides:
      - brand_brief
      required: true
  downstream:
    anuncio_agent:
      receives:
      - brand_voice
      - positioning
      - personality_traits
      blocks_needed:
      - 6
      - 10
      - 11
      - 12
      - 13
      - 14
      - 15
    photo_agent:
      receives:
      - visual_identity
      - brand_essence
      - archetype
      - mood_board_prompts
      blocks_needed:
      - 3
      - 5
      - 16
      - 17
      - 18
      - 19
    curso_agent:
      receives:
      - brand_strategy_complete
      - voice_guidelines
      blocks_needed: all
    ads_agent:
      receives:
      - positioning_statement
      - uvp
      - target_segment
      blocks_needed:
      - 6
      - 7
      - 10
token_optimization:
  context_caching:
    enabled: true
    cache_between_steps:
    - $brand_identity
    - $positioning
